<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — NDT Academy</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html"><img src="assets/logo.png" alt="NDT Academy"></a>
    <nav class="main-nav"><a href="index.html">Back to Site</a></nav>
  </div>
</header>

<section class="block" style="min-height:70vh">
  <div class="wrap" style="max-width:440px">
    <div class="proto-note">PROTOTYPE — auth will be wired to Supabase. The buttons below open each dashboard preview.</div>
    <div class="card" style="padding:36px">
      <span class="kicker">Sign In</span>
      <h2 style="font-size:1.8rem; margin-bottom:22px">Your training, your records</h2>
      <div class="field"><label for="em">Email</label><input id="em" type="email" placeholder="you@company.com"></div>
      <div class="field"><label for="pw">Password</label><input id="pw" type="password" placeholder="••••••••"></div>
      <div style="display:grid; gap:10px; margin-top:22px">
        <a class="btn btn-primary" href="dashboard-student.html" style="justify-content:center">Sign In as Student (Demo)</a>
        <a class="btn btn-ghost" href="dashboard-company.html" style="justify-content:center">Company Dashboard (Demo)</a>
        <a class="btn btn-ghost" href="admin.html" style="justify-content:center">Admin Dashboard (Demo)</a>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-bottom" style="border-top:0; padding-top:0">
      <span>© 2026 NDT Academy · NDTAcademy.com</span>
    </div>
  </div>
</footer>
<script src="js/site.js"></script>
</body>
</html>
