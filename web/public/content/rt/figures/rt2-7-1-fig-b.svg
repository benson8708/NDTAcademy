<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Film Viewing Station (Side View)</text>

  <!-- background lamp, subdued -->
  <polygon points="165,70 215,70 205,92 175,92" fill="#5A6B7E"/>
  <line x1="190" y1="60" x2="190" y2="70" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="180" y1="96" x2="176" y2="108" stroke="#F2A33C" stroke-width="2"/>
  <line x1="200" y1="96" x2="204" y2="108" stroke="#F2A33C" stroke-width="2"/>
  <text x="252" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Subdued background light</text>

  <!-- forbidden reflection ray -->
  <line x1="205" y1="95" x2="366" y2="200" stroke="#D14343" stroke-width="2" stroke-dasharray="7,5"/>
  <line x1="366" y1="200" x2="150" y2="232" stroke="#D14343" stroke-width="2" stroke-dasharray="7,5"/>
  <line x1="272" y1="138" x2="296" y2="162" stroke="#D14343" stroke-width="4"/>
  <line x1="296" y1="138" x2="272" y2="162" stroke="#D14343" stroke-width="4"/>
  <text x="298" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">No reflections off the film face</text>

  <!-- interpreter -->
  <circle cx="105" cy="215" r="26" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="124" cy="212" r="4" fill="#0A2342"/>
  <path d="M 70 320 Q 105 248 140 320" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <text x="105" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Interpreter -</text>
  <text x="105" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dark adapted</text>

  <!-- sight line -->
  <line x1="133" y1="215" x2="362" y2="215" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- mask plates -->
  <rect x="360" y="130" width="13" height="66" fill="#0A2342"/>
  <rect x="360" y="234" width="13" height="86" fill="#0A2342"/>
  <text x="330" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Opaque mask: film edges and</text>
  <text x="330" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">low-density areas covered</text>
  <line x1="366" y1="320" x2="338" y2="392" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- film -->
  <rect x="378" y="130" width="13" height="190" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <text x="384" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Radiograph</text>

  <!-- illuminator box -->
  <rect x="396" y="120" width="250" height="210" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <rect x="400" y="128" width="13" height="194" fill="#D9E0E8" stroke="#0A2342" stroke-width="1"/>
  <rect x="419" y="128" width="9" height="194" fill="#1B82E8" fill-opacity="0.35" stroke="#0A2342" stroke-width="1"/>
  <circle cx="540" cy="180" r="24" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="540" cy="270" r="24" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="510" y1="180" x2="434" y2="190" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="510" y1="270" x2="434" y2="258" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="466" y1="112" x2="466" y2="98" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="496" y1="112" x2="496" y2="98" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="526" y1="112" x2="526" y2="98" stroke="#5A6B7E" stroke-width="3"/>
  <text x="588" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cooling vents</text>
  <line x1="526" y1="103" x2="556" y2="96" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="700" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">High-intensity</text>
  <text x="700" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">lamps</text>
  <line x1="566" y1="180" x2="696" y2="178" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="700" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Diffuser:</text>
  <text x="700" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">even light,</text>
  <text x="700" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no hot spots</text>
  <line x1="407" y1="322" x2="470" y2="362" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="500" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Diffuser + heat-absorbing glass</text>

  <!-- intensity control -->
  <rect x="600" y="334" width="46" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="623" cy="351" r="10" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="623" y1="351" x2="630" y2="344" stroke="#0A2342" stroke-width="2"/>
  <text x="660" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Variable intensity control</text>
  <line x1="640" y1="368" x2="655" y2="378" stroke="#5A6B7E" stroke-width="1.5"/>
</svg>
