<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Casting Discontinuity Images - Simulated Film</text>

  <!-- panel 1: gas porosity -->
  <rect x="45" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="120" cy="120" r="5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="160" cy="100" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="190" cy="135" r="7" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="230" cy="110" r="5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="260" cy="140" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="290" cy="95" r="3.5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="140" cy="155" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="210" cy="160" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="310" cy="130" r="5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="95" cy="105" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="255" cy="85" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="330" cy="155" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <text x="210" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Gas porosity - smooth round dark spots</text>

  <!-- panel 2: shrinkage -->
  <rect x="425" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="490,160 530,140 570,128 620,118 660,124 700,140" fill="none" stroke="#0A2342" stroke-width="4"/>
  <polyline points="530,140 545,110" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="570,128 560,95" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="570,128 595,158" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="620,118 640,90" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="620,118 615,150" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="660,124 685,100" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="700,140 720,165" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="545,110 556,96" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <polyline points="640,90 652,80" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <polyline points="595,158 610,168" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="550" cy="150" r="2" fill="#0A2342"/>
  <circle cx="600" cy="100" r="2" fill="#0A2342"/>
  <circle cx="640" cy="150" r="2" fill="#0A2342"/>
  <circle cx="680" cy="130" r="2" fill="#0A2342"/>
  <text x="590" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Shrinkage - feathery branching network</text>

  <!-- panel 3: hot tear -->
  <rect x="45" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="90,330 120,322 150,332 185,318 215,330 250,316 285,328 315,320" fill="none" stroke="#0A2342" stroke-width="3"/>
  <polyline points="150,332 165,350" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="215,330 228,348" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="185,318 195,300" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="250,316 262,300" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="210" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Hot tear - ragged, branched dark line</text>

  <!-- panel 4: cold shut -->
  <rect x="425" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M 480 330 C 540 310, 640 350, 710 322" fill="none" stroke="#0A2342" stroke-width="5" stroke-linecap="round"/>
  <text x="590" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Cold shut - smooth dark line, rounded ends</text>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Darker image = less metal in the beam path</text>
</svg>
