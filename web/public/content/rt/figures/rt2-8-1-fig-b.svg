<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Two Films, One Exposure: Covering a Stepped Part</text>

  <!-- LEFT: setup -->
  <circle cx="200" cy="78" r="7" fill="#F2A33C"/>
  <text x="200" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Ir-192 source</text>
  <line x1="200" y1="85" x2="95" y2="208" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="148" y2="208" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="200" y2="208" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="252" y2="266" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="200" y1="85" x2="305" y2="266" stroke="#1B82E8" stroke-width="1.5"/>

  <!-- stepped part -->
  <rect x="80" y="210" width="140" height="120" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="220" y="270" width="100" height="60" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="150" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">2.0 in.</text>
  <text x="270" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">1.0 in.</text>

  <!-- cassette with two films -->
  <rect x="70" y="338" width="260" height="38" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="76" y="344" width="248" height="10" fill="#1B82E8"/>
  <rect x="76" y="358" width="248" height="10" fill="#1E9E6A"/>
  <text x="338" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Film F (fast)</text>
  <text x="338" y="369" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Film S (slow)</text>
  <text x="200" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">lead screens front, between, and back</text>
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">one exposure - each film reads the section</text>
  <text x="200" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">whose density lands in its window</text>

  <!-- RIGHT: film F strip -->
  <text x="392" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Film F (fast)</text>
  <rect x="390" y="80" width="360" height="86" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="392" y="82" width="178" height="82" fill="#3D4F63"/>
  <rect x="570" y="82" width="178" height="82" fill="#0A1B30"/>
  <text x="481" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">D = 2.5</text>
  <text x="481" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">read thick step here</text>
  <text x="659" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">D = 4.5</text>
  <text x="659" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">too dark - do not call</text>

  <!-- RIGHT: film S strip -->
  <text x="392" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Film S (slow)</text>
  <rect x="390" y="202" width="360" height="86" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="392" y="204" width="178" height="82" fill="#D9E0E8"/>
  <rect x="570" y="204" width="178" height="82" fill="#3D4F63"/>
  <text x="481" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">D = 1.1</text>
  <text x="481" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">too light - do not call</text>
  <text x="659" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">D = 2.3</text>
  <text x="659" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">read thin step here</text>

  <!-- composite viewing inset -->
  <text x="392" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Same-speed pair option: composite viewing</text>
  <rect x="400" y="340" width="120" height="52" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="448" y="362" width="120" height="52" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="448" y="362" width="72" height="30" fill="#0A1B30"/>
  <text x="430" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D 2.0</text>
  <text x="540" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D 2.0</text>
  <text x="592" y="368" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">stacked: densities add</text>
  <text x="592" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">2.0 + 2.0 = 4.0 composite</text>
  <text x="592" y="416" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">each film at least 1.3 alone</text>
</svg>
