<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Indication to Disposition</text>

  <!-- INDICATION box -->
  <rect x="290" y="48" width="220" height="50" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">INDICATION</text>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a density change to explain</text>

  <!-- arrow down -->
  <line x1="400" y1="98" x2="400" y2="118" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="394,118 400,128 406,118" fill="#0A2342"/>

  <!-- INTERPRETATION box -->
  <rect x="265" y="128" width="270" height="50" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="400" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">INTERPRETATION</text>
  <text x="400" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">what produced it?</text>

  <!-- three branch arrows -->
  <line x1="310" y1="178" x2="158" y2="200" stroke="#0A2342" stroke-width="2"/>
  <polygon points="156,194 148,202 162,204" fill="#0A2342"/>
  <line x1="400" y1="178" x2="400" y2="198" stroke="#0A2342" stroke-width="2"/>
  <polygon points="394,198 400,208 406,198" fill="#0A2342"/>
  <line x1="490" y1="178" x2="642" y2="200" stroke="#0A2342" stroke-width="2"/>
  <polygon points="638,204 652,202 644,194" fill="#0A2342"/>

  <!-- FALSE box -->
  <rect x="40" y="208" width="220" height="74" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="150" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">FALSE</text>
  <text x="150" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">film artifact: crimp, static,</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">streaks &#8212; resolve, reshoot</text>

  <!-- NONRELEVANT box -->
  <rect x="290" y="208" width="220" height="74" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">NONRELEVANT</text>
  <text x="400" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">part feature: backing ring,</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">geometry &#8212; verify on part</text>

  <!-- RELEVANT box -->
  <rect x="540" y="208" width="220" height="74" rx="8" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="650" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">RELEVANT</text>
  <text x="650" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">produced by a</text>
  <text x="650" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">discontinuity</text>

  <!-- elbow from RELEVANT to EVALUATION -->
  <line x1="650" y1="282" x2="650" y2="332" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="650" y1="332" x2="592" y2="332" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="592,326 582,332 592,338" fill="#0A2342"/>

  <!-- EVALUATION box -->
  <rect x="220" y="306" width="360" height="52" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">EVALUATE THE DISCONTINUITY</text>
  <text x="400" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">against the governing acceptance criteria</text>

  <!-- arrows to outcomes -->
  <line x1="340" y1="358" x2="300" y2="382" stroke="#0A2342" stroke-width="2"/>
  <polygon points="296,376 292,388 306,386" fill="#0A2342"/>
  <line x1="460" y1="358" x2="600" y2="382" stroke="#0A2342" stroke-width="2"/>
  <polygon points="596,374 610,384 598,388" fill="#0A2342"/>

  <!-- ACCEPT box -->
  <rect x="150" y="390" width="290" height="52" rx="8" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="295" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">WITHIN LIMITS &#8594; ACCEPT</text>
  <text x="295" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">remains a discontinuity</text>

  <!-- DEFECT box -->
  <rect x="460" y="390" width="300" height="52" rx="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="610" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">EXCEEDS LIMITS &#8594; DEFECT</text>
  <text x="610" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">reject &#8212; repair or disposition</text>
</svg>
