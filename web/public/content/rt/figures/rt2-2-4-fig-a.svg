<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Roller-Transport Processor - Cutaway</text>

  <!-- machine body -->
  <rect x="70" y="90" width="600" height="260" fill="#E8F1FB" opacity="0.25"/>
  <rect x="70" y="90" width="600" height="260" fill="none" stroke="#0A2342" stroke-width="3"/>

  <!-- feed tray + detector -->
  <polygon points="20,150 70,165 70,180 20,168" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="40" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Feed tray</text>
  <circle cx="80" cy="172" r="5" fill="#D14343"/>
  <line x1="80" y1="166" x2="96" y2="118" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="100" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Entrance detector -</text>
  <text x="100" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">runs replenisher pumps</text>

  <!-- tanks -->
  <rect x="95" y="150" width="150" height="160" fill="#1B82E8" opacity="0.55" stroke="#0A2342" stroke-width="2"/>
  <rect x="265" y="150" width="150" height="160" fill="#1E9E6A" opacity="0.55" stroke="#0A2342" stroke-width="2"/>
  <rect x="435" y="150" width="110" height="160" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="170" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">DEVELOPER</text>
  <text x="340" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">FIXER</text>
  <text x="490" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">WASH</text>

  <!-- film path -->
  <path d="M 25 160 L 90 174 L 155 190 L 155 280 L 185 280 L 185 145 L 305 145 L 305 280 L 335 280 L 335 145 L 460 145 L 460 275 L 490 275 L 490 165 L 552 181 L 655 181" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <polygon points="652,175 665,181 652,187" fill="#F2A33C"/>
  <rect x="666" y="170" width="8" height="22" fill="#0A2342"/>

  <!-- roller racks: developer -->
  <circle cx="135" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="135" cy="230" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="135" cy="270" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="205" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="205" cy="230" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="205" cy="270" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <!-- roller racks: fixer -->
  <circle cx="285" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="285" cy="230" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="285" cy="270" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="355" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="355" cy="230" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="355" cy="270" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <!-- roller racks: wash -->
  <circle cx="455" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="455" cy="235" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="510" cy="190" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="510" cy="235" r="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>

  <!-- crossovers -->
  <circle cx="250" cy="136" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="262" cy="136" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="419" cy="136" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="431" cy="136" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="262" y1="128" x2="318" y2="112" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="322" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crossovers - wipe daily</text>

  <!-- transport note -->
  <text x="540" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Transport speed sets</text>
  <text x="540" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">development time</text>

  <!-- squeegee -->
  <circle cx="560" cy="172" r="8" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="560" cy="190" r="8" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <text x="560" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Squeegee</text>

  <!-- dryer -->
  <circle cx="620" cy="250" r="14" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="620" y1="236" x2="620" y2="264" stroke="#F2A33C" stroke-width="2"/>
  <line x1="606" y1="250" x2="634" y2="250" stroke="#F2A33C" stroke-width="2"/>
  <line x1="598" y1="275" x2="598" y2="298" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="593,296 603,296 598,306" fill="#F2A33C"/>
  <line x1="642" y1="275" x2="642" y2="298" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="637,296 647,296 642,306" fill="#F2A33C"/>
  <text x="620" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">DRYER</text>

  <!-- exit label -->
  <text x="733" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry film out</text>
  <text x="733" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">8-12 min typical</text>

  <!-- replenisher tanks + pumps -->
  <rect x="95" y="378" width="125" height="46" fill="#1B82E8" opacity="0.35" stroke="#0A2342" stroke-width="2"/>
  <text x="157" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dev replenisher</text>
  <line x1="157" y1="378" x2="157" y2="310" stroke="#0A2342" stroke-width="2"/>
  <circle cx="157" cy="352" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="235" y="378" width="125" height="46" fill="#1E9E6A" opacity="0.35" stroke="#0A2342" stroke-width="2"/>
  <text x="297" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fix replenisher</text>
  <line x1="297" y1="378" x2="297" y2="310" stroke="#0A2342" stroke-width="2"/>
  <circle cx="297" cy="352" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>

  <!-- bottom note -->
  <text x="560" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Developer is recirculated through a filter and</text>
  <text x="560" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">heat exchanger - thermostat holds ~80 °F</text>
</svg>
