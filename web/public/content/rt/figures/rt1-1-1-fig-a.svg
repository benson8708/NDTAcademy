<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Discovery to Industrial Radiography</text>

  <!-- main timeline -->
  <line x1="60" y1="240" x2="740" y2="240" stroke="#0A2342" stroke-width="4"/>
  <polygon points="740,232 760,240 740,248" fill="#0A2342"/>

  <!-- 1895 Roentgen (above) -->
  <circle cx="110" cy="240" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="110" y1="231" x2="110" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="110" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1895</text>
  <text x="110" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Roentgen discovers</text>
  <text x="110" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">X-rays</text>

  <!-- 1896 Becquerel (below) -->
  <circle cx="215" cy="240" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="215" y1="249" x2="215" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="215" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1896</text>
  <text x="215" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Becquerel: natural</text>
  <text x="215" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">radioactivity (uranium)</text>

  <!-- 1898 Curies (above) -->
  <circle cx="320" cy="240" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="320" y1="231" x2="320" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="320" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1898</text>
  <text x="320" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Curies isolate radium</text>
  <text x="320" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and polonium</text>

  <!-- 1922 first industrial lab (below) -->
  <circle cx="440" cy="240" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="440" y1="249" x2="440" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1922</text>
  <text x="440" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">First U.S. industrial</text>
  <text x="440" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">X-ray lab (castings)</text>

  <!-- early 1930s codes (above) -->
  <circle cx="560" cy="240" r="9" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <line x1="560" y1="231" x2="560" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="560" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Early 1930s</text>
  <text x="560" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pressure vessel codes</text>
  <text x="560" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">require weld radiography</text>

  <!-- late 1940s isotopes (below) -->
  <circle cx="675" cy="240" r="9" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="675" y1="249" x2="675" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="675" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Late 1940s</text>
  <text x="675" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reactor isotopes Ir-192,</text>
  <text x="675" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Co-60: portable gamma RT</text>

  <!-- legend strip -->
  <rect x="60" y="396" width="680" height="36" rx="6" fill="#E8F1FB"/>
  <text x="400" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Two source families emerge: machine-made X-rays (switchable) and isotope gamma sources (always on)</text>
</svg>
