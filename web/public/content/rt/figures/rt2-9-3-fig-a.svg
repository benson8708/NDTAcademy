<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Single-V Groove Weld: Discontinuity Location Map</text>

  <!-- HAZ bands (under plates' edges) -->
  <path d="M322,230 L350,230 L388,298 L388,310" fill="none" stroke="#F2A33C" stroke-width="10" opacity="0.35"/>
  <path d="M478,230 L450,230 L412,298 L412,310" fill="none" stroke="#F2A33C" stroke-width="10" opacity="0.35"/>

  <!-- plates -->
  <polygon points="60,230 350,230 388,298 388,310 60,310" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="740,230 450,230 412,298 412,310 740,310" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- weld metal -->
  <polygon points="350,230 450,230 412,298 412,310 388,310 388,298" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M340,230 Q400,202 460,230 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M388,310 Q400,322 412,310 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- pass boundary lines -->
  <path d="M381,288 Q400,278 419,288" fill="none" stroke="#5A6B7E" stroke-width="1.3"/>
  <path d="M372,268 Q400,256 428,268" fill="none" stroke="#5A6B7E" stroke-width="1.3"/>
  <path d="M362,248 Q400,234 438,248" fill="none" stroke="#5A6B7E" stroke-width="1.3"/>

  <!-- HAZ label -->
  <text x="316" y="266" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">HAZ</text>
  <line x1="322" y1="258" x2="356" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- toe undercut -->
  <path d="M332,230 Q340,238 348,230" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="340" y1="226" x2="252" y2="192" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="185" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Toe undercut</text>

  <!-- slag between passes -->
  <path d="M364,262 L376,257 L381,265 L369,270 Z" fill="#0A2342"/>
  <line x1="366" y1="262" x2="266" y2="222" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="185" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Slag between passes</text>

  <!-- porosity in fill -->
  <circle cx="398" cy="240" r="3" fill="#0A2342"/>
  <circle cx="408" cy="236" r="2.5" fill="#0A2342"/>
  <circle cx="390" cy="236" r="2.5" fill="#0A2342"/>
  <circle cx="403" cy="247" r="3" fill="#0A2342"/>
  <line x1="400" y1="232" x2="400" y2="164" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Porosity in fill passes</text>

  <!-- pass labels -->
  <text x="530" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cap pass</text>
  <line x1="455" y1="212" x2="525" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="535" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fill passes</text>
  <line x1="432" y1="252" x2="530" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="535" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Root pass</text>
  <line x1="410" y1="318" x2="528" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- lack of fusion on bevel -->
  <line x1="444" y1="242" x2="420" y2="290" stroke="#D14343" stroke-width="3"/>
  <line x1="430" y1="268" x2="555" y2="292" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="560" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Lack of fusion on the bevel</text>

  <!-- incomplete penetration at root -->
  <line x1="390" y1="306" x2="410" y2="306" stroke="#D14343" stroke-width="4"/>
  <line x1="396" y1="308" x2="352" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="350" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Incomplete penetration at the root</text>

  <!-- underbead crack in HAZ -->
  <polyline points="366,286 372,292 366,298 372,304" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="366" y1="300" x2="162" y2="354" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="120" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Underbead crack (HAZ)</text>

  <!-- footer note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Root flaws sit on the centerline · fusion flaws follow the bevels · delayed cracks live in the HAZ</text>
</svg>
