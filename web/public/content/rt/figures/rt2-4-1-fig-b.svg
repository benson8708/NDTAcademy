<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">One Film, Three Different Calls</text>

  <!-- label above: FALSE -->
  <text x="150" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">FALSE</text>
  <text x="150" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">crimp mark &#8212; film artifact</text>
  <line x1="150" y1="100" x2="151" y2="148" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- simulated film strip: plate area -->
  <rect x="50" y="120" width="700" height="180" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- weld image band (reinforcement = lighter) -->
  <rect x="50" y="185" width="700" height="50" fill="#D9E0E8"/>

  <!-- crimp mark (false): crescent in the plate area -->
  <path d="M 140 148 Q 164 160 150 180" fill="none" stroke="#0A2342" stroke-width="5" stroke-linecap="round"/>

  <!-- spatter (nonrelevant): light round spots on plate below the weld -->
  <circle cx="375" cy="258" r="5" fill="#E8F1FB"/>
  <circle cx="395" cy="266" r="4" fill="#E8F1FB"/>
  <circle cx="412" cy="255" r="4" fill="#E8F1FB"/>

  <!-- slag line (relevant): irregular dark shape along the lower bevel -->
  <polygon points="580,222 600,216 622,224 645,218 662,226 650,232 625,229 598,230" fill="#0A2342"/>

  <!-- leader lines to lower labels -->
  <line x1="330" y1="336" x2="385" y2="270" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="620" y1="336" x2="621" y2="234" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- label below: NONRELEVANT -->
  <text x="300" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">NONRELEVANT</text>
  <text x="300" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">spatter on the surface &#8212; verify visually</text>

  <!-- label below: RELEVANT -->
  <text x="625" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">RELEVANT</text>
  <text x="625" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">slag line &#8212; evaluate against criteria</text>

  <!-- footer -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Only the relevant indication moves forward to evaluation</text>
</svg>
