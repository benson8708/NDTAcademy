<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Characteristic Curve: Film Contrast Is the Slope</text>

  <!-- same-exposure-step bands -->
  <rect x="230" y="70" width="40" height="320" fill="#F2A33C" opacity="0.12"/>
  <rect x="430" y="70" width="40" height="320" fill="#F2A33C" opacity="0.12"/>
  <text x="250" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">step &#916;E</text>
  <text x="450" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">step &#916;E</text>

  <!-- axes -->
  <line x1="130" y1="70" x2="130" y2="390" stroke="#0A2342" stroke-width="2"/>
  <line x1="130" y1="390" x2="730" y2="390" stroke="#0A2342" stroke-width="2"/>
  <line x1="124" y1="390" x2="130" y2="390" stroke="#0A2342" stroke-width="2"/>
  <line x1="124" y1="310" x2="130" y2="310" stroke="#0A2342" stroke-width="2"/>
  <line x1="124" y1="230" x2="130" y2="230" stroke="#0A2342" stroke-width="2"/>
  <line x1="124" y1="150" x2="130" y2="150" stroke="#0A2342" stroke-width="2"/>
  <line x1="124" y1="70" x2="130" y2="70" stroke="#0A2342" stroke-width="2"/>
  <text x="116" y="396" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="116" y="316" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="116" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="116" y="156" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="116" y="76" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4</text>
  <text x="60" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342" transform="rotate(-90 60 230)">Film density D</text>
  <text x="430" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Log relative exposure</text>
  <text x="730" y="424" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">D = log&#8321;&#8320;(I&#8320;/I&#8348;)</text>

  <!-- code minimum density line -->
  <line x1="130" y1="230" x2="730" y2="230" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="726" y="222" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">code minimum &#8776; 2.0</text>

  <!-- projection dashes: toe pair -->
  <line x1="130" y1="362" x2="230" y2="362" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="130" y1="356" x2="270" y2="356" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- projection dashes: straight-line pair -->
  <line x1="130" y1="235" x2="430" y2="235" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="130" y1="204" x2="470" y2="204" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- the curve -->
  <path d="M 135 366 L 215 364 C 265 361 295 348 330 315 L 560 132 C 595 105 635 86 700 78" fill="none" stroke="#1B82E8" stroke-width="4"/>

  <!-- result labels -->
  <text x="140" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">tiny density change</text>
  <text x="140" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">big density change</text>

  <!-- region labels -->
  <text x="155" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">base + fog</text>
  <text x="310" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">toe</text>
  <text x="612" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">straight-line region</text>
  <text x="612" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">(slope = film contrast)</text>
  <text x="690" y="62" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">shoulder</text>
</svg>
