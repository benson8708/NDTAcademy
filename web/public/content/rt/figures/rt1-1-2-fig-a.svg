<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Inverse Square Law</text>

  <!-- source -->
  <circle cx="100" cy="250" r="11" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="100" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>

  <!-- diverging rays through both screens -->
  <line x1="108" y1="243" x2="600" y2="150" stroke="#1B82E8" stroke-width="2"/>
  <line x1="108" y1="257" x2="600" y2="350" stroke="#1B82E8" stroke-width="2"/>
  <line x1="110" y1="248" x2="600" y2="217" stroke="#1B82E8" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="110" y1="252" x2="600" y2="283" stroke="#1B82E8" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- near screen: 1 square at distance d -->
  <rect x="320" y="220" width="60" height="60" fill="#F2A33C" fill-opacity="0.35" stroke="#F2A33C" stroke-width="3"/>
  <text x="350" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">d = 10 ft</text>
  <text x="350" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">I = 100 mR/h</text>
  <text x="350" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">1 area unit</text>

  <!-- far screen: 4 squares at distance 2d -->
  <rect x="540" y="190" width="120" height="120" fill="#1B82E8" fill-opacity="0.18" stroke="#1B82E8" stroke-width="3"/>
  <line x1="600" y1="190" x2="600" y2="310" stroke="#1B82E8" stroke-width="2"/>
  <line x1="540" y1="250" x2="660" y2="250" stroke="#1B82E8" stroke-width="2"/>
  <text x="600" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2d = 20 ft</text>
  <text x="600" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">I = 25 mR/h</text>
  <text x="600" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">same radiation, 4 area units</text>

  <!-- distance brackets -->
  <line x1="100" y1="408" x2="350" y2="408" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="100" y1="402" x2="100" y2="414" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="350" y1="402" x2="350" y2="414" stroke="#5A6B7E" stroke-width="2"/>
  <text x="225" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">distance d</text>
  <line x1="356" y1="408" x2="600" y2="408" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="600" y1="402" x2="600" y2="414" stroke="#5A6B7E" stroke-width="2"/>
  <text x="480" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">distance d again</text>

  <!-- formula box -->
  <rect x="80" y="72" width="640" height="76" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">I₁ × d₁² = I₂ × d₂²</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Double the distance → one quarter the intensity:  100 × 10² = 25 × 20²</text>
</svg>
