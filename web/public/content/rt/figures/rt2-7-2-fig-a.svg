<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">IQI Placement - Section and Film Views</text>

  <!-- SECTION VIEW -->
  <text x="70" y="62" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Section view</text>

  <!-- source and rays -->
  <circle cx="400" cy="68" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="430" y="64" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Source</text>
  <line x1="400" y1="75" x2="165" y2="148" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="400" y1="75" x2="400" y2="146" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="400" y1="75" x2="635" y2="148" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- plate with weld -->
  <rect x="150" y="150" width="500" height="40" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 365 150 Q 400 128 435 150 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <path d="M 365 190 Q 400 208 435 190 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Weld reinforcement</text>

  <!-- source-side IQI on shim -->
  <rect x="470" y="141" width="100" height="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="485" y="132" width="68" height="9" fill="#0A2342"/>
  <line x1="553" y1="128" x2="610" y2="106" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="614" y="102" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">IQI on shim -</text>
  <text x="614" y="121" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">source side (default)</text>

  <!-- film -->
  <rect x="150" y="206" width="500" height="11" fill="#1B82E8" fill-opacity="0.3" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="672" y="217" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film</text>

  <!-- film-side alternative -->
  <rect x="240" y="194" width="62" height="9" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="316" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">F</text>
  <line x1="262" y1="206" x2="190" y2="240" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="60" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film side only when source side is inaccessible - flag with lead letter F</text>

  <!-- PLAN VIEW -->
  <text x="70" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Film (plan) view</text>

  <rect x="150" y="300" width="500" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="150" y="348" width="500" height="36" fill="#5A6B7E" fill-opacity="0.55"/>
  <line x1="150" y1="366" x2="650" y2="366" stroke="#0A2342" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="170" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Weld image</text>

  <!-- plaque IQI on shim, parallel to weld -->
  <rect x="210" y="306" width="104" height="38" fill="#F2A33C" fill-opacity="0.4" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="224" y="313" width="76" height="24" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="240" cy="325" r="3" fill="#0A2342"/>
  <circle cx="257" cy="325" r="5" fill="#0A2342"/>
  <circle cx="282" cy="325" r="9" fill="#0A2342"/>
  <line x1="262" y1="306" x2="262" y2="282" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="262" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Plaque parallel to weld, on shim, numbers clear of weld</text>

  <!-- wire IQI across weld -->
  <rect x="452" y="306" width="116" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="462" y1="320" x2="462" y2="412" stroke="#0A2342" stroke-width="3.6"/>
  <line x1="483" y1="320" x2="483" y2="412" stroke="#0A2342" stroke-width="3"/>
  <line x1="504" y1="320" x2="504" y2="412" stroke="#0A2342" stroke-width="2.4"/>
  <line x1="525" y1="320" x2="525" y2="412" stroke="#0A2342" stroke-width="1.8"/>
  <line x1="546" y1="320" x2="546" y2="412" stroke="#0A2342" stroke-width="1.2"/>
  <line x1="558" y1="320" x2="558" y2="412" stroke="#0A2342" stroke-width="0.8"/>
  <line x1="568" y1="326" x2="676" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="680" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wire IQI</text>
  <text x="680" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">on the weld,</text>
  <text x="680" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wires cross</text>
  <text x="680" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">it at 90°</text>

  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">The IQI must see the same beam, thickness, geometry, and film as the area of interest.</text>
</svg>
