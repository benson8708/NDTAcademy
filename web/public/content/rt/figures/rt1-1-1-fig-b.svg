<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">How a Radiograph Forms</text>

  <!-- source housing -->
  <rect x="372" y="62" width="56" height="34" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <circle cx="400" cy="96" r="10" fill="#F2A33C" stroke="#FFFFFF" stroke-width="2"/>
  <text x="438" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Gamma or X-ray source</text>

  <!-- beam edges -->
  <line x1="400" y1="100" x2="180" y2="358" stroke="#E8F1FB" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="400" y1="100" x2="620" y2="358" stroke="#E8F1FB" stroke-width="2" stroke-dasharray="6,5"/>
  <!-- interior rays -->
  <line x1="400" y1="100" x2="290" y2="358" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="400" y1="100" x2="510" y2="358" stroke="#1B82E8" stroke-width="1.5"/>
  <!-- highlighted ray through the void -->
  <line x1="400" y1="100" x2="345" y2="358" stroke="#F2A33C" stroke-width="3"/>
  <text x="208" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Radiation beam</text>

  <!-- test part -->
  <rect x="190" y="268" width="420" height="58" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="622" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Test part</text>
  <text x="622" y="309" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">(steel)</text>

  <!-- internal void -->
  <circle cx="358" cy="297" r="11" fill="#0A2342" stroke="#F2A33C" stroke-width="2"/>
  <line x1="347" y1="290" x2="252" y2="246" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="246" y="240" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Internal void (gas pore)</text>

  <!-- film -->
  <rect x="190" y="358" width="420" height="26" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="2"/>
  <text x="622" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Film / detector</text>

  <!-- darker image of void on film -->
  <ellipse cx="344" cy="371" rx="15" ry="8" fill="#0A2342"/>
  <line x1="344" y1="380" x2="320" y2="416" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="314" y="436" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Darker image of the void</text>

  <!-- absorption annotations -->
  <text x="438" y="416" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Full steel path: more absorption, lighter film</text>
  <text x="438" y="436" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Path through void: less absorption, darker film</text>
</svg>
