<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Band of Stability</text>

  <!-- axes -->
  <line x1="110" y1="390" x2="700" y2="390" stroke="#0A2342" stroke-width="3"/>
  <line x1="110" y1="390" x2="110" y2="70" stroke="#0A2342" stroke-width="3"/>
  <polygon points="700,384 716,390 700,396" fill="#0A2342"/>
  <polygon points="104,70 110,54 116,70" fill="#0A2342"/>
  <text x="420" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Protons (Z) &#8594;</text>
  <text x="60" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342" transform="rotate(-90 60 230)">Neutrons (N) &#8594;</text>

  <!-- N = Z reference line (45 degrees) -->
  <line x1="110" y1="390" x2="560" y2="120" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="580" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">N = Z line</text>

  <!-- stable band: curves above N=Z as Z grows -->
  <path d="M 110 390 C 250 290 360 220 470 150 C 520 120 560 100 600 84
           L 610 108 C 560 130 510 158 460 190 C 360 252 240 320 118 396 Z"
        fill="#1B82E8" fill-opacity="0.30" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="320" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342" transform="rotate(-31 320 252)">Band of stability (stable nuclides)</text>

  <!-- light nuclide marker -->
  <circle cx="172" cy="346" r="7" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="188" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">C-12: N : Z = 1 : 1</text>

  <!-- heavy nuclide marker -->
  <circle cx="556" cy="124" r="7" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="528" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Pb-208: N : Z &#8776; 1.5 : 1</text>

  <!-- neutron-rich unstable marker -->
  <circle cx="408" cy="158" r="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="408" y1="166" x2="436" y2="208" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="430,206 442,216 440,200" fill="#D14343"/>
  <text x="404" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Neutron-rich: radioactive</text>
  <text x="468" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#D14343">decays back toward the band</text>

  <!-- proton-rich unstable marker -->
  <circle cx="356" cy="330" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="372" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Neutron-poor: radioactive</text>

  <!-- key box -->
  <rect x="128" y="76" width="232" height="58" rx="8" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="244" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Inside the band = stable forever.</text>
  <text x="244" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Off the band = excess energy: decay.</text>
</svg>
