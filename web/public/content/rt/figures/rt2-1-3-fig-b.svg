<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">Simulated Weld Radiograph — IQI Anatomy</text>

  <!-- film area -->
  <rect x="30" y="60" width="590" height="360" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <rect x="32" y="62" width="586" height="356" fill="#5A6B7E" opacity="0.10"/>

  <!-- weld image: lighter band across the film -->
  <path d="M 35 240 Q 90 232 150 238 Q 210 244 270 236 Q 330 230 390 240 Q 450 248 510 236 Q 570 228 615 239 L 615 300 Q 560 308 500 302 Q 440 297 380 306 Q 320 313 260 301 Q 200 294 140 305 Q 90 311 35 301 Z" fill="#D9E0E8" opacity="0.26"/>
  <rect x="35" y="255" width="580" height="30" fill="#D9E0E8" opacity="0.13"/>

  <!-- shim outline under plaque -->
  <rect x="128" y="115" width="264" height="80" fill="#D9E0E8" opacity="0.08" stroke="#E8F1FB" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- hole-type plaque -->
  <rect x="140" y="125" width="240" height="60" fill="#D9E0E8" opacity="0.55" stroke="#E8F1FB" stroke-opacity="0.8" stroke-width="1"/>
  <text x="172" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">12</text>
  <circle cx="225" cy="155" r="17" fill="#0A2342" opacity="0.92"/>
  <circle cx="290" cy="155" r="9" fill="#0A2342" opacity="0.92"/>
  <circle cx="345" cy="155" r="5" fill="#0A2342" opacity="0.92"/>

  <!-- hole labels -->
  <line x1="225" y1="187" x2="225" y2="198" stroke="#1B82E8" stroke-width="1.2"/>
  <line x1="290" y1="187" x2="290" y2="198" stroke="#1B82E8" stroke-width="1.2"/>
  <line x1="345" y1="187" x2="345" y2="198" stroke="#1B82E8" stroke-width="1.2"/>
  <text x="225" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">4T</text>
  <text x="290" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">2T</text>
  <text x="345" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">1T</text>

  <!-- lead ID label -->
  <text x="95" y="95" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Lead ID number</text>
  <line x1="150" y1="100" x2="170" y2="142" stroke="#1B82E8" stroke-width="1.2"/>

  <!-- wire IQI -->
  <rect x="430" y="195" width="120" height="140" fill="#E8F1FB" opacity="0.15" stroke="#E8F1FB" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="445" y1="205" x2="445" y2="325" stroke="#D9E0E8" stroke-width="5.5" opacity="0.95"/>
  <line x1="465" y1="205" x2="465" y2="325" stroke="#D9E0E8" stroke-width="4.5" opacity="0.85"/>
  <line x1="485" y1="205" x2="485" y2="325" stroke="#D9E0E8" stroke-width="3.5" opacity="0.75"/>
  <line x1="505" y1="205" x2="505" y2="325" stroke="#D9E0E8" stroke-width="2.7" opacity="0.65"/>
  <line x1="525" y1="205" x2="525" y2="325" stroke="#D9E0E8" stroke-width="2" opacity="0.5"/>
  <line x1="545" y1="205" x2="545" y2="325" stroke="#D9E0E8" stroke-width="1.3" opacity="0.38"/>

  <!-- location marker -->
  <text x="62" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E8F1FB">1</text>

  <!-- annotations -->
  <text x="632" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Hole-type plaque</text>
  <text x="632" y="131" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">(thickness 2% of T)</text>
  <line x1="628" y1="115" x2="382" y2="132" stroke="#1B82E8" stroke-width="1.2" opacity="0.8"/>
  <text x="632" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Shim (matches</text>
  <text x="632" y="199" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">reinforcement)</text>
  <line x1="628" y1="184" x2="394" y2="176" stroke="#1B82E8" stroke-width="1.2" opacity="0.8"/>
  <text x="632" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Wire IQI laid</text>
  <text x="632" y="271" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">across the weld</text>
  <line x1="628" y1="256" x2="552" y2="252" stroke="#1B82E8" stroke-width="1.2" opacity="0.8"/>
  <text x="632" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Weld image</text>
  <line x1="628" y1="316" x2="610" y2="292" stroke="#1B82E8" stroke-width="1.2" opacity="0.8"/>
  <text x="632" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Location marker</text>
  <line x1="628" y1="366" x2="74" y2="348" stroke="#1B82E8" stroke-width="1.2" opacity="0.8"/>

  <!-- reading note -->
  <text x="325" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB" opacity="0.85">Lead absorbs → light image · holes pass more radiation → dark image</text>
</svg>
