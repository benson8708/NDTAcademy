<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Output at One Meter (approximate)</text>

  <!-- divider -->
  <line x1="400" y1="56" x2="400" y2="408" stroke="#5A6B7E" stroke-width="2"/>

  <!-- ============ LEFT: gamma sources ============ -->
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Gamma sources: R/h per Ci at 1 m</text>

  <!-- gridlines -->
  <line x1="60" y1="294" x2="360" y2="294" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="54" y="299" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">0.5</text>
  <line x1="60" y1="209" x2="360" y2="209" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="54" y="214" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">1.0</text>

  <!-- baseline -->
  <line x1="60" y1="380" x2="360" y2="380" stroke="#D9E0E8" stroke-width="2"/>

  <!-- bars -->
  <rect x="80" y="346" width="60" height="34" fill="#1E9E6A"/>
  <text x="110" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#8776;0.2</text>
  <text x="110" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Se-75</text>

  <rect x="180" y="294" width="60" height="86" fill="#F2A33C"/>
  <text x="210" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#8776;0.5</text>
  <text x="210" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Ir-192</text>

  <rect x="280" y="157" width="60" height="223" fill="#D14343"/>
  <text x="310" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#8776;1.3</text>
  <text x="310" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Co-60</text>

  <text x="210" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Fixed by the isotope; falls with decay</text>

  <!-- ============ RIGHT: X-ray devices ============ -->
  <text x="600" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">X-ray devices: output set by controls</text>

  <!-- axes -->
  <line x1="440" y1="380" x2="760" y2="380" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="440" y1="100" x2="440" y2="380" stroke="#D9E0E8" stroke-width="2"/>
  <text x="600" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Kilovoltage</text>
  <text x="428" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB" transform="rotate(-90 428 240)">Output at 1 m</text>

  <!-- output curve (roughly proportional to kV squared) -->
  <polyline points="460,373 488,364 516,352 544,337 572,318 600,295 628,269 656,239 684,206 712,170 740,130" fill="none" stroke="#F2A33C" stroke-width="3.5"/>

  <!-- marker at 250 kV -->
  <circle cx="684" cy="206" r="6" fill="#E8F1FB"/>
  <text x="672" y="172" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">250 kV at 5 mA:</text>
  <text x="672" y="192" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">hundreds of R/h at 1 m</text>

  <text x="600" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">mA scales output linearly; use the machine's emission chart</text>
</svg>
