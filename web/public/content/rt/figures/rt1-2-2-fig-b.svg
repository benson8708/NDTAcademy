<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Activity Units and Specific Activity</text>

  <!-- ===== top band: unit ladder ===== -->
  <rect x="60" y="58" width="680" height="92" rx="10" fill="#FFFFFF" fill-opacity="0.07" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1 Bq = 1 disintegration per second</text>
  <text x="220" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">1 Ci = 3.7 &#215; 10&#185;&#8304; dps = 37 GBq</text>
  <text x="580" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">100 Ci = 3.7 TBq</text>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Activity counts decays only - dose rate also depends on what each decay emits</text>

  <!-- ===== bottom: two sources, same activity, different size ===== -->
  <line x1="400" y1="166" x2="400" y2="420" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 6"/>

  <!-- LEFT: low specific activity -->
  <text x="216" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Low specific activity</text>
  <text x="216" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">100 Ci in a LARGE pellet stack</text>
  <!-- big source -->
  <rect x="196" y="222" width="40" height="26" rx="5" fill="#F2A33C" stroke="#FFFFFF" stroke-width="2"/>
  <!-- rays from source edges past a defect edge to film -->
  <line x1="200" y1="248" x2="150" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="232" y1="248" x2="118" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="200" y1="248" x2="298" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="232" y1="248" x2="330" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <!-- object edge -->
  <rect x="160" y="300" width="112" height="16" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="216" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">test object</text>
  <!-- film -->
  <line x1="100" y1="376" x2="348" y2="376" stroke="#E8F1FB" stroke-width="4"/>
  <text x="216" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">film</text>
  <!-- penumbra band wide -->
  <rect x="118" y="370" width="32" height="12" fill="#D14343"/>
  <rect x="298" y="370" width="32" height="12" fill="#D14343"/>
  <text x="216" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">wide fuzzy edges = more unsharpness</text>

  <!-- RIGHT: high specific activity -->
  <text x="584" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">High specific activity</text>
  <text x="584" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Same 100 Ci in a SMALL pellet stack</text>
  <!-- small source -->
  <rect x="576" y="226" width="16" height="18" rx="4" fill="#F2A33C" stroke="#FFFFFF" stroke-width="2"/>
  <!-- rays -->
  <line x1="578" y1="244" x2="524" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="590" y1="244" x2="512" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="578" y1="244" x2="656" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <line x1="590" y1="244" x2="668" y2="376" stroke="#1B82E8" stroke-width="2"/>
  <!-- object -->
  <rect x="528" y="300" width="112" height="16" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="584" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">test object</text>
  <!-- film -->
  <line x1="468" y1="376" x2="716" y2="376" stroke="#E8F1FB" stroke-width="4"/>
  <text x="584" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">film</text>
  <!-- penumbra narrow -->
  <rect x="512" y="370" width="12" height="12" fill="#1E9E6A"/>
  <rect x="656" y="370" width="12" height="12" fill="#1E9E6A"/>
  <text x="584" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">narrow edges = sharper image</text>

  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Specific activity = activity &#247; mass (Bq/g or Ci/g): set by neutron flux and soak time in the reactor</text>
</svg>
