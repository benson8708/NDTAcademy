  <text x="715" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">30–50 % RH</text>
  <text x="715" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">logged daily</text>
