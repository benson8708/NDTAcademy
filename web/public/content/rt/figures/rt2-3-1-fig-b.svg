  <text x="715" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">solvent vapors</text>
  <text x="715" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">no radiation</text>
