<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Location Markers Prove Coverage</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Girth weld unrolled - zero punched on the pipe, numbered clockwise looking downstream</text>

  <!-- marker tags on the part -->
  <rect x="68" y="68" width="26" height="24" fill="#0A2342"/>
  <text x="81" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">0</text>
  <rect x="232" y="68" width="26" height="24" fill="#0A2342"/>
  <text x="245" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <rect x="397" y="68" width="26" height="24" fill="#0A2342"/>
  <text x="410" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
  <rect x="562" y="68" width="26" height="24" fill="#0A2342"/>
  <text x="575" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <rect x="707" y="68" width="26" height="24" fill="#0A2342"/>
  <text x="720" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">0</text>

  <!-- weld strip -->
  <rect x="60" y="98" width="680" height="44" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="60" y1="120" x2="740" y2="120" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="8,5"/>
  <line x1="81" y1="92" x2="81" y2="98" stroke="#0A2342" stroke-width="2"/>
  <line x1="245" y1="92" x2="245" y2="98" stroke="#0A2342" stroke-width="2"/>
  <line x1="410" y1="92" x2="410" y2="98" stroke="#0A2342" stroke-width="2"/>
  <line x1="575" y1="92" x2="575" y2="98" stroke="#0A2342" stroke-width="2"/>
  <line x1="720" y1="92" x2="720" y2="98" stroke="#0A2342" stroke-width="2"/>
  <text x="752" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Weld</text>

  <!-- film A -->
  <rect x="60" y="178" width="270" height="68" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="81" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">0</text>
  <text x="245" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">1</text>
  <text x="160" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Film A</text>

  <!-- film C -->
  <rect x="520" y="178" width="220" height="68" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="575" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">3</text>
  <text x="720" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">0</text>
  <text x="640" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Film C</text>

  <!-- film B -->
  <rect x="218" y="266" width="272" height="68" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="245" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">1</text>
  <text x="410" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">2</text>
  <text x="330" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Film B</text>

  <!-- overlap proven -->
  <rect x="222" y="172" width="48" height="168" fill="none" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="62" y="368" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Marker 1 images on Films A and B - overlap proven, coverage continuous</text>

  <!-- gap unproven -->
  <rect x="490" y="172" width="30" height="168" fill="#D14343" fill-opacity="0.15" stroke="#D14343" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="494" y1="196" x2="516" y2="218" stroke="#D14343" stroke-width="4"/>
  <line x1="516" y1="196" x2="494" y2="218" stroke="#D14343" stroke-width="4"/>
  <text x="62" y="396" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Films B and C share no marker - the length between them is unproven: reshoot</text>

  <text x="62" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Rule: the same marker image must appear at the abutting ends of consecutive films.</text>
</svg>
