<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Dose Map of a Planned Shot &#8212; 50 Ci Ir-192</text>

  <!-- surveyed boundary circle (2 mR/h, ~35 m collimated) -->
  <circle cx="470" cy="255" r="150" fill="none" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="10 7"/>

  <!-- open-beam comparison arrow pointing far outside -->
  <line x1="576" y1="150" x2="700" y2="92" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="694,86 708,88 700,100" fill="#D14343"/>
  <text x="640" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Open beam: 2 mR/h</text>
  <text x="640" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">not until &#8776; 110 m</text>

  <!-- projector body with shield -->
  <rect x="448" y="243" width="36" height="24" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="456" y="248" width="20" height="14" rx="6" fill="#0A2342"/>
  <!-- collimator -->
  <polygon points="484,247 502,241 502,269 484,263" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <!-- collimated beam into backstop -->
  <polygon points="502,243 502,267 598,290 598,220" fill="#F2A33C" opacity="0.3"/>
  <line x1="502" y1="255" x2="598" y2="255" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="598" y="212" width="14" height="86" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="608" y1="298" x2="640" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="644" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Masonry backstop</text>

  <!-- device label -->
  <line x1="466" y1="241" x2="396" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="362" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Projector + collimator</text>

  <!-- drive cable curving past the block wall -->
  <path d="M 448 258 C 430 292 400 294 368 262" fill="none" stroke="#5A6B7E" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="430" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">15 m cable</text>

  <!-- block wall between crank and device -->
  <rect x="398" y="222" width="10" height="66" fill="#5A6B7E"/>
  <text x="403" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wall</text>

  <!-- radiographer at the crank -->
  <circle cx="352" cy="235" r="7" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="352" y1="242" x2="352" y2="264" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="352" y1="248" x2="340" y2="258" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="352" y1="248" x2="364" y2="252" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="352" y1="264" x2="344" y2="278" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="352" y1="264" x2="360" y2="278" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="368" cy="252" r="6" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="330" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Crank position</text>

  <!-- crank stats box -->
  <rect x="30" y="352" width="312" height="64" rx="8" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="2"/>
  <text x="46" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">At the crank: &#8776; 11 mR/h collimated</text>
  <text x="46" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8776; 0.4 mR per 2-minute shot</text>

  <!-- boundary label -->
  <text x="470" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Boundary: post where the meter reads 2 mR/h &#8212; here &#8776; 35 m</text>

  <!-- scale note -->
  <text x="788" y="404" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Plan view &#8212;</text>
  <text x="788" y="424" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">not to scale</text>
</svg>
