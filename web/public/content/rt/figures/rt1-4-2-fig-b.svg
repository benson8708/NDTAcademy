<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Line-Focus Target and Heat Path</text>

  <!-- copper anode block -->
  <rect x="430" y="90" width="120" height="150" rx="6" fill="#B87333" stroke="#E8F1FB" stroke-width="2"/>
  <text x="490" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Copper</text>
  <text x="490" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">anode</text>

  <!-- angled tungsten target face -->
  <polygon points="430,240 430,150 360,240" fill="#5A6B7E" stroke="#F2A33C" stroke-width="3"/>
  <text x="300" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">Tungsten target</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">(angled ~20 deg)</text>
  <line x1="350" y1="180" x2="395" y2="200" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- incoming electron beam (broad, hits large area) -->
  <line x1="120" y1="170" x2="392" y2="195" stroke="#1B82E8" stroke-width="3"/>
  <line x1="120" y1="210" x2="392" y2="205" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="392,193 392,207 408,200" fill="#1B82E8"/>
  <text x="160" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Electron beam</text>

  <!-- large actual heated area bracket on target face -->
  <line x1="360" y1="248" x2="430" y2="248" stroke="#D14343" stroke-width="2"/>
  <line x1="360" y1="244" x2="360" y2="252" stroke="#D14343" stroke-width="2"/>
  <line x1="430" y1="244" x2="430" y2="252" stroke="#D14343" stroke-width="2"/>
  <text x="395" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">large heated area</text>

  <!-- X-ray beam down, sees small effective focal spot -->
  <line x1="385" y1="240" x2="360" y2="400" stroke="#F2A33C" stroke-width="2"/>
  <line x1="405" y1="240" x2="430" y2="400" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="385,240 405,240 430,400 360,400" fill="#F2A33C" opacity="0.35"/>
  <!-- small effective focal spot bracket -->
  <line x1="385" y1="232" x2="405" y2="232" stroke="#1E9E6A" stroke-width="3"/>
  <text x="540" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">small effective</text>
  <text x="540" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">focal spot (sharp image)</text>
  <line x1="430" y1="350" x2="460" y2="350" stroke="#1E9E6A" stroke-width="1.5"/>

  <!-- heat arrows away through anode -->
  <line x1="500" y1="120" x2="560" y2="120" stroke="#D14343" stroke-width="3"/>
  <polygon points="560,114 576,120 560,126" fill="#D14343"/>
  <line x1="500" y1="160" x2="560" y2="160" stroke="#D14343" stroke-width="3"/>
  <polygon points="560,154 576,160 560,166" fill="#D14343"/>
  <text x="640" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D14343">heat carried</text>
  <text x="640" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D14343">away (~99%)</text>

  <!-- cooling fins -->
  <line x1="550" y1="100" x2="585" y2="100" stroke="#D9E0E8" stroke-width="4"/>
  <line x1="550" y1="115" x2="585" y2="115" stroke="#D9E0E8" stroke-width="4"/>
  <line x1="550" y1="130" x2="585" y2="130" stroke="#D9E0E8" stroke-width="4"/>
  <line x1="550" y1="145" x2="585" y2="145" stroke="#D9E0E8" stroke-width="4"/>
  <line x1="550" y1="160" x2="585" y2="160" stroke="#D9E0E8" stroke-width="4"/>

  <!-- bottom note -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Angling the target spreads heat over a large area while the beam sees a small focal spot.</text>
</svg>
