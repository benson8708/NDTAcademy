<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">What Controls Radiographic Sensitivity</text>

  <!-- top box -->
  <rect x="250" y="52" width="300" height="44" rx="8" fill="#0A2342"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">RADIOGRAPHIC SENSITIVITY</text>

  <!-- branch connectors -->
  <line x1="400" y1="96" x2="400" y2="118" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="220" y1="118" x2="580" y2="118" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="220" y1="118" x2="220" y2="148" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="580" y1="118" x2="580" y2="148" stroke="#5A6B7E" stroke-width="2"/>

  <!-- level 2 boxes -->
  <rect x="90" y="148" width="260" height="42" rx="8" fill="#1B82E8"/>
  <text x="220" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">RADIOGRAPHIC CONTRAST</text>
  <rect x="450" y="148" width="260" height="42" rx="8" fill="#5A6B7E"/>
  <text x="580" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">DEFINITION (SHARPNESS)</text>

  <!-- lesson tags -->
  <text x="66" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">this lesson</text>
  <text x="445" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">next lesson</text>

  <!-- connectors to level 3 -->
  <line x1="220" y1="190" x2="147" y2="238" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="220" y1="190" x2="333" y2="238" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="580" y1="190" x2="520" y2="238" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="580" y1="190" x2="690" y2="238" stroke="#5A6B7E" stroke-width="2"/>

  <!-- level 3 boxes -->
  <rect x="62" y="238" width="170" height="40" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="147" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">SUBJECT CONTRAST</text>
  <text x="240" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#F2A33C">&#215;</text>
  <rect x="248" y="238" width="170" height="40" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="333" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">FILM CONTRAST</text>
  <rect x="445" y="238" width="150" height="40" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="520" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">GEOMETRIC (Ug)</text>
  <rect x="615" y="238" width="150" height="40" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="690" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">GRAIN / MOTTLE</text>

  <!-- bullets -->
  <text x="66" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; thickness changes</text>
  <text x="66" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; beam energy (kV)</text>
  <text x="66" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; scatter (fog)</text>

  <text x="252" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; film class (grain)</text>
  <text x="252" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; density aim point</text>
  <text x="252" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; development</text>
  <text x="252" y="373" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; screen type</text>

  <text x="449" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; source size F</text>
  <text x="449" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; distances d and t</text>
  <text x="449" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; motion, contact</text>

  <text x="619" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; film graininess</text>
  <text x="619" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; screen mottle</text>
  <text x="619" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; beam energy</text>

  <!-- bottom notes -->
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Radiographic contrast = subject contrast &#215; film contrast</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Contrast makes a difference visible; definition keeps its edges sharp. Sensitivity needs both.</text>
</svg>
