<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Where Discontinuities Are Born</text>

  <!-- Panel 1: INHERENT -->
  <rect x="35" y="58" width="230" height="304" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="150" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">1 &#8212; INHERENT</text>
  <text x="150" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">melting and solidification</text>
  <!-- ingot icon with pipe cavity and gas bubbles -->
  <polygon points="115,128 185,128 175,182 125,182" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="143,128 157,128 152,158 148,158" fill="#5A6B7E"/>
  <circle cx="135" cy="166" r="3" fill="#5A6B7E"/>
  <circle cx="161" cy="170" r="2.5" fill="#5A6B7E"/>
  <circle cx="150" cy="172" r="2" fill="#5A6B7E"/>
  <!-- examples -->
  <text x="53" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Ingot pipe, segregation</text>
  <text x="53" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Gas porosity, blowholes</text>
  <text x="53" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Nonmetallic inclusions</text>
  <text x="53" y="288" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Shrinkage (feathery, sponge)</text>
  <text x="53" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Cold shuts, hot tears</text>

  <!-- arrow 1 to 2 -->
  <line x1="266" y1="210" x2="280" y2="210" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="280,204 290,210 280,216" fill="#0A2342"/>

  <!-- Panel 2: PROCESSING -->
  <rect x="285" y="58" width="230" height="304" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">2 &#8212; PROCESSING</text>
  <text x="400" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">forming, welding, finishing</text>
  <!-- rolling mill icon -->
  <circle cx="370" cy="143" r="16" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="430" cy="143" r="16" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="340" y="164" width="120" height="8" fill="#5A6B7E"/>
  <path d="M 388 164 Q 400 152 412 164" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <!-- examples -->
  <text x="303" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Laminations, stringers</text>
  <text x="303" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Seams, laps, bursts</text>
  <text x="303" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Weld porosity, slag, tungsten</text>
  <text x="303" y="288" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; IP, lack of fusion, cracks</text>
  <text x="303" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Quench, grinding cracks</text>

  <!-- arrow 2 to 3 -->
  <line x1="516" y1="210" x2="530" y2="210" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="530,204 540,210 530,216" fill="#0A2342"/>

  <!-- Panel 3: SERVICE -->
  <rect x="535" y="58" width="230" height="304" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="650" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">3 &#8212; SERVICE</text>
  <text x="650" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">damage in operation</text>
  <!-- pipe icon with pits and crack -->
  <rect x="590" y="138" width="120" height="28" rx="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="615" cy="152" r="2.5" fill="#0A2342"/>
  <circle cx="629" cy="158" r="2" fill="#0A2342"/>
  <circle cx="643" cy="150" r="2.5" fill="#0A2342"/>
  <polyline points="658,152 666,146 672,154 680,148 688,154" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- examples -->
  <text x="553" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Fatigue cracks</text>
  <text x="553" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Corrosion, pitting, CUI</text>
  <text x="553" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Erosion / flow thinning</text>
  <text x="553" y="288" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Creep voids (high temp)</text>
  <text x="553" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; SCC, hydrogen damage</text>

  <!-- bottom takeaway band -->
  <rect x="35" y="384" width="730" height="54" rx="8" fill="#0A2342"/>
  <text x="400" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Origin predicts shape, location, and orientation &#8212; which is what the image shows</text>
  <text x="400" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Read the part's history before you read its film</text>
</svg>
