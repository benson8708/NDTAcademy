<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">How Weld Discontinuities Print on Film</text>

  <!-- labels above the strip -->
  <text x="110" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Porosity</text>
  <text x="110" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">sharp, round, dark</text>
  <line x1="110" y1="106" x2="114" y2="216" stroke="#F2A33C" stroke-width="1.5"/>

  <text x="370" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Incomplete penetration</text>
  <text x="370" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dead-straight dark centerline</text>
  <line x1="370" y1="106" x2="370" y2="230" stroke="#F2A33C" stroke-width="1.5"/>

  <text x="625" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Tungsten inclusion</text>
  <text x="625" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">bright light spot (GTAW)</text>
  <line x1="625" y1="106" x2="600" y2="222" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- simulated film strip: plate -->
  <rect x="40" y="150" width="720" height="170" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- weld image band (reinforcement = lighter) -->
  <rect x="40" y="195" width="720" height="80" fill="#D9E0E8"/>

  <!-- 1: porosity cluster -->
  <circle cx="105" cy="225" r="5" fill="#0A2342"/>
  <circle cx="118" cy="237" r="4" fill="#0A2342"/>
  <circle cx="128" cy="219" r="3.5" fill="#0A2342"/>
  <circle cx="112" cy="248" r="3" fill="#0A2342"/>
  <circle cx="133" cy="242" r="4.5" fill="#0A2342"/>

  <!-- 2: slag along the upper bevel -->
  <polygon points="205,210 228,203 248,211 268,205 280,212 270,218 244,215 222,219" fill="#0A2342"/>

  <!-- 3: incomplete penetration on the centerline -->
  <rect x="330" y="232" width="85" height="5" fill="#0A2342"/>

  <!-- 4: fine wandering crack -->
  <polyline points="455,218 468,227 478,221 492,233 505,228 519,241 532,235 545,244" fill="none" stroke="#0A2342" stroke-width="2"/>

  <!-- 5: tungsten (bright) -->
  <circle cx="597" cy="228" r="5" fill="#FFFFFF"/>
  <circle cx="610" cy="241" r="3" fill="#FFFFFF"/>

  <!-- 6: undercut at the top toe -->
  <rect x="655" y="190" width="88" height="10" rx="4" fill="#0A2342" opacity="0.85"/>

  <!-- leader lines to lower labels -->
  <line x1="240" y1="344" x2="240" y2="221" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="500" y1="344" x2="500" y2="234" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="695" y1="344" x2="698" y2="202" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- labels below the strip -->
  <text x="240" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Slag inclusion</text>
  <text x="240" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">irregular, follows the bevel</text>

  <text x="500" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Crack</text>
  <text x="500" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">fine, dark, wandering</text>

  <text x="695" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Undercut</text>
  <text x="695" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dark band at the weld toe</text>

  <!-- footer -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Thicker metal prints lighter, voids print darker &#8212; dense tungsten is the bright exception</text>
</svg>
