<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Common Film Artifacts - Simulated Film</text>

  <!-- panel 1: crimp marks -->
  <rect x="45" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M 120 142 Q 145 112 170 142 Q 145 130 120 142 Z" fill="#0A2342"/>
  <text x="145" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dark: after exposure</text>
  <path d="M 250 142 Q 275 112 300 142 Q 275 130 250 142 Z" fill="#E8F1FB"/>
  <text x="275" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">light: before</text>
  <text x="210" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Crimp (crescent) marks from bending the film</text>

  <!-- panel 2: static discharge -->
  <rect x="425" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="470,170 510,118 535,140 575,88" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="510,118 526,98 545,104" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="535,140 560,140 588,120" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="575,88 600,96 622,84" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polyline points="610,168 648,128 668,144 700,108" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="590" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Static discharge - branched black lightning lines</text>

  <!-- panel 3: processing streaks -->
  <rect x="45" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="118" y="250" width="16" height="10" fill="#0A2342"/>
  <rect x="252" y="250" width="16" height="10" fill="#0A2342"/>
  <rect x="116" y="260" width="20" height="112" fill="#0A2342" fill-opacity="0.4"/>
  <rect x="250" y="260" width="20" height="100" fill="#0A2342" fill-opacity="0.3"/>
  <rect x="186" y="260" width="12" height="86" fill="#0A2342" fill-opacity="0.18"/>
  <text x="210" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Runback streaks trailing from hanger clips</text>

  <!-- panel 4: backscatter B -->
  <rect x="425" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="590" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#E8F1FB" fill-opacity="0.75">B</text>
  <text x="590" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Light B image - backscatter: add backing lead, reshoot</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Confirm with reflected light and the second film of a double load before interpreting.</text>
</svg>
