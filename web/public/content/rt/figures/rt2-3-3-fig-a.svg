<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Film Density Is a Log Scale</text>

  <!-- illuminator panel -->
  <rect x="50" y="80" width="700" height="160" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- patch headers -->
  <text x="155" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">D = 1.0</text>
  <text x="325" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">D = 2.0</text>
  <text x="495" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">D = 3.0</text>
  <text x="665" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">D = 4.0</text>

  <!-- film patches, light to nearly black -->
  <rect x="90" y="112" width="130" height="100" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="260" y="112" width="130" height="100" fill="#5A6B7E" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="430" y="112" width="130" height="100" fill="#33485E" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="600" y="112" width="130" height="100" fill="#16283E" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="155" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10 %</text>
  <text x="325" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">1 %</text>
  <text x="495" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">0.1 %</text>
  <text x="665" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">0.01 %</text>

  <text x="400" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">fraction of viewing light transmitted through the film on the illuminator</text>

  <!-- code window band -->
  <rect x="325" y="286" width="340" height="16" fill="#1E9E6A"/>
  <line x1="291" y1="280" x2="291" y2="308" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="283" y="276" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">X-ray min 1.8</text>
  <text x="495" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">typical gamma single-film window: 2.0 – 4.0</text>

  <!-- formula -->
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#E8F1FB">D = log₁₀ ( incident light ÷ transmitted light )</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">each whole density step = 10× less light through the film</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">composite viewing: superimposed set ≥ 2.6, each film of the set ≥ 1.3</text>
</svg>
