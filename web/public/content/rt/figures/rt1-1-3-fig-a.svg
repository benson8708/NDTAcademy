<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Element, Molecule, Compound</text>

  <!-- panel 1: element -->
  <rect x="40" y="80" width="225" height="270" rx="10" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="152" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Element</text>
  <circle cx="115" cy="200" r="34" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="115" cy="200" r="7" fill="#0A2342"/>
  <text x="115" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">He</text>
  <circle cx="200" cy="280" r="34" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="200" cy="280" r="7" fill="#0A2342"/>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">He</text>
  <text x="152" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">One kind of atom,</text>
  <text x="152" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">atoms stand alone (helium)</text>

  <!-- panel 2: molecule of an element -->
  <rect x="287" y="80" width="225" height="270" rx="10" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Molecule of an element</text>
  <line x1="365" y1="225" x2="435" y2="225" stroke="#0A2342" stroke-width="6"/>
  <circle cx="358" cy="225" r="36" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="442" cy="225" r="36" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="358" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">O</text>
  <text x="442" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">O</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Two identical atoms bonded:</text>
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">oxygen gas O₂ - still oxygen</text>

  <!-- panel 3: compound -->
  <rect x="534" y="80" width="225" height="270" rx="10" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="646" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Compound</text>
  <line x1="646" y1="235" x2="595" y2="282" stroke="#0A2342" stroke-width="6"/>
  <line x1="646" y1="235" x2="697" y2="282" stroke="#0A2342" stroke-width="6"/>
  <circle cx="646" cy="220" r="40" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="646" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">O</text>
  <circle cx="589" cy="288" r="24" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="589" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">H</text>
  <circle cx="703" cy="288" r="24" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="703" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">H</text>
  <text x="646" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Different elements bonded:</text>
  <text x="646" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">water H₂O - a new substance</text>

  <!-- bottom note -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Composition + density decide how much radiation a material absorbs</text>
</svg>
