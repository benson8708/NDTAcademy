<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Shielding: Half-Value Layers &#8212; Ir-192 in Lead</text>
  <text x="36" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Dose rate, mR/h</text>

  <!-- axes -->
  <line x1="110" y1="96" x2="110" y2="370" stroke="#0A2342" stroke-width="2"/>
  <line x1="110" y1="370" x2="690" y2="370" stroke="#0A2342" stroke-width="2"/>

  <!-- bars: each +4.8 mm of lead halves the rate -->
  <rect x="140" y="110" width="70" height="260" fill="#1B82E8"/>
  <rect x="245" y="240" width="70" height="130" fill="#1B82E8"/>
  <rect x="350" y="305" width="70" height="65" fill="#1B82E8"/>
  <rect x="455" y="338" width="70" height="32" fill="#1B82E8"/>
  <rect x="560" y="354" width="70" height="16" fill="#1B82E8"/>

  <!-- values above bars -->
  <text x="175" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">160</text>
  <text x="280" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">80</text>
  <text x="385" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">40</text>
  <text x="490" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">20</text>
  <text x="595" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">10</text>

  <!-- halving arrows -->
  <line x1="213" y1="124" x2="240" y2="226" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="234,218 242,234 228,230" fill="#F2A33C"/>
  <text x="240" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">&#247;2</text>
  <line x1="318" y1="252" x2="345" y2="294" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="339,286 347,300 333,297" fill="#F2A33C"/>
  <text x="346" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">&#247;2</text>

  <!-- x labels -->
  <text x="175" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="280" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4.8</text>
  <text x="385" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">9.6</text>
  <text x="490" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">14.4</text>
  <text x="595" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">19.2</text>
  <text x="560" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Lead thickness, mm</text>

  <!-- HVL bracket -->
  <line x1="175" y1="404" x2="280" y2="404" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="175" y1="398" x2="175" y2="410" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="280" y1="398" x2="280" y2="410" stroke="#1E9E6A" stroke-width="2"/>
  <text x="227" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">1 HVL &#8776; 4.8 mm</text>

  <!-- note box -->
  <rect x="386" y="106" width="354" height="92" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="402" y="134" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">TVL &#8776; 3.32 &#215; HVL &#8776; 16 mm &#8594; &#247;10</text>
  <text x="402" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2 TVLs (&#8776; 32 mm) &#8594; &#247;100</text>
  <text x="402" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Co-60 is harder: HVL &#8776; 12.5 mm lead</text>
</svg>
