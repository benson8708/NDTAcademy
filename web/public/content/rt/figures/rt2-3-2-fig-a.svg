<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Poor Definition: Geometry, Contact, Motion</text>

  <!-- source with size F -->
  <line x1="186" y1="70" x2="186" y2="78" stroke="#0A2342" stroke-width="2"/>
  <line x1="214" y1="70" x2="214" y2="78" stroke="#0A2342" stroke-width="2"/>
  <line x1="186" y1="74" x2="214" y2="74" stroke="#0A2342" stroke-width="2"/>
  <text x="200" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">F (source size)</text>
  <circle cx="200" cy="95" r="10" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- rays from each edge of source through object edge -->
  <line x1="190" y1="95" x2="315" y2="345" stroke="#F2A33C" stroke-width="2"/>
  <line x1="210" y1="95" x2="299" y2="345" stroke="#F2A33C" stroke-width="2"/>

  <!-- penumbra wedge on film -->
  <polygon points="260,235 315,345 299,345" fill="#F2A33C" opacity="0.45"/>

  <!-- object -->
  <rect x="120" y="235" width="140" height="40" fill="#0A2342"/>
  <text x="190" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">object</text>

  <!-- film plane -->
  <line x1="80" y1="345" x2="460" y2="345" stroke="#5A6B7E" stroke-width="6"/>
  <text x="430" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">film</text>

  <!-- dimensions -->
  <line x1="92" y1="95" x2="92" y2="235" stroke="#1B82E8" stroke-width="2"/>
  <polygon points="86,107 92,95 98,107" fill="#1B82E8"/>
  <polygon points="86,223 92,235 98,223" fill="#1B82E8"/>
  <text x="74" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1B82E8">d</text>
  <line x1="92" y1="235" x2="92" y2="345" stroke="#1E9E6A" stroke-width="2"/>
  <polygon points="86,247 92,235 98,247" fill="#1E9E6A"/>
  <polygon points="86,333 92,345 98,333" fill="#1E9E6A"/>
  <text x="74" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1E9E6A">t</text>

  <!-- Ug bracket -->
  <line x1="299" y1="354" x2="299" y2="362" stroke="#F2A33C" stroke-width="2"/>
  <line x1="315" y1="354" x2="315" y2="362" stroke="#F2A33C" stroke-width="2"/>
  <line x1="299" y1="362" x2="315" y2="362" stroke="#F2A33C" stroke-width="2"/>
  <text x="307" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Ug</text>

  <!-- formula -->
  <text x="220" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Ug = F × t ÷ d</text>
  <text x="220" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">4 mm × 25 mm ÷ 500 mm = 0.2 mm</text>

  <!-- panel: screen-film contact -->
  <rect x="520" y="70" width="250" height="140" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="645" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Poor screen-film contact</text>
  <path d="M 545 172 Q 645 126 745 172" fill="none" stroke="#5A6B7E" stroke-width="5"/>
  <rect x="545" y="178" width="200" height="8" fill="#0A2342"/>
  <line x1="645" y1="148" x2="645" y2="172" stroke="#D14343" stroke-width="2"/>
  <text x="645" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">gap</text>
  <text x="645" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">film lifts off screen → local blur</text>

  <!-- panel: motion -->
  <rect x="520" y="240" width="250" height="140" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="645" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Motion during exposure</text>
  <rect x="595" y="288" width="100" height="44" fill="#0A2342"/>
  <line x1="548" y1="310" x2="588" y2="310" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="556,304 548,310 556,316" fill="#F2A33C"/>
  <polygon points="580,304 588,310 580,316" fill="#F2A33C"/>
  <line x1="702" y1="310" x2="742" y2="310" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="710,304 702,310 710,316" fill="#F2A33C"/>
  <polygon points="734,304 742,310 734,316" fill="#F2A33C"/>
  <text x="645" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">smeared, one-direction blur</text>

  <!-- cures -->
  <text x="645" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Cures: small source, long d,</text>
  <text x="645" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">film tight to part, rigid setup</text>
</svg>
