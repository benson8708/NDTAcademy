<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Where Wrought Processes Hide Their Discontinuities</text>

  <!-- panel dividers -->
  <line x1="272" y1="56" x2="272" y2="400" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="536" y1="56" x2="536" y2="400" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ============ PANEL 1: FORGING ============ -->
  <text x="146" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">FORGING</text>
  <line x1="116" y1="78" x2="116" y2="88" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="110,86 116,96 122,86" fill="#F2A33C"/>
  <line x1="176" y1="78" x2="176" y2="88" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="170,86 176,96 182,86" fill="#F2A33C"/>
  <polygon points="76,98 216,98 201,128 91,128" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="91,304 201,304 216,334 76,334" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="96" y="132" width="100" height="166" rx="18" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- center burst -->
  <polygon points="146,200 151,210 162,208 154,217 160,228 148,222 141,232 140,220 128,219 139,212" fill="#D14343"/>
  <text x="146" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Burst (center)</text>
  <!-- lap at the surface -->
  <line x1="196" y1="170" x2="171" y2="182" stroke="#D14343" stroke-width="3"/>
  <line x1="196" y1="170" x2="186" y2="164" stroke="#D14343" stroke-width="2"/>
  <line x1="184" y1="176" x2="222" y2="152" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="228" y="148" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Lap</text>
  <text x="146" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Laps: surface, tight - MT/PT</text>
  <text x="146" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Bursts: center - UT</text>

  <!-- ============ PANEL 2: ROLLING ============ -->
  <text x="404" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">ROLLING</text>
  <circle cx="404" cy="140" r="36" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="404" cy="298" r="36" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 376 117 A 36 36 0 0 1 404 104" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="400,100 410,104 401,110" fill="#5A6B7E"/>
  <path d="M 432 321 A 36 36 0 0 1 404 334" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="408,338 398,334 407,328" fill="#5A6B7E"/>
  <rect x="296" y="196" width="216" height="46" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="514" y1="219" x2="530" y2="219" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="528,213 540,219 528,225" fill="#5A6B7E"/>
  <!-- lamination at mid-thickness -->
  <line x1="350" y1="219" x2="480" y2="219" stroke="#0A2342" stroke-width="4" stroke-dasharray="12 6"/>
  <!-- stringers -->
  <line x1="330" y1="207" x2="390" y2="207" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="420" y1="231" x2="470" y2="231" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- seam on the surface -->
  <line x1="320" y1="196" x2="356" y2="196" stroke="#D14343" stroke-width="3"/>
  <text x="338" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Seam</text>
  <text x="404" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lamination - parallel to surface</text>
  <text x="404" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Laminations: invisible to RT</text>
  <text x="404" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Find with UT; seams: MT/ET</text>

  <!-- ============ PANEL 3: EXTRUSION ============ -->
  <text x="658" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">EXTRUSION</text>
  <path d="M706,170 L556,170 L556,274 L706,274" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="3"/>
  <rect x="560" y="178" width="26" height="88" fill="#5A6B7E"/>
  <text x="573" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Ram</text>
  <line x1="538" y1="222" x2="556" y2="222" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="552,216 564,222 552,228" fill="#F2A33C"/>
  <rect x="586" y="178" width="120" height="88" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="706,170 706,196 734,206" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="706,274 706,248 734,238" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="734" y="206" width="52" height="32" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- chevrons on the product centerline -->
  <polyline points="744,212 752,222 744,232" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="758,212 766,222 758,232" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="772,212 780,222 772,232" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="744" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Chevrons</text>
  <!-- back-end defect: oxidized skin flowing inward -->
  <path d="M 596 186 C 612 200, 612 244, 596 258" fill="none" stroke="#D14343" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="606" y1="240" x2="620" y2="284" stroke="#D14343" stroke-width="1"/>
  <text x="620" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Back-end defect</text>
  <text x="658" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Chevrons: good RT target</text>
  <text x="658" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Back end: cropped off</text>

  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Working elongates inherited ingot defects and adds these process-specific flaws</text>
</svg>
