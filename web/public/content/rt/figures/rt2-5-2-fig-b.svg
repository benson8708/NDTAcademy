<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Orientation Decides What the Film Shows</text>

  <line x1="400" y1="56" x2="400" y2="418" stroke="#D9E0E8" stroke-width="2"/>

  <text x="200" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Lamination lying flat in the plate</text>
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Same flaw aligned with the beam</text>

  <!-- LEFT: source and rays -->
  <circle cx="200" cy="105" r="7" fill="#F2A33C"/>
  <text x="214" y="100" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Source</text>
  <line x1="200" y1="112" x2="97" y2="180" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="200" y1="112" x2="200" y2="180" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="200" y1="112" x2="303" y2="180" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- LEFT: plate with horizontal lamination -->
  <rect x="95" y="180" width="210" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="88" y="224" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Plate</text>
  <line x1="135" y1="220" x2="265" y2="220" stroke="#0A2342" stroke-width="2.5"/>
  <text x="200" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lamination - parallel to surface</text>

  <!-- LEFT: film and result -->
  <rect x="95" y="292" width="210" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="88" y="304" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Film</text>
  <rect x="95" y="330" width="210" height="52" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1"/>
  <text x="200" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Uniform density - no image</text>

  <!-- RIGHT: source and rays -->
  <circle cx="600" cy="105" r="7" fill="#F2A33C"/>
  <text x="614" y="100" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Source</text>
  <line x1="600" y1="112" x2="497" y2="180" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="600" y1="112" x2="600" y2="180" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="600" y1="112" x2="703" y2="180" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- RIGHT: plate with beam-aligned planar flaw -->
  <rect x="495" y="180" width="210" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="600" y1="192" x2="600" y2="248" stroke="#0A2342" stroke-width="4"/>
  <text x="600" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Planar flaw aligned with beam</text>

  <!-- RIGHT: film and result -->
  <rect x="495" y="292" width="210" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="495" y="330" width="210" height="52" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="600" y1="334" x2="600" y2="378" stroke="#0A2342" stroke-width="5"/>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Sharp dark line</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">RT records only changes in metal path length along the beam</text>
</svg>
