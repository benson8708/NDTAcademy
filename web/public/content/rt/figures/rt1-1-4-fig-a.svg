<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Electron Shells and Nuclide Notation</text>

  <!-- left: concentric shells -->
  <circle cx="220" cy="255" r="160" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <circle cx="220" cy="255" r="122" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="220" cy="255" r="84" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="220" cy="255" r="46" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="220" cy="255" r="16" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- shell labels along a radius -->
  <text x="220" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">K: 2</text>
  <text x="220" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">L: 8</text>
  <text x="220" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">M: 18</text>
  <text x="220" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">N: 32</text>

  <!-- nucleus label -->
  <line x1="232" y1="266" x2="300" y2="356" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="306" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Nucleus</text>
  <text x="306" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Z protons + N neutrons</text>

  <!-- capacity rule -->
  <rect x="80" y="416" width="280" height="0" fill="none"/>
  <text x="220" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Shell capacity = 2n² electrons</text>

  <!-- right: notation box -->
  <rect x="460" y="92" width="300" height="240" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="610" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Nuclide notation</text>

  <!-- big symbol: 60 over 27 Co -->
  <text x="588" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#D14343">60</text>
  <text x="588" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1B82E8">27</text>
  <text x="600" y="228" text-anchor="start" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#0A2342">Co</text>

  <!-- leaders -->
  <line x1="578" y1="182" x2="540" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="578" y1="250" x2="540" y2="266" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="610" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">A = mass number = protons + neutrons = 60</text>
  <text x="610" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Z = atomic number = protons = 27</text>

  <text x="610" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Neutrons N = A − Z = 60 − 27 = 33</text>

  <!-- footnote -->
  <text x="610" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Atomic weight = natural average of isotopes</text>
  <text x="610" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(chlorine ≈ 35.45, not a whole number)</text>
</svg>
