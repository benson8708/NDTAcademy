<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pipe Weld Exposure Techniques (cross-section)</text>

  <!-- ===== Panel 1: Single-wall ===== -->
  <circle cx="150" cy="230" r="85" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="150" cy="230" r="62" fill="#FFFFFF" stroke="#0A2342" stroke-width="3"/>
  <!-- source at center -->
  <circle cx="150" cy="230" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <!-- radiating rays crossing ONE wall -->
  <line x1="150" y1="230" x2="150" y2="118" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="230" x2="248" y2="175" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="230" x2="248" y2="285" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="230" x2="150" y2="342" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="230" x2="52" y2="285" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="230" x2="52" y2="175" stroke="#F2A33C" stroke-width="2"/>
  <!-- film wrapped outside -->
  <circle cx="150" cy="230" r="97" fill="none" stroke="#1B82E8" stroke-width="6" stroke-dasharray="40,7"/>
  <text x="150" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1. Single-wall</text>
  <text x="150" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Source inside, film outside:</text>
  <text x="150" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">beam crosses one wall</text>
  <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Film belt</text>

  <!-- ===== Panel 2: DWSI ===== -->
  <circle cx="405" cy="250" r="75" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="405" cy="250" r="54" fill="#FFFFFF" stroke="#0A2342" stroke-width="3"/>
  <!-- source outside, offset -->
  <circle cx="380" cy="115" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="358" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Source (offset)</text>
  <!-- beam through both walls -->
  <line x1="380" y1="115" x2="372" y2="332" stroke="#F2A33C" stroke-width="2"/>
  <line x1="380" y1="115" x2="438" y2="328" stroke="#F2A33C" stroke-width="2"/>
  <!-- film against bottom -->
  <path d="M 350 336 A 80 80 0 0 0 460 336" fill="none" stroke="#1B82E8" stroke-width="7"/>
  <text x="488" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Film</text>
  <!-- read arrow -->
  <line x1="405" y1="305" x2="405" y2="322" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="399,322 411,322 405,333" fill="#1E9E6A"/>
  <text x="405" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2. DWSI</text>
  <text x="405" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Read film-side wall only;</text>
  <text x="405" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">&#8805; 3 shots at 120&#176;</text>

  <!-- ===== Panel 3: DWDI ===== -->
  <circle cx="650" cy="265" r="48" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="650" cy="265" r="32" fill="#FFFFFF" stroke="#0A2342" stroke-width="3"/>
  <!-- source far above -->
  <circle cx="650" cy="100" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="650" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Source</text>
  <line x1="650" y1="100" x2="622" y2="330" stroke="#F2A33C" stroke-width="2"/>
  <line x1="650" y1="100" x2="678" y2="330" stroke="#F2A33C" stroke-width="2"/>
  <!-- flat film below -->
  <rect x="595" y="332" width="110" height="9" fill="#1B82E8"/>
  <text x="722" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Film</text>
  <!-- both walls marked -->
  <circle cx="650" cy="222" r="5" fill="#1E9E6A"/>
  <circle cx="650" cy="308" r="5" fill="#1E9E6A"/>
  <text x="712" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">both walls</text>
  <text x="712" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">imaged</text>
  <text x="650" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3. DWDI</text>
  <text x="650" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Small bore &#8804; 3.5 in. OD:</text>
  <text x="650" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">ellipse or superimposed</text>
</svg>
