<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Geometric Unsharpness: Ug = F · t / d</text>

  <!-- source bar -->
  <rect x="350" y="74" width="100" height="12" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="465" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Source (size F)</text>
  <line x1="350" y1="100" x2="450" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="350,100 358,96 358,104" fill="#5A6B7E"/>
  <polygon points="450,100 442,96 442,104" fill="#5A6B7E"/>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">F</text>

  <!-- rays from source ends through the part's left edge -->
  <line x1="350" y1="86" x2="258.75" y2="372" stroke="#1B82E8" stroke-width="2"/>
  <line x1="450" y1="86" x2="176.25" y2="372" stroke="#1B82E8" stroke-width="2"/>

  <!-- edge point marker -->
  <circle cx="300" cy="240" r="5" fill="#D14343"/>
  <text x="288" y="228" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">edge of interest</text>

  <!-- part -->
  <rect x="300" y="240" width="200" height="60" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Part</text>

  <!-- film -->
  <rect x="160" y="372" width="460" height="14" fill="#0A2342"/>
  <text x="150" y="384" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Film</text>

  <!-- penumbra band on film -->
  <rect x="176.25" y="372" width="82.5" height="14" fill="#F2A33C"/>
  <line x1="176.25" y1="366" x2="176.25" y2="358" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="258.75" y1="366" x2="258.75" y2="358" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="176.25" y1="362" x2="258.75" y2="362" stroke="#0A2342" stroke-width="1.5"/>
  <text x="217" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Ug (penumbra)</text>

  <!-- dimension guides -->
  <line x1="455" y1="80" x2="660" y2="80" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="505" y1="240" x2="660" y2="240" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="625" y1="372" x2="660" y2="372" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="650" y1="86" x2="650" y2="234" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="650,86 646,94 654,94" fill="#5A6B7E"/>
  <polygon points="650,234 646,226 654,226" fill="#5A6B7E"/>
  <line x1="650" y1="246" x2="650" y2="366" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="650,246 646,254 654,254" fill="#5A6B7E"/>
  <polygon points="650,366 646,358 654,358" fill="#5A6B7E"/>
  <text x="664" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">d</text>
  <text x="664" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">source → part</text>
  <text x="664" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(source side)</text>
  <text x="664" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">t</text>
  <text x="664" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">part (source side)</text>
  <text x="664" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">→ film</text>

  <!-- sharper-image levers -->
  <text x="40" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Sharper image:</text>
  <text x="40" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">smaller F, longer d,</text>
  <text x="40" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">smaller t (film contact)</text>

  <!-- worked example -->
  <rect x="40" y="404" width="520" height="38" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="52" y="429" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Example: F = 0.15 in · t = 1.5 in · d = 24 in → Ug = 0.15 × 1.5 / 24 ≈ 0.009 in</text>
</svg>
