<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Document Stack: Who Governs What</text>

  <!-- bar 1: contract + code -->
  <rect x="150" y="62" width="500" height="62" rx="6" fill="#0A2342"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">CONTRACT + GOVERNING CODE</text>
  <text x="400" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">When RT is required · acceptance criteria</text>

  <!-- bar 2: standards -->
  <rect x="150" y="136" width="500" height="62" rx="6" fill="#1B82E8"/>
  <text x="400" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">REFERENCED STANDARDS (ASTM)</text>
  <text x="400" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">E94 · E1025 / E747 IQIs · E1815 film · reference radiographs</text>

  <!-- bar 3: employer procedure -->
  <rect x="150" y="210" width="500" height="62" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">EMPLOYER WRITTEN PRACTICE + RT PROCEDURE</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Qualified, Level III approved · essential variables</text>

  <!-- bar 4: technique sheet -->
  <rect x="150" y="284" width="500" height="62" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">TECHNIQUE SHEET / SHOT PLAN</text>
  <text x="400" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">This part, this source, this geometry, this film</text>

  <!-- bar 5: record -->
  <rect x="150" y="358" width="500" height="62" rx="6" fill="#F2A33C"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">RADIOGRAPHS + REPORT</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">The objective record — proves all of the above</text>

  <!-- left arrow: requirements flow down -->
  <line x1="105" y1="80" x2="105" y2="390" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="99,390 105,404 111,390" fill="#5A6B7E"/>
  <text x="84" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E" transform="rotate(-90 84 240)">requirements flow down</text>

  <!-- right arrow: compliance flows up -->
  <line x1="695" y1="404" x2="695" y2="94" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="689,94 695,80 701,94" fill="#1E9E6A"/>
  <text x="718" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A" transform="rotate(90 718 240)">compliance flows up</text>
</svg>
