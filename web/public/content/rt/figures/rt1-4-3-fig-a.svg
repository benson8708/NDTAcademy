<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">High-Energy Source Principles Compared</text>

  <!-- dividing lines -->
  <line x1="400" y1="52" x2="400" y2="430" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="40" y1="240" x2="760" y2="240" stroke="#D9E0E8" stroke-width="2"/>

  <!-- Q1: Resonance transformer -->
  <text x="220" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Resonance Transformer</text>
  <rect x="120" y="95" width="60" height="100" fill="#5A6B7E"/>
  <rect x="200" y="95" width="60" height="100" fill="#5A6B7E"/>
  <path d="M 150 110 q 40 -10 0 20 q -40 30 0 20 q 40 -10 0 20" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 230 105 q 30 -8 0 16 q -30 24 0 16 q 30 -8 0 16 q -30 24 0 16" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="290" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">~1-2</text>
  <text x="290" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">MeV</text>
  <text x="220" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Tuned coil resonates at line freq.</text>

  <!-- Q2: Van de Graaff -->
  <text x="580" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Van de Graaff</text>
  <ellipse cx="560" cy="110" rx="46" ry="22" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="560" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">+ dome</text>
  <!-- belt -->
  <line x1="545" y1="130" x2="545" y2="195" stroke="#5A6B7E" stroke-width="4"/>
  <line x1="575" y1="130" x2="575" y2="195" stroke="#5A6B7E" stroke-width="4"/>
  <circle cx="552" cy="140" r="3" fill="#F2A33C"/>
  <circle cx="552" cy="160" r="3" fill="#F2A33C"/>
  <circle cx="552" cy="180" r="3" fill="#F2A33C"/>
  <polygon points="540,150 540,140 530,145" fill="#F2A33C"/>
  <text x="620" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">~2 MeV</text>
  <text x="580" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Belt carries charge to dome (steady DC).</text>

  <!-- Q3: Linear accelerator -->
  <text x="220" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Linear Accelerator</text>
  <rect x="90" y="300" width="240" height="36" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- accelerating cells -->
  <line x1="130" y1="300" x2="130" y2="336" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="170" y1="300" x2="170" y2="336" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="210" y1="300" x2="210" y2="336" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="250" y1="300" x2="250" y2="336" stroke="#5A6B7E" stroke-width="2"/>
  <!-- electron riding wave -->
  <path d="M 95 318 q 20 -12 40 0 q 20 12 40 0 q 20 -12 40 0 q 20 12 40 0" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="300" cy="318" r="5" fill="#F2A33C"/>
  <polygon points="330,310 360,318 330,326" fill="#F2A33C"/>
  <text x="350" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">target</text>
  <text x="220" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Microwaves push electrons; high output.</text>
  <text x="220" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">Several-many MeV - fast.</text>

  <!-- Q4: Betatron -->
  <text x="580" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Betatron</text>
  <circle cx="560" cy="330" r="44" fill="none" stroke="#5A6B7E" stroke-width="10"/>
  <circle cx="560" cy="330" r="44" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 6"/>
  <circle cx="604" cy="330" r="5" fill="#F2A33C"/>
  <text x="560" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">B field</text>
  <polygon points="595,300 612,308 600,316" fill="#1B82E8"/>
  <text x="660" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">target</text>
  <text x="580" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Magnetic field spins electrons in a circle.</text>
  <text x="580" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">Small focal spot - sharp, lower output.</text>
</svg>
