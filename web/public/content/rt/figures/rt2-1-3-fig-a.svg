<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Characteristic Curve: Where Film Contrast Lives</text>

  <!-- working density window band (D 2.0 - 4.0) -->
  <rect x="120" y="100" width="580" height="140" fill="#1E9E6A" opacity="0.10"/>
  <line x1="120" y1="240" x2="700" y2="240" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="7 5"/>
  <line x1="120" y1="100" x2="700" y2="100" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="688" y="94" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Working window (gamma): D 2.0–4.0</text>

  <!-- axes -->
  <line x1="120" y1="380" x2="700" y2="380" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="120" y1="380" x2="120" y2="70" stroke="#0A2342" stroke-width="2.5"/>
  <text x="108" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="108" y="315" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="108" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="108" y="175" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="108" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4</text>
  <text x="120" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="313" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="507" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="700" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="410" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Log relative exposure</text>
  <text x="126" y="62" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Film density D</text>

  <!-- characteristic curve -->
  <path d="M 120 362 L 205 360 Q 245 356 270 322 L 560 128 Q 610 92 690 85" fill="none" stroke="#1B82E8" stroke-width="3.5"/>

  <!-- region labels -->
  <line x1="160" y1="354" x2="160" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="160" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Base + fog</text>
  <line x1="276" y1="330" x2="300" y2="348" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="306" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Toe</text>
  <line x1="368" y1="192" x2="400" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="340" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Straight-line region</text>
  <line x1="640" y1="120" x2="646" y2="96" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="640" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Shoulder</text>

  <!-- gradient triangle, low density -->
  <line x1="309" y1="296" x2="369" y2="296" stroke="#D14343" stroke-width="2"/>
  <line x1="369" y1="296" x2="369" y2="255.8" stroke="#D14343" stroke-width="2"/>
  <text x="378" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">low gradient =</text>
  <text x="378" y="308" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">flat contrast</text>

  <!-- gradient triangle, high density -->
  <line x1="497" y1="170" x2="557" y2="170" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="557" y1="170" x2="557" y2="130" stroke="#1E9E6A" stroke-width="2"/>
  <text x="568" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">high gradient =</text>
  <text x="568" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">strong contrast</text>
</svg>
