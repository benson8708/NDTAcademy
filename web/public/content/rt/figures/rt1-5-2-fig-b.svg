<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Gamma Exposure Device (Projector) &#8212; Cutaway</text>

  <!-- outer steel shell -->
  <rect x="250" y="190" width="310" height="140" rx="24" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="3"/>
  <!-- depleted-uranium shield -->
  <rect x="288" y="206" width="234" height="108" rx="40" fill="#0A2342"/>

  <!-- S-tube (casing + bore) -->
  <path d="M 250 295 C 330 295 330 235 405 235 C 480 235 480 295 560 295" fill="none" stroke="#5A6B7E" stroke-width="16"/>
  <path d="M 250 295 C 330 295 330 235 405 235 C 480 235 480 295 560 295" fill="none" stroke="#E8F1FB" stroke-width="9"/>

  <!-- pigtail + connector + capsule -->
  <line x1="398" y1="235" x2="368" y2="241" stroke="#F2A33C" stroke-width="5"/>
  <circle cx="361" cy="243" r="6" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="398" y="228" width="16" height="13" rx="3" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>

  <!-- drive cable and crank -->
  <line x1="250" y1="295" x2="95" y2="295" stroke="#5A6B7E" stroke-width="4"/>
  <circle cx="75" cy="295" r="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="75" y1="295" x2="91" y2="279" stroke="#0A2342" stroke-width="3"/>
  <circle cx="75" cy="295" r="3" fill="#0A2342"/>

  <!-- guide tube and collimator -->
  <line x1="560" y1="295" x2="688" y2="295" stroke="#5A6B7E" stroke-width="13"/>
  <line x1="560" y1="295" x2="688" y2="295" stroke="#E8F1FB" stroke-width="6"/>
  <line x1="560" y1="295" x2="688" y2="295" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="6 6"/>
  <polygon points="688,272 740,262 740,328 688,318" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <polygon points="740,278 798,252 798,338 740,312" fill="#F2A33C" opacity="0.3"/>
  <line x1="740" y1="295" x2="796" y2="295" stroke="#F2A33C" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="766" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Beam</text>

  <!-- lock on top -->
  <path d="M 394 162 C 394 146 410 146 410 162" fill="none" stroke="#0A2342" stroke-width="3"/>
  <rect x="388" y="162" width="28" height="22" rx="4" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="398" y="184" width="8" height="8" fill="#0A2342"/>

  <!-- leader lines -->
  <line x1="386" y1="170" x2="372" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="495" y1="208" x2="572" y2="164" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="536" y1="196" x2="610" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="330" y1="262" x2="232" y2="212" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="75" y1="313" x2="60" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="358" y1="248" x2="266" y2="362" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="410" y1="243" x2="505" y2="358" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- labels -->
  <text x="210" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Lock &amp; key &#8212; engaged except when cranking</text>
  <text x="576" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Depleted-uranium shield</text>
  <text x="616" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Steel shell</text>
  <text x="40" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">S-tube through the shield</text>
  <text x="108" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Drive cable</text>
  <text x="28" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crank &#8212; work at full cable length</text>
  <text x="252" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Pigtail + connector</text>
  <text x="520" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Source capsule (stored)</text>
  <text x="624" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Guide tube</text>
  <text x="705" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Collimator</text>
  <text x="705" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">at exposure point</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Indicators and crank feel are aids &#8212; only the survey meter proves the source is shielded</text>
</svg>
