<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">X-rays and Gamma Rays on the Electromagnetic Spectrum</text>

  <!-- spectrum band -->
  <rect x="70" y="120" width="95" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="165" y="120" width="95" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="260" y="120" width="95" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="355" y="120" width="60" height="70" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="415" y="120" width="85" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="500" y="120" width="230" height="70" fill="#1B82E8" stroke="#0A2342" stroke-width="2.5"/>

  <text x="117" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Radio</text>
  <text x="212" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Microwave</text>
  <text x="307" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Infrared</text>
  <text x="385" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Visible</text>
  <text x="385" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">light</text>
  <text x="457" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Ultraviolet</text>
  <text x="615" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">X-rays and gamma rays</text>
  <text x="615" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">the radiographer's photons</text>

  <!-- energy arrow -->
  <line x1="70" y1="228" x2="710" y2="228" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="708,219 730,228 708,237" fill="#1B82E8"/>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Increasing photon energy and frequency &#8594;</text>

  <!-- wavelength arrow -->
  <line x1="730" y1="86" x2="90" y2="86" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="92,79 70,86 92,93" fill="#5A6B7E"/>
  <text x="400" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">&#8592; Increasing wavelength</text>

  <!-- origin callouts -->
  <line x1="560" y1="190" x2="500" y2="296" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="380" y="296" width="190" height="64" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="475" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">X-ray</text>
  <text x="475" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">born OUTSIDE the nucleus</text>
  <text x="475" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">(electrons striking a target)</text>

  <line x1="660" y1="190" x2="690" y2="296" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="596" y="296" width="190" height="64" rx="10" fill="#E8F1FB" stroke="#D14343" stroke-width="2"/>
  <text x="691" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Gamma ray</text>
  <text x="691" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">born INSIDE the nucleus</text>
  <text x="691" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">(unstable nucleus settling)</text>

  <!-- equal energy note -->
  <rect x="70" y="296" width="280" height="64" rx="10" fill="#0A2342"/>
  <text x="210" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">Same energy = identical photon</text>
  <text x="210" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">no mass, no charge, light speed</text>

  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Only the short-wavelength photons carry enough energy to ionize atoms and penetrate steel -</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">visible light and radio waves are the same physics at energies far too low to radiograph anything.</text>
</svg>
