<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Simulated Weld Radiograph: The Image Catalog</text>

  <!-- film -->
  <rect x="40" y="80" width="720" height="240" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>

  <!-- weld band (reinforcement images lighter) -->
  <rect x="40" y="168" width="720" height="64" fill="#6E8095"/>
  <polyline points="40,168 120,166 200,169 280,167 360,169 440,167 520,169 600,167 680,169 760,168" fill="none" stroke="#7E90A4" stroke-width="2"/>
  <polyline points="40,232 120,234 200,231 280,233 360,231 440,233 520,231 600,233 680,231 760,232" fill="none" stroke="#7E90A4" stroke-width="2"/>

  <!-- lead location markers -->
  <text x="66" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#243240">1</text>
  <text x="730" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#243240">2</text>

  <!-- porosity cluster + piping tail -->
  <circle cx="95" cy="192" r="4" fill="#233140"/>
  <circle cx="108" cy="185" r="3" fill="#233140"/>
  <circle cx="120" cy="196" r="4.5" fill="#233140"/>
  <circle cx="100" cy="208" r="3.5" fill="#233140"/>
  <circle cx="114" cy="206" r="3" fill="#233140"/>
  <circle cx="126" cy="212" r="3.5" fill="#233140"/>
  <circle cx="89" cy="203" r="2.5" fill="#233140"/>
  <circle cx="158" cy="194" r="4.5" fill="#233140"/>
  <path d="M162,197 L176,206" stroke="#233140" stroke-width="2.5"/>

  <!-- slag: irregular elongated, off the band edge -->
  <path d="M215,178 L230,170 L247,176 L263,169 L281,176 L292,172 L294,179 L278,185 L260,178 L243,184 L228,179 L216,184 Z" fill="#233140"/>

  <!-- incomplete penetration: straight, hard-edged, on centerline -->
  <rect x="330" y="197" width="90" height="6" fill="#1C2937"/>

  <!-- lack of fusion: straight, offset toward band edge -->
  <line x1="455" y1="182" x2="532" y2="172" stroke="#1C2937" stroke-width="3"/>

  <!-- crack: fine, wandering, fading tails -->
  <path d="M555,210 Q565,200 572,208 T590,204 T605,212 T620,206" fill="none" stroke="#1C2937" stroke-width="1.6"/>
  <line x1="548" y1="212" x2="555" y2="210" stroke="#1C2937" stroke-width="0.8"/>
  <line x1="620" y1="206" x2="627" y2="204" stroke="#1C2937" stroke-width="0.8"/>

  <!-- tungsten inclusion: light speck -->
  <path d="M660,190 L670,188 L673,196 L666,202 L658,198 Z" fill="#DCE6F0"/>

  <!-- toe undercut: fuzzy dark band at lower toe -->
  <path d="M695,233 Q705,239 715,234 Q725,240 735,234" fill="none" stroke="#233140" stroke-width="8" opacity="0.4"/>
  <path d="M695,233 Q705,239 715,234 Q725,240 735,234" fill="none" stroke="#233140" stroke-width="4" opacity="0.8"/>

  <!-- wire IQI image -->
  <rect x="58" y="262" width="70" height="44" fill="#6E8095" stroke="#2A3947" stroke-width="1.5"/>
  <line x1="68" y1="268" x2="68" y2="300" stroke="#2A3947" stroke-width="2.5"/>
  <line x1="82" y1="268" x2="82" y2="300" stroke="#2A3947" stroke-width="2"/>
  <line x1="96" y1="268" x2="96" y2="300" stroke="#2A3947" stroke-width="1.5"/>
  <line x1="110" y1="268" x2="110" y2="300" stroke="#2A3947" stroke-width="1"/>

  <!-- labels: row 1 -->
  <text x="150" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Porosity + piping tail</text>
  <line x1="168" y1="208" x2="152" y2="338" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="375" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP: straight, on centerline</text>
  <line x1="375" y1="206" x2="375" y2="338" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="588" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Crack: fine, wandering</text>
  <line x1="588" y1="214" x2="588" y2="338" stroke="#D9E0E8" stroke-width="1.2"/>

  <!-- labels: row 2 -->
  <text x="250" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Slag: irregular, along bevel</text>
  <line x1="252" y1="186" x2="248" y2="366" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="490" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">LOF: off centerline</text>
  <line x1="492" y1="178" x2="490" y2="366" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="665" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Tungsten: light</text>
  <line x1="668" y1="204" x2="680" y2="366" stroke="#D9E0E8" stroke-width="1.2"/>

  <!-- labels: row 3 -->
  <text x="75" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Wire IQI</text>
  <line x1="60" y1="308" x2="58" y2="394" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="700" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Toe undercut</text>
  <line x1="730" y1="242" x2="728" y2="394" stroke="#D9E0E8" stroke-width="1.2"/>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9FB3C8">Dark = less metal in the beam path · Light = more or denser metal</text>
</svg>
