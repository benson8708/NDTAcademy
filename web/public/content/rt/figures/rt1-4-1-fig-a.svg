<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Doubly Encapsulated Sealed Source Assembly</text>

  <!-- outer capsule -->
  <rect x="130" y="170" width="300" height="110" rx="22" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <!-- inner capsule -->
  <rect x="160" y="192" width="200" height="66" rx="14" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>

  <!-- active pellet / stacked discs -->
  <rect x="190" y="206" width="120" height="38" rx="6" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="210" y1="206" x2="210" y2="244" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="230" y1="206" x2="230" y2="244" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="250" y1="206" x2="250" y2="244" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="270" y1="206" x2="270" y2="244" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="290" y1="206" x2="290" y2="244" stroke="#0A2342" stroke-width="1.5"/>

  <!-- weld seals on outer capsule -->
  <circle cx="148" cy="225" r="6" fill="#D14343"/>
  <circle cx="412" cy="225" r="6" fill="#D14343"/>

  <!-- connector to cable -->
  <rect x="430" y="208" width="40" height="34" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- flexible drive cable (pigtail) -->
  <path d="M 470 225 q 30 -25 60 0 q 30 25 60 0 q 30 -25 60 0" fill="none" stroke="#0A2342" stroke-width="6"/>

  <!-- leader lines -->
  <line x1="250" y1="206" x2="250" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="190" y1="200" x2="120" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="360" y1="200" x2="430" y2="140" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="412" y1="231" x2="430" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="450" y1="242" x2="450" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="560" y1="218" x2="560" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- labels -->
  <text x="250" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Active pellet (stacked discs)</text>
  <text x="105" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Inner capsule</text>
  <text x="455" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Outer capsule</text>
  <text x="408" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Welded seal</text>
  <text x="450" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Connector</text>
  <text x="560" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Drive cable (pigtail)</text>

  <!-- note -->
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Two independent welded stainless walls keep the radioactive material sealed in.</text>
</svg>
