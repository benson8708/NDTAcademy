<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Manual Film Processing Sequence</text>

  <!-- five tanks -->
  <rect x="50" y="120" width="120" height="150" rx="6" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <rect x="200" y="120" width="100" height="150" rx="6" fill="#F2A33C" stroke="#E8F1FB" stroke-width="3"/>
  <rect x="330" y="120" width="120" height="150" rx="6" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="3"/>
  <rect x="480" y="120" width="120" height="150" rx="6" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="3"/>
  <rect x="630" y="120" width="120" height="150" rx="6" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="3"/>

  <!-- step numbers -->
  <circle cx="110" cy="100" r="16" fill="#E8F1FB"/>
  <text x="110" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1</text>
  <circle cx="250" cy="100" r="16" fill="#E8F1FB"/>
  <text x="250" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">2</text>
  <circle cx="390" cy="100" r="16" fill="#E8F1FB"/>
  <text x="390" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">3</text>
  <circle cx="540" cy="100" r="16" fill="#E8F1FB"/>
  <text x="540" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">4</text>
  <circle cx="690" cy="100" r="16" fill="#E8F1FB"/>
  <text x="690" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">5</text>

  <!-- tank labels inside -->
  <text x="110" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">DEVELOP</text>
  <text x="250" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">STOP</text>
  <text x="390" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">FIX</text>
  <text x="540" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">WASH</text>
  <text x="690" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">DRY</text>

  <!-- arrows between tanks -->
  <line x1="170" y1="195" x2="196" y2="195" stroke="#E8F1FB" stroke-width="4"/>
  <polygon points="196,188 210,195 196,202" fill="#E8F1FB"/>
  <line x1="300" y1="195" x2="316" y2="195" stroke="#E8F1FB" stroke-width="4"/>
  <polygon points="316,188 330,195 316,202" fill="#E8F1FB"/>
  <line x1="450" y1="195" x2="466" y2="195" stroke="#E8F1FB" stroke-width="4"/>
  <polygon points="466,188 480,195 466,202" fill="#E8F1FB"/>
  <line x1="600" y1="195" x2="616" y2="195" stroke="#E8F1FB" stroke-width="4"/>
  <polygon points="616,188 630,195 616,202" fill="#E8F1FB"/>

  <!-- time/condition labels under tanks -->
  <text x="110" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">&#8776; 5 min @ 68 &#176;F</text>
  <text x="110" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">time&#8211;temperature chart,</text>
  <text x="110" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">agitate each minute</text>

  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">30&#8211;60 s</text>
  <text x="250" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">dilute acetic acid</text>
  <text x="250" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">or water rinse</text>

  <text x="390" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">2&#215; clearing time</text>
  <text x="390" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">&#8776; 5&#8211;10 min; dissolves</text>
  <text x="390" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">unexposed halide, hardens</text>

  <text x="540" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">20&#8211;30 min</text>
  <text x="540" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">running water removes</text>
  <text x="540" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">residual fixer</text>

  <text x="690" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Dust-free cabinet</text>
  <text x="690" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">after wetting-agent</text>
  <text x="690" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">dip, moderate heat</text>

  <!-- film hanger in developer -->
  <line x1="110" y1="120" x2="110" y2="140" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="90" y="140" width="40" height="55" fill="#E8F1FB" opacity="0.35" stroke="#E8F1FB" stroke-width="2"/>

  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#F2A33C">Latent image &#8594; visible silver image &#8594; archival, spot-free radiograph</text>
</svg>
