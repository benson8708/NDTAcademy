<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Ir-192 Decay: Linear Plot vs. Semilog Plot</text>

  <!-- ====== LEFT: linear axes ====== -->
  <text x="225" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Linear scale: a curve</text>
  <line x1="80" y1="350" x2="380" y2="350" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="80" y1="350" x2="80" y2="90" stroke="#0A2342" stroke-width="2.5"/>
  <!-- y ticks (linear) -->
  <line x1="74" y1="100" x2="80" y2="100" stroke="#0A2342" stroke-width="2"/>
  <line x1="74" y1="225" x2="80" y2="225" stroke="#0A2342" stroke-width="2"/>
  <line x1="74" y1="287" x2="80" y2="287" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">100</text>
  <text x="68" y="230" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">50</text>
  <text x="68" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">25</text>
  <!-- x ticks at half-lives -->
  <line x1="152" y1="350" x2="152" y2="356" stroke="#0A2342" stroke-width="2"/>
  <line x1="225" y1="350" x2="225" y2="356" stroke="#0A2342" stroke-width="2"/>
  <line x1="297" y1="350" x2="297" y2="356" stroke="#0A2342" stroke-width="2"/>
  <text x="80" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0</text>
  <text x="152" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">74</text>
  <text x="225" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">148</text>
  <text x="297" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">222</text>
  <text x="230" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Days since assay</text>
  <text x="46" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342" transform="rotate(-90 46 220)">Activity (Ci)</text>
  <!-- halving guides -->
  <line x1="80" y1="225" x2="152" y2="225" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="152" y1="225" x2="152" y2="350" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="80" y1="287" x2="225" y2="287" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5 4"/>
  <line x1="225" y1="287" x2="225" y2="350" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5 4"/>
  <!-- exponential curve through halving points -->
  <path d="M 80 100 C 110 158 130 196 152 225 C 180 261 200 276 225 287 C 252 299 272 309 297 318 C 325 328 352 333 380 336"
        fill="none" stroke="#1B82E8" stroke-width="4"/>
  <circle cx="80" cy="100" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="152" cy="225" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="225" cy="287" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="297" cy="318" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="252" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">half remains each</text>
  <text x="252" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">74-day half-life</text>

  <!-- ====== RIGHT: semilog axes ====== -->
  <text x="595" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Log activity scale: a straight line</text>
  <line x1="470" y1="350" x2="760" y2="350" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="470" y1="350" x2="470" y2="90" stroke="#0A2342" stroke-width="2.5"/>
  <!-- log ticks: equal spacing per halving -->
  <line x1="464" y1="100" x2="470" y2="100" stroke="#0A2342" stroke-width="2"/>
  <line x1="464" y1="157" x2="470" y2="157" stroke="#0A2342" stroke-width="2"/>
  <line x1="464" y1="214" x2="470" y2="214" stroke="#0A2342" stroke-width="2"/>
  <line x1="464" y1="271" x2="470" y2="271" stroke="#0A2342" stroke-width="2"/>
  <line x1="464" y1="328" x2="470" y2="328" stroke="#0A2342" stroke-width="2"/>
  <text x="458" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">100</text>
  <text x="458" y="162" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">50</text>
  <text x="458" y="219" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">25</text>
  <text x="458" y="276" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">12.5</text>
  <text x="458" y="333" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">6.25</text>
  <!-- x ticks -->
  <line x1="542" y1="350" x2="542" y2="356" stroke="#0A2342" stroke-width="2"/>
  <line x1="614" y1="350" x2="614" y2="356" stroke="#0A2342" stroke-width="2"/>
  <line x1="686" y1="350" x2="686" y2="356" stroke="#0A2342" stroke-width="2"/>
  <text x="470" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0</text>
  <text x="542" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">74</text>
  <text x="614" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">148</text>
  <text x="686" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">222</text>
  <text x="615" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Days since assay</text>
  <text x="436" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342" transform="rotate(-90 436 220)">Activity (Ci, log scale)</text>
  <!-- straight decay line -->
  <line x1="470" y1="100" x2="758" y2="328" stroke="#1E9E6A" stroke-width="4"/>
  <circle cx="470" cy="100" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="542" cy="157" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="614" cy="214" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="686" cy="271" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="660" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">field decay charts use</text>
  <text x="660" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">this form: draw two</text>
  <text x="660" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">points, read any date</text>

  <!-- bottom note -->
  <rect x="120" y="412" width="560" height="30" rx="8" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Same data both sides: A = A&#8320; &#215; (&#189;)^(t / 74 d). Assay = 100 Ci.</text>
</svg>
