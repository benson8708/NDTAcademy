<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Sand Mold in Cross-Section: Six Discontinuity Origins</text>

  <!-- flask filled with sand -->
  <rect x="90" y="70" width="450" height="310" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="90" y1="225" x2="540" y2="225" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="104" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">COPE</text>
  <text x="104" y="372" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">DRAG</text>
  <text x="97" y="249" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Parting line</text>

  <!-- pouring cup and sprue -->
  <polygon points="120,70 156,70 146,96 130,96" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="130" y="96" width="16" height="204" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>

  <!-- runner along the drag bottom -->
  <rect x="130" y="300" width="210" height="22" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>

  <!-- casting cavity: thin arm, main body, heavy boss, gate stub -->
  <path d="M180,190 L300,190 L300,170 L480,170 L480,150 L525,150 L525,300 L480,300 L480,280 L340,280 L340,300 L318,300 L318,280 L300,280 L300,215 L180,215 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>

  <!-- riser above heavy boss -->
  <rect x="486" y="70" width="34" height="80" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="503" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Riser</text>

  <!-- core with core prints, chaplet -->
  <rect x="290" y="205" width="200" height="44" rx="20" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="390" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Sand core</text>
  <rect x="384" y="249" width="12" height="31" fill="#5A6B7E"/>
  <text x="296" y="268" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Chaplet</text>
  <line x1="300" y1="263" x2="382" y2="263" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- gating labels -->
  <text x="162" y="86" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pouring cup</text>
  <text x="118" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sprue</text>
  <line x1="122" y1="195" x2="130" y2="195" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Runner</text>
  <text x="358" y="342" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gate</text>
  <line x1="355" y1="336" x2="330" y2="302" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- numbered discontinuity origins -->
  <circle cx="503" cy="175" r="12" fill="#F2A33C"/>
  <text x="503" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <circle cx="390" cy="188" r="12" fill="#F2A33C"/>
  <text x="390" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <circle cx="329" cy="291" r="12" fill="#F2A33C"/>
  <text x="329" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <circle cx="468" cy="292" r="12" fill="#F2A33C"/>
  <text x="468" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <circle cx="196" cy="202" r="12" fill="#F2A33C"/>
  <text x="196" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5</text>
  <circle cx="281" cy="227" r="12" fill="#F2A33C"/>
  <text x="281" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">6</text>

  <!-- legend -->
  <text x="562" y="84" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Discontinuity origins</text>

  <circle cx="572" cy="115" r="10" fill="#F2A33C"/>
  <text x="572" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">1</text>
  <text x="590" y="120" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Shrinkage - heavy boss</text>
  <text x="590" y="140" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">starved by small riser</text>

  <circle cx="572" cy="167" r="10" fill="#F2A33C"/>
  <text x="572" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">2</text>
  <text x="590" y="172" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gas porosity - moist</text>
  <text x="590" y="192" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">core, blocked vents</text>

  <circle cx="572" cy="219" r="10" fill="#F2A33C"/>
  <text x="572" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">3</text>
  <text x="590" y="224" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sand wash - gate erosion</text>

  <circle cx="572" cy="251" r="10" fill="#F2A33C"/>
  <text x="572" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">4</text>
  <text x="590" y="256" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hot tear - restrained fillet</text>

  <circle cx="572" cy="283" r="10" fill="#F2A33C"/>
  <text x="572" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">5</text>
  <text x="590" y="288" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cold shut / misrun -</text>
  <text x="590" y="308" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">thin end far from gate</text>

  <circle cx="572" cy="335" r="10" fill="#F2A33C"/>
  <text x="572" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">6</text>
  <text x="590" y="340" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Core shift - uneven walls</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Metal fills: cup, sprue, runner, gate, cavity; risers feed shrinkage; cores form internal passages</text>
</svg>
