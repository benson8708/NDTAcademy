<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Tube-Shift Parallax: Finding Flaw Depth</text>

  <!-- source positions -->
  <circle cx="330" cy="80" r="7" fill="#F2A33C"/>
  <circle cx="470" cy="80" r="7" fill="#F2A33C"/>
  <text x="312" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">source position 1</text>
  <text x="490" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">source position 2</text>
  <line x1="342" y1="98" x2="458" y2="98" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="334,98 346,92 346,104" fill="#F2A33C"/>
  <polygon points="466,98 454,92 454,104" fill="#F2A33C"/>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">a = 4.5 in.</text>

  <!-- SFD dimension -->
  <line x1="120" y1="84" x2="120" y2="396" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="120,82 116,90 124,90" fill="#5A6B7E"/>
  <polygon points="120,398 116,390 124,390" fill="#5A6B7E"/>
  <text x="108" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">SFD = 30 in.</text>

  <!-- part -->
  <rect x="220" y="250" width="360" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="598" y1="252" x2="598" y2="398" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="598,250 594,258 602,258" fill="#5A6B7E"/>
  <polygon points="598,400 594,392 602,392" fill="#5A6B7E"/>
  <text x="612" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4.0 in.</text>

  <!-- markers -->
  <polygon points="243,250 257,250 250,239" fill="#1E9E6A"/>
  <text x="250" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">source-side marker - shifts most</text>
  <rect x="528" y="390" width="12" height="10" fill="#1E9E6A"/>
  <text x="556" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">film-side marker - no shift</text>

  <!-- flaw -->
  <polygon points="400,279 409,288 400,297 391,288" fill="#D14343"/>
  <text x="378" y="283" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">flaw</text>

  <!-- h dimension -->
  <line x1="560" y1="292" x2="560" y2="396" stroke="#1E9E6A" stroke-width="1.5"/>
  <polygon points="560,290 556,298 564,298" fill="#1E9E6A"/>
  <polygon points="560,398 556,390 564,390" fill="#1E9E6A"/>
  <text x="548" y="348" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">h = 3.0 in.</text>

  <!-- rays -->
  <line x1="330" y1="86" x2="439" y2="400" stroke="#1B82E8" stroke-width="1.8"/>
  <line x1="470" y1="86" x2="361" y2="400" stroke="#1B82E8" stroke-width="1.8"/>

  <!-- film and image marks -->
  <line x1="180" y1="400" x2="640" y2="400" stroke="#5A6B7E" stroke-width="7"/>
  <text x="184" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">film</text>
  <rect x="359" y="396" width="5" height="12" fill="#0A2342"/>
  <rect x="437" y="396" width="5" height="12" fill="#0A2342"/>

  <!-- image shift b -->
  <line x1="368" y1="420" x2="434" y2="420" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="360,420 372,414 372,426" fill="#D14343"/>
  <polygon points="442,420 430,414 430,426" fill="#D14343"/>
  <text x="401" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">b = 0.5 in.</text>

  <!-- formula box -->
  <rect x="612" y="108" width="176" height="96" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="700" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">h = b x SFD / (a + b)</text>
  <text x="700" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">= 0.5 x 30 / 5.0</text>
  <text x="700" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">= 3.0 in. above film</text>
  <text x="700" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw is 1.0 in. below</text>
  <text x="700" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the top surface</text>

  <text x="770" y="446" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">schematic - not to scale</text>
</svg>
