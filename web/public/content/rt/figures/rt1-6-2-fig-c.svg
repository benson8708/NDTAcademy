<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Tube-Shift (Parallax) Method for Flaw Depth</text>

  <!-- two source positions -->
  <circle cx="300" cy="70" r="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <circle cx="460" cy="70" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="300" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Position 1</text>
  <text x="470" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Position 2</text>
  <line x1="310" y1="86" x2="450" y2="86" stroke="#0A2342" stroke-width="2"/>
  <line x1="310" y1="80" x2="310" y2="92" stroke="#0A2342" stroke-width="2"/>
  <line x1="450" y1="80" x2="450" y2="92" stroke="#0A2342" stroke-width="2"/>
  <text x="380" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source shift S</text>

  <!-- part with internal flaw -->
  <rect x="250" y="220" width="300" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="285" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Part</text>
  <path d="M 392 250 L 400 242 L 408 250 L 400 258 Z" fill="#D14343"/>
  <text x="402" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Flaw</text>

  <!-- rays through flaw from each source position -->
  <line x1="300" y1="70" x2="444" y2="330" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="460" y1="70" x2="373" y2="330" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- film -->
  <rect x="220" y="330" width="360" height="12" fill="#0A2342"/>
  <text x="290" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film - one sheet, two exposures</text>

  <!-- the two flaw images and the shift s -->
  <line x1="444" y1="326" x2="444" y2="346" stroke="#D14343" stroke-width="4"/>
  <line x1="373" y1="326" x2="373" y2="346" stroke="#F2A33C" stroke-width="4"/>
  <line x1="373" y1="312" x2="444" y2="312" stroke="#1B82E8" stroke-width="2"/>
  <line x1="373" y1="306" x2="373" y2="318" stroke="#1B82E8" stroke-width="2"/>
  <line x1="444" y1="306" x2="444" y2="318" stroke="#1B82E8" stroke-width="2"/>
  <text x="408" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Image shift s</text>

  <!-- h dimension -->
  <line x1="600" y1="250" x2="600" y2="330" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="594" y1="250" x2="606" y2="250" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="594" y1="330" x2="606" y2="330" stroke="#1E9E6A" stroke-width="2"/>
  <text x="614" y="294" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">h</text>
  <line x1="408" y1="250" x2="594" y2="250" stroke="#1E9E6A" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- D dimension -->
  <line x1="180" y1="70" x2="180" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="174" y1="70" x2="186" y2="70" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="174" y1="330" x2="186" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <text x="166" y="204" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">D</text>
  <line x1="180" y1="70" x2="292" y2="70" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- formula box -->
  <rect x="600" y="100" width="180" height="120" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="690" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">h = s·D ÷ (S + s)</text>
  <text x="690" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">S = 4 in., D = 24 in.</text>
  <text x="690" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">s = 0.40 in.</text>
  <text x="690" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">h ≈ 2.2 in.</text>

  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">A flaw near the film barely shifts; a flaw near the source side shifts most.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Lead markers on both surfaces give reference shifts.</text>
</svg>
