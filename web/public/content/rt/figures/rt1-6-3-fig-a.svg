<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Inside the Cassette: The Exposure Sandwich</text>

  <!-- primary beam arrows -->
  <line x1="260" y1="58" x2="260" y2="96" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="252,96 260,112 268,96" fill="#F2A33C"/>
  <line x1="340" y1="58" x2="340" y2="96" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="332,96 340,112 348,96" fill="#F2A33C"/>
  <line x1="420" y1="58" x2="420" y2="96" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="412,96 420,112 428,96" fill="#F2A33C"/>
  <text x="155" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Primary beam</text>

  <!-- scatter ray deflected -->
  <line x1="520" y1="62" x2="478" y2="118" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="565" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Low-energy scatter</text>

  <!-- layer stack -->
  <rect x="200" y="118" width="320" height="16" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="200" y="142" width="320" height="10" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="200" y="160" width="320" height="22" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="200" y="190" width="320" height="13" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="200" y="211" width="320" height="18" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="200" y="237" width="320" height="16" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- electron arrows from screens into film -->
  <line x1="290" y1="152" x2="290" y2="159" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="285,158 290,166 295,158" fill="#1E9E6A"/>
  <line x1="390" y1="152" x2="390" y2="159" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="385,158 390,166 395,158" fill="#1E9E6A"/>
  <line x1="340" y1="190" x2="340" y2="186" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="335,186 340,178 345,186" fill="#1E9E6A"/>

  <!-- labels with leaders -->
  <line x1="520" y1="126" x2="560" y2="126" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="131" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cassette front - low absorption, light-tight</text>
  <line x1="520" y1="147" x2="560" y2="147" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Front lead screen ≈ 0.005 in.</text>
  <line x1="520" y1="171" x2="560" y2="171" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Double-emulsion film</text>
  <line x1="520" y1="196" x2="560" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="201" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Back lead screen ≈ 0.010 in.</text>
  <line x1="520" y1="220" x2="560" y2="220" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pressure pad - keeps contact</text>
  <line x1="520" y1="245" x2="560" y2="245" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cassette back</text>

  <!-- backscatter arrow from below -->
  <line x1="340" y1="320" x2="340" y2="266" stroke="#D14343" stroke-width="3" stroke-dasharray="6 4"/>
  <polygon points="332,266 340,252 348,266" fill="#D14343"/>
  <text x="340" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Backscatter - stopped by the thicker back screen</text>

  <!-- electron note -->
  <line x1="200" y1="170" x2="120" y2="200" stroke="#1E9E6A" stroke-width="1.5"/>
  <text x="118" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Photoelectrons</text>
  <text x="118" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">expose the film</text>
  <text x="118" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">at contact range</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Net intensification above ≈ 125 kV, typically 2-4× for lead foil</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Any gap between screen and film lets electrons spread sideways - local unsharpness.</text>
</svg>
