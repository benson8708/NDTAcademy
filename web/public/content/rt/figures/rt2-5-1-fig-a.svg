<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Inside the Ingot: Primary Discontinuities and the Crop</text>

  <!-- ingot mold (grey walls, big end down) -->
  <line x1="152" y1="70" x2="136" y2="398" stroke="#5A6B7E" stroke-width="5"/>
  <line x1="308" y1="70" x2="324" y2="398" stroke="#5A6B7E" stroke-width="5"/>
  <line x1="120" y1="400" x2="340" y2="400" stroke="#5A6B7E" stroke-width="5"/>

  <!-- ingot body -->
  <polygon points="165,75 295,75 310,395 150,395" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>

  <!-- segregation zone (last to freeze) -->
  <ellipse cx="230" cy="170" rx="52" ry="78" fill="#F2A33C" fill-opacity="0.3" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 5"/>

  <!-- primary pipe (funnel) and secondary pipe -->
  <polygon points="205,75 255,75 236,165 224,165" fill="#0A2342"/>
  <ellipse cx="230" cy="196" rx="11" ry="20" fill="#0A2342"/>

  <!-- blowholes near walls -->
  <circle cx="180" cy="160" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="176" cy="225" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="184" cy="290" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="282" cy="170" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="286" cy="235" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="278" cy="300" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="190" cy="345" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="272" cy="350" r="4.5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>

  <!-- nonmetallic inclusions -->
  <circle cx="215" cy="310" r="3" fill="#5A6B7E"/>
  <circle cx="238" cy="295" r="3" fill="#5A6B7E"/>
  <circle cx="225" cy="338" r="3" fill="#5A6B7E"/>
  <circle cx="252" cy="322" r="3" fill="#5A6B7E"/>
  <circle cx="207" cy="270" r="3" fill="#5A6B7E"/>

  <!-- crop line -->
  <line x1="148" y1="210" x2="312" y2="210" stroke="#D14343" stroke-width="3" stroke-dasharray="10 6"/>

  <!-- left-margin labels with leaders -->
  <text x="118" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Primary pipe</text>
  <line x1="122" y1="96" x2="212" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Secondary pipe</text>
  <line x1="122" y1="184" x2="217" y2="194" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Crop line</text>
  <line x1="122" y1="231" x2="148" y2="212" stroke="#D14343" stroke-width="1.5"/>
  <text x="118" y="282" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Blowholes (gas)</text>
  <line x1="122" y1="277" x2="172" y2="227" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="326" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inclusions</text>
  <line x1="122" y1="321" x2="204" y2="272" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- arrows to rolled product -->
  <line x1="335" y1="165" x2="416" y2="136" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="412,130 428,132 416,144" fill="#5A6B7E"/>
  <line x1="335" y1="250" x2="416" y2="276" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="414,268 428,280 410,282" fill="#5A6B7E"/>
  <text x="372" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">hot rolling</text>

  <!-- rolled bar: cropped correctly -->
  <text x="595" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Cropped correctly - sound centerline</text>
  <rect x="430" y="110" width="330" height="55" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- rolled bar: crop too short -->
  <text x="595" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Crop too short - pipe survives</text>
  <rect x="430" y="250" width="330" height="55" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="560" y1="277" x2="750" y2="277" stroke="#0A2342" stroke-width="4" stroke-dasharray="14 7"/>
  <text x="595" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pipe rolled flat = centerline lamination</text>

  <!-- bottom notes -->
  <text x="230" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Ingot (mold shown grey)</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Amber zone: segregation - C, S, and P concentrate in the last metal to freeze (upper center)</text>
</svg>
