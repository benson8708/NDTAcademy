<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Fluoroscopic System Layout</text>

  <!-- X-ray source -->
  <rect x="55" y="195" width="70" height="60" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="90" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">X-ray source</text>
  <!-- beam cone -->
  <polygon points="125,210 125,240 250,275 250,175" fill="#F2A33C" opacity="0.4"/>

  <!-- part in beam -->
  <rect x="175" y="200" width="40" height="50" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="195" cy="225" r="5" fill="#0A2342"/>
  <text x="195" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Part</text>

  <!-- input / fluorescent screen -->
  <rect x="255" y="170" width="14" height="110" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="2"/>
  <text x="262" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">Input</text>
  <text x="262" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">screen</text>

  <!-- image intensifier tube (funnel) -->
  <polygon points="269,160 269,290 380,250 380,200" fill="#E8F1FB" opacity="0.18" stroke="#1B82E8" stroke-width="2"/>
  <!-- electrons inside -->
  <line x1="275" y1="200" x2="375" y2="218" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="275" y1="250" x2="375" y2="232" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="325" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">Image intensifier</text>
  <text x="325" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">(brightness x thousands)</text>

  <!-- output screen (small, bright) -->
  <rect x="378" y="205" width="10" height="40" fill="#F2A33C" stroke="#E8F1FB" stroke-width="2"/>
  <text x="383" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">output</text>

  <!-- video camera -->
  <rect x="410" y="205" width="70" height="44" rx="6" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="408" cy="227" r="9" fill="#0A2342" stroke="#E8F1FB" stroke-width="2"/>
  <text x="445" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Video camera</text>

  <!-- signal cable to monitor -->
  <line x1="480" y1="227" x2="560" y2="227" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="560,221 576,227 560,233" fill="#1B82E8"/>

  <!-- monitor -->
  <rect x="580" y="170" width="160" height="120" rx="8" fill="#E8F1FB" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="595" y="185" width="130" height="78" fill="#0A2342"/>
  <!-- live image on monitor -->
  <rect x="630" y="200" width="34" height="44" fill="#5A6B7E"/>
  <circle cx="647" cy="222" r="6" fill="#F2A33C"/>
  <rect x="645" y="290" width="30" height="22" fill="#5A6B7E"/>
  <text x="660" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Monitor (normal room)</text>

  <!-- shielded cabinet outline -->
  <rect x="40" y="120" width="455" height="200" rx="10" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="9 6"/>
  <text x="135" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">Shielded, interlocked cabinet</text>

  <!-- bottom note -->
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">X-rays become light at the screen; the eye stays out of the beam, viewing only the monitor.</text>
</svg>
