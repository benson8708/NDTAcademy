<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Continuous X-ray Spectrum vs. Discrete Gamma Lines</text>

  <!-- axes -->
  <line x1="90" y1="370" x2="760" y2="370" stroke="#0A2342" stroke-width="3"/>
  <line x1="90" y1="370" x2="90" y2="90" stroke="#0A2342" stroke-width="3"/>
  <polygon points="760,364 776,370 760,376" fill="#0A2342"/>
  <polygon points="84,90 90,74 96,90" fill="#0A2342"/>
  <text x="430" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Photon energy (MeV) &#8594;</text>
  <text x="52" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="rotate(-90 52 230)">Relative intensity</text>

  <!-- x ticks -->
  <line x1="220" y1="370" x2="220" y2="377" stroke="#0A2342" stroke-width="2"/>
  <line x1="350" y1="370" x2="350" y2="377" stroke="#0A2342" stroke-width="2"/>
  <line x1="480" y1="370" x2="480" y2="377" stroke="#0A2342" stroke-width="2"/>
  <line x1="610" y1="370" x2="610" y2="377" stroke="#0A2342" stroke-width="2"/>
  <line x1="740" y1="370" x2="740" y2="377" stroke="#0A2342" stroke-width="2"/>
  <text x="90" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0</text>
  <text x="220" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0.3</text>
  <text x="350" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0.6</text>
  <text x="480" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">0.9</text>
  <text x="610" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">1.2</text>
  <text x="740" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">1.5</text>

  <!-- bremsstrahlung hump: 300 kV machine, 0 to 0.3 MeV -->
  <path d="M 92 368 C 104 250 118 196 134 192 C 158 188 186 270 220 368"
        fill="#1B82E8" fill-opacity="0.18" stroke="#1B82E8" stroke-width="3.5"/>
  <!-- characteristic spikes (tungsten K-lines ~59/67 keV) -->
  <line x1="116" y1="320" x2="116" y2="140" stroke="#1B82E8" stroke-width="4"/>
  <line x1="124" y1="296" x2="124" y2="170" stroke="#1B82E8" stroke-width="4"/>
  <line x1="120" y1="140" x2="170" y2="112" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="176" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">characteristic spikes (target K-lines)</text>
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B82E8">300 kV machine:</text>
  <text x="200" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">continuous to 0.3 MeV max</text>

  <!-- Ir-192 lines: 0.31, 0.47, 0.6 MeV -->
  <line x1="224" y1="370" x2="224" y2="150" stroke="#1E9E6A" stroke-width="5"/>
  <line x1="294" y1="370" x2="294" y2="210" stroke="#1E9E6A" stroke-width="5"/>
  <line x1="350" y1="370" x2="350" y2="262" stroke="#1E9E6A" stroke-width="5"/>
  <line x1="246" y1="370" x2="246" y2="120" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="246" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">Ir-192: lines avg &#8776; 0.35 MeV</text>

  <!-- Co-60 lines: 1.17, 1.33 -->
  <line x1="597" y1="370" x2="597" y2="150" stroke="#D14343" stroke-width="5"/>
  <line x1="666" y1="370" x2="666" y2="150" stroke="#D14343" stroke-width="5"/>
  <text x="632" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">Co-60: 1.17 + 1.33 MeV</text>

  <!-- legend -->
  <rect x="420" y="170" width="300" height="108" rx="10" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="436" y1="196" x2="472" y2="196" stroke="#1B82E8" stroke-width="4"/>
  <text x="480" y="201" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">X-ray machine: continuous, kV-adjustable</text>
  <line x1="436" y1="226" x2="472" y2="226" stroke="#1E9E6A" stroke-width="4"/>
  <text x="480" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Ir-192: fixed lines (steel ~0.5-2.5 in.)</text>
  <line x1="436" y1="256" x2="472" y2="256" stroke="#D14343" stroke-width="4"/>
  <text x="480" y="261" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Co-60: fixed lines (steel ~1.5-8 in.)</text>

  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">A machine's effective energy is roughly &#8531; to &#189; of its peak kV; an isotope's lines never move.</text>
</svg>
