<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Geometric Unsharpness: The Penumbra</text>

  <!-- finite-width source -->
  <rect x="370" y="70" width="60" height="10" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source width F</text>

  <!-- object block, casting edge at x=400 -->
  <rect x="180" y="200" width="220" height="30" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="265" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Object</text>

  <!-- rays from each end of source through the object edge -->
  <line x1="370" y1="80" x2="426" y2="360" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="430" y1="80" x2="374" y2="360" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- film exposure bands -->
  <rect x="180" y="360" width="194" height="12" fill="#0A2342"/>
  <rect x="374" y="360" width="52" height="12" fill="#F2A33C"/>
  <rect x="426" y="360" width="194" height="12" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="270" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Umbra (full shadow)</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Penumbra = Ug</text>
  <line x1="400" y1="376" x2="400" y2="402" stroke="#F2A33C" stroke-width="2"/>
  <text x="525" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Full exposure</text>

  <!-- dimension brackets -->
  <line x1="140" y1="75" x2="140" y2="200" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="134" y1="75" x2="146" y2="75" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="134" y1="200" x2="146" y2="200" stroke="#1E9E6A" stroke-width="2"/>
  <text x="128" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">d</text>
  <line x1="140" y1="200" x2="140" y2="360" stroke="#F2A33C" stroke-width="2"/>
  <line x1="134" y1="360" x2="146" y2="360" stroke="#F2A33C" stroke-width="2"/>
  <text x="128" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">t</text>
  <text x="62" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">source</text>
  <text x="62" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">to object</text>
  <text x="62" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">object</text>
  <text x="62" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">to film</text>

  <!-- formula box -->
  <rect x="555" y="100" width="215" height="160" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Ug = F × t ÷ d</text>
  <text x="662" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">F = 0.10 in.</text>
  <text x="662" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">t = 2 in., d = 20 in.</text>
  <text x="662" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Ug = 0.010 in.</text>

  <text x="662" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sharper image:</text>
  <text x="662" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">smaller F · longer d · shorter t</text>
</svg>
