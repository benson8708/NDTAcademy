<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Anode Heel Effect</text>

  <!-- tube envelope -->
  <rect x="250" y="60" width="300" height="90" rx="24" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- cathode filament -->
  <path d="M 290 105 l 8 -9 l 8 9 l 8 -9 l 8 9 l 8 -9" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Cathode (−)</text>
  <!-- angled anode target -->
  <path d="M 470 75 L 515 75 L 515 140 L 470 112 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="505" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Angled anode (+)</text>
  <!-- electron stream -->
  <line x1="330" y1="100" x2="468" y2="100" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="468,93 482,101 468,108" fill="#1E9E6A"/>
  <text x="398" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Electrons</text>

  <!-- focal spot and heel absorption note -->
  <circle cx="487" cy="103" r="5" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="496" y1="118" x2="588" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="594" y="88" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">X-rays leaving toward the</text>
  <text x="594" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">anode end pass through</text>
  <text x="594" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">more target metal - the heel</text>

  <!-- beam fan -->
  <path d="M 487 150 L 230 300 L 680 300 Z" fill="#1B82E8" opacity="0.18"/>
  <line x1="487" y1="150" x2="230" y2="300" stroke="#1B82E8" stroke-width="2"/>
  <line x1="487" y1="150" x2="680" y2="300" stroke="#1B82E8" stroke-width="2"/>
  <line x1="487" y1="150" x2="455" y2="300" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="262" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Cathode end</text>
  <text x="640" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Anode end</text>

  <!-- film line -->
  <line x1="230" y1="300" x2="680" y2="300" stroke="#0A2342" stroke-width="4"/>

  <!-- intensity profile -->
  <line x1="230" y1="410" x2="680" y2="410" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="230" y1="410" x2="230" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 230 342 C 360 338 500 346 560 358 C 610 368 655 388 680 402" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="214" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E" transform="rotate(-90 214 372)">Intensity</text>
  <text x="318" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Stronger toward cathode end</text>
  <text x="600" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Weaker toward anode end</text>

  <!-- practice tip -->
  <rect x="60" y="160" width="150" height="120" rx="10" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="2"/>
  <text x="135" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Field practice</text>
  <text x="135" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Point the thicker</text>
  <text x="135" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">part section at</text>
  <text x="135" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the cathode end</text>
  <text x="135" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">of the field</text>
</svg>
