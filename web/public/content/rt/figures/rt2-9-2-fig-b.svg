<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Grading a Casting Against Reference Radiographs</text>

  <!-- step 1 -->
  <rect x="45" y="64" width="210" height="112" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 · PRODUCTION FILM</text>
  <text x="150" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Identify each type;</text>
  <text x="150" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">select the worst area</text>
  <text x="150" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">for each category</text>

  <line x1="255" y1="120" x2="288" y2="120" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="288,114 300,120 288,126" fill="#1B82E8"/>

  <!-- step 2 -->
  <rect x="300" y="64" width="210" height="112" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="405" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 · REFERENCE PLATES</text>
  <text x="405" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Same material set,</text>
  <text x="405" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">same category, same</text>
  <text x="405" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">thickness range</text>

  <line x1="510" y1="120" x2="543" y2="120" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="543,114 555,120 543,126" fill="#1B82E8"/>

  <!-- step 3 -->
  <rect x="555" y="64" width="210" height="112" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="660" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 · SPEC LEVEL</text>
  <text x="660" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Purchase spec assigns</text>
  <text x="660" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">max severity level 1–5</text>
  <text x="660" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">for each category</text>

  <!-- down arrow to decision -->
  <line x1="405" y1="176" x2="405" y2="206" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="399,206 405,218 411,206" fill="#1B82E8"/>

  <!-- decision diamond -->
  <polygon points="405,218 540,266 405,314 270,266" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="405" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Worst area equal to or</text>
  <text x="405" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">better than the plate?</text>

  <!-- yes / accept -->
  <line x1="540" y1="266" x2="586" y2="266" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="586,260 598,266 586,272" fill="#1E9E6A"/>
  <text x="563" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">yes</text>
  <rect x="598" y="236" width="160" height="60" rx="6" fill="#1E9E6A"/>
  <text x="678" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">ACCEPT</text>
  <text x="678" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">record level used</text>

  <!-- no / reject -->
  <line x1="270" y1="266" x2="224" y2="266" stroke="#D14343" stroke-width="3"/>
  <polygon points="224,260 212,266 224,272" fill="#D14343"/>
  <text x="247" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">no</text>
  <rect x="45" y="236" width="167" height="60" rx="6" fill="#D14343"/>
  <text x="128" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">REJECT</text>
  <text x="128" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">repair / re-evaluate</text>

  <!-- bottom reference band -->
  <rect x="45" y="332" width="710" height="94" rx="6" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Categories: A porosity · B sand &amp; slag · C shrinkage · D crack · E hot tear · F insert</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">D, E, F have no graded plates — not acceptable at any severity level</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Steel: E446 to 2 in. · E186 2–4.5 in. · E280 4.5–12 in. · Al/Mg E155 · Investment E192</text>
</svg>
