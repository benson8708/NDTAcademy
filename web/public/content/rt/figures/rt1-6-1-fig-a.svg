<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Film Radiography Process</text>

  <!-- source -->
  <circle cx="195" cy="80" r="9" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="195" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source (X-ray tube or isotope)</text>

  <!-- diverging beam edges -->
  <line x1="195" y1="89" x2="95" y2="308" stroke="#F2A33C" stroke-width="2"/>
  <line x1="195" y1="89" x2="295" y2="308" stroke="#F2A33C" stroke-width="2"/>
  <!-- rays through object -->
  <line x1="195" y1="89" x2="148" y2="308" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="195" y1="89" x2="222" y2="308" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="195" y1="89" x2="195" y2="308" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- stepped object: thick left, thin right, void in thick step -->
  <path d="M 115 195 L 200 195 L 200 220 L 275 220 L 275 245 L 115 245 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="160" cy="222" r="9" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="62" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Thick step</text>
  <text x="282" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Thin step</text>
  <line x1="160" y1="232" x2="120" y2="280" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="116" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Void</text>

  <!-- film -->
  <rect x="85" y="310" width="220" height="14" fill="#0A2342"/>
  <text x="195" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film in light-tight cassette</text>

  <!-- arrow to radiograph -->
  <line x1="330" y1="200" x2="430" y2="200" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="430,191 450,200 430,209" fill="#1B82E8"/>
  <text x="390" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Process and view</text>

  <!-- simulated radiograph -->
  <rect x="470" y="90" width="270" height="220" fill="#0A2342" stroke="#5A6B7E" stroke-width="3"/>
  <rect x="482" y="102" width="120" height="196" fill="#D9E0E8"/>
  <rect x="602" y="102" width="126" height="196" fill="#5A6B7E"/>
  <circle cx="545" cy="195" r="12" fill="#0A2342"/>
  <text x="542" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Thick = light</text>
  <text x="665" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Thin = dark</text>
  <line x1="551" y1="206" x2="590" y2="258" stroke="#F2A33C" stroke-width="2"/>
  <text x="600" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Void = dark spot</text>
  <text x="605" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">The radiograph: more exposure = darker</text>

  <!-- process chain -->
  <rect x="85" y="382" width="150" height="42" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="160" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1. Expose</text>
  <line x1="235" y1="403" x2="285" y2="403" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="285,396 300,403 285,410" fill="#0A2342"/>
  <rect x="300" y="382" width="200" height="42" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2. Develop - fix - dry</text>
  <line x1="500" y1="403" x2="550" y2="403" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="550,396 565,403 550,410" fill="#0A2342"/>
  <rect x="565" y="382" width="180" height="42" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="655" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3. View + interpret</text>

  <text x="195" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Differential absorption</text>
</svg>
