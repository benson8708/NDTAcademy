  <polygon points="431,150 484,150 500,210 500,215 431,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <polygon points="575,150 522,150 506,210 506,215 575,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <path d="M494,213 Q503,200 512,213 Q503,221 494,213 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <ellipse cx="503" cy="196" rx="16" ry="9" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <ellipse cx="503" cy="180" rx="20" ry="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <ellipse cx="503" cy="166" rx="24" ry="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M486,186 L494,182 L497,189 L489,193 Z" fill="#0A2342"/>
  <line x1="516" y1="168" x2="509" y2="194" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="501" cy="172" r="2" fill="#0A2342"/>
  <circle cx="506" cy="168" r="2" fill="#0A2342"/>
  <circle cx="498" cy="177" r="1.8" fill="#0A2342"/>

  <!-- panel 4: + cap, toe undercut, crater crack -->
  <polygon points="619,150 672,150 688,210 688,215 619,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
