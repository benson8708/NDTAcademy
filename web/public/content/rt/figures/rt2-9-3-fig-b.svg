<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pass by Pass: When Each Flaw Enters</text>

  <!-- panel frames -->
  <rect x="40" y="56" width="175" height="300" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="228" y="56" width="175" height="300" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="416" y="56" width="175" height="300" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="604" y="56" width="175" height="300" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="127" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 · Root pass</text>
  <text x="315" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 · Hot pass</text>
  <text x="503" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 · Fill passes</text>
  <text x="691" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 · Cap pass</text>

  <!-- panel 1: plates + root bead + IP + burn-through -->
  <polygon points="55,150 108,150 124,210 124,215 55,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <polygon points="199,150 146,150 130,210 130,215 199,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <path d="M118,213 Q127,200 136,213 Q127,221 118,213 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="120" y1="217" x2="134" y2="217" stroke="#D14343" stroke-width="2.5"/>
  <path d="M125,222 Q127,231 129,222 Z" fill="#D14343"/>

  <!-- panel 2: + hot pass, wagon-track slag at root toes -->
  <polygon points="243,150 296,150 312,210 312,215 243,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <polygon points="387,150 334,150 318,210 318,215 387,215" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.8"/>
  <path d="M306,213 Q315,200 324,213 Q315,221 306,213 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <ellipse cx="315" cy="196" rx="16" ry="9" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="303" y1="207" x2="309" y2="199" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="327" y1="199" x2="321" y2="207" stroke="#0A2342" stroke-width="2.5"/>

