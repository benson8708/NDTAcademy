  <ellipse cx="691" cy="180" rx="20" ry="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <ellipse cx="691" cy="166" rx="24" ry="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M668,150 Q691,136 714,150 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M662,150 Q668,157 674,150" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="685" y1="143" x2="697" y2="143" stroke="#D14343" stroke-width="1.5"/>
  <line x1="688" y1="138" x2="694" y2="148" stroke="#D14343" stroke-width="1.5"/>
  <line x1="694" y1="138" x2="688" y2="148" stroke="#D14343" stroke-width="1.5"/>

  <!-- captions -->
  <text x="127" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Incomplete</text>
  <text x="127" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetration,</text>
  <text x="127" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">burn-through,</text>
  <text x="127" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">root undercut</text>

  <text x="315" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wagon-track slag</text>
  <text x="315" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">if the root-pass</text>
  <text x="315" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">toes are not</text>
  <text x="315" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ground clean</text>

  <text x="503" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Interpass slag,</text>
  <text x="503" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sidewall lack of</text>
  <text x="503" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fusion, porosity</text>
  <text x="503" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">at tie-ins</text>

  <text x="691" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Toe undercut,</text>
  <text x="691" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">underfill, excess</text>
  <text x="691" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">reinforcement,</text>
  <text x="691" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">crater cracks</text>

  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Red = planar or surface flaws · Navy = trapped material · each pass adds its own failure modes</text>
</svg>
