<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Exponential Attenuation: HVL and TVL</text>

  <!-- axes -->
  <line x1="100" y1="390" x2="760" y2="390" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="100" y1="70" x2="100" y2="390" stroke="#D9E0E8" stroke-width="2"/>

  <!-- y labels -->
  <text x="92" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">100%</text>
  <text x="92" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">50%</text>
  <text x="92" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">25%</text>
  <text x="92" y="365" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">10%</text>

  <!-- x labels -->
  <text x="100" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">0</text>
  <text x="260" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">1 HVL</text>
  <text x="420" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">2 HVL</text>
  <text x="580" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">3 HVL</text>
  <text x="740" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">4 HVL</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Shield thickness</text>

  <!-- HVL guide lines -->
  <line x1="100" y1="240" x2="260" y2="240" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="260" y1="240" x2="260" y2="390" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="100" y1="315" x2="420" y2="315" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="420" y1="315" x2="420" y2="390" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="100" y1="352" x2="580" y2="352" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="580" y1="352" x2="580" y2="390" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- TVL guide (green) -->
  <line x1="100" y1="360" x2="631" y2="360" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="631" y1="360" x2="631" y2="390" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="7 5"/>

  <!-- attenuation curve -->
  <polyline points="100,90 140,138 180,178 220,212 260,240 300,264 340,284 380,301 420,315 460,327 500,337 540,345 580,353 620,359 660,364 700,368 740,371" fill="none" stroke="#F2A33C" stroke-width="3.5"/>

  <!-- HVL marker points -->
  <circle cx="260" cy="240" r="5" fill="#E8F1FB"/>
  <circle cx="420" cy="315" r="5" fill="#E8F1FB"/>
  <circle cx="580" cy="352" r="5" fill="#E8F1FB"/>

  <!-- annotations -->
  <text x="272" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">1 HVL &#8594; 50%</text>
  <text x="432" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">2 HVL &#8594; 25%</text>
  <text x="592" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">3 HVL &#8594; 12.5%</text>
  <text x="626" y="382" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">1 TVL &#8776; 3.32 HVL &#8594; 10%</text>

  <!-- info box -->
  <rect x="460" y="84" width="300" height="104" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <text x="474" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Each layer removes the same</text>
  <text x="474" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">fraction, never the same amount.</text>
  <text x="474" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Ir-192 HVL: 4.8 mm lead</text>
  <text x="474" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Co-60 HVL: 12.5 mm lead</text>
</svg>
