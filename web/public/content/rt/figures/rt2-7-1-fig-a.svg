<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Illuminator Demand Grows Tenfold per Density Unit</text>

  <!-- schematic: illuminator -> film -> eye -->
  <rect x="60" y="85" width="105" height="60" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="150" y="93" width="15" height="44" fill="#F2A33C"/>
  <text x="112" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Illuminator</text>

  <line x1="170" y1="115" x2="222" y2="115" stroke="#F2A33C" stroke-width="8"/>
  <polygon points="222,106 240,115 222,124" fill="#F2A33C"/>

  <rect x="244" y="78" width="16" height="74" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="252" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Film, density D</text>

  <line x1="264" y1="115" x2="312" y2="115" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="312,110 324,115 312,120" fill="#F2A33C"/>

  <ellipse cx="352" cy="115" rx="22" ry="13" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <circle cx="352" cy="115" r="6" fill="#1B82E8"/>
  <text x="352" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Eye: 30 cd/m² needed</text>

  <text x="590" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F2A33C">Required: L = 30 × 10^D cd/m²</text>
  <text x="590" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Each unit of density cuts the light tenfold,</text>
  <text x="590" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">so the lamp must work ten times harder.</text>

  <!-- bar chart, log scale -->
  <line x1="110" y1="400" x2="730" y2="400" stroke="#D9E0E8" stroke-width="2"/>

  <rect x="160" y="355" width="80" height="45" fill="#1B82E8"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">300</text>
  <text x="200" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D = 1.0 (10%)</text>

  <rect x="300" y="310" width="80" height="90" fill="#1B82E8"/>
  <text x="340" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">3,000</text>
  <text x="340" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D = 2.0 (1%)</text>

  <rect x="440" y="265" width="80" height="135" fill="#F2A33C"/>
  <text x="480" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">30,000</text>
  <text x="480" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D = 3.0 (0.1%)</text>

  <rect x="580" y="220" width="80" height="180" fill="#F2A33C"/>
  <text x="620" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">300,000</text>
  <text x="620" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">D = 4.0 (0.01%)</text>

  <text x="570" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Amber bars: high-intensity spot-viewer territory</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Illuminator luminance (cd/m²) needed to deliver 30 cd/m² through the film - log scale</text>
</svg>
