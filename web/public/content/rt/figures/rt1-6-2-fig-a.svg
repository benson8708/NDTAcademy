<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Shadow Enlargement and Distortion</text>

  <!-- LEFT PANEL: true projection, enlarged -->
  <circle cx="200" cy="80" r="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="200" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>

  <!-- rays through object edges -->
  <line x1="200" y1="80" x2="120" y2="340" stroke="#F2A33C" stroke-width="2"/>
  <line x1="200" y1="80" x2="280" y2="340" stroke="#F2A33C" stroke-width="2"/>

  <!-- object -->
  <rect x="160" y="210" width="80" height="16" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="252" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Object</text>

  <!-- film and shadow -->
  <line x1="90" y1="340" x2="310" y2="340" stroke="#0A2342" stroke-width="5"/>
  <line x1="120" y1="340" x2="280" y2="340" stroke="#F2A33C" stroke-width="9"/>
  <text x="200" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film - enlarged shadow</text>

  <!-- dimensions -->
  <line x1="92" y1="80" x2="92" y2="210" stroke="#1B82E8" stroke-width="2"/>
  <line x1="86" y1="80" x2="98" y2="80" stroke="#1B82E8" stroke-width="2"/>
  <line x1="86" y1="210" x2="98" y2="210" stroke="#1B82E8" stroke-width="2"/>
  <text x="80" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">SOD</text>
  <line x1="52" y1="80" x2="52" y2="340" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="46" y1="80" x2="58" y2="80" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="46" y1="340" x2="58" y2="340" stroke="#1E9E6A" stroke-width="2"/>
  <text x="40" y="250" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">SFD</text>

  <text x="200" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Aligned: image = object × SFD/SOD</text>
  <text x="200" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Enlarged, but true in shape</text>

  <!-- RIGHT PANEL: tilted film, distorted -->
  <circle cx="590" cy="80" r="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="590" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>

  <line x1="590" y1="80" x2="518" y2="313" stroke="#F2A33C" stroke-width="2"/>
  <line x1="590" y1="80" x2="678" y2="366" stroke="#F2A33C" stroke-width="2"/>

  <rect x="550" y="210" width="80" height="16" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="642" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Object</text>

  <!-- tilted film -->
  <line x1="480" y1="300" x2="720" y2="380" stroke="#0A2342" stroke-width="5"/>
  <line x1="518" y1="313" x2="678" y2="366" stroke="#F2A33C" stroke-width="9"/>
  <text x="640" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Tilted film - stretched shadow</text>

  <text x="600" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Misalignment distorts shape and position</text>
  <text x="476" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Tilt</text>

  <!-- divider -->
  <line x1="400" y1="56" x2="400" y2="380" stroke="#D9E0E8" stroke-width="2"/>
</svg>
