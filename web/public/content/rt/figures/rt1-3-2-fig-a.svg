<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Exposure: Charge Liberated in Air</text>

  <!-- incoming photons -->
  <text x="55" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">X- or gamma photons</text>
  <polyline points="60,170 74,162 88,178 102,162 116,178 130,162 144,178 158,162 172,178 186,162 200,174 226,172" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="226,164 244,172 226,180" fill="#F2A33C"/>
  <polyline points="60,225 74,217 88,233 102,217 116,233 130,217 144,233 158,217 172,233 186,217 200,229 226,227" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="226,219 244,227 226,235" fill="#F2A33C"/>
  <polyline points="60,280 74,272 88,288 102,272 116,288 130,272 144,288 158,272 172,288 186,272 200,284 226,282" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="226,274 244,282 226,290" fill="#F2A33C"/>

  <!-- air volume -->
  <rect x="250" y="120" width="300" height="210" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Known mass of dry air (m)</text>

  <!-- electrodes -->
  <rect x="270" y="120" width="260" height="12" fill="#0A2342"/>
  <text x="262" y="131" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">+ plate</text>
  <rect x="270" y="318" width="260" height="12" fill="#0A2342"/>
  <text x="262" y="329" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">&#8722; plate</text>

  <!-- ion pairs: electrons drift up, positive ions drift down -->
  <circle cx="310" cy="210" r="5" fill="#1B82E8"/>
  <line x1="310" y1="200" x2="310" y2="172" stroke="#1B82E8" stroke-width="1.5"/>
  <polygon points="305,176 310,162 315,176" fill="#1B82E8"/>
  <circle cx="326" cy="226" r="6" fill="#D14343"/>
  <line x1="326" y1="236" x2="326" y2="264" stroke="#D14343" stroke-width="1.5"/>
  <polygon points="321,260 326,274 331,260" fill="#D14343"/>

  <circle cx="385" cy="246" r="5" fill="#1B82E8"/>
  <line x1="385" y1="236" x2="385" y2="208" stroke="#1B82E8" stroke-width="1.5"/>
  <polygon points="380,212 385,198 390,212" fill="#1B82E8"/>
  <circle cx="401" cy="262" r="6" fill="#D14343"/>
  <line x1="401" y1="272" x2="401" y2="296" stroke="#D14343" stroke-width="1.5"/>
  <polygon points="396,292 401,306 406,292" fill="#D14343"/>

  <circle cx="455" cy="196" r="5" fill="#1B82E8"/>
  <line x1="455" y1="186" x2="455" y2="160" stroke="#1B82E8" stroke-width="1.5"/>
  <polygon points="450,164 455,150 460,164" fill="#1B82E8"/>
  <circle cx="471" cy="212" r="6" fill="#D14343"/>
  <line x1="471" y1="222" x2="471" y2="250" stroke="#D14343" stroke-width="1.5"/>
  <polygon points="466,246 471,260 476,246" fill="#D14343"/>

  <circle cx="505" cy="256" r="5" fill="#1B82E8"/>
  <line x1="505" y1="246" x2="505" y2="220" stroke="#1B82E8" stroke-width="1.5"/>
  <polygon points="500,224 505,210 510,224" fill="#1B82E8"/>
  <circle cx="521" cy="272" r="6" fill="#D14343"/>
  <line x1="521" y1="282" x2="521" y2="302" stroke="#D14343" stroke-width="1.5"/>
  <polygon points="516,298 521,312 526,298" fill="#D14343"/>

  <!-- legend -->
  <circle cx="592" cy="172" r="5" fill="#1B82E8"/>
  <text x="606" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">electron (&#8722;)</text>
  <circle cx="592" cy="200" r="6" fill="#D14343"/>
  <text x="606" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">positive ion (+)</text>
  <text x="586" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">~34 eV per ion pair</text>

  <!-- wiring to charge meter -->
  <line x1="530" y1="126" x2="760" y2="126" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="760" y1="126" x2="760" y2="290" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="760" y1="290" x2="700" y2="290" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="530" y1="324" x2="665" y2="324" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="665" y1="324" x2="665" y2="322" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="665" cy="290" r="32" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="665" y1="290" x2="684" y2="270" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="665" cy="290" r="3" fill="#0A2342"/>
  <text x="665" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Q</text>
  <text x="678" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Collected charge Q</text>

  <!-- formula band -->
  <rect x="70" y="384" width="660" height="52" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Exposure X = Q &#247; m &#8212; SI unit: coulomb per kilogram (C/kg)</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 roentgen (R) = 2.58 &#215; 10&#8315;&#8308; C/kg exactly; 1 C/kg &#8776; 3,876 R</text>
</svg>
