<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Film Characteristic Curves: Speed, Contrast, Latitude</text>

  <!-- density window band 1.8 to 4.0 -->
  <rect x="100" y="106" width="650" height="156" fill="#E8F1FB"/>
  <text x="740" y="128" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Acceptable density 1.8 - 4.0</text>

  <!-- axes -->
  <line x1="100" y1="60" x2="100" y2="390" stroke="#0A2342" stroke-width="2"/>
  <line x1="100" y1="390" x2="750" y2="390" stroke="#0A2342" stroke-width="2"/>
  <text x="425" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Log relative exposure</text>
  <text x="45" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="rotate(-90 45 225)">Film density</text>

  <!-- y ticks -->
  <line x1="94" y1="319" x2="100" y2="319" stroke="#0A2342" stroke-width="2"/>
  <line x1="94" y1="248" x2="100" y2="248" stroke="#0A2342" stroke-width="2"/>
  <line x1="94" y1="177" x2="100" y2="177" stroke="#0A2342" stroke-width="2"/>
  <line x1="94" y1="106" x2="100" y2="106" stroke="#0A2342" stroke-width="2"/>
  <text x="88" y="324" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="88" y="253" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="88" y="182" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="88" y="111" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4</text>
  <text x="88" y="395" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>

  <!-- base + fog line -->
  <line x1="100" y1="369" x2="280" y2="369" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="106" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Base + fog (about 0.3)</text>

  <!-- Film F: fast -->
  <path d="M 130 368 C 200 362 255 335 300 262 C 340 196 380 140 430 106 C 470 79 520 76 565 74" fill="none" stroke="#1B82E8" stroke-width="3.5"/>
  <!-- Film S: slow, shifted right -->
  <path d="M 258 368 C 328 362 383 335 428 262 C 468 196 508 140 558 106 C 598 79 648 76 693 74" fill="none" stroke="#1E9E6A" stroke-width="3.5"/>

  <!-- crossing guides for Film F -->
  <line x1="300" y1="262" x2="300" y2="390" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="430" y1="106" x2="430" y2="390" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- latitude double arrow under band -->
  <line x1="308" y1="276" x2="422" y2="276" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="300,276 312,270 312,282" fill="#D14343"/>
  <polygon points="430,276 418,270 418,282" fill="#D14343"/>
  <text x="365" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Latitude of one film</text>

  <!-- speed difference arrow at D 2.5 -->
  <line x1="353" y1="212" x2="465" y2="212" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="345,212 357,206 357,218" fill="#F2A33C"/>
  <polygon points="473,212 461,206 461,218" fill="#F2A33C"/>
  <text x="409" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Speed: S needs about 4x the exposure</text>

  <!-- curve labels -->
  <text x="318" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Film F (faster)</text>
  <text x="585" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Film S (slower, finer grain)</text>

  <!-- curve anatomy -->
  <text x="160" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Toe</text>
  <text x="218" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Straight-line</text>
  <text x="218" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">region (steep)</text>
  <line x1="262" y1="240" x2="296" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Shoulder</text>

  <!-- x axis latitude note -->
  <text x="365" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steeper curve = more contrast, narrower latitude</text>
</svg>
