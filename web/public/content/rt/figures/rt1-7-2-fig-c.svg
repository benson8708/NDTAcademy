<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Inverse Square Law: Double the Distance, Quarter the Intensity</text>

  <!-- formula box -->
  <rect x="40" y="60" width="252" height="96" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="166" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F2A33C">I₁d₁² = I₂d₂²</text>
  <text x="166" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">new time = old time × (d₂/d₁)²</text>

  <!-- top-right note -->
  <text x="655" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Twice as far:</text>
  <text x="655" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">same energy over 4× the area</text>
  <text x="655" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">→ ¼ intensity, 4× the time</text>

  <!-- rays from source through near square corners to far square corners -->
  <line x1="110" y1="250" x2="490" y2="170" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="110" y1="250" x2="650" y2="170" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="110" y1="250" x2="490" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="110" y1="250" x2="650" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- source -->
  <circle cx="110" cy="250" r="11" fill="#F2A33C"/>
  <text x="110" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">source</text>

  <!-- near square (1 unit area) -->
  <rect x="300" y="210" width="80" height="80" fill="#F2A33C" opacity="0.45" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="340" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">240 mR/h</text>
  <text x="340" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">1 unit of area</text>

  <!-- far square (4 unit areas) -->
  <rect x="490" y="170" width="80" height="80" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <rect x="570" y="170" width="80" height="80" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <rect x="490" y="250" width="80" height="80" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <rect x="570" y="250" width="80" height="80" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <text x="570" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">60 mR/h (¼)</text>
  <text x="570" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">4 units of area</text>

  <!-- distance reference dashes -->
  <line x1="110" y1="264" x2="110" y2="430" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="340" y1="318" x2="340" y2="402" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="570" y1="358" x2="570" y2="430" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- d = 1 m arrow -->
  <line x1="118" y1="395" x2="332" y2="395" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="118,395 130,389 130,401" fill="#F2A33C"/>
  <polygon points="332,395 320,389 320,401" fill="#F2A33C"/>
  <text x="225" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">d = 1 m</text>

  <!-- 2d = 2 m arrow -->
  <line x1="118" y1="425" x2="562" y2="425" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="118,425 130,419 130,431" fill="#1B82E8"/>
  <polygon points="562,425 550,419 550,431" fill="#1B82E8"/>
  <text x="340" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">2d = 2 m</text>

  <!-- worked example, right side -->
  <text x="700" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">240 mR/h at 1 m</text>
  <text x="700" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">→ 60 mR/h at 2 m</text>
</svg>
