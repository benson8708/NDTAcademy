<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Distance: The Inverse Square Law</text>

  <!-- diverging beam edges -->
  <line x1="112" y1="230" x2="750" y2="143" stroke="#F2A33C" stroke-width="2"/>
  <line x1="112" y1="230" x2="750" y2="317" stroke="#F2A33C" stroke-width="2"/>

  <!-- point source -->
  <line x1="100" y1="206" x2="100" y2="254" stroke="#F2A33C" stroke-width="2"/>
  <line x1="76" y1="230" x2="124" y2="230" stroke="#F2A33C" stroke-width="2"/>
  <line x1="83" y1="213" x2="117" y2="247" stroke="#F2A33C" stroke-width="2"/>
  <line x1="83" y1="247" x2="117" y2="213" stroke="#F2A33C" stroke-width="2"/>
  <circle cx="100" cy="230" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Point source</text>

  <!-- grid at 1 m : one square -->
  <rect x="270" y="208" width="44" height="44" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="292" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">1 area</text>

  <!-- grid at 2 m : four squares -->
  <rect x="420" y="186" width="88" height="88" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="464" y1="186" x2="464" y2="274" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="420" y1="230" x2="508" y2="230" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="464" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">4 areas</text>

  <!-- grid at 3 m : nine squares -->
  <rect x="600" y="164" width="132" height="132" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="644" y1="164" x2="644" y2="296" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="688" y1="164" x2="688" y2="296" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="600" y1="208" x2="732" y2="208" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="600" y1="252" x2="732" y2="252" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="666" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">9 areas</text>

  <!-- distance axis -->
  <line x1="240" y1="336" x2="762" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="292" y1="330" x2="292" y2="342" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="464" y1="330" x2="464" y2="342" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="666" y1="330" x2="666" y2="342" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="292" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">d = 1 m</text>
  <text x="464" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">d = 2 m</text>
  <text x="666" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">d = 3 m</text>
  <text x="292" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">100 mR/h</text>
  <text x="464" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">25 mR/h</text>
  <text x="666" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">11 mR/h</text>

  <!-- formula and rule -->
  <text x="218" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0A2342">I&#8321;d&#8321;&#178; = I&#8322;d&#8322;&#178;</text>
  <text x="540" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Double the distance &#8594; 1/4 the rate. Triple &#8594; 1/9.</text>
</svg>
