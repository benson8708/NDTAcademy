<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Production Radiograph - Verify Before You Read</text>

  <!-- film -->
  <rect x="50" y="64" width="700" height="300" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>

  <!-- weld image band -->
  <rect x="50" y="196" width="700" height="50" fill="#E8F1FB" fill-opacity="0.18"/>
  <polyline points="50,196 130,194 230,197 330,195 430,197 530,194 630,197 750,195" fill="none" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.6"/>
  <polyline points="50,246 140,248 240,245 340,248 440,246 540,248 640,245 750,247" fill="none" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- 1: hole-type IQI sitting on the weld crown (no shim) -->
  <rect x="112" y="202" width="58" height="34" fill="#E8F1FB" fill-opacity="0.85"/>
  <circle cx="126" cy="222" r="2.5" fill="#5A6B7E"/>
  <circle cx="139" cy="222" r="5" fill="#5A6B7E"/>
  <circle cx="158" cy="222" r="8" fill="#5A6B7E"/>
  <text x="126" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">12</text>

  <!-- 2: hole-type IQI on shim beside the weld (correct) -->
  <rect x="265" y="100" width="107" height="72" fill="#E8F1FB" fill-opacity="0.3" stroke="#D9E0E8" stroke-width="1"/>
  <rect x="282" y="116" width="70" height="36" fill="#E8F1FB" fill-opacity="0.85"/>
  <circle cx="298" cy="138" r="2.5" fill="#5A6B7E"/>
  <circle cx="313" cy="138" r="5" fill="#5A6B7E"/>
  <circle cx="334" cy="138" r="8" fill="#5A6B7E"/>
  <text x="298" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">10</text>

  <!-- 3: wire IQI with wires laid ALONG the weld axis (error) -->
  <rect x="456" y="206" width="14" height="32" fill="#E8F1FB" fill-opacity="0.8"/>
  <rect x="590" y="206" width="14" height="32" fill="#E8F1FB" fill-opacity="0.8"/>
  <line x1="470" y1="209" x2="590" y2="209" stroke="#E8F1FB" stroke-width="3.4"/>
  <line x1="470" y1="215" x2="590" y2="215" stroke="#E8F1FB" stroke-width="2.8"/>
  <line x1="470" y1="221" x2="590" y2="221" stroke="#E8F1FB" stroke-width="2.2"/>
  <line x1="470" y1="227" x2="590" y2="227" stroke="#E8F1FB" stroke-width="1.6"/>
  <line x1="470" y1="233" x2="590" y2="233" stroke="#E8F1FB" stroke-width="1.1"/>
  <line x1="470" y1="238" x2="590" y2="238" stroke="#E8F1FB" stroke-width="0.7"/>

  <!-- 4: location markers (lead numbers) -->
  <text x="81" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#E8F1FB" fill-opacity="0.9">1</text>
  <text x="714" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#E8F1FB" fill-opacity="0.9">2</text>

  <!-- 5: identification block -->
  <rect x="600" y="314" width="140" height="40" fill="none" stroke="#D9E0E8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E8F1FB">JOB 41 - W7 - R0</text>
  <text x="670" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E8F1FB">10 JUN 26 - VIEW 2</text>

  <!-- index badges -->
  <circle cx="93" cy="178" r="12" fill="#F2A33C"/>
  <text x="93" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <circle cx="245" cy="86" r="12" fill="#F2A33C"/>
  <text x="245" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <circle cx="440" cy="180" r="12" fill="#F2A33C"/>
  <text x="440" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <circle cx="120" cy="260" r="12" fill="#F2A33C"/>
  <text x="120" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <circle cx="578" cy="296" r="12" fill="#F2A33C"/>
  <text x="578" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5</text>

  <!-- legend -->
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">1 Hole-type IQI &#183; 2 Hole-type IQI on shim &#183; 3 Wire IQI &#183; 4 Location markers &#183; 5 Identification</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Two of these placements violate typical code rules - find them.</text>
</svg>
