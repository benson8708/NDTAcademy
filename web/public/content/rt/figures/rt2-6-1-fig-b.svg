<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Same 20 Welds, Two Plans &#8212; 50 Ci Ir-192</text>

  <!-- ===== PLAN A : open beam ===== -->
  <text x="40" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Plan A &#8212; no collimator</text>

  <!-- device radiating in all directions -->
  <rect x="70" y="140" width="34" height="22" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="87" y1="151" x2="157" y2="151" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="137" y2="101" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="87" y2="101" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="37" y2="121" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="33" y2="151" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="42" y2="194" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="87" y2="201" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="87" y1="151" x2="137" y2="196" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- radiographer, unshielded at 15 m -->
  <circle cx="255" cy="128" r="7" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="135" x2="255" y2="158" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="141" x2="243" y2="151" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="141" x2="267" y2="148" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="158" x2="247" y2="172" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="158" x2="263" y2="172" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="255" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">crank, 15 m</text>

  <!-- stats A -->
  <text x="360" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Crank rate: &#8776; 110 mR/h</text>
  <text x="360" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Per shot &#8776; 3.7 mR &#183; Boundary &#8776; 110 m</text>
  <rect x="360" y="156" width="296" height="18" fill="#D14343"/>
  <text x="664" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#8776; 74 mR / shift</text>
  <text x="360" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Fails ALARA &#8212; avoidable dose accepted for convenience</text>

  <line x1="40" y1="232" x2="760" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- ===== PLAN B : collimated ===== -->
  <text x="40" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Plan B &#8212; collimated, beam into the berm</text>

  <!-- device + collimator + single narrow beam -->
  <rect x="70" y="326" width="34" height="22" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="104,330 120,325 120,349 104,344" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1"/>
  <polygon points="120,329 168,323 168,351 120,345" fill="#F2A33C" opacity="0.55"/>
  <rect x="168" y="316" width="12" height="44" fill="#5A6B7E"/>
  <text x="174" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">berm</text>

  <!-- radiographer behind wall at 15 m -->
  <rect x="222" y="306" width="8" height="54" fill="#5A6B7E"/>
  <circle cx="255" cy="314" r="7" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="321" x2="255" y2="344" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="327" x2="243" y2="337" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="327" x2="267" y2="334" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="344" x2="247" y2="358" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="255" y1="344" x2="263" y2="358" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="255" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">crank, 15 m + wall</text>

  <!-- stats B -->
  <text x="360" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Crank rate: &#8776; 11 mR/h</text>
  <text x="360" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Per shot &#8776; 0.4 mR &#183; Boundary &#8776; 35 m</text>
  <rect x="360" y="342" width="30" height="18" fill="#1E9E6A"/>
  <text x="398" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#8776; 7 mR / shift</text>
  <text x="360" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">ALARA &#8212; one tenth the dose, one third the boundary</text>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Shift-dose bars drawn to the same scale &#8212; the collimator is shielding you carry to the shot</text>
</svg>
