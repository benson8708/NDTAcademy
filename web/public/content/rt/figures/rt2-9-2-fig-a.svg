<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Simulated Casting Radiograph: Learn the Shapes</text>

  <!-- film -->
  <rect x="50" y="70" width="700" height="260" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="706" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2A3947">C-12</text>

  <!-- gas porosity cluster -->
  <circle cx="122" cy="140" r="4" fill="#243240"/>
  <circle cx="136" cy="132" r="3" fill="#243240"/>
  <circle cx="150" cy="142" r="4.5" fill="#243240"/>
  <circle cx="128" cy="158" r="3.5" fill="#243240"/>
  <circle cx="143" cy="154" r="3" fill="#243240"/>
  <circle cx="158" cy="150" r="4" fill="#243240"/>
  <circle cx="133" cy="168" r="3" fill="#243240"/>
  <circle cx="150" cy="166" r="3.5" fill="#243240"/>

  <!-- sponge shrinkage -->
  <ellipse cx="257" cy="232" rx="34" ry="24" fill="#34465A" opacity="0.55"/>
  <line x1="232" y1="218" x2="248" y2="230" stroke="#243240" stroke-width="2"/>
  <line x1="252" y1="212" x2="244" y2="228" stroke="#243240" stroke-width="2"/>
  <line x1="266" y1="214" x2="276" y2="230" stroke="#243240" stroke-width="2"/>
  <line x1="238" y1="240" x2="256" y2="236" stroke="#243240" stroke-width="2"/>
  <line x1="262" y1="238" x2="280" y2="246" stroke="#243240" stroke-width="2"/>
  <line x1="246" y1="248" x2="262" y2="252" stroke="#243240" stroke-width="2"/>
  <line x1="270" y1="222" x2="284" y2="218" stroke="#243240" stroke-width="2"/>
  <line x1="234" y1="230" x2="228" y2="244" stroke="#243240" stroke-width="2"/>

  <!-- filamentary (dendritic) shrinkage -->
  <polyline points="330,150 345,138 360,128 378,118" fill="none" stroke="#243240" stroke-width="2"/>
  <line x1="345" y1="138" x2="352" y2="124" stroke="#243240" stroke-width="1.8"/>
  <line x1="360" y1="128" x2="368" y2="140" stroke="#243240" stroke-width="1.8"/>
  <line x1="360" y1="128" x2="352" y2="112" stroke="#243240" stroke-width="1.8"/>
  <line x1="378" y1="118" x2="390" y2="108" stroke="#243240" stroke-width="1.8"/>
  <line x1="378" y1="118" x2="388" y2="128" stroke="#243240" stroke-width="1.8"/>

  <!-- sand inclusion -->
  <path d="M425,248 L437,240 L452,243 L463,252 L458,264 L443,268 L430,262 Z" fill="#243240"/>
  <circle cx="422" cy="244" r="2" fill="#34465A"/>
  <circle cx="466" cy="248" r="2" fill="#34465A"/>
  <circle cx="448" cy="271" r="2" fill="#34465A"/>
  <circle cx="436" cy="236" r="2" fill="#34465A"/>

  <!-- hot tear (ragged, branched) -->
  <polyline points="486,158 500,174 490,192 510,206 502,224" fill="none" stroke="#243240" stroke-width="3"/>
  <line x1="500" y1="174" x2="515" y2="166" stroke="#243240" stroke-width="2.2"/>
  <line x1="510" y1="206" x2="526" y2="212" stroke="#243240" stroke-width="2.2"/>

  <!-- cold shut (smooth line) -->
  <path d="M580,106 Q615,96 650,110" fill="none" stroke="#243240" stroke-width="2.5"/>

  <!-- mottling (diffraction artifact) -->
  <circle cx="638" cy="252" r="3" fill="#76879B"/>
  <circle cx="652" cy="246" r="2.5" fill="#76879B"/>
  <circle cx="668" cy="254" r="3" fill="#76879B"/>
  <circle cx="684" cy="248" r="2.5" fill="#76879B"/>
  <circle cx="644" cy="266" r="2.5" fill="#4A5A6C"/>
  <circle cx="660" cy="270" r="3" fill="#76879B"/>
  <circle cx="676" cy="266" r="2.5" fill="#4A5A6C"/>
  <circle cx="690" cy="262" r="3" fill="#76879B"/>
  <circle cx="650" cy="282" r="3" fill="#76879B"/>
  <circle cx="666" cy="286" r="2.5" fill="#4A5A6C"/>
  <circle cx="682" cy="280" r="3" fill="#76879B"/>

  <!-- unfused chaplet ring -->
  <circle cx="330" cy="300" r="15" fill="none" stroke="#243240" stroke-width="3"/>

  <!-- labels above film -->
  <text x="372" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Filamentary shrinkage</text>
  <line x1="372" y1="66" x2="364" y2="120" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="628" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Cold shut</text>
  <line x1="624" y1="66" x2="616" y2="96" stroke="#D9E0E8" stroke-width="1.2"/>

  <!-- labels below film, row 1 -->
  <text x="105" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Gas porosity</text>
  <line x1="137" y1="178" x2="110" y2="344" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="260" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Sponge shrinkage</text>
  <line x1="257" y1="262" x2="260" y2="344" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="440" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Sand inclusion</text>
  <line x1="445" y1="272" x2="440" y2="344" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="660" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Mottling (artifact)</text>
  <line x1="665" y1="294" x2="660" y2="344" stroke="#D9E0E8" stroke-width="1.2"/>

  <!-- labels below film, row 2 -->
  <text x="340" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Unfused chaplet ring</text>
  <line x1="332" y1="316" x2="341" y2="372" stroke="#D9E0E8" stroke-width="1.2"/>
  <text x="540" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Hot tear</text>
  <line x1="530" y1="228" x2="540" y2="372" stroke="#D9E0E8" stroke-width="1.2"/>

  <!-- footer note -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9FB3C8">Dark = missing metal · Light = denser metal · Verify density and IQI before identifying</text>
</svg>
