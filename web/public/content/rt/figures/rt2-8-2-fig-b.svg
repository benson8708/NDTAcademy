<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Why Projection Enlargement Needs a Microfocus Spot</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Same geometry both sides: part midway (t = d), so M = 2 and Ug = F t / d = F</text>

  <!-- LEFT: conventional -->
  <text x="220" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Conventional spot: F = 3 mm</text>
  <line x1="190" y1="108" x2="250" y2="108" stroke="#F2A33C" stroke-width="9"/>

  <text x="220" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fine detail pair</text>
  <rect x="210" y="225" width="6" height="12" fill="#0A2342"/>
  <rect x="224" y="225" width="6" height="12" fill="#0A2342"/>

  <line x1="190" y1="108" x2="250" y2="360" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="250" y1="108" x2="190" y2="360" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>

  <line x1="90" y1="360" x2="350" y2="360" stroke="#5A6B7E" stroke-width="5"/>
  <rect x="172" y="347" width="96" height="13" fill="#F2A33C"/>
  <text x="220" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">one smeared blob</text>
  <text x="220" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Ug = 3 mm swamps the detail</text>

  <!-- RIGHT: microfocus -->
  <text x="580" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Microfocus spot: F = 0.05 mm</text>
  <circle cx="580" cy="108" r="3.5" fill="#F2A33C"/>

  <rect x="570" y="225" width="6" height="12" fill="#0A2342"/>
  <rect x="584" y="225" width="6" height="12" fill="#0A2342"/>
  <text x="580" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">same detail pair</text>

  <line x1="580" y1="108" x2="566" y2="360" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="580" y1="108" x2="594" y2="360" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>

  <line x1="450" y1="360" x2="710" y2="360" stroke="#5A6B7E" stroke-width="5"/>
  <rect x="562" y="346" width="8" height="14" fill="#0A2342"/>
  <rect x="590" y="346" width="8" height="14" fill="#0A2342"/>
  <text x="580" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">two crisp separated images</text>
  <text x="580" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Ug = 0.05 mm - detail preserved at 2x</text>

  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Uses: electronics, thin investment castings, coarse-pixel digital detectors. Cost: low output, long exposures, small field.</text>
</svg>
