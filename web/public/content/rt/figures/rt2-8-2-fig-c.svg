<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Geometry Shows Up in the IQI First</text>

  <!-- Strip A: within limit -->
  <text x="70" y="66" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Ug within limit (0.015 in.)</text>
  <rect x="70" y="76" width="500" height="120" rx="8" fill="#46586C" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="130" y1="96" x2="130" y2="176" stroke="#E8F1FB" stroke-width="7"/>
  <line x1="200" y1="96" x2="200" y2="176" stroke="#E8F1FB" stroke-width="5.5"/>
  <line x1="270" y1="96" x2="270" y2="176" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="340" y1="96" x2="340" y2="176" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="410" y1="96" x2="410" y2="176" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="480" y1="96" x2="480" y2="176" stroke="#E8F1FB" stroke-width="1.2"/>
  <text x="70" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">wire diameter decreases</text>
  <line x1="268" y1="213" x2="340" y2="213" stroke="#D9E0E8" stroke-width="1.5"/>
  <polygon points="348,213 338,208 338,218" fill="#D9E0E8"/>
  <text x="590" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">All six wires resolve.</text>
  <text x="590" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Essential wire visible -</text>
  <text x="590" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">sensitivity met</text>

  <!-- Strip B: excess Ug -->
  <text x="70" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Excess Ug (0.045 in.)</text>
  <rect x="70" y="262" width="500" height="120" rx="8" fill="#46586C" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="130" y1="282" x2="130" y2="362" stroke="#E8F1FB" stroke-width="16" opacity="0.25"/>
  <line x1="130" y1="282" x2="130" y2="362" stroke="#E8F1FB" stroke-width="10" opacity="0.45"/>
  <line x1="130" y1="282" x2="130" y2="362" stroke="#E8F1FB" stroke-width="6" opacity="0.7"/>
  <line x1="200" y1="282" x2="200" y2="362" stroke="#E8F1FB" stroke-width="14" opacity="0.22"/>
  <line x1="200" y1="282" x2="200" y2="362" stroke="#E8F1FB" stroke-width="9" opacity="0.4"/>
  <line x1="200" y1="282" x2="200" y2="362" stroke="#E8F1FB" stroke-width="5" opacity="0.6"/>
  <line x1="270" y1="282" x2="270" y2="362" stroke="#E8F1FB" stroke-width="13" opacity="0.18"/>
  <line x1="270" y1="282" x2="270" y2="362" stroke="#E8F1FB" stroke-width="8" opacity="0.35"/>
  <line x1="270" y1="282" x2="270" y2="362" stroke="#E8F1FB" stroke-width="4" opacity="0.5"/>
  <line x1="340" y1="282" x2="340" y2="362" stroke="#E8F1FB" stroke-width="12" opacity="0.15"/>
  <line x1="340" y1="282" x2="340" y2="362" stroke="#E8F1FB" stroke-width="7" opacity="0.28"/>
  <line x1="410" y1="282" x2="410" y2="362" stroke="#E8F1FB" stroke-width="10" opacity="0.12"/>
  <line x1="480" y1="282" x2="480" y2="362" stroke="#E8F1FB" stroke-width="8" opacity="0.07"/>
  <circle cx="480" cy="322" r="22" fill="none" stroke="#D14343" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="480" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">essential wire gone</text>
  <text x="590" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Fine wires smeared away.</text>
  <text x="590" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Same film, same density -</text>
  <text x="590" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">sensitivity FAILED</text>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Density and contrast unchanged - geometry alone decides whether fine detail survives</text>
</svg>
