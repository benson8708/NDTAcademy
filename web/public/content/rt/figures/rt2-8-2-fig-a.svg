<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Shadow Geometry: Penumbra and Magnification</text>
  <line x1="405" y1="62" x2="405" y2="432" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- LEFT: unsharpness -->
  <text x="220" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Geometric unsharpness</text>

  <!-- finite source bar -->
  <line x1="170" y1="90" x2="230" y2="90" stroke="#F2A33C" stroke-width="9"/>
  <line x1="170" y1="74" x2="230" y2="74" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="170,74 178,70 178,78" fill="#5A6B7E"/>
  <polygon points="230,74 222,70 222,78" fill="#5A6B7E"/>
  <text x="240" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">F (source size)</text>

  <!-- object -->
  <rect x="200" y="270" width="80" height="22" fill="#0A2342"/>
  <text x="190" y="286" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">object</text>

  <!-- rays past right edge -->
  <line x1="170" y1="90" x2="359" y2="400" stroke="#1B82E8" stroke-width="1.8"/>
  <line x1="230" y1="90" x2="316" y2="400" stroke="#1B82E8" stroke-width="1.8"/>

  <!-- film -->
  <line x1="60" y1="400" x2="392" y2="400" stroke="#5A6B7E" stroke-width="6"/>
  <text x="64" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">film</text>

  <!-- shadow bands -->
  <rect x="222" y="396" width="94" height="8" fill="#0A2342"/>
  <rect x="316" y="396" width="43" height="8" fill="#D14343"/>
  <text x="269" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sharp shadow</text>
  <text x="345" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Ug (penumbra)</text>

  <!-- dimensions d and t -->
  <line x1="85" y1="92" x2="85" y2="268" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="85,90 81,98 89,98" fill="#5A6B7E"/>
  <polygon points="85,270 81,262 89,262" fill="#5A6B7E"/>
  <text x="70" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">d</text>
  <line x1="85" y1="274" x2="85" y2="396" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="85,272 81,280 89,280" fill="#5A6B7E"/>
  <polygon points="85,398 81,390 89,390" fill="#5A6B7E"/>
  <text x="70" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">t</text>

  <!-- formula -->
  <text x="180" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">Ug = F t / d</text>

  <!-- RIGHT: magnification -->
  <text x="590" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Magnification</text>

  <circle cx="560" cy="86" r="5" fill="#F2A33C"/>
  <text x="575" y="82" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">source</text>

  <rect x="520" y="240" width="80" height="10" fill="#0A2342"/>
  <text x="508" y="250" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">object</text>

  <line x1="560" y1="86" x2="478" y2="400" stroke="#1B82E8" stroke-width="1.8"/>
  <line x1="560" y1="86" x2="642" y2="400" stroke="#1B82E8" stroke-width="1.8"/>

  <line x1="440" y1="400" x2="750" y2="400" stroke="#5A6B7E" stroke-width="6"/>
  <rect x="478" y="395" width="164" height="9" fill="#1B82E8"/>
  <text x="560" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">image (enlarged about 2x)</text>

  <text x="676" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">M = (d + t) / d</text>
  <text x="676" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">here d = t, so M = 2</text>

  <line x1="730" y1="88" x2="730" y2="238" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="730,86 726,94 734,94" fill="#5A6B7E"/>
  <polygon points="730,240 726,232 734,232" fill="#5A6B7E"/>
  <text x="744" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">d</text>
  <line x1="730" y1="244" x2="730" y2="396" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="730,242 726,250 734,250" fill="#5A6B7E"/>
  <polygon points="730,398 726,390 734,390" fill="#5A6B7E"/>
  <text x="744" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">t</text>

  <text x="590" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">tilt or offset adds distortion - keep beam, part, film square</text>
</svg>
