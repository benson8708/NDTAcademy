<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Darkroom Layout - Plan View</text>

  <!-- room shell -->
  <rect x="60" y="60" width="560" height="345" fill="#E8F1FB" opacity="0.35"/>
  <rect x="60" y="60" width="560" height="345" fill="none" stroke="#0A2342" stroke-width="4"/>

  <!-- light-trap maze entrance (bottom-left) -->
  <rect x="56" y="318" width="8" height="44" fill="#FFFFFF"/>
  <rect x="60" y="306" width="170" height="8" fill="#0A2342"/>
  <rect x="60" y="370" width="240" height="8" fill="#0A2342"/>
  <polyline points="20,340 240,340 240,296" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="7 5"/>
  <polygon points="234,298 240,284 246,298" fill="#F2A33C"/>
  <text x="170" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Light-trap maze entrance</text>

  <!-- dry/wet divider -->
  <line x1="330" y1="66" x2="330" y2="300" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="195" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">DRY SIDE</text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">WET SIDE</text>

  <!-- pass-through hatch on top wall -->
  <rect x="240" y="54" width="70" height="14" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="275" y1="68" x2="275" y2="88" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="275" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pass-through hatch</text>

  <!-- safelight over bench -->
  <circle cx="140" cy="108" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="133" y1="115" x2="102" y2="130" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="147" y1="115" x2="178" y2="130" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- loading bench + film bin (dry side) -->
  <rect x="90" y="130" width="200" height="42" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="190" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Loading bench</text>
  <rect x="110" y="190" width="120" height="36" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="170" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Film bin</text>
  <text x="170" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(light-tight)</text>

  <!-- safelight over tanks -->
  <circle cx="470" cy="120" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="463" y1="127" x2="432" y2="148" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="477" y1="127" x2="508" y2="148" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- processing tank line (wet side) -->
  <rect x="360" y="150" width="52" height="64" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="420" y="150" width="52" height="64" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="480" y="150" width="52" height="64" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <rect x="540" y="150" width="52" height="64" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="386" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">DEV</text>
  <text x="446" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">STOP</text>
  <text x="506" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">FIX</text>
  <text x="566" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">WASH</text>
  <text x="476" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Processing tank line</text>

  <!-- sink -->
  <rect x="360" y="300" width="70" height="44" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="395" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sink</text>

  <!-- drying cabinet -->
  <rect x="470" y="290" width="130" height="70" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="505" cy="325" r="14" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="505" y1="311" x2="505" y2="339" stroke="#F2A33C" stroke-width="2"/>
  <line x1="491" y1="325" x2="519" y2="325" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 540 305 q 6 10 0 20 q -6 10 0 20" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 560 305 q 6 10 0 20 q -6 10 0 20" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="535" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Drying cabinet</text>

  <!-- light-trapped vent on right wall -->
  <rect x="610" y="170" width="16" height="46" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="612" y1="182" x2="624" y2="182" stroke="#0A2342" stroke-width="2"/>
  <line x1="612" y1="193" x2="624" y2="193" stroke="#0A2342" stroke-width="2"/>
  <line x1="612" y1="204" x2="624" y2="204" stroke="#0A2342" stroke-width="2"/>
  <line x1="628" y1="193" x2="656" y2="193" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="660" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Light-trapped vent</text>

  <!-- legend -->
  <circle cx="652" cy="250" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="668" y="255" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Safelight: 15 W,</text>
  <text x="668" y="275" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">filtered, 4 ft min</text>
  <rect x="644" y="296" width="18" height="10" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="668" y="306" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cassette hatch</text>

  <!-- bottom note -->
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Dry side and wet side stay separated - film never shares a surface with chemistry.</text>
</svg>
