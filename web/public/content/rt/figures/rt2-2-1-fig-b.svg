<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Safelight Rules and the Coin Fog Test</text>

  <!-- LEFT: safelight geometry -->
  <line x1="40" y1="70" x2="390" y2="70" stroke="#0A2342" stroke-width="3"/>
  <rect x="150" y="70" width="90" height="26" fill="#0A2342"/>
  <rect x="150" y="96" width="90" height="8" fill="#D14343"/>
  <text x="142" y="86" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Safelight fixture</text>
  <text x="142" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Matched filter</text>

  <!-- light cone -->
  <line x1="170" y1="104" x2="112" y2="328" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="220" y1="104" x2="296" y2="328" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- distance arrow -->
  <line x1="195" y1="116" x2="195" y2="322" stroke="#0A2342" stroke-width="2"/>
  <polygon points="189,120 195,106 201,120" fill="#0A2342"/>
  <polygon points="189,318 195,332 201,318" fill="#0A2342"/>
  <text x="210" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">at least 4 ft</text>
  <text x="210" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(1.2 m)</text>

  <!-- indirect option -->
  <line x1="318" y1="150" x2="350" y2="78" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="350" y1="78" x2="376" y2="136" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="370,132 379,143 380,128" fill="#5A6B7E"/>
  <text x="348" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Indirect fixture:</text>
  <text x="348" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">bounce, ~25 W</text>

  <!-- bench with film and coins -->
  <rect x="150" y="322" width="90" height="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="175" cy="326" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="215" cy="326" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="80" y="330" width="250" height="16" fill="#5A6B7E"/>
  <rect x="95" y="346" width="10" height="40" fill="#5A6B7E"/>
  <rect x="295" y="346" width="10" height="40" fill="#5A6B7E"/>
  <text x="205" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Loading bench - film with coins on top</text>

  <!-- divider -->
  <line x1="410" y1="60" x2="410" y2="420" stroke="#D9E0E8" stroke-width="2"/>

  <!-- RIGHT: fog test -->
  <text x="435" y="82" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1. Film flat on the bench, coins on top</text>
  <text x="435" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2. Safelights on for the longest normal</text>
  <text x="455" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">handling time</text>
  <text x="435" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3. Process and look for coin outlines</text>

  <text x="590" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Processed test film</text>
  <rect x="470" y="192" width="240" height="140" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="545" cy="240" r="26" fill="#D9E0E8"/>
  <circle cx="635" cy="284" r="26" fill="#D9E0E8"/>

  <text x="600" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Visible coin outline = safelights fog film</text>
  <text x="600" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Typical acceptance: added fog no more than</text>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">about 0.05 density in max handling time</text>
</svg>
