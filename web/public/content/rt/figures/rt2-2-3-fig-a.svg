<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Manual Processing Line - Steps, Times, Temperatures</text>

  <!-- station 1: developer -->
  <rect x="38" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="44" y="150" width="92" height="84" fill="#1B82E8" opacity="0.85"/>
  <line x1="90" y1="108" x2="90" y2="132" stroke="#0A2342" stroke-width="2"/>
  <rect x="75" y="132" width="30" height="46" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="54" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">1</text>
  <text x="90" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">DEVELOP</text>
  <text x="90" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5 min @ 68 °F</text>
  <text x="90" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">agitate each min</text>

  <!-- station 2: stop -->
  <rect x="160" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="166" y="150" width="92" height="84" fill="#5A6B7E" opacity="0.85"/>
  <text x="176" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">2</text>
  <text x="212" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">STOP</text>
  <text x="212" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">30-60 s</text>
  <text x="212" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">1-3% acetic</text>

  <!-- station 3: fix -->
  <rect x="282" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="288" y="150" width="92" height="84" fill="#1E9E6A" opacity="0.85"/>
  <text x="298" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">3</text>
  <text x="334" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">FIX</text>
  <text x="334" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2 x clearing</text>
  <text x="334" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">time</text>

  <!-- station 4: wash -->
  <rect x="404" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="410" y="150" width="92" height="84" fill="#E8F1FB"/>
  <path d="M 418 170 q 10 -8 20 0 t 20 0 t 20 0 t 16 0" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 418 196 q 10 -8 20 0 t 20 0 t 20 0 t 16 0" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <text x="420" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">4</text>
  <text x="456" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">WASH</text>
  <text x="456" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20-30 min</text>
  <text x="456" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">running water</text>

  <!-- station 5: wetting agent -->
  <rect x="526" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="532" y="150" width="92" height="84" fill="#1B82E8" opacity="0.35"/>
  <text x="542" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">5</text>
  <text x="578" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">WETTING</text>
  <text x="578" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">AGENT</text>
  <text x="578" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">about 30 s</text>

  <!-- station 6: dry -->
  <rect x="648" y="120" width="104" height="120" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="700" cy="160" r="13" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="700" y1="147" x2="700" y2="173" stroke="#F2A33C" stroke-width="2"/>
  <line x1="687" y1="160" x2="713" y2="160" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 682 185 q 6 12 0 24 q -6 12 0 24" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 700 185 q 6 12 0 24 q -6 12 0 24" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 718 185 q 6 12 0 24 q -6 12 0 24" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="664" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">6</text>
  <text x="700" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">DRY</text>
  <text x="700" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">filtered air</text>
  <text x="700" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">100-120 °F</text>

  <!-- arrows between stations -->
  <line x1="144" y1="180" x2="156" y2="180" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="154,174 162,180 154,186" fill="#F2A33C"/>
  <line x1="266" y1="180" x2="278" y2="180" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="276,174 284,180 276,186" fill="#F2A33C"/>
  <line x1="388" y1="180" x2="400" y2="180" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="398,174 406,180 398,186" fill="#F2A33C"/>
  <line x1="510" y1="180" x2="522" y2="180" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="520,174 528,180 520,186" fill="#F2A33C"/>
  <line x1="632" y1="180" x2="644" y2="180" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="642,174 650,180 642,186" fill="#F2A33C"/>

  <!-- notes -->
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Keep every bath within about 5 °F of the developer - temperature shock causes reticulation.</text>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Time by the chart, never by sight - tap in, then agitate the developer about once a minute.</text>
</svg>
