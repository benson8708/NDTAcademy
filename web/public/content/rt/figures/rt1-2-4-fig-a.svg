<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">X-ray Tube Cutaway</text>

  <!-- high-voltage supply -->
  <rect x="300" y="52" width="200" height="36" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#F2A33C" stroke-width="2"/>
  <text x="400" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">High voltage (kV) = photon ENERGY</text>
  <line x1="310" y1="88" x2="216" y2="158" stroke="#F2A33C" stroke-width="2"/>
  <line x1="490" y1="88" x2="586" y2="150" stroke="#F2A33C" stroke-width="2"/>
  <text x="246" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">&#8722;</text>
  <text x="556" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">+</text>

  <!-- vacuum envelope -->
  <ellipse cx="400" cy="225" rx="266" ry="100" fill="#1B82E8" fill-opacity="0.10" stroke="#E8F1FB" stroke-width="3"/>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">evacuated glass / metal envelope</text>

  <!-- cathode assembly -->
  <path d="M 196 195 L 232 195 L 232 255 L 196 255" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <!-- filament coil -->
  <circle cx="240" cy="207" r="5" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <circle cx="240" cy="219" r="5" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <circle cx="240" cy="231" r="5" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <circle cx="240" cy="243" r="5" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="150" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">Cathode</text>
  <text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">filament + </text>
  <text x="150" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">focusing cup</text>
  <text x="150" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">mA = electron</text>
  <text x="150" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">supply = INTENSITY</text>

  <!-- electron stream -->
  <line x1="256" y1="225" x2="544" y2="225" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="10 7"/>
  <polygon points="542,217 562,225 542,233" fill="#1E9E6A"/>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">electrons accelerated by kV</text>

  <!-- anode: copper block with angled tungsten target -->
  <rect x="568" y="180" width="64" height="90" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="568,200 596,258 568,258" fill="#F2A33C" stroke="#FFFFFF" stroke-width="2"/>
  <text x="660" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D9E0E8">Anode (copper)</text>
  <line x1="586" y1="222" x2="668" y2="206" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="694" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">angled tungsten</text>
  <text x="694" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">target (focal spot)</text>

  <!-- heat note -->
  <text x="660" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">~99% of energy</text>
  <text x="660" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">becomes HEAT here</text>

  <!-- X-ray beam exiting downward through port -->
  <polygon points="576,252 500,420 648,420" fill="#1B82E8" fill-opacity="0.30" stroke="#1B82E8" stroke-width="2"/>
  <line x1="540" y1="324" x2="520" y2="318" stroke="none"/>
  <text x="574" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">X-ray beam (~1%)</text>
  <rect x="536" y="318" width="80" height="8" fill="#0A2342" stroke="#E8F1FB" stroke-width="2"/>
  <text x="468" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">beam port / window</text>

  <!-- bottom strip notes -->
  <rect x="60" y="412" width="380" height="30" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="250" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">kV knob = quality (penetration) &#183; mA knob = quantity</text>
</svg>
