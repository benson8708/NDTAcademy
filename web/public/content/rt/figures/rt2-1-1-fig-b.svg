<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Ir-192 Decay: Half the Activity Every 74 Days</text>

  <!-- gridlines -->
  <line x1="80" y1="305" x2="750" y2="305" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="80" y1="230" x2="750" y2="230" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="80" y1="155" x2="750" y2="155" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="80" y1="80" x2="750" y2="80" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="245" y1="80" x2="245" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="410" y1="80" x2="410" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="575" y1="80" x2="575" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="740" y1="80" x2="740" y2="380" stroke="#D9E0E8" stroke-width="1"/>

  <!-- axes -->
  <line x1="80" y1="380" x2="750" y2="380" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="80" y1="380" x2="80" y2="70" stroke="#0A2342" stroke-width="2.5"/>
  <text x="72" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="72" y="310" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">25</text>
  <text x="72" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50</text>
  <text x="72" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">75</text>
  <text x="72" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="80" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="245" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">74</text>
  <text x="410" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">148</text>
  <text x="575" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">222</text>
  <text x="740" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">296</text>
  <text x="415" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Days since assay</text>
  <text x="86" y="62" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Activity (curies)</text>

  <!-- halving guide lines -->
  <line x1="245" y1="230" x2="245" y2="380" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="80" y1="230" x2="245" y2="230" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="410" y1="305" x2="410" y2="380" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="80" y1="305" x2="410" y2="305" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="575" y1="342" x2="575" y2="380" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="80" y1="342" x2="575" y2="342" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- decay curve -->
  <polyline points="80,80 135.8,142.7 191.6,192.2 245,230 303.2,262.4 359,287 410,305 470.6,321.8 526.4,333.8 575,342.5 638,351.2 693.7,357.2 740,361.3" fill="none" stroke="#1B82E8" stroke-width="3.5"/>

  <!-- halving points -->
  <circle cx="80" cy="80" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="245" cy="230" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="410" cy="305" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="575" cy="342.5" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="740" cy="361.3" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <text x="98" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">100 Ci</text>
  <text x="258" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">50 Ci</text>
  <text x="422" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">25 Ci</text>
  <text x="587" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">12.5 Ci</text>
  <text x="735" y="350" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">6.25 Ci</text>

  <!-- formula -->
  <text x="500" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0A2342">A = A₀ × (½)^(t / 74 d)</text>

  <!-- halving table -->
  <rect x="520" y="140" width="215" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="535" y="163" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Days</text>
  <text x="660" y="163" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Curies</text>
  <line x1="530" y1="170" x2="725" y2="170" stroke="#0A2342" stroke-width="1"/>
  <text x="535" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="660" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="535" y="207" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">74</text>
  <text x="660" y="207" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50</text>
  <text x="535" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">148</text>
  <text x="660" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">25</text>
  <text x="535" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">222</text>
  <text x="660" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">12.5</text>
  <text x="535" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">296</text>
  <text x="660" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">6.25</text>
</svg>
