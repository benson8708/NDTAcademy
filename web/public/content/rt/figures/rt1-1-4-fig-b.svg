<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Stable Isotope vs. Radioisotope: Cobalt</text>

  <!-- left: Co-59 -->
  <circle cx="170" cy="210" r="62" fill="#1B82E8" fill-opacity="0.25" stroke="#1E9E6A" stroke-width="4"/>
  <text x="170" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Co-59</text>
  <text x="170" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">27 p / 32 n</text>
  <rect x="110" y="292" width="120" height="30" rx="15" fill="#1E9E6A"/>
  <text x="170" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">STABLE</text>
  <text x="170" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Natural cobalt:</text>
  <text x="170" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">never decays</text>

  <!-- middle: neutron capture -->
  <circle cx="318" cy="160" r="11" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="318" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">+ 1 neutron</text>
  <line x1="318" y1="173" x2="318" y2="198" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="311,196 318,210 325,196" fill="#D9E0E8"/>
  <line x1="242" y1="210" x2="368" y2="210" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="366,201 388,210 366,219" fill="#F2A33C"/>
  <text x="312" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">neutron activation</text>
  <text x="312" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">(in a reactor)</text>

  <!-- right: Co-60 -->
  <circle cx="470" cy="210" r="62" fill="#1B82E8" fill-opacity="0.25" stroke="#D14343" stroke-width="4"/>
  <text x="470" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Co-60</text>
  <text x="470" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">27 p / 33 n</text>
  <rect x="396" y="292" width="148" height="30" rx="15" fill="#D14343"/>
  <text x="470" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RADIOISOTOPE</text>
  <text x="470" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Unstable nucleus:</text>
  <text x="470" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">decays on its own schedule</text>

  <!-- decay emissions -->
  <line x1="528" y1="172" x2="616" y2="124" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="610,116 632,116 618,134" fill="#F2A33C"/>
  <line x1="532" y1="206" x2="624" y2="196" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="618,188 640,196 620,208" fill="#F2A33C"/>
  <text x="652" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">γ 1.17 MeV</text>
  <text x="652" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">γ 1.33 MeV</text>
  <text x="652" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">(plus a beta particle)</text>

  <!-- half-life note -->
  <rect x="80" y="398" width="640" height="40" rx="8" fill="#FFFFFF" fill-opacity="0.08" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Half-life of Co-60 ≈ 5.27 years.  Same recipe makes Ir-192 (T½ ≈ 74 days) from Ir-191.</text>
</svg>
