<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">How Photons Interact with Matter</text>

  <!-- panel dividers -->
  <line x1="270" y1="56" x2="270" y2="394" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="535" y1="56" x2="535" y2="394" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ================= PANEL 1: PHOTOELECTRIC ================= -->
  <text x="145" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">1. Photoelectric effect</text>

  <!-- atom -->
  <circle cx="160" cy="225" r="52" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="160" cy="225" r="28" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="160" cy="225" r="8" fill="#0A2342"/>
  <circle cx="212" cy="225" r="4" fill="#1B82E8"/>
  <circle cx="160" cy="277" r="4" fill="#1B82E8"/>
  <circle cx="160" cy="197" r="4" fill="#1B82E8"/>

  <!-- incident photon (zigzag) -->
  <polyline points="30,160 44,152 58,168 72,152 86,168 100,152 114,168 128,158" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="126,150 142,162 124,168" fill="#F2A33C"/>
  <text x="28" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Photon in</text>

  <!-- interaction burst at inner shell -->
  <polygon points="140,200 146,191 149,201 159,198 152,206 160,212 149,211 146,221 142,210 132,212" fill="#F2A33C"/>

  <!-- ejected photoelectron -->
  <line x1="150" y1="196" x2="216" y2="124" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="209,118 226,114 217,129" fill="#1B82E8"/>
  <text x="196" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Photoelectron</text>

  <!-- notes -->
  <text x="145" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Photon totally absorbed;</text>
  <text x="145" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">characteristic X-ray follows</text>
  <text x="145" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Dominates: low energy</text>
  <text x="145" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Probability ~ Z&#8308; / E&#179;</text>

  <!-- ================= PANEL 2: COMPTON ================= -->
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">2. Compton scattering</text>

  <!-- atom -->
  <circle cx="400" cy="230" r="50" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="26" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="8" fill="#0A2342"/>
  <circle cx="400" cy="280" r="4" fill="#1B82E8"/>
  <circle cx="426" cy="230" r="4" fill="#1B82E8"/>

  <!-- incident photon -->
  <polyline points="290,182 303,174 316,190 329,174 342,190 355,174 366,186" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="362,178 378,188 360,196" fill="#F2A33C"/>
  <text x="288" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Photon in</text>

  <!-- interaction burst at outer shell -->
  <polygon points="372,202 378,193 381,203 391,200 384,208 392,214 381,213 378,223 374,212 364,214" fill="#F2A33C"/>

  <!-- scattered photon (lower energy, deflected) -->
  <polyline points="382,214 396,226 404,244 420,252 428,270 444,278 452,292" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="444,292 460,300 446,306" fill="#F2A33C"/>
  <text x="468" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Scattered photon</text>
  <text x="468" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(lower energy)</text>

  <!-- recoil electron -->
  <line x1="380" y1="206" x2="466" y2="142" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="459,136 476,134 466,148" fill="#1B82E8"/>
  <text x="455" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Recoil electron</text>

  <!-- notes -->
  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Dominates: ~0.1&#8211;10 MeV in steel</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Main source of scatter and fog</text>

  <!-- ================= PANEL 3: PAIR PRODUCTION ================= -->
  <text x="665" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">3. Pair production</text>

  <!-- nucleus -->
  <circle cx="660" cy="225" r="11" fill="#0A2342"/>
  <text x="660" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Nucleus</text>

  <!-- incident photon -->
  <polyline points="552,182 565,174 578,190 591,174 604,190 617,174 630,188" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="626,180 642,192 624,198" fill="#F2A33C"/>
  <text x="552" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Photon &#8805; 1.022 MeV</text>

  <!-- electron out -->
  <line x1="668" y1="216" x2="742" y2="158" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="735,152 752,150 742,164" fill="#1B82E8"/>
  <text x="762" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">e&#8722;</text>

  <!-- positron out -->
  <line x1="666" y1="234" x2="724" y2="294" stroke="#D14343" stroke-width="3"/>
  <polygon points="717,300 730,312 731,295" fill="#D14343"/>
  <text x="746" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">e+</text>

  <!-- annihilation -->
  <polygon points="724,306 729,298 732,307 741,305 734,312 741,318 731,317 728,326 725,316 716,317" fill="#F2A33C"/>
  <line x1="716" y1="324" x2="678" y2="336" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="680,330 668,339 684,342" fill="#F2A33C"/>
  <line x1="738" y1="318" x2="774" y2="308" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="770,302 784,305 772,315" fill="#F2A33C"/>
  <text x="665" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Annihilation: two 0.511 MeV photons</text>

  <!-- notes -->
  <text x="665" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">High energy only; grows with Z&#178;</text>

  <!-- bottom rule -->
  <line x1="30" y1="404" x2="770" y2="404" stroke="#D9E0E8" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Photon energy and absorber atomic number decide which interaction dominates</text>
</svg>
