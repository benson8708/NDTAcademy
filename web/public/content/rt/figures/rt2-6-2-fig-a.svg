<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Survey Instrument Operating Ranges (typical)</text>

  <!-- reference markers (vertical dashed lines) -->
  <line x1="348" y1="72" x2="348" y2="360" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="352" y="66" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">2 mR/h boundary</text>
  <line x1="527" y1="72" x2="527" y2="360" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="531" y="66" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">500 mR/h alarm point</text>
  <line x1="655" y1="86" x2="655" y2="360" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="796" y="92" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">open 50 Ci at 1 m</text>

  <!-- scintillation band -->
  <text x="100" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Scintillation (&#181;R-class) &#8212; lost-source and cleared-area work</text>
  <rect x="100" y="128" width="225" height="34" rx="8" fill="#1E9E6A" opacity="0.85"/>

  <!-- GM band with saturation zone -->
  <text x="250" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Geiger-M&#252;ller</text>
  <text x="502" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">saturation &#8212; may read LOW</text>
  <rect x="250" y="204" width="248" height="34" rx="8" fill="#1B82E8"/>
  <rect x="498" y="204" width="202" height="34" rx="8" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- ion chamber band -->
  <text x="325" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Ion chamber &#8212; boundary and approach surveys</text>
  <rect x="325" y="280" width="352" height="34" rx="8" fill="#F2A33C"/>

  <!-- axis -->
  <line x1="100" y1="360" x2="700" y2="360" stroke="#0A2342" stroke-width="2"/>
  <line x1="100" y1="354" x2="100" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="175" y1="354" x2="175" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="250" y1="354" x2="250" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="325" y1="354" x2="325" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="400" y1="354" x2="400" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="475" y1="354" x2="475" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="550" y1="354" x2="550" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="625" y1="354" x2="625" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="700" y1="354" x2="700" y2="366" stroke="#0A2342" stroke-width="2"/>
  <text x="100" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.001</text>
  <text x="175" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.01</text>
  <text x="250" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.1</text>
  <text x="325" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10</text>
  <text x="475" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="550" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1k</text>
  <text x="625" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10k</text>
  <text x="700" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100k</text>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Dose rate, mR/h (log scale)</text>

  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Typical ranges &#8212; verify against your instrument's manual and calibration sheet</text>
</svg>
