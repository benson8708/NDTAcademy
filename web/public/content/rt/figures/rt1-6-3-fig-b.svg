<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Industrial X-ray Film, Layer by Layer</text>

  <!-- layer stack (magnified, not to scale) -->
  <rect x="220" y="84" width="360" height="12" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="96" width="360" height="30" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="126" width="360" height="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="134" width="360" height="84" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="218" width="360" height="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="226" width="360" height="30" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="220" y="256" width="360" height="12" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- silver halide grains in both emulsions -->
  <circle cx="260" cy="111" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="320" cy="106" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="380" cy="113" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="440" cy="107" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="500" cy="112" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="550" cy="106" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="275" cy="241" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="335" cy="236" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="395" cy="243" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="455" cy="237" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="515" cy="242" r="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>

  <!-- labels left side -->
  <line x1="220" y1="90" x2="150" y2="90" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="144" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Supercoat</text>
  <line x1="220" y1="111" x2="150" y2="111" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="144" y="116" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Emulsion</text>
  <line x1="220" y1="130" x2="150" y2="130" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="144" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Subbing</text>

  <!-- labels right side -->
  <line x1="580" y1="176" x2="640" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="646" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Polyester base</text>
  <text x="646" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">≈ 0.007 in., blue-tinted,</text>
  <text x="646" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dimensionally stable</text>
  <line x1="580" y1="241" x2="640" y2="241" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="646" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Emulsion (both sides)</text>
  <line x1="580" y1="262" x2="640" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="646" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Supercoat</text>

  <!-- grain callout -->
  <line x1="380" y1="113" x2="330" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="330" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Silver halide grains in gelatin - exposed grains form the latent image</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Emulsion on BOTH sides roughly doubles speed and attainable density</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Cross-section magnified - layers not to scale. Finer grain = slower film = sharper image.</text>
</svg>
