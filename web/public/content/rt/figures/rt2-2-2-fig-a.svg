<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Inside a Loaded Film Holder - Cross-Section</text>

  <!-- radiation arrows -->
  <line x1="260" y1="58" x2="260" y2="92" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="254,90 266,90 260,102" fill="#F2A33C"/>
  <line x1="340" y1="58" x2="340" y2="92" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="334,90 346,90 340,102" fill="#F2A33C"/>
  <line x1="420" y1="58" x2="420" y2="92" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="414,90 426,90 420,102" fill="#F2A33C"/>
  <text x="450" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Radiation from source side</text>

  <!-- layer stack (exploded) -->
  <rect x="180" y="110" width="340" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="180" y="142" width="340" height="12" fill="#5A6B7E"/>
  <rect x="180" y="166" width="340" height="24" fill="#1B82E8"/>
  <rect x="180" y="166" width="340" height="5" fill="#0A2342"/>
  <rect x="180" y="185" width="340" height="5" fill="#0A2342"/>
  <rect x="180" y="202" width="340" height="16" fill="#5A6B7E"/>
  <rect x="180" y="230" width="340" height="14" fill="#0A2342"/>
  <rect x="180" y="256" width="340" height="18" fill="#F2A33C" opacity="0.75" stroke="#0A2342" stroke-width="1"/>
  <rect x="180" y="286" width="340" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>

  <!-- leader lines + labels (right) -->
  <line x1="520" y1="120" x2="545" y2="118" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="123" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Holder front (low-absorption face)</text>
  <line x1="520" y1="148" x2="545" y2="148" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Front lead screen - 0.005 in.</text>
  <line x1="520" y1="178" x2="545" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Double-emulsion film</text>
  <text x="550" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(emulsion on both faces)</text>
  <line x1="520" y1="210" x2="545" y2="212" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="217" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Back lead screen - 0.010 in.</text>
  <line x1="520" y1="237" x2="545" y2="239" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Backing lead - stops backscatter</text>
  <line x1="520" y1="265" x2="545" y2="267" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pressure pad - even contact</text>
  <line x1="520" y1="296" x2="545" y2="296" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="550" y="301" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Holder back</text>

  <!-- contact bracket (left) -->
  <path d="M 158 142 L 150 142 L 150 218 L 158 218" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="28" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Screens and film</text>
  <text x="28" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">in tight, uniform</text>
  <text x="28" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">contact</text>

  <!-- bottom note -->
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Dirt, dents, scratches, or lint between screen and film print on the radiograph</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">as false indications - inspect and clean screens at every loading.</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Thinner screen faces the source; thicker screen and backing lead sit behind the film.</text>
</svg>
