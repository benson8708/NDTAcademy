<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">X-ray Exposure Chart — Steel</text>
  <text x="132" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Exposure (mA·min, log scale)</text>

  <!-- minor log gridlines -->
  <line x1="130" y1="327.9" x2="710" y2="327.9" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="130" y1="272.1" x2="710" y2="272.1" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="130" y1="187.9" x2="710" y2="187.9" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="130" y1="132.1" x2="710" y2="132.1" stroke="#D9E0E8" stroke-width="1"/>
  <!-- major gridlines -->
  <line x1="130" y1="230" x2="710" y2="230" stroke="#D9E0E8" stroke-width="1.8"/>
  <line x1="130" y1="90" x2="710" y2="90" stroke="#D9E0E8" stroke-width="1.8"/>
  <line x1="275" y1="90" x2="275" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="420" y1="90" x2="420" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="565" y1="90" x2="565" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="710" y1="90" x2="710" y2="370" stroke="#D9E0E8" stroke-width="1"/>

  <!-- axes -->
  <line x1="130" y1="370" x2="710" y2="370" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="130" y1="370" x2="130" y2="90" stroke="#0A2342" stroke-width="2.5"/>
  <text x="122" y="375" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="122" y="333" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2</text>
  <text x="122" y="277" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">5</text>
  <text x="122" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10</text>
  <text x="122" y="193" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">20</text>
  <text x="122" y="137" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">50</text>
  <text x="122" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="130" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="275" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.5</text>
  <text x="420" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.0</text>
  <text x="565" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.5</text>
  <text x="710" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.0</text>
  <text x="420" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Steel thickness (inches)</text>

  <!-- worked example trace: 1.0 in at 200 kV -->
  <line x1="420" y1="370" x2="420" y2="215.8" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="420" y1="215.8" x2="130" y2="215.8" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 5"/>
  <polygon points="138,210 130,215.8 138,221.6" fill="#F2A33C"/>
  <text x="140" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">≈ 13 mA·min</text>
  <text x="428" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">1.0 in.</text>

  <!-- kV curves -->
  <line x1="202.5" y1="285.7" x2="492.5" y2="90" stroke="#D14343" stroke-width="3"/>
  <line x1="202.5" y1="327.9" x2="637.5" y2="103.6" stroke="#1B82E8" stroke-width="3"/>
  <line x1="202.5" y1="349.5" x2="710" y2="121.1" stroke="#1E9E6A" stroke-width="3"/>
  <text x="196" y="282" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">160 kV</text>
  <text x="196" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">200 kV</text>
  <text x="196" y="356" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">240 kV</text>
  <text x="500" y="104" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">160 kV</text>
  <text x="645" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">200 kV</text>
  <text x="700" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">240 kV</text>

  <!-- chart conditions box -->
  <rect x="480" y="300" width="222" height="58" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="491" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film class II · density 2.0</text>
  <text x="491" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">SFD 36 in. · lead screens</text>
</svg>
