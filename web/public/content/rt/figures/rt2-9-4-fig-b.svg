<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Evaluate in Order: From Film Quality to Disposition</text>

  <!-- row 1 -->
  <rect x="45" y="64" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="152" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 · VERIFY FILM QUALITY</text>
  <text x="152" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Density in window,</text>
  <text x="152" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IQI sensitivity shown,</text>
  <text x="152" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ID + location markers</text>

  <line x1="260" y1="118" x2="284" y2="118" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="284,112 296,118 284,124" fill="#1B82E8"/>

  <rect x="296" y="64" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="403" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 · RULE OUT ARTIFACTS</text>
  <text x="403" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crimp, static, pressure</text>
  <text x="403" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">marks live in emulsion:</text>
  <text x="403" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">tilt in reflected light</text>

  <line x1="511" y1="118" x2="535" y2="118" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="535,112 547,118 535,124" fill="#1B82E8"/>

  <rect x="547" y="64" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="654" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 · LOCATE + CLASSIFY</text>
  <text x="654" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Centerline? Bevel? Toe?</text>
  <text x="654" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Rounded vs linear —</text>
  <text x="654" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">linear: length &gt; 3× width</text>

  <!-- down arrow -->
  <line x1="654" y1="172" x2="654" y2="200" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="648,200 654,212 660,200" fill="#1B82E8"/>

  <!-- row 2 (right to left) -->
  <rect x="547" y="212" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="654" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 · MEASURE</text>
  <text x="654" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Length and width</text>
  <text x="654" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">against wall thickness t,</text>
  <text x="654" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">alignment and spacing</text>

  <line x1="547" y1="266" x2="523" y2="266" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="523,260 511,266 523,272" fill="#1B82E8"/>

  <rect x="296" y="212" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="403" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">5 · APPLY THE CODE</text>
  <text x="403" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">The governing code's</text>
  <text x="403" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">tables decide —</text>
  <text x="403" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">never preference</text>

  <line x1="296" y1="266" x2="272" y2="266" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="272,260 260,266 272,272" fill="#1B82E8"/>

  <rect x="45" y="212" width="215" height="108" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="152" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">6 · DISPOSITION</text>
  <text x="152" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Accept / reject / repair,</text>
  <text x="152" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">tied to markers, signed</text>
  <text x="152" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">with level and date</text>

  <!-- bottom rule -->
  <rect x="45" y="350" width="717" height="72" rx="6" fill="#E8F1FB" stroke="#D14343" stroke-width="2"/>
  <text x="403" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Cracks, lack of fusion, incomplete penetration:</text>
  <text x="403" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rejected outright by most fabrication codes — no measurement debate</text>
</svg>
