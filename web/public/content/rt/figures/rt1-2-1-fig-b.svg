<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Two Ways to Make Radioactive Material</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="400" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 6"/>

  <!-- LEFT: neutron activation -->
  <text x="200" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#F2A33C">Neutron activation</text>

  <!-- incoming neutron -->
  <circle cx="80" cy="170" r="10" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="80" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">neutron</text>
  <line x1="94" y1="174" x2="140" y2="186" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="136,178 154,190 134,194" fill="#F2A33C"/>

  <!-- target nucleus -->
  <circle cx="200" cy="200" r="48" fill="#1B82E8" fill-opacity="0.25" stroke="#1E9E6A" stroke-width="3.5"/>
  <text x="200" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">Ir-191</text>
  <text x="200" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">stable target</text>

  <!-- arrow down -->
  <line x1="200" y1="252" x2="200" y2="288" stroke="#D9E0E8" stroke-width="2.5"/>
  <polygon points="193,286 200,302 207,286" fill="#D9E0E8"/>
  <text x="282" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">capture: A rises by 1,</text>
  <text x="282" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">element unchanged</text>

  <!-- product nucleus -->
  <circle cx="200" cy="346" r="44" fill="#1B82E8" fill-opacity="0.25" stroke="#D14343" stroke-width="3.5"/>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">Ir-192</text>
  <text x="200" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">radioisotope</text>
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Also: Co-59 &#8594; Co-60,  Se-74 &#8594; Se-75</text>

  <!-- RIGHT: fission -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#F2A33C">Nuclear fission</text>

  <!-- incoming neutron -->
  <circle cx="478" cy="150" r="10" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="478" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">neutron</text>
  <line x1="492" y1="156" x2="538" y2="172" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="534,164 552,178 532,180" fill="#F2A33C"/>

  <!-- U-235 nucleus -->
  <circle cx="600" cy="190" r="52" fill="#1B82E8" fill-opacity="0.25" stroke="#E8F1FB" stroke-width="3.5"/>
  <text x="600" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">U-235</text>
  <text x="600" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">splits in two</text>

  <!-- split arrows -->
  <line x1="566" y1="234" x2="524" y2="288" stroke="#D9E0E8" stroke-width="2.5"/>
  <polygon points="518,284 516,300 530,292" fill="#D9E0E8"/>
  <line x1="634" y1="234" x2="676" y2="288" stroke="#D9E0E8" stroke-width="2.5"/>
  <polygon points="670,292 684,300 682,284" fill="#D9E0E8"/>

  <!-- fission fragments -->
  <circle cx="506" cy="332" r="36" fill="#1B82E8" fill-opacity="0.25" stroke="#D14343" stroke-width="3.5"/>
  <text x="506" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">fragment</text>
  <text x="506" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">e.g. Cs-137</text>
  <circle cx="694" cy="332" r="36" fill="#1B82E8" fill-opacity="0.25" stroke="#D14343" stroke-width="3.5"/>
  <text x="694" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">fragment</text>
  <text x="694" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">neutron-rich</text>

  <!-- released neutrons -->
  <circle cx="600" cy="282" r="7" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="624" cy="266" r="7" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="576" cy="266" r="7" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F2A33C">+ 2-3 neutrons &#8594; chain reaction</text>

  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Fragments inherit excess neutrons: born radioactive</text>

  <!-- bottom note -->
  <rect x="60" y="430" width="0" height="0" fill="none"/>
</svg>
