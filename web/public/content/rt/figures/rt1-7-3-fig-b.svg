<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Film Speed: Same Density, Different Exposure</text>

  <!-- axes -->
  <line x1="90" y1="70" x2="90" y2="400" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="90" y1="400" x2="560" y2="400" stroke="#0A2342" stroke-width="2.5"/>

  <!-- y ticks -->
  <text x="82" y="405" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="82" y="332" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="82" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="82" y="185" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="82" y="112" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4</text>
  <text transform="rotate(-90 36 235)" x="36" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Density</text>
  <text x="325" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">log relative exposure</text>

  <!-- D = 2.0 reference line -->
  <line x1="90" y1="253" x2="470" y2="253" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="478" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">D = 2.0</text>

  <!-- Film B (faster) -->
  <path d="M 120 378 C 160 374, 190 356, 220 322 C 245 292, 270 250, 290 210 C 310 172, 325 140, 340 118 C 352 102, 362 94, 372 90" fill="none" stroke="#1B82E8" stroke-width="3.5"/>
  <!-- Film A (slower, finer) -->
  <path d="M 190 378 C 230 374, 260 356, 290 322 C 315 292, 340 250, 360 210 C 380 172, 395 140, 410 118 C 422 102, 432 94, 442 90" fill="none" stroke="#1E9E6A" stroke-width="3.5"/>

  <text x="368" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Film B (faster)</text>
  <text x="448" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Film A (slower, finer)</text>

  <!-- crossings at D = 2.0 -->
  <circle cx="268" cy="253" r="5" fill="#1B82E8"/>
  <circle cx="338" cy="253" r="5" fill="#1E9E6A"/>
  <line x1="268" y1="253" x2="268" y2="400" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="338" y1="253" x2="338" y2="400" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- speed-difference arrow -->
  <line x1="272" y1="380" x2="334" y2="380" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="272,380 282,375 282,385" fill="#F2A33C"/>
  <polygon points="334,380 324,375 324,385" fill="#F2A33C"/>
  <text x="303" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">0.45 log E</text>

  <!-- annotation upper left -->
  <text x="104" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Speed difference:</text>
  <text x="104" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">A needs ≈ 2.8× the exposure</text>
  <text x="104" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">of B to reach D = 2.0</text>

  <!-- right panel: grain size -->
  <text x="665" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">What buys speed</text>

  <circle cx="665" cy="160" r="42" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="645" cy="150" r="1.8" fill="#0A2342"/>
  <circle cx="657" cy="138" r="1.8" fill="#0A2342"/>
  <circle cx="671" cy="145" r="1.8" fill="#0A2342"/>
  <circle cx="683" cy="155" r="1.8" fill="#0A2342"/>
  <circle cx="640" cy="165" r="1.8" fill="#0A2342"/>
  <circle cx="653" cy="168" r="1.8" fill="#0A2342"/>
  <circle cx="667" cy="162" r="1.8" fill="#0A2342"/>
  <circle cx="680" cy="172" r="1.8" fill="#0A2342"/>
  <circle cx="645" cy="178" r="1.8" fill="#0A2342"/>
  <circle cx="660" cy="182" r="1.8" fill="#0A2342"/>
  <circle cx="675" cy="184" r="1.8" fill="#0A2342"/>
  <circle cx="687" cy="142" r="1.8" fill="#0A2342"/>
  <circle cx="650" cy="132" r="1.8" fill="#0A2342"/>
  <circle cx="668" cy="129" r="1.8" fill="#0A2342"/>
  <text x="665" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">fine grain</text>
  <text x="665" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">slow · sharpest</text>

  <circle cx="665" cy="300" r="42" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="647" cy="288" r="4.5" fill="#0A2342"/>
  <circle cx="669" cy="280" r="4.5" fill="#0A2342"/>
  <circle cx="685" cy="298" r="4.5" fill="#0A2342"/>
  <circle cx="643" cy="308" r="4.5" fill="#0A2342"/>
  <circle cx="663" cy="304" r="4.5" fill="#0A2342"/>
  <circle cx="679" cy="316" r="4.5" fill="#0A2342"/>
  <circle cx="655" cy="322" r="4.5" fill="#0A2342"/>
  <text x="665" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">coarse grain</text>
  <text x="665" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">fast · grainier</text>
</svg>
