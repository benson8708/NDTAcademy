<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">The Electromagnetic Spectrum</text>

  <!-- energy arrow (top) -->
  <line x1="150" y1="105" x2="640" y2="105" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="640,97 660,105 640,113" fill="#F2A33C"/>
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Photon energy and penetrating power increase</text>

  <!-- spectrum band -->
  <rect x="70" y="180" width="150" height="60" fill="#E8F1FB" stroke="#0A2342" stroke-width="1"/>
  <rect x="220" y="180" width="100" height="60" fill="#D9E0E8" stroke="#0A2342" stroke-width="1"/>
  <rect x="320" y="180" width="100" height="60" fill="#E8F1FB" stroke="#0A2342" stroke-width="1"/>
  <rect x="420" y="180" width="30" height="60" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <rect x="450" y="180" width="90" height="60" fill="#D9E0E8" stroke="#0A2342" stroke-width="1"/>
  <rect x="540" y="180" width="100" height="60" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <rect x="640" y="180" width="90" height="60" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <line x1="640" y1="180" x2="640" y2="240" stroke="#E8F1FB" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- band labels -->
  <text x="145" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Radio</text>
  <text x="270" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Microwave</text>
  <text x="370" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Infrared</text>
  <text x="435" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Visible</text>
  <text x="495" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Ultraviolet</text>
  <text x="590" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">X-rays</text>
  <text x="685" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Gamma rays</text>

  <!-- wavelength scale -->
  <line x1="70" y1="300" x2="730" y2="300" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="70" y1="292" x2="70" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="220" y1="292" x2="220" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="370" y1="292" x2="370" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="470" y1="292" x2="470" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="580" y1="292" x2="580" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="730" y1="292" x2="730" y2="308" stroke="#5A6B7E" stroke-width="2"/>
  <text x="70" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10³ m</text>
  <text x="220" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10⁻³ m</text>
  <text x="370" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10⁻⁶ m</text>
  <text x="470" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10⁻⁸ m</text>
  <text x="580" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10⁻¹⁰ m</text>
  <text x="730" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">10⁻¹² m</text>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Wavelength (decreasing left to right)</text>

  <!-- radiography highlight -->
  <rect x="536" y="174" width="198" height="72" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8 5"/>
  <line x1="635" y1="174" x2="635" y2="140" stroke="#F2A33C" stroke-width="2"/>
  <text x="635" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Industrial radiography (about 10⁻⁹ to 10⁻¹³ m)</text>

  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">All bands travel at the speed of light - only wavelength and photon energy differ.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Shorter wavelength = higher energy = harder, more penetrating radiation</text>
</svg>
