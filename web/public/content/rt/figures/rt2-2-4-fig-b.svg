<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Daily Processor QC - Speed-Step Control Chart</text>

  <!-- axes -->
  <line x1="100" y1="80" x2="100" y2="360" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="100" y1="360" x2="740" y2="360" stroke="#0A2342" stroke-width="2.5"/>
  <text x="105" y="68" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Speed-step density</text>

  <!-- y ticks -->
  <text x="92" y="325" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.0</text>
  <text x="92" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.1</text>
  <text x="92" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.2</text>
  <text x="92" y="205" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.3</text>
  <text x="92" y="165" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.4</text>

  <!-- aim and action lines -->
  <line x1="100" y1="240" x2="740" y2="240" stroke="#1E9E6A" stroke-width="2"/>
  <text x="108" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">aim 1.20</text>
  <line x1="100" y1="180" x2="740" y2="180" stroke="#D14343" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="108" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">action +0.15 (1.35)</text>
  <line x1="100" y1="300" x2="740" y2="300" stroke="#D14343" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="108" y="294" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">action -0.15 (1.05)</text>

  <!-- data polyline -->
  <polyline points="144,232 188,248 232,236 276,224 320,244 364,232 408,220 452,212 496,200 540,188 584,156 628,236 672,240 716,232" fill="none" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- data points -->
  <circle cx="144" cy="232" r="5" fill="#1B82E8"/>
  <circle cx="188" cy="248" r="5" fill="#1B82E8"/>
  <circle cx="232" cy="236" r="5" fill="#1B82E8"/>
  <circle cx="276" cy="224" r="5" fill="#1B82E8"/>
  <circle cx="320" cy="244" r="5" fill="#1B82E8"/>
  <circle cx="364" cy="232" r="5" fill="#1B82E8"/>
  <circle cx="408" cy="220" r="5" fill="#1B82E8"/>
  <circle cx="452" cy="212" r="5" fill="#1B82E8"/>
  <circle cx="496" cy="200" r="5" fill="#1B82E8"/>
  <circle cx="540" cy="188" r="5" fill="#1B82E8"/>
  <circle cx="584" cy="156" r="7" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <circle cx="628" cy="236" r="5" fill="#1B82E8"/>
  <circle cx="672" cy="240" r="5" fill="#1B82E8"/>
  <circle cx="716" cy="232" r="5" fill="#1B82E8"/>

  <!-- drift annotation -->
  <line x1="402" y1="240" x2="532" y2="204" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="528,198 540,202 530,212" fill="#F2A33C"/>
  <text x="370" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">upward drift - early warning</text>

  <!-- out-of-limit callout -->
  <line x1="590" y1="150" x2="612" y2="122" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="616" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">beyond action limit:</text>
  <text x="616" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">stop, correct, rerun strip</text>

  <!-- recovery note -->
  <text x="628" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">back in control</text>

  <!-- x ticks -->
  <text x="144" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="232" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3</text>
  <text x="320" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5</text>
  <text x="408" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">7</text>
  <text x="496" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">9</text>
  <text x="584" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">11</text>
  <text x="672" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">13</text>
  <text x="420" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Processing day</text>

  <!-- bottom note -->
  <text x="420" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Also plot contrast (density difference) and base + fog (about +0.05 action) every day.</text>
</svg>
