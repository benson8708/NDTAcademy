<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Retrieval Train &#8212; Daily Inspection Points</text>

  <!-- 1: crank -->
  <circle cx="90" cy="200" r="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="90" y1="200" x2="104" y2="186" stroke="#0A2342" stroke-width="3"/>
  <circle cx="90" cy="200" r="3" fill="#0A2342"/>

  <!-- 2: drive cable with kink -->
  <polyline points="106,200 150,200 175,188 190,212 215,200 300,200" fill="none" stroke="#5A6B7E" stroke-width="3.5"/>
  <circle cx="183" cy="200" r="20" fill="none" stroke="#D14343" stroke-width="2"/>

  <!-- 3: connector and pigtail -->
  <circle cx="305" cy="200" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="312" y="193" width="14" height="14" rx="3" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>

  <!-- 4: device with DU shield and lock -->
  <rect x="330" y="178" width="86" height="44" rx="10" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2.5"/>
  <rect x="344" y="186" width="58" height="28" rx="12" fill="#0A2342"/>
  <path d="M 366 150 C 366 140 378 140 378 150" fill="none" stroke="#0A2342" stroke-width="2"/>
  <rect x="360" y="150" width="22" height="16" rx="3" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>

  <!-- 5: guide tube with tight bend and crushed section -->
  <path d="M 416 200 C 460 200 472 176 506 176 L 548 176 L 556 206 L 596 228 L 640 228" fill="none" stroke="#5A6B7E" stroke-width="10"/>
  <path d="M 416 200 C 460 200 472 176 506 176 L 548 176 L 556 206 L 596 228 L 640 228" fill="none" stroke="#E8F1FB" stroke-width="5"/>
  <circle cx="552" cy="190" r="17" fill="none" stroke="#D14343" stroke-width="2"/>
  <line x1="602" y1="220" x2="618" y2="225" stroke="#D14343" stroke-width="2.5"/>
  <line x1="602" y1="236" x2="618" y2="231" stroke="#D14343" stroke-width="2.5"/>

  <!-- 6: collimator on support, beam out -->
  <polygon points="640,206 680,196 680,260 640,250" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="648" y="260" width="28" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="680" y1="228" x2="724" y2="228" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="6 5"/>

  <!-- number badges with leaders -->
  <line x1="90" y1="171" x2="90" y2="182" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="90" cy="158" r="13" fill="#F2A33C"/>
  <text x="90" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <line x1="183" y1="171" x2="183" y2="179" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="183" cy="158" r="13" fill="#F2A33C"/>
  <text x="183" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <line x1="305" y1="171" x2="305" y2="192" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="305" cy="158" r="13" fill="#F2A33C"/>
  <text x="305" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <line x1="430" y1="171" x2="418" y2="180" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="436" cy="164" r="13" fill="#F2A33C"/>
  <text x="436" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <line x1="552" y1="160" x2="552" y2="172" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="552" cy="147" r="13" fill="#F2A33C"/>
  <text x="552" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5</text>
  <line x1="700" y1="183" x2="684" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="700" cy="170" r="13" fill="#F2A33C"/>
  <text x="700" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">6</text>

  <!-- inspection checklist -->
  <text x="60" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 &#8212; Crank assembly: smooth, free travel; work from full cable length</text>
  <text x="60" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2 &#8212; Drive cable: no kinks, bird-caged strands, or corrosion</text>
  <text x="60" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3 &#8212; Connector: within wear limits, positive latch, never mixed between manufacturers</text>
  <text x="60" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4 &#8212; Device: lock engages with key out; pigtail latches on full retraction</text>
  <text x="60" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5 &#8212; Guide tube: no crushed sections; wide, gentle bends only</text>
  <text x="60" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">6 &#8212; Collimator: supported so its weight cannot drag or kink the tube</text>

  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Any failed item: tag it out &#8212; worn connectors and kinked cables are how sources fail to come home</text>
</svg>
