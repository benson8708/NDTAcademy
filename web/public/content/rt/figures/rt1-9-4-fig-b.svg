<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Scatter Control in a Fluoroscopic Setup</text>

  <!-- X-ray tube -->
  <rect x="60" y="190" width="90" height="60" rx="10" fill="#5A6B7E" stroke="#0A2342" stroke-width="3"/>
  <text x="105" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">X-ray tube</text>

  <!-- filter at port -->
  <rect x="152" y="204" width="10" height="32" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="157" y1="204" x2="157" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="157" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Filter: removes soft,</text>
  <text x="157" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="translate(0,18)">scatter-prone radiation</text>

  <!-- collimator -->
  <polygon points="170,196 200,188 200,252 170,244" fill="#0A2342"/>
  <text x="208" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Collimator</text>

  <!-- diaphragm aperture -->
  <rect x="280" y="150" width="14" height="52" fill="#0A2342"/>
  <rect x="280" y="238" width="14" height="52" fill="#0A2342"/>
  <line x1="287" y1="150" x2="287" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="287" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Aperture diaphragm trims the field</text>

  <!-- beam cone -->
  <polygon points="200,212 287,200 287,240 200,228" fill="#F2A33C" opacity="0.4"/>
  <polygon points="294,202 560,178 560,262 294,238" fill="#F2A33C" opacity="0.4"/>
  <line x1="200" y1="220" x2="560" y2="220" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="552,213 566,220 552,227" fill="#F2A33C"/>

  <!-- part close to screen -->
  <rect x="470" y="184" width="40" height="72" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="490" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Part</text>

  <!-- lead masking around part edges -->
  <rect x="470" y="150" width="40" height="22" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <rect x="470" y="268" width="40" height="22" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="512" y1="161" x2="640" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="648" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Lead masking:</text>
  <text x="648" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">no streaming</text>
  <text x="648" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">past part edges</text>

  <!-- fluorescent screen -->
  <rect x="560" y="140" width="14" height="160" fill="#1E9E6A" stroke="#0A2342" stroke-width="3"/>
  <text x="567" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Screen</text>

  <!-- short gap annotation -->
  <line x1="514" y1="338" x2="556" y2="338" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="514,334 506,338 514,342" fill="#5A6B7E"/>
  <polygon points="556,334 564,338 556,342" fill="#5A6B7E"/>
  <text x="535" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">part kept close</text>
  <text x="535" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">to screen</text>

  <!-- collimation note -->
  <text x="240" y="410" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Beam collimated to the screen area and no further &#8212; scatter erases an already low-contrast image</text>

  <!-- stray scatter arrows blocked -->
  <line x1="510" y1="190" x2="545" y2="160" stroke="#D14343" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="510" y1="252" x2="545" y2="282" stroke="#D14343" stroke-width="2" stroke-dasharray="5,4"/>
</svg>
