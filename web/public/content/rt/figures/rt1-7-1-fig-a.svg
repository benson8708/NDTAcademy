<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Formation of the Latent Image (Gurney-Mott)</text>

  <!-- panel frames -->
  <rect x="20" y="56" width="176" height="290" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="206" y="56" width="176" height="290" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="392" y="56" width="176" height="290" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="578" y="56" width="176" height="290" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- panel titles -->
  <text x="108" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1. Energy in</text>
  <text x="294" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2. Electron trapped</text>
  <text x="480" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3. Silver ion arrives</text>
  <text x="666" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4. Development</text>

  <!-- arrows between panels -->
  <line x1="196" y1="200" x2="204" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="204,194 214,200 204,206" fill="#F2A33C"/>
  <line x1="382" y1="200" x2="390" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="390,194 400,200 390,206" fill="#F2A33C"/>
  <line x1="568" y1="200" x2="576" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="576,194 586,200 576,206" fill="#F2A33C"/>

  <!-- PANEL 1: grain + incoming photon -->
  <circle cx="108" cy="200" r="48" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="135" cy="228" r="6" fill="#5A6B7E"/>
  <polyline points="44,108 60,122 50,136 68,150 58,164 80,180" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="76,172 88,186 72,186" fill="#F2A33C"/>
  <text x="108" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">AgBr grain</text>
  <text x="108" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">photon frees</text>
  <text x="108" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">electrons inside</text>
  <line x1="135" y1="234" x2="150" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="152" y="255" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">speck</text>

  <!-- PANEL 2: electron migrates to speck -->
  <circle cx="294" cy="200" r="48" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="321" cy="228" r="7" fill="#1B82E8"/>
  <polyline points="276,166 292,182 286,198 304,210 314,222" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="268" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">e⁻</text>
  <text x="338" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">−</text>
  <text x="294" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">speck traps e⁻</text>
  <text x="294" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">speck becomes</text>
  <text x="294" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">negatively charged</text>

  <!-- PANEL 3: silver ion attracted -->
  <circle cx="480" cy="200" r="48" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="507" cy="228" r="7" fill="#5A6B7E"/>
  <circle cx="500" cy="220" r="4" fill="#0A2342"/>
  <text x="452" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Ag⁺</text>
  <line x1="458" y1="168" x2="496" y2="214" stroke="#D14343" stroke-width="2"/>
  <polygon points="490,206 500,219 484,216" fill="#D14343"/>
  <text x="480" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Ag⁺ + e⁻ → Ag atom</text>
  <text x="480" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">cluster grows</text>
  <text x="480" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">atom by atom</text>

  <!-- PANEL 4: developed grain -->
  <circle cx="666" cy="200" r="48" fill="#0A2342" stroke="#0A2342" stroke-width="2.5"/>
  <text x="666" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">whole grain reduced</text>
  <text x="666" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">to black silver</text>
  <text x="666" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">×10⁹ amplification</text>

  <!-- bottom summary strip -->
  <rect x="20" y="368" width="734" height="58" rx="10" fill="#0A2342"/>
  <text x="387" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">A cluster of about 3-6 silver atoms at the speck = a developable latent-image center.</text>
  <text x="387" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Invisible until the developer converts every seeded grain completely to metallic silver.</text>
</svg>
