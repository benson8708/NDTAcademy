<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Typical Gamma Exposure Chart - Ir-192 on Steel</text>

  <!-- light gridlines (intermediate log values) -->
  <line x1="100" y1="359" x2="560" y2="359" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="100" y1="318" x2="560" y2="318" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="100" y1="256" x2="560" y2="256" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="100" y1="214" x2="560" y2="214" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="100" y1="152" x2="560" y2="152" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="100" y1="111" x2="560" y2="111" stroke="#D9E0E8" stroke-width="1"/>
  <!-- decade gridlines -->
  <line x1="100" y1="287" x2="560" y2="287" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="100" y1="183" x2="560" y2="183" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="100" y1="80" x2="560" y2="80" stroke="#5A6B7E" stroke-width="1"/>
  <!-- vertical gridlines -->
  <line x1="177" y1="80" x2="177" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="253" y1="80" x2="253" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="330" y1="80" x2="330" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="407" y1="80" x2="407" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="483" y1="80" x2="483" y2="390" stroke="#D9E0E8" stroke-width="1"/>

  <!-- axes -->
  <line x1="100" y1="80" x2="100" y2="390" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="100" y1="390" x2="560" y2="390" stroke="#0A2342" stroke-width="2.5"/>

  <!-- y labels -->
  <text x="92" y="395" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="92" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10</text>
  <text x="92" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="92" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1000</text>
  <text transform="rotate(-90 34 235)" x="34" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Exposure (Ci·hr, log scale)</text>

  <!-- x labels -->
  <text x="100" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="177" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.5</text>
  <text x="253" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.0</text>
  <text x="330" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.5</text>
  <text x="407" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.0</text>
  <text x="483" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.5</text>
  <text x="560" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3.0</text>
  <text x="330" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Steel thickness (in.)</text>

  <!-- example read-out -->
  <line x1="330" y1="390" x2="330" y2="194" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="330" y1="194" x2="100" y2="194" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="330" cy="194" r="5" fill="#0A2342"/>
  <text x="106" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">≈ 80 Ci·hr</text>

  <!-- exposure lines -->
  <line x1="177" y1="297" x2="529" y2="119" stroke="#1E9E6A" stroke-width="3"/>
  <line x1="177" y1="271" x2="529" y2="93" stroke="#1B82E8" stroke-width="3"/>
  <text x="524" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">SFD 24 in.</text>
  <text x="524" y="140" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">SFD 18 in.</text>

  <!-- conditions box -->
  <rect x="600" y="70" width="185" height="150" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="692" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Chart valid only for:</text>
  <text x="614" y="122" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Ir-192 on steel</text>
  <text x="614" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Class II film</text>
  <text x="614" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Density 2.0</text>
  <text x="614" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.005 in. Pb screens</text>

  <!-- time recipe box -->
  <rect x="600" y="245" width="185" height="120" rx="10" fill="#FFFFFF" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="692" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Exposure time =</text>
  <text x="692" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">chart Ci·hr ÷ Ci today</text>
  <text x="692" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">80 Ci·hr ÷ 40 Ci</text>
  <text x="692" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">= 2 hours</text>
</svg>
