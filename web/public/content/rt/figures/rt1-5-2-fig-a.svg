<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Radiation Detection Equipment: Two Questions, Two Families</text>

  <!-- left panel: survey (rate) -->
  <rect x="35" y="58" width="355" height="336" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="212" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">SURVEY &#8212; dose rate NOW (mR/h)</text>

  <!-- ion chamber icon -->
  <rect x="55" y="116" width="52" height="32" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="81" cy="132" r="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="81" y1="132" x2="88" y2="125" stroke="#D14343" stroke-width="2"/>
  <text x="122" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Ion chamber</text>
  <text x="122" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Accurate at radiography rates &#8212;</text>
  <text x="122" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">boundary and approach surveys</text>

  <!-- GM icon -->
  <rect x="55" y="212" width="40" height="30" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="95" y1="227" x2="108" y2="227" stroke="#5A6B7E" stroke-width="3"/>
  <rect x="108" y="219" width="9" height="16" rx="3" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="130" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Geiger-M&#252;ller (GM)</text>
  <text x="130" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Fast, very sensitive at low rates;</text>
  <text x="130" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">can read LOW in intense fields</text>

  <!-- scintillator icon -->
  <rect x="55" y="306" width="30" height="26" rx="3" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="85" y="310" width="26" height="18" rx="3" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="122" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Scintillator</text>
  <text x="122" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Ultra-sensitive &#8212; lost-source</text>
  <text x="122" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">searches and low-level surveys</text>

  <!-- right panel: worn dosimetry -->
  <rect x="410" y="58" width="355" height="336" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="587" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">WORN &#8212; your accumulated dose</text>

  <!-- pocket dosimeter icon -->
  <rect x="430" y="122" width="54" height="15" rx="7" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="484" cy="129" r="5" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="438" y1="118" x2="456" y2="118" stroke="#0A2342" stroke-width="2.5"/>
  <text x="500" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Direct-reading dosimeter</text>
  <text x="500" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">0&#8211;200 mR typical; read and</text>
  <text x="500" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">recorded every day</text>

  <!-- badge icon -->
  <rect x="436" y="206" width="42" height="34" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="457" cy="223" r="9" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="500" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Badge (TLD / OSL / film)</text>
  <text x="500" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Legal dose of record &#8212; read by</text>
  <text x="500" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a laboratory, monthly/quarterly</text>

  <!-- alarming ratemeter icon -->
  <rect x="438" y="304" width="38" height="30" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <path d="M 482 309 Q 492 319 482 329" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 490 304 Q 504 319 490 334" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="514" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Alarming ratemeter</text>
  <text x="514" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Sounds at a set dose rate &#8212;</text>
  <text x="514" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">catches the unknown mistake</text>

  <!-- bottom rule strip -->
  <rect x="35" y="406" width="730" height="36" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">All three worn together on every radiographic operation (typical rule)</text>
</svg>
