<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">X-ray Continuous Spectrum vs. Gamma Line Spectrum</text>

  <!-- left panel: X-ray tube -->
  <text x="225" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">X-ray tube: continuous + characteristic</text>
  <line x1="70" y1="360" x2="385" y2="360" stroke="#0A2342" stroke-width="2"/>
  <line x1="70" y1="360" x2="70" y2="100" stroke="#0A2342" stroke-width="2"/>
  <text x="228" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Photon energy (keV)</text>
  <text x="50" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="rotate(-90 50 230)">Relative intensity</text>
  <line x1="173" y1="360" x2="173" y2="367" stroke="#0A2342" stroke-width="2"/>
  <line x1="276" y1="360" x2="276" y2="367" stroke="#0A2342" stroke-width="2"/>
  <text x="70" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="173" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="276" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">200</text>

  <!-- 220 kVp, base mA (solid blue) -->
  <path d="M 78 358 C 110 215 150 200 190 245 C 230 292 265 330 297 358" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- 220 kVp, doubled mA (dashed green): same shape, taller, same endpoint -->
  <path d="M 78 358 C 105 150 152 135 196 210 C 235 272 268 322 297 358" fill="none" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 5"/>
  <!-- 300 kVp (amber dash-dot): taller AND extends to higher energy -->
  <path d="M 78 358 C 118 170 168 158 218 230 C 260 285 330 335 380 358" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="2 4 10 4"/>
  <!-- characteristic spikes on solid curve near 59-67 keV -->
  <line x1="131" y1="262" x2="131" y2="178" stroke="#1B82E8" stroke-width="3"/>
  <line x1="139" y1="255" x2="139" y2="192" stroke="#1B82E8" stroke-width="3"/>
  <text x="135" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Characteristic lines</text>

  <!-- ceiling annotation -->
  <line x1="297" y1="358" x2="320" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="322" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Ceiling = kVp</text>

  <!-- legend -->
  <line x1="84" y1="112" x2="116" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <text x="122" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">220 kVp, 5 mA</text>
  <line x1="248" y1="112" x2="280" y2="112" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 5"/>
  <text x="286" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10 mA</text>
  <line x1="248" y1="136" x2="280" y2="136" stroke="#F2A33C" stroke-width="3" stroke-dasharray="2 4 10 4"/>
  <text x="286" y="141" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">300 kVp</text>

  <!-- right panel: gamma -->
  <text x="605" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Gamma isotope: discrete lines</text>
  <line x1="470" y1="360" x2="745" y2="360" stroke="#0A2342" stroke-width="2"/>
  <line x1="470" y1="360" x2="470" y2="100" stroke="#0A2342" stroke-width="2"/>
  <text x="610" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Photon energy (MeV)</text>
  <line x1="560" y1="360" x2="560" y2="367" stroke="#0A2342" stroke-width="2"/>
  <line x1="650" y1="360" x2="650" y2="367" stroke="#0A2342" stroke-width="2"/>
  <line x1="740" y1="360" x2="740" y2="367" stroke="#0A2342" stroke-width="2"/>
  <text x="470" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="560" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.5</text>
  <text x="650" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.0</text>
  <text x="740" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.5</text>

  <!-- Ir-192 lines (blue) at ~0.30, 0.32, 0.47, 0.60 MeV -->
  <line x1="524" y1="360" x2="524" y2="160" stroke="#1B82E8" stroke-width="5"/>
  <line x1="528" y1="360" x2="528" y2="200" stroke="#1B82E8" stroke-width="5"/>
  <line x1="555" y1="360" x2="555" y2="240" stroke="#1B82E8" stroke-width="5"/>
  <line x1="578" y1="360" x2="578" y2="285" stroke="#1B82E8" stroke-width="5"/>
  <text x="540" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Ir-192 lines</text>
  <text x="548" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">average ≈ 0.35 MeV</text>

  <!-- Co-60 lines (amber) at 1.17 and 1.33 MeV -->
  <line x1="681" y1="360" x2="681" y2="175" stroke="#F2A33C" stroke-width="5"/>
  <line x1="709" y1="360" x2="709" y2="175" stroke="#F2A33C" stroke-width="5"/>
  <text x="688" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Co-60: 1.17 + 1.33 MeV</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Gamma energies are fixed by the isotope - no control changes them. X-ray spectra move with kVp and scale with mA.</text>
</svg>
