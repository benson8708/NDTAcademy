<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Panoramic Exposure: Source Centered, Film Wrapped</text>

  <!-- pipe wall annulus -->
  <circle cx="360" cy="245" r="140" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <circle cx="360" cy="245" r="112" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <text x="360" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Pipe wall (girth weld)</text>

  <!-- film belt outside -->
  <circle cx="360" cy="245" r="158" fill="none" stroke="#1B82E8" stroke-width="9" stroke-dasharray="58,8"/>
  <text x="360" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Film cassettes end-to-end around full circumference</text>

  <!-- centered source -->
  <circle cx="360" cy="245" r="9" fill="#F2A33C" stroke="#E8F1FB" stroke-width="2"/>

  <!-- radiating rays (8 directions) -->
  <line x1="360" y1="245" x2="360" y2="100" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="463" y2="142" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="505" y2="245" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="463" y2="348" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="360" y2="390" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="257" y2="348" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="215" y2="245" stroke="#F2A33C" stroke-width="2"/>
  <line x1="360" y1="245" x2="257" y2="142" stroke="#F2A33C" stroke-width="2"/>

  <!-- IQIs at 120 degrees: top, lower-left, lower-right -->
  <rect x="346" y="124" width="28" height="12" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="248" y="298" width="28" height="12" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5" transform="rotate(60 262 304)"/>
  <rect x="444" y="298" width="28" height="12" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5" transform="rotate(-60 458 304)"/>

  <!-- callouts at right -->
  <line x1="369" y1="130" x2="560" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="568" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">IQIs spaced around the</text>
  <text x="568" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">circle (&#8805; 3 at 120&#176;)</text>

  <line x1="372" y1="245" x2="560" y2="180" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="568" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Source on the pipe axis:</text>
  <text x="568" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">equal SFD all around &#8594;</text>
  <text x="568" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">uniform density</text>

  <line x1="518" y1="245" x2="560" y2="268" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="568" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Single wall in beam,</text>
  <text x="568" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">beam square to weld</text>

  <text x="568" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">ONE exposure covers</text>
  <text x="568" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">the full circumference</text>
</svg>
