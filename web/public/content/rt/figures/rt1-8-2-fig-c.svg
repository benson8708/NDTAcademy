<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Hole-Type and Wire-Type IQIs on a Weld Radiograph</text>

  <!-- film strip (parent metal density) -->
  <rect x="60" y="105" width="680" height="245" rx="8" fill="#1E4068" stroke="#0A2342" stroke-width="2"/>

  <!-- weld image: reinforcement is thicker, so it images lighter -->
  <path d="M 60 212 C 140 206 220 216 300 210 C 380 204 460 214 540 208 C 620 202 690 214 740 208 L 740 262 C 660 268 580 258 500 264 C 420 270 340 260 260 266 C 180 272 120 262 60 266 Z" fill="#35608F"/>

  <!-- shim under plaque -->
  <rect x="128" y="132" width="200" height="74" rx="4" fill="#2A5180"/>

  <!-- hole-type plaque -->
  <rect x="150" y="148" width="140" height="44" rx="4" fill="#5E86B0" stroke="#7FA3C8" stroke-width="1"/>
  <text x="170" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#C8DCEF">25</text>
  <circle cx="205" cy="170" r="13" fill="#16365A" stroke="#0F2845" stroke-width="1"/>
  <circle cx="245" cy="170" r="6.5" fill="#16365A" stroke="#0F2845" stroke-width="1"/>
  <circle cx="272" cy="170" r="3.5" fill="#16365A" stroke="#0F2845" stroke-width="1"/>

  <!-- wire-type IQI envelope -->
  <rect x="480" y="148" width="170" height="150" rx="6" fill="none" stroke="#6E94BC" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8"/>
  <text x="638" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#C8DCEF">B</text>
  <line x1="500" y1="158" x2="500" y2="290" stroke="#C8DCEF" stroke-width="5"/>
  <line x1="525" y1="158" x2="525" y2="290" stroke="#C2D8EC" stroke-width="4" opacity="0.95"/>
  <line x1="550" y1="158" x2="550" y2="290" stroke="#C2D8EC" stroke-width="3.2" opacity="0.85"/>
  <line x1="575" y1="158" x2="575" y2="290" stroke="#C2D8EC" stroke-width="2.6" opacity="0.75"/>
  <line x1="600" y1="158" x2="600" y2="290" stroke="#C2D8EC" stroke-width="2" opacity="0.62"/>
  <line x1="625" y1="158" x2="625" y2="290" stroke="#C2D8EC" stroke-width="1.4" opacity="0.5"/>

  <!-- in-strip weld label -->
  <text x="730" y="338" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#C8DCEF">weld image (lighter = thicker)</text>

  <!-- labels and leaders -->
  <text x="66" y="72" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hole-type plaque (2% T) on a shim</text>
  <line x1="150" y1="80" x2="200" y2="146" stroke="#8FA8C4" stroke-width="1.5"/>

  <text x="734" y="72" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wire-type IQI across the weld</text>
  <line x1="600" y1="80" x2="565" y2="146" stroke="#8FA8C4" stroke-width="1.5"/>

  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Holes (4T, 2T, 1T) image darker</text>
  <line x1="368" y1="380" x2="250" y2="186" stroke="#8FA8C4" stroke-width="1.5"/>

  <text x="66" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lead ID number = thickness in mils</text>
  <line x1="200" y1="408" x2="170" y2="192" stroke="#8FA8C4" stroke-width="1.5"/>

  <text x="734" y="420" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Essential wire must show across the weld</text>
  <line x1="580" y1="408" x2="600" y2="294" stroke="#8FA8C4" stroke-width="1.5"/>

  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2-2T = plaque 2% of thickness, 2T hole clearly visible.</text>
</svg>
