<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Elliptical Technique (small-bore, side view)</text>

  <!-- source, offset along pipe axis -->
  <circle cx="270" cy="80" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="180" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>
  <text x="180" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">offset along axis</text>

  <!-- offset dimension from weld plane -->
  <line x1="270" y1="62" x2="430" y2="62" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <line x1="430" y1="55" x2="430" y2="160" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="350" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">offset</text>

  <!-- pipe side view: top wall and bottom wall -->
  <rect x="120" y="160" width="560" height="26" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="120" y="244" width="560" height="26" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="105" y="180" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Top wall</text>
  <text x="105" y="264" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Bottom wall</text>

  <!-- weld at station x=430 through both walls -->
  <path d="M 418 160 L 442 160 L 436 186 L 424 186 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 424 244 L 436 244 L 442 270 L 418 270 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="430" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Weld</text>

  <!-- beam rays from source through top weld and bottom weld -->
  <line x1="270" y1="80" x2="475" y2="300" stroke="#F2A33C" stroke-width="2"/>
  <line x1="270" y1="80" x2="560" y2="300" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="552,294 566,302 554,308" fill="#F2A33C"/>

  <!-- film below -->
  <rect x="330" y="300" width="320" height="10" fill="#1B82E8"/>
  <text x="672" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Film</text>

  <!-- projected image positions -->
  <line x1="475" y1="300" x2="475" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="560" y1="300" x2="560" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- resulting radiograph strip -->
  <rect x="160" y="346" width="480" height="80" rx="6" fill="#0A2342" stroke="#5A6B7E" stroke-width="2"/>
  <text x="150" y="392" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Radiograph:</text>
  <!-- ellipse image: two separated weld limbs -->
  <ellipse cx="400" cy="386" rx="150" ry="26" fill="none" stroke="#E8F1FB" stroke-width="7"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#F2A33C">source-side weld image (upper limb)</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A">film-side weld image (lower limb)</text>

  <text x="690" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">&#8805; 2 shots,</text>
  <text x="690" y="404" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">90&#176; apart</text>
</svg>
