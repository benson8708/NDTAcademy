<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Inside the Atom: Carbon-12</text>

  <!-- shells -->
  <circle cx="290" cy="250" r="150" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="8,6"/>
  <circle cx="290" cy="250" r="85" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- nucleus cluster: 6 protons (amber) + 6 neutrons (grey) -->
  <circle cx="278" cy="238" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="302" cy="238" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="266" cy="258" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="290" cy="258" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="314" cy="258" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="278" cy="278" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="302" cy="278" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="290" cy="222" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="266" cy="232" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="314" cy="232" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="290" cy="240" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="290" cy="276" r="13" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- K shell electrons (2) -->
  <circle cx="290" cy="165" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="290" cy="335" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <!-- L shell electrons (4) -->
  <circle cx="290" cy="100" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="290" cy="400" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="140" cy="250" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="440" cy="250" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>

  <!-- shell labels -->
  <text x="362" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">K shell: 2 electrons</text>
  <text x="404" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">L shell: 4 electrons</text>
  <line x1="358" y1="195" x2="318" y2="180" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="400" y1="133" x2="335" y2="118" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- nucleus label -->
  <line x1="318" y1="285" x2="392" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="398" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Nucleus: 6 protons + 6 neutrons</text>
  <text x="398" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">(holds nearly all the mass)</text>

  <!-- legend -->
  <rect x="520" y="80" width="250" height="180" rx="10" fill="#FFFFFF" fill-opacity="0.06" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="545" cy="112" r="11" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="566" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Proton</text>
  <text x="566" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">charge +1, mass ≈ 1 u</text>
  <circle cx="545" cy="166" r="11" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="566" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Neutron</text>
  <text x="566" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">charge 0, mass ≈ 1 u</text>
  <circle cx="545" cy="220" r="11" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="566" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Electron</text>
  <text x="566" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">charge −1, mass ≈ 1/1836 u</text>

  <!-- bottom note -->
  <text x="620" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Neutral atom: electrons = protons,</text>
  <text x="620" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">charges cancel exactly</text>
</svg>
