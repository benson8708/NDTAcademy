<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Darkroom Layout: Dry Side vs Wet Side</text>

  <!-- room outline -->
  <rect x="60" y="70" width="680" height="320" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- light-trap entry (bottom left) -->
  <rect x="60" y="330" width="70" height="60" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <path d="M 95 390 L 95 355 L 130 355" fill="none" stroke="#0A2342" stroke-width="3"/>
  <text x="95" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Light-trap entry</text>

  <!-- center dashed divider -->
  <line x1="400" y1="70" x2="400" y2="390" stroke="#D14343" stroke-width="3" stroke-dasharray="10,8"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Keep dry and wet sides separated</text>

  <!-- DRY SIDE -->
  <text x="230" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1B82E8">DRY SIDE</text>

  <!-- safelight -->
  <rect x="200" y="115" width="60" height="24" rx="6" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="215" y1="139" x2="200" y2="165" stroke="#F2A33C" stroke-width="2"/>
  <line x1="230" y1="139" x2="230" y2="165" stroke="#F2A33C" stroke-width="2"/>
  <line x1="245" y1="139" x2="260" y2="165" stroke="#F2A33C" stroke-width="2"/>
  <text x="298" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Safelight: 7.5&#8211;15 W,</text>
  <text x="298" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">correct filter</text>

  <!-- distance arrow safelight to bench -->
  <line x1="172" y1="142" x2="172" y2="248" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="168,142 176,142 172,132" fill="#5A6B7E"/>
  <polygon points="168,248 176,248 172,258" fill="#5A6B7E"/>
  <text x="160" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">&#8805; 4 ft</text>

  <!-- loading bench -->
  <rect x="120" y="258" width="230" height="22" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="135" y="280" width="14" height="60" fill="#5A6B7E"/>
  <rect x="320" y="280" width="14" height="60" fill="#5A6B7E"/>
  <text x="235" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Loading bench: clean, dry, edges-only handling</text>

  <!-- cassette on bench -->
  <rect x="140" y="236" width="80" height="18" rx="3" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="180" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cassette + screens</text>

  <!-- film box on bench -->
  <rect x="255" y="226" width="60" height="28" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="293" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film box</text>

  <!-- WET SIDE -->
  <text x="570" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E9E6A">WET SIDE</text>

  <!-- four tanks -->
  <rect x="430" y="210" width="60" height="90" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="500" y="210" width="40" height="90" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="550" y="210" width="60" height="90" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <rect x="620" y="210" width="60" height="90" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="460" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Develop</text>
  <text x="520" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Stop</text>
  <text x="580" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fix</text>
  <text x="650" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wash</text>

  <!-- film hanger over developer -->
  <line x1="460" y1="160" x2="460" y2="225" stroke="#0A2342" stroke-width="2"/>
  <rect x="445" y="225" width="30" height="55" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="460" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film on hanger</text>

  <!-- dryer -->
  <rect x="695" y="180" width="35" height="120" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dryer</text>

  <!-- splash warning -->
  <circle cx="430" cy="180" r="5" fill="#D14343"/>
  <text x="430" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">Chemistry splash never crosses the line</text>
</svg>
