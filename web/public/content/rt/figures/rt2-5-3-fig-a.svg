<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Four Arc Processes and Their Shielding</text>

  <line x1="400" y1="52" x2="400" y2="432" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="20" y1="242" x2="780" y2="242" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ============ SMAW ============ -->
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">SMAW - stick</text>
  <rect x="80" y="196" width="260" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 200 196 Q 240 178 280 196 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="142" y1="99" x2="190" y2="175" stroke="#F2A33C" stroke-width="10" stroke-linecap="round"/>
  <line x1="138" y1="92" x2="200" y2="190" stroke="#5A6B7E" stroke-width="4"/>
  <polygon points="197,185 203,180 205,187 212,186 206,192 210,198 202,195 199,202 196,194 190,193" fill="#F2A33C"/>
  <ellipse cx="205" cy="188" rx="26" ry="20" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M 208 190 Q 242 172 278 193" fill="none" stroke="#5A6B7E" stroke-width="5"/>
  <text x="118" y="118" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Flux covering</text>
  <line x1="122" y1="114" x2="157" y2="124" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Core wire</text>
  <line x1="122" y1="146" x2="171" y2="147" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="256" y="148" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gas shield</text>
  <line x1="252" y1="152" x2="228" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="296" y="172" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Slag</text>
  <line x1="292" y1="174" x2="262" y2="182" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Manual, all-position; slag every pass</text>

  <!-- ============ GMAW / FCAW ============ -->
  <text x="590" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">GMAW / FCAW - wire gun</text>
  <rect x="460" y="196" width="260" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 590 196 Q 630 178 668 196 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="560,92 620,92 612,150 568,150" fill="#5A6B7E"/>
  <rect x="584" y="150" width="12" height="10" fill="#0A2342"/>
  <line x1="590" y1="160" x2="590" y2="192" stroke="#5A6B7E" stroke-width="3"/>
  <path d="M 568 152 C 560 175, 564 188, 552 196" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M 612 152 C 620 175, 616 188, 628 196" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="587,185 593,180 595,187 602,186 596,192 600,198 592,195 589,202 586,194 580,193" fill="#F2A33C"/>
  <text x="530" y="170" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wire electrode</text>
  <line x1="534" y1="166" x2="586" y2="172" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="648" y="112" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gas nozzle</text>
  <line x1="644" y1="114" x2="622" y2="110" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="664" y="172" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Shielding gas</text>
  <line x1="660" y1="174" x2="630" y2="182" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="590" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">FCAW: flux inside tubular wire adds slag</text>

  <!-- ============ GTAW ============ -->
  <text x="210" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">GTAW - TIG</text>
  <rect x="80" y="388" width="260" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 190 388 Q 228 372 264 388 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="178" y="272" width="24" height="16" fill="#5A6B7E"/>
  <polygon points="168,288 212,288 204,330 176,330" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="190" y1="330" x2="190" y2="372" stroke="#0A2342" stroke-width="4"/>
  <polygon points="186,372 194,372 190,382" fill="#0A2342"/>
  <path d="M 176 332 C 168 355, 172 368, 162 380" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M 204 332 C 212 355, 208 368, 218 380" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="187,381 193,376 195,383 202,382 196,388 200,394 192,391 189,398 186,390 180,389" fill="#F2A33C"/>
  <line x1="96" y1="352" x2="178" y2="382" stroke="#1E9E6A" stroke-width="3.5"/>
  <text x="96" y="342" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Filler rod</text>
  <text x="244" y="302" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gas cup</text>
  <line x1="240" y1="304" x2="212" y2="306" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="244" y="350" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Tungsten electrode</text>
  <line x1="240" y1="352" x2="196" y2="356" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">No flux - no slag; inert gas only</text>

  <!-- ============ SAW ============ -->
  <text x="590" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">SAW - submerged arc</text>
  <rect x="460" y="388" width="280" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 640 388 Q 668 376 696 388 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 638 386 Q 668 370 698 386" fill="none" stroke="#5A6B7E" stroke-width="4"/>
  <path d="M 470 388 Q 560 330 650 388 Z" fill="#F2A33C" fill-opacity="0.45" stroke="#F2A33C" stroke-width="1.5"/>
  <polygon points="496,278 540,278 532,306 504,306" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="512" y="306" width="12" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="600" y1="272" x2="600" y2="370" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="597,375 603,370 605,377 612,376 606,382 610,388 602,385 599,392 596,384 590,383" fill="#F2A33C"/>
  <text x="490" y="272" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Flux hopper</text>
  <text x="618" y="292" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Wire</text>
  <line x1="614" y1="294" x2="602" y2="296" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="700" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Flux blanket</text>
  <line x1="676" y1="354" x2="630" y2="368" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="730" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Slag crust</text>
  <line x1="706" y1="376" x2="684" y2="380" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="590" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">High deposition, flat position, arc invisible</text>
</svg>
