<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Inverse Square Law: Same Photons, Four Times the Area</text>

  <!-- diverging rays -->
  <line x1="98" y1="238" x2="630" y2="100" stroke="#E8F1FB" stroke-width="1.5" opacity="0.7"/>
  <line x1="98" y1="242" x2="630" y2="380" stroke="#E8F1FB" stroke-width="1.5" opacity="0.7"/>
  <line x1="100" y1="240" x2="630" y2="240" stroke="#E8F1FB" stroke-width="1" stroke-dasharray="5 6" opacity="0.5"/>

  <!-- source -->
  <circle cx="90" cy="240" r="10" fill="#F2A33C" stroke="#E8F1FB" stroke-width="2"/>
  <text x="90" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Source</text>

  <!-- screen at 1 m: 1 square -->
  <rect x="190" y="205" width="70" height="70" fill="#1B82E8" opacity="0.30"/>
  <rect x="190" y="205" width="70" height="70" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="225" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">1 m · 1600 mR/h</text>
  <text x="225" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">area ×1</text>

  <!-- screen at 2 m: 2x2 squares -->
  <rect x="290" y="170" width="140" height="140" fill="#1B82E8" opacity="0.22"/>
  <rect x="290" y="170" width="140" height="140" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="360" y1="170" x2="360" y2="310" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="290" y1="240" x2="430" y2="240" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="360" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">2 m · 400 mR/h</text>
  <text x="360" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">area ×4 · intensity ÷4</text>

  <!-- screen at 4 m: 4x4 squares -->
  <rect x="490" y="100" width="280" height="280" fill="#1B82E8" opacity="0.15"/>
  <rect x="490" y="100" width="280" height="280" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="560" y1="100" x2="560" y2="380" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="630" y1="100" x2="630" y2="380" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="700" y1="100" x2="700" y2="380" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="490" y1="170" x2="770" y2="170" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="490" y1="240" x2="770" y2="240" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="490" y1="310" x2="770" y2="310" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="630" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">4 m · 100 mR/h</text>
  <text x="630" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">area ×16 · intensity ÷16</text>

  <!-- formula -->
  <text x="50" y="396" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F2A33C">I₁d₁² = I₂d₂²</text>
  <text x="50" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">double the distance → one quarter the intensity</text>
</svg>
