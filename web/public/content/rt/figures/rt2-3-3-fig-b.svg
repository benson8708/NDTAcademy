<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Transmission Densitometer and Calibrated Step Tablet</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Use: 1 warm up · 2 zero (null) · 3 verify vs. step tablet · 4 measure film</text>

  <!-- photodetector label -->
  <text x="200" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">photodetector</text>
  <line x1="200" y1="186" x2="200" y2="228" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- reading arm -->
  <rect x="120" y="190" width="320" height="52" rx="8" fill="#0A2342"/>
  <text x="340" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">reading arm</text>
  <rect x="420" y="242" width="20" height="38" fill="#0A2342"/>
  <circle cx="200" cy="242" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>

  <!-- film on stage -->
  <text x="58" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">radiograph</text>
  <rect x="80" y="258" width="330" height="14" fill="#5A6B7E"/>

  <!-- base with aperture, lamp, readout -->
  <rect x="60" y="280" width="420" height="110" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="120" y="272" width="72" height="10" fill="#0A2342"/>
  <rect x="208" y="272" width="72" height="10" fill="#0A2342"/>
  <text x="148" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">aperture 1–3 mm</text>
  <line x1="168" y1="302" x2="198" y2="284" stroke="#5A6B7E" stroke-width="1.5"/>

  <line x1="200" y1="331" x2="200" y2="252" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="6 4"/>
  <circle cx="200" cy="345" r="14" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="200" y1="395" x2="200" y2="361" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="200" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stabilized lamp</text>

  <rect x="310" y="300" width="140" height="58" rx="6" fill="#0A2342"/>
  <text x="380" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1E9E6A">2.35</text>
  <text x="380" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">log circuit → density readout</text>

  <!-- step tablet -->
  <text x="627" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">calibrated step tablet</text>
  <rect x="580" y="104" width="90" height="38" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="142" width="90" height="38" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="180" width="90" height="38" fill="#AEBDCB" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="218" width="90" height="38" fill="#8194A8" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="256" width="90" height="38" fill="#5A6B7E" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="294" width="90" height="38" fill="#33485E" stroke="#5A6B7E" stroke-width="0.75"/>
  <rect x="580" y="332" width="90" height="38" fill="#16283E" stroke="#5A6B7E" stroke-width="0.75"/>
  <text x="684" y="129" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.50</text>
  <text x="684" y="167" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.00</text>
  <text x="684" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.50</text>
  <text x="684" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.00</text>
  <text x="684" y="281" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.50</text>
  <text x="684" y="319" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3.00</text>
  <text x="684" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">4.00</text>
  <text x="627" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">traceable to a national standard</text>
  <text x="627" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">verify: each shift / 8 h / aperture change</text>
  <text x="627" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">agreement within ±0.05</text>
</svg>
