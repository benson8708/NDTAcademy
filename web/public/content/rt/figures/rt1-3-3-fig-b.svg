<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Inverse Square Law</text>

  <!-- center axis -->
  <line x1="70" y1="235" x2="740" y2="235" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- diverging rays -->
  <line x1="70" y1="235" x2="490" y2="145" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="70" y1="235" x2="490" y2="325" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="252" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Same photons, spreading over more area</text>

  <!-- source -->
  <circle cx="70" cy="235" r="16" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <circle cx="70" cy="235" r="9" fill="#F2A33C"/>
  <text x="70" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>

  <!-- square at d -->
  <rect x="210" y="205" width="60" height="60" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="240" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Area 1</text>
  <text x="240" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">I</text>

  <!-- square at 2d -->
  <rect x="350" y="175" width="120" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="410" y1="175" x2="410" y2="295" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="350" y1="235" x2="470" y2="235" stroke="#5A6B7E" stroke-width="1"/>
  <text x="410" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Area &#215; 4</text>
  <text x="412" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">I/4</text>

  <!-- square at 3d -->
  <rect x="490" y="145" width="180" height="180" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="550" y1="145" x2="550" y2="325" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="610" y1="145" x2="610" y2="325" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="490" y1="205" x2="670" y2="205" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="490" y1="265" x2="670" y2="265" stroke="#5A6B7E" stroke-width="1"/>
  <text x="580" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Area &#215; 9</text>
  <text x="582" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">I/9</text>

  <!-- distance droplines and labels -->
  <line x1="210" y1="265" x2="210" y2="372" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="350" y1="295" x2="350" y2="372" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="490" y1="325" x2="490" y2="372" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">d</text>
  <text x="350" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2d</text>
  <text x="490" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3d</text>

  <!-- formula box -->
  <rect x="560" y="58" width="210" height="42" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="665" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">I&#8321;d&#8321;&#178; = I&#8322;d&#8322;&#178;</text>

  <!-- bottom note -->
  <line x1="60" y1="406" x2="740" y2="406" stroke="#D9E0E8" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Twice the distance, one quarter the intensity: 40 R/h at 1 m becomes 400 mR/h at 10 m, 4 mR/h at 100 m</text>
</svg>
