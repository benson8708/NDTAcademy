<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Weld Process Signatures - Simulated Film</text>

  <!-- panel 1: GTAW tungsten inclusion -->
  <rect x="45" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="45" y="101" width="330" height="52" fill="#E8F1FB" fill-opacity="0.15"/>
  <line x1="45" y1="101" x2="375" y2="101" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="45" y1="153" x2="375" y2="153" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="210" cy="127" r="9" fill="#E8F1FB" fill-opacity="0.35"/>
  <circle cx="210" cy="127" r="6" fill="#E8F1FB"/>
  <text x="210" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">GTAW - tungsten inclusion: sharp LIGHT spot</text>

  <!-- panel 2: SMAW wagon tracks -->
  <rect x="425" y="62" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="425" y="101" width="330" height="52" fill="#E8F1FB" fill-opacity="0.15"/>
  <line x1="425" y1="101" x2="755" y2="101" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="425" y1="153" x2="755" y2="153" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <polyline points="455,107 495,104 535,109 575,105 615,110 655,106 695,109 725,106" fill="none" stroke="#0A2342" stroke-width="3"/>
  <polyline points="455,148 495,151 535,146 575,150 615,146 655,150 695,147 725,150" fill="none" stroke="#0A2342" stroke-width="3"/>
  <text x="590" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SMAW - wagon tracks: slag along groove faces</text>

  <!-- panel 3: GMAW-S lack of fusion -->
  <rect x="45" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="45" y="289" width="330" height="52" fill="#E8F1FB" fill-opacity="0.15"/>
  <line x1="45" y1="289" x2="375" y2="289" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="45" y1="341" x2="375" y2="341" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="85" y1="294" x2="335" y2="294" stroke="#0A2342" stroke-width="3"/>
  <text x="210" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">GMAW-S - sidewall lack of fusion: straight line</text>

  <!-- panel 4: wind porosity -->
  <rect x="425" y="250" width="330" height="130" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="425" y="289" width="330" height="52" fill="#E8F1FB" fill-opacity="0.15"/>
  <line x1="425" y1="289" x2="755" y2="289" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="425" y1="341" x2="755" y2="341" stroke="#D9E0E8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="500" cy="312" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="530" cy="328" r="5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="558" cy="305" r="3.5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="588" cy="320" r="5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="612" cy="300" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="640" cy="330" r="4.5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="668" cy="310" r="3.5" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="695" cy="324" r="4" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="572" cy="334" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <circle cx="525" cy="300" r="3" fill="#0A2342" fill-opacity="0.9"/>
  <text x="590" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Wind-stripped shield - scattered porosity</text>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Light = more metal in the beam; dark = less. The pale band is the weld reinforcement.</text>
</svg>
