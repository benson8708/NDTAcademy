<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Gamma Exposure Device (Camera) Cross-Section</text>

  <!-- device body -->
  <rect x="320" y="150" width="170" height="170" rx="14" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="3"/>
  <!-- depleted uranium shield block -->
  <rect x="335" y="170" width="140" height="135" rx="8" fill="#1B82E8" opacity="0.45" stroke="#E8F1FB" stroke-width="2"/>

  <!-- S-shaped channel -->
  <path d="M 365 300 C 360 250 470 250 460 205 C 455 185 410 185 405 205" fill="none" stroke="#0A2342" stroke-width="12"/>
  <path d="M 365 300 C 360 250 470 250 460 205 C 455 185 410 185 405 205" fill="none" stroke="#D9E0E8" stroke-width="6"/>

  <!-- source parked in center of S -->
  <circle cx="430" cy="232" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- drive cable port (left) -->
  <rect x="225" y="240" width="95" height="34" rx="5" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M 120 257 q 30 -20 50 0 q 25 18 55 0" fill="none" stroke="#F2A33C" stroke-width="5"/>

  <!-- guide tube port (right) to collimator -->
  <line x1="475" y1="205" x2="600" y2="180" stroke="#D9E0E8" stroke-width="8"/>
  <!-- collimator -->
  <path d="M 600 155 L 660 168 L 660 192 L 600 205 Z" fill="#5A6B7E" stroke="#F2A33C" stroke-width="3"/>
  <!-- beam out of collimator -->
  <polygon points="660,176 720,150 720,210 660,184" fill="#F2A33C" opacity="0.5"/>
  <!-- part being shot -->
  <rect x="715" y="150" width="14" height="60" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>

  <!-- leader lines -->
  <line x1="405" y1="190" x2="405" y2="110" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="430" y1="241" x2="430" y2="360" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="340" y1="240" x2="240" y2="200" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="170" y1="252" x2="170" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="540" y1="192" x2="540" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="630" y1="178" x2="630" y2="110" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- labels -->
  <text x="405" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Depleted-uranium shield</text>
  <text x="430" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Source parked in S-channel</text>
  <text x="190" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">S-shaped channel</text>
  <text x="170" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Drive-cable port</text>
  <text x="540" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Guide tube</text>
  <text x="630" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Collimator + part</text>

  <!-- note -->
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">The S-curve blocks any straight-line escape path while the source is stored.</text>
</svg>
