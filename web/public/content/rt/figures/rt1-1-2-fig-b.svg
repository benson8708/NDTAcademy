<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Powers of Ten a Radiographer Uses Daily</text>

  <!-- axis -->
  <line x1="90" y1="250" x2="730" y2="250" stroke="#0A2342" stroke-width="4"/>
  <polygon points="730,242 750,250 730,258" fill="#0A2342"/>
  <text x="745" y="280" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">exponent of 10</text>

  <!-- tick 10^-3 -->
  <line x1="130" y1="238" x2="130" y2="262" stroke="#0A2342" stroke-width="3"/>
  <text x="130" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10⁻³</text>
  <line x1="130" y1="262" x2="130" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="130" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">milli-</text>
  <text x="130" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 mCi = 10⁻³ Ci</text>
  <text x="130" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 mR = 10⁻³ R</text>

  <!-- tick 10^0 -->
  <line x1="240" y1="238" x2="240" y2="262" stroke="#0A2342" stroke-width="3"/>
  <text x="240" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10⁰</text>
  <line x1="240" y1="238" x2="240" y2="180" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="240" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">one</text>
  <text x="240" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 Bq = 1 dps</text>

  <!-- tick 10^3 -->
  <line x1="350" y1="238" x2="350" y2="262" stroke="#0A2342" stroke-width="3"/>
  <text x="350" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10³</text>
  <line x1="350" y1="262" x2="350" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="350" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">kilo-</text>
  <text x="350" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 kV = 10³ V</text>

  <!-- tick 10^6 -->
  <line x1="460" y1="238" x2="460" y2="262" stroke="#0A2342" stroke-width="3"/>
  <text x="460" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10⁶</text>
  <line x1="460" y1="238" x2="460" y2="180" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="460" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">mega-</text>
  <text x="460" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 MeV = 10⁶ eV</text>

  <!-- tick 10^9 -->
  <line x1="570" y1="238" x2="570" y2="262" stroke="#0A2342" stroke-width="3"/>
  <text x="570" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">10⁹</text>
  <line x1="570" y1="262" x2="570" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="570" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">giga-</text>
  <text x="570" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 GBq = 10⁹ Bq</text>

  <!-- tick 10^10 marker for curie -->
  <line x1="680" y1="238" x2="680" y2="262" stroke="#D14343" stroke-width="3"/>
  <text x="680" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">10¹⁰</text>
  <line x1="680" y1="238" x2="680" y2="180" stroke="#D14343" stroke-width="1.5"/>
  <text x="680" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">1 curie</text>
  <text x="680" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3.7 × 10¹⁰ dps</text>

  <!-- conversion strip -->
  <rect x="90" y="390" width="640" height="42" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="410" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Slide the decimal left → exponent up.  Slide right → exponent down.  37,000,000,000 = 3.7 × 10¹⁰</text>
</svg>
