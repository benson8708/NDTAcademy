<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Film Storage - Five Rules</text>

  <!-- P1: on edge -->
  <rect x="45" y="60" width="225" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <line x1="65" y1="170" x2="250" y2="170" stroke="#D9E0E8" stroke-width="3"/>
  <rect x="75" y="110" width="24" height="60" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="105" y="110" width="24" height="60" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="135" y="110" width="24" height="60" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="180" y="136" width="55" height="10" fill="#5A6B7E"/>
  <rect x="180" y="148" width="55" height="10" fill="#5A6B7E"/>
  <line x1="178" y1="128" x2="238" y2="164" stroke="#D14343" stroke-width="4"/>
  <line x1="238" y1="128" x2="178" y2="164" stroke="#D14343" stroke-width="4"/>
  <text x="157" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Store on edge -</text>
  <text x="157" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">never flat stacks</text>

  <!-- P2: cool and dry -->
  <rect x="288" y="60" width="225" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <rect x="330" y="84" width="10" height="70" rx="5" fill="#E8F1FB"/>
  <rect x="333" y="110" width="4" height="48" fill="#D14343"/>
  <circle cx="335" cy="162" r="12" fill="#D14343"/>
  <path d="M 420 96 q -20 28 0 44 q 20 -16 0 -44" fill="#1B82E8"/>
  <text x="400" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Cool and dry</text>
  <text x="400" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">50-75 °F, 30-60% RH</text>

  <!-- P3: radiation -->
  <rect x="531" y="60" width="225" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="575" cy="120" r="10" fill="#F2A33C"/>
  <line x1="575" y1="100" x2="575" y2="88" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="575" y1="140" x2="575" y2="152" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="557" y1="110" x2="546" y2="104" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="557" y1="130" x2="546" y2="136" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="593" y1="110" x2="604" y2="104" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="593" y1="130" x2="604" y2="136" stroke="#F2A33C" stroke-width="2.5"/>
  <rect x="648" y="95" width="78" height="55" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="687" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Pb bin</text>
  <text x="643" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Shield from radiation</text>
  <text x="643" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">fog builds with dose</text>

  <!-- P4: no fumes -->
  <rect x="168" y="248" width="225" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 255 290 L 255 326 L 238 360 L 300 360 L 283 326 L 283 290 Z" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <polygon points="243,350 295,350 300,360 238,360" fill="#1E9E6A"/>
  <path d="M 258 284 q 5 -8 0 -16" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 269 284 q 5 -8 0 -16" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 280 284 q 5 -8 0 -16" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="225" y1="272" x2="312" y2="366" stroke="#D14343" stroke-width="5"/>
  <line x1="312" y1="272" x2="225" y2="366" stroke="#D14343" stroke-width="5"/>
  <text x="280" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">No chemical fumes</text>
  <text x="280" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">ammonia, solvent vapors</text>

  <!-- P5: FIFO -->
  <rect x="411" y="248" width="225" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <rect x="440" y="290" width="55" height="55" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="467" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">OLD</text>
  <rect x="540" y="290" width="55" height="55" fill="#5A6B7E" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="567" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">NEW</text>
  <line x1="467" y1="348" x2="467" y2="366" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="461,364 473,364 467,376" fill="#F2A33C"/>
  <text x="523" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Rotate stock - FIFO</text>
  <text x="523" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">check expiry dates</text>

  <!-- bottom note -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Heat, humidity, radiation, fumes, pressure, and age all raise base + fog and flatten contrast.</text>
</svg>
