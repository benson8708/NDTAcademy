<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">X-ray Tube and Generator Circuit</text>

  <!-- AC supply -->
  <circle cx="80" cy="250" r="26" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 66 250 q 7 -14 14 0 q 7 14 14 0" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <text x="80" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">AC line</text>

  <!-- step-up transformer (two coils) -->
  <rect x="140" y="210" width="14" height="80" fill="#5A6B7E"/>
  <rect x="170" y="195" width="14" height="110" fill="#5A6B7E"/>
  <line x1="106" y1="235" x2="140" y2="235" stroke="#0A2342" stroke-width="2"/>
  <line x1="106" y1="265" x2="140" y2="265" stroke="#0A2342" stroke-width="2"/>
  <text x="162" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Step-up transformer</text>

  <!-- rectifier (diode symbol) -->
  <polygon points="240,250 270,235 270,265" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="270" y1="232" x2="270" y2="268" stroke="#0A2342" stroke-width="3"/>
  <line x1="184" y1="240" x2="240" y2="240" stroke="#0A2342" stroke-width="2"/>
  <line x1="184" y1="260" x2="220" y2="260" stroke="#0A2342" stroke-width="2"/>
  <line x1="220" y1="260" x2="220" y2="305" stroke="#0A2342" stroke-width="2"/>
  <text x="255" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Rectifier</text>

  <!-- HV leads to tube -->
  <line x1="270" y1="250" x2="330" y2="250" stroke="#D14343" stroke-width="3"/>
  <line x1="330" y1="250" x2="330" y2="180" stroke="#D14343" stroke-width="3"/>
  <line x1="220" y1="305" x2="640" y2="305" stroke="#0A2342" stroke-width="3"/>
  <line x1="640" y1="305" x2="640" y2="200" stroke="#0A2342" stroke-width="3"/>

  <!-- X-ray tube envelope -->
  <rect x="360" y="150" width="300" height="110" rx="50" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- cathode + filament -->
  <path d="M 392 195 q -10 10 0 20 q 10 -10 0 -20" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <line x1="330" y1="180" x2="392" y2="195" stroke="#D14343" stroke-width="3"/>
  <text x="392" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Cathode / filament</text>

  <!-- electron stream -->
  <line x1="402" y1="205" x2="588" y2="205" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="588,199 604,205 588,211" fill="#1B82E8"/>
  <text x="495" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">electrons</text>

  <!-- anode + angled target -->
  <rect x="612" y="170" width="26" height="80" fill="#B87333" stroke="#0A2342" stroke-width="2"/>
  <polygon points="600,250 612,250 612,180" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="660" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Anode + target</text>
  <line x1="630" y1="175" x2="660" y2="145" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- X-ray beam down -->
  <polygon points="606,250 582,330 642,330 618,250" fill="#F2A33C" opacity="0.5"/>
  <text x="612" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">X-ray beam</text>

  <!-- vacuum label -->
  <text x="500" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">(evacuated envelope)</text>

  <!-- bottom note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">kVp sets electron energy (penetration); mA (filament heat) sets electron quantity (intensity).</text>
</svg>
