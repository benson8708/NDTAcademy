<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Typical X-ray Exposure Chart - Steel</text>

  <!-- horizontal log gridlines -->
  <line x1="90" y1="380" x2="560" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="335" x2="560" y2="335" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="275" x2="560" y2="275" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="230" x2="560" y2="230" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="185" x2="560" y2="185" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="125" x2="560" y2="125" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="90" y1="80" x2="560" y2="80" stroke="#D9E0E8" stroke-width="1"/>

  <!-- vertical gridlines -->
  <line x1="184" y1="80" x2="184" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="278" y1="80" x2="278" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="372" y1="80" x2="372" y2="380" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="466" y1="80" x2="466" y2="380" stroke="#D9E0E8" stroke-width="1"/>

  <!-- axes -->
  <line x1="90" y1="80" x2="90" y2="380" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="90" y1="380" x2="560" y2="380" stroke="#0A2342" stroke-width="2.5"/>

  <!-- y labels (log scale) -->
  <text x="82" y="385" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1</text>
  <text x="82" y="340" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2</text>
  <text x="82" y="280" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5</text>
  <text x="82" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10</text>
  <text x="82" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20</text>
  <text x="82" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50</text>
  <text x="82" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text transform="rotate(-90 34 230)" x="34" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Exposure (mA·min, log scale)</text>

  <!-- x labels -->
  <text x="90" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="184" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.25</text>
  <text x="278" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.50</text>
  <text x="372" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.75</text>
  <text x="466" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.00</text>
  <text x="560" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.25</text>
  <text x="325" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Steel thickness (in.)</text>

  <!-- example read-out dashes -->
  <line x1="372" y1="380" x2="372" y2="198" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="372" y1="198" x2="90" y2="198" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="372" cy="198" r="5" fill="#0A2342"/>
  <text x="98" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">≈ 16 mA·min</text>

  <!-- kV lines -->
  <line x1="165" y1="263" x2="353" y2="113" stroke="#D14343" stroke-width="3"/>
  <line x1="165" y1="298" x2="428" y2="113" stroke="#F2A33C" stroke-width="3"/>
  <line x1="165" y1="323" x2="504" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <line x1="203" y1="349" x2="560" y2="158" stroke="#1E9E6A" stroke-width="3"/>

  <text x="350" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">140 kV</text>
  <text x="430" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">160 kV</text>
  <text x="508" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">180 kV</text>
  <text x="556" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">220 kV</text>

  <!-- conditions box -->
  <rect x="585" y="80" width="200" height="180" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="685" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Chart valid only for:</text>
  <text x="600" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Class II film</text>
  <text x="600" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Density 2.0</text>
  <text x="600" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">SFD 36 in.</text>
  <text x="600" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.005 in. Pb screens</text>
  <text x="600" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Manual dev 5 min, 68 °F</text>

  <!-- how to read note -->
  <text x="685" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Enter at thickness,</text>
  <text x="685" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">rise to the kV line,</text>
  <text x="685" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">read exposure across.</text>
  <text x="685" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Lower kV = steeper line</text>
</svg>
