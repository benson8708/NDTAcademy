<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Orientation Atlas: Predict the Find</text>

  <!-- quadrant frames -->
  <rect x="40" y="56" width="345" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="415" y="56" width="345" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="40" y="252" width="345" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="415" y="252" width="345" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- Q1: shrinkage at T-junction -->
  <rect x="175" y="72" width="55" height="74" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="95" y="144" width="215" height="40" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="202" cy="152" r="26" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M195,148 L203,143 L210,149 L206,157 L197,158 Z" fill="#D14343" opacity="0.85"/>
  <line x1="193" y1="156" x2="184" y2="161" stroke="#D14343" stroke-width="2"/>
  <line x1="209" y1="146" x2="216" y2="140" stroke="#D14343" stroke-width="2"/>
  <text x="212" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Shrinkage seeks the thermal center</text>
  <text x="212" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">of L, T, V, X junctions — last to freeze</text>

  <!-- Q2: hot tear at section change -->
  <rect x="455" y="82" width="115" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="570" y="104" width="150" height="38" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polyline points="572,100 582,114 568,127 581,141" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="582" y1="114" x2="592" y2="108" stroke="#D14343" stroke-width="2"/>
  <text x="588" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Hot tears form at section changes</text>
  <text x="588" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ragged and branched, at points of restraint</text>

  <!-- Q3: gas rises to the cope -->
  <line x1="80" y1="292" x2="330" y2="292" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="335" y="296" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">cope</text>
  <rect x="95" y="300" width="220" height="55" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="140" cy="308" r="3.5" fill="#D14343"/>
  <circle cx="170" cy="306" r="3" fill="#D14343"/>
  <circle cx="200" cy="309" r="3.5" fill="#D14343"/>
  <circle cx="230" cy="306" r="3" fill="#D14343"/>
  <circle cx="260" cy="308" r="3.5" fill="#D14343"/>
  <line x1="155" y1="344" x2="155" y2="320" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="150,320 155,310 160,320" fill="#F2A33C"/>
  <line x1="215" y1="344" x2="215" y2="320" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="210,320 215,310 220,320" fill="#F2A33C"/>
  <text x="205" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Gas porosity floats upward</text>
  <text x="205" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">to the cope surface and under cores</text>

  <!-- Q4: cold shut far from the gate -->
  <rect x="455" y="303" width="265" height="40" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="468" y1="323" x2="556" y2="323" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="556,318 568,323 556,328" fill="#F2A33C"/>
  <line x1="708" y1="323" x2="620" y2="323" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="620,318 608,323 620,328" fill="#F2A33C"/>
  <path d="M588,306 Q582,323 588,340" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <text x="587" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Cold shut: two cold fronts meet</text>
  <text x="587" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a smooth seam far from the gate</text>
</svg>
