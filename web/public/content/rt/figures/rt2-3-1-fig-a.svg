<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Retention-Life Testing: Residual Thiosulfate</text>

  <!-- process chain -->
  <rect x="40" y="70" width="130" height="56" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="105" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1 · FIX</text>
  <text x="105" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">fresh, full time</text>

  <line x1="170" y1="98" x2="200" y2="98" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="200,91 214,98 200,105" fill="#1B82E8"/>

  <rect x="218" y="70" width="150" height="56" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="293" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">2 · WASH</text>
  <text x="293" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">running water</text>
  <text x="293" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">20–30 min, several changes/hr</text>

  <line x1="368" y1="98" x2="398" y2="98" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="398,91 412,98 398,105" fill="#1B82E8"/>

  <rect x="416" y="70" width="150" height="56" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="491" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">3 · TEST</text>
  <text x="491" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sample each batch</text>

  <!-- film with spot test -->
  <rect x="615" y="64" width="150" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="690" cy="115" r="16" fill="#F2A33C" opacity="0.85"/>
  <circle cx="690" cy="115" r="7" fill="#F2A33C"/>
  <text x="690" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">processed film</text>
  <line x1="690" y1="133" x2="690" y2="186" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="690" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">test-drop stain</text>

  <!-- comparison patches -->
  <text x="60" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Compare the stain with calibrated patches:</text>
  <rect x="60" y="264" width="70" height="70" fill="#F2A33C" opacity="0.18" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="150" y="264" width="70" height="70" fill="#F2A33C" opacity="0.45" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="240" y="264" width="70" height="70" fill="#F2A33C" opacity="0.72" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="330" y="264" width="70" height="70" fill="#F2A33C" opacity="1" stroke="#0A2342" stroke-width="1.5"/>
  <text x="95" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">0.5</text>
  <text x="185" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1</text>
  <text x="275" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2</text>
  <text x="365" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4</text>
  <text x="230" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">µg/cm² residual thiosulfate</text>
  <line x1="60" y1="394" x2="310" y2="394" stroke="#1E9E6A" stroke-width="4"/>
  <text x="185" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">≤ ~2 µg/cm² — archival quality</text>
  <line x1="330" y1="394" x2="400" y2="394" stroke="#D14343" stroke-width="4"/>
  <text x="365" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">fails</text>

  <!-- consequence note -->
  <rect x="470" y="250" width="295" height="120" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="617" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">More residual hypo means:</text>
  <text x="617" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">silver sulfide forms in storage,</text>
  <text x="617" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">background stains yellow-brown,</text>
  <text x="617" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fine image detail fades first</text>

  <text x="470" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Lab referee: methylene blue method (µg/cm²)</text>
  <text x="60" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Darker stain = more hypo = shorter life</text>
</svg>
