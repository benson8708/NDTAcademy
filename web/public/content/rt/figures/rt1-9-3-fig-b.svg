<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Multiple-Film Loading: One Exposure, Two Thickness Ranges</text>

  <!-- source -->
  <circle cx="400" cy="78" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="445" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Source</text>
  <line x1="400" y1="86" x2="250" y2="190" stroke="#F2A33C" stroke-width="2"/>
  <line x1="400" y1="86" x2="400" y2="190" stroke="#F2A33C" stroke-width="2"/>
  <line x1="400" y1="86" x2="550" y2="190" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="394,184 406,184 400,196" fill="#F2A33C"/>

  <!-- stepped part: thick left, thin right -->
  <path d="M 180 190 L 400 190 L 400 230 L 620 230 L 620 262 L 180 262 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="3"/>
  <text x="290" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">THICK section (1.5 in.)</text>
  <text x="510" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">THIN section (0.5 in.)</text>

  <!-- cassette with two films -->
  <rect x="180" y="282" width="440" height="58" rx="5" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <rect x="192" y="294" width="416" height="12" fill="#1B82E8"/>
  <rect x="192" y="316" width="416" height="12" fill="#1E9E6A"/>
  <text x="640" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">FAST film</text>
  <text x="640" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">SLOW film</text>
  <text x="160" y="315" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cassette,</text>
  <text x="160" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">lead screens</text>

  <!-- result strips -->
  <rect x="180" y="368" width="200" height="46" fill="#0A2342"/>
  <rect x="180" y="368" width="200" height="46" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="280" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Fast film reads THICK side</text>

  <rect x="420" y="368" width="200" height="46" fill="#0A2342"/>
  <rect x="420" y="368" width="200" height="46" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="520" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Slow film reads THIN side</text>

  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Other uses: duplicate records (equal-speed films) and composite viewing (densities add; each film meets its own minimum)</text>
</svg>
