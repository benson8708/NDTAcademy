<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">Localized Magnification and Film Handling at the Viewer</text>

  <!-- illuminator body -->
  <rect x="50" y="64" width="410" height="310" rx="10" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <!-- lit aperture -->
  <rect x="80" y="94" width="350" height="250" fill="#E8F1FB"/>
  <!-- masks -->
  <rect x="80" y="94" width="350" height="62" fill="#0A2342"/>
  <rect x="80" y="288" width="350" height="56" fill="#0A2342"/>
  <text x="255" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">edge mask blocks stray light</text>

  <!-- film on the slit -->
  <rect x="92" y="166" width="326" height="108" fill="#46586C" stroke="#0A2342" stroke-width="2"/>
  <rect x="230" y="166" width="56" height="108" fill="#6E8095"/>
  <polyline points="252,186 257,202 251,219 258,236 253,252" fill="none" stroke="#0A2342" stroke-width="1.5"/>

  <!-- loupe with magnified crack -->
  <circle cx="310" cy="220" r="50" fill="#E8F1FB" stroke="#F2A33C" stroke-width="4"/>
  <polyline points="295,193 306,209 297,228 308,246" fill="none" stroke="#0A2342" stroke-width="3.5"/>

  <!-- gloved hand holding film corner -->
  <rect x="96" y="242" width="40" height="34" rx="10" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="98" y="228" width="9" height="18" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1"/>
  <rect x="112" y="224" width="9" height="22" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1"/>
  <rect x="126" y="228" width="9" height="18" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1"/>
  <text x="140" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">cotton gloves -</text>
  <text x="140" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">edges only</text>

  <text x="255" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">low-power loupe: 2x to 3x over the area of interest</text>

  <!-- right column tips -->
  <text x="490" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Handle the record like evidence</text>
  <text x="490" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">- white cotton gloves, touch edges only</text>
  <text x="490" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">- one film out of its envelope at a time</text>
  <text x="490" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">- never slide films across each other</text>
  <text x="490" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">- keep the illuminator glass clean</text>

  <!-- fingerprint icon, crossed out -->
  <ellipse cx="525" cy="238" rx="20" ry="27" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 515 228 Q 525 221 535 228" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 513 240 Q 525 232 537 240" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 515 252 Q 525 245 535 252" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="500" y1="262" x2="550" y2="214" stroke="#D14343" stroke-width="4"/>
  <text x="560" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">no fingerprints</text>

  <!-- crescent crimp mark inset -->
  <rect x="495" y="290" width="90" height="62" fill="#46586C" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M 518 334 Q 538 308 558 332" fill="none" stroke="#0A2342" stroke-width="4"/>
  <text x="600" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">crescent crimp mark:</text>
  <text x="600" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dark = bent after exposure</text>
  <text x="600" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">light = bent before</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">beyond about 5x magnification you are reading film grain, not the flaw</text>
</svg>
