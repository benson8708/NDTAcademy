<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Penetrating Power of Alpha, Beta, Gamma, and Neutron Radiation</text>

  <!-- barriers -->
  <rect x="296" y="84" width="10" height="296" fill="#E8F1FB"/>
  <text x="301" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Paper</text>

  <rect x="426" y="84" width="16" height="296" fill="#D9E0E8"/>
  <text x="434" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Aluminum</text>

  <rect x="556" y="84" width="26" height="296" fill="#5A6B7E"/>
  <text x="569" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Lead</text>

  <rect x="676" y="84" width="44" height="296" fill="#1B82E8" fill-opacity="0.35" stroke="#1B82E8" stroke-width="2"/>
  <text x="698" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Water /</text>
  <text x="698" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">polyethylene</text>

  <!-- ALPHA row y=130 -->
  <text x="56" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Alpha (&#945;)</text>
  <text x="56" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">+2 charge, heavy</text>
  <line x1="170" y1="130" x2="288" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <circle cx="292" cy="130" r="7" fill="#F2A33C"/>
  <text x="248" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">stopped by paper</text>

  <!-- BETA row y=200 -->
  <text x="56" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Beta (&#946;)</text>
  <text x="56" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">&#8722;1 charge, light</text>
  <line x1="170" y1="200" x2="296" y2="200" stroke="#1E9E6A" stroke-width="4"/>
  <line x1="306" y1="200" x2="420" y2="200" stroke="#1E9E6A" stroke-width="4"/>
  <circle cx="424" cy="200" r="7" fill="#1E9E6A"/>
  <text x="366" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">stopped by thin aluminum</text>

  <!-- GAMMA row y=270 -->
  <text x="56" y="276" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Gamma / X-ray</text>
  <text x="56" y="296" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">photon: no mass, no charge</text>
  <line x1="200" y1="270" x2="296" y2="270" stroke="#D14343" stroke-width="4"/>
  <line x1="306" y1="270" x2="426" y2="270" stroke="#D14343" stroke-width="4"/>
  <line x1="442" y1="270" x2="556" y2="270" stroke="#D14343" stroke-width="4"/>
  <line x1="582" y1="270" x2="700" y2="270" stroke="#D14343" stroke-width="2" stroke-dasharray="7 6"/>
  <polygon points="700,264 716,270 700,276" fill="#D14343"/>
  <text x="652" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">lead thins the beam -</text>
  <text x="660" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">never stops every photon</text>

  <!-- NEUTRON row y=340 -->
  <text x="56" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Neutron (n)</text>
  <text x="56" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">no charge, proton mass</text>
  <line x1="200" y1="340" x2="296" y2="340" stroke="#1B82E8" stroke-width="4"/>
  <line x1="306" y1="340" x2="426" y2="340" stroke="#1B82E8" stroke-width="4"/>
  <line x1="442" y1="340" x2="556" y2="340" stroke="#1B82E8" stroke-width="4"/>
  <line x1="582" y1="340" x2="694" y2="340" stroke="#1B82E8" stroke-width="4"/>
  <circle cx="700" cy="340" r="7" fill="#1B82E8"/>
  <text x="636" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1B82E8">slowed by hydrogen-rich material</text>

  <!-- source -->
  <rect x="130" y="96" width="34" height="276" rx="8" fill="#F2A33C" fill-opacity="0.18" stroke="#F2A33C" stroke-width="2"/>
  <text x="147" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C" transform="rotate(-90 147 238)">RADIATION SOURCE</text>

  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Charged particles have a definite range; photons attenuate exponentially (half-value layers); neutrons need hydrogen.</text>
</svg>
