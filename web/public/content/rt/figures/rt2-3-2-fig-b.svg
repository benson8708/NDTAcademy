<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Film Artifact Gallery: Know the Signatures</text>

  <!-- P1 crimp marks -->
  <rect x="30" y="70" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M 85 90 Q 105 110 85 130" fill="none" stroke="#E8F1FB" stroke-width="5"/>
  <path d="M 185 90 Q 165 110 185 130" fill="none" stroke="#0A2342" stroke-width="5"/>
  <text x="140" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Crimp marks — light: kinked before</text>
  <text x="140" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">exposure · dark: kinked after</text>

  <!-- P2 static -->
  <rect x="290" y="70" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="375,82 392,108 386,136 398,164" fill="none" stroke="#0A2342" stroke-width="3"/>
  <polyline points="392,108 412,116 422,108" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="386,136 364,148" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="398,164 418,170" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="436" cy="100" r="2.5" fill="#0A2342"/>
  <circle cx="352" cy="120" r="2.5" fill="#0A2342"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Static — dark branching, tree-like</text>
  <text x="400" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">lines; dry air + fast handling</text>

  <!-- P3 air bells -->
  <rect x="550" y="70" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="610" cy="105" r="10" fill="#E8F1FB"/>
  <circle cx="655" cy="140" r="8" fill="#E8F1FB"/>
  <circle cx="700" cy="98" r="12" fill="#E8F1FB"/>
  <text x="660" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Air bells — light round spots;</text>
  <text x="660" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">bubbles clung in the developer</text>

  <!-- P4 light leak -->
  <rect x="30" y="250" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="196" y="250" width="18" height="110" fill="#0A2342" opacity="0.4"/>
  <rect x="212" y="250" width="38" height="110" fill="#0A2342" opacity="0.85"/>
  <text x="140" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Light leak — same dark edge band</text>
  <text x="140" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">on every film from one cassette</text>

  <!-- P5 screen dirt -->
  <rect x="290" y="250" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="350" cy="290" r="3" fill="#E8F1FB"/>
  <circle cx="395" cy="320" r="3" fill="#E8F1FB"/>
  <circle cx="430" cy="275" r="3" fill="#E8F1FB"/>
  <circle cx="460" cy="335" r="3" fill="#E8F1FB"/>
  <circle cx="330" cy="330" r="3" fill="#E8F1FB"/>
  <circle cx="410" cy="300" r="4" fill="#E8F1FB"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Screen dirt — sharp light specks;</text>
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">recurs until screens are cleaned</text>

  <!-- P6 streaks -->
  <rect x="550" y="250" width="220" height="110" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="598" y="250" width="10" height="8" fill="#D9E0E8"/>
  <rect x="688" y="250" width="10" height="8" fill="#D9E0E8"/>
  <rect x="595" y="258" width="16" height="70" fill="#0A2342" opacity="0.35"/>
  <rect x="640" y="258" width="10" height="88" fill="#0A2342" opacity="0.3"/>
  <rect x="685" y="258" width="16" height="60" fill="#0A2342" opacity="0.4"/>
  <text x="660" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Surge / streak marks — uneven</text>
  <text x="660" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">density from poor agitation</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Rule out the artifact before calling the discontinuity</text>
</svg>
