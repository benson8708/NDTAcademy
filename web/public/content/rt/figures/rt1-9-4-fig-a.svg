<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Direct vs Remote Screen Viewing</text>

  <!-- ===== TOP: DIRECT ===== -->
  <text x="70" y="78" text-anchor="start" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#F2A33C">DIRECT VIEWING (dark room, dark-adapted eye)</text>

  <!-- tube -->
  <rect x="70" y="110" width="70" height="44" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="105" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">X-ray tube</text>
  <!-- beam -->
  <polygon points="140,132 320,108 320,156" fill="#F2A33C" opacity="0.35"/>
  <line x1="140" y1="132" x2="320" y2="132" stroke="#F2A33C" stroke-width="2"/>
  <!-- part -->
  <rect x="240" y="114" width="26" height="38" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="253" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Part</text>
  <!-- fluorescent screen -->
  <rect x="320" y="100" width="12" height="64" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="2"/>
  <text x="326" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Fluorescent screen</text>
  <!-- lead glass -->
  <rect x="354" y="96" width="20" height="72" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="404" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Lead glass</text>
  <!-- eye -->
  <circle cx="430" cy="132" r="13" fill="#E8F1FB"/>
  <circle cx="434" cy="132" r="5" fill="#0A2342"/>
  <text x="430" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Eye</text>
  <text x="530" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#D14343">Inspector in line with beam:</text>
  <text x="530" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#D14343">lead glass + enclosure required,</text>
  <text x="530" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#D14343">&#8776; 30 min dark adaptation</text>

  <!-- divider -->
  <line x1="40" y1="216" x2="760" y2="216" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="10,8"/>

  <!-- ===== BOTTOM: REMOTE ===== -->
  <text x="70" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1E9E6A">REMOTE VIEWING / RADIOSCOPY (lit control room)</text>

  <!-- shielded enclosure -->
  <rect x="60" y="270" width="430" height="140" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <text x="80" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">Shielded enclosure, interlocked</text>

  <!-- tube -->
  <rect x="80" y="300" width="64" height="40" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <polygon points="144,320 290,300 290,340" fill="#F2A33C" opacity="0.35"/>
  <!-- part -->
  <rect x="220" y="304" width="24" height="34" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <!-- image intensifier -->
  <path d="M 290 296 L 340 308 L 340 332 L 290 344 Z" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="2"/>
  <text x="315" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A">Image intensifier</text>
  <!-- camera -->
  <rect x="352" y="308" width="36" height="26" rx="4" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="370" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">Camera</text>
  <!-- cable through wall -->
  <line x1="388" y1="321" x2="560" y2="321" stroke="#E8F1FB" stroke-width="3"/>
  <!-- wall -->
  <rect x="500" y="262" width="16" height="152" fill="#5A6B7E"/>
  <text x="508" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Wall</text>
  <!-- monitor -->
  <rect x="560" y="288" width="110" height="74" rx="6" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <rect x="572" y="298" width="86" height="54" fill="#E8F1FB"/>
  <text x="615" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Bright monitor</text>
  <!-- operator -->
  <circle cx="712" cy="310" r="12" fill="#E8F1FB"/>
  <line x1="712" y1="322" x2="712" y2="352" stroke="#E8F1FB" stroke-width="4"/>
  <text x="712" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A">Operator: no dose,</text>
  <text x="712" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A">no dark adaptation</text>

  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Remote viewing takes the eye out of the beam line, then out of the room</text>
</svg>
