<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of a Radiography Report</text>

  <!-- form body -->
  <rect x="55" y="52" width="470" height="384" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="55" y="52" width="470" height="36" fill="#0A2342"/>
  <text x="290" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RADIOGRAPHIC EXAMINATION REPORT · No. RT-2417</text>

  <!-- identification -->
  <text x="70" y="114" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Customer: Acme Energy · Job 8841 · 10 Jun 2026</text>
  <text x="70" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Part / Weld: Spool 12 · W-7 · Code: piping code</text>
  <line x1="55" y1="150" x2="525" y2="150" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- technique -->
  <text x="70" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">TECHNIQUE</text>
  <text x="70" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Ir-192 · 38 Ci · 2.9 mm source · SFD 24 in.</text>
  <text x="70" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">DWSI · Film class 1 · Pb screens 0.005 in.</text>
  <text x="70" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IQI: wire set B, source side · Proc. RT-P-03 C</text>
  <line x1="55" y1="256" x2="525" y2="256" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- findings -->
  <text x="70" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">FINDINGS</text>
  <text x="70" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sta. 0–4: D 2.8 · wire 7 seen · no rel. ind. · ACC</text>
  <text x="70" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sta. 4–8: D 3.1 · slag 3/16 in., under limit · ACC</text>
  <text x="70" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Sta. 8–12: D 2.6 · IP 1.1 in. · REJ → repair R-1</text>
  <line x1="55" y1="364" x2="525" y2="364" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- signature -->
  <text x="70" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Interpreted: J. Rivera · RT Level II · 10 Jun 2026</text>
  <text x="70" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reviewed: customer representative</text>

  <!-- callout 1: traceability -->
  <line x1="527" y1="120" x2="552" y2="106" stroke="#D14343" stroke-width="1.5"/>
  <text x="560" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">TRACEABILITY</text>
  <text x="560" y="122" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">find this weld years</text>
  <text x="560" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">later from the record</text>

  <!-- callout 2: reproducible -->
  <line x1="527" y1="212" x2="552" y2="200" stroke="#D14343" stroke-width="1.5"/>
  <text x="560" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">REPRODUCIBLE</text>
  <text x="560" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">technique data lets a</text>
  <text x="560" y="236" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stranger re-shoot it</text>

  <!-- callout 3: located findings -->
  <line x1="527" y1="320" x2="552" y2="306" stroke="#D14343" stroke-width="1.5"/>
  <text x="560" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">LOCATED FINDINGS</text>
  <text x="560" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">every call tied to the</text>
  <text x="560" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">station markers</text>

  <!-- callout 4: signed -->
  <line x1="527" y1="388" x2="552" y2="396" stroke="#D14343" stroke-width="1.5"/>
  <text x="560" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">SIGNED + LEVELED</text>
  <text x="560" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">disposition per code,</text>
  <text x="560" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">name, level, date</text>
</svg>
