<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Sand Casting Cross-Section: Where Discontinuities Start</text>

  <!-- mold sand body -->
  <rect x="80" y="60" width="640" height="340" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- sand texture dots -->
  <circle cx="100" cy="120" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="118" cy="208" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="96" cy="300" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="110" cy="352" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="684" cy="120" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="700" cy="210" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="690" cy="330" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="680" cy="388" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="300" cy="86" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="500" cy="78" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="650" cy="80" r="2" fill="#5A6B7E" opacity="0.3"/>
  <circle cx="96" cy="170" r="2" fill="#5A6B7E" opacity="0.3"/>

  <!-- parting line -->
  <line x1="80" y1="235" x2="720" y2="235" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="9 6"/>
  <text x="712" y="226" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Parting line</text>
  <text x="104" y="90" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">COPE (top half)</text>
  <text x="104" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">DRAG (bottom half)</text>

  <!-- gating system: basin, sprue, runner, gate -->
  <polygon points="120,60 178,60 160,96 138,96" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="140" y="96" width="18" height="192" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="140" y="288" width="186" height="20" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="326" y="290" width="24" height="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="170" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sprue</text>
  <text x="216" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Runner</text>
  <text x="330" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gate</text>

  <!-- casting cavity: thin web into thick block -->
  <path d="M348,272 L520,272 L520,200 L660,200 L660,360 L520,360 L520,330 L348,330 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>

  <!-- riser above thick section -->
  <rect x="560" y="88" width="52" height="112" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="552" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Riser</text>
  <text x="552" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(feeds shrink)</text>

  <!-- core in thick section -->
  <circle cx="590" cy="288" r="28" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Core</text>

  <!-- gas porosity dots near top of web -->
  <circle cx="392" cy="280" r="3.5" fill="#D14343"/>
  <circle cx="407" cy="277" r="3" fill="#D14343"/>
  <circle cx="421" cy="281" r="3.5" fill="#D14343"/>
  <circle cx="436" cy="278" r="3" fill="#D14343"/>
  <circle cx="450" cy="280" r="3.5" fill="#D14343"/>
  <line x1="421" y1="272" x2="421" y2="166" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="430" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Gas porosity collects</text>
  <text x="430" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">toward the cope surface</text>

  <!-- cold shut in web -->
  <path d="M470,276 Q464,300 470,326" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="430" y1="300" x2="456" y2="300" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="456,295 466,300 456,305" fill="#F2A33C"/>
  <line x1="500" y1="300" x2="486" y2="300" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="486,295 476,300 486,305" fill="#F2A33C"/>
  <line x1="468" y1="278" x2="320" y2="208" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="252" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Cold shut where two</text>
  <text x="252" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">cold fronts meet</text>

  <!-- hot tear at section change -->
  <polyline points="514,276 524,292 512,306 525,320 516,330" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="516" y1="324" x2="472" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="442" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Hot tear at the</text>
  <text x="442" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">section change</text>

  <!-- sand inclusion near gate -->
  <path d="M362,300 L374,294 L384,299 L381,310 L368,312 Z" fill="#5A6B7E"/>
  <line x1="370" y1="312" x2="292" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="248" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Sand washed in</text>
  <text x="248" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">near the gate</text>

  <!-- shrinkage at thermal center of thick block -->
  <path d="M628,238 L638,232 L646,240 L640,250 L630,252 L624,244 Z" fill="#D14343" opacity="0.85"/>
  <line x1="622" y1="246" x2="606" y2="252" stroke="#D14343" stroke-width="2"/>
  <line x1="646" y1="236" x2="654" y2="226" stroke="#D14343" stroke-width="2"/>
  <line x1="634" y1="252" x2="630" y2="262" stroke="#D14343" stroke-width="2"/>
  <line x1="635" y1="256" x2="635" y2="406" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="600" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Shrinkage at the thermal center</text>
  <text x="600" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">when the feed path freezes off</text>
</svg>
