<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Transformer Analogy: the Part Is a Shorted Secondary</text>

  <!-- LEFT PANEL: coil in air -->
  <rect x="45" y="55" width="330" height="390" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#0B1F3A" stroke-width="2"/>
  <text x="210" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Coil in air</text>

  <!-- primary flux ellipse -->
  <ellipse cx="195" cy="160" rx="92" ry="52" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- AC source -->
  <circle cx="110" cy="160" r="17" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 100 160 q 5 -9 10 0 q 5 9 10 0" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="127" y1="160" x2="218" y2="160" stroke="#0B1F3A" stroke-width="2"/>

  <!-- inductor symbol (vertical arcs) -->
  <path d="M 218 120 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="248" y="146" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">test coil</text>
  <text x="248" y="164" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(primary)</text>

  <text x="210" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">full primary flux</text>
  <text x="210" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no conductor — nothing pushes back</text>

  <!-- reference readout -->
  <rect x="75" y="300" width="270" height="116" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="210" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">instrument reads the reference:</text>
  <text x="210" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">reactance X = 2&#960;fL (in-air value)</text>
  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">resistance R = wire resistance only</text>

  <!-- RIGHT PANEL: coil on part -->
  <rect x="425" y="55" width="330" height="390" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#0B1F3A" stroke-width="2"/>
  <text x="590" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Coil on a conductive part</text>

  <!-- AC source + inductor -->
  <circle cx="490" cy="150" r="17" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 480 150 q 5 -9 10 0 q 5 9 10 0" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="507" y1="150" x2="598" y2="150" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 598 110 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20 a 10 10 0 0 1 0 20" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="628" y="136" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">primary</text>
  <text x="628" y="154" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">winding</text>

  <!-- coupling arrows -->
  <line x1="585" y1="196" x2="585" y2="222" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="580,220 590,220 585,230" fill="#1E66F5"/>
  <line x1="615" y1="196" x2="615" y2="222" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="610,220 620,220 615,230" fill="#1E66F5"/>
  <text x="478" y="214" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">magnetic coupling</text>

  <!-- part as single shorted turn -->
  <ellipse cx="600" cy="250" rx="60" ry="17" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="600,225 614,229 600,240" fill="#0B1F3A"/>
  <text x="600" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">test part = one shorted turn</text>
  <text x="600" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">closed through its own resistance</text>

  <!-- what the instrument sees -->
  <rect x="455" y="324" width="270" height="92" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="474,344 488,344 481,360" fill="#1E66F5"/>
  <text x="498" y="356" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">X falls — part of the flux is opposed</text>
  <polygon points="474,396 488,396 481,380" fill="#0B1F3A"/>
  <text x="498" y="394" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">R rises — eddy current I&#178;R heating</text>

  <!-- takeaway -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Whatever loads the secondary reflects into the primary — the instrument reads the part through the coil.</text>
</svg>
