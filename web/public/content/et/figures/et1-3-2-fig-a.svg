<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">What Controls the Eddy Currents</text>

  <!-- left box: test-system parameters -->
  <rect x="28" y="70" width="240" height="340" rx="10" fill="#0B1F3A"/>
  <text x="148" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">TEST-SYSTEM PARAMETERS</text>
  <text x="148" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">set by procedure and probe</text>
  <line x1="48" y1="136" x2="248" y2="136" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="58" cy="163" r="4" fill="#9BC4FF"/>
  <text x="72" y="168" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Test frequency</text>
  <circle cx="58" cy="217" r="4" fill="#9BC4FF"/>
  <text x="72" y="222" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Coil drive: amps × turns</text>
  <circle cx="58" cy="271" r="4" fill="#9BC4FF"/>
  <text x="72" y="276" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Probe type and placement</text>
  <circle cx="58" cy="325" r="4" fill="#9BC4FF"/>
  <text x="72" y="330" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Coupling to the part:</text>
  <text x="72" y="350" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">lift-off / fill factor</text>

  <!-- right box: test-part characteristics -->
  <rect x="532" y="70" width="240" height="340" rx="10" fill="#9BC4FF"/>
  <text x="652" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">TEST-PART CHARACTERISTICS</text>
  <text x="652" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the part brings these</text>
  <line x1="552" y1="136" x2="752" y2="136" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="562" cy="163" r="4" fill="#1E66F5"/>
  <text x="576" y="168" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Electrical conductivity</text>
  <circle cx="562" cy="217" r="4" fill="#1E66F5"/>
  <text x="576" y="222" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Magnetic permeability</text>
  <circle cx="562" cy="271" r="4" fill="#1E66F5"/>
  <text x="576" y="276" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Geometry: thickness, edges</text>
  <circle cx="562" cy="325" r="4" fill="#1E66F5"/>
  <text x="576" y="330" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Discontinuities (flaws)</text>

  <!-- center property chips -->
  <rect x="318" y="92" width="164" height="78" rx="8" fill="#1E66F5"/>
  <text x="400" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">STRENGTH</text>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">how much current flows</text>

  <rect x="318" y="196" width="164" height="78" rx="8" fill="#1E66F5"/>
  <text x="400" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">TIME RELATIONSHIP</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">frequency + phase lag</text>

  <rect x="318" y="300" width="164" height="78" rx="8" fill="#1E66F5"/>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">ORIENTATION</text>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">direction of the loops</text>

  <!-- arrows: left box to chips -->
  <line x1="268" y1="131" x2="308" y2="131" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="308,125 318,131 308,137" fill="#0B1F3A"/>
  <line x1="268" y1="235" x2="308" y2="235" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="308,229 318,235 308,241" fill="#0B1F3A"/>
  <line x1="268" y1="339" x2="308" y2="339" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="308,333 318,339 308,345" fill="#0B1F3A"/>

  <!-- arrows: right box to chips -->
  <line x1="532" y1="131" x2="492" y2="131" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="492,125 482,131 492,137" fill="#0B1F3A"/>
  <line x1="532" y1="235" x2="492" y2="235" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="492,229 482,235 492,241" fill="#0B1F3A"/>
  <line x1="532" y1="339" x2="492" y2="339" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="492,333 482,339 492,345" fill="#0B1F3A"/>

  <!-- down arrow to display bar -->
  <line x1="400" y1="378" x2="400" y2="423" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="394,423 400,433 406,423" fill="#0B1F3A"/>
  <rect x="190" y="433" width="420" height="44" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Sensed as a coil impedance change → instrument display</text>
</svg>
