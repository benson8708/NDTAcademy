<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Fill Factor and the Orientation Rule on Round Stock</text>

  <!-- ============ LEFT TOP: ENCIRCLING COIL END VIEW ============ -->
  <text x="185" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Encircling coil &#8212; end view</text>

  <!-- coil ring -->
  <circle cx="130" cy="180" r="78" fill="none" stroke="#1E66F5" stroke-width="11"/>
  <!-- bar -->
  <circle cx="130" cy="180" r="56" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- d dimension across the bar -->
  <line x1="74" y1="180" x2="186" y2="180" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="74" y1="174" x2="74" y2="186" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="186" y1="174" x2="186" y2="186" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="152" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">d</text>
  <!-- D label on the coil ring -->
  <text x="196" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">D</text>
  <line x1="194" y1="119" x2="186" y2="126" stroke="#1E66F5" stroke-width="1.5"/>
  <!-- center: zero current density -->
  <circle cx="130" cy="180" r="3.5" fill="#0B1F3A"/>
  <line x1="131" y1="185" x2="139" y2="272" stroke="#0B1F3A" stroke-width="1"/>
  <text x="140" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">zero current at bar center</text>

  <!-- formula block -->
  <text x="240" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fill factor</text>
  <text x="240" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">&#951; = (d / D)&#178;</text>
  <text x="240" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">keep &#951; close to 1</text>
  <text x="240" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">loose coil &#8594; weak signal</text>

  <!-- ============ LEFT BOTTOM: BOBBIN COIL END VIEW ============ -->
  <text x="185" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Bobbin coil in tube &#8212; end view</text>

  <!-- tube wall annulus -->
  <circle cx="130" cy="415" r="62" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="130" cy="415" r="46" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- bobbin coil inside the bore -->
  <circle cx="130" cy="415" r="35" fill="none" stroke="#1E66F5" stroke-width="10"/>

  <text x="236" y="368" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tube wall</text>
  <line x1="234" y1="364" x2="172" y2="376" stroke="#0B1F3A" stroke-width="1"/>
  <text x="240" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">&#951; = (d / D)&#178;</text>
  <text x="240" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">d = probe &#216;, D = tube ID</text>
  <text x="240" y="446" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">same rule, from inside</text>

  <!-- ============ RIGHT: ORIENTATION RULE SIDE VIEW ============ -->
  <text x="580" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Orientation rule &#8212; side view</text>

  <!-- current label with leaders -->
  <text x="580" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#1E66F5">circumferential eddy currents</text>
  <line x1="506" y1="126" x2="474" y2="140" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="654" y1="126" x2="686" y2="140" stroke="#0B1F3A" stroke-width="1"/>

  <!-- bar (side view) -->
  <rect x="400" y="140" width="360" height="72" rx="36" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- circumferential currents (dashed hoops) -->
  <ellipse cx="470" cy="176" rx="10" ry="33" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="464,139.5 464,147.5 476,143.5" fill="#1E66F5"/>
  <ellipse cx="580" cy="176" rx="10" ry="33" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="574,139.5 574,147.5 586,143.5" fill="#1E66F5"/>
  <ellipse cx="690" cy="176" rx="10" ry="33" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="684,139.5 684,147.5 696,143.5" fill="#1E66F5"/>

  <!-- longitudinal seam: cuts the hoops -->
  <line x1="520" y1="176" x2="640" y2="176" stroke="#0B1F3A" stroke-width="5" stroke-linecap="round"/>
  <line x1="596" y1="180" x2="566" y2="240" stroke="#0B1F3A" stroke-width="1"/>
  <text x="540" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">longitudinal seam cuts the currents</text>
  <text x="540" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">&#8594; strong signal</text>

  <!-- circumferential crack: parallel to the hoops -->
  <path d="M 725 148 Q 736 176 725 204" fill="none" stroke="#0B1F3A" stroke-width="4" stroke-linecap="round"/>
  <line x1="728" y1="208" x2="700" y2="306" stroke="#0B1F3A" stroke-width="1"/>
  <text x="650" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">circumferential crack lies parallel</text>
  <text x="650" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">&#8594; weak or no signal</text>

  <!-- shared-rule note -->
  <text x="580" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">encircling and inside coils share this geometry:</text>
  <text x="580" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the currents flow around the circumference</text>
</svg>
