<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrW22b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arrB22b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Reading the Impedance Plane: What Moved the Dot?</text>

  <!-- interpretation note -->
  <text x="755" y="88" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Material drifts ride along the curve &#8212;</text>
  <text x="755" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">flaws and lift-off cut across it</text>

  <!-- axes -->
  <line x1="140" y1="440" x2="730" y2="440" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrB22b)"/>
  <line x1="140" y1="440" x2="140" y2="80" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrB22b)"/>
  <text x="104" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF" transform="rotate(-90 104 260)">normalized reactance (XL/X0)</text>
  <text x="435" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">normalized resistance (R/X0)</text>

  <!-- conductivity locus (comma curve) -->
  <path d="M210,120 C430,140 580,250 480,365 C430,420 300,432 215,430" fill="none" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arrB22b)"/>
  <text x="170" y="462" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#963; &#215; f increases</text>

  <!-- air point -->
  <circle cx="210" cy="120" r="6" fill="#FFFFFF"/>
  <text x="226" y="114" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">air point &#8212; coil off the part</text>

  <!-- operating point -->
  <circle cx="509" cy="314" r="6.5" fill="#FFFFFF"/>
  <text x="530" y="306" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">operating point</text>
  <text x="530" y="324" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">thick, uniform part</text>

  <!-- lift-off vector (toward air point) -->
  <line x1="509" y1="314" x2="383" y2="232" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrW22b)"/>
  <text x="372" y="224" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">lift-off</text>

  <!-- surface crack vector (phase-separated from lift-off) -->
  <line x1="509" y1="314" x2="469" y2="154" stroke="#FFFFFF" stroke-width="3.5" marker-end="url(#arrW22b)"/>
  <text x="461" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">surface crack</text>

  <!-- conductivity drift directions (along the curve) -->
  <line x1="509" y1="314" x2="485" y2="404" stroke="#9BC4FF" stroke-width="2.5" marker-end="url(#arrB22b)"/>
  <text x="476" y="404" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#963; increases</text>
  <line x1="509" y1="314" x2="511" y2="205" stroke="#9BC4FF" stroke-width="2.5" marker-end="url(#arrB22b)"/>
  <text x="522" y="200" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#963; decreases</text>

  <!-- thinning locus: unwinds back toward the air point -->
  <path d="M509,314 C520,272 500,243 472,247 C450,250 446,270 462,274 C478,278 484,262 470,250 C450,232 400,212 352,196 C334,190 314,184 296,180"
        fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrW22b)"/>
  <text x="292" y="166" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">wall thinning (t &lt; 3&#948;)</text>
  <text x="292" y="186" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">unwinds toward the air point</text>
</svg>
