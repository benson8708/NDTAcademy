<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwC" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
    <marker id="arwCw" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Tubing Prime Frequency — Spread the Wall Across ≈ 90°</text>

  <!-- PANEL 1: f far below f90 -->
  <rect x="45" y="64" width="225" height="240" rx="8" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="157.5" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">f far below f90</text>
  <line x1="62.5" y1="235" x2="252.5" y2="235" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="157.5" y1="125" x2="157.5" y2="252" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="157.5" cy="235" r="4" fill="#FFFFFF"/>
  <line x1="157.5" y1="235" x2="240" y2="187.5" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arwC)"/>
  <text x="244" y="182" font-size="14" font-weight="bold" fill="#9BC4FF">ID</text>
  <line x1="157.5" y1="235" x2="212" y2="157" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwCw)"/>
  <text x="216" y="150" font-size="14" font-weight="bold" fill="#FFFFFF">OD</text>
  <path d="M 209.5,205 A 60,60 0 0 0 191.9,185.9" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="215" y="225" font-size="14" fill="#9BC4FF">Δ ≈ 25°</text>
  <text x="157.5" y="272" text-anchor="middle" font-size="14" fill="#FFFFFF">ID and OD responses bunch —</text>
  <text x="157.5" y="290" text-anchor="middle" font-size="14" fill="#FFFFFF">depths indistinguishable</text>

  <!-- PANEL 2: f = f90 -->
  <rect x="288" y="64" width="225" height="240" rx="8" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="400.5" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">f = f90</text>
  <line x1="305.5" y1="235" x2="495.5" y2="235" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="400.5" y1="125" x2="400.5" y2="252" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="400.5" cy="235" r="4" fill="#FFFFFF"/>
  <line x1="400.5" y1="235" x2="497" y2="209" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arwC)"/>
  <text x="485" y="200" font-size="14" font-weight="bold" fill="#9BC4FF">ID</text>
  <line x1="400.5" y1="235" x2="375" y2="138" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwCw)"/>
  <text x="369" y="132" text-anchor="end" font-size="14" font-weight="bold" fill="#FFFFFF">OD</text>
  <path d="M 444,223.4 A 45,45 0 0 0 388.9,191.5" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="441" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#9BC4FF">Δ ≈ 90°</text>
  <text x="400.5" y="272" text-anchor="middle" font-size="14" fill="#FFFFFF">full wall spread across a</text>
  <text x="400.5" y="290" text-anchor="middle" font-size="14" fill="#FFFFFF">readable quarter-turn</text>

  <!-- PANEL 3: f far above f90 -->
  <rect x="531" y="64" width="225" height="240" rx="8" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="643.5" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">f far above f90</text>
  <line x1="548.5" y1="235" x2="738.5" y2="235" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="643.5" y1="125" x2="643.5" y2="252" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="643.5" cy="235" r="4" fill="#FFFFFF"/>
  <line x1="643.5" y1="235" x2="734" y2="193" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arwC)"/>
  <text x="722" y="184" font-size="14" font-weight="bold" fill="#9BC4FF">ID</text>
  <line x1="643.5" y1="235" x2="600" y2="223" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwCw)"/>
  <text x="594" y="217" text-anchor="end" font-size="14" font-weight="bold" fill="#FFFFFF">OD (weak)</text>
  <path d="M 684.3,216 A 45,45 0 0 0 600,223.4" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="643.5" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#9BC4FF">Δ &gt; 140°</text>
  <text x="643.5" y="272" text-anchor="middle" font-size="14" fill="#FFFFFF">OD over-rotates and starves —</text>
  <text x="643.5" y="290" text-anchor="middle" font-size="14" fill="#FFFFFF">amplitude too small to call</text>

  <!-- formula card -->
  <rect x="120" y="330" width="560" height="150" rx="10" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="400" y="364" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF">f90 (kHz) ≈ 3ρ / t²</text>
  <text x="400" y="392" text-anchor="middle" font-size="15" fill="#FFFFFF">ρ = resistivity in μΩ·cm ( = 172.41 ÷ %IACS ) · t = wall thickness in mm</text>
  <text x="400" y="420" text-anchor="middle" font-size="15" fill="#9BC4FF">304 stainless tube: ρ ≈ 69 μΩ·cm, t = 1.2 mm → f90 ≈ 3 × 69 / 1.44 ≈ 144 kHz</text>
  <text x="400" y="448" text-anchor="middle" font-size="15" fill="#FFFFFF">Set up near 150 kHz — then verify the ID/OD spread on the calibration tube.</text>
</svg>
