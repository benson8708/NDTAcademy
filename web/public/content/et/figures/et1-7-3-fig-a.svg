<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowWhiteA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">From Coil to Disposition: One Automated Line</text>

  <!-- instrument -->
  <rect x="210" y="70" width="260" height="80" rx="8" fill="#1E66F5" fill-opacity="0.12" stroke="#1E66F5" stroke-width="2"/>
  <text x="340" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">ET instrument</text>
  <text x="340" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">alarm gate &#8594; output delayed by L &#247; v</text>

  <!-- product -->
  <rect x="24" y="310" width="676" height="36" fill="#1E66F5" fill-opacity="0.22" stroke="#1E66F5" stroke-width="2"/>
  <text x="40" y="296" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">line speed v</text>
  <line x1="40" y1="328" x2="104" y2="328" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteA)"/>

  <!-- encircling coil (side view: windings above and below) -->
  <rect x="126" y="272" width="30" height="32" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="126" y="350" width="30" height="32" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="131" y1="304" x2="131" y2="350" stroke="#FFFFFF" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="151" y1="304" x2="151" y2="350" stroke="#FFFFFF" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="141" y1="386" x2="141" y2="418" stroke="#9BC4FF" stroke-width="1" opacity="0.5"/>
  <text x="141" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">encircling test coil</text>

  <!-- alarm signal path -->
  <line x1="141" y1="272" x2="141" y2="110" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="141" y1="110" x2="210" y2="110" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="196" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">alarm</text>

  <!-- encoder wheel riding the product -->
  <circle cx="250" cy="294" r="16" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="250" y1="280" x2="250" y2="308" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="236" y1="294" x2="264" y2="294" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="250" cy="294" r="3" fill="#9BC4FF"/>
  <line x1="250" y1="278" x2="250" y2="150" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
  <line x1="250" y1="310" x2="250" y2="390" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
  <text x="250" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">encoder &#8212; counts product travel</text>

  <!-- distance L dimension -->
  <line x1="155" y1="262" x2="456" y2="262" stroke="#FFFFFF" stroke-width="1.5"/>
  <polygon points="141,262 155,256 155,268" fill="#FFFFFF"/>
  <polygon points="470,262 456,256 456,268" fill="#FFFFFF"/>
  <text x="332" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">distance L</text>

  <!-- paint marker -->
  <text x="470" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">paint marker</text>
  <rect x="452" y="196" width="36" height="26" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <polygon points="462,222 478,222 470,238" fill="#9BC4FF"/>
  <line x1="466" y1="242" x2="460" y2="306" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8"/>
  <line x1="470" y1="242" x2="470" y2="306" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8"/>
  <line x1="474" y1="242" x2="480" y2="306" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8"/>
  <rect x="454" y="310" width="32" height="36" fill="#9BC4FF" opacity="0.85"/>
  <line x1="463" y1="321" x2="477" y2="335" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="463" y1="335" x2="477" y2="321" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="470" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">mark lands on the flaw</text>

  <!-- flying cutoff saw -->
  <text x="600" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">flying cutoff</text>
  <circle cx="600" cy="236" r="30" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="600" cy="236" r="34" fill="none" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="600" cy="236" r="4" fill="#FFFFFF"/>
  <line x1="600" y1="270" x2="600" y2="352" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="600" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">crops the flagged section</text>

  <!-- downstream sort -->
  <text x="730" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">to sorting</text>
  <line x1="704" y1="322" x2="752" y2="296" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteA)"/>
  <line x1="704" y1="334" x2="752" y2="362" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteA)"/>
  <text x="766" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">accept</text>
  <text x="766" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">reject</text>

  <!-- footnotes -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">The alarm fires at the coil &#8212; each output device acts exactly one travel time later.</text>
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Encoder pulses keep that delay correct when line speed changes.</text>
</svg>
