<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Anatomy of an Eddy Current Test Report</text>

  <!-- document body -->
  <rect x="52" y="54" width="404" height="430" rx="8" fill="#1E66F5" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="2"/>

  <!-- band separators -->
  <line x1="52" y1="112" x2="456" y2="112" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="52" y1="168" x2="456" y2="168" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="52" y1="224" x2="456" y2="224" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="52" y1="300" x2="456" y2="300" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="52" y1="364" x2="456" y2="364" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="52" y1="424" x2="456" y2="424" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>

  <!-- header band -->
  <text x="66" y="82" font-size="16" font-weight="bold" fill="#FFFFFF">REPORT ET-26-0417 — 12 JUN 2026</text>
  <text x="66" y="103" font-size="14" fill="#9BC4FF">Job 88-114 • lap-joint fastener holes</text>

  <!-- part identification -->
  <text x="66" y="134" font-size="15" font-weight="bold" fill="#FFFFFF">PART IDENTIFICATION</text>
  <text x="66" y="155" font-size="14" fill="#9BC4FF">Skin P/N 65-44821, S/N 0937 • 2024-T3 clad</text>

  <!-- governing documents -->
  <text x="66" y="190" font-size="15" font-weight="bold" fill="#FFFFFF">GOVERNING DOCUMENTS</text>
  <text x="66" y="211" font-size="14" fill="#9BC4FF">Procedure ET-OP-12 Rev C • spec ¶8 acceptance</text>

  <!-- equipment and settings -->
  <text x="66" y="246" font-size="15" font-weight="bold" fill="#FFFFFF">EQUIPMENT AND SETTINGS</text>
  <text x="66" y="265" font-size="14" fill="#9BC4FF">Instrument S/N 7741 (cal due 09-26)</text>
  <text x="66" y="281" font-size="14" fill="#9BC4FF">Shielded diff. probe P-203 • cable 1.8 m</text>
  <text x="66" y="296" font-size="14" fill="#9BC4FF">200 kHz • gain 38 dB • phase 110° • filters set</text>

  <!-- reference standard + standardization log -->
  <text x="66" y="322" font-size="15" font-weight="bold" fill="#FFFFFF">REFERENCE STD + STANDARDIZATION LOG</text>
  <text x="66" y="341" font-size="14" fill="#9BC4FF">Block ET-RS-042 (cert) • notches 0.2 / 0.5 / 1.0 mm</text>
  <text x="66" y="358" font-size="14" fill="#9BC4FF">07:10 ✓   11:05 ✓   14:55 final ✓ — in tolerance</text>

  <!-- results -->
  <text x="66" y="386" font-size="15" font-weight="bold" fill="#FFFFFF">RESULTS AND DISPOSITION</text>
  <text x="66" y="405" font-size="14" fill="#9BC4FF">Hole 14, row 2 — ≥ notch response: REJECT ¶8.3</text>
  <text x="66" y="420" font-size="14" fill="#9BC4FF">Holes 1–13, 15–40 — none recordable: ACCEPT</text>

  <!-- certification -->
  <text x="66" y="446" font-size="15" font-weight="bold" fill="#FFFFFF">CERTIFICATION</text>
  <text x="66" y="467" font-size="14" fill="#9BC4FF">A. Reyes, ET Level II — signed • Reviewed: L III</text>

  <!-- annotations -->
  <line x1="456" y1="140" x2="472" y2="140" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="136" font-size="14" font-weight="bold" fill="#FFFFFF">One physical part, one record</text>
  <text x="478" y="154" font-size="14" fill="#9BC4FF">serials, heat or lot, alloy and temper</text>

  <line x1="456" y1="196" x2="472" y2="196" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="192" font-size="14" font-weight="bold" fill="#FFFFFF">The rules of the test</text>
  <text x="478" y="210" font-size="14" fill="#9BC4FF">procedure revision + acceptance clause</text>

  <line x1="456" y1="262" x2="472" y2="262" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="258" font-size="14" font-weight="bold" fill="#FFFFFF">Reproducibility</text>
  <text x="478" y="276" font-size="14" fill="#9BC4FF">what another Level II needs to rebuild it</text>

  <line x1="456" y1="332" x2="472" y2="332" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="328" font-size="14" font-weight="bold" fill="#FFFFFF">Proof the system worked</text>
  <text x="478" y="346" font-size="14" fill="#9BC4FF">start • periodic checks • final check</text>

  <line x1="456" y1="394" x2="472" y2="394" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="390" font-size="14" font-weight="bold" fill="#FFFFFF">Nothing left open</text>
  <text x="478" y="408" font-size="14" fill="#9BC4FF">every indication gets a disposition</text>

  <line x1="456" y1="454" x2="472" y2="454" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="478" y="450" font-size="14" font-weight="bold" fill="#FFFFFF">Accountability</text>
  <text x="478" y="468" font-size="14" fill="#9BC4FF">name, certification level, signature, date</text>
</svg>
