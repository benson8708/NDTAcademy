<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Same Part, Three Frequencies — 7075-T6 skin (σ = 32 %IACS, µᵣ = 1)</text>

  <!-- subtle panel dividers -->
  <line x1="270" y1="52" x2="270" y2="400" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="530" y1="52" x2="530" y2="400" stroke="#9BC4FF" stroke-width="1"/>

  <!-- ================= PANEL 1: 2 MHz ================= -->
  <text x="140" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">2 MHz — δ = 0.08 mm</text>
  <text x="140" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface-crack setup</text>
  <!-- probe -->
  <rect x="115" y="108" width="50" height="30" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="128" y1="112" x2="128" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="112" x2="140" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="152" y1="112" x2="152" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <text x="172" y="128" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe</text>
  <!-- part -->
  <rect x="40" y="150" width="200" height="200" fill="#9BC4FF" fill-opacity="0.22" stroke="#0B1F3A" stroke-width="2"/>
  <!-- current skin (very thin) -->
  <rect x="42" y="150" width="196" height="5" fill="#1E66F5" opacity="0.95"/>
  <rect x="42" y="155" width="196" height="5" fill="#1E66F5" opacity="0.45"/>
  <rect x="42" y="160" width="196" height="4" fill="#1E66F5" opacity="0.2"/>
  <rect x="48" y="172" width="170" height="20" fill="#FFFFFF" opacity="0.85"/>
  <text x="52" y="186" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">current skin: 3δ = 0.25 mm</text>
  <!-- surface crack -->
  <path d="M 205 150 l -4 8 l 6 7 l -4 8" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- subsurface flaw at 2.5 mm -->
  <ellipse cx="140" cy="275" rx="14" ry="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="140" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw at 2.5 mm</text>
  <!-- verdicts -->
  <text x="140" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">surface crack ✓ strong</text>
  <text x="140" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2.5-mm flaw ✗ — lies ≈ 30δ deep</text>

  <!-- ================= PANEL 2: 100 kHz ================= -->
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">100 kHz — δ = 0.37 mm</text>
  <text x="400" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">general-purpose probe</text>
  <rect x="375" y="108" width="50" height="30" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="388" y1="112" x2="388" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="400" y1="112" x2="400" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="412" y1="112" x2="412" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <rect x="300" y="150" width="200" height="200" fill="#9BC4FF" fill-opacity="0.22" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="302" y="150" width="196" height="18" fill="#1E66F5" opacity="0.85"/>
  <rect x="302" y="168" width="196" height="18" fill="#1E66F5" opacity="0.5"/>
  <rect x="302" y="186" width="196" height="19" fill="#1E66F5" opacity="0.25"/>
  <!-- 3δ line -->
  <line x1="302" y1="205" x2="498" y2="205" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="320" y="210" width="120" height="20" fill="#FFFFFF" opacity="0.85"/>
  <text x="324" y="224" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3δ = 1.1 mm</text>
  <path d="M 465 150 l -4 8 l 6 7 l -4 8" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="400" cy="275" rx="14" ry="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw at 2.5 mm</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">surface crack ✓ strong</text>
  <text x="400" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2.5-mm flaw ✗ — ≈ 7δ, ~0.1% density</text>

  <!-- ================= PANEL 3: 2.2 kHz ================= -->
  <text x="660" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">2.2 kHz — δ = 2.5 mm</text>
  <text x="660" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">second-layer setup</text>
  <rect x="635" y="108" width="50" height="30" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="648" y1="112" x2="648" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="660" y1="112" x2="660" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <line x1="672" y1="112" x2="672" y2="134" stroke="#1E66F5" stroke-width="2"/>
  <rect x="560" y="150" width="200" height="200" fill="#9BC4FF" fill-opacity="0.22" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="562" y="150" width="196" height="42" fill="#1E66F5" opacity="0.8"/>
  <rect x="562" y="192" width="196" height="42" fill="#1E66F5" opacity="0.6"/>
  <rect x="562" y="234" width="196" height="41" fill="#1E66F5" opacity="0.42"/>
  <rect x="562" y="275" width="196" height="38" fill="#1E66F5" opacity="0.28"/>
  <rect x="562" y="313" width="196" height="37" fill="#1E66F5" opacity="0.16"/>
  <!-- 1δ line at flaw depth -->
  <line x1="562" y1="275" x2="758" y2="275" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="568" y="252" width="110" height="20" fill="#FFFFFF" opacity="0.88"/>
  <text x="572" y="266" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1δ = 2.5 mm</text>
  <path d="M 725 150 l -4 8 l 6 7 l -4 8" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="700" cy="275" rx="14" ry="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="660" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">2.5-mm flaw ✓ — at 1δ, 37% density</text>
  <text x="660" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">small surface flaws: weak, near lift-off</text>

  <!-- ================= RULE STRIP ================= -->
  <rect x="30" y="412" width="740" height="72" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">δ (mm) ≈ 660 ÷ √( f · µᵣ · σ )   —   f in Hz, σ in %IACS</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Put the feature you must find in strong current: near 1δ for phase room — never beyond 3δ.</text>
</svg>
