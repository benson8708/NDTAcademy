<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Resistance, Reactance, and the Impedance Vector</text>

  <!-- axes -->
  <line x1="120" y1="420" x2="485" y2="420" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="498,420 484,413 484,427" fill="#0B1F3A"/>
  <line x1="120" y1="420" x2="120" y2="100" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="120,88 113,102 127,102" fill="#0B1F3A"/>
  <text x="120" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Inductive reactance</text>
  <text x="120" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">XL (Ω)</text>
  <text x="300" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Resistance R (Ω) — in phase with current</text>

  <!-- triangle legs -->
  <line x1="120" y1="420" x2="312" y2="420" stroke="#0B1F3A" stroke-width="6"/>
  <text x="216" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">R = 30 Ω</text>

  <line x1="312" y1="420" x2="312" y2="164" stroke="#9BC4FF" stroke-width="6"/>
  <text x="324" y="296" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">XL = 40 Ω</text>

  <!-- right-angle marker -->
  <path d="M 296 420 L 296 404 L 312 404" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- impedance vector -->
  <line x1="120" y1="420" x2="306" y2="173" stroke="#1E66F5" stroke-width="6"/>
  <polygon points="316,159 311.6,178.2 298.8,168.6" fill="#1E66F5"/>
  <text x="208" y="275" text-anchor="end" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">Z = 50 Ω</text>

  <!-- phase angle -->
  <path d="M 175 420 A 55 55 0 0 0 153 376" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="185" y="402" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">θ ≈ 53°</text>

  <!-- note under triangle -->
  <text x="300" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The two oppositions are 90° apart in phase — they add as vectors, never arithmetically.</text>

  <!-- right panel -->
  <rect x="515" y="64" width="265" height="400" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="531" y="96" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">Working formulas</text>
  <text x="531" y="128" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">XL = 2πfL  (Hz, henries → Ω)</text>
  <text x="531" y="156" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">Z = √(R² + XL²)</text>
  <text x="531" y="184" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">θ = arctan(XL ÷ R)</text>
  <line x1="531" y1="202" x2="764" y2="202" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="531" y="228" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Worked example — probe coil</text>
  <text x="531" y="254" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">L = 100 µH at f = 100 kHz</text>
  <text x="531" y="278" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">XL = 2π × 100 kHz × 100 µH</text>
  <text x="531" y="300" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">      ≈ 62.8 Ω</text>
  <text x="531" y="324" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">R = 10 Ω (winding)</text>
  <text x="531" y="348" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Z = √(10² + 62.8²) ≈ 63.6 Ω</text>
  <text x="531" y="372" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">θ = arctan(6.28) ≈ 81°</text>
  <line x1="531" y1="390" x2="764" y2="390" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="531" y="414" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Probe coils are mostly reactive —</text>
  <text x="531" y="434" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">small changes in flux swing the</text>
  <text x="531" y="452" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">impedance point strongly.</text>
</svg>
