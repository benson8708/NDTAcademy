<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Lift-Off Starves the Flaw Signal</text>

  <!-- ===== LEFT PANEL: bench setup ===== -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">shim the gap open</text>

  <!-- probe cable -->
  <line x1="200" y1="130" x2="200" y2="240" stroke="#0B1F3A" stroke-width="3"/>
  <!-- probe body -->
  <rect x="172" y="240" width="56" height="96" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <!-- coil winding at probe face -->
  <rect x="182" y="306" width="36" height="22" fill="#1E66F5"/>
  <text x="245" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">absolute surface probe</text>
  <line x1="240" y1="260" x2="230" y2="266" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="245" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">coil</text>
  <line x1="241" y1="316" x2="220" y2="316" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- shim stack (exaggerated) -->
  <rect x="138" y="336" width="124" height="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="138" y="343" width="124" height="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="128" y="349" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.13 mm shims</text>

  <!-- aluminum block -->
  <rect x="60" y="350" width="280" height="90" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="200" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">aluminum reference standard</text>
  <!-- EDM notch -->
  <rect x="195" y="350" width="10" height="38" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="200" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.5 mm (0.020 in) EDM notch</text>
  <line x1="200" y1="450" x2="200" y2="392" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- field arcs through the gap -->
  <path d="M 176 332 C 160 352 160 372 178 384" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M 224 332 C 240 352 240 372 222 384" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M 168 330 C 142 354 144 382 172 396" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M 232 330 C 258 354 256 382 228 396" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- lift-off bracket -->
  <line x1="276" y1="336" x2="290" y2="336" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="276" y1="350" x2="290" y2="350" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="283" y1="336" x2="283" y2="350" stroke="#0B1F3A" stroke-width="2"/>
  <text x="296" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off = shim stack</text>

  <!-- ===== RIGHT PANEL: amplitude vs gap ===== -->
  <!-- axes -->
  <line x1="440" y1="430" x2="765" y2="430" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="765,424 779,430 765,436" fill="#0B1F3A"/>
  <line x1="440" y1="430" x2="440" y2="115" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="434,115 440,101 446,115" fill="#0B1F3A"/>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">lift-off (mm)</text>
  <text x="404" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A" transform="rotate(-90 404 285)">notch amplitude (% of contact)</text>

  <!-- y ticks -->
  <line x1="432" y1="140" x2="448" y2="140" stroke="#0B1F3A" stroke-width="2"/>
  <text x="426" y="146" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100</text>
  <line x1="432" y1="285" x2="448" y2="285" stroke="#0B1F3A" stroke-width="2"/>
  <text x="426" y="291" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">50</text>
  <text x="434" y="450" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>

  <!-- x ticks -->
  <line x1="520" y1="424" x2="520" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <text x="520" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.13</text>
  <line x1="600" y1="424" x2="600" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <text x="600" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.26</text>
  <line x1="680" y1="424" x2="680" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <text x="680" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.39</text>

  <!-- larger probe curve (dashed, shallower) -->
  <path d="M 440 140 C 480 172 500 202 520 227 C 550 257 575 271 600 285 C 640 307 690 322 740 333" fill="none" stroke="#9BC4FF" stroke-width="4" stroke-dasharray="9 7"/>

  <!-- small probe curve (solid, steep) -->
  <path d="M 440 140 C 468 205 495 265 520 300 C 552 342 572 360 600 372 C 638 388 690 399 735 406" fill="none" stroke="#1E66F5" stroke-width="4"/>

  <!-- data dots: one per shim -->
  <circle cx="440" cy="140" r="6" fill="#1E66F5"/>
  <circle cx="520" cy="300" r="6" fill="#1E66F5"/>
  <circle cx="600" cy="372" r="6" fill="#1E66F5"/>

  <!-- annotation -->
  <text x="558" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">steepest loss comes with</text>
  <text x="558" y="197" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">the first shim</text>
  <line x1="552" y1="186" x2="500" y2="240" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="497,232 492,248 506,242" fill="#0B1F3A"/>

  <!-- legend -->
  <line x1="560" y1="92" x2="600" y2="92" stroke="#1E66F5" stroke-width="4"/>
  <text x="608" y="97" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">small-diameter probe</text>
  <line x1="560" y1="114" x2="600" y2="114" stroke="#9BC4FF" stroke-width="4" stroke-dasharray="9 7"/>
  <text x="608" y="119" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">larger-diameter probe</text>
</svg>
