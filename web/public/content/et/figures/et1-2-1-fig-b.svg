<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Transformer Analogy — Coil and Part</text>

  <!-- ================= LEFT: FAMILIAR TRANSFORMER ================= -->
  <text x="40" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">A FAMILIAR TRANSFORMER</text>

  <!-- core -->
  <rect x="110" y="95" width="140" height="170" fill="none" stroke="#0B1F3A" stroke-width="12"/>
  <!-- circulating flux (dashed) inside core -->
  <path d="M 133 118 h 94 v 124 h -94 z" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="180,112 180,124 192,118" fill="#1E66F5"/>
  <text x="180" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">changing flux</text>

  <!-- primary winding on left leg -->
  <g fill="none" stroke="#1E66F5" stroke-width="3">
    <ellipse cx="110" cy="120" rx="17" ry="8"/>
    <ellipse cx="110" cy="150" rx="17" ry="8"/>
    <ellipse cx="110" cy="180" rx="17" ry="8"/>
    <ellipse cx="110" cy="210" rx="17" ry="8"/>
  </g>

  <!-- AC source + wires -->
  <circle cx="48" cy="165" r="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 37 165 q 5.5 -10 11 0 q 5.5 10 11 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <polyline points="48,149 48,120 93,120" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="48,181 48,210 93,210" fill="none" stroke="#0B1F3A" stroke-width="2"/>

  <!-- secondary: one fat shorted turn on right leg -->
  <ellipse cx="250" cy="165" rx="20" ry="10" fill="none" stroke="#0B1F3A" stroke-width="5"/>

  <g font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle">
    <text x="195" y="296">PRIMARY: many turns, driven by AC</text>
    <text x="195" y="316">SECONDARY: one short-circuited turn</text>
    <text x="195" y="336">— it carries a large induced current</text>
  </g>

  <!-- ================= RIGHT: PROBE AND PART ================= -->
  <text x="420" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">THE PROBE AND THE PART</text>

  <!-- probe body + cable -->
  <path d="M 592 86 C 592 66, 632 60, 660 58" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="560" y="86" width="64" height="84" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="2.5">
    <line x1="566" y1="126" x2="618" y2="126"/>
    <line x1="566" y1="136" x2="618" y2="136"/>
    <line x1="566" y1="146" x2="618" y2="146"/>
    <line x1="566" y1="156" x2="618" y2="156"/>
  </g>
  <text x="552" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">test coil</text>
  <text x="552" y="138" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">= the PRIMARY</text>

  <!-- coupling flux into the part -->
  <g stroke="#1E66F5" stroke-width="2" stroke-dasharray="4 3">
    <line x1="575" y1="174" x2="575" y2="194"/>
    <line x1="592" y1="174" x2="592" y2="194"/>
    <line x1="609" y1="174" x2="609" y2="194"/>
  </g>
  <g fill="#1E66F5">
    <polygon points="571,193 579,193 575,200"/>
    <polygon points="588,193 596,193 592,200"/>
    <polygon points="605,193 613,193 609,200"/>
  </g>

  <!-- part with one eddy "turn" -->
  <rect x="430" y="200" width="340" height="105" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="592" cy="232" rx="95" ry="20" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="598,248 598,256 584,252" fill="#1E66F5"/>
  <polygon points="586,208 586,216 600,212" fill="#1E66F5"/>
  <text x="600" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">the part = the SECONDARY</text>
  <text x="600" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">one shorted turn of eddy current</text>

  <text x="600" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">mutual induction couples coil and part —</text>
  <text x="600" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no electrical contact, no couplant</text>

  <!-- ================= BOTTOM: POWER LEVELS ================= -->
  <text x="40" y="378" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">SAME PHYSICS, THREE POWER LEVELS</text>

  <g fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2">
    <rect x="30" y="390" width="232" height="78" rx="8"/>
    <rect x="284" y="390" width="232" height="78" rx="8"/>
    <rect x="538" y="390" width="232" height="78" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" text-anchor="middle">
    <text x="146" y="414" font-weight="bold" fill="#1E66F5">Eddy current testing</text>
    <text x="146" y="434" fill="#0B1F3A">milliwatts — sense the part</text>
    <text x="146" y="452" fill="#0B1F3A">without changing it</text>
    <text x="400" y="414" font-weight="bold" fill="#1E66F5">Induction heating</text>
    <text x="400" y="434" fill="#0B1F3A">kilowatts — the same loops</text>
    <text x="400" y="452" fill="#0B1F3A">deliberately heat the metal</text>
    <text x="654" y="414" font-weight="bold" fill="#1E66F5">Eddy-current brakes</text>
    <text x="654" y="434" fill="#0B1F3A">induced loops oppose motion</text>
    <text x="654" y="452" fill="#0B1F3A">— Lenz's law doing work</text>
  </g>
</svg>
