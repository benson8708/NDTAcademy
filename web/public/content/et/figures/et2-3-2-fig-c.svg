<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Four Features on One Tube — Which One Do You Work Up?</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Differential bobbin probe, vertical channel — baseline noise about 0.3 div peak-to-peak</text>

  <!-- chart frame -->
  <rect x="50" y="78" width="700" height="342" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- support plate band (from tube map) -->
  <rect x="330" y="80" width="80" height="338" fill="#EAF1FE" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="370" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">support plate</text>
  <text x="370" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(tube map)</text>

  <!-- trace -->
  <polyline points="65,302 75,296 85,304 95,295 105,303 115,297 125,295 135,288 145,281 155,272 165,264 180,255 195,262 205,270 215,279 225,287 235,294 245,299 255,304 265,296 275,303 285,295 295,304 305,296 315,303 325,297 335,294 345,268 355,200 360,160 365,178 372,260 378,330 385,405 390,380 397,330 403,310 408,302 418,296 428,304 438,295 448,303 458,296 468,304 478,295 488,303 498,296 508,304 518,296 528,303 538,298 545,280 552,240 558,266 564,330 570,360 576,330 582,306 592,297 602,304 612,295 622,303 632,296 642,304 652,295 662,303 672,296 682,304 692,295 702,303 712,296 722,304 732,297 740,301" fill="none" stroke="#1E66F5" stroke-width="2.5"/>

  <!-- D baseline zone marker -->
  <rect x="620" y="288" width="120" height="24" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- letter badges -->
  <circle cx="180" cy="228" r="14" fill="#0B1F3A"/>
  <text x="180" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">A</text>
  <circle cx="363" cy="136" r="14" fill="#0B1F3A"/>
  <text x="363" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">B</text>
  <circle cx="552" cy="214" r="14" fill="#0B1F3A"/>
  <text x="552" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">C</text>
  <circle cx="678" cy="266" r="14" fill="#0B1F3A"/>
  <text x="678" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">D</text>

  <!-- axis label -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe position along tube</text>
  <line x1="500" y1="433" x2="532" y2="433" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="538,433 528,428 528,438" fill="#0B1F3A"/>

  <!-- legend -->
  <text x="60" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A — slow drift over a long span</text>
  <text x="400" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">B — large response at the mapped support</text>
  <text x="60" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">C — sharp, local signal in free span</text>
  <text x="400" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">D — quiet free-span baseline</text>
</svg>
