  <text x="222" y="393" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">304 stainless steel</text>
  <rect x="230" y="378" width="12" height="20" fill="#1E66F5"/>
  <text x="250" y="393" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">&#8776;2.5</text>

  <text x="222" y="423" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Inconel 600</text>
