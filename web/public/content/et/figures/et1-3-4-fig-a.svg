  <text x="412" y="213" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">&#8776;37</text>

  <text x="222" y="243" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">7075-T6 aluminum</text>
