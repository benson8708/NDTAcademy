  <text x="285" y="333" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">&#8776;10 &#8212; ferromagnetic: &#956; dominates the response</text>

  <text x="222" y="363" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Titanium (comm. pure)</text>
