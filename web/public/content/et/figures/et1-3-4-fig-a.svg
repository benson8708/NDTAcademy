  <text x="708" y="123" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">100</text>

  <text x="222" y="153" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Gold</text>
  <rect x="230" y="138" width="329" height="20" fill="#1E66F5"/>
  <text x="567" y="153" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">&#8776;70</text>

  <text x="222" y="183" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Aluminum 1100 (near-pure)</text>
