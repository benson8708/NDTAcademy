<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Electrical Conductivity of Common Metals &#8212; % IACS</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.65">100% IACS = annealed commercially pure copper at 20 &#176;C (resistivity 1.7241 &#181;&#937;&#183;cm &#8776; 58 MS/m)</text>

  <!-- gridlines -->
  <line x1="230" y1="70" x2="230" y2="444" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="347.5" y1="70" x2="347.5" y2="444" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="465" y1="70" x2="465" y2="444" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="582.5" y1="70" x2="582.5" y2="444" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="700" y1="70" x2="700" y2="444" stroke="#9BC4FF" stroke-width="1"/>
  <text x="230" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">0</text>
  <text x="347.5" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">25</text>
  <text x="465" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">50</text>
  <text x="582.5" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">75</text>
  <text x="700" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">100</text>
  <text x="726" y="461" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">% IACS</text>

  <!-- bars -->
  <text x="222" y="93" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Silver</text>
  <rect x="230" y="78" width="493.5" height="20" fill="#1E66F5"/>
  <text x="731.5" y="93" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">105</text>

