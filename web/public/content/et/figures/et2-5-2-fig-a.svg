<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Lift-Off on the Normalized Impedance Plane</text>

  <defs>
    <marker id="arrB" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="#1E66F5"/>
    </marker>
    <marker id="arrN" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="150" y1="440" x2="535" y2="440" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN)"/>
  <line x1="150" y1="440" x2="150" y2="72" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="455" y="466" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">R / ωL₀</text>
  <text x="96" y="62" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">ωL / ωL₀</text>

  <!-- air point tick and label -->
  <line x1="142" y1="120" x2="158" y2="120" stroke="#0B1F3A" stroke-width="2"/>
  <text x="136" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.0</text>
  <circle cx="150" cy="120" r="6" fill="#0B1F3A"/>
  <text x="58" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">air point</text>
  <line x1="108" y1="104" x2="144" y2="115" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- conductivity locus -->
  <path d="M 150 120 C 195 128 232 140 270 160 C 308 180 332 215 345 260 C 356 298 350 330 330 360 C 310 390 280 410 240 425 C 213 434 186 438 165 440" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <text x="368" y="340" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">conductivity locus</text>
  <text x="368" y="358" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(f·σ increases downward)</text>

  <!-- lift-off loci (dashed) -->
  <path d="M 270 160 Q 208 134 166 122" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrB)"/>
  <path d="M 345 260 Q 234 154 170 130" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrB)"/>
  <path d="M 240 425 Q 152 272 157 140" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrB)"/>

  <!-- operating points -->
  <circle cx="270" cy="160" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="282" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Ti-6Al-4V (1% IACS)</text>
  <circle cx="345" cy="260" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="360" y="256" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">7075-T6 (32% IACS)</text>
  <circle cx="240" cy="425" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="62" y="414" width="160" height="18" fill="#FFFFFF" opacity="0.9"/>
  <text x="66" y="428" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">copper (100% IACS)</text>

  <!-- ferromagnetic operating point above air point -->
  <circle cx="235" cy="95" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M 235 95 Q 198 100 164 112" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrB)"/>
  <text x="248" y="88" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ferromagnetic part:</text>
  <text x="248" y="106" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">operating point above the air point</text>

  <!-- phase separation arc at 7075 -->
  <path d="M 318 234 Q 318 282 350 298" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="290" y="296" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Δφ</text>

  <!-- right panel -->
  <text x="550" y="80" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Reading the plane</text>

  <!-- probe / gap sketch -->
  <rect x="635" y="120" width="52" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="650" cy="166" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="672" cy="166" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="700" y="142" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe</text>
  <ellipse cx="661" cy="188" rx="30" ry="16" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7"/>
  <ellipse cx="661" cy="188" rx="50" ry="26" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.45"/>
  <line x1="600" y1="176" x2="600" y2="200" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 600 176 L 596 183 L 604 183 Z" fill="#0B1F3A"/>
  <path d="M 600 200 L 596 193 L 604 193 Z" fill="#0B1F3A"/>
  <text x="552" y="193" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">gap g</text>
  <rect x="565" y="200" width="210" height="34" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="670" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">part</text>

  <!-- legend -->
  <line x1="552" y1="268" x2="592" y2="268" stroke="#0B1F3A" stroke-width="3"/>
  <text x="600" y="273" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">conductivity locus</text>
  <line x1="552" y1="292" x2="592" y2="292" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="600" y="297" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off locus → air point</text>
  <circle cx="572" cy="316" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="600" y="321" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">operating point (on part)</text>

  <!-- bullets -->
  <text x="550" y="360" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• coupling drops steeply with g</text>
  <text x="550" y="384" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• first 0.1 mm moves dot most</text>
  <text x="550" y="408" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• gap ≈ coil dia → coupling gone</text>
  <text x="550" y="432" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• tilt = partial lift-off</text>
  <text x="550" y="456" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Δφ opens lower on the curve</text>
</svg>
