<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Gradual vs. Abrupt: What Each Channel Shows</text>

  <!-- vertical alignment guides (drawn first, behind everything) -->
  <line x1="340" y1="134" x2="340" y2="414" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="620" y1="158" x2="620" y2="470" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- part cross-section: wall with gradual taper and sharp pit -->
  <path d="M 80 70 L 760 70 L 760 130 L 628 130 L 620 88 L 612 130 L 460 130 C 440 130 390 108 340 108 C 290 108 240 130 220 130 L 80 130 Z"
        fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>

  <!-- probe with two coils riding the surface -->
  <rect x="92" y="52" width="18" height="16" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <line x1="98" y1="52" x2="98" y2="68" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="104" y1="52" x2="104" y2="68" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="114" y="52" width="18" height="16" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <line x1="120" y1="52" x2="120" y2="68" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="126" y1="52" x2="126" y2="68" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="150" y1="60" x2="226" y2="60" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="238,60 226,54 226,66" fill="#0B1F3A"/>
  <text x="190" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">scan</text>

  <text x="340" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">gradual wall thinning</text>
  <text x="620" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sharp pit</text>

  <!-- ABSOLUTE channel -->
  <text x="80" y="186" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">ABSOLUTE CHANNEL</text>
  <line x1="80" y1="280" x2="760" y2="280" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="80" y1="288" x2="760" y2="262" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="7 5"/>
  <path d="M 80 280 L 220 280 C 260 280 300 225 340 225 C 380 225 420 280 460 280 L 612 280 L 620 212 L 628 280 L 760 280"
        fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="340" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">slow shift follows the taper</text>
  <text x="758" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sharp deflection at the pit</text>
  <text x="420" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(baseline also drifts slowly with temperature)</text>

  <!-- DIFFERENTIAL channel -->
  <text x="80" y="336" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">DIFFERENTIAL CHANNEL</text>
  <line x1="80" y1="420" x2="760" y2="420" stroke="#9BC4FF" stroke-width="1.5"/>
  <path d="M 80 420 L 597 420 C 603 420 606 366 612 366 C 618 366 618 468 624 468 C 630 468 633 420 639 420 L 760 420"
        fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="340" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">taper cancels &#8212; both coils see the same wall</text>
  <text x="566" y="372" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">two-lobed (bipolar) signal</text>
  <text x="566" y="390" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8212; one coil meets the pit first</text>
</svg>
