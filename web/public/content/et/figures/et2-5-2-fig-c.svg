<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Lift-Off as a Tool: Coating Thickness Measurement</text>

  <defs>
    <marker id="arrN2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
  </defs>

  <!-- left: cross-section -->
  <text x="185" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">probe held off the metal by the coating</text>
  <rect x="150" y="196" width="70" height="86" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="170" cy="264" r="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="200" cy="264" r="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="232" y="222" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface probe</text>
  <ellipse cx="185" cy="282" rx="34" ry="20" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7"/>
  <ellipse cx="185" cy="282" rx="56" ry="32" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.45"/>
  <rect x="60" y="282" width="250" height="28" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="42" y="288" width="158" height="17" fill="#FFFFFF" opacity="0.85"/>
  <text x="120" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">nonconductive coating</text>
  <rect x="60" y="310" width="250" height="80" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="185" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">conductive base metal</text>

  <!-- dimension t -->
  <line x1="308" y1="282" x2="336" y2="282" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="308" y1="310" x2="336" y2="310" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="322" y1="288" x2="322" y2="304" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 322 283 L 318 290 L 326 290 Z" fill="#0B1F3A"/>
  <path d="M 322 309 L 318 302 L 326 302 Z" fill="#0B1F3A"/>
  <text x="336" y="301" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">t = lift-off</text>

  <text x="195" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the coating holds the coil exactly t off the metal</text>
  <circle cx="210" cy="464" r="5" fill="#0B1F3A"/>
  <text x="222" y="469" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">calibration shims on bare base metal (ASTM E376)</text>

  <!-- right: response curve -->
  <rect x="470" y="120" width="75" height="280" fill="#1E66F5" fill-opacity="0.08"/>
  <line x1="470" y1="400" x2="775" y2="400" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <line x1="470" y1="400" x2="470" y2="115" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <text x="455" y="103" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">signal (dot travel along locus)</text>
  <text x="620" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coating thickness (mm)</text>

  <path d="M 470 400 C 477 374 482 355 489 339 C 495 325 501 306 508 293 C 521 268 532 245 545 232 C 570 207 597 186 620 177 C 668 159 730 154 770 153" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <circle cx="470" cy="400" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="489" cy="339" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="508" cy="293" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="545" cy="232" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="620" cy="177" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="770" cy="153" r="5" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1.5"/>

  <text x="476" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">best resolution</text>
  <text x="628" y="205" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flat = resolution lost</text>

  <!-- x ticks -->
  <line x1="470" y1="400" x2="470" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="545" y1="400" x2="545" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="620" y1="400" x2="620" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="695" y1="400" x2="695" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="770" y1="400" x2="770" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="470" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <text x="545" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.2</text>
  <text x="620" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.4</text>
  <text x="695" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.6</text>
  <text x="770" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.8</text>
</svg>
