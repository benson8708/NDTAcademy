<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arwB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Rotary Bolt-Hole Inspection: Two Displays, One Decision</text>

  <!-- ============ LEFT: impedance plane ============ -->
  <text x="200" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Impedance plane — what it is (phase)</text>
  <rect x="40" y="88" width="320" height="307" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>

  <!-- null crosshair -->
  <line x1="186" y1="245" x2="214" y2="245" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="231" x2="200" y2="259" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>

  <!-- lift-off / wobble along horizontal -->
  <line x1="132" y1="245" x2="95" y2="245" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwB)"/>
  <line x1="132" y1="245" x2="168" y2="245" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="118" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">lift-off / wobble</text>

  <!-- differential figure-eight crack signal -->
  <path d="M200,245 C250,215 268,148 224,134 C190,123 186,186 200,245 C214,304 210,367 176,356 C132,342 150,275 200,245 Z" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <text x="200" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">differential 'figure-eight' at the crack phase</text>
  <text x="200" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">lift-off horizontal — crack develops vertical</text>

  <!-- ============ RIGHT: sweep display, two strips ============ -->
  <text x="575" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Sweep display — where it is (clock position)</text>

  <!-- strip 1: good hole with axial crack -->
  <rect x="390" y="88" width="370" height="145" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="108" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">axial crack — snaps, repeats at 7 o'clock</text>
  <line x1="393" y1="160" x2="757" y2="160" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="752" y="154" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">alarm</text>
  <polyline points="395,203 408,209 421,200 434,207 447,199 460,208 473,202 486,209 499,201 512,206 525,199 538,208 551,203 564,209 577,200 590,206 600,209 604,213 610,122 616,180 620,200 628,206 640,201 652,208 664,202 676,207 688,200 700,208 712,203 724,207 736,201 748,206 755,204" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- strip 2: out-of-round hole -->
  <rect x="390" y="243" width="370" height="145" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="263" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">out-of-round hole — broad 'goal-post' humps, drift</text>
  <line x1="393" y1="315" x2="757" y2="315" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="752" y="309" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">alarm</text>
  <polyline points="395,357 410,359 425,356 440,353 450,345 460,332 470,318 480,305 488,301 496,305 506,318 516,332 526,345 536,353 546,357 560,359 575,356 590,358 600,357 612,355 622,353 632,345 642,332 652,318 660,305 666,302 674,307 684,320 694,334 704,347 714,354 726,357 740,359 755,357" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.7"/>

  <!-- shared clock axis -->
  <line x1="400" y1="388" x2="400" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="488" y1="388" x2="488" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="576" y1="388" x2="576" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="664" y1="388" x2="664" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="752" y1="388" x2="752" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">12</text>
  <text x="488" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">3</text>
  <text x="576" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">6</text>
  <text x="664" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">9</text>
  <text x="752" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">12</text>
  <text x="576" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">clock position — one revolution</text>

  <!-- bottom annotation -->
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Both can break the alarm — shape, phase, and rate of deflection make the call.</text>
</svg>
