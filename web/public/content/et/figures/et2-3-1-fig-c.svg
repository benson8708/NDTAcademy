<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arwC" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Crack Signals: Linear, Angled, and Line Contact</text>

  <!-- column titles -->
  <text x="145" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Linear crack</text>
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Angled crack (≈30° skew)</text>
  <text x="655" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Line contact</text>

  <!-- ===== column 1: plan view ===== -->
  <rect x="45" y="92" width="200" height="150" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="2"/>
  <line x1="57" y1="167" x2="233" y2="167" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwC)"/>
  <text x="72" y="156" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">scan</text>
  <polyline points="148,104 153,124 146,146 152,168 147,190 153,212 148,230" fill="none" stroke="#9BC4FF" stroke-width="3"/>

  <!-- ===== column 2: plan view ===== -->
  <rect x="300" y="92" width="200" height="150" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="2"/>
  <line x1="312" y1="167" x2="488" y2="167" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwC)"/>
  <text x="327" y="156" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">scan</text>
  <line x1="372" y1="104" x2="372" y2="230" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <polyline points="372,104 391,127 398,158 421,180 428,210 438,222" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <path d="M372,149 A45,45 0 0 0 394.5,143" fill="none" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="402" y="146" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">≈30°</text>

  <!-- ===== column 3: plan view (lap-joint / bushing edge) ===== -->
  <rect x="555" y="92" width="200" height="150" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="2"/>
  <rect x="655" y="92" width="100" height="150" fill="#1E66F5" fill-opacity="0.30"/>
  <line x1="655" y1="92" x2="655" y2="242" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="600" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">skin</text>
  <text x="706" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">upper layer</text>
  <line x1="567" y1="167" x2="743" y2="167" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwC)"/>
  <text x="582" y="156" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">scan</text>
  <text x="655" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">metal-to-metal contact line</text>

  <!-- ===== response strips ===== -->
  <rect x="45" y="270" width="200" height="120" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>
  <polyline points="53,356 70,358 90,355 110,357 128,356 138,357 146,358 150,290 154,358 162,356 180,357 200,355 220,357 237,356" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <rect x="300" y="270" width="200" height="120" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>
  <polyline points="308,356 325,357 345,355 365,357 378,356 390,357 400,353 410,344 418,334 426,340 434,348 442,354 454,357 470,355 488,357 492,356" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <rect x="555" y="270" width="200" height="120" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="2"/>
  <polyline points="563,357 580,356 598,355 612,352 624,347 636,341 648,337 655,336 664,338 676,343 688,349 700,354 714,356 730,357 747,356" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- annotations -->
  <text x="145" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">full amplitude — snaps</text>
  <text x="145" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">cuts the currents squarely</text>

  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">lower and broader</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">≈17° skew can halve the signal</text>

  <text x="655" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">builds gradually</text>
  <text x="655" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">off-notch phase — not a crack</text>

  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Cracks snap. Geometry and property changes drift. Phase, rate, repeatability make the call.</text>
</svg>
