<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Standardization on the Reference Standard</text>

  <!-- divider -->
  <line x1="398" y1="58" x2="398" y2="476" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ============ LEFT: reference standard ============ -->
  <text x="205" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Reference standard</text>
  <text x="205" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">same alloy &#183; temper &#183; geometry as the part</text>

  <!-- probe over sound area -->
  <text x="110" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe</text>
  <rect x="85" y="150" width="50" height="66" rx="5" fill="#1E66F5"/>
  <line x1="89" y1="162" x2="131" y2="162" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="89" y1="174" x2="131" y2="174" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="89" y1="186" x2="131" y2="186" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="89" y1="198" x2="131" y2="198" stroke="#FFFFFF" stroke-width="2"/>

  <!-- scan arrow -->
  <text x="245" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">scan</text>
  <line x1="150" y1="190" x2="332" y2="190" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="332,184 344,190 332,196" fill="#0B1F3A"/>

  <!-- block with three EDM notches -->
  <rect x="50" y="230" width="310" height="90" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="166" y="230" width="8" height="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="231" y="230" width="8" height="30" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="296" y="230" width="8" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="98" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">7075-T6</text>

  <!-- leader lines and depth labels -->
  <line x1="170" y1="246" x2="170" y2="334" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="235" y1="262" x2="235" y2="334" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="300" y1="288" x2="300" y2="334" stroke="#0B1F3A" stroke-width="1"/>
  <text x="170" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">0.2 mm</text>
  <text x="235" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">0.5 mm</text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">1.0 mm</text>
  <text x="235" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(0.008 / 0.020 / 0.040 in)</text>
  <text x="235" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">EDM notches, depths certified</text>

  <!-- steps 1-3 -->
  <text x="36" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">1 &#8212; null (balance) on a sound area</text>
  <text x="36" y="448" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">2 &#8212; rotate phase: lift-off horizontal</text>
  <text x="36" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">3 &#8212; scan each notch at set speed</text>

  <!-- ============ RIGHT: impedance-plane display ============ -->
  <text x="588" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Impedance-plane display</text>
  <text x="588" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">after rotation and gain are set</text>

  <rect x="428" y="104" width="320" height="240" rx="10" fill="#0B1F3A"/>
  <line x1="588" y1="112" x2="588" y2="336" stroke="#9BC4FF" stroke-width="1" opacity="0.3"/>
  <line x1="436" y1="224" x2="740" y2="224" stroke="#9BC4FF" stroke-width="1" opacity="0.3"/>

  <!-- 80% FSH guide -->
  <line x1="438" y1="146" x2="738" y2="146" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="712" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">80% FSH</text>

  <!-- lift-off trace -->
  <line x1="452" y1="314" x2="680" y2="314" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="545" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">lift-off (horizontal)</text>

  <!-- notch responses: rising amplitude and rotation -->
  <path d="M 680 314 Q 658 284 644 252 Q 664 286 680 314" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <path d="M 680 314 Q 642 262 612 200 Q 650 266 680 314" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <path d="M 680 314 Q 616 244 568 148 Q 628 250 680 314" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <text x="648" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">0.2 mm</text>
  <text x="606" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">0.5 mm</text>
  <text x="556" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">1.0 mm</text>

  <!-- balance point -->
  <circle cx="680" cy="314" r="5" fill="#FFFFFF"/>
  <text x="694" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">null</text>

  <!-- annotations -->
  <text x="588" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">set gain: 1.0 mm notch to 80% FSH</text>
  <text x="588" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">deeper notch &#8212; larger amplitude, more rotation</text>

  <!-- steps 4-5 -->
  <text x="414" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">4 &#8212; set gain: specified notch to 80% FSH</text>
  <text x="414" y="448" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">5 &#8212; rescan to verify &#183; S/N at least 3:1</text>
  <text x="414" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">record every setting before testing</text>
</svg>
