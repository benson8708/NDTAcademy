<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwE273B" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Standardization Checks and the Retest Rule</text>

  <!-- re-verification triggers -->
  <text x="400" y="66" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Re-verify and log: at fixed intervals — 4 h is a common ceiling —</text>
  <text x="400" y="86" text-anchor="middle" font-size="14" fill="#9BC4FF">after any system change (probe, cable, instrument, settings, power),</text>
  <text x="400" y="104" text-anchor="middle" font-size="14" fill="#9BC4FF">whenever proper function is in doubt, and at the end of the run.</text>

  <!-- event boxes -->
  <rect x="48" y="140" width="200" height="86" rx="8" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="148" y="164" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">07:00 STANDARDIZE</text>
  <text x="148" y="186" text-anchor="middle" font-size="14" fill="#9BC4FF">settings + responses</text>
  <text x="148" y="204" text-anchor="middle" font-size="14" fill="#9BC4FF">logged — in tolerance</text>

  <rect x="300" y="140" width="200" height="86" rx="8" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="400" y="164" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">11:00 CHECK — PASS</text>
  <text x="400" y="186" text-anchor="middle" font-size="14" fill="#9BC4FF">responses re-verified</text>
  <text x="400" y="204" text-anchor="middle" font-size="14" fill="#9BC4FF">logged — in tolerance</text>

  <rect x="552" y="140" width="200" height="86" rx="8" fill="#1E66F5" fill-opacity="0.18" stroke="#FFFFFF" stroke-width="2"/>
  <text x="652" y="164" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">15:00 CHECK — FAILS</text>
  <text x="652" y="186" text-anchor="middle" font-size="14" fill="#9BC4FF">reference response out</text>
  <text x="652" y="204" text-anchor="middle" font-size="14" fill="#9BC4FF">of tolerance — stop, log</text>

  <!-- connectors -->
  <line x1="148" y1="226" x2="148" y2="286" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="400" y1="226" x2="400" y2="276" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="652" y1="226" x2="652" y2="276" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- retest band (behind nodes) -->
  <rect x="400" y="278" width="252" height="44" fill="#1E66F5" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- timeline -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwE273B)"/>

  <!-- nodes -->
  <circle cx="148" cy="300" r="13" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="148" y="306" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">✓</text>
  <circle cx="400" cy="300" r="13" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="400" y="306" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">✓</text>
  <circle cx="652" cy="300" r="13" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="645" y1="293" x2="659" y2="307" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="659" y1="293" x2="645" y2="307" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- time labels -->
  <text x="148" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">07:00</text>
  <text x="400" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">11:00</text>
  <text x="652" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">15:00</text>

  <!-- span brackets -->
  <line x1="161" y1="356" x2="387" y2="356" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="161" y1="350" x2="161" y2="362" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="387" y1="350" x2="387" y2="362" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="413" y1="356" x2="639" y2="356" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="413" y1="350" x2="413" y2="362" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="639" y1="350" x2="639" y2="362" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- span labels -->
  <text x="274" y="384" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">ACCEPTED — STANDS</text>
  <text x="274" y="403" text-anchor="middle" font-size="14" fill="#9BC4FF">validated by the 11:00 check</text>
  <text x="526" y="384" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">RETEST SPAN</text>
  <text x="526" y="403" text-anchor="middle" font-size="14" fill="#9BC4FF">everything since the last good check</text>

  <!-- bottom notes -->
  <text x="400" y="444" text-anchor="middle" font-size="14" fill="#FFFFFF">Fix the cause, re-standardize, resume — the end-of-run check validates the final stretch.</text>
  <text x="400" y="466" text-anchor="middle" font-size="14" fill="#9BC4FF">The procedure sets the tolerance; outside it, the check fails and the rule fires.</text>
</svg>
