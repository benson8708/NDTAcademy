<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">One AC Cycle: The Field Expands, Collapses, Reverses</text>

  <!-- phase labels -->
  <text x="100" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">0</text>
  <text x="240" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1/4 cycle</text>
  <text x="380" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1/2 cycle</text>
  <text x="520" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">3/4 cycle</text>
  <text x="660" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">full cycle</text>

  <!-- axes -->
  <line x1="100" y1="92" x2="100" y2="288" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="80" y1="190" x2="724" y2="190" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="724,184 724,196 740,190" fill="#0B1F3A"/>
  <text x="716" y="212" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">time</text>
  <text x="86" y="110" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">+I</text>
  <text x="86" y="282" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">−I</text>

  <!-- coil current: one full sine cycle -->
  <path d="M 100 190 Q 240 60 380 190 Q 520 320 660 190" fill="none" stroke="#1E66F5" stroke-width="3.5"/>

  <!-- droplines to field snapshots -->
  <line x1="100" y1="196" x2="100" y2="304" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="240" y1="130" x2="240" y2="304" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="380" y1="196" x2="380" y2="304" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="520" y1="256" x2="520" y2="304" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="660" y1="196" x2="660" y2="304" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- markers on the curve -->
  <circle cx="100" cy="190" r="6" fill="#0B1F3A"/>
  <circle cx="240" cy="125" r="6" fill="#0B1F3A"/>
  <circle cx="380" cy="190" r="6" fill="#0B1F3A"/>
  <circle cx="520" cy="255" r="6" fill="#0B1F3A"/>
  <circle cx="660" cy="190" r="6" fill="#0B1F3A"/>

  <!-- field snapshots: coil icon at each phase -->
  <!-- 0: collapsed -->
  <ellipse cx="100" cy="340" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="100" cy="350" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="100" cy="360" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- 1/4: fully expanded, polarity up -->
  <circle cx="240" cy="350" r="38" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="240" cy="350" r="26" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="240" cy="340" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="240" cy="350" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="240" cy="360" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,310 246,310 240,296" fill="#1E66F5"/>

  <!-- 1/2: collapsed -->
  <ellipse cx="380" cy="340" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="380" cy="350" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="380" cy="360" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- 3/4: fully expanded, polarity reversed -->
  <circle cx="520" cy="350" r="38" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="520" cy="350" r="26" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="520" cy="340" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="520" cy="350" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="520" cy="360" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="514,392 526,392 520,406" fill="#1E66F5"/>

  <!-- full: collapsed again -->
  <ellipse cx="660" cy="340" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="660" cy="350" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="660" cy="360" rx="16" ry="5" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- snapshot labels -->
  <text x="100" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">zero field</text>
  <text x="240" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">expanded — max</text>
  <text x="240" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">polarity up</text>
  <text x="380" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">collapsed</text>
  <text x="520" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">expanded — max</text>
  <text x="520" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">polarity reversed</text>
  <text x="660" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">collapsed</text>

  <!-- bottom strip -->
  <rect x="60" y="446" width="680" height="44" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">frequency = cycles per second (Hz) — every collapse and reversal is a changing flux</text>
  <text x="400" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at 100 kHz the field builds and collapses 200,000 times each second</text>
</svg>
