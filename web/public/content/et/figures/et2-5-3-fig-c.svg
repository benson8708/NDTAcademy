<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwE253cB" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Saturation Hardware and the Proof Test</text>

  <text x="225" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">DC-SATURATED ENCIRCLING TEST</text>
  <text x="620" y="76" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">PROVING SATURATION</text>

  <!-- tube walls -->
  <text x="66" y="186" font-size="14" fill="#9BC4FF">carbon steel tube wall</text>
  <rect x="60" y="196" width="330" height="26" fill="#1E66F5" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="60" y="278" width="330" height="26" fill="#1E66F5" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="60" y1="250" x2="390" y2="250" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="6 5" stroke-opacity="0.6"/>
  <text x="384" y="270" text-anchor="end" font-size="14" fill="#9BC4FF">feed →</text>

  <!-- DC saturation coil -->
  <rect x="96" y="140" width="70" height="44" rx="6" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="96" y="316" width="70" height="44" rx="6" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="113" y1="142" x2="113" y2="182" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="130" y1="142" x2="130" y2="182" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="147" y1="142" x2="147" y2="182" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="113" y1="318" x2="113" y2="358" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="130" y1="318" x2="130" y2="358" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="147" y1="318" x2="147" y2="358" stroke="#0B1F3A" stroke-width="2"/>
  <text x="131" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">DC saturation coil</text>
  <text x="131" y="380" text-anchor="middle" font-size="14" fill="#9BC4FF">constant ampere-turns</text>

  <!-- AC test coil -->
  <rect x="262" y="162" width="44" height="28" rx="4" fill="#1E66F5" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="262" y="310" width="44" height="28" rx="4" fill="#1E66F5" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="2"/>
  <text x="284" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">AC test coil</text>
  <text x="284" y="358" text-anchor="middle" font-size="14" fill="#9BC4FF">encircling, differential</text>

  <!-- DC flux arrows in the walls -->
  <line x1="76" y1="209" x2="180" y2="209" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="196" y1="209" x2="300" y2="209" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="316" y1="209" x2="376" y2="209" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="76" y1="291" x2="180" y2="291" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="196" y1="291" x2="300" y2="291" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="316" y1="291" x2="376" y2="291" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <text x="225" y="244" text-anchor="middle" font-size="14" fill="#FFFFFF">DC flux holds the wall at saturation</text>

  <text x="225" y="412" text-anchor="middle" font-size="14" fill="#9BC4FF">wall parked on the flat of the B–H curve —</text>
  <text x="225" y="430" text-anchor="middle" font-size="14" fill="#9BC4FF">the AC field sees μᵣ ≈ 1</text>

  <!-- verification plot -->
  <line x1="470" y1="400" x2="770" y2="400" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <line x1="470" y1="400" x2="470" y2="120" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwE253cB)"/>
  <text x="620" y="432" text-anchor="middle" font-size="14" fill="#9BC4FF">DC saturating ampere-turns</text>
  <text transform="rotate(-90 448 262)" x="448" y="262" text-anchor="middle" font-size="14" fill="#9BC4FF">baseline noise</text>

  <path d="M482,150 C510,170 540,240 570,300 C600,352 640,374 672,380 C700,384 730,385 755,385" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <text x="500" y="200" font-size="14" fill="#9BC4FF">noise falls as</text>
  <text x="500" y="218" font-size="14" fill="#9BC4FF">domains align</text>

  <line x1="672" y1="398" x2="672" y2="168" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="672" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">adequate saturation</text>
  <text x="672" y="158" text-anchor="middle" font-size="14" fill="#9BC4FF">more DC changes nothing</text>

  <text x="400" y="474" text-anchor="middle" font-size="14" fill="#9BC4FF">Full saturation out of reach (thick-wall steel from the ID)? Change methods — remote field testing, ASTM E2096.</text>
</svg>
