<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwE253bW" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Permeability Noise: Same Flaw, Before and After Saturation</text>

  <!-- panel 1: unsaturated -->
  <rect x="50" y="64" width="700" height="180" rx="10" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="66" y="90" font-size="15" font-weight="bold" fill="#FFFFFF">UNSATURATED — μᵣ ≈ 100 and varying</text>

  <path d="M70,190 C95,150 120,132 150,158 C172,178 190,208 215,204 C238,200 252,158 280,144 C305,132 322,170 350,192 C372,208 395,216 420,202 C440,190 458,168 488,166 C505,165 520,168 540,172 C547,160 553,132 558,126 C563,132 569,160 576,172 C600,180 620,212 650,206 C678,200 705,160 730,170" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>

  <text x="78" y="120" font-size="14" fill="#9BC4FF">permeability variations — chemistry, hardness, stress</text>
  <line x1="104" y1="126" x2="120" y2="140" stroke="#9BC4FF" stroke-width="1"/>

  <text x="582" y="110" font-size="14" font-weight="bold" fill="#FFFFFF">flaw — buried</text>
  <line x1="578" y1="114" x2="562" y2="124" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arwE253bW)"/>

  <text x="734" y="236" text-anchor="end" font-size="14" fill="#9BC4FF">scan position →</text>

  <!-- panel 2: saturated -->
  <rect x="50" y="258" width="700" height="180" rx="10" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="66" y="284" font-size="15" font-weight="bold" fill="#FFFFFF">SATURATED — incremental μᵣ ≈ 1</text>

  <path d="M70,388 C120,386 170,390 220,388 C270,386 320,390 370,388 C420,386 470,390 540,388 C546,386 552,346 557,314 C559,306 561,306 563,314 C568,346 574,386 582,388 C630,389 690,387 730,388" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>

  <text x="540" y="312" text-anchor="end" font-size="14" font-weight="bold" fill="#FFFFFF">same flaw — unmistakable</text>
  <line x1="544" y1="308" x2="556" y2="306" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arwE253bW)"/>

  <text x="78" y="346" font-size="14" fill="#9BC4FF">baseline quiet and repeatable — permeability silenced</text>

  <text x="734" y="430" text-anchor="end" font-size="14" fill="#9BC4FF">scan position →</text>

  <text x="400" y="476" text-anchor="middle" font-size="15" fill="#9BC4FF">Same probe, same gain, same tube — the only change is a constant DC saturating field.</text>
</svg>
