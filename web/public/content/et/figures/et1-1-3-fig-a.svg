<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Primary and Secondary Fields at the Probe Coil</text>

  <!-- coil axis -->
  <line x1="400" y1="64" x2="400" y2="308" stroke="#0B1F3A" stroke-width="1" stroke-dasharray="3,7" opacity="0.45"/>

  <!-- primary field loops around the coil -->
  <ellipse cx="400" cy="146" rx="158" ry="84" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="8,6"/>
  <ellipse cx="400" cy="146" rx="112" ry="54" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="148" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">primary field —</text>
  <text x="148" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">alternates at the</text>
  <text x="148" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">test frequency</text>
  <line x1="216" y1="106" x2="252" y2="116" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- AC source and wires -->
  <circle cx="90" cy="170" r="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 78 170 q 6 -11 12 0 q 6 11 12 0" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="90" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">AC drive</text>
  <line x1="110" y1="170" x2="342" y2="170" stroke="#0B1F3A" stroke-width="2"/>

  <!-- coil cross-section: left bundle current into page (x), right bundle out of page (dot) -->
  <circle cx="356" cy="118" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="356" cy="146" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="356" cy="174" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="356" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">×</text>
  <text x="356" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">×</text>
  <text x="356" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">×</text>
  <circle cx="444" cy="118" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="444" cy="146" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="444" cy="174" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="444" cy="118" r="3.5" fill="#0B1F3A"/>
  <circle cx="444" cy="146" r="3.5" fill="#0B1F3A"/>
  <circle cx="444" cy="174" r="3.5" fill="#0B1F3A"/>
  <line x1="458" y1="132" x2="560" y2="106" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="566" y="100" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">test coil</text>
  <text x="566" y="119" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(cross-section)</text>

  <!-- opposing arrows in the gap: primary flux down, secondary up -->
  <line x1="368" y1="212" x2="368" y2="288" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="362,286 374,286 368,300" fill="#1E66F5"/>
  <text x="346" y="250" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">primary flux</text>
  <text x="346" y="269" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">into the part</text>
  <line x1="432" y1="298" x2="432" y2="222" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="426,224 438,224 432,210" fill="#0B1F3A"/>
  <text x="452" y="250" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">secondary field</text>
  <text x="452" y="269" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">opposes the change</text>

  <!-- conductive part -->
  <rect x="50" y="315" width="700" height="145" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2"/>
  <text x="70" y="448" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">conductive test part</text>

  <!-- eddy current loop near surface: left out of page, right into page (mirror of coil) -->
  <ellipse cx="400" cy="350" rx="92" ry="19" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="320" cy="350" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="320" cy="350" r="3.5" fill="#0B1F3A"/>
  <circle cx="480" cy="350" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="480" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">×</text>
  <line x1="496" y1="350" x2="556" y2="350" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="562" y="346" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">eddy current loop —</text>
  <text x="562" y="364" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">mirrors the coil above it</text>

  <!-- deeper, weaker loop -->
  <ellipse cx="400" cy="408" rx="58" ry="12" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4,5" opacity="0.45"/>
  <text x="562" y="412" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" opacity="0.7">weaker with depth</text>

  <!-- takeaway -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Net flux at the coil = primary − push-back → the coil&#8217;s impedance changes</text>
</svg>
