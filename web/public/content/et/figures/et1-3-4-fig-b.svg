<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Impedance Plane &#8212; Conductivity Curve and the Permeability Direction</text>

  <!-- axes -->
  <line x1="110" y1="70" x2="110" y2="445" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="110,60 104,74 116,74" fill="#0B1F3A"/>
  <line x1="110" y1="445" x2="528" y2="445" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="538,445 524,439 524,451" fill="#0B1F3A"/>
  <text transform="rotate(-90 74 257)" x="74" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">Inductive reactance XL</text>
  <text x="320" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">Coil resistance R</text>

  <!-- ferromagnetic branch -->
  <line x1="170" y1="249" x2="197" y2="122" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="200,111 191,127 204,130" fill="#0B1F3A"/>
  <circle cx="203" cy="103" r="6" fill="#0B1F3A"/>
  <text x="217" y="100" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Mild steel &#8212; ferromagnetic</text>
  <text x="217" y="119" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#956;r multiplies flux: XL climbs above the air point</text>

  <!-- lift-off vector -->
  <line x1="333" y1="348" x2="186" y2="268" stroke="#0B1F3A" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="182,266 196,269 192,278" fill="#0B1F3A" fill-opacity="0.55"/>
  <text x="240" y="296" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.7">lift-off</text>

  <!-- conductivity curve -->
  <path d="M 170 255 C 280 275 345 305 335 355 C 327 402 250 425 195 428" stroke="#1E66F5" stroke-width="4" fill="none"/>
  <polygon points="188,429 203,421 204,436" fill="#1E66F5"/>
  <text x="356" y="306" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">&#963;&#183;f increases</text>
  <text x="356" y="324" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">around the curve</text>

  <!-- air point -->
  <circle cx="170" cy="255" r="6" fill="#0B1F3A"/>
  <text x="184" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Air point (probe in air)</text>

  <!-- material points -->
  <circle cx="243" cy="272" r="5" fill="#1E66F5"/>
  <text x="256" y="268" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Titanium / 304 SS (&#8776;2.5&#8211;3%)</text>
  <circle cx="333" cy="348" r="5" fill="#1E66F5"/>
  <text x="346" y="352" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2024 / 7075 (&#8776;30%)</text>
  <circle cx="283" cy="408" r="5" fill="#1E66F5"/>
  <text x="296" y="404" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Aluminum (&#8776;61%)</text>
  <circle cx="195" cy="428" r="5" fill="#1E66F5"/>
  <text x="210" y="434" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Copper / Silver (100&#8211;105%)</text>

  <!-- reading panel -->
  <rect x="548" y="70" width="232" height="375" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="564" y="100" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">How to read it</text>
  <line x1="564" y1="112" x2="764" y2="112" stroke="#9BC4FF" stroke-width="2"/>

  <text x="564" y="138" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Conductivity rises:</text>
  <text x="564" y="157" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">point slides farther</text>
  <text x="564" y="175" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">around the comma curve</text>
  <line x1="564" y1="189" x2="764" y2="189" stroke="#9BC4FF" stroke-width="2"/>

  <text x="564" y="214" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Permeability (steel):</text>
  <text x="564" y="233" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">point climbs ABOVE the</text>
  <text x="564" y="251" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">air point &#8212; &#956; wins</text>
  <line x1="564" y1="265" x2="764" y2="265" stroke="#9BC4FF" stroke-width="2"/>

  <text x="564" y="290" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Lift-off:</text>
  <text x="564" y="309" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">point slides back</text>
  <text x="564" y="327" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">toward the air point</text>
  <line x1="564" y1="341" x2="764" y2="341" stroke="#9BC4FF" stroke-width="2"/>

  <text x="564" y="366" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">DC saturation:</text>
  <text x="564" y="385" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">drives &#956;r &#8594; 1; steel</text>
  <text x="564" y="403" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rejoins the comma curve</text>

  <text x="564" y="432" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" fill-opacity="0.6">Single-frequency absolute coil</text>
</svg>
