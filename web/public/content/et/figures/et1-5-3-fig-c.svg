<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwHC" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Hall-Element Probe: Low-Frequency Lap-Joint Inspection</text>

  <!-- probe housing -->
  <rect x="300" y="80" width="200" height="90" rx="8" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="2"/>

  <!-- excitation coils -->
  <rect x="318" y="115" width="44" height="50" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="329" y1="115" x2="329" y2="165" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="340" y1="115" x2="340" y2="165" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="351" y1="115" x2="351" y2="165" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="438" y="115" width="44" height="50" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="449" y1="115" x2="449" y2="165" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="460" y1="115" x2="460" y2="165" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="471" y1="115" x2="471" y2="165" stroke="#0B1F3A" stroke-width="2"/>

  <!-- Hall element at probe center -->
  <rect x="388" y="150" width="24" height="16" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- labels with leaders -->
  <text x="160" y="105" text-anchor="middle" font-size="14" fill="#FFFFFF">excitation coils drive a</text>
  <text x="160" y="123" text-anchor="middle" font-size="14" fill="#FFFFFF">low-frequency field</text>
  <line x1="235" y1="118" x2="315" y2="132" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>

  <text x="635" y="105" text-anchor="middle" font-size="14" fill="#FFFFFF">Hall element (detector)</text>
  <line x1="565" y1="110" x2="408" y2="147" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- lift-off gap -->
  <line x1="520" y1="174" x2="520" y2="196" stroke="#9BC4FF" stroke-width="1.5" marker-start="url(#arwHC)" marker-end="url(#arwHC)"/>
  <text x="532" y="190" font-size="14" fill="#9BC4FF">lift-off</text>

  <!-- primary field arrows -->
  <line x1="340" y1="172" x2="340" y2="245" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwHC)"/>
  <line x1="460" y1="172" x2="460" y2="245" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwHC)"/>

  <!-- lap joint layers -->
  <rect x="60" y="200" width="680" height="55" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="60" y="262" width="680" height="55" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="75" y="232" font-size="14" fill="#FFFFFF">outer skin — aluminum</text>
  <text x="75" y="294" font-size="14" fill="#FFFFFF">inner skin — aluminum</text>

  <!-- fastener -->
  <text x="400" y="193" text-anchor="middle" font-size="14" fill="#9BC4FF">fastener</text>
  <polygon points="382,200 418,200 408,216 392,216" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="392" y="216" width="16" height="96" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- eddy currents -->
  <ellipse cx="400" cy="228" rx="120" ry="13" fill="none" stroke="#9BC4FF" stroke-width="2.5" stroke-opacity="0.85"/>
  <ellipse cx="400" cy="289" rx="95" ry="11" fill="none" stroke="#9BC4FF" stroke-width="2" stroke-opacity="0.5"/>
  <text x="170" y="340" text-anchor="middle" font-size="14" fill="#9BC4FF">eddy currents reach</text>
  <text x="170" y="358" text-anchor="middle" font-size="14" fill="#9BC4FF">the second layer</text>
  <line x1="222" y1="332" x2="320" y2="292" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- hidden second-layer crack -->
  <polyline points="408,288 422,294 416,302 432,298 426,306 442,302" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <text x="600" y="345" text-anchor="middle" font-size="14" fill="#FFFFFF">second-layer crack — hidden from the surface</text>
  <line x1="560" y1="336" x2="446" y2="303" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- note cards -->
  <rect x="60" y="385" width="330" height="72" rx="8" fill="#1E66F5" fill-opacity="0.14" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="225" y="413" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">f = 500 Hz → δ ≈ 5.4 mm in aluminum</text>
  <text x="225" y="440" text-anchor="middle" font-size="14" fill="#9BC4FF">(30 %IACS) — currents reach the lower skin</text>

  <rect x="410" y="385" width="330" height="72" rx="8" fill="#1E66F5" fill-opacity="0.14" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="575" y="413" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">coil detector at 500 Hz: weak signal</text>
  <text x="575" y="440" text-anchor="middle" font-size="14" fill="#9BC4FF">Hall element: full sensitivity down to DC</text>

  <text x="400" y="486" text-anchor="middle" font-size="15" fill="#9BC4FF">Excitation still comes from coils — the Hall element replaces only the detector.</text>
</svg>
