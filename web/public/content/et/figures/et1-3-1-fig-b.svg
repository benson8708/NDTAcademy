<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowAxisB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Skin Effect: Current Density vs. Depth</text>

  <!-- formula -->
  <text x="770" y="72" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">J(x) = J&#8320; &#183; e^(&#8722;x/&#948;)</text>

  <!-- axes -->
  <line x1="110" y1="420" x2="762" y2="420" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrowAxisB)"/>
  <line x1="110" y1="420" x2="110" y2="88" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrowAxisB)"/>

  <!-- y ticks -->
  <line x1="104" y1="100" x2="110" y2="100" stroke="#9BC4FF" stroke-width="2"/>
  <text x="98" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">100%</text>
  <line x1="104" y1="260" x2="110" y2="260" stroke="#9BC4FF" stroke-width="2"/>
  <text x="98" y="265" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">50%</text>
  <text x="98" y="425" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">0</text>
  <text x="40" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF" transform="rotate(-90 40 255)">relative eddy current density</text>

  <!-- x ticks -->
  <line x1="270" y1="420" x2="270" y2="426" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="430" y1="420" x2="430" y2="426" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="590" y1="420" x2="590" y2="426" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="750" y1="420" x2="750" y2="426" stroke="#9BC4FF" stroke-width="2"/>
  <text x="110" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">0</text>
  <text x="270" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">1&#948;</text>
  <text x="430" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">2&#948;</text>
  <text x="590" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">3&#948;</text>
  <text x="750" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">4&#948;</text>
  <text x="435" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">depth below surface (standard depths of penetration)</text>

  <!-- shaded area under curve -->
  <polygon points="110,100 150,171 190,226 230,269 270,302 310,328 350,349 390,364 430,377 470,386 510,394 550,400 590,404 630,408 670,410 710,412 750,414 750,420 110,420" fill="#1E66F5" fill-opacity="0.25"/>

  <!-- exponential decay curve -->
  <polyline points="110,100 150,171 190,226 230,269 270,302 310,328 350,349 390,364 430,377 470,386 510,394 550,400 590,404 630,408 670,410 710,412 750,414" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <!-- surface marker -->
  <text x="120" y="95" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">surface (100%)</text>

  <!-- shielding annotation -->
  <text x="440" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">each layer of current shields the metal below it</text>

  <!-- 1-delta guide -->
  <line x1="270" y1="302" x2="270" y2="420" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="110" y1="302" x2="270" y2="302" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="270" cy="302" r="4" fill="#FFFFFF"/>
  <text x="282" y="296" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">37% (1/e) &#8212; standard depth of penetration &#948;</text>

  <!-- 2-delta point -->
  <circle cx="430" cy="377" r="4" fill="#FFFFFF"/>
  <text x="438" y="368" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">13.5% at 2&#948;</text>

  <!-- 3-delta guide -->
  <line x1="590" y1="404" x2="590" y2="420" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="590" cy="404" r="4" fill="#FFFFFF"/>
  <text x="598" y="392" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">&#8776;5% &#8212; effective depth (3&#948;)</text>
</svg>
