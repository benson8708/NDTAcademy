<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwW" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arwL" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Skin Effect: Self-Shielding and the Exponential Fade</text>

  <!-- LEFT: mechanism — layer-by-layer shielding -->
  <text x="170" y="66" text-anchor="middle" font-size="15" fill="#9BC4FF">why the fade happens</text>

  <!-- AC coil -->
  <rect x="130" y="80" width="60" height="36" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="145" y1="80" x2="145" y2="116" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="160" y1="80" x2="160" y2="116" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="175" y1="80" x2="175" y2="116" stroke="#0B1F3A" stroke-width="2"/>
  <text x="198" y="102" font-size="14" fill="#FFFFFF">AC coil</text>

  <!-- part -->
  <rect x="50" y="130" width="240" height="320" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="50" y1="130" x2="290" y2="130" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- drive field arrows entering the part -->
  <line x1="140" y1="118" x2="140" y2="150" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwW)"/>
  <line x1="180" y1="118" x2="180" y2="150" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwW)"/>

  <!-- eddy current layers, fading -->
  <ellipse cx="170" cy="172" rx="72" ry="13" fill="none" stroke="#9BC4FF" stroke-width="4" stroke-opacity="1"/>
  <ellipse cx="170" cy="247" rx="58" ry="11" fill="none" stroke="#9BC4FF" stroke-width="3" stroke-opacity="0.60"/>
  <ellipse cx="170" cy="322" rx="45" ry="10" fill="none" stroke="#9BC4FF" stroke-width="2.5" stroke-opacity="0.35"/>
  <ellipse cx="170" cy="397" rx="33" ry="8" fill="none" stroke="#9BC4FF" stroke-width="2" stroke-opacity="0.16"/>

  <text x="250" y="176" font-size="14" fill="#FFFFFF">100%</text>
  <text x="236" y="251" font-size="14" fill="#FFFFFF">37%</text>
  <text x="223" y="326" font-size="14" fill="#FFFFFF">13.5%</text>
  <text x="211" y="401" font-size="14" fill="#FFFFFF">5%</text>

  <!-- opposing fields pushing back up -->
  <line x1="120" y1="238" x2="120" y2="206" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwL)"/>
  <line x1="120" y1="313" x2="120" y2="281" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwL)"/>
  <line x1="120" y1="388" x2="120" y2="356" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwL)"/>

  <text x="170" y="470" text-anchor="middle" font-size="14" fill="#9BC4FF">each layer's induced field opposes</text>
  <text x="170" y="488" text-anchor="middle" font-size="14" fill="#9BC4FF">the drive below — self-shielding</text>

  <!-- RIGHT: decay graph -->
  <text x="555" y="96" text-anchor="middle" font-size="15" fill="#FFFFFF">eddy current density J/J₀ (% of surface value)</text>
  <line x1="340" y1="110" x2="770" y2="110" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="340" y1="110" x2="340" y2="455" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwW)"/>
  <text x="340" y="478" text-anchor="middle" font-size="15" fill="#FFFFFF">depth</text>

  <!-- depth ticks -->
  <line x1="334" y1="190" x2="346" y2="190" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="334" y1="270" x2="346" y2="270" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="334" y1="350" x2="346" y2="350" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="334" y1="430" x2="346" y2="430" stroke="#FFFFFF" stroke-width="2"/>
  <text x="328" y="195" text-anchor="end" font-size="15" fill="#FFFFFF">1δ</text>
  <text x="328" y="275" text-anchor="end" font-size="15" fill="#FFFFFF">2δ</text>
  <text x="328" y="355" text-anchor="end" font-size="15" fill="#FFFFFF">3δ</text>
  <text x="328" y="435" text-anchor="end" font-size="15" fill="#FFFFFF">4δ</text>

  <!-- below-3δ floor -->
  <rect x="340" y="350" width="430" height="105" fill="#FFFFFF" fill-opacity="0.05"/>

  <!-- exponential decay curve -->
  <polyline points="760.0,110 683.9,126 621.5,142 570.5,158 528.7,174 494.5,190 466.5,206 443.6,222 424.8,238 409.4,254 396.8,270 386.5,286 378.1,302 371.2,318 365.5,334 360.9,350 357.1,366 354.0,382 351.5,398 349.4,414 347.7,430 346.3,446" fill="none" stroke="#9BC4FF" stroke-width="3.5"/>

  <!-- milestone markers -->
  <line x1="340" y1="190" x2="494" y2="190" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="494.5" cy="190" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="508" y="184" font-size="15" font-weight="bold" fill="#FFFFFF">1δ — 37% (1/e)</text>

  <line x1="340" y1="270" x2="396" y2="270" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="396.8" cy="270" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="410" y="275" font-size="15" fill="#FFFFFF">2δ — 13.5%</text>

  <line x1="340" y1="350" x2="360" y2="350" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="360.9" cy="350" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="374" y="355" font-size="15" font-weight="bold" fill="#FFFFFF">3δ — 5% — effective depth</text>

  <text x="560" y="432" text-anchor="middle" font-size="14" fill="#9BC4FF">beyond 3δ: under 5% remains — gain amplifies noise, not reach</text>

  <!-- formula card -->
  <rect x="500" y="200" width="272" height="140" rx="10" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="636" y="228" text-anchor="middle" font-size="19" font-weight="bold" fill="#FFFFFF">δ = 1 / √(π f μ σ)</text>
  <text x="636" y="252" text-anchor="middle" font-size="14" fill="#9BC4FF">μ = μ₀ · μᵣ (absolute permeability)</text>
  <text x="636" y="280" text-anchor="middle" font-size="16" fill="#FFFFFF">δ (mm) ≈ 660 / √( f · μᵣ · σ )</text>
  <text x="636" y="302" text-anchor="middle" font-size="14" fill="#9BC4FF">f in Hz · σ in %IACS · (inches: use 26)</text>
  <text x="636" y="330" text-anchor="middle" font-size="15" fill="#FFFFFF">J(x) = J₀ · e^(−x/δ)</text>
</svg>
