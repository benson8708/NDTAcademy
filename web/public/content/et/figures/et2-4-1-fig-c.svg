<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Tubing: f₉₀ Puts ID and OD Signals ≈ 90° Apart</text>

  <!-- ================= TUBE CUTAWAY (left) ================= -->
  <text x="110" y="88" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">OD (outer surface)</text>
  <!-- top wall -->
  <rect x="40" y="100" width="320" height="55" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <!-- bottom wall -->
  <rect x="40" y="325" width="320" height="55" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="110" y="172" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ID (bore surface)</text>
  <!-- wall thickness marker -->
  <line x1="28" y1="100" x2="28" y2="155" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="24,106 32,106 28,99" fill="#0B1F3A"/>
  <polygon points="24,149 32,149 28,156" fill="#0B1F3A"/>
  <text x="14" y="133" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">t</text>

  <!-- bobbin probe -->
  <rect x="70" y="228" width="240" height="24" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="150" y="205" width="30" height="70" fill="#1E66F5" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="200" y="205" width="30" height="70" fill="#1E66F5" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="158" y1="205" x2="158" y2="275" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="166" y1="205" x2="166" y2="275" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="208" y1="205" x2="208" y2="275" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="216" y1="205" x2="216" y2="275" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="190" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">differential bobbin coils</text>
  <line x1="318" y1="240" x2="348" y2="240" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="348,234 348,246 358,240" fill="#1E66F5"/>
  <text x="300" y="226" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">travel</text>

  <!-- ID defect (notch up into top wall from bore surface) -->
  <path d="M 242 155 a 8 8 0 0 1 16 0 z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="250" y1="160" x2="250" y2="186" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="250" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">ID defect</text>

  <!-- OD defect (notch down into top wall from outer surface) -->
  <path d="M 292 100 a 8 8 0 0 0 16 0 z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="300" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">OD defect</text>

  <text x="200" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">current crossing the wall arrives weaker</text>
  <text x="200" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and phase-lagged — ≈ 57° per δ</text>

  <!-- ================= PHASE DISPLAY (right) ================= -->
  <circle cx="580" cy="240" r="120" fill="#9BC4FF" fill-opacity="0.1" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="450" y1="240" x2="710" y2="240" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="580" y1="110" x2="580" y2="370" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- lift-off / wobble reference along horizontal -->
  <line x1="580" y1="240" x2="688" y2="240" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="600" y="262" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off / wobble (reference)</text>

  <!-- ID-origin signal at ~15 deg -->
  <line x1="580" y1="240" x2="686" y2="212" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="683,204 689,221 697,209" fill="#1E66F5"/>
  <text x="700" y="196" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">ID-origin signal</text>

  <!-- OD-origin signal at ~105 deg -->
  <line x1="580" y1="240" x2="552" y2="134" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="544,138 561,131 549,124" fill="#1E66F5"/>
  <text x="544" y="116" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">OD-origin signal</text>

  <!-- 90 degree arc between them -->
  <path d="M 648 222 A 70 70 0 0 0 562 172" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="652" y="160" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">≈ 90° at f₉₀</text>

  <text x="580" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">f ≪ f₉₀: angles collapse · f ≫ f₉₀: OD starved</text>
  <text x="580" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">absolute angles vary with setup — f₉₀ sets the spread</text>

  <!-- ================= FORMULA STRIP ================= -->
  <rect x="40" y="428" width="720" height="58" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Planning rule:  f₉₀ (kHz) = 3ρ ÷ t²   —   ρ in µΩ·cm (= 172.4 ÷ %IACS), t in mm</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">304 stainless, 1.2-mm wall: f₉₀ = 3 × 72 ÷ 1.44 ≈ 150 kHz — verify on the ASME V, Article 8 calibration tube</text>
</svg>
