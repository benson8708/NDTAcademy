<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">From Contract to Coil: Where the Procedure Sits</text>
  <text x="400" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Every eddy current test traces upward to a requirement and downward to a record</text>

  <!-- Box 1: contract -->
  <rect x="60" y="76" width="330" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="97" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 · Contract / purchase order</text>
  <text x="76" y="117" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">invokes the governing document — and its edition</text>
  <polygon points="225,138 219,130 231,130" fill="#0B1F3A"/>

  <!-- Box 2: code/spec -->
  <rect x="60" y="140" width="330" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="161" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 · Governing code / specification</text>
  <text x="76" y="181" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ASME V Art. 8 · ASTM E243 / E309 / E426 · prime spec</text>
  <polygon points="225,202 219,194 231,194" fill="#0B1F3A"/>

  <!-- Box 3: written practice -->
  <rect x="60" y="204" width="330" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">3 · Employer written practice</text>
  <text x="76" y="245" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">personnel qualification — SNT-TC-1A (2024) / NAS410</text>
  <polygon points="225,266 219,258 231,258" fill="#0B1F3A"/>

  <!-- Box 4: operating procedure (highlight) -->
  <rect x="60" y="268" width="330" height="52" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4 · ET OPERATING PROCEDURE</text>
  <text x="76" y="309" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">developed and approved at Level III</text>
  <polygon points="225,330 219,322 231,322" fill="#0B1F3A"/>

  <!-- Box 5: technique sheet -->
  <rect x="60" y="332" width="330" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="353" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">5 · Technique sheet / work instruction</text>
  <text x="76" y="373" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">part-specific values, zones, fixtures</text>
  <polygon points="225,394 219,386 231,386" fill="#0B1F3A"/>

  <!-- Box 6: record -->
  <rect x="60" y="396" width="330" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="76" y="417" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">6 · Inspection record / report</text>
  <text x="76" y="437" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">results traceable to the revision used</text>

  <!-- Right-side annotations -->
  <line x1="390" y1="102" x2="412" y2="102" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="97" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">WHAT must be met</text>
  <text x="420" y="116" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the requirement source, fixed by edition</text>

  <line x1="390" y1="166" x2="412" y2="166" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="161" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">WHAT the test must achieve</text>
  <text x="420" y="180" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">required sensitivity, coverage, acceptance</text>

  <line x1="390" y1="230" x2="412" y2="230" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="225" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">WHO may perform and evaluate</text>
  <text x="420" y="244" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">certification levels, exams, vision checks</text>

  <line x1="390" y1="294" x2="412" y2="294" stroke="#1E66F5" stroke-width="2"/>
  <text x="420" y="289" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">HOW this test is run</text>
  <text x="420" y="308" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">instrument, probe, standard, settings, criteria</text>

  <line x1="390" y1="358" x2="412" y2="358" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="353" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">THIS part, this zone</text>
  <text x="420" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the procedure applied to one part number</text>

  <line x1="390" y1="422" x2="412" y2="422" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="417" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">WHAT was found</text>
  <text x="420" y="436" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">signed by the Level II — the chain held</text>

  <!-- Bottom note -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">A Level II executes layer 4 exactly as written — changes to it belong to Level III.</text>
</svg>
