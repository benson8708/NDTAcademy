<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwPL" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
    <marker id="arwPLw" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Phase Lag — One Radian (≈57°) per Standard Depth</text>

  <!-- LEFT: physical picture — part cross-section with phasor clocks at depth -->
  <rect x="50" y="110" width="200" height="330" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="50" y1="110" x2="250" y2="110" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- AC coil above the surface -->
  <rect x="96" y="64" width="48" height="36" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="108" y1="64" x2="108" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="120" y1="64" x2="120" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="132" y1="64" x2="132" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="86" font-size="15" fill="#FFFFFF">AC test coil</text>

  <!-- phasor clocks: arrow rotates clockwise (lags) and fades with depth -->
  <!-- 0 (surface) -->
  <g opacity="1">
    <circle cx="120" cy="158" r="20" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
    <line x1="120" y1="138" x2="120" y2="133" stroke="#9BC4FF" stroke-width="2"/>
    <g transform="rotate(0 120 158)"><line x1="120" y1="158" x2="120" y2="142" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwPLw)"/></g>
    <text x="150" y="163" font-size="14" fill="#FFFFFF">0° lag · 100%</text>
  </g>
  <!-- 1δ -->
  <g opacity="0.75">
    <circle cx="120" cy="240" r="20" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
    <line x1="120" y1="220" x2="120" y2="215" stroke="#9BC4FF" stroke-width="2"/>
    <g transform="rotate(57 120 240)"><line x1="120" y1="240" x2="120" y2="224" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwPLw)"/></g>
    <text x="150" y="245" font-size="14" fill="#FFFFFF">57° · 37%</text>
  </g>
  <!-- 2δ -->
  <g opacity="0.5">
    <circle cx="120" cy="322" r="20" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
    <line x1="120" y1="302" x2="120" y2="297" stroke="#9BC4FF" stroke-width="2"/>
    <g transform="rotate(115 120 322)"><line x1="120" y1="322" x2="120" y2="306" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwPLw)"/></g>
    <text x="150" y="327" font-size="14" fill="#FFFFFF">115° · 13.5%</text>
  </g>
  <!-- 3δ -->
  <g opacity="0.3">
    <circle cx="120" cy="404" r="20" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
    <line x1="120" y1="384" x2="120" y2="379" stroke="#9BC4FF" stroke-width="2"/>
    <g transform="rotate(172 120 404)"><line x1="120" y1="404" x2="120" y2="388" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arwPLw)"/></g>
    <text x="150" y="409" font-size="14" fill="#FFFFFF">172° · 5%</text>
  </g>
  <!-- depth labels -->
  <text x="74" y="163" text-anchor="end" font-size="14" fill="#9BC4FF">0</text>
  <text x="86" y="245" text-anchor="end" font-size="14" fill="#9BC4FF">1δ</text>
  <text x="86" y="327" text-anchor="end" font-size="14" fill="#9BC4FF">2δ</text>
  <text x="86" y="409" text-anchor="end" font-size="14" fill="#9BC4FF">3δ</text>
  <text x="150" y="464" text-anchor="middle" font-size="14" fill="#9BC4FF">currents at depth respond later — and weaker</text>

  <!-- RIGHT: phase rotation vs depth graph -->
  <line x1="320" y1="110" x2="320" y2="440" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="320" y1="440" x2="760" y2="440" stroke="#FFFFFF" stroke-width="2"/>
  <text x="320" y="96" font-size="15" fill="#FFFFFF">phase rotation (degrees)</text>
  <text x="680" y="430" text-anchor="middle" font-size="14" fill="#9BC4FF">depth →</text>

  <!-- horizontal gridlines -->
  <line x1="320" y1="357.5" x2="760" y2="357.5" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 5"/>
  <line x1="320" y1="275" x2="760" y2="275" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 5"/>
  <line x1="320" y1="192.5" x2="760" y2="192.5" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 5"/>
  <line x1="320" y1="110" x2="760" y2="110" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 5"/>
  <text x="312" y="362" text-anchor="end" font-size="14" fill="#FFFFFF">90°</text>
  <text x="312" y="280" text-anchor="end" font-size="14" fill="#FFFFFF">180°</text>
  <text x="312" y="197" text-anchor="end" font-size="14" fill="#FFFFFF">270°</text>
  <text x="312" y="115" text-anchor="end" font-size="14" fill="#FFFFFF">360°</text>

  <!-- depth ticks -->
  <line x1="460" y1="434" x2="460" y2="446" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="600" y1="434" x2="600" y2="446" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="740" y1="434" x2="740" y2="446" stroke="#FFFFFF" stroke-width="2"/>
  <text x="460" y="464" text-anchor="middle" font-size="15" fill="#FFFFFF">1δ</text>
  <text x="600" y="464" text-anchor="middle" font-size="15" fill="#FFFFFF">2δ</text>
  <text x="740" y="464" text-anchor="middle" font-size="15" fill="#FFFFFF">3δ</text>

  <!-- round-trip line (2x/δ) -->
  <line x1="320" y1="440" x2="740" y2="124.9" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="8 6"/>
  <!-- one-way line (x/δ) -->
  <line x1="320" y1="440" x2="740" y2="282.4" stroke="#9BC4FF" stroke-width="3.5"/>

  <!-- one-way markers -->
  <circle cx="460" cy="387.5" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="600" cy="335" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="740" cy="282.4" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="470" y="398" font-size="14" fill="#9BC4FF">57°</text>
  <text x="612" y="341" font-size="14" fill="#9BC4FF">115°</text>
  <text x="728" y="276" text-anchor="end" font-size="14" fill="#9BC4FF">172°</text>

  <!-- round-trip markers -->
  <circle cx="460" cy="335" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="600" cy="229.9" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="740" cy="124.9" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="450" y="328" text-anchor="end" font-size="14" fill="#FFFFFF">115°</text>
  <text x="588" y="224" text-anchor="end" font-size="14" fill="#FFFFFF">229°</text>
  <text x="722" y="150" text-anchor="end" font-size="14" fill="#FFFFFF">344°</text>

  <!-- legend -->
  <rect x="336" y="118" width="244" height="64" rx="8" fill="#1E66F5" fill-opacity="0.14" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="348" y1="138" x2="380" y2="138" stroke="#9BC4FF" stroke-width="3.5"/>
  <text x="388" y="143" font-size="14" fill="#FFFFFF">one-way lag β = x/δ</text>
  <line x1="348" y1="164" x2="380" y2="164" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text x="388" y="169" font-size="14" fill="#FFFFFF">rotation at the coil ≈ 2x/δ</text>

  <!-- formula card -->
  <rect x="556" y="360" width="204" height="70" rx="8" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="658" y="386" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">β = x/δ rad ≈ 57° per δ</text>
  <text x="658" y="408" text-anchor="middle" font-size="14" fill="#FFFFFF">seen at the coil ≈ 2x/δ</text>
  <text x="658" y="425" text-anchor="middle" font-size="14" fill="#9BC4FF">use inside ~3δ only</text>

  <text x="400" y="492" text-anchor="middle" font-size="14" fill="#9BC4FF">A flaw is interrogated by the currents at its own depth — its signal carries that depth's delay.</text>
</svg>
