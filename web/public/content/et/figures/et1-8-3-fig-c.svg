<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Hold the RPM, Raise the Feed &#8212; the Detection Cliff</text>

  <!-- shaded gap region beyond the cliff -->
  <rect x="496.3" y="120" width="243.7" height="310" fill="#9BC4FF" opacity="0.13"/>

  <!-- reference amplitude line -->
  <line x1="90" y1="171.7" x2="740" y2="171.7" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="96" y="165" font-size="14" fill="#0B1F3A" opacity="0.75">reference amplitude</text>

  <!-- documented limit and cliff lines -->
  <line x1="455.6" y1="120" x2="455.6" y2="430" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="449" y="132" text-anchor="end" font-size="14" font-weight="bold" fill="#0B1F3A">documented max feed 90 mm/s (10% overlap)</text>
  <line x1="496.3" y1="120" x2="496.3" y2="430" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="503" y="140" font-size="14" font-weight="bold" fill="#1E66F5">pitch = coil width (100 mm/s)</text>
  <text x="618" y="158" text-anchor="middle" font-size="14" fill="#0B1F3A" opacity="0.75">coverage gaps &#8212; detection by luck</text>

  <!-- legend -->
  <circle cx="112" cy="206" r="4.5" fill="#1E66F5"/>
  <text x="122" y="211" font-size="14" fill="#0B1F3A">single pass</text>
  <line x1="105" y1="228" x2="135" y2="228" stroke="#1E66F5" stroke-width="3"/>
  <text x="142" y="233" font-size="14" fill="#0B1F3A">mean of 5 passes</text>

  <!-- mean line -->
  <polyline points="211.9,171.7 293.1,171.7 374.4,171.7 455.6,176.4 536.9,217.6 618.1,317.4 699.4,340.1" fill="none" stroke="#1E66F5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- pass dots: feed 30 -->
  <circle cx="205" cy="174.3" r="4.5" fill="#1E66F5"/>
  <circle cx="210" cy="169.1" r="4.5" fill="#1E66F5"/>
  <circle cx="215" cy="171.7" r="4.5" fill="#1E66F5"/>
  <circle cx="208" cy="176.9" r="4.5" fill="#1E66F5"/>
  <circle cx="218" cy="166.5" r="4.5" fill="#1E66F5"/>
  <!-- feed 50 -->
  <circle cx="286" cy="173" r="4.5" fill="#1E66F5"/>
  <circle cx="291" cy="170" r="4.5" fill="#1E66F5"/>
  <circle cx="296" cy="175" r="4.5" fill="#1E66F5"/>
  <circle cx="299" cy="168" r="4.5" fill="#1E66F5"/>
  <circle cx="293" cy="172" r="4.5" fill="#1E66F5"/>
  <!-- feed 70 -->
  <circle cx="368" cy="170" r="4.5" fill="#1E66F5"/>
  <circle cx="373" cy="174" r="4.5" fill="#1E66F5"/>
  <circle cx="378" cy="168" r="4.5" fill="#1E66F5"/>
  <circle cx="381" cy="173" r="4.5" fill="#1E66F5"/>
  <circle cx="375" cy="176" r="4.5" fill="#1E66F5"/>
  <!-- feed 90 -->
  <circle cx="449" cy="175" r="4.5" fill="#1E66F5"/>
  <circle cx="454" cy="179" r="4.5" fill="#1E66F5"/>
  <circle cx="459" cy="171" r="4.5" fill="#1E66F5"/>
  <circle cx="462" cy="182" r="4.5" fill="#1E66F5"/>
  <circle cx="456" cy="168" r="4.5" fill="#1E66F5"/>
  <!-- feed 110: scatter begins -->
  <circle cx="531" cy="202.7" r="4.5" fill="#1E66F5"/>
  <circle cx="536" cy="182" r="4.5" fill="#1E66F5"/>
  <circle cx="541" cy="287.9" r="4.5" fill="#1E66F5"/>
  <circle cx="534" cy="171.7" r="4.5" fill="#1E66F5"/>
  <circle cx="539" cy="244" r="4.5" fill="#1E66F5"/>
  <!-- feed 130: partial hits and misses -->
  <circle cx="612" cy="184.6" r="4.5" fill="#1E66F5"/>
  <circle cx="617" cy="399" r="4.5" fill="#1E66F5"/>
  <circle cx="622" cy="249.2" r="4.5" fill="#1E66F5"/>
  <circle cx="615" cy="428" r="4.5" fill="#1E66F5"/>
  <circle cx="620" cy="324.1" r="4.5" fill="#1E66F5"/>
  <!-- feed 150 -->
  <circle cx="693" cy="280.2" r="4.5" fill="#1E66F5"/>
  <circle cx="698" cy="428" r="4.5" fill="#1E66F5"/>
  <circle cx="703" cy="370.6" r="4.5" fill="#1E66F5"/>
  <circle cx="696" cy="202.7" r="4.5" fill="#1E66F5"/>
  <circle cx="701" cy="417.1" r="4.5" fill="#1E66F5"/>

  <!-- axes -->
  <line x1="90" y1="120" x2="90" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="90" y1="430" x2="740" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="430" x2="90" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="365.4" x2="90" y2="365.4" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="300.8" x2="90" y2="300.8" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="236.3" x2="90" y2="236.3" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="171.7" x2="90" y2="171.7" stroke="#0B1F3A" stroke-width="2"/>
  <text x="78" y="435" text-anchor="end" font-size="14" fill="#0B1F3A">0</text>
  <text x="78" y="370" text-anchor="end" font-size="14" fill="#0B1F3A">25</text>
  <text x="78" y="306" text-anchor="end" font-size="14" fill="#0B1F3A">50</text>
  <text x="78" y="241" text-anchor="end" font-size="14" fill="#0B1F3A">75</text>
  <text x="78" y="177" text-anchor="end" font-size="14" fill="#0B1F3A">100</text>
  <line x1="90" y1="430" x2="90" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="211.9" y1="430" x2="211.9" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="333.8" y1="430" x2="333.8" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="455.6" y1="430" x2="455.6" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="577.5" y1="430" x2="577.5" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="699.4" y1="430" x2="699.4" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <text x="90" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0</text>
  <text x="211.9" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">30</text>
  <text x="333.8" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">60</text>
  <text x="455.6" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">90</text>
  <text x="577.5" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">120</text>
  <text x="699.4" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">150</text>
  <text x="415" y="472" text-anchor="middle" font-size="15" fill="#0B1F3A">forward speed (mm/s) at constant 3000 RPM (50 rev/s)</text>
  <text transform="rotate(-90 40 275)" x="40" y="275" text-anchor="middle" font-size="15" fill="#0B1F3A">short-notch amplitude (% of reference)</text>

  <text x="90" y="492" font-size="14" fill="#0B1F3A" opacity="0.65">Five passes per feed step on a short EDM notch, 2.0 mm effective coil width &#8212; illustrative bench data.</text>
</svg>
