<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Eddy Current Orientation Decides Which Flaws You Detect</text>
  <line x1="400" y1="56" x2="400" y2="482" stroke="#9BC4FF" stroke-width="2"/>

  <!-- LEFT PANEL: surface probe, top view -->
  <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Surface probe on a plate — top view</text>
  <rect x="30" y="84" width="340" height="274" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>

  <!-- eddy current loops (dashed circles) -->
  <circle cx="185" cy="235" r="36" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <circle cx="185" cy="235" r="64" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <circle cx="185" cy="235" r="92" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="193,194 181,199 193,204" fill="#1E66F5"/>
  <polygon points="193,166 181,171 193,176" fill="#1E66F5"/>
  <polygon points="193,138 181,143 193,148" fill="#1E66F5"/>

  <!-- coil ring -->
  <circle cx="185" cy="235" r="50" fill="none" stroke="#0B1F3A" stroke-width="7"/>
  <line x1="148" y1="200" x2="100" y2="158" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="38" y="140" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">probe coil</text>
  <text x="38" y="158" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(above the plate)</text>

  <!-- crack crossing loops -->
  <polyline points="230,198 244,190 239,176 260,169 256,152 279,148 275,130 305,126 320,118" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <text x="362" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">crack cuts the loops</text>
  <text x="362" y="119" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">→ detected</text>

  <!-- loop label -->
  <text x="362" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">eddy current loops run</text>
  <text x="362" y="352" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">parallel to the surface</text>

  <!-- inset: lamination side view -->
  <text x="200" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Side view: lamination parallel to the surface</text>
  <rect x="60" y="394" width="280" height="58" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="80" y1="411" x2="308" y2="411" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="308,405 318,411 308,417" fill="#1E66F5"/>
  <line x1="100" y1="434" x2="300" y2="434" stroke="#0B1F3A" stroke-width="4"/>
  <text x="200" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">currents flow above it, never cross it → no signal</text>

  <!-- RIGHT PANEL: encircling coil, side view -->
  <text x="597" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Encircling coil on a bar — side view</text>

  <!-- flaw labels above bar -->
  <text x="418" y="106" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">circumferential crack</text>
  <text x="418" y="125" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">parallel to flow → weak / missed</text>
  <text x="778" y="106" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">axial crack cuts every loop</text>
  <text x="778" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">→ strong signal</text>

  <!-- bar -->
  <rect x="425" y="150" width="345" height="110" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>
  <text x="440" y="247" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">solid bar</text>

  <!-- circumferential crack (parallel to flow) -->
  <path d="M 463 156 q -8 49 0 98" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="463" y1="152" x2="470" y2="132" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- encircling coil band -->
  <rect x="505" y="132" width="46" height="146" rx="6" fill="#0B1F3A"/>
  <text x="528" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">encircling coil</text>

  <!-- circumferential eddy current loops -->
  <ellipse cx="585" cy="205" rx="10" ry="58" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6 4"/>
  <ellipse cx="622" cy="205" rx="10" ry="58" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="580,141 592,147 580,153" fill="#1E66F5"/>
  <polygon points="617,141 629,147 617,153" fill="#1E66F5"/>
  <line x1="604" y1="266" x2="620" y2="290" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="624" y="300" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">currents flow around</text>
  <text x="624" y="318" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">the circumference</text>

  <!-- axial crack (perpendicular to flow) -->
  <polyline points="652,172 667,165 682,174 697,166 712,173 727,167 742,172" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="700" y1="162" x2="712" y2="132" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- rule box -->
  <rect x="425" y="346" width="345" height="124" rx="8" fill="#0B1F3A"/>
  <text x="597" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">THE RULE</text>
  <text x="597" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Perpendicular to the flow → maximum signal</text>
  <text x="597" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Parallel to the flow → little or no signal</text>
  <text x="597" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Match the probe to the expected flaw direction</text>
</svg>
