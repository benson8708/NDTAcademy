<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwHB" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Coil vs Hall Element — Output vs Test Frequency</text>

  <!-- deep-penetration zone -->
  <rect x="90" y="100" width="200" height="300" fill="#1E66F5" fill-opacity="0.10"/>
  <text x="190" y="122" text-anchor="middle" font-size="14" fill="#9BC4FF">deep-penetration</text>
  <text x="190" y="140" text-anchor="middle" font-size="14" fill="#9BC4FF">frequencies — large δ</text>

  <!-- axes -->
  <line x1="90" y1="400" x2="755" y2="400" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arwHB)"/>
  <line x1="90" y1="400" x2="90" y2="100" stroke="#FFFFFF" stroke-width="2"/>
  <text x="100" y="90" font-size="15" fill="#FFFFFF">detector output (same field amplitude)</text>

  <!-- ticks -->
  <g stroke="#FFFFFF" stroke-width="2">
    <line x1="190" y1="400" x2="190" y2="408"/>
    <line x1="290" y1="400" x2="290" y2="408"/>
    <line x1="390" y1="400" x2="390" y2="408"/>
    <line x1="490" y1="400" x2="490" y2="408"/>
    <line x1="590" y1="400" x2="590" y2="408"/>
    <line x1="690" y1="400" x2="690" y2="408"/>
  </g>
  <text x="90" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">DC</text>
  <text x="190" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">10 Hz</text>
  <text x="290" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">100 Hz</text>
  <text x="390" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">1 kHz</text>
  <text x="490" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">10 kHz</text>
  <text x="590" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">100 kHz</text>
  <text x="690" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">1 MHz</text>
  <text x="425" y="448" text-anchor="middle" font-size="14" fill="#9BC4FF">(log frequency scale)</text>
  <text x="745" y="448" text-anchor="end" font-size="14" fill="#FFFFFF">frequency</text>

  <!-- Hall element response: flat then bandwidth roll-off -->
  <path d="M 90 180 L 575 180 Q 625 186 650 285" fill="none" stroke="#9BC4FF" stroke-width="3.5"/>
  <circle cx="90" cy="180" r="5" fill="#9BC4FF"/>
  <text x="95" y="160" font-size="15" fill="#9BC4FF">Hall element — flat to ≈100 kHz (works even at DC)</text>

  <!-- coil response: proportional to frequency, zero at DC -->
  <line x1="90" y1="400" x2="700" y2="120" stroke="#FFFFFF" stroke-width="3.5"/>
  <circle cx="90" cy="400" r="6" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="755" y="95" text-anchor="end" font-size="15" fill="#FFFFFF">induction coil — output ∝ f</text>

  <!-- crossover -->
  <circle cx="569" cy="180" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="450" y1="332" x2="556" y2="194" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="430" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">crossover</text>
  <text x="430" y="370" text-anchor="middle" font-size="14" fill="#9BC4FF">below: Hall wins — above: coil wins</text>

  <text x="400" y="486" text-anchor="middle" font-size="15" fill="#9BC4FF">Coil output vanishes at DC; the Hall element reads B at any frequency below its bandwidth.</text>
</svg>
