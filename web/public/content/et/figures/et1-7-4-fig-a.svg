<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrNavy" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#1E66F5"/>
    </marker>
    <marker id="arrGray" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#6B7A90"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Automated ET Line: Feedback Closes the Loops</text>

  <!-- process feedback path (instrument -> mill) -->
  <polyline points="330,80 72,80 72,236" fill="none" stroke="#6B7A90" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrGray)"/>
  <text x="200" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#6B7A90">reject-rate trend &#8594; process correction</text>

  <!-- product strip -->
  <rect x="20" y="295" width="760" height="30" fill="#9BC4FF" fill-opacity="0.45" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="700" y1="310" x2="752" y2="310" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrNavy)"/>
  <text x="726" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1F9D55">accept &#8594;</text>

  <!-- upstream mill / process -->
  <rect x="24" y="250" width="96" height="90" rx="6" fill="#6B7A90" fill-opacity="0.14" stroke="#6B7A90" stroke-width="2"/>
  <text x="72" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">upstream</text>
  <text x="72" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">process</text>
  <text x="72" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7A90">mill / welder</text>

  <!-- encircling coil (side view: windings above and below product) -->
  <rect x="168" y="262" width="26" height="30" fill="#1E66F5" fill-opacity="0.25" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="168" y="328" width="26" height="30" fill="#1E66F5" fill-opacity="0.25" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="173" y1="292" x2="173" y2="328" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="189" y1="292" x2="189" y2="328" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="181" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">encircling</text>
  <text x="181" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">test coil</text>

  <!-- encoder wheel riding the product -->
  <circle cx="280" cy="273" r="22" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="280" y1="251" x2="280" y2="295" stroke="#0B1F3A" stroke-width="1.2"/>
  <line x1="258" y1="273" x2="302" y2="273" stroke="#0B1F3A" stroke-width="1.2"/>
  <line x1="264" y1="257" x2="296" y2="289" stroke="#0B1F3A" stroke-width="1.2"/>
  <line x1="296" y1="257" x2="264" y2="289" stroke="#0B1F3A" stroke-width="1.2"/>
  <circle cx="280" cy="273" r="4" fill="#0B1F3A"/>
  <text x="280" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">encoder wheel</text>
  <text x="280" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#6B7A90">pulse per mm of travel</text>

  <!-- instrument -->
  <rect x="330" y="58" width="220" height="92" rx="8" fill="#1E66F5" fill-opacity="0.12" stroke="#1E66F5" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">ET instrument</text>
  <text x="440" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">alarm gate &#183; delay &#183; filter</text>
  <text x="440" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">corrections slaved to true line speed</text>

  <!-- coil signal to instrument -->
  <polyline points="181,262 181,120 322,120" fill="none" stroke="#0B1F3A" stroke-width="1.5" marker-end="url(#arrNavy)"/>
  <text x="245" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">signal</text>

  <!-- speed feedback: encoder to instrument -->
  <line x1="288" y1="250" x2="368" y2="155" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrBlue)"/>
  <text x="322" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">speed</text>
  <text x="322" y="214" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">feedback</text>

  <!-- delayed output: instrument to marker -->
  <line x1="438" y1="150" x2="431" y2="226" stroke="#1E66F5" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="448" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">delayed output</text>

  <!-- paint marker -->
  <rect x="418" y="232" width="24" height="30" rx="3" fill="#6B7A90" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M424,262 L436,262 L430,274 Z" fill="#0B1F3A"/>
  <line x1="426" y1="277" x2="424" y2="291" stroke="#D7263D" stroke-width="1.5"/>
  <line x1="430" y1="277" x2="430" y2="291" stroke="#D7263D" stroke-width="1.5"/>
  <line x1="434" y1="277" x2="436" y2="291" stroke="#D7263D" stroke-width="1.5"/>
  <rect x="446" y="295" width="10" height="30" fill="#D7263D" fill-opacity="0.65"/>
  <text x="431" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">paint marker</text>

  <!-- gate command: instrument to sorting gate -->
  <line x1="520" y1="150" x2="596" y2="248" stroke="#1E66F5" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="572" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">gate command</text>

  <!-- sorting gate -->
  <circle cx="600" cy="295" r="5" fill="#0B1F3A"/>
  <line x1="600" y1="295" x2="652" y2="262" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="600" y1="295" x2="648" y2="338" stroke="#D7263D" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="612" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">sorting gate</text>
  <rect x="640" y="355" width="90" height="50" rx="5" fill="#D7263D" fill-opacity="0.12" stroke="#D7263D" stroke-width="1.5"/>
  <text x="685" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D7263D">reject</text>
</svg>
