<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Nonconductive Coating Thickness — Lift-Off as the Ruler</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">zero on bare substrate, span with shims, read the gap as thickness (ASTM E376)</text>

  <!-- left: impedance plane -->
  <text x="90" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">impedance plane — the lift-off scale</text>
  <line x1="90" y1="110" x2="90" y2="430" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="90" y1="430" x2="360" y2="430" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="62" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A" transform="rotate(-90 62 280)">inductive reactance</text>
  <text x="225" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">resistance</text>

  <!-- conductivity locus and air point -->
  <path d="M 115,135 C 320,165 345,290 235,420" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="115" cy="135" r="5.5" fill="#0B1F3A"/>
  <text x="128" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">air (probe off)</text>
  <text x="320" y="395" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">conductivity</text>
  <text x="320" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">locus</text>

  <!-- lift-off line with thickness ticks -->
  <line x1="296" y1="307" x2="115" y2="135" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="296" cy="307" r="6" fill="#1E66F5"/>
  <circle cx="260" cy="273" r="3.5" fill="#1E66F5"/>
  <circle cx="224" cy="238" r="3.5" fill="#1E66F5"/>
  <circle cx="169" cy="187" r="3.5" fill="#1E66F5"/>
  <text x="308" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">0 µm — bare substrate (zero)</text>
  <text x="271" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">50 µm</text>
  <text x="235" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">100 µm</text>
  <text x="180" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">200 µm</text>
  <text x="98" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">more gap → operating point</text>
  <text x="98" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">slides toward the air point</text>

  <!-- right: calibration bench -->
  <rect x="455" y="100" width="230" height="58" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="570" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E66F5">0.114 mm</text>
  <text x="570" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">coating thickness readout</text>

  <!-- station 1: zero -->
  <rect x="431" y="252" width="30" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="436" y1="288" x2="456" y2="288" stroke="#1E66F5" stroke-width="2"/>
  <rect x="392" y="300" width="108" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="446" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">1 · zero</text>
  <text x="446" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">bare substrate — same</text>
  <text x="446" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">alloy · temper · curvature</text>

  <!-- station 2: span with shim -->
  <rect x="563" y="240" width="30" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="568" y1="276" x2="588" y2="276" stroke="#1E66F5" stroke-width="2"/>
  <rect x="524" y="288" width="108" height="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 3"/>
  <rect x="524" y="300" width="108" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="578" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2 · span</text>
  <text x="578" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">certified shims bracketing</text>
  <text x="578" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">the expected thickness</text>

  <!-- station 3: measure -->
  <rect x="695" y="242" width="30" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="700" y1="278" x2="720" y2="278" stroke="#1E66F5" stroke-width="2"/>
  <rect x="656" y="290" width="108" height="10" fill="#1E66F5" fill-opacity="0.35" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="656" y="300" width="108" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="710" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">3 · measure</text>
  <text x="710" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">anodize / paint / primer —</text>
  <text x="710" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">average several readings</text>

  <text x="578" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">substrate at least one effective depth thick (≈3δ)</text>
  <text x="578" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">— or back it with the same alloy —</text>
</svg>
