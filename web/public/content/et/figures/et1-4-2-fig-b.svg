<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Phase Rotation: Put Lift-Off on the Horizontal</text>
  <text x="205" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">1 — Before rotation</text>
  <text x="595" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">2 — After rotation</text>

  <!-- left screen -->
  <rect x="40" y="92" width="330" height="310" rx="8" fill="#0B1F3A"/>
  <line x1="95" y1="92" x2="95" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="150" y1="92" x2="150" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="205" y1="92" x2="205" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="260" y1="92" x2="260" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="315" y1="92" x2="315" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="40" y1="144" x2="370" y2="144" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="40" y1="196" x2="370" y2="196" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="40" y1="248" x2="370" y2="248" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="40" y1="300" x2="370" y2="300" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="40" y1="352" x2="370" y2="352" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>

  <line x1="290" y1="330" x2="124" y2="214" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="112,206 126,209 120,218" fill="#9BC4FF"/>
  <text x="128" y="196" font-size="15" fill="#9BC4FF">lift-off</text>
  <line x1="290" y1="330" x2="357" y2="235" stroke="#FFFFFF" stroke-width="4"/>
  <polygon points="363,226 360,240 351,233" fill="#FFFFFF"/>
  <text x="297" y="240" font-size="15" fill="#FFFFFF">crack</text>
  <circle cx="290" cy="330" r="5" fill="#FFFFFF"/>
  <text x="290" y="352" text-anchor="middle" font-size="14" fill="#FFFFFF" opacity="0.8">null</text>
  <text x="58" y="390" font-size="14" fill="#9BC4FF">Wobble and cracks mix into both channels</text>

  <!-- phase knob -->
  <path d="M 378 228 A 30 30 0 0 1 422 228" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="426,233 414,231 420,222" fill="#1E66F5"/>
  <circle cx="400" cy="255" r="22" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="400" y1="255" x2="413" y2="237" stroke="#0B1F3A" stroke-width="3"/>
  <text x="400" y="296" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">PHASE</text>

  <!-- right screen -->
  <rect x="430" y="92" width="330" height="310" rx="8" fill="#0B1F3A"/>
  <line x1="485" y1="92" x2="485" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="540" y1="92" x2="540" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="595" y1="92" x2="595" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="650" y1="92" x2="650" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="705" y1="92" x2="705" y2="402" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="430" y1="144" x2="760" y2="144" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="430" y1="196" x2="760" y2="196" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="430" y1="248" x2="760" y2="248" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="430" y1="300" x2="760" y2="300" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="430" y1="352" x2="760" y2="352" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.18"/>

  <rect x="445" y="319" width="300" height="22" fill="#9BC4FF" opacity="0.15"/>
  <line x1="445" y1="240" x2="750" y2="240" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.55" stroke-dasharray="7 6"/>
  <text x="449" y="232" font-size="14" fill="#FFFFFF" opacity="0.8">vertical alarm gate</text>
  <line x1="690" y1="330" x2="478" y2="330" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="470,330 484,323.5 484,336.5" fill="#9BC4FF"/>
  <text x="482" y="310" font-size="15" fill="#9BC4FF">lift-off — flat, runs left</text>
  <line x1="690" y1="330" x2="690" y2="184" stroke="#FFFFFF" stroke-width="4"/>
  <polygon points="690,176 683.5,190 696.5,190" fill="#FFFFFF"/>
  <text x="680" y="190" text-anchor="end" font-size="15" fill="#FFFFFF">crack — vertical</text>
  <circle cx="690" cy="330" r="5" fill="#FFFFFF"/>
  <text x="690" y="352" text-anchor="middle" font-size="14" fill="#FFFFFF" opacity="0.8">null</text>
  <text x="460" y="364" font-size="14" fill="#9BC4FF">probe wobble stays inside this flat band</text>
  <text x="452" y="390" font-size="14" fill="#9BC4FF">Vertical gate alarms on cracks, not wobble</text>

  <text x="40" y="436" font-size="15" fill="#0B1F3A">Rotation spins the whole display — the angle between lift-off and crack signals is preserved.</text>
  <text x="40" y="464" font-size="15" fill="#0B1F3A">Routine: null on the part, slide a 0.1 mm shim, rotate until the trace runs flat, verify, then scan.</text>
</svg>
