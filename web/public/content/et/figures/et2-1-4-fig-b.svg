<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwDB" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
    <marker id="arwDBw" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Depth Rotates the Flaw Signal — Calibrate, Then Size</text>

  <!-- LEFT: impedance-plane display -->
  <rect x="40" y="90" width="410" height="340" rx="10" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="245" y="116" text-anchor="middle" font-size="14" fill="#9BC4FF">impedance-plane display (lift-off set horizontal)</text>

  <!-- balance point and lift-off reference -->
  <circle cx="170" cy="340" r="5" fill="#FFFFFF"/>
  <line x1="170" y1="340" x2="74" y2="340" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arwDB)"/>
  <text x="62" y="364" font-size="14" fill="#FFFFFF">lift-off (reference)</text>

  <!-- rotation arcs measured from the surface-notch direction -->
  <path d="M 185.6,251.4 A 90 90 0 0 1 252.8,304.8" fill="none" stroke="#9BC4FF" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#arwDB)"/>
  <text x="242" y="258" font-size="14" fill="#9BC4FF">≈57°</text>
  <path d="M 193.4,207.1 A 135 135 0 0 1 280.6,417.4" fill="none" stroke="#9BC4FF" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#arwDB)"/>
  <text x="314" y="286" font-size="14" fill="#9BC4FF">≈115°</text>

  <!-- signal vectors: amplitude shrinks, rotation grows with depth -->
  <line x1="170" y1="340" x2="197.8" y2="182.4" stroke="#FFFFFF" stroke-width="3.5" marker-end="url(#arwDBw)"/>
  <text x="206" y="178" font-size="14" fill="#FFFFFF">surface notch (reference signal)</text>

  <line x1="170" y1="340" x2="280.5" y2="293.1" stroke="#9BC4FF" stroke-width="3" stroke-opacity="0.9" marker-end="url(#arwDB)"/>
  <text x="289" y="293" font-size="14" fill="#9BC4FF">flaw at 0.5δ</text>

  <line x1="170" y1="340" x2="235.5" y2="385.9" stroke="#9BC4FF" stroke-width="2.5" stroke-opacity="0.6" marker-end="url(#arwDB)"/>
  <text x="246" y="396" font-size="14" fill="#9BC4FF">flaw at 1δ</text>

  <text x="245" y="452" text-anchor="middle" font-size="14" fill="#9BC4FF">deeper → amplitude shrinks, rotation grows (≈2x/δ)</text>

  <!-- RIGHT: phase-depth calibration curve -->
  <rect x="470" y="90" width="290" height="340" rx="10" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="615" y="116" text-anchor="middle" font-size="14" fill="#9BC4FF">phase–depth curve (EDM notch standard)</text>

  <line x1="510" y1="140" x2="510" y2="400" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="510" y1="400" x2="740" y2="400" stroke="#FFFFFF" stroke-width="2"/>
  <text x="504" y="134" font-size="14" fill="#FFFFFF">rotation (°)</text>
  <text x="625" y="424" text-anchor="middle" font-size="14" fill="#FFFFFF">true notch depth (mm)</text>

  <!-- calibration line: 2024-T3 at 100 kHz, delta = 0.38 mm -->
  <line x1="510" y1="400" x2="740" y2="149" stroke="#9BC4FF" stroke-width="3"/>

  <!-- read-off: measured 115 degrees -> approx 0.38 mm -->
  <line x1="510" y1="320" x2="583" y2="320" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="583" y1="320" x2="583" y2="400" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="514" y="312" font-size="14" fill="#FFFFFF">measured ≈115°</text>
  <text x="590" y="388" font-size="14" font-weight="bold" fill="#FFFFFF">≈0.38 mm</text>

  <!-- notch calibration points -->
  <circle cx="548" cy="358" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="558" y="366" font-size="14" fill="#FFFFFF">0.2 mm</text>
  <circle cx="606" cy="296" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="616" y="304" font-size="14" fill="#FFFFFF">0.5 mm</text>
  <circle cx="702" cy="191" r="6" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="694" y="184" text-anchor="end" font-size="14" fill="#FFFFFF">1.0 mm</text>

  <text x="615" y="452" text-anchor="middle" font-size="14" fill="#9BC4FF">interpolate between notches — never size past 3δ</text>

  <text x="400" y="488" text-anchor="middle" font-size="15" fill="#FFFFFF">Display rotation moves every signal together — the separation between signals is what carries depth.</text>
</svg>
