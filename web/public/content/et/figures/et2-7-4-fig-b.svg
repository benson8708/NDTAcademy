<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Verification and the Re-Examination Rule</text>

  <!-- timeline axis -->
  <line x1="45" y1="210" x2="752" y2="210" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="768,210 750,202 750,218" fill="#0B1F3A"/>
  <text x="766" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shift time</text>

  <!-- Node A: standardize -->
  <rect x="48" y="134" width="120" height="58" rx="6" fill="#0B1F3A"/>
  <text x="108" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">STANDARDIZE</text>
  <text x="108" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">start of run</text>
  <line x1="108" y1="192" x2="108" y2="210" stroke="#0B1F3A" stroke-width="2"/>

  <!-- production segment 1 -->
  <text x="190" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#1E66F5">production</text>

  <!-- Node B: verify pass -->
  <rect x="232" y="140" width="96" height="52" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="280" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">VERIFY</text>
  <polyline points="266,174 276,184 296,164" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <line x1="280" y1="192" x2="280" y2="210" stroke="#0B1F3A" stroke-width="2"/>

  <!-- production segment 2 -->
  <text x="362" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#1E66F5">production</text>

  <!-- Node C: verify pass (last acceptable check) -->
  <rect x="404" y="140" width="96" height="52" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="452" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">VERIFY</text>
  <polyline points="438,174 448,184 468,164" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <line x1="452" y1="192" x2="452" y2="210" stroke="#0B1F3A" stroke-width="2"/>
  <text x="452" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">last acceptable check</text>

  <!-- production segment 3 (the suspect window) -->
  <text x="534" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#1E66F5">production</text>

  <!-- Node D: verify fails -->
  <rect x="570" y="134" width="128" height="58" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="634" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">VERIFY &#8212; FAILS</text>
  <line x1="622" y1="164" x2="646" y2="184" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="646" y1="164" x2="622" y2="184" stroke="#0B1F3A" stroke-width="3.5"/>
  <text x="634" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">out of tolerance</text>
  <line x1="634" y1="192" x2="634" y2="210" stroke="#0B1F3A" stroke-width="2"/>

  <!-- suspect window shading on axis -->
  <rect x="452" y="204" width="182" height="12" fill="#1E66F5" fill-opacity="0.25"/>

  <!-- re-standardize box, fed from the failed check -->
  <polyline points="634,216 634,240 720,240 720,250" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="720,258 713,246 727,246" fill="#0B1F3A"/>
  <rect x="648" y="258" width="144" height="40" rx="6" fill="#0B1F3A"/>
  <text x="720" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">RE-STANDARDIZE</text>

  <!-- re-examine return arrow -->
  <path d="M 600 232 C 575 292, 500 292, 460 234" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="456,226 450,246 467,240" fill="#1E66F5"/>
  <text x="520" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">RE-EXAMINE everything tested</text>
  <text x="520" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">since the last acceptable check</text>

  <!-- note: verification cadence -->
  <text x="48" y="376" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Verify at the start, at the interval the governing document sets, and at the end of the run.</text>

  <!-- bottom panel: invalidating events -->
  <line x1="40" y1="392" x2="760" y2="392" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="48" y="416" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Standardization is invalidated immediately &#8212; no check needed &#8212; by:</text>

  <rect x="48" y="430" width="180" height="34" rx="17" fill="#9BC4FF"/>
  <text x="138" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe or cable change</text>

  <rect x="244" y="430" width="166" height="34" rx="17" fill="#9BC4FF"/>
  <text x="327" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">power interruption</text>

  <rect x="426" y="430" width="150" height="34" rx="17" fill="#9BC4FF"/>
  <text x="501" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">any setting change</text>

  <rect x="592" y="430" width="160" height="34" rx="17" fill="#9BC4FF"/>
  <text x="672" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">product alloy or size</text>

  <text x="48" y="488" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#1E66F5">After any of these: re-standardize on the reference standard before the next part is tested.</text>
</svg>
