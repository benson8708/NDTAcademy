<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Mass Effect: How Much Metal the Field Sees</text>

  <!-- ================= LEFT PANEL: thick part ================= -->
  <text x="205" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Thick part &#8212; t &gt; 3&#948;</text>

  <!-- coil -->
  <text x="210" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">surface coil (AC)</text>
  <rect x="150" y="168" width="34" height="58" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="236" y="168" width="34" height="58" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- part -->
  <rect x="55" y="230" width="300" height="210" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="2"/>
  <text x="64" y="252" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">test part</text>

  <!-- eddy current density bands (decay with depth) -->
  <rect x="135" y="233" width="150" height="20" fill="#9BC4FF" opacity="0.85"/>
  <rect x="135" y="255" width="150" height="20" fill="#9BC4FF" opacity="0.55"/>
  <rect x="135" y="277" width="150" height="20" fill="#9BC4FF" opacity="0.35"/>
  <rect x="135" y="299" width="150" height="20" fill="#9BC4FF" opacity="0.20"/>
  <rect x="135" y="321" width="150" height="18" fill="#9BC4FF" opacity="0.10"/>
  <text x="350" y="247" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">100% at surface</text>

  <!-- 3-delta effective depth -->
  <line x1="65" y1="350" x2="345" y2="350" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="205" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">3&#948; &#8212; effective depth (&#8776;5% density)</text>
  <text x="205" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">metal below 3&#948; carries almost no current</text>

  <text x="205" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">back wall &#8212; outside the field</text>
  <text x="205" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">thickness changes: no signal</text>

  <!-- ================= RIGHT PANEL: thin part ================= -->
  <text x="595" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Thin part &#8212; t &lt; 3&#948;</text>

  <!-- coil -->
  <text x="600" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">surface coil (AC)</text>
  <rect x="540" y="168" width="34" height="58" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="626" y="168" width="34" height="58" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- thin part -->
  <rect x="445" y="230" width="300" height="72" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="2"/>
  <text x="456" y="252" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">test part</text>

  <!-- truncated density bands -->
  <rect x="525" y="233" width="150" height="20" fill="#9BC4FF" opacity="0.85"/>
  <rect x="525" y="255" width="150" height="20" fill="#9BC4FF" opacity="0.55"/>
  <rect x="525" y="277" width="150" height="23" fill="#9BC4FF" opacity="0.35"/>

  <text x="595" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">back wall &#8212; inside the field</text>

  <!-- ghost of the truncated current region -->
  <rect x="525" y="302" width="150" height="48" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6"/>
  <line x1="455" y1="350" x2="735" y2="350" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="595" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">3&#948; would reach here &#8212; the decay is cut short</text>

  <text x="595" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">impedance now tracks wall thickness</text>
  <text x="595" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">the basis of corrosion-thinning surveys</text>
</svg>
