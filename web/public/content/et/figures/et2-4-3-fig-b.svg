<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Bobbin-Coil Phase–Depth Curve at the Prime Frequency</text>

  <!-- band shading -->
  <rect x="100" y="90" width="133" height="300" fill="#EAF1FE"/>
  <rect x="233" y="90" width="467" height="300" fill="#DCE7F8"/>
  <text x="166" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">ID-origin band</text>
  <text x="560" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">OD-origin band</text>

  <!-- 40 deg through-wall reference line -->
  <line x1="233" y1="90" x2="233" y2="390" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- axes -->
  <line x1="100" y1="90" x2="100" y2="390" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="100" y1="390" x2="700" y2="390" stroke="#0B1F3A" stroke-width="2"/>

  <!-- x ticks -->
  <line x1="100" y1="390" x2="100" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="200" y1="390" x2="200" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="300" y1="390" x2="300" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="400" y1="390" x2="400" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="500" y1="390" x2="500" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="600" y1="390" x2="600" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="700" y1="390" x2="700" y2="397" stroke="#0B1F3A" stroke-width="2"/>
  <text x="100" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <text x="200" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">30</text>
  <text x="300" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60</text>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">90</text>
  <text x="500" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">120</text>
  <text x="600" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">150</text>
  <text x="700" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">180</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">signal phase angle (degrees)</text>

  <!-- y ticks -->
  <line x1="93" y1="334" x2="100" y2="334" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="93" y1="278" x2="100" y2="278" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="93" y1="222" x2="100" y2="222" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="93" y1="166" x2="100" y2="166" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="93" y1="110" x2="100" y2="110" stroke="#0B1F3A" stroke-width="2"/>
  <text x="88" y="339" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">20</text>
  <text x="88" y="283" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">40</text>
  <text x="88" y="227" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60</text>
  <text x="88" y="171" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">80</text>
  <text x="88" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100</text>
  <text x="40" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A" transform="rotate(-90 40 240)">indication depth (% of wall)</text>

  <!-- ID branch -->
  <path d="M 233 110 Q 222 140 210 166 Q 200 195 190 222 Q 179 251 167 278 Q 155 307 143 334" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="210" cy="166" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="190" cy="222" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="167" cy="278" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="143" cy="334" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="196" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">80% ID</text>
  <text x="143" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">20% ID</text>

  <!-- OD branch -->
  <path d="M 233 110 Q 285 140 333 166 Q 377 196 417 222 Q 460 251 500 278 Q 552 308 600 334" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="333" cy="166" r="5" fill="#1E66F5"/>
  <circle cx="417" cy="222" r="5" fill="#1E66F5"/>
  <circle cx="500" cy="278" r="5" fill="#1E66F5"/>
  <circle cx="600" cy="334" r="5" fill="#1E66F5"/>
  <text x="345" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">80% OD</text>
  <text x="429" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60% OD</text>
  <text x="512" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">40% OD</text>
  <text x="612" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">20% OD</text>
  <text x="300" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shallower OD → more rotation</text>

  <!-- through-wall point -->
  <circle cx="233" cy="110" r="6" fill="#0B1F3A"/>
  <text x="245" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">through-wall hole — set ≈ 40°</text>

  <!-- probe motion marker -->
  <text x="108" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe motion / lift-off ≈ 0°</text>

  <!-- legend -->
  <rect x="555" y="130" width="185" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="563" y1="147" x2="585" y2="147" stroke="#0B1F3A" stroke-width="4"/>
  <text x="591" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ID-origin branch</text>
  <line x1="563" y1="171" x2="585" y2="171" stroke="#1E66F5" stroke-width="4"/>
  <text x="591" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">OD-origin branch</text>

  <!-- bottom notes -->
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Representative — build the curve from your own standard at the procedure's prime frequency.</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Never report a depth from a curve you did not verify.</text>
</svg>
