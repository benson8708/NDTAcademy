<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Coil Arrangements: Surface, Encircling, and Inside</text>

  <!-- panel dividers -->
  <line x1="270" y1="60" x2="270" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="535" y1="60" x2="535" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ================= PANEL 1: PROBE (SURFACE) COIL ================= -->
  <text x="140" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Probe (surface) coil</text>

  <!-- coil axis -->
  <line x1="140" y1="96" x2="140" y2="210" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="150" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil axis</text>

  <!-- coil body with windings -->
  <rect x="114" y="122" width="52" height="66" rx="5" fill="#1E66F5"/>
  <line x1="118" y1="134" x2="162" y2="134" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="118" y1="146" x2="162" y2="146" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="118" y1="158" x2="162" y2="158" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="118" y1="170" x2="162" y2="170" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="118" y1="182" x2="162" y2="182" stroke="#FFFFFF" stroke-width="2"/>

  <!-- lift-off bracket -->
  <line x1="176" y1="188" x2="176" y2="212" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="171" y1="188" x2="181" y2="188" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="171" y1="212" x2="181" y2="212" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="186" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off</text>

  <!-- plate -->
  <rect x="30" y="212" width="220" height="78" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- circular eddy currents under the coil -->
  <ellipse cx="140" cy="226" rx="24" ry="6.5" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="140" cy="226" rx="42" ry="11.5" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="146,211.5 146,218.5 134,215" fill="#1E66F5"/>
  <text x="140" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">circular eddy currents</text>

  <text x="140" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">detects cracks crossing the loops</text>
  <text x="140" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flat &amp; contoured surfaces</text>
  <text x="140" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">scanned in overlapping passes</text>

  <!-- ================= PANEL 2: ENCIRCLING COIL ================= -->
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Encircling (OD) coil</text>

  <!-- feed arrow -->
  <line x1="300" y1="224" x2="344" y2="224" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="344,218 356,224 344,230" fill="#0B1F3A"/>
  <text x="322" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">feed</text>

  <!-- coil ring label -->
  <text x="432" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">encircling coil</text>
  <line x1="430" y1="204" x2="406" y2="220" stroke="#0B1F3A" stroke-width="1"/>

  <!-- bar -->
  <rect x="292" y="240" width="216" height="58" rx="29" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- coil ring around bar -->
  <ellipse cx="400" cy="269" rx="20" ry="52" fill="none" stroke="#1E66F5" stroke-width="9"/>

  <!-- circumferential eddy currents on the bar -->
  <ellipse cx="340" cy="269" rx="8" ry="24" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="334,243 346,243 340,236" fill="#1E66F5"/>
  <ellipse cx="460" cy="269" rx="8" ry="24" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="454,243 466,243 460,236" fill="#1E66F5"/>
  <line x1="340" y1="296" x2="368" y2="318" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="460" y1="296" x2="432" y2="318" stroke="#0B1F3A" stroke-width="1"/>
  <text x="400" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">circumferential eddy currents</text>

  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">catches longitudinal seams &amp; laps</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bar, rod, wire, tubing at line speed</text>
  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">full 360&#176; slice inspected at once</text>

  <!-- ================= PANEL 3: INSIDE (BOBBIN) COIL ================= -->
  <text x="660" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Inside (ID/bobbin) coil</text>

  <!-- tube wall label -->
  <text x="706" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tube wall</text>
  <line x1="706" y1="224" x2="706" y2="234" stroke="#0B1F3A" stroke-width="1"/>

  <!-- tube cutaway (side view) -->
  <rect x="560" y="232" width="210" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="560" y="300" width="210" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>

  <!-- cable and pull arrow -->
  <line x1="560" y1="274" x2="640" y2="274" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="584,268 584,280 566,274" fill="#0B1F3A"/>
  <text x="606" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pull</text>

  <!-- bobbin probe -->
  <rect x="640" y="256" width="54" height="36" rx="6" fill="#1E66F5"/>
  <line x1="650" y1="259" x2="650" y2="289" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="684" y1="259" x2="684" y2="289" stroke="#FFFFFF" stroke-width="2"/>

  <!-- end-view inset: currents circling the wall -->
  <circle cx="660" cy="392" r="36" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="660" cy="392" r="23" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="660" cy="392" r="29.5" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="654,358.5 654,366.5 665,362.5" fill="#1E66F5"/>

  <text x="660" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">currents circle the wall &#8212; end view</text>
  <text x="660" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">installed tubing: tested from the bore</text>
</svg>
