<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Frequency Sets the Reach: &#948; in 6061-T6 Aluminum (43% IACS)</text>

  <!-- depth axis -->
  <line x1="70" y1="120" x2="70" y2="455" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="62" y1="186" x2="78" y2="186" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="192" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2</text>
  <line x1="62" y1="252" x2="78" y2="252" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">4</text>
  <line x1="62" y1="318" x2="78" y2="318" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="324" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">6</text>
  <line x1="62" y1="384" x2="78" y2="384" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="390" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">8</text>
  <line x1="62" y1="450" x2="78" y2="450" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="456" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10</text>
  <text x="34" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A" transform="rotate(-90 34 300)">depth below surface (mm)</text>

  <!-- surface line -->
  <line x1="70" y1="120" x2="560" y2="120" stroke="#0B1F3A" stroke-width="3"/>
  <text x="84" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">surface</text>

  <!-- frequency labels -->
  <text x="150" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 kHz</text>
  <text x="270" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">10 kHz</text>
  <text x="390" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">100 kHz</text>
  <text x="510" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 MHz</text>

  <!-- 1 kHz bars -->
  <rect x="120" y="120" width="60" height="106" fill="#1E66F5"/>
  <rect x="120" y="226" width="60" height="211" fill="#9BC4FF"/>
  <text x="150" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#948; = 3.2 mm</text>
  <text x="150" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3&#948; = 9.6 mm</text>

  <!-- 10 kHz bars -->
  <rect x="240" y="120" width="60" height="33" fill="#1E66F5"/>
  <rect x="240" y="153" width="60" height="66" fill="#9BC4FF"/>
  <text x="270" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#948; = 1.0 mm</text>
  <text x="270" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3&#948; = 3.0 mm</text>

  <!-- 100 kHz bars -->
  <rect x="360" y="120" width="60" height="11" fill="#1E66F5"/>
  <rect x="360" y="131" width="60" height="20" fill="#9BC4FF"/>
  <text x="390" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#948; = 0.32 mm</text>
  <text x="390" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3&#948; = 0.95 mm</text>

  <!-- 1 MHz bars -->
  <rect x="480" y="120" width="60" height="3.3" fill="#1E66F5"/>
  <rect x="480" y="123.3" width="60" height="6.6" fill="#9BC4FF"/>
  <text x="510" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#948; = 0.10 mm</text>
  <text x="510" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3&#948; = 0.30 mm</text>

  <!-- flaw interface line at 2.5 mm -->
  <line x1="80" y1="203" x2="560" y2="203" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text x="560" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">flaw interface at 2.5 mm &#8212;</text>
  <text x="560" y="226" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">inside 3&#948; only below &#8776;15 kHz</text>

  <!-- legend / formula panel -->
  <rect x="585" y="120" width="20" height="20" fill="#1E66F5"/>
  <text x="613" y="131" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1&#948; — standard depth</text>
  <text x="613" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">current down to 37%</text>
  <rect x="585" y="172" width="20" height="20" fill="#9BC4FF"/>
  <text x="613" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3&#948; — effective depth</text>
  <text x="613" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8776;5% — working limit</text>

  <rect x="585" y="240" width="200" height="130" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="685" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">&#948; (mm) &#8776; 660 / &#8730;(f &#183; &#956;&#7523; &#183; &#963;)</text>
  <text x="685" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">f in Hz, &#963; in %IACS, &#956;&#7523; = 1</text>
  <text x="685" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">phase lag &#8776; 57&#176; per &#948;</text>
  <text x="685" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">deeper flaw &#8594; more rotation</text>

  <text x="685" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Quadruple the frequency</text>
  <text x="685" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and &#948; halves.</text>
</svg>
