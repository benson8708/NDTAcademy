<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Frequency Slides the Operating Point Along the Conductivity Locus</text>

  <!-- ================= AXES ================= -->
  <line x1="90" y1="70" x2="90" y2="445" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="90" y1="445" x2="445" y2="445" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="84,76 96,76 90,64" fill="#0B1F3A"/>
  <polygon points="439,439 439,451 451,445" fill="#0B1F3A"/>
  <text x="68" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle" transform="rotate(-90 68 260)">normalized reactance ωL/ωL₀</text>
  <text x="268" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">normalized resistance R/ωL₀</text>

  <!-- ================= CONDUCTIVITY LOCUS ================= -->
  <path d="M 97 86 C 200 95, 290 140, 320 220 C 338 285, 300 360, 240 400 C 205 423, 150 437, 112 440"
        fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <!-- direction of increasing f·µr·σ -->
  <polygon points="318,256 308,249 322,243" fill="#1E66F5"/>
  <text x="352" y="300" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">f · µᵣ · σ</text>
  <text x="352" y="318" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">increasing ↓</text>

  <!-- air point -->
  <circle cx="97" cy="86" r="5" fill="#0B1F3A"/>
  <text x="110" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">air point</text>

  <!-- ================= OPERATING POINTS (one aluminum part) ================= -->
  <!-- A: low frequency, near top -->
  <circle cx="200" cy="96" r="6" fill="#0B1F3A"/>
  <text x="205" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">5 kHz</text>
  <line x1="200" y1="96" x2="150" y2="91" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="150,86 150,96 141,91" fill="#0B1F3A"/>
  <text x="218" y="140" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off ≈ collinear with σ moves</text>

  <!-- B: knee -->
  <circle cx="322" cy="235" r="6" fill="#0B1F3A"/>
  <text x="338" y="232" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">60 kHz — knee</text>
  <line x1="322" y1="235" x2="266" y2="198" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="263,206 270,193 256,194" fill="#0B1F3A"/>
  <text x="338" y="252" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">widest spread per %IACS</text>

  <!-- C: high frequency, low on curve -->
  <circle cx="240" cy="400" r="6" fill="#0B1F3A"/>
  <text x="252" y="418" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1 MHz</text>
  <!-- lift-off direction (toward air point) -->
  <line x1="240" y1="400" x2="217" y2="350" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="211,353 222,347 213,341" fill="#0B1F3A"/>
  <text x="148" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off</text>
  <!-- crack response direction (back up the locus) -->
  <line x1="240" y1="400" x2="292" y2="372" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="288,365 297,369 290,379" fill="#1E66F5"/>
  <text x="300" y="390" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">crack / σ</text>

  <!-- ================= NOTES COLUMN ================= -->
  <text x="478" y="84" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">READ THE PLANE</text>
  <text x="478" y="110" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Position along the locus is set by the</text>
  <text x="478" y="129" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">product f · µᵣ · σ. The part owns σ and</text>
  <text x="478" y="148" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">µᵣ — frequency is how you place the</text>
  <text x="478" y="167" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">operating point.</text>

  <text x="478" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">Top of curve (run too low):</text>
  <text x="478" y="223" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off, crack, and conductivity moves</text>
  <text x="478" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crowd together — poor discrimination.</text>

  <text x="478" y="279" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">Knee:</text>
  <text x="478" y="298" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">maximum conductivity sensitivity —</text>
  <text x="478" y="317" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60 kHz meters park aluminum alloys</text>
  <text x="478" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">here for sorting and heat-treat checks.</text>

  <text x="478" y="373" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">Below the knee (higher f):</text>
  <text x="478" y="392" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crack response rotates well away from</text>
  <text x="478" y="411" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off — surface flaw detection territory.</text>

  <text x="478" y="448" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" font-style="italic">Phase discrimination in depth: et2-4-3.</text>
</svg>
