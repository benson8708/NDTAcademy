<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Sensing Element Selection — Work the Five Factors in Order</text>

  <!-- ============ BAND 1: TYPE OF PART ============ -->
  <rect x="20" y="42" width="760" height="26" rx="13" fill="#0B1F3A"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">1 · TYPE OF PART — what geometry, material, and access?</text>

  <line x1="140" y1="68" x2="140" y2="76" stroke="#1E66F5" stroke-width="2"/>
  <path d="M140 84 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="400" y1="68" x2="400" y2="76" stroke="#1E66F5" stroke-width="2"/>
  <path d="M400 84 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="660" y1="68" x2="660" y2="76" stroke="#1E66F5" stroke-width="2"/>
  <path d="M660 84 l-5 -8 l10 0 z" fill="#1E66F5"/>

  <rect x="24" y="84" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="140" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Flat or contoured surface</text>
  <text x="140" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Surface (probe) coil, scanned</text>

  <rect x="284" y="84" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Round stock moving on a line</text>
  <text x="400" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Encircling coil, feed-through</text>

  <rect x="544" y="84" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="660" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Tube or bore — ID access only</text>
  <text x="660" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Inside (bobbin) coil, pulled</text>

  <!-- ============ BAND 2: FLAW TYPE + LOCATION ============ -->
  <rect x="20" y="148" width="760" height="26" rx="13" fill="#0B1F3A"/>
  <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">2 · FLAW TYPE + 5 · PROBABLE LOCATION — orientation, character, depth</text>

  <line x1="140" y1="174" x2="140" y2="182" stroke="#1E66F5" stroke-width="2"/>
  <path d="M140 190 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="400" y1="174" x2="400" y2="182" stroke="#1E66F5" stroke-width="2"/>
  <path d="M400 190 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="660" y1="174" x2="660" y2="182" stroke="#1E66F5" stroke-width="2"/>
  <path d="M660 190 l-5 -8 l10 0 z" fill="#1E66F5"/>

  <rect x="24" y="190" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="140" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Gradual wall loss or drift</text>
  <text x="140" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Absolute channel</text>

  <rect x="284" y="190" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Small, abrupt pits and cracks</text>
  <text x="400" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Differential channel</text>

  <rect x="544" y="190" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="660" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Deep or hidden layer</text>
  <text x="660" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Low frequency + Hall detector</text>

  <!-- ============ BAND 3: SPEED + AMOUNT ============ -->
  <rect x="20" y="254" width="760" height="26" rx="13" fill="#0B1F3A"/>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">3 · SPEED + 4 · AMOUNT OF TESTING — how fast, and what percentage?</text>

  <line x1="140" y1="280" x2="140" y2="288" stroke="#1E66F5" stroke-width="2"/>
  <path d="M140 296 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="400" y1="280" x2="400" y2="288" stroke="#1E66F5" stroke-width="2"/>
  <path d="M400 296 l-5 -8 l10 0 z" fill="#1E66F5"/>
  <line x1="660" y1="280" x2="660" y2="288" stroke="#1E66F5" stroke-width="2"/>
  <path d="M660 296 l-5 -8 l10 0 z" fill="#1E66F5"/>

  <rect x="24" y="296" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="140" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Production line, full length</text>
  <text x="140" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Feed-through at line speed</text>

  <rect x="284" y="296" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Local area, 100% coverage</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Overlapping passes, set index</text>

  <rect x="544" y="296" width="232" height="50" rx="6" fill="#9BC4FF" fill-opacity="0.13" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="660" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Sampling per specification</text>
  <text x="660" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">→ Pattern from the procedure</text>

  <!-- ============ RESULT ============ -->
  <line x1="400" y1="346" x2="400" y2="354" stroke="#1E66F5" stroke-width="2"/>
  <path d="M400 362 l-5 -8 l10 0 z" fill="#1E66F5"/>

  <rect x="150" y="364" width="500" height="62" rx="8" fill="#9BC4FF" fill-opacity="0.13" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">The written technique records the selection:</text>
  <text x="400" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">arrangement + mode + frequency + scan and coverage plan</text>
  <text x="400" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">approved per the written practice (NAS 410 / SNT-TC-1A) — executed as written</text>
</svg>
