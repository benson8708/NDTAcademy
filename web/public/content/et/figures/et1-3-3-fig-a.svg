<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwA" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Standard Depth of Penetration — the 37% Rule</text>

  <!-- LEFT: physical picture — coil over part, eddy currents fading with depth -->
  <rect x="50" y="110" width="180" height="330" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="50" y1="110" x2="230" y2="110" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- AC coil -->
  <rect x="96" y="64" width="48" height="36" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="108" y1="64" x2="108" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="120" y1="64" x2="120" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="132" y1="64" x2="132" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="86" font-size="15" fill="#FFFFFF">AC test coil</text>

  <!-- eddy current rings, fading with depth -->
  <ellipse cx="120" cy="145" rx="44" ry="11" fill="none" stroke="#9BC4FF" stroke-width="3.5" stroke-opacity="1"/>
  <ellipse cx="120" cy="205" rx="36" ry="10" fill="none" stroke="#9BC4FF" stroke-width="3" stroke-opacity="0.65"/>
  <ellipse cx="120" cy="275" rx="28" ry="9" fill="none" stroke="#9BC4FF" stroke-width="2.5" stroke-opacity="0.40"/>
  <ellipse cx="120" cy="355" rx="20" ry="8" fill="none" stroke="#9BC4FF" stroke-width="2" stroke-opacity="0.18"/>
  <text x="140" y="420" text-anchor="middle" font-size="14" fill="#9BC4FF">eddy currents fade</text>
  <text x="140" y="437" text-anchor="middle" font-size="14" fill="#9BC4FF">with depth</text>

  <!-- RIGHT: decay graph -->
  <line x1="300" y1="110" x2="740" y2="110" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="300" y1="110" x2="300" y2="445" stroke="#FFFFFF" stroke-width="2"/>
  <text x="520" y="96" text-anchor="middle" font-size="15" fill="#FFFFFF">eddy current density (% of surface value)</text>

  <!-- depth ticks -->
  <line x1="294" y1="190" x2="306" y2="190" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="294" y1="270" x2="306" y2="270" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="294" y1="350" x2="306" y2="350" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="294" y1="430" x2="306" y2="430" stroke="#FFFFFF" stroke-width="2"/>
  <text x="288" y="195" text-anchor="end" font-size="15" fill="#FFFFFF">1δ</text>
  <text x="288" y="275" text-anchor="end" font-size="15" fill="#FFFFFF">2δ</text>
  <text x="288" y="355" text-anchor="end" font-size="15" fill="#FFFFFF">3δ</text>
  <text x="288" y="435" text-anchor="end" font-size="15" fill="#FFFFFF">4δ</text>
  <text x="300" y="466" text-anchor="middle" font-size="15" fill="#FFFFFF">depth ↓</text>

  <!-- exponential decay curve -->
  <polyline points="730.0,110.0 652.1,126.0 588.2,142.0 536.0,158.0 493.2,174.0 458.2,190.0 429.5,206.0 406.0,222.0 386.8,238.0 371.1,254.0 358.2,270.0 347.6,286.0 339.0,302.0 331.9,318.0 326.1,334.0 321.4,350.0 317.5,366.0 314.4,382.0 311.7,398.0 309.6,414.0 307.9,430.0" fill="none" stroke="#9BC4FF" stroke-width="3.5"/>

  <!-- depth markers -->
  <line x1="300" y1="190" x2="458" y2="190" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="458.2" cy="190" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="472" y="186" font-size="15" font-weight="bold" fill="#FFFFFF">1δ → 37% (1/e)</text>

  <line x1="300" y1="270" x2="358" y2="270" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="358.2" cy="270" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="372" y="266" font-size="15" fill="#FFFFFF">2δ → 13.5%</text>

  <line x1="300" y1="350" x2="321" y2="350" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="321.4" cy="350" r="5.5" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="336" y="346" font-size="15" font-weight="bold" fill="#FFFFFF">3δ → 5% — effective depth of penetration</text>

  <!-- formula card -->
  <rect x="470" y="354" width="300" height="116" rx="10" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="620" y="384" text-anchor="middle" font-size="19" font-weight="bold" fill="#FFFFFF">δ = 1 / √(π f μ σ)</text>
  <text x="620" y="410" text-anchor="middle" font-size="16" fill="#FFFFFF">δ (mm) ≈ 660 / √( f · μᵣ · σ )</text>
  <text x="620" y="432" text-anchor="middle" font-size="14" fill="#9BC4FF">f in Hz · σ in %IACS · (inches: use 26)</text>
  <text x="620" y="458" text-anchor="middle" font-size="15" fill="#FFFFFF">J(x) = J₀ · e^(−x/δ)</text>

  <text x="400" y="488" text-anchor="middle" font-size="15" fill="#9BC4FF">No sharp cutoff — a smooth exponential fade. Plan with δ; verify on the reference standard.</text>
</svg>
