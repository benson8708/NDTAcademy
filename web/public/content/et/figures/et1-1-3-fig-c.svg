<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">A Crack Interrupts the Eddy Current Loops</text>

  <!-- plan-view panel -->
  <rect x="45" y="60" width="430" height="390" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>

  <!-- coil footprint -->
  <circle cx="235" cy="270" r="145" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="9,7"/>
  <text x="235" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">coil footprint</text>

  <!-- eddy current rings (counterclockwise arrows at top) -->
  <circle cx="235" cy="270" r="55" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="235" cy="270" r="90" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="235" cy="270" r="125" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="243,211 243,219 229,215" fill="#1E66F5"/>
  <polygon points="243,176 243,184 229,180" fill="#1E66F5"/>
  <polygon points="243,141 243,149 229,145" fill="#1E66F5"/>

  <!-- crack: white casing severs the rings, navy crack line on top -->
  <polyline points="322,158 330,192 318,226 332,260 320,294 334,328 324,366" fill="none" stroke="#FFFFFF" stroke-width="11"/>
  <polyline points="322,158 330,192 318,226 332,260 320,294 334,328 324,366" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <text x="342" y="150" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">surface crack</text>

  <!-- detours around crack ends -->
  <path d="M 300 168 Q 324 124 348 172" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="344,164 352,168 344,176" fill="#1E66F5"/>
  <path d="M 302 352 Q 328 400 350 348" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="346,356 352,344 354,354" fill="#1E66F5"/>
  <text x="260" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">currents crowd into detours around the crack ends</text>
  <text x="260" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">plan view — looking down on the part surface</text>

  <!-- consequence chain -->
  <text x="635" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">the chain every indication follows</text>

  <rect x="505" y="104" width="260" height="50" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="635" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">loops interrupted and diverted</text>
  <line x1="635" y1="154" x2="635" y2="166" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="629,164 641,164 635,174" fill="#0B1F3A"/>

  <rect x="505" y="176" width="260" height="50" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="635" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">secondary field weakens</text>
  <line x1="635" y1="226" x2="635" y2="238" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="629,236 641,236 635,246" fill="#0B1F3A"/>

  <rect x="505" y="248" width="260" height="50" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="635" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">net flux at the coil rises</text>
  <line x1="635" y1="298" x2="635" y2="310" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="629,308 641,308 635,318" fill="#0B1F3A"/>

  <rect x="505" y="320" width="260" height="50" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="635" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">impedance shifts toward</text>
  <text x="635" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">the in-air point</text>
  <line x1="635" y1="370" x2="635" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="629,380 641,380 635,390" fill="#0B1F3A"/>

  <rect x="505" y="392" width="260" height="50" rx="8" fill="#0B1F3A" stroke="#0B1F3A" stroke-width="2"/>
  <text x="635" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">indication on the display</text>

  <!-- takeaway -->
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">The instrument never sees the crack — it sees the change in the push-back.</text>
</svg>
