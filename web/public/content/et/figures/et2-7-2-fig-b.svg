<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Anatomy of an Eddy Current Operating Procedure</text>
  <text x="400" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Ten elements to locate before the probe touches the part</text>

  <!-- Document page -->
  <rect x="55" y="72" width="340" height="394" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="55" y="72" width="340" height="34" fill="#0B1F3A"/>
  <text x="225" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">EP-ET-214 · Rev C · Eddy Current — Al Fittings</text>

  <!-- Bands -->
  <rect x="57" y="106" width="336" height="36" fill="#FFFFFF"/>
  <text x="70" y="129" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1 · Scope &amp; applicability</text>
  <rect x="57" y="142" width="336" height="36" fill="#DCE7F8"/>
  <text x="70" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">2 · Reference documents</text>
  <rect x="57" y="178" width="336" height="36" fill="#FFFFFF"/>
  <text x="70" y="201" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">3 · Personnel qualification</text>
  <rect x="57" y="214" width="336" height="36" fill="#DCE7F8"/>
  <text x="70" y="237" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">4 · Equipment — instrument, probes, cables</text>
  <rect x="57" y="250" width="336" height="36" fill="#FFFFFF"/>
  <text x="70" y="273" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">5 · Reference standards</text>
  <rect x="57" y="286" width="336" height="36" fill="#DCE7F8"/>
  <text x="70" y="309" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">6 · Standardization &amp; verification</text>
  <rect x="57" y="322" width="336" height="36" fill="#FFFFFF"/>
  <text x="70" y="345" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">7 · Scanning &amp; coverage</text>
  <rect x="57" y="358" width="336" height="36" fill="#DCE7F8"/>
  <text x="70" y="381" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">8 · Evaluation &amp; acceptance criteria</text>
  <rect x="57" y="394" width="336" height="36" fill="#FFFFFF"/>
  <text x="70" y="417" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">9 · Records &amp; reporting</text>
  <rect x="57" y="430" width="336" height="34" fill="#DCE7F8"/>
  <text x="70" y="452" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">10 · Deviations &amp; nonconformance</text>

  <!-- Callout 0: scope -->
  <line x1="395" y1="124" x2="425" y2="134" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="425" y="108" width="350" height="58" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="439" y="131" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Check scope first</text>
  <text x="439" y="151" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">does it list your alloy, temper, and part number?</text>

  <!-- Bracket for essential variables: bands 4-7 -->
  <line x1="397" y1="232" x2="408" y2="232" stroke="#1E66F5" stroke-width="2"/>
  <line x1="408" y1="232" x2="408" y2="340" stroke="#1E66F5" stroke-width="2"/>
  <line x1="397" y1="340" x2="408" y2="340" stroke="#1E66F5" stroke-width="2"/>
  <line x1="408" y1="286" x2="425" y2="240" stroke="#1E66F5" stroke-width="2"/>

  <!-- Callout 1: essential variables -->
  <rect x="425" y="182" width="350" height="88" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="439" y="206" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Essential variables concentrate here</text>
  <text x="439" y="228" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe, frequency, reference standard, settings,</text>
  <text x="439" y="248" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">speed, coverage — change one, requalify.</text>

  <!-- Callout 2: acceptance criteria -->
  <line x1="395" y1="376" x2="425" y2="370" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="425" y="340" width="350" height="58" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="439" y="363" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Criteria may live upstream</text>
  <text x="439" y="383" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">section 8 names the document and clause to read</text>

  <!-- Callout 3: deviations -->
  <line x1="395" y1="447" x2="425" y2="440" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="425" y="412" width="350" height="54" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="439" y="434" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Your authority ends at section 10</text>
  <text x="439" y="454" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">deviations are approved at Level III — in writing</text>

  <!-- Bottom note -->
  <text x="400" y="489" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">A missing element is a Level III question — not a blank to improvise over.</text>
</svg>
