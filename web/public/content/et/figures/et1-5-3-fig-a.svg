<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwHA" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arwHAb" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">The Hall Effect — Theory of Operation</text>

  <!-- B-field label above the element -->
  <text x="240" y="132" text-anchor="middle" font-size="14" fill="#9BC4FF">B — field into the page (⊗), perpendicular to the element face</text>

  <!-- semiconductor element -->
  <rect x="60" y="150" width="360" height="140" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="2"/>

  <!-- B into-page symbols -->
  <g stroke="#9BC4FF" stroke-width="2" fill="none">
    <circle cx="140" cy="227" r="10"/>
    <line x1="133" y1="220" x2="147" y2="234"/>
    <line x1="147" y1="220" x2="133" y2="234"/>
    <circle cx="240" cy="227" r="10"/>
    <line x1="233" y1="220" x2="247" y2="234"/>
    <line x1="247" y1="220" x2="233" y2="234"/>
    <circle cx="340" cy="227" r="10"/>
    <line x1="333" y1="220" x2="347" y2="234"/>
    <line x1="347" y1="220" x2="333" y2="234"/>
  </g>

  <!-- accumulated charge rows -->
  <text x="240" y="176" text-anchor="middle" font-size="19" font-weight="bold" fill="#9BC4FF">−&#160;&#160;&#160;&#160;−&#160;&#160;&#160;&#160;−&#160;&#160;&#160;&#160;−&#160;&#160;&#160;&#160;−</text>
  <text x="240" y="284" text-anchor="middle" font-size="19" font-weight="bold" fill="#9BC4FF">+&#160;&#160;&#160;&#160;+&#160;&#160;&#160;&#160;+&#160;&#160;&#160;&#160;+&#160;&#160;&#160;&#160;+</text>

  <!-- electron deflection path -->
  <path d="M 395 262 Q 280 250 160 184" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwHA)"/>
  <circle cx="398" cy="263" r="5" fill="#FFFFFF"/>
  <text x="408" y="258" font-size="14" fill="#FFFFFF">e⁻</text>
  <text x="292" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">F = qv × B</text>

  <!-- drive current in / out -->
  <line x1="10" y1="220" x2="56" y2="220" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwHA)"/>
  <text x="28" y="206" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">I</text>
  <line x1="424" y1="220" x2="468" y2="220" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwHA)"/>
  <text x="446" y="206" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">I</text>
  <text x="240" y="318" text-anchor="middle" font-size="14" fill="#FFFFFF">constant drive current I flows along the element</text>

  <!-- Hall voltage meter -->
  <polyline points="420,150 520,150 520,196" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <polyline points="420,290 520,290 520,244" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="520" cy="220" r="24" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2"/>
  <text x="520" y="226" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Vₕ</text>
  <text x="520" y="318" text-anchor="middle" font-size="14" fill="#9BC4FF">Hall voltage Vₕ</text>

  <!-- formula card -->
  <rect x="580" y="130" width="200" height="215" rx="10" fill="#1E66F5" fill-opacity="0.16" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="680" y="164" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Vₕ = I·B / (n·q·t)</text>
  <text x="680" y="196" text-anchor="middle" font-size="14" fill="#FFFFFF">I — drive current</text>
  <text x="680" y="220" text-anchor="middle" font-size="14" fill="#FFFFFF">B — flux density ⊥ face</text>
  <text x="680" y="244" text-anchor="middle" font-size="14" fill="#FFFFFF">n — carrier density</text>
  <text x="680" y="268" text-anchor="middle" font-size="14" fill="#FFFFFF">q — carrier charge</text>
  <text x="680" y="292" text-anchor="middle" font-size="14" fill="#FFFFFF">t — element thickness</text>
  <text x="680" y="324" text-anchor="middle" font-size="14" font-weight="bold" fill="#9BC4FF">fewer carriers → larger Vₕ</text>

  <!-- semiconductor note -->
  <text x="400" y="392" text-anchor="middle" font-size="15" fill="#FFFFFF">Semiconductor chip (InSb, InAs, GaAs): few carriers → large Vₕ for the same I and B.</text>
  <text x="400" y="416" text-anchor="middle" font-size="15" fill="#FFFFFF">Active areas a fraction of a millimeter — a point probe for magnetic flux density.</text>

  <text x="400" y="486" text-anchor="middle" font-size="15" fill="#9BC4FF">Charge accumulates until Vₕ balances the magnetic push — output exists even in a steady field.</text>
</svg>
