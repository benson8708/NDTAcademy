<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Current Density and Phase Lag: How Depth Prices a Signal</text>

  <!-- ================= LEFT: cross-section with exponential decay ================= -->
  <!-- surface coil -->
  <rect x="80" y="58" width="90" height="34" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="96" y1="62" x2="96" y2="88" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="112" y1="62" x2="112" y2="88" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="128" y1="62" x2="128" y2="88" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="144" y1="62" x2="144" y2="88" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="160" y1="62" x2="160" y2="88" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="178" y="80" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface coil</text>

  <!-- metal block with delta bands -->
  <rect x="40" y="110" width="340" height="97" fill="#1E66F5" fill-opacity="0.28"/>
  <rect x="40" y="207" width="340" height="97" fill="#1E66F5" fill-opacity="0.15"/>
  <rect x="40" y="304" width="340" height="97" fill="#1E66F5" fill-opacity="0.06"/>
  <rect x="40" y="110" width="340" height="291" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="46" y="127" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">near surface</text>
  <text x="46" y="395" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">far surface</text>

  <!-- depth ticks -->
  <line x1="380" y1="207" x2="388" y2="207" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="380" y1="304" x2="388" y2="304" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="380" y1="401" x2="388" y2="401" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="392" y="211" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1δ — 37%</text>
  <text x="392" y="308" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2δ — 13.5%</text>
  <text x="392" y="405" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3δ — 5% (effective depth)</text>

  <!-- exponential decay curve -->
  <path d="M 360 110 L 289 134 L 234 159 L 191 183 L 158 207 L 132 231 L 111 256 L 95 280 L 83 304 L 74 328 L 66 352 L 60 377 L 56 401" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="158" cy="207" r="4" fill="#1E66F5"/>
  <circle cx="83" cy="304" r="4" fill="#1E66F5"/>
  <circle cx="56" cy="401" r="4" fill="#1E66F5"/>
  <text x="60" y="152" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">J = J₀ e^(−x/δ)</text>

  <!-- flaws -->
  <polygon points="300,110 312,110 306,126" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="306" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">near-surface flaw</text>
  <polygon points="240,401 252,401 246,385" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="246" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">far-surface flaw</text>

  <!-- ================= RIGHT: phase clock ================= -->
  <text x="590" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">phase lag of the current — the depth clock</text>
  <path d="M 720 290 A 130 130 0 0 0 460 290" fill="none" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="590" cy="290" r="4" fill="#0B1F3A"/>
  <line x1="590" y1="290" x2="718" y2="290" stroke="#0B1F3A" stroke-width="2"/>
  <text x="712" y="308" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface — 0°</text>

  <line x1="590" y1="290" x2="661" y2="181" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="661" cy="181" r="4" fill="#1E66F5"/>
  <text x="669" y="174" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1δ ≈ 57°</text>

  <line x1="590" y1="290" x2="535" y2="172" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="535" cy="172" r="4" fill="#1E66F5"/>
  <text x="527" y="158" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">2δ ≈ 115°</text>

  <line x1="590" y1="290" x2="461" y2="272" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="461" cy="272" r="4" fill="#1E66F5"/>
  <text x="453" y="256" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">3δ ≈ 172°</text>

  <text x="590" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lag ≈ 57° per standard depth (1 rad per δ)</text>
  <text x="590" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">observed signal angles are set on the reference standard</text>

  <!-- ================= FORMULA STRIP ================= -->
  <rect x="40" y="428" width="720" height="58" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">δ (mm) ≈ 660 ÷ √(f · µᵣ · σ %IACS) — frequency decides where 1δ, 2δ, 3δ land in the part</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Aim the surface of interest near 1δ; nothing past 3δ (≈5% current, ≈172° lag) is reliable at any gain.</text>
</svg>
