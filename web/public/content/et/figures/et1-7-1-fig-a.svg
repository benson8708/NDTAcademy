<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Meter Readouts: Calibrated vs. Uncalibrated</text>

  <!-- panel divider -->
  <line x1="400" y1="60" x2="400" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>

  <text x="200" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Calibrated meter</text>
  <text x="600" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Uncalibrated meter</text>

  <!-- ================= LEFT: CALIBRATED CONDUCTIVITY METER ================= -->
  <rect x="60" y="100" width="280" height="230" rx="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 90 300 A 110 110 0 0 1 310 300" stroke="#0B1F3A" stroke-width="2.5" fill="none"/>

  <!-- major ticks: 20, 30, 40, 50, 60 %IACS -->
  <line x1="90" y1="300" x2="104" y2="300" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="122.2" y1="222.2" x2="132.1" y2="232.1" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="200" y1="190" x2="200" y2="204" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="277.8" y1="222.2" x2="267.9" y2="232.1" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="310" y1="300" x2="296" y2="300" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- minor ticks -->
  <line x1="98.4" y1="257.9" x2="105.8" y2="261" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="157.9" y1="198.4" x2="161" y2="205.8" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="242.1" y1="198.4" x2="239" y2="205.8" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="301.6" y1="257.9" x2="294.2" y2="261" stroke="#0B1F3A" stroke-width="1.5"/>

  <text x="74" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">20</text>
  <text x="107" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">30</text>
  <text x="200" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">40</text>
  <text x="293" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">50</text>
  <text x="326" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60</text>

  <text x="200" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">% IACS</text>

  <!-- needle at 38 %IACS -->
  <line x1="200" y1="300" x2="185.1" y2="206.2" stroke="#1E66F5" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="300" r="7" fill="#0B1F3A"/>

  <text x="200" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">needle at 38 — and 38 means 38 % IACS</text>

  <text x="200" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">scale in engineering units (% IACS, mils)</text>
  <text x="200" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">verified on standards of known value</text>
  <text x="200" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the reading itself is reportable</text>

  <!-- ================= RIGHT: UNCALIBRATED COMPARATOR METER ================= -->
  <rect x="460" y="100" width="280" height="230" rx="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 490 300 A 110 110 0 0 1 710 300" stroke="#0B1F3A" stroke-width="2.5" fill="none"/>

  <!-- major ticks: 0, 25, 50, 75, 100 divisions -->
  <line x1="490" y1="300" x2="504" y2="300" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="522.2" y1="222.2" x2="532.1" y2="232.1" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="600" y1="190" x2="600" y2="204" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="677.8" y1="222.2" x2="667.9" y2="232.1" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="710" y1="300" x2="696" y2="300" stroke="#0B1F3A" stroke-width="2.5"/>

  <text x="474" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <text x="507" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">25</text>
  <text x="600" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">50</text>
  <text x="693" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">75</text>
  <text x="726" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100</text>

  <text x="600" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">divisions</text>

  <!-- alarm threshold mark at 70 divisions -->
  <line x1="655.3" y1="224" x2="669.4" y2="204.5" stroke="#1E66F5" stroke-width="6" stroke-linecap="round"/>
  <text x="708" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">alarm</text>
  <text x="708" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">threshold</text>
  <line x1="695" y1="160" x2="668" y2="202" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- needle at 78 divisions -->
  <line x1="600" y1="300" x2="673.2" y2="239.5" stroke="#1E66F5" stroke-width="4" stroke-linecap="round"/>
  <circle cx="600" cy="300" r="7" fill="#0B1F3A"/>

  <text x="600" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">needle at 78 — meaningless until compared</text>

  <text x="600" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">arbitrary 0–100 divisions, no units</text>
  <text x="600" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">anchored to reference-standard responses</text>
  <text x="600" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">go / no-go comparison only</text>
</svg>
