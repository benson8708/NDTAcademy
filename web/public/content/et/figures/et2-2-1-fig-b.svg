<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arwWb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arwBb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Permeability: Opposite Direction &#8212; and the Saturation Cure</text>

  <!-- ================= LEFT PANEL: impedance-plane directions ================= -->
  <text x="210" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Impedance-plane directions</text>

  <!-- axes -->
  <line x1="90" y1="95" x2="90" y2="420" stroke="#9BC4FF" stroke-width="1.5" opacity="0.85"/>
  <line x1="90" y1="420" x2="370" y2="420" stroke="#9BC4FF" stroke-width="1.5" opacity="0.85"/>
  <text x="44" y="258" transform="rotate(-90 44 258)" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#969;L / &#969;L&#8320;</text>
  <text x="230" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">R / &#969;L&#8320;</text>

  <!-- conductivity curve -->
  <path d="M 90 135 C 130 160 170 200 185 245 C 196 282 193 320 170 360" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <!-- air point -->
  <circle cx="90" cy="135" r="4.5" fill="#FFFFFF"/>
  <text x="84" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">air point</text>

  <!-- ferromagnetic operating point, above the air point -->
  <line x1="95" y1="130" x2="133" y2="90" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arwBb)"/>
  <circle cx="138" cy="85" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="150" y="80" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">ferromagnetic part:</text>
  <text x="150" y="98" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#956;r lifts &#969;L above the air point</text>

  <!-- saturation drop -->
  <path d="M 144 92 C 215 110 228 170 196 236" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arwWb)"/>
  <text x="238" y="132" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">DC saturation:</text>
  <text x="238" y="150" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">incremental &#956;r &#8594; 1</text>

  <!-- operating point at the knee -->
  <circle cx="185" cy="245" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- sigma up: down the curve -->
  <line x1="187" y1="252" x2="199" y2="292" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwWb)"/>
  <text x="208" y="300" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">&#963; &#8593; &#8212; down the curve</text>

  <!-- sigma down: back up the curve -->
  <line x1="183" y1="238" x2="166" y2="198" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwWb)"/>
  <text x="172" y="190" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">&#963; &#8595;</text>

  <!-- lift-off: toward air point -->
  <line x1="180" y1="240" x2="140" y2="192" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwWb)"/>
  <text x="84" y="196" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">lift-off</text>

  <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#963; &#8595; = softer temper, heat damage,</text>
  <text x="210" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">or a part warming in the sun</text>

  <!-- ================= RIGHT PANEL: steel tube channel ================= -->
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Steel tube channel &#8212; saturation off vs on</text>

  <!-- tube with coils -->
  <rect x="445" y="115" width="310" height="34" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="2"/>
  <text x="455" y="137" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">steel tube</text>
  <rect x="548" y="99" width="16" height="66" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="646" y="99" width="16" height="66" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="605" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">DC saturation coils</text>
  <line x1="580" y1="94" x2="558" y2="99" stroke="#9BC4FF" stroke-width="1" opacity="0.7"/>
  <line x1="630" y1="94" x2="652" y2="99" stroke="#9BC4FF" stroke-width="1" opacity="0.7"/>
  <rect x="598" y="103" width="12" height="58" fill="#FFFFFF"/>
  <text x="604" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">ET coil</text>
  <line x1="604" y1="170" x2="604" y2="163" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>

  <!-- strip 1: unsaturated -->
  <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">saturation OFF &#8212; permeability noise floods the channel</text>
  <rect x="445" y="212" width="310" height="78" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="1.5"/>
  <polyline points="455,250 467,228 479,266 491,234 503,272 515,240 527,262 539,226 551,268 563,238 575,258 587,230 599,270 611,244 623,264 635,228 647,266 659,236 671,258 683,232 695,268 707,246 719,262 731,234 745,252"
            fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- strip 2: saturated -->
  <text x="600" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">saturation ON &#8212; incremental &#956;r &#8776; 1</text>
  <rect x="445" y="332" width="310" height="78" fill="#1E66F5" fill-opacity="0.10" stroke="#1E66F5" stroke-width="1.5"/>
  <polyline points="455,372 585,372 595,344 605,398 615,372 745,372" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="622" y="354" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">flaw &#8212; readable</text>

  <!-- footnotes -->
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Saturation restores penetration by &#8730;&#956;r</text>
  <text x="600" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">and makes phase analysis meaningful &#8212; ASTM E309</text>
</svg>
