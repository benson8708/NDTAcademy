<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Part Answers Back: Primary and Secondary Fields</text>

  <!-- primary field flux loops (around the whole coil) -->
  <ellipse cx="260" cy="245" rx="140" ry="100" fill="none" stroke="#1E66F5" stroke-width="2.5" opacity="0.85"/>
  <ellipse cx="260" cy="245" rx="175" ry="128" fill="none" stroke="#1E66F5" stroke-width="2.5" opacity="0.6"/>

  <!-- conductive part -->
  <rect x="45" y="330" width="430" height="125" fill="#DCE7F8" stroke="#0B1F3A" stroke-width="2"/>
  <text x="260" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Conductive test part (nonmagnetic)</text>

  <!-- secondary field flux loop (dashed, through eddy-current loop center, up through bore) -->
  <ellipse cx="260" cy="330" rx="30" ry="110" fill="none" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="9 6"/>

  <!-- coil winding bundles -->
  <rect x="185" y="180" width="45" height="120" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="290" y="180" width="45" height="120" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="207.5" cy="200" r="9" fill="#1E66F5"/>
  <circle cx="207.5" cy="228" r="9" fill="#1E66F5"/>
  <circle cx="207.5" cy="256" r="9" fill="#1E66F5"/>
  <circle cx="207.5" cy="284" r="9" fill="#1E66F5"/>
  <circle cx="312.5" cy="200" r="9" fill="#1E66F5"/>
  <circle cx="312.5" cy="228" r="9" fill="#1E66F5"/>
  <circle cx="312.5" cy="256" r="9" fill="#1E66F5"/>
  <circle cx="312.5" cy="284" r="9" fill="#1E66F5"/>

  <!-- AC drive leads and sine -->
  <line x1="207.5" y1="180" x2="207.5" y2="148" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="312.5" y1="180" x2="312.5" y2="148" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 207.5 148 q 13 -20 26 0 t 26 0 t 26 0 t 26.5 0" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="260" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">AC drive</text>

  <!-- primary flux arrow (down through bore) -->
  <line x1="248" y1="192" x2="248" y2="310" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="248,322 241,308 255,308" fill="#1E66F5"/>

  <!-- secondary flux arrow (up through bore) -->
  <line x1="274" y1="316" x2="274" y2="198" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="274,186 267,200 281,200" fill="#9BC4FF"/>

  <!-- eddy current loops in the part -->
  <ellipse cx="260" cy="368" rx="105" ry="18" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <ellipse cx="260" cy="368" rx="65" ry="11" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="365,378 359,366 371,366" fill="#0B1F3A"/>
  <text x="260" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Eddy currents — closed loops in the part</text>

  <!-- legend -->
  <rect x="356" y="58" width="140" height="78" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="364" y1="74" x2="386" y2="74" stroke="#1E66F5" stroke-width="4"/>
  <text x="392" y="79" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Primary field</text>
  <line x1="364" y1="98" x2="386" y2="98" stroke="#0B1F3A" stroke-width="4"/>
  <text x="392" y="103" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Eddy currents</text>
  <line x1="364" y1="122" x2="386" y2="122" stroke="#9BC4FF" stroke-width="4" stroke-dasharray="7 5"/>
  <text x="392" y="127" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Secondary field</text>

  <!-- right panel: the signal chain -->
  <rect x="500" y="60" width="280" height="372" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">The signal chain</text>

  <rect x="520" y="110" width="240" height="46" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Alternating current in the coil</text>
  <line x1="640" y1="158" x2="640" y2="166" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="640,172 634,164 646,164" fill="#0B1F3A"/>

  <rect x="520" y="174" width="240" height="46" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Primary magnetic field</text>
  <line x1="640" y1="222" x2="640" y2="230" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="640,236 634,228 646,228" fill="#0B1F3A"/>

  <rect x="520" y="238" width="240" height="46" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Eddy currents induced in the part</text>
  <line x1="640" y1="286" x2="640" y2="294" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="640,300 634,292 646,292" fill="#0B1F3A"/>

  <rect x="520" y="302" width="240" height="46" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Secondary field —</text>
  <text x="640" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">opposes the primary</text>
  <line x1="640" y1="350" x2="640" y2="358" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="640,364 634,356 646,356" fill="#0B1F3A"/>

  <rect x="520" y="366" width="240" height="46" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Coil impedance changes:</text>
  <text x="640" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">XL down, R up (nonmagnetic part)</text>

  <!-- bottom note -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Lenz's law: an induced current flows in the direction whose magnetic field opposes the change that created it.</text>
</svg>
