<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">The Normalized Impedance Plane</text>

  <!-- axes -->
  <line x1="170" y1="445" x2="720" y2="445" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="720,439 734,445 720,451" fill="#0B1F3A"/>
  <line x1="170" y1="445" x2="170" y2="75" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="164,75 170,61 176,75" fill="#0B1F3A"/>
  <text x="445" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">normalized resistance R / X0</text>
  <text x="120" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A" transform="rotate(-90 120 280)">normalized reactance XL / X0</text>
  <text x="166" y="466" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>

  <!-- 1.0 tick -->
  <line x1="160" y1="140" x2="180" y2="140" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="146" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.0</text>

  <!-- ferromagnetic branch -->
  <line x1="170" y1="140" x2="235" y2="85" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="6 5"/>
  <polygon points="228,90 241,77 237,95" fill="#0B1F3A"/>
  <text x="250" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">ferromagnetic branch (relative permeability &gt; 1)</text>
  <text x="250" y="103" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">permeability lifts XL above the air value</text>

  <!-- lift-off paths (dashed, to air point) -->
  <line x1="447" y1="188" x2="178" y2="141" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="184,141 201,133 199,150" fill="#9BC4FF"/>
  <line x1="456" y1="320" x2="176" y2="146" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="181,148 199,144 192,160" fill="#9BC4FF"/>
  <text x="300" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">lift-off paths — all end at the air point</text>

  <!-- conductivity curve -->
  <path d="M 170 140 C 230 146 280 150 321 158 C 380 170 420 172 447 188 C 490 212 515 222 523 242 C 532 272 500 300 456 320 C 410 342 350 372 304 392 C 270 407 235 420 204 428" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <!-- flow arrowhead on curve between stainless and aluminum -->
  <polygon points="487,305 504,288 508,300" fill="#1E66F5"/>
  <text x="552" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">increasing σ × f</text>
  <text x="552" y="303" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(higher conductivity or frequency</text>
  <text x="552" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">walks the point down the curve)</text>

  <!-- air point -->
  <circle cx="170" cy="140" r="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="158" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">air point</text>

  <!-- metal operating points -->
  <circle cx="447" cy="188" r="6" fill="#1E66F5"/>
  <text x="462" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">titanium alloys ≈ 1% IACS</text>
  <circle cx="523" cy="242" r="6" fill="#1E66F5"/>
  <text x="540" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">austenitic stainless ≈ 2–3% IACS</text>
  <circle cx="456" cy="320" r="6" fill="#1E66F5"/>
  <text x="470" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">aluminum alloys ≈ 25–60% IACS</text>
  <circle cx="304" cy="392" r="6" fill="#1E66F5"/>
  <text x="320" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">copper = 100% IACS (by definition)</text>

  <!-- top-right note -->
  <text x="540" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Lower on the map:</text>
  <text x="540" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">higher f or σ widens the angle</text>
  <text x="540" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">between lift-off and flaws.</text>
</svg>
