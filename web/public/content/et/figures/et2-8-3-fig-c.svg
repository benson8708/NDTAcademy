<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Flaw Frequency in Continuous Product</text>

  <defs>
    <marker id="arrN3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
    <marker id="arrB3" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="#1E66F5"/>
    </marker>
    <marker id="arrB3s" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <path d="M6,0 L0,3.5 L6,7 Z" fill="#1E66F5"/>
    </marker>
  </defs>

  <!-- damaged roll -->
  <circle cx="150" cy="152" r="46" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M 110 130 A 46 46 0 0 1 190 130" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrB3)"/>
  <path d="M 143 193 L 157 193 L 150 203 Z" fill="#1E66F5"/>
  <text x="150" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">forming roll — diameter D</text>
  <text x="215" y="122" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw on the roll rim marks the product</text>
  <text x="215" y="142" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">once per revolution → spacing s = π·D</text>

  <!-- product -->
  <rect x="40" y="200" width="720" height="36" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="52" y="190" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tube / bar / wire</text>

  <!-- speed arrow -->
  <line x1="700" y1="178" x2="755" y2="178" stroke="#0B1F3A" stroke-width="2.5" marker-end="url(#arrN3)"/>
  <text x="722" y="168" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">v</text>

  <!-- periodic defects -->
  <path d="M 130 210 l 8 8 l -8 8 l -8 -8 Z" fill="#1E66F5"/>
  <path d="M 310 210 l 8 8 l -8 8 l -8 -8 Z" fill="#1E66F5"/>
  <path d="M 490 210 l 8 8 l -8 8 l -8 -8 Z" fill="#1E66F5"/>
  <path d="M 670 210 l 8 8 l -8 8 l -8 -8 Z" fill="#1E66F5"/>

  <!-- spacing dimension -->
  <line x1="318" y1="256" x2="482" y2="256" stroke="#1E66F5" stroke-width="2" marker-start="url(#arrB3s)" marker-end="url(#arrB3)"/>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">s</text>

  <!-- differential encircling coil -->
  <rect x="548" y="180" width="56" height="76" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="556" y="186" width="12" height="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="584" y="186" width="12" height="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="556" y="238" width="12" height="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="584" y="238" width="12" height="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="576" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">differential encircling coil</text>

  <!-- strip chart -->
  <text x="80" y="322" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">signal at the coil</text>
  <line x1="80" y1="392" x2="720" y2="392" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN3)"/>
  <text x="736" y="396" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">time</text>

  <path d="M 136 392 L 143 360 L 151 412 L 158 392" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 276 392 L 283 360 L 291 412 L 298 392" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 416 392 L 423 360 L 431 412 L 438 392" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 556 392 L 563 360 L 571 412 L 578 392" fill="none" stroke="#1E66F5" stroke-width="2.5"/>

  <line x1="296" y1="344" x2="418" y2="344" stroke="#1E66F5" stroke-width="2" marker-start="url(#arrB3s)" marker-end="url(#arrB3)"/>
  <text x="357" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Δt</text>

  <!-- formula box -->
  <rect x="80" y="424" width="640" height="66" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">f = v / s = 1 / Δt        s = v · Δt        D = s / π</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">example: v = 1.5 m/s, Δt = 0.28 s → s = 0.42 m, f ≈ 3.6 Hz → roll D ≈ 134 mm</text>
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">keep f inside the band-pass — run the reference standard at production line speed</text>
</svg>
