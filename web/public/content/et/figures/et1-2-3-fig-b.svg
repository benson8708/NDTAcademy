<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0B1F3A">Impedance Change Becomes a Voltage Change</text>
  <text x="400" y="58" text-anchor="middle" font-size="15" fill="#1E66F5">constant current drive: V = I &#215; Z &#8212; the coil voltage copies every change in Z</text>

  <line x1="400" y1="100" x2="400" y2="425" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4,6"/>

  <!-- LEFT PANEL: sound material -->
  <text x="215" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B1F3A">PROBE ON SOUND MATERIAL</text>
  <!-- axes -->
  <line x1="90" y1="400" x2="355" y2="400" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="355,395 355,405 365,400" fill="#0B1F3A"/>
  <line x1="90" y1="400" x2="90" y2="145" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="85,145 95,145 90,135" fill="#0B1F3A"/>
  <text x="360" y="424" text-anchor="end" font-size="15" fill="#0B1F3A">R &#8212; resistance</text>
  <text x="58" y="272" text-anchor="middle" font-size="15" fill="#0B1F3A" transform="rotate(-90 58 272)">X<tspan dy="4" font-size="12">L</tspan><tspan dy="-4"> &#8212; inductive reactance</tspan></text>
  <!-- projections -->
  <line x1="276" y1="228" x2="276" y2="400" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="276" y1="228" x2="90" y2="228" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- vector Z0 -->
  <line x1="90" y1="400" x2="276" y2="228" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="276,228 271,239 265,232" fill="#1E66F5"/>
  <text x="288" y="222" font-size="17" font-weight="bold" fill="#1E66F5">Z<tspan dy="4" font-size="13">0</tspan></text>
  <!-- phase angle -->
  <path d="M 138 400 A 48 48 0 0 0 125 368" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="146" y="384" font-size="14" fill="#0B1F3A">&#952;<tspan dy="4" font-size="12">0</tspan><tspan dy="-4"> &#8212; phase angle</tspan></text>

  <!-- RIGHT PANEL: crack under coil -->
  <text x="590" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B1F3A">PROBE OVER A CRACK</text>
  <!-- axes -->
  <line x1="455" y1="400" x2="720" y2="400" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="720,395 720,405 730,400" fill="#0B1F3A"/>
  <line x1="455" y1="400" x2="455" y2="145" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="450,145 460,145 455,135" fill="#0B1F3A"/>
  <text x="725" y="424" text-anchor="end" font-size="15" fill="#0B1F3A">R &#8212; resistance</text>
  <text x="423" y="272" text-anchor="middle" font-size="15" fill="#0B1F3A" transform="rotate(-90 423 272)">X<tspan dy="4" font-size="12">L</tspan><tspan dy="-4"> &#8212; inductive reactance</tspan></text>
  <!-- ghost vector Z0 -->
  <line x1="455" y1="400" x2="641" y2="228" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="7,5"/>
  <text x="650" y="244" font-size="15" font-weight="bold" fill="#9BC4FF">Z<tspan dy="4" font-size="12">0</tspan></text>
  <!-- new vector Z1 -->
  <line x1="455" y1="400" x2="613" y2="196" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="613,196 610,208 602,202" fill="#1E66F5"/>
  <text x="592" y="184" font-size="17" font-weight="bold" fill="#1E66F5">Z<tspan dy="4" font-size="13">1</tspan></text>
  <!-- delta Z arrow from old tip to new tip -->
  <line x1="641" y1="228" x2="618" y2="201" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="613,196 623,200 616,207" fill="#0B1F3A"/>
  <text x="652" y="212" font-size="16" font-weight="bold" fill="#0B1F3A">&#916;Z</text>
  <!-- delta theta arc between vectors -->
  <path d="M 536 325 A 110 110 0 0 0 522 313" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="547" y="303" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">&#916;&#952;</text>
  <text x="580" y="448" text-anchor="middle" font-size="14" fill="#0B1F3A">fewer eddy currents &#8594; Z swings toward empty-coil value</text>

  <!-- formula band -->
  <text x="400" y="472" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">Z = &#8730;(R&#178; + X<tspan dy="4" font-size="13">L</tspan><tspan dy="-4">&#178;)&#160;&#160;&#160;&#183;&#160;&#160;&#160;X</tspan><tspan dy="4" font-size="13">L</tspan><tspan dy="-4"> = 2&#960;fL&#160;&#160;&#160;&#183;&#160;&#160;&#160;V = I &#215; Z</tspan></text>
  <text x="400" y="494" text-anchor="middle" font-size="15" fill="#1E66F5">both |Z| (amplitude) and angle &#952; (phase) change &#8212; the coil voltage copies both</text>
</svg>
