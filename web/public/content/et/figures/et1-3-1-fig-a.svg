<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowWhiteA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Eddy Currents Mirror the Coil</text>

  <!-- ================= LEFT PANEL: cross-section ================= -->
  <text x="205" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Side view — cross-section</text>

  <!-- coil axis -->
  <line x1="200" y1="122" x2="200" y2="428" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <text x="200" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">coil axis</text>

  <!-- test part -->
  <rect x="40" y="290" width="330" height="130" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="2"/>
  <text x="52" y="310" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">test part (conductor)</text>

  <!-- coil winding bundles -->
  <rect x="125" y="190" width="42" height="66" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="233" y="190" width="42" height="66" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- winding current symbols: left = into page (x), right = out of page (dot) -->
  <line x1="139" y1="216" x2="153" y2="230" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="139" y1="230" x2="153" y2="216" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="254" cy="223" r="3.5" fill="#0B1F3A"/>
  <text x="282" y="215" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">coil (AC)</text>

  <!-- primary flux arrows down through coil core into the part -->
  <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">primary flux</text>
  <line x1="186" y1="170" x2="186" y2="306" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteA)"/>
  <line x1="214" y1="170" x2="214" y2="306" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteA)"/>

  <!-- eddy current loops seen end-on: left pair out of page, right pair into page -->
  <circle cx="110" cy="330" r="11" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="110" cy="330" r="3" fill="#9BC4FF"/>
  <circle cx="155" cy="330" r="11" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="155" cy="330" r="3" fill="#9BC4FF"/>
  <circle cx="245" cy="330" r="11" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="238" y1="323" x2="252" y2="337" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="238" y1="337" x2="252" y2="323" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="290" cy="330" r="11" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="283" y1="323" x2="297" y2="337" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="283" y1="337" x2="297" y2="323" stroke="#9BC4FF" stroke-width="2"/>

  <text x="205" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">eddy current loops seen end-on</text>
  <text x="205" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">J = 0 on the axis beneath the coil center</text>

  <!-- symbol legend -->
  <circle cx="62" cy="452" r="8" fill="none" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="57" y1="447" x2="67" y2="457" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="57" y1="457" x2="67" y2="447" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="78" y="457" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">current into page</text>
  <circle cx="222" cy="452" r="8" fill="none" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="222" cy="452" r="2.5" fill="#9BC4FF"/>
  <text x="238" y="457" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">current out of page</text>

  <!-- ================= RIGHT PANEL: top view ================= -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Top view — part surface</text>

  <rect x="445" y="95" width="315" height="330" rx="10" fill="#1E66F5" fill-opacity="0.12" stroke="#1E66F5" stroke-width="2"/>

  <!-- coil current label + leader -->
  <text x="600" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">coil current (clockwise this instant)</text>
  <line x1="600" y1="118" x2="600" y2="184" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

  <!-- eddy current loops (density coded by stroke weight) -->
  <circle cx="600" cy="262" r="30" fill="none" stroke="#9BC4FF" stroke-width="1.5" opacity="0.55"/>
  <circle cx="600" cy="262" r="58" fill="none" stroke="#9BC4FF" stroke-width="4"/>
  <circle cx="600" cy="262" r="88" fill="none" stroke="#9BC4FF" stroke-width="2" opacity="0.75"/>
  <circle cx="600" cy="262" r="118" fill="none" stroke="#9BC4FF" stroke-width="1.2" opacity="0.5"/>

  <!-- coil winding footprint annulus -->
  <circle cx="600" cy="262" r="46" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.9"/>
  <circle cx="600" cy="262" r="70" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.9"/>

  <!-- coil current arrowhead: clockwise = +x at top of footprint -->
  <polygon points="594,186 610,192 594,198" fill="#FFFFFF"/>

  <!-- eddy current arrowheads: counterclockwise = +x at bottom of each loop -->
  <polygon points="595,287 609,292 595,297" fill="#9BC4FF"/>
  <polygon points="594,314 610,320 594,326" fill="#9BC4FF"/>
  <polygon points="595,345 609,350 595,355" fill="#9BC4FF"/>
  <polygon points="596,376 608,380 596,384" fill="#9BC4FF"/>

  <!-- center: zero density -->
  <circle cx="600" cy="262" r="3.5" fill="#FFFFFF"/>
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">J = 0</text>

  <text x="600" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">eddy currents (counterclockwise)</text>

  <!-- footnotes -->
  <text x="600" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Peak density: in a ring beneath the windings</text>
  <text x="600" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Zero density: on the coil axis</text>
</svg>
