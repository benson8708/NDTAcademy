<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Reading U1 &#8212; Position Along the Locus, Between Verified Knowns</text>

  <!-- inset: where this zoom sits on the full comma -->
  <rect x="635" y="58" width="150" height="118" rx="8" fill="#F2F7FE" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="655" cy="78" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 655 78 C 685 83, 715 95, 735 115 C 748 129, 750 143, 742 155 C 732 166, 712 170, 695 168"
        fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <rect x="726" y="120" width="28" height="42" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="651" y="166" font-family="Arial, sans-serif" font-size="11.5" fill="#5B708C">zoomed region</text>

  <!-- the zoomed locus segment -->
  <path d="M 170 140 C 300 190, 590 360, 640 400" fill="none" stroke="#1E66F5" stroke-width="5" stroke-linecap="round"/>
  <path d="M 170 140 C 152 132, 134 126, 120 121" fill="none" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 5"/>
  <path d="M 640 400 C 652 410, 661 418, 668 425" fill="none" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 5"/>
  <text x="62" y="108" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">toward 28% and the air point</text>
  <text x="690" y="444" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">toward copper &#183; 100%</text>

  <!-- %IACS graduations (spacing tightens toward higher conductivity) -->
  <line x1="288" y1="187" x2="294" y2="205" stroke="#5B708C" stroke-width="2"/>
  <line x1="386" y1="239" x2="392" y2="257" stroke="#5B708C" stroke-width="2"/>
  <line x1="466" y1="284" x2="472" y2="302" stroke="#5B708C" stroke-width="2"/>
  <line x1="589" y1="358" x2="595" y2="376" stroke="#5B708C" stroke-width="2"/>
  <text x="279" y="186" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">34</text>
  <text x="377" y="238" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">36</text>
  <text x="457" y="283" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">38</text>
  <text x="580" y="357" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">42</text>

  <!-- bracketing knowns -->
  <circle cx="170" cy="140" r="9" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="188" y="128" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">7075-T6 standard &#183; 32 %IACS &#8212; verified</text>
  <circle cx="622" cy="387" r="9" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="640" y="425" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">6061-T6 standard &#183; 43 %IACS &#8212; verified</text>

  <!-- the unknown -->
  <circle cx="531" cy="330" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="531" cy="330" r="4.5" fill="#0B1F3A"/>
  <text x="545" y="304" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">U1 parks here</text>
  <text x="545" y="322" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">reads &#8776; 40 %IACS</text>

  <!-- how to read it -->
  <rect x="40" y="355" width="370" height="120" rx="8" fill="#F2F7FE" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="58" y="381" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Read it right</text>
  <text x="58" y="403" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">&#8226; position along the arc, between the brackets</text>
  <text x="58" y="423" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">&#8226; graduations tighten toward higher %IACS</text>
  <text x="58" y="443" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">&#8226; a straight chord is not the scale</text>
  <text x="58" y="463" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">&#8226; past the last bracket: re-standardize, never extrapolate</text>
</svg>
