<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Recognizing Saturation on the Display</text>

  <defs>
    <clipPath id="scr2"><rect x="290" y="86" width="220" height="260"/></clipPath>
  </defs>

  <!-- panel headers -->
  <g font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5" text-anchor="middle">
    <text x="140" y="74">1 — HEALTHY</text>
    <text x="400" y="74">2 — PINNED FLAT</text>
    <text x="660" y="74">3 — COMPRESSED</text>
  </g>

  <!-- ============ PANEL 1: healthy ============ -->
  <rect x="30" y="86" width="220" height="260" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <g stroke="#9BC4FF" stroke-width="1" opacity="0.45">
    <line x1="85" y1="86" x2="85" y2="346"/><line x1="140" y1="86" x2="140" y2="346"/><line x1="195" y1="86" x2="195" y2="346"/>
    <line x1="30" y1="151" x2="250" y2="151"/><line x1="30" y1="216" x2="250" y2="216"/><line x1="30" y1="281" x2="250" y2="281"/>
  </g>
  <ellipse cx="140" cy="240" rx="22" ry="70" fill="none" stroke="#1E66F5" stroke-width="3" transform="rotate(38 140 240)"/>
  <circle cx="183" cy="295" r="4" fill="#0B1F3A"/>
  <text x="140" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">smooth loop, inside the screen</text>
  <text x="140" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">+6 dB doubles its height</text>

  <!-- ============ PANEL 2: pinned flat ============ -->
  <rect x="290" y="86" width="220" height="260" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <g stroke="#9BC4FF" stroke-width="1" opacity="0.45">
    <line x1="345" y1="86" x2="345" y2="346"/><line x1="400" y1="86" x2="400" y2="346"/><line x1="455" y1="86" x2="455" y2="346"/>
    <line x1="290" y1="151" x2="510" y2="151"/><line x1="290" y1="216" x2="510" y2="216"/><line x1="290" y1="281" x2="510" y2="281"/>
  </g>
  <g clip-path="url(#scr2)">
    <ellipse cx="400" cy="205" rx="30" ry="170" fill="none" stroke="#1E66F5" stroke-width="3" transform="rotate(38 400 205)"/>
  </g>
  <line x1="360" y1="88" x2="448" y2="88" stroke="#1E66F5" stroke-width="4"/>
  <circle cx="504" cy="338" r="4" fill="#0B1F3A"/>
  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pinned at the screen limit, flat top</text>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">+6 dB barely changes it</text>

  <!-- ============ PANEL 3: compressed ============ -->
  <rect x="550" y="86" width="220" height="260" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <g stroke="#9BC4FF" stroke-width="1" opacity="0.45">
    <line x1="605" y1="86" x2="605" y2="346"/><line x1="660" y1="86" x2="660" y2="346"/><line x1="715" y1="86" x2="715" y2="346"/>
    <line x1="550" y1="151" x2="770" y2="151"/><line x1="550" y1="216" x2="770" y2="216"/><line x1="550" y1="281" x2="770" y2="281"/>
  </g>
  <line x1="570" y1="320" x2="750" y2="320" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="590" y="170" width="50" height="150" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="680" y="160" width="50" height="160" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="672" y1="100" x2="738" y2="100" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="738" y="116" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">expected if linear</text>
  <text x="615" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60% hole</text>
  <text x="705" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100% hole</text>
  <text x="660" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">severity no longer tracks amplitude</text>
  <text x="660" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">two different references read alike</text>

  <!-- ============ RESPONSE STRIP ============ -->
  <rect x="60" y="424" width="680" height="40" rx="8" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Respond: reduce gain → re-null → re-standardize — never evaluate a clipped signal</text>
</svg>
