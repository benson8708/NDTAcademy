<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Phase Rotation: the Whole Pattern Turns Together</text>

  <!-- ============ LEFT SCREEN: before ============ -->
  <text x="195" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">BEFORE — orientation as found</text>
  <rect x="35" y="78" width="320" height="295" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="55" y1="265" x2="335" y2="265" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="160" y1="95" x2="160" y2="355" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="160" cy="265" r="4.5" fill="#0B1F3A"/>
  <text x="168" y="284" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <!-- lift-off vector at 30 deg -->
  <line x1="160" y1="265" x2="254" y2="211" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="260,208 252.7,217.4 248.2,209.6" fill="#0B1F3A"/>
  <text x="266" y="206" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">lift-off</text>

  <!-- crack vector at 120 deg -->
  <line x1="160" y1="265" x2="103" y2="166" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="98,157 107.4,164.3 99.6,168.8" fill="#1E66F5"/>
  <text x="100" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">crack</text>

  <!-- 30 deg arc from horizontal to lift-off -->
  <path d="M210 265 A50 50 0 0 0 203.3 240" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="222" y="252" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">30°</text>

  <!-- separation arc -->
  <path d="M233.6 222.5 A85 85 0 0 0 117.5 191.4" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="186" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">90° apart</text>

  <!-- ============ ROTATION CONTROL between screens ============ -->
  <text x="400" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">rotate −30°</text>
  <path d="M360 140 Q400 110 440 140" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="440,140 427.4,136.8 433.4,128.8" fill="#1E66F5"/>
  <circle cx="400" cy="210" r="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="400" y1="210" x2="409" y2="197" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rotation</text>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">control</text>

  <!-- ============ RIGHT SCREEN: after ============ -->
  <text x="605" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">AFTER — lift-off set horizontal</text>
  <rect x="445" y="78" width="320" height="295" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="465" y1="265" x2="745" y2="265" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="570" y1="95" x2="570" y2="355" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5"/>
  <circle cx="570" cy="265" r="4.5" fill="#0B1F3A"/>
  <text x="578" y="284" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <!-- lift-off vector at 0 deg -->
  <line x1="570" y1="265" x2="676" y2="265" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="685,265 674,260 674,270" fill="#0B1F3A"/>
  <text x="690" y="256" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">lift-off</text>

  <!-- crack vector at 90 deg -->
  <line x1="570" y1="265" x2="570" y2="148" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="570,140 565,151 575,151" fill="#1E66F5"/>
  <text x="570" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">crack</text>

  <!-- separation arc -->
  <path d="M655 265 A85 85 0 0 0 570 180" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="648" y="198" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">still 90° apart</text>

  <!-- ============ summary strip ============ -->
  <rect x="50" y="392" width="700" height="92" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">CHANGES: the orientation of every signal about the null point</text>
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">DOES NOT CHANGE: amplitudes, and the angle between lift-off and flaw signals</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">separation is set by test frequency and material — change frequency, not the knob, to improve it</text>
</svg>
