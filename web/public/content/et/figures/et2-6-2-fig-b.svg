<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">One Signal, Two Numbers: Amplitude and Phase as a Vector</text>

  <!-- ============ LEFT: carrier waveforms ============ -->
  <text x="40" y="66" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">CARRIER WAVEFORMS — before detection</text>

  <!-- baseline -->
  <line x1="50" y1="170" x2="370" y2="170" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- reference sine (navy, dashed): amplitude 55, period 100 -->
  <path d="M60 170 q25 -110 50 0 q25 110 50 0 q25 -110 50 0 q25 110 50 0 q25 -110 50 0 q25 110 50 0"
        fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- coil signal (blue, solid): amplitude 40, lagging by theta -->
  <path d="M78 170 q25 -80 50 0 q25 80 50 0 q25 -80 50 0 q25 80 50 0 q25 -80 50 0"
        fill="none" stroke="#1E66F5" stroke-width="2.5"/>

  <!-- amplitude marker on first signal peak -->
  <line x1="103" y1="168" x2="103" y2="132" stroke="#1E66F5" stroke-width="1.5"/>
  <polygon points="103,130 99,138 107,138" fill="#1E66F5"/>
  <text x="95" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">A</text>

  <!-- phase shift marker at downward zero crossings -->
  <line x1="110" y1="170" x2="110" y2="210" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="128" y1="170" x2="128" y2="210" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="110" y1="204" x2="128" y2="204" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="110,204 116,201 116,207" fill="#0B1F3A"/>
  <polygon points="128,204 122,201 122,207" fill="#0B1F3A"/>
  <text x="138" y="209" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">phase lag θ</text>

  <!-- legend -->
  <line x1="60" y1="246" x2="100" y2="246" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="108" y="251" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">reference sin(ωt) — from the oscillator</text>
  <line x1="60" y1="274" x2="100" y2="274" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="108" y="279" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">coil signal A·sin(ωt + θ)</text>

  <!-- note -->
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">After phase-sensitive detection the carrier is gone —</text>
  <text x="40" y="340" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">only the pair (X, Y) remains: the tip of the vector at right.</text>
  <text x="40" y="360" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">X drives horizontal deflection, Y drives vertical.</text>

  <!-- ============ RIGHT: vector on the display ============ -->
  <text x="430" y="66" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">AFTER DETECTION — the (X, Y) vector</text>
  <rect x="430" y="80" width="340" height="340" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- axes from the null point -->
  <line x1="450" y1="340" x2="742" y2="340" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="750,340 742,335 742,345" fill="#0B1F3A"/>
  <text x="756" y="346" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">X</text>
  <line x1="530" y1="360" x2="530" y2="108" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="530,100 525,108 535,108" fill="#0B1F3A"/>
  <text x="540" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Y</text>

  <!-- null point -->
  <circle cx="530" cy="340" r="4.5" fill="#0B1F3A"/>
  <text x="518" y="362" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <!-- projections -->
  <line x1="602" y1="186" x2="602" y2="340" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="530" y1="186" x2="602" y2="186" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="536" y="176" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Y = A·sin θ</text>
  <text x="566" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">X = A·cos θ</text>

  <!-- signal vector -->
  <line x1="530" y1="340" x2="597" y2="197" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="602,186 601.4,199 592.4,194.8" fill="#1E66F5"/>
  <circle cx="602" cy="186" r="5" fill="#1E66F5"/>
  <text x="612" y="180" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">flying dot — head of</text>
  <text x="612" y="198" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">the signal vector</text>

  <!-- theta arc -->
  <path d="M590 340 A60 60 0 0 0 555.4 285.6" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="596" y="308" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">θ</text>

  <!-- recovery formulas -->
  <text x="600" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">amplitude  A = √(X² + Y²)</text>
  <text x="600" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">phase angle  θ = arctan(Y / X)</text>
</svg>
