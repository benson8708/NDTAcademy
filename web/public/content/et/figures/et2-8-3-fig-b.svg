<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Volts-to-Depth: Amplitude Sizing and Its Limits</text>

  <defs>
    <marker id="arrN2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#0B1F3A"/>
    </marker>
  </defs>

  <!-- LEFT: bobbin volts vs FBH depth -->
  <text x="235" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Bobbin: normalized volts vs FBH depth</text>

  <line x1="90" y1="400" x2="395" y2="400" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <line x1="90" y1="400" x2="90" y2="100" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <text x="240" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw depth (% through-wall)</text>
  <text x="42" y="250" transform="rotate(-90 42 250)" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">signal amplitude (V p-p)</text>

  <line x1="148" y1="400" x2="148" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="148" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">20</text>
  <line x1="206" y1="400" x2="206" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="206" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">40</text>
  <line x1="264" y1="400" x2="264" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="264" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60</text>
  <line x1="322" y1="400" x2="322" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="322" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">80</text>
  <line x1="380" y1="400" x2="380" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="380" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100</text>

  <path d="M 148 348 C 168 334 187 321 206 306 C 226 287 245 266 264 244 C 284 221 303 196 322 171 C 341 152 361 132 380 114" fill="none" stroke="#0B1F3A" stroke-width="3"/>

  <rect x="143" y="343" width="10" height="10" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="201" y="301" width="10" height="10" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="259" y="239" width="10" height="10" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="317" y="166" width="10" height="10" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="375" y="109" width="10" height="10" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- normalization point -->
  <line x1="90" y1="348" x2="148" y2="348" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="84" y="352" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">ref V</text>
  <line x1="148" y1="352" x2="158" y2="366" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="152" y="378" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">normalization: four 20% FBHs</text>
  <text x="152" y="395" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">set to the reference volts</text>

  <!-- worked read -->
  <line x1="90" y1="275" x2="235" y2="275" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="235" y1="275" x2="235" y2="400" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="94" y="252" width="118" height="17" fill="#FFFFFF" opacity="0.9"/>
  <text x="98" y="266" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">2.4 V → ≈50% TW</text>

  <!-- RIGHT: surface-probe saturation -->
  <text x="612" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Surface probe: crack-depth response</text>

  <line x1="470" y1="400" x2="765" y2="400" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <line x1="470" y1="400" x2="470" y2="140" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrN2)"/>
  <text x="615" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crack depth (in standard depths δ)</text>
  <text x="432" y="270" transform="rotate(-90 432 270)" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">amplitude</text>

  <line x1="545" y1="400" x2="545" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="545" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1δ</text>
  <line x1="620" y1="400" x2="620" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="620" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2δ</text>
  <line x1="695" y1="400" x2="695" y2="406" stroke="#0B1F3A" stroke-width="2"/>
  <text x="695" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3δ</text>

  <path d="M 470 398 C 498 380 520 330 545 290 C 568 254 590 222 620 211 C 660 205 710 203 755 202" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="620" y1="400" x2="620" y2="211" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>

  <text x="540" y="176" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">beyond ≈2–3δ the curve flattens —</text>
  <text x="540" y="194" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">deeper cracks read alike</text>

  <!-- bottom rule -->
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Same volts ≠ same flaw — amplitude reads disturbed volume and proximity, not depth alone.</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Size with a morphology-matched standard; drop frequency when depths run past ≈2δ.</text>
</svg>
