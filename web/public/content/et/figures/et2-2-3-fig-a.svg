<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Frequency Walks the Operating Point: the f/fg Ratio</text>

  <!-- axes -->
  <line x1="170" y1="445" x2="720" y2="445" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="720,439 734,445 720,451" fill="#0B1F3A"/>
  <line x1="170" y1="445" x2="170" y2="75" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="164,75 170,61 176,75" fill="#0B1F3A"/>
  <text x="445" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">normalized resistance R / X0</text>
  <text x="120" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A" transform="rotate(-90 120 280)">normalized reactance XL / X0</text>
  <text x="166" y="466" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <line x1="160" y1="140" x2="180" y2="140" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="146" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.0</text>

  <!-- top-left note: poor separation near air point -->
  <text x="188" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">near the air point the directions</text>
  <text x="188" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">nearly merge — poor separation</text>
  <line x1="252" y1="116" x2="253" y2="140" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- lift-off paths (dashed, to air point) -->
  <line x1="253" y1="148" x2="180" y2="141" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="8 6"/>
  <line x1="523" y1="242" x2="178" y2="142" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="184,143 202,138 198,154" fill="#9BC4FF"/>
  <line x1="456" y1="320" x2="176" y2="146" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="181,148 199,145 192,161" fill="#9BC4FF"/>
  <rect x="316" y="178" width="70" height="20" fill="#FFFFFF"/>
  <text x="351" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off</text>

  <!-- conductivity locus -->
  <path d="M 170 140 C 230 146 280 150 321 158 C 380 170 420 172 447 188 C 490 212 515 222 523 242 C 532 272 500 300 456 320 C 410 342 350 372 304 392 C 270 407 235 420 204 428" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="366,373 381,369 374,358" fill="#1E66F5"/>
  <text x="398" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">increasing f / fg</text>

  <!-- air point -->
  <circle cx="170" cy="140" r="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="158" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">air point</text>

  <!-- f/fg stations on the locus -->
  <circle cx="253" cy="148" r="6" fill="#0B1F3A"/>
  <text x="266" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">f/fg ≈ 1</text>
  <circle cx="523" cy="242" r="6" fill="#0B1F3A"/>
  <text x="540" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">f/fg ≈ 9 — knee region</text>
  <circle cx="456" cy="320" r="6" fill="#0B1F3A"/>
  <text x="472" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">f/fg ≈ 50</text>
  <circle cx="304" cy="392" r="6" fill="#0B1F3A"/>
  <text x="320" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">f/fg ≈ 150</text>

  <!-- separation angle arc at f/fg = 50 -->
  <path d="M 430.5 304.2 A 30 30 0 0 0 428.9 332.8" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="478" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wide angle — clean separation</text>

  <!-- right panel: law of similarity -->
  <rect x="545" y="60" width="240" height="150" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="665" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Law of similarity</text>
  <text x="557" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">fg = 5066 / (σ · μᵣ · d²)</text>
  <text x="557" y="134" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fg in Hz, σ in MS/m, d in cm</text>
  <text x="557" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">equal f/fg + equal fill factor</text>
  <text x="557" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">→ same operating point,</text>
  <text x="557" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">geometrically similar signals</text>

  <!-- bottom note -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Same map, your lever: the part's properties move the point — the frequency you choose decides where it sits.</text>
</svg>
