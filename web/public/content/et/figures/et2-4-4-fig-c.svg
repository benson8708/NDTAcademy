<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwL2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Applying the Limit: Lap Joints and Tube Walls</text>
  <line x1="398" y1="56" x2="398" y2="460" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>

  <!-- LEFT: riveted lap joint -->
  <text x="212" y="66" text-anchor="middle" font-size="15" fill="#9BC4FF">riveted lap joint — 7075-T6 skins</text>

  <rect x="150" y="88" width="60" height="40" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="165" y1="88" x2="165" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="180" y1="88" x2="180" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="195" y1="88" x2="195" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  <text x="218" y="112" font-size="14" fill="#FFFFFF">surface probe</text>

  <!-- skins and sealant -->
  <rect x="100" y="130" width="250" height="80" fill="#1E66F5" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="100" y="210" width="250" height="8" fill="#FFFFFF" fill-opacity="0.07"/>
  <rect x="100" y="218" width="250" height="80" fill="#1E66F5" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="100" y1="130" x2="350" y2="130" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- fastener -->
  <polygon points="270,130 310,130 300,148 280,148" fill="#9BC4FF" fill-opacity="0.4" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="280" y="148" width="20" height="150" fill="#9BC4FF" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="1"/>
  <text x="290" y="124" text-anchor="middle" font-size="14" fill="#FFFFFF">fastener</text>

  <!-- second-layer crack at the faying surface -->
  <polyline points="280,223 268,228 256,221 244,227 232,223" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="272" y="252" text-anchor="end" font-size="14" fill="#FFFFFF">crack — ≈2.2 mm deep</text>

  <!-- penetration depths -->
  <line x1="100" y1="162" x2="350" y2="162" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="106" y="156" font-size="14" font-weight="bold" fill="#FFFFFF">3δ @ 200 kHz ≈ 0.8 mm</text>
  <text x="106" y="182" font-size="14" fill="#9BC4FF">stops in skin 1</text>

  <line x1="100" y1="330" x2="350" y2="330" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="106" y="322" font-size="14" font-weight="bold" fill="#FFFFFF">3δ @ 5 kHz ≈ 5.0 mm</text>
  <text x="106" y="348" font-size="14" fill="#9BC4FF">covers both skins</text>

  <!-- depth scale -->
  <text x="356" y="134" font-size="14" fill="#9BC4FF">0</text>
  <text x="356" y="214" font-size="14" fill="#9BC4FF">2.0</text>
  <text x="356" y="302" font-size="14" fill="#9BC4FF">4.2</text>
  <text x="356" y="334" font-size="14" fill="#9BC4FF">5.0</text>
  <text x="354" y="356" font-size="14" fill="#9BC4FF">(mm)</text>

  <text x="212" y="408" text-anchor="middle" font-size="14" fill="#FFFFFF">second-layer cracking lives 2–4 mm down —</text>
  <text x="212" y="428" text-anchor="middle" font-size="14" fill="#FFFFFF">only low kilohertz puts current there</text>
  <text x="212" y="450" text-anchor="middle" font-size="14" fill="#9BC4FF">sealant adds depth but carries no current</text>

  <!-- RIGHT: tube wall with internal bobbin coil -->
  <text x="585" y="66" text-anchor="middle" font-size="15" fill="#9BC4FF">tube wall — internal bobbin coil</text>

  <!-- wall with current-density shading (strong at ID, weak at OD) -->
  <rect x="440" y="230" width="290" height="30" fill="#9BC4FF" fill-opacity="0.32"/>
  <rect x="440" y="200" width="290" height="30" fill="#9BC4FF" fill-opacity="0.20"/>
  <rect x="440" y="170" width="290" height="30" fill="#9BC4FF" fill-opacity="0.11"/>
  <rect x="440" y="140" width="290" height="30" fill="#9BC4FF" fill-opacity="0.05"/>
  <rect x="440" y="140" width="290" height="120" fill="none" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="450" y="252" font-size="14" fill="#FFFFFF">strong</text>
  <text x="450" y="164" font-size="14" fill="#9BC4FF">weak</text>

  <text x="440" y="132" font-size="14" fill="#9BC4FF">OD (far) surface</text>
  <text x="730" y="276" text-anchor="end" font-size="14" fill="#9BC4FF">ID (near) surface</text>

  <!-- OD pit and ID notch -->
  <path d="M 690,140 L 698,158 L 706,140 Z" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="698" y="128" text-anchor="middle" font-size="14" fill="#FFFFFF">OD pit</text>
  <path d="M 500,260 L 508,242 L 516,260 Z" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="508" y="278" text-anchor="middle" font-size="14" fill="#FFFFFF">ID notch</text>

  <!-- wall thickness bracket -->
  <line x1="430" y1="140" x2="430" y2="260" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="426" y1="140" x2="434" y2="140" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="426" y1="260" x2="434" y2="260" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="422" y="204" text-anchor="end" font-size="16" font-style="italic" fill="#FFFFFF">t</text>

  <!-- bobbin coil -->
  <rect x="530" y="300" width="110" height="44" rx="6" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="545" y1="300" x2="545" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="560" y1="300" x2="560" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="575" y1="300" x2="575" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="590" y1="300" x2="590" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="605" y1="300" x2="605" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="620" y1="300" x2="620" y2="344" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="553" y1="296" x2="553" y2="266" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwL2)"/>
  <line x1="617" y1="296" x2="617" y2="266" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arwL2)"/>
  <text x="585" y="366" text-anchor="middle" font-size="14" fill="#FFFFFF">bobbin coil (inside the tube)</text>

  <text x="585" y="408" text-anchor="middle" font-size="14" fill="#FFFFFF">set f so t ≈ 1δ: OD current ≈ 37%,</text>
  <text x="585" y="428" text-anchor="middle" font-size="14" fill="#FFFFFF">through-wall spread ≈ 2t/δ ≈ 115°</text>
  <text x="585" y="450" text-anchor="middle" font-size="14" fill="#9BC4FF">δ ≪ t: OD dies · δ ≫ t: phases bunch</text>
</svg>
