<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Edge Effect: The Boundary Compresses the Loops</text>

  <!-- left panel: probe far from edge -->
  <rect x="28" y="56" width="356" height="324" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="206" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Far from the edge</text>
  <rect x="56" y="104" width="300" height="232" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="206" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">plate — plan view</text>
  <circle cx="206" cy="222" r="78" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <circle cx="206" cy="222" r="60" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <circle cx="206" cy="222" r="42" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <circle cx="206" cy="222" r="24" fill="#0B1F3A"/>
  <circle cx="206" cy="222" r="10" fill="#FFFFFF"/>
  <text x="206" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">Symmetric loops — steady, balanced signal</text>

  <!-- right panel: probe approaching the edge -->
  <rect x="416" y="56" width="356" height="324" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="594" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Approaching the edge</text>
  <rect x="444" y="104" width="266" height="232" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="710" y1="104" x2="710" y2="336" stroke="#0B1F3A" stroke-width="5"/>
  <text x="728" y="224" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">air</text>
  <ellipse cx="634" cy="222" rx="72" ry="86" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <ellipse cx="646" cy="222" rx="60" ry="64" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <ellipse cx="656" cy="222" rx="46" ry="44" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7 6"/>
  <circle cx="664" cy="222" r="24" fill="#0B1F3A"/>
  <circle cx="664" cy="222" r="10" fill="#FFFFFF"/>
  <text x="452" y="132" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">current cannot cross —</text>
  <text x="452" y="150" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">loops crowd and distort</text>
  <line x1="540" y1="160" x2="592" y2="186" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="588,176 600,190 584,188" fill="#0B1F3A"/>
  <text x="594" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">Loops squeezed against the boundary — signal climbs</text>

  <!-- bottom takeaway strip -->
  <rect x="28" y="392" width="744" height="88" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="52" cy="414" r="4" fill="#1E66F5"/>
  <text x="66" y="419" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">An unshielded probe usually starts responding about one probe diameter from the edge.</text>
  <circle cx="52" cy="442" r="4" fill="#1E66F5"/>
  <text x="66" y="447" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">The response can dwarf crack signals — shielded (ferrite-cup) probes work closer, and guided scans</text>
  <text x="66" y="467" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">parallel to the edge at a fixed offset keep the edge term constant so it can be balanced out.</text>
</svg>
