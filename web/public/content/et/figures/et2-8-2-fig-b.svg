<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">One Display, Two Origins — Phase Calls the Surface</text>

  <!-- ================= LEFT: two-layer splice ================= -->
  <text x="200" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">two-layer splice — one low-frequency pass</text>

  <!-- probe -->
  <rect x="70" y="72" width="84" height="28" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="76" x2="84" y2="96" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="98" y1="76" x2="98" y2="96" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="112" y1="76" x2="112" y2="96" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="126" y1="76" x2="126" y2="96" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="140" y1="76" x2="140" y2="96" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="162" y="90" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe</text>

  <!-- layers -->
  <rect x="40" y="102" width="320" height="70" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="40" y1="176" x2="360" y2="176" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 4"/>
  <rect x="40" y="180" width="320" height="70" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>

  <!-- fastener -->
  <polygon points="182,102 226,102 216,118 192,118" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="192" y="118" width="24" height="132" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="204" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fastener</text>

  <!-- near-surface crack -->
  <polygon points="246,102 254,102 250,116" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="250" y1="118" x2="284" y2="130" stroke="#0B1F3A" stroke-width="1"/>
  <text x="288" y="134" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">near-surface crack</text>

  <!-- far-surface crack (2nd layer, at the hole) -->
  <polyline points="216,182 222,192 218,202 224,212" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="224" y1="212" x2="240" y2="224" stroke="#0B1F3A" stroke-width="1"/>
  <text x="244" y="228" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">far-surface crack</text>

  <!-- depth dimension -->
  <line x1="332" y1="102" x2="332" y2="212" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="328,109 336,109 332,102" fill="#0B1F3A"/>
  <polygon points="328,205 336,205 332,212" fill="#0B1F3A"/>
  <text x="320" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">x ≈ 2.5 mm</text>

  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at ≈2.4 kHz in 2024-T3, δ ≈ 2.5 mm</text>
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">— both flaws sit inside the current</text>

  <!-- ================= RIGHT: impedance-plane display ================= -->
  <text x="595" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">calibrated impedance-plane display</text>
  <line x1="438" y1="300" x2="752" y2="300" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="595" y1="84" x2="595" y2="372" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- lift-off reference -->
  <line x1="595" y1="300" x2="735" y2="300" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="668" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off / wobble — horizontal</text>

  <!-- near-surface crack vector (~55 deg, large) -->
  <line x1="595" y1="300" x2="687" y2="168" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="695,157 692,171 683,165" fill="#1E66F5"/>
  <text x="700" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">near-surface crack — large</text>

  <!-- far-surface crack vector (~118 deg, small) -->
  <line x1="595" y1="300" x2="552" y2="218" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="548,212 559,222 550,226" fill="#1E66F5"/>
  <text x="536" y="184" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">far-surface crack —</text>
  <text x="536" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">smaller, rotated further</text>

  <!-- rotation arc -->
  <path d="M 664 202 A 120 120 0 0 0 539 194" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="580" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">extra rotation = deeper origin</text>

  <text x="595" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">equal heights can hide unequal flaws:</text>
  <text x="595" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the far signal paid e^(−x/δ) to reach the coil</text>

  <!-- ================= RULE STRIP ================= -->
  <rect x="40" y="428" width="720" height="58" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Phase first — rotation names the surface of origin; amplitude judged against that origin.</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The reference standard must hold flaws at both surfaces of interest — demonstrate before scanning.</text>
</svg>
