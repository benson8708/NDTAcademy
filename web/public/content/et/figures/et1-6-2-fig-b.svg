<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowWhiteHall" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Hall Element Drive: Control Current Sets Sensitivity</text>

  <!-- ================= LEFT: element top view ================= -->
  <text x="230" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Top view of the element</text>
  <text x="230" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">control current I — steady DC, set by rating</text>

  <!-- semiconductor wafer -->
  <rect x="110" y="150" width="240" height="130" fill="#1E66F5" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="2"/>

  <!-- control current arrows -->
  <line x1="44" y1="215" x2="102" y2="215" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowWhiteHall)"/>
  <text x="56" y="202" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#FFFFFF">I</text>
  <line x1="128" y1="215" x2="188" y2="215" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowWhiteHall)"/>
  <line x1="272" y1="215" x2="332" y2="215" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arrowWhiteHall)"/>

  <!-- B into page symbols -->
  <g stroke="#9BC4FF" stroke-width="2" fill="none">
    <circle cx="160" cy="182" r="9"/>
    <line x1="154.5" y1="176.5" x2="165.5" y2="187.5"/>
    <line x1="154.5" y1="187.5" x2="165.5" y2="176.5"/>
    <circle cx="300" cy="182" r="9"/>
    <line x1="294.5" y1="176.5" x2="305.5" y2="187.5"/>
    <line x1="294.5" y1="187.5" x2="305.5" y2="176.5"/>
    <circle cx="160" cy="248" r="9"/>
    <line x1="154.5" y1="242.5" x2="165.5" y2="253.5"/>
    <line x1="154.5" y1="253.5" x2="165.5" y2="242.5"/>
    <circle cx="300" cy="248" r="9"/>
    <line x1="294.5" y1="242.5" x2="305.5" y2="253.5"/>
    <line x1="294.5" y1="253.5" x2="305.5" y2="242.5"/>
  </g>

  <!-- Hall voltage terminals and leads to meter -->
  <rect x="225" y="145" width="10" height="10" fill="#FFFFFF"/>
  <rect x="225" y="275" width="10" height="10" fill="#FFFFFF"/>
  <polyline points="230,145 230,124 402,124 402,193" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <polyline points="230,285 230,306 402,306 402,237" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="402" cy="215" r="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="402" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">V<tspan font-size="12" dy="3">H</tspan></text>

  <!-- legend -->
  <g stroke="#9BC4FF" stroke-width="1.5" fill="none">
    <circle cx="120" cy="346" r="8"/>
    <line x1="115" y1="341" x2="125" y2="351"/>
    <line x1="115" y1="351" x2="125" y2="341"/>
  </g>
  <text x="136" y="351" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">B into the page — the field at the element</text>

  <!-- formula block -->
  <text x="245" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">V<tspan font-size="13" dy="4">H</tspan><tspan dy="-4"> = K × I × B</tspan></text>
  <text x="245" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">double I → double output</text>
  <text x="245" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">heat grows as I² — the rating is the ceiling</text>

  <!-- ================= RIGHT: sensitivity graph ================= -->
  <text x="635" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Sensitivity: output vs. field</text>

  <line x1="490" y1="420" x2="490" y2="110" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteHall)"/>
  <line x1="490" y1="420" x2="780" y2="420" stroke="#FFFFFF" stroke-width="2" marker-end="url(#arrowWhiteHall)"/>
  <text x="498" y="104" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Hall output V<tspan font-size="11" dy="3">H</tspan></text>
  <text x="635" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">flux density B at the element</text>

  <text x="498" y="134" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">linear in B — no core to saturate</text>

  <line x1="490" y1="420" x2="745" y2="160" stroke="#FFFFFF" stroke-width="3"/>
  <text x="778" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">I = rated maximum</text>

  <line x1="490" y1="420" x2="745" y2="295" stroke="#9BC4FF" stroke-width="3"/>
  <text x="778" y="283" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">I = half rating</text>
</svg>
