<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">A Surface Crack Forces Eddy Currents Off Course</text>

  <!-- LEFT PANEL: sound metal -->
  <rect x="55" y="70" width="330" height="330" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="220" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">SOUND METAL — top view</text>
  <text x="220" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil footprint (dashed)</text>

  <!-- concentric eddy current loops -->
  <circle cx="220" cy="245" r="110" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="220" cy="245" r="80" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="220" cy="245" r="50" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="220" cy="245" r="30" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- circulation arrows: left side down, right side up -->
  <polygon points="104,238 116,238 110,252" fill="#1E66F5"/>
  <polygon points="134,238 146,238 140,252" fill="#1E66F5"/>
  <polygon points="164,238 176,238 170,252" fill="#1E66F5"/>
  <polygon points="324,252 336,252 330,238" fill="#1E66F5"/>
  <polygon points="294,252 306,252 300,238" fill="#1E66F5"/>
  <polygon points="264,252 276,252 270,238" fill="#1E66F5"/>
  <text x="220" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">closed loops — full current, strong opposing field</text>

  <!-- transition arrow -->
  <line x1="388" y1="245" x2="406" y2="245" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="406,238 406,252 418,245" fill="#0B1F3A"/>

  <!-- RIGHT PANEL: cracked metal -->
  <rect x="415" y="70" width="330" height="330" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="580" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">CRACKED METAL — top view</text>

  <!-- deformed loops squeezing around the crack tips -->
  <path d="M 600,130 C 525,72 435,95 415,172 C 398,250 415,330 458,363 C 505,393 575,390 600,360 C 630,328 638,172 600,130 Z" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 600,148 C 548,105 472,120 458,185 C 446,245 458,305 490,338 C 520,368 582,366 600,340 C 622,308 626,188 600,148 Z" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 600,168 C 562,138 508,150 498,205 C 491,250 500,295 524,318 C 546,340 587,338 600,315 C 614,288 616,198 600,168 Z" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <!-- circulation arrows -->
  <polygon points="401,248 413,248 407,262" fill="#1E66F5"/>
  <polygon points="446,243 458,243 452,257" fill="#1E66F5"/>
  <polygon points="489,243 501,243 495,257" fill="#1E66F5"/>
  <polygon points="628,257 640,257 634,243" fill="#1E66F5"/>
  <polygon points="617,257 629,257 623,243" fill="#1E66F5"/>

  <!-- the crack -->
  <rect x="596" y="135" width="8" height="220" rx="4" fill="#0B1F3A"/>
  <line x1="640" y1="130" x2="606" y2="148" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="646" y="128" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">surface crack</text>

  <!-- crowding hooks around the crack tips -->
  <path d="M 585,155 Q 600,122 615,155" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="610,147 619,151 611,158" fill="#9BC4FF"/>
  <path d="M 585,335 Q 600,368 615,335" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="612,330 619,340 608,343" fill="#9BC4FF"/>

  <text x="580" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">current crowds around the ends and dives beneath</text>

  <!-- takeaway strip -->
  <text x="220" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Strong opposing field — impedance at null</text>
  <text x="580" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Weakened field — impedance shifts: a signal</text>
  <text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">A crack changes the current path in the metal — liftoff changes coil-to-part coupling.</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Different cause, different direction on the screen.</text>
</svg>
