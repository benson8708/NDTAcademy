<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Three Application Families of Eddy Current Sensing</text>

  <!-- ===== Panel 1: Material properties ===== -->
  <rect x="22" y="58" width="240" height="392" rx="10" fill="#1E66F5" fill-opacity="0.08" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="142" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">1 · Material properties</text>

  <!-- conductivity meter -->
  <rect x="62" y="108" width="160" height="64" rx="8" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="74" y="118" width="136" height="30" rx="4" fill="#1E66F5" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="1"/>
  <text x="142" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#9BC4FF">40.1 %IACS</text>
  <text x="142" y="164" text-anchor="middle" font-size="11" fill="#9BC4FF">conductivity meter</text>

  <!-- cable to probe -->
  <path d="M 142 172 C 142 196 142 200 142 212" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <!-- probe -->
  <rect x="130" y="212" width="24" height="34" rx="3" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- part block -->
  <rect x="52" y="246" width="180" height="48" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="142" y="276" text-anchor="middle" font-size="13" fill="#FFFFFF">7075 aluminum — T6 or T73?</text>

  <text x="142" y="330" text-anchor="middle" font-size="13" fill="#9BC4FF">conductivity · alloy &amp; temper sorting</text>
  <text x="142" y="352" text-anchor="middle" font-size="13" fill="#9BC4FF">heat-damage surveys</text>
  <text x="142" y="374" text-anchor="middle" font-size="13" fill="#9BC4FF">coating thickness via lift-off</text>
  <text x="142" y="396" text-anchor="middle" font-size="13" fill="#9BC4FF">permeability sorting (steels)</text>
  <text x="142" y="430" text-anchor="middle" font-size="12" fill="#FFFFFF" font-style="italic">ASTM E1004 · B244 · AMS 2658</text>

  <!-- ===== Panel 2: Flaw detection ===== -->
  <rect x="280" y="58" width="240" height="392" rx="10" fill="#1E66F5" fill-opacity="0.08" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">2 · Flaw detection</text>

  <!-- probe over plate -->
  <rect x="388" y="116" width="24" height="34" rx="3" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="424" y="138" font-size="11" fill="#9BC4FF">surface probe</text>

  <!-- skin / lap-joint plate with fastener row -->
  <rect x="306" y="158" width="188" height="58" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="340" cy="187" r="11" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="400" cy="187" r="11" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="460" cy="187" r="11" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- crack from middle fastener hole -->
  <path d="M 411 184 L 421 180 L 430 186 L 440 181" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="#9BC4FF">fatigue crack at a fastener hole</text>

  <!-- eddy current loops under probe -->
  <ellipse cx="400" cy="165" rx="26" ry="5" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <ellipse cx="400" cy="172" rx="20" ry="4" fill="none" stroke="#1E66F5" stroke-width="1.2" stroke-opacity="0.7"/>

  <text x="400" y="330" text-anchor="middle" font-size="13" fill="#9BC4FF">bolt-hole &amp; surface cracks</text>
  <text x="400" y="352" text-anchor="middle" font-size="13" fill="#9BC4FF">lap-joint corrosion · 2nd layer</text>
  <text x="400" y="374" text-anchor="middle" font-size="13" fill="#9BC4FF">in-service tubing (bobbin)</text>
  <text x="400" y="396" text-anchor="middle" font-size="13" fill="#9BC4FF">production bar · wire · tube</text>
  <text x="400" y="430" text-anchor="middle" font-size="12" fill="#FFFFFF" font-style="italic">ASTM E690 · E243 · E309</text>

  <!-- rule strip -->
  <text x="400" y="266" text-anchor="middle" font-size="12" fill="#FFFFFF">flaw must interrupt the</text>
  <text x="400" y="282" text-anchor="middle" font-size="12" fill="#FFFFFF">induced current paths</text>

  <!-- ===== Panel 3: Geometrical features ===== -->
  <rect x="538" y="58" width="240" height="392" rx="10" fill="#1E66F5" fill-opacity="0.08" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="658" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">3 · Geometrical features</text>

  <!-- tube cross-section with wall thickness arrows -->
  <circle cx="610" cy="172" r="46" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="610" cy="172" r="30" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="610" y1="126" x2="610" y2="142" stroke="#9BC4FF" stroke-width="2"/>
  <text x="610" y="240" text-anchor="middle" font-size="12" fill="#9BC4FF">wall thickness t</text>

  <!-- coated plate, lift-off as thickness -->
  <rect x="676" y="150" width="84" height="14" fill="#1E66F5" fill-opacity="0.45"/>
  <rect x="676" y="164" width="84" height="32" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="666" y1="150" x2="666" y2="164" stroke="#9BC4FF" stroke-width="2"/>
  <text x="718" y="216" text-anchor="middle" font-size="12" fill="#9BC4FF">coating = lift-off</text>

  <text x="658" y="330" text-anchor="middle" font-size="13" fill="#9BC4FF">thin-wall &amp; sheet thickness</text>
  <text x="658" y="352" text-anchor="middle" font-size="13" fill="#9BC4FF">cladding thickness</text>
  <text x="658" y="374" text-anchor="middle" font-size="13" fill="#9BC4FF">diameter via fill factor (d/D)²</text>
  <text x="658" y="396" text-anchor="middle" font-size="13" fill="#9BC4FF">non-contact proximity gauging</text>
  <text x="658" y="430" text-anchor="middle" font-size="12" fill="#FFFFFF" font-style="italic">within ≈3δ effective depth</text>

  <text x="400" y="486" text-anchor="middle" font-size="15" fill="#9BC4FF">Every family reads the same quantity — coil impedance — with the technique isolating the variable of interest.</text>
</svg>
