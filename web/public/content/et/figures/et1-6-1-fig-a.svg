<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Frequency Sets the Depth Window (Aluminum, 32 %IACS)</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#9BC4FF">δ (mm) ≈ 660 / √( f · μᵣ · σ %IACS ) — detection effectively ends at 3δ</text>

  <!-- probes -->
  <g font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    <text x="150" y="88">5 kHz</text>
    <text x="320" y="88">60 kHz</text>
    <text x="490" y="88">500 kHz</text>
    <text x="660" y="88">2 MHz</text>
  </g>
  <g>
    <rect x="128" y="96" width="44" height="32" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
    <line x1="139" y1="96" x2="139" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="150" y1="96" x2="150" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="161" y1="96" x2="161" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <rect x="298" y="96" width="44" height="32" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
    <line x1="309" y1="96" x2="309" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="320" y1="96" x2="320" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="331" y1="96" x2="331" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <rect x="468" y="96" width="44" height="32" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
    <line x1="479" y1="96" x2="479" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="490" y1="96" x2="490" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="501" y1="96" x2="501" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <rect x="638" y="96" width="44" height="32" rx="4" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
    <line x1="649" y1="96" x2="649" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="660" y1="96" x2="660" y2="128" stroke="#0B1F3A" stroke-width="2"/>
    <line x1="671" y1="96" x2="671" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  </g>

  <!-- metal cross-section, scale 1 mm = 33 px -->
  <rect x="60" y="130" width="680" height="180" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="60" y1="130" x2="740" y2="130" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="64" y="150" font-size="14" fill="#9BC4FF">depth ↓</text>

  <!-- depth ruler (right edge) -->
  <g stroke="#9BC4FF" stroke-width="1">
    <line x1="728" y1="163" x2="740" y2="163"/>
    <line x1="728" y1="196" x2="740" y2="196"/>
    <line x1="728" y1="229" x2="740" y2="229"/>
    <line x1="728" y1="262" x2="740" y2="262"/>
    <line x1="728" y1="295" x2="740" y2="295"/>
  </g>
  <g font-size="14" fill="#9BC4FF" text-anchor="end">
    <text x="724" y="167">1 mm</text>
    <text x="724" y="233">3 mm</text>
    <text x="724" y="299">5 mm</text>
  </g>

  <!-- 5 kHz column: 1δ = 1.65 mm (54.5 px) -->
  <rect x="122" y="130" width="56" height="54.5" fill="#1E66F5" fill-opacity="0.90"/>
  <rect x="122" y="184.5" width="56" height="54.5" fill="#1E66F5" fill-opacity="0.50"/>
  <rect x="122" y="239" width="56" height="54.5" fill="#1E66F5" fill-opacity="0.25"/>
  <text x="184" y="176" font-size="14" font-weight="bold" fill="#FFFFFF">1δ = 1.65 mm</text>
  <text x="184" y="297" font-size="14" font-weight="bold" fill="#FFFFFF">3δ ≈ 5.0 mm</text>

  <!-- 60 kHz column: 1δ = 0.48 mm (15.7 px) -->
  <rect x="292" y="130" width="56" height="15.7" fill="#1E66F5" fill-opacity="0.90"/>
  <rect x="292" y="145.7" width="56" height="15.7" fill="#1E66F5" fill-opacity="0.50"/>
  <rect x="292" y="161.4" width="56" height="15.7" fill="#1E66F5" fill-opacity="0.25"/>
  <text x="352" y="144" font-size="14" fill="#FFFFFF">1δ = 0.48 mm</text>
  <text x="352" y="162" font-size="14" fill="#9BC4FF">3δ ≈ 1.4 mm</text>

  <!-- 500 kHz column: 1δ = 0.17 mm (5.4 px) -->
  <rect x="462" y="130" width="56" height="5.4" fill="#1E66F5" fill-opacity="0.90"/>
  <rect x="462" y="135.4" width="56" height="5.4" fill="#1E66F5" fill-opacity="0.50"/>
  <rect x="462" y="140.8" width="56" height="5.4" fill="#1E66F5" fill-opacity="0.25"/>
  <text x="522" y="142" font-size="14" fill="#FFFFFF">1δ = 0.17 mm</text>

  <!-- 2 MHz column: 1δ = 0.08 mm (2.7 px) -->
  <rect x="632" y="130" width="56" height="2.7" fill="#1E66F5" fill-opacity="0.90"/>
  <rect x="632" y="132.7" width="56" height="2.7" fill="#1E66F5" fill-opacity="0.50"/>
  <rect x="632" y="135.4" width="56" height="2.7" fill="#1E66F5" fill-opacity="0.25"/>
  <text x="692" y="139" font-size="14" fill="#FFFFFF">1δ = 0.08 mm</text>

  <!-- target flaw line at 1.6 mm depth (y = 182.8) -->
  <line x1="60" y1="182.8" x2="740" y2="182.8" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="480" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#9BC4FF">second-layer corrosion target — 1.6 mm deep</text>
  <text x="480" y="200" text-anchor="middle" font-size="14" fill="#9BC4FF">only the 5 kHz window reaches it (just inside 1δ)</text>

  <!-- application bands on a log frequency axis -->
  <text x="60" y="341" font-size="15" fill="#9BC4FF">Where common applications sit (log frequency scale):</text>

  <rect x="60" y="350" width="170" height="15" rx="3" fill="#1E66F5" fill-opacity="0.85"/>
  <text x="238" y="362" font-size="14" fill="#FFFFFF">1–10 kHz · lap-joint second layer, hidden corrosion</text>

  <rect x="230" y="372" width="302" height="15" rx="3" fill="#1E66F5" fill-opacity="0.85"/>
  <text x="540" y="384" font-size="14" fill="#FFFFFF">tubing bobbin prime — f90 ≈ 3ρ/t²</text>

  <circle cx="362" cy="401" r="6" fill="#9BC4FF"/>
  <text x="376" y="406" font-size="14" fill="#FFFFFF">60 kHz · conductivity / heat-treat meters (ASTM E1004)</text>

  <rect x="400" y="416" width="221" height="15" rx="3" fill="#1E66F5" fill-opacity="0.85"/>
  <text x="392" y="428" text-anchor="end" font-size="14" fill="#FFFFFF">surface cracks · aluminum</text>

  <rect x="570" y="438" width="132" height="15" rx="3" fill="#1E66F5" fill-opacity="0.85"/>
  <text x="562" y="450" text-anchor="end" font-size="14" fill="#FFFFFF">surface cracks · titanium / stainless (low σ)</text>

  <line x1="60" y1="466" x2="740" y2="466" stroke="#FFFFFF" stroke-width="2"/>
  <g stroke="#FFFFFF" stroke-width="2">
    <line x1="60" y1="463" x2="60" y2="469"/>
    <line x1="230" y1="463" x2="230" y2="469"/>
    <line x1="400" y1="463" x2="400" y2="469"/>
    <line x1="570" y1="463" x2="570" y2="469"/>
    <line x1="740" y1="463" x2="740" y2="469"/>
  </g>
  <g font-size="14" fill="#FFFFFF" text-anchor="middle">
    <text x="60" y="486">1 kHz</text>
    <text x="230" y="486">10 kHz</text>
    <text x="400" y="486">100 kHz</text>
    <text x="570" y="486">1 MHz</text>
    <text x="740" y="486">10 MHz</text>
  </g>
</svg>
