<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Four Bench Setups — Where Are Eddy Currents Flowing?</text>

  <!-- panel frames -->
  <g fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2">
    <rect x="22" y="52" width="368" height="200" rx="10"/>
    <rect x="410" y="52" width="368" height="200" rx="10"/>
    <rect x="22" y="268" width="368" height="200" rx="10"/>
    <rect x="410" y="268" width="368" height="200" rx="10"/>
  </g>

  <!-- ================= STATION 1: AC on aluminum ================= -->
  <text x="36" y="78" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">STATION 1 — AC drive, on aluminum</text>
  <circle cx="70" cy="150" r="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 59 150 q 5.5 -10 11 0 q 5.5 10 11 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="70" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">AC drive</text>
  <line x1="86" y1="144" x2="185" y2="138" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="86" y1="156" x2="185" y2="170" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="185" y="120" width="50" height="64" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="2">
    <line x1="190" y1="152" x2="230" y2="152"/>
    <line x1="190" y1="162" x2="230" y2="162"/>
    <line x1="190" y1="172" x2="230" y2="172"/>
  </g>
  <rect x="60" y="184" width="300" height="52" fill="#9BC4FF" fill-opacity="0.4" stroke="#0B1F3A" stroke-width="2"/>
  <text x="210" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">aluminum — conductor</text>

  <!-- ================= STATION 2: steady DC on aluminum ================= -->
  <text x="424" y="78" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">STATION 2 — steady DC drive, on aluminum</text>
  <line x1="450" y1="134" x2="450" y2="166" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="462" y1="142" x2="462" y2="158" stroke="#0B1F3A" stroke-width="7"/>
  <text x="456" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">DC — steady</text>
  <line x1="466" y1="144" x2="573" y2="138" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="466" y1="156" x2="573" y2="170" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="573" y="120" width="50" height="64" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="2">
    <line x1="578" y1="152" x2="618" y2="152"/>
    <line x1="578" y1="162" x2="618" y2="162"/>
    <line x1="578" y1="172" x2="618" y2="172"/>
  </g>
  <rect x="448" y="184" width="300" height="52" fill="#9BC4FF" fill-opacity="0.4" stroke="#0B1F3A" stroke-width="2"/>
  <text x="598" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">aluminum — conductor</text>

  <!-- ================= STATION 3: AC on acrylic ================= -->
  <text x="36" y="294" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">STATION 3 — AC drive, on acrylic (plastic)</text>
  <circle cx="70" cy="366" r="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 59 366 q 5.5 -10 11 0 q 5.5 10 11 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="70" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">AC drive</text>
  <line x1="86" y1="360" x2="185" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="86" y1="372" x2="185" y2="386" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="185" y="336" width="50" height="64" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="2">
    <line x1="190" y1="368" x2="230" y2="368"/>
    <line x1="190" y1="378" x2="230" y2="378"/>
    <line x1="190" y1="388" x2="230" y2="388"/>
  </g>
  <rect x="60" y="400" width="300" height="52" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="210" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">acrylic — insulator</text>

  <!-- ================= STATION 4: AC held 25 mm above aluminum ================= -->
  <text x="424" y="294" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">STATION 4 — AC drive, 25 mm above aluminum</text>
  <circle cx="455" cy="346" r="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 444 346 q 5.5 -10 11 0 q 5.5 10 11 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="455" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">AC drive</text>
  <line x1="471" y1="340" x2="573" y2="334" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="471" y1="352" x2="573" y2="366" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="573" y="300" width="50" height="64" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="2">
    <line x1="578" y1="332" x2="618" y2="332"/>
    <line x1="578" y1="342" x2="618" y2="342"/>
    <line x1="578" y1="352" x2="618" y2="352"/>
  </g>
  <line x1="650" y1="368" x2="650" y2="416" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="646,372 654,372 650,364" fill="#0B1F3A"/>
  <polygon points="646,412 654,412 650,420" fill="#0B1F3A"/>
  <text x="660" y="396" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">≈ 25 mm</text>
  <rect x="448" y="420" width="300" height="42" fill="#9BC4FF" fill-opacity="0.4" stroke="#0B1F3A" stroke-width="2"/>
  <text x="598" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">aluminum — conductor</text>
</svg>
