<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Same Surface Crack — Three Probe Signatures</text>

  <!-- panel 1: absolute -->
  <text x="153" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">ABSOLUTE</text>
  <text x="153" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(one sensing coil)</text>
  <rect x="42" y="110" width="222" height="240" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="52" y1="230" x2="254" y2="230" stroke="#9BC4FF" stroke-width="1.2"/>
  <line x1="153" y1="120" x2="153" y2="340" stroke="#9BC4FF" stroke-width="1.2"/>
  <circle cx="110" cy="300" r="5" fill="#0B1F3A"/>
  <path d="M 110 300 C 140 262 168 215 184 172 C 187 164 190 158 192 154 C 188 162 184 170 180 178 C 162 219 138 263 113 299" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="192,154 197,166 186,163" fill="#1E66F5"/>
  <text x="153" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">one excursion, out and back</text>
  <text x="153" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tracks the operating point itself</text>
  <text x="153" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sees drift and gradual change</text>

  <!-- panel 2: differential -->
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">DIFFERENTIAL</text>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(two opposed sensing coils)</text>
  <rect x="289" y="110" width="222" height="240" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="299" y1="230" x2="501" y2="230" stroke="#9BC4FF" stroke-width="1.2"/>
  <line x1="400" y1="120" x2="400" y2="340" stroke="#9BC4FF" stroke-width="1.2"/>
  <circle cx="400" cy="230" r="5" fill="#0B1F3A"/>
  <path d="M 400 230 C 428 188 452 158 458 178 C 463 196 436 222 404 232 C 372 242 344 270 350 288 C 356 306 378 272 398 234" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">two opposed lobes — a figure eight</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">cancels drift and temperature</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">misses long, gradual flaws</text>

  <!-- panel 3: reflection -->
  <text x="647" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">REFLECTION</text>
  <text x="647" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(separate drive + sense windings)</text>
  <rect x="536" y="110" width="222" height="240" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="546" y1="230" x2="748" y2="230" stroke="#9BC4FF" stroke-width="1.2"/>
  <line x1="647" y1="120" x2="647" y2="340" stroke="#9BC4FF" stroke-width="1.2"/>
  <circle cx="605" cy="300" r="5" fill="#0B1F3A"/>
  <path d="M 605 300 C 632 262 658 218 672 178 C 675 170 678 163 680 158 C 676 166 671 175 666 184 C 650 222 628 262 607 299" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="680,158 685,170 674,167" fill="#1E66F5"/>
  <text x="647" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">single excursion, like absolute</text>
  <text x="647" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">broad frequency range, very stable</text>
  <text x="647" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">workhorse for multi-frequency work</text>

  <!-- footer -->
  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Shielded versions add a ferrite cup that confines the coil's footprint —</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">edges and fastener heads stop swamping the flaw signal.</text>
</svg>
