<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Amplifier Transfer Curve: Linear Range and Saturation</text>

  <!-- ================= TRANSFER CURVE ================= -->
  <!-- noise floor band -->
  <rect x="80" y="70" width="32" height="360" fill="#9BC4FF" fill-opacity="0.25"/>
  <text x="96" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">noise floor</text>

  <!-- axes -->
  <line x1="80" y1="70" x2="80" y2="430" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="80" y1="430" x2="440" y2="430" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="86" y="64" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">output (Vout)</text>
  <text x="260" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">input (Vin)</text>

  <!-- transfer curve: linear, knee, plateau -->
  <path d="M 80 430 L 300 152 Q 330 118 365 112 L 435 110" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <!-- dashed: the linear path not taken -->
  <path d="M 300 152 L 330 114" stroke="#9BC4FF" stroke-width="2.5" stroke-dasharray="6 5" fill="none"/>

  <!-- labels -->
  <text x="205" y="330" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">linear range</text>
  <text x="205" y="348" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">output ∝ input</text>
  <text x="436" y="92" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">saturation — output stops growing</text>
  <line x1="340" y1="200" x2="327" y2="133" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="330" y="215" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">compression knee</text>

  <!-- dynamic range arrow -->
  <line x1="112" y1="418" x2="300" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="120,412 120,424 112,418" fill="#0B1F3A"/>
  <polygon points="292,412 292,424 300,418" fill="#0B1F3A"/>
  <text x="206" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">dynamic range (dB)</text>

  <!-- ================= WAVEFORMS ================= -->
  <text x="620" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">inside the linear range — faithful copy</text>
  <rect x="470" y="80" width="300" height="150" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="475" y1="155" x2="765" y2="155" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 5"/>
  <path d="M 485 155 C 500 110 515 110 530 155 C 545 200 560 200 575 155 C 590 110 605 110 620 155 C 635 200 650 200 665 155 C 680 110 695 110 710 155 C 725 200 740 200 755 155" fill="none" stroke="#1E66F5" stroke-width="2.5"/>

  <text x="620" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">beyond the range — clipped flat</text>
  <rect x="470" y="270" width="300" height="150" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="475" y1="345" x2="765" y2="345" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 5"/>
  <path d="M 485 345 L 500 307 L 530 307 L 545 345 L 560 383 L 590 383 L 605 345 L 620 307 L 650 307 L 665 345 L 680 383 L 710 383 L 725 345 L 740 307 L 755 307" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <g stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 4" fill="none">
    <path d="M 500 307 Q 515 283 530 307"/>
    <path d="M 560 383 Q 575 407 590 383"/>
    <path d="M 620 307 Q 635 283 650 307"/>
    <path d="M 680 383 Q 695 407 710 383"/>
  </g>
  <text x="620" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">clipping flattens peaks, adds harmonics, and falsifies</text>
  <text x="620" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">both amplitude and phase</text>
</svg>
