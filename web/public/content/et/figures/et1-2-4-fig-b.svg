<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">The Recognition Card: Lift-Off Rotated Horizontal</text>

  <!-- instrument screen -->
  <rect x="60" y="70" width="540" height="400" rx="10" fill="#0B1F3A"/>
  <!-- grid -->
  <line x1="150" y1="70" x2="150" y2="470" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="240" y1="70" x2="240" y2="470" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="330" y1="70" x2="330" y2="470" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="420" y1="70" x2="420" y2="470" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="510" y1="70" x2="510" y2="470" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="60" y1="150" x2="600" y2="150" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="60" y1="230" x2="600" y2="230" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="60" y1="310" x2="600" y2="310" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="60" y1="390" x2="600" y2="390" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.25"/>

  <!-- lift-off trace (horizontal, to the left) -->
  <path d="M 450 350 Q 290 342 138 330" fill="none" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="150,322 130,330 151,340" fill="#9BC4FF"/>
  <text x="250" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">lift-off (probe raised)</text>

  <!-- surface crack lobe (steep, up) -->
  <path d="M 450 350 C 424 300 400 170 406 122 C 414 170 436 295 450 350" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <text x="398" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">surface crack</text>

  <!-- subsurface flaw lobe (rotated, smaller) -->
  <path d="M 450 350 C 474 316 522 252 543 218 C 518 258 472 322 450 350" fill="none" stroke="#1E66F5" stroke-width="3" stroke-opacity="0.75"/>
  <text x="540" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">subsurface flaw</text>

  <!-- rotation arc between crack and subsurface directions -->
  <path d="M 436 271 A 80 80 0 0 1 496 285" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- null point -->
  <circle cx="450" cy="350" r="8" fill="#FFFFFF"/>
  <text x="462" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">null point</text>

  <!-- legend -->
  <text x="615" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">How to read it</text>
  <line x1="615" y1="148" x2="645" y2="148" stroke="#9BC4FF" stroke-width="5"/>
  <text x="652" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off: horizontal</text>
  <line x1="615" y1="183" x2="645" y2="183" stroke="#1E66F5" stroke-width="5"/>
  <text x="652" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface crack: rises</text>
  <text x="652" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">steeply, well clear</text>
  <text x="652" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">of lift-off</text>
  <line x1="615" y1="253" x2="645" y2="253" stroke="#1E66F5" stroke-width="4" stroke-opacity="0.75"/>
  <text x="652" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">deeper flaw: rotated</text>
  <text x="652" y="276" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">clockwise, smaller</text>
  <text x="615" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rotation grows about</text>
  <text x="615" y="333" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">57° per standard depth</text>
  <text x="615" y="351" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">of penetration</text>

  <!-- caption strip -->
  <text x="330" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">aluminum skin · ~200 kHz · nulled on bare metal · lift-off set horizontal</text>
</svg>
