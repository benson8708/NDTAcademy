<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Three Ways a Dot Lies &#8212; and the Catch for Each</text>

  <!-- ============ panel 1: ferromagnetic ============ -->
  <rect x="18" y="90" width="244" height="270" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="48" y1="110" x2="48" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="48" y1="340" x2="232" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="48" y1="160" x2="232" y2="160" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="44" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5B708C">1.0</text>
  <path d="M 68 160 C 116 170, 164 192, 196 228 C 214 252, 218 276, 208 298 C 198 318, 166 328, 136 332"
        fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="68" cy="160" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="103" y1="152" x2="158" y2="125" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="0,-5 10,0 0,5" transform="translate(160,124) rotate(-26)" fill="#0B1F3A"/>
  <circle cx="168" cy="120" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="182" y="114" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">&#956;r &gt; 1</text>
  <text x="140" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">U2 &#8212; ferromagnetic</text>
  <text x="140" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">Permeability raises reactance;</text>
  <text x="140" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">the dot leaves the comma upward.</text>
  <text x="140" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">Catch: dot above 1.0 &#8212; invalid here</text>

  <!-- ============ panel 2: too thin ============ -->
  <rect x="278" y="90" width="244" height="270" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="308" y1="110" x2="308" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="308" y1="340" x2="492" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 328 160 C 376 170, 424 192, 456 228 C 474 252, 478 276, 468 298 C 458 318, 426 328, 396 332"
        fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="328" cy="160" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="468" cy="298" r="7" fill="#FFFFFF" stroke="#5B708C" stroke-width="2.5" stroke-dasharray="3 3"/>
  <text x="460" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5B708C">true bulk spot</text>
  <circle cx="416" cy="252" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="426" y1="260" x2="458" y2="289" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="0,-5 10,0 0,5" transform="translate(460,290) rotate(42)" fill="#0B1F3A"/>
  <polygon points="0,-5 10,0 0,5" transform="translate(424,259) rotate(222)" fill="#0B1F3A"/>
  <text x="316" y="236" font-family="Arial, sans-serif" font-size="12.5" font-style="italic" fill="#5B708C">moves with backing</text>
  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">U3 &#8212; thinner than 3&#948;</text>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">Field reaches the far surface;</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">reading mixes thickness + backing.</text>
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">Catch: change the backing &#8212; dot moves</text>

  <!-- ============ panel 3: warm sample ============ -->
  <rect x="538" y="90" width="244" height="270" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="568" y1="110" x2="568" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="568" y1="340" x2="752" y2="340" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 588 160 C 636 170, 684 192, 716 228 C 734 252, 738 276, 728 298 C 718 318, 686 328, 656 332"
        fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="588" cy="160" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="728" cy="298" r="7" fill="#FFFFFF" stroke="#5B708C" stroke-width="2.5" stroke-dasharray="3 3"/>
  <text x="720" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5B708C">certified spot</text>
  <circle cx="736" cy="268" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="730" y1="291" x2="735" y2="280" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="0,-5 10,0 0,5" transform="translate(735,279) rotate(-66)" fill="#0B1F3A"/>
  <text x="574" y="256" font-family="Arial, sans-serif" font-size="12.5" font-style="italic" fill="#5B708C">&#963; falls as it warms</text>
  <text x="660" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Warm sample</text>
  <text x="660" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">Conductivity falls as metal warms;</text>
  <text x="660" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">the dot slides to lower %IACS.</text>
  <text x="660" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">Catch: value creeps up as it cools</text>
</svg>
