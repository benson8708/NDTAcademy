<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Verified Z-Curve at 60 kHz &#8212; Bracket the Range, Check the Middle</text>

  <!-- gridlines -->
  <line x1="255" y1="70" x2="255" y2="440" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="370" y1="70" x2="370" y2="440" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="485" y1="70" x2="485" y2="440" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="130" y1="101" x2="545" y2="101" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="130" y1="186" x2="545" y2="186" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="130" y1="270" x2="545" y2="270" stroke="#D7E5FB" stroke-width="1"/>
  <line x1="130" y1="355" x2="545" y2="355" stroke="#D7E5FB" stroke-width="1"/>

  <!-- axes -->
  <line x1="130" y1="70" x2="130" y2="440" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="130" y1="440" x2="660" y2="440" stroke="#0B1F3A" stroke-width="2"/>
  <text x="122" y="106" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.0</text>
  <text x="122" y="191" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.8</text>
  <text x="122" y="275" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.6</text>
  <text x="122" y="360" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.4</text>
  <text x="395" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">R / X&#8320;  (normalized resistance)</text>
  <text transform="translate(58,255) rotate(-90)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">&#969;L / &#969;L&#8320;  (normalized reactance)</text>

  <!-- legend panel -->
  <rect x="560" y="70" width="226" height="158" rx="8" fill="#F2F7FE" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="576" y="96" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Verification drill</text>
  <text x="576" y="120" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">1 &#183; re-touch knowns &#8212; dots repeat</text>
  <text x="576" y="142" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">2 &#183; brackets straddle the unknowns</text>
  <text x="576" y="164" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">3 &#183; mid check lands on its spot</text>
  <text x="576" y="188" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#1E66F5">fail any &#8594; stop, fix, re-verify</text>
  <text x="576" y="212" font-family="Arial, sans-serif" font-size="13" fill="#5B708C">60 kHz &#183; absolute surface probe</text>

  <!-- conductivity locus -->
  <path d="M 140 101
           C 178 108, 218 116, 255 127
           C 277 134, 296 143, 318 155
           C 380 190, 452 224, 485 262
           C 499 277, 505 281, 508 288
           C 511 300, 511 310, 508 322
           C 505 334, 492 341, 479 348
           C 455 361, 425 373, 399 386
           C 350 409, 268 421, 221 424"
        fill="none" stroke="#1E66F5" stroke-width="4" stroke-linecap="round"/>
  <path d="M 221 424 C 203 425, 187 426, 172 427" fill="none" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 5"/>
  <text x="212" y="412" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">&#963; &#8594; &#8734;</text>
  <polygon points="0,-6 12,0 0,6" transform="translate(394,197) rotate(29)" fill="#1E66F5"/>

  <!-- air point -->
  <circle cx="140" cy="101" r="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="156" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">air point &#8212; probe in air</text>

  <!-- verification annotation inside the comma -->
  <text x="178" y="312" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#5B708C">verification: re-touch knowns &#8212;</text>
  <text x="178" y="331" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#5B708C">every dot must land where recorded</text>
  <line x1="340" y1="324" x2="484" y2="322" stroke="#5B708C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="0,-4 9,0 0,4" transform="translate(486,322)" fill="#5B708C"/>

  <!-- bracket rings -->
  <circle cx="496" cy="275" r="13" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="479" cy="348" r="13" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- check standard tolerance ring -->
  <circle cx="508" cy="322" r="16" fill="none" stroke="#5B708C" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- sample dots -->
  <circle cx="255" cy="127" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="318" cy="155" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="485" cy="262" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="496" cy="275" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="508" cy="288" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="508" cy="322" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="479" cy="348" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="399" cy="386" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>

  <!-- sample labels -->
  <text x="267" y="116" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Ti-6Al-4V &#183; 1.0%</text>
  <text x="332" y="150" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">304 SS &#183; 2.5%</text>
  <text x="471" y="248" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">brass &#183; 28%</text>
  <text x="522" y="262" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">2024-T3 &#183; 30%</text>
  <text x="522" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">low bracket</text>
  <text x="528" y="298" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">7075-T6 &#183; 32%</text>
  <text x="534" y="326" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">6061-T6 &#183; 43%</text>
  <text x="534" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5B708C">mid check &#8212; must repeat</text>
  <text x="498" y="374" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1100-O &#183; 59%</text>
  <text x="498" y="390" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">high bracket</text>
  <text x="385" y="404" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">copper &#183; 100%</text>
</svg>
