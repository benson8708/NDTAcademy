<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Building and Challenging the Acceptance Window</text>

  <!-- setup workflow chips -->
  <g fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2">
    <rect x="40" y="52" width="170" height="60" rx="8"/>
    <rect x="225" y="52" width="170" height="60" rx="8"/>
    <rect x="410" y="52" width="170" height="60" rx="8"/>
    <rect x="595" y="52" width="170" height="60" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle">
    <text x="125" y="76">1. balance on a</text><text x="125" y="94">verified reference</text>
    <text x="310" y="76">2. run known-good</text><text x="310" y="94">parts — note spread</text>
    <text x="495" y="76">3. set window just</text><text x="495" y="94">beyond the spread</text>
    <text x="680" y="76">4. challenge with</text><text x="680" y="94">known-deviant parts</text>
  </g>
  <g stroke="#1E66F5" stroke-width="3">
    <line x1="212" y1="82" x2="217" y2="82"/>
    <line x1="397" y1="82" x2="402" y2="82"/>
    <line x1="582" y1="82" x2="587" y2="82"/>
  </g>
  <g fill="#1E66F5">
    <polygon points="217,76 217,88 224,82"/>
    <polygon points="402,76 402,88 409,82"/>
    <polygon points="587,76 587,88 594,82"/>
  </g>

  <!-- output axis -->
  <line x1="70" y1="330" x2="730" y2="330" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="730,324 730,336 742,330" fill="#0B1F3A"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">comparator output — unbalance amplitude</text>
  <line x1="110" y1="324" x2="110" y2="336" stroke="#0B1F3A" stroke-width="2"/>
  <text x="110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <!-- acceptance window -->
  <rect x="92" y="190" width="215" height="140" fill="#9BC4FF" fill-opacity="0.25" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="199" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">acceptance window</text>
  <text x="199" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">= verified good-part spread</text>

  <!-- verified good parts -->
  <g fill="#0B1F3A">
    <circle cx="125" cy="300" r="6"/><circle cx="140" cy="288" r="6"/><circle cx="154" cy="306" r="6"/>
    <circle cx="168" cy="294" r="6"/><circle cx="182" cy="310" r="6"/><circle cx="197" cy="285" r="6"/>
    <circle cx="213" cy="302" r="6"/><circle cx="228" cy="292" r="6"/><circle cx="244" cy="308" r="6"/>
    <circle cx="258" cy="296" r="6"/><circle cx="272" cy="304" r="6"/><circle cx="286" cy="290" r="6"/>
  </g>
  <text x="199" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">verified good parts</text>

  <!-- borderline part -->
  <text x="360" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">reads outside the window —</text>
  <text x="360" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">refer for independent verification</text>
  <line x1="360" y1="208" x2="360" y2="289" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="360" cy="298" r="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- known deviant parts -->
  <text x="592" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">known deviant — verified hard</text>
  <line x1="592" y1="258" x2="592" y2="278" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g stroke="#1E66F5" stroke-width="3">
    <line x1="533" y1="288" x2="547" y2="302"/><line x1="547" y1="288" x2="533" y2="302"/>
    <line x1="558" y1="301" x2="572" y2="315"/><line x1="572" y1="301" x2="558" y2="315"/>
    <line x1="585" y1="281" x2="599" y2="295"/><line x1="599" y1="281" x2="585" y2="295"/>
    <line x1="611" y1="293" x2="625" y2="307"/><line x1="625" y1="293" x2="611" y2="307"/>
    <line x1="638" y1="285" x2="652" y2="299"/><line x1="652" y1="285" x2="638" y2="299"/>
  </g>

  <!-- rules -->
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">good and deviant populations must separate clearly —</text>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">if they overlap at every frequency and drive level, the sort is not feasible</text>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">never widen the window into the reject population</text>
</svg>
