<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Phase Lag Is the Depth Ruler</text>

  <text x="215" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">IN THE PART</text>
  <text x="585" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">ON THE SCREEN</text>

  <!-- probe above surface -->
  <rect x="150" y="92" width="80" height="36" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="162" y1="98" x2="162" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="172" y1="98" x2="172" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="182" y1="98" x2="182" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="192" y1="98" x2="192" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="202" y1="98" x2="202" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="212" y1="98" x2="212" y2="122" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="142" y="114" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe</text>

  <!-- metal block with skin-effect bands -->
  <rect x="70" y="140" width="290" height="85" fill="#1E66F5" opacity="0.28"/>
  <rect x="70" y="225" width="290" height="85" fill="#1E66F5" opacity="0.13"/>
  <rect x="70" y="310" width="290" height="85" fill="#1E66F5" opacity="0.06"/>
  <rect x="70" y="395" width="290" height="35" fill="#1E66F5" opacity="0.02"/>
  <rect x="70" y="140" width="290" height="290" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="70" y1="140" x2="360" y2="140" stroke="#0B1F3A" stroke-width="3"/>
  <text x="356" y="132" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface</text>

  <!-- depth ruler -->
  <line x1="70" y1="225" x2="360" y2="225" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="70" y1="310" x2="360" y2="310" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="70" y1="395" x2="360" y2="395" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="60" y="229" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1δ</text>
  <text x="60" y="314" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2δ</text>
  <text x="60" y="399" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3δ</text>
  <text x="368" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">J / J0</text>
  <text x="368" y="229" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">37%</text>
  <text x="368" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">14%</text>
  <text x="368" y="399" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">5%</text>
  <text x="215" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3δ — effective depth of penetration</text>

  <!-- flaws -->
  <polygon points="124,140 136,140 130,158" fill="#0B1F3A"/>
  <text x="130" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">S — surface</text>
  <circle cx="210" cy="182" r="6" fill="#0B1F3A"/>
  <text x="210" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A — 0.5δ</text>
  <circle cx="285" cy="225" r="6" fill="#0B1F3A"/>
  <text x="285" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B — 1δ</text>

  <!-- formulas -->
  <text x="70" y="458" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">δ = 1 / √(π f μ σ)</text>
  <text x="70" y="481" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">δ (mm) ≈ 660 / √( f · %IACS · μr )</text>

  <!-- display -->
  <rect x="410" y="80" width="350" height="330" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="480" cy="365" r="6" fill="#0B1F3A"/>
  <text x="480" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>
  <line x1="480" y1="365" x2="438" y2="365" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="7 5"/>
  <polygon points="424,365 438,358 438,372" fill="#9BC4FF"/>
  <text x="452" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off</text>

  <!-- S vector -->
  <line x1="480" y1="365" x2="518" y2="149" stroke="#0B1F3A" stroke-width="3.5"/>
  <polygon points="520,135 525,150 511,148" fill="#0B1F3A"/>
  <text x="532" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">S — surface, reference</text>

  <!-- A vector: 29 deg cw, 61% -->
  <line x1="480" y1="365" x2="560" y2="265" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="569,254 566,269 555,261" fill="#1E66F5"/>
  <text x="580" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">A — 0.5δ: 29°, 61%</text>

  <!-- B vector: 57 deg cw, 37% -->
  <line x1="480" y1="365" x2="546" y2="336" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="559,331 549,343 543,330" fill="#1E66F5"/>
  <text x="572" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">B — 1δ: 57°, 37%</text>

  <!-- rotation arc -->
  <path d="M 492 296 A 70 70 0 0 1 544 338" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="558" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">57° per δ</text>

  <!-- footer -->
  <text x="585" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">β = x/δ — rotation reads depth, amplitude reads severity</text>
  <text x="585" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">practical phase–depth curves come from notched standards</text>
</svg>
