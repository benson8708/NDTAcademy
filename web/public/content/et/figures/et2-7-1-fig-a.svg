<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Who Outranks Whom: The ET Document Chain</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#9BC4FF">Authority flows down — every bench setting must trace back up</text>

  <!-- TIER 1: CODE -->
  <rect x="55" y="84" width="430" height="80" rx="8" fill="#1E66F5" fill-opacity="0.30" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="71" y="110" font-size="16" font-weight="bold" fill="#FFFFFF">1 · CODE / REGULATION — force of law</text>
  <text x="71" y="133" font-size="14" fill="#9BC4FF">ASME Boiler &amp; Pressure Vessel Code (adopted by jurisdictions)</text>
  <text x="71" y="152" font-size="14" fill="#9BC4FF">14 CFR Part 39 — Airworthiness Directives</text>

  <line x1="270" y1="164" x2="270" y2="179" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="270,186 263,176 277,176" fill="#9BC4FF"/>
  <text x="284" y="180" font-size="13" fill="#9BC4FF">adopts / invokes</text>

  <!-- TIER 2: STANDARDS -->
  <rect x="55" y="186" width="430" height="80" rx="8" fill="#1E66F5" fill-opacity="0.22" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="71" y="212" font-size="16" font-weight="bold" fill="#FFFFFF">2 · STANDARDS — consensus method documents</text>
  <text x="71" y="235" font-size="14" fill="#9BC4FF">ASME Section V, Article 8 · ASTM E243, E309, E426, E571,</text>
  <text x="71" y="254" font-size="14" fill="#9BC4FF">E690, E2096, E1004, E376 · AMS 2658 · MIL-STD-1537</text>

  <line x1="270" y1="266" x2="270" y2="281" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="270,288 263,278 277,278" fill="#9BC4FF"/>
  <text x="284" y="282" font-size="13" fill="#9BC4FF">invoked by the contract</text>

  <!-- TIER 3: SPECIFICATIONS -->
  <rect x="55" y="288" width="430" height="80" rx="8" fill="#1E66F5" fill-opacity="0.14" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="71" y="314" font-size="16" font-weight="bold" fill="#FFFFFF">3 · SPECIFICATIONS — contract requirements</text>
  <text x="71" y="337" font-size="14" fill="#9BC4FF">Customer and prime-contractor process specs, purchase</text>
  <text x="71" y="356" font-size="14" fill="#9BC4FF">order, drawings — binding once they are on the order</text>

  <line x1="270" y1="368" x2="270" y2="383" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="270,390 263,380 277,380" fill="#9BC4FF"/>
  <text x="284" y="384" font-size="13" fill="#9BC4FF">implemented by</text>

  <!-- TIER 4: EMPLOYER DOCUMENTS -->
  <rect x="55" y="390" width="430" height="80" rx="8" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="71" y="416" font-size="16" font-weight="bold" fill="#FFFFFF">4 · EMPLOYER DOCUMENTS — how the shop complies</text>
  <text x="71" y="439" font-size="14" fill="#9BC4FF">Written practice (SNT-TC-1A) · operating procedure</text>
  <text x="71" y="458" font-size="14" fill="#9BC4FF">(Level III approved) · technique sheet / data card</text>

  <!-- RULES PANEL -->
  <rect x="505" y="84" width="240" height="386" rx="8" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="525" y="114" font-size="17" font-weight="bold" fill="#FFFFFF">Rules of the road</text>

  <circle cx="529" cy="141" r="3.5" fill="#9BC4FF"/>
  <text x="541" y="146" font-size="14" fill="#FFFFFF">Documents disagree?</text>
  <text x="541" y="165" font-size="14" fill="#FFFFFF">The contract and the</text>
  <text x="541" y="184" font-size="14" fill="#FFFFFF">higher tier govern.</text>

  <circle cx="529" cy="212" r="3.5" fill="#9BC4FF"/>
  <text x="541" y="217" font-size="14" fill="#FFFFFF">Resolve conflicts in</text>
  <text x="541" y="236" font-size="14" fill="#FFFFFF">writing — never at</text>
  <text x="541" y="255" font-size="14" fill="#FFFFFF">the bench.</text>

  <circle cx="529" cy="283" r="3.5" fill="#9BC4FF"/>
  <text x="541" y="288" font-size="14" fill="#FFFFFF">Acceptance criteria flow</text>
  <text x="541" y="307" font-size="14" fill="#FFFFFF">down from the product</text>
  <text x="541" y="326" font-size="14" fill="#FFFFFF">spec or referencing code.</text>

  <circle cx="529" cy="354" r="3.5" fill="#9BC4FF"/>
  <text x="541" y="359" font-size="14" fill="#FFFFFF">Your procedure may be</text>
  <text x="541" y="378" font-size="14" fill="#FFFFFF">stricter than the standard</text>
  <text x="541" y="397" font-size="14" fill="#FFFFFF">— never looser.</text>

  <circle cx="529" cy="425" r="3.5" fill="#9BC4FF"/>
  <text x="541" y="430" font-size="14" fill="#FFFFFF">No current revision at</text>
  <text x="541" y="449" font-size="14" fill="#FFFFFF">the bench? No test.</text>
</svg>
