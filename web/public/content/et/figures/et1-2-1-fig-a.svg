<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Generation of Eddy Currents by an AC Field</text>

  <!-- ================= SIDE VIEW ================= -->
  <text x="40" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">SIDE VIEW — coil cross-section over the part</text>

  <!-- primary flux loops (dashed), centered on coil -->
  <ellipse cx="212" cy="162" rx="40" ry="56" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 5" opacity="0.8"/>
  <ellipse cx="212" cy="162" rx="80" ry="78" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 5" opacity="0.55"/>
  <ellipse cx="212" cy="162" rx="118" ry="92" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 5" opacity="0.4"/>
  <text x="34" y="92" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">primary flux</text>

  <!-- AC source -->
  <circle cx="68" cy="150" r="17" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 56 150 q 6 -11 12 0 q 6 11 12 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="68" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">AC drive</text>
  <line x1="84" y1="144" x2="176" y2="122" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="84" y1="156" x2="176" y2="190" stroke="#0B1F3A" stroke-width="2"/>

  <!-- coil winding cross-sections: left column current INTO page, right column OUT of page -->
  <g fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5">
    <circle cx="185" cy="120" r="9"/><circle cx="185" cy="144" r="9"/><circle cx="185" cy="168" r="9"/><circle cx="185" cy="192" r="9"/>
    <circle cx="240" cy="120" r="9"/><circle cx="240" cy="144" r="9"/><circle cx="240" cy="168" r="9"/><circle cx="240" cy="192" r="9"/>
  </g>
  <g stroke="#0B1F3A" stroke-width="2">
    <line x1="181" y1="116" x2="189" y2="124"/><line x1="189" y1="116" x2="181" y2="124"/>
    <line x1="181" y1="140" x2="189" y2="148"/><line x1="189" y1="140" x2="181" y2="148"/>
    <line x1="181" y1="164" x2="189" y2="172"/><line x1="189" y1="164" x2="181" y2="172"/>
    <line x1="181" y1="188" x2="189" y2="196"/><line x1="189" y1="188" x2="181" y2="196"/>
  </g>
  <g fill="#0B1F3A">
    <circle cx="240" cy="120" r="2.8"/><circle cx="240" cy="144" r="2.8"/><circle cx="240" cy="168" r="2.8"/><circle cx="240" cy="192" r="2.8"/>
  </g>
  <rect x="256" y="103" width="64" height="17" fill="#FFFFFF" opacity="0.9"/>
  <text x="262" y="116" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">test coil</text>

  <!-- conductive part -->
  <rect x="40" y="235" width="340" height="80" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="210" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">conductive test part</text>

  <!-- eddy currents end-on: OUT of page under left winding, INTO page under right winding; fading with depth -->
  <g>
    <circle cx="160" cy="254" r="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
    <circle cx="160" cy="254" r="2.6" fill="#1E66F5"/>
    <circle cx="264" cy="254" r="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
    <line x1="260" y1="250" x2="268" y2="258" stroke="#1E66F5" stroke-width="2"/>
    <line x1="268" y1="250" x2="260" y2="258" stroke="#1E66F5" stroke-width="2"/>
  </g>
  <g opacity="0.55">
    <circle cx="160" cy="277" r="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
    <circle cx="160" cy="277" r="2" fill="#1E66F5"/>
    <circle cx="264" cy="277" r="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
    <line x1="261" y1="274" x2="267" y2="280" stroke="#1E66F5" stroke-width="2"/>
    <line x1="267" y1="274" x2="261" y2="280" stroke="#1E66F5" stroke-width="2"/>
  </g>
  <text x="210" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">eddy-current loop end-on: • out of page, × into page</text>
  <text x="210" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">strongest at the surface — fading with depth</text>

  <!-- ================= TOP VIEW ================= -->
  <text x="425" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">TOP VIEW — looking down on the part</text>
  <rect x="420" y="80" width="350" height="240" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>

  <text x="595" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil current — clockwise this instant</text>

  <!-- eddy-current loops (counterclockwise) -->
  <circle cx="595" cy="196" r="65" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="595" cy="196" r="90" fill="none" stroke="#1E66F5" stroke-width="2.5" opacity="0.8"/>
  <circle cx="595" cy="196" r="115" fill="none" stroke="#1E66F5" stroke-width="2" opacity="0.6"/>
  <!-- CCW arrowheads: top pointing left, bottom pointing right -->
  <polygon points="595,125 595,137 581,131" fill="#1E66F5"/>
  <polygon points="595,100 595,112 581,106" fill="#1E66F5" opacity="0.8"/>
  <polygon points="595,255 595,267 609,261" fill="#1E66F5"/>
  <polygon points="595,280 595,292 609,286" fill="#1E66F5" opacity="0.8"/>

  <!-- coil footprint (dashed, clockwise) -->
  <circle cx="595" cy="196" r="40" fill="none" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="595,150 595,162 609,156" fill="#0B1F3A"/>
  <circle cx="595" cy="196" r="3" fill="#0B1F3A"/>

  <text x="595" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">eddy currents mirror the coil winding —</text>
  <text x="595" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">opposite in direction (Lenz's law)</text>

  <!-- ================= ENERGY-TRANSFER CHAIN ================= -->
  <text x="40" y="376" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">THE ENERGY-TRANSFER CHAIN</text>

  <g fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2">
    <rect x="30" y="384" width="128" height="76" rx="8"/>
    <rect x="183" y="384" width="128" height="76" rx="8"/>
    <rect x="336" y="384" width="128" height="76" rx="8"/>
    <rect x="489" y="384" width="128" height="76" rx="8"/>
    <rect x="642" y="384" width="128" height="76" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle">
    <text x="94" y="416">AC oscillator</text><text x="94" y="436">drives the coil</text>
    <text x="247" y="408">alternating</text><text x="247" y="426">current in</text><text x="247" y="444">the windings</text>
    <text x="400" y="408">primary field</text><text x="400" y="426">rises, collapses,</text><text x="400" y="444">reverses</text>
    <text x="553" y="408">changing flux</text><text x="553" y="426">penetrates the</text><text x="553" y="444">conductor</text>
    <text x="706" y="408">EMF drives</text><text x="706" y="426">closed loops of</text><text x="706" y="444">eddy current</text>
  </g>
  <g stroke="#1E66F5" stroke-width="3">
    <line x1="160" y1="422" x2="174" y2="422"/>
    <line x1="313" y1="422" x2="327" y2="422"/>
    <line x1="466" y1="422" x2="480" y2="422"/>
    <line x1="619" y1="422" x2="633" y2="422"/>
  </g>
  <g fill="#1E66F5">
    <polygon points="174,416 174,428 182,422"/>
    <polygon points="327,416 327,428 335,422"/>
    <polygon points="480,416 480,428 488,422"/>
    <polygon points="633,416 633,428 641,422"/>
  </g>
</svg>
