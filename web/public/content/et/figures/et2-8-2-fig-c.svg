<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Bobbin Display: ID and OD Families Converge at Through-Wall</text>

  <!-- display backdrop -->
  <circle cx="400" cy="272" r="140" fill="#9BC4FF" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="254" y1="272" x2="546" y2="272" stroke="#0B1F3A" stroke-width="1.2"/>
  <line x1="400" y1="126" x2="400" y2="418" stroke="#0B1F3A" stroke-width="1.2"/>

  <!-- wobble reference -->
  <line x1="400" y1="272" x2="536" y2="272" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="552" y="277" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">probe wobble — horizontal</text>

  <!-- through-wall hole at 40 deg -->
  <line x1="400" y1="272" x2="498" y2="190" stroke="#0B1F3A" stroke-width="4"/>
  <polygon points="507,182 500,195 493,187" fill="#0B1F3A"/>
  <text x="516" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">100% through-wall ≈ 40°</text>

  <!-- ID family (near surface) -->
  <line x1="400" y1="272" x2="494" y2="252" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="494" cy="252" r="4" fill="#1E66F5"/>
  <text x="506" y="257" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">shallow ID</text>

  <line x1="400" y1="272" x2="497" y2="216" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="497" cy="216" r="4" fill="#1E66F5"/>
  <text x="508" y="221" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">deep ID</text>

  <!-- OD family (far surface) -->
  <line x1="400" y1="272" x2="313" y2="244" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="313" cy="244" r="4" fill="#1E66F5"/>
  <text x="302" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">shallow OD</text>

  <line x1="400" y1="272" x2="360" y2="163" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="360" cy="163" r="4" fill="#1E66F5"/>
  <text x="350" y="152" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">deeper OD</text>

  <!-- family rotation arcs -->
  <path d="M 525 255 A 126 126 0 0 0 502 198" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4 4"/>
  <polygon points="502,198 506,210 512,205" fill="#1E66F5"/>
  <path d="M 283 225 A 126 126 0 0 1 488 181" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4 4"/>
  <polygon points="488,181 482,170 477,176" fill="#1E66F5"/>

  <!-- annotations -->
  <text x="400" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">ID (near) family: wobble → 40° as depth grows</text>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">OD (far) family: ≈170° → 40° as depth grows</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">equal volts ≠ equal depth — read depth from the phase–depth curve</text>

  <!-- ================= RULE STRIP ================= -->
  <rect x="40" y="428" width="720" height="58" rx="8" fill="#9BC4FF" fill-opacity="0.15" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Prime frequency near f₉₀ = 3ρ ÷ t² spreads ID and OD ≈ 90° (wall ≈ 1.1δ thick at f₉₀)</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Calibrate on the ASME V, Article 8 reference tube; mixes remove support-plate signals</text>
</svg>
