<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Eddy Current Testing: Two Centuries of Milestones</text>

  <!-- ===== Row 1: founding physics ===== -->
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5" letter-spacing="2">FOUNDING PHYSICS · 1824–1873</text>

  <line x1="60" y1="165" x2="738" y2="165" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="738,157 756,165 738,173" fill="#9BC4FF"/>

  <!-- 1824 Arago (above) -->
  <text x="130" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1824</text>
  <text x="130" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Arago: spinning copper</text>
  <text x="130" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">disk drags a needle</text>
  <line x1="130" y1="146" x2="130" y2="154" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="130" cy="165" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>

  <!-- 1831 Faraday (below) -->
  <circle cx="300" cy="165" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="300" y1="176" x2="300" y2="184" stroke="#9BC4FF" stroke-width="2"/>
  <text x="300" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1831</text>
  <text x="300" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Faraday discovers</text>
  <text x="300" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">electromagnetic induction</text>

  <!-- 1834 Lenz (above) -->
  <text x="470" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1834</text>
  <text x="470" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Lenz: induced currents</text>
  <text x="470" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">oppose their cause</text>
  <line x1="470" y1="146" x2="470" y2="154" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="470" cy="165" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>

  <!-- 1864-73 Maxwell (below) -->
  <circle cx="640" cy="165" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="640" y1="176" x2="640" y2="184" stroke="#9BC4FF" stroke-width="2"/>
  <text x="640" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1864–73</text>
  <text x="640" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Maxwell: unified field</text>
  <text x="640" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">equations</text>

  <!-- ===== Row 2: engineering the method ===== -->
  <text x="400" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5" letter-spacing="2">ENGINEERING THE METHOD · 1879–TODAY</text>

  <line x1="60" y1="385" x2="738" y2="385" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="738,377 756,385 738,393" fill="#9BC4FF"/>

  <!-- 1879 Hughes (above) -->
  <text x="110" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1879</text>
  <text x="110" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Hughes: induction</text>
  <text x="110" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">balance sorts metals</text>
  <line x1="110" y1="364" x2="110" y2="374" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="110" cy="385" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>

  <!-- 1930s vacuum tubes (below) -->
  <circle cx="260" cy="385" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="260" y1="396" x2="260" y2="404" stroke="#9BC4FF" stroke-width="2"/>
  <text x="260" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1930s</text>
  <text x="260" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">vacuum-tube systems</text>
  <text x="260" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">test mill bar and tube</text>

  <!-- 1948+ Foerster (above) -->
  <text x="410" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1948–52</text>
  <text x="410" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Förster: quantitative ET,</text>
  <text x="410" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">impedance-plane analysis</text>
  <line x1="410" y1="364" x2="410" y2="374" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="410" cy="385" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>

  <!-- 1960s-70s transistors (below) -->
  <circle cx="555" cy="385" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="555" y1="396" x2="555" y2="404" stroke="#9BC4FF" stroke-width="2"/>
  <text x="555" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1960s–70s</text>
  <text x="555" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">transistor portables;</text>
  <text x="555" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">aerospace and nuclear</text>

  <!-- 1980s-today digital (above) -->
  <text x="700" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1980s–today</text>
  <text x="700" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">digital instruments,</text>
  <text x="700" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">eddy current arrays</text>
  <line x1="700" y1="364" x2="700" y2="374" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="700" cy="385" r="9" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
</svg>
