<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Rotate Lift-Off Flat: Before and After</text>

  <!-- ===== LEFT SCREEN: before rotation ===== -->
  <rect x="55" y="80" width="320" height="320" rx="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <!-- grid -->
  <line x1="55" y1="160" x2="375" y2="160" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="55" y1="240" x2="375" y2="240" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="55" y1="320" x2="375" y2="320" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="135" y1="80" x2="135" y2="400" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="215" y1="80" x2="215" y2="400" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="295" y1="80" x2="295" y2="400" stroke="#9BC4FF" stroke-width="1"/>

  <!-- lift-off excursion: angled, sharing the vertical -->
  <line x1="215" y1="310" x2="122" y2="196" stroke="#9BC4FF" stroke-width="5"/>
  <polygon points="131,196 113,185 122,210" fill="#9BC4FF"/>
  <text x="118" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">lift-off</text>

  <!-- notch lobe -->
  <path d="M 215 310 C 232 252 250 185 264 142 C 268 160 254 240 226 308" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <text x="272" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">notch</text>

  <!-- null point -->
  <circle cx="215" cy="310" r="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="215" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <text x="215" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wobble climbs too — false alarms</text>

  <text x="215" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">BEFORE — lift-off shares the vertical</text>

  <!-- ===== RIGHT SCREEN: after rotation ===== -->
  <rect x="425" y="80" width="320" height="320" rx="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <!-- grid -->
  <line x1="425" y1="160" x2="745" y2="160" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="425" y1="240" x2="745" y2="240" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="425" y1="320" x2="745" y2="320" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="505" y1="80" x2="505" y2="400" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="585" y1="80" x2="585" y2="400" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="665" y1="80" x2="665" y2="400" stroke="#9BC4FF" stroke-width="1"/>

  <!-- vertical alarm gate -->
  <rect x="542" y="100" width="110" height="180" fill="#9BC4FF" opacity="0.3"/>
  <rect x="542" y="100" width="110" height="180" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="660" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">alarm gate</text>
  <text x="660" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">watches the</text>
  <text x="660" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">vertical</text>

  <!-- lift-off excursion: horizontal toward air point -->
  <line x1="585" y1="310" x2="462" y2="310" stroke="#9BC4FF" stroke-width="5"/>
  <polygon points="468,303 448,310 468,317" fill="#9BC4FF"/>
  <text x="510" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">lift-off &#8594; air point</text>

  <!-- notch lobe: near vertical, into the gate -->
  <path d="M 585 310 C 590 250 598 178 606 138 C 610 158 602 245 592 308" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <text x="600" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">notch breaks upward</text>

  <!-- null point -->
  <circle cx="585" cy="310" r="7" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="585" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">null</text>

  <text x="585" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">AFTER — wobble runs flat, cracks break upward</text>

  <!-- bottom note -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Phase rotation spins the presentation only — the impedance relationships underneath never change.</text>
</svg>
