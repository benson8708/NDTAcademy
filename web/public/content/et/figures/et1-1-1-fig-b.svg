<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Founders' Physics Inside Every ET Probe</text>

  <!-- AC source -->
  <circle cx="120" cy="120" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 102 120 q 9 -16 18 0 q 9 16 18 0" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="120" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">alternating current</text>

  <!-- wires from source to coil -->
  <line x1="144" y1="112" x2="225" y2="112" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="144" y1="128" x2="225" y2="128" stroke="#0B1F3A" stroke-width="2"/>

  <!-- primary field (dashed, surrounds coil, enters part) -->
  <ellipse cx="280" cy="205" rx="68" ry="60" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7,5"/>
  <ellipse cx="280" cy="205" rx="100" ry="88" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="148" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">primary field</text>

  <!-- test coil -->
  <rect x="225" y="100" width="110" height="110" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="225" y1="122" x2="335" y2="122" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="225" y1="144" x2="335" y2="144" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="225" y1="166" x2="335" y2="166" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="225" y1="188" x2="335" y2="188" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="280" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">TEST COIL</text>

  <!-- opposing fields in the gap -->
  <text x="243" y="218" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">coil field</text>
  <line x1="250" y1="224" x2="250" y2="256" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="243,254 257,254 250,268" fill="#1E66F5"/>
  <text x="318" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">eddy-current field</text>
  <line x1="310" y1="266" x2="310" y2="234" stroke="#0B1F3A" stroke-width="4"/>
  <polygon points="303,236 317,236 310,222" fill="#0B1F3A"/>

  <!-- conductive part with eddy currents -->
  <rect x="60" y="270" width="380" height="130" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="280" cy="320" rx="28" ry="10" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="280" cy="320" rx="50" ry="18" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <ellipse cx="280" cy="320" rx="72" ry="26" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="346,312 358,312 352,326" fill="#0B1F3A"/>
  <text x="280" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">eddy currents</text>
  <text x="78" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">CONDUCTIVE TEST PART</text>

  <!-- leader lines to cards -->
  <line x1="470" y1="100" x2="340" y2="150" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="470" y1="210" x2="324" y2="242" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="470" y1="315" x2="360" y2="330" stroke="#9BC4FF" stroke-width="2.5"/>

  <!-- card 1: Faraday -->
  <rect x="470" y="62" width="310" height="92" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="484" y="88" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">FARADAY · 1831</text>
  <text x="484" y="109" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Alternating current in the coil makes a</text>
  <text x="484" y="127" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">changing magnetic field, which induces</text>
  <text x="484" y="145" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">currents in any nearby conductor.</text>

  <!-- card 2: Lenz -->
  <rect x="470" y="166" width="310" height="92" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="484" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">LENZ · 1834</text>
  <text x="484" y="213" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">The induced eddy currents flow so their</text>
  <text x="484" y="231" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">field opposes the coil's field — the part</text>
  <text x="484" y="249" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pushes back and loads the coil.</text>

  <!-- card 3: Arago -->
  <rect x="470" y="270" width="310" height="92" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="484" y="296" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">ARAGO · 1824</text>
  <text x="484" y="317" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">First to see the effect: a spinning</text>
  <text x="484" y="335" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">copper disk dragged a compass needle</text>
  <text x="484" y="353" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">through these same induced currents.</text>

  <!-- card 4: Maxwell -->
  <rect x="470" y="374" width="310" height="92" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="484" y="400" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">MAXWELL · 1864–73</text>
  <text x="484" y="421" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">His field equations predict it all —</text>
  <text x="484" y="439" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">skin depth, probe response, and every</text>
  <text x="484" y="457" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">curve on an impedance-plane display.</text>

  <!-- signal footer -->
  <rect x="60" y="424" width="380" height="56" rx="8" fill="#0B1F3A"/>
  <text x="250" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">THE SIGNAL: the part's pushback changes</text>
  <text x="250" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">the coil's impedance — measure that change</text>
</svg>
