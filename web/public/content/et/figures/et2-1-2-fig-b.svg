<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Circumferential Cracks: Bobbin vs Rotating Pancake</text>

  <!-- panel divider -->
  <line x1="400" y1="60" x2="400" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ================= LEFT: STANDARD BOBBIN ================= -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Standard bobbin (ID) coil</text>

  <!-- crack labels above wall -->
  <text x="240" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">longitudinal crack</text>
  <line x1="240" y1="130" x2="240" y2="142" stroke="#0B1F3A" stroke-width="1"/>

  <!-- tube wall cutaway -->
  <rect x="36" y="142" width="330" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="36" y="290" width="330" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>

  <!-- longitudinal crack (along tube axis) -->
  <polyline points="216,150 228,146 240,153 252,147 264,151" stroke="#0B1F3A" stroke-width="3" fill="none"/>

  <!-- circumferential crack (across wall, around the tube) -->
  <line x1="320" y1="142" x2="320" y2="158" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="320" y1="162" x2="320" y2="172" stroke="#0B1F3A" stroke-width="1"/>
  <text x="320" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">circ. crack</text>

  <!-- bobbin probe -->
  <rect x="118" y="200" width="56" height="40" rx="6" fill="#1E66F5"/>
  <line x1="130" y1="204" x2="130" y2="236" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="162" y1="204" x2="162" y2="236" stroke="#FFFFFF" stroke-width="2"/>

  <!-- cable and pull arrow -->
  <line x1="36" y1="220" x2="118" y2="220" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="60,214 60,226 44,220" fill="#0B1F3A"/>
  <text x="84" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pull</text>

  <!-- circumferential current loop -->
  <ellipse cx="146" cy="224" rx="15" ry="84" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="148,134 148,146 158,140" fill="#1E66F5"/>
  <text x="200" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">currents circle the wall</text>

  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">longitudinal crack cuts the currents &#8212; strong</text>
  <text x="200" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">circumferential crack lies parallel &#8212;</text>
  <text x="200" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">weak or missed at any setting</text>

  <text x="200" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">fast: full length, 360&#176; each instant</text>
  <text x="200" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no position around the tube</text>

  <!-- ================= RIGHT: ROTATING PANCAKE ================= -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Rotating pancake (RPC) / array</text>

  <!-- crack label -->
  <text x="688" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">circ. crack &#8212; detected</text>
  <line x1="688" y1="130" x2="686" y2="140" stroke="#0B1F3A" stroke-width="1"/>

  <!-- tube wall cutaway -->
  <rect x="436" y="142" width="330" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="436" y="290" width="330" height="16" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>

  <!-- circumferential crack -->
  <line x1="686" y1="142" x2="686" y2="158" stroke="#0B1F3A" stroke-width="3.5"/>

  <!-- small circular eddy loops in the wall under the coil -->
  <ellipse cx="560" cy="150" rx="15" ry="5" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <ellipse cx="560" cy="150" rx="8" ry="2.5" fill="none" stroke="#1E66F5" stroke-width="2"/>

  <!-- pancake coil head against the wall -->
  <rect x="548" y="162" width="24" height="13" rx="3" fill="#1E66F5"/>
  <line x1="560" y1="175" x2="530" y2="204" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- probe body and shaft -->
  <rect x="478" y="202" width="64" height="28" rx="6" fill="#1E66F5"/>
  <line x1="436" y1="216" x2="478" y2="216" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="456,210 456,222 442,216" fill="#0B1F3A"/>
  <text x="457" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pull</text>

  <!-- rotation arc -->
  <path d="M 538 186 A 22 10 0 0 0 582 186" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="578,180 590,186 578,192" fill="#0B1F3A"/>
  <text x="610" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">spins</text>

  <!-- helical scan path -->
  <path d="M552,244 q14,-52 28,0 q14,52 28,0 q14,-52 28,0 q14,52 28,0 q14,-52 28,0 q14,52 28,0" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="720,238 732,244 720,250" fill="#9BC4FF"/>
  <text x="640" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">helical scan path</text>

  <text x="600" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">small loops &#8212; cut by any surface orientation</text>
  <text x="600" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rotation reports clock position</text>
  <text x="600" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">slow &#8212; target known locations</text>

  <text x="600" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">array: ring of coils, multiplexed &#8212;</text>
  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">RPC-like coverage, no moving parts</text>
</svg>
