<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0B1F3A">Block Diagram of an Eddy Current Instrument</text>
  <text x="400" y="58" text-anchor="middle" font-size="15" fill="#1E66F5">every stage exists to make a tiny impedance change visible</text>

  <!-- phase reference line from oscillator to phase detector -->
  <path d="M 88 120 L 88 92 L 545 92 L 545 112" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="540,112 550,112 545,120" fill="#1E66F5"/>
  <text x="316" y="86" text-anchor="middle" font-size="14" font-style="italic" fill="#1E66F5">phase reference</text>

  <!-- stage 1: oscillator -->
  <rect x="28" y="120" width="120" height="80" rx="6" fill="#0B1F3A"/>
  <text x="88" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">OSCILLATOR</text>
  <text x="88" y="172" text-anchor="middle" font-size="14" fill="#9BC4FF">constant AC</text>
  <text x="88" y="190" text-anchor="middle" font-size="14" fill="#9BC4FF">at frequency f</text>

  <line x1="148" y1="160" x2="174" y2="160" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="174,154 174,166 182,160" fill="#0B1F3A"/>

  <!-- stage 2: balance bridge -->
  <rect x="182" y="120" width="120" height="80" rx="6" fill="#0B1F3A"/>
  <text x="242" y="144" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">BALANCE</text>
  <text x="242" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">BRIDGE</text>
  <text x="242" y="186" text-anchor="middle" font-size="14" fill="#9BC4FF">press = null</text>

  <line x1="302" y1="160" x2="328" y2="160" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="328,154 328,166 336,160" fill="#0B1F3A"/>

  <!-- stage 3: amplifier -->
  <rect x="336" y="120" width="110" height="80" rx="6" fill="#0B1F3A"/>
  <text x="391" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">AMPLIFIER</text>
  <text x="391" y="172" text-anchor="middle" font-size="14" fill="#9BC4FF">boosts the</text>
  <text x="391" y="190" text-anchor="middle" font-size="14" fill="#9BC4FF">imbalance</text>

  <line x1="446" y1="160" x2="472" y2="160" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="472,154 472,166 480,160" fill="#0B1F3A"/>

  <!-- stage 4: phase detector -->
  <rect x="480" y="120" width="130" height="80" rx="6" fill="#0B1F3A"/>
  <text x="545" y="144" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">PHASE</text>
  <text x="545" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">DETECTOR</text>
  <text x="545" y="186" text-anchor="middle" font-size="14" fill="#9BC4FF">splits to H + V</text>

  <line x1="610" y1="160" x2="636" y2="160" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="636,154 636,166 644,160" fill="#0B1F3A"/>

  <!-- stage 5: display -->
  <rect x="644" y="120" width="130" height="80" rx="6" fill="#0B1F3A"/>
  <rect x="654" y="130" width="110" height="44" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="660" y1="152" x2="758" y2="152" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="709" y1="134" x2="709" y2="170" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="680" cy="152" r="3" fill="#1E66F5"/>
  <path d="M 680 152 C 695 149 706 136 716 140 C 724 143 710 151 696 152" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="709" y="192" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">DISPLAY</text>

  <!-- alarm gate under display -->
  <line x1="709" y1="200" x2="709" y2="235" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="659" y="235" width="100" height="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="709" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">ALARM GATE</text>
  <text x="709" y="288" text-anchor="middle" font-size="14" fill="#1E66F5">go / no-go</text>

  <!-- probe cable down from bridge -->
  <line x1="242" y1="200" x2="242" y2="252" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="252" y="230" font-size="14" font-style="italic" fill="#1E66F5">probe cable</text>

  <!-- test coil probe -->
  <rect x="226" y="252" width="32" height="40" rx="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="231" y1="262" x2="253" y2="262" stroke="#1E66F5" stroke-width="2"/>
  <line x1="231" y1="270" x2="253" y2="270" stroke="#1E66F5" stroke-width="2"/>
  <line x1="231" y1="278" x2="253" y2="278" stroke="#1E66F5" stroke-width="2"/>
  <text x="268" y="276" font-size="15" font-weight="bold" fill="#0B1F3A">TEST COIL</text>

  <!-- test part with crack and eddy currents -->
  <rect x="110" y="300" width="320" height="90" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="236,300 248,300 242,338" fill="#0B1F3A"/>
  <ellipse cx="176" cy="324" rx="48" ry="11" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
  <ellipse cx="308" cy="324" rx="48" ry="11" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="176" y="354" text-anchor="middle" font-size="14" fill="#1E66F5">eddy currents</text>
  <text x="122" y="380" font-size="14" fill="#0B1F3A">conductive test part</text>
  <text x="270" y="412" text-anchor="middle" font-size="15" fill="#0B1F3A">crack interrupts the eddy currents &#8594; coil impedance Z changes</text>

  <!-- signal story, right side -->
  <text x="455" y="318" font-size="15" fill="#0B1F3A">&#916;Z &#8212; impedance change at the coil</text>
  <line x1="462" y1="325" x2="462" y2="334" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="458,334 466,334 462,340" fill="#1E66F5"/>
  <text x="455" y="358" font-size="15" fill="#0B1F3A">&#916;V &#8212; voltage imbalance (V = I &#215; Z)</text>
  <line x1="462" y1="365" x2="462" y2="374" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="458,374 466,374 462,380" fill="#1E66F5"/>
  <text x="455" y="398" font-size="15" fill="#0B1F3A">amplified, then split into H + V</text>
  <line x1="462" y1="405" x2="462" y2="414" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="458,414 466,414 462,420" fill="#1E66F5"/>
  <text x="455" y="438" font-size="15" fill="#0B1F3A">the dot moves on the display</text>

  <text x="400" y="478" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">You are watching the coil's voltage &#8212; never the eddy currents themselves</text>
</svg>
