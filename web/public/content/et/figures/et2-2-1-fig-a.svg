<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arwWa" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arwBa" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
    <marker id="arwMa" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#1E66F5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">The Normalized Impedance Plane: One Curve for Every Alloy</text>

  <!-- ================= axes ================= -->
  <line x1="140" y1="78" x2="140" y2="440" stroke="#9BC4FF" stroke-width="1.5" opacity="0.85"/>
  <line x1="140" y1="440" x2="530" y2="440" stroke="#9BC4FF" stroke-width="1.5" opacity="0.85"/>
  <text x="58" y="270" transform="rotate(-90 58 270)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">normalized reactance  &#969;L / &#969;L&#8320;</text>
  <text x="335" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">normalized resistance  R / &#969;L&#8320;</text>

  <!-- ticks -->
  <line x1="133" y1="100" x2="140" y2="100" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="126" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">1.0</text>
  <line x1="133" y1="270" x2="140" y2="270" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="126" y="275" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">0.5</text>
  <text x="126" y="445" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">0</text>

  <!-- ferromagnetic direction -->
  <line x1="146" y1="92" x2="192" y2="60" stroke="#9BC4FF" stroke-width="2.5" marker-end="url(#arwBa)"/>
  <text x="202" y="62" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">ferromagnetic alloys ride up here (&#956;r &#8811; 1)</text>

  <!-- ================= conductivity curve ================= -->
  <path d="M 140 100 C 148 107 155 113 163 121 C 168 127 173 132 178 138 C 196 161 215 186 226 207 C 227 210 229 214 230 217 C 234 230 238 244 240 258 C 240 270 240 283 239 295 C 237 308 233 321 227 333 C 213 360 195 383 172 404"
        fill="none" stroke="#1E66F5" stroke-width="3.5" marker-end="url(#arwMa)"/>
  <text x="185" y="428" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">f &#215; &#963; &#215; &#956; increasing</text>

  <!-- air point -->
  <circle cx="140" cy="100" r="5.5" fill="#FFFFFF"/>
  <text x="134" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">air point (0, 1.0)</text>

  <!-- knee region -->
  <ellipse cx="239" cy="277" rx="20" ry="46" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <text x="208" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.9">knee region</text>

  <!-- alloy points -->
  <circle cx="163" cy="121" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="180" y="117" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Ti-6Al-4V &#8776;1%</text>
  <circle cx="178" cy="138" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="195" y="142" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">304 SS &#8776;2.5%</text>
  <circle cx="226" cy="207" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="243" y="204" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">brass &#8776;28%</text>
  <circle cx="230" cy="217" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="247" y="226" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">2024-T4 &#8776;30%</text>
  <circle cx="240" cy="258" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="262" y="252" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">6061-T6 &#8776;43%</text>
  <circle cx="239" cy="295" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="258" y="302" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">aluminum &#8776;61%</text>
  <circle cx="227" cy="333" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.2"/>
  <text x="244" y="337" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">copper 100%</text>

  <!-- lift-off vectors (point toward air point) -->
  <line x1="236" y1="252" x2="216" y2="220" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwWa)"/>
  <text x="210" y="214" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">lift-off</text>
  <line x1="225" y1="326" x2="211" y2="291" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwWa)"/>

  <!-- ================= right notes ================= -->
  <text x="560" y="100" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Why one curve serves all coils</text>
  <text x="560" y="124" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Both axes are divided by the</text>
  <text x="560" y="144" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">empty-coil reactance &#969;L&#8320;.</text>

  <text x="560" y="186" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">What sets curve position</text>
  <text x="560" y="210" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">The product f &#215; &#963; &#215; &#956; fixes the</text>
  <text x="560" y="230" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">spot &#8212; raising frequency</text>
  <text x="560" y="250" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">slides every alloy farther</text>
  <text x="560" y="270" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">down the curve.</text>

  <text x="560" y="312" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">The knee</text>
  <text x="560" y="336" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">The mid-curve bend gives the</text>
  <text x="560" y="356" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">best angle between lift-off</text>
  <text x="560" y="376" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">and conductivity &#8212; meters park</text>
  <text x="560" y="396" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">aluminum alloys here (&#8776;60 kHz).</text>

  <text x="560" y="434" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Resistance rises, then falls &#8212;</text>
  <text x="560" y="454" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">a perfect conductor wastes</text>
  <text x="560" y="474" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">no energy.</text>
</svg>
