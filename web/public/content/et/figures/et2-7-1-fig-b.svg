<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Anatomy of an ET Practice — Where Requirements Live</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#9BC4FF">Read scope first; trace acceptance criteria upstream before you test</text>

  <!-- DOCUMENT PAGE -->
  <rect x="60" y="84" width="280" height="392" rx="8" fill="#1E66F5" fill-opacity="0.10" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="200" y="107" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">ASTM-STYLE ET PRACTICE</text>
  <line x1="60" y1="118" x2="340" y2="118" stroke="#9BC4FF" stroke-width="1"/>

  <rect x="66" y="127" width="268" height="28" rx="4" fill="#1E66F5" fill-opacity="0.38"/>
  <text x="78" y="146" font-size="15" font-weight="bold" fill="#FFFFFF">1  Scope</text>
  <text x="78" y="180" font-size="15" fill="#9BC4FF">2  Referenced documents</text>
  <text x="78" y="214" font-size="15" fill="#9BC4FF">3  Terminology</text>
  <text x="78" y="248" font-size="15" fill="#9BC4FF">4  Significance and use</text>
  <text x="78" y="282" font-size="15" fill="#9BC4FF">5  Apparatus</text>
  <rect x="66" y="297" width="268" height="28" rx="4" fill="#1E66F5" fill-opacity="0.38"/>
  <text x="78" y="316" font-size="15" font-weight="bold" fill="#FFFFFF">6  Reference standard</text>
  <rect x="66" y="331" width="268" height="28" rx="4" fill="#1E66F5" fill-opacity="0.38"/>
  <text x="78" y="350" font-size="15" font-weight="bold" fill="#FFFFFF">7  Standardization</text>
  <rect x="66" y="365" width="268" height="28" rx="4" fill="#1E66F5" fill-opacity="0.38"/>
  <text x="78" y="384" font-size="15" font-weight="bold" fill="#FFFFFF">8  Procedure</text>
  <rect x="66" y="399" width="268" height="28" rx="4" fill="#1E66F5" fill-opacity="0.38"/>
  <text x="78" y="418" font-size="15" font-weight="bold" fill="#FFFFFF">9  Acceptance criteria *</text>
  <text x="78" y="452" font-size="15" fill="#9BC4FF">10  Report and records</text>

  <!-- ANNOTATIONS -->
  <rect x="372" y="88" width="388" height="64" rx="6" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="386" y="110" font-size="15" font-weight="bold" fill="#FFFFFF">1 · Scope — does this document apply?</text>
  <text x="386" y="130" font-size="14" fill="#9BC4FF">Material, product form, and size range.</text>
  <text x="386" y="148" font-size="14" fill="#9BC4FF">Titanium tube is not in the copper practice.</text>

  <rect x="372" y="164" width="388" height="64" rx="6" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="386" y="186" font-size="15" font-weight="bold" fill="#FFFFFF">6 · Reference standard</text>
  <text x="386" y="206" font-size="14" fill="#9BC4FF">Artificial discontinuity type and size —</text>
  <text x="386" y="224" font-size="14" fill="#9BC4FF">drilled holes or notches, from its tables.</text>

  <rect x="372" y="240" width="388" height="64" rx="6" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="386" y="262" font-size="15" font-weight="bold" fill="#FFFFFF">7 · Standardization</text>
  <text x="386" y="282" font-size="14" fill="#9BC4FF">Re-verify at set intervals. A failed check =</text>
  <text x="386" y="300" font-size="14" fill="#9BC4FF">re-examine all product since the last good one.</text>

  <rect x="372" y="316" width="388" height="64" rx="6" fill="#1E66F5" fill-opacity="0.08" stroke="#9BC4FF" stroke-width="1"/>
  <text x="386" y="338" font-size="15" font-weight="bold" fill="#FFFFFF">8 · Procedure</text>
  <text x="386" y="358" font-size="14" fill="#9BC4FF">Test frequency, fill factor, speed, coverage —</text>
  <text x="386" y="376" font-size="14" fill="#9BC4FF">the values your technique sheet must copy.</text>

  <rect x="372" y="392" width="388" height="72" rx="6" fill="#1E66F5" fill-opacity="0.08" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="386" y="414" font-size="15" font-weight="bold" fill="#FFFFFF">9 · Acceptance criteria — often not here!</text>
  <text x="386" y="434" font-size="14" fill="#9BC4FF">* Many practices defer accept / reject to the</text>
  <text x="386" y="452" font-size="14" fill="#9BC4FF">product spec or purchase order. Trace it first.</text>
</svg>
