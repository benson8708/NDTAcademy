<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Thinning and Cladding — Two More Thickness Jobs</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">put the current where the answer lives: wall near 1δ for thinning, δ near the coating for cladding</text>

  <!-- left: step wedge / thinning -->
  <text x="60" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">metal thinning — phase vs remaining wall</text>

  <rect x="85" y="252" width="30" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="90" y1="288" x2="110" y2="288" stroke="#1E66F5" stroke-width="2"/>
  <line x1="130" y1="268" x2="200" y2="268" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="212,268 196,262 196,274" fill="#1E66F5"/>
  <text x="226" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">scan from the good side</text>

  <path d="M 60,300 L 380,300 L 380,356 L 300,356 L 300,364 L 220,364 L 220,372 L 140,372 L 140,380 L 60,380 Z" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <text x="100" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">100%</text>
  <text x="180" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">90%</text>
  <text x="260" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">80%</text>
  <text x="340" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">70%</text>
  <line x1="60" y1="380" x2="380" y2="380" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="386" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">1δ</text>

  <text x="220" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">set f so the nominal wall sits near 1δ — f = (660/t)² ÷ (µᵣ·σ)</text>
  <text x="220" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">≈6 kHz for 1.6 mm 2024-T3 · each step of thinning rotates phase</text>
  <text x="220" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">standard: same-alloy step wedge, 100/90/80/70% of nominal</text>

  <!-- right: cladding / apparent conductivity -->
  <text x="430" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">conductive cladding — apparent conductivity</text>
  <text x="585" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">clad ≈60 %IACS (pure Al)</text>
  <rect x="430" y="118" width="310" height="12" fill="#1E66F5" fill-opacity="0.5" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="430" y="130" width="310" height="58" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="585" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">core ≈30 %IACS (2024)</text>

  <line x1="470" y1="220" x2="470" y2="440" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="470" y1="440" x2="740" y2="440" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="447" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A" transform="rotate(-90 447 335)">apparent conductivity (%IACS)</text>
  <text x="605" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">test frequency →</text>

  <line x1="470" y1="414" x2="740" y2="414" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="464" y="418" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">30</text>
  <line x1="470" y1="256" x2="740" y2="256" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="464" y="260" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">60</text>

  <path d="M 480,410 C 580,404 600,272 730,262" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="594" cy="338" r="5" fill="#1E66F5"/>
  <text x="606" y="343" text-anchor="start" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">60 kHz on alclad</text>
  <text x="606" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">reads high</text>

  <text x="605" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">raise f → δ shrinks into the clad →</text>
  <text x="605" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">reading slides toward the clad value</text>

  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">deliberate: a thickness gauge built on coating-on-base standards · accidental: the alclad bias on conductivity checks</text>
</svg>
