<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB22c" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">One Scan, Three Stories: Strip Chart Across an Extrusion</text>

  <!-- axes -->
  <line x1="60" y1="395" x2="740" y2="395" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrB22c)"/>
  <line x1="60" y1="395" x2="60" y2="100" stroke="#9BC4FF" stroke-width="2" marker-end="url(#arrB22c)"/>
  <text x="70" y="92" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">signal amplitude (Y channel)</text>
  <text x="740" y="92" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">constant scan speed</text>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">probe position along the part &#8594;</text>

  <!-- balance line -->
  <line x1="60" y1="330" x2="740" y2="330" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="3 5" opacity="0.5"/>
  <text x="66" y="318" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF" opacity="0.8">balance (null)</text>

  <!-- end of part -->
  <line x1="720" y1="110" x2="720" y2="395" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="712" y="128" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">end of part</text>

  <!-- trace -->
  <polyline fill="none" stroke="#FFFFFF" stroke-width="2.5" points="
    60,330 78,327 96,332 114,328 132,331 150,329 170,330
    190,322 212,308 232,293 252,280 270,273 290,278 312,291 332,305 352,317 372,325 386,330
    402,328 418,331 434,329 446,331 452,330
    458,328 462,308 466,198 470,146 474,206 478,312 482,329
    494,330 512,331 532,328 552,331 572,329 592,331 612,330
    632,323 652,308 672,286 692,257 706,232 720,203"/>

  <!-- indication markers -->
  <circle cx="270" cy="247" r="14" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="270" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <circle cx="470" cy="118" r="14" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="470" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <circle cx="672" cy="250" r="14" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="672" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>

  <!-- probe footprint scale -->
  <line x1="455" y1="415" x2="485" y2="415" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="455" y1="409" x2="455" y2="421" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="485" y1="409" x2="485" y2="421" stroke="#9BC4FF" stroke-width="2"/>
  <text x="470" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">&#8776; probe footprint</text>
</svg>
