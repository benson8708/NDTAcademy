<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Fill Factor — Coupling for Concentric Coils</text>

  <!-- ================= LEFT: ENCIRCLING COIL ================= -->
  <text x="200" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">ENCIRCLING (OD) COIL — end view</text>

  <!-- coil winding annulus (radii 100-120) -->
  <circle cx="200" cy="250" r="110" fill="none" stroke="#9BC4FF" stroke-width="20" opacity="0.7"/>
  <circle cx="200" cy="250" r="120" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="200" cy="250" r="100" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- part: bar, radius 90 -->
  <circle cx="200" cy="250" r="90" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- winding label -->
  <line x1="123" y1="172" x2="74" y2="136" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="14" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil winding</text>

  <!-- air gap label -->
  <line x1="267" y1="183" x2="318" y2="146" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="322" y="142" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">air gap —</text>
  <text x="322" y="160" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flux that links</text>
  <text x="322" y="178" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">nothing</text>

  <!-- d dimension across the bar -->
  <text x="200" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">part (bar)</text>
  <line x1="118" y1="250" x2="282" y2="250" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="110,250 122,244 122,256" fill="#0B1F3A"/>
  <polygon points="290,250 278,244 278,256" fill="#0B1F3A"/>
  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">d = part OD</text>

  <!-- D dimension: witness lines from inner coil edge -->
  <line x1="100" y1="258" x2="100" y2="398" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="300" y1="258" x2="300" y2="398" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="106" y1="392" x2="294" y2="392" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="100,392 112,386 112,398" fill="#1E66F5"/>
  <polygon points="300,392 288,386 288,398" fill="#1E66F5"/>
  <text x="200" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">D = effective coil diameter</text>

  <!-- formula + example -->
  <text x="200" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">η = (d / D)²</text>
  <text x="200" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">19.0 mm bar, 21.0 mm coil → η = (19/21)² = 0.82</text>

  <!-- ================= RIGHT: BOBBIN COIL ================= -->
  <text x="590" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">BOBBIN (ID) COIL — end view</text>

  <!-- tube wall annulus (radii 100-120) -->
  <circle cx="590" cy="250" r="110" fill="none" stroke="#9BC4FF" stroke-width="20" opacity="0.45"/>
  <circle cx="590" cy="250" r="120" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="590" cy="250" r="100" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- bobbin probe, radius 90 -->
  <circle cx="590" cy="250" r="90" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="590" cy="250" r="80" fill="none" stroke="#1E66F5" stroke-width="3" stroke-dasharray="7 5"/>

  <!-- tube wall label -->
  <line x1="513" y1="172" x2="466" y2="136" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="462" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tube wall</text>

  <!-- air gap label -->
  <line x1="657" y1="183" x2="706" y2="146" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="710" y="142" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">air gap</text>

  <!-- d dimension across the probe -->
  <text x="590" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">bobbin probe</text>
  <line x1="508" y1="250" x2="672" y2="250" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="500,250 512,244 512,256" fill="#0B1F3A"/>
  <polygon points="680,250 668,244 668,256" fill="#0B1F3A"/>
  <text x="590" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">d = probe coil diameter</text>

  <!-- D dimension: witness lines from tube ID -->
  <line x1="490" y1="258" x2="490" y2="398" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="690" y1="258" x2="690" y2="398" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="496" y1="392" x2="684" y2="392" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="490,392 502,386 502,398" fill="#1E66F5"/>
  <polygon points="690,392 678,386 678,398" fill="#1E66F5"/>
  <text x="590" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">D = tube inside diameter</text>

  <!-- formula + example -->
  <text x="590" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">η = (d / D)²</text>
  <text x="590" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ID 16.55 mm, probe 15.0 mm → η = 0.82</text>
</svg>
