<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0B1F3A">Null, Amplitude, and Phase on the Display</text>
  <text x="400" y="58" text-anchor="middle" font-size="15" fill="#1E66F5">balance cancels the standing signal &#8212; only the change is amplified and drawn</text>

  <!-- LEFT SCREEN: balanced -->
  <text x="200" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B1F3A">BALANCED ON REFERENCE (NULL)</text>
  <rect x="70" y="112" width="260" height="252" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="80" y1="238" x2="320" y2="238" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="200" y2="356" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="200" cy="238" r="12" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="200" cy="238" r="6" fill="#1E66F5"/>
  <text x="200" y="272" text-anchor="middle" font-size="14" fill="#0B1F3A">dot rests at the null</text>
  <text x="200" y="390" text-anchor="middle" font-size="15" fill="#0B1F3A">probe on sound reference &#8212; BALANCE pressed</text>
  <text x="200" y="412" text-anchor="middle" font-size="14" fill="#1E66F5">bridge output &#8776; 0 &#8212; nothing to amplify</text>

  <!-- RIGHT SCREEN: crack signal -->
  <text x="590" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B1F3A">PROBE PASSES A CRACK</text>
  <rect x="460" y="112" width="260" height="252" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="470" y1="238" x2="710" y2="238" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="590" y1="120" x2="590" y2="356" stroke="#9BC4FF" stroke-width="1.5"/>
  <!-- liftoff direction, rotated horizontal -->
  <line x1="590" y1="238" x2="527" y2="238" stroke="#9BC4FF" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="527,233 527,243 517,238" fill="#9BC4FF"/>
  <text x="560" y="262" text-anchor="middle" font-size="14" fill="#1E66F5">liftoff (horizontal)</text>
  <!-- crack signal loop -->
  <circle cx="590" cy="238" r="4" fill="#0B1F3A"/>
  <path d="M 590 238 C 632 230 668 178 654 158 C 642 142 606 192 590 238" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="648" y="140" text-anchor="middle" font-size="14" fill="#1E66F5">flaw signal</text>
  <!-- amplitude line and phase arc -->
  <line x1="590" y1="238" x2="650" y2="160" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5,4"/>
  <path d="M 630 238 A 40 40 0 0 0 614 206" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="636" y="224" font-size="16" font-weight="bold" fill="#0B1F3A">&#952;</text>
  <text x="590" y="390" text-anchor="middle" font-size="15" fill="#0B1F3A">length = amplitude &#8212; how big the change</text>
  <text x="590" y="412" text-anchor="middle" font-size="15" fill="#0B1F3A">angle &#952; = phase &#8212; what kind of change</text>

  <text x="400" y="462" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">Same setup + same flaw = same signal &#8212; that is what standardization guarantees</text>
</svg>
