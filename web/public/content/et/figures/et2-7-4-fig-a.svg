<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Reference Standard Family</text>

  <!-- panel dividers -->
  <line x1="400" y1="46" x2="400" y2="470" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="30" y1="266" x2="770" y2="266" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ============ PANEL 1: EDM-notch surface block ============ -->
  <text x="38" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">EDM-notch surface block &#8212; surface cracks</text>

  <!-- block: top face -->
  <polygon points="70,162 122,120 362,120 310,162" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- block: front face -->
  <rect x="70" y="162" width="240" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- block: right face -->
  <polygon points="310,162 362,120 362,176 310,218" fill="#1E66F5" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2"/>

  <!-- three EDM notches on the top face (graded stroke = graded depth) -->
  <line x1="148" y1="154" x2="178" y2="130" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="208" y1="154" x2="238" y2="130" stroke="#0B1F3A" stroke-width="4.5"/>
  <line x1="268" y1="154" x2="298" y2="130" stroke="#0B1F3A" stroke-width="6"/>

  <!-- depth labels with leaders -->
  <line x1="160" y1="140" x2="146" y2="104" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="144" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.2 mm</text>
  <line x1="222" y1="138" x2="226" y2="100" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="228" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.5 mm</text>
  <line x1="284" y1="140" x2="306" y2="104" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="312" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.0 mm</text>

  <!-- serial tag -->
  <rect x="84" y="174" width="110" height="22" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="139" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">S/N 4417-B</text>

  <text x="38" y="240" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Graded depths set sensitivity</text>
  <text x="38" y="258" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Same alloy and temper as the part</text>

  <!-- ============ PANEL 2: tubing standard ============ -->
  <text x="418" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Tubing standard &#8212; ASTM E243 / E426 / E571</text>

  <!-- tube body -->
  <rect x="452" y="136" width="280" height="62" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- right end cap -->
  <ellipse cx="732" cy="167" rx="15" ry="31" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- left open end showing wall -->
  <ellipse cx="452" cy="167" rx="15" ry="31" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="452" cy="167" rx="8" ry="18" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- through-wall drilled hole -->
  <circle cx="540" cy="167" r="7" fill="#0B1F3A"/>
  <line x1="540" y1="176" x2="532" y2="214" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="528" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">through-wall hole</text>

  <!-- OD notch -->
  <rect x="618" y="140" width="28" height="6" fill="#0B1F3A"/>
  <line x1="632" y1="138" x2="632" y2="112" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="632" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">OD notch</text>

  <!-- ID notch (far surface, dashed) -->
  <rect x="668" y="186" width="28" height="6" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="682" y1="194" x2="692" y2="214" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="696" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ID notch</text>

  <text x="418" y="258" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Hole and notch sizes fixed by the practice</text>

  <!-- ============ PANEL 3: conductivity coupons ============ -->
  <text x="38" y="294" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Conductivity coupons &#8212; ASTM E1004</text>

  <rect x="58" y="312" width="142" height="78" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="129" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">28.0 % IACS</text>
  <text x="129" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">below part value</text>

  <rect x="220" y="312" width="142" height="78" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="291" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0B1F3A">41.5 % IACS</text>
  <text x="291" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">above part value</text>

  <text x="38" y="420" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Certified, traceable values bracket the part</text>
  <text x="38" y="441" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100 % IACS = annealed copper, 58.0 MS/m</text>
  <text x="38" y="462" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Equalize standard and part temperature</text>

  <!-- ============ PANEL 4: lift-off shims ============ -->
  <text x="418" y="294" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Lift-off shims and foils &#8212; ASTM E376</text>

  <polygon points="450,396 632,396 662,374 480,374" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="676" y="392" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.50 mm</text>
  <polygon points="460,368 642,368 672,346 490,346" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="686" y="364" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.25 mm</text>
  <polygon points="470,340 652,340 682,318 500,318" fill="#1E66F5" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="696" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.10 mm</text>

  <text x="418" y="430" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Nonconductive spacers of known thickness set</text>
  <text x="418" y="451" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off response and coating-thickness curves</text>
</svg>
