<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arwE273C" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Traceability: One Unbroken Chain</text>

  <!-- row 1 -->
  <rect x="24" y="66" width="232" height="104" rx="10" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="2"/>
  <text x="140" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">1 · REFERENCE STANDARD</text>
  <text x="140" y="116" text-anchor="middle" font-size="14" fill="#9BC4FF">serial ET-RS-042 + cert</text>
  <text x="140" y="136" text-anchor="middle" font-size="14" fill="#9BC4FF">notch sizes documented</text>
  <text x="140" y="156" text-anchor="middle" font-size="14" fill="#9BC4FF">matches procedure material</text>

  <line x1="256" y1="118" x2="278" y2="118" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwE273C)"/>

  <rect x="284" y="66" width="232" height="104" rx="10" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">2 · STANDARDIZATION LOG</text>
  <text x="400" y="116" text-anchor="middle" font-size="14" fill="#9BC4FF">time • settings • responses</text>
  <text x="400" y="136" text-anchor="middle" font-size="14" fill="#9BC4FF">tolerance met — pass</text>
  <text x="400" y="156" text-anchor="middle" font-size="14" fill="#9BC4FF">initial / periodic / final</text>

  <line x1="516" y1="118" x2="538" y2="118" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwE273C)"/>

  <rect x="544" y="66" width="232" height="104" rx="10" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="2"/>
  <text x="660" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">3 · TECHNIQUE SETTINGS</text>
  <text x="660" y="116" text-anchor="middle" font-size="14" fill="#9BC4FF">freq, gain, phase, filters</text>
  <text x="660" y="136" text-anchor="middle" font-size="14" fill="#9BC4FF">probe S/N • cable length</text>
  <text x="660" y="156" text-anchor="middle" font-size="14" fill="#9BC4FF">scan speed and coverage</text>

  <!-- elbow connector to row 2 -->
  <path d="M660,170 L660,212 L250,212 L250,242" fill="none" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwE273C)"/>

  <!-- row 2 -->
  <rect x="134" y="250" width="232" height="104" rx="10" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="2"/>
  <text x="250" y="276" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">4 · RECORDED DATA</text>
  <text x="250" y="300" text-anchor="middle" font-size="14" fill="#9BC4FF">locations vs stated datum</text>
  <text x="250" y="320" text-anchor="middle" font-size="14" fill="#9BC4FF">amplitude • phase • %TW</text>
  <text x="250" y="340" text-anchor="middle" font-size="14" fill="#9BC4FF">raw data files archived</text>

  <line x1="366" y1="302" x2="428" y2="302" stroke="#FFFFFF" stroke-width="2.5" marker-end="url(#arwE273C)"/>

  <rect x="434" y="250" width="232" height="104" rx="10" fill="#1E66F5" fill-opacity="0.18" stroke="#9BC4FF" stroke-width="2"/>
  <text x="550" y="276" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">5 · SIGNED REPORT</text>
  <text x="550" y="300" text-anchor="middle" font-size="14" fill="#9BC4FF">all indications dispositioned</text>
  <text x="550" y="320" text-anchor="middle" font-size="14" fill="#9BC4FF">Level II signature + date</text>
  <text x="550" y="340" text-anchor="middle" font-size="14" fill="#9BC4FF">retained per contract</text>

  <!-- strapline -->
  <text x="400" y="412" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Break one link and the result can be neither defended nor reproduced.</text>
  <text x="400" y="440" text-anchor="middle" font-size="14" fill="#9BC4FF">The audit question — “show me how this number got onto this page” — is answered by the chain.</text>
</svg>
