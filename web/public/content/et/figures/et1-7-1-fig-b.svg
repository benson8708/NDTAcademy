<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Reading an Impedance Plane Display</text>

  <!-- instrument bezel and screen -->
  <rect x="50" y="60" width="560" height="390" rx="14" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="60" y="70" width="540" height="370" rx="8" fill="#0B1F3A"/>

  <!-- graticule -->
  <g stroke="#9BC4FF" stroke-opacity="0.22" stroke-width="1">
    <line x1="114" y1="70" x2="114" y2="440"/>
    <line x1="168" y1="70" x2="168" y2="440"/>
    <line x1="222" y1="70" x2="222" y2="440"/>
    <line x1="276" y1="70" x2="276" y2="440"/>
    <line x1="330" y1="70" x2="330" y2="440"/>
    <line x1="384" y1="70" x2="384" y2="440"/>
    <line x1="438" y1="70" x2="438" y2="440"/>
    <line x1="492" y1="70" x2="492" y2="440"/>
    <line x1="546" y1="70" x2="546" y2="440"/>
    <line x1="60" y1="116" x2="600" y2="116"/>
    <line x1="60" y1="162" x2="600" y2="162"/>
    <line x1="60" y1="208" x2="600" y2="208"/>
    <line x1="60" y1="254" x2="600" y2="254"/>
    <line x1="60" y1="300" x2="600" y2="300"/>
    <line x1="60" y1="346" x2="600" y2="346"/>
    <line x1="60" y1="392" x2="600" y2="392"/>
  </g>

  <!-- alarm gate -->
  <rect x="350" y="95" width="200" height="125" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="540" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">alarm gate</text>

  <!-- lift-off trace (rotated horizontal) -->
  <line x1="255" y1="330" x2="112" y2="330" stroke="#9BC4FF" stroke-width="3.5"/>
  <polygon points="112,323 98,330 112,337" fill="#9BC4FF"/>
  <text x="178" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">lift-off (rotated horizontal)</text>

  <!-- balance (null) point -->
  <circle cx="260" cy="330" r="6" fill="#FFFFFF"/>
  <line x1="262" y1="372" x2="260" y2="340" stroke="#9BC4FF" stroke-width="1"/>
  <text x="262" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">balance (null) point</text>

  <!-- phase angle arc between lift-off direction and crack take-off -->
  <path d="M 232 330 A 28 28 0 0 1 281.4 312" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="256" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">phase angle</text>

  <!-- surface crack signal: loop departing at a distinct angle, entering the gate -->
  <path d="M 260 330 C 298 320 332 268 372 202 C 390 170 412 144 425 150 C 438 156 430 184 414 216 C 390 264 330 308 262 328" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="382,184 380,207 364,198" fill="#1E66F5"/>
  <line x1="450" y1="266" x2="420" y2="228" stroke="#FFFFFF" stroke-width="1"/>
  <text x="470" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">surface crack signal</text>

  <!-- test tag -->
  <text x="80" y="425" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">aluminum skin &#183; 200 kHz &#183; surface probe</text>

  <!-- axis labels -->
  <text x="330" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">horizontal = resistive (R) signal component</text>
  <text x="38" y="255" transform="rotate(-90 38 255)" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">vertical = reactive (XL) component</text>

  <!-- right-side reading guide -->
  <text x="705" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">POSITION</text>
  <text x="705" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">where the dot sits =</text>
  <text x="705" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil impedance now</text>
  <line x1="633" y1="182" x2="777" y2="182" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="705" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">DIRECTION = PHASE</text>
  <text x="705" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">which way it moves =</text>
  <text x="705" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the variable that caused it</text>
  <line x1="633" y1="274" x2="777" y2="274" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="705" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">DISTANCE = AMPLITUDE</text>
  <text x="705" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">how far it moves =</text>
  <text x="705" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">severity of the change</text>
  <line x1="633" y1="366" x2="777" y2="366" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="705" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">EVALUATE BOTH</text>
  <text x="705" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">against reference-standard</text>
  <text x="705" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">responses</text>
</svg>
