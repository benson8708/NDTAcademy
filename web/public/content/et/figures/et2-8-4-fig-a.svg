<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Conductivity Sorts Metal — the %IACS Scale</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">every alloy and temper owns a window — aging moves it up, solution treatment moves it down</text>

  <!-- full-scale axis 0..110 %IACS -->
  <line x1="70" y1="140" x2="730" y2="140" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="70" y1="134" x2="70" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="190" y1="134" x2="190" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="310" y1="134" x2="310" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="430" y1="134" x2="430" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="550" y1="134" x2="550" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="670" y1="134" x2="670" y2="146" stroke="#0B1F3A" stroke-width="2"/>
  <text x="70" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">0</text>
  <text x="190" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">20</text>
  <text x="310" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">40</text>
  <text x="430" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">60</text>
  <text x="550" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">80</text>
  <text x="670" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">100</text>
  <text x="730" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">%IACS</text>

  <!-- markers on the full scale -->
  <line x1="76" y1="128" x2="76" y2="140" stroke="#1E66F5" stroke-width="2"/>
  <line x1="84" y1="128" x2="84" y2="140" stroke="#1E66F5" stroke-width="2"/>
  <text x="64" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Ti alloys ≈1 · 304 SS ≈2.4</text>
  <rect x="220" y="131" width="150" height="18" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="295" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">aerospace Al alloys 25–50</text>
  <rect x="412" y="131" width="30" height="18" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="427" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">pure Al 57–62</text>
  <circle cx="496" cy="140" r="5" fill="#1E66F5"/>
  <text x="496" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">gold ≈71</text>
  <circle cx="670" cy="140" r="5" fill="#1E66F5"/>
  <text x="652" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">copper 100</text>
  <circle cx="700" cy="140" r="5" fill="#1E66F5"/>
  <text x="712" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">silver ≈105</text>

  <!-- zoom connectors -->
  <line x1="220" y1="152" x2="70" y2="232" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="370" y1="152" x2="730" y2="232" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- aging direction -->
  <line x1="130" y1="246" x2="688" y2="246" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="700,246 684,240 684,252" fill="#1E66F5"/>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">aging → overaging → anneal: conductivity climbs as the matrix cleans up</text>

  <!-- temper windows, zoom 25–52 %IACS -->
  <rect x="156" y="272" width="98" height="34" rx="5" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="205" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2024-T3/T4</text>
  <text x="205" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">≈28.5–32.5</text>
  <rect x="388" y="272" width="110" height="34" rx="5" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="443" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">7075-T73</text>
  <text x="443" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">38.0–42.5</text>
  <rect x="583" y="272" width="122" height="34" rx="5" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="644" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2024-O</text>
  <text x="644" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">≈46–51</text>
  <rect x="204" y="332" width="135" height="34" rx="5" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="272" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">7075-T6</text>
  <text x="272" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">30.5–36.0</text>
  <rect x="534" y="332" width="98" height="34" rx="5" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="583" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">7075-O</text>
  <text x="583" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">≈44–48</text>

  <!-- the 36–38 no-window gap -->
  <line x1="339" y1="264" x2="339" y2="392" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="388" y1="264" x2="388" y2="392" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="363" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">36–38</text>
  <text x="363" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E66F5">no window</text>
  <text x="363" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E66F5">— refer</text>

  <!-- zoom axis -->
  <line x1="70" y1="412" x2="730" y2="412" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="94" y1="406" x2="94" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="192" y1="406" x2="192" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="290" y1="406" x2="290" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="388" y1="406" x2="388" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="486" y1="406" x2="486" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="583" y1="406" x2="583" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="681" y1="406" x2="681" y2="418" stroke="#0B1F3A" stroke-width="2"/>
  <text x="94" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">26</text>
  <text x="192" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">30</text>
  <text x="290" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">34</text>
  <text x="388" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">38</text>
  <text x="486" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">42</text>
  <text x="583" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">46</text>
  <text x="681" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">50</text>
  <text x="730" y="436" text-anchor="end" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">%IACS (zoom)</text>

  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">2024-T3/T4 and 7075-T6 overlap at 30.5–32.5 — conductivity names the temper only when the alloy is known</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">representative training values — the written procedure's acceptance table governs</text>
</svg>
