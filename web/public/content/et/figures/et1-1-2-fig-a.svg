<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">A Current Creates a Magnetic Field</text>

  <!-- LEFT PANEL: straight conductor -->
  <text x="210" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">STRAIGHT CONDUCTOR</text>

  <!-- field line circles (drawn first, wire over them) -->
  <ellipse cx="210" cy="190" rx="100" ry="26" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <ellipse cx="210" cy="190" rx="58" ry="15" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="206,200 206,210 220,205" fill="#1E66F5"/>
  <ellipse cx="210" cy="265" rx="100" ry="26" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <ellipse cx="210" cy="265" rx="58" ry="15" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="206,275 206,285 220,280" fill="#1E66F5"/>
  <ellipse cx="210" cy="340" rx="100" ry="26" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <ellipse cx="210" cy="340" rx="58" ry="15" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="206,350 206,360 220,355" fill="#1E66F5"/>

  <!-- conductor -->
  <line x1="210" y1="118" x2="210" y2="400" stroke="#0B1F3A" stroke-width="6"/>
  <polygon points="201,120 219,120 210,96" fill="#0B1F3A"/>
  <text x="234" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">current I</text>
  <text x="330" y="190" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">closed circles —</text>
  <text x="330" y="208" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no poles</text>

  <text x="210" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Right-hand rule: thumb = current,</text>
  <text x="210" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fingers curl = field direction</text>

  <!-- divider -->
  <line x1="395" y1="64" x2="395" y2="440" stroke="#9BC4FF" stroke-width="2"/>

  <!-- RIGHT PANEL: coil -->
  <text x="595" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">COIL — N TURNS</text>

  <!-- flux returning outside the coil -->
  <path d="M 575 116 C 460 140 455 350 575 366" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <path d="M 615 116 C 730 140 735 350 615 366" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- flux through the bore -->
  <line x1="575" y1="356" x2="575" y2="126" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="569,128 581,128 575,112" fill="#1E66F5"/>
  <line x1="595" y1="356" x2="595" y2="126" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="589,128 601,128 595,112" fill="#1E66F5"/>
  <line x1="615" y1="356" x2="615" y2="126" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="609,128 621,128 615,112" fill="#1E66F5"/>

  <!-- coil turns -->
  <ellipse cx="595" cy="170" rx="62" ry="14" fill="none" stroke="#0B1F3A" stroke-width="4"/>
  <ellipse cx="595" cy="205" rx="62" ry="14" fill="none" stroke="#0B1F3A" stroke-width="4"/>
  <ellipse cx="595" cy="240" rx="62" ry="14" fill="none" stroke="#0B1F3A" stroke-width="4"/>
  <ellipse cx="595" cy="275" rx="62" ry="14" fill="none" stroke="#0B1F3A" stroke-width="4"/>
  <ellipse cx="595" cy="310" rx="62" ry="14" fill="none" stroke="#0B1F3A" stroke-width="4"/>

  <!-- leads -->
  <line x1="533" y1="170" x2="462" y2="148" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="533" y1="310" x2="462" y2="332" stroke="#0B1F3A" stroke-width="3"/>
  <text x="455" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">current I</text>

  <text x="725" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flux</text>
  <text x="725" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">returns</text>
  <text x="725" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">outside</text>

  <text x="595" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">turns' fields add along the axis</text>
  <text x="595" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">strength ∝ ampere-turns (I × N)</text>

  <!-- bottom strip -->
  <rect x="60" y="452" width="680" height="38" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">The working end of every ET probe is this coil — reverse the current and the field reverses</text>
</svg>
