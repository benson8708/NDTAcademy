<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Frequency Slides Every Dot Along the Same Curve</text>

  <!-- left panel: low frequency -->
  <rect x="45" y="62" width="330" height="350" rx="8" fill="#F7FAFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="210" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">f &#8776; 10 kHz</text>
  <line x1="75" y1="105" x2="75" y2="390" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="75" y1="390" x2="345" y2="390" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 90 120
           C 130 130, 175 146, 210 172
           C 260 210, 295 252, 303 295
           C 307 325, 293 350, 265 368
           C 243 379, 210 385, 184 386"
        fill="none" stroke="#9BC4FF" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="90" cy="120" r="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="104" y="114" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">air</text>
  <circle cx="127" cy="131" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="139" y="124" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Ti 1%</text>
  <circle cx="210" cy="172" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="224" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">7075-T6 32%</text>
  <circle cx="295" cy="269" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="283" y="263" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Cu 100%</text>
  <text x="210" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">low f &#215; &#963; &#8212; dots sit high on the curve</text>

  <!-- center arrow -->
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">f &#8593;</text>
  <line x1="384" y1="240" x2="408" y2="240" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="0,-5 10,0 0,5" transform="translate(408,240)" fill="#1E66F5"/>

  <!-- right panel: high frequency -->
  <rect x="425" y="62" width="330" height="350" rx="8" fill="#F7FAFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="590" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">f &#8776; 60 kHz</text>
  <line x1="455" y1="105" x2="455" y2="390" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="455" y1="390" x2="725" y2="390" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 470 120
           C 510 130, 555 146, 590 172
           C 640 210, 675 252, 683 295
           C 687 325, 673 350, 645 368
           C 623 379, 590 385, 564 386"
        fill="none" stroke="#9BC4FF" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="0,-6 12,0 0,6" transform="translate(652,232) rotate(52)" fill="#1E66F5"/>
  <circle cx="470" cy="120" r="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="484" y="114" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">air</text>
  <circle cx="544" cy="145" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="556" y="139" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Ti 1%</text>
  <circle cx="683" cy="295" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="671" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">7075-T6 32%</text>
  <circle cx="564" cy="386" r="7" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="516" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Cu 100%</text>
  <line x1="531" y1="373" x2="556" y2="381" stroke="#5B708C" stroke-width="1"/>
  <text x="590" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">high f &#215; &#963; &#8212; same order, spread to the tail</text>

  <!-- bottom notes -->
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Same probe, same normalized curve &#8212; f and &#963; act together as the product f &#215; &#963;.</text>
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">Choose f so the alloys you must separate land near the knee &#8212; the widest spacing.</text>
</svg>
