<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowWhiteC" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#FFFFFF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Solid Bar in an Encircling Coil</text>

  <!-- ================= LEFT PANEL: side view ================= -->
  <text x="210" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Side view</text>

  <!-- bar -->
  <rect x="45" y="235" width="330" height="90" fill="#1E66F5" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="1.5"/>
  <ellipse cx="375" cy="280" rx="16" ry="45" fill="#1E66F5" fill-opacity="0.4" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="243" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.85">solid bar</text>

  <!-- primary flux along axis -->
  <line x1="60" y1="280" x2="345" y2="280" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="7 6" opacity="0.85" marker-end="url(#arrowWhiteC)"/>

  <!-- encircling coil turns -->
  <ellipse cx="100" cy="280" rx="12" ry="62" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <ellipse cx="135" cy="280" rx="12" ry="62" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <ellipse cx="170" cy="280" rx="12" ry="62" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <ellipse cx="205" cy="280" rx="12" ry="62" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="152" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">encircling coil (AC)</text>

  <!-- induced eddy current ring on bar -->
  <ellipse cx="305" cy="280" rx="11" ry="45" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="299,226 311,226 305,238" fill="#9BC4FF"/>

  <!-- labels -->
  <text x="140" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">primary flux along the bar axis</text>
  <line x1="305" y1="330" x2="302" y2="372" stroke="#9BC4FF" stroke-width="1" opacity="0.6"/>
  <text x="300" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">induced eddy currents circle the bar's circumference</text>

  <!-- ================= RIGHT PANEL: cross-section ================= -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9BC4FF">Cross-section of the bar</text>

  <!-- density rings: solid at surface, fading to zero at center -->
  <circle cx="600" cy="245" r="112" fill="#1E66F5"/>
  <circle cx="600" cy="245" r="86" fill="#0B1F3A"/>
  <circle cx="600" cy="245" r="86" fill="#1E66F5" fill-opacity="0.55"/>
  <circle cx="600" cy="245" r="58" fill="#0B1F3A"/>
  <circle cx="600" cy="245" r="58" fill="#1E66F5" fill-opacity="0.25"/>
  <circle cx="600" cy="245" r="30" fill="#0B1F3A"/>
  <circle cx="600" cy="245" r="112" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- circumferential flow indicator -->
  <circle cx="600" cy="245" r="99" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>
  <polygon points="605,140 605,152 591,146" fill="#FFFFFF"/>
  <line x1="686" y1="294" x2="735" y2="344" stroke="#9BC4FF" stroke-width="1" opacity="0.6"/>
  <text x="790" y="352" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">circumferential flow</text>

  <!-- surface density label -->
  <line x1="679" y1="166" x2="740" y2="128" stroke="#9BC4FF" stroke-width="1" opacity="0.6"/>
  <text x="788" y="124" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">density greatest at the surface</text>

  <!-- zero at center -->
  <circle cx="600" cy="245" r="3.5" fill="#FFFFFF"/>
  <text x="600" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">J = 0</text>

  <text x="600" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">a flaw at the core gives no signal</text>

  <!-- mini radial density profile -->
  <text x="460" y="414" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">relative current density</text>
  <line x1="460" y1="465" x2="740" y2="465" stroke="#9BC4FF" stroke-width="1.5"/>
  <polyline points="460,463 510,462 550,459 590,453 630,444 670,431 705,419 740,408" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="460" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">center</text>
  <text x="740" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">surface</text>
</svg>
