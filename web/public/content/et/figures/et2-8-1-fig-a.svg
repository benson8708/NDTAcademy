<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0B1F3A">From Indication to Disposition</text>

  <!-- indication box -->
  <rect x="300" y="50" width="200" height="46" rx="8" fill="#1E66F5"/>
  <text x="400" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">INDICATION</text>
  <text x="400" y="88" text-anchor="middle" font-size="14" fill="#FFFFFF">trace, deflection, or alarm</text>

  <!-- arrow down to interpretation -->
  <line x1="400" y1="96" x2="400" y2="118" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,118 406,118 400,127" fill="#0B1F3A"/>

  <!-- interpretation bar -->
  <rect x="255" y="129" width="290" height="36" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="152" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">INTERPRETATION — what caused it?</text>

  <!-- fan to three classes -->
  <path d="M400,165 L400,170 M144,170 L656,170 M144,170 L144,184 M400,170 L400,184 M656,170 L656,184" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <polygon points="138,184 150,184 144,192" fill="#0B1F3A"/>
  <polygon points="394,184 406,184 400,192" fill="#0B1F3A"/>
  <polygon points="650,184 662,184 656,192" fill="#0B1F3A"/>

  <!-- false box -->
  <rect x="38" y="194" width="212" height="62" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="144" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">FALSE</text>
  <text x="144" y="233" text-anchor="middle" font-size="14" fill="#0B1F3A">instrument artifact —</text>
  <text x="144" y="250" text-anchor="middle" font-size="14" fill="#0B1F3A">noise, vibration, wobble</text>
  <text x="144" y="276" text-anchor="middle" font-size="14" fill="#1E66F5">fix the cause — re-examine</text>

  <!-- nonrelevant box -->
  <rect x="294" y="194" width="212" height="62" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="400" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">NONRELEVANT</text>
  <text x="400" y="233" text-anchor="middle" font-size="14" fill="#0B1F3A">real, but not a flaw —</text>
  <text x="400" y="250" text-anchor="middle" font-size="14" fill="#0B1F3A">edge, support, geometry</text>
  <text x="400" y="276" text-anchor="middle" font-size="14" fill="#1E66F5">verify — record if required</text>

  <!-- relevant box -->
  <rect x="550" y="194" width="212" height="62" rx="8" fill="#1E66F5"/>
  <text x="656" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">RELEVANT</text>
  <text x="656" y="233" text-anchor="middle" font-size="14" fill="#FFFFFF">a discontinuity</text>
  <text x="656" y="250" text-anchor="middle" font-size="14" fill="#FFFFFF">is present</text>

  <!-- arrow relevant -> characterize -->
  <line x1="656" y1="256" x2="656" y2="284" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="650,284 662,284 656,292" fill="#0B1F3A"/>

  <!-- characterize box -->
  <rect x="520" y="294" width="260" height="62" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="650" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">CHARACTERIZE → FLAW</text>
  <text x="650" y="334" text-anchor="middle" font-size="14" fill="#0B1F3A">phase → origin and depth</text>
  <text x="650" y="351" text-anchor="middle" font-size="14" fill="#0B1F3A">amplitude → severity</text>

  <!-- flaw note -->
  <text x="300" y="318" text-anchor="middle" font-size="14" fill="#1E66F5">a flaw is detectable —</text>
  <text x="300" y="336" text-anchor="middle" font-size="14" fill="#1E66F5">not necessarily rejectable (E1316)</text>

  <!-- elbow characterize -> evaluation -->
  <path d="M650,356 L650,398 L594,398" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <polygon points="596,392 596,404 587,398" fill="#0B1F3A"/>

  <!-- evaluation bar -->
  <rect x="215" y="380" width="370" height="36" rx="8" fill="#0B1F3A"/>
  <text x="400" y="403" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">EVALUATION — compare to acceptance criteria</text>

  <!-- outcome elbows -->
  <path d="M320,416 L320,430 L195,430 L195,438" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <polygon points="189,438 201,438 195,446" fill="#0B1F3A"/>
  <path d="M480,416 L480,430 L605,430 L605,438" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <polygon points="599,438 611,438 605,446" fill="#0B1F3A"/>

  <!-- accept box -->
  <rect x="70" y="448" width="250" height="46" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="195" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E66F5">MEETS CRITERIA — ACCEPT</text>
  <text x="195" y="486" text-anchor="middle" font-size="14" fill="#0B1F3A">record the disposition</text>

  <!-- reject box -->
  <rect x="480" y="448" width="250" height="46" rx="8" fill="#0B1F3A"/>
  <text x="605" y="468" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">FAILS CRITERIA — DEFECT</text>
  <text x="605" y="486" text-anchor="middle" font-size="14" fill="#9BC4FF">reject — mark, segregate, document</text>
</svg>
