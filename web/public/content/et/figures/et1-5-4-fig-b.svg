<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">What Eddy Current Reaches — and What It Cannot</text>

  <!-- ===== Left: conductive part cross-section ===== -->
  <text x="280" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Conductive metal — depth is the limit</text>

  <!-- probe -->
  <rect x="120" y="92" width="30" height="36" rx="3" fill="#1E66F5" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="160" y="112" font-size="12" fill="#9BC4FF">probe</text>

  <!-- cross-section with decaying current density bands -->
  <rect x="50" y="130" width="460" height="60" fill="#1E66F5" fill-opacity="0.50"/>
  <rect x="50" y="190" width="460" height="60" fill="#1E66F5" fill-opacity="0.28"/>
  <rect x="50" y="250" width="460" height="60" fill="#1E66F5" fill-opacity="0.12"/>
  <rect x="50" y="310" width="460" height="90" fill="#1E66F5" fill-opacity="0.04"/>
  <rect x="50" y="130" width="460" height="270" fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- depth scale -->
  <line x1="530" y1="130" x2="530" y2="400" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="524" y1="190" x2="536" y2="190" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="524" y1="250" x2="536" y2="250" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="524" y1="310" x2="536" y2="310" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="544" y="195" font-size="14" fill="#9BC4FF">1δ — 37 % of surface density</text>
  <text x="544" y="255" font-size="14" fill="#9BC4FF">2δ — 14 %</text>
  <text x="544" y="315" font-size="14" fill="#9BC4FF">3δ — 5 % : effective limit</text>

  <!-- surface crack: detected -->
  <path d="M 120 130 L 116 146 L 124 158 L 119 172" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="64" y="156" font-size="13" fill="#FFFFFF">surface</text>
  <text x="64" y="172" font-size="13" fill="#FFFFFF">crack ✓</text>

  <!-- near-surface flaw: detectable -->
  <ellipse cx="300" cy="205" rx="22" ry="9" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="2"/>
  <text x="300" y="232" text-anchor="middle" font-size="13" fill="#FFFFFF">near-surface flaw ✓</text>

  <!-- laminar flaw: weak -->
  <rect x="380" y="160" width="90" height="5" rx="2.5" fill="#9BC4FF"/>
  <text x="425" y="152" text-anchor="middle" font-size="13" fill="#9BC4FF">laminar — parallel to currents: weak</text>

  <!-- deep flaw: missed -->
  <ellipse cx="220" cy="355" rx="24" ry="10" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="220" y="384" text-anchor="middle" font-size="13" fill="#9BC4FF">below ≈3δ — beyond reach ✗</text>

  <!-- ===== Right: nonconductive panel ===== -->
  <text x="687" y="78" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Nonconductor — no test</text>

  <rect x="604" y="130" width="166" height="270" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="604" y1="184" x2="770" y2="130" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="604" y1="238" x2="770" y2="184" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="604" y1="292" x2="770" y2="238" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="604" y1="346" x2="770" y2="292" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="604" y1="400" x2="770" y2="346" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.6"/>
  <text x="687" y="252" text-anchor="middle" font-size="14" fill="#FFFFFF">glass-fiber composite,</text>
  <text x="687" y="272" text-anchor="middle" font-size="14" fill="#FFFFFF">plastic, ceramic</text>
  <text x="687" y="310" text-anchor="middle" font-size="15" font-weight="bold" fill="#9BC4FF">no charge carriers —</text>
  <text x="687" y="330" text-anchor="middle" font-size="15" font-weight="bold" fill="#9BC4FF">no eddy currents ✗</text>

  <text x="400" y="448" text-anchor="middle" font-size="14" fill="#FFFFFF">The two gate questions: is it conductive, and is the target within ≈3 standard depths of penetration?</text>
  <text x="400" y="486" text-anchor="middle" font-size="15" fill="#9BC4FF">Band shading shows eddy current density decaying exponentially with depth (δ = standard depth of penetration).</text>
</svg>
