<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Phase Rotation: Lift-Off Flat, Defects Vertical</text>

  <defs>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9BC4FF"/>
    </marker>
  </defs>

  <text x="210" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BEFORE — raw display</text>
  <text x="590" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">AFTER — lift-off rotated flat</text>

  <!-- left screen -->
  <rect x="60" y="90" width="300" height="290" fill="#0B1F3A" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="1" opacity="0.3">
    <line x1="110" y1="90" x2="110" y2="380"/>
    <line x1="160" y1="90" x2="160" y2="380"/>
    <line x1="210" y1="90" x2="210" y2="380"/>
    <line x1="260" y1="90" x2="260" y2="380"/>
    <line x1="310" y1="90" x2="310" y2="380"/>
    <line x1="60" y1="140" x2="360" y2="140"/>
    <line x1="60" y1="190" x2="360" y2="190"/>
    <line x1="60" y1="240" x2="360" y2="240"/>
    <line x1="60" y1="290" x2="360" y2="290"/>
    <line x1="60" y1="340" x2="360" y2="340"/>
  </g>
  <path d="M 250 330 Q 185 270 115 200" fill="none" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arrL)"/>
  <text x="78" y="178" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">lift-off — 0.1 mm shim</text>
  <path d="M 250 330 C 286 282 312 248 296 214 C 288 196 268 252 252 326" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="302" y="206" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">crack</text>
  <circle cx="250" cy="330" r="5" fill="#9BC4FF"/>
  <text x="258" y="348" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">null</text>
  <text x="210" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wobble splatters into both channels</text>

  <!-- right screen -->
  <rect x="440" y="90" width="300" height="290" fill="#0B1F3A" stroke="#0B1F3A" stroke-width="2.5"/>
  <g stroke="#1E66F5" stroke-width="1" opacity="0.3">
    <line x1="490" y1="90" x2="490" y2="380"/>
    <line x1="540" y1="90" x2="540" y2="380"/>
    <line x1="590" y1="90" x2="590" y2="380"/>
    <line x1="640" y1="90" x2="640" y2="380"/>
    <line x1="690" y1="90" x2="690" y2="380"/>
    <line x1="440" y1="140" x2="740" y2="140"/>
    <line x1="440" y1="190" x2="740" y2="190"/>
    <line x1="440" y1="240" x2="740" y2="240"/>
    <line x1="440" y1="290" x2="740" y2="290"/>
    <line x1="440" y1="340" x2="740" y2="340"/>
  </g>
  <line x1="450" y1="220" x2="730" y2="220" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="452" y="210" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Y alarm threshold</text>
  <path d="M 630 330 Q 555 328 480 330" fill="none" stroke="#9BC4FF" stroke-width="3" marker-end="url(#arrL)"/>
  <text x="452" y="316" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">lift-off → horizontal</text>
  <path d="M 630 330 C 638 270 646 205 632 150 C 624 128 618 240 628 326" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="648" y="150" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">crack ≈ 90°</text>
  <circle cx="630" cy="330" r="5" fill="#9BC4FF"/>
  <text x="640" y="348" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">null</text>
  <text x="590" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">evaluate the vertical component only</text>

  <!-- procedure notes -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Null on the part — lift onto a 0.1 mm shim — rotate the excursion flat (convention: dot exits LEFT).</text>
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Only the near-contact portion flattens; re-verify after any probe, cable, or frequency change.</text>
</svg>
