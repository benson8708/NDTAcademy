<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Loading the Coil: the Impedance Point Moves</text>

  <!-- axes -->
  <line x1="130" y1="430" x2="545" y2="430" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="558,430 544,423 544,437" fill="#0B1F3A"/>
  <line x1="130" y1="430" x2="130" y2="95" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="130,82 123,96 137,96" fill="#0B1F3A"/>
  <text x="335" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Effective resistance R (Ω)</text>
  <text x="58" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A" transform="rotate(-90 58 260)">Inductive reactance XL (Ω)</text>

  <!-- loading path: air point to on-part point -->
  <line x1="188" y1="147" x2="370" y2="304" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="382,314 374.4,298.3 365.3,308.9" fill="#1E66F5"/>
  <text x="355" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">coil lowered onto the part</text>
  <line x1="290" y1="206" x2="281" y2="222" stroke="#0B1F3A" stroke-width="1.2"/>

  <!-- return path: crack / lift-off -->
  <line x1="381.7" y1="312.9" x2="346" y2="282" stroke="#9BC4FF" stroke-width="4" stroke-dasharray="7 5"/>
  <polygon points="334,272 350.7,277.1 341.6,287.7" fill="#9BC4FF"/>

  <!-- air point -->
  <circle cx="180" cy="140" r="9" fill="#0B1F3A"/>
  <text x="198" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Air point (R₀, XL₀)</text>
  <text x="198" y="152" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil in empty air</text>

  <!-- crack point -->
  <circle cx="324" cy="262" r="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="4"/>
  <text x="150" y="300" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Over a crack: the point heads</text>
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">back toward the air point</text>
  <line x1="308" y1="292" x2="320" y2="270" stroke="#0B1F3A" stroke-width="1.2"/>

  <!-- on-part point -->
  <circle cx="390" cy="320" r="9" fill="#1E66F5"/>
  <text x="388" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">On sound, nonmagnetic metal</text>
  <text x="388" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">strong eddy currents — coil loaded</text>

  <!-- side panel -->
  <rect x="580" y="70" width="200" height="372" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="680" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">What moves the point?</text>

  <text x="596" y="128" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Sound conductor</text>
  <text x="596" y="148" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Strong eddy currents load</text>
  <text x="596" y="166" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the coil: XL down, R up</text>
  <line x1="596" y1="182" x2="764" y2="182" stroke="#9BC4FF" stroke-width="1.5"/>

  <text x="596" y="206" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Crack in the path</text>
  <text x="596" y="226" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Currents detour, weaken —</text>
  <text x="596" y="244" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">back toward the air point</text>
  <line x1="596" y1="260" x2="764" y2="260" stroke="#9BC4FF" stroke-width="1.5"/>

  <text x="596" y="284" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Lift-off</text>
  <text x="596" y="304" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Coupling weakens — also</text>
  <text x="596" y="322" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">heads toward the air point</text>
  <line x1="596" y1="338" x2="764" y2="338" stroke="#9BC4FF" stroke-width="1.5"/>

  <text x="596" y="362" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Ferromagnetic part</text>
  <text x="596" y="382" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Permeability multiplies the</text>
  <text x="596" y="400" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flux: XL rises instead</text>

  <text x="596" y="428" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">More in Lesson 1-2-4.</text>

  <!-- bottom note -->
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Every motion of the impedance point is carried by one messenger — the secondary field.</text>
</svg>
