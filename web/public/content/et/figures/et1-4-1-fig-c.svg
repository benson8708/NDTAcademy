<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">The Z-Curve: Where Will the Dot Land?</text>

  <!-- axes -->
  <line x1="110" y1="55" x2="110" y2="470" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="110" y1="470" x2="730" y2="470" stroke="#0B1F3A" stroke-width="2"/>
  <text x="420" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">R / X&#8320;  (normalized resistance)</text>
  <text transform="translate(70,260) rotate(-90)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">&#969;L / &#969;L&#8320;  (normalized reactance)</text>

  <!-- zones -->
  <rect x="110" y="42" width="120" height="110" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="330" y="100" width="150" height="110" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="515" y="245" width="150" height="115" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="265" y="365" width="160" height="105" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- conductivity locus -->
  <path d="M 170 80
           C 248 96, 330 120, 405 155
           C 478 192, 562 248, 590 305
           C 604 338, 580 378, 532 400
           C 472 426, 400 432, 345 428"
        fill="none" stroke="#1E66F5" stroke-width="4" stroke-linecap="round"/>
  <polygon points="0,-6 12,0 0,6" transform="translate(514,222) rotate(37)" fill="#1E66F5"/>
  <polygon points="0,-6 12,0 0,6" transform="translate(437,425) rotate(173)" fill="#1E66F5"/>
  <text x="470" y="448" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#5B708C">&#8592; &#963; increasing along the comma</text>

  <!-- air point -->
  <circle cx="170" cy="80" r="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="190" y="68" font-family="Arial, sans-serif" font-size="14" fill="#5B708C">balance point &#8212; probe in air</text>

  <!-- zone badges -->
  <circle cx="127" cy="59" r="14" fill="#0B1F3A"/>
  <text x="127" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">A</text>
  <circle cx="347" cy="117" r="14" fill="#0B1F3A"/>
  <text x="347" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">B</text>
  <circle cx="532" cy="262" r="14" fill="#0B1F3A"/>
  <text x="532" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">C</text>
  <circle cx="282" cy="382" r="14" fill="#0B1F3A"/>
  <text x="282" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">D</text>
</svg>
