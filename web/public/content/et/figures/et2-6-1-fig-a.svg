<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Inside the Eddy Current Instrument: The Signal Chain</text>

  <!-- ================= ROW 1 ================= -->
  <g stroke="#0B1F3A" stroke-width="2">
    <rect x="40" y="58" width="150" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
    <rect x="235" y="58" width="150" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
    <rect x="430" y="58" width="160" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
    <rect x="635" y="58" width="135" height="64" rx="8" fill="#1E66F5"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle">
    <text x="115" y="84">AC oscillator</text><text x="115" y="103">(test frequency f)</text>
    <text x="310" y="84">test coil</text><text x="310" y="103">(probe)</text>
    <text x="510" y="84">balance / null</text><text x="510" y="103">network</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    <text x="702" y="84">preamplifier</text><text x="702" y="103">(low-noise gain)</text>
  </g>
  <g stroke="#1E66F5" stroke-width="3">
    <line x1="196" y1="90" x2="226" y2="90"/>
    <line x1="391" y1="90" x2="421" y2="90"/>
    <line x1="596" y1="90" x2="626" y2="90"/>
  </g>
  <g fill="#1E66F5">
    <polygon points="226,84 226,96 234,90"/>
    <polygon points="421,84 421,96 429,90"/>
    <polygon points="626,84 626,96 634,90"/>
  </g>

  <!-- elbow from preamplifier down to row 2 -->
  <path d="M 702 122 L 702 146 L 95 146 L 95 162" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="89,162 101,162 95,170" fill="#1E66F5"/>

  <!-- ================= ROW 2 ================= -->
  <g stroke="#0B1F3A" stroke-width="2">
    <rect x="30" y="170" width="130" height="64" rx="8" fill="#1E66F5"/>
    <rect x="185" y="170" width="130" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
    <rect x="340" y="170" width="130" height="64" rx="8" fill="#1E66F5"/>
    <rect x="495" y="170" width="130" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
    <rect x="650" y="170" width="130" height="64" rx="8" fill="#9BC4FF" fill-opacity="0.18"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    <text x="95" y="196">carrier</text><text x="95" y="215">amplifier</text>
    <text x="405" y="196">X–Y channel</text><text x="405" y="215">amplifiers</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" text-anchor="middle">
    <text x="250" y="190">phase detector</text><text x="250" y="208">(demodulator)</text>
    <text x="560" y="196">filters</text>
    <text x="715" y="196">display</text><text x="715" y="215">and alarms</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#1E66F5" text-anchor="middle">
    <text x="250" y="227">lesson 7.2</text>
    <text x="560" y="218">lesson 7.3</text>
  </g>
  <g stroke="#1E66F5" stroke-width="3">
    <line x1="162" y1="202" x2="176" y2="202"/>
    <line x1="317" y1="202" x2="331" y2="202"/>
    <line x1="472" y1="202" x2="486" y2="202"/>
    <line x1="627" y1="202" x2="641" y2="202"/>
  </g>
  <g fill="#1E66F5">
    <polygon points="176,196 176,208 184,202"/>
    <polygon points="331,196 331,208 339,202"/>
    <polygon points="486,196 486,208 494,202"/>
    <polygon points="641,196 641,208 649,202"/>
  </g>

  <!-- legend -->
  <rect x="30" y="250" width="14" height="14" fill="#1E66F5"/>
  <text x="52" y="262" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">amplification stages — this lesson</text>

  <!-- ================= SCALE PROBLEM ================= -->
  <text x="40" y="292" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">THE SCALE PROBLEM — AND THE NULL THAT SOLVES IT</text>

  <!-- left: standing voltage vs flaw change -->
  <line x1="50" y1="436" x2="380" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="70" y="306" width="70" height="130" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="150" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">standing coil voltage</text>
  <text x="150" y="354" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">— on the order of volts</text>
  <rect x="270" y="430" width="70" height="6" fill="#1E66F5"/>
  <text x="305" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw-induced change</text>
  <text x="305" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">a fraction of 1% — millivolts</text>

  <!-- right: after the null, amplify -->
  <line x1="430" y1="436" x2="770" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 440 436 L 468 436 Q 476 402 484 436 L 505 436" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="472" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">nulled signal</text>
  <line x1="520" y1="400" x2="585" y2="400" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="585,394 585,406 593,400" fill="#1E66F5"/>
  <text x="552" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">amplify</text>
  <text x="552" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60–100 dB</text>
  <path d="M 610 436 L 645 436 Q 668 180 691 436 L 760 436" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="685" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">display-level signal</text>
</svg>
