<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Common Geometry Signal Sources</text>

  <!-- panel 1: edge / end of part -->
  <rect x="24" y="52" width="368" height="208" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="208" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1 · Edge or end of part</text>
  <rect x="244" y="116" width="42" height="38" fill="#0B1F3A"/>
  <text x="226" y="139" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">probe</text>
  <rect x="56" y="160" width="236" height="34" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <ellipse cx="252" cy="177" rx="24" ry="9" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <ellipse cx="248" cy="177" rx="36" ry="13" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M 286 154 Q 322 168 314 200" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M 290 146 Q 338 164 330 208" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="208" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">Loops compress at the boundary and flux spills into air —</text>
  <text x="208" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">the largest non-flaw signal on the part</text>

  <!-- panel 2: thickness change -->
  <rect x="408" y="52" width="368" height="208" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="592" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2 · Thickness change (taper / chem-mill step)</text>
  <rect x="486" y="112" width="40" height="32" fill="#0B1F3A"/>
  <rect x="652" y="112" width="40" height="32" fill="#0B1F3A"/>
  <path d="M 440 150 L 744 150 L 744 168 L 590 168 L 590 206 L 440 206 Z" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="476" y1="192" x2="536" y2="192" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6 5"/>
  <line x1="642" y1="192" x2="702" y2="192" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="552" y="196" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">≈3δ</text>
  <text x="592" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">Where thickness is less than about 3δ, the back wall enters the</text>
  <text x="592" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">current zone — every step, taper, or thinning moves the signal</text>

  <!-- panel 3: curvature and radii -->
  <rect x="24" y="272" width="368" height="208" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="208" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3 · Curvature and radii</text>
  <text x="208" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">lift-off grows toward the coil edges</text>
  <path d="M 56 436 Q 208 340 360 436 L 360 444 L 56 444 Z" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="158" y="360" width="100" height="24" fill="#0B1F3A"/>
  <line x1="166" y1="388" x2="166" y2="404" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="162,400 166,410 170,400" fill="#1E66F5"/>
  <line x1="250" y1="388" x2="250" y2="404" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="246,400 250,410 254,400" fill="#1E66F5"/>
  <text x="208" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">A flat probe couples fully only at the tangent point —</text>
  <text x="208" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">varying lift-off and rocking create geometry noise</text>

  <!-- panel 4: holes and substructure -->
  <rect x="408" y="272" width="368" height="208" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="592" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">4 · Holes, countersinks, hidden substructure</text>
  <rect x="470" y="318" width="40" height="32" fill="#0B1F3A"/>
  <text x="462" y="339" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">probe</text>
  <rect x="440" y="372" width="304" height="26" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 504 372 L 520 396 L 536 372 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="520" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">countersink</text>
  <rect x="580" y="398" width="164" height="20" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="662" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">hidden doubler</text>
  <text x="592" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">A hole is an edge wrapped in a circle — use templates and rotating</text>
  <text x="592" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">bolt-hole probes; doubler edges below the skin also answer</text>
</svg>
