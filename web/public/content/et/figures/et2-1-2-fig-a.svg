<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Operating Modes: Absolute, Differential, Reflection</text>

  <!-- panel dividers -->
  <line x1="270" y1="60" x2="270" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="535" y1="60" x2="535" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ================= PANEL 1: ABSOLUTE ================= -->
  <text x="140" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Absolute (impedance)</text>

  <!-- single coil -->
  <rect x="118" y="98" width="44" height="46" rx="4" fill="#1E66F5"/>
  <line x1="122" y1="108" x2="158" y2="108" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="122" y1="118" x2="158" y2="118" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="122" y1="128" x2="158" y2="128" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="122" y1="138" x2="158" y2="138" stroke="#FFFFFF" stroke-width="2"/>

  <!-- scan arrow -->
  <line x1="178" y1="121" x2="206" y2="121" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="206,116 216,121 206,126" fill="#0B1F3A"/>
  <text x="196" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">scan</text>

  <!-- plate with flaw -->
  <rect x="30" y="158" width="220" height="54" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="186,158 190,172 183,180" stroke="#0B1F3A" stroke-width="3" fill="none"/>
  <text x="200" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw</text>

  <!-- signal trace -->
  <line x1="40" y1="300" x2="240" y2="300" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polyline points="44,300 100,300 110,300 118,262 126,300 150,300 236,284" stroke="#1E66F5" stroke-width="3" fill="none"/>
  <text x="140" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw: single excursion</text>
  <text x="140" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">baseline drifts too (temp, lift-off)</text>

  <text x="140" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">sees everything:</text>
  <text x="140" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaws + gradual change + drift</text>

  <!-- ================= PANEL 2: DIFFERENTIAL ================= -->
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Differential (self-comparison)</text>

  <!-- opposed coil pair -->
  <rect x="352" y="98" width="40" height="46" rx="4" fill="#1E66F5"/>
  <rect x="408" y="98" width="40" height="46" rx="4" fill="#1E66F5"/>
  <text x="372" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">+</text>
  <text x="428" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">&#8722;</text>

  <!-- plate with flaw -->
  <rect x="300" y="158" width="200" height="54" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="398,158 402,172 395,180" stroke="#0B1F3A" stroke-width="3" fill="none"/>

  <!-- bipolar trace -->
  <line x1="304" y1="300" x2="496" y2="300" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4,4"/>
  <polyline points="304,300 352,300 368,300 382,260 400,300 418,340 432,300 496,300" stroke="#1E66F5" stroke-width="3" fill="none"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">two-lobe &#8220;figure-eight&#8221; signature</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">cancels temperature &amp; slow drift</text>
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">blind to gradual change</text>

  <!-- ================= PANEL 3: REFLECTION ================= -->
  <text x="660" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Reflection (driver&#8211;pickup)</text>

  <!-- driver winding outline -->
  <rect x="586" y="98" width="148" height="66" rx="6" fill="none" stroke="#1E66F5" stroke-width="5"/>
  <text x="660" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">driver winding</text>

  <!-- pickup pair inside -->
  <rect x="618" y="126" width="28" height="28" rx="3" fill="#1E66F5"/>
  <rect x="654" y="126" width="28" height="28" rx="3" fill="#1E66F5"/>
  <text x="632" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">+</text>
  <text x="668" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">&#8722;</text>
  <text x="660" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">differential pickups</text>

  <!-- plate -->
  <rect x="560" y="196" width="210" height="54" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- drive / sense arrows -->
  <line x1="600" y1="168" x2="600" y2="190" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="595,190 605,190 600,196" fill="#0B1F3A"/>
  <text x="590" y="184" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">drive</text>
  <line x1="722" y1="194" x2="722" y2="172" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="717,172 727,172 722,166" fill="#0B1F3A"/>
  <text x="728" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sense</text>

  <text x="660" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">each winding optimized separately</text>
  <text x="660" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wide usable frequency range</text>
  <text x="660" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">stable against thermal drift</text>

  <text x="660" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">low-frequency aerospace probes</text>
  <text x="660" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sliding &amp; ring probes live here</text>
</svg>
