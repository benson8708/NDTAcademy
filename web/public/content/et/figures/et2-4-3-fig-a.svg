<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Phase Discrimination: Frequency Sets the Angular Separation</text>

  <!-- ================= PANEL A: frequency too low ================= -->
  <rect x="40" y="70" width="345" height="360" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="212" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Frequency too low</text>
  <text x="212" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">noise and flaws nearly collinear</text>

  <!-- balance point -->
  <circle cx="95" cy="390" r="5" fill="#0B1F3A"/>

  <!-- lift-off vector (horizontal) -->
  <line x1="95" y1="390" x2="238" y2="390" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="250,390 238,384 238,397" fill="#9BC4FF"/>
  <text x="172" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off / wobble</text>

  <!-- surface notch vector, 28 deg -->
  <line x1="95" y1="390" x2="226" y2="321" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="236,315 229,327 223,315" fill="#1E66F5"/>
  <text x="246" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">surface notch</text>

  <!-- deeper flaw vector, 45 deg -->
  <line x1="95" y1="390" x2="193" y2="292" stroke="#0B1F3A" stroke-width="4"/>
  <polygon points="201,284 198,297 188,287" fill="#0B1F3A"/>
  <text x="196" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw at depth</text>

  <!-- separation arc -->
  <path d="M 188 341 A 105 105 0 0 0 169 316" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="196" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Δθ ≈ 17°</text>

  <!-- ================= PANEL B: chosen for discrimination ================= -->
  <rect x="415" y="70" width="345" height="360" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="587" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Chosen for discrimination</text>
  <text x="587" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">noise horizontal, flaws upright and fanned</text>

  <!-- balance point -->
  <circle cx="560" cy="390" r="5" fill="#0B1F3A"/>

  <!-- vertical alarm threshold -->
  <line x1="430" y1="345" x2="748" y2="345" stroke="#1E66F5" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="748" y="337" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">vertical alarm threshold</text>

  <!-- lift-off vector (horizontal) -->
  <line x1="560" y1="390" x2="703" y2="390" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="715,390 703,384 703,397" fill="#9BC4FF"/>
  <text x="640" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off / wobble (below the gate)</text>

  <!-- surface notch vector, 90 deg -->
  <line x1="560" y1="390" x2="560" y2="257" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="560,245 553,257 567,257" fill="#1E66F5"/>
  <text x="560" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">surface notch</text>

  <!-- deeper flaw vector, 150 deg -->
  <line x1="560" y1="390" x2="449" y2="326" stroke="#0B1F3A" stroke-width="4"/>
  <polygon points="439,320 452,320 446,332" fill="#0B1F3A"/>
  <text x="425" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw at depth x</text>
  <text x="425" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rotated ≈ 2x/δ</text>

  <!-- separation arc -->
  <path d="M 560 305 A 85 85 0 0 0 486 348" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="574" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Δθ ≈ 60°</text>

  <!-- bottom notes -->
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Rotation moves all signals together; the separation between them is phase-lag physics.</text>
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Frequency sets δ — and the angles. Verify them on the reference standard.</text>
</svg>
