<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Response Speed: A Defect Is a Modulation of the Carrier</text>

  <!-- ============ left: moving part through encircling coil ============ -->
  <text x="212" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">encircling coil</text>

  <!-- tube -->
  <rect x="50" y="140" width="320" height="44" fill="#DCE7F8" stroke="#0B1F3A" stroke-width="2"/>
  <text x="85" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">tube / bar</text>

  <!-- motion arrow -->
  <line x1="260" y1="120" x2="340" y2="120" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="352,120 340,114 340,126" fill="#0B1F3A"/>
  <text x="300" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">v = 2 m/s</text>

  <!-- coil windings above and below -->
  <rect x="195" y="104" width="34" height="34" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="195" y="186" width="34" height="34" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="204" cy="114" r="5" fill="#1E66F5"/>
  <circle cx="220" cy="114" r="5" fill="#1E66F5"/>
  <circle cx="204" cy="128" r="5" fill="#1E66F5"/>
  <circle cx="220" cy="128" r="5" fill="#1E66F5"/>
  <circle cx="204" cy="196" r="5" fill="#1E66F5"/>
  <circle cx="220" cy="196" r="5" fill="#1E66F5"/>
  <circle cx="204" cy="210" r="5" fill="#1E66F5"/>
  <circle cx="220" cy="210" r="5" fill="#1E66F5"/>

  <!-- defect notch -->
  <polygon points="146,140 158,140 152,150" fill="#0B1F3A"/>
  <text x="134" y="131" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">defect</text>
  <line x1="138" y1="133" x2="150" y2="141" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- sensing zone bracket -->
  <line x1="195" y1="228" x2="195" y2="236" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="229" y1="228" x2="229" y2="236" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="195" y1="232" x2="229" y2="232" stroke="#0B1F3A" stroke-width="2"/>
  <text x="212" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">w ≈ 5 mm</text>
  <text x="212" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">effective sensing zone</text>

  <!-- timing arithmetic -->
  <text x="50" y="306" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">transit t = w ÷ v = 2.5 ms</text>
  <text x="50" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">envelope ≈ 1 ÷ t ≈ 400 Hz</text>
  <text x="50" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">carrier must fit dozens of cycles into t</text>

  <!-- ============ right: carrier with envelope, two frequencies ============ -->
  <rect x="420" y="70" width="340" height="115" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="542" y="72" width="80" height="111" fill="#EAF1FE"/>
  <text x="582" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">transit (schematic)</text>
  <path d="M 430 130 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -36 8 0 q 4 36 8 0 q 4 -60 8 0 q 4 60 8 0 q 4 -68 8 0 q 4 68 8 0 q 4 -60 8 0 q 4 60 8 0 q 4 -36 8 0 q 4 36 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0 q 4 -20 8 0 q 4 20 8 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <path d="M 430 118 L 542 118 Q 582 72 622 118 L 750 118" fill="none" stroke="#9BC4FF" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="590" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10 kHz → 25 cycles in transit: envelope defined</text>

  <rect x="420" y="200" width="340" height="115" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="430" y="202" width="320" height="111" fill="#EAF1FE"/>
  <text x="590" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">same transit (schematic)</text>
  <path d="M 430 255 q 32 -60 64 0 q 32 60 64 0 q 32 -60 64 0 q 32 60 64 0 q 32 -60 64 0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="590" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1 kHz → 2.5 cycles — envelope undefined</text>

  <!-- ============ bottom: filter passband vs speed ============ -->
  <rect x="210" y="400" width="418" height="40" fill="#DCE7F8" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="419" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">band-pass set for the qualified speed</text>
  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">HP 250 Hz</text>
  <text x="628" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">LP 1 kHz</text>

  <line x1="70" y1="440" x2="740" y2="440" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="752,440 740,434 740,446" fill="#0B1F3A"/>
  <text x="740" y="476" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">defect envelope (modulation) frequency →</text>

  <circle cx="293" cy="440" r="6" fill="#1E66F5"/>
  <text x="293" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">400 Hz — qualified speed</text>
  <line x1="293" y1="378" x2="293" y2="432" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 4"/>

  <circle cx="182" cy="440" r="6" fill="#0B1F3A"/>
  <text x="182" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">200 Hz — half speed: below HP, lost</text>
</svg>
