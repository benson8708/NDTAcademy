<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Fill Factor: Coupling for Encircling and Bobbin Coils</text>

  <!-- ===== left panel: encircling coil ===== -->
  <text x="215" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Encircling (OD) coil</text>

  <!-- coil ring -->
  <circle cx="215" cy="225" r="92" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="215" cy="225" r="74" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- winding dots in the ring -->
  <circle cx="298" cy="225" r="5" fill="#1E66F5"/>
  <circle cx="273.7" cy="166.3" r="5" fill="#1E66F5"/>
  <circle cx="215" cy="142" r="5" fill="#1E66F5"/>
  <circle cx="156.3" cy="166.3" r="5" fill="#1E66F5"/>
  <circle cx="132" cy="225" r="5" fill="#1E66F5"/>
  <circle cx="156.3" cy="283.7" r="5" fill="#1E66F5"/>
  <circle cx="215" cy="308" r="5" fill="#1E66F5"/>
  <circle cx="273.7" cy="283.7" r="5" fill="#1E66F5"/>
  <!-- rod -->
  <circle cx="215" cy="225" r="66" fill="#DCE7F8" stroke="#0B1F3A" stroke-width="2"/>

  <!-- part diameter arrow (horizontal) -->
  <line x1="149" y1="225" x2="281" y2="225" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="149,225 159,220 159,230" fill="#0B1F3A"/>
  <polygon points="281,225 271,220 271,230" fill="#0B1F3A"/>
  <text x="215" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">d (part)</text>

  <!-- coil effective diameter arrow (vertical, dashed) -->
  <line x1="215" y1="142" x2="215" y2="308" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="215,142 210,152 220,152" fill="#1E66F5"/>
  <polygon points="215,308 210,298 220,298" fill="#1E66F5"/>
  <text x="228" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">D (coil, effective)</text>

  <text x="215" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">η = (part dia ÷ coil dia)²</text>
  <text x="215" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">15.9 mm rod in 17.0 mm coil → η ≈ 0.87</text>

  <!-- ===== right panel: bobbin in tube ===== -->
  <text x="575" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Internal bobbin (ID) probe</text>

  <!-- tube wall -->
  <circle cx="575" cy="225" r="92" fill="#DCE7F8" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="575" cy="225" r="76" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="690" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tube wall</text>
  <line x1="686" y1="170" x2="655" y2="188" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- bobbin probe body -->
  <circle cx="575" cy="225" r="66" fill="#EAF1FE" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="575" cy="225" r="54" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="575" cy="225" r="8" fill="#0B1F3A"/>

  <!-- probe diameter arrow (horizontal) -->
  <line x1="509" y1="225" x2="641" y2="225" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="509,225 519,220 519,230" fill="#0B1F3A"/>
  <polygon points="641,225 631,220 631,230" fill="#0B1F3A"/>
  <text x="575" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">d (probe)</text>

  <!-- tube ID arrow (vertical, dashed) -->
  <line x1="575" y1="149" x2="575" y2="301" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="575,149 570,159 580,159" fill="#1E66F5"/>
  <polygon points="575,301 570,291 580,291" fill="#1E66F5"/>
  <text x="588" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">D (tube ID)</text>

  <text x="575" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">η = (probe dia ÷ tube ID)²</text>
  <text x="575" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">14.0 / 15.75 → η ≈ 0.79 (19.05 × 1.65 mm tube)</text>

  <!-- ===== bottom strip: amplitude vs fill factor ===== -->
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">signal amplitude ≈ proportional to fill factor η</text>
  <line x1="180" y1="490" x2="640" y2="490" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 240 490 L 250 454 L 260 490 Z" fill="#1E66F5"/>
  <text x="266" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">η = 1.0</text>
  <path d="M 390 490 L 400 461 L 410 490 Z" fill="#1E66F5"/>
  <text x="416" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">η = 0.8</text>
  <path d="M 540 490 L 550 475.6 L 560 490 Z" fill="#1E66F5"/>
  <text x="566" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">η = 0.4</text>
</svg>
