<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Alarm Gates and the Production Alarm Chain</text>

  <!-- panel divider -->
  <line x1="395" y1="60" x2="395" y2="472" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- ================= LEFT PANEL: GATES ON THE IMPEDANCE PLANE ================= -->
  <text x="205" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Gates on the impedance plane</text>

  <!-- sector (phase) gate wedge -->
  <path d="M100,360 L122,151 A210,210 0 0 1 205,178 Z" fill="#1E66F5" fill-opacity="0.15" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="215" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">sector (phase) gate</text>

  <!-- box gate alternative -->
  <rect x="255" y="210" width="90" height="80" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">box gate (alt.)</text>

  <!-- axes -->
  <line x1="100" y1="360" x2="100" y2="114" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="94,116 106,116 100,102" fill="#0B1F3A"/>
  <text x="112" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">vertical (V)</text>
  <line x1="100" y1="360" x2="360" y2="360" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="358,354 358,366 372,360" fill="#0B1F3A"/>
  <text x="330" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">horizontal (H)</text>

  <!-- lift-off vector along horizontal -->
  <line x1="102" y1="354" x2="246" y2="354" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="244,347 244,361 260,354" fill="#1E66F5"/>
  <text x="152" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">lift-off (rotated horizontal)</text>

  <!-- crack signal climbing into the gate -->
  <path d="M100,360 C90,330 120,220 150,200 C168,190 162,240 148,275 C138,300 115,340 100,360" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="160" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crack signal</text>

  <!-- notes -->
  <text x="215" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off skates along H &#8212; outside the gate</text>
  <text x="215" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">a signal entering the gate trips the alarm</text>

  <!-- ================= RIGHT PANEL: PRODUCTION ALARM CHAIN ================= -->
  <text x="595" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Production alarm chain</text>

  <!-- alarm unit -->
  <rect x="520" y="100" width="150" height="56" rx="6" fill="#0B1F3A"/>
  <text x="595" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">alarm unit</text>
  <text x="595" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">threshold + latch</text>

  <!-- alarm light -->
  <circle cx="708" cy="114" r="13" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="708" y1="92" x2="708" y2="98" stroke="#1E66F5" stroke-width="2"/>
  <line x1="692" y1="100" x2="696" y2="104" stroke="#1E66F5" stroke-width="2"/>
  <line x1="724" y1="100" x2="720" y2="104" stroke="#1E66F5" stroke-width="2"/>
  <text x="744" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">light</text>

  <!-- horn -->
  <polygon points="690,168 690,192 712,180" fill="#1E66F5"/>
  <path d="M718,172 Q726,180 718,188" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="744" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">horn</text>

  <!-- relay wire from alarm unit to marker -->
  <path d="M648,156 L648,166 L700,166 L700,182" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="652" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">relay</text>

  <!-- paint marker nozzle -->
  <rect x="692" y="182" width="16" height="24" fill="#1E66F5"/>
  <line x1="700" y1="210" x2="700" y2="228" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="640" y="198" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">paint marker</text>

  <!-- feed arrow -->
  <line x1="425" y1="216" x2="465" y2="216" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="463,210 463,222 477,216" fill="#0B1F3A"/>
  <text x="442" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">feed</text>

  <!-- bar -->
  <rect x="425" y="235" width="345" height="52" rx="26" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- encircling coil -->
  <ellipse cx="520" cy="261" rx="16" ry="46" fill="none" stroke="#1E66F5" stroke-width="8"/>
  <line x1="528" y1="218" x2="552" y2="158" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="500" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil</text>

  <!-- marked defect under the nozzle -->
  <polygon points="694,235 706,235 700,243" fill="#0B1F3A"/>
  <ellipse cx="700" cy="233" rx="9" ry="5" fill="#1E66F5"/>
  <text x="700" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">defect marked</text>

  <!-- delay dimension between coil and marker -->
  <line x1="520" y1="330" x2="520" y2="342" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="700" y1="330" x2="700" y2="342" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="520" y1="336" x2="700" y2="336" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="610" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">delay = distance &#247; line speed</text>

  <!-- verification notes -->
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">reference standard proves the alarm:</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at setup, at set intervals, at end of run</text>
  <text x="600" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">fail &#8658; re-test since last good check</text>
</svg>
