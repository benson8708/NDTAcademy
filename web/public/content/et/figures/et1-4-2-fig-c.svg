<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Lift-Off Decay: Equal Shims, Shrinking Steps</text>

  <!-- wobble zone band -->
  <rect x="110" y="90" width="39" height="340" fill="#9BC4FF" opacity="0.15"/>
  <text transform="rotate(-90 134 262)" x="134" y="262" text-anchor="middle" font-size="14" fill="#1E66F5">wobble zone — steepest response</text>

  <!-- axes -->
  <line x1="110" y1="90" x2="110" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="110" y1="430" x2="510" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="110" y1="430" x2="110" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="188" y1="430" x2="188" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="266" y1="430" x2="266" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="344" y1="430" x2="344" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="422" y1="430" x2="422" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="500" y1="430" x2="500" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <text x="110" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0</text>
  <text x="188" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0.2</text>
  <text x="266" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0.4</text>
  <text x="344" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0.6</text>
  <text x="422" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">0.8</text>
  <text x="500" y="452" text-anchor="middle" font-size="14" fill="#0B1F3A">1.0</text>
  <line x1="104" y1="430" x2="110" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="104" y1="347.5" x2="110" y2="347.5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="104" y1="265" x2="110" y2="265" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="104" y1="182.5" x2="110" y2="182.5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="104" y1="100" x2="110" y2="100" stroke="#0B1F3A" stroke-width="2"/>
  <text x="98" y="435" text-anchor="end" font-size="14" fill="#0B1F3A">0</text>
  <text x="98" y="352" text-anchor="end" font-size="14" fill="#0B1F3A">25</text>
  <text x="98" y="270" text-anchor="end" font-size="14" fill="#0B1F3A">50</text>
  <text x="98" y="187" text-anchor="end" font-size="14" fill="#0B1F3A">75</text>
  <text x="98" y="105" text-anchor="end" font-size="14" fill="#0B1F3A">100</text>
  <text x="310" y="478" text-anchor="middle" font-size="15" fill="#0B1F3A">Lift-off — coil-to-surface gap (mm)</text>
  <text transform="rotate(-90 56 260)" x="56" y="260" text-anchor="middle" font-size="15" fill="#0B1F3A">Dot travel toward air point (% of full excursion)</text>

  <!-- asymptote -->
  <line x1="110" y1="100" x2="510" y2="100" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="118" y="92" font-size="14" fill="#0B1F3A" opacity="0.65">air point — fully decoupled (100%)</text>

  <!-- decay curve -->
  <polyline points="110,430 129.5,355.8 149,298 168.5,253.8 188,218.8 207.5,192.1 227,171.5 246.5,155.4 266,142.9 305,125.7 344,115.5 383,109.3 422,105.6 461,103.4 500,102" fill="none" stroke="#1E66F5" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="149" cy="298" r="4.5" fill="#0B1F3A"/>
  <circle cx="188" cy="218.8" r="4.5" fill="#0B1F3A"/>
  <circle cx="227" cy="171.5" r="4.5" fill="#0B1F3A"/>
  <circle cx="266" cy="142.9" r="4.5" fill="#0B1F3A"/>
  <circle cx="305" cy="125.7" r="4.5" fill="#0B1F3A"/>
  <text x="157" y="304" font-size="14" fill="#0B1F3A">0.1 mm &#8594; 40%</text>
  <text x="235" y="178" font-size="14" fill="#0B1F3A">0.3 mm &#8594; 78%</text>
  <text x="313" y="144" font-size="14" fill="#0B1F3A">0.5 mm &#8594; 92%</text>

  <!-- step bar chart -->
  <text x="560" y="96" font-size="16" font-weight="bold" fill="#0B1F3A">Signal added by each</text>
  <text x="560" y="116" font-size="16" font-weight="bold" fill="#0B1F3A">successive 0.1 mm shim</text>
  <text x="560" y="138" font-size="14" fill="#0B1F3A" opacity="0.65">(% of full excursion)</text>
  <rect x="566" y="240" width="28" height="160" fill="#1E66F5"/>
  <rect x="602" y="304" width="28" height="96" fill="#9BC4FF"/>
  <rect x="638" y="344" width="28" height="56" fill="#9BC4FF"/>
  <rect x="674" y="364" width="28" height="36" fill="#9BC4FF"/>
  <rect x="710" y="380" width="28" height="20" fill="#9BC4FF"/>
  <rect x="746" y="388" width="28" height="12" fill="#9BC4FF"/>
  <line x1="556" y1="400" x2="780" y2="400" stroke="#0B1F3A" stroke-width="2"/>
  <text x="580" y="232" text-anchor="middle" font-size="14" fill="#0B1F3A">40</text>
  <text x="616" y="296" text-anchor="middle" font-size="14" fill="#0B1F3A">24</text>
  <text x="652" y="336" text-anchor="middle" font-size="14" fill="#0B1F3A">14</text>
  <text x="688" y="356" text-anchor="middle" font-size="14" fill="#0B1F3A">9</text>
  <text x="724" y="372" text-anchor="middle" font-size="14" fill="#0B1F3A">5</text>
  <text x="760" y="380" text-anchor="middle" font-size="14" fill="#0B1F3A">3</text>
  <text x="580" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">1</text>
  <text x="616" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">2</text>
  <text x="652" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">3</text>
  <text x="688" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">4</text>
  <text x="724" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">5</text>
  <text x="760" y="420" text-anchor="middle" font-size="14" fill="#0B1F3A">6</text>
  <text x="668" y="444" text-anchor="middle" font-size="14" fill="#0B1F3A" opacity="0.65">shim number</text>

  <text x="110" y="493" font-size="14" fill="#0B1F3A" opacity="0.65">Typical small absolute surface probe — the decay distance scales with coil diameter.</text>
</svg>
