<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Same Flaw, Different Significance</text>

  <!-- ============ Case 1: cyclic bending ============ -->
  <text x="200" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Case 1 — cyclic bending member</text>
  <rect x="50" y="150" width="300" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- compression arrows at top fiber (pointing toward each other) -->
  <line x1="70" y1="168" x2="130" y2="168" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="126,161 140,168 126,175" fill="#5A6B7E"/>
  <line x1="330" y1="168" x2="270" y2="168" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="274,161 260,168 274,175" fill="#5A6B7E"/>
  <text x="200" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">compression fiber</text>
  <!-- cyclic tension arrows at bottom fiber (pointing apart) -->
  <line x1="140" y1="272" x2="80" y2="272" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="84,264 68,272 84,280" fill="#F2A33C"/>
  <line x1="260" y1="272" x2="320" y2="272" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="316,264 332,272 316,280" fill="#F2A33C"/>
  <!-- vertical planar flaw near bottom surface, perpendicular to tension -->
  <line x1="200" y1="236" x2="200" y2="286" stroke="#D14343" stroke-width="6"/>
  <line x1="206" y1="244" x2="252" y2="216" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="256" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">planar flaw</text>
  <text x="200" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">cyclic tension</text>
  <text x="200" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">HIGH significance</text>
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flaw face square to the cyclic tensile</text>
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">stress, at the highest-stressed fiber</text>

  <!-- ============ Case 2: static, neutral axis ============ -->
  <text x="600" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Case 2 — static load, neutral axis</text>
  <rect x="450" y="150" width="300" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- neutral axis dashed centerline -->
  <line x1="450" y1="220" x2="750" y2="220" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="742" y="208" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">neutral axis</text>
  <!-- static stress arrows along axis (modest, pointing apart) -->
  <line x1="520" y1="252" x2="480" y2="252" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="484,245 470,252 484,259" fill="#1E9E6A"/>
  <line x1="680" y1="252" x2="720" y2="252" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="716,245 730,252 716,259" fill="#1E9E6A"/>
  <text x="600" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">low static stress</text>
  <!-- horizontal flaw lying on neutral axis, parallel to stress -->
  <line x1="560" y1="220" x2="640" y2="220" stroke="#D14343" stroke-width="6"/>
  <line x1="636" y1="214" x2="668" y2="186" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="672" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">same flaw</text>
  <text x="600" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">static load only</text>
  <text x="600" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">LOWER significance</text>
  <text x="600" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flaw lies parallel to a low static stress</text>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">at the least-stressed plane</text>

  <!-- footnote -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Same size, same amplitude — the object, its stresses, and its duty decide the verdict.</text>
</svg>
