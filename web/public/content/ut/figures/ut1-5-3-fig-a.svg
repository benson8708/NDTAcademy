<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Air-Coupled Through-Transmission</text>

  <!-- transmitter (top) -->
  <rect x="350" y="70" width="100" height="46" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">transmitter</text>
  <rect x="356" y="112" width="88" height="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>

  <!-- air gap 1 -->
  <text x="560" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B82E8">air gap (Z very low)</text>
  <line x1="400" y1="118" x2="400" y2="160" stroke="#1B82E8" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- interface 1 -->
  <rect x="200" y="160" width="400" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="250" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">composite / honeycomb part (Z high)</text>

  <!-- flaw (delamination) -->
  <rect x="380" y="218" width="80" height="10" fill="#D14343" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="460" y1="223" x2="560" y2="210" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="564" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D14343">disbond / delamination</text>

  <!-- big reflection at interface 1 -->
  <line x1="375" y1="160" x2="345" y2="130" stroke="#D14343" stroke-width="3"/>
  <polygon points="349,128 343,128 343,134" fill="#D14343"/>
  <text x="300" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">≈ most energy reflects</text>

  <!-- small transmitted beam into part -->
  <line x1="400" y1="160" x2="400" y2="290" stroke="#1B82E8" stroke-width="1.5"/>
  <polygon points="396,270 400,282 404,270" fill="#1B82E8"/>

  <!-- air gap 2 -->
  <line x1="400" y1="290" x2="400" y2="332" stroke="#1B82E8" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- receiver (bottom) -->
  <rect x="350" y="332" width="100" height="46" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="356" y="326" width="88" height="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">receiver</text>

  <!-- second reflection note -->
  <line x1="425" y1="290" x2="455" y2="318" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="451,316 457,316 457,310" fill="#D14343"/>
  <text x="560" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">again at the exit interface</text>

  <!-- loss budget box -->
  <rect x="40" y="312" width="160" height="78" rx="6" fill="#0A2342"/>
  <text x="120" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">Loss budget</text>
  <text x="120" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">2 interfaces</text>
  <text x="120" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">&gt; 100 dB (≈ 10⁵)</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">A flaw blocks the path → the receiver sees less signal (a shadow). No echo → no depth, both sides needed.</text>
</svg>
