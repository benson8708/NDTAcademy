<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Contact Testing — Probe, Couplant, Part, and Sound Path</text>

  <!-- ===== LEFT: setup cross-section ===== -->
  <!-- part (steel block) -->
  <rect x="70" y="200" width="320" height="180" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="230" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">steel part</text>

  <!-- back wall label -->
  <line x1="70" y1="380" x2="390" y2="380" stroke="#0A2342" stroke-width="3"/>
  <text x="230" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">back wall</text>

  <!-- transducer housing -->
  <rect x="180" y="120" width="100" height="60" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="230" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">transducer</text>
  <!-- piezo element -->
  <rect x="186" y="176" width="88" height="8" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>

  <!-- couplant film (exaggerated) -->
  <rect x="180" y="192" width="100" height="8" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <line x1="280" y1="196" x2="430" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="434" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">couplant film</text>
  <text x="434" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">bridges the steel-to-air gap</text>

  <!-- hand-pressure arrow -->
  <line x1="230" y1="92" x2="230" y2="116" stroke="#0A2342" stroke-width="3"/>
  <polygon points="222,108 230,122 238,108" fill="#0A2342"/>
  <text x="230" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">light, steady pressure</text>

  <!-- sound path down and echo back -->
  <line x1="222" y1="200" x2="222" y2="380" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="216,348 222,364 228,348" fill="#1B82E8"/>
  <line x1="238" y1="380" x2="238" y2="200" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="232,232 238,216 244,232" fill="#1E9E6A"/>
  <text x="150" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">pulse in</text>
  <text x="312" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">echo back</text>

  <!-- ===== RIGHT: A-scan screen ===== -->
  <rect x="470" y="120" width="290" height="230" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <!-- baseline -->
  <line x1="490" y1="320" x2="745" y2="320" stroke="#5A6B7E" stroke-width="2"/>
  <!-- vertical gridlines -->
  <line x1="490" y1="140" x2="490" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- initial pulse -->
  <line x1="505" y1="320" x2="505" y2="160" stroke="#F2A33C" stroke-width="3"/>
  <text x="505" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">initial</text>
  <text x="505" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">pulse</text>
  <!-- dead zone shading -->
  <rect x="505" y="160" width="40" height="160" fill="#D14343" opacity="0.25"/>
  <text x="560" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">dead zone</text>
  <!-- back-wall echo -->
  <line x1="690" y1="320" x2="690" y2="185" stroke="#1E9E6A" stroke-width="3"/>
  <text x="690" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">back-wall echo</text>
  <!-- screen title -->
  <text x="615" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">A-scan: amplitude vs. time</text>

  <!-- ===== bottom note ===== -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Steel-to-air reflects ≈ 100% of the sound — couplant lets energy cross into the part.</text>
</svg>
