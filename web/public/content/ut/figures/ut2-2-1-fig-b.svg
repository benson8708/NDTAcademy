  <!-- bottom notes -->
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Coarse as-cast grain scatters sound — drop to 1–2.25 MHz for workable signal-to-noise</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Watch the back reflection as well as flaw echoes: scatterers steal energy without one clean signal</text>
</svg>
