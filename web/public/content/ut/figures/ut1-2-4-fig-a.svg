<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Snell's Law and Mode Conversion</text>

  <!-- media -->
  <rect x="60" y="80" width="680" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="60" y="230" width="680" height="140" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="60" y1="230" x2="740" y2="230" stroke="#0A2342" stroke-width="3.5"/>
  <text x="75" y="105" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">ACRYLIC WEDGE — v(L) = 2,730 m/s</text>
  <text x="75" y="356" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">STEEL — v(L) 5,920 · v(S) 3,240 m/s</text>

  <!-- normal -->
  <line x1="400" y1="95" x2="400" y2="362" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7,6"/>
  <text x="408" y="120" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">normal</text>

  <!-- incident beam (20 deg) -->
  <line x1="359" y1="117" x2="395" y2="217" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="400,230 390,219 401,215" fill="#1B82E8"/>
  <text x="310" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">incident L — 20°</text>

  <!-- reflected beam -->
  <line x1="400" y1="230" x2="436" y2="130" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="441,117 442,132 431,128" fill="#5A6B7E"/>
  <text x="472" y="126" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">reflected</text>

  <!-- refracted L (48 deg) -->
  <line x1="400" y1="230" x2="501" y2="321" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="511,330 497,325 505,316" fill="#1B82E8"/>
  <text x="528" y="318" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">refracted L — 48°</text>

  <!-- mode-converted S (24 deg) -->
  <line x1="400" y1="230" x2="455" y2="354" stroke="#D14343" stroke-width="3"/>
  <polygon points="461,367 450,357 461,352" fill="#D14343"/>
  <text x="474" y="362" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">mode-converted S — 24°</text>

  <!-- angle arcs -->
  <path d="M 400 155 A 75 75 0 0 0 374 160" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <text x="377" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20°</text>
  <path d="M 400 325 A 95 95 0 0 0 470 294" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <text x="452" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">48°</text>
  <path d="M 400 285 A 55 55 0 0 0 422 280" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <text x="427" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">24°</text>

  <!-- formula panel -->
  <rect x="545" y="96" width="205" height="92" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="647" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Snell's law</text>
  <text x="647" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sin θ₁ ÷ v₁ = sin θ₂ ÷ v₂</text>
  <text x="647" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">angles from the normal</text>

  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Below the first critical angle BOTH modes enter — two beams, two velocities</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Angle-beam wedges are designed beyond it, so only shear remains</text>
</svg>
