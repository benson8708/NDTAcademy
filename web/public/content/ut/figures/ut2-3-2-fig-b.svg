<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Same Casting Wall, Two Frequencies</text>

  <!-- ============ LEFT: 5 MHz ============ -->
  <rect x="45" y="80" width="330" height="250" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="55" y1="305" x2="365" y2="305" stroke="#0A2342" stroke-width="2"/>
  <!-- initial pulse -->
  <polyline points="62,305 68,108 74,305 80,165 86,305" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- grass everywhere -->
  <polyline points="95,305 100,235 105,305 110,255 115,305 120,222 125,305 130,262 135,305 140,230 145,305 150,250 155,305 160,218 165,305 170,258 175,305 180,236 185,305 190,252 195,305 200,225 205,305 210,260 215,305 220,232 225,305 230,248 235,305 240,220 245,305 250,256 255,305 260,238 265,305 270,250 275,305 280,228 285,305 290,260 295,305 300,234 305,305 310,252 315,305 320,224 325,305 330,258 335,305 340,240 345,305 350,254 355,305 360,236 365,305" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <text x="210" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">grass to 40% — no back echo</text>
  <text x="210" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">5 MHz: scattering wins</text>
  <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">grain noise rises roughly with f to the 4th</text>

  <!-- ============ RIGHT: 1 MHz ============ -->
  <rect x="425" y="80" width="330" height="250" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="435" y1="305" x2="745" y2="305" stroke="#0A2342" stroke-width="2"/>
  <!-- initial pulse -->
  <polyline points="442,305 448,108 454,305 460,165 466,305" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- low grass -->
  <polyline points="475,305 482,296 489,305 496,298 503,305 510,295 517,305 524,297 531,305 538,296 545,305 552,298 559,305 566,295 573,305 580,297 587,305 594,296 601,305 608,298 615,305 622,296 629,305 636,297 643,305" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- indication -->
  <polyline points="540,305 552,200 564,305" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="552" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">real indication</text>
  <!-- back echo -->
  <polyline points="690,305 702,110 714,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="688" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">back echo restored</text>
  <text x="590" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">1 MHz: signal returns</text>
  <text x="590" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">wavelength 5.9 mm steps over the grains</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Gain raises grass and signal together — frequency is the lever that fixes signal-to-noise</text>
</svg>
