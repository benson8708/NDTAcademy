<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">C-Scan Signatures in a Solid Laminate</text>

  <!-- scanned panel (plan view) -->
  <rect x="70" y="70" width="490" height="310" rx="8" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="315" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">plan view — gated amplitude map</text>

  <!-- delamination: sharp-edged dead zone -->
  <path d="M 130 150 L 215 135 L 250 180 L 230 240 L 150 245 L 115 195 Z" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="183" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Delamination</text>
  <text x="183" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sharp-edged dead zone</text>

  <!-- porosity: mottled diffuse loss -->
  <circle cx="350" cy="150" r="6" fill="#F2A33C" opacity="0.8"/>
  <circle cx="372" cy="168" r="5" fill="#5A6B7E" opacity="0.7"/>
  <circle cx="394" cy="148" r="7" fill="#F2A33C" opacity="0.6"/>
  <circle cx="416" cy="170" r="5" fill="#5A6B7E" opacity="0.8"/>
  <circle cx="438" cy="152" r="6" fill="#F2A33C" opacity="0.7"/>
  <circle cx="360" cy="190" r="5" fill="#F2A33C" opacity="0.7"/>
  <circle cx="384" cy="196" r="6" fill="#5A6B7E" opacity="0.6"/>
  <circle cx="408" cy="192" r="5" fill="#F2A33C" opacity="0.8"/>
  <circle cx="432" cy="198" r="6" fill="#5A6B7E" opacity="0.7"/>
  <circle cx="372" cy="218" r="5" fill="#F2A33C" opacity="0.6"/>
  <circle cx="396" cy="222" r="6" fill="#F2A33C" opacity="0.75"/>
  <circle cx="420" cy="216" r="5" fill="#5A6B7E" opacity="0.7"/>
  <text x="395" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Porosity</text>
  <text x="395" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">mottled, diffuse loss</text>

  <!-- film inclusion: discrete footprint -->
  <rect x="270" y="300" width="80" height="44" rx="4" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Film inclusion — discrete footprint</text>

  <!-- good area marker -->
  <text x="480" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">full transmission</text>
  <text x="480" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">(good laminate)</text>

  <!-- ============ legend ============ -->
  <text x="680" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Signal legend</text>
  <rect x="600" y="120" width="26" height="26" fill="#1E9E6A"/>
  <text x="636" y="139" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">full signal</text>
  <rect x="600" y="160" width="26" height="26" fill="#F2A33C"/>
  <text x="636" y="179" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">partial loss</text>
  <rect x="600" y="200" width="26" height="26" fill="#D14343"/>
  <text x="636" y="219" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">near-total loss</text>

  <text x="680" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Amplitude map answers</text>
  <text x="680" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">"how much got through";</text>
  <text x="680" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">time-of-flight adds</text>
  <text x="680" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">"how deep"</text>

  <!-- bottom note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Production composites are judged in plan view — learn the three footprints</text>
</svg>
