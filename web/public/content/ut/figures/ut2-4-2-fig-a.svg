<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Weld Discontinuity Atlas — Multi-Pass Single-V Butt Weld</text>

  <!-- HAZ dashed bands -->
  <line x1="262" y1="150" x2="370" y2="320" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="538" y1="150" x2="430" y2="320" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- plates -->
  <path d="M 60 150 L 285 150 L 392 308 L 392 320 L 60 320 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 515 150 L 740 150 L 740 320 L 408 320 L 408 308 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>

  <!-- weld metal -->
  <path d="M 285 150 L 515 150 L 408 308 L 408 320 L 392 320 L 392 308 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <!-- pass contours -->
  <path d="M 320 200 Q 400 184 480 200" fill="none" stroke="#5A6B7E" stroke-width="0.9"/>
  <path d="M 340 250 Q 400 236 460 250" fill="none" stroke="#5A6B7E" stroke-width="0.9"/>
  <path d="M 362 290 Q 400 280 438 290" fill="none" stroke="#5A6B7E" stroke-width="0.9"/>
  <!-- cap + root bead -->
  <path d="M 270 150 Q 400 122 530 150" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 385 320 Q 400 333 415 320" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- 1 toe crack (left cap toe) -->
  <polyline points="274,149 279,160 273,170 278,180" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- 2 centerline (hot) crack -->
  <polyline points="400,168 395,184 404,200 397,216 402,232" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- 3 HAZ / underbead cold crack (left, ~parallel to fusion line) -->
  <polyline points="328,258 336,268 331,279 339,290" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- 4 sidewall lack of fusion (on right bevel) -->
  <line x1="478" y1="205" x2="444" y2="255" stroke="#D14343" stroke-width="5"/>
  <!-- 5 slag inclusion (interpass, left) -->
  <ellipse cx="352" cy="230" rx="17" ry="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1" transform="rotate(-24 352 230)"/>
  <!-- 6 porosity cluster -->
  <circle cx="432" cy="188" r="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="444" cy="180" r="3.4" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="452" cy="192" r="3.8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="437" cy="200" r="3.2" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="448" cy="204" r="3" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <!-- 7 incomplete penetration (root, vertical) -->
  <line x1="400" y1="306" x2="400" y2="321" stroke="#D14343" stroke-width="5"/>
  <!-- 8 undercut (right cap toe) -->
  <path d="M 534 150 Q 541 161 548 150" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>

  <!-- labels + leaders -->
  <text x="150" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">toe crack</text>
  <line x1="190" y1="118" x2="270" y2="146" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">centerline (hot) crack</text>
  <line x1="400" y1="102" x2="400" y2="164" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="128" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">slag inclusion</text>
  <line x1="180" y1="247" x2="334" y2="232" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="146" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">HAZ (underbead) cold crack</text>
  <line x1="200" y1="348" x2="328" y2="278" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="652" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">undercut at toe</text>
  <line x1="618" y1="122" x2="544" y2="147" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="648" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">porosity cluster</text>
  <line x1="592" y1="192" x2="458" y2="192" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="652" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sidewall lack of fusion</text>
  <line x1="588" y1="256" x2="466" y2="228" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="330" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">incomplete penetration (root)</text>
  <line x1="360" y1="384" x2="398" y2="324" stroke="#5A6B7E" stroke-width="1.2"/>

  <text x="600" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">HAZ</text>
  <line x1="580" y1="348" x2="478" y2="252" stroke="#F2A33C" stroke-width="1.2"/>

  <!-- bottom note -->
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Each discontinuity sits where its formation mechanism puts it — fusion flaws on fusion faces, hot cracks on the centerline, cold cracks in the HAZ</text>
</svg>
