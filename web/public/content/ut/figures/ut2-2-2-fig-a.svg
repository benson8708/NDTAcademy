<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Rolling Turns Casting Flaws into Laminations</text>

  <!-- rolls -->
  <circle cx="330" cy="140" r="60" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="3"/>
  <circle cx="330" cy="340" r="60" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="3"/>
  <text x="330" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">rolls</text>

  <!-- metal: slab tapering to plate -->
  <polygon points="230,170 320,205 470,228 470,252 320,275 230,310" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="50" y="170" width="180" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <rect x="470" y="228" width="280" height="24" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- slab defects -->
  <ellipse cx="125" cy="210" rx="16" ry="22" fill="#D14343"/>
  <circle cx="105" cy="265" r="6" fill="#F2A33C"/>
  <circle cx="138" cy="280" r="6" fill="#F2A33C"/>
  <circle cx="115" cy="295" r="5" fill="#F2A33C"/>
  <circle cx="180" cy="245" r="3.5" fill="#5A6B7E"/>
  <circle cx="190" cy="255" r="3.5" fill="#5A6B7E"/>
  <circle cx="175" cy="258" r="3.5" fill="#5A6B7E"/>
  <circle cx="188" cy="266" r="3.5" fill="#5A6B7E"/>

  <!-- plate defects -->
  <line x1="500" y1="240" x2="640" y2="240" stroke="#D14343" stroke-width="3"/>
  <line x1="655" y1="236" x2="685" y2="236" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="692" y1="244" x2="722" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="660" y1="245" x2="684" y2="245" stroke="#5A6B7E" stroke-width="2"/>

  <!-- product labels -->
  <text x="140" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Slab (from ingot or caster)</text>
  <text x="700" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Plate</text>

  <!-- slab defect labels -->
  <line x1="95" y1="135" x2="120" y2="192" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="40" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">Pipe remnant</text>
  <line x1="105" y1="395" x2="110" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="40" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">Blowholes</text>
  <line x1="195" y1="395" x2="185" y2="270" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="160" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E" font-weight="bold">Inclusion cluster</text>

  <!-- plate defect labels -->
  <line x1="560" y1="196" x2="556" y2="237" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="560" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Lamination — planar, parallel to surface,</text>
  <text x="560" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">near mid-thickness</text>
  <line x1="690" y1="318" x2="690" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="660" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">Stringers (elongated inclusions)</text>

  <!-- rolling direction arrow -->
  <line x1="500" y1="290" x2="600" y2="290" stroke="#0A2342" stroke-width="3"/>
  <polygon points="600,283 600,297 616,290" fill="#0A2342"/>
  <text x="558" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rolling direction</text>

  <!-- bottom note -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Thickness shrinks, length grows — every internal feature flattens and elongates in the rolling plane</text>
</svg>
