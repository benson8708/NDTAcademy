<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Element Thickness Sets Resonant Frequency</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">PZT-type ceramic, v ≈ 4,000 m/s — element is λ/2 thick at resonance</text>

  <!-- ============ disc 1: 2.25 MHz, t = 0.89 mm ============ -->
  <rect x="110" y="110" width="90" height="180" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <!-- half-wave inside -->
  <path d="M 110 282 Q 155 110 200 282" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <!-- thickness dimension -->
  <line x1="110" y1="318" x2="200" y2="318" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="110" y1="310" x2="110" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="200" y1="310" x2="200" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <text x="155" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">t = 0.89 mm</text>
  <text x="155" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#E8F1FB">2.25 MHz</text>

  <!-- ============ disc 2: 5 MHz, t = 0.40 mm ============ -->
  <rect x="380" y="110" width="40" height="180" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M 380 282 Q 400 110 420 282" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <line x1="380" y1="318" x2="420" y2="318" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="380" y1="310" x2="380" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="420" y1="310" x2="420" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <text x="400" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">t = 0.40 mm</text>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#E8F1FB">5 MHz</text>

  <!-- ============ disc 3: 10 MHz, t = 0.20 mm ============ -->
  <rect x="610" y="110" width="20" height="180" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M 610 282 Q 620 110 630 282" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <line x1="610" y1="318" x2="630" y2="318" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="610" y1="310" x2="610" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="630" y1="310" x2="630" y2="326" stroke="#D9E0E8" stroke-width="2"/>
  <text x="620" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">t = 0.20 mm</text>
  <text x="620" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#E8F1FB">10 MHz</text>
  <text x="620" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">fragile!</text>

  <!-- arrows between discs -->
  <line x1="240" y1="200" x2="340" y2="200" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="340,193 356,200 340,207" fill="#5A6B7E"/>
  <line x1="460" y1="200" x2="560" y2="200" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="560,193 576,200 560,207" fill="#5A6B7E"/>
  <text x="298" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">thinner</text>
  <text x="518" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">thinner</text>

  <!-- half-wave legend -->
  <text x="155" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">half wavelength (λ/2)</text>

  <!-- formula bar -->
  <rect x="150" y="396" width="500" height="42" fill="#E8F1FB" rx="6"/>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">f = v ÷ (2 × t)   —   double the frequency, halve the thickness</text>
</svg>
