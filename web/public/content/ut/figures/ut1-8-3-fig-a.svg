<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Two Workhorse Reference Blocks</text>

  <!-- ===== IIW Type 1 block (side view) ===== -->
  <text x="80" y="64" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">IIW Type 1 (side view)</text>
  <path d="M 140,95 L 470,95 L 470,195 L 240,195 A 100 100 0 0 1 140,95 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- engraved zero mark at radius center -->
  <line x1="240" y1="88" x2="240" y2="102" stroke="#0A2342" stroke-width="2.5"/>
  <text x="240" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">engraved 0 mark</text>

  <!-- angle-beam wedge over the zero mark -->
  <polygon points="230,95 296,95 296,67 244,79" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="252" y="60" width="34" height="11" fill="#0A2342" transform="rotate(-13 269 65)"/>

  <!-- beam to the radius -->
  <line x1="269" y1="74" x2="240" y2="95" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="240" y1="95" x2="153" y2="145" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="160,150 152,136 146,152" fill="#1B82E8"/>
  <text x="208" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">100 mm</text>

  <!-- reference hole + degree scale -->
  <circle cx="390" cy="145" r="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="390" y1="145" x2="336" y2="191" stroke="#5A6B7E" stroke-width="1.2"/>
  <line x1="390" y1="145" x2="366" y2="191" stroke="#5A6B7E" stroke-width="1.2"/>
  <line x1="390" y1="145" x2="396" y2="191" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="336" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">70°</text>
  <text x="366" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">60°</text>
  <text x="396" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">45°</text>

  <line x1="404" y1="142" x2="492" y2="126" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="498" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">reference hole:</text>
  <text x="498" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">peak the echo, read the</text>
  <text x="498" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">actual refracted angle</text>

  <!-- radius notes -->
  <text x="180" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">R100: peak echo → exit point</text>
  <text x="180" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">range echoes: 100 / 225 / 350 mm</text>

  <!-- ===== basic calibration block ===== -->
  <text x="640" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">code-style basic calibration block</text>
  <rect x="540" y="250" width="200" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- side-drilled holes -->
  <circle cx="620" cy="288" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="620" cy="325" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="620" cy="362" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- depth labels -->
  <line x1="524" y1="288" x2="540" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="524" y1="325" x2="540" y2="325" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="524" y1="362" x2="540" y2="362" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="516" y="293" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">T/4</text>
  <text x="516" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">T/2</text>
  <text x="516" y="367" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3T/4</text>

  <!-- full thickness dimension -->
  <line x1="756" y1="250" x2="756" y2="400" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="750" y1="250" x2="762" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="750" y1="400" x2="762" y2="400" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="770" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">T</text>

  <!-- SDH label -->
  <line x1="628" y1="368" x2="652" y2="406" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="640" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">side-drilled holes (SDH)</text>

  <!-- rule note -->
  <text x="60" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Rule: the block must be</text>
  <text x="60" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">acoustically similar to the part</text>
  <text x="60" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(velocity, attenuation, surface,</text>
  <text x="60" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">heat-treatment class)</text>
</svg>
