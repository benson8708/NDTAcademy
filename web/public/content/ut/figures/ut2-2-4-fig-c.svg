<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">ERW Seam Scan — Standardized Screen</text>

  <!-- screen -->
  <rect x="60" y="70" width="680" height="300" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>

  <!-- grid -->
  <line x1="128" y1="70" x2="128" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="196" y1="70" x2="196" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="264" y1="70" x2="264" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="332" y1="70" x2="332" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="468" y1="70" x2="468" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="536" y1="70" x2="536" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="604" y1="70" x2="604" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="672" y1="70" x2="672" y2="370" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="130" x2="740" y2="130" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="190" x2="740" y2="190" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="250" x2="740" y2="250" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="310" x2="740" y2="310" stroke="#D9E0E8" stroke-width="1"/>

  <!-- baseline -->
  <line x1="70" y1="350" x2="730" y2="350" stroke="#0A2342" stroke-width="2"/>

  <!-- initial pulse -->
  <polyline points="75,350 83,105 91,350 98,160 105,350 111,230 117,350" fill="none" stroke="#0A2342" stroke-width="2"/>

  <!-- unknown echo (target) -->
  <polyline points="270,350 290,165 310,350" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="290" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F2A33C">?</text>

  <!-- ID notch reference -->
  <line x1="470" y1="95" x2="470" y2="350" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="6,5"/>
  <polyline points="452,350 470,135 488,350" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="470" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">ID ref — ½ V</text>

  <!-- OD notch reference -->
  <line x1="660" y1="95" x2="660" y2="350" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="6,5"/>
  <polyline points="642,350 660,150 678,350" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="660" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">OD ref — full V</text>

  <!-- labels under baseline (inside screen) -->
  <text x="105" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">initial pulse</text>
  <text x="290" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">unknown echo</text>
  <text x="470" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">½ V position</text>
  <text x="660" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">full-V position</text>

  <!-- bottom notes -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Soundpath grows left to right — ID notch standardized at half-V, OD notch at full-V</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">An echo arriving before ½ V = reflector inside the wall (mid-wall weld defect)</text>
</svg>
