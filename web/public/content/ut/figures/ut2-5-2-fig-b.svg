<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Through-Transmission and Resonance Bond Testing</text>

  <!-- divider -->
  <line x1="400" y1="56" x2="400" y2="430" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== LEFT: TTU squirter ===== -->
  <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Through-transmission (squirter)</text>

  <!-- transmitter nozzle -->
  <polygon points="150,96 190,96 180,130 160,130" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="240" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Transmitter</text>
  <!-- water column down -->
  <rect x="164" y="130" width="12" height="50" fill="#1B82E8" opacity="0.6"/>
  <line x1="170" y1="132" x2="170" y2="172" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="164,170 176,170 170,182" fill="#0A2342"/>

  <!-- sandwich panel -->
  <rect x="60" y="182" width="280" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="60" y="196" width="280" height="6" fill="#F2A33C"/>
  <line x1="80" y1="202" x2="80" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="104" y1="202" x2="104" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="128" y1="202" x2="128" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="152" y1="202" x2="152" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="176" y1="202" x2="176" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="200" y1="202" x2="200" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="224" y1="202" x2="224" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="248" y1="202" x2="248" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="272" y1="202" x2="272" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="296" y1="202" x2="296" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="320" y1="202" x2="320" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- disbond blocking path (red) at right side under second position -->
  <rect x="250" y="196" width="70" height="6" fill="#D14343"/>
  <rect x="60" y="252" width="280" height="6" fill="#F2A33C"/>
  <rect x="60" y="258" width="280" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- water column down through panel to receiver -->
  <rect x="164" y="272" width="12" height="50" fill="#1B82E8" opacity="0.6"/>
  <line x1="170" y1="276" x2="170" y2="312" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="164,310 176,310 170,322" fill="#0A2342"/>
  <!-- receiver nozzle -->
  <polygon points="150,358 190,358 180,324 160,324" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="240" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Receiver</text>

  <!-- second (blocked) path shown dashed at disbond -->
  <line x1="285" y1="120" x2="285" y2="194" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="285" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">over disbond</text>
  <line x1="285" y1="206" x2="285" y2="226" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="296" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">blocked</text>

  <!-- readout bars -->
  <rect x="60" y="382" width="130" height="18" fill="#1E9E6A"/>
  <text x="60" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Good area: full signal</text>
  <rect x="230" y="382" width="22" height="18" fill="#D14343"/>
  <text x="230" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Disbond: &#8722;18 dB</text>

  <!-- ===== RIGHT: resonance tester ===== -->
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Resonance / impedance tester</text>

  <!-- probe on panel -->
  <rect x="540" y="96" width="44" height="70" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="598" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Probe (continuous</text>
  <text x="598" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">vibration, nulled</text>
  <text x="598" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">over good bond)</text>

  <!-- panel -->
  <rect x="440" y="166" width="320" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="440" y="180" width="320" height="6" fill="#F2A33C"/>
  <!-- disbond under right half -->
  <rect x="620" y="180" width="100" height="6" fill="#D14343"/>
  <line x1="460" y1="186" x2="460" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="488" y1="186" x2="488" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="516" y1="186" x2="516" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="544" y1="186" x2="544" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="572" y1="186" x2="572" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="600" y1="186" x2="600" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="628" y1="186" x2="628" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="656" y1="186" x2="656" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="684" y1="186" x2="684" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="712" y1="186" x2="712" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="740" y1="186" x2="740" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="440" y="232" width="320" height="6" fill="#F2A33C"/>
  <rect x="440" y="238" width="320" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="668" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">disbond: free skin</text>

  <!-- meter: good (null) -->
  <path d="M 470 350 A 60 60 0 0 1 590 350" fill="none" stroke="#0A2342" stroke-width="3"/>
  <line x1="530" y1="350" x2="530" y2="300" stroke="#1E9E6A" stroke-width="4"/>
  <circle cx="530" cy="350" r="5" fill="#0A2342"/>
  <text x="530" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">good bond: at null</text>

  <!-- meter: disbond (deflected) -->
  <path d="M 630 350 A 60 60 0 0 1 750 350" fill="none" stroke="#0A2342" stroke-width="3"/>
  <line x1="690" y1="350" x2="734" y2="312" stroke="#D14343" stroke-width="4"/>
  <circle cx="690" cy="350" r="5" fill="#0A2342"/>
  <text x="690" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">disbond: deflects</text>

  <text x="600" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Free skin shifts resonant frequency, amplitude, and impedance</text>
</svg>
