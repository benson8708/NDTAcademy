<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Bonded Construction: Laminate and Honeycomb Sandwich</text>

  <!-- ===== LEFT: metal-to-metal laminate ===== -->
  <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Metal-to-metal laminate</text>

  <!-- skin -->
  <rect x="50" y="150" width="320" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- adhesive bondline -->
  <rect x="80" y="184" width="260" height="10" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- doubler with chamfered (tapered) edges -->
  <polygon points="80,194 340,194 316,226 104,226" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- leader lines -->
  <line x1="120" y1="167" x2="92" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="210" y1="189" x2="246" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="150" y1="215" x2="112" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="330" y1="189" x2="362" y2="146" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="88" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Skin (outer sheet)</text>
  <text x="248" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Adhesive bondline</text>
  <text x="248" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(~0.1&#8211;0.25 mm)</text>
  <text x="106" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Bonded doubler</text>
  <text x="368" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Doubler edge:</text>
  <text x="368" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">peel stress zone</text>

  <text x="210" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Each bondline = one interface</text>
  <text x="210" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">at a known depth in the stack</text>

  <!-- ===== RIGHT: honeycomb sandwich ===== -->
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Honeycomb sandwich</text>

  <!-- upper face sheet -->
  <rect x="450" y="120" width="300" height="18" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- upper film adhesive -->
  <rect x="450" y="138" width="300" height="8" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- core cell walls -->
  <line x1="470" y1="146" x2="470" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="498" y1="146" x2="498" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="526" y1="146" x2="526" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="554" y1="146" x2="554" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="582" y1="146" x2="582" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="610" y1="146" x2="610" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="638" y1="146" x2="638" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="666" y1="146" x2="666" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="694" y1="146" x2="694" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="722" y1="146" x2="722" y2="318" stroke="#5A6B7E" stroke-width="2"/>
  <!-- adhesive fillets at top of cell walls -->
  <polygon points="464,146 476,146 470,158" fill="#F2A33C"/>
  <polygon points="492,146 504,146 498,158" fill="#F2A33C"/>
  <polygon points="520,146 532,146 526,158" fill="#F2A33C"/>
  <polygon points="548,146 560,146 554,158" fill="#F2A33C"/>
  <polygon points="576,146 588,146 582,158" fill="#F2A33C"/>
  <polygon points="604,146 616,146 610,158" fill="#F2A33C"/>
  <polygon points="632,146 644,146 638,158" fill="#F2A33C"/>
  <polygon points="660,146 672,146 666,158" fill="#F2A33C"/>
  <polygon points="688,146 700,146 694,158" fill="#F2A33C"/>
  <polygon points="716,146 728,146 722,158" fill="#F2A33C"/>
  <!-- fillets at bottom -->
  <polygon points="464,318 476,318 470,306" fill="#F2A33C"/>
  <polygon points="492,318 504,318 498,306" fill="#F2A33C"/>
  <polygon points="520,318 532,318 526,306" fill="#F2A33C"/>
  <polygon points="548,318 560,318 554,306" fill="#F2A33C"/>
  <polygon points="576,318 588,318 582,306" fill="#F2A33C"/>
  <polygon points="604,318 616,318 610,306" fill="#F2A33C"/>
  <polygon points="632,318 644,318 638,306" fill="#F2A33C"/>
  <polygon points="660,318 672,318 666,306" fill="#F2A33C"/>
  <polygon points="688,318 700,318 694,306" fill="#F2A33C"/>
  <polygon points="716,318 728,318 722,306" fill="#F2A33C"/>
  <!-- lower film adhesive -->
  <rect x="450" y="318" width="300" height="8" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- lower face sheet -->
  <rect x="450" y="326" width="300" height="18" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- leader lines + labels -->
  <line x1="455" y1="129" x2="430" y2="108" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="426" y="102" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Face sheet</text>
  <line x1="452" y1="142" x2="428" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="424" y="176" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Film adhesive</text>
  <line x1="470" y1="154" x2="430" y2="218" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="426" y="224" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fillets climb</text>
  <text x="426" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the cell walls</text>
  <text x="600" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Honeycomb core (aluminum foil or aramid paper)</text>
  <line x1="680" y1="232" x2="680" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="600" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Skin-to-core joint strength lives in the fillets</text>

  <!-- bottom note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Think of every bonded assembly as a stack of interfaces &#8212; each one a place the build can go wrong.</text>
</svg>
