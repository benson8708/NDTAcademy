<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Sound Beam Profile: Near Field and Far Field</text>

  <!-- probe / element at left -->
  <rect x="50" y="140" width="34" height="60" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="84" y="150" width="14" height="120" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="67" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">probe</text>

  <!-- D dimension -->
  <line x1="118" y1="150" x2="118" y2="270" stroke="#F2A33C" stroke-width="2"/>
  <line x1="112" y1="150" x2="124" y2="150" stroke="#F2A33C" stroke-width="2"/>
  <line x1="112" y1="270" x2="124" y2="270" stroke="#F2A33C" stroke-width="2"/>
  <text x="134" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">D</text>

  <!-- near field: parallel beam edges -->
  <line x1="98" y1="150" x2="360" y2="150" stroke="#1B82E8" stroke-width="3"/>
  <line x1="98" y1="270" x2="360" y2="270" stroke="#1B82E8" stroke-width="3"/>

  <!-- interference ripples inside near field -->
  <path d="M 150 160 Q 158 210 150 260" fill="none" stroke="#1B82E8" stroke-width="1.5" opacity="0.7"/>
  <path d="M 195 160 Q 185 210 195 260" fill="none" stroke="#1B82E8" stroke-width="1.5" opacity="0.7"/>
  <path d="M 240 160 Q 250 210 240 260" fill="none" stroke="#1B82E8" stroke-width="1.5" opacity="0.7"/>
  <path d="M 285 160 Q 275 210 285 260" fill="none" stroke="#1B82E8" stroke-width="1.5" opacity="0.7"/>
  <path d="M 325 160 Q 333 210 325 260" fill="none" stroke="#1B82E8" stroke-width="1.5" opacity="0.7"/>

  <!-- N boundary -->
  <line x1="360" y1="110" x2="360" y2="310" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text x="360" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">N</text>

  <!-- N dimension arrow -->
  <line x1="98" y1="320" x2="352" y2="320" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="352,314 364,320 352,326" fill="#F2A33C"/>
  <polygon points="106,314 94,320 106,326" fill="#F2A33C"/>
  <text x="228" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">near-field length N</text>

  <!-- far field: diverging edges -->
  <line x1="360" y1="150" x2="760" y2="84" stroke="#1B82E8" stroke-width="3"/>
  <line x1="360" y1="270" x2="760" y2="336" stroke="#1B82E8" stroke-width="3"/>

  <!-- beam axis -->
  <line x1="98" y1="210" x2="760" y2="210" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="4 6"/>
  <text x="722" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">axis</text>

  <!-- half-angle marker -->
  <path d="M 520 210 A 165 165 0 0 0 506 186" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="540" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">γ</text>

  <!-- zone labels -->
  <text x="228" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">NEAR FIELD (Fresnel)</text>
  <text x="228" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">interference — amplitude fluctuates</text>
  <text x="580" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">FAR FIELD (Fraunhofer)</text>
  <text x="580" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">steady spread — smooth, predictable decay</text>

  <!-- formulas -->
  <rect x="420" y="48" width="360" height="30" fill="#E8F1FB" rx="5"/>
  <text x="600" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">N = D²f ÷ 4v        sin γ = 1.22 v ÷ (D·f)</text>

  <!-- example -->
  <rect x="420" y="356" width="340" height="30" fill="none" stroke="#1E9E6A" stroke-width="1.5" rx="5"/>
  <text x="590" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">10 mm, 5 MHz in steel: N ≈ 21 mm, γ ≈ 8.3°</text>
</svg>
