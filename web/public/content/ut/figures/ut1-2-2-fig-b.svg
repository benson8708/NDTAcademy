<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Attenuation: Absorption + Scattering</text>

  <!-- coarse-grained block -->
  <rect x="60" y="100" width="320" height="240" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <g fill="none" stroke="#5A6B7E" stroke-width="1" opacity="0.45">
    <path d="M 60 165 L 100 115 L 160 140 L 150 195 Z"/>
    <path d="M 160 140 L 230 110 L 280 150 L 240 190 L 150 195 Z"/>
    <path d="M 280 150 L 345 125 L 380 170 L 330 205 L 240 190 Z"/>
    <path d="M 60 165 L 150 195 L 130 260 L 60 250 Z"/>
    <path d="M 150 195 L 240 190 L 250 255 L 130 260 Z"/>
    <path d="M 240 190 L 330 205 L 350 270 L 250 255 Z"/>
    <path d="M 60 250 L 130 260 L 110 320 L 60 305 Z"/>
    <path d="M 130 260 L 250 255 L 230 325 L 110 320 Z"/>
    <path d="M 250 255 L 350 270 L 330 330 L 230 325 Z"/>
  </g>
  <!-- probe -->
  <rect x="20" y="192" width="40" height="56" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <!-- weakening beam -->
  <line x1="60" y1="220" x2="160" y2="220" stroke="#1B82E8" stroke-width="9" opacity="0.85"/>
  <line x1="160" y1="220" x2="260" y2="220" stroke="#1B82E8" stroke-width="5.5" opacity="0.85"/>
  <line x1="260" y1="220" x2="352" y2="220" stroke="#1B82E8" stroke-width="3" opacity="0.85"/>
  <polygon points="352,213 352,227 368,220" fill="#1B82E8"/>
  <!-- scattered rays -->
  <g stroke="#F2A33C" stroke-width="2">
    <line x1="150" y1="216" x2="186" y2="172"/>
    <line x1="186" y1="172" x2="177" y2="175"/>
    <line x1="186" y1="172" x2="184" y2="181"/>
    <line x1="205" y1="222" x2="238" y2="268"/>
    <line x1="238" y1="268" x2="229" y2="264"/>
    <line x1="238" y1="268" x2="237" y2="258"/>
    <line x1="255" y1="217" x2="282" y2="176"/>
    <line x1="282" y1="176" x2="273" y2="180"/>
    <line x1="282" y1="176" x2="281" y2="185"/>
    <line x1="120" y1="223" x2="142" y2="266"/>
    <line x1="142" y1="266" x2="134" y2="261"/>
    <line x1="142" y1="266" x2="142" y2="257"/>
  </g>
  <!-- absorption (heat) squiggles -->
  <g stroke="#D14343" stroke-width="2" fill="none">
    <path d="M 104 240 l 7 -7 l 7 7 l 7 -7"/>
    <path d="M 168 242 l 7 -7 l 7 7 l 7 -7"/>
    <path d="M 228 244 l 7 -7 l 7 7 l 7 -7"/>
  </g>
  <text x="235" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scattering off grain boundaries</text>
  <line x1="218" y1="93" x2="190" y2="168" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="150" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">absorption → heat</text>
  <line x1="150" y1="350" x2="178" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="220" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">attenuation quoted in dB per mm or per inch</text>

  <!-- A-scan: decaying back echoes -->
  <rect x="420" y="90" width="350" height="250" rx="6" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <g stroke="#1B82E8" stroke-width="1" opacity="0.22">
    <line x1="470" y1="95" x2="470" y2="335"/>
    <line x1="520" y1="95" x2="520" y2="335"/>
    <line x1="570" y1="95" x2="570" y2="335"/>
    <line x1="620" y1="95" x2="620" y2="335"/>
    <line x1="670" y1="95" x2="670" y2="335"/>
    <line x1="720" y1="95" x2="720" y2="335"/>
    <line x1="425" y1="140" x2="765" y2="140"/>
    <line x1="425" y1="190" x2="765" y2="190"/>
    <line x1="425" y1="240" x2="765" y2="240"/>
    <line x1="425" y1="290" x2="765" y2="290"/>
  </g>
  <line x1="425" y1="320" x2="765" y2="320" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 432 320 L 436 105 L 441 320" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M 466 320 L 471 130 L 476 320" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 536 320 L 541 192 L 546 320" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 606 320 L 611 252 L 616 320" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 676 320 L 681 290 L 686 320" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 471 130 Q 560 200 681 288" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="448" y="112" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="471" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW1</text>
  <text x="541" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW2</text>
  <text x="611" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW3</text>
  <text x="681" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW4</text>
  <text x="595" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">each round trip loses the same dB —</text>
  <text x="595" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the echo string decays exponentially</text>

  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Rayleigh regime (grains ≪ λ): scattering ∝ f⁴ — doubling frequency ≈ 16× the loss</text>
</svg>
