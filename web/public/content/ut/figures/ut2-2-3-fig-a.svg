<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Bar Stock: Discontinuities and Scan Directions</text>

  <!-- end-scan probe (left) -->
  <rect x="22" y="225" width="44" height="50" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <line x1="66" y1="250" x2="112" y2="250" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="112,244 112,256 126,250" fill="#1E9E6A"/>
  <text x="20" y="196" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">end scan —</text>
  <text x="20" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">transverse flaws</text>

  <!-- bar body -->
  <rect x="70" y="190" width="530" height="120" rx="18" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <line x1="80" y1="250" x2="590" y2="250" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="8,6"/>

  <!-- centerline pipe -->
  <line x1="120" y1="250" x2="240" y2="250" stroke="#D14343" stroke-width="5" stroke-dasharray="16,9"/>

  <!-- stringers -->
  <line x1="270" y1="242" x2="380" y2="242" stroke="#5A6B7E" stroke-width="2.5" stroke-dasharray="11,7"/>
  <line x1="285" y1="258" x2="395" y2="258" stroke="#5A6B7E" stroke-width="2.5" stroke-dasharray="11,7"/>

  <!-- flakes (mid-radius) -->
  <line x1="310" y1="212" x2="320" y2="220" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="352" y1="210" x2="360" y2="218" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="392" y1="222" x2="384" y2="214" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="322" y1="288" x2="332" y2="280" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="370" y1="284" x2="378" y2="292" stroke="#5A6B7E" stroke-width="2"/>

  <!-- burst -->
  <polyline points="450,247 458,236 467,249 476,237 484,253 474,262 459,258 450,247" fill="none" stroke="#D14343" stroke-width="2.5"/>

  <!-- chevron / cupping cracks -->
  <polyline points="516,238 528,260 540,238" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="542,238 554,260 566,238" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="568,238 580,260 592,238" fill="none" stroke="#D14343" stroke-width="2.5"/>

  <!-- surface seam -->
  <line x1="180" y1="190" x2="280" y2="190" stroke="#D14343" stroke-width="3.5"/>
  <line x1="205" y1="168" x2="222" y2="189" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="140" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">seam / lap (surface, axial)</text>

  <!-- radial probe -->
  <rect x="405" y="150" width="50" height="40" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="430" y1="190" x2="430" y2="242" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="424,242 436,242 430,254" fill="#1B82E8"/>
  <text x="430" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">radial straight beam</text>

  <!-- angle-beam wedge -->
  <polygon points="480,190 530,190 530,168 495,168" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="508" y1="190" x2="552" y2="246" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="545,247 555,238 559,252" fill="#F2A33C"/>
  <line x1="585" y1="158" x2="522" y2="172" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="590" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">angle beam</text>
  <text x="590" y="181" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">along axis</text>

  <!-- labels below bar -->
  <line x1="180" y1="342" x2="180" y2="254" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="180" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">centerline pipe (axial)</text>
  <line x1="330" y1="342" x2="330" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="320" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">stringers (axial)</text>
  <line x1="467" y1="390" x2="467" y2="264" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="450" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">burst (irregular, central)</text>
  <line x1="554" y1="342" x2="554" y2="264" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="580" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">chevron / cupping (transverse)</text>
  <line x1="240" y1="390" x2="328" y2="286" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="170" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">flakes (mid-radius, random)</text>

  <!-- cross-section inset -->
  <circle cx="700" cy="250" r="68" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="700" cy="250" r="40" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <circle cx="700" cy="250" r="5" fill="#D14343"/>
  <rect x="686" y="170" width="28" height="12" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="700" y1="182" x2="700" y2="244" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6,5"/>
  <path d="M 636 218 A 70 70 0 0 1 668 184" fill="none" stroke="#0A2342" stroke-width="2"/>
  <polygon points="664,178 676,182 666,192" fill="#0A2342"/>
  <text x="700" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">cross-section — rotate</text>
  <text x="700" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">bar or index probe</text>
  <text x="700" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">center: pipe, stringers</text>
  <text x="700" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dashed ring: flake zone</text>

  <!-- bottom note -->
  <text x="320" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Axial flaws answer the radial beam; transverse flaws need the end or angle-beam scan</text>
</svg>
