<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Object Appraisal Decision Flow</text>

  <!-- indication box -->
  <rect x="180" y="48" width="440" height="44" rx="8" fill="#0A2342"/>
  <text x="400" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Confirmed indication: size · location · orientation · amplitude vs reference</text>

  <!-- arrows down to two boxes -->
  <line x1="300" y1="92" x2="210" y2="128" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="216,124 204,132 212,118" fill="#5A6B7E"/>
  <line x1="500" y1="92" x2="590" y2="128" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="584,124 596,132 588,118" fill="#5A6B7E"/>

  <!-- history box -->
  <rect x="50" y="132" width="320" height="120" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <text x="210" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Part history</text>
  <text x="66" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• product form and heat treatment</text>
  <text x="66" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• repair records · baseline NDT</text>
  <text x="66" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• service exposure · growth vs prior</text>
  <text x="66" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">  examinations</text>

  <!-- intended use box -->
  <rect x="430" y="132" width="320" height="120" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <text x="590" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Intended use</text>
  <text x="446" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• stress level and direction vs flaw</text>
  <text x="446" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• cyclic or static · temperature</text>
  <text x="446" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">• environment · consequence class</text>
  <text x="446" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">  (fracture-critical or not)</text>

  <!-- arrows to basis -->
  <line x1="210" y1="252" x2="330" y2="292" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="324,288 336,296 328,282" fill="#5A6B7E"/>
  <line x1="590" y1="252" x2="470" y2="292" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="476,288 464,296 472,282" fill="#5A6B7E"/>

  <!-- acceptance basis box -->
  <rect x="170" y="296" width="460" height="58" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="3"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Acceptance basis</text>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">code workmanship criteria — or engineering FFS evaluation (engineering authority)</text>

  <!-- arrows to outcomes -->
  <line x1="250" y1="354" x2="160" y2="388" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="166,384 154,392 162,378" fill="#5A6B7E"/>
  <line x1="400" y1="354" x2="400" y2="388" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="393,384 400,396 407,384" fill="#5A6B7E"/>
  <line x1="550" y1="354" x2="640" y2="388" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="634,384 646,392 638,378" fill="#5A6B7E"/>

  <!-- outcomes -->
  <rect x="40" y="392" width="230" height="44" rx="8" fill="#1E9E6A"/>
  <text x="155" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Accept — record rationale</text>
  <rect x="285" y="392" width="230" height="44" rx="8" fill="#D14343"/>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Reject → repair → re-examine</text>
  <rect x="530" y="392" width="230" height="44" rx="8" fill="#F2A33C"/>
  <text x="645" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Refer to engineering (FFS)</text>
</svg>
