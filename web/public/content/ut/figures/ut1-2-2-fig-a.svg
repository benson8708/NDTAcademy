<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Same Probe, Different Material: λ = v ÷ f</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">frequency is fixed by the probe — 2.25 MHz throughout</text>

  <!-- steel bar -->
  <text x="70" y="102" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">STEEL — v = 5,920 m/s</text>
  <rect x="22" y="118" width="40" height="54" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="70" y="110" width="440" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 70 145 Q 97 105 125 145 T 180 145 T 235 145 T 290 145 T 345 145 T 400 145 T 455 145 T 510 145" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <line x1="97" y1="186" x2="97" y2="196" stroke="#0A2342" stroke-width="2"/>
  <line x1="207" y1="186" x2="207" y2="196" stroke="#0A2342" stroke-width="2"/>
  <line x1="97" y1="196" x2="207" y2="196" stroke="#0A2342" stroke-width="2"/>
  <text x="220" y="201" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">λ = 2.63 mm</text>
  <text x="40" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2.25 MHz</text>

  <!-- water bar -->
  <text x="70" y="247" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">WATER — v = 1,480 m/s</text>
  <rect x="22" y="263" width="40" height="54" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="70" y="255" width="440" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 70 290 Q 77 262 84 290 T 98 290 T 112 290 T 126 290 T 140 290 T 154 290 T 168 290 T 182 290 T 196 290 T 210 290 T 224 290 T 238 290 T 252 290 T 266 290 T 280 290 T 294 290 T 308 290 T 322 290 T 336 290 T 350 290 T 364 290 T 378 290 T 392 290 T 406 290 T 420 290 T 434 290 T 448 290 T 462 290 T 476 290 T 490 290 T 504 290" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="77" y1="331" x2="77" y2="341" stroke="#0A2342" stroke-width="2"/>
  <line x1="105" y1="331" x2="105" y2="341" stroke="#0A2342" stroke-width="2"/>
  <line x1="77" y1="341" x2="105" y2="341" stroke="#0A2342" stroke-width="2"/>
  <text x="118" y="346" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">λ = 0.66 mm</text>
  <text x="40" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2.25 MHz</text>

  <!-- worked-example panel -->
  <rect x="545" y="100" width="235" height="240" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">λ = v ÷ f</text>
  <text x="662" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Steel L: 5.92÷2.25 = 2.63 mm</text>
  <text x="662" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Steel S: 3.24÷2.25 = 1.44 mm</text>
  <text x="662" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water: 1.48÷2.25 = 0.66 mm</text>
  <text x="662" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Alum.: 6.32÷2.25 = 2.81 mm</text>
  <line x1="560" y1="268" x2="765" y2="268" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="662" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">f never changes in the part —</text>
  <text x="662" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">only λ adapts</text>

  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Rule of thumb: reflectors smaller than ≈ λ/2 are unreliable to detect</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2.25 MHz L in steel → ≈ 1.3 mm floor · 5 MHz → ≈ 0.6 mm</text>
</svg>
