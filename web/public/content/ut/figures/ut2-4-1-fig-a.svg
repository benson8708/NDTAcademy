<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Four Arc Welding Processes</text>

  <!-- ============ Panel 1: SMAW ============ -->
  <rect x="15" y="52" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="30" y="76" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 — SMAW (stick)</text>
  <!-- plate -->
  <rect x="30" y="185" width="345" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- bead -->
  <path d="M 60 185 Q 130 162 200 185 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <!-- slag crust over bead -->
  <path d="M 60 183 Q 130 157 200 183" fill="none" stroke="#5A6B7E" stroke-width="5"/>
  <!-- electrode: flux coating (amber) over core wire -->
  <line x1="330" y1="95" x2="248" y2="158" stroke="#F2A33C" stroke-width="12"/>
  <line x1="330" y1="95" x2="232" y2="172" stroke="#5A6B7E" stroke-width="5"/>
  <!-- arc -->
  <circle cx="226" cy="178" r="6" fill="#F2A33C"/>
  <line x1="216" y1="170" x2="236" y2="186" stroke="#F2A33C" stroke-width="2"/>
  <line x1="236" y1="170" x2="216" y2="186" stroke="#F2A33C" stroke-width="2"/>
  <!-- labels -->
  <text x="345" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flux coating</text>
  <line x1="300" y1="124" x2="288" y2="122" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="60" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">slag crust</text>
  <line x1="100" y1="153" x2="118" y2="166" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="30" y="230" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">chip slag between passes — leftovers = inclusions</text>

  <!-- ============ Panel 2: GMAW / FCAW ============ -->
  <rect x="410" y="52" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="425" y="76" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 — GMAW / FCAW (wire)</text>
  <rect x="425" y="185" width="345" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 455 185 Q 525 162 595 185 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <!-- gas nozzle + contact tip + wire -->
  <path d="M 580 92 L 624 92 L 616 146 L 588 146 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="1"/>
  <line x1="602" y1="146" x2="602" y2="178" stroke="#1B82E8" stroke-width="3"/>
  <circle cx="602" cy="181" r="5" fill="#F2A33C"/>
  <!-- shielding gas envelope -->
  <ellipse cx="602" cy="172" rx="36" ry="22" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- labels -->
  <text x="700" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wire electrode</text>
  <line x1="664" y1="122" x2="618" y2="120" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="704" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">gas envelope</text>
  <line x1="660" y1="170" x2="640" y2="172" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="425" y="230" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">GMAW: no slag, cold lap/LOF risk · FCAW: flux in wire = slag</text>

  <!-- ============ Panel 3: SAW ============ -->
  <rect x="15" y="248" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="30" y="272" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 — SAW (submerged arc)</text>
  <rect x="30" y="380" width="345" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 60 380 Q 135 356 210 380 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <!-- flux blanket mound -->
  <path d="M 150 380 Q 235 336 320 380 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="200" cy="368" r="2.2" fill="#5A6B7E"/>
  <circle cx="222" cy="358" r="2.2" fill="#5A6B7E"/>
  <circle cx="246" cy="352" r="2.2" fill="#5A6B7E"/>
  <circle cx="268" cy="360" r="2.2" fill="#5A6B7E"/>
  <circle cx="290" cy="370" r="2.2" fill="#5A6B7E"/>
  <circle cx="236" cy="370" r="2.2" fill="#5A6B7E"/>
  <!-- wire through blanket -->
  <line x1="246" y1="296" x2="246" y2="356" stroke="#0A2342" stroke-width="5"/>
  <rect x="234" y="284" width="24" height="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="1"/>
  <!-- flux hopper -->
  <path d="M 312 286 L 358 286 L 346 320 L 324 320 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="1"/>
  <circle cx="334" cy="330" r="2.2" fill="#5A6B7E"/>
  <circle cx="330" cy="344" r="2.2" fill="#5A6B7E"/>
  <circle cx="327" cy="358" r="2.2" fill="#5A6B7E"/>
  <!-- labels -->
  <text x="56" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flux blanket — arc buried</text>
  <line x1="160" y1="330" x2="196" y2="356" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="226" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wire</text>
  <text x="30" y="425" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">deep, narrow beads → centerline hot cracking</text>

  <!-- ============ Panel 4: GTAW ============ -->
  <rect x="410" y="248" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="425" y="272" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 — GTAW (TIG)</text>
  <rect x="425" y="380" width="345" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 455 380 Q 520 360 585 380 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <!-- gas cup + tungsten -->
  <path d="M 596 288 L 640 288 L 632 338 L 604 338 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="618" y1="338" x2="618" y2="370" stroke="#5A6B7E" stroke-width="4"/>
  <polygon points="615,370 621,370 618,378" fill="#5A6B7E"/>
  <circle cx="618" cy="380" r="5" fill="#F2A33C"/>
  <ellipse cx="618" cy="368" rx="36" ry="20" fill="none" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- separate filler rod -->
  <line x1="470" y1="330" x2="562" y2="372" stroke="#1B82E8" stroke-width="4"/>
  <!-- labels -->
  <text x="712" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">tungsten (not</text>
  <text x="712" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">consumed)</text>
  <line x1="664" y1="316" x2="624" y2="350" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="470" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">filler rod</text>
  <text x="425" y="425" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">cleanest process — watch for tungsten inclusions</text>
</svg>
