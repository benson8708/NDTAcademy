<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Straight-Beam Examination per the Procedure</text>

  <!-- LEFT: side view -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">SIDE VIEW</text>
  <rect x="60" y="150" width="290" height="170" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- probe -->
  <rect x="130" y="108" width="64" height="36" fill="#0A2342"/>
  <rect x="130" y="144" width="64" height="6" fill="#F2A33C"/>
  <text x="162" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 in., 2.25 MHz</text>

  <!-- beam down -->
  <line x1="148" y1="156" x2="148" y2="306" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="142,298 154,298 148,312" fill="#1B82E8"/>
  <line x1="176" y1="156" x2="176" y2="222" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="170,214 182,214 176,228" fill="#1B82E8"/>

  <!-- lamination -->
  <ellipse cx="186" cy="236" rx="40" ry="8" fill="#D14343"/>
  <text x="234" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">lamination</text>

  <!-- echo arrows up -->
  <line x1="186" y1="226" x2="186" y2="158" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="180,164 192,164 186,150" fill="#F2A33C"/>
  <line x1="138" y1="312" x2="138" y2="158" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="132,164 144,164 138,150" fill="#1E9E6A"/>

  <text x="92" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back wall</text>
  <line x1="80" y1="334" x2="120" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- legend left -->
  <line x1="60" y1="376" x2="88" y2="376" stroke="#1B82E8" stroke-width="4"/>
  <text x="94" y="381" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">longitudinal beam</text>
  <line x1="60" y1="400" x2="88" y2="400" stroke="#F2A33C" stroke-width="4"/>
  <text x="94" y="405" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw echo</text>
  <line x1="60" y1="424" x2="88" y2="424" stroke="#1E9E6A" stroke-width="4"/>
  <text x="94" y="429" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back-wall echo (watch for loss)</text>

  <!-- RIGHT: plan view raster -->
  <text x="590" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">PLAN VIEW — SCAN PLAN</text>
  <rect x="440" y="92" width="300" height="240" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- overlapping pass bands -->
  <rect x="448" y="104" width="284" height="40" fill="#1B82E8" opacity="0.30"/>
  <rect x="448" y="140" width="284" height="40" fill="#1B82E8" opacity="0.30"/>
  <rect x="448" y="176" width="284" height="40" fill="#1B82E8" opacity="0.30"/>
  <rect x="448" y="212" width="284" height="40" fill="#1B82E8" opacity="0.30"/>
  <rect x="448" y="248" width="284" height="40" fill="#1B82E8" opacity="0.30"/>

  <!-- serpentine arrows -->
  <line x1="456" y1="124" x2="716" y2="124" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="708,118 708,130 722,124" fill="#0A2342"/>
  <line x1="722" y1="160" x2="462" y2="160" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="470,154 470,166 456,160" fill="#0A2342"/>
  <line x1="456" y1="196" x2="716" y2="196" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="708,190 708,202 722,196" fill="#0A2342"/>
  <line x1="722" y1="232" x2="462" y2="232" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="470,226 470,238 456,232" fill="#0A2342"/>
  <line x1="456" y1="268" x2="716" y2="268" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="708,262 708,274 722,268" fill="#0A2342"/>

  <!-- overlap callout -->
  <rect x="448" y="140" width="284" height="4" fill="#D14343"/>
  <line x1="732" y1="142" x2="762" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="764" y="114" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">overlap</text>

  <!-- index dimension -->
  <line x1="420" y1="124" x2="420" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="414" y1="124" x2="426" y2="124" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="414" y1="160" x2="426" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="408" y="148" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">index</text>
  <text x="408" y="168" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8804; 90% D</text>

  <!-- notes under plan -->
  <text x="590" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100% coverage: each pass overlaps &#8805; 10% of element dimension D</text>
  <text x="590" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scan speed commonly &#8804; 6 in./s &#183; scan at reference + 6 dB</text>
  <text x="590" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">grid option: passes on stated centers, then full scan around hits</text>
</svg>
