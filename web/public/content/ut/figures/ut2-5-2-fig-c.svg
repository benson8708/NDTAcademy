<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Four Screens over a Bonded Skin-and-Doubler Panel</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Straight-beam pulse-echo from the skin side &#8212; same gain, same range</text>

  <!-- ===== Screen 1: good bond ===== -->
  <rect x="30" y="75" width="350" height="160" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="118" y1="75" x2="118" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="205" y1="75" x2="205" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="293" y1="75" x2="293" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="30" y1="155" x2="380" y2="155" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="30" y1="228" x2="380" y2="228" stroke="#1E9E6A" stroke-width="2"/>
  <polyline points="48,228 52,86 56,228" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="106,228 110,118 114,228" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="164,228 168,178 172,228" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="222,228 226,212 230,228" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="280,228 284,224 288,228" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="40" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Screen 1</text>

  <!-- ===== Screen 2: near-side disbond (ring) ===== -->
  <rect x="420" y="75" width="350" height="160" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="508" y1="75" x2="508" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="595" y1="75" x2="595" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="683" y1="75" x2="683" y2="235" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="155" x2="770" y2="155" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="228" x2="770" y2="228" stroke="#1B82E8" stroke-width="2"/>
  <polyline points="434,228 438,86 442,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="466,228 470,94 474,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="498,228 502,102 506,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="530,228 534,112 538,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="562,228 566,124 570,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="594,228 598,136 602,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="626,228 630,150 634,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="658,228 662,164 666,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="690,228 694,180 698,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="722,228 726,196 730,228" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="430" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Screen 2</text>

  <!-- ===== Screen 3: far-side disbond ===== -->
  <rect x="30" y="270" width="350" height="160" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="118" y1="270" x2="118" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="205" y1="270" x2="205" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="293" y1="270" x2="293" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="30" y1="350" x2="380" y2="350" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="30" y1="423" x2="380" y2="423" stroke="#F2A33C" stroke-width="2"/>
  <polyline points="48,423 52,281 56,423" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="100,423 104,316 108,423" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="152,423 156,376 160,423" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <!-- grown echo at 2nd bondline depth -->
  <polyline points="244,423 248,300 252,423" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="248" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">2nd bondline</text>
  <!-- weak full-thickness echo -->
  <polyline points="330,423 334,408 338,423" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="334" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">full T weak</text>
  <text x="40" y="291" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Screen 3</text>

  <!-- ===== Screen 4: porosity ===== -->
  <rect x="420" y="270" width="350" height="160" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="508" y1="270" x2="508" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="595" y1="270" x2="595" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="683" y1="270" x2="683" y2="430" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="350" x2="770" y2="350" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="423" x2="770" y2="423" stroke="#D14343" stroke-width="2"/>
  <polyline points="434,423 438,281 442,423" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- skin multiple -->
  <polyline points="478,423 482,330 486,423" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- raised grass -->
  <polyline points="496,423 502,404 508,420 514,398 520,423 528,408 534,419 540,396 548,423 554,410 560,420 568,400 574,423 582,406 588,418 596,402 602,423 610,412 616,420 624,404 630,423 638,410 644,419 652,406 658,423" fill="none" stroke="#D14343" stroke-width="2"/>
  <text x="578" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">raised grass at bondline depth</text>
  <!-- eroded far echo -->
  <polyline points="730,423 734,394 738,423" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="726" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">far echo eroded</text>
  <text x="430" y="291" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Screen 4</text>
</svg>
