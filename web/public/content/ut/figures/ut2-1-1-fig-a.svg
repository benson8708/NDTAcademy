<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Refraction and Mode Conversion: Acrylic Wedge on Steel</text>

  <!-- media regions -->
  <rect x="60" y="70" width="400" height="180" fill="#D9E0E8"/>
  <rect x="60" y="250" width="400" height="165" fill="#E8F1FB"/>
  <line x1="60" y1="250" x2="460" y2="250" stroke="#0A2342" stroke-width="3"/>
  <text x="75" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Acrylic  v = 2,730 m/s</text>
  <text x="75" y="402" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Steel  v shear = 3,240 m/s</text>

  <!-- normal (dashed) -->
  <line x1="300" y1="95" x2="300" y2="405" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="306" y="110" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">normal</text>

  <!-- incident ray -->
  <line x1="205" y1="122" x2="295" y2="243" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="300,250 285.7,240.8 295.3,233.6" fill="#1B82E8"/>
  <text x="120" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Incident L  36.6&#176;</text>

  <!-- reflected ray -->
  <line x1="300" y1="250" x2="395" y2="128" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="372" y="118" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">reflected</text>

  <!-- refracted shear ray -->
  <line x1="300" y1="250" x2="412" y2="362" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="420,370 404.5,362.9 412.9,354.5" fill="#F2A33C"/>
  <text x="330" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Shear  45&#176;</text>

  <!-- angle arcs -->
  <path d="M 300 205 A 45 45 0 0 0 273.3 214" fill="none" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="268" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">36.6&#176;</text>
  <path d="M 300 295 A 45 45 0 0 0 331.8 281.8" fill="none" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="348" y="296" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">45&#176;</text>

  <text x="60" y="438" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Past the 1st critical angle: no longitudinal wave enters the steel.</text>

  <!-- info panel -->
  <rect x="480" y="70" width="300" height="345" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="500" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Snell's law</text>
  <text x="500" y="130" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">sin &#952;&#8321; / v&#8321; = sin &#952;&#8322; / v&#8322;</text>
  <text x="500" y="168" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Wedge mark &#8592; incidence:</text>
  <text x="515" y="194" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">45&#176; &#8592; 36.6&#176;</text>
  <text x="515" y="218" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">60&#176; &#8592; 46.9&#176;</text>
  <text x="515" y="242" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">70&#176; &#8592; 52.4&#176;</text>
  <line x1="500" y1="258" x2="760" y2="258" stroke="#D9E0E8" stroke-width="2"/>
  <text x="500" y="286" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Below 27.5&#176;: L + S coexist &#8212; avoid</text>
  <text x="500" y="312" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">27.5&#176;&#8211;57.4&#176;: pure shear window</text>
  <text x="500" y="338" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Past 57.4&#176;: Rayleigh surface wave</text>
  <line x1="500" y1="356" x2="760" y2="356" stroke="#D9E0E8" stroke-width="2"/>
  <text x="500" y="382" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Immersion (water&#8211;steel):</text>
  <text x="515" y="406" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">criticals &#8776; 14.5&#176; and 27&#176;</text>
</svg>
