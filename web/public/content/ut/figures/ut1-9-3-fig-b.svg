<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Building the DAC from Side-Drilled Holes</text>

  <!-- LEFT: basic calibration block -->
  <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">BASIC CALIBRATION BLOCK (45&#176; shown)</text>
  <rect x="60" y="140" width="300" height="220" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- wedge on top -->
  <polygon points="64,140 144,140 144,102 94,102" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="100" y="72" width="44" height="30" fill="#0A2342"/>

  <!-- SDHs -->
  <circle cx="150" cy="195" r="9" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <circle cx="210" cy="250" r="9" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <circle cx="270" cy="305" r="9" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <text x="124" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">T/4</text>
  <text x="184" y="243" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">T/2</text>
  <text x="244" y="298" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">3T/4</text>

  <!-- beam paths (probe moved to peak each hole) -->
  <line x1="95" y1="140" x2="143" y2="188" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="100" y1="140" x2="203" y2="243" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="105" y1="140" x2="263" y2="298" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="2,5"/>

  <!-- thickness dim -->
  <line x1="42" y1="140" x2="42" y2="360" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="36" y1="140" x2="48" y2="140" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="36" y1="360" x2="48" y2="360" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="28" y="254" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">T</text>

  <text x="210" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe is moved to peak each hole in turn;</text>
  <text x="210" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">same material spec as the weldment</text>
  <text x="210" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">SDH: same cylindrical target at any beam angle</text>

  <!-- RIGHT: A-scan with DAC -->
  <text x="590" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">A-SCAN: PEAKS AT FIXED GAIN</text>
  <rect x="420" y="100" width="340" height="280" fill="#0A2342"/>
  <line x1="420" y1="158" x2="760" y2="158" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="218" x2="760" y2="218" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="278" x2="760" y2="278" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="338" x2="760" y2="338" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="505" y1="100" x2="505" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="590" y1="100" x2="590" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="675" y1="100" x2="675" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- three echoes -->
  <polyline points="430,350 444,350 448,118 452,350 484,350 488,158 494,350 565,350 571,218 577,350 650,350 656,266 662,350 745,350" fill="none" stroke="#E8F1FB" stroke-width="2"/>

  <!-- DAC curve through peaks -->
  <path d="M 488 158 Q 560 196 571 218 Q 640 252 656 266 Q 710 282 740 290" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <text x="700" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">DAC</text>

  <text x="448" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IP</text>
  <text x="491" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">80% FSH</text>
  <text x="571" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">T/2</text>
  <text x="510" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">T/4</text>
  <text x="656" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3T/4</text>

  <text x="590" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">strongest SDH &#8594; 80% FSH = reference gain; gain untouched for the rest</text>
  <text x="590" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">curve through the peaks corrects amplitude for distance (TCG does it electronically)</text>
</svg>
