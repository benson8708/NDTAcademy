<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Levels of Certification: Who Does What</text>

  <!-- responsibility arrow -->
  <line x1="30" y1="400" x2="30" y2="142" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="22,150 38,150 30,128" fill="#F2A33C"/>
  <text x="16" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C" transform="rotate(-90 16 275)">responsibility + judgment</text>

  <!-- trainee chip -->
  <rect x="60" y="256" width="210" height="30" rx="4" fill="#D9E0E8"/>
  <text x="165" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Trainee — supervised only</text>

  <!-- Level I -->
  <rect x="60" y="300" width="210" height="110" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="60" y="300" width="210" height="32" fill="#1B82E8"/>
  <text x="165" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">LEVEL I</text>
  <text x="165" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">tests + calibrations per</text>
  <text x="165" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">written instructions;</text>
  <text x="165" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">records results</text>

  <!-- Level II -->
  <rect x="295" y="210" width="210" height="200" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="295" y="210" width="210" height="32" fill="#1B82E8"/>
  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">LEVEL II</text>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sets up + calibrates;</text>
  <text x="400" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">interprets + evaluates</text>
  <text x="400" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">to codes + specs;</text>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">guides trainees + Level I;</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">organizes + reports</text>

  <!-- Level III -->
  <rect x="530" y="120" width="210" height="290" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="530" y="120" width="210" height="32" fill="#1B82E8"/>
  <text x="635" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">LEVEL III</text>
  <text x="635" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">establishes + approves</text>
  <text x="635" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">procedures + techniques;</text>
  <text x="635" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">interprets codes;</text>
  <text x="635" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">designates method +</text>
  <text x="635" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">technique; responsible</text>
  <text x="635" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">for the program;</text>
  <text x="635" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">trains + examines</text>
  <text x="635" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Levels I and II</text>

  <!-- footer -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">each level keeps the duties below it — scope is set by the employer's written practice</text>
</svg>
