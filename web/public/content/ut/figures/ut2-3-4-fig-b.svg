<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Lining Bond Check — Read the Ring-Down</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Straight beam on the steel shell: watch how fast the multiple back echoes die</text>

  <!-- ============ LEFT: disbonded ============ -->
  <rect x="45" y="80" width="330" height="250" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="55" y1="305" x2="365" y2="305" stroke="#0A2342" stroke-width="2"/>
  <!-- multiples: slow decay -->
  <polyline points="82,305 90,110 98,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="130,305 138,122 146,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="178,305 186,138 194,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="226,305 234,156 242,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="274,305 282,176 290,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="322,305 330,198 338,305" fill="none" stroke="#D14343" stroke-width="3"/>
  <!-- decay envelope -->
  <path d="M 90 105 C 180 118, 280 160, 355 205" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="210" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Disbonded: long ringing train</text>
  <text x="210" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">steel-to-air reflects ≈100% each bounce</text>

  <!-- ============ RIGHT: bonded ============ -->
  <rect x="425" y="80" width="330" height="250" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="435" y1="305" x2="745" y2="305" stroke="#0A2342" stroke-width="2"/>
  <!-- multiples: fast decay -->
  <polyline points="462,305 470,110 478,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polyline points="510,305 518,212 526,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polyline points="558,305 566,262 574,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polyline points="606,305 614,287 622,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polyline points="654,305 662,298 670,305" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <!-- decay envelope -->
  <path d="M 470 105 C 510 175, 580 268, 700 300" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="590" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Bonded: train collapses fast</text>
  <text x="590" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">≈15% leaks into the rubber at every bounce</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Calibrate on known bonded and disbonded areas — the decay rate is the verdict</text>
</svg>
