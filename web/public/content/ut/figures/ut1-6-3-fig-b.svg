<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Multiple-Transducer Arrangements</text>

  <!-- PANEL 1: pitch-catch facing -->
  <text x="140" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Pitch-catch (facing)</text>
  <rect x="40" y="170" width="200" height="170" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="55,170 115,170 55,128" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="165,170 225,170 225,128" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="62" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">T</text>
  <text x="218" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">R</text>
  <line x1="85" y1="170" x2="140" y2="225" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="130,219 144,217 138,231" fill="#1B82E8"/>
  <line x1="140" y1="225" x2="195" y2="170" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="185,177 191,163 199,176" fill="#1E9E6A" transform="rotate(8 192 170)"/>
  <circle cx="140" cy="225" r="6" fill="#D14343"/>
  <line x1="140" y1="233" x2="140" y2="262" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="140" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D14343" font-weight="bold">near-surface flaw</text>
  <text x="140" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">beams meet at a shallow</text>
  <text x="140" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">reflector between the probes</text>

  <!-- PANEL 2: tandem -->
  <text x="415" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Tandem (same direction)</text>
  <!-- spacing bracket -->
  <line x1="390" y1="120" x2="510" y2="120" stroke="#0A2342" stroke-width="1.6"/>
  <line x1="390" y1="113" x2="390" y2="127" stroke="#0A2342" stroke-width="1.6"/>
  <line x1="510" y1="113" x2="510" y2="127" stroke="#0A2342" stroke-width="1.6"/>
  <text x="450" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">S = 2(T−d)·tan θ</text>
  <rect x="280" y="195" width="265" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="365,195 425,195 425,153" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="485,195 545,195 545,153" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="418" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">T</text>
  <text x="538" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">R</text>
  <!-- vertical flaw -->
  <line x1="350" y1="235" x2="350" y2="275" stroke="#D14343" stroke-width="5"/>
  <text x="338" y="228" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">vertical LOF</text>
  <!-- path: T down-left to flaw, down-right to backwall, up-right to R -->
  <line x1="410" y1="195" x2="350" y2="255" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="356,246 352,260 366,256" fill="#1B82E8"/>
  <line x1="350" y1="255" x2="410" y2="315" stroke="#1B82E8" stroke-width="3"/>
  <line x1="410" y1="315" x2="530" y2="195" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="518,201 526,189 532,203" fill="#1E9E6A" transform="rotate(4 525 196)"/>
  <text x="415" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">flaw → back wall → receiver</text>
  <text x="415" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">spacing selects the depth zone</text>
  <text x="415" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">(mid-wall, 45°, T = 50 mm → S = 50 mm)</text>

  <!-- PANEL 3: through-transmission -->
  <text x="672" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Through-transmission</text>
  <rect x="595" y="170" width="155" height="170" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="642" y="142" width="60" height="28" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="642" y="340" width="60" height="28" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="630" y="162" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">T</text>
  <text x="630" y="362" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">R</text>
  <line x1="672" y1="170" x2="672" y2="246" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="672" cy="256" rx="26" ry="8" fill="#D14343"/>
  <line x1="654" y1="266" x2="646" y2="336" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="690" y1="266" x2="698" y2="336" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="672" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">flaw shadows the receiver:</text>
  <text x="672" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">amplitude drop, no depth</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">One element talks, another listens — pick the pair and the spacing to face the flaw plane you expect.</text>
</svg>
