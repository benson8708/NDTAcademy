<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Rayleigh (Surface) Wave — A Skin Inspector</text>

  <!-- part body with rounded right corner -->
  <path d="M 60 240 L 560 240 Q 700 240 700 380 L 700 410 L 60 410 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- energy depth band under the surface -->
  <path d="M 180 240 L 560 240 L 560 268 L 180 268 Z" fill="#1B82E8" opacity="0.18"/>

  <!-- steep wedge probe -->
  <polygon points="92,240 176,240 156,158 112,158" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="120" y1="170" x2="160" y2="232" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="152,226 164,222 162,236" fill="#1B82E8"/>
  <text x="134" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steep wedge — just past</text>
  <text x="134" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2nd critical angle (≈ 65°)</text>

  <!-- surface wave ripple to the crack -->
  <path d="M 184 238 q 10 -13 20 0 t 20 0 t 20 0 t 20 0 t 20 0 t 20 0" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="306,230 322,238 306,246" fill="#1B82E8"/>

  <!-- sharp surface crack -->
  <polygon points="336,240 344,240 340,262" fill="#D14343" stroke="#D14343" stroke-width="1"/>
  <line x1="340" y1="262" x2="340" y2="288" stroke="#D14343" stroke-width="1.2" stroke-dasharray="2,2"/>
  <text x="340" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">sharp surface crack</text>

  <!-- reflection arrow back -->
  <path d="M 330 218 q -40 -22 -86 -16" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="252,194 238,203 254,210" fill="#D14343"/>
  <text x="290" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">strong reflection</text>

  <!-- weaker transmitted ripple beyond crack -->
  <path d="M 360 238 q 10 -8 20 0 t 20 0 t 20 0 t 20 0 t 20 0 t 20 0 t 20 0 t 20 0" fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.7"/>

  <!-- follows the radius arrow -->
  <path d="M 540 232 Q 696 230 692 380" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="685,372 700,376 690,388" fill="#1E9E6A"/>
  <text x="618" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">follows gentle radii</text>
  <text x="618" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A">(radius &#8811; λ)</text>

  <!-- depth bracket -->
  <line x1="198" y1="244" x2="198" y2="266" stroke="#0A2342" stroke-width="2"/>
  <line x1="192" y1="244" x2="204" y2="244" stroke="#0A2342" stroke-width="2"/>
  <line x1="192" y1="266" x2="204" y2="266" stroke="#0A2342" stroke-width="2"/>
  <line x1="198" y1="266" x2="178" y2="330" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="176" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">energy within ≈ 1 λ</text>
  <text x="176" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">≈ 1.3 mm @ 2.25 MHz · ≈ 0.6 mm @ 5 MHz</text>

  <!-- velocity note -->
  <text x="470" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">velocity ≈ 0.92 × shear ≈ 2,980 m/s in steel</text>
  <text x="470" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">slowest of the common modes</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Anything on the surface — couplant smear, scale, a fingertip — absorbs the wave: keep the path clean.</text>
</svg>
