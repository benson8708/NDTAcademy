<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Joints, Grooves, and Weld Nomenclature</text>

  <!-- ===== top row: four joint types ===== -->
  <!-- Butt -->
  <rect x="30" y="95" width="66" height="16" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="114" y="95" width="66" height="16" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="96,95 114,95 105,111" fill="#1B82E8"/>
  <text x="105" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Butt</text>
  <!-- Tee -->
  <rect x="225" y="104" width="140" height="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="288" y="60" width="14" height="44" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="288,104 288,92 276,104" fill="#1B82E8"/>
  <polygon points="302,104 302,92 314,104" fill="#1B82E8"/>
  <text x="295" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Tee</text>
  <!-- Corner -->
  <rect x="430" y="104" width="120" height="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="430" y="60" width="14" height="44" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="444,104 444,90 458,104" fill="#1B82E8"/>
  <text x="490" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Corner</text>
  <!-- Lap -->
  <rect x="605" y="92" width="110" height="12" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="655" y="104" width="110" height="12" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="715,92 715,104 703,104" fill="#1B82E8"/>
  <polygon points="655,104 655,116 667,116" fill="#1B82E8"/>
  <text x="685" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lap</text>

  <!-- ===== main single-V cross-section (left) ===== -->
  <!-- HAZ dashed bands -->
  <line x1="136" y1="245" x2="190" y2="326" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="284" y1="245" x2="230" y2="326" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- plates -->
  <path d="M 40 245 L 150 245 L 204 318 L 204 326 L 40 326 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 270 245 L 380 245 L 380 326 L 216 326 L 216 318 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <!-- weld metal -->
  <path d="M 150 245 L 270 245 L 216 318 L 216 326 L 204 326 L 204 318 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <!-- pass contours -->
  <path d="M 168 270 Q 210 258 252 270" fill="none" stroke="#5A6B7E" stroke-width="0.9"/>
  <path d="M 180 295 Q 210 285 240 295" fill="none" stroke="#5A6B7E" stroke-width="0.9"/>
  <!-- cap and root bead -->
  <path d="M 140 245 Q 210 224 280 245" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 198 326 Q 210 337 222 326" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <!-- bevel-angle marker (right bevel vs vertical) -->
  <line x1="270" y1="245" x2="270" y2="282" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M 270 274 A 30 30 0 0 0 252 270" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="292" y="278" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">bevel 30°</text>

  <!-- labels with leaders -->
  <text x="210" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">cap (face) + reinforcement</text>
  <line x1="210" y1="196" x2="210" y2="228" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="92" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">toe</text>
  <line x1="100" y1="218" x2="142" y2="243" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="56" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fusion</text>
  <text x="56" y="308" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">line</text>
  <line x1="60" y1="296" x2="176" y2="282" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="120" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">HAZ</text>
  <line x1="138" y1="352" x2="168" y2="300" stroke="#F2A33C" stroke-width="1.2"/>
  <text x="148" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">root face (land)</text>
  <line x1="180" y1="384" x2="204" y2="323" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="316" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">root opening (gap)</text>
  <line x1="288" y1="384" x2="212" y2="330" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="306" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">root bead</text>
  <line x1="278" y1="350" x2="218" y2="334" stroke="#5A6B7E" stroke-width="1.2"/>

  <!-- ===== groove configuration gallery (right) ===== -->
  <text x="600" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Groove configurations</text>
  <!-- Square -->
  <rect x="480" y="200" width="104" height="24" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="596" y="200" width="104" height="24" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="220" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Square</text>
  <!-- Single-V -->
  <polygon points="480,238 560,238 584,262 480,262" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="608,238 700,238 700,262 584,262" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="258" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Single-V</text>
  <!-- Double-V -->
  <polygon points="480,276 560,276 584,290 560,304 480,304" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <polygon points="608,276 700,276 700,304 608,304 584,290" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="296" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Double-V</text>
  <!-- Single-bevel -->
  <polygon points="480,318 560,318 584,342 480,342" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="592" y="318" width="108" height="24" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="338" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Single-bevel</text>
  <!-- U-groove -->
  <path d="M 480 356 L 566 356 Q 554 370 570 382 L 480 382 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <path d="M 618 356 L 700 356 L 700 382 L 614 382 Q 630 370 618 356 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="376" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">U-groove</text>

  <!-- bottom note -->
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Required examination volume = weld metal + HAZ (typically + ~6 mm each side of the weld)</text>
</svg>
