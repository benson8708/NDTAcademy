<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">The Sound Beam: Near Field and Far Field</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">N = D²f ÷ 4v = D² ÷ 4λ&#160;&#160;&#160;&#160;&#160;&#160;sin γ = 1.22 v ÷ (D f)</text>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">10 mm element, 5 MHz, steel longitudinal: N ≈ 21 mm, γ ≈ 8.3°</text>

  <!-- element -->
  <rect x="60" y="170" width="28" height="120" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">element D</text>

  <!-- beam envelope -->
  <path d="M 88 175 L 330 196 L 740 122 L 740 338 L 330 264 L 88 285 Z" fill="#1B82E8" opacity="0.12" stroke="none"/>
  <path d="M 88 175 L 330 196 L 740 122" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 88 285 L 330 264 L 740 338" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <line x1="88" y1="230" x2="740" y2="230" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7,6"/>

  <!-- N marker -->
  <line x1="330" y1="112" x2="330" y2="420" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="330" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">N — end of near field</text>

  <!-- zone labels -->
  <text x="209" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">NEAR FIELD (Fresnel)</text>
  <text x="565" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">FAR FIELD (Fraunhofer)</text>

  <!-- spread half-angle -->
  <line x1="330" y1="230" x2="740" y2="128" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="5,5"/>
  <path d="M 420 230 A 90 90 0 0 0 417 208" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <text x="434" y="219" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">γ</text>

  <!-- on-axis amplitude plot -->
  <line x1="88" y1="420" x2="740" y2="420" stroke="#0A2342" stroke-width="2"/>
  <line x1="88" y1="355" x2="88" y2="420" stroke="#0A2342" stroke-width="2"/>
  <text x="96" y="352" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">on-axis amplitude vs distance</text>
  <path d="M 88 402 L 106 368 L 124 408 L 144 366 L 165 404 L 188 370 L 214 400 L 245 376 L 285 388 L 330 360 Q 480 378 740 408" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="209" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">oscillates — do not size here</text>
  <text x="560" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">smooth decay — DAC territory</text>
</svg>
