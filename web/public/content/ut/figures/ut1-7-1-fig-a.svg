<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Three Immersion Coupling Configurations</text>

  <!-- ===== Panel 1: Full immersion tank ===== -->
  <text x="140" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1. Immersion Tank</text>
  <!-- tank walls -->
  <rect x="40" y="110" width="200" height="180" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <!-- water -->
  <rect x="43" y="150" width="194" height="137" fill="#1B82E8" opacity="0.30"/>
  <line x1="43" y1="150" x2="237" y2="150" stroke="#1B82E8" stroke-width="2"/>
  <!-- transducer on bridge -->
  <line x1="40" y1="128" x2="240" y2="128" stroke="#5A6B7E" stroke-width="4"/>
  <rect x="124" y="128" width="32" height="26" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <!-- beam down -->
  <polygon points="132,154 148,154 144,250 136,250" fill="#F2A33C" opacity="0.55"/>
  <!-- submerged part -->
  <rect x="90" y="250" width="100" height="30" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="140" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Part</text>
  <text x="140" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">Probe on bridge,</text>
  <text x="140" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">part submerged</text>
  <text x="44" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">water</text>

  <!-- ===== Panel 2: Water column / squirter ===== -->
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">2. Water Column (Squirter)</text>
  <!-- transducer housing -->
  <rect x="384" y="108" width="32" height="30" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="400" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8F1FB">T/D</text>
  <!-- nozzle body -->
  <path d="M 380 138 L 420 138 L 412 175 L 388 175 Z" fill="none" stroke="#D9E0E8" stroke-width="3"/>
  <!-- laminar water column -->
  <rect x="388" y="175" width="24" height="75" fill="#1B82E8" opacity="0.40"/>
  <line x1="388" y1="175" x2="388" y2="250" stroke="#1B82E8" stroke-width="2"/>
  <line x1="412" y1="175" x2="412" y2="250" stroke="#1B82E8" stroke-width="2"/>
  <text x="446" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">laminar</text>
  <text x="446" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">column</text>
  <!-- part on rollers -->
  <rect x="330" y="250" width="140" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">moving plate</text>
  <circle cx="350" cy="288" r="11" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <circle cx="400" cy="288" r="11" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <circle cx="450" cy="288" r="11" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">Water jet bridges</text>
  <text x="400" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">probe to part</text>

  <!-- ===== Panel 3: Wheel probe ===== -->
  <text x="660" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">3. Wheel (Tire) Probe</text>
  <!-- tire -->
  <circle cx="660" cy="200" r="60" fill="#1B82E8" opacity="0.25" stroke="#D9E0E8" stroke-width="3"/>
  <circle cx="660" cy="200" r="60" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="660" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">liquid-filled tire</text>
  <!-- fixed axle -->
  <circle cx="660" cy="200" r="7" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <!-- internal element (angled) -->
  <rect x="640" y="178" width="30" height="12" fill="#F2A33C" stroke="#E8F1FB" stroke-width="1.5" transform="rotate(-20 655 184)"/>
  <!-- beam into part -->
  <polygon points="648,196 668,202 660,258 652,256" fill="#F2A33C" opacity="0.55"/>
  <!-- part surface -->
  <rect x="580" y="262" width="160" height="24" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="660" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">part surface</text>
  <text x="660" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">Rolls along part;</text>
  <text x="660" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">internal element aimable</text>

  <!-- footer note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#E8F1FB">Each places a controlled, bubble-free water path between transducer and part.</text>
</svg>
