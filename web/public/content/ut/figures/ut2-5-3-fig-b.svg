<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Bonded-Structure Evaluation Workflow</text>

  <!-- Row 1 -->
  <rect x="40" y="64" width="220" height="62" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Standardize</text>
  <text x="150" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">on reference panel (same stack-up)</text>

  <line x1="260" y1="95" x2="296" y2="95" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="294,88 310,95 294,102" fill="#1B82E8"/>

  <rect x="312" y="64" width="180" height="62" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="402" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Scan &amp; map</text>
  <text x="402" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">PE / TTU / resonance</text>

  <line x1="492" y1="95" x2="528" y2="95" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="526,88 542,95 526,102" fill="#1B82E8"/>

  <rect x="544" y="64" width="216" height="62" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="652" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Record indications</text>
  <text x="652" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8805; threshold (size + dB)</text>

  <!-- down arrow -->
  <line x1="652" y1="126" x2="652" y2="158" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="645,156 659,156 652,172 " fill="#1B82E8"/>

  <!-- Row 2 (right to left) -->
  <rect x="544" y="176" width="216" height="62" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="652" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Size each indication</text>
  <text x="652" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">6 dB drop / C-scan area</text>

  <line x1="544" y1="207" x2="508" y2="207" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="510,200 494,207 510,214" fill="#1B82E8"/>

  <rect x="240" y="176" width="252" height="62" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <text x="366" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Compare to criteria</text>
  <text x="366" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">single size &#183; cumulative % &#183; location</text>

  <!-- branch arrows -->
  <line x1="320" y1="238" x2="220" y2="286" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="226,288 208,292 220,278" fill="#1E9E6A"/>
  <line x1="412" y1="238" x2="512" y2="286" stroke="#D14343" stroke-width="3"/>
  <polygon points="512,278 524,292 506,288" fill="#D14343"/>

  <!-- Accept box -->
  <rect x="60" y="292" width="220" height="62" rx="8" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="170" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Within limits: ACCEPT</text>
  <text x="170" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">record findings &amp; totals</text>

  <!-- Reject box -->
  <rect x="460" y="292" width="300" height="62" rx="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="610" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Outside limits: REJECT / REFER</text>
  <text x="610" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">engineering authority (MRB) &#8212; never waive</text>

  <!-- repair loop -->
  <line x1="610" y1="354" x2="610" y2="392" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="610" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Repair &#8594; re-inspect to the same standard</text>
  <path d="M 720 398 Q 786 360 766 220 Q 754 140 762 126" fill="none" stroke="#5A6B7E" stroke-width="2.5" stroke-dasharray="8 6"/>
  <polygon points="755,132 762,118 769,132" fill="#5A6B7E"/>

  <!-- report box -->
  <rect x="60" y="380" width="320" height="56" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="220" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">REPORT: datum locations, sizes &amp; method,</text>
  <text x="220" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dB vs reference, coverage, dispositions, cert level</text>
  <line x1="170" y1="354" x2="170" y2="380" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="163,378 177,378 170,392" fill="#1E9E6A"/>
</svg>
