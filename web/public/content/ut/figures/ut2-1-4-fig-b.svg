<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">IIW-Type Block: Angle-Beam Standardization</text>

  <!-- block body -->
  <path d="M 120 170 L 660 170 L 660 350 L 300 350 A 180 180 0 0 1 120 170 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- highlighted 100-mm radius surface -->
  <path d="M 120 170 A 180 180 0 0 0 300 350" fill="none" stroke="#1B82E8" stroke-width="5"/>

  <!-- probe wedge at exit point -->
  <polygon points="300,170 380,170 380,138 322,138" fill="#0A2342"/>
  <rect x="336" y="120" width="30" height="18" fill="#5A6B7E"/>
  <text x="392" y="132" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe at exit point</text>

  <!-- exit point mark -->
  <line x1="300" y1="158" x2="300" y2="182" stroke="#F2A33C" stroke-width="3"/>
  <text x="292" y="152" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">exit point</text>

  <!-- beam to radius -->
  <line x1="300" y1="170" x2="180" y2="290" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="173,297 180.1,281.5 188.5,289.9" fill="#F2A33C"/>

  <!-- radius label -->
  <line x1="165" y1="386" x2="205" y2="326" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="60" y="402" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">100-mm radius &#8212; soundpath always 100 mm</text>

  <!-- plastic insert -->
  <circle cx="520" cy="260" r="45" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="437" y1="216" x2="484" y2="239" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="430" y="212" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50-mm plastic insert</text>

  <!-- degree scale -->
  <line x1="551" y1="297" x2="595" y2="350" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="557" y1="291" x2="627" y2="350" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="562" y1="284" x2="660" y2="341" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="589" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">40&#176;</text>
  <text x="623" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50&#176;</text>
  <text x="658" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">60&#176;</text>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">degree scale</text>

  <!-- 1.5 mm SDH -->
  <circle cx="620" cy="197" r="5" fill="#D14343" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="645" y1="160" x2="624" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="648" y="156" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.5-mm SDH</text>

  <!-- width note -->
  <text x="668" y="262" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">width 25 mm:</text>
  <text x="668" y="286" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">straight-beam</text>
  <text x="668" y="310" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">multiples</text>

  <!-- sequence -->
  <text x="60" y="432" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Sequence:  1 exit point  &#8594;  2 refracted angle  &#8594;  3 distance  &#8594;  4 sensitivity</text>
</svg>
