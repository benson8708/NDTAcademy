<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Lamination Signatures on the A-Scan</text>

  <!-- probes -->
  <rect x="80" y="126" width="40" height="24" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="250" y="126" width="40" height="24" fill="#F2A33C" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="100" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">A — sound</text>
  <text x="272" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">B — over lamination</text>

  <!-- plate cross-section -->
  <rect x="40" y="150" width="320" height="100" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="210" y1="200" x2="330" y2="200" stroke="#D14343" stroke-width="3.5"/>

  <!-- beams -->
  <line x1="100" y1="152" x2="100" y2="248" stroke="#0A2342" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="270" y1="152" x2="270" y2="198" stroke="#0A2342" stroke-width="2" stroke-dasharray="6,5"/>

  <!-- plate labels -->
  <text x="150" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">plate, T = 50 mm</text>
  <line x1="300" y1="284" x2="290" y2="203" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="300" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">lamination at T/2</text>

  <!-- screen A -->
  <rect x="420" y="90" width="340" height="115" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">A — back-wall multiples at T, 2T, 3T</text>
  <line x1="425" y1="190" x2="755" y2="190" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="430,190 436,108 442,190" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="524,190 531,113 538,190" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="619,190 626,133 633,190" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polyline points="714,190 721,153 728,190" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="531" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">50</text>
  <text x="626" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">100</text>
  <text x="721" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">150 mm</text>

  <!-- screen B -->
  <rect x="420" y="250" width="340" height="115" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">B — echoes at T/2 spacing, back wall gone</text>
  <line x1="425" y1="350" x2="755" y2="350" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="430,350 436,268 442,350" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="473,350 478,283 483,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="521,350 526,298 531,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="568,350 573,313 578,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="616,350 621,326 626,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="663,350 668,336 673,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="711,350 716,343 721,350" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="478" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">25</text>
  <text x="526" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">50</text>
  <text x="573" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">75 mm</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Halved multiple spacing + lost back wall = lamination near mid-thickness</text>
</svg>
