<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">DAC: Reference, Recording, and Evaluation Levels</text>

  <!-- screen frame + grid -->
  <rect x="60" y="60" width="680" height="330" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="128" y1="60" x2="128" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="196" y1="60" x2="196" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="264" y1="60" x2="264" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="332" y1="60" x2="332" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="400" y1="60" x2="400" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="468" y1="60" x2="468" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="536" y1="60" x2="536" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="604" y1="60" x2="604" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="672" y1="60" x2="672" y2="390" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="122" x2="740" y2="122" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="184" x2="740" y2="184" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="246" x2="740" y2="246" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="308" x2="740" y2="308" stroke="#5A6B7E" stroke-width="0.6"/>

  <!-- legend -->
  <rect x="452" y="72" width="282" height="88" fill="#0A2342" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="462" y1="92" x2="494" y2="92" stroke="#1E9E6A" stroke-width="3"/>
  <text x="502" y="97" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">100% DAC — primary reference</text>
  <line x1="462" y1="120" x2="494" y2="120" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="502" y="125" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">50% DAC — recording level</text>
  <line x1="462" y1="148" x2="494" y2="148" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="502" y="153" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">20% DAC — investigate if required</text>

  <!-- DAC curve through SDH points -->
  <path d="M 130 95 Q 160 100 196 115 Q 300 150 400 190 Q 500 228 604 260" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <circle cx="196" cy="115" r="5" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="400" cy="190" r="5" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="604" cy="260" r="5" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="196" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SDH T/4</text>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SDH T/2</text>
  <text x="624" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SDH 3T/4</text>

  <!-- 50% DAC dashed -->
  <path d="M 130 233 Q 265 258 400 280 Q 502 297 604 315" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- 20% DAC dashed -->
  <path d="M 130 315 Q 265 326 400 334 Q 502 341 604 348" fill="none" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- baseline + initial pulse -->
  <line x1="64" y1="370" x2="736" y2="370" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="66,370 76,80 86,370" fill="none" stroke="#E8F1FB" stroke-width="2"/>

  <!-- indication 1: above DAC -->
  <polyline points="282,370 300,128 318,370" fill="none" stroke="#D14343" stroke-width="3"/>
  <!-- indication 2: ~30% DAC -->
  <polyline points="502,370 520,330 538,370" fill="none" stroke="#D9E0E8" stroke-width="2.5"/>

  <!-- bottom labels -->
  <text x="300" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">above 100% DAC — evaluate against the acceptance table</text>
  <text x="572" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">≈30% DAC — below recording level: not recorded</text>
  <text x="180" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">DAC built from SDHs at T/4, T/2, 3T/4</text>
</svg>
