<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Longitudinal Velocity and Impedance Across Product Forms</text>

  <!-- axis gridlines -->
  <line x1="230" y1="80" x2="230" y2="372" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="384" y1="80" x2="384" y2="372" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="538" y1="80" x2="538" y2="372" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="692" y1="80" x2="692" y2="372" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="230" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">0</text>
  <text x="384" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2,000</text>
  <text x="538" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">4,000</text>
  <text x="692" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">6,000 m/s</text>

  <!-- Aluminum -->
  <rect x="230" y="88" width="486" height="24" fill="#1B82E8"/>
  <text x="218" y="99" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Aluminum</text>
  <text x="218" y="117" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 17.1</text>
  <text x="708" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">6,320</text>

  <!-- Steel -->
  <rect x="230" y="130" width="455" height="24" fill="#1B82E8"/>
  <text x="218" y="141" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Steel</text>
  <text x="218" y="159" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 46.5</text>
  <text x="677" y="147" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5,920</text>

  <!-- Plate glass -->
  <rect x="230" y="172" width="446" height="24" fill="#1E9E6A"/>
  <text x="218" y="183" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Plate glass</text>
  <text x="218" y="201" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 14.5</text>
  <text x="668" y="189" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5,800</text>

  <!-- Acrylic -->
  <rect x="230" y="214" width="210" height="24" fill="#5A6B7E"/>
  <text x="218" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Acrylic</text>
  <text x="218" y="243" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 3.2</text>
  <text x="450" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2,730</text>

  <!-- Polyethylene -->
  <rect x="230" y="256" width="177" height="24" fill="#5A6B7E"/>
  <text x="218" y="267" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Polyethylene</text>
  <text x="218" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 2.2</text>
  <text x="417" y="273" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2,300</text>

  <!-- Rubber -->
  <rect x="230" y="298" width="119" height="24" fill="#D14343"/>
  <text x="218" y="309" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Rubber</text>
  <text x="218" y="327" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 1.9</text>
  <text x="359" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1,550</text>

  <!-- Water -->
  <rect x="230" y="340" width="114" height="24" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="218" y="351" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Water</text>
  <text x="218" y="369" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Z 1.48</text>
  <text x="354" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1,480</text>

  <!-- notes -->
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">Z = density × velocity, in MRayl (amber values)</text>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Velocity sets the time base and wavelength — impedance sets coupling and reflection</text>
</svg>
