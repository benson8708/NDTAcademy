<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Critical Angles: Acrylic on Steel</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">incident angle in the acrylic, measured from the normal</text>

  <!-- zones -->
  <rect x="80" y="120" width="251" height="80" fill="#D14343" opacity="0.14"/>
  <rect x="331" y="120" width="270" height="80" fill="#1E9E6A" opacity="0.16"/>
  <rect x="601" y="120" width="119" height="80" fill="#1B82E8" opacity="0.16"/>
  <text x="205" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">L + S both in steel</text>
  <text x="205" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">avoid — two beams</text>
  <text x="466" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">SHEAR ONLY</text>
  <text x="466" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">wedge working window</text>
  <text x="660" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">RAYLEIGH</text>
  <text x="660" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">surface wave</text>

  <!-- critical-angle markers -->
  <line x1="331" y1="108" x2="331" y2="212" stroke="#F2A33C" stroke-width="3"/>
  <text x="331" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">1st critical ≈ 27.5°</text>
  <line x1="601" y1="108" x2="601" y2="212" stroke="#F2A33C" stroke-width="3"/>
  <text x="601" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">2nd critical ≈ 57°</text>

  <!-- axis -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#0A2342" stroke-width="2.5"/>
  <g stroke="#0A2342" stroke-width="2">
    <line x1="80" y1="200" x2="80" y2="208"/>
    <line x1="171" y1="200" x2="171" y2="208"/>
    <line x1="263" y1="200" x2="263" y2="208"/>
    <line x1="354" y1="200" x2="354" y2="208"/>
    <line x1="446" y1="200" x2="446" y2="208"/>
    <line x1="537" y1="200" x2="537" y2="208"/>
    <line x1="629" y1="200" x2="629" y2="208"/>
    <line x1="720" y1="200" x2="720" y2="208"/>
  </g>
  <text x="80" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0°</text>
  <text x="171" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10°</text>
  <text x="263" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20°</text>
  <text x="354" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">30°</text>
  <text x="446" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">40°</text>
  <text x="537" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50°</text>
  <text x="629" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">60°</text>
  <text x="720" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">70°</text>

  <!-- commercial wedge markers -->
  <circle cx="415" cy="200" r="5" fill="#0A2342"/>
  <line x1="415" y1="205" x2="415" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="415" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">45° wedge → incident 36.6°</text>
  <circle cx="509" cy="200" r="5" fill="#0A2342"/>
  <line x1="509" y1="205" x2="509" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="509" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">60° wedge → incident 46.9°</text>
  <circle cx="559" cy="200" r="5" fill="#0A2342"/>
  <line x1="559" y1="205" x2="559" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="559" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">70° wedge → incident 52.4°</text>

  <!-- immersion comparison -->
  <rect x="80" y="378" width="640" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water on steel (immersion): 1st ≈ 14.5°, 2nd ≈ 27° — same physics, narrower window</text>
</svg>
