<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Straight-Beam Contact Testing — Reading the Back Wall</text>

  <!-- A-scan screen 1 (clean plate) -->
  <rect x="90" y="56" width="240" height="132" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <line x1="90" y1="123" x2="330" y2="123" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="150" y1="56" x2="150" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="210" y1="56" x2="210" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="270" y1="56" x2="270" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <polyline points="96,172 106,70 116,172 200,172" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="200,172 282,172 290,84 298,172 324,172" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="108" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IP</text>
  <text x="292" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">back wall (T)</text>
  <text x="210" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">position 1 — clean plate</text>

  <!-- A-scan screen 2 (lamination) -->
  <rect x="470" y="56" width="240" height="132" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <line x1="470" y1="123" x2="710" y2="123" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="530" y1="56" x2="530" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="590" y1="56" x2="590" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="650" y1="56" x2="650" y2="188" stroke="#5A6B7E" stroke-width="0.8"/>
  <polyline points="476,172 486,70 496,172 580,172" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="580,172 584,172 590,78 596,172 660,172" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="660,172 704,172" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="664" y="86" width="22" height="86" fill="none" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="488" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IP</text>
  <text x="560" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">echo at T/2</text>
  <text x="676" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">back wall lost</text>
  <text x="590" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">position 2 — over lamination</text>

  <!-- plate -->
  <rect x="60" y="280" width="680" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- probe 1 -->
  <rect x="140" y="246" width="60" height="32" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="138" y1="280" x2="202" y2="280" stroke="#F2A33C" stroke-width="4"/>
  <line x1="170" y1="284" x2="170" y2="392" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="163,386 177,386 170,398" fill="#1B82E8"/>
  <line x1="182" y1="396" x2="182" y2="290" stroke="#1B82E8" stroke-width="1.8"/>
  <polygon points="176,294 188,294 182,284" fill="#1B82E8"/>

  <!-- probe 2 -->
  <rect x="520" y="246" width="60" height="32" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="518" y1="280" x2="582" y2="280" stroke="#F2A33C" stroke-width="4"/>
  <line x1="550" y1="284" x2="550" y2="334" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="543,328 557,328 550,340" fill="#1B82E8"/>
  <line x1="562" y1="338" x2="562" y2="290" stroke="#1B82E8" stroke-width="1.8"/>
  <polygon points="556,294 568,294 562,284" fill="#1B82E8"/>

  <!-- lamination -->
  <line x1="460" y1="340" x2="650" y2="340" stroke="#D14343" stroke-width="5" stroke-dasharray="14,6"/>
  <text x="660" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">lamination</text>
  <text x="660" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">at mid-thickness</text>

  <!-- couplant label -->
  <line x1="138" y1="280" x2="98" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="94" y="252" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">couplant film</text>

  <!-- thickness dimension -->
  <line x1="762" y1="280" x2="762" y2="400" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="755" y1="280" x2="769" y2="280" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="755" y1="400" x2="769" y2="400" stroke="#0A2342" stroke-width="1.5"/>
  <text x="778" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342" transform="rotate(-90 778 345)">T</text>

  <!-- leaders probe to screen -->
  <line x1="170" y1="244" x2="180" y2="218" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="550" y1="244" x2="565" y2="218" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="3,3"/>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">A mid-wall lamination puts a new echo at half the back-wall distance — and steals the back wall.</text>
</svg>
