<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Angle-Beam Geometry — 60° Wedge on 25 mm Plate</text>

  <!-- skip-distance bracket -->
  <text x="417" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">skip distance = 2 × T × tan 60° = 86.6 mm</text>
  <line x1="140" y1="105" x2="694" y2="105" stroke="#0A2342" stroke-width="2"/>
  <line x1="140" y1="98" x2="140" y2="112" stroke="#0A2342" stroke-width="2"/>
  <line x1="694" y1="98" x2="694" y2="112" stroke="#0A2342" stroke-width="2"/>

  <!-- plate -->
  <rect x="60" y="180" width="680" height="160" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- weld at full skip -->
  <polygon points="664,180 724,180 694,340" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 664 180 Q 694 162 724 180" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <text x="694" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">weld</text>

  <!-- wedge and probe label -->
  <polygon points="100,180 200,180 100,120" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="92" y="134" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe on</text>
  <text x="92" y="154" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">60° wedge</text>

  <!-- vertical reference + angle arc -->
  <line x1="140" y1="180" x2="140" y2="340" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M 140 235 A 55 55 0 0 0 187 209" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="196" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">θ = 60°</text>

  <!-- half-skip reference -->
  <line x1="417" y1="340" x2="417" y2="105" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="290" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">½ skip = T · tan 60° = 43.3 mm</text>

  <!-- beam path: two legs -->
  <line x1="140" y1="180" x2="417" y2="340" stroke="#1B82E8" stroke-width="3.5"/>
  <line x1="417" y1="340" x2="694" y2="180" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="292,263 292,277 304,270" fill="#1B82E8" transform="rotate(30 298 270)"/>
  <polygon points="552,248 552,262 564,255" fill="#1B82E8" transform="rotate(-30 558 255)"/>

  <!-- exit point -->
  <circle cx="140" cy="180" r="5" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="143" y1="184" x2="160" y2="206" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="164" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">exit (index) point</text>

  <!-- leg labels along the beam -->
  <text x="262" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8" transform="rotate(30 262 240)">leg = T ÷ cos 60° = 50 mm</text>
  <text x="576" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8" transform="rotate(-30 576 242)">2nd leg = 50 mm</text>

  <!-- thickness dimension -->
  <line x1="755" y1="180" x2="755" y2="340" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="748" y1="180" x2="762" y2="180" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="748" y1="340" x2="762" y2="340" stroke="#0A2342" stroke-width="1.5"/>
  <text x="772" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342" transform="rotate(-90 772 260)">T = 25 mm</text>

  <!-- formulas -->
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">surface distance = soundpath × sin θ&#160;&#160;&#160;&#160;&#160;depth (1st leg) = soundpath × cos θ</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sin 60° = 0.866&#160;&#160;&#160;cos 60° = 0.500&#160;&#160;&#160;tan 60° = 1.732</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">on the 2nd leg the beam climbs: depth = 2T − soundpath × cos θ</text>
</svg>
