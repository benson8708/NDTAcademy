<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Curved Surfaces Bend the Beam</text>

  <!-- ===== Panel 1: convex, diverging ===== -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Convex surface: beam diverges</text>
  <!-- transducer -->
  <rect x="180" y="92" width="40" height="20" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="200" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8F1FB">T/D</text>
  <!-- incoming parallel beam -->
  <line x1="190" y1="112" x2="190" y2="190" stroke="#1B82E8" stroke-width="2"/>
  <line x1="210" y1="112" x2="210" y2="190" stroke="#1B82E8" stroke-width="2"/>
  <!-- convex part (round bar top) -->
  <path d="M 110 250 A 90 90 0 0 1 290 250 Z" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">round bar</text>
  <!-- center cross -->
  <line x1="194" y1="250" x2="206" y2="250" stroke="#0A2342" stroke-width="2"/>
  <line x1="200" y1="244" x2="200" y2="256" stroke="#0A2342" stroke-width="2"/>
  <!-- diverging refracted rays inside -->
  <line x1="190" y1="190" x2="160" y2="248" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="210" y1="190" x2="240" y2="248" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="156,242 160,250 152,251" fill="#F2A33C"/>
  <polygon points="244,242 240,250 248,251" fill="#F2A33C"/>
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">energy spreads,</text>
  <text x="200" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">signal weakens</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="380" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- ===== Panel 2: radial aim + matched focus ===== -->
  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Aim radially + focus to radius</text>
  <!-- transducer -->
  <rect x="580" y="92" width="40" height="20" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="600" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8F1FB">T/D</text>
  <!-- converging incoming beam (focused) -->
  <line x1="585" y1="112" x2="596" y2="190" stroke="#1B82E8" stroke-width="2"/>
  <line x1="615" y1="112" x2="604" y2="190" stroke="#1B82E8" stroke-width="2"/>
  <!-- convex part -->
  <path d="M 510 250 A 90 90 0 0 1 690 250 Z" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">round bar</text>
  <!-- radial center line -->
  <line x1="600" y1="190" x2="600" y2="340" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="600" cy="340" r="4" fill="#1E9E6A"/>
  <text x="612" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E9E6A">center</text>
  <!-- restored converging beam in metal -->
  <line x1="596" y1="190" x2="600" y2="300" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="604" y1="190" x2="600" y2="300" stroke="#F2A33C" stroke-width="2.5"/>
  <circle cx="600" cy="300" r="5" fill="#F2A33C"/>
  <text x="600" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">focal spot</text>

  <!-- footer -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#E8F1FB">A focus matched to the curvature and a beam aimed through the center restore a concentrated beam.</text>
</svg>
