<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Particle Motion: Longitudinal vs Shear</text>

  <!-- LONGITUDINAL row -->
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">LONGITUDINAL — particle motion parallel to travel</text>
  <rect x="70" y="84" width="520" height="62" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <!-- particle planes: compressed clusters + rarefied gaps -->
  <g stroke="#0A2342" stroke-width="2.5">
    <line x1="80" y1="90" x2="80" y2="140"/><line x1="90" y1="90" x2="90" y2="140"/><line x1="100" y1="90" x2="100" y2="140"/><line x1="110" y1="90" x2="110" y2="140"/>
    <line x1="140" y1="90" x2="140" y2="140"/><line x1="175" y1="90" x2="175" y2="140"/><line x1="210" y1="90" x2="210" y2="140"/>
    <line x1="240" y1="90" x2="240" y2="140"/><line x1="250" y1="90" x2="250" y2="140"/><line x1="260" y1="90" x2="260" y2="140"/><line x1="270" y1="90" x2="270" y2="140"/>
    <line x1="300" y1="90" x2="300" y2="140"/><line x1="335" y1="90" x2="335" y2="140"/><line x1="370" y1="90" x2="370" y2="140"/>
    <line x1="400" y1="90" x2="400" y2="140"/><line x1="410" y1="90" x2="410" y2="140"/><line x1="420" y1="90" x2="420" y2="140"/><line x1="430" y1="90" x2="430" y2="140"/>
    <line x1="460" y1="90" x2="460" y2="140"/><line x1="495" y1="90" x2="495" y2="140"/><line x1="530" y1="90" x2="530" y2="140"/>
    <line x1="560" y1="90" x2="560" y2="140"/><line x1="570" y1="90" x2="570" y2="140"/><line x1="580" y1="90" x2="580" y2="140"/>
  </g>
  <line x1="95" y1="146" x2="95" y2="156" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="95" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">compression</text>
  <line x1="335" y1="146" x2="335" y2="156" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="335" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rarefaction</text>
  <!-- one wavelength bracket -->
  <line x1="95" y1="180" x2="95" y2="190" stroke="#0A2342" stroke-width="2"/>
  <line x1="255" y1="180" x2="255" y2="190" stroke="#0A2342" stroke-width="2"/>
  <line x1="95" y1="190" x2="255" y2="190" stroke="#0A2342" stroke-width="2"/>
  <text x="265" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">λ (one full cycle)</text>
  <!-- direction indicators -->
  <line x1="612" y1="104" x2="672" y2="104" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="672,97 672,111 686,104" fill="#F2A33C"/>
  <text x="649" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wave travel</text>
  <line x1="616" y1="150" x2="668" y2="150" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="616,144 616,156 604,150" fill="#1B82E8"/>
  <polygon points="668,144 668,156 680,150" fill="#1B82E8"/>
  <text x="649" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">particle motion</text>

  <!-- SHEAR row -->
  <text x="70" y="224" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">SHEAR — particle motion perpendicular to travel (solids only)</text>
  <rect x="70" y="234" width="520" height="76" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M 80 272 Q 112 222 145 272 T 210 272 T 275 272 T 340 272 T 405 272 T 470 272 T 535 272" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <g fill="#0A2342">
    <circle cx="80" cy="272" r="4"/><circle cx="145" cy="272" r="4"/><circle cx="210" cy="272" r="4"/><circle cx="275" cy="272" r="4"/><circle cx="340" cy="272" r="4"/><circle cx="405" cy="272" r="4"/><circle cx="470" cy="272" r="4"/><circle cx="535" cy="272" r="4"/>
  </g>
  <g fill="#1B82E8">
    <circle cx="112" cy="247" r="4"/><circle cx="177" cy="297" r="4"/><circle cx="242" cy="247" r="4"/><circle cx="307" cy="297" r="4"/><circle cx="372" cy="247" r="4"/><circle cx="437" cy="297" r="4"/><circle cx="502" cy="247" r="4"/>
  </g>
  <line x1="612" y1="250" x2="672" y2="250" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="672,243 672,257 686,250" fill="#F2A33C"/>
  <text x="649" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wave travel</text>
  <line x1="720" y1="240" x2="720" y2="296" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="714,240 726,240 720,228" fill="#1B82E8"/>
  <polygon points="714,296 726,296 720,308" fill="#1B82E8"/>
  <text x="720" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">particle motion</text>
  <text x="330" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">shear ≈ half the longitudinal velocity — and it cannot exist in liquids or gases</text>

  <!-- velocity reference strip -->
  <rect x="70" y="352" width="660" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Steel: L ≈ 5,920 · S ≈ 3,240 · Rayleigh ≈ 2,900 m/s</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Aluminum 6,320 / 3,130 · water 1,480 · air 330 m/s (longitudinal only)</text>
</svg>
