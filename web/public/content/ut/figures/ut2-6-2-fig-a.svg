<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Axial Resolution: Short vs. Long Pulse</text>

  <!-- ===== Top panel: short pulse -> two peaks ===== -->
  <text x="60" y="78" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Short pulse (broadband) - RESOLVED</text>
  <rect x="60" y="90" width="680" height="120" fill="#06182F" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="60" y1="190" x2="740" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- two sharp peaks with valley -->
  <polyline points="60,190 300,190 318,108 336,190 372,190 392,116 410,190 740,190" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <line x1="327" y1="190" x2="327" y2="100" stroke="#F2A33C" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="401" y1="190" x2="401" y2="100" stroke="#F2A33C" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="327" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">flaw</text>
  <text x="401" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">back wall</text>
  <text x="364" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">two distinct peaks, clear valley</text>

  <!-- ===== Bottom panel: long pulse -> merged ===== -->
  <text x="60" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Long ringing pulse (narrowband) - MERGED</text>
  <rect x="60" y="302" width="680" height="120" fill="#06182F" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="60" y1="402" x2="740" y2="402" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- single fat hump -->
  <path d="M 60 402 L 300 402 C 330 402 330 318 364 318 C 398 318 398 402 430 402 L 740 402" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <line x1="327" y1="402" x2="327" y2="312" stroke="#F2A33C" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="401" y1="402" x2="401" y2="312" stroke="#F2A33C" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="327" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">flaw</text>
  <text x="401" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">back wall</text>
  <text x="560" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">one blurred indication</text>

  <text x="730" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">time / depth &#8594;</text>
</svg>
