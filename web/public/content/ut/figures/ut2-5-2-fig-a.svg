<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Pulse-Echo Signatures: Good Bond vs Near-Side Disbond</text>

  <!-- ===== LEFT screen: good bond ===== -->
  <text x="210" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Good bond &#8212; ring decays fast</text>
  <rect x="40" y="84" width="340" height="180" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <!-- grid -->
  <line x1="108" y1="84" x2="108" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="176" y1="84" x2="176" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="244" y1="84" x2="244" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="312" y1="84" x2="312" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="40" y1="129" x2="380" y2="129" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="40" y1="174" x2="380" y2="174" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="40" y1="219" x2="380" y2="219" stroke="#5A6B7E" stroke-width="0.6"/>
  <!-- baseline -->
  <line x1="40" y1="258" x2="380" y2="258" stroke="#1E9E6A" stroke-width="2"/>
  <!-- initial pulse + fast-decaying multiples -->
  <polyline points="56,258 60,92 64,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="116,258 120,128 124,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="176,258 180,196 184,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="236,258 240,236 244,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="296,258 300,252 304,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="60" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="200" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">skin multiples shrink quickly</text>

  <!-- cross-section under left screen -->
  <rect x="100" y="318" width="220" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="100" y="344" width="220" height="9" fill="#F2A33C"/>
  <rect x="100" y="353" width="220" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- energy crossing arrows -->
  <line x1="160" y1="300" x2="160" y2="368" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="154,366 166,366 160,378" fill="#1E9E6A"/>
  <line x1="250" y1="300" x2="250" y2="368" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="244,366 256,366 250,378" fill="#1E9E6A"/>
  <text x="210" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Adhesive drains energy into the doubler</text>
  <text x="210" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">skin / adhesive / doubler</text>

  <!-- ===== RIGHT screen: near-side disbond ===== -->
  <text x="590" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Near-side disbond &#8212; skin rings</text>
  <rect x="420" y="84" width="340" height="180" fill="#06182F" stroke="#5A6B7E" stroke-width="2"/>
  <!-- grid -->
  <line x1="488" y1="84" x2="488" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="556" y1="84" x2="556" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="624" y1="84" x2="624" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="692" y1="84" x2="692" y2="264" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="129" x2="760" y2="129" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="174" x2="760" y2="174" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="219" x2="760" y2="219" stroke="#5A6B7E" stroke-width="0.6"/>
  <!-- baseline -->
  <line x1="420" y1="258" x2="760" y2="258" stroke="#D14343" stroke-width="2"/>
  <!-- IP + persistent ring, tighter spacing (skin thickness) -->
  <polyline points="434,258 438,92 442,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="470,258 474,104 478,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="506,258 510,114 514,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="542,258 546,126 550,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="578,258 582,140 586,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="614,258 618,156 622,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="650,258 654,172 658,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="686,258 690,190 694,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="722,258 726,206 730,258" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- spacing annotation -->
  <line x1="474" y1="98" x2="510" y2="98" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="540" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">spacing = skin thickness</text>
  <text x="590" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">long, persistent multiple-echo train</text>

  <!-- cross-section under right screen -->
  <rect x="480" y="318" width="220" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- disbond gap -->
  <rect x="480" y="344" width="220" height="9" fill="#06182F" stroke="#D14343" stroke-width="1.5"/>
  <rect x="480" y="353" width="220" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- bouncing arrows trapped in skin -->
  <polyline points="540,304 540,340 560,308 560,340 580,308 580,340" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="590" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Metal-to-air interface reflects ~100% &#8212; the free skin rings</text>
  <text x="590" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">skin / air gap (disbond) / doubler</text>
</svg>
