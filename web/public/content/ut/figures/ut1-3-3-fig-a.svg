<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Gauge Timing Modes: Where the Stopwatch Starts and Stops</text>

  <!-- row 1 sketch: contact probe on steel -->
  <rect x="110" y="66" width="60" height="24" fill="#0A2342"/>
  <rect x="108" y="90" width="64" height="4" fill="#F2A33C"/>
  <rect x="70" y="94" width="140" height="46" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="140" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel</text>

  <!-- row 1 strip -->
  <rect x="260" y="56" width="500" height="88" fill="#0A2342"/>
  <rect x="290" y="60" width="270" height="68" fill="#F2A33C" opacity="0.16"/>
  <line x1="290" y1="60" x2="290" y2="128" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="560" y1="60" x2="560" y2="128" stroke="#F2A33C" stroke-width="1.5"/>
  <polyline points="262,128 284,128 290,66 296,128 554,128 560,84 566,128 694,128 700,104 706,128 758,128" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="300" y="78" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="560" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW1</text>
  <text x="700" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW2</text>
  <text x="425" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">measured</text>
  <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Mode 1 - excitation pulse to 1st back echo (standard contact and dual probes)</text>

  <!-- row 2 sketch: delay line probe -->
  <rect x="110" y="192" width="60" height="22" fill="#0A2342"/>
  <rect x="110" y="214" width="60" height="20" fill="#F2A33C"/>
  <text x="178" y="229" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">delay line</text>
  <rect x="70" y="236" width="140" height="36" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="140" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel</text>

  <!-- row 2 strip -->
  <rect x="260" y="186" width="500" height="88" fill="#0A2342"/>
  <rect x="370" y="190" width="250" height="68" fill="#F2A33C" opacity="0.16"/>
  <line x1="370" y1="190" x2="370" y2="258" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="620" y1="190" x2="620" y2="258" stroke="#F2A33C" stroke-width="1.5"/>
  <polyline points="262,258 284,258 290,196 296,258 364,258 370,216 376,258 614,258 620,214 626,258 758,258" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="300" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="370" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IE</text>
  <text x="620" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW1</text>
  <text x="495" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">measured</text>
  <text x="400" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Mode 2 - interface echo to 1st back echo (delay line removed; thin or hot parts)</text>

  <!-- row 3 sketch: coated steel -->
  <rect x="110" y="322" width="60" height="22" fill="#0A2342"/>
  <rect x="70" y="346" width="140" height="8" fill="#F2A33C"/>
  <text x="216" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">coating</text>
  <rect x="70" y="354" width="140" height="44" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="140" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel</text>

  <!-- row 3 strip -->
  <rect x="260" y="316" width="500" height="88" fill="#0A2342"/>
  <rect x="540" y="320" width="160" height="68" fill="#1E9E6A" opacity="0.2"/>
  <line x1="540" y1="320" x2="540" y2="388" stroke="#1E9E6A" stroke-width="1.5"/>
  <line x1="700" y1="320" x2="700" y2="388" stroke="#1E9E6A" stroke-width="1.5"/>
  <polyline points="262,388 284,388 290,326 296,388 344,388 350,356 356,388 534,388 540,344 546,388 694,388 700,358 706,388 758,388" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="300" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="350" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IE</text>
  <text x="540" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW1</text>
  <text x="700" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW2</text>
  <text x="620" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">measured</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Mode 3 - 1st to 2nd back echo (echo-to-echo: coating and delay drop out)</text>
</svg>
