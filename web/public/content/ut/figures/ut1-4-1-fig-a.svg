<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Piezoelectric Effect: One Element, Two Jobs</text>

  <!-- divider -->
  <line x1="400" y1="56" x2="400" y2="380" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ====================== LEFT: TRANSMIT ====================== -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">TRANSMIT — inverse effect</text>

  <!-- pulser box -->
  <rect x="40" y="150" width="84" height="56" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="82" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Pulser</text>
  <!-- voltage spike symbol inside pulser -->
  <polyline points="56,196 70,196 74,184 80,196 108,196" fill="none" stroke="#D14343" stroke-width="2.5"/>

  <!-- wires from pulser to element faces -->
  <line x1="124" y1="166" x2="206" y2="166" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="124" y1="192" x2="180" y2="192" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="180" y1="192" x2="180" y2="260" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="180" y1="260" x2="247" y2="260" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="206" y1="166" x2="206" y2="190" stroke="#5A6B7E" stroke-width="2.5"/>

  <!-- element at rest (dashed) and energized (solid, thicker) -->
  <rect x="212" y="120" width="26" height="160" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="206" y="120" width="38" height="160" fill="#1B82E8" fill-opacity="0.85" stroke="#0A2342" stroke-width="2.5"/>

  <!-- expansion arrows -->
  <line x1="200" y1="200" x2="176" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="176,194 162,200 176,206" fill="#F2A33C"/>
  <line x1="250" y1="200" x2="274" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="274,194 288,200 274,206" fill="#F2A33C"/>

  <!-- emitted wavefront arcs -->
  <path d="M 296 156 Q 318 200 296 244" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 320 146 Q 346 200 320 254" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 344 136 Q 374 200 344 264" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <line x1="330" y1="200" x2="360" y2="200" stroke="#0A2342" stroke-width="3"/>
  <polygon points="360,194 374,200 360,206" fill="#0A2342"/>

  <text x="320" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Sound out</text>
  <text x="225" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">element swells / shrinks</text>

  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Voltage spike applied →</text>
  <text x="200" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">element changes thickness, launches wave</text>

  <!-- ====================== RIGHT: RECEIVE ====================== -->
  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">RECEIVE — direct effect</text>

  <!-- incoming wavefront arcs -->
  <path d="M 470 136 Q 440 200 470 264" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <path d="M 494 146 Q 468 200 494 254" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <path d="M 518 156 Q 496 200 518 244" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <line x1="478" y1="200" x2="508" y2="200" stroke="#0A2342" stroke-width="3"/>
  <polygon points="508,194 522,200 508,206" fill="#0A2342"/>
  <text x="480" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Echo in</text>

  <!-- element being squeezed -->
  <rect x="540" y="120" width="30" height="160" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <!-- squeeze arrows -->
  <line x1="532" y1="200" x2="540" y2="200" stroke="#1E9E6A" stroke-width="4"/>
  <polygon points="528,194 540,200 528,206" fill="#1E9E6A" transform="translate(12 0)"/>

  <!-- charge symbols on faces -->
  <text x="551" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">+</text>
  <text x="551" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">+</text>
  <text x="551" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">+</text>
  <text x="562" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">−</text>
  <text x="562" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">−</text>
  <text x="562" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">−</text>
  <text x="555" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">charge appears on faces</text>

  <!-- wires to meter -->
  <line x1="570" y1="150" x2="650" y2="150" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="570" y1="250" x2="650" y2="250" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="650" y1="150" x2="650" y2="172" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="650" y1="250" x2="650" y2="228" stroke="#5A6B7E" stroke-width="2.5"/>

  <!-- meter -->
  <circle cx="650" cy="200" r="28" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="650" y1="200" x2="668" y2="184" stroke="#D14343" stroke-width="3"/>
  <text x="650" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">mV</text>

  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Echo pressure squeezes element →</text>
  <text x="600" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">small voltage out, receiver amplifies it</text>

  <!-- bottom note -->
  <rect x="120" y="390" width="560" height="40" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5" rx="6"/>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">The same element swaps roles hundreds to thousands of times per second</text>
</svg>
