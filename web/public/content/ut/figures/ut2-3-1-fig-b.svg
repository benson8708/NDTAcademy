<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Straight-Beam Signatures in a Forging</text>

  <!-- ============ Panel 1: clean ============ -->
  <rect x="40" y="80" width="225" height="240" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="50" y1="295" x2="255" y2="295" stroke="#0A2342" stroke-width="2"/>
  <!-- initial pulse -->
  <polyline points="56,295 62,110 68,295 73,160 78,295" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- tall back echo -->
  <polyline points="222,295 234,100 246,295" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="152" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">full back echo</text>
  <text x="152" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Clean section</text>
  <text x="152" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">quiet wrought metal</text>

  <!-- ============ Panel 2: burst ============ -->
  <rect x="288" y="80" width="225" height="240" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="298" y1="295" x2="503" y2="295" stroke="#0A2342" stroke-width="2"/>
  <polyline points="304,295 310,110 316,295 321,160 326,295" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- burst cluster mid -->
  <polyline points="376,295 388,108 400,295" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="398,295 408,150 418,295" fill="none" stroke="#D14343" stroke-width="3"/>
  <!-- collapsed back echo -->
  <polyline points="472,295 482,262 492,295" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">sharp cluster</text>
  <text x="482" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">back echo lost</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Centerline burst</text>
  <text x="400" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">strong echo + back-echo loss</text>

  <!-- ============ Panel 3: flakes ============ -->
  <rect x="536" y="80" width="225" height="240" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="546" y1="295" x2="751" y2="295" stroke="#0A2342" stroke-width="2"/>
  <polyline points="552,295 558,110 564,295 569,160 574,295" fill="none" stroke="#0A2342" stroke-width="2"/>
  <!-- flake forest mid-zone -->
  <polyline points="606,295 611,205 616,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="620,295 625,185 630,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="634,295 639,215 644,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="648,295 653,190 658,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="662,295 667,210 672,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polyline points="676,295 681,200 686,295" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <!-- reduced back echo -->
  <polyline points="722,295 732,205 742,295" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="648" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">flake forest</text>
  <text x="648" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Hydrogen flakes</text>
  <text x="648" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">many small echoes, mid-radius</text>

  <!-- bottom note -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Read the indication AND what it does to the back echo — together they name the defect</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Wrought structure is acoustically quiet: anything sharp deserves attention</text>
</svg>
