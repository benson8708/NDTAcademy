<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Planar vs Volumetric: the A-Scan Tells</text>

  <!-- panel captions -->
  <text x="220" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Planar — lack of fusion / crack</text>
  <text x="580" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Volumetric — porosity</text>

  <!-- panel 1 frame + grid -->
  <rect x="60" y="85" width="320" height="225" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="124" y1="85" x2="124" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="188" y1="85" x2="188" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="252" y1="85" x2="252" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="316" y1="85" x2="316" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="141" x2="380" y2="141" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="197" x2="380" y2="197" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="60" y1="253" x2="380" y2="253" stroke="#5A6B7E" stroke-width="0.6"/>
  <!-- panel 1 trace -->
  <line x1="64" y1="290" x2="376" y2="290" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="68,290 76,104 84,290 89,200 95,290" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="218,290 240,98 262,290" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="80" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="240" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">tall, sharp, single peak</text>
  <text x="220" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">collapses when orbited or swiveled off-normal</text>

  <!-- panel 2 frame + grid -->
  <rect x="420" y="85" width="320" height="225" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="484" y1="85" x2="484" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="548" y1="85" x2="548" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="612" y1="85" x2="612" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="676" y1="85" x2="676" y2="310" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="141" x2="740" y2="141" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="197" x2="740" y2="197" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="420" y1="253" x2="740" y2="253" stroke="#5A6B7E" stroke-width="0.6"/>
  <!-- panel 2 trace -->
  <line x1="424" y1="290" x2="736" y2="290" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="428,290 436,104 444,290 449,200 455,290" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="530,290 545,236 558,290 570,250 584,290 598,228 612,290 626,256 640,290 654,242 668,290" fill="none" stroke="#1B82E8" stroke-width="2.2"/>
  <text x="440" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">multiple low peaks that twinkle</text>
  <text x="580" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">looks much the same from any direction or side</text>

  <!-- bottom notes -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Slag sits between: medium amplitude, broad and ragged — usually seen from both sides of the weld</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Judge the envelope at reference gain, then confirm with echo dynamics before plotting</text>
</svg>
