<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Evaluation by Comparison — and Its Paper Trail</text>

  <!-- ============ Left screen: set reference on block ============ -->
  <text x="205" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1. Set reference on certified block</text>
  <rect x="60" y="80" width="290" height="200" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <!-- grid -->
  <line x1="60" y1="120" x2="350" y2="120" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="60" y1="180" x2="350" y2="180" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 5"/>
  <line x1="60" y1="230" x2="350" y2="230" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 5"/>
  <!-- 80% reference line -->
  <line x1="60" y1="120" x2="350" y2="120" stroke="#F2A33C" stroke-width="2"/>
  <text x="344" y="112" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">80% FSH reference</text>
  <!-- initial pulse -->
  <polyline points="68,280 72,110 76,250 80,280" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <!-- SDH reference echo to 80% -->
  <polyline points="180,280 188,121 196,280" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="190" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">SDH echo → 80% FSH</text>
  <text x="205" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Reference gain: 46 dB (recorded)</text>

  <!-- ============ Right screen: evaluate on part ============ -->
  <text x="595" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">2. Evaluate indication at same range</text>
  <rect x="450" y="80" width="290" height="200" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <line x1="450" y1="120" x2="740" y2="120" stroke="#F2A33C" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="734" y="112" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">reference level</text>
  <line x1="450" y1="200" x2="740" y2="200" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 5"/>
  <!-- initial pulse -->
  <polyline points="458,280 462,110 466,250 470,280" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <!-- indication echo at 40% at same screen position -->
  <polyline points="570,280 578,201 586,280" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="580" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">indication: 40% FSH</text>
  <text x="595" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">= 50% of reference  (−6 dB)</text>

  <!-- arrow between screens -->
  <line x1="358" y1="180" x2="442" y2="180" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="438,172 454,180 438,188" fill="#1E9E6A"/>
  <text x="400" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">same setup</text>

  <!-- ============ Traceability chain ============ -->
  <rect x="40" y="356" width="160" height="56" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="120" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Certified block</text>
  <text x="120" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">S/N + material cert</text>

  <rect x="230" y="356" width="160" height="56" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="310" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Reference level</text>
  <text x="310" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">range + dB recorded</text>

  <rect x="420" y="356" width="160" height="56" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="500" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Indication vs</text>
  <text x="500" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">reference (% / dB)</text>

  <rect x="610" y="356" width="160" height="56" rx="8" fill="#0A2342" stroke="#1E9E6A" stroke-width="2"/>
  <text x="690" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Report — anyone</text>
  <text x="690" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">can rebuild it</text>

  <line x1="200" y1="384" x2="226" y2="384" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="222,377 236,384 222,391" fill="#F2A33C"/>
  <line x1="390" y1="384" x2="416" y2="384" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="412,377 426,384 412,391" fill="#F2A33C"/>
  <line x1="580" y1="384" x2="606" y2="384" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="602,377 616,384 602,391" fill="#F2A33C"/>
  <text x="400" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Traceability chain</text>
</svg>
