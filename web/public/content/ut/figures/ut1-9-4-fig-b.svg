<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Report Plotting Sketch: Fix the Indication on Paper</text>

  <!-- PLAN VIEW -->
  <text x="275" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">PLAN VIEW ALONG THE WELD</text>
  <text x="275" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">side B</text>

  <!-- weld band -->
  <rect x="50" y="120" width="450" height="64" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="50" y1="152" x2="500" y2="152" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="508" y="157" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">weld CL</text>

  <!-- datum tick -->
  <line x1="70" y1="104" x2="70" y2="200" stroke="#0A2342" stroke-width="2.5"/>
  <text x="70" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">datum X = 0</text>

  <!-- scale ticks (120 px per inch) -->
  <line x1="130" y1="184" x2="130" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="250" y1="184" x2="250" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="370" y1="184" x2="370" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="490" y1="184" x2="490" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="130" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">13</text>
  <text x="250" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">14</text>
  <text x="370" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">15</text>
  <text x="490" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">16 in.</text>

  <!-- indication bar: length 1.1 in (132 px) centered near x=274, offset 0.2 in side A (y=176) -->
  <line x1="208" y1="176" x2="340" y2="176" stroke="#D14343" stroke-width="6"/>
  <circle cx="208" cy="176" r="5" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="340" cy="176" r="5" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="274" cy="176" r="6" fill="#D14343"/>

  <!-- leaders -->
  <line x1="208" y1="170" x2="170" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="340" y1="170" x2="352" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="262" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">6 dB drop ends &#8212; length 1.1 in.</text>
  <line x1="274" y1="182" x2="274" y2="286" stroke="#D14343" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="274" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">max amplitude at X = 14.2 in., 0.2 in. off CL toward side A</text>

  <!-- probe icon side A -->
  <rect x="252" y="330" width="44" height="26" fill="#0A2342"/>
  <polygon points="252,330 296,330 296,322 274,316 252,322" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="310" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scanned from side A</text>
  <text x="275" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">side A (scanning side)</text>

  <!-- DATA BOX -->
  <rect x="540" y="92" width="240" height="186" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="660" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">INDICATION 1</text>
  <text x="554" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sound path: 1.40 in. &#183; leg 2</text>
  <text x="554" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">depth: 0.30 in.</text>
  <text x="554" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">surface distance: 1.21 in.</text>
  <text x="554" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">amplitude: 120% DAC</text>
  <text x="554" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">length (6 dB): 1.1 in.</text>
  <text x="554" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">disposition: per acceptance table</text>

  <!-- MINI CROSS-SECTION -->
  <text x="660" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">CROSS-SECTION AT X = 14.2</text>
  <rect x="560" y="324" width="200" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="640,324 680,324 660,394" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="580" y1="324" x2="616" y2="394" stroke="#1B82E8" stroke-width="2"/>
  <line x1="616" y1="394" x2="652" y2="338" stroke="#1E9E6A" stroke-width="2"/>
  <circle cx="652" cy="338" r="5" fill="#D14343"/>
  <text x="660" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">beam drawn to the reflector</text>

  <text x="275" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a reviewer should re-find this reflector within a probe-width from the sketch alone</text>
</svg>
