<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Dual-Element and Angle-Beam Probes</text>
  <line x1="400" y1="56" x2="400" y2="420" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ================= LEFT: DUAL ELEMENT ================= -->
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Dual-element (TR) probe</text>

  <!-- part -->
  <rect x="60" y="270" width="300" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="96" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel part</text>

  <!-- housing -->
  <rect x="100" y="118" width="220" height="152" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>

  <!-- delay blocks -->
  <polygon points="120,168 196,152 196,266 120,266" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="244,152 320,168 320,266 244,266" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- acoustic barrier -->
  <rect x="204" y="118" width="12" height="148" fill="#0A2342"/>

  <!-- tilted elements (roof angle) -->
  <polygon points="120,168 196,152 192,138 116,154" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="244,152 320,168 324,154 248,138" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <text x="150" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">T</text>
  <text x="280" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">R</text>

  <!-- beams crossing below surface -->
  <line x1="158" y1="160" x2="212" y2="322" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="206,318 216,330 214,314" fill="#1B82E8"/>
  <line x1="262" y1="160" x2="208" y2="322" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="7 5"/>

  <!-- focus zone -->
  <ellipse cx="210" cy="320" rx="48" ry="22" fill="#F2A33C" opacity="0.4"/>
  <line x1="258" y1="320" x2="330" y2="334" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">pseudo-focus zone</text>

  <!-- labels with leaders -->
  <line x1="210" y1="124" x2="210" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">acoustic barrier</text>

  <line x1="128" y1="158" x2="76" y2="140" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="74" y="132" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">roof</text>
  <text x="74" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">angle</text>

  <line x1="180" y1="240" x2="86" y2="226" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="84" y="218" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">delay</text>
  <text x="84" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">blocks</text>

  <text x="210" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">beams cross just under the surface —</text>
  <text x="210" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">superb near-surface and corrosion response</text>

  <!-- ================= RIGHT: ANGLE BEAM ================= -->
  <text x="600" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Angle-beam wedge</text>

  <!-- plate -->
  <rect x="430" y="300" width="340" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="466" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel plate</text>

  <!-- wedge -->
  <polygon points="520,300 700,300 700,222" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <text x="676" y="290" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">acrylic wedge</text>

  <!-- element on the slope -->
  <polygon points="576,262 640,234 635,223 571,251" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="600" y1="232" x2="556" y2="186" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="552" y="178" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">element</text>

  <!-- incident beam in wedge -->
  <line x1="608" y1="248" x2="630" y2="300" stroke="#1B82E8" stroke-width="3"/>

  <!-- exit point -->
  <circle cx="630" cy="300" r="5" fill="#D14343"/>
  <line x1="630" y1="300" x2="588" y2="332" stroke="#5A6B7E" stroke-width="1.5" opacity="0"/>
  <text x="588" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">exit (index) point</text>

  <!-- surface normal (dashed vertical) -->
  <line x1="630" y1="300" x2="630" y2="372" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- refracted shear beam at 60 deg from normal -->
  <line x1="630" y1="300" x2="768" y2="380" stroke="#D14343" stroke-width="3.5"/>
  <polygon points="762,382 776,384 766,372" fill="#D14343"/>

  <!-- angle arc and label -->
  <path d="M 630 344 A 44 44 0 0 0 668 322" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="668" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">60°</text>

  <text x="600" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">wedge sits between the critical angles, so only a</text>
  <text x="600" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">refracted shear wave (45°/60°/70°) enters the steel</text>
</svg>
