<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Immersion Tank Setup and Water Path</text>

  <!-- scanning bridge -->
  <rect x="120" y="70" width="560" height="20" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">scanning bridge / gantry (X–Y motion)</text>
  <!-- motion arrows on bridge -->
  <line x1="150" y1="80" x2="200" y2="80" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="200,75 210,80 200,85" fill="#F2A33C"/>
  <line x1="650" y1="80" x2="600" y2="80" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="600,75 590,80 600,85" fill="#F2A33C"/>

  <!-- manipulator column -->
  <rect x="392" y="90" width="16" height="60" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="430" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">manipulator</text>

  <!-- tank -->
  <rect x="120" y="180" width="560" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- water fill -->
  <rect x="123" y="200" width="554" height="207" fill="#1B82E8" opacity="0.18"/>
  <text x="150" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">water (the couplant)</text>

  <!-- transducer in water -->
  <rect x="380" y="150" width="40" height="34" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="384" y="182" width="32" height="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <text x="430" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">transducer</text>

  <!-- water path beam (converging = focused) -->
  <line x1="392" y1="188" x2="400" y2="320" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="412" y1="188" x2="400" y2="320" stroke="#1B82E8" stroke-width="2.5"/>
  <!-- water path bracket -->
  <line x1="350" y1="188" x2="350" y2="320" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="344" y1="188" x2="356" y2="188" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="344" y1="320" x2="356" y2="320" stroke="#0A2342" stroke-width="1.5"/>
  <text x="300" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342" transform="rotate(-90 300 258)">water path W</text>

  <!-- part submerged -->
  <rect x="300" y="320" width="200" height="60" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">submerged part</text>

  <!-- front-surface echo -->
  <circle cx="400" cy="320" r="5" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="404" y1="316" x2="540" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="544" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">front-surface echo</text>
  <text x="544" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">(water → metal)</text>

  <!-- back-wall echo -->
  <circle cx="400" cy="380" r="5" fill="#D14343" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="404" y1="382" x2="540" y2="392" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="544" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D14343">back-wall echo</text>

  <!-- thickness bracket -->
  <line x1="285" y1="320" x2="285" y2="380" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="279" y1="320" x2="291" y2="320" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="279" y1="380" x2="291" y2="380" stroke="#0A2342" stroke-width="1.5"/>
  <text x="265" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342" transform="rotate(-90 265 350)">T</text>

  <!-- rule note -->
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Set W ≥ T × (v_water ÷ v_part) ≈ T/4 for steel, plus a margin.</text>
</svg>
