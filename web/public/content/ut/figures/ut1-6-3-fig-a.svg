<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Dual-Element (TR) Probe — Construction and Pseudo-Focus</text>

  <!-- part -->
  <rect x="80" y="240" width="640" height="170" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- housing -->
  <rect x="300" y="70" width="200" height="170" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>

  <!-- delay lines -->
  <polygon points="312,112 394,100 396,240 306,240" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.2"/>
  <polygon points="406,100 488,112 494,240 404,240" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.2"/>

  <!-- elements (tilted = roof angle) -->
  <polygon points="314,110 392,98 394,112 316,124" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="408,98 486,110 484,124 406,112" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>

  <!-- barrier -->
  <rect x="396" y="70" width="8" height="170" fill="#5A6B7E"/>

  <!-- roof angle annotation -->
  <line x1="296" y1="104" x2="392" y2="104" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5,4"/>
  <path d="M 352 104 A 38 38 0 0 1 350 96" fill="none" stroke="#F2A33C" stroke-width="2.2"/>
  <text x="282" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#F2A33C" font-weight="bold">roof angle</text>
  <text x="282" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">(a few degrees)</text>

  <!-- beams crossing in part -->
  <line x1="352" y1="120" x2="424" y2="364" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="416,356 430,352 426,368" fill="#1B82E8"/>
  <line x1="448" y1="120" x2="376" y2="364" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="374,352 388,356 378,368" fill="#1E9E6A"/>

  <!-- pseudo-focal zone -->
  <ellipse cx="400" cy="290" rx="34" ry="48" fill="#F2A33C" opacity="0.30"/>
  <line x1="432" y1="290" x2="560" y2="290" stroke="#5A6B7E" stroke-width="1.4"/>
  <text x="568" y="284" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">pseudo-focal zone</text>
  <text x="568" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">maximum sensitivity here;</text>
  <text x="568" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">weaker above and below</text>

  <!-- labels -->
  <line x1="350" y1="96" x2="262" y2="62" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="256" y="56" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">transmit element</text>
  <line x1="452" y1="96" x2="540" y2="62" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="546" y="56" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">receive element</text>
  <line x1="400" y1="74" x2="400" y2="56" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="404" y="50" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">acoustic barrier (cork) — stops cross-talk</text>
  <line x1="340" y1="180" x2="222" y2="166" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="216" y="162" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">delay lines</text>
  <text x="216" y="182" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">(no dead zone; protect</text>
  <text x="216" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">elements on hot parts)</text>
  <line x1="298" y1="240" x2="240" y2="252" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="234" y="258" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">couplant</text>

  <!-- V-path note -->
  <path d="M 352 120 L 400 340 L 448 120" fill="none" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4,4"/>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sound travels a V — down one slanted leg, up the other — so very thin readings come out slightly thick (V-path error).</text>
</svg>
