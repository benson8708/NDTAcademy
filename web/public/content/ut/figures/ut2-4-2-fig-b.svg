<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Typical Orientations — and the Beam That Finds Them</text>

  <!-- ===== left panel: cross-section ===== -->
  <text x="210" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Cross-section: planes to interrogate</text>
  <!-- plate -->
  <line x1="50" y1="120" x2="370" y2="120" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="50" y1="260" x2="370" y2="260" stroke="#D9E0E8" stroke-width="2"/>
  <!-- weld V -->
  <path d="M 150 120 L 270 120 L 216 252 L 204 252 Z" fill="#1B82E8" fill-opacity="0.22" stroke="#1B82E8" stroke-width="1.5"/>
  <!-- LOF plane on left bevel -->
  <line x1="170" y1="168" x2="196" y2="232" stroke="#D14343" stroke-width="5"/>
  <text x="60" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">LOF ∥ bevel</text>
  <line x1="118" y1="166" x2="168" y2="178" stroke="#5A6B7E" stroke-width="1.2"/>
  <!-- centerline crack -->
  <polyline points="210,148 205,164 213,180 207,196" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="248" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">centerline crack</text>
  <line x1="244" y1="150" x2="214" y2="158" stroke="#5A6B7E" stroke-width="1.2"/>
  <!-- IP at root -->
  <line x1="210" y1="238" x2="210" y2="260" stroke="#D14343" stroke-width="5"/>
  <text x="268" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">IP: vertical at root</text>
  <line x1="264" y1="246" x2="214" y2="248" stroke="#5A6B7E" stroke-width="1.2"/>
  <!-- porosity -->
  <circle cx="238" cy="172" r="4" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="248" cy="182" r="3" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- beam arrow hitting LOF perpendicular -->
  <line x1="330" y1="128" x2="192" y2="206" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="192,206 206,202 200,192" fill="#1E9E6A"/>
  <text x="306" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">60° beam ⊥ bevel</text>
  <!-- lamellar tear below right plate -->
  <polyline points="282,272 300,272 300,282 320,282 320,272 340,272" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="210" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">lamellar tear: base metal, ∥ plate surface, stepped</text>
  <!-- porosity note -->
  <text x="210" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">porosity: spherical — no preferred orientation</text>

  <!-- ===== right panel: plan view ===== -->
  <text x="590" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Plan view: two crack directions</text>
  <!-- weld band -->
  <rect x="430" y="140" width="320" height="60" fill="#1B82E8" fill-opacity="0.22" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="430" y1="170" x2="750" y2="170" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- longitudinal crack -->
  <polyline points="470,168 495,173 520,167 545,172 565,168" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="516" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">longitudinal</text>
  <line x1="516" y1="134" x2="516" y2="162" stroke="#5A6B7E" stroke-width="1.2"/>
  <!-- transverse crack -->
  <polyline points="668,146 663,160 671,176 665,192" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="688" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">transverse</text>
  <line x1="680" y1="134" x2="670" y2="148" stroke="#5A6B7E" stroke-width="1.2"/>
  <!-- probes scanning perpendicular (find longitudinal) -->
  <rect x="492" y="240" width="48" height="26" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1"/>
  <line x1="516" y1="240" x2="516" y2="206" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="516,206 510,218 522,218" fill="#1E9E6A"/>
  <text x="516" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">scan ⊥ axis →</text>
  <text x="516" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">finds longitudinal</text>
  <!-- probe scanning along axis (finds transverse) -->
  <rect x="580" y="157" width="46" height="26" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1"/>
  <line x1="626" y1="170" x2="654" y2="170" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="654,170 642,164 642,176" fill="#1E9E6A"/>
  <text x="660" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">scan along axis →</text>
  <text x="660" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">finds transverse</text>

  <!-- bottom note -->
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">A planar flaw answers loudest when the beam meets its plane near 90°</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Build the scan plan around expected orientations: bevel-matched angles, both sides, plus transverse passes</text>
</svg>
