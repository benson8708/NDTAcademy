<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">A Thin Film Doing Heavy Work (microscopic view)</text>
  <line x1="400" y1="60" x2="400" y2="370" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ================= LEFT: DRY ================= -->
  <text x="205" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Dry: air pockets block sound</text>

  <!-- probe wear face -->
  <rect x="70" y="110" width="270" height="50" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="205" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">probe wear face (flat)</text>

  <!-- rough surface profile: part body -->
  <path d="M 70 196 L 95 172 L 115 200 L 140 178 L 162 206 L 188 170 L 210 198 L 235 176 L 258 204 L 282 172 L 305 200 L 326 180 L 340 194 L 340 330 L 70 330 Z"
        fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="205" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rough part surface</text>

  <!-- air gap region marker: probe face touches only peaks -->
  <line x1="95" y1="172" x2="95" y2="160" stroke="#D14343" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="188" y1="170" x2="188" y2="160" stroke="#D14343" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="282" y1="172" x2="282" y2="160" stroke="#D14343" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- reflected arrows -->
  <line x1="115" y1="166" x2="115" y2="200" stroke="#D14343" stroke-width="3" opacity="0"/>
  <line x1="130" y1="200" x2="130" y2="168" stroke="#D14343" stroke-width="3"/>
  <polygon points="124,170 130,158 136,170" fill="#D14343"/>
  <line x1="248" y1="200" x2="248" y2="168" stroke="#D14343" stroke-width="3"/>
  <polygon points="242,170 248,158 254,170" fill="#D14343"/>
  <text x="205" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">air in every valley → reflected</text>

  <text x="205" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">contact only at a few peaks —</text>
  <text x="205" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">the air film is the wall</text>

  <!-- ================= RIGHT: COUPLED ================= -->
  <text x="600" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Coupled: gel fills the valleys</text>

  <!-- probe wear face -->
  <rect x="465" y="110" width="270" height="50" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="600" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">probe wear face (flat)</text>

  <!-- couplant filling: amber band from wear face down to rough profile -->
  <path d="M 465 160 L 735 160 L 735 194 L 721 180 L 700 200 L 677 176 L 653 204 L 630 172 L 606 198 L 583 178 L 557 206 L 535 170 L 510 200 L 490 172 L 465 196 Z"
        fill="#F2A33C" opacity="0.75"/>

  <!-- rough surface profile: part body (mirror of left) -->
  <path d="M 465 196 L 490 172 L 510 200 L 535 170 L 557 206 L 583 178 L 606 198 L 630 172 L 653 204 L 677 176 L 700 200 L 721 180 L 735 194 L 735 330 L 465 330 Z"
        fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="600" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">same rough surface</text>

  <!-- transmitted arrows -->
  <line x1="525" y1="166" x2="525" y2="240" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="519,240 525,254 531,240" fill="#1E9E6A"/>
  <line x1="600" y1="166" x2="600" y2="240" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="594,240 600,254 606,240" fill="#1E9E6A"/>
  <line x1="675" y1="166" x2="675" y2="240" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="669,240 675,254 681,240" fill="#1E9E6A"/>

  <line x1="737" y1="172" x2="762" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="760" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">couplant</text>

  <text x="600" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">continuous liquid path — sound crosses</text>
  <text x="600" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">everywhere the film is unbroken</text>

  <!-- bottom rule -->
  <rect x="90" y="396" width="620" height="40" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5" rx="6"/>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Thinnest CONTINUOUS film wins — rougher surface → more viscous couplant (and often lower frequency)</text>
</svg>
