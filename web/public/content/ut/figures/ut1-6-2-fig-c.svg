<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Pulse-Echo vs Through-Transmission</text>
  <line x1="400" y1="52" x2="400" y2="430" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- LEFT: pulse-echo -->
  <text x="200" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1B82E8">Pulse-echo</text>
  <rect x="170" y="84" width="60" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="200" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">T/R</text>
  <rect x="70" y="110" width="260" height="130" fill="#E8F1FB" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="180" y1="160" x2="220" y2="160" stroke="#D14343" stroke-width="5"/>
  <text x="232" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">flaw</text>
  <line x1="194" y1="112" x2="194" y2="154" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="188,148 200,148 194,158" fill="#1B82E8"/>
  <line x1="206" y1="156" x2="206" y2="116" stroke="#1B82E8" stroke-width="2"/>
  <polygon points="200,120 212,120 206,110" fill="#1B82E8"/>
  <line x1="120" y1="112" x2="120" y2="234" stroke="#5A6B7E" stroke-width="1.8"/>
  <polygon points="114,228 126,228 120,238" fill="#5A6B7E"/>
  <line x1="130" y1="236" x2="130" y2="118" stroke="#5A6B7E" stroke-width="1.4"/>
  <polygon points="124,122 136,122 130,112" fill="#5A6B7E"/>
  <text x="106" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">back-wall round trip</text>

  <!-- pulse-echo A-scan -->
  <rect x="80" y="280" width="250" height="120" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="80" y1="380" x2="330" y2="380" stroke="#5A6B7E" stroke-width="1"/>
  <polyline points="90,380 98,294 106,380 160,380 168,318 176,380 250,380 258,340 266,380 324,380" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="98" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">IP</text>
  <text x="168" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">flaw</text>
  <text x="258" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">back wall</text>
  <text x="200" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">depth from echo position — one-side access</text>

  <!-- RIGHT: through-transmission -->
  <text x="600" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#F2A33C">Through-transmission</text>
  <rect x="570" y="84" width="60" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="600" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">T</text>
  <rect x="470" y="110" width="260" height="130" fill="#E8F1FB" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="570" y="240" width="60" height="26" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="600" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">R</text>
  <line x1="600" y1="112" x2="600" y2="152" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="600" cy="166" rx="30" ry="9" fill="#D14343"/>
  <text x="640" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">flaw</text>
  <line x1="578" y1="178" x2="566" y2="236" stroke="#5A6B7E" stroke-width="1.6" stroke-dasharray="5,4"/>
  <line x1="622" y1="178" x2="634" y2="236" stroke="#5A6B7E" stroke-width="1.6" stroke-dasharray="5,4"/>
  <text x="676" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">shadow</text>
  <line x1="520" y1="112" x2="520" y2="234" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="514,228 526,228 520,238" fill="#1B82E8"/>

  <!-- TT amplitude display -->
  <rect x="480" y="280" width="250" height="120" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="480" y1="380" x2="730" y2="380" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="480" y1="304" x2="730" y2="304" stroke="#1E9E6A" stroke-width="1.2" stroke-dasharray="5,4"/>
  <rect x="530" y="304" width="34" height="76" fill="#1E9E6A"/>
  <rect x="640" y="362" width="34" height="18" fill="#D14343"/>
  <text x="547" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">clean: 80%</text>
  <text x="657" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">over flaw</text>
  <text x="600" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">amplitude drop only — no depth, two sides, stay aligned</text>
</svg>
