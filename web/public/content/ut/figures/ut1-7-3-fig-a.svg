<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Generating a Plate (Lamb) Wave by Incident Angle</text>

  <!-- water region -->
  <rect x="60" y="70" width="680" height="150" fill="#1B82E8" opacity="0.16"/>
  <text x="74" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">water</text>

  <!-- tilted transducer -->
  <g transform="rotate(28 220 150)">
    <rect x="180" y="108" width="80" height="26" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
    <text x="220" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">transducer</text>
  </g>

  <!-- incident beam at angle -->
  <line x1="250" y1="150" x2="350" y2="222" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="346,214 352,224 340,224" fill="#F2A33C"/>
  <!-- normal at entry -->
  <line x1="350" y1="180" x2="350" y2="270" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- incident angle arc -->
  <path d="M 350 200 A 22 22 0 0 1 336 211" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="372" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">incident angle &#952;</text>

  <!-- thin sheet (two close surfaces) -->
  <rect x="60" y="222" width="680" height="36" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="700" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">thin sheet (t &#8776; &#955;)</text>
  <!-- thickness dimension -->
  <line x1="80" y1="222" x2="80" y2="258" stroke="#0A2342" stroke-width="1.5"/>
  <text x="96" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">t</text>

  <!-- Lamb wave traveling along sheet: undulating path -->
  <path d="M 350 240 Q 400 222 450 240 Q 500 258 550 240 Q 600 222 650 240 Q 690 252 720 240"
        fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="714,234 724,240 714,246" fill="#1E9E6A"/>
  <text x="540" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">Lamb wave runs along the sheet &#8594;</text>

  <!-- whole-thickness vibration arrows -->
  <line x1="430" y1="218" x2="430" y2="262" stroke="#F2A33C" stroke-width="1.5"/>
  <polygon points="426,220 434,220 430,214" fill="#F2A33C"/>
  <polygon points="426,260 434,260 430,266" fill="#F2A33C"/>
  <line x1="600" y1="218" x2="600" y2="262" stroke="#F2A33C" stroke-width="1.5"/>
  <polygon points="596,220 604,220 600,214" fill="#F2A33C"/>
  <polygon points="596,260 604,260 600,266" fill="#F2A33C"/>

  <!-- explanation panel -->
  <rect x="120" y="330" width="560" height="92" fill="#06182E" stroke="#5A6B7E" stroke-width="1.5" rx="6"/>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">At specific incident angles the energy couples into a guided plate mode;</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">the whole sheet vibrates and the wave sweeps along thin material.</text>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#F2A33C">A small change in &#952; switches between modes &#8212; set it precisely.</text>
</svg>
