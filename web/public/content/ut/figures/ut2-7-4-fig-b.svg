<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Echo-Dynamic Signatures</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">what the signal does when you walk the probe, swivel it, and switch sides</text>

  <!-- ===== Crack (top-left) ===== -->
  <text x="210" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">CRACK</text>
  <rect x="45" y="88" width="330" height="102" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <polyline points="70,184 92,184 100,112 108,150 116,100 124,144 132,108 140,158 148,184 170,184" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="220" y1="136" x2="320" y2="136" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="314,130 326,136 314,142" fill="#D9E0E8"/>
  <text x="272" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">holds on walking</text>
  <text x="210" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Sharp, ragged, multi-peaked — persists along the</text>
  <text x="210" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">weld length; often answers from both sides</text>

  <!-- ===== Lack of fusion (top-right) ===== -->
  <text x="590" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">LACK OF FUSION</text>
  <rect x="425" y="88" width="330" height="102" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <polyline points="490,184 522,184 536,98 550,184 580,184" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="640,184 654,162 668,184" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="668" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">after 5° swivel</text>
  <text x="590" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Single sharp peak at the bevel-face angle —</text>
  <text x="590" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">collapses on a small swivel; strongly one-sided</text>

  <!-- ===== Slag (bottom-left) ===== -->
  <text x="210" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">SLAG</text>
  <rect x="45" y="270" width="330" height="102" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 100 366 Q 150 288 195 284 Q 240 288 290 366" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="210" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Rounded, broader envelope — survives swivel and</text>
  <text x="210" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">travel; sits in the weld volume between passes</text>

  <!-- ===== Porosity (bottom-right) ===== -->
  <text x="590" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">POROSITY</text>
  <rect x="425" y="270" width="330" height="102" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <polyline points="470,366 484,366 492,332 500,366 510,346 518,366 528,326 536,366 546,342 554,366 564,334 572,366 582,350 590,366 602,338 610,366 622,352 630,366 660,366" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="590" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Cluster of low, narrow, traveling peaks — grass</text>
  <text x="590" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">from many small spherical pores</text>

  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Classification = behavior + plotted position. Confirm from the second side and a second angle.</text>
</svg>
