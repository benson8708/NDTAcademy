<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Common Reference Blocks</text>

  <!-- IIW block (top left) -->
  <path d="M 60 110 H 240 A 90 90 0 0 1 330 200 H 60 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="150" cy="142" r="6" fill="#0A2342"/>
  <line x1="240" y1="104" x2="240" y2="118" stroke="#F2A33C" stroke-width="3"/>
  <line x1="90" y1="193" x2="90" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="110" y1="193" x2="110" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="130" y1="193" x2="130" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="150" y1="193" x2="150" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="170" y1="193" x2="170" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="190" y1="193" x2="190" y2="200" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="150" y1="136" x2="118" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="114" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">reference hole</text>
  <text x="252" y="98" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">center mark</text>
  <line x1="318" y1="172" x2="352" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="356" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100 mm</text>
  <text x="356" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">radius</text>
  <text x="140" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">degree scale</text>
  <text x="200" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">IIW Type 1: exit point, angle, range</text>

  <!-- area-amplitude set (top right) -->
  <rect x="450" y="90" width="80" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="487" y="150" width="6" height="50" fill="#0A2342"/>
  <line x1="484" y1="150" x2="496" y2="150" stroke="#D14343" stroke-width="3"/>
  <rect x="560" y="90" width="80" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="595" y="150" width="10" height="50" fill="#0A2342"/>
  <line x1="591" y1="150" x2="609" y2="150" stroke="#D14343" stroke-width="3"/>
  <rect x="670" y="90" width="80" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="702" y="150" width="16" height="50" fill="#0A2342"/>
  <line x1="698" y1="150" x2="722" y2="150" stroke="#D14343" stroke-width="3"/>
  <text x="490" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no. 2</text>
  <text x="600" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no. 5</text>
  <text x="710" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no. 8</text>
  <text x="600" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Area-amplitude set: FBH dia. in 1/64 in.</text>

  <!-- ASME SDH block (bottom left) -->
  <rect x="70" y="290" width="260" height="120" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="135" cy="320" r="7" fill="#0A2342"/>
  <circle cx="200" cy="350" r="7" fill="#0A2342"/>
  <circle cx="265" cy="380" r="7" fill="#0A2342"/>
  <text x="135" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">T/4</text>
  <text x="200" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">T/2</text>
  <text x="265" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3T/4</text>
  <line x1="344" y1="290" x2="344" y2="410" stroke="#0A2342" stroke-width="2"/>
  <polygon points="338,299 344,290 350,299" fill="#0A2342"/>
  <polygon points="338,401 344,410 350,401" fill="#0A2342"/>
  <text x="354" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">T</text>
  <text x="200" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">ASME-style block: SDHs for the DAC</text>

  <!-- step wedge (bottom right) -->
  <path d="M 450 410 V 385 H 512 V 365 H 574 V 345 H 636 V 325 H 698 V 305 H 760 V 410 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="481" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.5</text>
  <text x="543" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5</text>
  <text x="605" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">7.5</text>
  <text x="667" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10</text>
  <text x="729" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">12.5</text>
  <text x="605" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">step thickness, mm</text>
  <text x="605" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Step wedge: thickness range calibration</text>
</svg>
