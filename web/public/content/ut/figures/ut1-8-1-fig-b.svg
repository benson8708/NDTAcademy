<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Automated Immersion Scanning System</text>

  <!-- tank -->
  <rect x="50" y="200" width="400" height="200" fill="none" stroke="#0A2342" stroke-width="3"/>
  <rect x="53" y="230" width="394" height="167" fill="#E8F1FB"/>
  <line x1="53" y1="230" x2="447" y2="230" stroke="#1B82E8" stroke-width="2"/>

  <!-- test part on supports -->
  <rect x="140" y="330" width="220" height="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="160" y="380" width="16" height="17" fill="#5A6B7E"/>
  <rect x="324" y="380" width="16" height="17" fill="#5A6B7E"/>
  <text x="250" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">test part</text>

  <!-- bridge over tank -->
  <rect x="50" y="140" width="400" height="14" fill="#0A2342"/>
  <rect x="58" y="154" width="10" height="46" fill="#0A2342"/>
  <rect x="432" y="154" width="10" height="46" fill="#0A2342"/>

  <!-- carriage + encoder -->
  <rect x="200" y="120" width="80" height="20" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="284" y="124" width="26" height="14" fill="#1E9E6A"/>
  <text x="240" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">bridge carriage (X–Y)</text>
  <line x1="316" y1="131" x2="352" y2="118" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="358" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">encoder</text>

  <!-- search tube + manipulator -->
  <line x1="240" y1="140" x2="240" y2="255" stroke="#0A2342" stroke-width="6"/>
  <circle cx="240" cy="185" r="9" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <line x1="150" y1="180" x2="229" y2="184" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="60" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">manipulator</text>
  <text x="60" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(angulation)</text>

  <!-- transducer + beam -->
  <rect x="228" y="255" width="24" height="16" fill="#0A2342"/>
  <line x1="252" y1="263" x2="296" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="302" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">transducer</text>
  <line x1="240" y1="271" x2="240" y2="372" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="234,364 246,364 240,376" fill="#1B82E8"/>

  <!-- water path dimension -->
  <line x1="208" y1="271" x2="208" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="202" y1="271" x2="214" y2="271" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="202" y1="330" x2="214" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="196" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">water path</text>

  <!-- electronics chain -->
  <rect x="540" y="90" width="200" height="44" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Pulser / Receiver</text>

  <rect x="540" y="164" width="200" height="40" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="640" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Gate(s)</text>

  <rect x="540" y="244" width="88" height="40" fill="#D14343"/>
  <text x="584" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Alarm</text>

  <rect x="648" y="244" width="124" height="40" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="710" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Recorder /</text>
  <text x="710" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">C-scan</text>

  <!-- chain arrows -->
  <line x1="640" y1="134" x2="640" y2="158" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="634,156 646,156 640,166" fill="#0A2342"/>
  <line x1="640" y1="204" x2="640" y2="224" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="640,224 584,224 584,238" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="578,236 590,236 584,246" fill="#0A2342"/>
  <polyline points="640,224 710,224 710,238" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="704,236 716,236 710,246" fill="#0A2342"/>

  <!-- coax probe to pulser -->
  <polyline points="280,130 420,96 534,108" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="420" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">coax</text>

  <!-- encoder position data to recorder -->
  <polyline points="310,138 490,138 490,320 710,320 710,290" fill="none" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="7,5"/>
  <polygon points="704,292 716,292 710,282" fill="#1E9E6A"/>
  <text x="560" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">position data</text>

  <!-- bottom note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Scan speed is limited by the PRF in use — the functional calibration is demonstrated at scanning speed</text>
</svg>
