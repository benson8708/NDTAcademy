<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Echo Dynamics: Four Probe Movements (top view)</text>

  <!-- ===== Panel 1: traverse ===== -->
  <rect x="20" y="50" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="36" y="74" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 · Traverse (toward / away)</text>
  <rect x="40" y="96" width="335" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="40" y1="113" x2="375" y2="113" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="5 4"/>
  <rect x="176" y="160" width="46" height="28" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="199" y1="160" x2="199" y2="134" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="199" y1="206" x2="199" y2="148" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="199,148 193,160 205,160" fill="#1E9E6A"/>
  <polygon points="199,206 193,194 205,194" fill="#1E9E6A"/>
  <text x="38" y="226" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">echo walks the time base · planar: sharp rise / fall</text>

  <!-- ===== Panel 2: lateral ===== -->
  <rect x="405" y="50" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="421" y="74" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 · Lateral (along the weld)</text>
  <rect x="425" y="96" width="335" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="425" y1="113" x2="760" y2="113" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="5 4"/>
  <rect x="566" y="150" width="46" height="28" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="589" y1="150" x2="589" y2="134" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="500" y1="190" x2="678" y2="190" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="500,190 512,184 512,196" fill="#1E9E6A"/>
  <polygon points="678,190 666,184 666,196" fill="#1E9E6A"/>
  <text x="423" y="226" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">traces length · smooth LOF holds, porosity wanders</text>

  <!-- ===== Panel 3: orbit ===== -->
  <rect x="20" y="248" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="36" y="272" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 · Orbit (constant sound path)</text>
  <rect x="40" y="290" width="335" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="207" cy="307" r="5" fill="#D14343"/>
  <path d="M 137 307 A 70 70 0 0 0 277 307" fill="none" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="277,307 268,318 280,320" fill="#1E9E6A"/>
  <rect x="184" y="364" width="46" height="26" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="207" y1="364" x2="207" y2="316" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="38" y="424" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">planar collapses off-normal · volumetric barely cares</text>

  <!-- ===== Panel 4: swivel ===== -->
  <rect x="405" y="248" width="375" height="190" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="421" y="272" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 · Swivel (rotate in place)</text>
  <rect x="425" y="290" width="335" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="566" y="356" width="46" height="28" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="589" y1="356" x2="589" y2="324" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="589" y1="356" x2="566" y2="328" stroke="#1B82E8" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="589" y1="356" x2="612" y2="328" stroke="#1B82E8" stroke-width="1.2" stroke-dasharray="3 3"/>
  <path d="M 562 396 A 34 18 0 0 0 616 396" fill="none" stroke="#1E9E6A" stroke-width="2"/>
  <polygon points="616,396 604,392 608,402" fill="#1E9E6A"/>
  <polygon points="562,396 574,392 570,402" fill="#1E9E6A"/>
  <text x="423" y="424" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a mirror is lost within a few degrees of twist</text>
</svg>
