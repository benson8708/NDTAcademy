<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Echo Response vs. Reflector Size</text>

  <!-- ===== Graph axes ===== -->
  <line x1="90" y1="370" x2="730" y2="370" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="90" y1="370" x2="90" y2="90" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="730,370 718,364 718,376" fill="#D9E0E8"/>
  <polygon points="90,90 84,102 96,102" fill="#D9E0E8"/>
  <text x="410" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">Reflector size relative to beam width</text>
  <text x="58" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB" transform="rotate(-90 58 240)">Echo amplitude</text>

  <!-- divider at "flaw fills beam" -->
  <line x1="410" y1="90" x2="410" y2="370" stroke="#F2A33C" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="410" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">flaw = beam width</text>

  <!-- rising curve in small-flaw regime, flat in large-flaw regime -->
  <path d="M 110 360 C 230 360 330 175 410 150 L 710 150" fill="none" stroke="#1B82E8" stroke-width="4"/>

  <!-- plateau marker -->
  <line x1="410" y1="150" x2="710" y2="150" stroke="#1B82E8" stroke-width="4"/>
  <text x="560" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">amplitude saturates</text>

  <!-- region labels -->
  <text x="250" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Smaller than beam:</text>
  <text x="250" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">amplitude tracks size</text>
  <text x="565" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Larger than beam:</text>
  <text x="565" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">extent tracks probe travel</text>

  <!-- lower-bound marker (lambda/2) -->
  <line x1="150" y1="90" x2="150" y2="370" stroke="#D14343" stroke-width="2" stroke-dasharray="4 5"/>
  <text x="150" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">~ &#955;/2 floor</text>

  <!-- ===== small inset: beam vs small reflector ===== -->
  <text x="250" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">beam</text>
  <polygon points="200,205 300,205 280,260 220,260" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="1"/>
  <circle cx="250" cy="252" r="7" fill="#D14343" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="250" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">small flaw</text>

  <!-- ===== large inset: beam vs large reflector ===== -->
  <polygon points="515,205 615,205 600,260 530,260" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="1"/>
  <rect x="498" y="248" width="134" height="12" fill="#F2A33C" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="565" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E8F1FB">large flaw spans beam</text>
</svg>
