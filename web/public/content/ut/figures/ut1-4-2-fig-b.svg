<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Beam Intensity: Along the Axis and Across the Beam</text>

  <!-- ============ LEFT: on-axis amplitude vs distance ============ -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">On-axis amplitude vs distance</text>

  <!-- axes -->
  <line x1="60" y1="330" x2="470" y2="330" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="470,324 484,330 470,336" fill="#0A2342"/>
  <line x1="60" y1="330" x2="60" y2="90" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="54,90 60,76 66,90" fill="#0A2342"/>
  <text x="270" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">distance from probe face</text>
  <text x="40" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="rotate(-90 40 200)">echo amplitude</text>

  <!-- fluctuating near-field curve, last max at N (x=240), then smooth decay -->
  <path d="M 60 240
           Q 75 130 90 230
           Q 102 300 115 200
           Q 130 120 145 250
           Q 160 312 180 190
           Q 210 105 240 100
           Q 300 112 360 175
           Q 415 222 465 250"
        fill="none" stroke="#1B82E8" stroke-width="3.5"/>

  <!-- N marker -->
  <line x1="240" y1="330" x2="240" y2="92" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="240" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">N — last maximum</text>

  <!-- zone annotations -->
  <text x="148" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">near field:</text>
  <text x="148" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">maxima and minima</text>
  <text x="370" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">far field:</text>
  <text x="370" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">smooth inverse decay</text>
  <line x1="62" y1="385" x2="238" y2="385" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="242" y1="385" x2="468" y2="385" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ============ RIGHT: transverse intensity profile ============ -->
  <text x="650" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Across the beam (far field)</text>

  <!-- axes -->
  <line x1="530" y1="330" x2="770" y2="330" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="530" y1="330" x2="530" y2="90" stroke="#0A2342" stroke-width="2.5"/>
  <text x="650" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">position across beam</text>

  <!-- bell-shaped profile centered at x=650 -->
  <path d="M 540 328
           C 580 326 615 110 650 110
           C 685 110 720 326 760 328"
        fill="none" stroke="#1E9E6A" stroke-width="3.5"/>

  <!-- beam axis center line -->
  <line x1="650" y1="330" x2="650" y2="104" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="650" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">axis = hottest</text>

  <!-- -6 dB level: half amplitude. peak at y=110 above baseline 330 => half height y=220 -->
  <line x1="540" y1="220" x2="765" y2="220" stroke="#D14343" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="768" y="212" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">−6 dB (half)</text>

  <!-- 6 dB edge markers where curve crosses half height (~x=614 and 686) -->
  <circle cx="612" cy="220" r="5" fill="#D14343"/>
  <circle cx="688" cy="220" r="5" fill="#D14343"/>
  <line x1="612" y1="395" x2="688" y2="395" stroke="#D14343" stroke-width="2"/>
  <line x1="612" y1="220" x2="612" y2="395" stroke="#D14343" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="688" y1="220" x2="688" y2="395" stroke="#D14343" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="650" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">working beam width</text>
  <text x="650" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">edge flaw reads half amplitude</text>
</svg>
