<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Surface and Plate Waves</text>

  <!-- RAYLEIGH half -->
  <text x="70" y="62" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">SURFACE (RAYLEIGH) WAVE</text>
  <line x1="140" y1="74" x2="260" y2="74" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="260,68 260,80 274,74" fill="#F2A33C"/>
  <text x="286" y="79" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">wave travel</text>
  <text x="470" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">reflected by surface crack / sharp corner</text>
  <line x1="545" y1="76" x2="482" y2="68" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="482,68 494,63 493,75" fill="#D14343"/>

  <rect x="70" y="95" width="560" height="105" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 70 95 Q 90 80 110 95 T 150 95 T 190 95 T 230 95 T 270 95 T 310 95 L 630 95" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- particle orbits shrinking with depth -->
  <g fill="none" stroke="#1B82E8" stroke-width="2">
    <ellipse cx="150" cy="112" rx="13" ry="8"/>
    <ellipse cx="210" cy="112" rx="13" ry="8"/>
    <ellipse cx="270" cy="112" rx="13" ry="8"/>
  </g>
  <g fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.55">
    <ellipse cx="150" cy="140" rx="8" ry="5"/>
    <ellipse cx="210" cy="140" rx="8" ry="5"/>
    <ellipse cx="270" cy="140" rx="8" ry="5"/>
  </g>
  <g fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.3">
    <ellipse cx="150" cy="166" rx="4" ry="2.5"/>
    <ellipse cx="210" cy="166" rx="4" ry="2.5"/>
    <ellipse cx="270" cy="166" rx="4" ry="2.5"/>
  </g>
  <text x="150" y="192" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">elliptical particle orbits — follows gentle contours</text>
  <!-- depth bracket -->
  <line x1="320" y1="97" x2="328" y2="97" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="320" y1="168" x2="328" y2="168" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="324" y1="97" x2="324" y2="168" stroke="#5A6B7E" stroke-width="2"/>
  <text x="338" y="128" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">energy within ≈ 1 λ of the surface</text>
  <text x="338" y="152" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">v ≈ 0.9 × shear (≈ 2,900 m/s in steel)</text>
  <!-- surface-breaking crack -->
  <polygon points="556,95 564,95 560,114" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <line x1="560" y1="90" x2="548" y2="78" stroke="#D14343" stroke-width="1.5"/>

  <!-- LAMB half -->
  <text x="70" y="242" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">PLATE (LAMB) WAVES — thin walls only</text>
  <!-- symmetric mode -->
  <path d="M 70 285 Q 110 271 150 285 T 230 285 T 310 285 T 390 285" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 70 317 Q 110 331 150 317 T 230 317 T 310 317 T 390 317" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="70" y1="301" x2="390" y2="301" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="230" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Symmetric (S) — plate breathes thicker and thinner</text>
  <!-- asymmetric mode -->
  <path d="M 440 285 Q 480 269 520 285 T 600 285 T 680 285 T 760 285" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 440 309 Q 480 293 520 309 T 600 309 T 680 309 T 760 309" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <text x="600" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Asymmetric (A) — plate flexes as a unit</text>

  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Wall thickness ≈ a wavelength; velocity is dispersive —</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">it changes with frequency × thickness and the mode excited</text>
</svg>
