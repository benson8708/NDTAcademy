<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pulse-Echo: Round-Trip Time Tells Depth</text>

  <!-- part cross-section -->
  <rect x="70" y="120" width="260" height="240" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- probe on top -->
  <rect x="150" y="84" width="60" height="30" fill="#0A2342"/>
  <rect x="150" y="114" width="60" height="6" fill="#F2A33C"/>
  <text x="142" y="102" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe</text>

  <!-- flaw -->
  <ellipse cx="195" cy="250" rx="24" ry="9" fill="#D14343"/>
  <text x="226" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">flaw</text>

  <!-- outgoing pulse (blue, down to back wall) -->
  <line x1="157" y1="126" x2="157" y2="346" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="151,338 163,338 157,352" fill="#1B82E8"/>

  <!-- back-wall echo (green, up) -->
  <line x1="168" y1="352" x2="168" y2="136" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="162,140 174,140 168,126" fill="#1E9E6A"/>

  <!-- flaw echo (amber, up from flaw) -->
  <line x1="198" y1="239" x2="198" y2="136" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="192,140 204,140 198,126" fill="#F2A33C"/>

  <!-- depth dimensions -->
  <line x1="56" y1="122" x2="56" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="50" y1="122" x2="62" y2="122" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="50" y1="248" x2="62" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="44" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">d</text>
  <line x1="34" y1="122" x2="34" y2="358" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="28" y1="358" x2="40" y2="358" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="28" y1="122" x2="40" y2="122" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="20" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">T</text>

  <text x="200" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back wall</text>

  <!-- A-scan screen -->
  <rect x="420" y="100" width="340" height="280" fill="#0A2342"/>
  <line x1="420" y1="156" x2="760" y2="156" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="212" x2="760" y2="212" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="268" x2="760" y2="268" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="420" y1="324" x2="760" y2="324" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="488" y1="100" x2="488" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="556" y1="100" x2="556" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="624" y1="100" x2="624" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="692" y1="100" x2="692" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- trace -->
  <polyline points="432,350 446,350 450,140 455,350 590,350 596,229 602,350 714,350 720,156 726,350 752,350" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="452" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">IP</text>
  <text x="596" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">flaw echo</text>
  <text x="722" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">BW</text>

  <!-- tie line: flaw to its echo -->
  <line x1="219" y1="250" x2="590" y2="232" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="590" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">time → distance into the part</text>
  <text x="590" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">IP = initial pulse · BW = back-wall echo</text>

  <!-- legend -->
  <line x1="70" y1="408" x2="100" y2="408" stroke="#1B82E8" stroke-width="4"/>
  <text x="106" y="413" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">outgoing pulse</text>
  <line x1="236" y1="408" x2="266" y2="408" stroke="#F2A33C" stroke-width="4"/>
  <text x="272" y="413" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw echo</text>
  <line x1="70" y1="434" x2="100" y2="434" stroke="#1E9E6A" stroke-width="4"/>
  <text x="106" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back-wall echo</text>
</svg>
