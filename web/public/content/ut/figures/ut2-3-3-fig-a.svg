<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Laminate Defects — Cross-Section and Pulse-Echo View</text>

  <!-- ============ LEFT: laminate stack ============ -->
  <rect x="50" y="120" width="460" height="180" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- ply interfaces -->
  <line x1="50" y1="140" x2="510" y2="140" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="160" x2="510" y2="160" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="180" x2="510" y2="180" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="200" x2="510" y2="200" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="220" x2="510" y2="220" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="240" x2="510" y2="240" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="260" x2="510" y2="260" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="50" y1="280" x2="510" y2="280" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- foreign film inclusion -->
  <line x1="80" y1="180" x2="140" y2="180" stroke="#F2A33C" stroke-width="5"/>
  <line x1="110" y1="180" x2="100" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Backing-film inclusion</text>

  <!-- delamination -->
  <line x1="180" y1="240" x2="280" y2="240" stroke="#D14343" stroke-width="6"/>
  <line x1="230" y1="242" x2="200" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Delamination</text>
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(interply separation)</text>

  <!-- porosity field -->
  <circle cx="330" cy="255" r="3" fill="#1B82E8"/>
  <circle cx="344" cy="268" r="2.5" fill="#1B82E8"/>
  <circle cx="356" cy="250" r="3" fill="#1B82E8"/>
  <circle cx="368" cy="266" r="2.5" fill="#1B82E8"/>
  <circle cx="380" cy="252" r="3" fill="#1B82E8"/>
  <circle cx="338" cy="284" r="2.5" fill="#1B82E8"/>
  <circle cx="362" cy="282" r="3" fill="#1B82E8"/>
  <circle cx="384" cy="280" r="2.5" fill="#1B82E8"/>
  <line x1="360" y1="284" x2="345" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="345" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Porosity</text>
  <text x="345" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(scattered voids)</text>

  <!-- impact cone -->
  <polyline points="440,112 446,120 452,112" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="446" y1="120" x2="416" y2="298" stroke="#D14343" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="446" y1="120" x2="478" y2="298" stroke="#D14343" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="424" y1="180" x2="468" y2="180" stroke="#D14343" stroke-width="4"/>
  <line x1="420" y1="220" x2="474" y2="220" stroke="#D14343" stroke-width="4"/>
  <line x1="417" y1="260" x2="477" y2="260" stroke="#D14343" stroke-width="4"/>
  <line x1="462" y1="290" x2="480" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="480" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Impact damage:</text>
  <text x="480" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">cone widens with depth</text>
  <text x="446" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">barely visible dent</text>

  <!-- ============ RIGHT: pulse-echo A-scan over delamination ============ -->
  <text x="660" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Pulse-echo over the delamination</text>
  <rect x="555" y="130" width="210" height="170" rx="6" fill="#0A2342" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="565" y1="280" x2="755" y2="280" stroke="#E8F1FB" stroke-width="2"/>
  <!-- initial pulse -->
  <polyline points="572,280 578,148 584,280 589,185 594,280" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <!-- delamination echo -->
  <polyline points="640,280 652,150 664,280" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="652" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">ply-depth echo</text>
  <!-- missing back wall (ghost) -->
  <polyline points="712,280 722,210 732,280" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="722" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">back wall lost</text>
  <text x="660" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">depth = v × t ÷ 2</text>
  <text x="660" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(3,000 m/s × 4 µs ÷ 2 = 6 mm)</text>

  <!-- bottom note -->
  <rect x="60" y="396" width="680" height="38" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Nearly every laminate defect lies flat between plies — perfectly oriented for a straight beam</text>
</svg>
