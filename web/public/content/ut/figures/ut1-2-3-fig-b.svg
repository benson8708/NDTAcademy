<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">A-Scan: 50 mm Plate, Range 0–60 mm</text>

  <!-- screen -->
  <rect x="60" y="70" width="680" height="310" fill="#0A2342" stroke="#1B82E8" stroke-width="2.5"/>
  <g stroke="#1B82E8" stroke-width="1" opacity="0.22">
    <line x1="128" y1="70" x2="128" y2="380"/>
    <line x1="196" y1="70" x2="196" y2="380"/>
    <line x1="264" y1="70" x2="264" y2="380"/>
    <line x1="332" y1="70" x2="332" y2="380"/>
    <line x1="400" y1="70" x2="400" y2="380"/>
    <line x1="468" y1="70" x2="468" y2="380"/>
    <line x1="536" y1="70" x2="536" y2="380"/>
    <line x1="604" y1="70" x2="604" y2="380"/>
    <line x1="672" y1="70" x2="672" y2="380"/>
    <line x1="60" y1="132" x2="740" y2="132"/>
    <line x1="60" y1="194" x2="740" y2="194"/>
    <line x1="60" y1="256" x2="740" y2="256"/>
    <line x1="60" y1="318" x2="740" y2="318"/>
  </g>

  <!-- baseline grass -->
  <path d="M 62 358 L 80 354 L 98 357 L 116 353 L 134 357 L 152 354 L 170 358 L 188 355 L 206 357 L 224 353 L 242 356 L 260 354 L 278 357 L 296 355 L 314 357 L 332 354 L 358 356 L 376 354 L 394 357 L 412 355 L 430 357 L 448 353 L 466 356 L 484 354 L 502 357 L 520 355 L 538 357 L 556 354 L 574 356 L 592 355 L 610 357 L 640 354 L 658 356 L 676 355 L 694 357 L 712 354 L 730 356 L 738 357" fill="none" stroke="#E8F1FB" stroke-width="1.5" opacity="0.8"/>

  <!-- initial pulse -->
  <path d="M 62 358 L 67 100 L 72 290 L 77 132 L 82 330 L 88 358" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="96" y="95" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">initial pulse</text>

  <!-- discontinuity echo at 25 mm -->
  <path d="M 333 358 L 343 215 L 353 358" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="343" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">discontinuity echo — 25 mm</text>

  <!-- back-wall echo at 50 mm -->
  <path d="M 617 358 L 627 162 L 637 358" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="627" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">back wall — 50 mm</text>

  <text x="470" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB" opacity="0.85">grass</text>

  <!-- depth scale -->
  <text x="60" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">0</text>
  <text x="173" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">10</text>
  <text x="287" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">20</text>
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">30</text>
  <text x="513" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">40</text>
  <text x="627" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">50</text>
  <text x="740" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">60</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">depth in steel (mm) — d = v × t ÷ 2</text>
</svg>
