<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Angle-Beam Coverage: Skip and Legs</text>

  <!-- scan band arrow -->
  <line x1="130" y1="108" x2="390" y2="108" stroke="#1E9E6A" stroke-width="2"/>
  <polygon points="130,108 142,103 142,113" fill="#1E9E6A"/>
  <polygon points="390,108 378,103 378,113" fill="#1E9E6A"/>
  <text x="260" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">scan band: index point moves half-skip → full-skip</text>

  <!-- plate -->
  <line x1="40" y1="150" x2="760" y2="150" stroke="#D9E0E8" stroke-width="2.5"/>
  <line x1="40" y1="290" x2="760" y2="290" stroke="#D9E0E8" stroke-width="2.5"/>

  <!-- weld (centerline x=600) -->
  <path d="M 560 150 L 640 150 L 606 290 L 594 290 Z" fill="#1B82E8" fill-opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 550 150 Q 600 132 650 150" fill="#1B82E8" fill-opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 590 290 Q 600 300 610 290" fill="#1B82E8" fill-opacity="0.25" stroke="#1B82E8" stroke-width="2"/>
  <line x1="600" y1="138" x2="600" y2="302" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- probe at full-skip stand-off (solid) -->
  <polygon points="118,150 186,150 186,124 140,124" fill="#F2A33C" stroke="#E8F1FB" stroke-width="1"/>
  <circle cx="160" cy="150" r="4" fill="#E8F1FB"/>
  <!-- probe at half-skip stand-off (dashed ghost) -->
  <polygon points="316,150 384,150 384,124 338,124" fill="none" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="358" cy="150" r="4" fill="#F2A33C"/>

  <!-- beam: leg 1 + leg 2 from solid probe -->
  <line x1="160" y1="150" x2="402" y2="290" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="402" y1="290" x2="644" y2="150" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="644,150 630,153 636,162" fill="#F2A33C"/>
  <!-- beam from ghost probe to root (dashed) -->
  <line x1="358" y1="150" x2="600" y2="290" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="6 5"/>

  <!-- refracted-angle marker at solid probe -->
  <line x1="160" y1="150" x2="160" y2="222" stroke="#D9E0E8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M 160 205 A 55 55 0 0 0 207 178" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="222" y="206" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">θ = 60°</text>

  <!-- leg labels -->
  <text x="245" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">leg 1</text>
  <text x="545" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">leg 2</text>
  <text x="402" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">V-path node (far surface)</text>
  <text x="46" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">index (exit) point</text>
  <line x1="112" y1="172" x2="152" y2="153" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="700" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">weld + HAZ</text>

  <!-- dimension: half skip (ghost probe to centerline) -->
  <line x1="358" y1="340" x2="600" y2="340" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="358" y1="332" x2="358" y2="348" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="600" y1="332" x2="600" y2="348" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="479" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">half skip = T·tanθ ≈ 43 mm → beam on root (leg 1)</text>

  <!-- dimension: full skip (solid probe to centerline) -->
  <line x1="160" y1="390" x2="600" y2="390" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="160" y1="382" x2="160" y2="398" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="600" y1="382" x2="600" y2="398" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="380" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">full skip = 2T·tanθ ≈ 87 mm → beam on cap (leg 2)</text>

  <!-- formulas -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">T = 25 mm, 60° probe · leg = T/cosθ = 50 mm · depth (leg 1) = s·cosθ · surface distance = s·sinθ</text>
</svg>
