<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Curved-Surface Setups — Right and Wrong</text>

  <!-- PANEL A: flat wedge, line contact -->
  <rect x="55" y="75" width="330" height="168" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="220" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">A — flat wedge on pipe OD</text>
  <path d="M 85 225 A 300 300 0 0 1 355 225 L 355 238 L 85 238 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="170" y="150" width="100" height="45" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="170,194 170,202 214,195.5" fill="#D14343"/>
  <polygon points="270,194 270,202 226,195.5" fill="#D14343"/>
  <path d="M 184 134 A 56 26 0 0 1 256 134" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="180,128 178,142 192,138" fill="#F2A33C"/>
  <polygon points="260,128 262,142 248,138" fill="#F2A33C"/>
  <text x="312" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#F2A33C" font-weight="bold">rocks</text>
  <line x1="276" y1="200" x2="318" y2="186" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="322" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">air gap</text>
  <text x="220" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D14343">line contact — gap &gt; 0.5 mm: contour it</text>

  <!-- PANEL B: contoured shoe -->
  <rect x="415" y="75" width="330" height="168" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="580" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">B — shoe contoured to the OD</text>
  <path d="M 445 225 A 300 300 0 0 1 715 225 L 715 238 L 445 238 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 530 199 A 300 300 0 0 1 630 199 L 630 150 L 530 150 Z" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="688" cy="132" r="14" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="681,132 686,138 696,126" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="580" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E9E6A" font-weight="bold">full-face contact — stable exit point</text>

  <!-- PANEL C: wrong-plane contour (end view) -->
  <rect x="55" y="268" width="330" height="162" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="220" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">C — contoured in the wrong plane</text>
  <circle cx="150" cy="362" r="58" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="150" cy="362" r="40" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="110" y="288" width="80" height="16" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="110,303 110,316 142,304.5" fill="#D14343"/>
  <polygon points="190,303 190,316 158,304.5" fill="#D14343"/>
  <path d="M 120 278 A 42 18 0 0 1 180 278" fill="none" stroke="#F2A33C" stroke-width="2.2"/>
  <polygon points="117,272 115,284 127,281" fill="#F2A33C"/>
  <polygon points="183,272 185,284 173,281" fill="#F2A33C"/>
  <text x="300" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">girth-weld scan: beam runs</text>
  <text x="300" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">along the pipe axis, but the</text>
  <text x="300" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">contour was cut lengthwise —</text>
  <text x="300" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">unmatched across the width,</text>
  <text x="300" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">so it still rocks side-to-side</text>
  <text x="150" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">end view</text>

  <!-- PANEL D: flat cal block for curved job -->
  <rect x="415" y="268" width="330" height="162" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="580" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">D — calibrated flat, scanning curved</text>
  <rect x="440" y="316" width="135" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="507" cy="356" r="7" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="507" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">SDH</text>
  <text x="507" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">flat block</text>
  <text x="611" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#D14343">&#8800;</text>
  <circle cx="687" cy="356" r="44" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="687" cy="356" r="30" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="687" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">the part</text>
  <text x="580" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">use a curved block: 0.9–1.5 × its diameter covers the part</text>
</svg>
