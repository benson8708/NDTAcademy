<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Inside a Straight-Beam Contact Probe</text>

  <!-- connector -->
  <rect x="368" y="58" width="64" height="40" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="386" y="46" width="28" height="12" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>

  <!-- case -->
  <rect x="300" y="98" width="200" height="240" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>

  <!-- coax lead from connector down inside case -->
  <line x1="400" y1="98" x2="400" y2="130" stroke="#D14343" stroke-width="3"/>
  <line x1="400" y1="130" x2="346" y2="158" stroke="#D14343" stroke-width="3"/>
  <line x1="400" y1="130" x2="454" y2="276" stroke="#D14343" stroke-width="3"/>

  <!-- backing block -->
  <rect x="322" y="150" width="156" height="116" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <line x1="330" y1="258" x2="372" y2="158" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="356" y1="262" x2="402" y2="154" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="384" y1="262" x2="430" y2="154" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="412" y1="262" x2="458" y2="154" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="440" y1="262" x2="472" y2="186" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- electrode top -->
  <rect x="322" y="268" width="156" height="6" fill="#F2A33C"/>
  <!-- element -->
  <rect x="322" y="274" width="156" height="22" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- electrode bottom -->
  <rect x="322" y="296" width="156" height="6" fill="#F2A33C"/>
  <!-- wear plate -->
  <rect x="310" y="302" width="180" height="16" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>

  <!-- couplant film -->
  <rect x="280" y="322" width="240" height="8" fill="#F2A33C" opacity="0.85"/>

  <!-- test part -->
  <rect x="140" y="330" width="520" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">TEST PART (steel)</text>

  <!-- beam into part -->
  <line x1="400" y1="334" x2="400" y2="392" stroke="#1B82E8" stroke-width="3" stroke-dasharray="6 4"/>
  <polygon points="394,392 400,404 406,392" fill="#1B82E8"/>

  <!-- ===== leader lines + labels, left side ===== -->
  <line x1="322" y1="200" x2="218" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="162" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Backing block</text>
  <text x="210" y="182" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">absorbs rear energy,</text>
  <text x="210" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">damps ringing</text>

  <line x1="322" y1="285" x2="218" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="256" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Piezo element</text>
  <text x="210" y="276" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">λ/2 thick</text>

  <line x1="290" y1="326" x2="218" y2="310" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="304" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Couplant film</text>
  <text x="210" y="324" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">displaces the air</text>

  <!-- ===== leader lines + labels, right side ===== -->
  <line x1="432" y1="78" x2="540" y2="78" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="548" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Connector (BNC)</text>

  <line x1="500" y1="140" x2="580" y2="140" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="588" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Shielded case</text>

  <line x1="478" y1="271" x2="580" y2="240" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="588" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Electrodes</text>
  <text x="588" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">on both faces</text>

  <line x1="490" y1="310" x2="580" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="588" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Wear plate /</text>
  <text x="588" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">matching layer</text>

  <!-- bottom note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Heavy backing → short broadband pulse (resolution); light backing → long ringing pulse (sensitivity)</text>
</svg>
