<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Reading an Immersion A-Scan</text>

  <!-- ===== left: physical setup ===== -->
  <text x="170" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Sound path</text>
  <!-- transducer -->
  <rect x="150" y="92" width="40" height="22" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="170" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8F1FB">T/D</text>
  <!-- water column -->
  <rect x="100" y="114" width="140" height="120" fill="#1B82E8" opacity="0.22"/>
  <text x="110" y="132" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">water path</text>
  <!-- part -->
  <rect x="100" y="234" width="140" height="90" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="170" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">steel part</text>
  <!-- down arrow -->
  <line x1="170" y1="116" x2="170" y2="318" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="164,312 176,312 170,324 " fill="#F2A33C"/>
  <!-- front surface marker -->
  <circle cx="170" cy="234" r="5" fill="#1E9E6A"/>
  <text x="248" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">front face</text>
  <!-- back wall marker -->
  <circle cx="170" cy="324" r="5" fill="#D14343"/>
  <text x="248" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#D14343">back wall</text>

  <!-- ===== right: A-scan screen ===== -->
  <text x="540" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">A-scan display</text>
  <rect x="350" y="92" width="400" height="250" fill="#06182E" stroke="#D9E0E8" stroke-width="2"/>
  <!-- baseline -->
  <line x1="370" y1="312" x2="730" y2="312" stroke="#5A6B7E" stroke-width="2"/>
  <text x="730" y="332" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">time / distance &#8594;</text>
  <!-- vertical gridlines -->
  <line x1="370" y1="110" x2="370" y2="312" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- initial pulse (IP) -->
  <rect x="378" y="132" width="9" height="180" fill="#5A6B7E"/>
  <text x="382" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">IP</text>
  <!-- water path gap label -->
  <line x1="390" y1="296" x2="476" y2="296" stroke="#1B82E8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="433" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1B82E8">water path</text>
  <!-- front surface echo (FSE) -->
  <rect x="478" y="150" width="9" height="162" fill="#1E9E6A"/>
  <text x="483" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">FSE</text>
  <!-- flaw echo -->
  <rect x="560" y="232" width="8" height="80" fill="#F2A33C"/>
  <text x="564" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F2A33C">flaw</text>
  <!-- back wall echo (BWE) -->
  <rect x="640" y="172" width="9" height="140" fill="#D14343"/>
  <text x="644" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">BWE</text>
  <!-- interior window bracket -->
  <line x1="490" y1="328" x2="649" y2="328" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="490" y1="324" x2="490" y2="332" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="649" y1="324" x2="649" y2="332" stroke="#E8F1FB" stroke-width="1.5"/>

  <!-- legend / explanation -->
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">IP = initial pulse</text>
  <text x="556" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">FSE = front-surface echo</text>
  <text x="708" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">BWE = back wall</text>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#E8F1FB">Interior signals (flaw, back wall) appear to the right of the front-surface echo.</text>
</svg>
