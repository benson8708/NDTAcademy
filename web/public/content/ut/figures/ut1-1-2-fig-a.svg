<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Wavelength: λ = v ÷ f</text>

  <!-- centerline and wave -->
  <line x1="50" y1="170" x2="480" y2="170" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="6,5"/>
  <path d="M 60 170 Q 80 110 100 170 T 140 170 T 180 170 T 220 170 T 260 170 T 300 170 T 340 170 T 380 170 T 420 170 T 460 170" fill="none" stroke="#1B82E8" stroke-width="3"/>

  <!-- one-wavelength bracket (crest to crest) -->
  <line x1="80" y1="136" x2="80" y2="112" stroke="#0A2342" stroke-width="2"/>
  <line x1="160" y1="136" x2="160" y2="112" stroke="#0A2342" stroke-width="2"/>
  <line x1="80" y1="112" x2="160" y2="112" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">λ — one full cycle</text>

  <!-- velocity arrow -->
  <line x1="200" y1="225" x2="320" y2="225" stroke="#0A2342" stroke-width="3"/>
  <polygon points="320,219 320,231 334,225" fill="#0A2342"/>
  <text x="262" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">travels at velocity v</text>

  <!-- worked-example panel -->
  <rect x="520" y="80" width="250" height="180" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="645" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Steel — longitudinal</text>
  <text x="645" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">v = 5,920 m/s = 5.92 mm/µs</text>
  <text x="645" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5 MHz → λ = 1.18 mm</text>
  <text x="645" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2.25 MHz → λ = 2.63 mm</text>
  <text x="645" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 MHz → λ = 5.92 mm</text>
  <text x="645" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">λ(mm) = v(mm/µs) ÷ f(MHz)</text>

  <!-- low vs high frequency comparison -->
  <path d="M 60 340 Q 97 290 134 340 T 208 340 T 282 340 T 356 340" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="208" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">lower f → longer λ → deeper penetration</text>

  <path d="M 440 340 Q 452 296 465 340 T 490 340 T 515 340 T 540 340 T 565 340 T 590 340 T 615 340 T 640 340 T 665 340 T 690 340 T 715 340 T 740 340" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="590" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">higher f → shorter λ → finer sensitivity</text>

  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Rule of thumb: reflectors smaller than ≈ λ/2 are unreliable to detect</text>
</svg>
