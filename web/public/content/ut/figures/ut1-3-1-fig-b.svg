<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">One Flaw, Three Presentations</text>

  <!-- panel headers -->
  <text x="150" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">A-scan: one position</text>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">B-scan: cross-section</text>
  <text x="650" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">C-scan: plan view</text>

  <!-- A-scan panel -->
  <rect x="40" y="110" width="220" height="210" fill="#0A2342"/>
  <line x1="48" y1="163" x2="252" y2="163" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="48" y1="215" x2="252" y2="215" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="48" y1="267" x2="252" y2="267" stroke="#5A6B7E" stroke-width="1"/>
  <polyline points="50,300 56,130 62,300 130,300 138,205 146,300 218,300 226,155 234,300 252,300" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="68" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="138" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">flaw</text>
  <text x="226" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW</text>
  <text x="150" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">time / distance</text>
  <text transform="rotate(-90 28 215)" x="28" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">amplitude</text>

  <!-- B-scan panel -->
  <rect x="290" y="110" width="220" height="210" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="290" y1="135" x2="510" y2="135" stroke="#0A2342" stroke-width="4"/>
  <line x1="290" y1="290" x2="370" y2="290" stroke="#0A2342" stroke-width="4"/>
  <line x1="430" y1="290" x2="510" y2="290" stroke="#0A2342" stroke-width="4"/>
  <line x1="370" y1="290" x2="430" y2="290" stroke="#D9E0E8" stroke-width="4"/>
  <rect x="368" y="200" width="64" height="9" fill="#D14343"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">flaw at depth</text>
  <text x="300" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">top surface</text>
  <text x="300" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back wall</text>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">shadowed</text>
  <text x="400" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe position</text>
  <text transform="rotate(-90 278 215)" x="278" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">depth</text>

  <!-- C-scan panel -->
  <rect x="540" y="110" width="220" height="210" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="595" y1="110" x2="595" y2="320" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="650" y1="110" x2="650" y2="320" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="705" y1="110" x2="705" y2="320" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="540" y1="163" x2="760" y2="163" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="540" y1="215" x2="760" y2="215" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="540" y1="267" x2="760" y2="267" stroke="#D9E0E8" stroke-width="1"/>
  <ellipse cx="648" cy="210" rx="62" ry="42" fill="#F2A33C" opacity="0.55"/>
  <ellipse cx="648" cy="210" rx="42" ry="26" fill="#D14343"/>
  <text x="648" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw footprint</text>
  <text x="650" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scan x</text>
  <text transform="rotate(-90 528 215)" x="528" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scan y</text>

  <!-- footer note -->
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Same plate, same flaw. The A-scan reads one spot, the B-scan slices along a line,</text>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">and the C-scan maps the area from above. Computerized systems store all three.</text>
</svg>
