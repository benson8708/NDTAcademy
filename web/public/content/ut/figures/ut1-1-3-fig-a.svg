<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Qualification Path in an Employer-Based Program</text>

  <!-- step boxes -->
  <rect x="30" y="120" width="170" height="130" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="115" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">TRAINEE</text>
  <text x="115" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">works supervised</text>
  <text x="115" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">formal training hrs</text>
  <text x="115" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">logged experience</text>

  <rect x="220" y="120" width="170" height="130" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="305" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">EXAMINATIONS</text>
  <text x="305" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">general + specific</text>
  <text x="305" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">+ practical exams</text>
  <text x="305" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">near-vision check</text>

  <rect x="410" y="120" width="170" height="130" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="495" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">CERTIFICATION</text>
  <text x="495" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">issued by employer</text>
  <text x="495" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">per written practice</text>
  <text x="495" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scope + expiration</text>

  <rect x="600" y="120" width="170" height="130" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="685" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">MAINTENANCE</text>
  <text x="685" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">annual vision check</text>
  <text x="685" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">recertify 3–5 years</text>
  <text x="685" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">per governing doc</text>

  <!-- flow arrows -->
  <line x1="202" y1="185" x2="212" y2="185" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="212,178 212,192 220,185" fill="#F2A33C"/>
  <line x1="392" y1="185" x2="402" y2="185" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="402,178 402,192 410,185" fill="#F2A33C"/>
  <line x1="582" y1="185" x2="592" y2="185" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="592,178 592,192 600,185" fill="#F2A33C"/>

  <!-- recertification loop -->
  <path d="M 685 250 L 685 300 L 305 300 L 305 256" fill="none" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="299,258 311,258 305,248" fill="#F2A33C"/>
  <text x="495" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">recertification — typically every 3 to 5 years</text>

  <!-- governing documents -->
  <text x="400" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Governing documents</text>
  <rect x="60" y="360" width="200" height="60" rx="6" fill="#D9E0E8"/>
  <text x="160" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">SNT-TC-1A</text>
  <text x="160" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">recommended practice</text>
  <rect x="300" y="360" width="200" height="60" rx="6" fill="#D9E0E8"/>
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ANSI/ASNT CP-189</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">standard (requirements)</text>
  <rect x="540" y="360" width="200" height="60" rx="6" fill="#D9E0E8"/>
  <text x="640" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">NAS 410</text>
  <text x="640" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">aerospace requirements</text>
</svg>
