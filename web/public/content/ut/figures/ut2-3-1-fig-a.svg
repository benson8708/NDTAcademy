<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Grain Flow and Forging Discontinuities</text>

  <!-- ============ LEFT: forged shaft (longitudinal section) ============ -->
  <text x="210" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Forged shaft — flow runs axially</text>

  <!-- probe on top -->
  <rect x="185" y="88" width="50" height="26" fill="#0A2342"/>
  <text x="248" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">straight beam</text>
  <!-- beam -->
  <line x1="210" y1="114" x2="210" y2="270" stroke="#F2A33C" stroke-width="3" stroke-dasharray="7,5"/>
  <polygon points="202,268 210,284 218,268" fill="#F2A33C"/>

  <!-- shaft body -->
  <rect x="45" y="150" width="330" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- flow lines -->
  <path d="M 50 168 C 150 163, 270 173, 370 168" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 50 192 C 150 187, 270 197, 370 192" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 50 220 C 150 215, 270 225, 370 220" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 50 248 C 150 243, 270 253, 370 248" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 50 272 C 150 267, 270 277, 370 272" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- centerline burst (red jagged along axis) -->
  <polyline points="150,221 168,215 184,224 202,216 220,223 238,217" fill="none" stroke="#D14343" stroke-width="4"/>
  <!-- flakes cluster mid-radius -->
  <line x1="80" y1="186" x2="92" y2="186" stroke="#D14343" stroke-width="3"/>
  <line x1="98" y1="194" x2="110" y2="194" stroke="#D14343" stroke-width="3"/>
  <line x1="84" y1="202" x2="96" y2="202" stroke="#D14343" stroke-width="3"/>
  <line x1="102" y1="182" x2="114" y2="182" stroke="#D14343" stroke-width="3"/>
  <!-- stringers -->
  <line x1="270" y1="247" x2="330" y2="247" stroke="#1B82E8" stroke-width="3" stroke-dasharray="10,5"/>
  <!-- lap at surface -->
  <path d="M 300 150 q 14 10 28 3" fill="none" stroke="#F2A33C" stroke-width="4"/>

  <!-- leaders + labels -->
  <line x1="97" y1="194" x2="62" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="62" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Flakes</text>
  <text x="62" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(mid-radius)</text>

  <line x1="194" y1="220" x2="180" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="180" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Burst</text>
  <text x="180" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(centerline)</text>

  <line x1="300" y1="247" x2="295" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="295" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Stringers</text>

  <line x1="318" y1="152" x2="368" y2="128" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="372" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lap</text>

  <!-- ============ RIGHT: upset disk ============ -->
  <text x="610" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Upset disk — flow turns outward</text>

  <!-- probe on top face -->
  <rect x="585" y="98" width="50" height="26" fill="#0A2342"/>
  <line x1="610" y1="124" x2="610" y2="200" stroke="#F2A33C" stroke-width="3" stroke-dasharray="7,5"/>
  <polygon points="602,198 610,214 618,198" fill="#F2A33C"/>
  <text x="648" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scan from face</text>

  <!-- disk body (cross-section) -->
  <rect x="480" y="170" width="260" height="110" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- pancake flow lines bowing outward -->
  <path d="M 490 225 C 540 188, 680 188, 730 225" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 490 225 C 540 262, 680 262, 730 225" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 510 225 C 555 200, 665 200, 710 225" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 510 225 C 555 250, 665 250, 710 225" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- flat discontinuities parallel to faces -->
  <line x1="545" y1="225" x2="600" y2="225" stroke="#D14343" stroke-width="4"/>
  <line x1="625" y1="218" x2="675" y2="218" stroke="#D14343" stroke-width="4"/>

  <line x1="600" y1="226" x2="560" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="560" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Discontinuities lie flat,</text>
  <text x="560" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">parallel to the faces</text>

  <!-- bottom rule -->
  <rect x="60" y="392" width="680" height="40" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Working aligns discontinuities parallel to flow — aim the beam perpendicular to it</text>
</svg>
