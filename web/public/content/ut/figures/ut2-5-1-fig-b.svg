<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Where Bondline Discontinuities Occur</text>

  <!-- doubler on top-left of skin -->
  <rect x="70" y="120" width="250" height="22" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- doubler adhesive -->
  <rect x="70" y="142" width="250" height="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- 1: edge void at doubler edge (red ellipse in adhesive near right edge) -->
  <ellipse cx="304" cy="146" rx="14" ry="4" fill="#D14343"/>
  <!-- 2: porosity cluster in doubler adhesive -->
  <circle cx="150" cy="146" r="2.5" fill="#D14343"/>
  <circle cx="162" cy="145" r="2" fill="#D14343"/>
  <circle cx="173" cy="147" r="2.5" fill="#D14343"/>
  <circle cx="185" cy="145" r="2" fill="#D14343"/>
  <circle cx="196" cy="147" r="2.5" fill="#D14343"/>

  <!-- skin (full width) -->
  <rect x="40" y="151" width="720" height="24" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- upper sandwich adhesive -->
  <rect x="40" y="175" width="720" height="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- 3: skin-to-core disbond — red gap segment in upper adhesive -->
  <rect x="360" y="175" width="90" height="9" fill="#D14343"/>

  <!-- core cell walls -->
  <line x1="70" y1="184" x2="70" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="105" y1="184" x2="105" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="140" y1="184" x2="140" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="175" y1="184" x2="175" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="210" y1="184" x2="210" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="245" y1="184" x2="245" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="280" y1="184" x2="280" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="315" y1="184" x2="315" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="350" y1="184" x2="350" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="385" y1="184" x2="385" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="420" y1="184" x2="420" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="455" y1="184" x2="455" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <!-- 4: crushed core — zigzag walls -->
  <polyline points="490,184 500,220 482,260 496,300 490,330" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="525,184 514,224 532,264 518,300 525,330" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="560,184 570,222 552,262 566,300 560,330" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- normal walls resume -->
  <line x1="595" y1="184" x2="595" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <!-- 5: water ingress — pale blue filled cells -->
  <rect x="595" y="240" width="35" height="90" fill="#1B82E8" opacity="0.45"/>
  <rect x="630" y="216" width="35" height="114" fill="#1B82E8" opacity="0.45"/>
  <rect x="665" y="252" width="35" height="78" fill="#1B82E8" opacity="0.45"/>
  <line x1="630" y1="184" x2="630" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="665" y1="184" x2="665" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="700" y1="184" x2="700" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="735" y1="184" x2="735" y2="330" stroke="#5A6B7E" stroke-width="2"/>

  <!-- lower adhesive + face sheet -->
  <rect x="40" y="330" width="720" height="9" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <rect x="40" y="339" width="720" height="24" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- callout markers + leaders -->
  <circle cx="304" cy="100" r="13" fill="#D14343"/>
  <text x="304" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <line x1="304" y1="113" x2="304" y2="140" stroke="#D14343" stroke-width="1.5"/>

  <circle cx="173" cy="100" r="13" fill="#D14343"/>
  <text x="173" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
  <line x1="173" y1="113" x2="173" y2="140" stroke="#D14343" stroke-width="1.5"/>

  <circle cx="405" cy="100" r="13" fill="#D14343"/>
  <text x="405" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <line x1="405" y1="113" x2="405" y2="172" stroke="#D14343" stroke-width="1.5"/>

  <circle cx="525" cy="404" r="13" fill="#D14343"/>
  <text x="525" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
  <line x1="525" y1="391" x2="525" y2="335" stroke="#D14343" stroke-width="1.5"/>

  <circle cx="648" cy="404" r="13" fill="#1B82E8"/>
  <text x="648" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <line x1="648" y1="391" x2="648" y2="335" stroke="#1B82E8" stroke-width="1.5"/>

  <!-- legend -->
  <text x="40" y="404" font-family="Arial, sans-serif" font-size="16" fill="#0A2342"><tspan font-weight="bold" fill="#D14343">1</tspan> Edge void at doubler edge&#160;&#160;&#160;<tspan font-weight="bold" fill="#D14343">2</tspan> Porosity in bondline&#160;&#160;&#160;<tspan font-weight="bold" fill="#D14343">3</tspan> Skin-to-core disbond</text>
  <text x="40" y="428" font-family="Arial, sans-serif" font-size="16" fill="#0A2342"><tspan font-weight="bold" fill="#D14343">4</tspan> Crushed core&#160;&#160;&#160;<tspan font-weight="bold" fill="#1B82E8">5</tspan> Water ingress in cells&#160;&#160;&#160;<tspan fill="#5A6B7E">(weak/kissing bonds hide at any interface &#8212; invisible to UT)</tspan></text>

  <!-- side labels -->
  <text x="66" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Doubler</text>
  <text x="752" y="168" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Skin</text>
  <text x="752" y="358" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Far face sheet</text>
</svg>
