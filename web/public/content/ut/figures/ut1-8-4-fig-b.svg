<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Wedge Wear Shifts the Exit Point and Angle</text>

  <!-- steel -->
  <rect x="60" y="300" width="680" height="110" fill="#E8F1FB"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#0A2342" stroke-width="3"/>
  <text x="78" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel</text>

  <!-- ===== NEW wedge ===== -->
  <polygon points="120,300 260,300 260,228 120,272" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="150" y="238" width="60" height="16" fill="#0A2342" transform="rotate(-18 180 246)"/>

  <!-- engraved index mark -->
  <line x1="200" y1="300" x2="200" y2="314" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="200" y1="314" x2="176" y2="326" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="160" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">engraved mark</text>

  <!-- beam in wedge + refracted beam -->
  <line x1="180" y1="248" x2="200" y2="300" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="200" y1="300" x2="287" y2="350" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="278,350 288,338 292,354" fill="#1B82E8"/>
  <line x1="200" y1="270" x2="200" y2="364" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5,4"/>
  <path d="M 200,336 A 36 36 0 0 1 231,318" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="224" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">60°</text>

  <text x="180" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">NEW WEDGE</text>
  <text x="180" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">exit point on the engraved mark</text>

  <!-- ===== WORN wedge ===== -->
  <polygon points="480,300 610,300 610,232 480,274" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="508" y="240" width="60" height="16" fill="#0A2342" transform="rotate(-18 538 248)"/>

  <!-- material worn away (original front profile) -->
  <polyline points="610,300 626,300 626,236 610,232" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="634" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">material worn away</text>

  <!-- engraved vs true exit point -->
  <line x1="560" y1="300" x2="560" y2="314" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="578" y1="300" x2="578" y2="314" stroke="#D14343" stroke-width="2.5"/>
  <line x1="562" y1="322" x2="570" y2="322" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="568,317 568,327 576,322" fill="#D14343"/>
  <line x1="560" y1="310" x2="462" y2="330" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="456" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">engraved mark</text>
  <line x1="578" y1="312" x2="462" y2="354" stroke="#D14343" stroke-width="1.2"/>
  <text x="456" y="358" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">true exit point</text>

  <!-- beams: nominal vs worn -->
  <line x1="538" y1="250" x2="578" y2="300" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="578" y1="270" x2="578" y2="364" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="578" y1="300" x2="665" y2="350" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="578" y1="300" x2="672" y2="328" stroke="#D14343" stroke-width="3"/>
  <polygon points="663,330 671,318 678,334" fill="#D14343"/>
  <text x="671" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">60° (new)</text>
  <text x="678" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">≈63° (worn)</text>

  <text x="560" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">WORN WEDGE — exit point shifts forward,</text>
  <text x="560" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">refracted angle steepens — re-verify on the IIW block</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Uneven front wear changes the wedge geometry under the element — every plotted flaw location depends on these two values</text>
</svg>
