<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Root Zone: Bead or Defect? (70° probe, 20 mm plate, leg 1)</text>

  <!-- ===== cross-section strip ===== -->
  <line x1="70" y1="78" x2="730" y2="78" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="70" y1="148" x2="730" y2="148" stroke="#D9E0E8" stroke-width="2"/>
  <!-- weld V (centerline x=520) -->
  <path d="M 455 78 L 585 78 L 526 140 L 526 148 L 514 148 L 514 140 Z" fill="#1B82E8" fill-opacity="0.22" stroke="#1B82E8" stroke-width="1.5"/>
  <path d="M 447 78 Q 520 62 593 78" fill="#1B82E8" fill-opacity="0.22" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="520" y1="66" x2="520" y2="160" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- root bead (geometry, beyond centerline) -->
  <path d="M 506 148 Q 524 162 542 148" fill="#F2A33C" fill-opacity="0.4" stroke="#F2A33C" stroke-width="2"/>
  <!-- root crack at centerline -->
  <polyline points="513,148 509,136 515,126" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- probe wedge + beam -->
  <polygon points="250,78 320,78 320,56 262,56" fill="#F2A33C" stroke="#E8F1FB" stroke-width="1"/>
  <circle cx="285" cy="78" r="4" fill="#E8F1FB"/>
  <text x="330" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">70° shear wave</text>
  <line x1="285" y1="78" x2="512" y2="144" stroke="#1B82E8" stroke-width="2"/>
  <polygon points="512,144 499,136 496,146" fill="#1B82E8"/>
  <line x1="514" y1="146" x2="536" y2="152" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- thickness ticks -->
  <line x1="95" y1="78" x2="95" y2="148" stroke="#5A6B7E" stroke-width="1.2"/>
  <line x1="89" y1="78" x2="101" y2="78" stroke="#5A6B7E" stroke-width="1.2"/>
  <line x1="89" y1="148" x2="101" y2="148" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="108" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">T = 20 mm</text>
  <!-- strip labels -->
  <text x="442" y="110" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">root crack / IP</text>
  <line x1="446" y1="114" x2="508" y2="132" stroke="#D14343" stroke-width="1.2"/>
  <text x="566" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">root bead (geometry)</text>
  <line x1="562" y1="166" x2="536" y2="156" stroke="#F2A33C" stroke-width="1.2"/>

  <!-- ===== A-scan ===== -->
  <rect x="70" y="190" width="660" height="230" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="136" y1="190" x2="136" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="202" y1="190" x2="202" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="268" y1="190" x2="268" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="334" y1="190" x2="334" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="400" y1="190" x2="400" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="466" y1="190" x2="466" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="532" y1="190" x2="532" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="598" y1="190" x2="598" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="664" y1="190" x2="664" y2="420" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="70" y1="242" x2="730" y2="242" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="70" y1="295" x2="730" y2="295" stroke="#5A6B7E" stroke-width="0.6"/>
  <line x1="70" y1="348" x2="730" y2="348" stroke="#5A6B7E" stroke-width="0.6"/>
  <!-- baseline -->
  <line x1="74" y1="400" x2="726" y2="400" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- initial pulse -->
  <polyline points="78,400 88,205 98,400 103,310 108,400" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <!-- scattered porosity cluster -->
  <polyline points="175,400 185,352 193,400 203,338 213,400 223,356 233,400 243,344 251,400" fill="none" stroke="#1B82E8" stroke-width="1.8"/>
  <!-- echo A: root crack locus -->
  <polyline points="438,400 456,212 474,400" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="456" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">A</text>
  <!-- echo B: bead locus -->
  <polyline points="492,400 509,262 526,400" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="509" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">B</text>
  <!-- annotations -->
  <text x="556" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">A — at centerline, far surface:</text>
  <text x="556" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">suspect root crack / IP</text>
  <text x="556" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">B — past centerline, beyond far</text>
  <text x="556" y="313" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">surface: penetration bead</text>
  <!-- bottom labels -->
  <text x="93" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">initial pulse</text>
  <text x="213" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">fill porosity</text>
  <text x="640" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">0–100 mm sound path · 10 mm/div</text>
</svg>
