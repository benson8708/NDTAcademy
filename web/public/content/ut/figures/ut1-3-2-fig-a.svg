<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Range Standardization on a 25 mm Block</text>

  <!-- probe and block -->
  <rect x="120" y="252" width="60" height="44" fill="#0A2342"/>
  <text x="150" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">probe</text>
  <rect x="118" y="296" width="64" height="5" fill="#F2A33C"/>
  <rect x="60" y="301" width="180" height="90" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="150" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">calibration block</text>

  <!-- bounce arrows in block -->
  <line x1="140" y1="304" x2="140" y2="382" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="134,382 140,391 146,382" fill="#F2A33C"/>
  <line x1="160" y1="388" x2="160" y2="310" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="154,310 160,301 166,310" fill="#1E9E6A"/>
  <text x="150" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sound bounces repeatedly</text>

  <!-- thickness dimension -->
  <line x1="262" y1="301" x2="262" y2="391" stroke="#0A2342" stroke-width="2"/>
  <polygon points="256,310 262,301 268,310" fill="#0A2342"/>
  <polygon points="256,382 262,391 268,382" fill="#0A2342"/>
  <text x="274" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">25 mm</text>

  <!-- screen -->
  <rect x="310" y="70" width="450" height="300" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <line x1="355" y1="70" x2="355" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="445" y1="70" x2="445" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="490" y1="70" x2="490" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="535" y1="70" x2="535" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="580" y1="70" x2="580" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="625" y1="70" x2="625" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="670" y1="70" x2="670" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="715" y1="70" x2="715" y2="370" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="310" y1="145" x2="760" y2="145" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="310" y1="220" x2="760" y2="220" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="310" y1="295" x2="760" y2="295" stroke="#5A6B7E" stroke-width="1"/>

  <!-- trace: IP at 0, echoes at 25/50/75/100 mm = x 422.5/535/647.5/760 -->
  <polyline points="312,352 318,90 324,352 416,352 422,136 428,352 529,352 535,196 541,352 641,352 647,242 653,352 750,352 755,272 759,352" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="330" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>

  <!-- echo position labels -->
  <text x="422" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">25</text>
  <text x="535" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">50</text>
  <text x="647" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">75</text>
  <text x="748" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">100 mm</text>

  <!-- annotations -->
  <text x="745" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">equal spacing = velocity correct</text>
  <text x="745" y="124" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">first echo on 25 = zero correct</text>

  <text x="535" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Range 100 mm, longitudinal steel 5,920 m/s: multiples land on 25, 50, 75, 100</text>
</svg>
