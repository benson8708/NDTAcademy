<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Radial Scan: Geometry and Screens</text>

  <!-- bar cross-section -->
  <circle cx="210" cy="265" r="110" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <rect x="185" y="125" width="50" height="30" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="252" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">probe</text>
  <line x1="210" y1="155" x2="210" y2="373" stroke="#0A2342" stroke-width="2" stroke-dasharray="7,5"/>
  <polygon points="204,362 216,362 210,374" fill="#0A2342"/>
  <circle cx="210" cy="265" r="6" fill="#D14343"/>
  <line x1="216" y1="262" x2="300" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="306" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">flaw at 50 mm</text>
  <text x="210" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#E8F1FB">100 mm bar — flaw on the centerline</text>

  <!-- screen A: sound -->
  <rect x="420" y="95" width="340" height="115" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Sound: far wall at 100 mm (≈ 33.8 µs)</text>
  <line x1="425" y1="195" x2="755" y2="195" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="430,195 437,113 444,195" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="700,195 710,118 720,195" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="437" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">0</text>
  <text x="573" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">50</text>
  <text x="710" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">100 mm</text>

  <!-- screen B: centerline flaw -->
  <rect x="420" y="255" width="340" height="115" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Flaw: echo at 50 mm (≈ 16.9 µs), far wall drops</text>
  <line x1="425" y1="355" x2="755" y2="355" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="430,355 437,273 444,355" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="560,355 573,288 586,355" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <polyline points="702,355 710,330 718,355" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="437" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">0</text>
  <text x="573" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">50</text>
  <text x="710" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">100 mm</text>

  <!-- bottom note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Longitudinal steel ≈ 5.92 mm/µs — round-trip time = 2 × depth ÷ velocity</text>
</svg>
