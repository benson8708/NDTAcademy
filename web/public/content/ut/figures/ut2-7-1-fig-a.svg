<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Reference Reflectors: FBH, SDH, and Notch</text>

  <!-- ================= Panel 1: FBH ================= -->
  <rect x="40" y="100" width="200" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- straight-beam probe on top -->
  <rect x="105" y="68" width="70" height="32" fill="#0A2342"/>
  <text x="140" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0° probe</text>
  <!-- beam down -->
  <line x1="118" y1="100" x2="126" y2="228" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="162" y1="100" x2="154" y2="228" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="140" y1="100" x2="140" y2="220" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="133,218 140,232 147,218" fill="#F2A33C"/>
  <!-- FBH drilled up from bottom -->
  <rect x="128" y="232" width="24" height="98" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="128" y1="232" x2="152" y2="232" stroke="#D14343" stroke-width="5"/>
  <text x="140" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Flat-bottom hole</text>
  <text x="140" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Flat disc squares to beam:</text>
  <text x="140" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">echo tracks disc area</text>
  <line x1="156" y1="234" x2="196" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="198" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">disc</text>

  <!-- ================= Panel 2: SDH ================= -->
  <rect x="300" y="100" width="200" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- angle wedge probe -->
  <polygon points="312,100 312,72 372,72 372,100" fill="#0A2342"/>
  <text x="342" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Angle beam</text>
  <!-- SDH -->
  <circle cx="430" cy="240" r="13" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="430" cy="240" r="4" fill="#D14343"/>
  <!-- beams from two angles hitting the same hole -->
  <line x1="340" y1="100" x2="421" y2="231" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="412,226 426,238 422,222" fill="#F2A33C"/>
  <line x1="478" y1="100" x2="438" y2="228" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="352" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">60°</text>
  <text x="480" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">45°</text>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Side-drilled hole</text>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Cylinder answers any angle:</text>
  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">DAC holes at T/4, T/2, 3T/4</text>

  <!-- ================= Panel 3: Notch ================= -->
  <rect x="560" y="100" width="200" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- angle wedge probe -->
  <polygon points="572,100 572,72 632,72 632,100" fill="#0A2342"/>
  <!-- notch slot in bottom surface -->
  <rect x="688" y="306" width="18" height="24" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <!-- beam to notch corner and corner reflection back -->
  <line x1="600" y1="100" x2="690" y2="304" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="681,298 694,308 689,292" fill="#F2A33C"/>
  <line x1="690" y1="306" x2="612" y2="116" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="624" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">corner echo</text>
  <text x="660" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Surface notch (ID/OD)</text>
  <text x="660" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Corner reflector — simulates</text>
  <text x="660" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a surface-breaking crack</text>

  <!-- footnote -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Compare indication and reference at the same soundpath, same setup, in velocity-matched material.</text>
</svg>
