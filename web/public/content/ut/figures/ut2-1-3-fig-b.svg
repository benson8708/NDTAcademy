<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Immersion: Setting the Water Path</text>

  <!-- tank -->
  <rect x="63" y="120" width="354" height="267" fill="#E8F1FB"/>
  <rect x="60" y="90" width="360" height="300" fill="none" stroke="#0A2342" stroke-width="3"/>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">water</text>

  <!-- manipulator and transducer -->
  <line x1="240" y1="70" x2="240" y2="135" stroke="#5A6B7E" stroke-width="6"/>
  <rect x="215" y="135" width="50" height="40" fill="#0A2342"/>
  <text x="272" y="152" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">transducer</text>

  <!-- part -->
  <rect x="110" y="265" width="280" height="75" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="125" y="332" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel part</text>

  <!-- beam -->
  <line x1="240" y1="175" x2="240" y2="258" stroke="#1B82E8" stroke-width="3" stroke-dasharray="7 5"/>
  <polygon points="240,265 233,252 247,252" fill="#1B82E8"/>

  <!-- W dimension -->
  <line x1="190" y1="175" x2="190" y2="265" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="190,175 184,187 196,187" fill="#F2A33C"/>
  <polygon points="190,265 184,253 196,253" fill="#F2A33C"/>
  <text x="178" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">W (water path)</text>

  <!-- T dimension -->
  <line x1="402" y1="265" x2="402" y2="340" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="402,265 396,277 408,277" fill="#0A2342"/>
  <polygon points="402,340 396,328 408,328" fill="#0A2342"/>
  <text x="410" y="307" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">T</text>

  <!-- rule text -->
  <text x="450" y="100" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Keep the 2nd front-surface echo</text>
  <text x="450" y="124" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">beyond the 1st back-wall echo:</text>
  <text x="450" y="160" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1B82E8">W &#8805; T / 4 + 6 mm  (steel)</text>
  <text x="450" y="192" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Example: T = 80 mm &#8594; W &#8805; 26 mm</text>

  <!-- A-scan strip -->
  <rect x="450" y="215" width="330" height="175" fill="#0A2342"/>
  <polyline points="455,370 462,370 465,242 470,370 535,370 540,247 546,370 660,370 665,272 671,370 700,370" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="700,370 712,302 724,370" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="465" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">IP</text>
  <text x="540" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">FS&#8321;</text>
  <text x="665" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">BW</text>
  <text x="712" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">FS&#8322;</text>
  <text x="615" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">FS&#8322; arrives after the back wall &#8212; water path OK</text>

  <text x="60" y="425" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Sound in water travels at about 1/4 of its speed in steel</text>
</svg>
