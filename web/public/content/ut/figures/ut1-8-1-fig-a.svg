<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of a Calibrated A-Scan</text>

  <!-- screen panel -->
  <rect x="80" y="70" width="540" height="310" fill="#0A2342"/>

  <!-- horizontal grid (amplitude % FSH) -->
  <line x1="80" y1="110" x2="620" y2="110" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="80" y1="158" x2="620" y2="158" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="80" y1="206" x2="620" y2="206" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="80" y1="254" x2="620" y2="254" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="80" y1="302" x2="620" y2="302" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- vertical grid (sweep divisions) -->
  <line x1="134" y1="70" x2="134" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="188" y1="70" x2="188" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="242" y1="70" x2="242" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="296" y1="70" x2="296" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="350" y1="70" x2="350" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="404" y1="70" x2="404" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="458" y1="70" x2="458" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="512" y1="70" x2="512" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="566" y1="70" x2="566" y2="380" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- amplitude axis labels -->
  <text x="72" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">100</text>
  <text x="72" y="163" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">80</text>
  <text x="72" y="211" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">60</text>
  <text x="72" y="259" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">40</text>
  <text x="72" y="307" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">20</text>
  <text x="30" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" transform="rotate(-90 30 230)">amplitude — % full screen height</text>

  <!-- reference level 80% dashed -->
  <line x1="84" y1="158" x2="616" y2="158" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- trace -->
  <polyline points="86,350 98,350 102,350 106,128 112,350 118,334 124,350 300,350 306,348 312,206 318,348 330,350 506,350 512,348 520,146 526,348 540,350 612,350" fill="none" stroke="#E8F1FB" stroke-width="2"/>

  <!-- gate bar at 40% threshold -->
  <line x1="270" y1="254" x2="380" y2="254" stroke="#F2A33C" stroke-width="6"/>
  <line x1="270" y1="244" x2="270" y2="264" stroke="#F2A33C" stroke-width="3"/>
  <line x1="380" y1="244" x2="380" y2="264" stroke="#F2A33C" stroke-width="3"/>

  <!-- in-screen labels -->
  <text x="130" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">initial pulse</text>
  <text x="326" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">flaw echo 60% FSH</text>

  <!-- right-margin labels with leaders -->
  <line x1="528" y1="146" x2="628" y2="140" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="634" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">back-wall echo</text>
  <text x="634" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">85% FSH</text>

  <line x1="616" y1="158" x2="628" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="634" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">reference level</text>
  <text x="634" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">80% FSH</text>

  <line x1="380" y1="254" x2="628" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="634" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">gate</text>
  <text x="634" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">start · width ·</text>
  <text x="634" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">threshold (40%)</text>
  <text x="634" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">alarm fires when</text>
  <text x="634" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">gated echo crosses</text>
  <text x="634" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">the threshold</text>

  <!-- sweep axis -->
  <line x1="80" y1="400" x2="608" y2="400" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="608,394 622,400 608,406" fill="#0A2342"/>
  <text x="350" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sweep: time after the initial pulse = calibrated sound-path distance (10 divisions)</text>
</svg>
