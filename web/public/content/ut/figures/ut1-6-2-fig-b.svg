<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Lamb (Plate) Waves — Two Mode Families</text>

  <!-- SYMMETRIC panel -->
  <text x="120" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Symmetric (S) modes — the plate "breathes"</text>
  <!-- wedge -->
  <polygon points="60,128 118,128 100,96 70,96" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- top boundary (up first) -->
  <path d="M 120 124 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- bottom boundary (down first = mirrored) -->
  <path d="M 120 186 q 20 14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- straight centerline -->
  <line x1="120" y1="155" x2="680" y2="155" stroke="#5A6B7E" stroke-width="1.4" stroke-dasharray="7,5"/>
  <text x="694" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">centerline</text>
  <text x="694" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">stays straight</text>
  <!-- travel arrow -->
  <line x1="300" y1="212" x2="420" y2="212" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="420,205 436,212 420,219" fill="#F2A33C"/>
  <text x="368" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#F2A33C" font-weight="bold">wave travel</text>

  <!-- ASYMMETRIC panel -->
  <text x="120" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Asymmetric (A) modes — the plate "flexes"</text>
  <!-- wedge -->
  <polygon points="60,322 118,322 100,290 70,290" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- top boundary -->
  <path d="M 120 318 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <!-- bottom boundary (same phase) -->
  <path d="M 120 380 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <!-- snaking centerline -->
  <path d="M 120 349 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#5A6B7E" stroke-width="1.4" stroke-dasharray="7,5"/>
  <text x="694" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">centerline</text>
  <text x="694" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">snakes too</text>

  <!-- thickness note -->
  <line x1="104" y1="124" x2="104" y2="186" stroke="#0A2342" stroke-width="1.6"/>
  <line x1="98" y1="124" x2="110" y2="124" stroke="#0A2342" stroke-width="1.6"/>
  <line x1="98" y1="186" x2="110" y2="186" stroke="#0A2342" stroke-width="1.6"/>
  <text x="88" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">t ≈ a few λ</text>

  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Dispersive: velocity depends on frequency × thickness —</text>
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">choose the mode and incident angle from dispersion curves for the exact plate.</text>
</svg>
