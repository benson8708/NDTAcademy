<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pulse-Echo vs. Through-Transmission</text>

  <!-- divider -->
  <line x1="400" y1="56" x2="400" y2="392" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== LEFT: pulse-echo ===== -->
  <text x="200" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Pulse-Echo (one transducer)</text>
  <!-- transducer -->
  <rect x="170" y="100" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="200" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">T/R</text>
  <text x="200" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">transmit + receive</text>
  <!-- part -->
  <rect x="120" y="170" width="160" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- flaw -->
  <ellipse cx="210" cy="230" rx="16" ry="9" fill="#D14343"/>
  <text x="210" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">flaw</text>
  <!-- down beam -->
  <line x1="195" y1="150" x2="195" y2="296" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="191,290 199,290 195,300" fill="#F2A33C"/>
  <!-- echo back up -->
  <line x1="212" y1="296" x2="212" y2="150" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="208,156 216,156 212,148" fill="#1B82E8"/>
  <!-- back wall label -->
  <line x1="120" y1="300" x2="280" y2="300" stroke="#0A2342" stroke-width="3"/>
  <text x="284" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0A2342">back wall</text>
  <!-- key points -->
  <text x="200" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">Echo time &#8594; DEPTH known</text>
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">One-sided access</text>
  <text x="200" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">May miss edge-on flaws</text>

  <!-- ===== RIGHT: through-transmission ===== -->
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Through-Transmission (two T/D)</text>
  <!-- transmitter -->
  <rect x="570" y="100" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="600" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Tx</text>
  <text x="600" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">transmit</text>
  <!-- part -->
  <rect x="520" y="170" width="160" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- flaw -->
  <ellipse cx="600" cy="232" rx="16" ry="9" fill="#D14343"/>
  <text x="600" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">flaw</text>
  <!-- straight-through beam, blocked at flaw -->
  <line x1="600" y1="150" x2="600" y2="222" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="600" y1="242" x2="600" y2="350" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="4 4"/>
  <polygon points="596,344 604,344 600,354" fill="#F2A33C"/>
  <!-- receiver -->
  <rect x="570" y="326" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="600" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Rx</text>
  <!-- alignment guide -->
  <line x1="600" y1="124" x2="600" y2="170" stroke="#1E9E6A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="600" y1="300" x2="600" y2="326" stroke="#1E9E6A" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="690" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#D14343">flaw blocks</text>
  <text x="690" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#D14343">/ scatters</text>
  <!-- key points -->
  <text x="600" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">Signal DROP &#8594; flaw, but NO depth</text>
  <text x="600" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Needs both sides + alignment</text>
</svg>
