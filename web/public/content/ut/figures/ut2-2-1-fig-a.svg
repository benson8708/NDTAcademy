<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Ingot Vertical Section: Where Discontinuities Live</text>

  <!-- hot top -->
  <polygon points="300,70 460,70 460,130 300,130" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>

  <!-- ingot body (big-end-up) -->
  <polygon points="290,130 470,130 450,400 310,400" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- chill zone inner outline -->
  <polygon points="301,141 459,141 441,391 319,391" fill="none" stroke="#1B82E8" stroke-width="2"/>

  <!-- columnar grain lines, left wall -->
  <line x1="303" y1="170" x2="341" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="305" y1="210" x2="343" y2="210" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="308" y1="250" x2="346" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="311" y1="290" x2="349" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="314" y1="330" x2="352" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="317" y1="368" x2="355" y2="368" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- columnar grain lines, right wall -->
  <line x1="457" y1="170" x2="419" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="455" y1="210" x2="417" y2="210" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="452" y1="250" x2="414" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="449" y1="290" x2="411" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="446" y1="330" x2="408" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="443" y1="368" x2="405" y2="368" stroke="#5A6B7E" stroke-width="1.5"/>
  <!-- columnar grain lines, bottom -->
  <line x1="340" y1="397" x2="340" y2="370" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="370" y1="398" x2="370" y2="371" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="400" y1="398" x2="400" y2="371" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="425" y1="397" x2="425" y2="370" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- equiaxed core (dashed) -->
  <ellipse cx="382" cy="305" rx="52" ry="72" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- segregation zone -->
  <ellipse cx="382" cy="200" rx="44" ry="56" fill="#F2A33C" opacity="0.22"/>
  <ellipse cx="382" cy="200" rx="44" ry="56" fill="none" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="7,5"/>

  <!-- primary pipe (open, from hot top down) -->
  <polygon points="368,74 396,74 386,165 378,165" fill="#D14343"/>

  <!-- crop line -->
  <line x1="272" y1="238" x2="500" y2="238" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="10,7"/>

  <!-- secondary pipe (closed, straddling crop line) -->
  <ellipse cx="381" cy="252" rx="8" ry="28" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>

  <!-- inclusions -->
  <polygon points="346,168 354,168 350,176" fill="#5A6B7E"/>
  <polygon points="408,178 416,178 412,186" fill="#5A6B7E"/>
  <polygon points="394,226 402,226 398,234" fill="#5A6B7E"/>
  <polygon points="356,212 364,212 360,220" fill="#5A6B7E"/>

  <!-- blowholes / porosity band -->
  <circle cx="318" cy="252" r="4" fill="#F2A33C"/>
  <circle cx="322" cy="292" r="4" fill="#F2A33C"/>
  <circle cx="327" cy="332" r="4" fill="#F2A33C"/>
  <circle cx="444" cy="256" r="4" fill="#F2A33C"/>
  <circle cx="440" cy="300" r="4" fill="#F2A33C"/>
  <circle cx="435" cy="342" r="4" fill="#F2A33C"/>

  <!-- hot tear -->
  <polyline points="330,332 342,324 352,330 364,322" fill="none" stroke="#D14343" stroke-width="2.5"/>

  <!-- left leader lines + labels -->
  <line x1="255" y1="156" x2="303" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="250" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Chill zone — fine grains</text>
  <line x1="255" y1="196" x2="310" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="250" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Columnar grains</text>
  <line x1="255" y1="288" x2="313" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="250" y="292" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Blowhole / porosity band</text>
  <line x1="255" y1="330" x2="328" y2="328" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="250" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hot tear (columnar boundary)</text>

  <!-- right leader lines + labels -->
  <line x1="515" y1="92" x2="462" y2="98" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hot top — insulated feeder</text>
  <line x1="515" y1="126" x2="393" y2="112" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">Primary pipe — open, oxidized</text>
  <line x1="515" y1="162" x2="414" y2="182" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inclusions float upward</text>
  <line x1="515" y1="196" x2="424" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Segregation zone (C, S, P)</text>
  <text x="520" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">Crop line — top discard</text>
  <line x1="515" y1="268" x2="391" y2="256" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">Secondary pipe — closed cavity</text>
  <line x1="515" y1="306" x2="430" y2="305" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Equiaxed core — coarse grains</text>

  <!-- bottom note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Freezing runs mold wall inward — the last liquid (top center) collects shrinkage, gas, and solute</text>
</svg>
