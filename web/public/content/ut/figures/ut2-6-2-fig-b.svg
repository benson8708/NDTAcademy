<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Damping Sets Pulse Length</text>

  <!-- ===== LEFT: heavy damping ===== -->
  <text x="210" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Heavy damping</text>
  <text x="210" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">broadband - short pulse</text>

  <!-- probe stack -->
  <rect x="120" y="110" width="180" height="34" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="210" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">heavy backing</text>
  <rect x="120" y="144" width="180" height="18" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="312" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">element</text>

  <!-- short pulse waveform -->
  <line x1="120" y1="250" x2="300" y2="250" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="120,250 150,250 162,205 174,295 186,232 198,262 210,250 300,250" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="210" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E9E6A">few cycles, dies fast</text>

  <!-- benefits -->
  <text x="210" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">+ resolution</text>
  <text x="210" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">+ small dead zone</text>
  <text x="210" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">- lower sensitivity</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="410" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== RIGHT: light damping ===== -->
  <text x="590" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Light damping</text>
  <text x="590" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">narrowband - long pulse</text>

  <rect x="500" y="110" width="180" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="590" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">light backing</text>
  <rect x="500" y="144" width="180" height="18" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="692" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">element</text>

  <!-- long ringing waveform -->
  <line x1="500" y1="250" x2="680" y2="250" stroke="#D9E0E8" stroke-width="1.5"/>
  <polyline points="500,250 512,210 524,290 536,216 548,284 560,224 572,276 584,232 596,268 608,240 620,260 632,248 680,250" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="590" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D14343">many cycles, rings on</text>

  <text x="590" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">+ sensitivity / penetration</text>
  <text x="590" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">- poor resolution</text>
  <text x="590" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">- larger dead zone</text>
</svg>
