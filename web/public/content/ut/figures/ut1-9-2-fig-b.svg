<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Mapping a Lamination for the Report</text>

  <!-- plate plan view -->
  <rect x="70" y="90" width="420" height="280" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="280" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">PLAN VIEW OF PLATE</text>

  <!-- datum corner -->
  <circle cx="70" cy="370" r="7" fill="#0A2342"/>
  <text x="84" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">datum (stamped corner)</text>

  <!-- axes arrows -->
  <line x1="70" y1="370" x2="160" y2="370" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="152,364 152,376 166,370" fill="#0A2342"/>
  <text x="146" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">X</text>
  <line x1="70" y1="370" x2="70" y2="290" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="64,298 76,298 70,284" fill="#0A2342"/>
  <text x="56" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Y</text>

  <!-- mapped indication: 6 dB boundary -->
  <path d="M 290 200 Q 330 178 368 196 Q 392 214 378 240 Q 348 262 308 250 Q 278 232 290 200 Z" fill="#D14343" opacity="0.25" stroke="#D14343" stroke-width="3" stroke-dasharray="7,5"/>
  <circle cx="334" cy="222" r="6" fill="#D14343"/>
  <text x="334" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">6 dB drop boundary</text>

  <!-- boundary marks -->
  <circle cx="290" cy="200" r="4" fill="#0A2342"/>
  <circle cx="368" cy="196" r="4" fill="#0A2342"/>
  <circle cx="378" cy="240" r="4" fill="#0A2342"/>
  <circle cx="308" cy="250" r="4" fill="#0A2342"/>

  <!-- X1 dimension -->
  <line x1="70" y1="408" x2="334" y2="408" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="70" y1="402" x2="70" y2="414" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="334" y1="402" x2="334" y2="414" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="334" y1="258" x2="334" y2="408" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="202" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">X = 22.5 in. to max amplitude</text>

  <!-- Y dimension -->
  <line x1="516" y1="370" x2="516" y2="222" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="510" y1="370" x2="522" y2="370" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="510" y1="222" x2="522" y2="222" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="392" y1="222" x2="516" y2="222" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="536" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Y = 14.0 in.</text>

  <!-- record box -->
  <rect x="540" y="90" width="240" height="180" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="660" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">RECORD FOR IND. 1</text>
  <text x="554" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">max amplitude: 62% FSH</text>
  <text x="554" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">extent: 3.1 in. &#215; 2.0 in.</text>
  <text x="554" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">depth: 0.95 in. (mid-wall)</text>
  <text x="554" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">back reflection left: 35%</text>
  <text x="554" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">datum: X 22.5 / Y 14.0 in.</text>
  <text x="554" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">disposition: per criteria</text>

  <text x="660" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">mark boundary on the part,</text>
  <text x="660" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">then transfer to the sketch</text>
</svg>
