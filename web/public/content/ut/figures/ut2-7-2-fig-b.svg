<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Reading Indications Against the DAC</text>

  <!-- screen -->
  <rect x="70" y="70" width="670" height="320" fill="#06182F" stroke="#1B82E8" stroke-width="2"/>
  <!-- FSH gridlines: 100%=110, 80%=166, 60%=222, 40%=278, 20%=334 -->
  <line x1="70" y1="110" x2="740" y2="110" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="70" y1="166" x2="740" y2="166" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="70" y1="222" x2="740" y2="222" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="70" y1="278" x2="740" y2="278" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="70" y1="334" x2="740" y2="334" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 6"/>
  <text x="64" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">100</text>
  <text x="64" y="171" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">80</text>
  <text x="64" y="227" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">60</text>
  <text x="64" y="283" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">40</text>
  <text x="64" y="339" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">20</text>
  <text x="30" y="76" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">%FSH</text>

  <!-- initial pulse -->
  <polyline points="84,390 88,124 92,300 96,150 100,390" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="96" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">IP</text>

  <!-- DAC curve through SDH cal points (210,166) (420,250) (630,306) -->
  <path d="M 210 166 Q 320 212 420 250 Q 528 286 630 306" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <circle cx="210" cy="166" r="6" fill="#F2A33C"/>
  <circle cx="420" cy="250" r="6" fill="#F2A33C"/>
  <circle cx="630" cy="306" r="6" fill="#F2A33C"/>
  <text x="210" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">T/4</text>
  <text x="420" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">T/2</text>
  <text x="630" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">3T/4</text>
  <text x="268" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">DAC</text>

  <!-- Indication A: peak 60% FSH at x=300, DAC there ~67% -> below curve -->
  <polyline points="282,390 300,222 318,390" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="300" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">A — 60% FSH</text>

  <!-- Indication B: peak 48% FSH at x=540, DAC there ~38% -> above curve -->
  <polyline points="522,390 540,255 558,390" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="540" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">B — 48% FSH</text>

  <!-- Back-wall echo at x=700, 75% FSH -->
  <polyline points="684,390 700,180 716,390" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="700" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">BW</text>

  <!-- annotations -->
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">A sits under the curve at its range — B, though shorter, breaks it at its own soundpath</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">soundpath → (screen range calibrated on IIW block; DAC from basic-block SDHs)</text>
</svg>
