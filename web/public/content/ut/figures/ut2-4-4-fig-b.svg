<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Weld Indication Disposition Flow</text>

  <!-- B1: detected -->
  <rect x="40" y="64" width="190" height="52" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="135" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Indication detected</text>
  <text x="135" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">at scanning gain</text>
  <line x1="230" y1="90" x2="260" y2="90" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="260,90 249,85 249,95" fill="#5A6B7E"/>

  <!-- B2: reference gain -->
  <rect x="260" y="64" width="200" height="52" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="360" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Gain to reference —</text>
  <text x="360" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">maximize the echo</text>
  <line x1="460" y1="90" x2="480" y2="90" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="480,90 469,85 469,95" fill="#5A6B7E"/>

  <!-- D1: geometry? -->
  <polygon points="590,58 700,90 590,122 480,90" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="590" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Geometry?</text>

  <!-- D1 yes -> B3 -->
  <line x1="590" y1="122" x2="590" y2="166" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="590,166 585,155 595,155" fill="#5A6B7E"/>
  <text x="640" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">yes — verified by plot,</text>
  <text x="640" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">both sides, profile</text>
  <rect x="495" y="166" width="190" height="52" rx="8" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="590" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Note as geometry —</text>
  <text x="590" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no defect record</text>

  <!-- D1 no -> D2 -->
  <line x1="480" y1="90" x2="480" y2="140" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="480" y1="140" x2="400" y2="140" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="140" x2="400" y2="160" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="400,160 395,149 405,149" fill="#5A6B7E"/>
  <text x="452" y="134" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">no</text>

  <!-- D2: >= recording level? -->
  <polygon points="400,160 530,198 400,236 270,198" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="400" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">≥ recording</text>
  <text x="400" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">level?</text>

  <!-- D2 no -> continue -->
  <line x1="270" y1="198" x2="200" y2="198" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="200,198 211,193 211,203" fill="#5A6B7E"/>
  <text x="232" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no</text>
  <rect x="40" y="174" width="160" height="48" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Continue</text>
  <text x="120" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scanning</text>

  <!-- D2 yes -> B5 record -->
  <line x1="400" y1="236" x2="400" y2="268" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="400,268 395,257 405,257" fill="#5A6B7E"/>
  <text x="414" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">yes</text>
  <rect x="245" y="268" width="310" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Record: location, amplitude vs</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">reference, sound path / leg / depth,</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">length (6 dB drop), characterization</text>

  <!-- B5 -> B6 evaluate -->
  <line x1="555" y1="304" x2="585" y2="304" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="585,304 574,299 574,309" fill="#5A6B7E"/>
  <rect x="585" y="274" width="190" height="60" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="680" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Apply code criteria:</text>
  <text x="680" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">amplitude + length</text>

  <!-- accept branch -->
  <line x1="700" y1="334" x2="700" y2="376" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="700,376 695,365 705,365" fill="#5A6B7E"/>
  <text x="712" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">accept</text>
  <rect x="600" y="376" width="180" height="48" rx="8" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="690" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Report and</text>
  <text x="690" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">release</text>

  <!-- reject branch -->
  <line x1="620" y1="334" x2="620" y2="356" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="620" y1="356" x2="400" y2="356" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="356" x2="400" y2="376" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="400,376 395,365 405,365" fill="#5A6B7E"/>
  <text x="500" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">reject</text>
  <rect x="255" y="376" width="290" height="48" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Mark · repair · re-examine</text>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">to the same criteria</text>

  <!-- footnote -->
  <text x="120" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Evaluation is valid only</text>
  <text x="120" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">at reference gain</text>
</svg>
