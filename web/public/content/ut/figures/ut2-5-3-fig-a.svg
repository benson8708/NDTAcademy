<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">TTU C-Scan of a Bonded Doubler with Acceptance Overlay</text>

  <!-- doubler plan view -->
  <rect x="60" y="70" width="400" height="320" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- grid -->
  <line x1="140" y1="70" x2="140" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="220" y1="70" x2="220" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="300" y1="70" x2="300" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="380" y1="70" x2="380" y2="390" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="134" x2="460" y2="134" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="198" x2="460" y2="198" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="262" x2="460" y2="262" stroke="#D9E0E8" stroke-width="1"/>
  <line x1="60" y1="326" x2="460" y2="326" stroke="#D9E0E8" stroke-width="1"/>

  <!-- 13 mm edge-zone boundary (dashed amber inset) -->
  <rect x="86" y="96" width="348" height="268" fill="none" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="10 6"/>

  <!-- below-threshold speckle (grey dots) -->
  <circle cx="150" cy="120" r="3" fill="#5A6B7E"/>
  <circle cx="186" cy="156" r="2.5" fill="#5A6B7E"/>
  <circle cx="246" cy="118" r="3" fill="#5A6B7E"/>
  <circle cx="320" cy="152" r="2.5" fill="#5A6B7E"/>
  <circle cx="128" cy="246" r="3" fill="#5A6B7E"/>
  <circle cx="206" cy="306" r="2.5" fill="#5A6B7E"/>
  <circle cx="354" cy="252" r="3" fill="#5A6B7E"/>
  <circle cx="402" cy="200" r="2.5" fill="#5A6B7E"/>
  <circle cx="294" cy="344" r="3" fill="#5A6B7E"/>
  <circle cx="372" cy="318" r="2.5" fill="#5A6B7E"/>

  <!-- recorded, acceptable indications (green blobs) -->
  <ellipse cx="180" cy="200" rx="14" ry="11" fill="#1E9E6A"/>
  <ellipse cx="300" cy="240" rx="11" ry="9" fill="#1E9E6A"/>
  <ellipse cx="240" cy="160" rx="9" ry="8" fill="#1E9E6A"/>
  <ellipse cx="350" cy="160" rx="12" ry="9" fill="#1E9E6A"/>

  <!-- rejectable: exceeds single-size limit (red blob, irregular) -->
  <path d="M 226 296 q 16 -22 40 -14 q 26 6 24 26 q -2 20 -28 22 q -28 2 -38 -12 q -8 -12 2 -22 Z" fill="#D14343"/>

  <!-- rejectable: inside edge zone (amber blob crossing dashed line) -->
  <ellipse cx="92" cy="330" rx="13" ry="10" fill="#F2A33C" stroke="#D14343" stroke-width="2.5"/>

  <!-- scale bar -->
  <line x1="60" y1="412" x2="140" y2="412" stroke="#0A2342" stroke-width="3"/>
  <line x1="60" y1="406" x2="60" y2="418" stroke="#0A2342" stroke-width="3"/>
  <line x1="140" y1="406" x2="140" y2="418" stroke="#0A2342" stroke-width="3"/>
  <text x="100" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50 mm</text>

  <!-- legend -->
  <text x="500" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Overlay key</text>

  <circle cx="510" cy="118" r="4" fill="#5A6B7E"/>
  <text x="528" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Below recording threshold</text>
  <text x="528" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(&#60; 6 mm or &#60; 12 dB loss &#8212; not logged)</text>

  <ellipse cx="510" cy="170" rx="11" ry="8" fill="#1E9E6A"/>
  <text x="528" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Recorded, individually acceptable</text>
  <text x="528" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(&#8804; 25 mm; counts toward 5% total)</text>

  <ellipse cx="510" cy="222" rx="13" ry="9" fill="#D14343"/>
  <text x="528" y="228" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reject &#8212; exceeds 25 mm</text>
  <text x="528" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">single-disbond size limit</text>

  <ellipse cx="510" cy="274" rx="11" ry="8" fill="#F2A33C" stroke="#D14343" stroke-width="2"/>
  <text x="528" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reject &#8212; inside 13 mm edge zone</text>
  <text x="528" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(location rule, regardless of size)</text>

  <line x1="500" y1="318" x2="540" y2="318" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="10 6"/>
  <text x="548" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Edge-zone boundary (13 mm in)</text>

  <text x="500" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Cumulative check:</text>
  <text x="500" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">total recorded area &#247; bond area</text>
  <text x="500" y="406" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">must stay &#8804; 5%</text>
</svg>
