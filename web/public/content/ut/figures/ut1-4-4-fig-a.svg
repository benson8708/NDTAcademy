<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Why Couplant: The Interface Numbers</text>
  <line x1="400" y1="56" x2="400" y2="350" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- ============ LEFT: DRY ============ -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">DRY CONTACT — no test</text>

  <!-- probe -->
  <rect x="130" y="100" width="140" height="70" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="200" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">probe</text>

  <!-- trapped air gap (exaggerated) -->
  <rect x="130" y="170" width="140" height="14" fill="#0A2342" stroke="#D14343" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="272" y1="177" x2="332" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="336" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">trapped air</text>

  <!-- steel -->
  <rect x="80" y="184" width="240" height="120" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="2"/>
  <text x="200" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel  (Z ≈ 46)</text>

  <!-- down arrow 100% -->
  <line x1="170" y1="108" x2="170" y2="158" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="162,158 170,172 178,158" fill="#F2A33C"/>
  <text x="156" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">100%</text>

  <!-- reflected arrow ~100% back -->
  <line x1="226" y1="168" x2="226" y2="112" stroke="#D14343" stroke-width="5"/>
  <polygon points="218,112 226,98 234,112" fill="#D14343"/>
  <text x="240" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">≈100% reflected</text>

  <!-- nothing enters -->
  <text x="200" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">≈ 0% enters</text>
  <text x="200" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel–air mirror (R &gt; 99.9%)</text>

  <!-- ============ RIGHT: COUPLED ============ -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">WITH COUPLANT — working test</text>

  <!-- probe -->
  <rect x="530" y="100" width="140" height="70" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="600" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">probe</text>

  <!-- couplant film -->
  <rect x="530" y="170" width="140" height="14" fill="#F2A33C"/>
  <line x1="672" y1="177" x2="726" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="730" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">couplant film</text>

  <!-- steel -->
  <rect x="480" y="184" width="240" height="120" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="2"/>
  <text x="600" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel  (Z ≈ 46)</text>

  <!-- down arrow 100% -->
  <line x1="570" y1="108" x2="570" y2="158" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="562,158 570,172 578,158" fill="#F2A33C"/>
  <text x="556" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">100%</text>

  <!-- reflected 88% -->
  <line x1="626" y1="168" x2="626" y2="116" stroke="#D14343" stroke-width="4"/>
  <polygon points="619,116 626,102 633,116" fill="#D14343"/>
  <text x="640" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">≈88% reflected</text>

  <!-- transmitted 12% -->
  <line x1="570" y1="186" x2="570" y2="240" stroke="#1E9E6A" stroke-width="4"/>
  <polygon points="562,240 570,254 578,240" fill="#1E9E6A"/>
  <text x="600" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">≈12% enters —</text>
  <text x="600" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">enough to test</text>

  <!-- water note -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">water film, Z ≈ 1.5 — glycerin (Z ≈ 2.4) passes ≈19%</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">push harder — it changes nothing</text>

  <!-- impedance footer -->
  <rect x="60" y="360" width="680" height="66" fill="#E8F1FB" rx="8"/>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Acoustic impedance Z = ρ × v  (MRayl):   air 0.0004  ·  water 1.5  ·  glycerin 2.4  ·  steel 46</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">R = ((Z₂ − Z₁) ÷ (Z₂ + Z₁))² — the bigger the mismatch, the more energy reflects</text>
</svg>
