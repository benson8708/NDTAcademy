<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Where Casting Discontinuities Form</text>

  <!-- riser -->
  <rect x="330" y="62" width="70" height="66" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8,5"/>
  <text x="412" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">Riser (feeds shrinkage,</text>
  <text x="412" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">cut off later)</text>

  <!-- vertical boss -->
  <rect x="300" y="128" width="130" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- horizontal plate -->
  <rect x="80" y="248" width="640" height="90" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- mask the joint line between boss and plate -->
  <rect x="303" y="244" width="124" height="8" fill="#E8F1FB"/>

  <!-- columnar grains near left wall -->
  <line x1="84" y1="258" x2="124" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="84" y1="272" x2="130" y2="272" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="84" y1="286" x2="124" y2="286" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="84" y1="300" x2="130" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="84" y1="314" x2="124" y2="314" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="110" y1="365" x2="100" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="120" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Columnar grains grow in</text>
  <text x="120" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">from the mold wall</text>

  <!-- macroshrinkage under riser -->
  <path d="M 348 150 q 12 -12 24 0 q 12 12 -2 20 q -10 8 -20 0 q -12 -10 -2 -20 Z" fill="#D14343" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="372" y1="160" x2="470" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="476" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Macroshrinkage</text>
  <text x="476" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">under the riser</text>

  <!-- centerline shrinkage in plate -->
  <line x1="110" y1="293" x2="270" y2="293" stroke="#D14343" stroke-width="4" stroke-dasharray="12,7"/>
  <line x1="190" y1="293" x2="220" y2="220" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="222" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Centerline shrinkage</text>
  <text x="222" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(thermal center of wall)</text>

  <!-- hot tear at junction fillet -->
  <polyline points="296,252 286,262 294,272 284,282" fill="none" stroke="#D14343" stroke-width="3.5"/>
  <line x1="288" y1="270" x2="252" y2="180" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="248" y="172" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Hot tear at the</text>
  <text x="248" y="192" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">section change</text>

  <!-- gas porosity cluster -->
  <circle cx="500" cy="282" r="5" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="520" cy="300" r="4" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="540" cy="278" r="6" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="558" cy="298" r="4" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="578" cy="284" r="5" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="540" y1="300" x2="545" y2="372" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="545" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Gas porosity</text>
  <text x="545" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(rounded, scattered)</text>

  <!-- cold shut at far surface -->
  <line x1="650" y1="250" x2="700" y2="250" stroke="#F2A33C" stroke-width="4"/>
  <line x1="675" y1="250" x2="688" y2="205" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="690" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Cold shut (surface)</text>

  <!-- unfused chaplet -->
  <rect x="220" y="312" width="14" height="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="227" y1="326" x2="260" y2="384" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="290" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342" font-weight="bold">Unfused chaplet</text>
  <text x="290" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(core support)</text>

  <!-- bottom note -->
  <text x="620" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Shrinkage lives in the</text>
  <text x="620" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">last metal to freeze:</text>
  <text x="620" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">junctions, thick sections, riser zones</text>
</svg>
