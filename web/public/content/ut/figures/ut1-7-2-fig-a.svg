<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Water Path: Keeping Echoes Separated</text>

  <!-- ===== TOP: too-short water path (overlap) ===== -->
  <text x="40" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Water path too short &#8212; echoes overlap</text>
  <!-- baseline -->
  <line x1="60" y1="150" x2="500" y2="150" stroke="#5A6B7E" stroke-width="2"/>
  <!-- IP -->
  <rect x="66" y="92" width="8" height="58" fill="#5A6B7E"/>
  <text x="70" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">IP</text>
  <!-- FSE -->
  <rect x="150" y="100" width="8" height="50" fill="#1E9E6A"/>
  <text x="154" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">FSE</text>
  <!-- BWE and 2nd FSE overlapping -->
  <rect x="300" y="108" width="8" height="42" fill="#D14343"/>
  <rect x="310" y="108" width="8" height="42" fill="#F2A33C"/>
  <text x="320" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">BWE + 2nd FSE</text>
  <!-- collision marker -->
  <path d="M 300 92 L 320 92" stroke="#D14343" stroke-width="2"/>
  <text x="430" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">ambiguous!</text>

  <!-- ===== MIDDLE: correct water path (clear window) ===== -->
  <text x="40" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Water path &#8805; thickness &#247; 4 &#8212; clean window</text>
  <line x1="60" y1="290" x2="760" y2="290" stroke="#5A6B7E" stroke-width="2"/>
  <text x="755" y="310" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">time / distance &#8594;</text>
  <!-- IP -->
  <rect x="66" y="232" width="8" height="58" fill="#5A6B7E"/>
  <text x="70" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">IP</text>
  <!-- FSE -->
  <rect x="250" y="240" width="8" height="50" fill="#1E9E6A"/>
  <text x="254" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">FSE</text>
  <!-- water path gap -->
  <line x1="78" y1="276" x2="248" y2="276" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="163" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1B82E8">water path</text>
  <!-- BWE -->
  <rect x="470" y="248" width="8" height="42" fill="#D14343"/>
  <text x="474" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">BWE</text>
  <!-- 2nd FSE far right -->
  <rect x="650" y="256" width="8" height="34" fill="#F2A33C"/>
  <text x="654" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F2A33C">2nd FSE</text>
  <!-- clean interior window bracket -->
  <line x1="258" y1="306" x2="478" y2="306" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="258" y1="302" x2="258" y2="310" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="478" y1="302" x2="478" y2="310" stroke="#0A2342" stroke-width="1.5"/>
  <text x="368" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">clear interior window</text>

  <!-- ===== formula box ===== -->
  <rect x="120" y="356" width="560" height="72" fill="#E8F1FB" stroke="#0A2342" stroke-width="2" rx="6"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Min. water path = thickness &#215; (v_water &#247; v_part)</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Steel: 5,920 &#247; 1,480 &#8776; 4&#160;&#160;&#8594;&#160;&#160;thickness &#247; 4 (+ ~6 mm margin)</text>
</svg>
