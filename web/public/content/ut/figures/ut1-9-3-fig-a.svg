<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Angle-Beam Geometry: Skip Distance and Legs</text>

  <!-- plate cross-section -->
  <rect x="60" y="200" width="680" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- weld (single V) centered at full-skip point -->
  <polygon points="521,200 591,200 556,320" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 515 200 Q 556 182 597 200" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="556" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">weld</text>

  <!-- wedge and probe -->
  <polygon points="100,200 180,200 180,158 130,158" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="136" y="126" width="44" height="32" fill="#0A2342"/>
  <text x="92" y="146" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">probe on wedge</text>

  <!-- index point -->
  <circle cx="140" cy="200" r="5" fill="#D14343"/>
  <line x1="140" y1="206" x2="96" y2="246" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="94" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">index point</text>

  <!-- normal (dashed) and angle arc -->
  <line x1="140" y1="200" x2="140" y2="290" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M 140 256 A 56 56 0 0 0 188 228" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="186" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">&#952; = 60&#176;</text>

  <!-- leg 1 -->
  <line x1="140" y1="200" x2="348" y2="320" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="334,318 346,308 352,324" fill="#1B82E8"/>
  <text x="216" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">leg 1 = T/cos &#952;</text>

  <!-- leg 2 -->
  <line x1="348" y1="320" x2="556" y2="200" stroke="#1E9E6A" stroke-width="3.5"/>
  <polygon points="542,202 550,216 560,200" fill="#1E9E6A"/>
  <text x="476" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">leg 2</text>

  <!-- half-skip marker -->
  <line x1="348" y1="320" x2="348" y2="350" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="348" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">half skip: beam at back wall</text>

  <!-- skip dimension above surface -->
  <line x1="140" y1="176" x2="556" y2="176" stroke="#0A2342" stroke-width="2"/>
  <line x1="140" y1="170" x2="140" y2="182" stroke="#0A2342" stroke-width="2"/>
  <line x1="556" y1="170" x2="556" y2="182" stroke="#0A2342" stroke-width="2"/>
  <text x="330" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">skip distance = 2T &#183; tan &#952;</text>

  <!-- thickness dimension -->
  <line x1="760" y1="200" x2="760" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="754" y1="200" x2="766" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="754" y1="320" x2="766" y2="320" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="774" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">T</text>

  <text x="208" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">first leg: lower weld volume</text>
  <text x="606" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">second leg: upper volume</text>

  <!-- formula box -->
  <rect x="60" y="392" width="680" height="46" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Example: T = 0.5 in., &#952; = 60&#176; &#8594; skip = 2 &#215; 0.5 &#215; 1.732 &#8776; 1.73 in. &#183; leg = 0.5 &#247; 0.5 = 1.00 in.</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">surface distance to a reflector = sound path &#215; sin &#952;</text>
</svg>
