<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Three Ways Across the Gap</text>

  <!-- ===== PANEL 1: CONTACT ===== -->
  <rect x="30" y="60" width="230" height="340" rx="8" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <text x="145" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Contact</text>
  <!-- probe -->
  <rect x="110" y="110" width="70" height="34" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- couplant film -->
  <rect x="110" y="146" width="70" height="6" fill="#1B82E8"/>
  <!-- part -->
  <rect x="60" y="152" width="170" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="145" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">metal part</text>
  <!-- beam down + echo -->
  <line x1="140" y1="152" x2="140" y2="272" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="136,250 140,262 144,250" fill="#1B82E8"/>
  <text x="145" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B82E8">gel film bridges gap</text>
  <text x="145" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">pulse-echo, 1 side</text>
  <text x="145" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">portable field work</text>
  <text x="145" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">depth: yes</text>

  <!-- ===== PANEL 2: IMMERSION ===== -->
  <rect x="285" y="60" width="230" height="340" rx="8" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Immersion</text>
  <!-- probe -->
  <rect x="370" y="106" width="60" height="28" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- water -->
  <rect x="315" y="140" width="170" height="132" fill="#1B82E8" opacity="0.16" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1B82E8">water path</text>
  <!-- beam -->
  <line x1="400" y1="134" x2="400" y2="238" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="396,218 400,230 404,218" fill="#1B82E8"/>
  <!-- part submerged -->
  <rect x="350" y="238" width="100" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B82E8">water bridges gap</text>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">constant coupling</text>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">focusing + C-scan imaging</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">depth: yes</text>

  <!-- ===== PANEL 3: AIR-COUPLED ===== -->
  <rect x="540" y="60" width="230" height="340" rx="8" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <text x="655" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Air-coupled</text>
  <!-- transmitter -->
  <rect x="625" y="104" width="60" height="24" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- air gap dashed -->
  <line x1="655" y1="128" x2="655" y2="150" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="4,4"/>
  <!-- part -->
  <rect x="585" y="150" width="140" height="44" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="635" y="168" width="40" height="7" fill="#D14343"/>
  <text x="655" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1B82E8">air</text>
  <!-- weak beam through -->
  <line x1="655" y1="194" x2="655" y2="216" stroke="#1B82E8" stroke-width="1.2" stroke-dasharray="4,4"/>
  <!-- receiver -->
  <rect x="625" y="216" width="60" height="24" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="655" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">recv</text>
  <text x="655" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1B82E8">no couplant — air</text>
  <text x="655" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">through-trans., both sides</text>
  <text x="655" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">composites, foam, paper</text>
  <text x="655" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">depth: no</text>

  <!-- bottom unifying note -->
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Same question — how to get sound across the probe-to-part gap — three different answers.</text>
</svg>
