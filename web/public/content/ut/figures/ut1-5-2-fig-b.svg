<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Water-Path Timing — Avoiding the Overlapping Multiple</text>

  <!-- ===== TOP: water path too short ===== -->
  <text x="60" y="78" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Water path too short — echoes collide</text>
  <!-- baseline -->
  <line x1="80" y1="170" x2="740" y2="170" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="80" y1="100" x2="80" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="70" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">amp.</text>
  <text x="740" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">time →</text>

  <!-- 1st front-surface echo -->
  <line x1="150" y1="170" x2="150" y2="105" stroke="#1E9E6A" stroke-width="3"/>
  <text x="150" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">FS₁</text>
  <!-- back-wall echo AND 2nd front-surface multiple overlapping -->
  <line x1="430" y1="170" x2="430" y2="118" stroke="#D14343" stroke-width="3"/>
  <line x1="438" y1="170" x2="438" y2="108" stroke="#F2A33C" stroke-width="3"/>
  <rect x="418" y="100" width="34" height="70" fill="#D14343" opacity="0.18"/>
  <text x="434" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">overlap!</text>
  <line x1="452" y1="130" x2="560" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="564" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#D14343">back wall (BW) hidden by</text>
  <text x="564" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">2nd front-surface multiple (FS₂)</text>

  <!-- divider -->
  <line x1="60" y1="218" x2="740" y2="218" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== BOTTOM: water path adequate ===== -->
  <text x="60" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Water path ≥ T/4 + margin — echoes separate</text>
  <!-- baseline -->
  <line x1="80" y1="360" x2="740" y2="360" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="80" y1="288" x2="80" y2="360" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="70" y="325" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">amp.</text>
  <text x="740" y="380" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">time →</text>

  <!-- 1st front-surface echo -->
  <line x1="150" y1="360" x2="150" y2="295" stroke="#1E9E6A" stroke-width="3"/>
  <text x="150" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">FS₁</text>
  <!-- back-wall echo (clear) -->
  <line x1="330" y1="360" x2="330" y2="308" stroke="#D14343" stroke-width="3"/>
  <text x="330" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">BW</text>
  <!-- 2nd front-surface multiple now LATER, clear of BW -->
  <line x1="560" y1="360" x2="560" y2="318" stroke="#F2A33C" stroke-width="3"/>
  <text x="560" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F2A33C">FS₂</text>
  <!-- gap bracket -->
  <line x1="330" y1="378" x2="560" y2="378" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="330" y1="372" x2="330" y2="384" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="560" y1="372" x2="560" y2="384" stroke="#0A2342" stroke-width="1.5"/>
  <text x="445" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">clear gap — back wall reads cleanly</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Steel is ≈ 4× faster than water, so just T/4 of water delays FS₂ past the back-wall echo.</text>
</svg>
