<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Acoustic Spectrum</text>

  <!-- spectrum bar segments (log scale: 80 px per decade, 1 Hz at x=80) -->
  <rect x="80" y="180" width="104" height="60" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="184" y="180" width="240" height="60" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <rect x="424" y="180" width="296" height="60" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>

  <!-- segment names -->
  <text x="132" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Infrasound</text>
  <text x="304" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Audible sound</text>
  <text x="572" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Ultrasound</text>

  <!-- everyday anchors -->
  <line x1="320" y1="132" x2="320" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="320" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">speech ≈ 1 kHz</text>
  <line x1="448" y1="98" x2="448" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="448" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dog whistle ≈ 40 kHz</text>

  <!-- ticks and frequency labels -->
  <line x1="80" y1="240" x2="80" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="184" y1="240" x2="184" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="320" y1="240" x2="320" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="424" y1="240" x2="424" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="560" y1="240" x2="560" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="640" y1="240" x2="640" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="720" y1="240" x2="720" y2="252" stroke="#0A2342" stroke-width="2"/>
  <text x="80" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 Hz</text>
  <text x="184" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20 Hz</text>
  <text x="320" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 kHz</text>
  <text x="424" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">20 kHz</text>
  <text x="560" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1 MHz</text>
  <text x="640" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">10 MHz</text>
  <text x="724" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100 MHz</text>

  <!-- industrial UT band -->
  <line x1="536" y1="240" x2="536" y2="300" stroke="#F2A33C" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="672" y1="240" x2="672" y2="300" stroke="#F2A33C" stroke-width="2" stroke-dasharray="5,4"/>
  <rect x="536" y="300" width="136" height="36" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="524" y="324" text-anchor="end" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Industrial UT: 0.5 – 25 MHz</text>

  <!-- most-used core bracket -->
  <line x1="560" y1="340" x2="560" y2="350" stroke="#0A2342" stroke-width="2"/>
  <line x1="640" y1="340" x2="640" y2="350" stroke="#0A2342" stroke-width="2"/>
  <line x1="560" y1="350" x2="640" y2="350" stroke="#0A2342" stroke-width="2"/>
  <text x="600" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">most flaw detection: 1 – 10 MHz</text>

  <!-- footnote -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">logarithmic scale — each step to the right multiplies frequency by ten</text>
</svg>
