<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">The 6 dB-Drop (Half-Amplitude) Sizing Method</text>

  <!-- ===== Specimen with extended flaw ===== -->
  <rect x="120" y="300" width="560" height="90" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- extended planar flaw inside -->
  <rect x="318" y="355" width="170" height="9" fill="#D14343" stroke="#0A2342" stroke-width="1.5"/>
  <text x="403" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">extended reflector (larger than beam)</text>

  <!-- three probe positions on top surface -->
  <!-- left edge position -->
  <rect x="288" y="276" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="318,300 300,358 336,358" fill="#1B82E8" opacity="0.22"/>
  <text x="318" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">edge: -6 dB</text>

  <!-- peak position -->
  <rect x="373" y="252" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="403,276 385,358 421,358" fill="#1B82E8" opacity="0.30"/>
  <text x="403" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">peak: 100%</text>

  <!-- right edge position -->
  <rect x="458" y="276" width="60" height="24" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="488,300 470,358 506,358" fill="#1B82E8" opacity="0.22"/>
  <text x="488" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E9E6A">edge: -6 dB</text>

  <!-- flaw length bracket -->
  <line x1="318" y1="408" x2="488" y2="408" stroke="#F2A33C" stroke-width="2"/>
  <line x1="318" y1="402" x2="318" y2="414" stroke="#F2A33C" stroke-width="2"/>
  <line x1="488" y1="402" x2="488" y2="414" stroke="#F2A33C" stroke-width="2"/>
  <text x="403" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">flaw length = probe travel between half-amplitude marks</text>

  <!-- ===== Mini amplitude scale (left) ===== -->
  <line x1="70" y1="90" x2="70" y2="230" stroke="#0A2342" stroke-width="2"/>
  <line x1="70" y1="90" x2="100" y2="90" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="64" y="86" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">100%</text>
  <line x1="70" y1="160" x2="100" y2="160" stroke="#F2A33C" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="64" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">50% (-6 dB)</text>
  <text x="64" y="228" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">0%</text>

  <!-- echo bars matching positions -->
  <rect x="118" y="160" width="44" height="68" fill="#1B82E8"/>
  <text x="140" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">left edge</text>
  <rect x="200" y="90" width="44" height="138" fill="#1B82E8"/>
  <text x="222" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">peak</text>
  <rect x="282" y="160" width="44" height="68" fill="#1B82E8"/>
  <text x="304" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">right edge</text>
  <text x="222" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">echo height at each probe position</text>
</svg>
