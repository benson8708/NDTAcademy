<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Decibels Compare Echo Amplitudes</text>

  <!-- screen grid -->
  <text x="84" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">full screen height (FSH)</text>
  <line x1="80" y1="130" x2="540" y2="130" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="80" y1="178" x2="540" y2="178" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="80" y1="226" x2="540" y2="226" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="80" y1="274" x2="540" y2="274" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="80" y1="322" x2="540" y2="322" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="80" y1="370" x2="540" y2="370" stroke="#E8F1FB" stroke-width="2"/>
  <text x="548" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">100%</text>
  <text x="548" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">80%</text>
  <text x="548" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">60%</text>
  <text x="548" y="279" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">40%</text>
  <text x="548" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">20%</text>

  <!-- amplitude bars -->
  <rect x="110" y="346" width="30" height="24" fill="#1B82E8"/>
  <rect x="215" y="322" width="30" height="48" fill="#1B82E8"/>
  <rect x="320" y="274" width="30" height="96" fill="#1B82E8"/>
  <rect x="425" y="178" width="30" height="192" fill="#1B82E8"/>
  <text x="125" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">10%</text>
  <text x="230" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">20%</text>
  <text x="335" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">40%</text>
  <text x="440" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">80%</text>

  <!-- +6 dB arrows -->
  <line x1="146" y1="330" x2="203" y2="330" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="203,324 203,336 213,330" fill="#F2A33C"/>
  <text x="178" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">+6 dB</text>
  <line x1="251" y1="282" x2="308" y2="282" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="308,276 308,288 318,282" fill="#F2A33C"/>
  <text x="283" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">+6 dB</text>
  <line x1="356" y1="186" x2="413" y2="186" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="413,180 413,192 423,186" fill="#F2A33C"/>
  <text x="388" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">+6 dB</text>

  <!-- memorized pairs -->
  <text x="595" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">+6 dB = ×2</text>
  <text x="595" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">+12 dB = ×4</text>
  <text x="595" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">+20 dB = ×10</text>
  <text x="595" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">+40 dB = ×100</text>
  <text x="595" y="286" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">−6 dB = ×½</text>
  <text x="595" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dB = 20 log10(A2/A1)</text>

  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">the gain control adds decibels — amplitude ratios multiply</text>
</svg>
