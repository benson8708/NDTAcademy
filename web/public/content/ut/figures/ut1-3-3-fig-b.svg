<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Two Readings That Lie: Doubling and Coating Error</text>

  <!-- LEFT: doubling -->
  <text x="210" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Doubling below minimum range</text>
  <rect x="120" y="76" width="56" height="22" fill="#0A2342"/>
  <rect x="80" y="100" width="140" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="230" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">true wall 1.2 mm</text>

  <rect x="60" y="130" width="300" height="190" fill="#0A2342"/>
  <rect x="60" y="130" width="90" height="190" fill="#5A6B7E" opacity="0.45"/>
  <text x="105" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dead</text>
  <text x="105" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">zone</text>
  <polyline points="62,296 74,296 80,142 86,296 130,296" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polyline points="130,296 136,210 142,296" fill="none" stroke="#D9E0E8" stroke-width="2" opacity="0.6"/>
  <polyline points="142,296 214,296 220,170 226,296 350,296" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <line x1="160" y1="200" x2="138" y2="212" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="166" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">BW1 lost</text>
  <line x1="195" y1="152" x2="255" y2="152" stroke="#D14343" stroke-width="3"/>
  <line x1="195" y1="152" x2="195" y2="162" stroke="#D14343" stroke-width="3"/>
  <line x1="255" y1="152" x2="255" y2="162" stroke="#D14343" stroke-width="3"/>
  <text x="262" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">gate</text>
  <text x="248" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW2 gated</text>

  <rect x="110" y="334" width="200" height="46" rx="4" fill="#0A2342"/>
  <text x="210" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#D14343">2.4 mm</text>
  <text x="210" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Gauge gates the 2nd echo: reads double.</text>
  <text x="210" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Verify thin areas with a waveform display.</text>

  <!-- RIGHT: coating error -->
  <text x="590" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Coating error in mode 1</text>
  <rect x="520" y="70" width="56" height="20" fill="#0A2342"/>
  <rect x="480" y="92" width="220" height="8" fill="#F2A33C"/>
  <text x="474" y="101" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">paint</text>
  <rect x="480" y="100" width="220" height="22" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="590" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">steel 12.7 mm</text>

  <rect x="440" y="130" width="320" height="190" fill="#0A2342"/>
  <rect x="460" y="136" width="160" height="160" fill="#D14343" opacity="0.16"/>
  <rect x="620" y="136" width="100" height="160" fill="#1E9E6A" opacity="0.2"/>
  <polyline points="442,296 454,296 460,142 466,296 504,296 510,200 516,296 614,296 620,170 626,296 714,296 720,205 726,296 756,296" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="472" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">IP</text>
  <text x="510" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">IE</text>
  <text x="620" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW1</text>
  <text x="720" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">BW2</text>

  <rect x="440" y="334" width="18" height="14" fill="#D14343" opacity="0.4"/>
  <text x="466" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Mode 1 includes paint: reads about 15 mm</text>
  <rect x="440" y="358" width="18" height="14" fill="#1E9E6A" opacity="0.45"/>
  <text x="466" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Mode 3 echo-to-echo: 12.7 mm, correct</text>
  <text x="590" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Through coatings, use echo-to-echo</text>
  <text x="590" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">or strip the coating locally.</text>
</svg>
