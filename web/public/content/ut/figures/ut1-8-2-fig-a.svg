<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Horizontal Linearity: Multiple Back Echoes</text>

  <!-- probe and block sketch -->
  <rect x="92" y="110" width="56" height="26" fill="#0A2342"/>
  <rect x="92" y="136" width="56" height="5" fill="#F2A33C"/>
  <rect x="40" y="141" width="180" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- bounce arrows -->
  <line x1="100" y1="146" x2="100" y2="252" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="94,246 106,246 100,258" fill="#1B82E8"/>
  <line x1="124" y1="256" x2="124" y2="150" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="118,154 130,154 124,144" fill="#1E9E6A"/>
  <line x1="148" y1="256" x2="148" y2="150" stroke="#1E9E6A" stroke-width="2.2"/>
  <polygon points="143,154 153,154 148,144" fill="#1E9E6A"/>
  <line x1="172" y1="256" x2="172" y2="150" stroke="#1E9E6A" stroke-width="1.6"/>
  <polygon points="168,154 176,154 172,144" fill="#1E9E6A"/>

  <text x="130" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">25 mm parallel block:</text>
  <text x="130" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">echoes repeat every 25 mm</text>
  <text x="130" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">range set to 125 mm,</text>
  <text x="130" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">so marks fall every 2 divisions</text>

  <!-- screen -->
  <rect x="290" y="80" width="470" height="280" fill="#0A2342"/>
  <line x1="337" y1="80" x2="337" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="384" y1="80" x2="384" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="431" y1="80" x2="431" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="478" y1="80" x2="478" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="525" y1="80" x2="525" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="572" y1="80" x2="572" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="619" y1="80" x2="619" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="666" y1="80" x2="666" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="713" y1="80" x2="713" y2="360" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- expected positions (green dashed) -->
  <line x1="384" y1="92" x2="384" y2="330" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="478" y1="92" x2="478" y2="330" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="572" y1="92" x2="572" y2="330" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="666" y1="92" x2="666" y2="330" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="757" y1="92" x2="757" y2="330" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- trace with five echoes (third one slightly off its mark) -->
  <polyline points="296,330 304,330 308,150 313,330 378,330 384,136 390,330 472,330 478,172 484,330 575,330 581,202 587,330 660,330 666,229 672,330 751,330 757,251 760,330" fill="none" stroke="#E8F1FB" stroke-width="2"/>

  <!-- echo ordinals -->
  <text x="384" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">1st</text>
  <text x="478" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">2nd</text>
  <text x="581" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">3rd</text>
  <text x="666" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">4th</text>
  <text x="745" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">5th</text>

  <!-- deviation callout on 3rd echo -->
  <line x1="572" y1="240" x2="581" y2="240" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="578,235 578,245 586,240 " fill="#D14343"/>
  <line x1="581" y1="240" x2="606" y2="266" stroke="#D14343" stroke-width="1.5"/>
  <text x="612" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">measured deviation</text>
  <text x="612" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">limit: about 2% FSW</text>

  <!-- division labels -->
  <text x="290" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">0</text>
  <text x="384" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2</text>
  <text x="478" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">4</text>
  <text x="572" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">6</text>
  <text x="666" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">8</text>
  <text x="757" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">10</text>

  <text x="525" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Each back echo must land within about 2% of full screen width of its mark</text>
</svg>
