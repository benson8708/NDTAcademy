<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">One Flaw, Three Displays</text>

  <!-- A-scan panel -->
  <rect x="40" y="80" width="240" height="240" fill="#0A2342"/>
  <line x1="88" y1="85" x2="88" y2="315" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="136" y1="85" x2="136" y2="315" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="184" y1="85" x2="184" y2="315" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="232" y1="85" x2="232" y2="315" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="45" y1="140" x2="275" y2="140" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="45" y1="200" x2="275" y2="200" stroke="#5A6B7E" stroke-width="0.7"/>
  <line x1="45" y1="260" x2="275" y2="260" stroke="#5A6B7E" stroke-width="0.7"/>
  <polyline points="50,300 56,300 58,135 64,300 90,300 145,300 150,205 156,300 200,300 240,300 245,150 252,300 272,300" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="58" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">IP</text>
  <text x="150" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">F</text>
  <text x="247" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">BW</text>
  <text x="160" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">A-scan &#8212; waveform at one position</text>

  <!-- B-scan panel -->
  <rect x="300" y="80" width="240" height="240" fill="#0A2342"/>
  <line x1="310" y1="110" x2="530" y2="110" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="310" y1="290" x2="370" y2="290" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="465" y1="290" x2="530" y2="290" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="370" y1="290" x2="465" y2="290" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="370" y1="195" x2="465" y2="210" stroke="#F2A33C" stroke-width="5"/>
  <text x="336" y="103" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">front surface</text>
  <text x="336" y="283" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">back wall</text>
  <text x="417" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">flaw</text>
  <text x="418" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">scan position &#8594;</text>
  <text x="420" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">B-scan &#8212; cross-section along line</text>

  <!-- C-scan panel -->
  <rect x="560" y="80" width="200" height="240" fill="#0A2342"/>
  <ellipse cx="655" cy="190" rx="48" ry="30" fill="#F2A33C" fill-opacity="0.85"/>
  <ellipse cx="655" cy="190" rx="22" ry="13" fill="#D14343"/>
  <text x="575" y="105" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">index Y</text>
  <text x="655" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">scan X &#8594;</text>
  <text x="660" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">C-scan &#8212; plan view of gated data</text>

  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Same flaw, same data &#8212; three different questions answered</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">A: what and how big, here &#183; B: how deep along the line &#183; C: how much area</text>
</svg>
