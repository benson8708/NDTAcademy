<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Three Ways to Use the Beam</text>

  <!-- panel titles -->
  <text x="130" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Pulse-echo</text>
  <text x="400" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Through-transmission</text>
  <text x="660" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Tandem pitch-catch</text>

  <!-- P1 pulse-echo -->
  <rect x="50" y="140" width="160" height="160" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="105" y="110" width="50" height="30" fill="#0A2342"/>
  <line x1="134" y1="142" x2="134" y2="222" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="134,228 128,217 140,217" fill="#1B82E8"/>
  <line x1="124" y1="228" x2="124" y2="148" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="124,142 118,153 130,153" fill="#1B82E8"/>
  <ellipse cx="130" cy="238" rx="17" ry="7" fill="#D14343"/>
  <text x="130" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">one probe sends and listens</text>
  <text x="130" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Depth info: YES</text>

  <!-- P2 through-transmission -->
  <rect x="320" y="140" width="160" height="160" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="375" y="110" width="50" height="30" fill="#0A2342"/>
  <text x="400" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Tx</text>
  <rect x="375" y="300" width="50" height="30" fill="#0A2342"/>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Rx</text>
  <line x1="400" y1="142" x2="400" y2="200" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <ellipse cx="400" cy="212" rx="18" ry="8" fill="#D14343"/>
  <line x1="400" y1="224" x2="400" y2="292" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="3 5"/>
  <polygon points="400,298 394,287 406,287" fill="#5A6B7E"/>
  <text x="412" y="265" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">loss</text>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw blocks the energy</text>
  <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Depth info: NO</text>

  <!-- P3 tandem -->
  <rect x="545" y="160" width="235" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="538" y="132" width="45" height="28" fill="#0A2342"/>
  <text x="560" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Rx</text>
  <rect x="658" y="132" width="45" height="28" fill="#0A2342"/>
  <text x="680" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Tx</text>
  <polyline points="680,160 740,220 680,280 560,160" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="560,160 564,173 573,164" fill="#1B82E8"/>
  <line x1="740" y1="195" x2="740" y2="245" stroke="#D14343" stroke-width="5"/>
  <text x="660" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Rx sits where the deflected beam lands</text>
  <text x="660" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Finds vertical mid-wall flaws</text>

  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Strongest response when the beam meets the flaw face perpendicular &#8212; pick the arrangement that achieves it</text>
</svg>
