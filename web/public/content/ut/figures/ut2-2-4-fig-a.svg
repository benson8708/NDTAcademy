<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pipe Manufacturing Routes and Their Defects</text>

  <line x1="400" y1="58" x2="400" y2="435" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="8,7"/>

  <!-- LEFT: SEAMLESS -->
  <text x="200" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">SEAMLESS (rotary pierced)</text>

  <!-- tube body -->
  <rect x="60" y="110" width="270" height="100" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <ellipse cx="330" cy="160" rx="20" ry="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <ellipse cx="330" cy="160" rx="10" ry="28" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>

  <!-- helical laps (spiral wraps) -->
  <line x1="85" y1="205" x2="165" y2="116" stroke="#D14343" stroke-width="2.5" stroke-dasharray="9,6"/>
  <line x1="170" y1="205" x2="250" y2="116" stroke="#D14343" stroke-width="2.5" stroke-dasharray="9,6"/>
  <line x1="255" y1="205" x2="320" y2="132" stroke="#D14343" stroke-width="2.5" stroke-dasharray="9,6"/>

  <!-- axial seam / stringer -->
  <line x1="95" y1="172" x2="295" y2="172" stroke="#5A6B7E" stroke-width="2.5"/>

  <!-- labels -->
  <line x1="208" y1="240" x2="212" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="195" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">lap — shallow helix (piercing)</text>
  <line x1="130" y1="280" x2="125" y2="175" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="135" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">seam / stringer — axial</text>
  <line x1="300" y1="290" x2="328" y2="172" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="295" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">plug score in bore (axial)</text>

  <!-- piercing mini-sketch -->
  <rect x="70" y="345" width="80" height="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="150" y1="370" x2="168" y2="370" stroke="#0A2342" stroke-width="2"/>
  <polygon points="168,362 168,378 196,370" fill="#5A6B7E"/>
  <rect x="210" y="345" width="120" height="50" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="218" y="362" width="112" height="16" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.2"/>
  <text x="200" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">billet pierced over a plug (Mannesmann effect)</text>

  <!-- RIGHT: WELDED -->
  <text x="600" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">WELDED (ERW shown)</text>

  <!-- tube body -->
  <rect x="470" y="110" width="250" height="100" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <ellipse cx="720" cy="160" rx="20" ry="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <ellipse cx="720" cy="160" rx="10" ry="28" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>

  <!-- longitudinal seam -->
  <line x1="478" y1="128" x2="712" y2="128" stroke="#1B82E8" stroke-width="4"/>
  <line x1="585" y1="104" x2="585" y2="124" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="585" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">ERW seam — axial</text>

  <!-- zoom leaders to inset -->
  <line x1="560" y1="131" x2="540" y2="254" stroke="#5A6B7E" stroke-width="1.2"/>
  <line x1="635" y1="131" x2="655" y2="254" stroke="#5A6B7E" stroke-width="1.2"/>

  <!-- zoom inset: weld cross-section -->
  <circle cx="598" cy="330" r="76" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7,6"/>
  <rect x="540" y="300" width="116" height="60" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="598" y1="300" x2="598" y2="360" stroke="#0A2342" stroke-width="2"/>
  <path d="M 583 356 Q 581 330 590 318" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="598" cy="312" r="3.5" fill="#D14343"/>
  <line x1="598" y1="334" x2="598" y2="350" stroke="#D14343" stroke-width="4.5"/>
  <text x="530" y="308" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">OD</text>
  <text x="530" y="360" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ID</text>

  <!-- inset labels -->
  <line x1="524" y1="332" x2="582" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="520" y="336" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">hook crack</text>
  <line x1="672" y1="341" x2="601" y2="342" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="676" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">cold weld (LOF)</text>
  <line x1="672" y1="303" x2="602" y2="311" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="676" y="307" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">penetrator</text>

  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">weld-zone defects stand vertical in the seam plane</text>
</svg>
