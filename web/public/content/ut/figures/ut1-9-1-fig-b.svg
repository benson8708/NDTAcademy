<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Flat-Bottom-Hole Standards Set Reference Gain</text>

  <!-- LEFT: area-amplitude trio -->
  <text x="200" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">AREA-AMPLITUDE SET (constant travel)</text>

  <!-- block 1 -->
  <rect x="60" y="100" width="80" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="96" y="190" width="8" height="60" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="100" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">No. 3</text>
  <text x="100" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">3/64 in.</text>

  <!-- block 2 -->
  <rect x="160" y="100" width="80" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="193" y="190" width="14" height="60" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">No. 5</text>
  <text x="200" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">5/64 in.</text>

  <!-- block 3 -->
  <rect x="260" y="100" width="80" height="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="289" y="190" width="22" height="60" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="300" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">No. 8</text>
  <text x="300" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">8/64 in.</text>

  <!-- metal travel dimension on block 1 -->
  <line x1="44" y1="100" x2="44" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="38" y1="100" x2="50" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="38" y1="190" x2="50" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="32" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">travel</text>

  <text x="200" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">FBH diameter grows in 1/64 in. steps;</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">echo height &#8594; reflector size</text>
  <text x="200" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">distance-amplitude set: same FBH,</text>
  <text x="200" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">increasing travel &#8594; DAC curve</text>

  <!-- RIGHT: A-scan reference -->
  <text x="590" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">SET THE REFERENCE ECHO</text>
  <rect x="430" y="92" width="320" height="270" fill="#0A2342"/>
  <line x1="430" y1="146" x2="750" y2="146" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="430" y1="200" x2="750" y2="200" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="430" y1="254" x2="750" y2="254" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="430" y1="308" x2="750" y2="308" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="510" y1="92" x2="510" y2="362" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="590" y1="92" x2="590" y2="362" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="670" y1="92" x2="670" y2="362" stroke="#5A6B7E" stroke-width="0.8"/>

  <!-- 80% FSH dashed line -->
  <line x1="430" y1="146" x2="750" y2="146" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="8,5"/>
  <text x="744" y="136" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">80% FSH reference</text>

  <!-- trace: IP and FBH echo at 80% -->
  <polyline points="438,346 448,346 452,108 457,346 560,346 566,146 572,346 700,346 706,250 712,346 742,346" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="452" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">IP</text>
  <text x="566" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">FBH echo</text>
  <text x="706" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">BW</text>

  <text x="590" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Peak the FBH &#8594; 80% FSH &#8594; record reference gain (e.g., 46 dB)</text>
  <text x="590" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">block must match part: product form, heat treat, surface (else transfer correction)</text>
</svg>
