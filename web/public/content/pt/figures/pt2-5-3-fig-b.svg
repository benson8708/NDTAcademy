<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Decoding a Drawing Callout</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Five tokens — five process decisions already made for you. Your procedure must implement every one.</text>

  <!-- Full callout string -->
  <rect x="70" y="74" width="660" height="34" rx="6" fill="#9BC4FF" opacity="0.35"/>
  <text x="400" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">"PENETRANT INSPECT PER ASTM E1417, TYPE I, METHOD D, SENSITIVITY LEVEL 3, FORM d"</text>

  <!-- Row 1: ASTM E1417 -->
  <rect x="40" y="124" width="200" height="34" rx="17" fill="#0B1F3A"/>
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">ASTM E1417</text>
  <text x="265" y="138" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The governing practice — aerospace PT process control.</text>
  <text x="265" y="158" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Penetrant materials must appear on the AMS 2644 qualified list.</text>

  <!-- Row 2: TYPE I -->
  <rect x="40" y="194" width="200" height="34" rx="17" fill="#0B1F3A"/>
  <text x="140" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">TYPE I</text>
  <text x="265" y="208" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Fluorescent dye — examined under UV-A light in a darkened area.</text>
  <text x="265" y="228" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Type II would mean visible red dye examined under white light.</text>

  <!-- Row 3: METHOD D -->
  <rect x="40" y="264" width="200" height="34" rx="17" fill="#0B1F3A"/>
  <text x="140" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">METHOD D</text>
  <text x="265" y="278" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Post-emulsifiable, hydrophilic — a water-base emulsifier step.</text>
  <text x="265" y="298" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">A = water-washable · B = lipophilic · C = solvent removable</text>

  <!-- Row 4: SENSITIVITY LEVEL 3 -->
  <rect x="40" y="334" width="200" height="34" rx="17" fill="#0B1F3A"/>
  <text x="140" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">SENSITIVITY LEVEL 3</text>
  <text x="265" y="348" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">High sensitivity — AMS 2644 grades Type I systems ½, 1, 2, 3, 4.</text>
  <text x="265" y="368" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The called level is a requirement, not a suggestion.</text>

  <!-- Row 5: FORM d -->
  <rect x="40" y="404" width="200" height="34" rx="17" fill="#0B1F3A"/>
  <text x="140" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">FORM d</text>
  <text x="265" y="418" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Nonaqueous developer for Type I — sprayed thin on a dry part.</text>
  <text x="265" y="438" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">a dry · b/c aqueous · d/e nonaqueous · f special applications</text>

  <!-- connector spine -->
  <line x1="140" y1="108" x2="140" y2="124" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="158" x2="140" y2="194" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="228" x2="140" y2="264" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="298" x2="140" y2="334" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="368" x2="140" y2="404" stroke="#1E66F5" stroke-width="2"/>

  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Penetrant and emulsifier must come from the same product family — no intermixing.</text>
</svg>
