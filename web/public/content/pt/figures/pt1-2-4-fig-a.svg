<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Front Half of the PT Process &#8212; Checkpoints</text>

  <!-- station boxes -->
  <rect x="24" y="80" width="136" height="78" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="92" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 &#183; Pre-clean</text>
  <text x="92" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">&amp; dry</text>
  <line x1="160" y1="119" x2="168" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="168,112 178,119 168,126" fill="#1B82E8"/>

  <rect x="178" y="80" width="136" height="78" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="246" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 &#183; Verify</text>
  <text x="246" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">lighting</text>
  <line x1="314" y1="119" x2="322" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="322,112 332,119 322,126" fill="#1B82E8"/>

  <rect x="332" y="80" width="136" height="78" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 &#183; Apply</text>
  <text x="400" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">penetrant</text>
  <line x1="468" y1="119" x2="476" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="476,112 486,119 476,126" fill="#1B82E8"/>

  <rect x="486" y="80" width="136" height="78" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="554" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 &#183; Dwell</text>
  <text x="554" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">(keep wet)</text>
  <line x1="622" y1="119" x2="630" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="630,112 640,119 630,126" fill="#1B82E8"/>

  <rect x="640" y="80" width="136" height="78" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="708" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">5 &#183; Remove</text>
  <text x="708" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">excess</text>

  <!-- checkpoint row -->
  <text x="92" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; clean &#183; dry</text>
  <text x="92" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">&#183; in band</text>
  <text x="246" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; meter at</text>
  <text x="246" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">the surface</text>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; area + band,</text>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">wet film</text>
  <text x="554" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; &#8805; 10 min typ.,</text>
  <text x="554" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">film stays wet</text>
  <text x="708" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; stop at</text>
  <text x="708" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">background</text>

  <!-- fault row -->
  <text x="92" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; wire-brush</text>
  <text x="92" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">smear</text>
  <text x="246" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; no meter</text>
  <text x="246" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">check</text>
  <text x="400" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; missed</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">coverage</text>
  <text x="554" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; cut short /</text>
  <text x="554" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">film dried</text>
  <text x="708" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; overwash /</text>
  <text x="708" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">flooded solvent</text>

  <!-- legend -->
  <rect x="220" y="346" width="16" height="16" fill="#1E9E6A"/>
  <text x="244" y="359" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">checkpoint to verify</text>
  <rect x="430" y="346" width="16" height="16" fill="#D14343"/>
  <text x="454" y="359" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">classic fault</text>

  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Every fault here is silent at the station and shows up only at evaluation.</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Next: drying, developer, and evaluation &#8212; the following module.</text>
</svg>
