<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Indication Morphology by Discontinuity Type</text>

  <!-- ============ Card 1: Crack ============ -->
  <rect x="25" y="54" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <polyline points="45,122 72,100 95,128 122,104 148,132 175,106 205,128 235,112" fill="none" stroke="#D14343" stroke-width="4" stroke-linejoin="miter"/>
  <line x1="122" y1="104" x2="134" y2="90" stroke="#D14343" stroke-width="3"/>
  <text x="140" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Crack</text>
  <text x="140" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">jagged, irregular continuous line</text>

  <!-- ============ Card 2: Cold shut ============ -->
  <rect x="285" y="54" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <path d="M 305 126 C 345 96, 392 100, 428 114 C 458 126, 482 118, 498 104" fill="none" stroke="#D14343" stroke-width="3.5" stroke-linecap="round"/>
  <text x="400" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Cold shut</text>
  <text x="400" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">smooth, narrow, gently curving</text>

  <!-- ============ Card 3: Seam ============ -->
  <rect x="545" y="54" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="565" y1="112" x2="755" y2="112" stroke="#D14343" stroke-width="3.5"/>
  <line x1="600" y1="142" x2="700" y2="142" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="700,136 700,148 712,142" fill="#1E66F5"/>
  <text x="652" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">working direction</text>
  <text x="660" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Seam</text>
  <text x="660" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">straight, follows working direction</text>

  <!-- ============ Card 4: Lap (intermittent) ============ -->
  <rect x="25" y="234" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <path d="M 45 304 C 90 282, 140 284, 182 298 C 206 306, 224 302, 240 294" fill="none" stroke="#D14343" stroke-width="4" stroke-linecap="round" stroke-dasharray="20 14"/>
  <text x="140" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Lap — partly closed</text>
  <text x="140" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">intermittent: bleeds only where open</text>

  <!-- ============ Card 5: Gas porosity ============ -->
  <rect x="285" y="234" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="330" cy="292" r="10" fill="#D14343"/>
  <circle cx="374" cy="312" r="7" fill="#D14343"/>
  <circle cx="414" cy="286" r="12" fill="#D14343"/>
  <circle cx="455" cy="314" r="8" fill="#D14343"/>
  <circle cx="482" cy="288" r="6" fill="#D14343"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Gas porosity</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">round, well-defined spots</text>

  <!-- ============ Card 6: Microshrinkage ============ -->
  <rect x="545" y="234" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <g fill="#D14343">
    <circle cx="624" cy="292" r="2.5"/><circle cx="638" cy="284" r="2"/><circle cx="650" cy="296" r="3"/>
    <circle cx="662" cy="286" r="2"/><circle cx="674" cy="298" r="2.5"/><circle cx="688" cy="290" r="2"/>
    <circle cx="630" cy="306" r="2"/><circle cx="644" cy="312" r="2.5"/><circle cx="658" cy="306" r="2"/>
    <circle cx="672" cy="312" r="3"/><circle cx="686" cy="304" r="2"/><circle cx="698" cy="298" r="2.5"/>
    <circle cx="618" cy="300" r="2"/><circle cx="636" cy="298" r="2"/><circle cx="652" cy="320" r="2"/>
    <circle cx="666" cy="322" r="2.5"/><circle cx="680" cy="318" r="2"/><circle cx="694" cy="312" r="2"/>
    <circle cx="640" cy="326" r="2"/><circle cx="626" cy="316" r="2.5"/>
  </g>
  <text x="660" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Microshrinkage</text>
  <text x="660" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">cluster of pinpoint dots — spongy patch</text>

  <!-- ============ Footer rule ============ -->
  <rect x="25" y="412" width="750" height="66" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Strength scales with trapped volume — depth and mouth width set how wide and bright a mark grows</text>
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A diffuse haze with no defined shape is never interpreted — reclean and reprocess the part</text>
</svg>
