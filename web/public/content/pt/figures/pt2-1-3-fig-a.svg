<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">The PT Equipment Set — Stationary Line and Portable Kit</text>

  <!-- row 1 stations -->
  <rect x="40" y="70" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1 · Preclean</text>
  <text x="120" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">degrease / solvent clean</text>
  <text x="120" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">surface clean and dry</text>

  <rect x="230" y="70" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2 · Penetrant</text>
  <text x="310" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">tank + drain / dwell racks</text>
  <text x="310" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">timed dwell</text>

  <rect x="420" y="70" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="500" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3 · Emulsifier</text>
  <text x="500" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Methods B and D only</text>
  <text x="500" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">timed contact</text>

  <rect x="610" y="70" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="690" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4 · Wash / rinse</text>
  <text x="690" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">UV-A lamp over rinse</text>
  <text x="690" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">(Type I lines)</text>

  <!-- row 1 arrows -->
  <line x1="202" y1="112" x2="222" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="228,112 218,106 218,118" fill="#1B82E8"/>
  <line x1="392" y1="112" x2="412" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="418,112 408,106 408,118" fill="#1B82E8"/>
  <line x1="582" y1="112" x2="602" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="608,112 598,106 598,118" fill="#1B82E8"/>

  <!-- down arrow from station 4 to station 5 -->
  <line x1="690" y1="156" x2="690" y2="186" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="690,194 684,184 696,184" fill="#1B82E8"/>

  <!-- row 2 stations (flow right to left) -->
  <rect x="610" y="196" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="690" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5 · Dryer</text>
  <text x="690" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">recirculating hot air</text>
  <text x="690" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">lowest effective time</text>

  <rect x="420" y="196" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="500" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">6 · Developer</text>
  <text x="500" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">dust chamber, tank,</text>
  <text x="500" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">or aerosol</text>

  <rect x="230" y="196" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">7 · Inspection booth</text>
  <text x="310" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">darkened, UV-A lamp</text>
  <text x="310" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">ambient ≤ 2 fc</text>

  <rect x="40" y="196" width="160" height="84" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">8 · Postclean</text>
  <text x="120" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">remove residues,</text>
  <text x="120" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">protect from corrosion</text>

  <!-- row 2 arrows (pointing left) -->
  <line x1="606" y1="238" x2="586" y2="238" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="580,238 590,232 590,244" fill="#1B82E8"/>
  <line x1="416" y1="238" x2="396" y2="238" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="390,238 400,232 400,244" fill="#1B82E8"/>
  <line x1="226" y1="238" x2="206" y2="238" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="200,238 210,232 210,244" fill="#1B82E8"/>

  <!-- order note -->
  <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Order shown for dry-powder and nonaqueous developer — aqueous developers go on wet, before the dryer.</text>

  <!-- portable kit panel -->
  <rect x="40" y="336" width="720" height="146" rx="10" fill="#E8F1FB"/>
  <text x="60" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Portable kit — same chemistry, same lighting rules</text>

  <!-- aerosol cans -->
  <rect x="90" y="372" width="20" height="10" rx="3" fill="#1B82E8"/>
  <rect x="80" y="382" width="40" height="62" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="100" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">cleaner</text>

  <rect x="160" y="372" width="20" height="10" rx="3" fill="#D14343"/>
  <rect x="150" y="382" width="40" height="62" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="170" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">penetrant</text>

  <rect x="230" y="372" width="20" height="10" rx="3" fill="#5A6B7E"/>
  <rect x="220" y="382" width="40" height="62" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="240" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">developer</text>

  <!-- wipes -->
  <rect x="300" y="398" width="80" height="12" rx="2" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="300" y="414" width="80" height="12" rx="2" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="300" y="430" width="80" height="12" rx="2" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="340" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">lint-free wipes</text>

  <!-- brush -->
  <rect x="425" y="384" width="10" height="40" rx="3" fill="#5A6B7E"/>
  <rect x="418" y="424" width="24" height="18" rx="3" fill="#0A2342"/>
  <text x="430" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">brush</text>

  <!-- battery UV-A lamp -->
  <rect x="480" y="406" width="80" height="26" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="560" y="398" width="16" height="42" rx="3" fill="#1B82E8"/>
  <polygon points="576,402 596,392 596,446 576,436" fill="#1B82E8" opacity="0.3"/>
  <text x="535" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">battery UV-A lamp</text>

  <!-- meters -->
  <rect x="632" y="392" width="54" height="44" rx="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="659" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">UV</text>
  <text x="659" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">µW</text>
  <rect x="696" y="392" width="54" height="44" rx="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="723" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">fc</text>
  <text x="723" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">lux</text>
  <text x="691" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">radiometer + photometer</text>
  <text x="691" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">(in calibration)</text>
</svg>
