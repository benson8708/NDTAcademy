<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Two Worlds of Penetrant Work</text>
  <line x1="400" y1="58" x2="400" y2="432" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- ===== Left: fixed processing line ===== -->
  <text x="205" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Fixed processing line - Methods A, B, D</text>

  <!-- floor -->
  <line x1="24" y1="290" x2="380" y2="290" stroke="#5A6B7E" stroke-width="2"/>

  <!-- station 1: penetrant tank -->
  <path d="M 28 230 L 28 290 L 88 290 L 88 230" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="32" y="252" width="52" height="34" fill="#1E9E6A"/>
  <rect x="49" y="238" width="18" height="12" fill="#5A6B7E"/>
  <line x1="58" y1="222" x2="58" y2="238" stroke="#5A6B7E" stroke-width="2"/>

  <!-- station 2: wash / remover tank -->
  <path d="M 100 230 L 100 290 L 160 290 L 160 230" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="104" y="252" width="52" height="34" fill="#1B82E8"/>

  <!-- station 3: dryer -->
  <rect x="172" y="230" width="60" height="60" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M 186 280 q 6 -12 0 -24 q -6 -12 0 -24" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 202 280 q 6 -12 0 -24 q -6 -12 0 -24" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 218 280 q 6 -12 0 -24 q -6 -12 0 -24" fill="none" stroke="#F2A33C" stroke-width="2"/>

  <!-- station 4: developer cabinet -->
  <rect x="244" y="230" width="60" height="60" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="258" cy="248" r="2.5" fill="#E8F1FB"/>
  <circle cx="274" cy="242" r="2.5" fill="#E8F1FB"/>
  <circle cx="290" cy="250" r="2.5" fill="#E8F1FB"/>
  <circle cx="264" cy="262" r="2.5" fill="#E8F1FB"/>
  <circle cx="282" cy="268" r="2.5" fill="#E8F1FB"/>
  <circle cx="270" cy="278" r="2.5" fill="#E8F1FB"/>

  <!-- station 5: UV booth -->
  <rect x="316" y="222" width="60" height="68" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="346" cy="238" r="6" fill="#1B82E8"/>
  <line x1="340" y1="244" x2="330" y2="266" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="346" y1="244" x2="346" y2="266" stroke="#1B82E8" stroke-width="1.5"/>
  <line x1="352" y1="244" x2="362" y2="266" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="336" y="268" width="20" height="10" fill="#5A6B7E"/>
  <circle cx="346" cy="272" r="3" fill="#1E9E6A"/>

  <!-- station labels (staggered rows) -->
  <text x="58" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Penetrant</text>
  <text x="130" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Wash / remover</text>
  <text x="202" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Dryer</text>
  <text x="274" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Developer</text>
  <text x="346" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">UV booth</text>

  <text x="205" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Batch throughput - controlled utilities</text>
  <text x="205" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">darkened UV-A viewing, eyes adapted</text>

  <!-- ===== Right: field kit ===== -->
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Field kit - Method C</text>

  <!-- floor -->
  <line x1="430" y1="290" x2="770" y2="290" stroke="#5A6B7E" stroke-width="2"/>

  <!-- can 1: cleaner -->
  <rect x="440" y="210" width="46" height="80" rx="6" fill="#D9E0E8"/>
  <rect x="453" y="200" width="20" height="10" fill="#5A6B7E"/>
  <rect x="459" y="192" width="8" height="8" fill="#5A6B7E"/>
  <text x="463" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Cleaner</text>

  <!-- can 2: red penetrant -->
  <rect x="530" y="210" width="46" height="80" rx="6" fill="#D14343"/>
  <rect x="543" y="200" width="20" height="10" fill="#5A6B7E"/>
  <rect x="549" y="192" width="8" height="8" fill="#5A6B7E"/>
  <text x="553" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Penetrant</text>

  <!-- can 3: developer -->
  <rect x="620" y="210" width="46" height="80" rx="6" fill="#FFFFFF"/>
  <rect x="633" y="200" width="20" height="10" fill="#5A6B7E"/>
  <rect x="639" y="192" width="8" height="8" fill="#5A6B7E"/>
  <text x="643" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Developer</text>

  <!-- wipes stack -->
  <rect x="698" y="262" width="58" height="9" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <rect x="702" y="271" width="58" height="9" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <rect x="700" y="280" width="58" height="10" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="729" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Wipes</text>

  <!-- light meter -->
  <rect x="706" y="200" width="48" height="34" rx="6" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="730" cy="210" r="6" fill="#FFFFFF"/>
  <rect x="716" y="220" width="28" height="8" fill="#1E9E6A"/>
  <text x="730" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Light meter</text>

  <text x="600" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">One weld, anywhere - no utilities</text>
  <text x="600" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">&#8805; 100 fc white light, verified - never flood</text>
</svg>
