<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Trace the Symptom Back to the Station</text>
  <text x="710" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Station to fix</text>

  <!-- ===== Row 1 ===== -->
  <rect x="25" y="75" width="215" height="78" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="132" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Dim or missing</text>
  <text x="132" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">indications</text>

  <rect x="285" y="66" width="330" height="96" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">over-washed at rinse;</text>
  <text x="450" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrant dried in dwell;</text>
  <text x="450" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">baked in dryer;</text>
  <text x="450" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">developer coat too thick</text>

  <circle cx="665" cy="114" r="18" fill="#1B82E8"/>
  <text x="665" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <circle cx="710" cy="114" r="18" fill="#1B82E8"/>
  <text x="710" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
  <circle cx="755" cy="114" r="18" fill="#1B82E8"/>
  <text x="755" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>

  <line x1="240" y1="114" x2="272" y2="114" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="270,107 282,114 270,121" fill="#5A6B7E"/>
  <line x1="615" y1="114" x2="635" y2="114" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="633,107 645,114 633,121" fill="#5A6B7E"/>

  <!-- ===== Row 2 ===== -->
  <rect x="25" y="180" width="215" height="78" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="132" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Bright, noisy</text>
  <text x="132" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">background</text>

  <rect x="285" y="180" width="330" height="78" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="450" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">under-removal at rinse,</text>
  <text x="450" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">or surface too rough</text>

  <circle cx="688" cy="219" r="18" fill="#1B82E8"/>
  <text x="688" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <circle cx="733" cy="219" r="18" fill="#1B82E8"/>
  <text x="733" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>

  <line x1="240" y1="219" x2="272" y2="219" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="270,212 282,219 270,226" fill="#5A6B7E"/>
  <line x1="615" y1="219" x2="658" y2="219" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="656,212 668,219 656,226" fill="#5A6B7E"/>

  <!-- ===== Row 3 ===== -->
  <rect x="25" y="276" width="215" height="78" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="132" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Fuzzy, oversized</text>
  <text x="132" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">indications</text>

  <rect x="285" y="276" width="330" height="78" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="450" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">read past the development</text>
  <text x="450" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">window — over-developed</text>

  <circle cx="688" cy="315" r="18" fill="#1B82E8"/>
  <text x="688" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <circle cx="733" cy="315" r="18" fill="#1B82E8"/>
  <text x="733" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">6</text>

  <line x1="240" y1="315" x2="272" y2="315" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="270,308 282,315 270,322" fill="#5A6B7E"/>
  <line x1="615" y1="315" x2="658" y2="315" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="656,308 668,315 656,322" fill="#5A6B7E"/>

  <!-- bottom rule -->
  <rect x="25" y="376" width="750" height="60" rx="8" fill="#1E9E6A"/>
  <text x="400" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Fix the station that caused it, then reprocess the part completely</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">from precleaning forward — no spot repairs</text>
</svg>
