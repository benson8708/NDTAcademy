<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Penetrant System Classification — ASTM E1417 / AMS 2644</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Select from qualified families listed on QPL-AMS-2644 — never improvise a mix</text>

  <!-- ===== TYPE tier ===== -->
  <text x="150" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">TYPE — which dye</text>
  <rect x="150" y="80" width="240" height="64" rx="6" fill="#1E66F5"/>
  <text x="270" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Type I — Fluorescent</text>
  <text x="270" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">UV-A booth · highest sensitivity</text>
  <rect x="430" y="80" width="240" height="64" rx="6" fill="#9BC4FF"/>
  <text x="550" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Type II — Visible</text>
  <text x="550" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">white light · field-friendly</text>

  <!-- connectors: types to method bus -->
  <line x1="270" y1="144" x2="270" y2="168" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="550" y1="144" x2="550" y2="168" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="108" y1="168" x2="678" y2="168" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="108" y1="168" x2="108" y2="186" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="298" y1="168" x2="298" y2="186" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="488" y1="168" x2="488" y2="186" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="678" y1="168" x2="678" y2="186" stroke="#0B1F3A" stroke-width="2"/>

  <!-- ===== METHOD tier ===== -->
  <rect x="18" y="186" width="180" height="96" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="108" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Method A</text>
  <text x="108" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Water-washable</text>
  <text x="108" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">one-step water rinse</text>
  <text x="108" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">speed · geometry</text>
  <text x="108" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rough surfaces</text>

  <rect x="208" y="186" width="180" height="96" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="298" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Method B</text>
  <text x="298" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Postemulsifiable</text>
  <text x="298" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">(lipophilic)</text>
  <text x="298" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ready-to-use dip</text>
  <text x="298" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">timed contact</text>

  <rect x="398" y="186" width="180" height="96" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="488" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Method C</text>
  <text x="488" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Solvent-removable</text>
  <text x="488" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">aerosol kit — no</text>
  <text x="488" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">water or power</text>
  <text x="488" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">spot examinations</text>

  <rect x="588" y="186" width="180" height="96" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="678" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Method D</text>
  <text x="678" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Postemulsifiable</text>
  <text x="678" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">(hydrophilic)</text>
  <text x="678" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface-only remover</text>
  <text x="678" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">most control</text>

  <!-- connectors: methods to level bus -->
  <line x1="400" y1="282" x2="400" y2="310" stroke="#0B1F3A" stroke-width="2"/>
  <text x="414" y="297" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">sensitivity levels — Type I only</text>
  <line x1="95" y1="310" x2="715" y2="310" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="95" y1="310" x2="95" y2="330" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="250" y1="310" x2="250" y2="330" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="405" y1="310" x2="405" y2="330" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="560" y1="310" x2="560" y2="330" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="715" y1="310" x2="715" y2="330" stroke="#0B1F3A" stroke-width="2"/>

  <!-- ===== LEVEL tier ===== -->
  <rect x="25" y="330" width="140" height="78" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="95" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">½</text>
  <text x="95" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">ultralow</text>
  <text x="95" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rough castings</text>

  <rect x="180" y="330" width="140" height="78" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="250" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">1</text>
  <text x="250" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">low</text>
  <text x="250" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">general castings</text>

  <rect x="335" y="330" width="140" height="78" rx="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="405" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">2</text>
  <text x="405" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">medium</text>
  <text x="405" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">machined parts</text>

  <rect x="490" y="330" width="140" height="78" rx="6" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="560" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="560" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">high</text>
  <text x="560" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">critical hardware</text>

  <rect x="645" y="330" width="140" height="78" rx="6" fill="#0B1F3A" stroke="#0B1F3A" stroke-width="2"/>
  <text x="715" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="715" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">ultrahigh</text>
  <text x="715" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">fracture-critical</text>

  <!-- tradeoff arrow -->
  <line x1="95" y1="436" x2="690" y2="436" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="690,429 706,436 690,443" fill="#1E66F5"/>
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">higher level → finds finer, tighter flaws · more background on rough surfaces · higher cost</text>
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Developer form (a–f) completes the system designation — see the process-control lessons.</text>
</svg>
