<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0A2342">Two Meters, Three Numbers — Prove the Light Before Parts Move</text>

  <!-- LEFT PANEL: fluorescent booth -->
  <rect x="24" y="56" width="368" height="360" rx="10" fill="#0A2342"/>
  <text x="208" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Type I fluorescent — darkened booth</text>

  <!-- UV lamp -->
  <rect x="64" y="98" width="96" height="38" rx="7" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="70" y="136" width="84" height="8" rx="3" fill="#1B82E8"/>
  <text x="170" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D9E0E8">UV-A lamp</text>
  <text x="170" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">(mercury: warm up 5–10 min)</text>

  <!-- beam -->
  <polygon points="78,146 146,146 268,288 96,288" fill="#1B82E8" opacity="0.22"/>

  <!-- bench and part -->
  <rect x="56" y="320" width="304" height="12" rx="3" fill="#5A6B7E"/>
  <rect x="96" y="290" width="180" height="30" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="186" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">part</text>

  <!-- radiometer sensor + display -->
  <circle cx="150" cy="282" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="158" y1="276" x2="252" y2="248" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="250" y="210" width="130" height="56" rx="6" fill="#FFFFFF"/>
  <text x="315" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1,050 µW/cm²</text>
  <text x="315" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">minimum 1,000</text>

  <text x="60" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">sensor AT the surface,</text>
  <text x="60" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">at working distance</text>

  <!-- ambient meter -->
  <rect x="60" y="348" width="110" height="46" rx="6" fill="#FFFFFF"/>
  <text x="115" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1.8 fc</text>
  <text x="115" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">ambient</text>
  <text x="182" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">ambient ≤ 2 fc (≈ 20 lux),</text>
  <text x="182" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">booth in its inspection state</text>

  <!-- RIGHT PANEL: visible bench -->
  <rect x="408" y="56" width="368" height="360" rx="10" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="592" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Type II visible — full white light</text>

  <!-- white-light lamp -->
  <rect x="540" y="98" width="104" height="30" rx="8" fill="#5A6B7E"/>
  <text x="532" y="112" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">white-light source</text>
  <text x="532" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">(flood or task lamp)</text>

  <!-- beam -->
  <polygon points="552,128 632,128 700,290 484,290" fill="#F2A33C" opacity="0.25"/>

  <!-- bench and part -->
  <rect x="440" y="320" width="304" height="12" rx="3" fill="#5A6B7E"/>
  <rect x="482" y="290" width="180" height="30" rx="5" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="572" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">part</text>

  <!-- photometer sensor + display -->
  <circle cx="536" cy="282" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="544" y1="276" x2="600" y2="250" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="584" y="210" width="166" height="56" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="667" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">110 fc</text>
  <text x="667" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">min 100 (≈ 1,000 lux)</text>

  <text x="592" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">photometer reads eye-weighted illuminance</text>
  <text x="592" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">(white light only — it cannot vouch for UV)</text>

  <!-- footer -->
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Radiometer → irradiance in µW/cm² (UV-A is invisible) · Photometer → illuminance in fc / lux</text>
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Typical acceptance values — the written procedure governs.</text>
</svg>
