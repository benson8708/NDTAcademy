<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Fluorescent Inspection Station — Typical Values</text>

  <!-- UV lamp -->
  <rect x="110" y="84" width="120" height="42" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="222" y="92" width="12" height="26" fill="#1B82E8"/>
  <text x="110" y="72" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">UV-A lamp — warmed up and stabilized</text>

  <!-- beam -->
  <polygon points="234,105 440,276 580,276" fill="#1B82E8" opacity="0.15"/>
  <line x1="234" y1="105" x2="450" y2="276" stroke="#1B82E8" stroke-width="1.5" opacity="0.5"/>
  <line x1="234" y1="105" x2="510" y2="276" stroke="#1B82E8" stroke-width="1.5" opacity="0.5"/>
  <line x1="234" y1="105" x2="572" y2="276" stroke="#1B82E8" stroke-width="1.5" opacity="0.5"/>

  <!-- bench -->
  <rect x="60" y="330" width="680" height="12" fill="#5A6B7E"/>

  <!-- part with indication -->
  <rect x="430" y="276" width="150" height="54" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <path d="M445,300 q20,-10 42,-2 t48,4" fill="none" stroke="#1E9E6A" stroke-width="10" opacity="0.3"/>
  <path d="M445,300 q20,-10 42,-2 t48,4" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <text x="505" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Part with glowing indication</text>

  <!-- surface intensity callout -->
  <text x="505" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">≥ 1,000 µW/cm² at the surface</text>
  <line x1="505" y1="258" x2="505" y2="274" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- radiometer -->
  <rect x="300" y="298" width="72" height="32" rx="4" fill="#D9E0E8"/>
  <rect x="308" y="304" width="26" height="12" fill="#1E9E6A"/>
  <circle cx="350" cy="310" r="4" fill="#5A6B7E"/>
  <text x="336" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Radiometer — measure</text>
  <text x="336" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">at the surface</text>

  <!-- ambient white light box -->
  <rect x="560" y="64" width="220" height="58" rx="8" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="670" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Booth ambient white light</text>
  <text x="670" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">≤ 2 fc — about 20 lux</text>

  <!-- Type II inset -->
  <rect x="560" y="150" width="220" height="58" rx="8" fill="none" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="670" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Type II visible bench:</text>
  <text x="670" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">≥ 100 fc at the surface</text>

  <!-- dark adaptation note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Eyes: several minutes of dark adaptation — no photochromic or tinted lenses in the booth</text>
</svg>
