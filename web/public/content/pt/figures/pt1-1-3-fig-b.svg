<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The PT Certification Ladder</text>

  <!-- requirements panel -->
  <rect x="30" y="80" width="260" height="282" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="160" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">What every level takes</text>
  <circle cx="62" cy="143" r="4" fill="#F2A33C"/>
  <text x="76" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Formal training hours</text>
  <circle cx="62" cy="175" r="4" fill="#F2A33C"/>
  <text x="76" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Supervised experience</text>
  <circle cx="62" cy="207" r="4" fill="#F2A33C"/>
  <text x="76" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Annual near-vision exam</text>
  <circle cx="62" cy="239" r="4" fill="#F2A33C"/>
  <text x="76" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Periodic color check</text>
  <circle cx="62" cy="271" r="4" fill="#F2A33C"/>
  <text x="76" y="276" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">General, specific, and</text>
  <text x="76" y="296" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">practical examinations</text>
  <circle cx="62" cy="327" r="4" fill="#F2A33C"/>
  <text x="76" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Recert every 3 to 5 years</text>

  <!-- ascent arrow -->
  <line x1="305" y1="382" x2="305" y2="112" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="297,116 305,94 313,116" fill="#F2A33C"/>

  <!-- LEVEL III -->
  <rect x="320" y="88" width="440" height="64" rx="8" fill="#0A2342"/>
  <text x="344" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">LEVEL III</text>
  <text x="445" y="114" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Writes procedures, interprets codes,</text>
  <text x="445" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">trains and examines staff, owns the program</text>

  <!-- LEVEL II -->
  <rect x="320" y="168" width="440" height="64" rx="8" fill="#1B82E8"/>
  <text x="344" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">LEVEL II</text>
  <text x="445" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Sets up, performs, interprets and evaluates</text>
  <text x="445" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">to codes and specs; supervises I and trainees</text>

  <!-- LEVEL I -->
  <rect x="320" y="248" width="440" height="64" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="344" y="286" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">LEVEL I</text>
  <text x="445" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Performs specific tests per written</text>
  <text x="445" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">instructions; records results</text>

  <!-- TRAINEE -->
  <rect x="320" y="328" width="440" height="64" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="344" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">TRAINEE</text>
  <text x="445" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Works under direct supervision;</text>
  <text x="445" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">makes no accept or reject calls</text>

  <!-- footer -->
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Employer certifies under a written practice guided by SNT-TC-1A or CP-189.</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">NAS 410 governs aerospace; ISO 9712 uses a central certification body.</text>
</svg>
