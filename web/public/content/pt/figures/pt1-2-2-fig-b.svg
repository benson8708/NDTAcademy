<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Penetrant Dwell: Time to Fill the Flaw</text>

  <!-- Block 1: 0 min -->
  <rect x="40" y="130" width="200" height="10" fill="#D14343"/>
  <rect x="40" y="140" width="200" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="134,140 146,140 141,250 139,250" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="140" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">0 min &#8212; film applied</text>
  <text x="140" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flaw still empty</text>

  <!-- Block 2: mid-dwell -->
  <rect x="300" y="130" width="200" height="10" fill="#D14343"/>
  <rect x="300" y="140" width="200" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="394,140 406,140 401,250 399,250" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="395,141 405,141 402,200 398,200" fill="#D14343"/>
  <line x1="400" y1="98" x2="400" y2="126" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="394,124 400,136 406,124" fill="#1B82E8"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">capillary pull</text>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Mid-dwell &#8212; filling</text>
  <text x="400" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">narrow opening fills slowly</text>

  <!-- Block 3: 10+ min -->
  <rect x="560" y="130" width="200" height="10" fill="#D14343"/>
  <rect x="560" y="140" width="200" height="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="654,140 666,140 661,250 659,250" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="655,141 665,141 661,247 659,247" fill="#D14343"/>
  <text x="660" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">10+ min typical &#8212; filled</text>
  <text x="660" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ready for removal</text>

  <!-- timeline -->
  <line x1="60" y1="352" x2="732" y2="352" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="732,344 748,352 732,360" fill="#1B82E8"/>
  <circle cx="140" cy="352" r="6" fill="#1B82E8"/>
  <circle cx="400" cy="352" r="6" fill="#1B82E8"/>
  <circle cx="660" cy="352" r="6" fill="#1B82E8"/>
  <text x="755" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">dwell time</text>

  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cold parts and tight cracks (fatigue, grinding): extend dwell per procedure.</text>
  <text x="400" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">If the film dries, it stops feeding the flaw &#8212; re-apply and keep it wet.</text>
</svg>
