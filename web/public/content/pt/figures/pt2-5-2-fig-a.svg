<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Anatomy of a Complete PT Examination Report</text>

  <!-- ============ report form (left) ============ -->
  <rect x="40" y="58" width="410" height="412" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="40" y="58" width="410" height="32" fill="#0B1F3A"/>
  <text x="245" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">LIQUID PENETRANT EXAMINATION REPORT</text>

  <!-- block 1: identification -->
  <rect x="40" y="90" width="410" height="68" fill="#9BC4FF" opacity="0.18"/>
  <text x="56" y="112" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Part No. 7312-5&#160;&#160;&#160;&#160;S/N 0147</text>
  <text x="56" y="132" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Drawing D7312 Rev F</text>
  <text x="56" y="152" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Material: Ti-6Al-4V&#160;&#160;&#160;&#160;Qty: 1</text>
  <line x1="40" y1="158" x2="450" y2="158" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block 2: process -->
  <text x="56" y="180" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Procedure PT-OP-12 Rev C — ASTM E1417</text>
  <text x="56" y="200" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Type I &#183; Method D &#183; Form a &#183; Level 3</text>
  <text x="56" y="220" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Batches: pen 19F22 / emul 22H07 / dev 31D19</text>
  <text x="56" y="240" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Penetrant dwell 15 min @ 68 &#176;F</text>
  <line x1="40" y1="250" x2="450" y2="250" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block 3: conditions -->
  <rect x="40" y="250" width="410" height="68" fill="#9BC4FF" opacity="0.18"/>
  <text x="56" y="272" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">UV-A 1,450 &#181;W/cm&#178; at surface (min 1,000)</text>
  <text x="56" y="292" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Ambient white light 1.2 fc (max 2)</text>
  <text x="56" y="312" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Radiometer R-204 — cal due 2026-09-15</text>
  <line x1="40" y1="318" x2="450" y2="318" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block 4: results -->
  <text x="56" y="340" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">One linear indication, 0.20 in. long,</text>
  <text x="56" y="360" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">1.3 in. from datum A — REJECT</text>
  <text x="56" y="380" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">NCR 26-0412 &#183; acceptance criteria per PO</text>
  <line x1="40" y1="396" x2="450" y2="396" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block 5: sign-off -->
  <rect x="40" y="396" width="410" height="74" fill="#9BC4FF" opacity="0.18"/>
  <text x="56" y="420" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">J. Rivera — Level II PT — Stamp 47</text>
  <text x="56" y="442" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Cert expires 2027-03-31</text>
  <text x="56" y="462" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Sign-off date 2026-06-09</text>

  <!-- ============ five-questions labels (right) ============ -->
  <!-- 1 WHAT -->
  <line x1="450" y1="124" x2="502" y2="118" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="518" cy="118" r="13" fill="#1E66F5"/>
  <text x="518" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="540" y="114" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">WHAT was examined</text>
  <text x="540" y="133" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">part, serial, drawing rev, material</text>

  <!-- 2 HOW -->
  <line x1="450" y1="204" x2="502" y2="198" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="518" cy="198" r="13" fill="#1E66F5"/>
  <text x="518" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="540" y="194" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">HOW it was processed</text>
  <text x="540" y="213" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">procedure rev, classification, batches</text>

  <!-- 3 CONDITIONS -->
  <line x1="450" y1="284" x2="502" y2="278" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="518" cy="278" r="13" fill="#1E66F5"/>
  <text x="518" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="540" y="274" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">UNDER WHAT conditions</text>
  <text x="540" y="293" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">measured light values, meter, cal due</text>

  <!-- 4 FOUND -->
  <line x1="450" y1="357" x2="502" y2="351" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="518" cy="351" r="13" fill="#1E66F5"/>
  <text x="518" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="540" y="347" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">WHAT was found</text>
  <text x="540" y="366" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">type, size, location, disposition</text>

  <!-- 5 WHO -->
  <line x1="450" y1="433" x2="502" y2="427" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="518" cy="427" r="13" fill="#1E66F5"/>
  <text x="518" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="540" y="423" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">WHO says so</text>
  <text x="540" y="442" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">signature, level, current cert, date</text>

  <!-- footer -->
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A complete record lets a stranger reconstruct the examination — and reach the same conclusion.</text>
</svg>
