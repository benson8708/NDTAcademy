<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Choosing the Method - A Field Decision Flow</text>

  <!-- start -->
  <rect x="40" y="54" width="300" height="40" rx="8" fill="#0A2342"/>
  <text x="190" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">START: spec, part, place in hand</text>
  <line x1="190" y1="94" x2="190" y2="102" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="184,100 190,110 196,100" fill="#5A6B7E"/>

  <!-- Q1 -->
  <rect x="40" y="112" width="300" height="56" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="190" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water, power, and a darkened</text>
  <text x="190" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">viewing area available?</text>
  <line x1="340" y1="140" x2="466" y2="140" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="466,134 476,140 466,146" fill="#5A6B7E"/>
  <text x="405" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">NO</text>
  <rect x="480" y="108" width="290" height="64" rx="8" fill="#F2A33C"/>
  <text x="625" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method C - usually Type II</text>
  <text x="625" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">aerosol kit - white light &#8805; 100 fc</text>

  <line x1="190" y1="168" x2="190" y2="188" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="184,186 190,196 196,186" fill="#5A6B7E"/>
  <text x="207" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">YES</text>

  <!-- Q2 -->
  <rect x="40" y="200" width="300" height="56" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="190" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fatigue-critical machined parts</text>
  <text x="190" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">needing level 3&#8211;4 sensitivity?</text>
  <line x1="340" y1="228" x2="466" y2="228" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="466,222 476,228 466,234" fill="#5A6B7E"/>
  <text x="405" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">YES</text>
  <rect x="480" y="196" width="290" height="64" rx="8" fill="#1B82E8"/>
  <text x="625" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Method D (or B) - Type I</text>
  <text x="625" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">hydrophilic PE line - tight control</text>

  <line x1="190" y1="256" x2="190" y2="276" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="184,274 190,284 196,274" fill="#5A6B7E"/>
  <text x="207" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">NO</text>

  <!-- Q3 -->
  <rect x="40" y="288" width="300" height="56" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="190" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">High volume, rough surfaces,</text>
  <text x="190" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">threads, or complex geometry?</text>
  <line x1="340" y1="316" x2="466" y2="316" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="466,310 476,316 466,322" fill="#5A6B7E"/>
  <text x="405" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">YES</text>
  <rect x="480" y="284" width="290" height="64" rx="8" fill="#1E9E6A"/>
  <text x="625" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Method A - Type I or II</text>
  <text x="625" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">water-washable line - watch the wash</text>

  <line x1="190" y1="344" x2="190" y2="364" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="184,362 190,372 196,362" fill="#5A6B7E"/>
  <text x="207" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">NO</text>

  <!-- local-check result -->
  <rect x="40" y="376" width="300" height="60" rx="8" fill="#F2A33C"/>
  <text x="190" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method C - solvent-removable</text>
  <text x="190" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">local checks - wipe, never flood</text>

  <!-- governing note -->
  <rect x="480" y="376" width="290" height="60" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="625" y="399" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">A guide, not a rule -</text>
  <text x="625" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">the written procedure governs</text>
</svg>
