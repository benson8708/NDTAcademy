<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Classify the Indication, Then Compare to the Limit</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Pattern: ASME BPVC Section VIII, Division 1, Mandatory Appendix 8 — the governing edition rules</text>

  <!-- Developed surface -->
  <rect x="36" y="74" width="420" height="320" fill="#9BC4FF" opacity="0.35"/>
  <rect x="36" y="74" width="420" height="320" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="48" y="96" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Developed surface (white developer film)</text>

  <!-- 1. Linear streak -->
  <ellipse cx="180" cy="132" rx="78" ry="5" fill="#0B1F3A"/>
  <line x1="262" y1="132" x2="476" y2="110" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- 2. Isolated rounded -->
  <circle cx="160" cy="212" r="15" fill="#0B1F3A"/>
  <line x1="178" y1="212" x2="476" y2="192" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- 3. Four aligned rounded -->
  <circle cx="120" cy="292" r="9" fill="#0B1F3A"/>
  <circle cx="152" cy="292" r="9" fill="#0B1F3A"/>
  <circle cx="184" cy="292" r="9" fill="#0B1F3A"/>
  <circle cx="216" cy="292" r="9" fill="#0B1F3A"/>
  <line x1="228" y1="292" x2="476" y2="274" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- 4. Tiny speck -->
  <circle cx="150" cy="356" r="4" fill="#0B1F3A"/>
  <line x1="157" y1="356" x2="476" y2="356" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- Right column labels -->
  <rect x="480" y="84" width="290" height="62" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="492" y="106" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">RELEVANT LINEAR — REJECT</text>
  <text x="492" y="124" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3/16 in. long × 1/32 in. wide → 6:1</text>
  <text x="492" y="141" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">linear (L &gt; 3W) — none permitted</text>

  <rect x="480" y="166" width="290" height="62" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="492" y="188" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">ROUNDED, ISOLATED — ACCEPT</text>
  <text x="492" y="206" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Ø 1/8 in. → L ≤ 3W, relevant</text>
  <text x="492" y="223" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rounded limit: reject only &gt; 3/16 in.</text>

  <rect x="480" y="248" width="290" height="62" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="492" y="270" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">ALIGNED ROUNDED — REJECT</text>
  <text x="492" y="288" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">4 or more in a line, spaced</text>
  <text x="492" y="305" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1/16 in. or less, edge to edge</text>

  <rect x="480" y="330" width="290" height="62" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="492" y="352" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">AT/BELOW 1/16 in. — NOT RELEVANT</text>
  <text x="492" y="370" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">major dimension 1/16 in. (1.5 mm) or less</text>
  <text x="492" y="387" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">record only if the procedure requires</text>

  <!-- Bottom band: the 3:1 test -->
  <rect x="36" y="408" width="734" height="82" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <text x="56" y="432" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">THE 3:1 TEST</text>
  <ellipse cx="88" cy="452" rx="32" ry="4" fill="#0B1F3A"/>
  <text x="132" y="457" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">length &gt; 3 × width → LINEAR</text>
  <circle cx="88" cy="476" r="8" fill="#0B1F3A"/>
  <text x="132" y="481" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">length ≤ 3 × width → ROUNDED</text>
  <line x1="420" y1="418" x2="420" y2="480" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="440" y="436" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Measure the indication, not the flaw beneath it —</text>
  <text x="440" y="456" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the indication's size is the basis for evaluation</text>
  <text x="440" y="476" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(it is usually larger than the discontinuity).</text>
</svg>
