<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Every Entry Traces to Objective Evidence</text>

  <!-- ===== center: the signed report ===== -->
  <rect x="290" y="210" width="220" height="84" rx="8" fill="#0B1F3A"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">SIGNED PT REPORT</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">No. PT-26-0288</text>

  <!-- ===== arrows (report entry -> evidence) ===== -->
  <!-- to top-left -->
  <line x1="312" y1="212" x2="220" y2="156" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="224,162 210,150 230,150" fill="#1E66F5"/>
  <!-- to top-right -->
  <line x1="488" y1="212" x2="580" y2="156" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="570,150 590,150 576,162" fill="#1E66F5"/>
  <!-- to mid-left -->
  <line x1="290" y1="252" x2="262" y2="252" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="264,245 248,252 264,259" fill="#1E66F5"/>
  <!-- to mid-right -->
  <line x1="510" y1="252" x2="538" y2="252" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="536,245 552,252 536,259" fill="#1E66F5"/>
  <!-- to bottom-left -->
  <line x1="312" y1="292" x2="220" y2="348" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="230,354 210,354 224,342" fill="#1E66F5"/>
  <!-- to bottom-right -->
  <line x1="488" y1="292" x2="580" y2="348" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="570,354 590,354 576,342" fill="#1E66F5"/>

  <!-- ===== satellite: procedure (top-left) ===== -->
  <rect x="36" y="70" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="36" y="70" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="156" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Procedure PT-OP-12 Rev C</text>
  <text x="156" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">controlled-document register:</text>
  <text x="156" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Rev C current on exam date</text>

  <!-- ===== satellite: batch (top-right) ===== -->
  <rect x="524" y="70" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="524" y="70" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="644" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Penetrant batch 19F22</text>
  <text x="644" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">batch certification +</text>
  <text x="644" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">QPL-AMS-2644 listing</text>

  <!-- ===== satellite: UV reading (mid-left) ===== -->
  <rect x="8" y="212" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="8" y="212" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="128" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">UV-A 1,450 &#181;W/cm&#178;</text>
  <text x="128" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">radiometer R-204</text>
  <text x="128" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">calibration record current</text>

  <!-- ===== satellite: daily check (mid-right) ===== -->
  <rect x="552" y="212" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="552" y="212" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="672" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Daily system check</text>
  <text x="672" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">process-control log: known-</text>
  <text x="672" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">defect panel passed that day</text>

  <!-- ===== satellite: inspector (bottom-left) ===== -->
  <rect x="36" y="354" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="36" y="354" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="156" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">J. Rivera — Level II PT</text>
  <text x="156" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">certification record per written</text>
  <text x="156" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">practice / NAS 410 — current</text>

  <!-- ===== satellite: NCR (bottom-right) ===== -->
  <rect x="524" y="354" width="240" height="80" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="524" y="354" width="240" height="80" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="644" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">REJECT — NCR 26-0412</text>
  <text x="644" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">nonconformance file:</text>
  <text x="644" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">part segregated, disposition open</text>

  <!-- footer -->
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The audit walk: pick a report at random, follow every arrow —</text>
  <text x="400" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">each entry must land on a record someone else can pull.</text>
</svg>
