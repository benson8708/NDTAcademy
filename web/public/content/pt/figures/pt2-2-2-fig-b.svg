<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Part and Site Conditions That Disqualify a Method</text>

  <!-- column header chips -->
  <rect x="394" y="60" width="122" height="44" rx="8" fill="#0B1F3A"/>
  <text x="455" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Method A</text>
  <text x="455" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">water-washable</text>

  <rect x="524" y="60" width="128" height="44" rx="8" fill="#0B1F3A"/>
  <text x="588" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Methods B / D</text>
  <text x="588" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">post-emulsifiable</text>

  <rect x="651" y="60" width="130" height="44" rx="8" fill="#0B1F3A"/>
  <text x="716" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Method C</text>
  <text x="716" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">solvent-removable</text>

  <!-- zebra rows -->
  <rect x="24" y="116" width="752" height="54" fill="#9BC4FF" fill-opacity="0.22"/>
  <rect x="24" y="224" width="752" height="54" fill="#9BC4FF" fill-opacity="0.22"/>
  <rect x="24" y="332" width="752" height="54" fill="#9BC4FF" fill-opacity="0.22"/>

  <!-- row separators -->
  <line x1="24" y1="116" x2="776" y2="116" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="170" x2="776" y2="170" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="224" x2="776" y2="224" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="278" x2="776" y2="278" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="332" x2="776" y2="332" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="386" x2="776" y2="386" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="24" y1="440" x2="776" y2="440" stroke="#9BC4FF" stroke-width="1"/>

  <!-- row labels -->
  <text x="36" y="148" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Broad, shallow discontinuities suspected</text>
  <text x="36" y="202" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Rough as-cast or grit-blasted surface</text>
  <text x="36" y="256" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Threads, keyways, blind holes</text>
  <text x="36" y="310" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Hundreds of small parts per shift</text>
  <text x="36" y="364" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Field site — no water, tanks, or drains</text>
  <text x="36" y="418" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Part outside 40–125 °F (4–52 °C) band</text>

  <!-- row 1: A=X, BD=ok, C=ok -->
  <line x1="446" y1="134" x2="464" y2="152" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="446" y1="152" x2="464" y2="134" stroke="#0B1F3A" stroke-width="3.5"/>
  <path d="M578,144 L585,151 L599,135" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <path d="M706,144 L713,151 L727,135" fill="none" stroke="#1E66F5" stroke-width="3.5"/>

  <!-- row 2: A=ok, BD=X, C=X -->
  <path d="M445,198 L452,205 L466,189" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <line x1="579" y1="188" x2="597" y2="206" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="206" x2="597" y2="188" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="188" x2="725" y2="206" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="206" x2="725" y2="188" stroke="#0B1F3A" stroke-width="3.5"/>

  <!-- row 3: A=ok, BD=X, C=X -->
  <path d="M445,252 L452,259 L466,243" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <line x1="579" y1="242" x2="597" y2="260" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="260" x2="597" y2="242" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="242" x2="725" y2="260" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="260" x2="725" y2="242" stroke="#0B1F3A" stroke-width="3.5"/>

  <!-- row 4: A=ok, BD=ok, C=X -->
  <path d="M445,306 L452,313 L466,297" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <path d="M578,306 L585,313 L599,297" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <line x1="707" y1="296" x2="725" y2="314" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="314" x2="725" y2="296" stroke="#0B1F3A" stroke-width="3.5"/>

  <!-- row 5: A=X, BD=X, C=ok -->
  <line x1="446" y1="350" x2="464" y2="368" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="446" y1="368" x2="464" y2="350" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="350" x2="597" y2="368" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="368" x2="597" y2="350" stroke="#0B1F3A" stroke-width="3.5"/>
  <path d="M706,360 L713,367 L727,351" fill="none" stroke="#1E66F5" stroke-width="3.5"/>

  <!-- row 6: A=X, BD=X, C=X -->
  <line x1="446" y1="404" x2="464" y2="422" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="446" y1="422" x2="464" y2="404" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="404" x2="597" y2="422" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="579" y1="422" x2="597" y2="404" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="404" x2="725" y2="422" stroke="#0B1F3A" stroke-width="3.5"/>
  <line x1="707" y1="422" x2="725" y2="404" stroke="#0B1F3A" stroke-width="3.5"/>

  <!-- legend -->
  <line x1="160" y1="456" x2="174" y2="470" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="160" y1="470" x2="174" y2="456" stroke="#0B1F3A" stroke-width="3"/>
  <text x="184" y="468" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">= disqualified / high risk</text>
  <path d="M420,463 L426,469 L438,455" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="448" y="468" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">= workable choice</text>

  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Outside the 40–125 °F band, examination proceeds only under a qualified nonstandard procedure (ASTM E1417).</text>
</svg>
