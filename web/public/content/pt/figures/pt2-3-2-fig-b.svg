<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Smeared Metal Seals the Crack — Etch Reopens It</text>

  <!-- panel 1 -->
  <rect x="25" y="64" width="235" height="372" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="142" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 — Smeared by surface work</text>
  <text x="142" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Plastic flow folds a lip of</text>
  <text x="142" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">metal over the crack mouth —</text>
  <text x="142" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">penetrant cannot enter</text>

  <!-- penetrant drop -->
  <path d="M 142 184 C 134 196 130 202 130 208 a 12 12 0 0 0 24 0 C 154 202 150 196 142 184 Z" fill="#1E66F5"/>
  <text x="178" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D64545">no entry</text>

  <!-- metal block -->
  <rect x="50" y="235" width="185" height="160" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="50" y1="235" x2="235" y2="235" stroke="#0B1F3A" stroke-width="3"/>
  <!-- crack (sealed) -->
  <path d="M 138 240 L 144 270 L 139 300 L 145 335 L 143 362 L 149 332 L 145 298 L 150 268 L 146 240 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- smear lip over the mouth -->
  <path d="M 118 235 Q 142 226 166 235 L 166 242 Q 142 234 118 242 Z" fill="#0B1F3A"/>
  <!-- blocked X -->
  <line x1="132" y1="248" x2="152" y2="262" stroke="#D64545" stroke-width="3"/>
  <line x1="152" y1="248" x2="132" y2="262" stroke="#D64545" stroke-width="3"/>
  <text x="142" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">crack sealed under smeared lip</text>

  <!-- panel 2 -->
  <rect x="283" y="64" width="235" height="372" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 — Controlled chemical etch</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Etch dissolves the smeared</text>
  <text x="400" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">layer; the etchant and amount</text>
  <text x="400" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">are set by the specification</text>

  <!-- etchant band -->
  <text x="400" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">etchant</text>
  <rect x="308" y="224" width="185" height="26" fill="#1E66F5" fill-opacity="0.3"/>
  <!-- old surface dashed -->
  <line x1="308" y1="235" x2="493" y2="235" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- metal block, lowered surface -->
  <rect x="308" y="251" width="185" height="144" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="308" y1="251" x2="493" y2="251" stroke="#0B1F3A" stroke-width="3"/>
  <!-- crack (open mouth) -->
  <path d="M 396 251 L 402 280 L 397 308 L 403 338 L 401 362 L 407 335 L 403 305 L 408 278 L 404 251 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">smeared layer removed — mouth open</text>

  <!-- panel 3 -->
  <rect x="541" y="64" width="235" height="372" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="658" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">3 — Entry restored</text>
  <text x="658" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Capillary entry works again —</text>
  <text x="658" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the flaw can hold penetrant</text>
  <text x="658" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and form an indication</text>

  <!-- penetrant drop entering -->
  <path d="M 658 178 C 650 190 646 196 646 202 a 12 12 0 0 0 24 0 C 670 196 666 190 658 178 Z" fill="#1E66F5"/>
  <line x1="658" y1="218" x2="658" y2="230" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="651,228 658,242 665,228" fill="#1E66F5"/>

  <!-- metal block -->
  <rect x="566" y="251" width="185" height="144" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="566" y1="251" x2="751" y2="251" stroke="#0B1F3A" stroke-width="3"/>
  <!-- bleed halo at the mouth -->
  <ellipse cx="658" cy="251" rx="18" ry="6" fill="#1E66F5" fill-opacity="0.35"/>
  <!-- crack filled with penetrant -->
  <path d="M 654 251 L 660 280 L 655 308 L 661 338 L 659 362 L 665 335 L 661 305 L 666 278 L 662 251 Z" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="658" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">penetrant fills the reopened flaw</text>

  <!-- bottom note -->
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">After etching: neutralize, rinse, and dry — acid and chromate residues degrade fluorescent dye.</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">High-strength steel may also need a hydrogen-relief bake; the specification governs.</text>
</svg>
