<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Seven-Station Penetrant Line</text>

  <!-- ====== top row ====== -->
  <!-- Station 1 -->
  <rect x="22" y="58" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="110" cy="82" r="15" fill="#1B82E8"/>
  <text x="110" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="110" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Pre-clean &amp; dry</text>
  <text x="110" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">etch after peening,</text>
  <text x="110" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">blasting, brushing</text>
  <text x="110" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">part 40–125 °F</text>

  <!-- Station 2 -->
  <rect x="216" y="58" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="304" cy="82" r="15" fill="#1B82E8"/>
  <text x="304" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="304" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Verify light &amp;</text>
  <text x="304" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">system check</text>
  <text x="304" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">UV ≥ 1,000 µW/cm²</text>
  <text x="304" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ambient ≤ 2 fc</text>
  <text x="304" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">panel check daily</text>

  <!-- Station 3 -->
  <rect x="410" y="58" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="498" cy="82" r="15" fill="#1B82E8"/>
  <text x="498" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="498" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Penetrant + dwell</text>
  <text x="498" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">cover all, keep wet</text>
  <text x="498" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dwell ≥ 10 min typ.</text>
  <text x="498" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">longer when cold</text>

  <!-- Station 4 (highlighted) -->
  <rect x="604" y="58" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#F2A33C" stroke-width="3"/>
  <circle cx="692" cy="82" r="15" fill="#F2A33C"/>
  <text x="692" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="692" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Remove excess</text>
  <text x="692" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coarse spray ≤ 40 psi</text>
  <text x="692" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">water 50–100 °F</text>
  <text x="692" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stop at background</text>

  <!-- ====== bottom row ====== -->
  <!-- Station 5 -->
  <rect x="604" y="246" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="692" cy="270" r="15" fill="#1B82E8"/>
  <text x="692" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="692" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Developer + dry</text>
  <text x="692" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">order by form</text>
  <text x="692" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">oven ≤ 160 °F part</text>
  <text x="692" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">thin, even film</text>

  <!-- Station 6 -->
  <rect x="410" y="246" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="498" cy="270" r="15" fill="#1B82E8"/>
  <text x="498" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="498" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Inspect &amp; evaluate</text>
  <text x="498" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">read in window</text>
  <text x="498" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">document findings</text>
  <text x="498" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">refer for evaluation</text>

  <!-- Station 7 -->
  <rect x="216" y="246" width="176" height="128" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="304" cy="270" r="15" fill="#1B82E8"/>
  <text x="304" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">7</text>
  <text x="304" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Postclean &amp; protect</text>
  <text x="304" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">mildest method</text>
  <text x="304" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dry thoroughly</text>
  <text x="304" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">inhibitor if required</text>

  <!-- Done box -->
  <rect x="22" y="246" width="176" height="128" rx="10" fill="#1E9E6A"/>
  <text x="110" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Part returned:</text>
  <text x="110" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">inspected,</text>
  <text x="110" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">documented,</text>
  <text x="110" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">clean, protected</text>

  <!-- arrows top row -->
  <line x1="198" y1="122" x2="208" y2="122" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="206,115 218,122 206,129" fill="#5A6B7E"/>
  <line x1="392" y1="122" x2="402" y2="122" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="400,115 412,122 400,129" fill="#5A6B7E"/>
  <line x1="586" y1="122" x2="596" y2="122" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="594,115 606,122 594,129" fill="#5A6B7E"/>
  <!-- arrow 4 down to 5 -->
  <line x1="692" y1="186" x2="692" y2="234" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="685,232 692,244 699,232" fill="#5A6B7E"/>
  <!-- arrows bottom row (right to left) -->
  <line x1="602" y1="310" x2="592" y2="310" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="594,303 582,310 594,317" fill="#5A6B7E"/>
  <line x1="408" y1="310" x2="398" y2="310" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="400,303 388,310 400,317" fill="#5A6B7E"/>
  <line x1="214" y1="310" x2="204" y2="310" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="206,303 194,310 206,317" fill="#5A6B7E"/>

  <!-- footer note -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Typical procedure values shown — your written procedure governs</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Station 4 is where most penetrant tests are won or lost</text>
</svg>
