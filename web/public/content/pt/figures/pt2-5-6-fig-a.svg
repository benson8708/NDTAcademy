<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Flash-Point Ladder: Where PT Materials Sit</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">NFPA 30 liquid classes by closed-cup flash point</text>

  <!-- ladder bands (0 deg F at y=430, 260 deg F at y=90) -->
  <rect x="170" y="90" width="90" height="78" fill="#9BC4FF" fill-opacity="0.35"/>
  <rect x="170" y="168" width="90" height="79" fill="#9BC4FF"/>
  <rect x="170" y="247" width="90" height="52" fill="#1E66F5"/>
  <rect x="170" y="299" width="90" height="131" fill="#D64545"/>
  <rect x="170" y="90" width="90" height="340" fill="none" stroke="#0B1F3A" stroke-width="2"/>

  <!-- temperature ticks -->
  <line x1="160" y1="90" x2="170" y2="90" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="160" y1="168" x2="170" y2="168" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="160" y1="247" x2="170" y2="247" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="160" y1="299" x2="170" y2="299" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="160" y1="430" x2="170" y2="430" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="154" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">260 &#176;F</text>
  <text x="154" y="173" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">200 &#176;F</text>
  <text x="154" y="252" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">140 &#176;F</text>
  <text x="154" y="304" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">100 &#176;F</text>
  <text x="154" y="435" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">0 &#176;F</text>

  <!-- class labels -->
  <text x="215" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">CLASS IIIB</text>
  <text x="215" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">CLASS IIIA</text>
  <text x="215" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">CLASS II</text>
  <text x="215" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">CLASS I</text>
  <text x="215" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">flammable</text>

  <!-- penetrant annotation (Class IIIB) -->
  <line x1="260" y1="129" x2="292" y2="129" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="300" y="114" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">AMS 2644-qualified penetrants</text>
  <text x="300" y="136" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">minimum flash point 200 &#176;F (93 &#176;C) &#8212; an open dip tank</text>
  <text x="300" y="156" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">at shop temperature sits far below its flash point</text>

  <!-- 120 F aerosol storage limit -->
  <line x1="170" y1="273" x2="292" y2="273" stroke="#D64545" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="300" y="268" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D64545">120 &#176;F (49 &#176;C) &#8212; aerosol can storage label limit</text>
  <text x="300" y="288" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">never on the dryer, never in a parked vehicle</text>

  <!-- shop temperature line -->
  <line x1="170" y1="339" x2="292" y2="339" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="300" y="344" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">shop temperature &#8776; 70 &#176;F</text>

  <!-- solvent annotation (Class I) -->
  <line x1="260" y1="396" x2="292" y2="396" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D64545">Solvent removers &amp; nonaqueous developer carriers</text>
  <text x="300" y="402" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">many flash below room temperature (Class I) &#8212; the</text>
  <text x="300" y="422" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">shop&#8217;s real fire risk lives in these cans, not the tank</text>

  <!-- definition strip -->
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Flash point &#8212; the lowest temperature at which a liquid gives off enough vapor to form an ignitable</text>
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">mixture with the air at its surface (closed-cup test). Below it, no ignitable vapor blanket forms.</text>
</svg>
