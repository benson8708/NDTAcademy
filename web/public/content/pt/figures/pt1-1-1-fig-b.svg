<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">What PT Can and Cannot Find</text>

  <!-- penetrant layer on the surface -->
  <rect x="80" y="172" width="640" height="14" fill="#D14343" opacity="0.85"/>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">Penetrant applied to the surface</text>
  <line x1="400" y1="128" x2="400" y2="168" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- metal block cross-section -->
  <rect x="80" y="186" width="640" height="180" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="108" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Part cross-section</text>

  <!-- 1: surface-breaking crack, filled with penetrant -->
  <polygon points="194,186 206,186 202,310 198,310" fill="#D14343" stroke="#0A2342" stroke-width="1"/>
  <line x1="200" y1="186" x2="200" y2="172" stroke="#D14343" stroke-width="6"/>
  <text x="200" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">FOUND</text>
  <text x="200" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crack open to the surface:</text>
  <text x="200" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrant enters and fills it</text>

  <!-- 2: subsurface pore, unreachable -->
  <circle cx="420" cy="280" r="24" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="3"/>
  <text x="420" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">air</text>
  <text x="420" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">MISSED</text>
  <text x="420" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Subsurface pore: no opening,</text>
  <text x="420" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">so no capillary entry</text>

  <!-- 3: crack smeared shut at the mouth -->
  <polygon points="616,196 626,196 623,320 619,320" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="604" y="186" width="36" height="10" fill="#5A6B7E"/>
  <text x="621" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">HIDDEN</text>
  <text x="621" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crack smeared shut by wire</text>
  <text x="621" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">brushing: entry is blocked</text>

  <!-- leader from smear bar -->
  <line x1="640" y1="191" x2="700" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="703" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">smeared metal</text>

  <!-- leader for pore depth note -->
  <line x1="420" y1="256" x2="420" y2="190" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="438" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sound metal seals it off</text>
</svg>
