<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Adequate Lighting: Visible vs. Fluorescent PT</text>
  <line x1="400" y1="60" x2="400" y2="395" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT: Type II visible -->
  <text x="200" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Type II &#8212; Visible Dye</text>
  <rect x="155" y="92" width="90" height="22" rx="6" fill="#D9E0E8"/>
  <polygon points="165,114 320,260 80,260" fill="#E8F1FB" opacity="0.22"/>
  <rect x="80" y="260" width="240" height="30" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 130 275 q 20 -7 40 0 q 20 7 40 0" fill="none" stroke="#D14343" stroke-width="3"/>
  <rect x="240" y="226" width="74" height="30" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="277" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">100 fc</text>
  <line x1="277" y1="256" x2="277" y2="268" stroke="#1B82E8" stroke-width="2"/>
  <text x="200" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">White light &#8805; 100 fc (&#8776; 1,000 lux)</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">at the examination surface</text>
  <text x="200" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">calibrated meter, at the part</text>

  <!-- RIGHT: Type I fluorescent -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Type I &#8212; Fluorescent</text>
  <rect x="555" y="92" width="90" height="22" rx="6" fill="#5A6B7E"/>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A</text>
  <polygon points="565,114 720,260 480,260" fill="#1B82E8" opacity="0.25"/>
  <rect x="480" y="260" width="240" height="30" fill="#0A2342" stroke="#5A6B7E" stroke-width="2"/>
  <ellipse cx="570" cy="275" rx="46" ry="11" fill="#1E9E6A" opacity="0.3"/>
  <path d="M 530 275 q 20 -7 40 0 q 20 7 40 0" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <rect x="640" y="226" width="74" height="30" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="677" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">UV meter</text>
  <line x1="677" y1="256" x2="677" y2="268" stroke="#1B82E8" stroke-width="2"/>
  <text x="600" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">UV-A &#8805; 1,000 &#181;W/cm&#178; at the surface</text>
  <text x="600" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">ambient white &#8804; 2 fc (&#8776; 20 lux)</text>
  <text x="600" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">dark-adapt several minutes</text>

  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Typical values &#8212; verify with calibrated meters before processing; your procedure governs.</text>
</svg>
