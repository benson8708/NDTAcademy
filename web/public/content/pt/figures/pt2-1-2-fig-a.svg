<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Process Flow by Method &#8212; Where Removal Control Lives</text>

  <!-- legend -->
  <rect x="110" y="46" width="14" height="14" fill="#1E66F5"/>
  <text x="130" y="58" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">solid blue = the removal control point that sets sensitivity</text>
  <rect x="560" y="46" width="14" height="14" fill="#0B1F3A"/>
  <text x="580" y="58" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">navy = penetrant + dwell</text>

  <!-- ===== Lane A (center y=112) ===== -->
  <text x="14" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method A</text>
  <rect x="110" y="86" width="130" height="52" rx="6" fill="#0B1F3A"/>
  <text x="175" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Penetrant</text>
  <text x="175" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">+ dwell</text>
  <line x1="240" y1="112" x2="266" y2="112" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="266,107 274,112 266,117" fill="#0B1F3A"/>
  <rect x="276" y="86" width="130" height="52" rx="6" fill="#1E66F5"/>
  <text x="341" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Water wash</text>
  <text x="341" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8804; 40 psi spray</text>
  <line x1="406" y1="112" x2="432" y2="112" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="432,107 440,112 432,117" fill="#0B1F3A"/>
  <rect x="442" y="86" width="130" height="52" rx="6" fill="#9BC4FF"/>
  <text x="507" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Dry &#8804; 160 &#176;F</text>
  <line x1="572" y1="112" x2="598" y2="112" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="598,107 606,112 598,117" fill="#0B1F3A"/>
  <rect x="608" y="86" width="130" height="52" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="673" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Developer</text>
  <text x="110" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">control: time, pressure, temperature &#8212; watch under proper lighting, stop at background removal</text>

  <!-- ===== Lane B (center y=202) ===== -->
  <text x="14" y="207" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method B</text>
  <rect x="110" y="176" width="118" height="52" rx="6" fill="#0B1F3A"/>
  <text x="169" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Penetrant</text>
  <text x="169" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">+ dwell</text>
  <line x1="228" y1="202" x2="242" y2="202" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="242,197 250,202 242,207" fill="#0B1F3A"/>
  <rect x="250" y="176" width="118" height="52" rx="6" fill="#1E66F5"/>
  <text x="309" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Lipophilic dip</text>
  <text x="309" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">&#8804; 3 min, timed</text>
  <line x1="368" y1="202" x2="382" y2="202" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="382,197 390,202 382,207" fill="#0B1F3A"/>
  <rect x="390" y="176" width="118" height="52" rx="6" fill="#9BC4FF"/>
  <text x="449" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Water rinse</text>
  <line x1="508" y1="202" x2="522" y2="202" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="522,197 530,202 522,207" fill="#0B1F3A"/>
  <rect x="530" y="176" width="118" height="52" rx="6" fill="#9BC4FF"/>
  <text x="589" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Dry</text>
  <line x1="648" y1="202" x2="662" y2="202" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="662,197 670,202 662,207" fill="#0B1F3A"/>
  <rect x="670" y="176" width="118" height="52" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="729" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Developer</text>
  <text x="110" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">control: emulsifier contact time &#8212; no agitation; drain orientation; the rinse stops the clock</text>

  <!-- ===== Lane C (center y=292) ===== -->
  <text x="14" y="297" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method C</text>
  <rect x="110" y="266" width="130" height="52" rx="6" fill="#0B1F3A"/>
  <text x="175" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Penetrant</text>
  <text x="175" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">+ dwell</text>
  <line x1="240" y1="292" x2="266" y2="292" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="266,287 274,292 266,297" fill="#0B1F3A"/>
  <rect x="276" y="266" width="130" height="52" rx="6" fill="#9BC4FF"/>
  <text x="341" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Dry wipe</text>
  <line x1="406" y1="292" x2="432" y2="292" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="432,287 440,292 432,297" fill="#0B1F3A"/>
  <rect x="442" y="266" width="130" height="52" rx="6" fill="#1E66F5"/>
  <text x="507" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Solvent-damp</text>
  <text x="507" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">wipe only</text>
  <line x1="572" y1="292" x2="598" y2="292" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="598,287 606,292 598,297" fill="#0B1F3A"/>
  <rect x="608" y="266" width="130" height="52" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="673" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Nonaqueous</text>
  <text x="673" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">developer</text>
  <text x="110" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">control: wipe discipline &#8212; solvent dampens the cloth, never the part</text>

  <!-- ===== Lane D (center y=382) ===== -->
  <text x="14" y="387" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method D</text>
  <rect x="110" y="356" width="98" height="52" rx="6" fill="#0B1F3A"/>
  <text x="159" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Penetrant</text>
  <text x="159" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">+ dwell</text>
  <line x1="208" y1="382" x2="216" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="216,377 224,382 216,387" fill="#0B1F3A"/>
  <rect x="226" y="356" width="98" height="52" rx="6" fill="#9BC4FF"/>
  <text x="275" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Pre-rinse</text>
  <line x1="324" y1="382" x2="332" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="332,377 340,382 332,387" fill="#0B1F3A"/>
  <rect x="342" y="356" width="98" height="52" rx="6" fill="#1E66F5"/>
  <text x="391" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Remover dip</text>
  <text x="391" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">5&#8211;35 %</text>
  <line x1="440" y1="382" x2="448" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="448,377 456,382 448,387" fill="#0B1F3A"/>
  <rect x="458" y="356" width="98" height="52" rx="6" fill="#9BC4FF"/>
  <text x="507" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Final rinse</text>
  <line x1="556" y1="382" x2="564" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="564,377 572,382 564,387" fill="#0B1F3A"/>
  <rect x="574" y="356" width="98" height="52" rx="6" fill="#9BC4FF"/>
  <text x="623" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Dry</text>
  <line x1="672" y1="382" x2="680" y2="382" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="680,377 688,382 680,387" fill="#0B1F3A"/>
  <rect x="690" y="356" width="98" height="52" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="739" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Developer</text>
  <text x="110" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">control: remover concentration and contact time (&#8804; 2 min typical) &#8212; the pre-rinse protects the bath</text>

  <!-- footnotes -->
  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Common to all four: preclean and dry before penetrant; development dwell, inspection, and postcleaning after.</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Typical limits shown &#8212; times, pressures, temperatures, and concentrations come from the written procedure.</text>
</svg>
