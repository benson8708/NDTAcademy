<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Fluorescent Booth: The Two Numbers That Must Pass</text>

  <!-- booth curtain at right -->
  <rect x="738" y="64" width="26" height="296" rx="4" fill="#5A6B7E"/>
  <text x="724" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">curtain sealed —</text>
  <text x="724" y="104" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">no white-light leaks</text>

  <!-- UV lamp -->
  <rect x="120" y="100" width="110" height="54" rx="8" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="228" y="108" width="10" height="38" rx="3" fill="#1B82E8"/>
  <text x="175" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A lamp</text>
  <text x="175" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">filter clean + intact;</text>
  <text x="175" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">warmed up + stabilized</text>

  <!-- beam -->
  <polygon points="238,112 238,142 630,296 470,296" fill="#1B82E8" opacity="0.22"/>

  <!-- working distance dimension -->
  <line x1="252" y1="136" x2="520" y2="282" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7 4"/>
  <polygon points="251,128 244,132 250,141" fill="#F2A33C"/>
  <polygon points="521,275 528,286 512,284" fill="#F2A33C"/>
  <text x="330" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">working distance — verify here</text>
  <text x="330" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">(commonly 15 in)</text>

  <!-- bench and part -->
  <rect x="380" y="330" width="350" height="16" rx="3" fill="#5A6B7E"/>
  <rect x="470" y="296" width="160" height="34" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="550" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">part</text>

  <!-- radiometer sensor and meter -->
  <circle cx="540" cy="290" r="10" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <path d="M 550 288 C 572 268 592 252 606 242" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="600" y="206" width="116" height="56" rx="6" fill="#E8F1FB"/>
  <text x="658" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1,050</text>
  <text x="658" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">µW/cm²</text>
  <text x="658" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">radiometer</text>
  <line x1="420" y1="262" x2="524" y2="284" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="320" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">sensor AT the surface,</text>
  <text x="320" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">facing the lamp</text>

  <!-- the two numbers -->
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">1) UV-A at the surface ≥ 1,000 µW/cm² (typical minimum)</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">2) Ambient white light ≤ 2 fc (≈ 20 lux), booth in real inspection state</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">clear UV-absorbing lenses — no photochromic — and several minutes of dark adaptation</text>
</svg>
