<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Capstone Cycle — Package to Signed Record</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Nozzle weld N-2 — ASME VIII, Div. 1 vessel — method: Section V, Art. 6 — acceptance: Mandatory Appendix 8</text>

  <!-- document inputs row -->
  <rect x="40" y="72" width="232" height="66" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="52" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">CONTRACT CHAIN</text>
  <text x="52" y="110" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">PO → VIII Div. 1 → App. 8</text>
  <text x="52" y="128" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">owns acceptance</text>

  <rect x="284" y="72" width="232" height="66" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="296" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">METHOD CHAIN</text>
  <text x="296" y="110" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ASME Section V, Article 6</text>
  <text x="296" y="128" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">owns the process</text>

  <rect x="528" y="72" width="232" height="66" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="540" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">WRITTEN PROCEDURE</text>
  <text x="540" y="110" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">PT-204 Rev C — L III approved</text>
  <text x="540" y="128" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Type II · Method C · form e</text>

  <!-- arrows from documents into cycle -->
  <line x1="156" y1="138" x2="156" y2="162" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="150,162 162,162 156,172" fill="#1E66F5"/>
  <line x1="400" y1="138" x2="400" y2="162" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="394,162 406,162 400,172" fill="#1E66F5"/>
  <line x1="644" y1="138" x2="644" y2="162" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="638,162 650,162 644,172" fill="#1E66F5"/>

  <!-- cycle row 1 -->
  <rect x="40" y="178" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="40" y="178" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="202" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">0 · VERIFY</text>
  <text x="56" y="224" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rev at bench = rev on file</text>
  <text x="56" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">materials in date, batches</text>
  <text x="56" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">logged · params in window</text>
  <text x="56" y="278" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100 fc verified by meter</text>

  <rect x="288" y="178" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="288" y="178" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="304" y="202" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1 · INTERPRET</text>
  <text x="304" y="224" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">every indication sorted:</text>
  <text x="304" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">false / nonrelevant /</text>
  <text x="304" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">relevant — confirm by</text>
  <text x="304" y="278" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wipe + redevelop</text>

  <rect x="536" y="178" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="536" y="178" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="552" y="202" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2 · MEASURE + CLASSIFY</text>
  <text x="552" y="224" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">size the indication at the</text>
  <text x="552" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">specified development time</text>
  <text x="552" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3:1 rule — linear vs</text>
  <text x="552" y="278" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rounded</text>

  <!-- arrows row1 -->
  <line x1="264" y1="231" x2="282" y2="231" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="282,225 282,237 292,231" fill="#0B1F3A"/>
  <line x1="512" y1="231" x2="530" y2="231" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="530,225 530,237 540,231" fill="#0B1F3A"/>

  <!-- arrow down from 2 to 3 -->
  <line x1="648" y1="284" x2="648" y2="312" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="642,312 654,312 648,322" fill="#0B1F3A"/>

  <!-- cycle row 2 -->
  <rect x="536" y="326" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="536" y="326" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="552" y="350" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3 · EVALUATE</text>
  <text x="552" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">compare to the flowed-down</text>
  <text x="552" y="390" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">criteria — the Appendix 8</text>
  <text x="552" y="408" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pattern, cited by edition</text>

  <rect x="288" y="326" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="288" y="326" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="304" y="350" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">4 · DISPOSITION</text>
  <text x="304" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">accept / reject —</text>
  <text x="304" y="390" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rejectable = defect →</text>
  <text x="304" y="408" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">quality system</text>

  <rect x="40" y="326" width="224" height="106" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="40" y="326" width="224" height="106" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="56" y="350" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">5 · DOCUMENT</text>
  <text x="56" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">log + map every indication</text>
  <text x="56" y="390" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">cite criteria · sign: name,</text>
  <text x="56" y="408" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Level II (PT), date</text>

  <!-- arrows row2 (right to left) -->
  <line x1="536" y1="379" x2="518" y2="379" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="518,373 518,385 508,379" fill="#0B1F3A"/>
  <line x1="288" y1="379" x2="270" y2="379" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="270,373 270,385 260,379" fill="#0B1F3A"/>

  <!-- bottom strip -->
  <rect x="40" y="446" width="720" height="42" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Repair is not a patch: a repaired area re-enters at Step 0 — full reprocess, evaluated to the same criteria.</text>
</svg>
