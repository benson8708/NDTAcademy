<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Overwashing — Method A's Built-In Failure Mode</text>

  <!-- panel chips -->
  <rect x="62" y="50" width="300" height="32" rx="8" fill="#1E66F5"/>
  <text x="212" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">CONTROLLED WASH</text>
  <rect x="438" y="50" width="300" height="32" rx="8" fill="#0B1F3A"/>
  <text x="588" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">OVERWASH</text>

  <!-- panel sublabels -->
  <text x="212" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">within limits, minimum time</text>
  <text x="588" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">too hard, too hot, too long</text>

  <!-- nozzles -->
  <rect x="190" y="110" width="44" height="16" rx="4" fill="#0B1F3A"/>
  <rect x="566" y="110" width="44" height="16" rx="4" fill="#0B1F3A"/>

  <!-- gentle spray, left -->
  <line x1="212" y1="128" x2="160" y2="262" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="212" y1="128" x2="212" y2="262" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="212" y1="128" x2="264" y2="262" stroke="#9BC4FF" stroke-width="3"/>

  <!-- aggressive spray, right -->
  <line x1="588" y1="128" x2="508" y2="262" stroke="#1E66F5" stroke-width="3"/>
  <line x1="588" y1="128" x2="548" y2="262" stroke="#1E66F5" stroke-width="3"/>
  <line x1="588" y1="128" x2="588" y2="262" stroke="#1E66F5" stroke-width="3"/>
  <line x1="588" y1="128" x2="628" y2="262" stroke="#1E66F5" stroke-width="3"/>
  <line x1="588" y1="128" x2="668" y2="262" stroke="#1E66F5" stroke-width="3"/>

  <!-- left part cross-section -->
  <rect x="72" y="268" width="280" height="100" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- deep tight crack, penetrant retained -->
  <polygon points="146,268 154,268 151,332 149,332" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- broad shallow flaw, penetrant still present but marginal -->
  <path d="M225,268 Q270,294 315,268 Z" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- right part cross-section -->
  <rect x="448" y="268" width="280" height="100" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- deep crack, partially stripped -->
  <polygon points="522,268 530,268 527,332 525,332" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="523.5,302 528.5,302 527,332 525,332" fill="#1E66F5"/>
  <!-- broad shallow flaw, stripped empty -->
  <path d="M601,268 Q646,294 691,268 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- left annotations -->
  <line x1="150" y1="334" x2="128" y2="382" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="76" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">deep, tight crack —</text>
  <text x="76" y="416" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">penetrant retained</text>
  <line x1="272" y1="296" x2="296" y2="382" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="232" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">broad shallow flaw —</text>
  <text x="232" y="416" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">retention marginal</text>

  <!-- right annotations -->
  <line x1="526" y1="334" x2="504" y2="382" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="452" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">even the deep crack</text>
  <text x="452" y="416" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">is losing penetrant</text>
  <line x1="648" y1="296" x2="672" y2="382" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="608" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">stripped clean —</text>
  <text x="608" y="416" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no indication forms</text>

  <!-- bottom takeaway -->
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Method A's emulsifier is blended into the penetrant — flaw contents stay water-removable.</text>
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Limits are the only protection: spray ≤ 40 psi (275 kPa), water 50–100 °F (10–38 °C), minimum time.</text>
</svg>
