<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Anatomy of a Written PT Procedure</text>

  <!-- Row 1: Foreword -->
  <rect x="48" y="56" width="336" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="81" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 — Foreword</text>
  <text x="60" y="102" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">scope &#8226; reference documents &#8226; precedence</text>
  <line x1="388" y1="86" x2="408" y2="86" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,80 408,92 418,86" fill="#1E66F5"/>
  <text x="426" y="91" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">Does this procedure apply to this job?</text>

  <!-- Row 2: Product -->
  <rect x="48" y="126" width="336" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="151" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 — Product</text>
  <text x="60" y="172" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">description or drawing &#8226; area to be tested</text>
  <line x1="388" y1="156" x2="408" y2="156" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,150 408,162 418,156" fill="#1E66F5"/>
  <text x="426" y="161" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">What hardware, what stage, what surfaces?</text>

  <!-- Row 3: Test conditions -->
  <rect x="48" y="196" width="336" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="221" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">3 — Test conditions</text>
  <text x="60" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">qualified materials &#8226; equipment &#8226; preparation</text>
  <line x1="388" y1="226" x2="408" y2="226" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,220 408,232 418,226" fill="#1E66F5"/>
  <text x="426" y="231" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">With what, and under what conditions?</text>

  <!-- Row 4: Detailed instructions (highlighted) -->
  <rect x="48" y="266" width="336" height="60" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="60" y="291" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4 — Detailed instructions</text>
  <text x="60" y="312" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">step windows &#8226; clocks &#8226; checks — the heart</text>
  <line x1="388" y1="296" x2="408" y2="296" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,290 408,302 418,296" fill="#1E66F5"/>
  <text x="426" y="301" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">Exactly how, step by step — no choices left?</text>

  <!-- Row 5: Recording and classifying -->
  <rect x="48" y="336" width="336" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="361" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">5 — Recording &amp; classifying</text>
  <text x="60" y="382" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">what to record &#8226; linear vs rounded &#8226; criteria</text>
  <line x1="388" y1="366" x2="408" y2="366" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,360 408,372 418,366" fill="#1E66F5"/>
  <text x="426" y="371" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">What do I do with what I find?</text>

  <!-- Row 6: Reporting -->
  <rect x="48" y="406" width="336" height="60" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="431" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">6 — Reporting</text>
  <text x="60" y="452" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">report content &#8226; signature &#8226; retention</text>
  <line x1="388" y1="436" x2="408" y2="436" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="408,430 408,442 418,436" fill="#1E66F5"/>
  <text x="426" y="441" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">How are results communicated and kept?</text>

  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">A certified PT Level III approves the document before first use — ASTM E1417.</text>
</svg>
