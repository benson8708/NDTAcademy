<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Capillary Rise: Tight Paths Pull Harder</text>

  <!-- LEFT: reservoir with three tubes -->
  <!-- liquid columns first, then tube walls over them -->
  <!-- wide tube column (small rise) -->
  <rect x="122" y="330" width="46" height="78" fill="#1B82E8"/>
  <!-- medium tube column -->
  <rect x="232" y="282" width="26" height="126" fill="#1B82E8"/>
  <!-- narrow tube column (high rise) -->
  <rect x="322" y="206" width="10" height="202" fill="#1B82E8"/>

  <!-- reservoir liquid -->
  <rect x="70" y="358" width="380" height="50" fill="#1B82E8" opacity="0.55"/>
  <line x1="70" y1="358" x2="450" y2="358" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="70" y="358" width="380" height="50" fill="none" stroke="#5A6B7E" stroke-width="2"/>

  <!-- tube walls -->
  <line x1="120" y1="180" x2="120" y2="408" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="170" y1="180" x2="170" y2="408" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="230" y1="180" x2="230" y2="408" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="260" y1="180" x2="260" y2="408" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="320" y1="180" x2="320" y2="408" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="334" y1="180" x2="334" y2="408" stroke="#E8F1FB" stroke-width="4"/>

  <!-- free level reference -->
  <line x1="70" y1="358" x2="470" y2="358" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="74" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">free liquid level</text>

  <!-- rise arrow beside narrow tube -->
  <line x1="368" y1="356" x2="368" y2="218" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="360,222 368,202 376,222" fill="#F2A33C"/>
  <text x="382" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">narrower gap,</text>
  <text x="382" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">stronger pull,</text>
  <text x="382" y="284" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">higher rise</text>

  <!-- tube size labels -->
  <text x="145" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">wide</text>
  <text x="245" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">medium</text>
  <text x="327" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">tight</text>

  <!-- RIGHT: crack as flattened capillary -->
  <text x="640" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">A crack is a flattened capillary</text>

  <!-- penetrant column between the plates (drawn first) -->
  <rect x="612" y="208" width="26" height="172" fill="#D14343"/>
  <path d="M 612 208 Q 625 196 638 208" fill="#D14343"/>
  <!-- penetrant pool at the crack mouth -->
  <rect x="540" y="380" width="200" height="28" fill="#D14343" opacity="0.85"/>

  <!-- crack walls (rough parallel plates) -->
  <rect x="586" y="140" width="26" height="240" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="638" y="140" width="26" height="240" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>

  <!-- pull arrow inside the gap -->
  <line x1="625" y1="372" x2="625" y2="252" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="617,256 625,236 633,256" fill="#F2A33C"/>

  <text x="640" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">the tighter the crack, the harder it loads with penetrant</text>
  <text x="753" y="166" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">crack walls</text>
  <line x1="700" y1="172" x2="660" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
</svg>
