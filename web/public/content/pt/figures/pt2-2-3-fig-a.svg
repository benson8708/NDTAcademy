<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Selecting the PT Technique — The Decision Path</text>

  <!-- Start box -->
  <rect x="100" y="44" width="260" height="42" rx="6" fill="#0B1F3A"/>
  <text x="230" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Define the job:</text>
  <text x="230" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">part, spec, flaw concern</text>
  <line x1="230" y1="86" x2="230" y2="90" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="224,90 236,90 230,96" fill="#0B1F3A"/>

  <!-- Decision 1: spec fixes the call -->
  <polygon points="230,96 350,126 230,156 110,126" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="230" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Spec fixes Type /</text>
  <text x="230" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Method / Level?</text>
  <text x="405" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">yes</text>
  <line x1="350" y1="126" x2="464" y2="126" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="464,120 464,132 472,126" fill="#0B1F3A"/>
  <rect x="480" y="102" width="290" height="48" rx="6" fill="#1E66F5"/>
  <text x="625" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Follow the specification —</text>
  <text x="625" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">that part of the call is closed</text>
  <text x="244" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">no</text>
  <line x1="230" y1="156" x2="230" y2="167" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="224,167 236,167 230,174" fill="#0B1F3A"/>

  <!-- Decision 2: viewing conditions -->
  <polygon points="230,174 350,204 230,234 110,204" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="230" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Darkened area and</text>
  <text x="230" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">UV-A available?</text>
  <text x="405" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">no</text>
  <line x1="350" y1="204" x2="464" y2="204" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="464,198 464,210 472,204" fill="#0B1F3A"/>
  <rect x="480" y="180" width="290" height="48" rx="6" fill="#1E66F5"/>
  <text x="625" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Type II visible dye —</text>
  <text x="625" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">white-light viewing, lower ceiling</text>
  <text x="244" y="247" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">yes — Type I fluorescent</text>
  <line x1="230" y1="234" x2="230" y2="245" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="224,245 236,245 230,252" fill="#0B1F3A"/>

  <!-- Decision 3: location -->
  <polygon points="230,252 350,282 230,312 110,282" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="230" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Field or spot job,</text>
  <text x="230" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no fixed line?</text>
  <text x="405" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">yes</text>
  <line x1="350" y1="282" x2="464" y2="282" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="464,276 464,288 472,282" fill="#0B1F3A"/>
  <rect x="480" y="258" width="290" height="48" rx="6" fill="#1E66F5"/>
  <text x="625" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Method C solvent-removable —</text>
  <text x="625" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">portable; form d / e developer</text>
  <text x="244" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">no — line processing</text>
  <line x1="230" y1="312" x2="230" y2="323" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="224,323 236,323 230,330" fill="#0B1F3A"/>

  <!-- Decision 4: removal control -->
  <polygon points="230,330 350,360 230,390 110,360" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="230" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Shallow, wide flaws</text>
  <text x="230" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">or max control?</text>
  <text x="405" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">yes</text>
  <line x1="350" y1="360" x2="464" y2="360" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="464,354 464,366 472,360" fill="#0B1F3A"/>
  <rect x="480" y="336" width="290" height="48" rx="6" fill="#1E66F5"/>
  <text x="625" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Method D postemulsifiable</text>
  <text x="625" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">(hydrophilic) — removal control</text>
  <text x="242" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">no</text>
  <line x1="230" y1="390" x2="230" y2="399" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="224,399 236,399 230,406" fill="#0B1F3A"/>

  <!-- Method A terminal -->
  <rect x="80" y="406" width="300" height="44" rx="6" fill="#1E66F5"/>
  <text x="230" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Method A water-washable —</text>
  <text x="230" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">speed, volume, rough surfaces</text>

  <!-- Finish-the-string note -->
  <rect x="420" y="406" width="350" height="44" rx="6" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="595" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Then finish the string: sensitivity level</text>
  <text x="595" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and developer form per spec and part</text>

  <!-- Bottom rule -->
  <rect x="80" y="462" width="690" height="32" rx="6" fill="#0B1F3A"/>
  <text x="425" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Record the decisive factor — a selection you cannot defend is not complete.</text>
</svg>
