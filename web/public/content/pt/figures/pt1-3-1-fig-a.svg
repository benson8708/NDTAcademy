<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">How Developer Draws Penetrant Out of a Crack</text>

  <!-- ================= Panel 1 ================= -->
  <!-- developer layer -->
  <rect x="25" y="186" width="230" height="24" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="55" cy="198" r="2" fill="#5A6B7E"/>
  <circle cx="95" cy="194" r="2" fill="#5A6B7E"/>
  <circle cx="175" cy="199" r="2" fill="#5A6B7E"/>
  <circle cx="215" cy="193" r="2" fill="#5A6B7E"/>
  <!-- metal block -->
  <rect x="25" y="210" width="230" height="130" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- crack filled with penetrant -->
  <polygon points="135,210 139,245 134,285 139,330 143,287 141,247 145,210" fill="#D14343"/>
  <!-- labels with leaders -->
  <line x1="60" y1="198" x2="48" y2="156" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="36" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer film</text>
  <line x1="140" y1="250" x2="190" y2="240" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="196" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Penetrant</text>
  <text x="196" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">in crack</text>
  <text x="44" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Metal</text>
  <text x="140" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1. Film applied</text>
  <text x="140" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Crack holds penetrant</text>

  <!-- ================= Panel 2 ================= -->
  <rect x="285" y="186" width="230" height="24" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="315" cy="198" r="2" fill="#5A6B7E"/>
  <circle cx="355" cy="194" r="2" fill="#5A6B7E"/>
  <circle cx="455" cy="199" r="2" fill="#5A6B7E"/>
  <circle cx="485" cy="193" r="2" fill="#5A6B7E"/>
  <rect x="285" y="210" width="230" height="130" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="395,210 399,245 394,285 399,330 403,287 401,247 405,210" fill="#D14343"/>
  <!-- small bleed-out at crack mouth -->
  <ellipse cx="400" cy="197" rx="16" ry="8" fill="#D14343" opacity="0.9"/>
  <!-- upward arrows -->
  <line x1="378" y1="232" x2="378" y2="202" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="372,204 378,190 384,204" fill="#F2A33C"/>
  <line x1="422" y1="232" x2="422" y2="202" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="416,204 422,190 428,204" fill="#F2A33C"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2. Capillary action reverses</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Bleed-out begins</text>

  <!-- ================= Panel 3 ================= -->
  <rect x="545" y="186" width="230" height="24" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="575" cy="198" r="2" fill="#5A6B7E"/>
  <circle cx="745" cy="194" r="2" fill="#5A6B7E"/>
  <rect x="545" y="210" width="230" height="130" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- crack mostly emptied -->
  <polygon points="655,210 659,245 654,285 659,330 663,287 661,247 665,210" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <polygon points="656,290 659,330 662,292" fill="#D14343"/>
  <!-- wide indication in developer layer -->
  <ellipse cx="660" cy="197" rx="62" ry="10" fill="#D14343" opacity="0.85"/>
  <ellipse cx="660" cy="197" rx="36" ry="9" fill="#D14343"/>
  <!-- width comparison callout -->
  <line x1="598" y1="170" x2="722" y2="170" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="598" y1="164" x2="598" y2="176" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="722" y1="164" x2="722" y2="176" stroke="#0A2342" stroke-width="1.5"/>
  <text x="660" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Indication far wider than flaw</text>
  <text x="660" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3. Indication grows</text>
  <text x="660" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Visible, magnified mark</text>

  <!-- time arrow -->
  <line x1="80" y1="414" x2="710" y2="414" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="710,407 726,414 710,421" fill="#F2A33C"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Development time — commonly at least 10 minutes (typical procedure value)</text>
</svg>
