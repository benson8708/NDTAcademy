<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">How Penetrant Testing Evolved</text>

  <!-- main timeline -->
  <line x1="60" y1="245" x2="724" y2="245" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="724,237 744,245 724,253" fill="#F2A33C"/>

  <!-- node 1: oil and whiting (label above) -->
  <circle cx="100" cy="245" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="100" y1="232" x2="100" y2="190" stroke="#5A6B7E" stroke-width="2"/>
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Late 1800s</text>
  <text x="100" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Oil and whiting</text>
  <text x="100" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">in railroad shops</text>

  <!-- node 2: MT displaces (label below) -->
  <circle cx="248" cy="245" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="248" y1="258" x2="248" y2="300" stroke="#5A6B7E" stroke-width="2"/>
  <text x="248" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Late 1920s</text>
  <text x="248" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Magnetic particle</text>
  <text x="248" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">takes over steel parts</text>

  <!-- node 3: fluorescent dyes (label above) -->
  <circle cx="396" cy="245" r="10" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="396" y1="232" x2="396" y2="190" stroke="#5A6B7E" stroke-width="2"/>
  <text x="396" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Early 1940s</text>
  <text x="396" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Fluorescent penetrants</text>
  <text x="396" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">for wartime aluminum</text>

  <!-- node 4: postwar refinement (label below) -->
  <circle cx="544" cy="245" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="544" y1="258" x2="544" y2="300" stroke="#5A6B7E" stroke-width="2"/>
  <text x="544" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1950s to 1970s</text>
  <text x="544" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Post-emulsifiable systems,</text>
  <text x="544" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">aerosols, hydrophilic removers</text>

  <!-- node 5: today (label above) -->
  <circle cx="692" cy="245" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="692" y1="232" x2="692" y2="190" stroke="#5A6B7E" stroke-width="2"/>
  <text x="692" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Today</text>
  <text x="692" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Classified types, methods,</text>
  <text x="692" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">sensitivity levels, QPLs</text>

  <!-- footer takeaway -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Same three moves since the railroad era: penetrate, remove, develop - each step refined for sensitivity and control</text>
</svg>
