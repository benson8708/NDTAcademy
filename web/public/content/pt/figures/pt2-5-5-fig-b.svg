<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatchEx" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#0B1F3A" stroke-width="2"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Product Section: Define the Area to Be Tested</text>

  <!-- part outline: machined fitting with lug -->
  <path d="M90,360 L90,230 L230,230 L230,120 L340,120 L340,230 L470,230 L470,360 Z" fill="#9BC4FF" fill-opacity="0.45" stroke="#1E66F5" stroke-width="3"/>

  <!-- lug attachment bore (included) -->
  <circle cx="285" cy="175" r="26" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- pressed bushing (excluded, hatched annulus) -->
  <circle cx="400" cy="295" r="34" fill="url(#hatchEx)" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="400" cy="295" r="18" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- TEST AREA label -->
  <text x="56" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">TEST AREA — all accessible</text>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">surfaces, 100 % coverage</text>
  <line x1="140" y1="110" x2="106" y2="226" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="100,228 112,230 104,218" fill="#1E66F5"/>

  <!-- attachment bore label -->
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">attachment bore —</text>
  <text x="40" y="180" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">included in the test area</text>
  <line x1="212" y1="173" x2="255" y2="175" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- bushing label -->
  <text x="235" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">pressed bushing — EXCLUDED</text>
  <text x="235" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">masked to prevent penetrant entrapment</text>
  <line x1="345" y1="394" x2="392" y2="332" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- product data block -->
  <rect x="540" y="110" width="230" height="160" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="540" y="110" width="230" height="36" fill="#0B1F3A"/>
  <text x="655" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">PRODUCT (per drawing)</text>
  <text x="552" y="170" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">P/N 7342-501 fitting</text>
  <text x="552" y="192" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Material: 7075-T73 aluminum</text>
  <text x="552" y="214" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Stage: after final machining</text>
  <text x="552" y="236" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and etch — before peen,</text>
  <text x="552" y="258" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">anodize, paint, or plating</text>

  <!-- why-exclusions note -->
  <rect x="540" y="300" width="230" height="104" fill="#9BC4FF" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="552" y="324" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Why exclusions are written:</text>
  <text x="552" y="346" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">an unmasked press fit traps</text>
  <text x="552" y="366" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">penetrant and bleeds false</text>
  <text x="552" y="386" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">indications for hours</text>

  <!-- legend -->
  <rect x="56" y="446" width="18" height="18" fill="#9BC4FF" fill-opacity="0.45" stroke="#1E66F5" stroke-width="2"/>
  <text x="82" y="460" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">area to be tested</text>
  <rect x="230" y="446" width="18" height="18" fill="url(#hatchEx)" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">excluded — masked</text>

  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">What hardware, what stage, which surfaces — with exclusions stated, never assumed.</text>
</svg>
