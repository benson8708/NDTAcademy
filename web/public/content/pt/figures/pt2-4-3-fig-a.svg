<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Sorting an Indication: The Classification Ladder</text>

  <!-- start box -->
  <rect x="300" y="48" width="200" height="32" rx="6" fill="#0B1F3A"/>
  <text x="400" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Indication observed</text>

  <!-- arrow start -> Q1 -->
  <line x1="400" y1="80" x2="400" y2="92" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,92 406,92 400,102" fill="#0B1F3A"/>

  <!-- Q1 -->
  <rect x="230" y="102" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Is the penetrant truly held by the part?</text>
  <text x="400" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">(it survives full reprocessing and redevelops)</text>

  <!-- No branch to FALSE -->
  <line x1="230" y1="130" x2="206" y2="130" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="210,124 210,136 200,130" fill="#0B1F3A"/>
  <text x="218" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">No</text>
  <rect x="22" y="88" width="178" height="88" rx="8" fill="#9BC4FF" fill-opacity="0.4" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="111" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">FALSE INDICATION</text>
  <text x="111" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">lint, residue, transfer —</text>
  <text x="111" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">not from the part</text>
  <text x="111" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">clean up / reprocess</text>

  <!-- Yes arrow Q1 -> Q2 -->
  <line x1="400" y1="158" x2="400" y2="188" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,188 406,188 400,198" fill="#0B1F3A"/>
  <text x="414" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">Yes — a true indication</text>

  <!-- Q2 -->
  <rect x="230" y="198" width="340" height="56" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Does it trace part geometry or design?</text>
  <text x="400" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">(press fit, keyway, spline, thread, braze edge)</text>

  <!-- Yes branch to NONRELEVANT -->
  <line x1="570" y1="226" x2="594" y2="226" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="590,220 590,232 600,226" fill="#0B1F3A"/>
  <text x="582" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">Yes</text>
  <rect x="602" y="182" width="176" height="88" rx="8" fill="#9BC4FF" fill-opacity="0.4" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="690" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">NONRELEVANT</text>
  <text x="690" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">true, but caused by</text>
  <text x="690" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">design configuration</text>
  <text x="690" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">verify + document</text>

  <!-- No arrow Q2 -> RELEVANT -->
  <line x1="400" y1="254" x2="400" y2="284" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,284 406,284 400,294" fill="#0B1F3A"/>
  <text x="414" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">No</text>

  <!-- RELEVANT -->
  <rect x="235" y="294" width="330" height="42" rx="8" fill="#1E66F5"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">RELEVANT — caused by a discontinuity</text>

  <!-- arrow RELEVANT -> EVALUATE -->
  <line x1="400" y1="336" x2="400" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,354 406,354 400,364" fill="#0B1F3A"/>

  <!-- EVALUATE -->
  <rect x="230" y="364" width="340" height="52" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">EVALUATE against acceptance criteria</text>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">indication size, shape, and location govern</text>

  <!-- split arrows -->
  <line x1="300" y1="416" x2="222" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="214,430 226,430 220,440" fill="#0B1F3A"/>
  <line x1="500" y1="416" x2="578" y2="430" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="574,430 586,430 580,440" fill="#0B1F3A"/>

  <!-- ACCEPT -->
  <rect x="130" y="440" width="180" height="44" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="220" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">ACCEPT</text>
  <text x="220" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">meets criteria — record it</text>

  <!-- REJECT -->
  <rect x="490" y="440" width="190" height="44" rx="8" fill="#0B1F3A"/>
  <text x="585" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">REJECT / REWORK</text>
  <text x="585" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">exceeds criteria — record it</text>
</svg>
