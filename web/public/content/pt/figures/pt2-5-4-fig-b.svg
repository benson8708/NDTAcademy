<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Developed Surface — Nozzle Weld N-2: Five Indications, Five Calls</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Type II visible dye · Method C solvent-removable · white light 100 fc minimum · reading window open</text>

  <!-- shell plate -->
  <rect x="40" y="66" width="520" height="370" fill="#9BC4FF" opacity="0.3"/>
  <rect x="40" y="66" width="520" height="370" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="52" y="424" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shell plate — developer film</text>

  <!-- reinforcing pad -->
  <circle cx="300" cy="258" r="148" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="380" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">reinforcing pad</text>

  <!-- attachment weld ring -->
  <circle cx="300" cy="258" r="92" fill="none" stroke="#9BC4FF" stroke-width="28" opacity="0.85"/>
  <circle cx="300" cy="258" r="106" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="300" cy="258" r="78" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="196" y="210" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">attachment weld</text>
  <line x1="200" y1="216" x2="217" y2="240" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- nozzle -->
  <circle cx="300" cy="258" r="64" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="300" cy="258" r="46" fill="#9BC4FF" opacity="0.25" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="300" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">nozzle bore</text>

  <!-- A: smear on shell plate -->
  <ellipse cx="118" cy="124" rx="24" ry="11" fill="#0B1F3A" opacity="0.5" transform="rotate(-15 118 124)"/>
  <ellipse cx="140" cy="132" rx="10" ry="5" fill="#0B1F3A" opacity="0.35" transform="rotate(-15 140 132)"/>
  <circle cx="86" cy="98" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="86" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A</text>
  <line x1="95" y1="106" x2="106" y2="115" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- B: line tracing the pad faying edge -->
  <path d="M 439 309 A 148 148 0 0 1 351 397" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <circle cx="455" cy="330" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="455" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B</text>
  <line x1="447" y1="337" x2="428" y2="351" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- C: sharp line at the weld toe, 3 o'clock -->
  <path d="M 404 236 L 410 247 L 406 257 L 414 268 L 410 279" fill="none" stroke="#0B1F3A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="450" cy="224" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="450" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C</text>
  <line x1="442" y1="231" x2="420" y2="243" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- D: rounded indication on the weld cap -->
  <circle cx="235" cy="322" r="8" fill="#0B1F3A"/>
  <circle cx="200" cy="298" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="200" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">D</text>
  <line x1="207" y1="305" x2="226" y2="316" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- E: pinpoint near top of the weld -->
  <circle cx="254" cy="175" r="3" fill="#0B1F3A"/>
  <circle cx="222" cy="150" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="222" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">E</text>
  <line x1="230" y1="157" x2="248" y2="170" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- observation cards -->
  <rect x="572" y="66" width="212" height="68" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="584" y="86" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A — smear on shell plate</text>
  <text x="584" y="105" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wipes off with solvent;</text>
  <text x="584" y="123" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">does not return</text>

  <rect x="572" y="142" width="212" height="68" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="584" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B — unbroken line tracing</text>
  <text x="584" y="181" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the pad faying edge,</text>
  <text x="584" y="199" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">exactly</text>

  <rect x="572" y="218" width="212" height="68" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="584" y="238" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C — sharp line, weld toe</text>
  <text x="584" y="257" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1/4 × 1/16 in. — returns</text>
  <text x="584" y="275" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">after wipe + redevelop</text>

  <rect x="572" y="294" width="212" height="68" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="584" y="314" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">D — round spot, weld cap</text>
  <text x="584" y="333" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1/8 in. across,</text>
  <text x="584" y="351" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">stands alone</text>

  <rect x="572" y="370" width="212" height="68" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="584" y="390" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">E — pinpoint, 1/32 in.</text>
  <text x="584" y="409" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at/below the 1/16 in.</text>
  <text x="584" y="427" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">relevance threshold</text>

  <!-- bottom strip -->
  <rect x="40" y="448" width="744" height="44" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <text x="56" y="467" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Interpret before you evaluate — sort false / nonrelevant / relevant first.</text>
  <text x="56" y="485" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Then measure relevant indications as they appear at the specified development time.</text>
</svg>
