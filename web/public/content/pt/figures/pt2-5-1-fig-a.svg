<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Where the Written Procedure Sits</text>

  <!-- Tier 1: contract / drawing -->
  <rect x="120" y="64" width="500" height="58" fill="#0B1F3A"/>
  <text x="370" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Contract / drawing / purchase order</text>
  <text x="370" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">invokes the method and the acceptance criteria</text>

  <line x1="370" y1="122" x2="370" y2="136" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="363,136 377,136 370,148" fill="#0B1F3A"/>

  <!-- Tier 2: industry practice -->
  <rect x="120" y="150" width="500" height="58" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="370" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Industry practice — ASTM E1417 / ASME V, Art. 6</text>
  <text x="370" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sets the minimum process requirements</text>

  <line x1="370" y1="208" x2="370" y2="222" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="363,222 377,222 370,234" fill="#0B1F3A"/>

  <!-- Tier 3: employer program -->
  <rect x="120" y="236" width="500" height="58" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="370" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Employer program — written practice, QPL materials</text>
  <text x="370" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">qualified personnel (NAS 410 / SNT-TC-1A), qualified chemicals</text>

  <line x1="370" y1="294" x2="370" y2="308" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="363,308 377,308 370,320" fill="#0B1F3A"/>

  <!-- Tier 4: written procedure (highlighted) -->
  <rect x="110" y="322" width="520" height="66" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="370" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">WRITTEN PT PROCEDURE</text>
  <text x="370" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">part-specific, Level III approved — what the inspector works to</text>

  <line x1="370" y1="388" x2="370" y2="402" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="363,402 377,402 370,414" fill="#0B1F3A"/>

  <!-- Tier 5: technique / record -->
  <rect x="120" y="416" width="500" height="54" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="370" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Technique / work instruction — inspection record</text>
  <text x="370" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">execution and evidence</text>

  <!-- compliance arrow (upward, right side) -->
  <line x1="700" y1="452" x2="700" y2="98" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="692,100 708,100 700,80" fill="#1E66F5"/>
  <text x="726" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A" transform="rotate(-90 726 275)">each tier complies with every tier above</text>

  <!-- bottom note -->
  <text x="370" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic" fill="#0B1F3A">You do not inspect "to E1417" — you inspect to a procedure that complies with it.</text>
</svg>
