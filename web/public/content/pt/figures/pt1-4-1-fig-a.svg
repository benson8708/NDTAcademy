<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">The PT Standards Family - Who Governs What</text>

  <!-- column headers -->
  <text x="210" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">GENERAL INDUSTRY / CODE WORK</text>
  <text x="595" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">AEROSPACE HERITAGE</text>

  <!-- E165 -->
  <rect x="85" y="76" width="250" height="54" rx="8" fill="#1B82E8"/>
  <text x="210" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">ASTM E165 / E165M</text>
  <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">All Types - Methods A, B, C, D</text>

  <!-- arrow E165 -> ASME -->
  <line x1="210" y1="130" x2="210" y2="164" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="203,162 210,174 217,162" fill="#0A2342"/>

  <!-- ASME -->
  <rect x="85" y="174" width="250" height="54" rx="8" fill="#0A2342"/>
  <text x="210" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">ASME Section V, Article 6</text>
  <text x="210" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">adopts E165 as SE-165</text>

  <!-- arrow ASME -> acceptance -->
  <line x1="210" y1="228" x2="210" y2="252" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="203,250 210,262 217,250" fill="#0A2342"/>

  <!-- acceptance criteria -->
  <rect x="60" y="262" width="300" height="56" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="210" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Accept / reject criteria come from</text>
  <text x="210" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the referencing code or contract</text>

  <!-- MIL heritage -->
  <rect x="480" y="76" width="230" height="40" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="595" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">MIL-STD-6866 - superseded</text>

  <!-- arrow MIL -> E1417 -->
  <line x1="595" y1="116" x2="595" y2="138" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="588,136 595,148 602,136" fill="#5A6B7E"/>

  <!-- E1417 -->
  <rect x="470" y="148" width="250" height="54" rx="8" fill="#1B82E8"/>
  <text x="595" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">ASTM E1417 / E1417M</text>
  <text x="595" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">aerospace process and controls</text>

  <!-- AMS 2644 feeding up into E1417 -->
  <rect x="470" y="246" width="250" height="54" rx="8" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="3"/>
  <text x="595" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Materials on the AMS 2644 QPL</text>
  <text x="595" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrants, removers, developers</text>
  <line x1="595" y1="246" x2="595" y2="214" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="588,216 595,204 602,216" fill="#1E9E6A"/>

  <!-- connector E165 -> process-specific band -->
  <line x1="335" y1="103" x2="400" y2="103" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="103" x2="400" y2="330" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="393,328 400,340 407,328" fill="#5A6B7E"/>

  <!-- process-specific band -->
  <text x="70" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Process-specific fluorescent practices</text>
  <text x="730" y="334" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">all Type I</text>
  <rect x="60" y="342" width="680" height="66" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>

  <rect x="72" y="354" width="210" height="42" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="177" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ASTM E1209</text>
  <text x="177" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Method A - water-wash.</text>

  <rect x="295" y="354" width="210" height="42" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="400" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ASTM E1208</text>
  <text x="400" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Method B - lipophilic PE</text>

  <rect x="518" y="354" width="210" height="42" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="623" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ASTM E1210</text>
  <text x="623" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Method D - hydrophilic PE</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ASTM E1219 is the companion practice for Method C - solvent-removable</text>
</svg>
