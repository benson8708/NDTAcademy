<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#E8F1FB">Pre-Shift Walkdown — Five Conditions to Judge</text>

  <!-- faint UV beam from lamp toward the part below -->
  <polygon points="110,150 190,150 220,300 100,300" fill="#1B82E8" opacity="0.13"/>

  <!-- REGION 1: UV-A lamp with cracked filter (x 50-280, y 64-204) -->
  <rect x="50" y="64" width="230" height="140" rx="8" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="88" y="84" width="150" height="50" rx="8" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <rect x="98" y="134" width="130" height="14" rx="4" fill="#1B82E8"/>
  <polyline points="104,141 126,136 144,146 166,137 188,145 212,138" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="165" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A lamp</text>
  <text x="165" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">hairline crack across filter</text>

  <!-- REGION 2: warm-up timer (x 540-750, y 64-184) -->
  <rect x="540" y="64" width="210" height="120" rx="8" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="560" y="84" width="170" height="56" rx="6" fill="#FFFFFF"/>
  <text x="645" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">ON 12:00</text>
  <text x="645" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">minutes</text>
  <text x="645" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">warm-up timer — mercury arc</text>

  <!-- REGION 3: radiometer at part surface (x 50-290, y 248-380) -->
  <rect x="50" y="248" width="240" height="132" rx="8" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="64" y="256" width="92" height="32" rx="5" fill="#1E9E6A"/>
  <text x="110" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">CAL OK</text>
  <rect x="170" y="256" width="112" height="46" rx="6" fill="#FFFFFF"/>
  <text x="226" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1,210</text>
  <text x="226" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">µW/cm²</text>
  <circle cx="130" cy="304" r="8" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="88" y="312" width="150" height="28" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="163" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">part</text>
  <rect x="64" y="340" width="210" height="10" rx="3" fill="#5A6B7E"/>
  <text x="170" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">radiometer at the part surface</text>

  <!-- REGION 4: ambient photometer + sealed curtain (x 518-752, y 248-370) -->
  <rect x="518" y="248" width="234" height="122" rx="8" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <rect x="536" y="258" width="116" height="50" rx="6" fill="#FFFFFF"/>
  <text x="594" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1.6 fc</text>
  <text x="594" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">ambient</text>
  <rect x="700" y="256" width="34" height="100" rx="4" fill="#5A6B7E"/>
  <line x1="711" y1="256" x2="711" y2="356" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="722" y1="256" x2="722" y2="356" stroke="#0A2342" stroke-width="1.5"/>
  <text x="610" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">ambient — curtain sealed</text>

  <!-- REGION 5: clear UV-absorbing glasses (x 290-510, y 394-480) -->
  <rect x="290" y="394" width="220" height="86" rx="8" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 5"/>
  <circle cx="362" cy="428" r="17" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <circle cx="408" cy="428" r="17" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <path d="M 379 428 Q 385 419 391 428" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="345" y1="428" x2="322" y2="419" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="425" y1="428" x2="448" y2="419" stroke="#E8F1FB" stroke-width="3"/>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">clear UV-absorbing lenses</text>
</svg>
