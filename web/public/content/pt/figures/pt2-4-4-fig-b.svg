<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0B1F3A">The Daily System Performance Check &#8212; PSM-Type Panel</text>

  <!-- PANEL -->
  <!-- chrome-plated band -->
  <rect x="30" y="96" width="440" height="140" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="250" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">chrome-plated band</text>

  <!-- five graded crack centers (largest to smallest) -->
  <g stroke="#0B1F3A" stroke-width="2.5" stroke-linecap="round">
    <!-- center 1, r=16 -->
    <line x1="69" y1="176" x2="101" y2="176"/>
    <line x1="85" y1="160" x2="85" y2="192"/>
    <line x1="74" y1="165" x2="96" y2="187"/>
    <line x1="74" y1="187" x2="96" y2="165"/>
    <!-- center 2, r=13 -->
    <line x1="155" y1="176" x2="181" y2="176"/>
    <line x1="168" y1="163" x2="168" y2="189"/>
    <line x1="159" y1="167" x2="177" y2="185"/>
    <line x1="159" y1="185" x2="177" y2="167"/>
    <!-- center 3, r=10 -->
    <line x1="241" y1="176" x2="261" y2="176"/>
    <line x1="251" y1="166" x2="251" y2="186"/>
    <line x1="244" y1="169" x2="258" y2="183"/>
    <line x1="244" y1="183" x2="258" y2="169"/>
    <!-- center 4, r=8 -->
    <line x1="326" y1="176" x2="342" y2="176"/>
    <line x1="334" y1="168" x2="334" y2="184"/>
    <line x1="328" y1="170" x2="340" y2="182"/>
    <line x1="328" y1="182" x2="340" y2="170"/>
    <!-- center 5, r=6 -->
    <line x1="409" y1="176" x2="421" y2="176"/>
    <line x1="415" y1="170" x2="415" y2="182"/>
    <line x1="411" y1="172" x2="419" y2="180"/>
    <line x1="411" y1="180" x2="419" y2="172"/>
  </g>
  <text x="85" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">1</text>
  <text x="168" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">2</text>
  <text x="251" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">3</text>
  <text x="334" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">4</text>
  <text x="415" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">5</text>

  <!-- grit-blasted strip -->
  <rect x="30" y="236" width="440" height="90" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <g fill="#1E66F5">
    <circle cx="46" cy="252" r="2"/><circle cx="64" cy="266" r="2"/><circle cx="80" cy="248" r="2"/><circle cx="96" cy="278" r="2"/>
    <circle cx="58" cy="292" r="2"/><circle cx="76" cy="308" r="2"/><circle cx="94" cy="296" r="2"/><circle cx="110" cy="258" r="2"/>
    <circle cx="118" cy="284" r="2"/><circle cx="126" cy="308" r="2"/><circle cx="134" cy="250" r="2"/><circle cx="142" cy="270" r="2"/>
    <circle cx="150" cy="296" r="2"/><circle cx="158" cy="314" r="2"/><circle cx="166" cy="256" r="2"/><circle cx="174" cy="282" r="2"/>
    <circle cx="182" cy="304" r="2"/><circle cx="190" cy="248" r="2"/><circle cx="198" cy="268" r="2"/><circle cx="206" cy="292" r="2"/>
    <circle cx="214" cy="312" r="2"/><circle cx="222" cy="254" r="2"/><circle cx="230" cy="276" r="2"/><circle cx="238" cy="300" r="2"/>
    <circle cx="246" cy="260" r="2"/><circle cx="252" cy="314" r="2"/><circle cx="40" cy="306" r="2"/><circle cx="52" cy="276" r="2"/>
    <circle cx="104" cy="312" r="2"/><circle cx="88" cy="262" r="2"/>
  </g>
  <text x="360" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">grit-blasted strip</text>
  <text x="360" y="300" text-anchor="middle" font-size="14" fill="#0B1F3A">washability &amp; background</text>

  <!-- under-panel note -->
  <text x="250" y="352" text-anchor="middle" font-size="14" fill="#0B1F3A">five crack centers, largest &#8594; smallest &#8212; compare what shows to baseline</text>

  <!-- PASS card -->
  <rect x="496" y="96" width="280" height="28" fill="#1E66F5"/>
  <text x="636" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">PASS &#8212; release the line</text>
  <rect x="496" y="124" width="280" height="84" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="636" y="148" text-anchor="middle" font-size="14" fill="#0B1F3A">all baseline centers visible</text>
  <text x="636" y="170" text-anchor="middle" font-size="14" fill="#0B1F3A">comparable brightness</text>
  <text x="636" y="192" text-anchor="middle" font-size="14" fill="#0B1F3A">background normal</text>

  <!-- FAIL card -->
  <rect x="496" y="224" width="280" height="28" fill="#0B1F3A"/>
  <text x="636" y="243" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">FAIL &#8212; stop the line</text>
  <rect x="496" y="252" width="280" height="108" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="636" y="276" text-anchor="middle" font-size="14" fill="#0B1F3A">any center missing or dim,</text>
  <text x="636" y="298" text-anchor="middle" font-size="14" fill="#0B1F3A">or background high &#8212;</text>
  <text x="636" y="320" text-anchor="middle" font-size="14" fill="#0B1F3A">fix and re-verify, then reexamine</text>
  <text x="636" y="342" text-anchor="middle" font-size="14" fill="#0B1F3A">parts back to the last pass</text>

  <!-- bottom note -->
  <rect x="30" y="400" width="746" height="80" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="403" y="432" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Process the panel exactly like a production part &#8212; same line, same times, same materials.</text>
  <text x="403" y="460" text-anchor="middle" font-size="14" fill="#0B1F3A">Clean it scrupulously after every use &#8212; penetrant left in the cracks is tomorrow's false PASS.</text>
</svg>
