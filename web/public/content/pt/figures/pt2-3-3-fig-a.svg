<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Factor Chain &#8212; Process Inputs to Indication Quality</text>

  <!-- ===== Box 1: Precleaning ===== -->
  <rect x="28" y="58" width="362" height="30" fill="#0B1F3A"/>
  <text x="40" y="79" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1 &#183; PRECLEANING</text>
  <rect x="28" y="88" width="362" height="112" fill="#9BC4FF" opacity="0.16"/>
  <rect x="28" y="88" width="362" height="112" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="40" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">The entry gate</text>
  <rect x="40" y="126" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="134" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Oil or water in the flaw blocks entry</text>
  <rect x="40" y="148" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Trapped cleaner dilutes the dye</text>
  <rect x="40" y="170" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="178" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Acid or chromate residue quenches dye</text>

  <!-- ===== Box 2: Penetrant used ===== -->
  <rect x="410" y="58" width="362" height="30" fill="#0B1F3A"/>
  <text x="422" y="79" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2 &#183; PENETRANT USED</text>
  <rect x="410" y="88" width="362" height="112" fill="#9BC4FF" opacity="0.16"/>
  <rect x="410" y="88" width="362" height="112" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="422" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">The brightness ceiling</text>
  <rect x="422" y="126" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="134" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Type I fluorescent vs Type II visible</text>
  <rect x="422" y="148" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Sensitivity level &#189;&#8211;4 per AMS 2644</text>
  <rect x="422" y="170" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="178" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Degraded or contaminated tank dims all</text>

  <!-- ===== Box 3: Prior processing ===== -->
  <rect x="28" y="212" width="362" height="30" fill="#0B1F3A"/>
  <text x="40" y="233" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3 &#183; PRIOR PROCESSING</text>
  <rect x="28" y="242" width="362" height="112" fill="#9BC4FF" opacity="0.16"/>
  <rect x="28" y="242" width="362" height="112" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="40" y="264" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Is the flaw still open?</text>
  <rect x="40" y="280" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="288" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Peening and blasting smear the mouth</text>
  <rect x="40" y="302" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Paint and plating bridge the opening</text>
  <rect x="40" y="324" width="8" height="8" fill="#1E66F5"/>
  <text x="54" y="332" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Old dye in the flaw plugs and quenches</text>

  <!-- ===== Box 4: Technique used ===== -->
  <rect x="410" y="212" width="362" height="30" fill="#0B1F3A"/>
  <text x="422" y="233" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4 &#183; TECHNIQUE USED</text>
  <rect x="410" y="242" width="362" height="112" fill="#9BC4FF" opacity="0.16"/>
  <rect x="410" y="242" width="362" height="112" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="422" y="264" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Keep the dye, then see it</text>
  <rect x="422" y="280" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="288" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Short dwell, wrong temperature band</text>
  <rect x="422" y="302" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Overwash strips broad, shallow flaws</text>
  <rect x="422" y="324" width="8" height="8" fill="#1E66F5"/>
  <text x="436" y="332" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Developer film thickness and lighting</text>

  <!-- ===== Collector arrow ===== -->
  <line x1="400" y1="360" x2="400" y2="382" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="392,382 408,382 400,394" fill="#1E66F5"/>
  <text x="30" y="390" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">INDICATION QUALITY</text>

  <!-- ===== Outcome bar ===== -->
  <rect x="30" y="400" width="246" height="42" fill="#1E66F5"/>
  <text x="153" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">BOLD &#183; BRIGHT &#183; DEFINED</text>
  <rect x="276" y="400" width="246" height="42" fill="#9BC4FF"/>
  <text x="399" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">DIM &#183; FRAGMENTED</text>
  <rect x="522" y="400" width="248" height="42" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="646" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">MISSING</text>

  <!-- ===== Bottom note ===== -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">The weakest factor sets the outcome &#8212; no later step recovers an earlier failure.</text>
  <text x="400" y="489" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">Developer cannot extract penetrant that never entered the flaw.</text>
</svg>
