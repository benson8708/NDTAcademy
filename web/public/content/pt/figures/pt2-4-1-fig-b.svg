<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Processing Cracks: Quench Cracks and Grinding Checks</text>

  <!-- ============ Panel 1: Quench crack ============ -->
  <rect x="12" y="52" width="378" height="380" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="28" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 — Quench crack (heat treat)</text>
  <text x="28" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">hardened shaft, end view</text>

  <!-- shaft end view -->
  <circle cx="200" cy="272" r="105" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- keyway cut into top -->
  <rect x="178" y="158" width="44" height="36" fill="#E8F1FB" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="178" y1="169" x2="178" y2="194" stroke="#0A2342" stroke-width="2"/>
  <line x1="222" y1="169" x2="222" y2="194" stroke="#0A2342" stroke-width="2"/>
  <line x1="178" y1="194" x2="222" y2="194" stroke="#0A2342" stroke-width="2"/>
  <text x="200" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">keyway</text>

  <!-- quench crack from keyway corner, ragged, with one branch -->
  <polyline points="178,194 168,212 174,228 162,246 168,262 154,280 160,296 148,312" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="162,246 152,252 156,266" fill="none" stroke="#D14343" stroke-width="2"/>

  <!-- stress-raiser callout -->
  <circle cx="178" cy="196" r="20" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="162" y1="186" x2="118" y2="152" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="28" y="130" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">sharp corner =</text>
  <text x="28" y="146" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">stress raiser</text>

  <line x1="158" y1="290" x2="248" y2="330" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="254" y="328" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">deep, open,</text>
  <text x="254" y="344" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">ragged path —</text>
  <text x="254" y="360" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">heavy, fast bleed</text>

  <text x="200" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">appears at or soon after quench —</text>
  <text x="200" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">PT is scheduled after heat treat</text>

  <!-- ============ Panel 2: Grinding cracks ============ -->
  <rect x="410" y="52" width="378" height="380" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="426" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 — Grinding cracks (abusive grinding)</text>
  <text x="426" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">hardened ground face, plan view</text>

  <!-- grinding direction arrow -->
  <line x1="450" y1="130" x2="620" y2="130" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="620,123 636,130 620,137" fill="#F2A33C"/>
  <text x="652" y="135" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">grinding direction</text>

  <!-- ground face -->
  <rect x="436" y="150" width="326" height="190" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- grind marks (horizontal) -->
  <line x1="440" y1="164" x2="758" y2="164" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="180" x2="758" y2="180" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="196" x2="758" y2="196" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="212" x2="758" y2="212" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="228" x2="758" y2="228" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="244" x2="758" y2="244" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="260" x2="758" y2="260" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="276" x2="758" y2="276" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="292" x2="758" y2="292" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="308" x2="758" y2="308" stroke="#5A6B7E" stroke-width="0.8"/>
  <line x1="440" y1="324" x2="758" y2="324" stroke="#5A6B7E" stroke-width="0.8"/>
  <!-- fine vertical cracks, perpendicular to grind marks -->
  <line x1="462" y1="170" x2="462" y2="206" stroke="#D14343" stroke-width="1.8"/>
  <line x1="486" y1="190" x2="486" y2="232" stroke="#D14343" stroke-width="1.8"/>
  <line x1="508" y1="160" x2="508" y2="198" stroke="#D14343" stroke-width="1.8"/>
  <line x1="530" y1="208" x2="530" y2="252" stroke="#D14343" stroke-width="1.8"/>
  <line x1="552" y1="172" x2="552" y2="214" stroke="#D14343" stroke-width="1.8"/>
  <line x1="574" y1="236" x2="574" y2="280" stroke="#D14343" stroke-width="1.8"/>
  <line x1="596" y1="184" x2="596" y2="226" stroke="#D14343" stroke-width="1.8"/>
  <line x1="500" y1="270" x2="500" y2="316" stroke="#D14343" stroke-width="1.8"/>
  <line x1="540" y1="288" x2="540" y2="330" stroke="#D14343" stroke-width="1.8"/>
  <line x1="468" y1="244" x2="468" y2="284" stroke="#D14343" stroke-width="1.8"/>
  <!-- crazing patch (network) -->
  <polyline points="648,210 668,214 686,206 706,214 724,208" fill="none" stroke="#D14343" stroke-width="1.6"/>
  <polyline points="652,248 672,242 692,250 712,244 730,250" fill="none" stroke="#D14343" stroke-width="1.6"/>
  <polyline points="650,286 670,280 690,288 710,282 728,288" fill="none" stroke="#D14343" stroke-width="1.6"/>
  <line x1="668" y1="214" x2="672" y2="242" stroke="#D14343" stroke-width="1.6"/>
  <line x1="706" y1="214" x2="712" y2="244" stroke="#D14343" stroke-width="1.6"/>
  <line x1="672" y1="242" x2="670" y2="280" stroke="#D14343" stroke-width="1.6"/>
  <line x1="692" y1="250" x2="690" y2="288" stroke="#D14343" stroke-width="1.6"/>
  <line x1="652" y1="248" x2="650" y2="286" stroke="#D14343" stroke-width="1.6"/>
  <line x1="730" y1="250" x2="728" y2="288" stroke="#D14343" stroke-width="1.6"/>

  <line x1="530" y1="230" x2="478" y2="358" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="436" y="376" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">fine, tight, shallow — at right</text>
  <text x="436" y="394" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">angles to grind marks</text>
  <line x1="690" y1="288" x2="700" y2="350" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="758" y="370" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">severe case: crazed network</text>

  <text x="599" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">tight and shallow — the faintest crack indications</text>

  <!-- shared takeaway -->
  <line x1="60" y1="452" x2="724" y2="452" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="724,445 740,452 724,459" fill="#F2A33C"/>
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Process signature: quench cracks start at part geometry — grinding checks follow the wheel</text>
</svg>
