<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0B1F3A">Process Control Points on the Penetrant Line</text>

  <!-- ROW 1 -->
  <!-- Box 1: PRECLEAN -->
  <rect x="28" y="64" width="168" height="30" fill="#0B1F3A"/>
  <text x="112" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">1 &#183; PRECLEAN</text>
  <rect x="28" y="94" width="168" height="74" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="112" y="122" text-anchor="middle" font-size="14" fill="#0B1F3A">clean and DRY surface</text>
  <text x="112" y="146" text-anchor="middle" font-size="14" fill="#0B1F3A">verify before penetrant</text>

  <!-- arrow 1-2 -->
  <line x1="198" y1="116" x2="212" y2="116" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="212,110 212,122 220,116" fill="#1E66F5"/>

  <!-- Box 2: PENETRANT -->
  <rect x="220" y="64" width="168" height="30" fill="#0B1F3A"/>
  <text x="304" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">2 &#183; PENETRANT</text>
  <rect x="220" y="94" width="168" height="74" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="304" y="122" text-anchor="middle" font-size="14" fill="#0B1F3A">part &amp; penetrant</text>
  <text x="304" y="146" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">40&#8211;125 &#176;F (4&#8211;52 &#176;C)</text>

  <!-- arrow 2-3 -->
  <line x1="390" y1="116" x2="404" y2="116" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="404,110 404,122 412,116" fill="#1E66F5"/>

  <!-- Box 3: DWELL -->
  <rect x="412" y="64" width="168" height="30" fill="#0B1F3A"/>
  <text x="496" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">3 &#183; DWELL</text>
  <rect x="412" y="94" width="168" height="74" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="496" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">minimum 10 min</text>
  <text x="496" y="146" text-anchor="middle" font-size="14" fill="#0B1F3A">film stays wet</text>

  <!-- arrow 3-4 -->
  <line x1="582" y1="116" x2="596" y2="116" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="596,110 596,122 604,116" fill="#1E66F5"/>

  <!-- Box 4: REMOVE -->
  <rect x="604" y="64" width="168" height="30" fill="#0B1F3A"/>
  <text x="688" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">4 &#183; REMOVE</text>
  <rect x="604" y="94" width="168" height="74" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="688" y="114" text-anchor="middle" font-size="14" fill="#0B1F3A">A: &#8804;40 psi &#183; 50&#8211;100 &#176;F</text>
  <text x="688" y="136" text-anchor="middle" font-size="14" fill="#0B1F3A">B: contact &#8804; 3 min</text>
  <text x="688" y="158" text-anchor="middle" font-size="14" fill="#0B1F3A">D: remover % weekly</text>

  <!-- elbow connector row1 -> row2 -->
  <path d="M 688 168 L 688 200 L 136 200 L 136 222" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="130,222 142,222 136,232" fill="#1E66F5"/>

  <!-- ROW 2 -->
  <!-- Box 5: DRY -->
  <rect x="24" y="232" width="224" height="30" fill="#0B1F3A"/>
  <text x="136" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">5 &#183; DRY</text>
  <rect x="24" y="262" width="224" height="86" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="136" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">part &#8804; 160 &#176;F (71 &#176;C)</text>
  <text x="136" y="318" text-anchor="middle" font-size="14" fill="#0B1F3A">minimum effective time</text>

  <!-- arrow 5-6 -->
  <line x1="250" y1="306" x2="276" y2="306" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="276,300 276,312 286,306" fill="#1E66F5"/>

  <!-- Box 6: DEVELOP -->
  <rect x="288" y="232" width="224" height="30" fill="#0B1F3A"/>
  <text x="400" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">6 &#183; DEVELOP</text>
  <rect x="288" y="262" width="224" height="86" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-size="14" fill="#0B1F3A">thin, even film</text>
  <text x="400" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">develop &#8805; 10 min</text>

  <!-- arrow 6-7 -->
  <line x1="514" y1="306" x2="540" y2="306" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="540,300 540,312 550,306" fill="#1E66F5"/>

  <!-- Box 7: INSPECT -->
  <rect x="552" y="232" width="224" height="30" fill="#0B1F3A"/>
  <text x="664" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">7 &#183; INSPECT</text>
  <rect x="552" y="262" width="224" height="86" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="664" y="286" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">UV-A &#8805; 1,000 &#181;W/cm&#178;</text>
  <text x="664" y="308" text-anchor="middle" font-size="14" fill="#0B1F3A">checked at 15 in (38 cm)</text>
  <text x="664" y="330" text-anchor="middle" font-size="14" fill="#0B1F3A">ambient &#8804; 2 fc &#183; adapt 1 min</text>

  <!-- bottom band: daily system performance check -->
  <rect x="24" y="384" width="752" height="92" rx="10" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-size="17" font-weight="bold" fill="#0B1F3A">DAILY SYSTEM PERFORMANCE CHECK &#8212; before any production part runs</text>
  <text x="400" y="446" text-anchor="middle" font-size="14" fill="#0B1F3A">a known-defect panel rides the complete line: pass = release &#183; fail = stop, fix, reexamine to last pass</text>
</svg>
