<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Post-Emulsifiable Removal: Method B vs. Method D</text>

  <!-- Lane B -->
  <text x="24" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Method B &#8212; lipophilic (oil-based)</text>
  <rect x="24" y="100" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="109" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Penetrant</text>
  <text x="109" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dwell complete</text>
  <line x1="194" y1="138" x2="206" y2="138" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="206,131 218,138 206,145" fill="#1B82E8"/>
  <rect x="218" y="100" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="303" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Emulsifier:</text>
  <text x="303" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dip or flow on &#8212;</text>
  <text x="303" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no agitation</text>
  <line x1="388" y1="138" x2="400" y2="138" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="400,131 412,138 400,145" fill="#1B82E8"/>
  <rect x="412" y="100" width="170" height="76" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="497" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Timed contact</text>
  <text x="497" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stopwatch-critical:</text>
  <text x="497" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">it diffuses deeper</text>
  <line x1="582" y1="138" x2="594" y2="138" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="594,131 606,138 594,145" fill="#1B82E8"/>
  <rect x="606" y="100" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="691" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water rinse</text>
  <text x="691" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stops the action</text>
  <text x="24" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Control = contact time. Too long, and the emulsifier reaches flaw-entrapped penetrant.</text>

  <!-- Lane D -->
  <text x="24" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Method D &#8212; hydrophilic (water-based)</text>
  <rect x="24" y="276" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="109" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Penetrant</text>
  <text x="109" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dwell complete</text>
  <line x1="194" y1="314" x2="206" y2="314" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="206,307 218,314 206,321" fill="#1B82E8"/>
  <rect x="218" y="276" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="303" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water pre-rinse</text>
  <text x="303" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">removes bulk</text>
  <text x="303" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrant</text>
  <line x1="388" y1="314" x2="400" y2="314" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="400,307 412,314 400,321" fill="#1B82E8"/>
  <rect x="412" y="276" width="170" height="76" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="497" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Emulsifier dip</text>
  <text x="497" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">5&#8211;35% typical</text>
  <text x="497" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(spray &#8804; 5%)</text>
  <line x1="582" y1="314" x2="594" y2="314" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="594,307 606,314 594,321" fill="#1B82E8"/>
  <rect x="606" y="276" width="170" height="76" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="691" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Final water</text>
  <text x="691" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rinse</text>
  <text x="24" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Control = concentration &amp; time. Bath checked with a refractometer &#8212; the high-sensitivity choice.</text>

  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Typical procedure values &#8212; the written procedure governs.</text>
</svg>
