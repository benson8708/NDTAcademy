<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Removal at the Crack - Why Technique Sets Sensitivity</text>

  <!-- ===== Panel 1: controlled wash ===== -->
  <rect x="20" y="50" width="232" height="300" rx="8" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="136" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Controlled wash (Method A)</text>
  <rect x="44" y="170" width="184" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="44" y1="170" x2="129" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="143" y1="170" x2="228" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 129 170 L 134 256 L 138 256 L 143 170 Z" fill="#1E9E6A" stroke="#0A2342" stroke-width="1"/>
  <circle cx="60" cy="108" r="7" fill="#1B82E8"/>
  <line x1="66" y1="114" x2="102" y2="164" stroke="#1B82E8" stroke-width="2"/>
  <line x1="70" y1="110" x2="116" y2="163" stroke="#1B82E8" stroke-width="2"/>
  <line x1="74" y1="106" x2="130" y2="162" stroke="#1B82E8" stroke-width="2"/>
  <line x1="152" y1="160" x2="196" y2="146" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="195,141 206,143 198,151" fill="#1E9E6A"/>
  <text x="150" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">entrapment</text>
  <line x1="139" y1="230" x2="148" y2="237" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="136" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Spray at an angle, stop at</text>
  <text x="136" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">background - entrapment stays.</text>

  <!-- ===== Panel 2: over-wash ===== -->
  <rect x="284" y="50" width="232" height="300" rx="8" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Over-wash (the PT sin)</text>
  <rect x="308" y="170" width="184" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="308" y1="170" x2="393" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="407" y1="170" x2="492" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 393 170 L 398 256 L 402 256 L 407 170 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="1"/>
  <path d="M 397.5 240 L 399 256 L 401 256 L 402.5 240 Z" fill="#1E9E6A"/>
  <line x1="360" y1="100" x2="396" y2="166" stroke="#1B82E8" stroke-width="7"/>
  <line x1="372" y1="96" x2="404" y2="164" stroke="#1B82E8" stroke-width="4"/>
  <line x1="416" y1="160" x2="462" y2="132" stroke="#1E9E6A" stroke-width="2"/>
  <polygon points="460,127 472,128 463,137" fill="#1E9E6A"/>
  <circle cx="430" cy="150" r="3" fill="#1E9E6A"/>
  <circle cx="444" cy="142" r="3" fill="#1E9E6A"/>
  <line x1="376" y1="196" x2="424" y2="236" stroke="#D14343" stroke-width="5"/>
  <line x1="424" y1="196" x2="376" y2="236" stroke="#D14343" stroke-width="5"/>
  <text x="400" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Too much pressure, heat, or</text>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">time - the indication is gone.</text>

  <!-- ===== Panel 3: hydrophilic removal ===== -->
  <rect x="548" y="50" width="232" height="300" rx="8" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="664" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Hydrophilic removal (D)</text>
  <rect x="572" y="170" width="184" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="572" y="158" width="184" height="12" fill="#F2A33C"/>
  <line x1="572" y1="170" x2="657" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="671" y1="170" x2="756" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 657 170 L 662 256 L 666 256 L 671 170 Z" fill="#1E9E6A" stroke="#0A2342" stroke-width="1"/>
  <path d="M 596 150 q 18 -12 36 0" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="627,144 636,151 625,153" fill="#F2A33C"/>
  <path d="M 688 150 q 18 -12 36 0" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="719,144 728,151 717,153" fill="#F2A33C"/>
  <text x="664" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">remover acts here only</text>
  <line x1="664" y1="134" x2="664" y2="154" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="664" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Detergent scrubs the surface</text>
  <text x="664" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">film - the flaw keeps its penetrant.</text>

  <!-- key strip -->
  <rect x="20" y="366" width="760" height="64" rx="8" fill="#E8F1FB"/>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Suspect over-wash? Re-clean, dry, and reprocess from the penetrant step.</text>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Never wash harder to clean up background - shallow, broad flaws go first.</text>
</svg>
