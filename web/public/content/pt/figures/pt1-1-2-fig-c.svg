<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">One Force, Two Directions</text>

  <!-- PANEL 1: dwell -->
  <text x="150" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1. Penetrant dwell</text>
  <!-- penetrant layer -->
  <rect x="60" y="196" width="180" height="14" fill="#D14343"/>
  <!-- block -->
  <rect x="60" y="210" width="180" height="120" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- crack filled with penetrant -->
  <polygon points="145,210 155,210 152,304 148,304" fill="#D14343" stroke="#0A2342" stroke-width="0.8"/>
  <!-- capillary pull arrow -->
  <line x1="186" y1="222" x2="186" y2="282" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="178,278 186,298 194,278" fill="#F2A33C"/>
  <text x="150" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Capillary pull draws the</text>
  <text x="150" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">liquid in and fills the crack</text>

  <!-- arrow 1 -> 2 -->
  <line x1="252" y1="268" x2="292" y2="268" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="292,260 308,268 292,276" fill="#F2A33C"/>

  <!-- PANEL 2: after removal -->
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">2. After removal</text>
  <!-- block, no surface layer -->
  <rect x="310" y="210" width="180" height="120" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- crack still charged -->
  <polygon points="395,210 405,210 402,304 398,304" fill="#D14343" stroke="#0A2342" stroke-width="0.8"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">surface looks clean</text>
  <line x1="400" y1="196" x2="400" y2="208" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Excess is removed - the same</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">grip holds the flaw's charge</text>

  <!-- arrow 2 -> 3 -->
  <line x1="502" y1="268" x2="542" y2="268" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="542,260 558,268 542,276" fill="#F2A33C"/>

  <!-- PANEL 3: development -->
  <text x="650" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">3. Developer applied</text>
  <!-- developer layer -->
  <rect x="560" y="192" width="180" height="18" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="578" cy="201" r="1.6" fill="#5A6B7E"/>
  <circle cx="596" cy="205" r="1.6" fill="#5A6B7E"/>
  <circle cx="700" cy="200" r="1.6" fill="#5A6B7E"/>
  <circle cx="718" cy="204" r="1.6" fill="#5A6B7E"/>
  <circle cx="586" cy="197" r="1.6" fill="#5A6B7E"/>
  <circle cx="710" cy="196" r="1.6" fill="#5A6B7E"/>
  <!-- bleed-out blob spreading in the developer -->
  <ellipse cx="650" cy="201" rx="36" ry="9" fill="#D14343" opacity="0.92"/>
  <!-- block -->
  <rect x="560" y="210" width="180" height="120" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- crack, draining upward -->
  <polygon points="645,210 655,210 652,304 648,304" fill="#D14343" stroke="#0A2342" stroke-width="0.8"/>
  <!-- bleed-out arrow -->
  <line x1="686" y1="290" x2="686" y2="232" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="678,236 686,216 694,236" fill="#F2A33C"/>
  <text x="650" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">indication far wider than the flaw</text>
  <line x1="650" y1="172" x2="650" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="650" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">The powder blots penetrant out</text>
  <text x="650" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and spreads it into a visible mark</text>

  <!-- footer -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Capillary action loads the flaw, holds the charge, then writes the indication.</text>
</svg>
