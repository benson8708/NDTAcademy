<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Fluorescent Penetrant Line — Station Layout (Type I, Method A)</text>

  <!-- Row 1 station boxes -->
  <rect x="22" y="62" width="168" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="40" cy="78" r="13" fill="#1B82E8"/>
  <text x="40" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="106" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Preclean + dry</text>
  <text x="106" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">soils out, flaws open</text>
  <text x="106" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">surface dry</text>

  <rect x="212" y="62" width="168" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="230" cy="78" r="13" fill="#1B82E8"/>
  <text x="230" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="296" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Penetrant tank</text>
  <text x="296" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dip or spray</text>
  <text x="296" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">40–125 °F band</text>

  <rect x="402" y="62" width="168" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="420" cy="78" r="13" fill="#1B82E8"/>
  <text x="420" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="486" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Drain + dwell rack</text>
  <text x="486" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dwell ≥ 10 min (typ.)</text>
  <text x="486" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">drains back to tank</text>

  <rect x="592" y="62" width="168" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="610" cy="78" r="13" fill="#1B82E8"/>
  <text x="610" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="676" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Wash station</text>
  <text x="676" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">coarse spray ≤ 40 psi</text>
  <text x="676" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">UV-A monitor overhead</text>

  <!-- Row 1 arrows -->
  <line x1="191" y1="105" x2="205" y2="105" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="205,99 213,105 205,111" fill="#1B82E8"/>
  <line x1="381" y1="105" x2="395" y2="105" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="395,99 403,105 395,111" fill="#1B82E8"/>
  <line x1="571" y1="105" x2="585" y2="105" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="585,99 593,105 585,111" fill="#1B82E8"/>

  <!-- Down arrow from wash to dryer -->
  <line x1="676" y1="148" x2="676" y2="240" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="668,240 684,240 676,254" fill="#1B82E8"/>

  <!-- Aqueous developer option note -->
  <rect x="22" y="180" width="420" height="50" rx="8" fill="none" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="232" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Aqueous developer (forms b/c): dip parts WET,</text>
  <text x="232" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">straight from the rinse — BEFORE the dryer</text>
  <line x1="446" y1="205" x2="664" y2="205" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7 4"/>
  <polygon points="664,199 674,205 664,211" fill="#F2A33C"/>

  <!-- Row 2 station boxes (flow right to left) -->
  <rect x="592" y="254" width="168" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="610" cy="270" r="13" fill="#1B82E8"/>
  <text x="610" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="676" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Dryer oven</text>
  <text x="676" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">recirculating hot air</text>
  <text x="676" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">part ≤ 160 °F (typ.)</text>

  <rect x="362" y="254" width="190" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="380" cy="270" r="13" fill="#1B82E8"/>
  <text x="380" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="457" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Dry developer cabinet</text>
  <text x="457" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">thin, even dust coat</text>
  <text x="457" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">develop ≥ 10 min (typ.)</text>

  <rect x="92" y="254" width="230" height="86" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <circle cx="110" cy="270" r="13" fill="#F2A33C"/>
  <text x="110" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">7</text>
  <text x="207" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Inspection booth</text>
  <text x="207" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">UV-A ≥ 1,000 µW/cm² at part</text>
  <text x="207" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">ambient white ≤ 2 fc</text>

  <!-- Row 2 arrows (right to left) -->
  <line x1="590" y1="297" x2="562" y2="297" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="562,291 554,297 562,303" fill="#1B82E8"/>
  <line x1="360" y1="297" x2="332" y2="297" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="332,291 324,297 332,303" fill="#1B82E8"/>

  <!-- Bottom notes -->
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Method B and D lines insert emulsifier stations (and a pre-rinse for hydrophilic)</text>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">between the drain rack and the final wash.</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Typical procedure values shown — your written procedure governs.</text>
</svg>
