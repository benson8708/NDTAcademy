<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Applying Penetrant: Spray, Brush, and Immersion</text>

  <!-- Panel 1: spray -->
  <text x="136" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Spray</text>
  <rect x="58" y="124" width="44" height="92" rx="8" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="70" y="106" width="20" height="18" rx="3" fill="#5A6B7E"/>
  <circle cx="96" cy="112" r="3" fill="#0A2342"/>
  <circle cx="118" cy="128" r="3" fill="#D14343"/>
  <circle cx="136" cy="148" r="3.5" fill="#D14343"/>
  <circle cx="152" cy="170" r="3" fill="#D14343"/>
  <circle cx="128" cy="176" r="3" fill="#D14343"/>
  <circle cx="168" cy="192" r="3.5" fill="#D14343"/>
  <circle cx="146" cy="206" r="3" fill="#D14343"/>
  <circle cx="184" cy="214" r="3" fill="#D14343"/>
  <circle cx="166" cy="228" r="3" fill="#D14343"/>
  <circle cx="196" cy="236" r="3.5" fill="#D14343"/>
  <rect x="116" y="248" width="124" height="8" fill="#D14343"/>
  <rect x="116" y="256" width="124" height="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="136" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Aerosol: local tests, field work</text>
  <text x="136" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">electrostatic: even coat, less waste</text>

  <!-- Panel 2: brush -->
  <text x="392" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Brush / swab</text>
  <line x1="346" y1="116" x2="388" y2="178" stroke="#5A6B7E" stroke-width="9"/>
  <rect x="380" y="172" width="26" height="14" fill="#0A2342" transform="rotate(34 393 179)"/>
  <polygon points="388,184 414,200 400,226 380,210" fill="#0A2342"/>
  <rect x="352" y="240" width="90" height="8" fill="#D14343"/>
  <path d="M 352 240 q 11 -10 22 0 q 11 -10 22 0 q 11 -10 22 0 q 11 -10 24 0" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="306" y="248" width="180" height="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="392" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Small zones &#8212; one weld seam</text>
  <text x="392" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dye only where you want it</text>

  <!-- Panel 3: immersion -->
  <text x="648" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Immersion (dip)</text>
  <rect x="540" y="200" width="120" height="84" fill="none" stroke="#0A2342" stroke-width="3"/>
  <rect x="544" y="216" width="112" height="64" fill="#D14343" opacity="0.85"/>
  <rect x="574" y="228" width="52" height="32" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="600" y1="228" x2="600" y2="160" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="652" y1="170" x2="694" y2="170" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="694,164 708,170 694,176" fill="#0A2342"/>
  <rect x="688" y="206" width="52" height="30" fill="#D9E0E8" stroke="#0A2342" stroke-width="2" transform="rotate(18 714 221)"/>
  <circle cx="712" cy="256" r="3" fill="#D14343"/>
  <circle cx="722" cy="270" r="3" fill="#D14343"/>
  <line x1="676" y1="284" x2="760" y2="284" stroke="#5A6B7E" stroke-width="3"/>
  <text x="716" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">drain dwell</text>
  <text x="648" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Batches: dip, then rack to drain</text>
  <text x="648" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">no pooling &#8212; position to drain</text>

  <line x1="60" y1="362" x2="740" y2="362" stroke="#D9E0E8" stroke-width="2"/>
  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Cover the area of interest plus a band &#8212; keep the film wet for the whole dwell.</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Part, penetrant, and surface within 40&#8211;125 &#176;F (typical) at application.</text>
</svg>
