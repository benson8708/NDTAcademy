<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Capillary Action: In During Dwell, Out During Development</text>

  <!-- PANEL 1: wetting -->
  <text x="145" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">1 · Wetting is the gate</text>

  <!-- good wetting drop -->
  <path d="M 60 178 Q 145 134 230 178 Z" fill="#1E66F5"/>
  <line x1="60" y1="178" x2="120" y2="160" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="45" y="178" width="200" height="10" fill="#0B1F3A"/>
  <text x="145" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">contact angle near 0°:</text>
  <text x="145" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">spreads, creeps, enters openings</text>

  <!-- non-wetting bead -->
  <circle cx="145" cy="276" r="25" fill="#9BC4FF"/>
  <rect x="45" y="299" width="200" height="10" fill="#0B1F3A"/>
  <text x="145" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">above 90°: beads up, stays out</text>

  <!-- PANEL 2: dwell, entry -->
  <text x="402" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">2 · Dwell — the pull inward</text>

  <rect x="300" y="104" width="205" height="16" fill="#1E66F5"/>
  <text x="310" y="116" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">penetrant</text>
  <rect x="300" y="120" width="205" height="145" fill="#0B1F3A"/>
  <!-- crack, partly filled from the top -->
  <polygon points="396,120 408,120 403,240 401,240" fill="#FFFFFF"/>
  <polygon points="397,120 407,120 403.6,196 400.4,196" fill="#1E66F5"/>
  <!-- entry arrow -->
  <line x1="430" y1="135" x2="430" y2="185" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="424,183 436,183 430,200" fill="#9BC4FF"/>
  <text x="318" y="252" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">part</text>

  <text x="402" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#0B1F3A">pressure ∝ 1 ÷ gap width</text>
  <text x="402" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">tighter crack — stronger pull</text>
  <text x="402" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">enters in any orientation —</text>
  <text x="402" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">gravity is negligible at flaw scale</text>

  <!-- PANEL 3: development, bleed-out -->
  <text x="657" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">3 · Development — the blot</text>

  <rect x="555" y="104" width="205" height="16" fill="#9BC4FF"/>
  <ellipse cx="657" cy="112" rx="42" ry="8" fill="#1E66F5"/>
  <text x="560" y="98" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">developer film</text>
  <rect x="555" y="120" width="205" height="145" fill="#0B1F3A"/>
  <!-- crack draining upward: dye left in the lower half -->
  <polygon points="651,120 663,120 658,240 656,240" fill="#FFFFFF"/>
  <polygon points="654.2,180 660.2,180 658,240 656,240" fill="#1E66F5"/>
  <!-- bleed-out arrow -->
  <line x1="690" y1="200" x2="690" y2="150" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="684,152 696,152 690,135" fill="#9BC4FF"/>

  <text x="657" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">finer pores in the film</text>
  <text x="657" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">reverse the capillary gradient</text>
  <text x="657" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">bleed-out spreads the dye far</text>
  <text x="657" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">wider than the flaw that fed it</text>

  <!-- takeaway band -->
  <rect x="60" y="420" width="680" height="58" rx="8" fill="#0B1F3A"/>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Same force both ways: in during dwell, back out during development.</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Flaw width sets the strength of the pull — viscosity only sets the pace.</text>
</svg>
