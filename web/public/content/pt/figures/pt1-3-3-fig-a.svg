<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">What Leftover Residue Does</text>

  <!-- ============ Left panel: corrosion ============ -->
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Corrosion cell under residue</text>

  <!-- humid air arrows -->
  <text x="210" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Humid air</text>
  <line x1="170" y1="106" x2="170" y2="140" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="164,138 170,152 176,138" fill="#1B82E8"/>
  <line x1="210" y1="106" x2="210" y2="136" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="204,134 210,148 216,134" fill="#1B82E8"/>
  <line x1="250" y1="106" x2="250" y2="140" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="244,138 250,152 256,138" fill="#1B82E8"/>

  <!-- steel block -->
  <rect x="40" y="200" width="340" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- residue dome -->
  <path d="M140,200 Q210,158 280,200 Z" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="182" cy="190" r="2" fill="#5A6B7E"/>
  <circle cx="210" cy="180" r="2" fill="#5A6B7E"/>
  <circle cx="240" cy="190" r="2" fill="#5A6B7E"/>
  <line x1="252" y1="178" x2="304" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="310" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer</text>
  <text x="310" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">residue</text>
  <!-- corrosion pit -->
  <polygon points="194,200 226,200 219,224 205,231 191,217" fill="#D14343"/>
  <line x1="210" y1="234" x2="210" y2="256" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pitting starts under the patch</text>
  <text x="56" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel part</text>

  <!-- ============ Right panel: coating failure ============ -->
  <text x="590" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Coating failure over residue</text>

  <text x="590" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Coating blisters and peels</text>
  <line x1="590" y1="108" x2="590" y2="138" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- steel block -->
  <rect x="420" y="200" width="340" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- residue film -->
  <rect x="470" y="192" width="200" height="8" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <!-- paint layer with blister -->
  <path d="M420,186 L470,186 Q570,108 670,186 L760,186" fill="none" stroke="#1E9E6A" stroke-width="7"/>
  <line x1="500" y1="220" x2="540" y2="244" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="546" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Trapped penetrant oil</text>
  <text x="546" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and developer dust</text>
  <text x="436" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel part</text>

  <!-- bottom caution strip -->
  <rect x="30" y="344" width="740" height="76" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Sulfur and halogen residues attack nickel alloys, stainless steel, and titanium at temperature.</text>
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Oily residue is a fire hazard in oxygen service — clean and verify per the written procedure.</text>
</svg>
