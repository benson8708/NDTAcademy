<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Time to Appear: Bleed-Out vs Development Time</text>

  <!-- axes -->
  <line x1="90" y1="70" x2="90" y2="390" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="90" y1="390" x2="732" y2="390" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="84,74 96,74 90,60" fill="#0B1F3A"/>
  <polygon points="732,384 732,396 746,390" fill="#0B1F3A"/>
  <text x="104" y="70" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">indication size / brightness</text>
  <text x="410" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">development time (minutes)</text>

  <!-- x ticks -->
  <line x1="90" y1="390" x2="90" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="303" y1="390" x2="303" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="516" y1="390" x2="516" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="729" y1="390" x2="729" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <text x="90" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <text x="303" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">5</text>
  <text x="516" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10</text>
  <text x="729" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">15</text>

  <!-- 10-minute reference line -->
  <line x1="516" y1="78" x2="516" y2="390" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="524" y="96" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E">10 min — typical minimum</text>
  <text x="524" y="114" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">(procedure sets min and max)</text>

  <!-- curves -->
  <path d="M 90 388 C 100 250, 112 170, 150 150 C 230 128, 420 122, 729 112" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <path d="M 90 388 C 180 378, 270 345, 360 300 C 470 245, 610 205, 729 178" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <path d="M 90 388 C 120 352, 160 338, 220 334 C 380 330, 560 338, 729 346" fill="none" stroke="#9BC4FF" stroke-width="3.5"/>

  <!-- curve annotations -->
  <text x="310" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">blooms at once — wide mouth, big volume</text>
  <text x="378" y="268" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">tight, deep crack — keeps building</text>
  <text x="240" y="364" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5A6B7E">flashes faint, stalls, may fade</text>

  <!-- legend -->
  <line x1="100" y1="452" x2="140" y2="452" stroke="#0B1F3A" stroke-width="4"/>
  <text x="148" y="457" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">open volume (gross porosity)</text>
  <line x1="360" y1="452" x2="400" y2="452" stroke="#1E66F5" stroke-width="4"/>
  <text x="408" y="457" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tight, deep crack</text>
  <line x1="560" y1="452" x2="600" y2="452" stroke="#9BC4FF" stroke-width="4"/>
  <text x="608" y="457" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shallow scratch / residue</text>

  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Schematic — actual times vary with penetrant system, developer form, and flaw geometry; read inside your procedure's window</text>
</svg>
