<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Portable PT Kit — Type II, Method C (Solvent-Removable)</text>

  <!-- Can 1: cleaner/remover -->
  <rect x="86" y="86" width="12" height="12" fill="#D9E0E8"/>
  <rect x="72" y="98" width="40" height="20" rx="4" fill="#D9E0E8"/>
  <rect x="44" y="118" width="96" height="180" rx="10" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="92" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="92" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">CLEANER /</text>
  <text x="92" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">REMOVER</text>
  <text x="92" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">pre-clean, then</text>
  <text x="92" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">dampened-cloth wipe</text>

  <!-- Can 2: penetrant -->
  <rect x="226" y="86" width="12" height="12" fill="#D9E0E8"/>
  <rect x="212" y="98" width="40" height="20" rx="4" fill="#D9E0E8"/>
  <rect x="184" y="118" width="96" height="180" rx="10" fill="#D14343" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="232" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="232" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">PENETRANT</text>
  <text x="232" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">(visible red)</text>
  <text x="232" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">apply and dwell</text>
  <text x="232" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">≥ 10 min (typ.)</text>

  <!-- Can 3: developer -->
  <rect x="366" y="86" width="12" height="12" fill="#D9E0E8"/>
  <rect x="352" y="98" width="40" height="20" rx="4" fill="#D9E0E8"/>
  <rect x="324" y="118" width="96" height="180" rx="10" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="372" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0A2342">3</text>
  <text x="372" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">DEVELOPER</text>
  <text x="372" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(nonaqueous)</text>
  <text x="372" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">light, even coat;</text>
  <text x="372" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">develop ≥ 10 min (typ.)</text>

  <!-- Accessories column -->
  <rect x="478" y="108" width="120" height="24" rx="3" fill="#E8F1FB"/>
  <rect x="488" y="120" width="120" height="24" rx="3" fill="#D9E0E8"/>
  <text x="630" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Lint-free cloths</text>
  <text x="630" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">dry wipe, then dampened</text>

  <rect x="478" y="184" width="84" height="12" rx="4" fill="#F2A33C"/>
  <rect x="562" y="178" width="28" height="24" rx="3" fill="#D9E0E8"/>
  <text x="630" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Brush for stubborn soil</text>

  <rect x="500" y="236" width="10" height="46" rx="5" fill="#D9E0E8"/>
  <circle cx="505" cy="290" r="11" fill="#D14343"/>
  <text x="630" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Contact thermometer</text>
  <text x="630" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">40–125 °F band (typ.)</text>

  <rect x="478" y="318" width="64" height="40" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1.5"/>
  <circle cx="560" cy="338" r="13" fill="#E8F1FB"/>
  <line x1="542" y1="338" x2="547" y2="338" stroke="#D9E0E8" stroke-width="2"/>
  <text x="630" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">White-light meter</text>
  <text x="630" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">prove ≥ 100 fc at surface</text>

  <!-- Field fluorescent option -->
  <rect x="60" y="386" width="680" height="50" rx="8" fill="none" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="400" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Field fluorescent option: swap in Type I, Method C penetrant, add a battery</text>
  <text x="400" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">UV-A lamp and a shaded viewing area — same three-can sequence.</text>
</svg>
