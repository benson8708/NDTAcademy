<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">UV-A Intensity Falls With Distance — Verify Where You Inspect</text>

  <!-- lamp -->
  <rect x="40" y="150" width="70" height="44" rx="6" fill="#5A6B7E"/>
  <rect x="108" y="156" width="8" height="32" rx="2" fill="#1B82E8"/>
  <text x="75" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">same lamp</text>

  <!-- beam cone -->
  <polygon points="116,156 116,188 760,330 760,70" fill="#1B82E8" opacity="0.08"/>

  <!-- minimum line -->
  <line x1="170" y1="180" x2="760" y2="180" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="756" y="170" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1,000 µW/cm² typical minimum</text>

  <!-- bars -->
  <rect x="238" y="150" width="44" height="180" fill="#1E9E6A"/>
  <text x="260" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">≈ 1,200 µW/cm²</text>
  <text x="260" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">PASS</text>

  <rect x="438" y="238" width="44" height="92" fill="#D14343"/>
  <text x="460" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">≈ 610 µW/cm²</text>
  <text x="460" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">FAIL</text>

  <rect x="638" y="285" width="44" height="45" fill="#D14343"/>
  <text x="660" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">≈ 300 µW/cm²</text>
  <text x="660" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">FAIL</text>

  <!-- falloff curve through bar tops -->
  <path d="M 200 118 C 230 130 245 142 260 150 C 330 176 400 215 460 238 C 530 262 590 275 660 285" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="5 4"/>

  <!-- baseline and sensors -->
  <line x1="40" y1="330" x2="760" y2="330" stroke="#D9E0E8" stroke-width="3"/>
  <circle cx="260" cy="339" r="9" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="460" cy="339" r="9" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="660" cy="339" r="9" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="260" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">15 in</text>
  <text x="460" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">21 in</text>
  <text x="660" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">30 in</text>
  <text x="755" y="352" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sensor at surface →</text>

  <!-- bottom notes -->
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Intensity drops roughly with the SQUARE of distance.</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Take the radiometer reading at the distance you actually inspect — typical procedure values shown.</text>
</svg>
