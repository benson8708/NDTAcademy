<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Three Flaws, Three Verdicts — Why Methods Can Disagree</text>

  <!-- Flaw labels above the cross-section -->
  <text x="250" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">A — open surface crack</text>
  <text x="250" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">clean, open mouth</text>
  <line x1="250" y1="102" x2="250" y2="116" stroke="#9BC4FF" stroke-width="2"/>
  <text x="480" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">B — crack sealed at surface</text>
  <text x="480" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">smeared or peened shut</text>
  <line x1="480" y1="102" x2="480" y2="116" stroke="#9BC4FF" stroke-width="2"/>
  <text x="680" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">C — subsurface void</text>
  <text x="680" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">no surface opening</text>
  <line x1="680" y1="102" x2="680" y2="116" stroke="#9BC4FF" stroke-width="2"/>

  <!-- Part cross-section -->
  <rect x="40" y="120" width="720" height="120" fill="#9BC4FF" fill-opacity="0.30" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="40" y1="120" x2="760" y2="120" stroke="#0B1F3A" stroke-width="3"/>
  <text x="52" y="232" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Part cross-section</text>

  <!-- Flaw A: open crack -->
  <polygon points="245,120 255,120 251,148 256,176 248,210 250,178 246,150" fill="#0B1F3A"/>

  <!-- Flaw B: crack with smeared cap -->
  <rect x="465" y="120" width="30" height="7" fill="#1E66F5"/>
  <polygon points="476,127 484,127 481,152 485,178 478,210 480,180 477,154" fill="#0B1F3A"/>

  <!-- Flaw C: subsurface void -->
  <ellipse cx="680" cy="180" rx="24" ry="14" fill="#0B1F3A"/>

  <!-- Verdict grid header -->
  <text x="250" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">A</text>
  <text x="480" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">B</text>
  <text x="680" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">C</text>
  <line x1="40" y1="274" x2="760" y2="274" stroke="#9BC4FF" stroke-width="1"/>

  <!-- PT row -->
  <text x="44" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">PT</text>
  <text x="44" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">open surface only</text>
  <rect x="175" y="285" width="150" height="30" rx="15" fill="#1E66F5"/>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Finds</text>
  <rect x="405" y="285" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="480" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Blind</text>
  <rect x="605" y="285" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="680" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Blind</text>
  <line x1="40" y1="327" x2="760" y2="327" stroke="#9BC4FF" stroke-width="1"/>

  <!-- MT row -->
  <text x="44" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">MT</text>
  <text x="44" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">ferromagnetic only</text>
  <rect x="175" y="333" width="150" height="30" rx="15" fill="#1E66F5"/>
  <text x="250" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Finds</text>
  <rect x="405" y="333" width="150" height="30" rx="15" fill="#1E66F5"/>
  <text x="480" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Finds (near-surface)</text>
  <rect x="605" y="333" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="680" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Only if near surface</text>
  <line x1="40" y1="375" x2="760" y2="375" stroke="#9BC4FF" stroke-width="1"/>

  <!-- UT / RT row -->
  <text x="44" y="396" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">UT / RT</text>
  <text x="44" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">volumetric</text>
  <rect x="175" y="381" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="250" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">May miss if tight</text>
  <rect x="405" y="381" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="480" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">May miss if tight</text>
  <rect x="605" y="381" width="150" height="30" rx="15" fill="#1E66F5"/>
  <text x="680" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Finds</text>

  <!-- Takeaway bar -->
  <rect x="40" y="440" width="720" height="46" rx="6" fill="#0B1F3A"/>
  <text x="400" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">A disagreement usually means the flaw sits outside one method's physics —</text>
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">evaluate each indication under its own procedure.</text>
</svg>
