<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Qualified PT Material Family</text>

  <!-- top system box -->
  <rect x="170" y="48" width="460" height="42" rx="8" fill="#0A2342"/>
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">One SYSTEM, qualified together (qualified products list)</text>

  <!-- connectors -->
  <line x1="400" y1="90" x2="140" y2="126" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="90" x2="400" y2="126" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="90" x2="660" y2="126" stroke="#5A6B7E" stroke-width="2"/>

  <!-- column headers -->
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Penetrant Type</text>
  <text x="400" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Removal Method</text>
  <text x="660" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Developer Form</text>

  <!-- column A: types -->
  <rect x="25" y="160" width="230" height="56" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="140" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Type I — fluorescent</text>
  <text x="140" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">sensitivity levels ½ – 4</text>
  <rect x="25" y="228" width="230" height="40" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="140" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Type II — visible (red dye)</text>

  <!-- column B: methods -->
  <rect x="285" y="160" width="230" height="38" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">A — water-washable</text>
  <rect x="285" y="206" width="230" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">B — post-emulsifiable</text>
  <text x="400" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(lipophilic)</text>
  <rect x="285" y="266" width="230" height="38" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">C — solvent-removable</text>
  <rect x="285" y="312" width="230" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">D — post-emulsifiable</text>
  <text x="400" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(hydrophilic)</text>

  <!-- column C: developer forms -->
  <rect x="545" y="160" width="235" height="34" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">a — dry powder</text>
  <rect x="545" y="200" width="235" height="34" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">b — water-soluble</text>
  <rect x="545" y="240" width="235" height="34" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">c — water-suspendible</text>
  <rect x="545" y="280" width="235" height="52" rx="6" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="662" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">d/e — nonaqueous wet</text>
  <text x="662" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(most sensitive, spot use)</text>
  <rect x="545" y="338" width="235" height="34" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="662" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">f — special applications</text>

  <!-- bottom rule -->
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Your procedure selects one from each column —</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">all from the SAME qualified family. Intermixing brands voids the qualification.</text>
</svg>
