<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Order of Precedence - From Contract to Today's Test</text>

  <!-- box 1 -->
  <rect x="55" y="62" width="430" height="56" rx="8" fill="#F2A33C"/>
  <text x="270" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1. Contract / purchase order</text>
  <text x="270" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">names the code, practice, and revision</text>

  <line x1="270" y1="118" x2="270" y2="124" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="263,123 270,131 277,123" fill="#F2A33C"/>

  <!-- box 2 -->
  <rect x="55" y="132" width="430" height="56" rx="8" fill="#1B82E8"/>
  <text x="270" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">2. Governing code or practice</text>
  <text x="270" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">ASME Section V Art. 6 - E165 - E1417</text>

  <line x1="270" y1="188" x2="270" y2="194" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="263,193 270,201 277,193" fill="#F2A33C"/>

  <!-- box 3 -->
  <rect x="55" y="202" width="430" height="56" rx="8" fill="#1B82E8"/>
  <text x="270" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">3. Employer's written procedure</text>
  <text x="270" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Level III approved - the document you work to</text>

  <line x1="270" y1="258" x2="270" y2="264" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="263,263 270,271 277,263" fill="#F2A33C"/>

  <!-- box 4 -->
  <rect x="55" y="272" width="430" height="56" rx="8" fill="#1B82E8"/>
  <text x="270" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">4. Technique / part-specific card</text>
  <text x="270" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">times, materials, coverage for this part</text>

  <line x1="270" y1="328" x2="270" y2="334" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="263,333 270,341 277,333" fill="#F2A33C"/>

  <!-- box 5 -->
  <rect x="55" y="342" width="430" height="56" rx="8" fill="#E8F1FB"/>
  <text x="270" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">5. The examination you run today</text>
  <text x="270" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">records trace back up the chain</text>

  <!-- field rules panel -->
  <rect x="520" y="62" width="230" height="336" rx="10" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="635" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">FIELD RULES</text>

  <text x="635" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Each level must</text>
  <text x="635" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">satisfy the level</text>
  <text x="635" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">above it.</text>

  <line x1="545" y1="192" x2="725" y2="192" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="635" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Check the revision:</text>
  <text x="635" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">the contract's named</text>
  <text x="635" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">revision governs.</text>

  <line x1="545" y1="286" x2="725" y2="286" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="635" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">If documents disagree,</text>
  <text x="635" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">stop and get a</text>
  <text x="635" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Level III ruling.</text>
</svg>
