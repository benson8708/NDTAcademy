<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Contrast: Emitted Light vs Reflected Light</text>

  <text x="210" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">TYPE I — FLUORESCENT · emits</text>
  <text x="590" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">TYPE II — VISIBLE · reflects</text>

  <!-- LEFT: darkened booth -->
  <rect x="40" y="100" width="340" height="300" rx="10" fill="#0B1F3A"/>
  <rect x="120" y="114" width="180" height="28" rx="6" fill="#9BC4FF"/>
  <text x="210" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">UV-A lamp — peak 365 nm</text>

  <!-- UV in -->
  <line x1="150" y1="150" x2="150" y2="238" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="144,236 156,236 150,252" fill="#9BC4FF"/>
  <text x="104" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#FFFFFF">UV-A in</text>

  <!-- part strip and glowing indication -->
  <rect x="70" y="262" width="280" height="22" fill="#1E66F5"/>
  <text x="210" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">part surface with developer</text>
  <ellipse cx="265" cy="260" rx="30" ry="8" fill="#9BC4FF"/>
  <ellipse cx="265" cy="260" rx="13" ry="3.5" fill="#FFFFFF"/>

  <!-- emission out -->
  <line x1="265" y1="248" x2="265" y2="196" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="259,198 271,198 265,182" fill="#9BC4FF"/>
  <text x="280" y="206" font-family="Arial, sans-serif" font-size="14.5" fill="#FFFFFF">glow out</text>
  <text x="280" y="224" font-family="Arial, sans-serif" font-size="14.5" fill="#FFFFFF">≈ 550 nm</text>

  <text x="210" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">UV-A ≥ 1,000 µW/cm² at the part — checked daily</text>
  <text x="210" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">ambient white light ≤ 2 fc (21.5 lx)</text>
  <text x="210" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">dark-adapt ≥ 1 minute before evaluating</text>

  <!-- RIGHT: white-light inspection -->
  <rect x="420" y="100" width="340" height="300" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="470" y="114" width="240" height="28" rx="6" fill="#0B1F3A"/>
  <text x="590" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">white light ≥ 100 fc (1,076 lx)</text>

  <!-- broad illumination arrows -->
  <line x1="520" y1="150" x2="520" y2="230" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="515,228 525,228 520,242" fill="#0B1F3A"/>
  <line x1="590" y1="150" x2="590" y2="230" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="585,228 595,228 590,242" fill="#0B1F3A"/>
  <line x1="660" y1="150" x2="660" y2="230" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="655,228 665,228 660,242" fill="#0B1F3A"/>

  <!-- white developer with red-dye indication (palette rendering) -->
  <rect x="450" y="262" width="280" height="22" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="3"/>
  <rect x="615" y="268" width="58" height="10" rx="5" fill="#0B1F3A"/>
  <text x="644" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">red dye seen by reflection</text>
  <text x="590" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">white developer background</text>

  <text x="590" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">contrast by reflected light only</text>
  <text x="590" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">single sensitivity class</text>
  <text x="590" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no booth — inspect anywhere light is adequate</text>

  <!-- takeaway band -->
  <rect x="60" y="420" width="680" height="58" rx="8" fill="#0B1F3A"/>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">In the dark booth, the indication is the only light source the eye sees.</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">That contrast margin is what the upper sensitivity levels are built on.</text>
</svg>
