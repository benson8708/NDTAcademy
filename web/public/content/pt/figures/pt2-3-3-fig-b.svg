<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">How Each Factor Degrades the Indication</text>

  <!-- ================= Panel 1: All factors right ================= -->
  <text x="106" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">All factors right</text>
  <text x="106" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wide bleed-out</text>
  <line x1="106" y1="126" x2="106" y2="142" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- developer film -->
  <rect x="22" y="150" width="168" height="14" fill="#9BC4FF" opacity="0.45"/>
  <rect x="22" y="150" width="168" height="14" fill="none" stroke="#0B1F3A" stroke-width="1"/>
  <!-- metal -->
  <rect x="22" y="164" width="168" height="150" fill="#9BC4FF" opacity="0.18"/>
  <rect x="22" y="164" width="168" height="150" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <!-- crack filled with penetrant -->
  <polygon points="103,164 107,198 102,236 105,290 110,240 108,200 110,164" fill="#1E66F5"/>
  <!-- bright indication -->
  <ellipse cx="106" cy="157" rx="66" ry="11" fill="#1E66F5" opacity="0.3"/>
  <ellipse cx="106" cy="157" rx="52" ry="8" fill="#1E66F5"/>
  <text x="106" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Bold, defined</text>
  <text x="106" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Open flaw, clean cavity,</text>
  <text x="106" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">dwell and wash honored</text>

  <!-- ================= Panel 2: Poor precleaning ================= -->
  <text x="302" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Poor precleaning</text>
  <text x="302" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fragmented, dim</text>
  <line x1="302" y1="126" x2="302" y2="142" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="218" y="150" width="168" height="14" fill="#9BC4FF" opacity="0.45"/>
  <rect x="218" y="150" width="168" height="14" fill="none" stroke="#0B1F3A" stroke-width="1"/>
  <rect x="218" y="164" width="168" height="150" fill="#9BC4FF" opacity="0.18"/>
  <rect x="218" y="164" width="168" height="150" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <!-- crack: thin penetrant above, soil plug below -->
  <polygon points="299,164 303,198 300,224 305,225 304,200 306,164" fill="#1E66F5" opacity="0.7"/>
  <polygon points="300,224 297,252 301,290 306,254 305,225" fill="#0B1F3A"/>
  <line x1="312" y1="252" x2="306" y2="248" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="316" y="257" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">soil plug</text>
  <!-- weak fragmented indication -->
  <ellipse cx="291" cy="157" rx="9" ry="4.5" fill="#1E66F5" opacity="0.55"/>
  <ellipse cx="309" cy="157" rx="11" ry="5" fill="#1E66F5" opacity="0.6"/>
  <text x="302" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Faint, fragmented</text>
  <text x="302" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Soil blocks the cavity</text>
  <text x="302" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and dilutes the dye</text>

  <!-- ================= Panel 3: Smearing before PT ================= -->
  <text x="498" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Smearing before PT</text>
  <text x="498" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">smeared lip</text>
  <line x1="498" y1="126" x2="498" y2="160" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="414" y="150" width="168" height="14" fill="#9BC4FF" opacity="0.45"/>
  <rect x="414" y="150" width="168" height="14" fill="none" stroke="#0B1F3A" stroke-width="1"/>
  <rect x="414" y="164" width="168" height="150" fill="#9BC4FF" opacity="0.18"/>
  <rect x="414" y="164" width="168" height="150" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <!-- smeared metal sealing the mouth -->
  <rect x="478" y="164" width="40" height="7" fill="#0B1F3A"/>
  <!-- empty crack below, no penetrant entered -->
  <polygon points="495,171 499,205 494,243 497,290 502,245 500,207 502,171" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="498" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">No indication</text>
  <text x="498" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Peening or blasting</text>
  <text x="498" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sealed the crack mouth</text>

  <!-- ================= Panel 4: Overwash removal ================= -->
  <text x="694" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Overwash removal</text>
  <text x="694" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw emptied</text>
  <line x1="694" y1="126" x2="694" y2="146" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="610" y="150" width="168" height="14" fill="#9BC4FF" opacity="0.45"/>
  <rect x="610" y="150" width="168" height="14" fill="none" stroke="#0B1F3A" stroke-width="1"/>
  <rect x="610" y="164" width="168" height="150" fill="#9BC4FF" opacity="0.18"/>
  <rect x="610" y="164" width="168" height="150" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <!-- broad shallow lap, washed nearly empty -->
  <path d="M 649 164 Q 694 212 739 164 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <ellipse cx="694" cy="190" rx="12" ry="5" fill="#1E66F5"/>
  <!-- very faint indication -->
  <ellipse cx="694" cy="157" rx="18" ry="5.5" fill="#1E66F5" opacity="0.4"/>
  <text x="694" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Shallow flaw stripped</text>
  <text x="694" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Wash too hot, too long,</text>
  <text x="694" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">or too much pressure</text>

  <!-- ================= Legend ================= -->
  <rect x="120" y="432" width="16" height="16" fill="#1E66F5"/>
  <text x="144" y="445" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">penetrant / indication</text>
  <rect x="330" y="432" width="16" height="16" fill="#0B1F3A"/>
  <text x="354" y="445" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">soil or smeared metal</text>
  <rect x="540" y="432" width="16" height="16" fill="#9BC4FF" opacity="0.45"/>
  <rect x="540" y="432" width="16" height="16" fill="none" stroke="#0B1F3A" stroke-width="1"/>
  <text x="564" y="445" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">developer film</text>

  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" fill="#0B1F3A">Only the first panel reports the flaw faithfully &#8212; the other three report a process problem.</text>
</svg>
