<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Wash Endpoints Under UV-A</text>

  <!-- Panel 1: overwashed -->
  <text x="136" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Overwashed</text>
  <rect x="16" y="106" width="240" height="190" rx="10" fill="#0A2342" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 76 200 q 30 -10 60 0 q 30 10 60 0" fill="none" stroke="#1E9E6A" stroke-width="3" opacity="0.22" stroke-dasharray="8 12"/>
  <text x="136" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">flaw penetrant stripped &#8212;</text>
  <text x="136" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">indication faint or missing</text>
  <text x="136" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">reclean &amp; reprocess</text>

  <!-- Panel 2: correct -->
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Correct wash</text>
  <rect x="280" y="106" width="240" height="190" rx="10" fill="#0A2342" stroke="#D9E0E8" stroke-width="2"/>
  <ellipse cx="400" cy="200" rx="70" ry="14" fill="#1E9E6A" opacity="0.28"/>
  <path d="M 340 200 q 30 -10 60 0 q 30 10 60 0" fill="none" stroke="#1E9E6A" stroke-width="4.5"/>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dark, quiet background &#8212;</text>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">crisp, bright indication</text>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">ready for developer</text>

