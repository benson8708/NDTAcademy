<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Reading Bleed-Out Patterns</text>

  <!-- Panel 1: continuous linear -->
  <rect x="35" y="56" width="355" height="168" rx="8" fill="#0A2342" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M70,126 C130,106 210,146 350,118" fill="none" stroke="#1E9E6A" stroke-width="12" opacity="0.22"/>
  <path d="M70,126 C130,106 210,146 350,118" fill="none" stroke="#1E9E6A" stroke-width="4"/>
  <text x="212" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Continuous linear</text>
  <text x="212" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Crack, seam, lap, cold shut</text>

  <!-- Panel 2: intermittent linear -->
  <rect x="410" y="56" width="355" height="168" rx="8" fill="#0A2342" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M445,128 C520,114 620,138 730,120" fill="none" stroke="#1E9E6A" stroke-width="11" opacity="0.14"/>
  <path d="M445,128 C520,114 620,138 730,120" fill="none" stroke="#1E9E6A" stroke-width="4" stroke-dasharray="26 16"/>
  <text x="587" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Intermittent linear</text>
  <text x="587" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Partially closed or ground-over flaw</text>

  <!-- Panel 3: rounded / clustered -->
  <rect x="35" y="240" width="355" height="168" rx="8" fill="#0A2342" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="235" cy="318" r="24" fill="#1E9E6A" opacity="0.18"/>
  <circle cx="120" cy="304" r="12" fill="#1E9E6A" opacity="0.9"/>
  <circle cx="160" cy="326" r="8" fill="#1E9E6A" opacity="0.9"/>
  <circle cx="196" cy="298" r="10" fill="#1E9E6A" opacity="0.9"/>
  <circle cx="235" cy="318" r="14" fill="#1E9E6A"/>
  <circle cx="282" cy="300" r="9" fill="#1E9E6A" opacity="0.9"/>
  <circle cx="312" cy="324" r="7" fill="#1E9E6A" opacity="0.9"/>
  <circle cx="148" cy="288" r="6" fill="#1E9E6A" opacity="0.85"/>
  <text x="212" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Rounded, clustered</text>
  <text x="212" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Porosity, gas pits</text>

  <!-- Panel 4: false indications -->
  <rect x="410" y="240" width="355" height="168" rx="8" fill="#0A2342" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M455,316 q15,-34 30,-10 q15,24 30,-8 q12,-22 26,-4 q12,16 24,2" fill="none" stroke="#1E9E6A" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="660" cy="312" rx="38" ry="15" fill="#1E9E6A" opacity="0.25"/>
  <circle cx="645" cy="308" r="3" fill="#1E9E6A" opacity="0.5"/>
  <circle cx="672" cy="316" r="2.5" fill="#1E9E6A" opacity="0.5"/>
  <text x="500" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">lint fiber</text>
  <text x="660" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">wash residue</text>
  <text x="587" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Fibers, smudges, streaks</text>
  <text x="587" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">False — lint, residue, handling</text>

  <!-- bottom note -->
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Re-bleed check: wipe once, redevelop — real flaws return; false indications do not</text>
</svg>
