<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Typical PT Indications by Product Form</text>

  <!-- ================= Panel 1: Forging ================= -->
  <text x="140" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Forging</text>
  <!-- dog-bone forging: big end, shank, small end -->
  <circle cx="62" cy="168" r="28" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="62" y="156" width="160" height="24" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="226" cy="168" r="20" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- lap: wavy faint line at big-end fillet -->
  <path d="M 88 156 q 8 -7 16 0 q 8 7 16 0" fill="none" stroke="#D14343" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="104" y1="148" x2="92" y2="106" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="30" y="88" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Lap: wavy, faint, intermittent</text>
  <text x="30" y="104" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">(fillets, flash line)</text>
  <!-- seam: straight tight line along shank -->
  <line x1="120" y1="172" x2="205" y2="172" stroke="#D14343" stroke-width="2"/>
  <line x1="165" y1="174" x2="165" y2="208" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="60" y="226" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Seam: straight, tight,</text>
  <text x="60" y="242" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">parallel to grain flow</text>

  <!-- ================= Panel 2: Casting ================= -->
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Casting</text>
  <!-- bracket casting: base + boss -->
  <rect x="300" y="180" width="180" height="36" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="432" cy="150" r="32" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- cold shut: smooth curving line on base -->
  <path d="M 318 200 q 30 -13 60 0" fill="none" stroke="#D14343" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="348" y1="196" x2="335" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="285" y="248" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Cold shut: smooth, rounded line</text>
  <!-- microshrinkage: lacy dot patch on boss -->
  <circle cx="424" cy="142" r="1.8" fill="#D14343"/>
  <circle cx="432" cy="148" r="1.8" fill="#D14343"/>
  <circle cx="440" cy="141" r="1.8" fill="#D14343"/>
  <circle cx="428" cy="156" r="1.8" fill="#D14343"/>
  <circle cx="438" cy="158" r="1.8" fill="#D14343"/>
  <circle cx="446" cy="150" r="1.8" fill="#D14343"/>
  <circle cx="420" cy="150" r="1.8" fill="#D14343"/>
  <circle cx="433" cy="138" r="1.8" fill="#D14343"/>
  <circle cx="444" cy="159" r="1.8" fill="#D14343"/>
  <circle cx="425" cy="163" r="1.8" fill="#D14343"/>
  <line x1="432" y1="128" x2="420" y2="96" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="330" y="88" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Microshrinkage: lacy, mottled patch</text>
  <!-- gas pores: rounded dots on base -->
  <circle cx="455" cy="198" r="3.2" fill="#D14343"/>
  <circle cx="466" cy="206" r="2.6" fill="#D14343"/>
  <circle cx="445" cy="207" r="2.6" fill="#D14343"/>
  <line x1="466" y1="200" x2="488" y2="232" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="430" y="248" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Gas pores: rounded dots</text>

  <!-- ================= Panel 3: Plate ================= -->
  <text x="665" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Plate</text>
  <!-- 2.5D slab: top face, front (edge) face, side face -->
  <polygon points="560,138 720,138 758,112 598,112" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="560" y="138" width="160" height="52" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="720,138 758,112 758,164 720,190" fill="#B9C9DA" stroke="#5A6B7E" stroke-width="2"/>
  <!-- lamination on cut edge at mid-thickness -->
  <line x1="570" y1="164" x2="710" y2="164" stroke="#D14343" stroke-width="3"/>
  <line x1="640" y1="166" x2="640" y2="206" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="540" y="224" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Lamination: straight line near</text>
  <text x="540" y="240" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">mid-thickness — cut edges only</text>
  <!-- note on rolled face -->
  <line x1="670" y1="124" x2="678" y2="98" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Rolled face: no indication</text>

  <!-- ================= Panel 4: Weld (top view) ================= -->
  <text x="200" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Weld (top view)</text>
  <rect x="40" y="330" width="320" height="110" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- bead band with ripples -->
  <rect x="40" y="368" width="320" height="34" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 60 370 q 6 15 0 30 M 90 370 q 6 15 0 30 M 120 370 q 6 15 0 30 M 150 370 q 6 15 0 30 M 180 370 q 6 15 0 30 M 210 370 q 6 15 0 30 M 240 370 q 6 15 0 30 M 270 370 q 6 15 0 30 M 300 370 q 6 15 0 30" fill="none" stroke="#5A6B7E" stroke-width="1" opacity="0.5"/>
  <!-- aligned porosity along centerline -->
  <circle cx="95" cy="385" r="3.5" fill="#D14343"/>
  <circle cx="125" cy="385" r="3.5" fill="#D14343"/>
  <circle cx="155" cy="385" r="3.5" fill="#D14343"/>
  <circle cx="185" cy="385" r="3.5" fill="#D14343"/>
  <line x1="140" y1="380" x2="120" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="44" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Aligned porosity on centerline</text>
  <!-- LOF at toe -->
  <line x1="235" y1="368" x2="330" y2="368" stroke="#D14343" stroke-width="2.5"/>
  <line x1="285" y1="366" x2="300" y2="318" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="262" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">LOF / overlap at toe</text>
  <!-- crater at stop -->
  <line x1="330" y1="385" x2="338" y2="385" stroke="#D14343" stroke-width="2"/>
  <line x1="331" y1="381" x2="337" y2="389" stroke="#D14343" stroke-width="2"/>
  <line x1="337" y1="381" x2="331" y2="389" stroke="#D14343" stroke-width="2"/>
  <line x1="334" y1="392" x2="320" y2="458" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="150" y="474" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Crater pits and star cracks at stops</text>

  <!-- ================= Panel 5: Extrusion ================= -->
  <text x="595" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Extrusion</text>
  <!-- bar in 2.5D -->
  <polygon points="430,340 458,320 640,320 612,340" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="430" y="340" width="182" height="56" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- transverse hot-short tears on surface -->
  <path d="M 470 348 q 3 10 0 20 M 498 350 q 3 10 0 20 M 526 348 q 3 10 0 20 M 554 350 q 3 10 0 20" fill="none" stroke="#D14343" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="512" y1="376" x2="500" y2="430" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="420" y="448" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Hot-short tears: short,</text>
  <text x="420" y="464" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">transverse to the flow</text>
  <!-- cut-end view -->
  <circle cx="710" cy="368" r="44" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="710" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Cut-end view</text>
  <!-- chevron central burst -->
  <path d="M 696 362 l 14 -11 l 14 11 M 696 376 l 14 -11 l 14 11" fill="none" stroke="#D14343" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="710" y1="384" x2="690" y2="430" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="592" y="448" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Central burst, back-end pipe:</text>
  <text x="592" y="464" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">show only on cut ends</text>
</svg>
