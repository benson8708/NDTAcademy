<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Anatomy of a Minimum-Content PT Procedure</text>

  <!-- document page -->
  <rect x="48" y="56" width="380" height="424" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- header band -->
  <rect x="48" y="56" width="380" height="46" fill="#0B1F3A"/>
  <text x="60" y="76" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">PT-204 Rev B — Fluorescent PT, 7075 fittings</text>
  <text x="60" y="94" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">ASTM E1417 — Type I, Method D, Level 3, Form a</text>

  <!-- content blocks -->
  <rect x="56" y="108" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1  Scope — parts, alloy, when, areas</text>

  <rect x="56" y="145" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="167" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2  Reference documents (with revisions)</text>

  <rect x="56" y="182" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3  Personnel — who processes, who evaluates</text>

  <rect x="56" y="219" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="241" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">4  Materials — Type, Method, Level, Form (QPL)</text>

  <rect x="56" y="256" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="278" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">5  Pre-clean and surface preparation</text>

  <rect x="56" y="293" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="315" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">6  Process steps — each with its numbers</text>

  <rect x="56" y="330" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="352" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">7  Examination lighting — UV-A / white light</text>

  <rect x="56" y="367" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="389" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">8  Evaluation and acceptance criteria (cited)</text>

  <rect x="56" y="404" width="364" height="33" fill="#9BC4FF" fill-opacity="0.35"/>
  <text x="64" y="426" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">9  Post-clean, records, marking</text>

  <rect x="56" y="441" width="364" height="33" fill="#1E66F5"/>
  <text x="64" y="463" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">10  Approval — PT Level III, revision control</text>

  <!-- annotation group A: identification & control -->
  <line x1="428" y1="160" x2="470" y2="130" stroke="#1E66F5" stroke-width="2"/>
  <text x="478" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Identification and control</text>
  <text x="478" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">what it covers, what governs it,</text>
  <text x="478" y="159" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">who may run and who may evaluate</text>

  <!-- annotation group B: process definition -->
  <line x1="428" y1="300" x2="470" y2="252" stroke="#1E66F5" stroke-width="2"/>
  <text x="478" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Process definition</text>
  <text x="478" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">every variable fixed by classification</text>
  <text x="478" y="281" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and by number — temperature, dwell,</text>
  <text x="478" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wash, dry, develop, light intensity</text>

  <!-- annotation group C: decision rules -->
  <line x1="428" y1="420" x2="470" y2="372" stroke="#1E66F5" stroke-width="2"/>
  <text x="478" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Decision rules and authority</text>
  <text x="478" y="382" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">objective accept / reject criteria,</text>
  <text x="478" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the evidence trail, and the Level III</text>
  <text x="478" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">signature that releases it for use</text>

  <!-- note box -->
  <rect x="470" y="436" width="310" height="44" fill="#9BC4FF" fill-opacity="0.25" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="625" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">Any block missing or vague fails the review —</text>
  <text x="625" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">the draft goes back, never "fixed at the bench."</text>
</svg>
