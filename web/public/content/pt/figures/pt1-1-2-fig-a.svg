<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Wetting and the Contact Angle</text>

  <!-- LEFT PANEL: good wetting penetrant -->
  <text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Penetrant: wets and spreads</text>

  <!-- flat droplet dome -->
  <path d="M 90 274 Q 210 216 330 274 Z" fill="#D14343" opacity="0.9"/>
  <!-- tangent at contact point -->
  <line x1="90" y1="274" x2="170" y2="252" stroke="#0A2342" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- angle reference along surface -->
  <line x1="90" y1="274" x2="170" y2="274" stroke="#0A2342" stroke-width="2"/>
  <text x="196" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">contact angle of a few degrees</text>

  <!-- surface strip -->
  <rect x="60" y="274" width="300" height="10" fill="#5A6B7E"/>
  <text x="210" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Adhesion to the metal beats cohesion:</text>
  <text x="210" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the liquid clings, creeps, and can enter flaws</text>

  <!-- RIGHT PANEL: non-wetting bead -->
  <text x="592" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Non-wetting liquid: beads up</text>

  <!-- bead drawn as circle; surface strip drawn after to mask its base -->
  <circle cx="592" cy="232" r="46" fill="#1B82E8"/>
  <!-- tangent leaning back over the surface (angle measured inside liquid is > 90) -->
  <line x1="552" y1="272" x2="524" y2="204" stroke="#0A2342" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="552" y1="272" x2="480" y2="272" stroke="#0A2342" stroke-width="2"/>
  <text x="468" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">above 90 degrees</text>

  <!-- surface strip -->
  <rect x="440" y="274" width="300" height="10" fill="#5A6B7E"/>
  <text x="592" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cohesion beats adhesion: the liquid</text>
  <text x="592" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">stands off the surface and stays out of openings</text>

  <!-- bottom takeaway band -->
  <rect x="100" y="368" width="600" height="52" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Wetting is the gatekeeper: below 90 degrees a liquid can enter fine openings.</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Good penetrants spread almost flat on clean metal - oily films raise the angle and choke entry.</text>
</svg>
