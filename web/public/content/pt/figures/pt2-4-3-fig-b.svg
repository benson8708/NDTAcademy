<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- darkened booth background -->
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#9BC4FF">UV-A Booth — Developed Shaft with Press-Fit Collar</text>
  <text x="776" y="60" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF" fill-opacity="0.8">UV-A ≥ 1,000 µW/cm² · ambient ≤ 2 fc — verified</text>

  <!-- inspection table -->
  <rect x="0" y="430" width="800" height="70" fill="#132C55"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="#9BC4FF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="24" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF" fill-opacity="0.7">inspection table — surveyed under UV-A before parts arrived</text>

  <!-- shaft body -->
  <rect x="110" y="205" width="580" height="110" fill="#1E66F5" fill-opacity="0.22" stroke="#9BC4FF" stroke-width="2"/>
  <ellipse cx="110" cy="260" rx="16" ry="55" fill="#1E66F5" fill-opacity="0.3" stroke="#9BC4FF" stroke-width="2"/>
  <ellipse cx="690" cy="260" rx="16" ry="55" fill="#1E66F5" fill-opacity="0.3" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="130" y1="232" x2="670" y2="232" stroke="#FFFFFF" stroke-width="9" stroke-opacity="0.05"/>

  <!-- keyway (left end, top) -->
  <rect x="150" y="205" width="90" height="24" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="195" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF" fill-opacity="0.8">keyway</text>

  <!-- A: jagged linear indication from keyway corner (region 225,210,125,55) -->
  <polyline points="240,229 263,235 286,237 309,242 332,247" fill="none" stroke="#DCF763" stroke-width="8" stroke-opacity="0.28" stroke-linecap="round"/>
  <polyline points="240,229 263,235 286,237 309,242 332,247" fill="none" stroke="#DCF763" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="286" y1="237" x2="296" y2="231" stroke="#DCF763" stroke-width="1.5"/>

  <!-- press-fit collar (region 412,170,96,180) -->
  <rect x="430" y="175" width="62" height="170" fill="#1E66F5" fill-opacity="0.38" stroke="#9BC4FF" stroke-width="2"/>
  <text x="461" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF" fill-opacity="0.8">collar</text>
  <line x1="427" y1="205" x2="427" y2="315" stroke="#DCF763" stroke-width="6" stroke-opacity="0.25"/>
  <line x1="427" y1="205" x2="427" y2="315" stroke="#DCF763" stroke-width="2"/>
  <line x1="495" y1="205" x2="495" y2="315" stroke="#DCF763" stroke-width="6" stroke-opacity="0.25"/>
  <line x1="495" y1="205" x2="495" y2="315" stroke="#DCF763" stroke-width="2"/>

  <!-- C: rounded porosity cluster (region 548,245,72,58) -->
  <circle cx="565" cy="262" r="6" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="565" cy="262" r="3" fill="#DCF763"/>
  <circle cx="578" cy="277" r="5.5" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="578" cy="277" r="2.5" fill="#DCF763"/>
  <circle cx="591" cy="259" r="6" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="591" cy="259" r="3" fill="#DCF763"/>
  <circle cx="598" cy="284" r="5" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="598" cy="284" r="2.2" fill="#DCF763"/>
  <circle cx="570" cy="291" r="5.5" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="570" cy="291" r="2.5" fill="#DCF763"/>
  <circle cx="605" cy="269" r="6" fill="#DCF763" fill-opacity="0.22"/>
  <circle cx="605" cy="269" r="3" fill="#DCF763"/>

  <!-- D: lint fiber on the surface (region 348,282,60,45) -->
  <path d="M 355,302 q 10,-14 22,-5 q 10,8 14,-4 q 6,-9 12,-2" fill="none" stroke="#DCF763" stroke-width="5" stroke-opacity="0.22" stroke-linecap="round"/>
  <path d="M 355,302 q 10,-14 22,-5 q 10,8 14,-4 q 6,-9 12,-2" fill="none" stroke="#DCF763" stroke-width="1.6" stroke-linecap="round"/>

  <!-- E: diffuse residual-background smudge (region 622,282,70,40) -->
  <ellipse cx="655" cy="300" rx="27" ry="13" fill="#DCF763" fill-opacity="0.15"/>
  <ellipse cx="650" cy="298" rx="15" ry="8" fill="#DCF763" fill-opacity="0.25"/>
  <ellipse cx="662" cy="303" rx="8" ry="4" fill="#DCF763" fill-opacity="0.3"/>

  <!-- developed-surface note -->
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF" fill-opacity="0.85">developer applied — inside the reading window — five indications visible</text>
</svg>
