<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Lighting From White to UV-A: Two Contrast Regimes</text>

  <!-- left panel: visible -->
  <rect x="30" y="58" width="360" height="252" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="30" y="58" width="360" height="34" rx="10" fill="#1E66F5"/>
  <rect x="30" y="76" width="360" height="16" fill="#1E66F5"/>
  <text x="210" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">TYPE II — VISIBLE DYE</text>

  <!-- white-light lamp and rays -->
  <rect x="170" y="102" width="80" height="14" rx="4" fill="#0B1F3A"/>
  <line x1="185" y1="120" x2="120" y2="194" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="197" y1="120" x2="165" y2="194" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="210" y1="120" x2="210" y2="194" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="223" y1="120" x2="255" y2="194" stroke="#9BC4FF" stroke-width="2.5"/>
  <line x1="235" y1="120" x2="300" y2="194" stroke="#9BC4FF" stroke-width="2.5"/>

  <!-- part with white developer and red indication -->
  <rect x="80" y="198" width="260" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 130 221 l 30 -6 l 28 8 l 30 -7 l 26 6 l 28 -5 l 24 6" fill="none" stroke="#D64545" stroke-width="3"/>
  <text x="210" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">White light &#8805; 100 fc (&#8776;1,000 lx) at the surface</text>
  <text x="210" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Red on white developer — color contrast</text>

  <!-- right panel: fluorescent booth -->
  <rect x="410" y="58" width="360" height="252" rx="10" fill="#0B1F3A"/>
  <text x="590" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">TYPE I — FLUORESCENT</text>
  <line x1="430" y1="92" x2="750" y2="92" stroke="#1E66F5" stroke-width="2"/>

  <!-- UV lamp and rays -->
  <rect x="550" y="102" width="80" height="14" rx="4" fill="#1E66F5"/>
  <line x1="565" y1="120" x2="500" y2="194" stroke="#1E66F5" stroke-width="2.5"/>
  <line x1="577" y1="120" x2="545" y2="194" stroke="#1E66F5" stroke-width="2.5"/>
  <line x1="590" y1="120" x2="590" y2="194" stroke="#1E66F5" stroke-width="2.5"/>
  <line x1="603" y1="120" x2="635" y2="194" stroke="#1E66F5" stroke-width="2.5"/>
  <line x1="615" y1="120" x2="680" y2="194" stroke="#1E66F5" stroke-width="2.5"/>

  <!-- dark part with glowing indication -->
  <rect x="460" y="198" width="260" height="44" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="1.5"/>
  <path d="M 510 221 l 30 -6 l 28 8 l 30 -7 l 26 6 l 28 -5 l 24 6" fill="none" stroke="#C9F45B" stroke-width="9" opacity="0.35"/>
  <path d="M 510 221 l 30 -6 l 28 8 l 30 -7 l 26 6 l 28 -5 l 24 6" fill="none" stroke="#C9F45B" stroke-width="3.5"/>
  <text x="590" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">UV-A &#8805; 1,000 &#181;W/cm&#178; at the surface</text>
  <text x="590" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Ambient white &#8804; 2 fc — brightness contrast</text>

  <!-- bottom flow: how fluorescence works -->
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Why the booth must stay dark</text>

  <rect x="40" y="356" width="215" height="84" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="147" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">UV-A 320–400 nm</text>
  <text x="147" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">(peak near 365 nm)</text>

  <line x1="258" y1="398" x2="286" y2="398" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="284,391 298,398 284,405" fill="#0B1F3A"/>

  <rect x="302" y="356" width="215" height="84" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="409" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Dye in the flaw absorbs</text>
  <text x="409" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">the UV-A energy</text>

  <line x1="520" y1="398" x2="548" y2="398" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="546,391 560,398 546,405" fill="#0B1F3A"/>

  <rect x="564" y="356" width="206" height="84" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="667" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Re-emits yellow-green</text>
  <text x="667" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">light near 550 nm —</text>
  <text x="667" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">the eye&#8217;s peak response</text>

  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">An indication&#8217;s glow is fixed by the dye and the UV-A dose —</text>
  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">every footcandle of ambient white raises the background and erodes contrast.</text>
</svg>
