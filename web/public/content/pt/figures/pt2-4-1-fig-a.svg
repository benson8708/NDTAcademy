<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Solidification Cracks: Where Freezing Metal Tears</text>

  <!-- ============ Panel 1: Hot tear in a casting ============ -->
  <rect x="12" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="26" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 — Hot tear (casting)</text>

  <!-- casting cross-section: thick boss on thin wall -->
  <path d="M 32 310 L 102 310 L 102 190 L 172 190 L 172 310 L 238 310 L 238 342 L 32 342 Z" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="137" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">thick boss</text>
  <text x="206" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">thin wall</text>

  <!-- hot tear: ragged branched cluster at the junction -->
  <polyline points="102,310 96,318 100,326 93,334 97,342" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="100,326 107,332 104,340" fill="none" stroke="#D14343" stroke-width="2"/>
  <polyline points="112,310 109,320 114,328 110,336" fill="none" stroke="#D14343" stroke-width="2"/>
  <polyline points="172,310 178,319 174,328 180,338" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <polyline points="174,328 168,333 171,341" fill="none" stroke="#D14343" stroke-width="2"/>

  <!-- highlight on junction -->
  <circle cx="104" cy="318" r="30" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="104" y1="288" x2="86" y2="158" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="34" y="136" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">junction freezes last</text>
  <text x="34" y="152" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">+ mold restrains it</text>

  <text x="135" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">ragged, branched cluster</text>
  <text x="135" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">— bleeds strongly</text>

  <!-- ============ Panel 2: Weld centerline crack ============ -->
  <rect x="277" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="291" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 — Centerline hot crack</text>
  <text x="291" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">weld bead, plan view</text>

  <!-- plate -->
  <rect x="292" y="200" width="216" height="110" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- bead ribbon -->
  <rect x="302" y="232" width="196" height="46" rx="23" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- ripples -->
  <path d="M 330 236 Q 322 255 330 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 362 236 Q 354 255 362 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 394 236 Q 386 255 394 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 426 236 Q 418 255 426 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 458 236 Q 450 255 458 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- centerline crack -->
  <polyline points="318,255 336,253 354,257 372,254 390,257 408,253 426,256 444,254 462,256 480,254" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="400" y1="255" x2="416" y2="158" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="400" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">straight line down the bead axis —</text>
  <text x="400" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">fronts meet, segregates freeze last</text>

  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">classic producer: deep,</text>
  <text x="400" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">narrow beads</text>

  <!-- ============ Panel 3: Crater (star) crack ============ -->
  <rect x="542" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="556" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 — Crater (star) crack</text>
  <text x="556" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">weld stop, plan view</text>

  <!-- plate -->
  <rect x="556" y="200" width="216" height="110" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <!-- bead ending in crater -->
  <rect x="566" y="232" width="124" height="46" rx="23" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 600 236 Q 592 255 600 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 632 236 Q 624 255 632 274" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="714" cy="255" r="27" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="714" cy="255" r="16" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <!-- star crack: radial lines from crater center -->
  <line x1="714" y1="255" x2="714" y2="237" stroke="#D14343" stroke-width="2.5"/>
  <line x1="714" y1="255" x2="729" y2="266" stroke="#D14343" stroke-width="2.5"/>
  <line x1="714" y1="255" x2="699" y2="266" stroke="#D14343" stroke-width="2.5"/>
  <line x1="714" y1="255" x2="726" y2="242" stroke="#D14343" stroke-width="2"/>
  <line x1="714" y1="255" x2="701" y2="243" stroke="#D14343" stroke-width="2"/>
  <line x1="714" y1="232" x2="702" y2="158" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="664" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">arc broken abruptly —</text>
  <text x="664" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">crater shrinks unfed</text>

  <text x="665" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">small radial star — a favored</text>
  <text x="665" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">start for service cracks</text>

  <!-- shared takeaway -->
  <line x1="60" y1="446" x2="724" y2="446" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="724,439 740,446 724,453" fill="#F2A33C"/>
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">All three form while the metal is freezing — at locations you can predict before you inspect</text>
</svg>
