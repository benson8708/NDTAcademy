<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Penetrant System Classification</text>

  <!-- root box -->
  <rect x="270" y="62" width="260" height="42" rx="8" fill="#E8F1FB"/>
  <text x="400" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">LIQUID PENETRANT SYSTEMS</text>

  <!-- branches to types -->
  <line x1="400" y1="104" x2="230" y2="146" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="400" y1="104" x2="570" y2="146" stroke="#5A6B7E" stroke-width="2"/>

  <!-- Type I box -->
  <rect x="80" y="146" width="300" height="56" rx="8" fill="#1E9E6A"/>
  <text x="230" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">TYPE I - FLUORESCENT</text>
  <text x="230" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">glows yellow-green under UV-A, dark booth</text>

  <!-- Type II box -->
  <rect x="420" y="146" width="300" height="56" rx="8" fill="#D14343"/>
  <text x="570" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">TYPE II - VISIBLE</text>
  <text x="570" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">red dye read in white light, no booth</text>

  <!-- type footnotes -->
  <text x="230" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">sensitivity levels ½ to 4 (ultralow to ultrahigh)</text>
  <text x="570" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">single sensitivity class</text>

  <!-- connectors down to methods -->
  <line x1="230" y1="232" x2="230" y2="252" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="570" y1="202" x2="570" y2="252" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="124" y1="252" x2="652" y2="252" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="124" y1="252" x2="124" y2="274" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="300" y1="252" x2="300" y2="274" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="476" y1="252" x2="476" y2="274" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="652" y1="252" x2="652" y2="274" stroke="#5A6B7E" stroke-width="2"/>

  <!-- method boxes -->
  <rect x="40" y="274" width="168" height="84" rx="8" fill="#D9E0E8"/>
  <text x="124" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">METHOD A</text>
  <text x="124" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">water-washable</text>
  <text x="124" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">direct spray rinse</text>

  <rect x="216" y="274" width="168" height="84" rx="8" fill="#D9E0E8"/>
  <text x="300" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">METHOD B</text>
  <text x="300" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">post-emulsifiable</text>
  <text x="300" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">lipophilic (oil-base)</text>

  <rect x="392" y="274" width="168" height="84" rx="8" fill="#D9E0E8"/>
  <text x="476" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">METHOD C</text>
  <text x="476" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">solvent-removable</text>
  <text x="476" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">wipe, damp cloth</text>

  <rect x="568" y="274" width="168" height="84" rx="8" fill="#D9E0E8"/>
  <text x="652" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">METHOD D</text>
  <text x="652" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">post-emulsifiable</text>
  <text x="652" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">hydrophilic (water-base)</text>

  <!-- footer -->
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Developer forms: a dry powder · b and c aqueous · d and e nonaqueous wet · f special</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Penetrant, emulsifier, and developer are qualified together - do not intermix families</text>
</svg>
