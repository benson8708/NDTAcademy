<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Process Routing — High-Strength Steel Landing-Gear Link</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Four candidate points for the final fluorescent penetrant inspection</text>

  <!-- row 1 -->
  <rect x="30" y="96" width="135" height="58" rx="8" fill="#0B1F3A"/>
  <text x="97" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Rough machine</text>

  <line x1="165" y1="125" x2="182" y2="125" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="180,118 194,125 180,132" fill="#5A6B7E"/>

  <circle cx="210" cy="125" r="22" fill="#FFFFFF" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="210" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">1</text>

  <line x1="232" y1="125" x2="246" y2="125" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="244,118 258,125 244,132" fill="#5A6B7E"/>

  <rect x="258" y="96" width="140" height="58" rx="8" fill="#0B1F3A"/>
  <text x="328" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Final heat treat</text>

  <line x1="398" y1="125" x2="404" y2="125" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="402,118 416,125 402,132" fill="#5A6B7E"/>

  <rect x="416" y="96" width="185" height="58" rx="8" fill="#0B1F3A"/>
  <text x="508" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Finish machine &amp; grind</text>

  <line x1="601" y1="125" x2="607" y2="125" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="605,118 619,125 605,132" fill="#5A6B7E"/>

  <rect x="619" y="96" width="148" height="58" rx="8" fill="#0B1F3A"/>
  <text x="693" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Chemical etch</text>

  <!-- connector to row 2 -->
  <polyline points="693,154 693,212 72,212 72,266" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="65,264 72,278 79,264" fill="#5A6B7E"/>

  <!-- row 2 -->
  <circle cx="72" cy="300" r="22" fill="#FFFFFF" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="72" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">2</text>

  <line x1="94" y1="300" x2="102" y2="300" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="100,293 114,300 100,307" fill="#5A6B7E"/>

  <rect x="114" y="271" width="125" height="58" rx="8" fill="#0B1F3A"/>
  <text x="176" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Shot peen</text>

  <line x1="239" y1="300" x2="249" y2="300" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="247,293 261,300 247,307" fill="#5A6B7E"/>

  <circle cx="283" cy="300" r="22" fill="#FFFFFF" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="283" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">3</text>

  <line x1="305" y1="300" x2="313" y2="300" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="311,293 325,300 311,307" fill="#5A6B7E"/>

  <rect x="325" y="271" width="160" height="58" rx="8" fill="#0B1F3A"/>
  <text x="405" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Anodize &amp; paint</text>

  <line x1="485" y1="300" x2="495" y2="300" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="493,293 507,300 493,307" fill="#5A6B7E"/>

  <circle cx="529" cy="300" r="22" fill="#FFFFFF" stroke="#1E66F5" stroke-width="3" stroke-dasharray="5 4"/>
  <text x="529" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E66F5">4</text>

  <line x1="551" y1="300" x2="559" y2="300" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="557,293 571,300 557,307" fill="#5A6B7E"/>

  <rect x="571" y="271" width="180" height="58" rx="8" fill="#0B1F3A"/>
  <text x="661" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Release to service</text>

  <!-- legend -->
  <circle cx="170" cy="372" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="190" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Numbered circles — candidate points for the final penetrant inspection</text>

  <!-- rule note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Rule: after every operation that can create or expose a flaw —</text>
  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">before anything that smears, seals, or coats the surface.</text>
</svg>
