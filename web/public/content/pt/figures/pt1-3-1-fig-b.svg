<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Where the Dryer Fits: Two Paths</text>

  <!-- top box -->
  <rect x="290" y="56" width="220" height="44" rx="8" fill="#0A2342"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Remove excess penetrant</text>

  <!-- branch arrows -->
  <line x1="380" y1="100" x2="218" y2="138" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="222,130 208,141 226,144" fill="#5A6B7E"/>
  <line x1="420" y1="100" x2="582" y2="138" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="574,144 592,141 578,130" fill="#5A6B7E"/>

  <!-- left column: wet (aqueous) path -->
  <rect x="85" y="146" width="250" height="78" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">WET PATH — forms b, c</text>
  <text x="210" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Apply aqueous developer</text>
  <text x="210" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">to the still-wet part</text>

  <line x1="210" y1="224" x2="210" y2="246" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="203,244 210,258 217,244" fill="#1B82E8"/>

  <rect x="85" y="260" width="250" height="64" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="210" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">THEN dry the part</text>
  <text x="210" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">oven — part ≤ 160 °F typical</text>

  <!-- right column: dry-surface path -->
  <rect x="465" y="146" width="250" height="78" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="590" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">DRY PATH — forms a, d, e</text>
  <text x="590" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry the part first</text>
  <text x="590" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">oven — part ≤ 160 °F typical</text>

  <line x1="590" y1="224" x2="590" y2="246" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="583,244 590,258 597,244" fill="#F2A33C"/>

  <rect x="465" y="260" width="250" height="64" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <text x="590" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">THEN apply developer</text>
  <text x="590" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dry powder or nonaqueous</text>

  <!-- merge arrows -->
  <line x1="210" y1="324" x2="298" y2="358" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="288,360 308,362 294,348" fill="#5A6B7E"/>
  <line x1="590" y1="324" x2="502" y2="358" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="506,348 492,362 512,360" fill="#5A6B7E"/>

  <!-- final box -->
  <rect x="230" y="364" width="340" height="64" rx="8" fill="#1E9E6A"/>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Development dwell — ≥ 10 min typical</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">read within the procedure&#8217;s window</text>

  <!-- side note -->
  <text x="400" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Powder and solvent films need a dry surface; aqueous coatings dry with the part</text>
</svg>
