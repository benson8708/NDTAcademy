<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Troubleshooting: Symptom &#8594; Likely Fault</text>

  <!-- Symptom 1 -->
  <rect x="24" y="76" width="300" height="86" rx="8" fill="#0A2342"/>
  <text x="174" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">No indications</text>
  <text x="174" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">where expected</text>
  <line x1="324" y1="119" x2="400" y2="119" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="400,111 416,119 400,127" fill="#1B82E8"/>
  <rect x="416" y="76" width="360" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="596" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">smeared metal &#183; coating bridge &#183;</text>
  <text x="596" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaw still wet or contaminated &#183;</text>
  <text x="596" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrant dried &#183; stripping overwash</text>

  <!-- Symptom 2 -->
  <rect x="24" y="190" width="300" height="86" rx="8" fill="#0A2342"/>
  <text x="174" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Faint, broken,</text>
  <text x="174" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">washed-out indications</text>
  <line x1="324" y1="233" x2="400" y2="233" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="400,225 416,233 400,241" fill="#1B82E8"/>
  <rect x="416" y="190" width="360" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="596" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dwell cut short &#183; cold part, no extension &#183;</text>
  <text x="596" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">film dried during dwell &#183;</text>
  <text x="596" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">wash past background &#183; emulsifier overtime</text>

  <!-- Symptom 3 -->
  <rect x="24" y="304" width="300" height="86" rx="8" fill="#0A2342"/>
  <text x="174" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Heavy background</text>
  <text x="174" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">glow or dye haze</text>
  <line x1="324" y1="347" x2="400" y2="347" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="400,339 416,347 400,355" fill="#1B82E8"/>
  <rect x="416" y="304" width="360" height="86" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="596" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">insufficient wash or rinse &#183;</text>
  <text x="596" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">surface too rough for the method &#183;</text>
  <text x="596" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">contaminated rinse water</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Umpire: run the known-defect comparator panel before passing parts or blaming the process.</text>
</svg>
