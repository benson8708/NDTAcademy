<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Inside the UV-A Lamp: Where the Protection Lives</text>

  <!-- lamp housing -->
  <rect x="230" y="66" width="180" height="70" rx="10" fill="#0B1F3A"/>
  <ellipse cx="320" cy="96" rx="50" ry="20" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="250" y="128" width="140" height="14" fill="#1E66F5"/>

  <!-- bulb label -->
  <line x1="268" y1="96" x2="216" y2="96" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">mercury arc bulb:</text>
  <text x="210" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">raw output is broadband UV,</text>
  <text x="210" y="118" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">incl. hazardous UV-B / UV-C</text>

  <!-- filter label -->
  <line x1="250" y1="135" x2="216" y2="152" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="156" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">UV-A filter window:</text>
  <text x="210" y="176" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">passes 320&#8211;400 nm; blocks</text>
  <text x="210" y="194" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">UV-B, UV-C, most visible</text>

  <!-- beam -->
  <polygon points="262,142 378,142 430,310 210,310" fill="#9BC4FF" fill-opacity="0.25"/>
  <text x="320" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">UV-A &#8212; peak &#8776; 365 nm</text>

  <!-- part with fluorescing indication -->
  <rect x="180" y="310" width="280" height="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 250 328 l 20 -5 l 22 7 l 20 -6 l 22 5 l 20 -4 l 18 5" fill="none" stroke="#C9F45B" stroke-width="9" opacity="0.35"/>
  <path d="M 250 328 l 20 -5 l 22 7 l 20 -6 l 22 5 l 20 -4 l 18 5" fill="none" stroke="#C9F45B" stroke-width="3.5"/>
  <text x="320" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">required at the part surface: &#8805; 1,000 &#181;W/cm&#178; UV-A</text>

  <!-- TLV comparison chip -->
  <rect x="60" y="392" width="400" height="84" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="260" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">eye guideline for prolonged near-UV exposure</text>
  <text x="260" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">(ACGIH TLV): about 1 mW/cm&#178; &#8212; the same order</text>
  <text x="260" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">the part needs. Keep the beam on the part.</text>

  <!-- working rules column -->
  <text x="480" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Working rules</text>

  <rect x="480" y="90" width="290" height="86" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="494" y="116" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D64545">Cracked or missing filter: stop</text>
  <text x="494" y="138" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the filter is all that stands between</text>
  <text x="494" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">broadband mercury UV and your eyes</text>

  <rect x="480" y="186" width="290" height="86" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="494" y="212" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Never look into the beam</text>
  <text x="494" y="234" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">UV-A makes your eye&#8217;s lens fluoresce</text>
  <text x="494" y="252" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8212; a veiling haze; chronic dose adds risk</text>

  <rect x="480" y="282" width="290" height="86" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="494" y="308" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Keep skin out of the close beam</text>
  <text x="494" y="330" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">high-output lamps can redden skin at</text>
  <text x="494" y="348" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">close range &#8212; sleeves, gloves, aim down</text>

  <rect x="480" y="378" width="290" height="86" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="494" y="404" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Wear UV-absorbing spectacles</text>
  <text x="494" y="426" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">they stop lens-fluorescence haze and</text>
  <text x="494" y="444" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">sharpen contrast; LEDs (E3022) too</text>
</svg>
