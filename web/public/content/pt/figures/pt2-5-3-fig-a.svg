<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">The Document Stack — Who Tells You What</text>

  <!-- Box 1: Contract / PO -->
  <rect x="230" y="56" width="340" height="58" rx="6" fill="#0B1F3A"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">CONTRACT / PURCHASE ORDER</text>
  <text x="400" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">invokes everything below — governs in a conflict</text>

  <line x1="400" y1="114" x2="400" y2="136" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="394,134 400,146 406,134" fill="#1E66F5"/>

  <!-- Box 2: Design documents -->
  <rect x="230" y="148" width="340" height="84" rx="6" fill="#9BC4FF" opacity="0.45"/>
  <rect x="230" y="148" width="340" height="84" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">DESIGN DOCUMENTS</text>
  <text x="400" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">drawing notes · customer specifications</text>
  <text x="400" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ASME VIII App 8 · AWS D1.1 · MIL-STD-1907</text>

  <line x1="400" y1="232" x2="400" y2="254" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="394,252 400,264 406,252" fill="#1E66F5"/>

  <!-- Box 3: Method standards -->
  <rect x="230" y="266" width="340" height="84" rx="6" fill="#9BC4FF" opacity="0.45"/>
  <rect x="230" y="266" width="340" height="84" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">METHOD STANDARDS / PRACTICES</text>
  <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ASTM E1417 · ASTM E165 (SE-165)</text>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">ASME V, Article 6 · materials per AMS 2644</text>

  <line x1="400" y1="350" x2="400" y2="372" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="394,370 400,382 406,370" fill="#1E66F5"/>

  <!-- Box 4: Written procedure -->
  <rect x="230" y="384" width="340" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">WRITTEN PROCEDURE + TECHNIQUE SHEET</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">translates both chains into one shop recipe</text>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">approved before use — typically by the Level III</text>

  <!-- Left tag: acceptance criteria -->
  <rect x="20" y="160" width="190" height="60" rx="6" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="115" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">ACCEPTANCE CRITERIA</text>
  <text x="115" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">LIVE HERE</text>
  <line x1="210" y1="190" x2="222" y2="190" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="220,184 230,190 220,196" fill="#1E66F5"/>

  <!-- Right tag: process rules -->
  <rect x="590" y="278" width="190" height="60" rx="6" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="685" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">PROCESS RULES</text>
  <text x="685" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">LIVE HERE</text>
  <line x1="590" y1="308" x2="578" y2="308" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="580,302 570,308 580,314" fill="#1E66F5"/>

  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">You evaluate to criteria flowed down from above — the inspector never invents them.</text>
</svg>
