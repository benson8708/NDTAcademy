<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Method A Wash: Stop at Background</text>

  <!-- UV lamp over station -->
  <rect x="600" y="78" width="84" height="20" rx="6" fill="#5A6B7E" stroke="#1B82E8" stroke-width="2"/>
  <text x="642" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A</text>
  <polygon points="612,98 716,238 528,238" fill="#1B82E8" opacity="0.18"/>
  <text x="752" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">wash under UV-A &#8212;</text>
  <text x="752" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">the glow is your gauge</text>

  <!-- spray nozzle -->
  <polygon points="64,128 136,150 130,174 58,152" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="142" y1="160" x2="250" y2="208" stroke="#1B82E8" stroke-width="2" opacity="0.8"/>
  <line x1="142" y1="166" x2="240" y2="226" stroke="#1B82E8" stroke-width="2" opacity="0.8"/>
  <line x1="140" y1="172" x2="226" y2="238" stroke="#1B82E8" stroke-width="2" opacity="0.8"/>
  <circle cx="266" cy="216" r="4" fill="#E8F1FB"/>
  <circle cx="286" cy="230" r="3.5" fill="#E8F1FB"/>
  <circle cx="256" cy="236" r="3" fill="#E8F1FB"/>
  <circle cx="302" cy="222" r="3" fill="#E8F1FB"/>
  <circle cx="296" cy="244" r="4" fill="#E8F1FB"/>
  <text x="56" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">coarse droplet fan &#8212; never a needle jet</text>
  <text x="56" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">&#8804; 40 psi typical</text>
  <text x="56" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">water 50&#8211;100 &#176;F</text>

  <!-- part surface -->
  <rect x="300" y="252" width="400" height="44" fill="#5A6B7E" opacity="0.35" stroke="#D9E0E8" stroke-width="2"/>
  <!-- indication that stays -->
  <ellipse cx="380" cy="274" rx="42" ry="10" fill="#1E9E6A" opacity="0.3"/>
  <path d="M 344 274 q 18 -6 36 0 q 18 6 36 0" fill="none" stroke="#1E9E6A" stroke-width="3.5"/>
  <!-- background being washed on right half -->
  <circle cx="540" cy="264" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="566" cy="280" r="2.5" fill="#1E9E6A" opacity="0.7"/>
  <circle cx="588" cy="266" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="610" cy="284" r="2.5" fill="#1E9E6A" opacity="0.6"/>
  <circle cx="632" cy="270" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="654" cy="282" r="2.5" fill="#1E9E6A" opacity="0.7"/>
  <circle cx="676" cy="266" r="3" fill="#1E9E6A" opacity="0.6"/>
  <circle cx="600" cy="258" r="2.5" fill="#1E9E6A" opacity="0.7"/>

  <!-- leader labels for plate -->
  <line x1="380" y1="290" x2="330" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="318" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">indication stays &#8212; capillarity holds flaw penetrant</text>
  <line x1="608" y1="290" x2="640" y2="322" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="700" y="342" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">background fading as you rinse</text>

  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Stop the moment the background clears &#8212;</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">washing past it strips the flaws.</text>
</svg>
