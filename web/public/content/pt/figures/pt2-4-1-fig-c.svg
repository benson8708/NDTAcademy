<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Service Cracks: Fatigue, SCC, Thermal Fatigue</text>

  <!-- ============ Panel 1: Fatigue ============ -->
  <rect x="12" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="26" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 — Fatigue crack</text>
  <text x="26" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">stepped shaft, cyclic load</text>

  <!-- stepped shaft, side view -->
  <path d="M 30 210 L 116 210 L 116 246 Q 122 246 124 250 L 124 294 Q 122 298 116 298 L 116 330 L 30 330 Z" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="124" y="250" width="106" height="44" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- fatigue crack: single sharp line across the fillet, perpendicular to shaft axis -->
  <path d="M 132 252 Q 138 272 132 292" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <!-- cyclic bending arrows at free end -->
  <line x1="216" y1="244" x2="216" y2="214" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="210,216 216,202 222,216" fill="#F2A33C"/>
  <line x1="216" y1="300" x2="216" y2="330" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="210,328 216,342 222,328" fill="#F2A33C"/>
  <text x="216" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">cyclic load</text>

  <!-- labels -->
  <line x1="134" y1="262" x2="92" y2="152" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="34" y="132" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">single sharp line at the</text>
  <text x="34" y="148" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">fillet (stress raiser)</text>

  <text x="135" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">grows perpendicular to the</text>
  <text x="135" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">cyclic stress — tightest of all,</text>
  <text x="135" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">faint when young</text>

  <!-- ============ Panel 2: SCC ============ -->
  <rect x="277" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="291" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 — Stress-corrosion (SCC)</text>
  <text x="291" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">stress + environment + alloy</text>

  <!-- plate under sustained tension -->
  <rect x="316" y="200" width="168" height="130" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="316" y1="265" x2="290" y2="265" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="292,259 280,265 292,271" fill="#F2A33C"/>
  <line x1="484" y1="265" x2="510" y2="265" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="508,259 520,265 508,271" fill="#F2A33C"/>
  <text x="400" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">sustained tensile stress</text>

  <!-- environment droplet -->
  <path d="M 460 162 Q 468 174 468 180 A 8 8 0 1 1 452 180 Q 452 174 460 162 Z" fill="#1B82E8"/>
  <text x="446" y="172" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">chlorides</text>

  <!-- branched spider cracks -->
  <polyline points="336,232 356,242 374,252 394,266 412,278 430,292" fill="none" stroke="#D14343" stroke-width="2.2"/>
  <polyline points="374,252 388,244 404,240" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <polyline points="404,240 416,232" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <polyline points="404,240 418,244" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <polyline points="394,266 408,262 424,264" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <polyline points="424,264 438,256" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <polyline points="412,278 416,294 426,306" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <polyline points="356,242 360,258 356,272" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <polyline points="356,272 346,282" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <polyline points="356,272 366,284" fill="none" stroke="#D14343" stroke-width="1.5"/>

  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">branched, forked colonies —</text>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">corrosion product mutes the bleed</text>

  <!-- ============ Panel 3: Thermal fatigue ============ -->
  <rect x="542" y="52" width="246" height="368" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5" rx="6"/>
  <text x="556" y="78" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 — Thermal fatigue</text>
  <text x="556" y="98" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">heat checking of cycled faces</text>

  <!-- heat waves -->
  <path d="M 600 168 Q 606 156 600 144 Q 594 132 600 120" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 640 168 Q 646 156 640 144 Q 634 132 640 120" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 680 168 Q 686 156 680 144 Q 674 132 680 120" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="700" y="150" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">heat, then</text>
  <text x="700" y="166" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">cool — again</text>

  <!-- heat-cycled face with craze network -->
  <rect x="566" y="186" width="198" height="144" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <polyline points="584,204 608,210 632,202 658,212 684,206 710,214 736,206" fill="none" stroke="#D14343" stroke-width="1.7"/>
  <polyline points="582,244 606,238 634,248 660,240 688,250 714,242 740,248" fill="none" stroke="#D14343" stroke-width="1.7"/>
  <polyline points="584,286 610,292 636,282 662,292 690,284 716,294 740,286" fill="none" stroke="#D14343" stroke-width="1.7"/>
  <polyline points="592,312 618,306 646,314 674,306 702,314 728,308" fill="none" stroke="#D14343" stroke-width="1.7"/>
  <line x1="608" y1="210" x2="606" y2="238" stroke="#D14343" stroke-width="1.7"/>
  <line x1="658" y1="212" x2="660" y2="240" stroke="#D14343" stroke-width="1.7"/>
  <line x1="710" y1="214" x2="714" y2="242" stroke="#D14343" stroke-width="1.7"/>
  <line x1="634" y1="248" x2="636" y2="282" stroke="#D14343" stroke-width="1.7"/>
  <line x1="688" y1="250" x2="690" y2="284" stroke="#D14343" stroke-width="1.7"/>
  <line x1="582" y1="244" x2="584" y2="286" stroke="#D14343" stroke-width="1.7"/>
  <line x1="740" y1="248" x2="740" y2="286" stroke="#D14343" stroke-width="1.7"/>
  <line x1="610" y1="292" x2="618" y2="306" stroke="#D14343" stroke-width="1.7"/>
  <line x1="690" y1="284" x2="702" y2="314" stroke="#D14343" stroke-width="1.7"/>

  <text x="665" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">shallow craze network — brakes,</text>
  <text x="665" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">hot-work dies, exhaust parts;</text>
  <text x="665" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">ignores grinding direction</text>

  <!-- shared takeaway -->
  <line x1="60" y1="446" x2="724" y2="446" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="724,439 740,446 724,453" fill="#F2A33C"/>
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Service cracks come tight and dirty — cleaning, dwell, and sensitivity decide if they show</text>
</svg>
