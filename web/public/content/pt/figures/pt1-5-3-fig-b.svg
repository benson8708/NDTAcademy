<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Standard Temperature Window for PT Materials (Typical)</text>

  <!-- upper annotations -->
  <text x="160" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Penetrant sluggish; condensation</text>
  <text x="160" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and frost block flaws. Warm the part</text>
  <text x="160" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">or use a qualified low-temp system.</text>
  <line x1="160" y1="150" x2="152" y2="188" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="640" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Penetrant dries on the part;</text>
  <text x="640" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dye degrades. Qualified</text>
  <text x="640" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">high-temperature systems only.</text>
  <line x1="640" y1="150" x2="658" y2="188" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- temperature bar: 0 to 160 F mapped to x=70..730 -->
  <rect x="70" y="190" width="165" height="48" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="152" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">TOO COLD</text>

  <rect x="235" y="190" width="351" height="48" fill="#1E9E6A"/>
  <text x="410" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">STANDARD BAND</text>
  <text x="410" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">40–125 °F (4–52 °C)</text>

  <rect x="586" y="190" width="144" height="48" fill="#D14343"/>
  <text x="658" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">TOO HOT</text>

  <!-- ticks -->
  <line x1="70" y1="238" x2="70" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="235" y1="238" x2="235" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="586" y1="238" x2="586" y2="252" stroke="#0A2342" stroke-width="2"/>
  <line x1="730" y1="238" x2="730" y2="252" stroke="#0A2342" stroke-width="2"/>
  <text x="70" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">0 °F</text>
  <text x="235" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">40 °F</text>
  <text x="586" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">125 °F</text>
  <text x="730" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">160 °F</text>

  <!-- band applies note -->
  <text x="410" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">band applies to the PART and the MATERIALS at application</text>

  <!-- dryer limit flag -->
  <line x1="730" y1="252" x2="716" y2="306" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="716" y="328" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">related limit: dryer part temperature ≤ 160 °F (typ.)</text>

  <!-- bottom notes -->
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Outside 40–125 °F, standard qualification no longer applies —</text>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">specially qualified materials and procedures take over.</text>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Verify with a contact thermometer on the part surface. Typical procedure values — your written procedure governs.</text>
</svg>
