<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Pick the Mildest Method That Works</text>

  <!-- question box -->
  <rect x="250" y="56" width="300" height="42" rx="8" fill="#0A2342"/>
  <text x="400" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">What residue is on the part?</text>

  <!-- arrows to columns -->
  <line x1="330" y1="98" x2="152" y2="124" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="158,116 142,126 160,130" fill="#5A6B7E"/>
  <line x1="400" y1="98" x2="400" y2="124" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="393,122 400,134 407,122" fill="#5A6B7E"/>
  <line x1="470" y1="98" x2="648" y2="124" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="640,130 658,126 642,116" fill="#5A6B7E"/>

  <!-- column headers -->
  <rect x="30" y="136" width="230" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="145" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Dry powder</text>
  <rect x="285" y="136" width="230" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Aqueous developer film</text>
  <rect x="540" y="136" width="230" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="655" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Nonaqueous + penetrant</text>

  <!-- arrows down -->
  <line x1="145" y1="180" x2="145" y2="196" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="139,194 145,206 151,194" fill="#5A6B7E"/>
  <line x1="400" y1="180" x2="400" y2="196" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="394,194 400,206 406,194" fill="#5A6B7E"/>
  <line x1="655" y1="180" x2="655" y2="196" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="649,194 655,206 661,194" fill="#5A6B7E"/>

  <!-- method boxes -->
  <rect x="30" y="208" width="230" height="84" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="145" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Low-pressure air</text>
  <text x="145" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">blow-off, or a plain</text>
  <text x="145" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">water rinse</text>

  <rect x="285" y="208" width="230" height="84" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="400" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Warm water rinse;</text>
  <text x="400" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">detergent wash if</text>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the film dried hard</text>

  <rect x="540" y="208" width="230" height="84" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="655" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Solvent wipe or</text>
  <text x="655" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">detergent wash; vapor</text>
  <text x="655" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">degrease; ultrasonic</text>

  <!-- caution box -->
  <rect x="30" y="306" width="740" height="56" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Avoid wire brushing and abrasive blasting on finished parts —</text>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">they smear metal over flaw openings and compromise future tests.</text>

  <!-- finish bar -->
  <rect x="30" y="376" width="740" height="58" rx="8" fill="#1E9E6A"/>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Then dry thoroughly — blind holes, threads, faying surfaces —</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">apply corrosion preventive when required, and close the paperwork</text>
</svg>
