<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0B1F3A">Two Postemulsifiable Chemistries: Diffusion vs Detergent</text>

  <!-- ===== Left panel: Method B (lipophilic) ===== -->
  <text x="206" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method B &#8212; lipophilic (oil-base)</text>
  <text x="206" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">diffuses into the penetrant &#8212; time sets depth</text>

  <text x="206" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">contact time sets how deep emulsification reaches</text>
  <line x1="250" y1="154" x2="250" y2="190" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="246,190 250,198 254,190" fill="#0B1F3A"/>

  <!-- emulsifier layer -->
  <rect x="44" y="194" width="324" height="18" fill="#9BC4FF"/>
  <text x="54" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lipophilic emulsifier</text>
  <!-- diffusion arrows into penetrant layer -->
  <line x1="310" y1="200" x2="310" y2="218" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="306,218 310,226 314,218" fill="#0B1F3A"/>
  <line x1="345" y1="200" x2="345" y2="218" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="341,218 345,226 349,218" fill="#0B1F3A"/>
  <!-- excess penetrant layer -->
  <rect x="44" y="212" width="324" height="18" fill="#1E66F5"/>
  <text x="54" y="226" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">excess penetrant (not yet washable)</text>
  <!-- part with crack -->
  <rect x="44" y="230" width="324" height="130" fill="#0B1F3A"/>
  <polygon points="200,230 212,230 208,325 204,325" fill="#1E66F5"/>
  <text x="206" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">flaw penetrant must survive removal</text>

  <!-- left control strip -->
  <rect x="44" y="392" width="324" height="84" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="56" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; dip or flow on &#8212; never spray or brush</text>
  <text x="56" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; no agitation during emulsifier contact</text>
  <text x="56" y="462" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; timed: commonly &#8804; 3 min, then water rinse</text>

  <!-- ===== Right panel: Method D (hydrophilic) ===== -->
  <text x="594" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method D &#8212; hydrophilic (water-base)</text>
  <text x="594" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-style="italic" fill="#0B1F3A">acts at the surface &#8212; concentration and time</text>

  <text x="594" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pre-rinse took the bulk; remover lifts what is left</text>
  <line x1="640" y1="154" x2="640" y2="178" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="636,178 640,186 644,178" fill="#0B1F3A"/>

  <!-- remover solution region -->
  <rect x="432" y="186" width="324" height="34" fill="#9BC4FF"/>
  <text x="442" y="201" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">hydrophilic remover solution</text>
  <!-- lifted penetrant droplets -->
  <circle cx="660" cy="198" r="4" fill="#1E66F5"/>
  <circle cx="690" cy="194" r="3" fill="#1E66F5"/>
  <circle cx="715" cy="200" r="3.5" fill="#1E66F5"/>
  <!-- scrubbing action arcs at the surface -->
  <path d="M 620 216 q 12 -12 24 0" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <path d="M 660 216 q 12 -12 24 0" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <path d="M 700 216 q 12 -12 24 0" stroke="#0B1F3A" stroke-width="2" fill="none"/>
  <!-- thin remaining penetrant film -->
  <rect x="432" y="220" width="324" height="10" fill="#1E66F5"/>
  <!-- part with crack -->
  <rect x="432" y="230" width="324" height="130" fill="#0B1F3A"/>
  <polygon points="588,230 600,230 596,325 592,325" fill="#1E66F5"/>
  <text x="444" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">&#8593; thin film left by the pre-rinse</text>
  <text x="594" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">flaw penetrant must survive removal</text>

  <!-- right control strip -->
  <rect x="432" y="392" width="324" height="84" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="444" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; plain-water pre-rinse comes first</text>
  <text x="444" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; concentration: immersion commonly &#8804; 35 %</text>
  <text x="444" y="462" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">&#8226; contact commonly &#8804; 2 min, then final rinse</text>

  <!-- footer -->
  <text x="400" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Typical limits shown &#8212; the written procedure governs; removal chemistry must never reach flaw-trapped penetrant.</text>
</svg>
