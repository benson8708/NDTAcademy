<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Contaminants That Defeat Penetrant Entry</text>

  <!-- Panel 1: clean and open -->
  <text x="106" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 &#183; Clean &amp; open</text>
  <rect x="26" y="176" width="160" height="14" fill="#D14343"/>
  <rect x="26" y="190" width="160" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="100,190 112,190 107,300 105,300" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="102,191 110,191 107,296 105,296" fill="#D14343"/>
  <text x="106" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">&#10003; Penetrant enters</text>
  <text x="106" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">capillary entry works</text>

  <!-- Panel 2: soil in the flaw -->
  <text x="302" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 &#183; Soil in the flaw</text>
  <rect x="222" y="176" width="160" height="14" fill="#D14343"/>
  <rect x="222" y="190" width="160" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="296,190 308,190 303,300 301,300" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="297,191 307,191 303,285 301,285" fill="#5A6B7E"/>
  <text x="302" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; Soil blocks entry</text>
  <text x="302" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">degrease / clean first</text>

  <!-- Panel 3: smeared metal -->
  <text x="498" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">3 &#183; Smeared metal</text>
  <rect x="418" y="176" width="160" height="14" fill="#D14343"/>
  <rect x="418" y="190" width="160" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="492,194 504,194 499,300 497,300" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 474 191 Q 498 184 522 191" fill="none" stroke="#0A2342" stroke-width="7"/>
  <text x="498" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; Mouth sealed shut</text>
  <text x="498" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">etch to re-open</text>

  <!-- Panel 4: coating bridge -->
  <text x="694" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">4 &#183; Coating bridge</text>
  <rect x="614" y="164" width="160" height="14" fill="#D14343"/>
  <rect x="614" y="178" width="160" height="12" fill="#F2A33C"/>
  <rect x="614" y="190" width="160" height="140" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polygon points="688,190 700,190 695,300 693,300" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="694" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">&#10005; Opening bridged</text>
  <text x="694" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">strip coating first</text>

  <!-- legend -->
  <rect x="160" y="408" width="18" height="14" fill="#D14343"/>
  <text x="186" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">penetrant film</text>
  <rect x="350" y="408" width="18" height="14" fill="#5A6B7E"/>
  <text x="376" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">soil (oil, grease)</text>
  <rect x="560" y="408" width="18" height="14" fill="#F2A33C"/>
  <text x="586" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coating / paint</text>
</svg>
