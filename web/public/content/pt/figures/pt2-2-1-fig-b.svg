<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Why Postemulsifiable Removal Protects Shallow Flaws</text>

  <!-- panel divider -->
  <line x1="400" y1="56" x2="400" y2="424" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ================= LEFT PANEL: Method A ================= -->
  <text x="207" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method A — self-emulsifying penetrant</text>

  <!-- spray nozzle and water fan -->
  <rect x="185" y="86" width="44" height="14" rx="3" fill="#0B1F3A"/>
  <line x1="207" y1="100" x2="160" y2="150" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="207" y1="100" x2="190" y2="152" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="207" y1="100" x2="224" y2="152" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="207" y1="100" x2="254" y2="150" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <text x="262" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">water rinse</text>

  <!-- penetrant leaving the flaw -->
  <circle cx="190" cy="168" r="4" fill="#1E66F5" opacity="0.85"/>
  <circle cx="212" cy="158" r="4" fill="#1E66F5" opacity="0.85"/>
  <circle cx="232" cy="166" r="4" fill="#1E66F5" opacity="0.85"/>
  <line x1="190" y1="222" x2="190" y2="184" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="184,186 190,172 196,186" fill="#1E66F5"/>
  <line x1="228" y1="222" x2="228" y2="184" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="222,186 228,172 234,186" fill="#1E66F5"/>

  <!-- metal block -->
  <rect x="50" y="210" width="305" height="120" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- shallow broad flaw, mostly stripped -->
  <path d="M 140,210 L 165,236 L 250,238 L 275,210 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 170,233 L 246,235 L 240,238 L 176,237 Z" fill="#1E66F5"/>
  <!-- flaw label -->
  <line x1="215" y1="240" x2="282" y2="266" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="290" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shallow, broad flaw</text>
  <text x="76" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">metal</text>

  <!-- verdict -->
  <text x="207" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wash water emulsifies all of the penetrant,</text>
  <text x="207" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">including the entrapment in the flaw</text>
  <text x="207" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">✕ extended rinse strips it — indication lost</text>

  <!-- ================= RIGHT PANEL: Method D ================= -->
  <text x="592" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Method D — hydrophilic remover</text>

  <text x="592" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">detergent-action remover —</text>
  <text x="592" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">works only on the surface excess</text>

  <!-- remover band -->
  <rect x="435" y="150" width="305" height="16" rx="4" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="470" cy="158" r="2.5" fill="#1E66F5"/>
  <circle cx="520" cy="158" r="2.5" fill="#1E66F5"/>
  <circle cx="570" cy="158" r="2.5" fill="#1E66F5"/>
  <circle cx="620" cy="158" r="2.5" fill="#1E66F5"/>
  <circle cx="670" cy="158" r="2.5" fill="#1E66F5"/>
  <circle cx="712" cy="158" r="2.5" fill="#1E66F5"/>

  <!-- stop marker at surface -->
  <line x1="592" y1="166" x2="592" y2="196" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="578" y1="198" x2="606" y2="198" stroke="#0B1F3A" stroke-width="3"/>
  <text x="604" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">stops here</text>

  <!-- surface excess being displaced (right half remains) -->
  <rect x="560" y="202" width="180" height="8" fill="#1E66F5" opacity="0.85"/>
  <line x1="548" y1="206" x2="500" y2="206" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="502,200 488,206 502,212" fill="#1E66F5"/>
  <text x="468" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">excess lifts off</text>

  <!-- metal block -->
  <rect x="435" y="210" width="305" height="120" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- shallow broad flaw, still full -->
  <path d="M 525,210 L 550,236 L 635,238 L 660,210 Z" fill="#1E66F5"/>
  <!-- flaw label -->
  <line x1="638" y1="240" x2="692" y2="266" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="694" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flaw stays loaded</text>
  <text x="461" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">metal</text>

  <!-- verdict -->
  <text x="592" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the remover displaces surface excess only —</text>
  <text x="592" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">it does not diffuse into the entrapment</text>
  <text x="592" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">✓ entrapment survives — indication forms</text>

  <!-- takeaway bar -->
  <rect x="60" y="438" width="680" height="50" rx="8" fill="#0B1F3A"/>
  <text x="400" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Take the emulsifier out of the penetrant and removal becomes a surface-only process —</text>
  <text x="400" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">the shallow entrapment survives to form an indication.</text>
</svg>
