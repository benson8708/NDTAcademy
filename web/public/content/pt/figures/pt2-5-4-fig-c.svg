<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Anatomy of the Finished PT Report — Built to Stand Alone</text>

  <!-- report page -->
  <rect x="40" y="58" width="424" height="420" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- header block -->
  <rect x="52" y="70" width="400" height="84" fill="#9BC4FF" opacity="0.15"/>
  <rect x="52" y="70" width="400" height="84" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">PT EXAMINATION REPORT — No. 26-0412</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Part: vessel S/N 88231 · nozzle weld N-2 · SA-516-70</text>
  <text x="60" y="128" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Procedure: PT-204 Rev C · Method: ASME V, Art. 6</text>
  <text x="60" y="146" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Acceptance: ASME VIII Div. 1, Mandatory Appendix 8</text>

  <!-- process block -->
  <rect x="52" y="162" width="400" height="102" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="182" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">PROCESS — AS RUN</text>
  <text x="60" y="202" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Type II · Method C · form e — batch nos. logged</text>
  <text x="60" y="220" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface 68 °F · dwell 10 min, kept wet</text>
  <text x="60" y="238" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">solvent-dampened wipe — no flushing</text>
  <text x="60" y="256" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">white light 112 fc · meter SN 412 · cal due 09/26</text>

  <!-- results block -->
  <rect x="52" y="272" width="400" height="106" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="292" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">RESULTS — one log row per indication</text>
  <text x="60" y="312" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A false (wipes off, no return) · B nonrelevant</text>
  <text x="60" y="330" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(pad faying edge) · E ≤ 1/16 in. — not relevant</text>
  <text x="60" y="348" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">D rounded, 1/8 in. — accept</text>
  <text x="60" y="368" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C relevant LINEAR, 1/4 × 1/16 in. — REJECT</text>

  <!-- disposition block -->
  <rect x="52" y="386" width="400" height="42" fill="#9BC4FF" opacity="0.25"/>
  <rect x="52" y="386" width="400" height="42" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="60" y="403" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">DISPOSITION: REJECT — relevant linear at toe;</text>
  <text x="60" y="421" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Mand. App. 8 — no relevant linear permitted</text>

  <!-- signature block -->
  <rect x="52" y="436" width="400" height="34" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="60" y="450" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Examiner: R. Alvarez — NDT Level II (PT) — 06/12</text>
  <text x="60" y="466" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">status marked · weldment segregated · QS review</text>

  <!-- annotations -->
  <rect x="486" y="66" width="298" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="498" y="88" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">TRACEABLE</text>
  <text x="498" y="108" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">serial ↔ report ↔ procedure rev ↔</text>
  <text x="498" y="126" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">batch numbers — one thread to pull</text>
  <line x1="464" y1="112" x2="486" y2="102" stroke="#1E66F5" stroke-width="1.5"/>

  <rect x="486" y="150" width="298" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="498" y="172" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">REAL NUMBERS</text>
  <text x="498" y="192" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">measured values, meter serial and</text>
  <text x="498" y="210" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">cal due date — never just "OK"</text>
  <line x1="464" y1="213" x2="486" y2="186" stroke="#1E66F5" stroke-width="1.5"/>

  <rect x="486" y="234" width="298" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="498" y="256" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">ONE ROW PER INDICATION</text>
  <text x="498" y="276" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">location · size · interpretation ·</text>
  <text x="498" y="294" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">classification · disposition</text>
  <line x1="464" y1="325" x2="486" y2="270" stroke="#1E66F5" stroke-width="1.5"/>

  <rect x="486" y="318" width="298" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="498" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">CITE IT</text>
  <text x="498" y="360" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">document + edition + requirement —</text>
  <text x="498" y="378" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">"per code" decides nothing</text>
  <line x1="464" y1="407" x2="486" y2="354" stroke="#1E66F5" stroke-width="1.5"/>

  <rect x="486" y="402" width="298" height="72" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="498" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">STANDS ALONE</text>
  <text x="498" y="444" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">corrections: line out, initial, date;</text>
  <text x="498" y="462" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">a stranger reaches the same call</text>
  <line x1="464" y1="453" x2="486" y2="438" stroke="#1E66F5" stroke-width="1.5"/>
</svg>
