<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">What Each Method Adds Between Dwell and Developer</text>

  <!-- legend -->
  <rect x="120" y="44" width="14" height="14" fill="#F2A33C"/>
  <text x="142" y="56" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">amber = the removal-control step that sets sensitivity</text>

  <!-- ===== Lane A (center y=94) ===== -->
  <text x="14" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method A</text>
  <rect x="120" y="70" width="92" height="48" rx="6" fill="#1E9E6A"/>
  <text x="166" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Penetrant</text>
  <text x="166" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">+ dwell</text>
  <line x1="212" y1="94" x2="297" y2="94" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="297,89 305,94 297,99" fill="#5A6B7E"/>
  <rect x="307" y="70" width="92" height="48" rx="6" fill="#1B82E8"/>
  <text x="353" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Water wash</text>
  <text x="353" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">&#8804; 40 psi</text>
  <line x1="399" y1="94" x2="483" y2="94" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="483,89 491,94 483,99" fill="#5A6B7E"/>
  <rect x="493" y="70" width="92" height="48" rx="6" fill="#D9E0E8"/>
  <text x="539" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry</text>
  <line x1="585" y1="94" x2="670" y2="94" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="670,89 678,94 670,99" fill="#5A6B7E"/>
  <rect x="680" y="70" width="92" height="48" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="726" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer</text>
  <text x="307" y="134" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">coarse spray - stop at background</text>

  <!-- ===== Lane B (center y=176) ===== -->
  <text x="14" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method B</text>
  <rect x="120" y="152" width="92" height="48" rx="6" fill="#1E9E6A"/>
  <text x="166" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Penetrant</text>
  <text x="166" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">+ dwell</text>
  <line x1="212" y1="176" x2="250" y2="176" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="250,171 258,176 250,181" fill="#5A6B7E"/>
  <rect x="260" y="152" width="92" height="48" rx="6" fill="#F2A33C"/>
  <text x="306" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Emulsifier</text>
  <text x="306" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">timed dip</text>
  <line x1="352" y1="176" x2="390" y2="176" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="390,171 398,176 390,181" fill="#5A6B7E"/>
  <rect x="400" y="152" width="92" height="48" rx="6" fill="#1B82E8"/>
  <text x="446" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Water</text>
  <text x="446" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">rinse</text>
  <line x1="492" y1="176" x2="530" y2="176" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="530,171 538,176 530,181" fill="#5A6B7E"/>
  <rect x="540" y="152" width="92" height="48" rx="6" fill="#D9E0E8"/>
  <text x="586" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry</text>
  <line x1="632" y1="176" x2="670" y2="176" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="670,171 678,176 670,181" fill="#5A6B7E"/>
  <rect x="680" y="152" width="92" height="48" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="726" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer</text>
  <text x="260" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">lipophilic - do not agitate</text>

  <!-- ===== Lane C (center y=258) ===== -->
  <text x="14" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method C</text>
  <rect x="120" y="234" width="92" height="48" rx="6" fill="#1E9E6A"/>
  <text x="166" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Penetrant</text>
  <text x="166" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">+ dwell</text>
  <line x1="212" y1="258" x2="297" y2="258" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="297,253 305,258 297,263" fill="#5A6B7E"/>
  <rect x="307" y="234" width="92" height="48" rx="6" fill="#1B82E8"/>
  <text x="353" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Dry wipe</text>
  <line x1="399" y1="258" x2="483" y2="258" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="483,253 491,258 483,263" fill="#5A6B7E"/>
  <rect x="493" y="234" width="92" height="48" rx="6" fill="#F2A33C"/>
  <text x="539" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Solvent-</text>
  <text x="539" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">damp wipe</text>
  <line x1="585" y1="258" x2="670" y2="258" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="670,253 678,258 670,263" fill="#5A6B7E"/>
  <rect x="680" y="234" width="92" height="48" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="726" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer</text>
  <text x="726" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">nonaqueous</text>
  <text x="493" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">dampened cloth - never flood</text>

  <!-- ===== Lane D (center y=340) ===== -->
  <text x="14" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Method D</text>
  <rect x="120" y="316" width="92" height="48" rx="6" fill="#1E9E6A"/>
  <text x="166" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Penetrant</text>
  <text x="166" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">+ dwell</text>
  <line x1="212" y1="340" x2="222" y2="340" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="222,335 230,340 222,345" fill="#5A6B7E"/>
  <rect x="232" y="316" width="92" height="48" rx="6" fill="#1B82E8"/>
  <text x="278" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Pre-rinse</text>
  <line x1="324" y1="340" x2="334" y2="340" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="334,335 342,340 334,345" fill="#5A6B7E"/>
  <rect x="344" y="316" width="92" height="48" rx="6" fill="#F2A33C"/>
  <text x="390" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Remover</text>
  <text x="390" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">dip 5&#8211;35%</text>
  <line x1="436" y1="340" x2="446" y2="340" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="446,335 454,340 446,345" fill="#5A6B7E"/>
  <rect x="456" y="316" width="92" height="48" rx="6" fill="#1B82E8"/>
  <text x="502" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Final</text>
  <text x="502" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">rinse</text>
  <line x1="548" y1="340" x2="558" y2="340" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="558,335 566,340 558,345" fill="#5A6B7E"/>
  <rect x="568" y="316" width="92" height="48" rx="6" fill="#D9E0E8"/>
  <text x="614" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry</text>
  <line x1="660" y1="340" x2="670" y2="340" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="670,335 678,340 670,345" fill="#5A6B7E"/>
  <rect x="680" y="316" width="92" height="48" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="726" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Developer</text>
  <text x="344" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">hydrophilic - verify % by refractometer</text>

  <!-- footnotes -->
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Aqueous developer is applied before drying; dry powder and nonaqueous forms after.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Typical values shown - your written procedure governs times, pressures, and temperatures.</text>
</svg>
