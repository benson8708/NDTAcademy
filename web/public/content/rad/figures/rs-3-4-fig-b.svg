<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Relative Radiosensitivity of Tissues</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Bergonié–Tribondeau: dividing, undifferentiated cells are most sensitive</text>

  <!-- HIGH band -->
  <rect x="50" y="78" width="700" height="98" rx="8" fill="#D14343" opacity="0.18"/>
  <rect x="50" y="78" width="8" height="98" fill="#D14343"/>
  <text x="74" y="104" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">HIGH sensitivity</text>
  <text x="74" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Lymphocytes and bone marrow (blood-forming)</text>
  <text x="74" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Reproductive cells (gonads) · intestinal lining</text>
  <text x="74" y="172" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Lens of the eye</text>

  <!-- INTERMEDIATE band -->
  <rect x="50" y="186" width="700" height="92" rx="8" fill="#F2A33C" opacity="0.18"/>
  <rect x="50" y="186" width="8" height="92" fill="#F2A33C"/>
  <text x="74" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">INTERMEDIATE sensitivity</text>
  <text x="74" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Skin and other surface epithelium</text>
  <text x="74" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Lung · liver · kidney · other organ tissue</text>

  <!-- LOW band -->
  <rect x="50" y="288" width="700" height="84" rx="8" fill="#1E9E6A" opacity="0.18"/>
  <rect x="50" y="288" width="8" height="84" fill="#1E9E6A"/>
  <text x="74" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">LOW sensitivity</text>
  <text x="74" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Muscle · bone · cartilage</text>
  <text x="74" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Mature nerve cells (rarely divide)</text>

  <!-- arrow of decreasing sensitivity -->
  <line x1="772" y1="88" x2="772" y2="362" stroke="#9BC4FF" stroke-width="2"/>
  <polygon points="766,352 772,366 778,352" fill="#9BC4FF"/>
  <text x="788" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF" transform="rotate(90 788 225)">decreasing radiosensitivity</text>

  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#E8F1FB">Tissue weighting factors in dose calculations follow this same ranking.</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">This is why the whole-body limit (5 rem) is far stricter than the skin limit (50 rem).</text>
</svg>
