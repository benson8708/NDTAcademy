<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Overnight Storage — Inspect This Setup</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The crew has left for the night — examine each highlighted detail.</text>

  <!-- ground -->
  <line x1="30" y1="420" x2="775" y2="420" stroke="#0B1F3A" stroke-width="3"/>

  <!-- fence -->
  <rect x="742" y="332" width="44" height="5" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="742" y="368" width="44" height="5" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="748" y="312" width="6" height="108" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="772" y="312" width="6" height="108" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- truck bed and cab -->
  <rect x="228" y="378" width="440" height="20" fill="#0B1F3A"/>
  <rect x="88" y="268" width="140" height="130" rx="10" fill="#1E66F5" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="106" y="286" width="76" height="46" rx="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- wheels -->
  <circle cx="152" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="152" cy="396" r="7" fill="#0B1F3A"/>
  <circle cx="540" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="540" cy="396" r="7" fill="#0B1F3A"/>
  <circle cx="626" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="626" cy="396" r="7" fill="#0B1F3A"/>

  <!-- keys note at cab -->
  <rect x="92" y="212" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="106" cy="228" r="6" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="106" y1="234" x2="106" y2="248" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="106" y1="244" x2="112" y2="244" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="175" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">keys removed —</text>
  <text x="175" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crew has them</text>

  <!-- storage compartment (cutaway) -->
  <rect x="276" y="180" width="380" height="198" rx="8" fill="#E8F0FB" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="576" y1="180" x2="576" y2="378" stroke="#0B1F3A" stroke-width="2"/>

  <!-- mounting bolts -->
  <rect x="292" y="372" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="460" y="372" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="628" y="372" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>

  <!-- camera locked and anchored -->
  <text x="372" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">locked + anchored</text>
  <rect x="312" y="282" width="120" height="60" rx="10" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M340 282 q30 -18 60 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M424 300 v-6 a8 8 0 0 1 16 0 v6" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="419" y="300" width="26" height="19" rx="3" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="348" y1="342" x2="348" y2="368" stroke="#0B1F3A" stroke-width="3" stroke-dasharray="5 4"/>
  <rect x="332" y="366" width="32" height="8" fill="#0B1F3A"/>

  <!-- container label on compartment panel -->
  <rect x="466" y="200" width="96" height="78" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <g transform="translate(514,226) scale(0.55)">
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5" transform="rotate(120)"/>
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5" transform="rotate(240)"/>
    <circle cx="0" cy="0" r="7.5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="4" fill="#0B1F3A"/>
  </g>
  <text x="514" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">DANGER</text>
  <text x="514" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">RADIOACTIVE</text>

  <!-- door padlock -->
  <path d="M604 296 v-8 a10 10 0 0 1 20 0 v8" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <rect x="596" y="296" width="36" height="26" rx="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="616" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">door</text>
  <text x="616" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">padlocked</text>

  <!-- surveyor at fence -->
  <rect x="652" y="232" width="120" height="46" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="700,278 710,278 705,292" fill="#1E66F5"/>
  <text x="712" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">0.5 mR/h</text>
  <text x="712" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at the fence</text>
  <circle cx="706" cy="300" r="11" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="706" y1="311" x2="706" y2="348" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="706" y1="348" x2="694" y2="378" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="706" y1="348" x2="718" y2="378" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="706" y1="322" x2="690" y2="334" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="662" y="328" width="28" height="20" rx="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="670" y1="344" x2="682" y2="332" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- bottom note -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Five details are highlighted in the exercise — judge each one against 10 CFR 20, 34, and 37.</text>
</svg>
