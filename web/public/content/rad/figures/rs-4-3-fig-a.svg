<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Static Voltage from Ordinary Movement — and What You Can Feel</text>

  <!-- legend -->
  <rect x="180" y="50" width="22" height="14" fill="#1E66F5"/>
  <text x="210" y="62" font-size="14" fill="#0B1F3A">Dry air (10–25% RH)</text>
  <rect x="420" y="50" width="22" height="14" fill="#9BC4FF"/>
  <text x="450" y="62" font-size="14" fill="#0B1F3A">Humid air (65–90% RH)</text>

  <!-- group 1: walking across carpet -->
  <text x="238" y="109" text-anchor="end" font-size="15" fill="#0B1F3A">Walking across</text>
  <text x="238" y="127" text-anchor="end" font-size="15" fill="#0B1F3A">carpet</text>
  <rect x="250" y="95" width="510" height="18" fill="#1E66F5"/>
  <text x="752" y="109" text-anchor="end" font-size="14" font-weight="bold" fill="#FFFFFF">35,000 V</text>
  <rect x="250" y="119" width="22" height="18" fill="#9BC4FF"/>
  <text x="280" y="133" font-size="14" fill="#0B1F3A">1,500 V</text>

  <!-- group 2: picking up a poly bag -->
  <text x="238" y="182" text-anchor="end" font-size="15" fill="#0B1F3A">Picking up a</text>
  <text x="238" y="200" text-anchor="end" font-size="15" fill="#0B1F3A">poly bag</text>
  <rect x="250" y="168" width="291" height="18" fill="#1E66F5"/>
  <text x="549" y="182" font-size="14" font-weight="bold" fill="#0B1F3A">20,000 V</text>
  <rect x="250" y="192" width="18" height="18" fill="#9BC4FF"/>
  <text x="276" y="206" font-size="14" fill="#0B1F3A">1,200 V</text>

  <!-- group 3: walking on vinyl floor -->
  <text x="238" y="255" text-anchor="end" font-size="15" fill="#0B1F3A">Walking on a</text>
  <text x="238" y="273" text-anchor="end" font-size="15" fill="#0B1F3A">vinyl floor</text>
  <rect x="250" y="241" width="175" height="18" fill="#1E66F5"/>
  <text x="433" y="255" font-size="14" font-weight="bold" fill="#0B1F3A">12,000 V</text>
  <rect x="250" y="265" width="4" height="18" fill="#9BC4FF"/>
  <text x="262" y="279" font-size="14" fill="#0B1F3A">250 V</text>

  <!-- group 4: working at a bench -->
  <text x="238" y="328" text-anchor="end" font-size="15" fill="#0B1F3A">Working at</text>
  <text x="238" y="346" text-anchor="end" font-size="15" fill="#0B1F3A">a bench</text>
  <rect x="250" y="314" width="87" height="18" fill="#1E66F5"/>
  <text x="345" y="328" font-size="14" font-weight="bold" fill="#0B1F3A">6,000 V</text>
  <rect x="250" y="338" width="3" height="18" fill="#9BC4FF"/>
  <text x="261" y="352" font-size="14" fill="#0B1F3A">100 V</text>

  <!-- perception threshold line at 3,000 V -->
  <line x1="294" y1="86" x2="294" y2="400" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="302" y="90" font-size="14" font-weight="bold" fill="#0B1F3A">feel threshold ≈ 3,000 V</text>

  <!-- axis -->
  <line x1="250" y1="400" x2="760" y2="400" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="250" y1="400" x2="250" y2="407" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="396" y1="400" x2="396" y2="407" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="541" y1="400" x2="541" y2="407" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="687" y1="400" x2="687" y2="407" stroke="#0B1F3A" stroke-width="2"/>
  <text x="250" y="422" text-anchor="middle" font-size="14" fill="#0B1F3A">0</text>
  <text x="396" y="422" text-anchor="middle" font-size="14" fill="#0B1F3A">10,000</text>
  <text x="541" y="422" text-anchor="middle" font-size="14" fill="#0B1F3A">20,000</text>
  <text x="687" y="422" text-anchor="middle" font-size="14" fill="#0B1F3A">30,000</text>
  <text x="757" y="422" text-anchor="middle" font-size="14" fill="#0B1F3A">volts</text>

  <!-- takeaway box -->
  <rect x="70" y="434" width="660" height="54" rx="8" fill="#9BC4FF" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="456" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">Below ≈3,000 V you feel nothing — yet sensitive initiators fire at far lower energies.</text>
  <text x="400" y="477" text-anchor="middle" font-size="14" fill="#0B1F3A">Typical values, DOD-HDBK-263. Dry air multiplies every number; humid air bleeds charge away.</text>
</svg>
