<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Direct-Reading Pocket Dosimeter (Cutaway)</text>

  <!-- pocket clip -->
  <rect x="150" y="150" width="180" height="12" rx="6" fill="#5A6B7E"/>
  <rect x="150" y="162" width="12" height="22" fill="#5A6B7E"/>
  <text x="160" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">pocket clip</text>

  <!-- barrel -->
  <rect x="110" y="180" width="560" height="90" rx="14" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- eyepiece -->
  <circle cx="110" cy="225" r="26" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <circle cx="110" cy="225" r="12" fill="#1B82E8" opacity="0.5"/>
  <text x="110" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">eyepiece</text>
  <line x1="110" y1="254" x2="110" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- objective lens -->
  <ellipse cx="200" cy="225" rx="8" ry="32" fill="#1B82E8" opacity="0.35" stroke="#1B82E8" stroke-width="2"/>
  <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">objective lens</text>
  <line x1="200" y1="260" x2="200" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- scale reticle -->
  <rect x="254" y="195" width="8" height="60" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="254" y1="205" x2="262" y2="205" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="254" y1="217" x2="262" y2="217" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="254" y1="229" x2="262" y2="229" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="254" y1="241" x2="262" y2="241" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="262" y1="196" x2="300" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="304" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">scale reticle (0–200 mR)</text>

  <!-- quartz fiber -->
  <path d="M 340 238 Q 322 220 328 200" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <line x1="332" y1="202" x2="374" y2="124" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="378" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">quartz fiber (moves with dose)</text>

  <!-- fixed electrode -->
  <line x1="300" y1="240" x2="560" y2="240" stroke="#5A6B7E" stroke-width="5"/>
  <text x="470" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fixed electrode</text>
  <line x1="470" y1="244" x2="470" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- ionization chamber -->
  <rect x="300" y="190" width="330" height="70" fill="none" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="600" y1="190" x2="620" y2="160" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="624" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">air ionization chamber</text>

  <!-- charging contact -->
  <rect x="670" y="210" width="26" height="30" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="683" cy="225" r="5" fill="#F2A33C"/>
  <text x="683" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">charging contact</text>
  <line x1="683" y1="244" x2="683" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- how it works -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Charging sets the fiber on zero. Radiation ionizes the chamber air, the stored charge leaks away,</text>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">and the fiber climbs the scale in proportion to accumulated dose.</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Read by pointing the eyepiece at any light source — typical range 0–200 mR, zeroed each working day.</text>
</svg>
