<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Survey Meter Calibration — 10 CFR 34.25(b)</text>

  <!-- band separators -->
  <line x1="40" y1="188" x2="760" y2="188" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="40" y1="336" x2="760" y2="336" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- BAND 1: WHEN -->
  <text x="50" y="72" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">1 · WHEN</text>

  <line x1="140" y1="112" x2="600" y2="112" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="140" cy="112" r="9" fill="#1E66F5"/>
  <circle cx="600" cy="112" r="9" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="140" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">calibrated</text>
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">due date — out of service</text>
  <text x="370" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">interval not to exceed 6 months</text>

  <rect x="110" y="150" width="510" height="30" rx="6" fill="#9BC4FF" opacity="0.2"/>
  <rect x="110" y="150" width="510" height="30" rx="6" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="365" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">also recalibrate after each servicing or repair — except battery changes</text>

  <rect x="640" y="90" width="130" height="86" rx="8" fill="#0B1F3A"/>
  <text x="705" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">records kept</text>
  <text x="705" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">3 years</text>
  <text x="705" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">10 CFR 34.65</text>

  <!-- BAND 2: WHERE -->
  <text x="50" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">2 · WHERE ON EACH SCALE</text>

  <line x1="110" y1="272" x2="560" y2="272" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="110" y1="264" x2="110" y2="280" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="560" y1="264" x2="560" y2="280" stroke="#0B1F3A" stroke-width="3"/>
  <text x="110" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0</text>
  <text x="560" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">full scale</text>

  <line x1="260" y1="266" x2="260" y2="278" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 260 268 l -9 -16 l 18 0 z" fill="#1E66F5"/>
  <text x="260" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">point 1 ≈ 1/3 full scale</text>

  <line x1="410" y1="266" x2="410" y2="278" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M 410 268 l -9 -16 l 18 0 z" fill="#1E66F5"/>
  <text x="410" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">point 2 ≈ 2/3 full scale</text>

  <rect x="590" y="214" width="180" height="92" rx="8" fill="#0B1F3A"/>
  <text x="680" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">two points on</text>
  <text x="680" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">every scale</text>
  <text x="680" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">×1  ×10  ×100  ×1000</text>

  <text x="110" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">logarithmic instruments: midrange of each decade plus two points of at least one decade</text>
  <text x="110" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">digital instruments: 3 points between 2 and 1,000 mR/h</text>

  <!-- BAND 3: HOW ACCURATE -->
  <text x="50" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">3 · HOW ACCURATE — within ±20% of the standard, on each scale</text>

  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">standard delivers 100 mR/h</text>

  <rect x="160" y="392" width="120" height="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="220" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" opacity="0.7">fails</text>

  <rect x="280" y="392" width="240" height="36" fill="#9BC4FF" opacity="0.5"/>
  <rect x="280" y="392" width="240" height="36" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">acceptable: 80 – 120 mR/h</text>

  <rect x="520" y="392" width="120" height="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="580" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" opacity="0.7">fails</text>

  <line x1="400" y1="386" x2="400" y2="392" stroke="#1E66F5" stroke-width="3"/>
  <line x1="280" y1="428" x2="280" y2="440" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="520" y1="428" x2="520" y2="440" stroke="#0B1F3A" stroke-width="2"/>
  <text x="280" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">80 (−20%)</text>
  <text x="520" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">120 (+20%)</text>

  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" opacity="0.75">an instrument reading outside ±20% on any scale fails calibration and stays out of service</text>
</svg>
