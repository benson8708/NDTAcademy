<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Pick the Label: Surface Reading and Transport Index</text>

  <!-- category names -->
  <text x="130" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">WHITE-I</text>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">YELLOW-II</text>
  <text x="670" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">YELLOW-III</text>

  <!-- White-I label -->
  <polygon points="130,94 188,152 130,210 72,152" fill="#E8F1FB"/>
  <polygon points="130,94 188,152 130,210 72,152" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <g transform="translate(130,126) scale(0.6)" fill="#0A2342">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>
  <text x="130" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">RADIOACTIVE</text>
  <text x="130" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">I</text>

  <!-- Yellow-II label -->
  <polygon points="342,152 400,94 458,152" fill="#F2C14E"/>
  <polygon points="342,152 400,210 458,152" fill="#E8F1FB"/>
  <polygon points="400,94 458,152 400,210 342,152" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <g transform="translate(400,126) scale(0.6)" fill="#0A2342">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">RADIOACTIVE</text>
  <text x="400" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">II</text>

  <!-- Yellow-III label -->
  <polygon points="612,152 670,94 728,152" fill="#F2C14E"/>
  <polygon points="612,152 670,210 728,152" fill="#E8F1FB"/>
  <polygon points="670,94 728,152 670,210 612,152" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <g transform="translate(670,126) scale(0.6)" fill="#0A2342">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>
  <text x="670" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">RADIOACTIVE</text>
  <text x="670" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">III</text>

  <!-- criteria -->
  <text x="130" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">surface &#8804; 0.5 mrem/h</text>
  <text x="130" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TI = 0 (&#8804; 0.05 rounds to 0)</text>
  <text x="400" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">surface &#8804; 50 mrem/h</text>
  <text x="400" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TI &#8804; 1.0</text>
  <text x="670" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">surface &#8804; 200 mrem/h</text>
  <text x="670" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TI &#8804; 10</text>

  <text x="400" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">Meet BOTH limits or move up a category &#8212; two labels, on opposite sides of the package.</text>

  <line x1="40" y1="298" x2="760" y2="298" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- TI measurement -->
  <text x="60" y="326" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Measuring the transport index</text>
  <rect x="60" y="345" width="100" height="70" rx="8" fill="#13335C" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="160" cy="380" r="3" fill="#F2C14E"/>
  <line x1="166" y1="380" x2="294" y2="380" stroke="#E8F1FB" stroke-width="1.5"/>
  <polygon points="160,380 170,376 170,384" fill="#E8F1FB"/>
  <polygon points="300,380 290,376 290,384" fill="#E8F1FB"/>
  <text x="230" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">1 m</text>
  <rect x="300" y="356" width="54" height="46" rx="6" fill="#16407A" stroke="#9BC4FF" stroke-width="2"/>
  <path d="M308,392 A19,19 0 0 1 346,392" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="327" y1="392" x2="338" y2="376" stroke="#F2C14E" stroke-width="2"/>
  <text x="110" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">package</text>
  <text x="327" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">survey meter</text>
  <text x="60" y="452" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">highest 1 m reading 2.28 mrem/h &#8594; TI = 2.3</text>
  <text x="60" y="471" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2C14E">always round UP to the next tenth</text>

  <!-- limits box -->
  <rect x="450" y="316" width="320" height="152" rx="10" fill="#13335C" stroke="#1B82E8" stroke-width="2"/>
  <text x="466" y="342" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Non-exclusive-use ceilings</text>
  <text x="466" y="368" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8226; package surface &#8804; 200 mrem/h</text>
  <text x="466" y="390" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8226; transport index per package &#8804; 10</text>
  <text x="466" y="412" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8226; sum of TIs on one vehicle &#8804; 50</text>
  <text x="466" y="434" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8226; beyond these &#8594; exclusive use only</text>
  <text x="478" y="456" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">(49 CFR 173.441(b))</text>

  <!-- footer -->
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Categories: 49 CFR 172.403 &#8226; limits: 49 CFR 173.441 &#8226; TI definition: 49 CFR 173.403</text>
</svg>
