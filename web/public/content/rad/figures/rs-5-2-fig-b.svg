<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">Leakage Limits — Source Locked &amp; Shielded</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Maximum acceptable radiation from a properly functioning gamma exposure device</text>

  <!-- baseline / floor -->
  <line x1="60" y1="330" x2="740" y2="330" stroke="#5A6B7E" stroke-width="2"/>

  <!-- ===== Exposure device ===== -->
  <rect x="120" y="244" width="120" height="86" rx="12" fill="#5A6B7E" stroke="#9BC4FF" stroke-width="3"/>
  <rect x="138" y="262" width="84" height="50" rx="6" fill="#1B82E8"/>
  <circle cx="180" cy="287" r="11" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <text x="180" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E8F1FB">Exposure device</text>
  <text x="180" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0A2342">SRC</text>

  <!-- ===== Surface limit measurement ===== -->
  <!-- meter at surface -->
  <rect x="246" y="270" width="34" height="34" rx="4" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="2"/>
  <text x="263" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0A2342">mR/h</text>
  <line x1="240" y1="287" x2="246" y2="287" stroke="#F2A33C" stroke-width="3"/>

  <!-- surface callout box -->
  <rect x="250" y="120" width="200" height="92" rx="10" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="350" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">AT THE SURFACE</text>
  <text x="350" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">200 mR/h max</text>
  <text x="350" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">(2 mSv/h) on any exterior surface</text>
  <line x1="300" y1="212" x2="265" y2="268" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== 1 meter distance ===== -->
  <!-- dimension line -->
  <line x1="240" y1="356" x2="600" y2="356" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="240" y1="348" x2="240" y2="364" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="600" y1="348" x2="600" y2="364" stroke="#9BC4FF" stroke-width="2"/>
  <text x="420" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">1 meter from the surface</text>

  <!-- meter at 1 m -->
  <rect x="583" y="270" width="34" height="34" rx="4" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="2"/>
  <text x="600" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0A2342">mR/h</text>

  <!-- 1 m callout box -->
  <rect x="500" y="120" width="220" height="92" rx="10" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="610" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">AT 1 METER</text>
  <text x="610" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#E8F1FB">50 mR/h max</text>
  <text x="610" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">(0.5 mSv/h) from the surface</text>
  <line x1="610" y1="212" x2="600" y2="268" stroke="#1B82E8" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- bottom note -->
  <rect x="60" y="404" width="680" height="34" rx="6" fill="#13294B" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">Exceed either limit with the source shielded = shielding fault or incomplete retraction. Out of service.</text>
</svg>
