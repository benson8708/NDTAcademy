<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Receiving an Explosives Shipment — Five Checkpoints</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Carrier custody under DOT rules ends at your signature — ATF possession rules begin</text>

  <!-- row 1 -->
  <rect x="30" y="78" width="222" height="104" rx="10" fill="#1E66F5" opacity="0.14"/>
  <rect x="30" y="78" width="222" height="104" rx="10" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="56" cy="104" r="14" fill="#1E66F5"/>
  <text x="56" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="78" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">VERIFY PAPERS</text>
  <text x="46" y="134" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Shipping papers vs your</text>
  <text x="46" y="152" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">order: UN number, name,</text>
  <text x="46" y="170" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">division (1.4B), count</text>

  <line x1="252" y1="130" x2="282" y2="130" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="282,123 294,130 282,137" fill="#9BC4FF"/>

  <rect x="289" y="78" width="222" height="104" rx="10" fill="#1E66F5" opacity="0.14"/>
  <rect x="289" y="78" width="222" height="104" rx="10" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="315" cy="104" r="14" fill="#1E66F5"/>
  <text x="315" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="337" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">INSPECT PACKAGES</text>
  <text x="305" y="134" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Damage, leaks, tampering</text>
  <text x="305" y="152" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">— before acceptance.</text>
  <text x="305" y="170" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Damaged? Isolate, notify</text>

  <line x1="511" y1="130" x2="541" y2="130" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="541,123 553,130 541,137" fill="#9BC4FF"/>

  <rect x="548" y="78" width="222" height="104" rx="10" fill="#1E66F5" opacity="0.14"/>
  <rect x="548" y="78" width="222" height="104" rx="10" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="574" cy="104" r="14" fill="#1E66F5"/>
  <text x="574" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="596" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">COUNT, RECONCILE</text>
  <text x="564" y="134" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Piece count must match</text>
  <text x="564" y="152" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">the papers exactly —</text>
  <text x="564" y="170" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">a shortage is a red flag</text>

  <!-- snake arrow from box 3 to box 4 -->
  <path d="M 575 182 L 575 211 L 141 211 L 141 233" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="134,233 148,233 141,245" fill="#9BC4FF"/>

  <!-- dashed link from box 3 down to alert -->
  <line x1="690" y1="182" x2="690" y2="240" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- row 2 -->
  <rect x="30" y="250" width="222" height="104" rx="10" fill="#1E66F5" opacity="0.14"/>
  <rect x="30" y="250" width="222" height="104" rx="10" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="56" cy="276" r="14" fill="#1E66F5"/>
  <text x="56" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="78" y="281" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">MAGAZINE, SAME DAY</text>
  <text x="46" y="306" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Locked magazine of the</text>
  <text x="46" y="324" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">correct type; detonators</text>
  <text x="46" y="342" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">kept separate</text>

  <line x1="252" y1="302" x2="282" y2="302" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="282,295 294,302 282,309" fill="#9BC4FF"/>

  <rect x="289" y="250" width="222" height="104" rx="10" fill="#1E66F5" opacity="0.14"/>
  <rect x="289" y="250" width="222" height="104" rx="10" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="315" cy="276" r="14" fill="#1E66F5"/>
  <text x="315" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="337" y="281" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RECORD IT</text>
  <text x="305" y="306" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Receipt entered in the</text>
  <text x="305" y="324" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">daily summary of</text>
  <text x="305" y="342" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">magazine transactions</text>

  <!-- dashed link from box 5 to alert -->
  <line x1="511" y1="302" x2="548" y2="302" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- alert box -->
  <rect x="548" y="250" width="222" height="104" rx="10" fill="#FFFFFF"/>
  <text x="564" y="281" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">THEFT OR LOSS?</text>
  <text x="564" y="306" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Report to ATF and local</text>
  <text x="564" y="324" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">law enforcement within</text>
  <text x="564" y="342" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">24 hours of discovery</text>

  <!-- bottom note -->
  <rect x="30" y="392" width="740" height="84" rx="10" fill="#1E66F5" opacity="0.07"/>
  <rect x="30" y="392" width="740" height="84" rx="10" fill="none" stroke="#9BC4FF" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Explosives never wait on the dock.</text>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Unattended explosive materials belong in a locked magazine — 27 CFR 555, Subpart K</text>
</svg>
