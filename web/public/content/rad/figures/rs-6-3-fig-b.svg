<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Source-Out Response — One Path, No Improvisation</text>

  <!-- Step 0: post-exposure survey -->
  <rect x="40" y="48" width="400" height="48" rx="8" fill="#1E66F5"/>
  <text x="240" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">AFTER EVERY EXPOSURE</text>
  <text x="240" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">survey the device and the full guide tube</text>

  <line x1="240" y1="96" x2="240" y2="110" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,108 240,118 246,108" fill="#0B1F3A"/>

  <!-- Decision diamond -->
  <polygon points="240,118 352,150 240,182 128,150" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="240" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Reading falls to</text>
  <text x="240" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">shielded levels?</text>

  <!-- YES branch -->
  <line x1="352" y1="150" x2="462" y2="150" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="460,144 470,150 460,156" fill="#0B1F3A"/>
  <text x="404" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">YES</text>
  <rect x="470" y="126" width="300" height="48" rx="8" fill="#9BC4FF"/>
  <text x="620" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Source shielded — secure and lock</text>
  <text x="620" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the device, then approach and proceed</text>

  <!-- NO branch -->
  <line x1="240" y1="182" x2="240" y2="198" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,196 240,206 246,196" fill="#0B1F3A"/>
  <text x="258" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">NO</text>

  <!-- Step 1: STOP -->
  <rect x="40" y="206" width="400" height="48" rx="8" fill="#0B1F3A"/>
  <text x="240" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">SOURCE-OUT EMERGENCY — STOP</text>
  <text x="240" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">no forcing, no approaching, hands off</text>

  <line x1="240" y1="254" x2="240" y2="268" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,266 240,276 246,266" fill="#0B1F3A"/>

  <!-- Step 2: distance + survey -->
  <rect x="40" y="276" width="400" height="48" rx="8" fill="#1E66F5"/>
  <text x="240" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">DISTANCE + SURVEY</text>
  <text x="240" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">back away on the meter — map the full perimeter</text>

  <line x1="240" y1="324" x2="240" y2="338" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,336 240,346 246,336" fill="#0B1F3A"/>

  <!-- Step 3: secure -->
  <rect x="40" y="346" width="400" height="48" rx="8" fill="#1E66F5"/>
  <text x="240" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">SECURE</text>
  <text x="240" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">boundary by dose rate — constant watch — count crew</text>

  <line x1="240" y1="394" x2="240" y2="408" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="234,406 240,416 246,406" fill="#0B1F3A"/>

  <!-- Step 4: notify -->
  <rect x="40" y="416" width="400" height="48" rx="8" fill="#1E66F5"/>
  <text x="240" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">NOTIFY THE RSO IMMEDIATELY</text>
  <text x="240" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">facts: source, readings, boundary, doses — then hold</text>

  <!-- Step 5: recovery (right column bottom) -->
  <line x1="440" y1="440" x2="456" y2="440" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="454,434 464,440 454,446" fill="#0B1F3A"/>
  <rect x="464" y="416" width="306" height="48" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="617" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Hold the boundary until the specifically</text>
  <text x="617" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">trained, authorized recovery team takes over</text>

  <!-- NEVER panel -->
  <rect x="470" y="190" width="300" height="212" rx="10" fill="#0B1F3A"/>
  <text x="620" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">NEVER</text>
  <line x1="494" y1="228" x2="746" y2="228" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="494" y="252" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— force a binding crank</text>
  <text x="494" y="278" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— trust the handle or turn count</text>
  <text x="494" y="304" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— put hands near source or tube end</text>
  <text x="494" y="330" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— leave the boundary unattended</text>
  <text x="494" y="356" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— pack up or transport the device</text>
  <text x="494" y="382" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">— resume work before RSO release</text>
</svg>
