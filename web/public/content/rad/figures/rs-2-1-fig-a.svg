<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Gas-Filled Detectors: Six Operating Regions</text>

  <!-- legend -->
  <line x1="430" y1="56" x2="460" y2="56" stroke="#9BC4FF" stroke-width="4"/>
  <text x="466" y="61" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">alpha — large initial ionization</text>
  <line x1="430" y1="78" x2="460" y2="78" stroke="#FFFFFF" stroke-width="4"/>
  <text x="466" y="83" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">beta / gamma — small initial ionization</text>

  <!-- region bands -->
  <rect x="90" y="96" width="78" height="304" fill="#1E66F5" opacity="0.08"/>
  <rect x="168" y="96" width="110" height="304" fill="#1E66F5" opacity="0.16"/>
  <rect x="278" y="96" width="142" height="304" fill="#1E66F5" opacity="0.08"/>
  <rect x="420" y="96" width="78" height="304" fill="#1E66F5" opacity="0.16"/>
  <rect x="498" y="96" width="152" height="304" fill="#1E66F5" opacity="0.08"/>
  <rect x="650" y="96" width="114" height="304" fill="#FFFFFF" opacity="0.05"/>

  <!-- region separators -->
  <line x1="168" y1="96" x2="168" y2="400" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>
  <line x1="278" y1="96" x2="278" y2="400" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>
  <line x1="420" y1="96" x2="420" y2="400" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>
  <line x1="498" y1="96" x2="498" y2="400" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>
  <line x1="650" y1="96" x2="650" y2="400" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>

  <!-- region numbers -->
  <text x="129" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">1</text>
  <text x="223" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">2</text>
  <text x="349" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">3</text>
  <text x="459" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">4</text>
  <text x="574" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">5</text>
  <text x="707" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">6</text>

  <!-- axes -->
  <line x1="90" y1="400" x2="758" y2="400" stroke="#9BC4FF" stroke-width="2"/>
  <polygon points="754,396 766,400 754,404" fill="#9BC4FF"/>
  <line x1="90" y1="400" x2="90" y2="100" stroke="#9BC4FF" stroke-width="2"/>
  <polygon points="86,104 90,94 94,104" fill="#9BC4FF"/>
  <text x="36" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF" transform="rotate(-90 36 250)">Charge collected (log scale)</text>
  <text x="424" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Applied voltage</text>

  <!-- alpha curve -->
  <path d="M 95 322 C 125 312 150 302 168 298 L 278 298 C 330 282 380 252 420 224 C 450 203 480 186 506 175" fill="none" stroke="#9BC4FF" stroke-width="3.5"/>
  <!-- beta/gamma curve -->
  <path d="M 95 374 C 125 366 150 358 168 354 L 278 354 C 330 332 380 296 420 270 C 450 246 482 200 506 178" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <!-- merged curve -->
  <path d="M 506 176 C 545 167 605 160 650 158 C 692 154 716 128 736 100" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <circle cx="507" cy="176" r="5" fill="#9BC4FF" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="516" y1="200" x2="509" y2="184" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="508" y="216" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">curves merge — pulses all one size</text>

  <!-- instrument tags -->
  <text x="129" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">ions</text>
  <text x="129" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">recombine</text>
  <text x="223" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">ION CHAMBERS</text>
  <text x="349" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">PROPORTIONAL</text>
  <text x="349" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">COUNTERS</text>
  <text x="459" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">unstable —</text>
  <text x="459" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">not used</text>
  <text x="574" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">GM TUBES</text>
  <text x="574" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">identical pulses</text>
  <text x="707" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" opacity="0.85">DO NOT</text>
  <text x="707" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" opacity="0.85">OPERATE</text>

  <!-- region name legend -->
  <text x="400" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF"><tspan font-weight="bold" fill="#9BC4FF">1</tspan> Recombination&#160;&#160;&#160;&#160;&#160;<tspan font-weight="bold" fill="#9BC4FF">2</tspan> Ionization (saturation)&#160;&#160;&#160;&#160;&#160;<tspan font-weight="bold" fill="#9BC4FF">3</tspan> Proportional</text>
  <text x="400" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF"><tspan font-weight="bold" fill="#9BC4FF">4</tspan> Limited proportionality&#160;&#160;&#160;&#160;&#160;<tspan font-weight="bold" fill="#9BC4FF">5</tspan> Geiger-Mueller&#160;&#160;&#160;&#160;&#160;<tspan font-weight="bold" fill="#9BC4FF">6</tspan> Continuous discharge</text>
</svg>
