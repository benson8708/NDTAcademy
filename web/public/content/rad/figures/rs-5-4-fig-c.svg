<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Source Exchange: Camera, Transfer Tube, and Changer</text>

  <!-- crank + drive cable -->
  <circle cx="84" cy="226" r="26" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="84" cy="226" r="5" fill="#0B1F3A"/>
  <line x1="84" y1="226" x2="84" y2="202" stroke="#0B1F3A" stroke-width="4"/>
  <circle cx="84" cy="200" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="110" y1="226" x2="150" y2="226" stroke="#1E66F5" stroke-width="4"/>
  <text x="84" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Drive cable</text>
  <text x="84" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">+ crank</text>

  <!-- camera -->
  <rect x="150" y="170" width="180" height="116" rx="12" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="170" y="188" width="140" height="80" rx="8" fill="#9BC4FF"/>
  <path d="M170 226 Q210 226 240 226 Q280 226 280 246" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <rect x="158" y="150" width="54" height="22" rx="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="185" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">LOCK</text>
  <text x="240" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Exposure device (camera)</text>
  <text x="240" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">DU / tungsten shield inside</text>

  <!-- outlet + transfer tube -->
  <rect x="330" y="212" width="18" height="28" fill="#0B1F3A"/>
  <rect x="348" y="219" width="162" height="14" rx="7" fill="#D9E0E8" stroke="#0B1F3A" stroke-width="2"/>
  <text x="430" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Transfer (guide) tube</text>

  <!-- old source in transit -->
  <circle cx="430" cy="226" r="8" fill="#F2A33C" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="444" y1="226" x2="476" y2="226" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="472,220 486,226 472,232" fill="#F2A33C"/>
  <text x="430" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">decayed source in transit —</text>
  <text x="430" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bare between shields</text>

  <!-- source changer -->
  <rect x="510" y="150" width="250" height="160" rx="12" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="530" y="170" width="210" height="120" rx="8" fill="#9BC4FF"/>
  <rect x="518" y="130" width="54" height="22" rx="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="545" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">LOCK</text>
  <text x="605" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">receiving port</text>
  <rect x="530" y="219" width="150" height="14" fill="#FFFFFF"/>
  <text x="605" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fresh source port</text>
  <rect x="530" y="258" width="150" height="14" fill="#FFFFFF"/>
  <circle cx="666" cy="265" r="8" fill="#F2A33C" stroke="#0B1F3A" stroke-width="2"/>
  <text x="630" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Source changer</text>
  <text x="630" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shielded ports + locks; ships as Type B package</text>

  <!-- numbered steps -->
  <circle cx="95" cy="400" r="15" fill="#1E66F5"/>
  <text x="95" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="95" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Survey changer + camera</text>
  <text x="95" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">on receipt; check papers</text>

  <circle cx="275" cy="400" r="15" fill="#1E66F5"/>
  <text x="275" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="275" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Crank old source into</text>
  <text x="275" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">changer; lock; survey</text>

  <circle cx="455" cy="400" r="15" fill="#1E66F5"/>
  <text x="455" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="455" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Cable onto new pigtail —</text>
  <text x="455" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">verify engagement</text>

  <circle cx="635" cy="400" r="15" fill="#1E66F5"/>
  <text x="635" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="635" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Crank new source home;</text>
  <text x="635" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lock; survey; relabel</text>

  <!-- bottom note -->
  <rect x="40" y="464" width="720" height="30" rx="6" fill="#E8F1FB" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Shielded in the camera, shielded in the changer — bare in between. The meter proves every step.</text>
</svg>
