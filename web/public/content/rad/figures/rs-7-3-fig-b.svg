<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0A2342">The Receipt Survey, Step by Step</text>

  <!-- source changer crate -->
  <rect x="80" y="150" width="180" height="150" rx="6" fill="#F4EFE3" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="80" y1="190" x2="260" y2="190" stroke="#0A2342" stroke-width="1.5"/>
  <text x="170" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">SOURCE CHANGER</text>

  <!-- Yellow-III label on crate -->
  <polygon points="170,210 198,238 170,266 142,238" fill="#F2C14E"/>
  <polygon points="142,238 170,266 198,238" fill="#FFFFFF"/>
  <polygon points="170,210 198,238 170,266 142,238" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <g transform="translate(170,228) scale(0.42)" fill="#0A2342">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>
  <text x="170" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0A2342">YELLOW-III</text>
  <text x="170" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#0A2342">TI 2.1</text>

  <!-- step 1: visual inspection -->
  <circle cx="62" cy="120" r="13" fill="#0A2342"/>
  <text x="62" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="84" y="118" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0A2342">Inspect before touching</text>
  <text x="84" y="135" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">crush damage, wet or stained panels, seals, markings vs. papers</text>

  <!-- step 2: surface survey meter -->
  <rect x="276" y="200" width="56" height="44" rx="6" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M284,234 A19,19 0 0 1 324,234" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="304" y1="234" x2="316" y2="218" stroke="#D14343" stroke-width="2"/>
  <circle cx="338" cy="155" r="13" fill="#0A2342"/>
  <text x="338" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="358" y="153" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0A2342">Survey radiation levels</text>
  <text x="358" y="170" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">maximum at the surface: limit 200 mrem/h (71.47)</text>
  <line x1="304" y1="200" x2="320" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- 1 m measurement -->
  <line x1="262" y1="276" x2="438" y2="276" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="262,276 274,272 274,280" fill="#0A2342"/>
  <polygon points="438,276 426,272 426,280" fill="#0A2342"/>
  <text x="350" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">1 m</text>
  <rect x="440" y="254" width="56" height="44" rx="6" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M448,288 A19,19 0 0 1 488,288" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="468" y1="288" x2="478" y2="272" stroke="#D14343" stroke-width="2"/>
  <text x="468" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">max at 1 m: cross-check the</text>
  <text x="468" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">labeled TI; package TI limit 10</text>

  <!-- step 3: wipe -->
  <ellipse cx="226" cy="166" rx="17" ry="10" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <rect x="196" y="156" width="60" height="22" rx="4" fill="none" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="294" cy="112" r="13" fill="#0A2342"/>
  <text x="294" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="314" y="110" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0A2342">Wipe 300 cm&#178; for removable contamination</text>
  <text x="314" y="127" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">limit 4 Bq/cm&#178; beta-gamma; assume 10% pickup; count the</text>
  <text x="314" y="143" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">smear in a low-background area away from the package</text>
  <line x1="240" y1="158" x2="282" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- step 4: papers -->
  <rect x="570" y="120" width="172" height="196" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="570" y1="152" x2="742" y2="152" stroke="#0A2342" stroke-width="1.5"/>
  <text x="656" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">SHIPPING PAPERS</text>
  <text x="584" y="176" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">UN2916 &#8212; Type B(U)</text>
  <text x="584" y="198" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">Ir-192, special form</text>
  <text x="584" y="220" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">3.4 TBq (92 Ci)</text>
  <text x="584" y="242" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">YELLOW-III &#183; TI 2.1</text>
  <text x="584" y="264" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">CoC ID &#183; capsule serial no.</text>
  <text x="584" y="286" font-family="Arial, sans-serif" font-size="12" fill="#0A2342">assay date &#183; data sheet</text>
  <circle cx="600" cy="92" r="13" fill="#0A2342"/>
  <text x="600" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="620" y="97" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0A2342">Verify contents vs. papers</text>

  <!-- bottom strip -->
  <line x1="40" y1="356" x2="760" y2="356" stroke="#B8C4D0" stroke-width="1.5"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0A2342">Then: record date, time, instrument and calibration, readings, wipe result, and surveyor &#8212; retain 3 years (20.2103)</text>
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0A2342">Enter the source in the quarterly inventory (34.29) and utilization log (34.71), and secure it from dock to vault (20.1801)</text>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#D14343">Over 200 mrem/h surface or 4 Bq/cm&#178; removable: immediately notify the carrier and NRC Operations Center &#8212; 20.1906(d)</text>
</svg>
