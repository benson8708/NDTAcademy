<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Daily Dosimetry Routine and the Off-Scale Rule</text>

  <!-- top row -->
  <rect x="30" y="80" width="140" height="64" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="100" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Charge to zero,</text>
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">log start reading</text>

  <line x1="170" y1="112" x2="180" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="180,106 190,112 180,118" fill="#1B82E8"/>

  <rect x="186" y="80" width="140" height="64" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="256" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Wear on trunk:</text>
  <text x="256" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">badge + ratemeter</text>

  <line x1="326" y1="112" x2="336" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="336,106 346,112 336,118" fill="#1B82E8"/>

  <rect x="342" y="80" width="140" height="64" rx="8" fill="#0A2342" stroke="#1B82E8" stroke-width="2"/>
  <text x="412" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Read often —</text>
  <text x="412" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">after every shot</text>

  <line x1="482" y1="112" x2="488" y2="112" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="488,106 498,112 488,118" fill="#1B82E8"/>

  <!-- decision diamond -->
  <polygon points="498,112 560,78 622,112 560,146" fill="#0A2342" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="560" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Reading</text>
  <text x="560" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">on scale?</text>

  <!-- split -->
  <line x1="560" y1="146" x2="560" y2="170" stroke="#5A6B7E" stroke-width="3"/>

  <!-- yes path -->
  <polyline points="560,170 420,170 420,186" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="414,186 420,196 426,186" fill="#1E9E6A"/>
  <text x="482" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">yes</text>

  <rect x="295" y="196" width="250" height="66" rx="8" fill="#0A2342" stroke="#1E9E6A" stroke-width="2"/>
  <text x="420" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Record end reading + net dose</text>
  <text x="420" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">in the daily log</text>

  <line x1="420" y1="262" x2="420" y2="284" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="414,284 420,294 426,284" fill="#1E9E6A"/>

  <rect x="295" y="294" width="250" height="60" rx="8" fill="#0A2342" stroke="#1E9E6A" stroke-width="2"/>
  <text x="420" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Sign, date, and store monitoring</text>
  <text x="420" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">at the control point</text>

  <!-- no path -->
  <polyline points="560,170 688,170 688,186" fill="none" stroke="#D14343" stroke-width="3"/>
  <polygon points="682,186 688,196 694,186" fill="#D14343"/>
  <text x="640" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">no / off-scale</text>

  <rect x="598" y="196" width="180" height="66" rx="8" fill="#0A2342" stroke="#D14343" stroke-width="2.5"/>
  <text x="688" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">OFF-SCALE:</text>
  <text x="688" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">STOP radiation work</text>

  <line x1="688" y1="262" x2="688" y2="284" stroke="#D14343" stroke-width="3"/>
  <polygon points="682,284 688,294 694,284" fill="#D14343"/>

  <rect x="598" y="294" width="180" height="60" rx="8" fill="#0A2342" stroke="#D14343" stroke-width="2.5"/>
  <text x="688" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Notify the RSO</text>

  <line x1="688" y1="354" x2="688" y2="372" stroke="#D14343" stroke-width="3"/>
  <polygon points="682,372 688,382 694,372" fill="#D14343"/>

  <rect x="500" y="382" width="280" height="58" rx="8" fill="#0A2342" stroke="#D14343" stroke-width="2.5"/>
  <text x="640" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Badge processed immediately —</text>
  <text x="640" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">no radiation work until dose known</text>

  <!-- note -->
  <text x="30" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Net dose = end − start.</text>
  <text x="30" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Log real numbers, at the time, every monitored day.</text>
</svg>
