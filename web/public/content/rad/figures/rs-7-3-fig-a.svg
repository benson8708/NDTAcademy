<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0A2342">Receiving a Radioactive Package &#8212; 10 CFR 20.1906 Decision Map</text>

  <!-- arrange row -->
  <rect x="55" y="44" width="320" height="54" rx="8" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="215" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Carrier delivers to your facility</text>
  <text x="215" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">take delivery when the carrier offers it</text>

  <rect x="425" y="44" width="320" height="54" rx="8" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="585" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Package held at carrier's terminal</text>
  <text x="585" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">take possession expeditiously on notification</text>

  <line x1="215" y1="98" x2="330" y2="122" stroke="#0A2342" stroke-width="2"/>
  <line x1="585" y1="98" x2="470" y2="122" stroke="#0A2342" stroke-width="2"/>
  <polygon points="334,124 322,121 328,113" fill="#0A2342"/>
  <polygon points="466,124 478,121 472,113" fill="#0A2342"/>

  <rect x="230" y="124" width="340" height="32" rx="16" fill="#0A2342"/>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">PACKAGE RECEIVED &#8212; monitoring clock starts</text>

  <line x1="285" y1="156" x2="225" y2="178" stroke="#0A2342" stroke-width="2"/>
  <line x1="515" y1="156" x2="575" y2="178" stroke="#0A2342" stroke-width="2"/>
  <polygon points="221,180 233,178 228,170" fill="#0A2342"/>
  <polygon points="579,180 567,178 572,170" fill="#0A2342"/>

  <!-- clock row -->
  <rect x="55" y="182" width="330" height="56" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="220" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Received during working hours</text>
  <text x="220" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">monitor as soon as practicable &#8212; no later than 3 h after receipt</text>

  <rect x="415" y="182" width="330" height="56" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="580" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Received after working hours</text>
  <text x="580" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">no later than 3 h from the start of the next working day</text>

  <line x1="40" y1="256" x2="760" y2="256" stroke="#B8C4D0" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">What must be monitored &#8212; 20.1906(b)</text>

  <!-- monitoring matrix -->
  <rect x="40" y="290" width="232" height="108" rx="8" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="156" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Radiation levels</text>
  <text x="156" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">required on labeled packages over a</text>
  <text x="156" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">Type A quantity (Ir-192 A1 = 27 Ci)</text>
  <text x="156" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0A2342">limits: 200 mrem/h surface</text>
  <text x="156" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0A2342">and TI 10 (10 CFR 71.47)</text>

  <rect x="284" y="290" width="232" height="108" rx="8" fill="#EAF2FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Removable contamination wipe</text>
  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">excused only when contents are</text>
  <text x="400" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">special form or gas only</text>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0A2342">limit: 4 Bq/cm&#178; beta-gamma</text>
  <text x="400" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0A2342">over 300 cm&#178; (49 CFR 173.443)</text>

  <rect x="528" y="290" width="232" height="108" rx="8" fill="#FBEAEA" stroke="#D14343" stroke-width="2.5"/>
  <text x="644" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">Crushed, wet, or damaged?</text>
  <text x="644" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">evidence of degradation cancels</text>
  <text x="644" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0A2342">every exemption</text>
  <text x="644" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">monitor BOTH &#8212; always</text>

  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#D14343">Either limit exceeded: immediately notify the final delivery carrier and, by telephone, the NRC Operations Center &#8212; 20.1906(d)</text>
</svg>
