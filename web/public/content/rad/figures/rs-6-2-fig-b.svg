<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1E66F5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Fire Emergency Communication Flow</text>

  <!-- Radiographer box -->
  <rect x="40" y="190" width="190" height="110" rx="10" fill="#0B1F3A"/>
  <text x="135" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">RADIOGRAPHER</text>
  <text x="135" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">First informed person —</text>
  <text x="135" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">acts, warns, communicates</text>

  <!-- 911 box -->
  <rect x="320" y="70" width="215" height="88" rx="8" fill="#E9F1FE" stroke="#1E66F5" stroke-width="2"/>
  <text x="427" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">911 — FIRE DEPARTMENT</text>
  <text x="427" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Tell dispatch: radioactive</text>
  <text x="427" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">material — sealed source</text>

  <!-- Incident commander box -->
  <rect x="320" y="196" width="215" height="98" rx="8" fill="#E9F1FE" stroke="#1E66F5" stroke-width="2"/>
  <text x="427" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BRIEF THE INCIDENT</text>
  <text x="427" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">COMMANDER ON ARRIVAL</text>
  <text x="427" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Stay on scene — you are the</text>
  <text x="427" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">radiological expert</text>

  <!-- RSO box -->
  <rect x="320" y="330" width="215" height="88" rx="8" fill="#E9F1FE" stroke="#1E66F5" stroke-width="2"/>
  <text x="427" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">NOTIFY THE RSO</text>
  <text x="427" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Licensee emergency call list</text>
  <text x="427" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(lesson rs-6-4)</text>

  <!-- Briefing content panel -->
  <rect x="565" y="70" width="215" height="224" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="672" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">THE BRIEFING</text>
  <line x1="577" y1="104" x2="768" y2="104" stroke="#9BC4FF" stroke-width="2"/>
  <text x="579" y="126" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Nuclide and activity</text>
  <text x="579" y="149" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Exact device location</text>
  <text x="579" y="172" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Shielded — or not</text>
  <text x="579" y="195" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Latest survey readings</text>
  <text x="579" y="218" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• SCBA + upwind approach</text>
  <text x="579" y="241" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Distance up, time down</text>
  <text x="579" y="264" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Hands off the device</text>
  <text x="579" y="287" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Survey anything removed</text>

  <!-- Regulator box -->
  <rect x="565" y="330" width="215" height="110" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="672" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">NRC OPERATIONS CENTER</text>
  <text x="672" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">or Agreement State</text>
  <text x="672" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Telephone within 4 h / 24 h</text>
  <text x="672" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(10 CFR 30.50), then a</text>
  <text x="672" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">written report in 30 days</text>

  <!-- arrows -->
  <line x1="230" y1="205" x2="313" y2="116" stroke="#1E66F5" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="230" y1="245" x2="313" y2="245" stroke="#1E66F5" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="230" y1="285" x2="313" y2="370" stroke="#1E66F5" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="535" y1="245" x2="558" y2="245" stroke="#1E66F5" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="535" y1="374" x2="558" y2="374" stroke="#1E66F5" stroke-width="3" marker-end="url(#arr)"/>

  <!-- order chips -->
  <circle cx="273" cy="160" r="13" fill="#0B1F3A"/>
  <text x="273" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
  <circle cx="273" cy="328" r="13" fill="#0B1F3A"/>
  <text x="273" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
  <circle cx="273" cy="222" r="13" fill="#0B1F3A"/>
  <text x="273" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>

  <!-- bottom note -->
  <rect x="60" y="462" width="680" height="28" rx="6" fill="#E9F1FE" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">People first, 911 yourself, RSO without delay — and you stay on scene until you are relieved.</text>
</svg>
