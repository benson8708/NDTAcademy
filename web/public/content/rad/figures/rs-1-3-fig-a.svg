<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Radiation Quantities: Two Unit Systems</text>

  <!-- exposure box -->
  <rect x="50" y="80" width="220" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="160" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">EXPOSURE</text>
  <text x="160" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">ionization in air</text>
  <text x="160" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">roentgen (R)</text>
  <text x="160" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SI: coulomb/kilogram</text>
  <text x="160" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">1 R = 2.58 × 10⁻⁴ C/kg</text>

  <!-- arrow 1 -->
  <line x1="272" y1="160" x2="288" y2="160" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="288,153 300,160 288,167" fill="#F2A33C"/>

  <!-- absorbed dose box -->
  <rect x="302" y="80" width="210" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="407" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">ABSORBED DOSE</text>
  <text x="407" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">energy deposited</text>
  <text x="407" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">rad</text>
  <text x="407" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SI: gray (Gy) = 1 J/kg</text>
  <text x="407" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">1 Gy = 100 rad</text>

  <!-- arrow 2 with Q -->
  <line x1="514" y1="160" x2="530" y2="160" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="530,153 542,160 530,167" fill="#F2A33C"/>
  <text x="528" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">× Q</text>

  <!-- dose equivalent box -->
  <rect x="544" y="80" width="210" height="160" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="649" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">DOSE EQUIVALENT</text>
  <text x="649" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">weighted for harm</text>
  <text x="649" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">rem</text>
  <text x="649" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">SI: sievert (Sv)</text>
  <text x="649" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">1 Sv = 100 rem</text>

  <!-- quality factor + working approximation -->
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Q:  gamma / X / beta ≈ 1     neutron ≈ 10     alpha (internal) ≈ 20</text>
  <text x="400" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Working shortcut for gamma and X in tissue:  1 R ≈ 1 rad ≈ 1 rem</text>

  <!-- dose vs dose-rate strip -->
  <rect x="50" y="318" width="700" height="106" rx="10" fill="#0A2342" stroke="#5A6B7E" stroke-width="2"/>
  <text x="90" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">DOSE RATE — speedometer</text>
  <text x="90" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">mR/h, mrem/h, Sv/h — survey meter</text>
  <text x="440" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">DOSE — odometer</text>
  <text x="440" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">mR, mrem, Sv — dosimeter</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">dose  =  dose rate  ×  time</text>
</svg>
