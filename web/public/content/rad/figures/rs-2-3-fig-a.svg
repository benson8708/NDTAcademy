<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Nested Control Zones Around a Field Exposure</text>

  <!-- restricted area (quarter ring to rope) -->
  <path d="M90,430 L420,430 A330,330 0 0 0 90,100 Z" fill="#1B82E8" fill-opacity="0.32"/>
  <!-- radiation area -->
  <path d="M90,430 L305,430 A215,215 0 0 0 90,215 Z" fill="#F2A33C" fill-opacity="0.9"/>
  <!-- high radiation area -->
  <path d="M90,430 L185,430 A95,95 0 0 0 90,335 Z" fill="#D14343"/>

  <!-- zone edge strokes -->
  <path d="M305,430 A215,215 0 0 0 90,215" fill="none" stroke="#E8F1FB" stroke-width="1.5" opacity="0.7"/>
  <path d="M185,430 A95,95 0 0 0 90,335" fill="none" stroke="#E8F1FB" stroke-width="1.5" opacity="0.7"/>

  <!-- rope boundary -->
  <path d="M420,430 A330,330 0 0 0 90,100" fill="none" stroke="#E8F1FB" stroke-width="3" stroke-dasharray="12 8"/>
  <rect x="392" y="311" width="16" height="12" fill="#F2C14E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="294" y="171" width="16" height="12" fill="#F2C14E" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="139" y="99" width="16" height="12" fill="#F2C14E" stroke="#0A2342" stroke-width="1.5"/>

  <!-- exposure device -->
  <rect x="78" y="418" width="24" height="16" rx="3" fill="#0A2342" stroke="#E8F1FB" stroke-width="2"/>
  <text x="24" y="398" font-family="Arial, sans-serif" font-size="13" fill="#E8F1FB">exposure device</text>
  <line x1="70" y1="402" x2="84" y2="416" stroke="#E8F1FB" stroke-width="1"/>

  <!-- baseline with distance ticks -->
  <line x1="90" y1="430" x2="740" y2="430" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="185" y1="424" x2="185" y2="436" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="305" y1="424" x2="305" y2="436" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="420" y1="424" x2="420" y2="436" stroke="#E8F1FB" stroke-width="2"/>
  <text x="185" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8776;22 m</text>
  <text x="305" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8776;100 m</text>
  <text x="420" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">&#8776;158 m</text>

  <!-- unrestricted label -->
  <text x="575" y="395" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">UNRESTRICTED AREA</text>
  <text x="575" y="414" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">general public — no controls</text>

  <!-- legend -->
  <rect x="470" y="96" width="18" height="18" fill="#D14343"/>
  <text x="498" y="110" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">High radiation area</text>
  <text x="498" y="130" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">could exceed 100 mrem in 1 h at 30 cm</text>
  <text x="498" y="148" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">every entry watched, alarmed, or locked</text>

  <rect x="470" y="170" width="18" height="18" fill="#F2A33C"/>
  <text x="498" y="184" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Radiation area</text>
  <text x="498" y="204" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">could exceed 5 mrem in 1 h at 30 cm</text>
  <text x="498" y="222" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">post: CAUTION, RADIATION AREA</text>

  <rect x="470" y="244" width="18" height="18" fill="#1B82E8" fill-opacity="0.45" stroke="#1B82E8"/>
  <text x="498" y="258" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Restricted area</text>
  <text x="498" y="278" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">licensee limits access — trained, monitored</text>
  <text x="498" y="296" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">personnel; band shown is below 5 mrem/h</text>

  <line x1="470" y1="324" x2="488" y2="324" stroke="#E8F1FB" stroke-width="3" stroke-dasharray="8 5"/>
  <text x="498" y="330" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Boundary rope and signs</text>
  <text x="498" y="350" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">set so the public cannot receive 2 mrem</text>
  <text x="498" y="368" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">in any one hour beyond it</text>

  <!-- footer -->
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Inverse-square planning rings for 100 Ci Ir-192, unshielded (&#8776;50 R/h at 1 m).</text>
  <text x="400" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Scatter, skyshine, and obstructions move the real lines — the meter sets the boundary.</text>
</svg>
