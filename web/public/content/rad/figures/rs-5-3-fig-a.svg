<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Exposure Device — Required Markings</text>

  <!-- USER-APPLIED LABEL callout -->
  <rect x="28" y="56" width="330" height="142" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="44" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">USER-APPLIED LABEL — 10 CFR 34.20</text>
  <text x="44" y="104" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">• Nuclide symbol &amp; mass number — Ir-192</text>
  <text x="44" y="124" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">• Activity and date last measured</text>
  <text x="44" y="144" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">• Source model &amp; serial number</text>
  <text x="44" y="164" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">• Sealed-source manufacturer</text>
  <text x="44" y="184" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">• Licensee name, address, telephone</text>

  <!-- HAZARD PLATE callout -->
  <rect x="470" y="56" width="302" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="486" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">HAZARD PLATE — 10 CFR 20.1904</text>
  <text x="486" y="104" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Radiation trefoil + the words</text>
  <text x="486" y="124" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">"CAUTION, RADIOACTIVE MATERIAL"</text>
  <text x="486" y="144" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Symbol colors: magenta, purple, or</text>
  <text x="486" y="164" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">black on yellow — 10 CFR 20.1901</text>

  <!-- leader lines -->
  <line x1="240" y1="198" x2="306" y2="230" stroke="#F2A33C" stroke-width="2"/>
  <line x1="560" y1="176" x2="478" y2="230" stroke="#F2A33C" stroke-width="2"/>
  <line x1="150" y1="346" x2="228" y2="284" stroke="#F2A33C" stroke-width="2"/>
  <line x1="620" y1="346" x2="568" y2="278" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- device: carry handle -->
  <path d="M 348 207 L 348 186 Q 348 177 357 177 L 443 177 Q 452 177 452 186 L 452 207" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- device body -->
  <rect x="250" y="207" width="290" height="103" rx="18" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- lock housing and keyhole -->
  <rect x="216" y="237" width="34" height="44" rx="6" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="233" cy="253" r="6" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="233" y1="259" x2="233" y2="270" stroke="#9BC4FF" stroke-width="2"/>
  <!-- outlet port and safety plug -->
  <rect x="540" y="246" width="26" height="24" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="566" y="241" width="20" height="34" rx="5" fill="#F2A33C"/>
  <text x="596" y="250" font-family="Arial, sans-serif" font-size="14" fill="#F2A33C">safety</text>
  <text x="596" y="266" font-family="Arial, sans-serif" font-size="14" fill="#F2A33C">plug</text>

  <!-- ID label plate on body -->
  <rect x="272" y="228" width="92" height="60" rx="4" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <line x1="280" y1="242" x2="356" y2="242" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="280" y1="254" x2="356" y2="254" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="280" y1="266" x2="356" y2="266" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="280" y1="278" x2="340" y2="278" stroke="#9BC4FF" stroke-width="2"/>

  <!-- trefoil plate on body -->
  <rect x="408" y="228" width="92" height="60" rx="4" fill="#F2A33C"/>
  <g transform="translate(454,250)">
    <circle r="4.5" fill="#0A2342"/>
    <polygon points="0,-7 -8,-19 8,-19" fill="#0A2342"/>
    <polygon points="0,-7 -8,-19 8,-19" fill="#0A2342" transform="rotate(120)"/>
    <polygon points="0,-7 -8,-19 8,-19" fill="#0A2342" transform="rotate(240)"/>
  </g>
  <text x="454" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">CAUTION</text>

  <!-- LOCK & SAFETY PLUGS callout -->
  <rect x="28" y="346" width="330" height="118" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="44" y="372" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">LOCK &amp; SAFETY PLUGS</text>
  <text x="44" y="394" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Keyed lock — key removed unless under</text>
  <text x="44" y="414" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">direct surveillance — 10 CFR 34.23</text>
  <text x="44" y="434" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Plugs/covers on outlet &amp; fittings during</text>
  <text x="44" y="454" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">storage and transport — 10 CFR 34.20</text>

  <!-- SOURCE ASSEMBLY callout -->
  <rect x="470" y="346" width="302" height="118" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="486" y="372" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">SOURCE ASSEMBLY (PIGTAIL) TAG</text>
  <rect x="486" y="384" width="14" height="10" fill="#9BC4FF"/>
  <line x1="500" y1="389" x2="550" y2="389" stroke="#9BC4FF" stroke-width="3"/>
  <rect x="550" y="381" width="30" height="16" rx="8" fill="#F2A33C"/>
  <text x="592" y="394" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">"DANGER—RADIOACTIVE"</text>
  <text x="486" y="424" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Attached or engraved on every sealed</text>
  <text x="486" y="444" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">source / source assembly — 10 CFR 34.20</text>

  <!-- bottom note -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Manufacturer's data plate (device make, model, serial) — equipment designed and marked to ANSI N432-1980</text>
</svg>
