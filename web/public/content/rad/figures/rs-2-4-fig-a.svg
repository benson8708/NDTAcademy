<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">One Field Shot, All Three Levers</text>

  <!-- restricted-area boundary -->
  <rect x="30" y="56" width="740" height="334" rx="10" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="12,8"/>
  <text x="48" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">restricted-area boundary — posted, watched continuously</text>

  <!-- pipe under test -->
  <rect x="636" y="96" width="58" height="270" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="665" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">pipe under test</text>

  <!-- weld -->
  <line x1="636" y1="216" x2="694" y2="216" stroke="#1E66F5" stroke-width="4" stroke-dasharray="6,4"/>
  <text x="703" y="221" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E66F5">weld</text>

  <!-- beam cone into the pipe, aimed away from the crew -->
  <polygon points="634,208 694,186 694,246 634,224" fill="#9BC4FF" opacity="0.55"/>
  <polygon points="694,186 764,160 764,272 694,246" fill="#9BC4FF" opacity="0.22"/>
  <text x="706" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">beam aimed away</text>
  <text x="706" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">from the crew</text>

  <!-- collimator + exposure head -->
  <rect x="590" y="196" width="44" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="600" y="206" width="24" height="20" fill="#0B1F3A"/>

  <!-- SHIELDING annotation -->
  <text x="570" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">SHIELDING — collimator + structure</text>
  <line x1="575" y1="155" x2="606" y2="194" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- guide tube -->
  <line x1="524" y1="258" x2="592" y2="222" stroke="#0B1F3A" stroke-width="4"/>
  <text x="545" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">guide tube</text>
  <line x1="545" y1="196" x2="556" y2="237" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- exposure device -->
  <rect x="446" y="240" width="78" height="44" rx="5" fill="#0B1F3A"/>
  <circle cx="468" cy="262" r="5" fill="#F2A33C"/>
  <text x="485" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">exposure device (source inside)</text>

  <!-- TIME annotation -->
  <text x="485" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">TIME — set up while shielded;</text>
  <text x="485" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">crank briskly, never linger</text>

  <!-- drive cable to crank -->
  <polyline points="446,262 312,262 224,304 162,304" fill="none" stroke="#0B1F3A" stroke-width="3" stroke-dasharray="9,6"/>
  <text x="300" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">DISTANCE — full length of the drive cable</text>

  <!-- steel plate barrier (gap where cable passes) -->
  <rect x="196" y="266" width="20" height="28" fill="#0B1F3A"/>
  <rect x="196" y="312" width="20" height="28" fill="#0B1F3A"/>
  <text x="206" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">steel plate</text>

  <!-- crank -->
  <circle cx="156" cy="304" r="7" fill="#1E66F5"/>
  <line x1="156" y1="304" x2="167" y2="293" stroke="#1E66F5" stroke-width="3"/>

  <!-- radiographer -->
  <circle cx="118" cy="278" r="8" fill="#0B1F3A"/>
  <line x1="118" y1="286" x2="118" y2="312" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="118" y1="294" x2="149" y2="303" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="118" y1="312" x2="109" y2="330" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="118" y1="312" x2="127" y2="330" stroke="#0B1F3A" stroke-width="3"/>
  <text x="126" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">radiographer at the crank</text>

  <!-- bottom note -->
  <rect x="70" y="406" width="660" height="80" rx="8" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">The meter picks your position: stand where the reading is lowest</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">— while you can still see the device and the entire boundary.</text>
</svg>
