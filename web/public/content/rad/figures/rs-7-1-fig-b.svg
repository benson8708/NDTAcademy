<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Permanent Storage Vault — Plan View</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Shielding, locking, posting, and security for sources between jobs</text>

  <!-- building shell -->
  <rect x="50" y="84" width="700" height="330" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="744" y="78" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">shop interior</text>

  <!-- vault block with thick walls -->
  <rect x="50" y="84" width="280" height="330" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="76" y="110" width="228" height="278" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="190" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">STORAGE VAULT</text>

  <!-- door opening in right wall -->
  <rect x="302" y="238" width="30" height="68" fill="#FFFFFF"/>
  <line x1="302" y1="238" x2="332" y2="238" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="302" y1="306" x2="332" y2="306" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="331" y1="306" x2="372" y2="286" stroke="#0B1F3A" stroke-width="3.5"/>
  <path d="M331 244 Q356 258 372 286" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M344 312 v-7 a9 9 0 0 1 18 0 v7" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="338" y="312" width="30" height="22" rx="3" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="348" y="354" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">steel door — locked except</text>
  <text x="348" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">under direct surveillance</text>
  <text x="348" y="390" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(34.23 / 20.1801)</text>

  <!-- alarm sensor on vault ceiling -->
  <rect x="180" y="112" width="16" height="12" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="184" y1="126" x2="162" y2="146" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="192" y1="126" x2="214" y2="146" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="204" y="122" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">alarm (37.49)</text>

  <!-- rack with locked exposure devices -->
  <rect x="92" y="156" width="190" height="64" rx="6" fill="#E8F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="100" y="168" width="78" height="38" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="168" cy="200" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="192" y="168" width="78" height="38" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="260" cy="200" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="92" y="242" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">exposure devices — locked,</text>
  <text x="92" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">keys removed (34.23)</text>

  <!-- storage container -->
  <circle cx="124" cy="322" r="28" fill="#E8F0FB" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="124" cy="322" r="10" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="162" y="316" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">storage container</text>
  <text x="162" y="334" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(34.21 limits)</text>

  <!-- no flammables -->
  <circle cx="252" cy="290" r="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M252 278 q7 8 4 15 q-2 6 -8 6 q-7 0 -7 -8 q0 -7 11 -13 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="238" y1="304" x2="266" y2="276" stroke="#0B1F3A" stroke-width="3"/>
  <text x="252" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">no flammables</text>
  <text x="252" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">inside</text>

  <!-- posting sign in corridor -->
  <rect x="348" y="210" width="170" height="72" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <g transform="translate(382,246)">
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1"/>
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1" transform="rotate(120)"/>
    <path d="M0 0 L 10 -17.32 A 20 20 0 0 0 -10 -17.32 Z" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1" transform="rotate(240)"/>
    <circle cx="0" cy="0" r="7.5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="4" fill="#0B1F3A"/>
  </g>
  <text x="412" y="232" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">CAUTION</text>
  <text x="412" y="252" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">RADIOACTIVE</text>
  <text x="412" y="270" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">MATERIALS</text>
  <text x="382" y="302" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(10 CFR 20.1902(e))</text>

  <!-- attenuation arrows through wall -->
  <text x="336" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">shielding sized so the office</text>
  <text x="336" y="118" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">stays within public limits</text>
  <line x1="332" y1="136" x2="424" y2="136" stroke="#1E66F5" stroke-width="6"/>
  <polygon points="424,128 444,136 424,144" fill="#1E66F5"/>
  <line x1="332" y1="158" x2="452" y2="158" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="452,152 468,158 452,164" fill="#1E66F5"/>
  <line x1="332" y1="178" x2="486" y2="178" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="486,173 500,178 486,183" fill="#1E66F5"/>

  <!-- office -->
  <line x1="560" y1="84" x2="560" y2="414" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="596" y="150" width="110" height="44" rx="4" fill="#E8F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="650" cy="238" r="13" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="641" y="253" width="18" height="36" rx="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="650" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">unrestricted office</text>
  <text x="650" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">under 2 mrem in any</text>
  <text x="650" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">one hour (20.1301)</text>
  <text x="650" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and 100 mrem in a year</text>

  <!-- corridor label -->
  <text x="445" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">interior corridor</text>

  <!-- wall thickness dimension -->
  <line x1="50" y1="436" x2="76" y2="436" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="50" y1="429" x2="50" y2="443" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="76" y1="429" x2="76" y2="443" stroke="#0B1F3A" stroke-width="2"/>
  <text x="84" y="441" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">wall thickness verified by survey — resurvey when inventory grows</text>

  <!-- bottom note -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">The vault is a Part 37 security zone — vetted (T&amp;R) individuals only.</text>
</svg>
