<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Posting the Boundary: Exact Words, Exact Colors</text>

  <!-- sign 1: radiation area -->
  <rect x="45" y="78" width="210" height="158" rx="10" fill="#F2C14E" stroke="#0A2342" stroke-width="3"/>
  <g transform="translate(150,138) scale(0.9)">
    <circle cx="0" cy="0" r="7" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(120)"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(240)"/>
  </g>
  <text x="150" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#8E2A7E">CAUTION</text>
  <text x="150" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8E2A7E">RADIATION AREA</text>
  <text x="150" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Radiation area</text>
  <text x="150" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">could exceed 5 mrem (0.005 rem)</text>
  <text x="150" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">in 1 hour at 30 cm</text>

  <!-- sign 2: high radiation area -->
  <rect x="295" y="78" width="210" height="158" rx="10" fill="#F2C14E" stroke="#0A2342" stroke-width="3"/>
  <g transform="translate(400,138) scale(0.9)">
    <circle cx="0" cy="0" r="7" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(120)"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(240)"/>
  </g>
  <text x="400" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#8E2A7E">DANGER</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8E2A7E">HIGH RADIATION AREA</text>
  <text x="400" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">High radiation area</text>
  <text x="400" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">could exceed 100 mrem (0.1 rem)</text>
  <text x="400" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">in 1 hour at 30 cm — "CAUTION" also allowed</text>

  <!-- sign 3: very high radiation area -->
  <rect x="545" y="78" width="210" height="158" rx="10" fill="#F2C14E" stroke="#0A2342" stroke-width="3"/>
  <g transform="translate(650,126) scale(0.78)">
    <circle cx="0" cy="0" r="7" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(120)"/>
    <path d="M5.25,-9.09 A10.5,10.5 0 0 0 -5.25,-9.09 L-17.5,-30.31 A35,35 0 0 1 17.5,-30.31 Z" fill="#8E2A7E" transform="rotate(240)"/>
  </g>
  <text x="650" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#8E2A7E">GRAVE DANGER</text>
  <text x="650" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8E2A7E">VERY HIGH</text>
  <text x="650" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8E2A7E">RADIATION AREA</text>
  <text x="650" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Very high radiation area</text>
  <text x="650" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">could exceed 500 rad absorbed dose</text>
  <text x="650" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">in 1 hour at 1 METER</text>

  <!-- notes -->
  <line x1="45" y1="332" x2="755" y2="332" stroke="#D9E0E8" stroke-width="2"/>
  <text x="60" y="360" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Rules that ride with every sign</text>
  <rect x="60" y="378" width="8" height="8" fill="#1B82E8"/>
  <text x="78" y="387" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Trefoil colors: magenta, purple, or black — always on a yellow background (10 CFR 20.1901).</text>
  <rect x="60" y="406" width="8" height="8" fill="#1B82E8"/>
  <text x="78" y="415" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Post conspicuously: every access point, visible from every approach, facing the traffic.</text>
  <rect x="60" y="434" width="8" height="8" fill="#1B82E8"/>
  <text x="78" y="443" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Exceptions (10 CFR 20.1903): source constantly attended for under 8 hours in a controlled area;</text>
  <text x="78" y="463" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">sealed source reading no more than 5 mrem/h at 30 cm from its container or housing surface.</text>
</svg>
