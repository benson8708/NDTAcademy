<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Exposed Is Not Contaminated</text>

  <line x1="400" y1="54" x2="400" y2="398" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 6" opacity="0.7"/>

  <!-- LEFT: irradiated -->
  <text x="200" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#9BC4FF">IRRADIATED &#8212; energy from a distance</text>

  <!-- sealed source -->
  <rect x="48" y="140" width="56" height="40" fill="#1E66F5" stroke="#9BC4FF" stroke-width="2"/>
  <text x="86" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Sealed source</text>
  <text x="86" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(material stays inside)</text>

  <!-- gamma rays -->
  <line x1="106" y1="150" x2="218" y2="156" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="218,150 230,157 218,163" fill="#9BC4FF"/>
  <line x1="106" y1="160" x2="215" y2="170" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="215,164 227,171 215,177" fill="#9BC4FF"/>
  <line x1="106" y1="170" x2="218" y2="184" stroke="#9BC4FF" stroke-width="2.5"/>
  <polygon points="218,178 230,185 218,191" fill="#9BC4FF"/>

  <!-- person (clean) -->
  <circle cx="255" cy="118" r="18" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="255" y1="136" x2="255" y2="200" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="255" y1="152" x2="227" y2="178" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="255" y1="152" x2="283" y2="178" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="255" y1="200" x2="233" y2="242" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="255" y1="200" x2="277" y2="242" stroke="#FFFFFF" stroke-width="3.5"/>

  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Energy reaches the body &#8212; nothing radioactive sticks</text>

  <text x="36" y="302" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Dose accumulates only while the field is present</text>
  <text x="36" y="328" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Shield the source or step away &#8212; dose stops</text>
  <text x="36" y="354" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Nothing to wash off: dose is energy, not material</text>
  <text x="36" y="380" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; The person does NOT become radioactive</text>

  <!-- RIGHT: contaminated -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#9BC4FF">CONTAMINATED &#8212; material on board</text>

  <!-- person -->
  <circle cx="560" cy="118" r="18" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="560" y1="136" x2="560" y2="200" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="560" y1="152" x2="532" y2="178" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="560" y1="152" x2="588" y2="178" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="560" y1="200" x2="538" y2="242" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="560" y1="200" x2="582" y2="242" stroke="#FFFFFF" stroke-width="3.5"/>

  <!-- contamination specks on body -->
  <circle cx="552" cy="160" r="4" fill="#9BC4FF"/>
  <circle cx="567" cy="172" r="4" fill="#9BC4FF"/>
  <circle cx="556" cy="190" r="4" fill="#9BC4FF"/>
  <circle cx="540" cy="172" r="4" fill="#9BC4FF"/>
  <circle cx="582" cy="170" r="4" fill="#9BC4FF"/>
  <circle cx="546" cy="226" r="4" fill="#9BC4FF"/>
  <circle cx="576" cy="222" r="4" fill="#9BC4FF"/>

  <!-- airborne particles being inhaled -->
  <circle cx="612" cy="106" r="3.5" fill="#9BC4FF"/>
  <circle cx="624" cy="118" r="3.5" fill="#9BC4FF"/>
  <circle cx="616" cy="130" r="3.5" fill="#9BC4FF"/>
  <line x1="608" y1="118" x2="588" y2="118" stroke="#9BC4FF" stroke-width="2"/>
  <polygon points="590,113 580,118 590,123" fill="#9BC4FF"/>
  <text x="636" y="112" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">airborne dust &#8212;</text>
  <text x="636" y="128" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">inhaled = internal</text>

  <!-- specks spread on the ground -->
  <circle cx="468" cy="250" r="3.5" fill="#9BC4FF" opacity="0.8"/>
  <circle cx="512" cy="254" r="3.5" fill="#9BC4FF" opacity="0.8"/>
  <circle cx="624" cy="252" r="3.5" fill="#9BC4FF" opacity="0.8"/>

  <text x="600" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Specks on skin and clothing &#8212; and inside the lung</text>

  <text x="420" y="302" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Emits dose continuously until removed</text>
  <text x="420" y="328" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Spreads &#8212; hands, tools, truck cabs, food</text>
  <text x="420" y="354" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Distance and shielding do not fix it</text>
  <text x="420" y="380" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">&#8226; Found by wipe tests and frisking, not by looking</text>

  <!-- campfire rule strip -->
  <rect x="40" y="408" width="720" height="64" fill="#1E66F5" opacity="0.16" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">Campfire rule: feeling the heat = radiation exposure &#8212; it ends when you walk away.</text>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Carrying embers home in your coat = contamination &#8212; it burns until you remove it.</text>
</svg>
