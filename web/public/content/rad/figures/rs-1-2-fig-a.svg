<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Inverse Square Law: Double the Distance, Quarter the Dose Rate</text>

  <!-- spreading rays -->
  <line x1="100" y1="230" x2="560" y2="160" stroke="#F2A33C" stroke-width="2"/>
  <line x1="100" y1="230" x2="560" y2="300" stroke="#F2A33C" stroke-width="2"/>
  <line x1="100" y1="230" x2="700" y2="139" stroke="#F2A33C" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="230" x2="700" y2="321" stroke="#F2A33C" stroke-width="1.5" opacity="0.5"/>

  <!-- source -->
  <circle cx="100" cy="230" r="14" fill="#F2A33C" stroke="#0A2342" stroke-width="3"/>
  <line x1="100" y1="200" x2="100" y2="186" stroke="#F2A33C" stroke-width="3"/>
  <line x1="100" y1="260" x2="100" y2="274" stroke="#F2A33C" stroke-width="3"/>
  <line x1="70" y1="230" x2="56" y2="230" stroke="#F2A33C" stroke-width="3"/>
  <text x="100" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Source</text>

  <!-- near screen: 1 square at 1 m -->
  <rect x="330" y="195" width="70" height="70" fill="#1B82E8" opacity="0.25" stroke="#1B82E8" stroke-width="3"/>
  <text x="365" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">1 square</text>
  <text x="365" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1 m</text>
  <text x="365" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">1000 mR/h</text>

  <!-- far screen: 4 squares at 2 m -->
  <rect x="560" y="160" width="140" height="140" fill="#1B82E8" opacity="0.12" stroke="#1B82E8" stroke-width="3"/>
  <line x1="630" y1="160" x2="630" y2="300" stroke="#1B82E8" stroke-width="2"/>
  <line x1="560" y1="230" x2="700" y2="230" stroke="#1B82E8" stroke-width="2"/>
  <text x="630" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">same energy, 4 squares</text>
  <text x="630" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">2 m</text>
  <text x="630" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">250 mR/h</text>

  <!-- distance baseline -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="100" y1="342" x2="100" y2="358" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="365" y1="342" x2="365" y2="358" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="630" y1="342" x2="630" y2="358" stroke="#5A6B7E" stroke-width="2"/>
  <text x="100" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">0</text>
  <text x="365" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">1 m</text>
  <text x="630" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">2 m</text>

  <!-- formula -->
  <rect x="170" y="392" width="460" height="48" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0A2342">I₁ × d₁²  =  I₂ × d₂²</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">3 m → 111 mR/h      10 m → 10 mR/h</text>
</svg>
