<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Grounding and Bonding for Explosive-Device Radiography</text>
  <text x="400" y="58" text-anchor="middle" font-size="15" fill="#1E66F5">every conductor at one potential — every path verified before handling</text>

  <!-- conductive floor slab -->
  <rect x="40" y="390" width="720" height="30" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <text x="460" y="410" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Conductive floor — resistance to ground measured on schedule</text>

  <!-- ground bus (wall-mounted) + earth electrode -->
  <rect x="58" y="130" width="12" height="260" fill="#0B1F3A"/>
  <text x="64" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">ground bus</text>
  <line x1="64" y1="390" x2="64" y2="452" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="44" y1="452" x2="84" y2="452" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="52" y1="460" x2="76" y2="460" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="58" y1="468" x2="70" y2="468" stroke="#0B1F3A" stroke-width="3"/>
  <text x="64" y="490" text-anchor="middle" font-size="14" fill="#0B1F3A">earth electrode</text>

  <!-- workbench -->
  <rect x="392" y="298" width="12" height="92" fill="#0B1F3A"/>
  <rect x="536" y="298" width="12" height="92" fill="#0B1F3A"/>
  <rect x="368" y="278" width="200" height="20" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="470" y1="332" x2="470" y2="300" stroke="#0B1F3A" stroke-width="1"/>
  <rect x="348" y="335" width="244" height="21" rx="4" fill="#FFFFFF"/>
  <text x="470" y="350" text-anchor="middle" font-size="14" fill="#0B1F3A">grounded conductive work surface</text>

  <!-- initiator on bench: body, twisted leads, shunt -->
  <rect x="412" y="254" width="54" height="24" rx="5" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 466,262 C 480,272 494,258 508,268 C 516,273 524,262 530,265" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <path d="M 466,270 C 480,260 494,274 508,264 C 516,259 524,270 530,267" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <rect x="526" y="255" width="14" height="23" rx="3" fill="#0B1F3A"/>
  <text x="450" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">initiator — leads twisted together,</text>
  <text x="450" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">shorting clip (shunt) on until removed by procedure</text>
  <line x1="540" y1="186" x2="532" y2="252" stroke="#0B1F3A" stroke-width="1"/>

  <!-- technician -->
  <circle cx="235" cy="185" r="17" fill="#0B1F3A"/>
  <rect x="220" y="204" width="30" height="78" rx="12" fill="#0B1F3A"/>
  <line x1="248" y1="218" x2="350" y2="262" stroke="#0B1F3A" stroke-width="9" stroke-linecap="round"/>
  <rect x="222" y="280" width="10" height="99" fill="#0B1F3A"/>
  <rect x="240" y="280" width="10" height="99" fill="#0B1F3A"/>
  <rect x="214" y="379" width="24" height="11" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="240" y="379" width="24" height="11" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- wrist strap, cord, resistor, clamp to bench -->
  <circle cx="336" cy="254" r="7" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 338,262 C 346,284 356,288 370,290" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="372" cy="290" r="4" fill="#0B1F3A"/>
  <rect x="344" y="276" width="16" height="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="352" y="312" text-anchor="middle" font-size="14" fill="#0B1F3A">≈1 MΩ</text>
  <text x="58" y="110" font-size="14" font-weight="bold" fill="#0B1F3A">wrist strap — ≈1 MΩ series resistor,</text>
  <text x="58" y="128" font-size="14" font-weight="bold" fill="#0B1F3A">drains your body; tested daily</text>
  <line x1="220" y1="132" x2="334" y2="248" stroke="#0B1F3A" stroke-width="1"/>

  <!-- footwear label -->
  <text x="130" y="448" font-size="14" fill="#0B1F3A">conductive footwear —</text>
  <text x="130" y="466" font-size="14" fill="#0B1F3A">tested daily</text>
  <line x1="212" y1="438" x2="224" y2="392" stroke="#0B1F3A" stroke-width="1"/>

  <!-- transfer cart with transport container -->
  <rect x="618" y="348" width="116" height="14" fill="#0B1F3A"/>
  <circle cx="640" cy="376" r="14" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="712" cy="376" r="14" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="630" y="300" width="92" height="48" rx="6" fill="#9BC4FF" fill-opacity="0.6" stroke="#0B1F3A" stroke-width="2"/>
  <text x="676" y="292" text-anchor="middle" font-size="14" fill="#0B1F3A">transport container</text>

  <!-- bonding jumper: container to bench leg -->
  <path d="M 632,338 C 600,352 580,362 552,370" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="632" cy="338" r="4" fill="#0B1F3A"/>
  <circle cx="550" cy="371" r="4" fill="#0B1F3A"/>
  <text x="668" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">bonding jumper —</text>
  <text x="668" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">connected before transfer</text>
  <line x1="640" y1="224" x2="596" y2="352" stroke="#0B1F3A" stroke-width="1"/>
</svg>
