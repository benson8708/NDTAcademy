<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Emergency Call Order — Who Calls Whom</text>

  <!-- ===== Left lane: the radiographer's calls ===== -->
  <text x="190" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">YOUR CALLS — FROM THE SCENE</text>

  <!-- Step 0: life safety -->
  <rect x="40" y="88" width="300" height="80" rx="10" fill="#FFFFFF"/>
  <text x="190" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">0 — LIFE SAFETY: CALL 911</text>
  <text x="190" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Injury or fire comes before any other call.</text>
  <text x="190" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Tell dispatch: radioactive source on scene.</text>

  <line x1="190" y1="170" x2="190" y2="190" stroke="#FFFFFF" stroke-width="3"/>
  <polygon points="183,190 197,190 190,202" fill="#FFFFFF"/>

  <!-- Step 1: boundary -->
  <rect x="40" y="204" width="300" height="72" rx="10" fill="#9BC4FF"/>
  <text x="190" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 — HOLD THE BOUNDARY</text>
  <text x="190" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Not a phone call — the area stays controlled</text>
  <text x="190" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">and attended. One holds the line, one dials.</text>

  <line x1="190" y1="278" x2="190" y2="292" stroke="#FFFFFF" stroke-width="3"/>
  <polygon points="183,292 197,292 190,304" fill="#FFFFFF"/>

  <!-- Step 2: RSO -->
  <rect x="40" y="308" width="300" height="92" rx="10" fill="#1E66F5"/>
  <text x="190" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2 — RSO 24-HOUR NUMBER</text>
  <text x="190" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Immediately — minutes, not hours.</text>
  <text x="190" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">No answer? Down the list: alternate RSO,</text>
  <text x="190" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">then management — until a person answers.</text>

  <!-- connector to licensee cascade -->
  <line x1="344" y1="354" x2="446" y2="354" stroke="#FFFFFF" stroke-width="3"/>
  <polygon points="446,347 458,354 446,361" fill="#FFFFFF"/>

  <!-- ===== Right lane: the licensee's cascade ===== -->
  <text x="610" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">THE LICENSEE'S CALLS — RSO DIRECTS</text>

  <!-- bracket -->
  <line x1="458" y1="134" x2="458" y2="366" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="458" y1="134" x2="470" y2="134" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="458" y1="220" x2="470" y2="220" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="458" y1="288" x2="470" y2="288" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="458" y1="366" x2="470" y2="366" stroke="#9BC4FF" stroke-width="2"/>

  <!-- Regulator -->
  <rect x="470" y="88" width="290" height="92" rx="10" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2"/>
  <text x="615" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">REGULATOR (licensee notifies)</text>
  <text x="615" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">NRC Operations Center (301) 816-5100</text>
  <text x="615" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">or your Agreement State 24-hour line</text>
  <text x="615" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Clocks: immediate, 4-hour, 24-hour</text>

  <!-- Manufacturer / recovery -->
  <rect x="470" y="192" width="290" height="56" rx="10" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2"/>
  <text x="615" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">SOURCE MANUFACTURER / RECOVERY</text>
  <text x="615" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Authorized retrieval team and equipment</text>

  <!-- National Response Center -->
  <rect x="470" y="260" width="290" height="56" rx="10" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2"/>
  <text x="615" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">NATIONAL RESPONSE CENTER</text>
  <text x="615" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">(800) 424-8802 — transport incidents</text>

  <!-- Client + management -->
  <rect x="470" y="328" width="290" height="76" rx="10" fill="#0B1F3A" stroke="#9BC4FF" stroke-width="2"/>
  <text x="615" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">CLIENT SITE + MANAGEMENT</text>
  <text x="615" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Gate access, site alarms, plant</text>
  <text x="615" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">emergency organization</text>

  <!-- footer rules -->
  <line x1="40" y1="424" x2="760" y2="424" stroke="#9BC4FF" stroke-width="1"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Never leave the boundary unattended — never attempt source retrieval.</text>
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Log every call: time, number, person, what was said, what you were told to do.</text>
</svg>
