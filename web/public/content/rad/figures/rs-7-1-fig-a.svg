<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Compliant Overnight Vehicle Storage</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Two independent tangible barriers and a vehicle that cannot move — 10 CFR 37.53</text>

  <!-- ground -->
  <line x1="30" y1="420" x2="770" y2="420" stroke="#0B1F3A" stroke-width="3"/>

  <!-- fence (nearest public access) -->
  <rect x="700" y="330" width="78" height="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="700" y="366" width="78" height="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="706" y="310" width="6" height="110" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="736" y="310" width="6" height="110" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="766" y="310" width="6" height="110" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="739" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">0.4 mR/h</text>

  <!-- truck bed and cab -->
  <rect x="194" y="368" width="470" height="20" fill="#0B1F3A"/>
  <rect x="62" y="264" width="132" height="124" rx="10" fill="#1E66F5" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="80" y="282" width="74" height="46" rx="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- wheels -->
  <circle cx="128" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="128" cy="396" r="7" fill="#0B1F3A"/>
  <circle cx="508" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="508" cy="396" r="7" fill="#0B1F3A"/>
  <circle cx="598" cy="396" r="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="598" cy="396" r="7" fill="#0B1F3A"/>

  <!-- storage compartment (cutaway) -->
  <rect x="240" y="168" width="380" height="200" rx="8" fill="#E8F0FB" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="528" y1="168" x2="528" y2="368" stroke="#0B1F3A" stroke-width="2"/>

  <!-- mounting bolts through compartment base into bed -->
  <rect x="256" y="360" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="430" y="360" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="600" y="360" width="10" height="16" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="1"/>

  <!-- exposure device inside, locked and anchored -->
  <rect x="276" y="272" width="124" height="62" rx="10" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M306 272 q32 -20 64 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <text x="330" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Ir-192</text>
  <path d="M398 290 v-7 a9 9 0 0 1 18 0 v7" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="392" y="290" width="30" height="22" rx="3" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="312" y1="334" x2="312" y2="358" stroke="#0B1F3A" stroke-width="3" stroke-dasharray="5 4"/>
  <rect x="296" y="356" width="32" height="8" fill="#0B1F3A"/>

  <!-- compartment door padlock -->
  <path d="M556 296 v-9 a11 11 0 0 1 22 0 v9" fill="none" stroke="#0B1F3A" stroke-width="3.5"/>
  <rect x="548" y="296" width="38" height="28" rx="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- battery disconnect between cab and compartment -->
  <rect x="196" y="330" width="42" height="30" rx="4" fill="#0B1F3A"/>
  <text x="217" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">OFF</text>

  <!-- BARRIER 1 callout -->
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BARRIER 1</text>
  <text x="48" y="112" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Camera locked, key removed</text>
  <text x="48" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(10 CFR 34.23)</text>
  <line x1="150" y1="138" x2="400" y2="286" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- BARRIER 2 callout -->
  <text x="552" y="92" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BARRIER 2</text>
  <text x="552" y="112" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Locked compartment</text>
  <text x="552" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bolted to the bed (37.53(a))</text>
  <line x1="600" y1="138" x2="568" y2="292" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- survey-first callout -->
  <rect x="48" y="156" width="58" height="40" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M58 190 A 20 20 0 0 1 96 190" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="77" y1="190" x2="92" y2="170" stroke="#0B1F3A" stroke-width="2"/>
  <text x="48" y="216" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Survey before securing:</text>
  <text x="48" y="234" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">source confirmed shielded</text>
  <text x="48" y="252" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(10 CFR 34.49)</text>
  <line x1="108" y1="178" x2="274" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- public boundary callout -->
  <text x="782" y="168" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Nearest public access:</text>
  <text x="782" y="186" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">under 2 mrem in any</text>
  <text x="782" y="204" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">one hour (20.1301)</text>
  <line x1="752" y1="212" x2="740" y2="306" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- vehicle disabled callout -->
  <text x="40" y="452" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">VEHICLE DISABLED — concealed battery-disconnect (37.53(b)).</text>
  <text x="40" y="470" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Removing the ignition key alone does not count.</text>
  <line x1="217" y1="442" x2="217" y2="362" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- bottom summary -->
  <text x="400" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Out of your sight means: two tangible barriers, a disabled vehicle, locked device — every time.</text>
</svg>
