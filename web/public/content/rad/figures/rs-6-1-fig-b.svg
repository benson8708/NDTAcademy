<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Vehicle Accident Response — Six Steps</text>

  <!-- Step 1 -->
  <rect x="40" y="58" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="70" cy="88" r="16" fill="#1E66F5"/>
  <text x="70" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="96" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">PROTECT LIFE</text>
  <text x="96" y="114" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">First aid; call 911 and report a</text>
  <text x="96" y="132" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">radioactive sealed source aboard.</text>

  <!-- Step 2 -->
  <rect x="40" y="156" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="70" cy="186" r="16" fill="#1E66F5"/>
  <text x="70" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="96" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">SURVEY AND LOCATE</text>
  <text x="96" y="212" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Approach slowly with the meter;</text>
  <text x="96" y="230" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">verify the source is shielded.</text>

  <!-- Step 3 -->
  <rect x="40" y="254" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="70" cy="284" r="16" fill="#1E66F5"/>
  <text x="70" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="96" y="288" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">SET THE BOUNDARY</text>
  <text x="96" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Walk readings out to ~2 mR/h —</text>
  <text x="96" y="328" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rope, cones, flares, and police.</text>

  <!-- Step 4 -->
  <rect x="410" y="58" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="440" cy="88" r="16" fill="#1E66F5"/>
  <text x="440" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="466" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">HOLD THE LINE</text>
  <text x="466" y="114" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Constant surveillance — no one</text>
  <text x="466" y="132" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crosses, nothing leaves the scene.</text>

  <!-- Step 5 -->
  <rect x="410" y="156" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="440" cy="186" r="16" fill="#1E66F5"/>
  <text x="440" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="466" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">NOTIFY THE RSO</text>
  <text x="466" y="212" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Company emergency number: readings,</text>
  <text x="466" y="230" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">device condition, names, boundary.</text>

  <!-- Step 6 -->
  <rect x="410" y="254" width="350" height="86" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="440" cy="284" r="16" fill="#1E66F5"/>
  <text x="440" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="466" y="288" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">WAIT FOR DIRECTION</text>
  <text x="466" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">No recovery, towing, or debris</text>
  <text x="466" y="328" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">handling until the RSO directs it.</text>

  <!-- Column arrows -->
  <line x1="215" y1="145" x2="215" y2="150" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="215,155 210,149 220,149" fill="#0B1F3A"/>
  <line x1="215" y1="243" x2="215" y2="248" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="215,253 210,247 220,247" fill="#0B1F3A"/>
  <line x1="585" y1="145" x2="585" y2="150" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="585,155 580,149 590,149" fill="#0B1F3A"/>
  <line x1="585" y1="243" x2="585" y2="248" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="585,253 580,247 590,247" fill="#0B1F3A"/>

  <!-- Connector: step 3 to step 4 -->
  <polyline points="390,297 400,297 400,101 403,101" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="409,101 402,96 402,106" fill="#1E66F5"/>

  <!-- Escalation strip -->
  <rect x="40" y="356" width="720" height="78" rx="10" fill="#0B1F3A"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Survey not normal? High readings, damaged device, or source missing:</text>
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Expand the boundary and search at a distance — the meter leads, your hands stay out.</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">A missing source is an immediate telephone report to the regulator, made by the licensee.</text>

  <!-- Footer -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Written operating and emergency procedures (10 CFR 34.45) govern — follow them exactly.</text>
</svg>
