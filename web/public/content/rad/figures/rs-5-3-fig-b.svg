<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">After Every Exposure — Prove the Source Is Home</text>

  <!-- Step 1: RETRACT -->
  <rect x="40" y="76" width="215" height="128" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="66" cy="104" r="14" fill="#F2A33C"/>
  <text x="66" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <text x="88" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">RETRACT</text>
  <text x="56" y="134" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Crank the source home</text>
  <text x="56" y="153" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">with steady, continuous</text>
  <text x="56" y="172" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">tension — no pauses.</text>

  <!-- arrow 1-2 -->
  <line x1="257" y1="140" x2="285" y2="140" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="285,133 297,140 285,147" fill="#F2A33C"/>

  <!-- Step 2: SECURE -->
  <rect x="293" y="76" width="215" height="128" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="319" cy="104" r="14" fill="#F2A33C"/>
  <text x="319" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <text x="341" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">SECURE</text>
  <text x="309" y="134" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Automatic lock engages</text>
  <text x="309" y="153" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">at full shield, releasable</text>
  <text x="309" y="172" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">only by deliberate action.</text>
  <text x="309" y="191" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(10 CFR 34.20)</text>

  <!-- arrow 2-3 -->
  <line x1="510" y1="140" x2="538" y2="140" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="538,133 550,140 538,147" fill="#F2A33C"/>

  <!-- Step 3: SURVEY -->
  <rect x="546" y="76" width="215" height="128" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="572" cy="104" r="14" fill="#F2A33C"/>
  <text x="572" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <text x="594" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">SURVEY</text>
  <text x="562" y="134" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Meter first: full device</text>
  <text x="562" y="153" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">circumference + entire</text>
  <text x="562" y="172" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">guide tube + exposure</text>
  <text x="562" y="191" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">head. <tspan fill="#9BC4FF">(10 CFR 34.49)</tspan></text>

  <!-- elbow arrow 3-4 -->
  <polyline points="653,206 653,229 273,229 273,242" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="266,242 280,242 273,252" fill="#F2A33C"/>

  <!-- Step 4: CONFIRM & LOCK -->
  <rect x="166" y="256" width="215" height="128" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="192" cy="284" r="14" fill="#F2A33C"/>
  <text x="192" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <text x="214" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">CONFIRM &amp; LOCK</text>
  <text x="182" y="314" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Readings at stored-</text>
  <text x="182" y="333" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">source levels — lock the</text>
  <text x="182" y="352" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">device, key removed.</text>
  <text x="182" y="371" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(10 CFR 34.23)</text>

  <!-- arrow 4-5 -->
  <line x1="383" y1="320" x2="411" y2="320" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="411,313 423,320 411,327" fill="#F2A33C"/>

  <!-- Step 5: PLUG & STORE -->
  <rect x="419" y="256" width="215" height="128" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <circle cx="445" cy="284" r="14" fill="#F2A33C"/>
  <text x="445" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5</text>
  <text x="467" y="289" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">PLUG &amp; STORE</text>
  <text x="435" y="314" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Install safety plugs and</text>
  <text x="435" y="333" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">covers; survey again</text>
  <text x="435" y="352" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">when placed in storage.</text>
  <text x="435" y="371" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(10 CFR 34.49)</text>

  <!-- bottom rule band -->
  <rect x="40" y="412" width="721" height="56" rx="10" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">No film exchange, no repositioning, no breakdown</text>
  <text x="400" y="457" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">until the survey proves the source is fully shielded.</text>
</svg>
