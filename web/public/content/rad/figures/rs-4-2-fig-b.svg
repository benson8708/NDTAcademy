<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">After Every Run: Prove the Beam Is Off</text>

  <!-- step 1 -->
  <rect x="250" y="58" width="300" height="56" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="400" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Run complete — close the shutter</text>
  <text x="400" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">at the console and log beam-off</text>

  <line x1="400" y1="114" x2="400" y2="146" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="394,144 406,144 400,156" fill="#1E66F5"/>

  <!-- step 2: entry survey -->
  <rect x="230" y="158" width="340" height="58" rx="10" fill="#1E66F5"/>
  <text x="400" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Entry survey:</text>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">neutron rem meter held at the door</text>

  <!-- left branch: background -->
  <line x1="320" y1="216" x2="222" y2="274" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="222,266 230,276 216,280" fill="#1E66F5"/>
  <text x="232" y="240" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">reads background</text>

  <!-- right branch: field present -->
  <line x1="480" y1="216" x2="578" y2="274" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="570,272 584,276 574,284" fill="#1E66F5"/>
  <text x="566" y="240" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">neutron field present</text>

  <!-- good path -->
  <rect x="70" y="282" width="300" height="74" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="220" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Beam proven off — enter.</text>
  <text x="220" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Gamma-survey the object, fixtures,</text>
  <text x="220" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">and screens for activation.</text>

  <line x1="220" y1="356" x2="220" y2="386" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="214,384 226,384 220,396" fill="#1E66F5"/>

  <rect x="70" y="398" width="300" height="70" rx="10" fill="#9BC4FF" opacity="0.3"/>
  <rect x="70" y="398" width="300" height="70" rx="10" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="220" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Release items only when the survey</text>
  <text x="220" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">allows — tongs and a decay hold</text>
  <text x="220" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">for activated transfer foils</text>

  <!-- emergency path -->
  <rect x="430" y="282" width="330" height="110" rx="10" fill="#0B1F3A"/>
  <text x="595" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">SHUTTER FAILURE — do not enter</text>
  <text x="595" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Withdraw, and use the meter to set</text>
  <text x="595" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">a safe boundary. Secure and post</text>
  <text x="595" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">the area. Notify the RSO.</text>

  <rect x="430" y="404" width="330" height="40" rx="10" fill="#9BC4FF" opacity="0.3"/>
  <rect x="430" y="404" width="330" height="40" rx="10" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="595" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Recovery is planned work under the RSO</text>

  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">The light is a claim — the meter is the proof.</text>
</svg>
