<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Fire vs. the Source Assembly — What Fails First?</text>

  <!-- temperature bar (0 at y=450, 1500 C at y=80) -->
  <rect x="182" y="80" width="36" height="370" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <!-- fully developed fire band: 800-1000 C -->
  <rect x="184" y="203" width="32" height="50" fill="#F2A33C"/>

  <!-- axis ticks -->
  <line x1="170" y1="450" x2="182" y2="450" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="170" y1="327" x2="182" y2="327" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="170" y1="203" x2="182" y2="203" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="170" y1="80" x2="182" y2="80" stroke="#0B1F3A" stroke-width="2"/>
  <text x="164" y="455" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0 °C</text>
  <text x="164" y="332" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">500 °C</text>
  <text x="164" y="208" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1000 °C</text>
  <text x="164" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1500 °C</text>

  <!-- stainless capsule melts ~1400 C -->
  <line x1="178" y1="105" x2="222" y2="105" stroke="#1E66F5" stroke-width="3"/>
  <line x1="222" y1="105" x2="242" y2="105" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="248" y="101" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">≈ 1400 °C (2552 °F) — stainless source capsule melts</text>
  <text x="248" y="120" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Only a long, fuel-fed fire threatens the capsule itself</text>
  <text x="248" y="139" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(tungsten shielding: 3422 °C — far off this chart)</text>

  <!-- depleted uranium melts 1132 C -->
  <line x1="178" y1="171" x2="222" y2="171" stroke="#1E66F5" stroke-width="3"/>
  <line x1="222" y1="171" x2="242" y2="171" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="248" y="167" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1132 °C (2070 °F) — depleted uranium melts</text>
  <text x="248" y="186" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">DU oxidizes in a sustained fire — radioactive, toxic particles in the smoke</text>

  <!-- fully developed fire band label -->
  <line x1="222" y1="228" x2="242" y2="228" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="248" y="216" width="14" height="14" fill="#F2A33C"/>
  <text x="270" y="228" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Fully developed structure or vehicle fire</text>
  <text x="270" y="247" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">≈ 800–1000 °C (1472–1832 °F)</text>

  <!-- 800 C certification benchmark (dashed) -->
  <line x1="178" y1="253" x2="222" y2="253" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M222 253 L236 253 L236 296 L244 296" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="248" y="300" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">800 °C — the certification benchmark</text>
  <text x="248" y="319" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Special form capsule: 800 °C × 10 min · Type B package: 800 °C × 30 min</text>

  <!-- lead melts 327 C -->
  <line x1="178" y1="369" x2="222" y2="369" stroke="#1E66F5" stroke-width="3"/>
  <line x1="222" y1="369" x2="242" y2="369" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="248" y="365" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">327 °C (621 °F) — lead melts</text>
  <text x="248" y="384" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Lead shields and storage containers fail first — early in any real fire</text>

  <!-- bottom note -->
  <rect x="60" y="464" width="680" height="28" rx="6" fill="#E9F1FE" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A device can leave a fire with its capsule intact and its shielding gone — only a survey meter can tell the difference.</text>
</svg>
