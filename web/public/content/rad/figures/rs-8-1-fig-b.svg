<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Reciprocity: Where Is the Job?</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">A specific license is territorial — filing first is what makes it travel</text>

  <!-- start node -->
  <rect x="270" y="72" width="260" height="54" rx="8" fill="#0B1F3A"/>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Job outside your home</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">licensing jurisdiction</text>

  <!-- branch arrows -->
  <line x1="335" y1="126" x2="230" y2="168" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="222,172 236,170 231,159" fill="#1E66F5"/>
  <line x1="465" y1="126" x2="570" y2="168" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="578,172 564,170 569,159" fill="#0B1F3A"/>

  <!-- left branch: another Agreement State -->
  <rect x="40" y="176" width="350" height="180" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="2"/>
  <text x="215" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Another Agreement State</text>
  <text x="215" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">host state grants the general license</text>
  <text x="60" y="256" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• File that state's reciprocity request</text>
  <text x="60" y="282" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Pay that state's fee</text>
  <text x="60" y="308" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Advance notice — often 3 days; verify</text>
  <text x="60" y="334" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Work follows the host state's rules</text>

  <!-- right branch: NRC jurisdiction -->
  <rect x="410" y="176" width="350" height="180" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="585" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">NRC jurisdiction</text>
  <text x="585" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">non-Agreement State · offshore waters ·</text>
  <text x="585" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">exclusive federal jurisdiction (10 CFR 150.20)</text>
  <text x="430" y="272" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• NRC Form 241 + license copy + fee</text>
  <text x="430" y="296" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• At least 3 days before work begins</text>
  <text x="430" y="320" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Revise the form as sites or dates change</text>
  <text x="430" y="344" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Comply with NRC rules while there</text>

  <!-- arrows to ceiling box -->
  <line x1="215" y1="356" x2="300" y2="392" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="308,396 294,394 299,383" fill="#9BC4FF"/>
  <line x1="585" y1="356" x2="500" y2="392" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="492,396 506,394 501,383" fill="#9BC4FF"/>

  <!-- ceiling box -->
  <rect x="120" y="398" width="560" height="80" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">180 days per calendar year is the reciprocity ceiling</text>
  <text x="400" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Beyond it, the general license ends — obtain a specific license from that jurisdiction.</text>
  <text x="400" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">X-ray machines are never covered: register machines with each state separately.</text>
</svg>
