<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Contamination Area — Boundary, Step-Off Pad, and Exit Frisk</text>

  <!-- dirty zone tint -->
  <rect x="40" y="70" width="450" height="360" fill="#9BC4FF" fill-opacity="0.18"/>
  <text x="240" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">CONTAMINATION AREA</text>
  <text x="600" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">CLEAN SIDE</text>

  <!-- posting sign -->
  <rect x="60" y="106" width="150" height="92" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="132.8,126.1 129.3,120.0 140.8,120.0 137.3,126.1" fill="#0B1F3A"/>
  <polygon points="139.5,130 146.5,130 140.8,140.0 137.3,133.9" fill="#0B1F3A"/>
  <polygon points="130.5,130 123.5,130 129.3,140.0 132.8,133.9" fill="#0B1F3A"/>
  <circle cx="135" cy="130" r="3.2" fill="#0B1F3A"/>
  <text x="135" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">CAUTION</text>
  <text x="135" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">RADIOACTIVE</text>
  <text x="135" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">MATERIAL</text>

  <!-- work table with activated parts and tongs -->
  <line x1="246" y1="212" x2="232" y2="250" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="256" y1="212" x2="246" y2="250" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="251" cy="212" r="4" fill="#1E66F5"/>
  <rect x="125" y="233" width="36" height="22" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="175" y="225" width="44" height="30" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="190" y1="216" x2="196" y2="206" stroke="#1E66F5" stroke-width="2"/>
  <line x1="204" y1="216" x2="210" y2="206" stroke="#1E66F5" stroke-width="2"/>
  <rect x="95" y="255" width="190" height="14" fill="#0B1F3A"/>
  <rect x="103" y="269" width="10" height="58" fill="#0B1F3A"/>
  <rect x="267" y="269" width="10" height="58" fill="#0B1F3A"/>
  <text x="190" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">activated parts — tongs only</text>

  <!-- radwaste drum -->
  <rect x="350" y="305" width="78" height="98" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="350" y1="330" x2="428" y2="330" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="350" y1="378" x2="428" y2="378" stroke="#0B1F3A" stroke-width="2"/>
  <text x="389" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">RAD</text>
  <text x="389" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">WASTE</text>
  <text x="389" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bag + label all waste</text>

  <!-- boundary -->
  <line x1="490" y1="70" x2="490" y2="430" stroke="#0B1F3A" stroke-width="4" stroke-dasharray="10 8"/>
  <text transform="rotate(-90 476 330)" x="476" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">contamination boundary</text>

  <!-- step-off pad (straddles boundary) -->
  <rect x="432" y="152" width="116" height="78" fill="#FFFFFF" stroke="#1E66F5" stroke-width="3"/>
  <text x="490" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">STEP-OFF</text>
  <text x="490" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">PAD</text>

  <!-- exit path -->
  <line x1="552" y1="191" x2="620" y2="212" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="616,202 632,216 612,218" fill="#1E66F5"/>

  <!-- personnel frisker -->
  <rect x="648" y="185" width="92" height="58" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="658" y="195" width="40" height="26" fill="#9BC4FF"/>
  <circle cx="718" cy="208" r="7" fill="#1E66F5"/>
  <rect x="690" y="243" width="8" height="88" fill="#0B1F3A"/>
  <rect x="660" y="331" width="70" height="10" fill="#0B1F3A"/>
  <path d="M 740 214 Q 770 230 756 256" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="748" y="256" width="14" height="46" rx="5" fill="#0B1F3A"/>
  <text x="694" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">PERSONNEL FRISKER</text>
  <text x="694" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">the last stop — every exit</text>

  <!-- bottom band -->
  <rect x="40" y="446" width="720" height="44" rx="8" fill="#0B1F3A"/>
  <text x="400" y="473" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Doff at the pad, inner gloves last — then prove you are clean at the frisker.</text>
</svg>
