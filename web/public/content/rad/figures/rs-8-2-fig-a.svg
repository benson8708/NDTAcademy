<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">From Application to License</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">The program you submit comes back as the conditions you live under</text>

  <!-- application box -->
  <rect x="40" y="78" width="300" height="280" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="2"/>
  <text x="190" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Application — NRC Form 313</text>
  <text x="190" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">prepared per NUREG-1556 Vol. 2</text>
  <text x="56" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Training program — §34.43</text>
  <text x="56" y="181" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Certification verification (IRRSP)</text>
  <text x="56" y="206" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Operating &amp; emergency procedures</text>
  <text x="56" y="231" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Performance inspections ≤ 6 months</text>
  <text x="56" y="256" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Org structure &amp; delegations</text>
  <text x="56" y="281" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• RSO qualifications — §34.42</text>
  <text x="56" y="306" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Leak test &amp; calibration methods</text>
  <text x="56" y="331" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Locations of use &amp; of records</text>

  <!-- review arrow -->
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E">Regulator</text>
  <text x="400" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E">review</text>
  <line x1="348" y1="214" x2="440" y2="214" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="452,214 438,207 438,221" fill="#1E66F5"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">10 CFR 30.33</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">adequate +</text>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">qualified</text>

  <!-- license box -->
  <rect x="460" y="78" width="300" height="280" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="610" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">License — NRC Form 374</text>
  <text x="610" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">every line is enforceable</text>
  <text x="476" y="156" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Ir-192 / Co-60 / Se-75 + DU shield</text>
  <text x="476" y="181" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Source &amp; device models (SSDR)</text>
  <text x="476" y="206" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Maximum activity at any one time</text>
  <text x="476" y="231" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Authorized use &amp; storage sites</text>
  <text x="476" y="256" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• RSO named on the license</text>
  <text x="476" y="281" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Tie-down: application is binding</text>
  <text x="476" y="306" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Term: typically 10 years (NRC)</text>
  <text x="476" y="331" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Part 37 security (Category 2)</text>

  <!-- arrows from license to lifecycle boxes -->
  <line x1="540" y1="358" x2="310" y2="394" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="302,398 316,396 311,385" fill="#9BC4FF"/>
  <line x1="615" y1="358" x2="595" y2="392" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="591,400 602,391 590,385" fill="#9BC4FF"/>

  <!-- amendment loop arrow back to application -->
  <line x1="190" y1="396" x2="190" y2="370" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="190,362 184,374 196,374" fill="#9BC4FF"/>

  <!-- amend box -->
  <rect x="60" y="400" width="330" height="84" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="225" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Amend BEFORE you change</text>
  <text x="225" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">New RSO, device model, activity limit,</text>
  <text x="225" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">or location — file the amendment first</text>

  <!-- renew box -->
  <rect x="410" y="400" width="330" height="84" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="575" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Renew on time — timely renewal</text>
  <text x="575" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">File ≥ 30 days before expiration and the</text>
  <text x="575" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">license stays in effect during review</text>
</svg>
