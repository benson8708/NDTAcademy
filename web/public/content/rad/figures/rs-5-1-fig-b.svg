<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">The Survey-Bracketed Exposure Cycle</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Every exposure begins and ends with a survey</text>

  <!-- Step 1: BEFORE -->
  <rect x="40" y="100" width="200" height="120" rx="10" fill="#13294E" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="70" cy="130" r="15" fill="#1E66F5"/>
  <text x="70" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="95" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#9BC4FF">BEFORE</text>
  <text x="60" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Battery + check-source test</text>
  <text x="60" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Baseline survey of device</text>
  <text x="60" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Confirm source is shielded</text>

  <!-- Step 2: DURING -->
  <rect x="300" y="100" width="200" height="120" rx="10" fill="#13294E" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="330" cy="130" r="15" fill="#1E66F5"/>
  <text x="330" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="355" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#9BC4FF">DURING</text>
  <text x="320" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Set restricted-area boundary</text>
  <text x="320" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">by measured dose rate</text>
  <text x="320" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Confirm area is clear</text>

  <!-- Step 3: AFTER -->
  <rect x="560" y="100" width="200" height="120" rx="10" fill="#13294E" stroke="#F2A33C" stroke-width="3"/>
  <circle cx="590" cy="130" r="15" fill="#F2A33C"/>
  <text x="590" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3</text>
  <text x="615" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">AFTER</text>
  <text x="580" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Retract the source</text>
  <text x="580" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Survey device + guide tube</text>
  <text x="580" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Prove source is shielded</text>

  <!-- arrows between steps -->
  <line x1="244" y1="160" x2="296" y2="160" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="290,153 304,160 290,167" fill="#9BC4FF"/>
  <line x1="504" y1="160" x2="556" y2="160" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="550,153 564,160 550,167" fill="#9BC4FF"/>

  <!-- exposure geometry strip -->
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">During the shot: the source runs out to the collimator</text>

  <!-- device -->
  <rect x="120" y="300" width="90" height="60" rx="6" fill="#5A6B7E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="165" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Projector</text>
  <text x="165" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9BC4FF">shielded camera</text>

  <!-- guide tube -->
  <line x1="210" y1="330" x2="470" y2="330" stroke="#9BC4FF" stroke-width="6"/>
  <text x="335" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">guide tube</text>

  <!-- source stop / collimator with source -->
  <rect x="470" y="312" width="40" height="36" rx="4" fill="#0B1F3A" stroke="#F2A33C" stroke-width="2.5"/>
  <circle cx="490" cy="330" r="9" fill="#F2A33C"/>
  <line x1="490" y1="312" x2="490" y2="304" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="490" y1="348" x2="490" y2="356" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="508" y1="330" x2="516" y2="330" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="490" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F2A33C">source stop (collimator)</text>

  <!-- boundary -->
  <line x1="640" y1="290" x2="640" y2="372" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="690" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">boundary</text>
  <text x="690" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9BC4FF">set by survey</text>

  <!-- bottom warning bar -->
  <rect x="60" y="420" width="680" height="56" rx="8" fill="#13294E" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">The AFTER survey catches the source that did not retract.</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">The crank handle can read "home" while the source hangs up in the guide tube — only the meter knows.</text>
</svg>
