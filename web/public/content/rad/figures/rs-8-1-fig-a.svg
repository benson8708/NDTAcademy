<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Who Regulates Industrial Radiography?</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">AEA materials follow one path — machine-produced radiation follows another</text>

  <!-- AEA box -->
  <rect x="245" y="72" width="310" height="58" rx="8" fill="#0B1F3A"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Atomic Energy Act of 1954</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">byproduct · source · special nuclear material</text>

  <!-- arrows from AEA to the two regulators -->
  <line x1="320" y1="130" x2="225" y2="176" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="218,180 232,176 226,166" fill="#0B1F3A"/>
  <line x1="480" y1="130" x2="575" y2="176" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="582,180 568,176 574,166" fill="#1E66F5"/>
  <text x="195" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">authority retained</text>
  <text x="624" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">§274b agreement</text>

  <!-- NRC box -->
  <rect x="40" y="184" width="350" height="172" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="215" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">NRC — federal regulator</text>
  <text x="60" y="242" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Licenses radiography sources in:</text>
  <text x="70" y="268" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Non-Agreement States</text>
  <text x="70" y="292" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Offshore waters</text>
  <text x="70" y="316" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Exclusive federal jurisdiction areas</text>
  <text x="70" y="340" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Federal agencies, anywhere</text>

  <!-- Agreement State box -->
  <rect x="410" y="184" width="350" height="172" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="2"/>
  <text x="585" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">Agreement State</text>
  <text x="430" y="242" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Licenses the same materials in-state:</text>
  <text x="440" y="268" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Program adequate &amp; compatible</text>
  <text x="440" y="292" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Performance audited under IMPEP</text>
  <text x="440" y="316" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• May be stricter in places</text>
  <text x="440" y="340" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• About 40 of the 50 states today</text>

  <!-- connecting note between boxes -->
  <line x1="215" y1="356" x2="215" y2="384" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="207,378 215,394 223,378" fill="#9BC4FF"/>
  <line x1="585" y1="356" x2="585" y2="384" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="577,378 585,394 593,378" fill="#9BC4FF"/>
  <text x="400" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E">your specific license comes from exactly one of these</text>

  <!-- machine exception band -->
  <rect x="40" y="400" width="720" height="78" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">X-ray machines are never NRC-licensed</text>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">A machine produces radiation electrically and contains no AEA material —</text>
  <text x="400" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">every state registers machines through its own radiation control program.</text>
</svg>
