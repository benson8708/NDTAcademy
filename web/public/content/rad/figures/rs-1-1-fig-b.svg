<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Neutron Activation: Stable Metal Becomes Radioactive</text>

  <!-- stage 1: stable nucleus + incoming neutron -->
  <circle cx="135" cy="200" r="11" fill="#1B82E8"/>
  <circle cx="158" cy="192" r="11" fill="#5A6B7E"/>
  <circle cx="146" cy="216" r="11" fill="#5A6B7E"/>
  <circle cx="168" cy="212" r="11" fill="#1B82E8"/>
  <circle cx="152" cy="178" r="11" fill="#1B82E8"/>
  <circle cx="172" cy="190" r="11" fill="#5A6B7E"/>
  <text x="150" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Stable cobalt-59</text>
  <text x="150" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(in ordinary steel)</text>

  <circle cx="62" cy="120" r="9" fill="#1E9E6A"/>
  <line x1="72" y1="128" x2="120" y2="168" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="116,172 128,174 122,162" fill="#1E9E6A"/>
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">incoming neutron</text>

  <!-- arrow 1 -->
  <line x1="230" y1="200" x2="300" y2="200" stroke="#5A6B7E" stroke-width="5"/>
  <polygon points="300,192 318,200 300,208" fill="#5A6B7E"/>
  <text x="272" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">capture</text>

  <!-- stage 2: activated nucleus -->
  <circle cx="400" cy="200" r="46" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="7 5"/>
  <circle cx="388" cy="192" r="11" fill="#1B82E8"/>
  <circle cx="410" cy="184" r="11" fill="#5A6B7E"/>
  <circle cx="398" cy="212" r="11" fill="#5A6B7E"/>
  <circle cx="418" cy="206" r="11" fill="#1B82E8"/>
  <circle cx="404" cy="172" r="11" fill="#1B82E8"/>
  <circle cx="380" cy="214" r="11" fill="#1E9E6A"/>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Cobalt-60 — radioactive</text>

  <!-- arrow 2 -->
  <line x1="470" y1="200" x2="540" y2="200" stroke="#5A6B7E" stroke-width="5"/>
  <polygon points="540,192 558,200 540,208" fill="#5A6B7E"/>
  <text x="512" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">time passes</text>

  <!-- stage 3: delayed emission -->
  <circle cx="640" cy="200" r="11" fill="#1B82E8"/>
  <circle cx="662" cy="192" r="11" fill="#5A6B7E"/>
  <circle cx="650" cy="216" r="11" fill="#5A6B7E"/>
  <circle cx="672" cy="212" r="11" fill="#1B82E8"/>
  <circle cx="656" cy="178" r="11" fill="#1B82E8"/>
  <polyline points="688,168 700,154 692,144 704,130 696,120" fill="none" stroke="#D14343" stroke-width="3"/>
  <polygon points="690,116 702,112 698,126" fill="#D14343"/>
  <text x="730" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">gamma</text>
  <line x1="692" y1="222" x2="740" y2="252" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="736,256 750,258 742,246" fill="#1B82E8"/>
  <text x="734" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">beta</text>
  <text x="656" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Emits for years</text>
  <text x="656" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(half-life ≈ 5.3 y)</text>

  <!-- consequence band -->
  <rect x="40" y="330" width="720" height="92" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Tools, fixtures, and steel near a neutron beam can become activated —</text>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">survey hardware before release. Gamma and X-rays at radiography</text>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">energies do not activate material; neutrons do.</text>
</svg>
