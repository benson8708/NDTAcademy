<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">U.S. Average Natural Background Dose (NCRP Report No. 160)</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Four natural sources, received by everyone, every year</text>

  <!-- bars: scale 2.28 mSv = 430 px -->
  <!-- Radon & thoron -->
  <text x="266" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Radon &amp; thoron</text>
  <text x="266" y="116" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(indoor air)</text>
  <rect x="280" y="86" width="430" height="32" fill="#1E66F5"/>
  <text x="700" y="107" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2.28 mSv (228 mrem)</text>

  <!-- Cosmic -->
  <text x="266" y="154" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Cosmic rays</text>
  <text x="266" y="170" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(space; rises with altitude)</text>
  <rect x="280" y="140" width="62" height="32" fill="#1E66F5"/>
  <text x="352" y="161" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">0.33 mSv (33 mrem)</text>

  <!-- Internal emitters -->
  <text x="266" y="208" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Internal emitters</text>
  <text x="266" y="224" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(K-40, C-14 in the body)</text>
  <rect x="280" y="194" width="55" height="32" fill="#1E66F5"/>
  <text x="345" y="215" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">0.29 mSv (29 mrem)</text>

  <!-- Terrestrial gamma -->
  <text x="266" y="262" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Terrestrial gamma</text>
  <text x="266" y="278" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(soil, rock, concrete)</text>
  <rect x="280" y="248" width="40" height="32" fill="#1E66F5"/>
  <text x="330" y="269" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">0.21 mSv (21 mrem)</text>

  <text x="400" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">Total natural background &#8776; 3.1 mSv (310 mrem) per year &#8212; radon alone is nearly three-quarters</text>

  <line x1="40" y1="330" x2="760" y2="330" stroke="#1E66F5" stroke-width="1.5" opacity="0.5"/>

  <!-- scale-check comparison -->
  <text x="40" y="358" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Scale check &#8212; two annual numbers side by side (different scale):</text>

  <text x="266" y="393" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Natural background</text>
  <rect x="280" y="374" width="27" height="28" fill="#9BC4FF"/>
  <text x="317" y="393" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">&#8776; 3.1 mSv (310 mrem)</text>

  <text x="266" y="430" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">Occupational limit</text>
  <text x="266" y="446" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(10 CFR 20.1201)</text>
  <rect x="280" y="416" width="430" height="28" fill="#1E66F5" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="700" y="435" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">50 mSv (5 rem) per year</text>

  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Background is real dose &#8212; but 10 CFR 20 excludes it from your occupational dose record.</text>
</svg>
