<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">The Loaded Exposure Device as a Type B(U) Package</text>

  <!-- leader lines (drawn first, under everything) -->
  <line x1="440" y1="98" x2="318" y2="234" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>
  <line x1="440" y1="152" x2="286" y2="258" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>
  <line x1="440" y1="206" x2="224" y2="306" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>
  <line x1="440" y1="260" x2="220" y2="316" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>
  <line x1="440" y1="314" x2="254" y2="330" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>
  <line x1="440" y1="368" x2="354" y2="280" stroke="#E8F1FB" stroke-width="1" opacity="0.45"/>

  <!-- device -->
  <path d="M120,218 C145,182 255,182 280,218" fill="none" stroke="#9BC4FF" stroke-width="5"/>
  <rect x="70" y="215" width="260" height="115" rx="16" fill="#13335C" stroke="#9BC4FF" stroke-width="2.5"/>
  <circle cx="170" cy="272" r="42" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.55"/>
  <path d="M176,272 C215,250 240,294 325,272" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="170" cy="272" r="6" fill="#F2C14E"/>

  <!-- lock housing -->
  <rect x="44" y="246" width="26" height="52" rx="5" fill="#16407A" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="57" cy="264" r="4" fill="#E8F1FB"/>
  <rect x="55.5" y="266" width="3" height="9" fill="#E8F1FB"/>

  <!-- outlet port with safety plug -->
  <circle cx="338" cy="272" r="13" fill="#16407A" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="332" y1="266" x2="344" y2="278" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="344" y1="266" x2="332" y2="278" stroke="#9BC4FF" stroke-width="2"/>

  <!-- Yellow-III label on the body -->
  <polygon points="222,272 252,242 282,272" fill="#F2C14E"/>
  <polygon points="222,272 252,302 282,272" fill="#E8F1FB"/>
  <polygon points="252,242 282,272 252,302 222,272" fill="none" stroke="#0A2342" stroke-width="2"/>
  <g transform="translate(252,260) scale(0.55)" fill="#0A2342">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>
  <text x="252" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">III</text>

  <!-- embossed trefoil on body -->
  <g transform="translate(305,234) scale(0.8)" fill="none" stroke="#9BC4FF" stroke-width="1.6" opacity="0.85">
    <circle r="3.5"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(120)"/>
    <path d="M0,-4 L-7,-17 A15,15 0 0 1 7,-17 Z" transform="rotate(240)"/>
  </g>

  <!-- nameplate -->
  <rect x="92" y="305" width="128" height="18" fill="#0E2A4D" stroke="#9BC4FF" stroke-width="1"/>
  <line x1="100" y1="310" x2="212" y2="310" stroke="#9BC4FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="100" y1="314.5" x2="212" y2="314.5" stroke="#9BC4FF" stroke-width="0.8" opacity="0.6"/>
  <line x1="100" y1="319" x2="212" y2="319" stroke="#9BC4FF" stroke-width="0.8" opacity="0.6"/>

  <!-- feet -->
  <rect x="96" y="330" width="28" height="9" fill="#16407A"/>
  <rect x="276" y="330" width="28" height="9" fill="#16407A"/>
  <text x="200" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">gamma exposure device &#8212; itself the certified package</text>

  <!-- callouts -->
  <text x="445" y="92" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Trefoil embossed in the metal</text>
  <text x="445" y="111" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">must survive fire and water</text>

  <text x="445" y="146" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Two RADIOACTIVE YELLOW-III labels</text>
  <text x="445" y="165" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">on opposite sides &#8212; category set by survey</text>

  <text x="445" y="200" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">UN2916, RADIOACTIVE MATERIAL,</text>
  <text x="445" y="219" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TYPE B(U) PACKAGE &#8212; marked on the package</text>

  <text x="445" y="254" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Certificate ID, e.g. USA/9296/B(U)-96</text>
  <text x="445" y="273" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">ties the device to its NRC certificate</text>

  <text x="445" y="308" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Gross weight when over 50 kg (110 lb)</text>
  <text x="445" y="327" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">plus consignor or consignee name, address</text>

  <text x="445" y="362" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Lock engaged, safety plug installed</text>
  <text x="445" y="381" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">configured only as the certificate allows</text>

  <!-- footer -->
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Ir-192 A1 = 1 TBq (27 Ci): a working source exceeds it, so the loaded device ships as Type B.</text>
  <text x="400" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Markings: 49 CFR 172.310 and 173.471 &#8226; configuration: package certificate under 10 CFR 71.</text>
</svg>
