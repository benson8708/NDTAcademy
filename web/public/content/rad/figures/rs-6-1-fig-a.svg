<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Vehicle Accident Scene Control — Overhead View</text>

  <!-- Road -->
  <rect x="0" y="215" width="800" height="70" fill="#D9E0E8"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="24 16"/>

  <!-- Skid marks -->
  <path d="M 185 268 q 80 8 150 -8" fill="none" stroke="#5A6B7E" stroke-width="4" opacity="0.65"/>
  <path d="M 196 280 q 90 4 158 -14" fill="none" stroke="#5A6B7E" stroke-width="4" opacity="0.65"/>

  <!-- Boundary circle (~2 mR/h line) -->
  <circle cx="420" cy="250" r="150" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <text x="420" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Boundary — set where the meter reads ~2 mR/h</text>
  <line x1="420" y1="82" x2="420" y2="97" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- Elevated dose-rate zone -->
  <circle cx="420" cy="250" r="70" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="245" y="162" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Dose rate climbs toward the wreck</text>
  <line x1="250" y1="168" x2="370" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- Wrecked transport truck -->
  <g transform="rotate(18 430 250)">
    <rect x="380" y="226" width="100" height="48" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
    <rect x="482" y="232" width="30" height="36" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="2.5"/>
    <rect x="392" y="240" width="20" height="20" fill="#0B1F3A"/>
    <circle cx="402" cy="250" r="4" fill="#FFFFFF"/>
  </g>
  <text x="235" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Exposure device —</text>
  <text x="235" y="338" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">locate and survey FIRST</text>
  <line x1="242" y1="326" x2="397" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- Radiographer at the line -->
  <circle cx="286" cy="348" r="7" fill="#0B1F3A"/>
  <line x1="286" y1="355" x2="286" y2="376" stroke="#0B1F3A" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="362" x2="298" y2="362" stroke="#0B1F3A" stroke-width="3" stroke-linecap="round"/>
  <rect x="298" y="356" width="15" height="11" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="270" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Radiographer — meter in hand,</text>
  <text x="270" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">constant surveillance until relieved</text>

  <!-- Public kept outside -->
  <circle cx="648" cy="138" r="6" fill="#5A6B7E"/>
  <circle cx="668" cy="148" r="6" fill="#5A6B7E"/>
  <line x1="648" y1="156" x2="692" y2="170" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="699.6,172.4 690.5,174.8 693.5,165.2" fill="#5A6B7E"/>
  <text x="660" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Public kept outside</text>

  <!-- EMS / police staging -->
  <rect x="636" y="372" width="140" height="58" rx="8" fill="#E8F0FE" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="706" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">EMS / police stage</text>
  <text x="706" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">outside the line</text>

  <!-- Traffic held, both directions -->
  <line x1="150" y1="220" x2="150" y2="280" stroke="#0B1F3A" stroke-width="6"/>
  <line x1="140" y1="250" x2="78" y2="250" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="68,250 78,245 78,255" fill="#0B1F3A"/>
  <text x="140" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Traffic held</text>

  <line x1="700" y1="220" x2="700" y2="280" stroke="#0B1F3A" stroke-width="6"/>
  <line x1="710" y1="250" x2="764" y2="250" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="774,250 764,245 764,255" fill="#0B1F3A"/>
  <text x="712" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Traffic held</text>

  <!-- Wind note -->
  <text x="40" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Stay upwind of smoke or dust</text>
  <line x1="60" y1="104" x2="120" y2="124" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="127.6,126.5 118.4,128.7 121.6,119.3" fill="#0B1F3A"/>

  <!-- Bottom note -->
  <rect x="40" y="446" width="720" height="46" rx="6" fill="#E8F0FE" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Start wide — shrink the line only as the meter allows.</text>
  <text x="400" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">No one crosses and nothing leaves until the RSO directs.</text>
</svg>
