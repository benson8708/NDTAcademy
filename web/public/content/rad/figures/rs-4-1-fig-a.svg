<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Contamination in NR Work: Where It Comes From, What Form It Takes</text>

  <!-- left panel: sources -->
  <rect x="36" y="56" width="350" height="380" rx="10" fill="#9BC4FF" fill-opacity="0.18"/>
  <text x="211" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">WHERE IT COMES FROM</text>

  <!-- source 1: activated hardware -->
  <rect x="52" y="108" width="22" height="84" fill="#0B1F3A"/>
  <line x1="74" y1="136" x2="126" y2="136" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="74" y1="152" x2="126" y2="152" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="74" y1="168" x2="126" y2="168" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="126,131 136,136 126,141" fill="#1E66F5"/>
  <polygon points="126,147 136,152 126,157" fill="#1E66F5"/>
  <polygon points="126,163 136,168 126,173" fill="#1E66F5"/>
  <rect x="138" y="128" width="48" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="172" y1="120" x2="180" y2="110" stroke="#1E66F5" stroke-width="2"/>
  <line x1="182" y1="132" x2="192" y2="126" stroke="#1E66F5" stroke-width="2"/>
  <line x1="184" y1="148" x2="194" y2="148" stroke="#1E66F5" stroke-width="2"/>
  <text x="200" y="128" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Activated parts,</text>
  <text x="200" y="148" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fixtures &amp; beam hardware</text>
  <text x="200" y="168" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">(neutron capture)</text>

  <!-- source 2: transfer screens -->
  <rect x="64" y="240" width="70" height="46" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="99" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Dy / In</text>
  <line x1="138" y1="244" x2="150" y2="234" stroke="#1E66F5" stroke-width="2"/>
  <line x1="140" y1="262" x2="154" y2="262" stroke="#1E66F5" stroke-width="2"/>
  <line x1="138" y1="280" x2="150" y2="290" stroke="#1E66F5" stroke-width="2"/>
  <text x="200" y="248" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Transfer screens —</text>
  <text x="200" y="268" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">radioactive by design</text>
  <text x="200" y="288" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Dy-165 t½ ≈ 2.33 h</text>
  <text x="200" y="308" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">In-116m t½ ≈ 54 min</text>

  <!-- source 3: leaking Cf-252 -->
  <rect x="64" y="378" width="80" height="32" rx="10" fill="#0B1F3A"/>
  <polyline points="120,378 116,386 124,394 118,402 122,410" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="152" cy="372" r="4" fill="#1E66F5"/>
  <circle cx="164" cy="384" r="3" fill="#1E66F5"/>
  <circle cx="156" cy="398" r="3" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="170" cy="404" r="4" fill="#1E66F5"/>
  <text x="200" y="372" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Leaking Cf-252 source</text>
  <text x="200" y="392" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">spreads alpha emitters</text>
  <text x="200" y="412" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">and fission products</text>

  <!-- right panel: three forms -->
  <rect x="414" y="56" width="350" height="380" rx="10" fill="#9BC4FF" fill-opacity="0.18"/>
  <text x="589" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">THREE FORMS — AND HOW YOU FIND EACH</text>

  <!-- form 1: fixed -->
  <rect x="434" y="140" width="130" height="14" fill="#0B1F3A"/>
  <circle cx="455" cy="147" r="4" fill="#1E66F5"/>
  <circle cx="482" cy="147" r="4" fill="#1E66F5"/>
  <circle cx="512" cy="147" r="4" fill="#1E66F5"/>
  <circle cx="541" cy="147" r="4" fill="#1E66F5"/>
  <text x="585" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">FIXED</text>
  <text x="585" y="145" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bound to the surface</text>
  <text x="585" y="165" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">found by direct frisk</text>

  <!-- form 2: removable -->
  <rect x="470" y="205" width="36" height="22" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <path d="M 462 238 Q 488 218 516 236" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="514,228 522,238 510,240" fill="#1E66F5"/>
  <circle cx="446" cy="246" r="4" fill="#1E66F5"/>
  <circle cx="472" cy="242" r="3" fill="#1E66F5"/>
  <circle cx="530" cy="246" r="4" fill="#1E66F5"/>
  <rect x="434" y="252" width="130" height="12" fill="#0B1F3A"/>
  <text x="585" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">REMOVABLE</text>
  <text x="585" y="260" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rubs off on contact</text>
  <text x="585" y="280" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">found by 100 cm² smear</text>

  <!-- form 3: airborne -->
  <circle cx="444" cy="346" r="3" fill="#1E66F5"/>
  <circle cx="468" cy="362" r="4" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="452" cy="386" r="3" fill="#1E66F5"/>
  <circle cx="486" cy="340" r="3" fill="#1E66F5"/>
  <circle cx="478" cy="404" r="4" fill="#1E66F5"/>
  <circle cx="448" cy="412" r="3" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1"/>
  <polygon points="505,380 551,380 540,392 516,392" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="510" y="392" width="36" height="30" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="528" y1="356" x2="528" y2="376" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="523,374 528,384 533,374" fill="#1E66F5"/>
  <text x="585" y="355" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">AIRBORNE</text>
  <text x="585" y="375" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">an inhalation hazard</text>
  <text x="585" y="395" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">found by air sampling</text>

  <!-- bottom band -->
  <rect x="36" y="448" width="728" height="42" rx="8" fill="#0B1F3A"/>
  <text x="400" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">A field stays at the source — contamination travels with you until it is removed or decays.</text>
</svg>
