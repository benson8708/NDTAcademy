<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Permanent Exposure Room — Plan View</text>

  <!-- shielded walls -->
  <rect x="60" y="70" width="460" height="350" fill="#5A6B7E"/>
  <rect x="80" y="90" width="420" height="310" fill="#E8F1FB"/>
  <text x="290" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Shielded concrete walls (several TVLs)</text>

  <!-- maze wall -->
  <rect x="400" y="160" width="20" height="240" fill="#5A6B7E"/>
  <text x="455" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Maze entrance</text>
  <line x1="458" y1="134" x2="460" y2="178" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- door opening + leaf + interlock -->
  <rect x="500" y="340" width="20" height="60" fill="#E8F1FB"/>
  <rect x="502" y="342" width="16" height="56" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="488" y="326" width="26" height="14" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <text x="478" y="318" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Door interlock</text>
  <line x1="481" y1="322" x2="492" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="545" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Interlocked door</text>
  <line x1="542" y1="412" x2="522" y2="392" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- projector and beam -->
  <rect x="120" y="310" width="64" height="30" rx="6" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <polygon points="184,317 214,310 214,338 184,331" fill="#0A2342"/>
  <line x1="214" y1="320" x2="294" y2="252" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="214" y1="328" x2="320" y2="266" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="312" cy="252" r="16" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="152" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Projector + collimator</text>
  <text x="318" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Part</text>

  <!-- area radiation monitor -->
  <rect x="300" y="95" width="70" height="42" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="308" y="103" width="32" height="20" fill="#1E9E6A"/>
  <circle cx="356" cy="113" r="6" fill="#D14343"/>
  <text x="335" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Area monitor</text>
  <line x1="335" y1="139" x2="335" y2="146" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- emergency stop -->
  <rect x="422" y="240" width="12" height="20" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <circle cx="448" cy="250" r="12" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="448" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Emergency stop</text>
  <line x1="448" y1="264" x2="448" y2="278" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- warning beacon + horn (outside, by the door) -->
  <line x1="520" y1="332" x2="552" y2="332" stroke="#5A6B7E" stroke-width="3"/>
  <circle cx="568" cy="332" r="14" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="584" y1="322" x2="596" y2="314" stroke="#F2A33C" stroke-width="3"/>
  <line x1="586" y1="332" x2="600" y2="332" stroke="#F2A33C" stroke-width="3"/>
  <line x1="584" y1="342" x2="596" y2="350" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="558,302 576,296 576,316 558,310" fill="#5A6B7E"/>
  <text x="628" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Warning beacon + horn</text>
  <line x1="624" y1="334" x2="584" y2="332" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- control console (outside) -->
  <rect x="615" y="125" width="140" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="640" cy="150" r="6" fill="#1B82E8"/>
  <circle cx="665" cy="150" r="6" fill="#1B82E8"/>
  <rect x="700" y="140" width="24" height="18" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="630" y="175" width="100" height="22" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="685" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Control console (outside)</text>
  <line x1="685" y1="215" x2="685" y2="224" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- control conduit -->
  <polyline points="615,170 580,170 580,120 180,120 160,310" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="350" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">control conduit</text>

  <!-- bottom note -->
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Search the room, exit last, start only from the console — the door interlock ends the exposure automatically.</text>
</svg>
