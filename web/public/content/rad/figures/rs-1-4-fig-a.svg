<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Reading the Pocket Dosimeter</text>

  <!-- eyepiece field -->
  <circle cx="270" cy="240" r="155" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- scale line and ticks -->
  <line x1="150" y1="240" x2="390" y2="240" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="150" y1="226" x2="150" y2="254" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="174" y1="232" x2="174" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="198" y1="232" x2="198" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="222" y1="232" x2="222" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="246" y1="232" x2="246" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="210" y1="228" x2="210" y2="252" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="270" y1="228" x2="270" y2="252" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="294" y1="232" x2="294" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="318" y1="232" x2="318" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="330" y1="228" x2="330" y2="252" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="342" y1="232" x2="342" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="366" y1="232" x2="366" y2="248" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="390" y1="226" x2="390" y2="254" stroke="#0A2342" stroke-width="2.5"/>
  <text x="150" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="210" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">50</text>
  <text x="270" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">100</text>
  <text x="330" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">150</text>
  <text x="390" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">200</text>
  <text x="270" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">milliroentgen (mR)</text>

  <!-- fiber hairline at 45 mR -->
  <line x1="204" y1="185" x2="204" y2="295" stroke="#0A2342" stroke-width="2.5"/>
  <text x="204" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">fiber reads 45 mR</text>
  <line x1="204" y1="168" x2="204" y2="180" stroke="#1B82E8" stroke-width="2"/>

  <!-- off-scale zone -->
  <rect x="394" y="225" width="18" height="30" fill="#D14343"/>
  <text x="270" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">fiber past 200 = off-scale</text>

  <!-- steps -->
  <rect x="480" y="120" width="290" height="70" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="495" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1 · Zero at start of day</text>
  <text x="495" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">charge until the fiber sits on 0</text>
  <rect x="480" y="210" width="290" height="70" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="495" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">2 · Read toward light</text>
  <text x="495" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">eyepiece to sky or lamp, straight-on</text>
  <rect x="480" y="300" width="290" height="70" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="495" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">3 · Record at the time</text>
  <text x="495" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">start, end, and net dose in the log</text>

  <!-- off-scale rule -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">Fiber past full scale means dose unknown — stop work and notify the RSO.</text>
</svg>
