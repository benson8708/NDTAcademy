<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">ATF Storage Magazines — 27 CFR 555, Subpart K</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Explosive materials not being handled, used, or transported sit in a locked magazine</text>

  <!-- five magazine type cards -->
  <!-- TYPE 1 -->
  <rect x="28" y="74" width="140" height="180" rx="8" fill="#1E66F5" opacity="0.14"/>
  <rect x="28" y="74" width="140" height="180" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="98" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">TYPE 1</text>
  <text x="98" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Permanent</text>
  <polygon points="70,142 98,124 126,142" fill="#1E66F5"/>
  <rect x="76" y="142" width="44" height="24" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="98" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">High explosives</text>
  <text x="98" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Bullet-, fire-,</text>
  <text x="98" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">weather-, theft-</text>
  <text x="98" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">resistant; vented</text>

  <!-- TYPE 2 -->
  <rect x="179" y="74" width="140" height="180" rx="8" fill="#1E66F5" opacity="0.14"/>
  <rect x="179" y="74" width="140" height="180" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="249" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">TYPE 2</text>
  <text x="249" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Mobile / portable</text>
  <rect x="223" y="128" width="52" height="26" fill="#1E66F5"/>
  <circle cx="236" cy="160" r="6" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="262" cy="160" r="6" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="249" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">High explosives</text>
  <text x="249" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Indoor or outdoor;</text>
  <text x="249" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">outdoor units</text>
  <text x="249" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">bullet-resistant</text>

  <!-- TYPE 3 -->
  <rect x="330" y="74" width="140" height="180" rx="8" fill="#1E66F5" opacity="0.14"/>
  <rect x="330" y="74" width="140" height="180" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">TYPE 3</text>
  <text x="400" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Day box</text>
  <rect x="376" y="132" width="48" height="8" fill="#9BC4FF"/>
  <rect x="376" y="140" width="48" height="22" fill="#1E66F5"/>
  <text x="400" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">High explosives</text>
  <text x="400" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Attended only;</text>
  <text x="400" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">to Type 1 or 2</text>
  <text x="400" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">at day's end</text>

  <!-- TYPE 4 -->
  <rect x="481" y="74" width="140" height="180" rx="8" fill="#1E66F5" opacity="0.14"/>
  <rect x="481" y="74" width="140" height="180" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="551" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">TYPE 4</text>
  <text x="551" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Fixed or portable</text>
  <rect x="525" y="130" width="52" height="32" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="525" y1="146" x2="577" y2="146" stroke="#1E66F5" stroke-width="3"/>
  <text x="551" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Low explosives</text>
  <text x="551" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Fire-, weather-,</text>
  <text x="551" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">theft-resistant;</text>
  <text x="551" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">some detonators</text>

  <!-- TYPE 5 -->
  <rect x="632" y="74" width="140" height="180" rx="8" fill="#1E66F5" opacity="0.14"/>
  <rect x="632" y="74" width="140" height="180" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="702" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">TYPE 5</text>
  <text x="702" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Fixed or portable</text>
  <polygon points="676,128 728,128 720,162 684,162" fill="#1E66F5"/>
  <text x="702" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Blasting agents</text>
  <text x="702" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Theft-resistant</text>
  <text x="702" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">incl. bins, tanks,</text>
  <text x="702" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">semitrailers</text>

  <!-- bottom panels -->
  <rect x="28" y="272" width="420" height="216" rx="8" fill="#1E66F5" opacity="0.07"/>
  <rect x="28" y="272" width="420" height="216" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5" opacity="0.5"/>
  <text x="44" y="296" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">SITING — AMERICAN TABLE OF DISTANCES</text>

  <!-- magazine icon -->
  <text x="90" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">magazine</text>
  <polygon points="58,346 90,328 122,346" fill="#1E66F5"/>
  <rect x="64" y="346" width="52" height="36" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- inhabited building -->
  <rect x="318" y="300" width="40" height="30" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="326" y="308" width="8" height="8" fill="#9BC4FF"/>
  <rect x="342" y="308" width="8" height="8" fill="#9BC4FF"/>
  <text x="338" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">inhabited building</text>
  <line x1="128" y1="350" x2="312" y2="318" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="312,312 322,317 311,323" fill="#1E66F5"/>

  <!-- public highway -->
  <line x1="310" y1="386" x2="424" y2="386" stroke="#9BC4FF" stroke-width="2"/>
  <line x1="310" y1="398" x2="424" y2="398" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="368" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">public highway</text>
  <line x1="128" y1="364" x2="300" y2="388" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="299,382 310,390 297,393" fill="#1E66F5"/>

  <!-- other magazine -->
  <line x1="90" y1="392" x2="86" y2="416" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="79,415 93,414 86,427" fill="#1E66F5"/>
  <polygon points="62,438 86,426 110,438" fill="#1E66F5"/>
  <rect x="68" y="438" width="36" height="24" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="118" y="456" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">other magazine</text>

  <text x="334" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Distance grows with net explosive</text>
  <text x="334" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">weight stored; an approved</text>
  <text x="334" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">barricade halves many distances</text>

  <!-- rules panel -->
  <rect x="464" y="272" width="308" height="216" rx="8" fill="#1E66F5" opacity="0.07"/>
  <rect x="464" y="272" width="308" height="216" rx="8" fill="none" stroke="#1E66F5" stroke-width="1.5" opacity="0.5"/>
  <text x="480" y="296" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">MAGAZINE RULES</text>

  <rect x="480" y="312" width="8" height="8" fill="#1E66F5"/>
  <text x="496" y="321" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Detonators: separate magazine —</text>
  <text x="496" y="339" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">never with other explosives</text>

  <rect x="480" y="356" width="8" height="8" fill="#1E66F5"/>
  <text x="496" y="365" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">25-ft zone clear of brush, dry</text>
  <text x="496" y="383" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">grass, and debris</text>

  <rect x="480" y="400" width="8" height="8" fill="#1E66F5"/>
  <text x="496" y="409" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">No smoking or open flame in or</text>
  <text x="496" y="427" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">within 50 ft of a magazine</text>

  <rect x="480" y="444" width="8" height="8" fill="#1E66F5"/>
  <text x="496" y="453" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Inspect at least every 7 days for</text>
  <text x="496" y="471" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">entry or attempted entry</text>
</svg>
