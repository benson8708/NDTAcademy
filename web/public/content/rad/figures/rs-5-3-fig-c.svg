<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">Pre-Shot Label Walkaround</text>

  <!-- leader lines to device -->
  <line x1="348" y1="218" x2="315" y2="184" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="452" y1="218" x2="485" y2="184" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="348" y1="282" x2="315" y2="316" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="452" y1="282" x2="485" y2="316" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Card A: trefoil hazard plate (compliant) -->
  <rect x="40" y="60" width="320" height="120" rx="10" fill="#F2A33C"/>
  <g transform="translate(100,120)">
    <circle r="7" fill="#0A2342"/>
    <polygon points="0,-11 -13,-30 13,-30" fill="#0A2342"/>
    <polygon points="0,-11 -13,-30 13,-30" fill="#0A2342" transform="rotate(120)"/>
    <polygon points="0,-11 -13,-30 13,-30" fill="#0A2342" transform="rotate(240)"/>
  </g>
  <text x="160" y="112" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">CAUTION</text>
  <text x="160" y="138" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">RADIOACTIVE MATERIAL</text>

  <!-- Card B: source identity label (the violation) -->
  <rect x="440" y="60" width="320" height="120" rx="10" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="456" y="88" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">IRIDIUM-192 (Ir-192)</text>
  <text x="456" y="116" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Activity:</text>
  <rect x="520" y="103" width="64" height="17" fill="#41546B"/>
  <line x1="524" y1="118" x2="544" y2="105" stroke="#0A2342" stroke-width="2"/>
  <line x1="544" y1="118" x2="564" y2="105" stroke="#0A2342" stroke-width="2"/>
  <text x="596" y="116" font-family="Arial, sans-serif" font-size="14" fill="#F2A33C">(worn off)</text>
  <text x="456" y="140" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Assay date:</text>
  <rect x="542" y="127" width="64" height="17" fill="#41546B"/>
  <line x1="546" y1="142" x2="566" y2="129" stroke="#0A2342" stroke-width="2"/>
  <line x1="566" y1="142" x2="586" y2="129" stroke="#0A2342" stroke-width="2"/>
  <text x="618" y="140" font-family="Arial, sans-serif" font-size="14" fill="#F2A33C">(worn off)</text>
  <text x="456" y="164" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Source S/N 7741 — Gulf Coast Isotope</text>

  <!-- device silhouette -->
  <path d="M 365 215 L 365 200 Q 365 193 372 193 L 428 193 Q 435 193 435 200 L 435 215" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="335" y="215" width="130" height="70" rx="14" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="465" y="238" width="14" height="16" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="352" cy="250" r="5" fill="none" stroke="#9BC4FF" stroke-width="2"/>

  <!-- Card C: source assembly tag (compliant) -->
  <rect x="40" y="320" width="320" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="56" y="346" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">SOURCE ASSEMBLY (PIGTAIL)</text>
  <rect x="56" y="366" width="14" height="10" fill="#9BC4FF"/>
  <line x1="70" y1="371" x2="140" y2="371" stroke="#9BC4FF" stroke-width="3"/>
  <rect x="140" y="363" width="30" height="16" rx="8" fill="#F2A33C"/>
  <line x1="105" y1="371" x2="105" y2="388" stroke="#F2A33C" stroke-width="2"/>
  <rect x="56" y="388" width="206" height="28" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="159" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">DANGER—RADIOACTIVE</text>
  <text x="56" y="434" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Attached or engraved — 10 CFR 34.20</text>

  <!-- Card D: licensee plate (compliant) -->
  <rect x="440" y="320" width="320" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="456" y="346" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">LICENSEE</text>
  <text x="456" y="376" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">Lone Star Inspection Services LLC</text>
  <text x="456" y="400" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">4810 Port Road, Beaumont, TX 77701</text>
  <text x="456" y="424" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">(409) 555-0148 — manned 24 hr</text>

  <!-- bottom note -->
  <text x="400" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Three of these markings are compliant. One is not.</text>
</svg>
