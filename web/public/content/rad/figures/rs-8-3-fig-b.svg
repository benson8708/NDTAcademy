<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Which Regulation Answers the Question?</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Federal citations shown — Agreement State agencies enforce compatible equivalents</text>

  <!-- Row 1 -->
  <rect x="24" y="78" width="366" height="60" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="38" y="102" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">How much dose may I receive? Where are</text>
  <text x="38" y="122" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">postings, surveys, and monitoring required?</text>
  <line x1="390" y1="108" x2="420" y2="108" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,103 428,108 420,113" fill="#1E66F5"/>
  <rect x="428" y="78" width="348" height="60" fill="#1E66F5"/>
  <text x="442" y="102" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">10 CFR Part 20</text>
  <text x="442" y="122" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Standards for Protection Against Radiation</text>

  <!-- Row 2 -->
  <rect x="24" y="150" width="366" height="60" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="38" y="174" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">What must my employer tell me? May I</text>
  <text x="38" y="194" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">speak privately with an inspector?</text>
  <line x1="390" y1="180" x2="420" y2="180" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,175 428,180 420,185" fill="#1E66F5"/>
  <rect x="428" y="150" width="348" height="60" fill="#1E66F5"/>
  <text x="442" y="174" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">10 CFR Part 19</text>
  <text x="442" y="194" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Worker instruction and rights (NRC Form 3)</text>

  <!-- Row 3 -->
  <rect x="24" y="222" width="366" height="60" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="38" y="246" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Who may operate the source? What training,</text>
  <text x="38" y="266" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">equipment, and surveys does the job need?</text>
  <line x1="390" y1="252" x2="420" y2="252" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,247 428,252 420,257" fill="#1E66F5"/>
  <rect x="428" y="222" width="348" height="60" fill="#1E66F5"/>
  <text x="442" y="246" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">10 CFR Part 34</text>
  <text x="442" y="266" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Industrial radiography — the method rules</text>

  <!-- Row 4 -->
  <rect x="24" y="294" width="366" height="60" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="38" y="318" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">How are higher-activity sources secured</text>
  <text x="38" y="338" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">against theft or sabotage?</text>
  <line x1="390" y1="324" x2="420" y2="324" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,319 428,324 420,329" fill="#1E66F5"/>
  <rect x="428" y="294" width="348" height="60" fill="#1E66F5"/>
  <text x="442" y="318" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">10 CFR Part 37</text>
  <text x="442" y="338" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Physical protection of Category 1–2 sources</text>

  <!-- Row 5 -->
  <rect x="24" y="366" width="366" height="60" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <text x="38" y="390" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">How does the source travel by road? Who</text>
  <text x="38" y="410" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">regulates X-ray machines?</text>
  <line x1="390" y1="396" x2="420" y2="396" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,391 428,396 420,401" fill="#1E66F5"/>
  <rect x="428" y="366" width="348" height="60" fill="#1E66F5"/>
  <text x="442" y="390" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">49 CFR (DOT) · 10 CFR 71 · state rules</text>
  <text x="442" y="410" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Transport — and X-ray machine registration</text>

  <!-- footnote -->
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">License conditions and operating and emergency procedures bind you too —</text>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">when requirements differ, the most restrictive applicable rule governs the work.</text>
</svg>
