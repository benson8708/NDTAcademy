<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Source-Out: What the Crank Says vs. What the Meter Sees</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Survey the device and the full guide tube after every exposure — before anyone approaches (10 CFR 34.49)</text>

  <!-- ================= Panel 1: normal retraction ================= -->
  <rect x="30" y="68" width="740" height="142" rx="10" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="46" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">1 — NORMAL RETRACTION</text>
  <text x="262" y="92" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">survey confirms the source is back in its shield</text>

  <!-- crank -->
  <circle cx="74" cy="158" r="17" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="74" y1="158" x2="74" y2="143" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="74" cy="141" r="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="91" y1="158" x2="122" y2="158" stroke="#1E66F5" stroke-width="3"/>

  <!-- device housing -->
  <rect x="122" y="128" width="126" height="60" rx="9" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="138" y="139" width="94" height="38" rx="6" fill="#9BC4FF"/>
  <circle cx="185" cy="158" r="8" fill="#F2A33C" stroke="#0B1F3A" stroke-width="2"/>
  <text x="185" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">source seated in the shield</text>

  <!-- empty guide tube + collimator -->
  <rect x="248" y="151" width="296" height="14" rx="7" fill="#D9E0E8" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="396" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">guide tube — empty</text>
  <polygon points="544,146 580,152 580,164 544,170" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- meter -->
  <rect x="616" y="116" width="138" height="64" rx="9" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="685" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">SURVEY METER</text>
  <text x="685" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">reading falls to</text>
  <text x="685" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">near background</text>
  <text x="685" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">approach authorized</text>

  <!-- ================= Panel 2: source-out ================= -->
  <rect x="30" y="224" width="740" height="252" rx="10" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="46" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 — SOURCE-OUT</text>
  <text x="186" y="248" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">the handle lies — the meter does not</text>

  <!-- handle tag -->
  <rect x="46" y="262" width="152" height="24" rx="5" fill="#0B1F3A"/>
  <text x="122" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Handle reads HOME</text>
  <line x1="86" y1="286" x2="76" y2="306" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- crank -->
  <circle cx="74" cy="324" r="17" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="74" y1="324" x2="74" y2="309" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="74" cy="307" r="4" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="91" y1="324" x2="122" y2="324" stroke="#1E66F5" stroke-width="3"/>

  <!-- device housing, shield channel empty -->
  <rect x="122" y="294" width="126" height="60" rx="9" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="138" y="305" width="94" height="38" rx="6" fill="#9BC4FF"/>
  <path d="M152 339 Q152 313 185 313 Q218 313 218 331" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <text x="185" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shield channel empty</text>

  <!-- guide tube with source stuck at far end -->
  <rect x="248" y="317" width="296" height="14" rx="7" fill="#D9E0E8" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="544,312 580,318 580,330 544,336" fill="#5A6B7E" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="500" y1="324" x2="528" y2="324" stroke="#F2A33C" stroke-width="3"/>
  <circle cx="536" cy="324" r="9" fill="#F2A33C" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="430" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">source stuck at the tube end</text>

  <!-- radiation rays (omnidirectional) -->
  <line x1="546" y1="312" x2="568" y2="290" stroke="#F2A33C" stroke-width="2"/>
  <line x1="536" y1="311" x2="536" y2="288" stroke="#F2A33C" stroke-width="2"/>
  <line x1="526" y1="312" x2="506" y2="292" stroke="#F2A33C" stroke-width="2"/>
  <line x1="546" y1="336" x2="566" y2="356" stroke="#F2A33C" stroke-width="2"/>
  <line x1="526" y1="336" x2="506" y2="356" stroke="#F2A33C" stroke-width="2"/>

  <!-- meter -->
  <rect x="616" y="272" width="138" height="64" rx="9" fill="#0B1F3A" stroke="#0B1F3A" stroke-width="2"/>
  <text x="685" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">SURVEY METER</text>
  <text x="685" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">48 R/h at 1 m</text>
  <text x="685" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">SOURCE OUT</text>
  <text x="685" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">do not approach</text>

  <!-- distance ruler -->
  <line x1="536" y1="335" x2="536" y2="408" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="70" y1="408" x2="536" y2="408" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="536" y1="400" x2="536" y2="416" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="462" y1="400" x2="462" y2="416" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="290" y1="400" x2="290" y2="416" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="92" y1="400" x2="92" y2="416" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="536" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">source</text>
  <text x="462" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">48 R/h</text>
  <text x="462" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">1 m</text>
  <text x="296" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">100 mR/h — high radiation area</text>
  <text x="290" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">22 m</text>
  <text x="106" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">2 mR/h — public line</text>
  <text x="92" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">~155 m</text>
  <line x1="92" y1="385" x2="92" y2="398" stroke="#1E66F5" stroke-width="1.5"/>

  <text x="400" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Bare 100 Ci Ir-192 (0.48 R/h per Ci at 1 m) — inverse square, no shielding credit; distances not to scale</text>
</svg>
