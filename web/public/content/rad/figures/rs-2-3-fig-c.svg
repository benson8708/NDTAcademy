<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Temporary Job Site — Plan View</text>

  <!-- operator sight lines -->
  <line x1="190" y1="170" x2="690" y2="100" stroke="#1B82E8" stroke-width="1.3" stroke-dasharray="4 6" opacity="0.4"/>
  <line x1="190" y1="170" x2="688" y2="300" stroke="#1B82E8" stroke-width="1.3" stroke-dasharray="4 6" opacity="0.4"/>
  <line x1="190" y1="170" x2="132" y2="425" stroke="#1B82E8" stroke-width="1.3" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- rope boundary with gap on east side -->
  <path d="M130,100 L690,100 L690,305 M690,395 L690,430 L130,430 L130,100" fill="none" stroke="#8E2A7E" stroke-width="2.5" stroke-dasharray="12 7"/>

  <!-- north sign -->
  <text x="395" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">CAUTION, RADIATION AREA sign</text>
  <rect x="380" y="89" width="30" height="22" fill="#F2C14E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="395" cy="100" r="4" fill="#8E2A7E"/>

  <!-- west sign -->
  <text x="64" y="344" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">posted</text>
  <text x="64" y="360" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">rope line</text>
  <line x1="98" y1="354" x2="118" y2="368" stroke="#5A6B7E" stroke-width="1"/>
  <rect x="118" y="362" width="24" height="18" fill="#F2C14E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="130" cy="371" r="3.5" fill="#8E2A7E"/>

  <!-- operator at control point -->
  <circle cx="180" cy="148" r="9" fill="#0A2342"/>
  <line x1="180" y1="157" x2="180" y2="188" stroke="#0A2342" stroke-width="3"/>
  <line x1="180" y1="188" x2="170" y2="205" stroke="#0A2342" stroke-width="3"/>
  <line x1="180" y1="188" x2="190" y2="205" stroke="#0A2342" stroke-width="3"/>
  <line x1="180" y1="165" x2="204" y2="182" stroke="#0A2342" stroke-width="3"/>
  <line x1="180" y1="165" x2="165" y2="175" stroke="#0A2342" stroke-width="3"/>
  <rect x="156" y="170" width="14" height="10" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="202" y="180" width="26" height="18" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="180" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">control point — operator, crank, meter</text>

  <!-- drive cable -->
  <path d="M226,190 C270,235 300,260 332,278" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>

  <!-- exposure device -->
  <rect x="330" y="272" width="46" height="24" rx="4" fill="#0A2342"/>
  <text x="352" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">exposure device</text>

  <!-- guide tube to collimator on weld -->
  <path d="M376,284 C430,284 460,287 506,287" fill="none" stroke="#0A2342" stroke-width="3"/>
  <rect x="430" y="296" width="170" height="18" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="516" y="294" width="8" height="22" fill="#5A6B7E"/>
  <rect x="506" y="272" width="28" height="18" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <polygon points="512,290 528,290 536,318 504,318" fill="#F2A33C" opacity="0.55"/>
  <text x="520" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">collimated head on the weld</text>

  <!-- site trailer straddling the rope -->
  <rect x="610" y="310" width="130" height="70" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="675" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">site trailer</text>

  <!-- blind spot wedge -->
  <polygon points="612,384 744,380 782,462 628,464" fill="#5A6B7E" opacity="0.16"/>
  <text x="700" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">hidden from control point</text>

  <!-- open path through the gap -->
  <line x1="775" y1="420" x2="676" y2="394" stroke="#D14343" stroke-width="2.5" stroke-dasharray="8 5"/>
  <polygon points="672,392 688,388 684,402" fill="#D14343"/>
  <text x="700" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">open path — no sign</text>

  <text x="40" y="490" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">Plan view — not to scale.</text>
</svg>
