<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">The Emergency Notification Card — Ready Before You Dial</text>

  <!-- card -->
  <rect x="40" y="56" width="720" height="396" rx="14" fill="#FFFFFF"/>

  <!-- ===== Row 1 ===== -->
  <rect x="56" y="72" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="70" y="84" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="80" y="102" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1 · WHO IS CALLING</text>
  <text x="70" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Your name, crew, and company</text>
  <text x="70" y="150" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">License number</text>
  <text x="70" y="170" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Callback number that stays answered</text>

  <rect x="408" y="72" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="422" y="84" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="432" y="102" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2 · WHAT HAPPENED</text>
  <text x="422" y="130" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Plain words: source will not retract,</text>
  <text x="422" y="150" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">pigtail disconnected, vehicle accident,</text>
  <text x="422" y="170" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fire, device lost or stolen</text>

  <!-- ===== Row 2 ===== -->
  <rect x="56" y="196" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="70" y="208" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="80" y="226" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3 · WHERE</text>
  <text x="70" y="254" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Site address and gate for responders</text>
  <text x="70" y="274" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Exactly where the device sits</text>
  <text x="70" y="294" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Where the boundary is drawn</text>

  <rect x="408" y="196" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="422" y="208" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="432" y="226" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">4 · THE SOURCE</text>
  <text x="422" y="254" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Isotope: Ir-192, Co-60, Se-75</text>
  <text x="422" y="274" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Activity in curies (utilization log)</text>
  <text x="422" y="294" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Device make, model, serial number</text>

  <!-- ===== Row 3 ===== -->
  <rect x="56" y="320" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="70" y="332" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="80" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">5 · READINGS</text>
  <text x="70" y="378" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Dose rate at the boundary</text>
  <text x="70" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Survey meter used — model and</text>
  <text x="70" y="418" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">current calibration</text>

  <rect x="408" y="320" width="336" height="112" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="422" y="332" width="190" height="26" rx="6" fill="#1E66F5"/>
  <text x="432" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">6 · PEOPLE</text>
  <text x="422" y="378" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Everyone inside the area, with their</text>
  <text x="422" y="398" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">direct-reading dosimeter values</text>
  <text x="422" y="418" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Injuries — who holds the boundary now</text>

  <!-- footer -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">One packet serves every call — RSO, regulator, recovery team. Write down what each contact tells you.</text>
</svg>
