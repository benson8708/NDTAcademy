<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Stay Time = Dose Budget ÷ Dose Rate</text>

  <!-- formula box -->
  <rect x="70" y="52" width="660" height="58" rx="8" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">stay time (hours) = allowed dose (mR) ÷ measured dose rate (mR/h)</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Example: 50 mR budget with the meter reading 20 mR/h → 50 ÷ 20 = 2.5 hours</text>

  <!-- column headers -->
  <text x="228" y="140" text-anchor="end" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">meter reads</text>
  <text x="250" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">stay time on a 100 mR budget →</text>

  <!-- axis -->
  <line x1="250" y1="150" x2="250" y2="405" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- rows: width = 24 px per hour -->
  <text x="235" y="173" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">5 mR/h</text>
  <rect x="250" y="153" width="480" height="30" fill="#1E66F5"/>
  <text x="718" y="173" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">20 h</text>

  <text x="235" y="217" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">10 mR/h</text>
  <rect x="250" y="197" width="240" height="30" fill="#1E66F5"/>
  <text x="502" y="217" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">10 h</text>

  <text x="235" y="261" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">25 mR/h</text>
  <rect x="250" y="241" width="96" height="30" fill="#1E66F5"/>
  <text x="358" y="261" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">4 h</text>

  <text x="235" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">50 mR/h</text>
  <rect x="250" y="285" width="48" height="30" fill="#1E66F5"/>
  <text x="310" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 h</text>

  <text x="235" y="349" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">100 mR/h</text>
  <rect x="250" y="329" width="24" height="30" fill="#1E66F5"/>
  <text x="286" y="349" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 h</text>

  <text x="235" y="393" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0B1F3A">200 mR/h</text>
  <rect x="250" y="373" width="12" height="30" fill="#1E66F5"/>
  <text x="274" y="393" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">30 min</text>

  <!-- bottom note -->
  <rect x="70" y="424" width="660" height="62" rx="8" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Measure at the actual work position · assign a timekeeper · leave when time is up</text>
  <text x="400" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Re-survey and recompute whenever the source, the shielding, or your position changes.</text>
</svg>
