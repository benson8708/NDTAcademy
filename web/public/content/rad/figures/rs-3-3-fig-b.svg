<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Acute Whole-Body Dose and Its Effects</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">single short-term exposure to the whole body — approximate threshold values</text>

  <!-- vertical dose axis -->
  <line x1="150" y1="90" x2="150" y2="460" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="142,90 150,72 158,90" fill="#9BC4FF"/>
  <text x="150" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">increasing acute dose &#8593;</text>

  <!-- Band 1: no observable effect -->
  <rect x="170" y="408" width="600" height="50" rx="6" fill="#13294B" stroke="#1E9E6A" stroke-width="2"/>
  <text x="186" y="430" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">Below ~25 rad (0.25 Gy)</text>
  <text x="186" y="450" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">No clinically observable effect; no symptoms.</text>
  <circle cx="150" cy="433" r="6" fill="#1E9E6A"/>

  <!-- Band 2: blood changes -->
  <rect x="170" y="346" width="600" height="50" rx="6" fill="#13294B" stroke="#9BC4FF" stroke-width="2"/>
  <text x="186" y="368" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">~25–100 rad (0.25–1 Gy)</text>
  <text x="186" y="388" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Measurable drop in blood cell counts; usually no other symptoms.</text>
  <circle cx="150" cy="371" r="6" fill="#9BC4FF"/>

  <!-- Band 3: mild ARS -->
  <rect x="170" y="284" width="600" height="50" rx="6" fill="#13294B" stroke="#F2D34C" stroke-width="2"/>
  <text x="186" y="306" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2D34C">~100–200 rad (1–2 Gy)</text>
  <text x="186" y="326" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Nausea, vomiting, fatigue; recovery likely with care.</text>
  <circle cx="150" cy="309" r="6" fill="#F2D34C"/>

  <!-- Band 4: hematopoietic ARS -->
  <rect x="170" y="222" width="600" height="50" rx="6" fill="#13294B" stroke="#F2A33C" stroke-width="2"/>
  <text x="186" y="244" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">~200–600 rad (2–6 Gy)</text>
  <text x="186" y="264" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Hematopoietic syndrome — bone marrow failure; deaths rise across this band.</text>
  <circle cx="150" cy="247" r="6" fill="#F2A33C"/>

  <!-- LD 50/30 marker -->
  <line x1="170" y1="222" x2="770" y2="222" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="770" y="216" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">LD 50/30 &#8776; 400–450 rad (untreated)</text>

  <!-- Band 5: GI / CNS lethal -->
  <rect x="170" y="160" width="600" height="50" rx="6" fill="#13294B" stroke="#D14343" stroke-width="2"/>
  <text x="186" y="182" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">Above ~600 rad (6 Gy)</text>
  <text x="186" y="202" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Gastrointestinal then CNS syndrome; survival unlikely, then impossible.</text>
  <circle cx="150" cy="185" r="6" fill="#D14343"/>

  <!-- reference note -->
  <text x="400" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">1 Gy = 100 rad. Values are approximate and assume an acute, whole-body dose; partial-body or fractionated doses behave very differently.</text>
</svg>
