<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">What the Recorded Readings Must Prove</text>
  <text x="40" y="62" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">✕ = boundary reading recorded with its exact location</text>

  <!-- radiation area (middle ring) -->
  <circle cx="295" cy="280" r="112" fill="#9BC4FF" fill-opacity="0.3" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="9,7"/>
  <!-- high radiation area (inner ring) -->
  <circle cx="295" cy="280" r="58" fill="#1E66F5" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="9,7"/>
  <!-- restricted area boundary (outer) -->
  <circle cx="295" cy="280" r="178" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <!-- boundary stanchions -->
  <circle cx="459" cy="212" r="4" fill="#0B1F3A"/>
  <circle cx="363" cy="116" r="4" fill="#0B1F3A"/>
  <circle cx="227" cy="116" r="4" fill="#0B1F3A"/>
  <circle cx="131" cy="212" r="4" fill="#0B1F3A"/>
  <circle cx="131" cy="348" r="4" fill="#0B1F3A"/>
  <circle cx="227" cy="444" r="4" fill="#0B1F3A"/>
  <circle cx="363" cy="444" r="4" fill="#0B1F3A"/>
  <circle cx="459" cy="348" r="4" fill="#0B1F3A"/>

  <!-- source -->
  <circle cx="295" cy="280" r="7" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="295" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">source</text>

  <!-- recorded boundary readings -->
  <line x1="289" y1="96" x2="301" y2="108" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="301" y1="96" x2="289" y2="108" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="295" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1.6 mR/h</text>

  <line x1="111" y1="274" x2="123" y2="286" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="123" y1="274" x2="111" y2="286" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="117" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1.4 mR/h</text>

  <line x1="289" y1="452" x2="301" y2="464" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="301" y1="452" x2="289" y2="464" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="295" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1.7 mR/h</text>

  <!-- leader lines -->
  <circle cx="336" cy="239" r="3" fill="#0B1F3A"/>
  <line x1="336" y1="239" x2="520" y2="108" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="392" cy="224" r="3" fill="#1E66F5"/>
  <line x1="392" y1="224" x2="520" y2="206" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="473" cy="280" r="3" fill="#0B1F3A"/>
  <line x1="473" y1="280" x2="520" y2="304" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="440" cy="408" r="3" fill="#0B1F3A"/>
  <line x1="440" y1="408" x2="520" y2="402" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- legend boxes -->
  <rect x="520" y="70" width="266" height="88" rx="8" fill="#1E66F5" fill-opacity="0.12" stroke="#0B1F3A" stroke-width="2"/>
  <text x="532" y="94" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">HIGH RADIATION AREA</text>
  <text x="532" y="114" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">could exceed 100 mrem in 1 h</text>
  <text x="532" y="133" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">at 30 cm — post CAUTION (or</text>
  <text x="532" y="152" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">DANGER), HIGH RADIATION AREA</text>

  <rect x="520" y="168" width="266" height="88" rx="8" fill="#9BC4FF" fill-opacity="0.25" stroke="#1E66F5" stroke-width="2"/>
  <text x="532" y="192" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">RADIATION AREA</text>
  <text x="532" y="212" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">could exceed 5 mrem in 1 h at</text>
  <text x="532" y="231" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">30 cm — post CAUTION,</text>
  <text x="532" y="250" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">RADIATION AREA (20.1902)</text>

  <rect x="520" y="266" width="266" height="88" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="532" y="290" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">RESTRICTED AREA BOUNDARY</text>
  <text x="532" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">licensee controls access —</text>
  <text x="532" y="329" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rope, signs, and direct visual</text>
  <text x="532" y="348" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surveillance (10 CFR 34.51)</text>

  <rect x="520" y="364" width="266" height="88" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="532" y="388" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">UNRESTRICTED AREA</text>
  <text x="532" y="408" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">≤ 2 mrem in any one hour and</text>
  <text x="532" y="427" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">≤ 100 mrem in a year (public,</text>
  <text x="532" y="446" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10 CFR 20.1301)</text>
</svg>
