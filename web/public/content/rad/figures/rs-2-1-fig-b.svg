<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Neutron Rem Meter: Moderate, Capture, Count</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Photon survey meters are nearly blind to neutrons — this instrument fills that gap.</text>

  <!-- moderator sphere -->
  <circle cx="250" cy="272" r="140" fill="#1E66F5" opacity="0.18" stroke="#9BC4FF" stroke-width="3"/>
  <!-- hydrogen nuclei hints -->
  <circle cx="180" cy="200" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="310" cy="190" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="150" cy="300" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="330" cy="310" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="210" cy="360" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="300" cy="358" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="320" cy="250" r="3" fill="#9BC4FF" opacity="0.45"/>
  <circle cx="190" cy="155" r="3" fill="#9BC4FF" opacity="0.45"/>

  <!-- proportional tube at center -->
  <rect x="224" y="234" width="52" height="78" rx="8" fill="#0B1F3A" stroke="#FFFFFF" stroke-width="3"/>
  <text x="250" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">He-3</text>
  <text x="250" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">or BF₃</text>

  <!-- incoming fast neutron -->
  <text x="46" y="84" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">fast neutron</text>
  <line x1="75" y1="96" x2="148" y2="166" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="152,170 140,165 147,158" fill="#9BC4FF"/>
  <!-- zigzag moderation path -->
  <polyline points="152,170 196,218 168,262 218,248 226,262" fill="none" stroke="#9BC4FF" stroke-width="3"/>
  <circle cx="196" cy="218" r="4" fill="#9BC4FF"/>
  <circle cx="168" cy="262" r="4" fill="#9BC4FF"/>
  <circle cx="218" cy="248" r="4" fill="#9BC4FF"/>
  <!-- capture flash at tube wall -->
  <circle cx="226" cy="262" r="7" fill="#FFFFFF"/>

  <!-- left-bottom annotation -->
  <text x="40" y="446" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Each collision with hydrogen robs energy —</text>
  <text x="40" y="466" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">the neutron reaches the tube at thermal speed</text>
  <line x1="138" y1="438" x2="184" y2="330" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- right column labels -->
  <text x="455" y="152" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Polyethylene moderator —</text>
  <text x="455" y="172" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">hydrogen-rich plastic, roughly 25 cm thick</text>
  <line x1="450" y1="158" x2="372" y2="202" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>

  <text x="455" y="238" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">BF₃ or He-3 proportional tube —</text>
  <text x="455" y="258" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">capture creates charged particles (region 3)</text>
  <line x1="450" y1="244" x2="282" y2="260" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>

  <text x="455" y="316" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Pulse-height discrimination rejects gamma —</text>
  <text x="455" y="336" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">the meter counts neutrons only</text>

  <!-- signal cable -->
  <path d="M 276 308 C 380 396 470 410 560 418" fill="none" stroke="#9BC4FF" stroke-width="3"/>

  <!-- readout unit -->
  <rect x="560" y="372" width="204" height="100" rx="10" fill="#1E66F5" opacity="0.22" stroke="#9BC4FF" stroke-width="2.5"/>
  <path d="M 588 448 A 36 36 0 0 1 660 448" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="624" y1="448" x2="642" y2="420" stroke="#9BC4FF" stroke-width="3"/>
  <circle cx="624" cy="448" r="4" fill="#FFFFFF"/>
  <text x="712" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">mrem/h</text>
  <text x="712" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">neutron dose</text>
  <text x="712" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">equivalent</text>
</svg>
