<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Thermal Neutron Radiography Facility — Plan View</text>

  <!-- beam (drawn first, under walls) -->
  <polygon points="220,205 688,196 688,264 220,255" fill="#9BC4FF" opacity="0.5"/>
  <text x="430" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">Thermal neutron beam (n + γ)</text>

  <!-- biological shield with source, moderator, collimator -->
  <rect x="40" y="120" width="180" height="220" fill="#0B1F3A"/>
  <text x="130" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Biological shield</text>
  <circle cx="110" cy="230" r="52" fill="#9BC4FF"/>
  <polygon points="126,223 220,203 220,257 126,237" fill="#FFFFFF"/>
  <circle cx="110" cy="230" r="13" fill="#1E66F5" stroke="#FFFFFF" stroke-width="3"/>
  <text x="110" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Source</text>
  <text x="103" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Moderator</text>
  <text x="178" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Collimator</text>
  <text x="130" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Reactor port, accelerator,</text>
  <text x="130" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">or Cf-252 source</text>

  <!-- shutter: open slab raised, closed position dashed over beam -->
  <rect x="252" y="128" width="26" height="74" fill="#0B1F3A"/>
  <rect x="252" y="206" width="26" height="72" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="265" y1="206" x2="265" y2="242" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="259,240 271,240 265,252" fill="#1E66F5"/>
  <text x="235" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Shutter (open)</text>
  <text x="235" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">fails safe closed</text>

  <!-- exposure cell walls -->
  <text x="520" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Exposure cell (shielded)</text>
  <rect x="300" y="80" width="440" height="14" fill="#0B1F3A"/>
  <rect x="726" y="80" width="14" height="320" fill="#0B1F3A"/>
  <rect x="300" y="80" width="14" height="122" fill="#0B1F3A"/>
  <rect x="300" y="258" width="14" height="142" fill="#0B1F3A"/>
  <rect x="300" y="386" width="200" height="14" fill="#0B1F3A"/>
  <rect x="572" y="386" width="168" height="14" fill="#0B1F3A"/>
  <rect x="500" y="386" width="72" height="14" fill="#1E66F5"/>
  <text x="536" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Interlocked door</text>

  <!-- in-cell items -->
  <rect x="470" y="206" width="36" height="48" fill="#0B1F3A"/>
  <text x="488" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Test object</text>
  <rect x="540" y="198" width="8" height="64" fill="#1E66F5"/>
  <line x1="544" y1="262" x2="576" y2="300" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="560" y="318" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Imaging plane</text>
  <text x="560" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(screen + film)</text>
  <rect x="688" y="192" width="30" height="76" fill="#0B1F3A" stroke="#1E66F5" stroke-width="2"/>
  <text x="700" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Beam stop</text>

  <!-- area monitors -->
  <rect x="322" y="102" width="26" height="26" fill="#1E66F5"/>
  <text x="356" y="120" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Neutron monitor</text>
  <rect x="688" y="102" width="26" height="26" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="680" y="120" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Gamma monitor</text>

  <!-- emergency stop -->
  <rect x="700" y="330" width="20" height="20" fill="#1E66F5" stroke="#0B1F3A" stroke-width="2"/>
  <text x="692" y="345" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Emergency stop</text>

  <!-- warning beacon -->
  <circle cx="620" cy="372" r="9" fill="#1E66F5"/>
  <line x1="620" y1="356" x2="620" y2="350" stroke="#1E66F5" stroke-width="2"/>
  <line x1="608" y1="362" x2="603" y2="357" stroke="#1E66F5" stroke-width="2"/>
  <line x1="632" y1="362" x2="637" y2="357" stroke="#1E66F5" stroke-width="2"/>
  <text x="622" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Beacon + horn</text>

  <!-- control console -->
  <rect x="70" y="432" width="250" height="52" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="195" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Control console — key switch,</text>
  <text x="195" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shutter control + status</text>
  <line x1="250" y1="432" x2="266" y2="262" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- interlock note -->
  <rect x="420" y="432" width="360" height="52" rx="8" fill="#9BC4FF" opacity="0.3"/>
  <rect x="420" y="432" width="360" height="52" rx="8" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="600" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Opening the door during a run trips the</text>
  <text x="600" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">interlock and drives the shutter closed</text>
</svg>
