<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">How Radiation Damages a Cell — and How It Is Repaired</text>

  <!-- incoming photon -->
  <line x1="40" y1="120" x2="150" y2="120" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="150,112 168,120 150,128" fill="#9BC4FF"/>
  <text x="40" y="104" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9BC4FF">ionizing photon</text>

  <!-- direct action branch -->
  <rect x="180" y="78" width="220" height="84" rx="10" fill="#13294B" stroke="#1E66F5" stroke-width="2"/>
  <text x="290" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Direct action</text>
  <text x="290" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">photon strikes DNA itself,</text>
  <text x="290" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">breaking the molecule outright</text>

  <!-- indirect action branch -->
  <rect x="180" y="186" width="220" height="104" rx="10" fill="#13294B" stroke="#1E66F5" stroke-width="2"/>
  <text x="290" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Indirect action</text>
  <text x="290" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">photon splits a water molecule</text>
  <text x="290" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">into free radicals (·OH), which</text>
  <text x="290" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">then attack the DNA — most damage</text>

  <!-- branch lines from photon -->
  <line x1="168" y1="120" x2="180" y2="120" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="174" y1="120" x2="174" y2="238" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="174" y1="238" x2="180" y2="238" stroke="#9BC4FF" stroke-width="3"/>

  <!-- arrow into DNA outcome -->
  <line x1="400" y1="184" x2="448" y2="184" stroke="#FFFFFF" stroke-width="4"/>
  <polygon points="448,176 466,184 448,192" fill="#FFFFFF"/>

  <!-- DNA strand break icon -->
  <rect x="478" y="120" width="150" height="128" rx="10" fill="#13294B" stroke="#9BC4FF" stroke-width="2"/>
  <text x="553" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">DNA strand break</text>
  <line x1="513" y1="162" x2="513" y2="238" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="593" y1="162" x2="593" y2="200" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="593" y1="214" x2="593" y2="238" stroke="#9BC4FF" stroke-width="3"/>
  <line x1="513" y1="174" x2="593" y2="174" stroke="#1E66F5" stroke-width="3"/>
  <line x1="513" y1="190" x2="556" y2="190" stroke="#1E66F5" stroke-width="3"/>
  <line x1="513" y1="222" x2="593" y2="222" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="566,200 578,207 566,214" fill="#F2A33C"/>
  <text x="553" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">break point</text>

  <!-- three outcome boxes -->
  <line x1="553" y1="248" x2="553" y2="300" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="180" y1="300" x2="700" y2="300" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="250" y1="300" x2="250" y2="330" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="440" y1="300" x2="440" y2="330" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="630" y1="300" x2="630" y2="330" stroke="#FFFFFF" stroke-width="3"/>
  <polygon points="242,330 250,348 258,330" fill="#FFFFFF"/>
  <polygon points="432,330 440,348 448,330" fill="#FFFFFF"/>
  <polygon points="622,330 630,348 638,330" fill="#FFFFFF"/>

  <!-- outcome 1: repaired correctly -->
  <rect x="120" y="350" width="260" height="120" rx="10" fill="#13294B" stroke="#1E9E6A" stroke-width="3"/>
  <text x="250" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Repaired correctly</text>
  <text x="250" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Enzymes restore the strand.</text>
  <text x="250" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Cell survives, no lasting harm.</text>
  <text x="250" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">the common outcome at low dose</text>

  <!-- outcome 2: cell dies -->
  <rect x="395" y="350" width="220" height="120" rx="10" fill="#13294B" stroke="#F2A33C" stroke-width="3"/>
  <text x="505" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Cell dies</text>
  <text x="505" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Damage too severe to repair.</text>
  <text x="505" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Mass cell death drives</text>
  <text x="505" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">acute (somatic) injury.</text>

  <!-- outcome 3: misrepaired -->
  <rect x="630" y="350" width="160" height="120" rx="10" fill="#13294B" stroke="#D14343" stroke-width="3"/>
  <text x="710" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Misrepaired</text>
  <text x="710" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Cell lives but carries</text>
  <text x="710" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">a mutation — the seed</text>
  <text x="710" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">of later cancer.</text>
</svg>
