<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Penetrating Power of Ionizing Radiation</text>

  <!-- barrier slabs -->
  <rect x="250" y="85" width="8" height="275" fill="#E8F1FB"/>
  <rect x="380" y="85" width="14" height="275" fill="#D9E0E8"/>
  <rect x="520" y="85" width="30" height="275" fill="#5A6B7E"/>
  <rect x="660" y="85" width="40" height="275" fill="#1E9E6A"/>

  <!-- barrier labels -->
  <text x="254" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Paper</text>
  <text x="387" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Aluminum</text>
  <text x="535" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Lead</text>
  <text x="680" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Water / concrete</text>

  <!-- alpha: stopped by paper -->
  <text x="35" y="116" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">α  alpha</text>
  <line x1="140" y1="110" x2="240" y2="110" stroke="#F2A33C" stroke-width="4"/>
  <circle cx="246" cy="110" r="6" fill="#F2A33C"/>

  <!-- beta: stopped by aluminum -->
  <text x="35" y="171" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">β  beta</text>
  <line x1="140" y1="165" x2="370" y2="165" stroke="#1B82E8" stroke-width="4"/>
  <circle cx="376" cy="165" r="6" fill="#1B82E8"/>

  <!-- gamma: attenuated by lead, never zero -->
  <text x="35" y="226" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">γ  gamma</text>
  <line x1="140" y1="220" x2="520" y2="220" stroke="#D14343" stroke-width="4"/>
  <line x1="550" y1="220" x2="744" y2="220" stroke="#D14343" stroke-width="2" stroke-dasharray="8 6" opacity="0.75"/>
  <polygon points="744,214 758,220 744,226" fill="#D14343" opacity="0.75"/>

  <!-- X: attenuated by lead, never zero -->
  <text x="35" y="281" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">X  x-ray</text>
  <line x1="140" y1="275" x2="520" y2="275" stroke="#E8F1FB" stroke-width="4"/>
  <line x1="550" y1="275" x2="744" y2="275" stroke="#E8F1FB" stroke-width="2" stroke-dasharray="8 6" opacity="0.75"/>
  <polygon points="744,269 758,275 744,281" fill="#E8F1FB" opacity="0.75"/>

  <!-- neutron: passes lead, stopped by hydrogenous material -->
  <text x="35" y="336" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">n  neutron</text>
  <line x1="140" y1="330" x2="676" y2="330" stroke="#1E9E6A" stroke-width="4"/>
  <circle cx="682" cy="330" r="6" fill="#0A2342" stroke="#E8F1FB" stroke-width="2"/>

  <!-- notes -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Gamma and X are attenuated in fractional steps (half-value layers) — reduced, never zero.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Neutrons pass dense metal and are best slowed by hydrogen-rich material.</text>
</svg>
