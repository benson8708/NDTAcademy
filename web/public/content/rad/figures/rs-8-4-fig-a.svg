<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#E8F1FB">Type B: Proven Against the Hypothetical Accident</text>
  <text x="400" y="61" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">10 CFR 71.73 &#8212; the same package design must survive the tests in sequence</text>

  <!-- panel frames -->
  <rect x="28" y="80" width="166" height="276" rx="10" fill="#1B82E8" fill-opacity="0.12" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="222" y="80" width="166" height="276" rx="10" fill="#1B82E8" fill-opacity="0.12" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="416" y="80" width="166" height="276" rx="10" fill="#1B82E8" fill-opacity="0.12" stroke="#1B82E8" stroke-width="1.5"/>
  <rect x="610" y="80" width="166" height="276" rx="10" fill="#1B82E8" fill-opacity="0.12" stroke="#1B82E8" stroke-width="1.5"/>

  <!-- sequence chevrons -->
  <polygon points="198,212 214,218 198,224" fill="#9BC4FF"/>
  <polygon points="392,212 408,218 392,224" fill="#9BC4FF"/>
  <polygon points="586,212 602,218 586,224" fill="#9BC4FF"/>

  <!-- ===== Panel 1: FREE DROP ===== -->
  <circle cx="52" cy="104" r="13" fill="#F2A33C"/>
  <text x="52" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">1</text>
  <text x="74" y="109" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">FREE DROP</text>
  <!-- package -->
  <rect x="91" y="138" width="38" height="30" rx="4" fill="#9BC4FF"/>
  <circle cx="110" cy="153" r="7" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="110" cy="153" r="2" fill="#0A2342"/>
  <!-- drop arrow -->
  <line x1="110" y1="176" x2="110" y2="226" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="103,222 117,222 110,236" fill="#F2A33C"/>
  <!-- unyielding surface -->
  <line x1="48" y1="244" x2="174" y2="244" stroke="#E8F1FB" stroke-width="3"/>
  <line x1="56" y1="256" x2="68" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="76" y1="256" x2="88" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="96" y1="256" x2="108" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="116" y1="256" x2="128" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="136" y1="256" x2="148" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="156" y1="256" x2="168" y2="244" stroke="#5A6B7E" stroke-width="2"/>
  <text x="111" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">30 ft (9 m)</text>
  <text x="111" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">free drop onto an</text>
  <text x="111" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">unyielding surface</text>

  <!-- ===== Panel 2: PUNCTURE ===== -->
  <circle cx="246" cy="104" r="13" fill="#F2A33C"/>
  <text x="246" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">2</text>
  <text x="268" y="109" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">PUNCTURE</text>
  <!-- package -->
  <rect x="286" y="134" width="38" height="30" rx="4" fill="#9BC4FF"/>
  <circle cx="305" cy="149" r="7" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="305" cy="149" r="2" fill="#0A2342"/>
  <!-- drop arrow -->
  <line x1="305" y1="172" x2="305" y2="194" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="298,190 312,190 305,204" fill="#F2A33C"/>
  <!-- steel bar -->
  <rect x="298" y="208" width="14" height="36" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="242" y1="244" x2="368" y2="244" stroke="#E8F1FB" stroke-width="3"/>
  <text x="305" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">40 in (1 m)</text>
  <text x="305" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">drop onto a 6-in (15 cm)</text>
  <text x="305" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">steel puncture bar</text>

  <!-- ===== Panel 3: FIRE ===== -->
  <circle cx="440" cy="104" r="13" fill="#F2A33C"/>
  <text x="440" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">3</text>
  <text x="462" y="109" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">FIRE</text>
  <!-- flames -->
  <path d="M455,244 Q448,210 466,196 Q462,216 476,222 Q474,206 488,194 Q488,216 499,222 Q499,202 513,192 Q511,214 524,220 Q526,204 542,198 Q554,214 543,244 Z" fill="#D14343"/>
  <path d="M468,244 Q466,222 480,212 Q480,226 492,230 Q492,216 504,210 Q506,226 516,230 Q520,218 530,216 Q536,232 528,244 Z" fill="#F2A33C"/>
  <!-- package engulfed -->
  <rect x="480" y="158" width="38" height="30" rx="4" fill="#9BC4FF"/>
  <circle cx="499" cy="173" r="7" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="499" cy="173" r="2" fill="#0A2342"/>
  <line x1="436" y1="244" x2="562" y2="244" stroke="#E8F1FB" stroke-width="3"/>
  <text x="499" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">1,475 &#176;F (800 &#176;C)</text>
  <text x="499" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">fully engulfing fire</text>
  <text x="499" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">for 30 minutes</text>

  <!-- ===== Panel 4: IMMERSION ===== -->
  <circle cx="634" cy="104" r="13" fill="#F2A33C"/>
  <text x="634" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">4</text>
  <text x="656" y="109" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">IMMERSION</text>
  <!-- water -->
  <rect x="624" y="156" width="138" height="88" fill="#1B82E8" fill-opacity="0.35"/>
  <polyline points="624,156 636,150 648,156 660,150 672,156 684,150 696,156 708,150 720,156 732,150 744,156 756,150 762,156" fill="none" stroke="#9BC4FF" stroke-width="2.5"/>
  <!-- package submerged -->
  <rect x="674" y="196" width="38" height="30" rx="4" fill="#9BC4FF"/>
  <circle cx="693" cy="211" r="7" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="693" cy="211" r="2" fill="#0A2342"/>
  <line x1="630" y1="244" x2="756" y2="244" stroke="#E8F1FB" stroke-width="3"/>
  <text x="693" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">50 ft (15 m)</text>
  <text x="693" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">of water pressure</text>
  <text x="693" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">for 8 hours</text>

  <!-- ===== result bar ===== -->
  <rect x="28" y="376" width="748" height="100" rx="10" fill="#1E9E6A" fill-opacity="0.12" stroke="#1E9E6A" stroke-width="2"/>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">After the full sequence the package must still pass:</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D9E0E8">contents contained &#183; shielding in place &#183; no more than 1 rem/h at 1 m from the surface</text>
  <text x="400" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">NRC certifies the design &#8212; Certificate of Compliance marked on the package (e.g. USA/9296/B(U)-96)</text>
</svg>
