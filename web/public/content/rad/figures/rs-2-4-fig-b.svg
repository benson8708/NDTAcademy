<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Survey After Every Exposure — 10 CFR 34.49</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Prove the source is shielded before film exchange, repositioning, or breakdown.</text>

  <!-- ground -->
  <line x1="40" y1="332" x2="760" y2="332" stroke="#5A6B7E" stroke-width="2"/>

  <!-- part being radiographed -->
  <rect x="660" y="130" width="26" height="202" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="673" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">part</text>

  <!-- drive cable to crank -->
  <polyline points="270,302 180,302 120,318" fill="none" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="8,6"/>
  <circle cx="108" cy="320" r="6" fill="#1E66F5"/>
  <text x="140" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">to the crank</text>

  <!-- guide tube -->
  <polyline points="380,302 510,302 556,290" fill="none" stroke="#0B1F3A" stroke-width="4"/>

  <!-- collimator + exposure head on stand -->
  <line x1="574" y1="308" x2="574" y2="332" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="552" y="268" width="44" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="562" y="278" width="24" height="20" fill="#0B1F3A"/>
  <text x="590" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">exposure head + collimator</text>

  <!-- exposure device -->
  <rect x="270" y="272" width="110" height="60" rx="6" fill="#0B1F3A"/>
  <circle cx="300" cy="302" r="5" fill="#F2A33C"/>
  <text x="325" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">exposure device</text>

  <!-- radiographer with meter -->
  <circle cx="150" cy="170" r="9" fill="#0B1F3A"/>
  <line x1="150" y1="179" x2="150" y2="208" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="150" y1="188" x2="182" y2="194" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="182" y="186" width="26" height="16" fill="#1E66F5"/>
  <line x1="150" y1="208" x2="141" y2="226" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="150" y1="208" x2="159" y2="226" stroke="#0B1F3A" stroke-width="3"/>
  <text x="150" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">meter leads the approach</text>

  <!-- survey path: 1 approach -->
  <path d="M 196 200 Q 250 230 292 264" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="8,6"/>
  <polygon points="298,272 285,268 292,257" fill="#1E66F5"/>

  <!-- survey path: 2 circumference loop -->
  <ellipse cx="325" cy="302" rx="88" ry="44" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="8,6"/>
  <polygon points="413,288 406,302 420,302" fill="#1E66F5"/>

  <!-- survey path: 3 guide-tube sweep -->
  <line x1="395" y1="278" x2="542" y2="266" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="8,6"/>
  <polygon points="556,262 542,258 544,272" fill="#1E66F5"/>

  <!-- step badges -->
  <circle cx="240" cy="222" r="11" fill="#1E66F5"/>
  <text x="240" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
  <circle cx="325" cy="244" r="11" fill="#1E66F5"/>
  <text x="325" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
  <circle cx="468" cy="250" r="11" fill="#1E66F5"/>
  <text x="468" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>

  <!-- caption panel -->
  <rect x="60" y="388" width="680" height="100" rx="8" fill="#EAF2FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="80" y="412" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">1 — Approach with the meter ahead of you; readings must fall toward normal, not climb.</text>
  <text x="80" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">2 — Walk the complete circumference of the exposure device.</text>
  <text x="80" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">3 — Sweep the entire guide tube out to the exposure head.</text>
  <text x="80" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Reading above the normal shielded profile? Back out — emergency procedures.</text>
</svg>
