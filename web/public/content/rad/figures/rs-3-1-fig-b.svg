<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Anatomy of a Radiation Survey Report</text>

  <!-- form sheet -->
  <rect x="36" y="52" width="420" height="430" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- block A: job / licensee -->
  <text x="50" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">JOB / LICENSEE</text>
  <text x="50" y="98" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Acme NDT Services — NRC Lic. 12-34567-01</text>
  <text x="50" y="116" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Date 2026-06-12 · Time 17:40</text>
  <text x="50" y="134" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Site: Tank Farm 3, County Rd 12</text>
  <line x1="36" y1="144" x2="456" y2="144" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block B: source & device -->
  <text x="50" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">SOURCE &amp; DEVICE</text>
  <text x="50" y="182" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Ir-192 · 67 Ci today · source S/N 48213</text>
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Projector Model 880 · S/N 12077</text>
  <line x1="36" y1="210" x2="456" y2="210" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block C: instrument -->
  <text x="50" y="228" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">SURVEY INSTRUMENT</text>
  <text x="50" y="248" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Meter S/N 21744 · range 2 mR/h – 1 R/h</text>
  <text x="50" y="266" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Calibrated 2026-03-15 · due 2026-09-15</text>
  <line x1="36" y1="276" x2="456" y2="276" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block D: readings -->
  <text x="50" y="294" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">DOSE-RATE READINGS</text>
  <text x="50" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Location</text>
  <text x="440" y="312" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">mR/h</text>
  <line x1="50" y1="318" x2="440" y2="318" stroke="#9BC4FF" stroke-width="1"/>
  <text x="50" y="336" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Device surface — final retraction</text>
  <text x="440" y="336" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">2.0</text>
  <text x="50" y="354" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Restricted boundary N · E · S · W</text>
  <text x="440" y="354" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1.6</text>
  <text x="50" y="372" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Office trailer (unrestricted)</text>
  <text x="440" y="372" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">0.1</text>
  <line x1="36" y1="382" x2="456" y2="382" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block E: sketch -->
  <text x="50" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">AREA SKETCH</text>
  <rect x="50" y="408" width="390" height="30" rx="5" fill="none" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="245" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">source · boundaries · reading points</text>
  <line x1="36" y1="446" x2="456" y2="446" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- block F: certification -->
  <text x="50" y="462" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">CERTIFICATION</text>
  <text x="50" y="478" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Surveyed by R. Alvarez — signature ________</text>

  <!-- annotations -->
  <line x1="456" y1="98" x2="480" y2="98" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="98" r="13" fill="#1E66F5"/>
  <text x="495" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="514" y="95" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Ties the record to one job, one</text>
  <text x="514" y="114" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">license, one moment in time</text>

  <line x1="456" y1="188" x2="480" y2="188" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="188" r="13" fill="#1E66F5"/>
  <text x="495" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="514" y="185" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">What every reading should</text>
  <text x="514" y="204" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">be compared against</text>

  <line x1="456" y1="252" x2="480" y2="252" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="252" r="13" fill="#1E66F5"/>
  <text x="495" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="514" y="249" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Numbers count only from a</text>
  <text x="514" y="268" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">calibrated meter (§§34.25, 34.65)</text>

  <line x1="456" y1="336" x2="480" y2="336" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="336" r="13" fill="#1E66F5"/>
  <text x="495" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="514" y="333" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Values with units and exact</text>
  <text x="514" y="352" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">locations — never just &quot;OK&quot;</text>

  <line x1="456" y1="420" x2="480" y2="420" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="420" r="13" fill="#1E66F5"/>
  <text x="495" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="514" y="417" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Lets a reviewer rebuild the</text>
  <text x="514" y="436" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">setup years later</text>

  <line x1="456" y1="468" x2="480" y2="468" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="495" cy="468" r="13" fill="#1E66F5"/>
  <text x="495" y="473" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="514" y="465" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">The surveyor signs — records</text>
  <text x="514" y="484" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">carry signatures (§34.87)</text>
</svg>
