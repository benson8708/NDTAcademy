<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Hierarchy of Exposure Controls</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Stronger controls do not depend on human behavior</text>

  <!-- strongest label (left) -->
  <text x="60" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5" transform="rotate(-90 60 250)">STRONGEST — automatic, built in</text>
  <text x="760" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A6B7E" transform="rotate(90 760 250)">WEAKEST — depends on a person</text>

  <!-- down arrow on right of stack -->
  <line x1="730" y1="100" x2="730" y2="408" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="722,398 730,416 738,398" fill="#9BC4FF"/>

  <!-- Tier 1 (top of pyramid) -->
  <polygon points="400,92 470,150 330,150" fill="#0B1F3A"/>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="495" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">Engineering &amp; shielding</text>
  <text x="495" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Device shielding, collimators, interlocked rooms</text>

  <!-- Tier 2 -->
  <polygon points="330,152 470,152 510,210 290,210" fill="#1E66F5"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2  Administrative controls</text>
  <text x="525" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Posted boundary, access control,</text>
  <text x="525" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">written operating &amp; emergency procedures</text>

  <!-- Tier 3 -->
  <polygon points="290,212 510,212 550,270 250,270" fill="#3D82F0"/>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3  Time · Distance · Shielding</text>
  <text x="565" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Worked deliberately at the source</text>
  <text x="565" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">(inverse-square law is the field tool)</text>

  <!-- Tier 4 -->
  <polygon points="250,272 550,272 590,330 210,330" fill="#6BA3F5"/>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">4  Personnel monitoring</text>
  <text x="605" y="306" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">Survey meter, alarming ratemeter,</text>
  <text x="605" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">pocket dosimeter, badge / TLD</text>

  <!-- Tier 5 (base) -->
  <polygon points="210,332 590,332 630,408 170,408" fill="#9BC4FF"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">5  Worker care &amp; attention</text>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Last layer — most likely to fail under fatigue</text>

  <!-- footer rule -->
  <rect x="120" y="438" width="560" height="46" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Lean on the strong controls first: a barrier and an interlock never get tired.</text>
</svg>
