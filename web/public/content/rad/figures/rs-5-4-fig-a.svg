<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Inside a Directional Collimator</text>

  <!-- shielded-direction arrows (behind body) -->
  <line x1="300" y1="112" x2="300" y2="72" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3 5"/>
  <polygon points="294,76 300,62 306,76" fill="#1E66F5"/>
  <text x="300" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">shielded: ×16 to ×100+ less</text>

  <line x1="370" y1="328" x2="370" y2="350" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3 5"/>
  <polygon points="364,346 370,360 376,346" fill="#1E66F5"/>
  <text x="408" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shielded</text>

  <line x1="216" y1="152" x2="172" y2="122" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3 5"/>
  <polygon points="178,116 160,114 172,130" fill="#1E66F5"/>
  <text x="150" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">shielded</text>

  <!-- guide tube -->
  <rect x="40" y="212" width="180" height="16" fill="#D9E0E8" stroke="#0B1F3A" stroke-width="2"/>
  <text x="118" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Guide (projection) tube</text>
  <line x1="50" y1="220" x2="308" y2="220" stroke="#F2A33C" stroke-width="3" stroke-dasharray="2 6"/>

  <!-- tungsten body -->
  <rect x="220" y="120" width="190" height="200" rx="14" fill="#0B1F3A"/>
  <text x="315" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">TUNGSTEN BODY</text>
  <text x="315" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">walls ≈ 12–25 mm</text>

  <!-- channel and port -->
  <rect x="220" y="212" width="98" height="16" fill="#FFFFFF"/>
  <polygon points="325,210 410,176 410,264 325,230" fill="#FFFFFF"/>

  <!-- beam cone -->
  <polygon points="410,176 640,118 640,322 410,264" fill="#9BC4FF" opacity="0.5"/>
  <line x1="334" y1="220" x2="624" y2="220" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 7"/>
  <polygon points="622,213 640,220 622,227" fill="#1E66F5"/>

  <!-- source -->
  <circle cx="318" cy="220" r="10" fill="#F2A33C" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- beam label -->
  <text x="520" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Open port — full-strength beam</text>
  <line x1="520" y1="112" x2="520" y2="148" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- part and film -->
  <rect x="640" y="118" width="24" height="204" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="670" y="118" width="10" height="204" fill="#1E66F5"/>
  <text x="652" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Part</text>
  <text x="690" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Film / detector</text>

  <!-- source label -->
  <line x1="312" y1="232" x2="214" y2="328" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="180" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Sealed source cranked to</text>
  <text x="180" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the exposure position</text>

  <!-- note box -->
  <rect x="30" y="386" width="400" height="84" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="230" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A collimator does not weaken the beam —</text>
  <text x="230" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">it removes the field everywhere the</text>
  <text x="230" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">radiograph does not need it.</text>

  <!-- panoramic inset -->
  <rect x="450" y="386" width="320" height="84" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="610" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Panoramic collimator</text>
  <circle cx="510" cy="440" r="22" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="464" y="434" width="92" height="12" fill="#9BC4FF" opacity="0.7"/>
  <rect x="502" y="416" width="16" height="11" fill="#0B1F3A"/>
  <rect x="502" y="453" width="16" height="11" fill="#0B1F3A"/>
  <circle cx="510" cy="440" r="5" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="575" y="436" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Beam confined to a flat 360°</text>
  <text x="575" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">disc for circumferential welds</text>
</svg>
