<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Reading an Analog Survey Meter — Needle × Range</text>

  <!-- meter housing -->
  <rect x="60" y="70" width="410" height="390" rx="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>

  <!-- dial window -->
  <rect x="88" y="95" width="354" height="225" rx="10" fill="#9BC4FF" opacity="0.16"/>
  <rect x="88" y="95" width="354" height="225" rx="10" fill="none" stroke="#0B1F3A" stroke-width="2"/>

  <!-- scale arc (0 to 2, center 265,300 r145) -->
  <path d="M 139.4 227.5 A 145 145 0 0 1 390.4 227.5" fill="none" stroke="#0B1F3A" stroke-width="3"/>

  <!-- BAT OK band (between 1.55 and 1.85 on the arc) -->
  <path d="M 344 178.4 A 145 145 0 0 1 377.7 208.8" fill="none" stroke="#9BC4FF" stroke-width="13"/>

  <!-- ticks -->
  <line x1="139.4" y1="227.5" x2="151.6" y2="234.5" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="192.5" y1="174.4" x2="199.5" y2="186.6" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="265" y1="155" x2="265" y2="169" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="337.5" y1="174.4" x2="330.5" y2="186.6" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="390.4" y1="227.5" x2="378.4" y2="234.5" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- scale labels -->
  <text x="122" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">0</text>
  <text x="182" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">0.5</text>
  <text x="265" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1</text>
  <text x="348" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1.5</text>
  <text x="408" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">mR/h</text>

  <!-- needle at 1.2 -->
  <line x1="265" y1="300" x2="293.7" y2="165" stroke="#1E66F5" stroke-width="5" stroke-linecap="round"/>
  <circle cx="265" cy="300" r="9" fill="#0B1F3A"/>

  <!-- range selector knob -->
  <circle cx="265" cy="395" r="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="265" y1="395" x2="286.4" y2="374" stroke="#1E66F5" stroke-width="5" stroke-linecap="round"/>
  <circle cx="286.4" cy="374" r="4" fill="#1E66F5"/>

  <!-- selector position labels -->
  <text x="205" y="400" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">OFF</text>
  <text x="222" y="358" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">BAT</text>
  <text x="265" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">×1</text>
  <text x="308" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">×10</text>
  <text x="325" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">×100</text>
  <text x="308" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">×1000</text>

  <text x="265" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A" opacity="0.65">typical field survey meter — printed 0–2 scale, four ranges</text>

  <!-- right panel: required range -->
  <rect x="495" y="78" width="290" height="56" rx="8" fill="#9BC4FF" opacity="0.22"/>
  <rect x="495" y="78" width="290" height="56" rx="8" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Required range — 10 CFR 34.25(a):</text>
  <text x="640" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">2 mR/h through 1 R/h</text>

  <!-- labels with leaders -->
  <line x1="500" y1="163" x2="298" y2="167" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="298" cy="167" r="3.5" fill="#1E66F5"/>
  <text x="505" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Needle</text>
  <text x="505" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">read where it settles: 1.2</text>

  <line x1="500" y1="219" x2="380" y2="206" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="380" cy="206" r="3.5" fill="#1E66F5"/>
  <text x="505" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BAT OK band</text>
  <text x="505" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">battery test must land in this band</text>

  <line x1="500" y1="300" x2="305" y2="392" stroke="#1E66F5" stroke-width="1.5"/>
  <circle cx="303" cy="393" r="3.5" fill="#1E66F5"/>
  <text x="505" y="296" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Range selector</text>
  <text x="505" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">multiplies the printed scale</text>

  <!-- reading formula box -->
  <rect x="495" y="360" width="290" height="110" rx="10" fill="#1E66F5"/>
  <text x="640" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">dose rate = needle × range</text>
  <text x="640" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">1.2 × 10 = 12 mR/h</text>
  <text x="640" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">forgetting the ×10 reads 10× low</text>
</svg>
