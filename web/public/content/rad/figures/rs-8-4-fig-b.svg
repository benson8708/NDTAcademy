<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8F1FB">Survey Sets the Label &#8212; the Label Sets the Placard</text>

  <!-- ===== band 1: survey the package ===== -->
  <text x="36" y="72" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">1 &#183; SURVEY EVERY SHIPMENT</text>
  <!-- package -->
  <rect x="44" y="92" width="110" height="64" rx="6" fill="#1B82E8" fill-opacity="0.25" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="99" cy="124" r="13" fill="none" stroke="#F2C14E" stroke-width="2.5"/>
  <circle cx="99" cy="124" r="3" fill="#F2C14E"/>
  <path d="M99,124 L92,111 A15,15 0 0 1 106,111 Z" fill="#F2C14E"/>
  <path d="M99,124 L92,111 A15,15 0 0 1 106,111 Z" fill="#F2C14E" transform="rotate(120 99 124)"/>
  <path d="M99,124 L92,111 A15,15 0 0 1 106,111 Z" fill="#F2C14E" transform="rotate(240 99 124)"/>
  <!-- surface reading -->
  <line x1="156" y1="106" x2="216" y2="92" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="156,100 156,113 145,104" fill="#F2A33C"/>
  <text x="224" y="94" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">max dose rate at the surface (mrem/h)</text>
  <!-- TI at 1 m -->
  <line x1="156" y1="140" x2="306" y2="140" stroke="#9BC4FF" stroke-width="2" stroke-dasharray="7,5"/>
  <line x1="306" y1="130" x2="306" y2="150" stroke="#9BC4FF" stroke-width="2"/>
  <text x="231" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">1 m</text>
  <text x="318" y="145" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9BC4FF">max mrem/h at 1 m = transport index (TI),</text>
  <text x="318" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">rounded up to the next tenth</text>

  <!-- ===== band 2: three labels ===== -->
  <text x="36" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">2 &#183; ASSIGN THE LABEL</text>

  <!-- WHITE-I diamond -->
  <polygon points="140,212 192,264 140,316 88,264" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="140" cy="246" r="8" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="140" cy="246" r="2" fill="#0A2342"/>
  <path d="M140,246 L135,237 A10,10 0 0 1 145,237 Z" fill="#0A2342"/>
  <path d="M140,246 L135,237 A10,10 0 0 1 145,237 Z" fill="#0A2342" transform="rotate(120 140 246)"/>
  <path d="M140,246 L135,237 A10,10 0 0 1 145,237 Z" fill="#0A2342" transform="rotate(240 140 246)"/>
  <text x="140" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#D14343">I</text>
  <text x="140" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">WHITE-I</text>
  <text x="140" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">surface &#8804; 0.5 mrem/h</text>

  <!-- upgrade arrow 1 -->
  <text x="268" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">either limit over</text>
  <line x1="232" y1="270" x2="296" y2="270" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="296,264 308,270 296,276" fill="#F2A33C"/>

  <!-- YELLOW-II diamond -->
  <polygon points="400,212 452,264 348,264" fill="#F2C14E"/>
  <polygon points="348,264 452,264 400,316" fill="#E8F1FB"/>
  <polygon points="400,212 452,264 400,316 348,264" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="400" cy="246" r="8" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="400" cy="246" r="2" fill="#0A2342"/>
  <path d="M400,246 L395,237 A10,10 0 0 1 405,237 Z" fill="#0A2342"/>
  <path d="M400,246 L395,237 A10,10 0 0 1 405,237 Z" fill="#0A2342" transform="rotate(120 400 246)"/>
  <path d="M400,246 L395,237 A10,10 0 0 1 405,237 Z" fill="#0A2342" transform="rotate(240 400 246)"/>
  <text x="400" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#D14343">II</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">YELLOW-II</text>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TI &#8804; 1 and surface &#8804; 50 mrem/h</text>

  <!-- upgrade arrow 2 -->
  <text x="528" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F2A33C">either limit over</text>
  <line x1="492" y1="270" x2="556" y2="270" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="556,264 568,270 556,276" fill="#F2A33C"/>

  <!-- YELLOW-III diamond -->
  <polygon points="660,212 712,264 608,264" fill="#F2C14E"/>
  <polygon points="608,264 712,264 660,316" fill="#E8F1FB"/>
  <polygon points="660,212 712,264 660,316 608,264" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="660" cy="246" r="8" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="660" cy="246" r="2" fill="#0A2342"/>
  <path d="M660,246 L655,237 A10,10 0 0 1 665,237 Z" fill="#0A2342"/>
  <path d="M660,246 L655,237 A10,10 0 0 1 665,237 Z" fill="#0A2342" transform="rotate(120 660 246)"/>
  <path d="M660,246 L655,237 A10,10 0 0 1 665,237 Z" fill="#0A2342" transform="rotate(240 660 246)"/>
  <text x="660" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#D14343">III</text>
  <text x="660" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#E8F1FB">YELLOW-III</text>
  <text x="660" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">TI &#8804; 10 and surface &#8804; 200 mrem/h</text>

  <text x="400" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">duplicate labels on two opposite sides &#183; Yellow labels list radionuclide, activity, and TI</text>

  <!-- ===== band 3: placard the vehicle ===== -->
  <line x1="36" y1="400" x2="764" y2="400" stroke="#5A6B7E" stroke-width="1"/>
  <!-- truck -->
  <rect x="50" y="412" width="170" height="58" rx="4" fill="#1B82E8" fill-opacity="0.2" stroke="#9BC4FF" stroke-width="2"/>
  <path d="M220,430 L252,430 L266,448 L266,470 L220,470 Z" fill="#1B82E8" fill-opacity="0.2" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="95" cy="474" r="12" fill="#0A2342" stroke="#E8F1FB" stroke-width="2.5"/>
  <circle cx="243" cy="474" r="12" fill="#0A2342" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="40" y1="487" x2="290" y2="487" stroke="#5A6B7E" stroke-width="2"/>
  <!-- placard on box side -->
  <polygon points="135,418 158,441 135,464 112,441" fill="#F2C14E" stroke="#E8F1FB" stroke-width="1.5"/>
  <polygon points="112,441 158,441 135,464" fill="#E8F1FB"/>
  <circle cx="135" cy="434" r="5" fill="#0A2342"/>
  <text x="135" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">7</text>
  <!-- rule text -->
  <text x="310" y="428" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">3 &#183; Any YELLOW-III package aboard:</text>
  <text x="310" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#F2A33C">RADIOACTIVE placards on all four sides of the vehicle</text>
  <text x="310" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">49 CFR 172.504 &#8212; White-I or Yellow-II alone does not placard the vehicle</text>
</svg>
