<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">Gamma-Ray Exposure Device — Component Chain</text>

  <!-- ===== Device housing ===== -->
  <rect x="60" y="150" width="200" height="150" rx="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="3"/>
  <text x="160" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Shielded housing</text>

  <!-- DU shield -->
  <rect x="84" y="174" width="152" height="102" rx="8" fill="#9BC4FF"/>
  <text x="160" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Depleted-uranium</text>
  <text x="160" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">/ tungsten shield</text>

  <!-- S-tube channel through shield -->
  <path d="M120 270 Q120 210 160 210 Q200 210 200 240" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <!-- parked source -->
  <circle cx="120" cy="262" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <text x="118" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">Sealed source</text>
  <text x="118" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">(locked &amp; shielded)</text>
  <line x1="118" y1="312" x2="120" y2="274" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- Lock / source-stop -->
  <rect x="92" y="120" width="56" height="22" rx="4" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">LOCK</text>
  <line x1="120" y1="142" x2="120" y2="210" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="120" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">Lock + source-stop</text>

  <!-- ===== Outlet port (right side) ===== -->
  <rect x="260" y="222" width="34" height="36" fill="#0A2342"/>
  <text x="277" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">Outlet</text>
  <text x="277" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">+ connectors</text>
  <line x1="277" y1="282" x2="277" y2="260" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- ===== Guide tube to part ===== -->
  <rect x="294" y="232" width="300" height="16" rx="8" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- pigtail in guide tube -->
  <line x1="300" y1="240" x2="560" y2="240" stroke="#F2A33C" stroke-width="3" stroke-dasharray="2 6"/>
  <text x="430" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Guide (projection) tube</text>

  <!-- collimator + exposed source position -->
  <polygon points="588,224 624,232 624,248 588,256" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="600" cy="240" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <text x="616" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">Collimator +</text>
  <text x="616" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">exposure position</text>
  <line x1="612" y1="282" x2="606" y2="256" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- radiation from exposed source -->
  <line x1="612" y1="232" x2="640" y2="206" stroke="#F2A33C" stroke-width="2"/>
  <line x1="624" y1="240" x2="660" y2="240" stroke="#F2A33C" stroke-width="2"/>
  <line x1="612" y1="248" x2="640" y2="274" stroke="#F2A33C" stroke-width="2"/>

  <!-- part -->
  <rect x="664" y="214" width="20" height="52" fill="#9BC4FF" stroke="#0A2342" stroke-width="2"/>
  <text x="690" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Part</text>

  <!-- ===== Drive cable + crank (left, down) ===== -->
  <path d="M120 262 Q60 262 60 360 L150 360" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <circle cx="186" cy="360" r="30" fill="none" stroke="#0A2342" stroke-width="3"/>
  <circle cx="186" cy="360" r="5" fill="#0A2342"/>
  <line x1="186" y1="360" x2="186" y2="334" stroke="#0A2342" stroke-width="4"/>
  <circle cx="186" cy="332" r="5" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="250" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Drive (control) cable</text>
  <text x="250" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">+ crank-out assembly</text>

  <!-- bottom note -->
  <rect x="60" y="408" width="680" height="30" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Inspect the chain in order — lock, connectors, drive cable, guide tube, source-stop. Only as strong as its weakest link.</text>
</svg>
