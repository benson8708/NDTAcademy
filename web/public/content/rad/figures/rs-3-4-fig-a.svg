<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">How Your Career Dose Is Tracked</text>

  <!-- prior-dose inquiry -->
  <rect x="40" y="74" width="180" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="130" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">PRIOR DOSE</text>
  <text x="130" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">On hire, employer</text>
  <text x="130" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">requests dose from</text>
  <text x="130" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">past employers</text>
  <text x="130" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">(NRC Form 4)</text>

  <!-- arrow -->
  <line x1="222" y1="134" x2="246" y2="134" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="246,126 260,134 246,142" fill="#F2A33C"/>

  <!-- badge / dose of record -->
  <rect x="262" y="74" width="180" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="352" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">DOSE OF RECORD</text>
  <text x="352" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Processed badge</text>
  <text x="352" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">(film / TLD / OSL)</text>
  <text x="352" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">each monitoring</text>
  <text x="352" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">period</text>

  <!-- arrow -->
  <line x1="444" y1="134" x2="468" y2="134" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="468,126 482,134 468,142" fill="#F2A33C"/>

  <!-- lifetime ledger -->
  <rect x="484" y="74" width="276" height="120" rx="10" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="622" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">LIFETIME LEDGER</text>
  <text x="622" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">Cumulative occupational dose</text>
  <text x="622" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">summed across all employers</text>
  <text x="622" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D9E0E8">and all years</text>
  <text x="622" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">(NRC Form 5, kept for life)</text>

  <!-- running total bar chart -->
  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Annual dose adds to a running career total</text>

  <!-- baseline -->
  <line x1="80" y1="392" x2="730" y2="392" stroke="#5A6B7E" stroke-width="2"/>
  <text x="70" y="397" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">0</text>

  <!-- stacked bars (cumulative) -->
  <rect x="110" y="372" width="70" height="20" fill="#1B82E8"/>
  <text x="145" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">Yr 1</text>

  <rect x="220" y="350" width="70" height="42" fill="#1B82E8"/>
  <text x="255" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">Yr 2</text>

  <rect x="330" y="333" width="70" height="59" fill="#1B82E8"/>
  <text x="365" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">Yr 3</text>

  <rect x="440" y="312" width="70" height="80" fill="#1B82E8"/>
  <text x="475" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">Yr 4</text>

  <rect x="550" y="296" width="70" height="96" fill="#1B82E8"/>
  <text x="585" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D9E0E8">Yr 5</text>

  <!-- annual limit reference line -->
  <line x1="100" y1="266" x2="700" y2="266" stroke="#F2A33C" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="708" y="271" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#F2A33C">5 rem/yr ceiling</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">The career total never resets — each year's dose is permanent.</text>
</svg>
