<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Surveys Required by 10 CFR 34.49</text>

  <!-- survey sweep around the device (full circumference) -->
  <ellipse cx="287" cy="232" rx="140" ry="78" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="8,7"/>
  <polygon points="281,147 281,161 299,154" fill="#1E66F5"/>

  <!-- guide tube to exposure head -->
  <path d="M 362 232 C 470 232, 520 170, 640 152" fill="none" stroke="#9BC4FF" stroke-width="10" stroke-linecap="round"/>
  <!-- survey sweep along the full guide tube -->
  <path d="M 388 272 C 488 268, 566 214, 648 190" fill="none" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="8,7"/>
  <polygon points="642,182 646,198 662,186" fill="#1E66F5"/>

  <!-- crank / drive control -->
  <rect x="46" y="206" width="70" height="52" rx="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="81" cy="232" r="12" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="81" y1="232" x2="97" y2="218" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="81" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crank (drive control)</text>

  <!-- drive cable -->
  <line x1="116" y1="232" x2="212" y2="232" stroke="#0B1F3A" stroke-width="3"/>

  <!-- exposure device -->
  <rect x="212" y="200" width="150" height="64" rx="10" fill="#0B1F3A"/>
  <circle cx="287" cy="232" r="9" fill="#1E66F5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="287" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">exposure device</text>

  <!-- guide tube label (above tube) -->
  <text x="497" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">source guide tube</text>

  <!-- exposure head -->
  <rect x="640" y="130" width="56" height="44" rx="4" fill="#0B1F3A"/>
  <text x="668" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">exposure head / collimator</text>

  <!-- sweep label -->
  <text x="420" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">survey sweep — entire device and full guide-tube length</text>

  <!-- survey meter -->
  <rect x="660" y="298" width="60" height="40" rx="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M 670 330 Q 690 304 710 330" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <line x1="690" y1="330" x2="702" y2="312" stroke="#0B1F3A" stroke-width="2"/>
  <text x="780" y="362" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">calibrated &amp; operable meter (§34.25)</text>

  <!-- the three required surveys -->
  <rect x="24" y="394" width="240" height="92" rx="10" fill="#9BC4FF" fill-opacity="0.2" stroke="#1E66F5" stroke-width="2"/>
  <text x="144" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1 · AFTER EACH EXPOSURE</text>
  <text x="144" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Device and guide tube, while</text>
  <text x="144" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">approaching — source shielded</text>
  <text x="144" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">before film change or teardown</text>

  <rect x="280" y="394" width="240" height="92" rx="10" fill="#9BC4FF" fill-opacity="0.2" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2 · AT SOURCE EXCHANGE</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Survey the exposure device</text>
  <text x="400" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">any time the sealed source</text>
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">is exchanged — §34.49(c)</text>

  <rect x="536" y="394" width="240" height="92" rx="10" fill="#9BC4FF" fill-opacity="0.2" stroke="#1E66F5" stroke-width="2"/>
  <text x="656" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3 · INTO STORAGE</text>
  <text x="656" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Survey whenever the device</text>
  <text x="656" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">enters a storage area — last of</text>
  <text x="656" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">the workday: record, 3 years</text>
</svg>
