<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#0B1F3A"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Radiographer Qualification Pathway — 10 CFR 34.43</text>

  <!-- Layer 1 box -->
  <rect x="22" y="70" width="236" height="250" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <rect x="22" y="70" width="236" height="36" fill="#1E66F5"/>
  <text x="140" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">LAYER 1 — CERTIFICATION</text>
  <text x="36" y="134" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Formal radiation safety</text>
  <text x="36" y="152" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">course (40-hr benchmark)</text>
  <text x="36" y="180" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Documented on-the-job</text>
  <text x="36" y="198" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">training + employer sign-off</text>
  <text x="36" y="226" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Written exam — ASNT IRRSP</text>
  <text x="36" y="244" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">or Agreement State program</text>
  <text x="36" y="272" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Certification valid 3–5 years</text>
  <text x="36" y="290" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">(IRRSP cards: 5 years)</text>

  <!-- arrow 1 -->
  <line x1="260" y1="195" x2="274" y2="195" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="274,189 282,195 274,201" fill="#9BC4FF"/>

  <!-- Layer 2 box -->
  <rect x="282" y="70" width="236" height="250" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <rect x="282" y="70" width="236" height="36" fill="#1E66F5"/>
  <text x="400" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">LAYER 2 — YOUR EMPLOYER</text>
  <text x="296" y="134" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Copies + instruction:</text>
  <text x="296" y="152" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Parts 19, 20, 34 · DOT ·</text>
  <text x="296" y="170" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">license + O&amp;E procedures</text>
  <text x="296" y="198" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Written OR oral exam on the</text>
  <text x="296" y="216" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">license and procedures</text>
  <text x="296" y="244" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Equipment training + hands-on</text>
  <text x="296" y="262" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">practical: devices, daily</text>
  <text x="296" y="280" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">inspection, survey meters</text>

  <!-- arrow 2 -->
  <line x1="520" y1="195" x2="534" y2="195" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="534,189 542,195 534,201" fill="#9BC4FF"/>

  <!-- Qualified box -->
  <rect x="542" y="70" width="236" height="250" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <rect x="542" y="70" width="236" height="36" fill="#9BC4FF"/>
  <text x="660" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">QUALIFIED RADIOGRAPHER</text>
  <text x="556" y="134" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Performs radiography under</text>
  <text x="556" y="152" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">the employer's license</text>
  <text x="556" y="180" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Supervises radiographer's</text>
  <text x="556" y="198" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">assistants (10 CFR 34.46)</text>
  <text x="556" y="226" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Personally accountable to</text>
  <text x="556" y="244" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">the regulator for compliance</text>

  <!-- arrow into maintenance band -->
  <line x1="660" y1="322" x2="660" y2="336" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="654,336 660,344 666,336" fill="#9BC4FF"/>

  <!-- Layer 3 maintenance band -->
  <rect x="22" y="346" width="756" height="96" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9BC4FF">LAYER 3 — STAYING QUALIFIED</text>
  <text x="148" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Refresher safety training</text>
  <text x="148" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">≤ every 12 months</text>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Performance audit during an actual</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">operation ≤ every 6 months</text>
  <text x="652" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">Training, test, and audit</text>
  <text x="652" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">records kept 3 years</text>

  <!-- footnote -->
  <text x="400" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Idle over 6 months since the last audit: performance is observed and recorded on the next job — §34.43(d)(2)</text>
</svg>
