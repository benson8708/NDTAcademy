<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">One Job Site, Two Federal Agencies</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">The hazard decides the regulator — never doubled, never unregulated</text>

  <!-- NRC / Agreement State panel -->
  <rect x="40" y="78" width="345" height="252" rx="8" fill="#E8F1FB" stroke="#1E66F5" stroke-width="2"/>
  <text x="212" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">NRC / Agreement State</text>
  <text x="212" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">radiological hazard of licensed material</text>
  <text x="58" y="158" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• 10 CFR 20 dose limits &amp; ALARA</text>
  <text x="58" y="184" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Part 34 equipment &amp; field rules</text>
  <text x="58" y="210" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Surveys, dosimetry, records</text>
  <text x="58" y="236" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Operating &amp; emergency procedures</text>
  <text x="58" y="262" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Source security — 10 CFR Part 37</text>
  <text x="58" y="288" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• License conditions &amp; amendments</text>

  <!-- OSHA panel -->
  <rect x="415" y="78" width="345" height="252" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="588" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">OSHA — Dept. of Labor</text>
  <text x="588" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">the workplace around the source</text>
  <text x="433" y="158" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Falls, ladders, scaffolds</text>
  <text x="433" y="184" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Confined spaces — 1910.146</text>
  <text x="433" y="210" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Electrical, PPE, noise, heat</text>
  <text x="433" y="236" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• HazCom 1910.1200 — chemicals</text>
  <text x="433" y="262" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Machine X-ray dose — 1910.1096</text>
  <text x="433" y="288" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">• Old quarterly limits (1.25 rem/qtr)</text>

  <!-- arrows into bridge -->
  <line x1="212" y1="330" x2="320" y2="362" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="328,366 314,364 319,353" fill="#9BC4FF"/>
  <line x1="588" y1="330" x2="480" y2="362" stroke="#9BC4FF" stroke-width="3"/>
  <polygon points="472,366 486,364 481,353" fill="#9BC4FF"/>

  <!-- deemed compliance bridge -->
  <rect x="110" y="368" width="580" height="76" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Deemed compliance — 29 CFR 1910.1096(p)</text>
  <text x="400" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Possess and use licensed material per 10 CFR 20 (or the Agreement State</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">equivalent) and OSHA's radiation rule is satisfied for that material.</text>

  <!-- boundary note -->
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">OSH Act §4(b)(1): OSHA stands down where the NRC exercises authority —</text>
  <text x="400" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">the boundary drawn by the 1988 NRC–OSHA memorandum of understanding</text>
</svg>
