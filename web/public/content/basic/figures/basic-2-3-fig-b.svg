<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">ET Sensors: Coil Geometries and Circuit Arrangements</text>

  <!-- Panel 1: surface probe -->
  <text x="150" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Surface (pancake) probe</text>
  <rect x="116" y="92" width="68" height="70" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="150" cy="106" rx="24" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="150" cy="120" rx="24" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="150" cy="134" rx="24" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="150" cy="148" rx="24" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <line x1="196" y1="162" x2="196" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="190" y1="162" x2="202" y2="162" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="190" y1="176" x2="202" y2="176" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="208" y="173" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lift-off</text>
  <rect x="40" y="176" width="220" height="64" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="150" cy="188" rx="18" ry="4" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <ellipse cx="150" cy="188" rx="32" ry="7" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="150" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">axis normal to the surface</text>
  <text x="150" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">plates, machined parts, welds</text>

  <!-- Panel 2: bobbin probe -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Bobbin (ID) probe</text>
  <rect x="300" y="100" width="200" height="24" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="300" y="196" width="200" height="24" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="306" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">tube wall</text>
  <line x1="300" y1="160" x2="500" y2="160" stroke="#9BC4FF" stroke-width="1" stroke-dasharray="8,6"/>
  <rect x="362" y="138" width="56" height="44" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="370" y="142" width="10" height="36" fill="#1E66F5"/>
  <rect x="400" y="142" width="10" height="36" fill="#1E66F5"/>
  <line x1="418" y1="160" x2="496" y2="160" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">travels inside tubing</text>
  <text x="400" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">currents flow circumferentially</text>

  <!-- Panel 3: encircling coil -->
  <text x="650" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Encircling (OD) coil</text>
  <line x1="552" y1="132" x2="606" y2="132" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="606,126 618,132 606,138" fill="#0B1F3A"/>
  <text x="560" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">feed</text>
  <rect x="540" y="146" width="220" height="44" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="658" cy="168" rx="16" ry="36" fill="none" stroke="#1E66F5" stroke-width="4"/>
  <ellipse cx="658" cy="168" rx="24" ry="44" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="650" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">surrounds bar, wire, or tube</text>
  <text x="650" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">full circumference at line speed</text>

  <!-- divider -->
  <line x1="60" y1="300" x2="740" y2="300" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- Panel 4: absolute -->
  <text x="220" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Absolute — one coil</text>
  <line x1="152" y1="346" x2="152" y2="336" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="168" y1="346" x2="168" y2="336" stroke="#0B1F3A" stroke-width="1.5"/>
  <ellipse cx="160" cy="352" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="160" cy="366" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="160" cy="380" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <rect x="90" y="394" width="260" height="42" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="240" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">reads every variable —</text>
  <text x="240" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">gradual drift included</text>
  <text x="220" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">conductivity sorting, gauging; prone to drift</text>

  <!-- Panel 5: differential -->
  <text x="580" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">Differential — two opposed coils</text>
  <polyline points="520,346 520,336 570,328 620,336 620,346" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="504" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">+</text>
  <text x="636" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">−</text>
  <ellipse cx="520" cy="352" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="520" cy="366" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="520" cy="380" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="620" cy="352" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="620" cy="366" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="620" cy="380" rx="22" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <rect x="450" y="394" width="260" height="42" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="614,394 626,394 620,410" fill="#D14343"/>
  <text x="634" y="412" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">flaw</text>
  <text x="580" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">shared conditions cancel — the flaw unbalances the pair</text>
</svg>
