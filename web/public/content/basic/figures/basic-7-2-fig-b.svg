<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Inspection Access Points on Common Components</text>

  <!-- ================= PRESSURE VESSEL ================= -->
  <text x="150" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Pressure vessel</text>

  <!-- manway label and leader -->
  <text x="40" y="92" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">manway — enter for direct VT</text>
  <line x1="108" y1="97" x2="118" y2="112" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- nozzle label and leader -->
  <text x="262" y="110" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">nozzle — borescope</text>
  <line x1="226" y1="114" x2="206" y2="122" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- shell -->
  <rect x="60" y="130" width="180" height="85" rx="42" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <!-- manway stub -->
  <rect x="106" y="106" width="32" height="28" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="100" y="100" width="44" height="8" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- small nozzle stub -->
  <rect x="190" y="116" width="16" height="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="186" y="112" width="24" height="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- borescope sweep inside -->
  <path d="M 198 136 Q 198 175 158 200" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="158,200 168,194 166,204" fill="#1E66F5"/>
  <!-- corrosion dots along inner bottom -->
  <circle cx="98" cy="203" r="2.5" fill="#D14343"/>
  <circle cx="116" cy="206" r="2.5" fill="#D14343"/>
  <circle cx="134" cy="204" r="2.5" fill="#D14343"/>
  <circle cx="152" cy="207" r="2.5" fill="#D14343"/>
  <circle cx="172" cy="205" r="2.5" fill="#D14343"/>
  <circle cx="192" cy="203" r="2.5" fill="#D14343"/>
  <line x1="150" y1="212" x2="150" y2="234" stroke="#D14343" stroke-width="1.5"/>
  <text x="150" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">corrosion and pitting low in the shell</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">seams, nozzles, supports walked outside</text>

  <!-- ================= GLOBE VALVE ================= -->
  <text x="410" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Globe valve</text>

  <!-- bonnet removed (dashed) -->
  <rect x="386" y="92" width="48" height="24" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="410" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">bonnet off — stem, disc, seat</text>

  <!-- stem and disc -->
  <line x1="410" y1="118" x2="410" y2="158" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="396" y="158" width="28" height="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- body and line -->
  <rect x="320" y="172" width="180" height="36" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="410" cy="190" r="40" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <!-- seat ring -->
  <rect x="397" y="180" width="26" height="6" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- wire drawing squiggle on seat -->
  <path d="M 399 183 q 4 -5 8 0 q 4 5 8 0 q 3 -4 6 0" fill="none" stroke="#D14343" stroke-width="2"/>

  <!-- line port borescope arrow -->
  <line x1="300" y1="190" x2="338" y2="190" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="348,190 336,184 336,196" fill="#1E66F5"/>
  <text x="410" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">line port — borescope to the seat in place</text>
  <line x1="410" y1="195" x2="410" y2="226" stroke="#D14343" stroke-width="1.5"/>
  <text x="410" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">wire drawing across seating surfaces</text>

  <!-- ================= CENTRIFUGAL PUMP ================= -->
  <text x="660" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Centrifugal pump</text>

  <!-- discharge stub -->
  <rect x="657" y="104" width="30" height="26" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="700" y="116" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">discharge</text>

  <!-- casing -->
  <circle cx="672" cy="182" r="52" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <!-- suction nozzle -->
  <rect x="560" y="170" width="62" height="24" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- impeller -->
  <circle cx="672" cy="182" r="25" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="672" cy="182" r="4" fill="#0B1F3A"/>
  <path d="M 672 162 q 12 8 8 20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 690 188 q -10 10 -22 6" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 656 170 q -4 14 8 22" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <!-- cavitation pitting at vane inlets -->
  <circle cx="664" cy="168" r="2.5" fill="#D14343"/>
  <circle cx="684" cy="178" r="2.5" fill="#D14343"/>
  <circle cx="664" cy="194" r="2.5" fill="#D14343"/>

  <!-- borescope through suction -->
  <line x1="548" y1="182" x2="640" y2="182" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="650,182 638,176 638,188" fill="#1E66F5"/>
  <text x="660" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">suction port — borescope to the impeller eye</text>
  <line x1="688" y1="200" x2="700" y2="236" stroke="#D14343" stroke-width="1.5"/>
  <text x="668" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">cavitation pitting at vane inlets</text>

  <!-- ================= LEGEND / RULE ================= -->
  <rect x="90" y="330" width="620" height="78" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="120" cy="352" r="4" fill="#D14343"/>
  <text x="134" y="357" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">red — the damage zone the examination must reach</text>
  <line x1="112" y1="380" x2="130" y2="380" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="134" y="385" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">blue — the access route: direct entry where the body fits, a borescope where only the probe does</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-style="italic" fill="#5A6B7E">Whatever the route, the view must meet direct-VT resolution and lighting — or the technique is not valid.</text>
</svg>
