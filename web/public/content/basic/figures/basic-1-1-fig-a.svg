<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Guidelines to a Binding Program</text>

  <!-- Box 1: SNT-TC-1A -->
  <rect x="30" y="100" width="220" height="200" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="30" y="100" width="220" height="48" rx="8" fill="#0A2342"/>
  <text x="140" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">SNT-TC-1A</text>
  <text x="140" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Recommended practice</text>
  <text x="44" y="176" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Guidelines: "should"</text>
  <text x="44" y="202" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Suggested training,</text>
  <text x="44" y="222" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">experience, exam tables</text>
  <text x="44" y="248" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">No force by itself</text>

  <!-- Arrow 1 -->
  <line x1="252" y1="200" x2="286" y2="200" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="286,192 302,200 286,208" fill="#1B82E8"/>
  <text x="277" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">tailor +</text>
  <text x="277" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">document</text>

  <!-- Box 2: Written Practice -->
  <rect x="304" y="100" width="220" height="200" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <rect x="304" y="100" width="220" height="48" rx="8" fill="#1B82E8"/>
  <text x="414" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">WRITTEN PRACTICE</text>
  <text x="414" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Employer's document</text>
  <text x="318" y="176" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Controlled procedure</text>
  <text x="318" y="202" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Levels, methods, exams,</text>
  <text x="318" y="222" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">vision, recertification</text>
  <text x="318" y="248" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Modifications justified</text>
  <text x="318" y="268" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and documented</text>

  <!-- Arrow 2 -->
  <line x1="526" y1="200" x2="560" y2="200" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="560,192 576,200 560,208" fill="#1B82E8"/>
  <text x="551" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">invoke +</text>
  <text x="551" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">audit</text>

  <!-- Box 3: Binding Program -->
  <rect x="578" y="100" width="192" height="200" rx="8" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="3"/>
  <rect x="578" y="100" width="192" height="48" rx="8" fill="#1E9E6A"/>
  <text x="674" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">BINDING</text>
  <text x="674" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">company program</text>
  <text x="592" y="176" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Invoked by contract,</text>
  <text x="592" y="196" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">code, or PO</text>
  <text x="592" y="222" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Basis of every</text>
  <text x="592" y="242" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">certification issued</text>
  <text x="592" y="268" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Audited as written</text>

  <!-- Bottom emphasis bar -->
  <rect x="60" y="345" width="680" height="58" rx="8" fill="#F2A33C"/>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Auditors grade the program against the WRITTEN PRACTICE,</text>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">not against the book.</text>
</svg>
