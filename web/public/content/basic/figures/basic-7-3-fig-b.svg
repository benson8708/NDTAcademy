<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Conditions of a Valid Direct Visual Examination</text>
  <line x1="400" y1="66" x2="400" y2="380" stroke="#D7DEE8" stroke-width="2"/>

  <!-- Left panel: viewing geometry -->
  <text x="210" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Viewing geometry</text>
  <rect x="40" y="340" width="330" height="20" fill="#C9D4E0" stroke="#0A2342" stroke-width="2"/>
  <text x="205" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">examination surface</text>

  <ellipse cx="105" cy="160" rx="28" ry="15" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="105" cy="160" r="7" fill="#0A2342"/>
  <line x1="126" y1="172" x2="290" y2="340" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="118" y="250" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">&#8804; 24 in.</text>
  <text x="118" y="270" font-family="Arial, sans-serif" font-size="14" fill="#1B82E8">(600 mm)</text>

  <path d="M 240 340 A 50 50 0 0 1 255 304" fill="none" stroke="#C0392B" stroke-width="2.5"/>
  <text x="206" y="322" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#C0392B">&#8805; 30&#176;</text>

  <text x="205" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0A2342">Can't reach 24 in. at 30&#176;? Mirrors fix the angle;</text>
  <text x="205" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0A2342">borescopes must resolve as well as the eye.</text>

  <!-- Right panel: illumination -->
  <text x="600" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Illumination</text>
  <rect x="430" y="340" width="330" height="20" fill="#C9D4E0" stroke="#0A2342" stroke-width="2"/>
  <path d="M 545 340 Q 565 356 585 340 Z" fill="#8FA1B5" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M 565 340 Q 572 351 585 340 Z" fill="#0A2342"/>

  <rect x="434" y="300" width="46" height="22" rx="6" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="457" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">low-angle beam</text>
  <line x1="480" y1="305" x2="548" y2="334" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="480" y1="311" x2="560" y2="338" stroke="#F2A33C" stroke-width="2.5"/>
  <line x1="480" y1="317" x2="540" y2="339" stroke="#F2A33C" stroke-width="2.5"/>

  <text x="660" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">grazing light makes a shallow</text>
  <text x="660" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">dent cast a visible shadow</text>
  <line x1="640" y1="274" x2="580" y2="334" stroke="#9AA7B5" stroke-width="1.5" stroke-dasharray="4 4"/>

  <rect x="665" y="312" width="80" height="28" rx="5" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="705" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0A2342">100 fc</text>
  <text x="705" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0A2342">(&#8776; 1,000 lux)</text>

  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">minimum verified at the surface with a calibrated meter</text>
  <text x="600" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0A2342">Diffuse light kills glare on shiny surfaces;</text>
  <text x="600" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0A2342">directional light reveals relief — use both deliberately.</text>
</svg>
