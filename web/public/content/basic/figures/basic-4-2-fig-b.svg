<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Read the Buildup: Relevant, Nonrelevant, or False</text>

  <!-- ============ Panel 1: relevant surface crack ============ -->
  <rect x="18" y="54" width="374" height="206" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="18" y="54" width="374" height="32" rx="8" fill="#0B1F3A"/>
  <text x="205" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">RELEVANT — open surface crack</text>

  <rect x="40" y="104" width="330" height="86" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="70,148 110,140 150,152 190,142 230,150 270,141 310,149 340,146" stroke="#0B1F3A" stroke-width="4" fill="none"/>
  <circle cx="90" cy="141" r="3" fill="#0B1F3A"/>
  <circle cx="130" cy="146" r="3" fill="#0B1F3A"/>
  <circle cx="170" cy="146" r="3" fill="#0B1F3A"/>
  <circle cx="210" cy="144" r="3" fill="#0B1F3A"/>
  <circle cx="250" cy="144" r="3" fill="#0B1F3A"/>
  <circle cx="290" cy="143" r="3" fill="#0B1F3A"/>
  <circle cx="325" cy="146" r="3" fill="#0B1F3A"/>
  <circle cx="110" cy="135" r="3" fill="#0B1F3A"/>
  <circle cx="230" cy="155" r="3" fill="#0B1F3A"/>
  <circle cx="190" cy="137" r="3" fill="#0B1F3A"/>

  <text x="205" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Sharp, tight, strongly held line along the crack.</text>
  <text x="205" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">The closer to the surface, the crisper the print.</text>

  <!-- ============ Panel 2: relevant near-surface ============ -->
  <rect x="408" y="54" width="374" height="206" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="408" y="54" width="374" height="32" rx="8" fill="#0B1F3A"/>
  <text x="595" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">RELEVANT — near-surface discontinuity</text>

  <rect x="430" y="104" width="330" height="86" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="595" cy="162" rx="36" ry="11" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 4"/>
  <ellipse cx="595" cy="100" rx="54" ry="8" fill="#9BC4FF"/>
  <circle cx="552" cy="99" r="2.5" fill="#0B1F3A"/>
  <circle cx="563" cy="95" r="2.5" fill="#0B1F3A"/>
  <circle cx="572" cy="102" r="2.5" fill="#0B1F3A"/>
  <circle cx="581" cy="96" r="2.5" fill="#0B1F3A"/>
  <circle cx="590" cy="101" r="2.5" fill="#0B1F3A"/>
  <circle cx="598" cy="94" r="2.5" fill="#0B1F3A"/>
  <circle cx="606" cy="100" r="2.5" fill="#0B1F3A"/>
  <circle cx="615" cy="96" r="2.5" fill="#0B1F3A"/>
  <circle cx="624" cy="101" r="2.5" fill="#0B1F3A"/>
  <circle cx="634" cy="97" r="2.5" fill="#0B1F3A"/>
  <circle cx="586" cy="106" r="2.5" fill="#0B1F3A"/>
  <circle cx="604" cy="106" r="2.5" fill="#0B1F3A"/>
  <text x="595" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">subsurface void</text>

  <text x="595" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Broad, fuzzy, weakly held buildup — and it</text>
  <text x="595" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">re-forms in place on retest. Still relevant.</text>

  <!-- ============ Panel 3: nonrelevant geometry ============ -->
  <rect x="18" y="274" width="374" height="206" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="18" y="274" width="374" height="32" rx="8" fill="#0B1F3A"/>
  <text x="205" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">NONRELEVANT — section change</text>

  <rect x="40" y="330" width="150" height="80" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="190" y="350" width="150" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 194 346 Q 206 332 218 346" stroke="#1E66F5" stroke-width="2" fill="none" stroke-dasharray="5 4"/>
  <path d="M 194 394 Q 206 408 218 394" stroke="#1E66F5" stroke-width="2" fill="none" stroke-dasharray="5 4"/>
  <circle cx="192" cy="336" r="2.5" fill="#0B1F3A"/>
  <circle cx="192" cy="344" r="2.5" fill="#0B1F3A"/>
  <circle cx="197" cy="350" r="2.5" fill="#0B1F3A"/>
  <circle cx="204" cy="349" r="2.5" fill="#0B1F3A"/>
  <circle cx="192" cy="396" r="2.5" fill="#0B1F3A"/>
  <circle cx="192" cy="404" r="2.5" fill="#0B1F3A"/>
  <circle cx="197" cy="390" r="2.5" fill="#0B1F3A"/>
  <circle cx="204" cy="391" r="2.5" fill="#0B1F3A"/>
  <text x="265" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">flux leaks at the shoulder</text>

  <text x="205" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Uniform band exactly at the shoulder, symmetric,</text>
  <text x="205" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">repeatable. Real field, geometric cause — not a flaw.</text>

  <!-- ============ Panel 4: false mechanical ============ -->
  <rect x="408" y="274" width="374" height="206" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="408" y="274" width="374" height="32" rx="8" fill="#0B1F3A"/>
  <text x="595" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">FALSE — mechanical holding</text>

  <polygon points="430,344 452,332 472,346 494,334 514,348 536,336 558,346 580,333 602,347 624,335 646,346 668,334 690,348 712,336 734,346 760,340 760,410 430,410" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="470" cy="342" r="2.5" fill="#0B1F3A"/>
  <circle cx="476" cy="344" r="2.5" fill="#0B1F3A"/>
  <circle cx="472" cy="348" r="2.5" fill="#0B1F3A"/>
  <circle cx="480" cy="340" r="2.5" fill="#0B1F3A"/>
  <circle cx="598" cy="343" r="2.5" fill="#0B1F3A"/>
  <circle cx="606" cy="345" r="2.5" fill="#0B1F3A"/>
  <circle cx="601" cy="349" r="2.5" fill="#0B1F3A"/>
  <circle cx="692" cy="344" r="2.5" fill="#0B1F3A"/>
  <circle cx="698" cy="347" r="2.5" fill="#0B1F3A"/>
  <circle cx="695" cy="351" r="2.5" fill="#0B1F3A"/>
  <circle cx="688" cy="349" r="2.5" fill="#0B1F3A"/>
  <text x="595" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">powder trapped in pits and valleys</text>

  <text x="595" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Random patches in roughness, scale, or depressions.</text>
  <text x="595" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Wipes away and does not re-form — improve the prep.</text>
</svg>
