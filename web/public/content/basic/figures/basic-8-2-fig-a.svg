<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Discontinuity Origin Timeline</text>
  <text x="746" y="58" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">manufacturing → service time</text>

  <!-- timeline spine -->
  <line x1="40" y1="70" x2="746" y2="70" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="746,64 760,70 746,76" fill="#0B1F3A"/>
  <line x1="132" y1="70" x2="132" y2="86" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="316" y1="70" x2="316" y2="86" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="500" y1="70" x2="500" y2="86" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="684" y1="70" x2="684" y2="86" stroke="#0B1F3A" stroke-width="2"/>

  <!-- column 1: inherent -->
  <rect x="48" y="86" width="168" height="44" rx="6" fill="#0B1F3A"/>
  <text x="132" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">INHERENT</text>
  <text x="132" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9BC4FF">melt and solidification</text>
  <rect x="48" y="130" width="168" height="190" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="58" y="152" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Pipe (ingot shrinkage)</text>
  <text x="58" y="171" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Blowholes, gas porosity</text>
  <text x="58" y="190" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Nonmetallic inclusions</text>
  <text x="58" y="209" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Segregation</text>
  <text x="58" y="234" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Cast to shape: gas pores,</text>
  <text x="58" y="253" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">shrinkage, hot tears,</text>
  <text x="58" y="272" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">cold shuts, inclusions</text>

  <!-- column 2: primary processing -->
  <rect x="232" y="86" width="168" height="44" rx="6" fill="#0B1F3A"/>
  <text x="316" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">PRIMARY PROCESSING</text>
  <text x="316" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9BC4FF">rolling, forging, drawing, welding</text>
  <rect x="232" y="130" width="168" height="190" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="242" y="152" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Laminations (plate)</text>
  <text x="242" y="171" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Seams, stringers (bar)</text>
  <text x="242" y="190" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Forging laps and bursts</text>
  <text x="242" y="209" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Drawn-bar central bursts</text>
  <text x="242" y="234" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Welds: porosity, slag,</text>
  <text x="242" y="253" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">incomplete fusion and</text>
  <text x="242" y="272" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">penetration, cracks</text>

  <!-- column 3: secondary processing -->
  <rect x="416" y="86" width="168" height="44" rx="6" fill="#0B1F3A"/>
  <text x="500" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#FFFFFF">SECONDARY PROCESSING</text>
  <text x="500" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9BC4FF">machining, heat treat, plating</text>
  <rect x="416" y="130" width="168" height="190" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="426" y="152" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Machining tears</text>
  <text x="426" y="171" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Grinding cracks</text>
  <text x="426" y="190" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Quench cracks</text>
  <text x="426" y="215" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Pickling and plating:</text>
  <text x="426" y="234" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">hydrogen embrittlement</text>
  <text x="426" y="259" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Plating cracks</text>

  <!-- column 4: service -->
  <rect x="600" y="86" width="168" height="44" rx="6" fill="#0B1F3A"/>
  <text x="684" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">SERVICE</text>
  <text x="684" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9BC4FF">operation and environment</text>
  <rect x="600" y="130" width="168" height="190" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="610" y="152" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Fatigue cracks</text>
  <text x="610" y="171" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Corrosion, pitting,</text>
  <text x="610" y="190" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">exfoliation</text>
  <text x="610" y="209" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Stress-corrosion cracking</text>
  <text x="610" y="228" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Creep at temperature</text>
  <text x="610" y="247" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Wear, erosion, fretting</text>

  <!-- transformation note -->
  <line x1="135" y1="340" x2="300" y2="340" stroke="#D14343" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="300,335 312,340 300,345" fill="#D14343"/>
  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#D14343">Working renames the inherent set: pipe → lamination · blowhole → seam · inclusion → stringer</text>

  <!-- takeaway bar -->
  <rect x="90" y="392" width="620" height="48" rx="8" fill="#0B1F3A"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">A discontinuity's origin stage predicts its location, orientation,</text>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">and character — the three things that select method and technique.</text>
</svg>
