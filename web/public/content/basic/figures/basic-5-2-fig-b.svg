<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Radiographic Signatures — Castings (top) and Welds (bottom)</text>

  <!-- casting plate radiograph -->
  <rect x="50" y="46" width="700" height="130" rx="6" fill="#39414A" stroke="#0B1F3A" stroke-width="2"/>

  <!-- gas porosity: round, sharply defined dark spots -->
  <circle cx="118" cy="105" r="6" fill="#14181C"/>
  <circle cx="134" cy="96" r="4.5" fill="#14181C"/>
  <circle cx="146" cy="112" r="5.5" fill="#14181C"/>
  <circle cx="128" cy="120" r="4" fill="#14181C"/>
  <circle cx="152" cy="98" r="3.5" fill="#14181C"/>

  <!-- sponge shrinkage: fuzzy mottled patch -->
  <ellipse cx="285" cy="100" rx="9" ry="5" fill="#14181C" opacity="0.5"/>
  <ellipse cx="300" cy="112" rx="11" ry="6" fill="#14181C" opacity="0.4"/>
  <ellipse cx="318" cy="98" rx="8" ry="5" fill="#14181C" opacity="0.55"/>
  <ellipse cx="330" cy="114" rx="10" ry="5" fill="#14181C" opacity="0.45"/>
  <ellipse cx="296" cy="126" rx="8" ry="4" fill="#14181C" opacity="0.5"/>
  <ellipse cx="316" cy="124" rx="7" ry="4" fill="#14181C" opacity="0.6"/>
  <ellipse cx="306" cy="104" rx="6" ry="4" fill="#14181C" opacity="0.7"/>

  <!-- hot tear: ragged, branched dark line -->
  <polyline points="440,92 452,104 448,114 462,118 458,128 472,132" fill="none" stroke="#14181C" stroke-width="2.8" stroke-linejoin="round"/>
  <polyline points="462,118 474,110 484,112" fill="none" stroke="#14181C" stroke-width="2" stroke-linejoin="round"/>

  <!-- cold shut: smooth continuous curving line -->
  <path d="M 590 96 Q 622 110 648 102 Q 672 96 692 108" fill="none" stroke="#14181C" stroke-width="3" stroke-linecap="round"/>

  <!-- casting labels -->
  <line x1="132" y1="176" x2="132" y2="188" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="132" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">gas porosity — round, dark</text>
  <line x1="460" y1="176" x2="460" y2="188" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="460" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">hot tear — ragged, branched</text>
  <line x1="306" y1="176" x2="306" y2="206" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="306" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">sponge shrinkage — fuzzy mottle</text>
  <line x1="640" y1="176" x2="640" y2="206" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="640" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">cold shut — smooth, rounded ends</text>

  <!-- weld radiograph: plate with lighter reinforcement band -->
  <rect x="50" y="236" width="700" height="120" rx="6" fill="#39414A" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="52" y="272" width="696" height="44" fill="#5E6A75"/>

  <!-- porosity -->
  <circle cx="124" cy="292" r="4.5" fill="#14181C"/>
  <circle cx="136" cy="286" r="3.5" fill="#14181C"/>
  <circle cx="146" cy="296" r="4" fill="#14181C"/>
  <circle cx="132" cy="300" r="3" fill="#14181C"/>

  <!-- slag: irregular elongated shapes off the centerline -->
  <ellipse cx="238" cy="282" rx="13" ry="4.5" fill="#1A1F24"/>
  <ellipse cx="262" cy="279" rx="9" ry="4" fill="#1A1F24"/>
  <ellipse cx="283" cy="284" rx="11" ry="4" fill="#1A1F24"/>

  <!-- incomplete penetration: straight dark line on centerline -->
  <line x1="350" y1="296" x2="460" y2="296" stroke="#14181C" stroke-width="4"/>

  <!-- crack: fine wandering faint line -->
  <polyline points="520,296 528,290 538,298 546,291 556,297 564,292 574,298 584,293" fill="none" stroke="#14181C" stroke-width="1.4" opacity="0.9"/>

  <!-- tungsten inclusion: bright spot -->
  <circle cx="655" cy="294" r="7" fill="#F4F7F9" opacity="0.3"/>
  <circle cx="655" cy="294" r="4.5" fill="#F4F7F9"/>

  <!-- weld labels -->
  <line x1="134" y1="356" x2="134" y2="366" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="134" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">porosity</text>
  <line x1="405" y1="356" x2="405" y2="366" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="405" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">incomplete penetration — straight, on centerline</text>
  <line x1="668" y1="356" x2="668" y2="366" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="668" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">tungsten — bright</text>
  <line x1="252" y1="356" x2="252" y2="386" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="252" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">slag — irregular, off the centerline</text>
  <line x1="552" y1="356" x2="552" y2="386" stroke="#0B1F3A" stroke-width="1" opacity="0.55"/>
  <text x="552" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">crack — fine, wandering, faint</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">darker = missing metal (void) · lighter = extra metal or higher-Z inclusion</text>
</svg>
