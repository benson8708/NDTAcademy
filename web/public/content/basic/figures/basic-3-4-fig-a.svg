<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Reading Penetrant Indication Morphology</text>

  <!-- Card 1: Crack / hot tear -->
  <rect x="24" y="62" width="240" height="173" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="24" y="62" width="240" height="32" rx="8" fill="#0B1F3A"/>
  <rect x="24" y="78" width="240" height="16" fill="#0B1F3A"/>
  <text x="144" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">CRACK / HOT TEAR</text>
  <polyline points="44,150 62,132 80,152 98,136 118,154 140,130 162,150 184,134 206,152 226,138 244,148" fill="none" stroke="#D14343" stroke-width="3.5" stroke-linejoin="round"/>
  <text x="144" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Continuous, jagged line —</text>
  <text x="144" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">strong bleed-out</text>

  <!-- Card 2: Cold shut -->
  <rect x="280" y="62" width="240" height="173" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="280" y="62" width="240" height="32" rx="8" fill="#0B1F3A"/>
  <rect x="280" y="78" width="240" height="16" fill="#0B1F3A"/>
  <text x="400" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">COLD SHUT</text>
  <path d="M 300 156 Q 400 106 500 150" fill="none" stroke="#D14343" stroke-width="3.5" stroke-linecap="round"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Smooth, narrow, curving line</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">with rounded ends (castings)</text>

  <!-- Card 3: Seam / lap -->
  <rect x="536" y="62" width="240" height="173" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="536" y="62" width="240" height="32" rx="8" fill="#0B1F3A"/>
  <rect x="536" y="78" width="240" height="16" fill="#0B1F3A"/>
  <text x="656" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">SEAM / LAP</text>
  <line x1="554" y1="142" x2="758" y2="142" stroke="#D14343" stroke-width="3.5" stroke-dasharray="24 12" stroke-linecap="round"/>
  <text x="656" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Straight, often broken line,</text>
  <text x="656" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">parallel to working direction</text>

  <!-- Card 4: Porosity / pit -->
  <rect x="152" y="255" width="240" height="173" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="152" y="255" width="240" height="32" rx="8" fill="#0B1F3A"/>
  <rect x="152" y="271" width="240" height="16" fill="#0B1F3A"/>
  <text x="272" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">POROSITY / PIT</text>
  <circle cx="272" cy="338" r="28" fill="#D14343" opacity="0.25"/>
  <circle cx="272" cy="338" r="13" fill="#D14343"/>
  <text x="272" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Rounded spot with</text>
  <text x="272" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">spreading bleed-out</text>

  <!-- Card 5: Microshrinkage -->
  <rect x="408" y="255" width="240" height="173" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="408" y="255" width="240" height="32" rx="8" fill="#0B1F3A"/>
  <rect x="408" y="271" width="240" height="16" fill="#0B1F3A"/>
  <text x="528" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">MICROSHRINKAGE</text>
  <circle cx="506" cy="328" r="3" fill="#D14343"/>
  <circle cx="520" cy="318" r="2.5" fill="#D14343"/>
  <circle cx="534" cy="330" r="3.5" fill="#D14343"/>
  <circle cx="549" cy="320" r="2.5" fill="#D14343"/>
  <circle cx="560" cy="333" r="3" fill="#D14343"/>
  <circle cx="498" cy="342" r="2.5" fill="#D14343"/>
  <circle cx="513" cy="348" r="3" fill="#D14343"/>
  <circle cx="528" cy="343" r="2.5" fill="#D14343"/>
  <circle cx="544" cy="350" r="3" fill="#D14343"/>
  <circle cx="558" cy="346" r="2.5" fill="#D14343"/>
  <circle cx="506" cy="358" r="2.5" fill="#D14343"/>
  <circle cx="522" cy="360" r="3" fill="#D14343"/>
  <circle cx="540" cy="362" r="2.5" fill="#D14343"/>
  <circle cx="553" cy="358" r="2.5" fill="#D14343"/>
  <text x="528" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Fuzzy cluster of pinpoints</text>
  <text x="528" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">(Mg and Al castings)</text>

  <!-- Bottom note bar -->
  <rect x="24" y="442" width="752" height="50" rx="8" fill="#0B1F3A"/>
  <text x="400" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Fast, wide bleed-out = volume. Thin line that re-bleeds slowly = tight crack.</text>
  <text x="400" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9BC4FF">Bleed-out exaggerates width — size and classify indications by LENGTH.</text>
</svg>
