<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Joining Compared: Welding, Brazing, Soldering</text>

  <!-- ===== Card 1: WELDING ===== -->
  <rect x="24" y="58" width="240" height="300" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <path d="M24,90 L24,66 Q24,58 32,58 L256,58 Q264,58 264,66 L264,90 Z" fill="#0B1F3A"/>
  <text x="144" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">WELDING</text>
  <!-- plates -->
  <rect x="44" y="150" width="62" height="40" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="182" y="150" width="62" height="40" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <!-- HAZ bands -->
  <polygon points="106,150 118,150 132,190 122,190" fill="#B7D3FA" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="170,150 182,150 166,190 156,190" fill="#B7D3FA" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- weld metal -->
  <polygon points="118,150 170,150 156,190 132,190" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M112,150 Q144,132 176,150 Z" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="2"/>
  <text x="144" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">base metal MELTS</text>
  <text x="144" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">fusion zone + HAZ form</text>
  <text x="144" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">filler optional</text>
  <text x="144" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">strength: full-section fusion</text>
  <text x="144" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">NDT: cracks, fusion flaws, inclusions</text>

  <!-- ===== Card 2: BRAZING ===== -->
  <rect x="280" y="58" width="240" height="300" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <path d="M280,90 L280,66 Q280,58 288,58 L512,58 Q520,58 520,66 L520,90 Z" fill="#0B1F3A"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">BRAZING</text>
  <!-- lap joint: top and bottom members, filler in clearance -->
  <rect x="310" y="171" width="170" height="26" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="340" y="140" width="160" height="26" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="340" y="166" width="140" height="5" fill="#D14343"/>
  <!-- capillary draw arrow -->
  <line x1="312" y1="168" x2="334" y2="168" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="334,163 344,168 334,173" fill="#D14343"/>
  <text x="400" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">base metal NEVER melts</text>
  <text x="400" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">filler liquidus ABOVE 450 °C</text>
  <text x="400" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">capillary fills 0.025–0.13 mm clearance</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">strength: wetted lap AREA</text>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">NDT: voids, lack of fill, coverage</text>

  <!-- ===== Card 3: SOLDERING ===== -->
  <rect x="536" y="58" width="240" height="300" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <path d="M536,90 L536,66 Q536,58 544,58 L768,58 Q776,58 776,66 L776,90 Z" fill="#0B1F3A"/>
  <text x="656" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">SOLDERING</text>
  <!-- circuit board, pad, lead, solder fillets -->
  <rect x="566" y="180" width="180" height="16" fill="#B7D3FA" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="610" y="172" width="60" height="8" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="624" y="118" width="32" height="28" fill="#0B1F3A"/>
  <line x1="640" y1="146" x2="640" y2="172" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M622,172 Q632,160 640,152 L640,172 Z" fill="#D14343"/>
  <path d="M658,172 Q648,160 640,152 L640,172 Z" fill="#D14343"/>
  <text x="656" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">filler melts BELOW 450 °C</text>
  <text x="656" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">wets the surfaces — no fusion</text>
  <text x="656" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">electrical and sealing duty</text>
  <text x="656" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">modest strength, creep-prone</text>
  <text x="656" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">NDT: wetting, voids (X-ray imaging)</text>

  <!-- ===== filler-liquidus temperature axis ===== -->
  <line x1="60" y1="392" x2="732" y2="392" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="732,386 746,392 732,398" fill="#0B1F3A"/>
  <line x1="400" y1="382" x2="400" y2="402" stroke="#D14343" stroke-width="3"/>
  <text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">450 °C (840 °F)</text>
  <text x="220" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">SOLDERING — filler below 450 °C</text>
  <text x="570" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">BRAZING — filler above 450 °C</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">Welding stands apart — the base metal itself melts.</text>
</svg>
