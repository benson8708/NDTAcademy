<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Interpretation: The Move Test and the Emissivity Trap</text>

  <!-- ===== left: view from position 1 ===== -->
  <rect x="45" y="44" width="345" height="256" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="217" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">View from position 1</text>
  <rect x="130" y="84" width="170" height="168" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.2"/>
  <line x1="240" y1="84" x2="240" y2="252" stroke="#0B1F3A" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="100" x2="290" y2="140" stroke="#9BC4FF" stroke-width="2" opacity="0.5"/>
  <line x1="255" y1="160" x2="293" y2="198" stroke="#9BC4FF" stroke-width="2" opacity="0.5"/>
  <!-- real lug anomaly -->
  <circle cx="173" cy="128" r="24" fill="#D14343" opacity="0.15"/>
  <circle cx="173" cy="128" r="14" fill="#D14343" opacity="0.35"/>
  <rect x="160" y="118" width="26" height="20" fill="#D14343" fill-opacity="0.8" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="173" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">lug</text>
  <!-- reflection on polished door -->
  <ellipse cx="265" cy="185" rx="18" ry="26" fill="#D14343" opacity="0.45"/>
  <ellipse cx="265" cy="185" rx="9" ry="14" fill="#D14343" opacity="0.65"/>
  <text x="265" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">door</text>
  <!-- camera 1 -->
  <rect x="70" y="266" width="26" height="16" rx="3" fill="#0B1F3A"/>
  <circle cx="100" cy="274" r="5" fill="#0B1F3A"/>
  <line x1="100" y1="270" x2="166" y2="136" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="103" y1="272" x2="258" y2="192" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="240" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">both spots glow &#8212; which is real?</text>

  <!-- ===== right: view from position 2 ===== -->
  <rect x="410" y="44" width="345" height="256" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="582" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">View from position 2 (two steps left)</text>
  <rect x="495" y="84" width="170" height="168" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.2"/>
  <line x1="605" y1="84" x2="605" y2="252" stroke="#0B1F3A" stroke-width="1" opacity="0.5"/>
  <line x1="615" y1="100" x2="655" y2="140" stroke="#9BC4FF" stroke-width="2" opacity="0.5"/>
  <!-- real lug anomaly: same place -->
  <circle cx="538" cy="128" r="24" fill="#D14343" opacity="0.15"/>
  <circle cx="538" cy="128" r="14" fill="#D14343" opacity="0.35"/>
  <rect x="525" y="118" width="26" height="20" fill="#D14343" fill-opacity="0.8" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="538" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">stays fixed</text>
  <!-- reflection has moved -->
  <ellipse cx="630" cy="185" rx="18" ry="26" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="5 4"/>
  <ellipse cx="648" cy="215" rx="14" ry="20" fill="#D14343" opacity="0.45"/>
  <line x1="633" y1="196" x2="643" y2="207" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="640,209 648,214 644,203" fill="#1E66F5"/>
  <text x="635" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#1E66F5">moved</text>
  <!-- camera 2 -->
  <rect x="430" y="266" width="26" height="16" rx="3" fill="#0B1F3A"/>
  <circle cx="460" cy="274" r="5" fill="#0B1F3A"/>
  <line x1="460" y1="270" x2="531" y2="136" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="463" y1="272" x2="640" y2="222" stroke="#1E66F5" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="600" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">real spot stays on the lug; reflection slides</text>

  <!-- ===== bottom: emissivity trap ===== -->
  <text x="400" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Same true temperature, different apparent temperature</text>
  <rect x="122" y="342" width="278" height="38" fill="#D14343" opacity="0.5"/>
  <rect x="400" y="342" width="278" height="38" fill="#9BC4FF" opacity="0.35"/>
  <rect x="120" y="340" width="560" height="42" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="400" y1="340" x2="400" y2="382" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="261" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">painted, &#949; &#8776; 0.95 &#8212; reads true</text>
  <text x="539" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">bare metal, &#949; &#8776; 0.10 &#8212; reads low (reflects room)</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A" opacity="0.85">one bar at a uniform 60 &#176;C &#8212; add a high-emissivity reference patch before trusting any reading</text>
</svg>
