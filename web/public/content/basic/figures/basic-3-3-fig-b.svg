<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Three Roads from Penetrant to Indication</text>

  <!-- Column A: water-washable -->
  <rect x="24" y="52" width="232" height="34" rx="6" fill="#0B1F3A"/>
  <text x="140" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">METHOD A &#183; WATER-WASHABLE</text>

  <rect x="24" y="98" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PRE-CLEAN &#38; DRY</text>
  <text x="140" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">openings clean and empty</text>
  <line x1="140" y1="140" x2="140" y2="150" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="24" y="150" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PENETRANT &#8212; DWELL</text>
  <text x="140" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">drain dwell &#183; commonly &#8805;10 min</text>
  <line x1="140" y1="192" x2="140" y2="202" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="24" y="202" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">WATER-SPRAY WASH</text>
  <text x="140" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">50&#8211;100 &#176;F, &#8804;40 psi &#183; overwash risk</text>
  <line x1="140" y1="244" x2="140" y2="254" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="24" y="254" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">DRY</text>
  <text x="140" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">oven &#8804;160 &#176;F (aqueous dev. first)</text>
  <line x1="140" y1="296" x2="140" y2="306" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="24" y="306" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">DEVELOP</text>
  <text x="140" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">dry / aqueous / nonaqueous &#183; &#8805;10 min</text>
  <line x1="140" y1="348" x2="140" y2="358" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="24" y="358" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="140" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">EXAMINE &#8594; POST-CLEAN</text>
  <text x="140" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">fastest road &#183; rough surfaces, threads</text>

  <!-- Column B/D: post-emulsifiable -->
  <rect x="284" y="52" width="232" height="34" rx="6" fill="#0B1F3A"/>
  <text x="400" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">B &#38; D &#183; POST-EMULSIFIABLE</text>

  <rect x="284" y="98" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PRE-CLEAN &#38; DRY</text>
  <text x="400" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">same start, every road</text>
  <line x1="400" y1="140" x2="400" y2="150" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="284" y="150" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="400" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PENETRANT &#8212; DWELL</text>
  <text x="400" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">not water-washable by itself</text>
  <line x1="400" y1="192" x2="400" y2="202" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="284" y="202" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="400" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PRE-RINSE (METHOD D)</text>
  <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">knock off the bulk penetrant first</text>
  <line x1="400" y1="244" x2="400" y2="254" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="284" y="254" width="232" height="42" rx="6" fill="#FFF5F5" stroke="#D14343" stroke-width="2.5"/>
  <text x="400" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#D14343">EMULSIFIER &#8212; ON THE CLOCK</text>
  <text x="400" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">B: lipophilic dip, no agitation &#183; D: &#8804;35% dip / &#8804;5% spray</text>
  <line x1="400" y1="296" x2="400" y2="306" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="284" y="306" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="400" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">FINAL WASH</text>
  <text x="400" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">only the emulsified surface layer rinses</text>
  <line x1="400" y1="348" x2="400" y2="358" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="284" y="358" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">DRY &#8594; DEVELOP &#8594; EXAMINE</text>
  <text x="400" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">best overwash protection &#183; critical hardware</text>

  <!-- Column C: solvent-removable -->
  <rect x="544" y="52" width="232" height="34" rx="6" fill="#0B1F3A"/>
  <text x="660" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">METHOD C &#183; SOLVENT-REMOVABLE</text>

  <rect x="544" y="98" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="660" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PRE-CLEAN &#38; DRY</text>
  <text x="660" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">solvent wipe in the field</text>
  <line x1="660" y1="140" x2="660" y2="150" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="544" y="150" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="660" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">PENETRANT &#8212; DWELL</text>
  <text x="660" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">aerosol visible dye is the classic kit</text>
  <line x1="660" y1="192" x2="660" y2="202" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="544" y="202" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="660" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">WIPE OFF</text>
  <text x="660" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#D14343">dry cloth, then solvent-dampened &#8212; never flush</text>
  <line x1="660" y1="244" x2="660" y2="254" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="544" y="254" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="660" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">NONAQUEOUS DEVELOPER</text>
  <text x="660" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">thin, even aerosol coat &#183; flashes dry</text>
  <line x1="660" y1="296" x2="660" y2="306" stroke="#1E66F5" stroke-width="1.5"/>
  <rect x="544" y="306" width="232" height="42" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.8"/>
  <text x="660" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">EXAMINE &#8594; POST-CLEAN</text>
  <text x="660" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">no water, no line &#8212; goes anywhere</text>

  <!-- Bottom note bar -->
  <rect x="24" y="410" width="752" height="32" rx="8" fill="#0B1F3A"/>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">The roads differ only in how the excess comes off &#8212; removal control is what each method buys.</text>
  <text x="400" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#9BC4FF">A is fastest &#183; B and D protect shallow entrapments &#183; C travels in three aerosol cans</text>
</svg>
