<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Direct Visual Examination: Access and Lighting Rules</text>

  <!-- examination surface -->
  <rect x="110" y="330" width="580" height="44" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="676" y="358" text-anchor="end" font-size="14" font-style="italic" fill="#0B1F3A">examination surface</text>

  <!-- discontinuity on the surface -->
  <polyline points="408,330 416,326 424,331 432,326 440,330 448,327 454,330" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="448" y1="326" x2="478" y2="306" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="482" y="304" font-size="13" font-style="italic" fill="#0B1F3A">discontinuity</text>

  <!-- examiner's eye -->
  <ellipse cx="190" cy="128" rx="36" ry="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="190" cy="128" r="9" fill="#1E66F5"/>
  <circle cx="190" cy="128" r="3.5" fill="#0B1F3A"/>
  <text x="190" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">examiner&#8217;s eye</text>

  <!-- sight line to the surface -->
  <line x1="206" y1="143" x2="424" y2="326" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="428,330 414,325 421,317" fill="#1E66F5"/>

  <!-- distance dimension parallel to the sight line -->
  <line x1="219" y1="180" x2="367" y2="304" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="219,180 226,191 231,185" fill="#1E66F5"/>
  <polygon points="367,304 355,299 360,293" fill="#1E66F5"/>
  <text x="280" y="236" text-anchor="end" font-size="15" font-weight="bold" fill="#1E66F5">&#8804; 24 in. (600 mm)</text>

  <!-- viewing angle arc -->
  <path d="M 382 330 Q 381 313 393 300" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="374" y="314" text-anchor="end" font-size="15" font-weight="bold" fill="#0B1F3A">&#8805; 30&#176;</text>

  <!-- lamp -->
  <path d="M 600 78 L 656 78 L 676 116 L 580 116 Z" fill="#0B1F3A"/>
  <circle cx="628" cy="124" r="9" fill="#1E66F5"/>
  <line x1="628" y1="133" x2="560" y2="326" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="628" y1="133" x2="628" y2="326" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="628" y1="133" x2="664" y2="280" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="712" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">&#8805; 100 fc (1076 lx)</text>
  <text x="712" y="178" text-anchor="middle" font-size="13" fill="#0B1F3A">at the surface &#8212;</text>
  <text x="712" y="194" text-anchor="middle" font-size="13" fill="#0B1F3A">meter-verified</text>

  <!-- light meter sitting on the surface -->
  <rect x="648" y="288" width="58" height="42" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="656" y="296" width="42" height="14" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="677" y="307" text-anchor="middle" font-size="10" font-weight="bold" fill="#0B1F3A">100 fc</text>
  <text x="677" y="394" text-anchor="middle" font-size="13" fill="#0B1F3A">calibrated light meter</text>

  <!-- bottom takeaways -->
  <text x="400" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">Eye within 24 in. (600 mm), angle &#8805; 30&#176;, light &#8805; 100 fc (1076 lx) &#8212; ASME V, Article 9</text>
  <text x="400" y="442" text-anchor="middle" font-size="14" fill="#1E66F5">Demonstrate on a fine line 1/32 in. (0.8 mm) or less &#8212; mirrors and magnifiers may aid the direct path.</text>
</svg>
