<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Three Ways a Photon Meets Matter</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">photoelectric absorption, Compton scattering, and pair production share the attenuation work</text>

  <!-- panel 1: photoelectric -->
  <rect x="24" y="70" width="240" height="270" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="144" y="96" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0B1F3A">Photoelectric absorption</text>
  <text x="144" y="113" text-anchor="middle" font-size="12" fill="#1E66F5">dominates at low energy, high Z</text>
  <circle cx="144" cy="220" r="52" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="144" cy="220" r="11" fill="#0B1F3A"/>
  <circle cx="107" cy="183" r="6" fill="#1E66F5"/>
  <polyline points="36,152 50,142 64,162 78,142 92,162 100,172" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="97,167 104,176 92,178" fill="#1E66F5"/>
  <text x="42" y="134" font-size="12.5" fill="#1E66F5">photon</text>
  <line x1="112" y1="178" x2="186" y2="140" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="182,135 190,143 192,132" fill="#0B1F3A"/>
  <text x="238" y="132" text-anchor="end" font-size="12.5" fill="#0B1F3A">photoelectron</text>
  <text x="144" y="306" text-anchor="middle" font-size="12.5" fill="#0B1F3A">photon fully absorbed &#8212; all of its</text>
  <text x="144" y="322" text-anchor="middle" font-size="12.5" fill="#0B1F3A">energy given to one bound electron</text>

  <!-- panel 2: Compton -->
  <rect x="280" y="70" width="240" height="270" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0B1F3A">Compton scattering</text>
  <text x="400" y="113" text-anchor="middle" font-size="12" fill="#1E66F5">dominates at industrial energies</text>
  <circle cx="400" cy="220" r="52" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="400" cy="220" r="11" fill="#0B1F3A"/>
  <circle cx="348" cy="220" r="6" fill="#1E66F5"/>
  <polyline points="292,220 306,210 320,230 334,210 341,218" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="337,212 342,222 330,222" fill="#1E66F5"/>
  <text x="296" y="200" font-size="12.5" fill="#1E66F5">photon</text>
  <line x1="351" y1="214" x2="394" y2="152" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="389,150 398,156 398,144" fill="#0B1F3A"/>
  <text x="402" y="146" font-size="12.5" fill="#0B1F3A">recoil electron</text>
  <polyline points="352,227 366,241 382,233 396,249 412,241 426,257" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="420,255 430,261 424,247" fill="#1E66F5"/>
  <text x="442" y="262" font-size="12" fill="#1E66F5">scattered photon</text>
  <text x="442" y="277" font-size="12" fill="#1E66F5">(lower energy)</text>
  <text x="400" y="306" text-anchor="middle" font-size="12.5" fill="#0B1F3A">scatter fogs the image &#8212; and is</text>
  <text x="400" y="322" text-anchor="middle" font-size="12.5" fill="#0B1F3A">the dose outside the direct beam</text>

  <!-- panel 3: pair production -->
  <rect x="536" y="70" width="240" height="270" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="656" y="96" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0B1F3A">Pair production</text>
  <text x="656" y="113" text-anchor="middle" font-size="12" fill="#1E66F5">requires at least 1.022 MeV</text>
  <circle cx="656" cy="220" r="52" fill="none" stroke="#9BC4FF" stroke-width="2"/>
  <circle cx="656" cy="220" r="11" fill="#0B1F3A"/>
  <polyline points="548,186 562,176 576,196 590,176 604,196 614,204" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="611,198 618,208 606,208" fill="#1E66F5"/>
  <text x="554" y="166" font-size="12.5" fill="#1E66F5">photon</text>
  <line x1="664" y1="210" x2="722" y2="166" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="717,162 726,168 727,156" fill="#0B1F3A"/>
  <text x="768" y="156" text-anchor="end" font-size="12.5" fill="#0B1F3A">electron (e&#8722;)</text>
  <line x1="664" y1="230" x2="722" y2="274" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="717,278 726,272 727,284" fill="#1E66F5"/>
  <text x="768" y="292" text-anchor="end" font-size="12.5" fill="#1E66F5">positron (e+)</text>
  <text x="656" y="306" text-anchor="middle" font-size="12.5" fill="#0B1F3A">the positron annihilates into</text>
  <text x="656" y="322" text-anchor="middle" font-size="12.5" fill="#0B1F3A">two 0.511 MeV photons</text>

  <!-- energy axis -->
  <line x1="60" y1="392" x2="740" y2="392" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="740,386 740,398 752,392" fill="#0B1F3A"/>
  <line x1="287" y1="386" x2="287" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="513" y1="386" x2="513" y2="398" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">increasing photon energy</text>
  <text x="172" y="418" text-anchor="middle" font-size="12.5" fill="#1E66F5">photoelectric dominates</text>
  <text x="400" y="418" text-anchor="middle" font-size="12.5" fill="#1E66F5">Compton dominates</text>
  <text x="632" y="418" text-anchor="middle" font-size="12.5" fill="#1E66F5">pair production (&#8805; 1.022 MeV)</text>
</svg>
