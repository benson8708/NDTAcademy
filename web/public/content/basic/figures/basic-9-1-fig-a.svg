<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Ingot Solidification and Deoxidation Practice</text>

  <!-- LEFT: big-end-up killed ingot with hot top -->
  <rect x="120" y="64" width="110" height="46" fill="#D9E2EC" stroke="#0B1F3A" stroke-width="2"/>
  <text x="238" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">hot top (feeder head)</text>

  <!-- ingot body -->
  <polygon points="105,110 245,110 232,330 118,330" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>

  <!-- pipe confined mostly to the hot top, tip crossing the crop line -->
  <polygon points="158,66 192,66 177,142 173,142" fill="#0B1F3A"/>

  <!-- crop line -->
  <line x1="88" y1="118" x2="258" y2="118" stroke="#E03131" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="264" y="122" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#E03131">crop line</text>

  <!-- columnar grain ticks from the chilled walls -->
  <line x1="108" y1="150" x2="138" y2="153" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="107" y1="185" x2="137" y2="188" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="106" y1="220" x2="136" y2="222" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="105" y1="255" x2="135" y2="256" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="104" y1="290" x2="134" y2="290" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="242" y1="150" x2="212" y2="153" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="241" y1="185" x2="211" y2="188" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="240" y1="220" x2="210" y2="222" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="239" y1="255" x2="209" y2="256" stroke="#5B7FA6" stroke-width="1.5"/>
  <line x1="238" y1="290" x2="208" y2="290" stroke="#5B7FA6" stroke-width="1.5"/>

  <!-- segregation zone under the pipe -->
  <ellipse cx="175" cy="190" rx="24" ry="34" fill="#FFE3B3"/>
  <line x1="201" y1="190" x2="252" y2="196" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="256" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">segregation (C, S, P)</text>
  <text x="175" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">columnar grains grow in from the chilled walls;</text>
  <text x="175" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">last liquid — pipe and segregation — sits top center</text>

  <!-- rolled plate with centerline lamination -->
  <polygon points="171,372 179,372 175,382" fill="#0B1F3A"/>
  <rect x="60" y="386" width="230" height="24" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="66" y1="398" x2="284" y2="398" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="175" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">uncropped pipe rolls out into a centerline lamination</text>

  <!-- RIGHT: three deoxidation cross-sections -->
  <text x="590" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Deoxidation practice (ingot cross-sections)</text>

  <!-- killed -->
  <rect x="405" y="100" width="100" height="190" fill="#EAF1FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="435,102 475,102 458,212 452,212" fill="#0B1F3A"/>
  <text x="455" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Killed</text>
  <text x="455" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">fully deoxidized</text>
  <text x="455" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">deep pipe, uniform</text>

  <!-- semi-killed -->
  <rect x="540" y="100" width="100" height="190" fill="#EAF1FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="572,102 608,102 593,152 587,152" fill="#0B1F3A"/>
  <circle cx="565" cy="172" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="597" cy="184" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="580" cy="204" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="612" cy="166" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="590" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Semi-killed</text>
  <text x="590" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">partly deoxidized</text>
  <text x="590" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">smaller pipe, some gas</text>

  <!-- rimmed -->
  <rect x="675" y="100" width="100" height="190" fill="#EAF1FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="695" y="120" width="60" height="150" fill="#FFE3B3"/>
  <ellipse cx="699" cy="142" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="699" cy="172" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="699" cy="202" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="699" cy="232" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="751" cy="142" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="751" cy="172" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="751" cy="202" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="751" cy="232" rx="3.5" ry="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="712" cy="124" rx="8" ry="3.5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <ellipse cx="738" cy="124" rx="8" ry="3.5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="725" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Rimmed</text>
  <text x="725" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">rim of pure iron,</text>
  <text x="725" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">blowholes, segregated core</text>

  <text x="590" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#475569">Capped = rimming action stopped early: rimmed skin, semi-killed interior</text>

  <!-- legend -->
  <rect x="420" y="400" width="14" height="14" fill="#0B1F3A"/>
  <text x="440" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">shrinkage pipe</text>
  <circle cx="552" cy="407" r="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="564" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">CO blowholes</text>
  <rect x="664" y="400" width="14" height="14" fill="#FFE3B3" stroke="#0B1F3A" stroke-width="1"/>
  <text x="684" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">segregation</text>
</svg>
