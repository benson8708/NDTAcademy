<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Snell's Law: One Incident Beam, Two Refracted Modes</text>

  <!-- left: wedge over steel -->
  <rect x="55" y="110" width="420" height="130" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="55" y="240" width="420" height="130" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="55" y1="240" x2="475" y2="240" stroke="#0B1F3A" stroke-width="3"/>
  <text x="65" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B1F3A">acrylic wedge — VL ≈ 2,730 m/s</text>
  <text x="65" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B1F3A">steel — VL 5,920 m/s · VS 3,240 m/s</text>

  <!-- normal -->
  <line x1="265" y1="118" x2="265" y2="362" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- incident L -->
  <line x1="225" y1="130" x2="263" y2="235" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="263,235 254.4,224.3 262.8,221.3" fill="#0B1F3A"/>
  <text x="218" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B1F3A">incident L</text>
  <path d="M265,205 A35,35 0 0 0 253,207" stroke="#5A6B7E" stroke-width="1.5" fill="none"/>
  <text x="247" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">20°</text>

  <!-- reflected (dashed) -->
  <line x1="265" y1="240" x2="303" y2="134" stroke="#5A6B7E" stroke-width="1.8" stroke-dasharray="5,4"/>
  <text x="310" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">reflected</text>

  <!-- refracted L -->
  <line x1="265" y1="240" x2="387" y2="350" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="387,350 374.3,344.6 380.3,338.0" fill="#1E66F5"/>
  <text x="372" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#1E66F5">L — 48°</text>

  <!-- refracted S -->
  <line x1="265" y1="240" x2="314" y2="350" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="314,350 304.6,339.8 312.8,336.4" fill="#0B1F3A"/>
  <text x="288" y="332" text-anchor="end" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#0B1F3A">S — 24°</text>

  <!-- formula -->
  <text x="265" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">sin θ₁ / V₁ = sin θ₂ / V₂</text>
  <text x="265" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">each refracted mode bends according to its own velocity</text>

  <!-- right: critical-angle ladder -->
  <text x="645" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#0B1F3A">Raise the wedge angle</text>
  <text x="645" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">(acrylic wedge on steel)</text>

  <rect x="505" y="104" width="280" height="70" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="520" y="127" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Below 27.5° — two beams</text>
  <text x="520" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">L and S both refract into the part:</text>
  <text x="520" y="163" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">every reflector answers twice.</text>

  <rect x="505" y="186" width="280" height="96" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.2"/>
  <text x="520" y="209" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">27.5° – 57.4° — shear only</text>
  <text x="520" y="229" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">the first critical angle removed L;</text>
  <text x="520" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">one beam, one velocity, known angle.</text>
  <text x="520" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">45°, 60°, 70° probes live here.</text>

  <rect x="505" y="294" width="280" height="86" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="520" y="317" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Past 57.4° — surface wave</text>
  <text x="520" y="337" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">the second critical angle removed shear:</text>
  <text x="520" y="353" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">a Rayleigh wave runs along the surface,</text>
  <text x="520" y="369" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">about one wavelength deep.</text>

  <text x="645" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">in water (immersion): critical angles ≈ 14.5° and 27.2°</text>
</svg>
