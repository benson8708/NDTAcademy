<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Qualification Examinations and Composite Grading</text>

  <!-- Vision gate (standing condition) -->
  <rect x="28" y="92" width="156" height="240" rx="8" fill="#F2A33C"/>
  <text x="106" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">VISION GATE</text>
  <text x="106" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Near vision:</text>
  <text x="106" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">annually</text>
  <text x="106" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Jaeger-type chart</text>
  <text x="106" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Color and gray</text>
  <text x="106" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">contrast: entry</text>
  <text x="106" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">+ intervals</text>
  <text x="106" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#0A2342">standing condition</text>

  <!-- General exam -->
  <rect x="214" y="92" width="178" height="118" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="303" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">GENERAL</text>
  <text x="303" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Method principles,</text>
  <text x="303" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">physics, variables</text>
  <text x="303" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">closed book</text>

  <!-- Specific exam -->
  <rect x="408" y="92" width="178" height="118" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="497" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">SPECIFIC</text>
  <text x="497" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Employer procedures,</text>
  <text x="497" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">equipment, specs</text>
  <text x="497" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">your shop's rules</text>

  <!-- Practical exam -->
  <rect x="602" y="92" width="170" height="118" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="687" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">PRACTICAL</text>
  <text x="687" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hands-on with</text>
  <text x="687" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flawed specimens</text>
  <text x="687" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">graded checklist</text>

  <!-- arrows into composite -->
  <line x1="303" y1="212" x2="360" y2="268" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="352,266 366,274 362,256" fill="#1B82E8"/>
  <line x1="497" y1="212" x2="497" y2="266" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="489,262 497,278 505,262" fill="#1B82E8"/>
  <line x1="687" y1="212" x2="630" y2="268" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="628,256 624,274 638,266" fill="#1B82E8"/>

  <!-- dashed vision condition line -->
  <line x1="184" y1="300" x2="294" y2="320" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="288,326 302,322 290,310" fill="#F2A33C"/>

  <!-- Composite box -->
  <rect x="294" y="278" width="400" height="100" rx="8" fill="#1E9E6A"/>
  <text x="494" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">COMPOSITE GRADE</text>
  <text x="494" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Simple average of the three: commonly at least 80%</text>
  <text x="494" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Per-exam floor (commonly 70%) set by the written practice</text>

  <!-- bottom note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">Administered and graded by the Level III or a designated representative</text>
</svg>
