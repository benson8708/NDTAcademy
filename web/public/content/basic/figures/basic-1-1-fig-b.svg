<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Levels of Qualification: the Responsibility Ladder</text>

  <!-- rising arrow above the steps -->
  <line x1="60" y1="330" x2="580" y2="142" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="574,134 592,138 580,152" fill="#F2A33C"/>
  <text x="240" y="208" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Increasing responsibility</text>

  <!-- TRAINEE -->
  <rect x="35" y="345" width="170" height="85" rx="6" fill="#5A6B7E"/>
  <text x="120" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">TRAINEE</text>
  <text x="120" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Direct supervision only</text>
  <text x="120" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">No independent results</text>

  <!-- LEVEL I -->
  <rect x="222" y="298" width="172" height="132" rx="6" fill="#1B82E8"/>
  <text x="308" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">LEVEL I</text>
  <text x="308" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Specific tests per</text>
  <text x="308" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">written instructions</text>
  <text x="308" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Records results</text>
  <text x="308" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">No accept/reject call</text>

  <!-- LEVEL II -->
  <rect x="411" y="248" width="178" height="182" rx="6" fill="#1B82E8"/>
  <text x="500" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">LEVEL II</text>
  <text x="500" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Sets up and calibrates</text>
  <text x="500" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Interprets and evaluates</text>
  <text x="500" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">to codes and criteria</text>
  <text x="500" y="367" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Organizes and reports</text>
  <text x="500" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Guides Trainees</text>
  <text x="500" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">and Level I</text>

  <!-- LEVEL III -->
  <rect x="606" y="178" width="174" height="252" rx="6" fill="#F2A33C"/>
  <text x="693" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">LEVEL III</text>
  <text x="693" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Establishes techniques</text>
  <text x="693" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and procedures</text>
  <text x="693" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Interprets codes,</text>
  <text x="693" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">standards, specs</text>
  <text x="693" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Designates method</text>
  <text x="693" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and technique</text>
  <text x="693" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Trains and examines</text>
  <text x="693" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Materials and process</text>
  <text x="693" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">background</text>
</svg>
