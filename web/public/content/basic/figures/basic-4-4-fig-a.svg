<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Wire Rope MFL: One Head, Two Channels</text>

  <!-- dashed distance guides linking rope features to trace events -->
  <line x1="560" y1="141" x2="560" y2="380" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.3"/>
  <line x1="670" y1="141" x2="670" y2="380" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.3"/>

  <!-- rope -->
  <rect x="50" y="105" width="700" height="36" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="50" y1="117" x2="750" y2="117" stroke="#0B1F3A" stroke-width="1" opacity="0.35"/>
  <line x1="50" y1="129" x2="750" y2="129" stroke="#0B1F3A" stroke-width="1" opacity="0.35"/>

  <!-- worn / corroded length: thinned top surface -->
  <path d="M 618 105 Q 670 121 722 105" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="670" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">worn / corroded length</text>
  <line x1="670" y1="82" x2="670" y2="100" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- broken wire with leakage arcs -->
  <polyline points="558,105 565,119 556,133" stroke="#0B1F3A" stroke-width="3" fill="none"/>
  <path d="M 548 101 Q 560 88 572 101" stroke="#1E66F5" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <path d="M 552 102 Q 560 94 568 102" stroke="#1E66F5" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <text x="552" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">broken wire</text>

  <!-- permanent-magnet test head -->
  <rect x="330" y="56" width="140" height="22" fill="#0B1F3A"/>
  <rect x="330" y="78" width="34" height="27" fill="#0B1F3A"/>
  <rect x="436" y="78" width="34" height="27" fill="#0B1F3A"/>
  <text x="347" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">N</text>
  <text x="453" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">S</text>
  <rect x="390" y="84" width="20" height="21" fill="#1E66F5"/>
  <text x="255" y="68" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">permanent-magnet head</text>
  <line x1="260" y1="64" x2="326" y2="64" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="510" y="95" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Hall / coil sensors between poles</text>
  <line x1="412" y1="92" x2="505" y2="92" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- axial flux through the rope between poles -->
  <line x1="347" y1="105" x2="347" y2="120" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="453" y1="120" x2="453" y2="105" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="352" y1="123" x2="438" y2="123" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="438,118 450,123 438,128" fill="#1E66F5"/>

  <!-- rope travel arrow -->
  <line x1="60" y1="162" x2="105" y2="162" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="105,156 118,162 105,168" fill="#0B1F3A"/>
  <text x="128" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">rope travels through the head; encoder wheel logs distance</text>

  <!-- LF trace panel -->
  <rect x="50" y="185" width="700" height="85" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="58" y="203" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">LF channel — local faults</text>
  <line x1="58" y1="240" x2="742" y2="240" stroke="#0B1F3A" stroke-width="1" opacity="0.35"/>
  <polyline points="58,240 540,240 552,206 560,240 568,262 582,240 742,240" stroke="#1E66F5" stroke-width="2.5" fill="none"/>
  <text x="598" y="221" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E66F5">sharp dipole = broken wire</text>

  <!-- LMA trace panel -->
  <rect x="50" y="285" width="700" height="95" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="58" y="303" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">LMA channel — metallic cross-section</text>
  <line x1="58" y1="322" x2="742" y2="322" stroke="#0B1F3A" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
  <text x="120" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">100% reference area</text>
  <polyline points="58,322 612,322 642,352 702,352 728,325 742,325" stroke="#1E66F5" stroke-width="2.5" fill="none"/>
  <text x="672" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E66F5">gradual step down = % LMA</text>
  <text x="742" y="396" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">distance along rope</text>

  <!-- bottom emphasis bar -->
  <rect x="50" y="408" width="700" height="34" rx="8" fill="#0B1F3A"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">LMA reads gradual loss of cross-section — LF flags abrupt wire breaks</text>
</svg>
