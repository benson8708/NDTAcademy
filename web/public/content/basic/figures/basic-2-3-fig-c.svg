<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">The Impedance-Plane Display</text>

  <!-- plot area -->
  <rect x="80" y="70" width="480" height="360" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="160" y1="70" x2="160" y2="430" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="240" y1="70" x2="240" y2="430" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="320" y1="70" x2="320" y2="430" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="400" y1="70" x2="400" y2="430" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="480" y1="70" x2="480" y2="430" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="80" y1="140" x2="560" y2="140" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="80" y1="210" x2="560" y2="210" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="80" y1="280" x2="560" y2="280" stroke="#9BC4FF" stroke-width="0.7"/>
  <line x1="80" y1="350" x2="560" y2="350" stroke="#9BC4FF" stroke-width="0.7"/>

  <!-- axes -->
  <polygon points="74,80 86,80 80,64" fill="#0B1F3A"/>
  <polygon points="560,424 560,436 576,430" fill="#0B1F3A"/>
  <text x="60" y="250" transform="rotate(-90 60 250)" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">inductive reactance (XL)</text>
  <text x="320" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">resistance (R)</text>

  <!-- conductivity / permeability shift (dashed) -->
  <line x1="327" y1="344" x2="207" y2="237" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="215,231 199,236 213,247" fill="#0B1F3A"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">conductivity or</text>
  <text x="200" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">permeability change</text>

  <!-- lift-off trace -->
  <line x1="323" y1="346" x2="138" y2="331" stroke="#9BC4FF" stroke-width="4"/>
  <polygon points="142,323 124,332 143,340" fill="#9BC4FF"/>
  <text x="185" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E66F5">lift-off</text>

  <!-- surface crack loop -->
  <path d="M330,350 C352,296 372,212 402,158 C414,136 432,130 438,152 C443,170 420,234 394,290 C381,318 360,338 340,350" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <polygon points="428,141 444,134 442,153" fill="#1E66F5"/>
  <text x="452" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">surface crack</text>

  <!-- balance point -->
  <circle cx="330" cy="350" r="7" fill="#0B1F3A"/>
  <text x="330" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">balance (null) point</text>

  <!-- side panel -->
  <rect x="585" y="70" width="190" height="360" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="680" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">How to read it</text>
  <circle cx="597" cy="121" r="3" fill="#1E66F5"/>
  <text x="606" y="126" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">The dot is the coil's</text>
  <text x="606" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">impedance right now.</text>
  <circle cx="597" cy="171" r="3" fill="#1E66F5"/>
  <text x="606" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">A signal is the path the</text>
  <text x="606" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">dot traces as the probe</text>
  <text x="606" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">passes a condition.</text>
  <circle cx="597" cy="239" r="3" fill="#1E66F5"/>
  <text x="606" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Phase angle tells you</text>
  <text x="606" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">what moved it; amplitude</text>
  <text x="606" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">tells you how much.</text>
  <circle cx="597" cy="307" r="3" fill="#1E66F5"/>
  <text x="606" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Set-up practice: rotate</text>
  <text x="606" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">phase so lift-off runs</text>
  <text x="606" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">horizontal.</text>

  <!-- bottom note -->
  <text x="320" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Nonferrous surface scan shown — phase rotated so lift-off runs horizontal.</text>
</svg>
