<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Heat Treatment Cycles: Same Austenite, Four Destinies</text>

  <!-- Plot axes -->
  <line x1="64" y1="70" x2="64" y2="362" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="58,74 70,74 64,62" fill="#0B1F3A"/>
  <line x1="62" y1="360" x2="502" y2="360" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="498,354 498,366 510,360" fill="#0B1F3A"/>
  <text x="46" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A" transform="rotate(-90 46 220)">temperature</text>
  <text x="282" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">time</text>

  <!-- Transformation range band -->
  <rect x="66" y="118" width="432" height="34" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="282" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1E66F5">transformation range &#8212; austenite above this band</text>

  <!-- Heat-up and soak -->
  <path d="M 70 342 L 132 100 L 185 100" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="156" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">austenitize + hold</text>

  <!-- Anneal: furnace cool -->
  <path d="M 185 100 C 320 140, 430 240, 490 338" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="374" y="186" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">furnace cool</text>

  <!-- Normalize: air cool -->
  <path d="M 185 100 C 250 185, 310 280, 360 342" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <text x="288" y="212" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">air cool</text>

  <!-- Quench -->
  <path d="M 185 100 C 195 220, 200 300, 207 342" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="172" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D14343" transform="rotate(-80 172 248)">quench</text>

  <!-- Temper: reheat below the range -->
  <path d="M 207 342 C 218 320, 224 290, 232 272 L 285 272 C 300 300, 312 325, 322 342" fill="none" stroke="#D14343" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="258" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#D14343">temper</text>

  <!-- Outcome cards -->
  <rect x="516" y="64" width="264" height="50" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="516" y="64" width="6" height="50" rx="3" fill="#1E66F5"/>
  <text x="532" y="84" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">FURNACE COOL &#8594; ANNEAL</text>
  <text x="532" y="102" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">coarse pearlite: softest, most ductile</text>

  <rect x="516" y="122" width="264" height="50" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="516" y="122" width="6" height="50" rx="3" fill="#0B1F3A"/>
  <text x="532" y="142" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">AIR COOL &#8594; NORMALIZE</text>
  <text x="532" y="160" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">fine pearlite: uniform, refined grain</text>

  <rect x="516" y="180" width="264" height="50" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="516" y="180" width="6" height="50" rx="3" fill="#D14343"/>
  <text x="532" y="200" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">QUENCH &#8594; MARTENSITE</text>
  <text x="532" y="218" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">very hard, brittle, stressed &#8212; crack risk</text>

  <rect x="516" y="238" width="264" height="50" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="516" y="238" width="6" height="50" rx="3" fill="#D14343"/>
  <text x="532" y="258" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">+ TEMPER (below the range)</text>
  <text x="532" y="276" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">toughness back, some hardness traded</text>

  <rect x="516" y="296" width="264" height="66" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <rect x="516" y="296" width="6" height="66" rx="3" fill="#9BC4FF"/>
  <text x="532" y="316" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">ALUMINUM &#8594; AGE HARDENING</text>
  <text x="532" y="334" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">solution treat &#8776;900&#8211;1000 &#176;F, quench, age:</text>
  <text x="532" y="350" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">natural (2024-T3) or artificial (7075-T6)</text>

  <!-- Bottom note bar -->
  <rect x="24" y="396" width="752" height="44" rx="8" fill="#0B1F3A"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">The cooling rate from austenite sets hardness, toughness, and residual stress.</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">Stress relief (1100&#8211;1250 &#176;F) never enters the range &#8212; stresses relax, microstructure unchanged.</text>
</svg>
