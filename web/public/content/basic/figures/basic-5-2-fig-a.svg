<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Geometric Unsharpness: Source, Test Object, Detector</text>

  <!-- focal spot -->
  <line x1="200" y1="78" x2="260" y2="78" stroke="#D14343" stroke-width="9" stroke-linecap="round"/>
  <text x="274" y="83" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">focal spot — size F</text>

  <!-- rays from both ends of the focal spot past the object edges -->
  <line x1="200" y1="78" x2="360" y2="360" stroke="#0B1F3A" stroke-width="1.3" opacity="0.5"/>
  <line x1="260" y1="78" x2="340" y2="360" stroke="#0B1F3A" stroke-width="1.3" opacity="0.5"/>
  <line x1="200" y1="78" x2="107" y2="360" stroke="#0B1F3A" stroke-width="1.3" opacity="0.5"/>
  <line x1="260" y1="78" x2="87" y2="360" stroke="#0B1F3A" stroke-width="1.3" opacity="0.5"/>

  <!-- test object -->
  <rect x="130" y="250" width="190" height="40" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <text x="225" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">test object</text>

  <!-- dimension D: source to object -->
  <line x1="95" y1="78" x2="95" y2="250" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="88" y1="78" x2="102" y2="78" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="88" y1="250" x2="102" y2="250" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="78" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">D</text>

  <!-- dimension d: object (flaw) to detector -->
  <line x1="95" y1="290" x2="95" y2="360" stroke="#D14343" stroke-width="1.5"/>
  <line x1="88" y1="290" x2="102" y2="290" stroke="#D14343" stroke-width="1.5"/>
  <line x1="88" y1="360" x2="102" y2="360" stroke="#D14343" stroke-width="1.5"/>
  <text x="78" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">d</text>

  <!-- shadow on the detector: umbra plus penumbra bands -->
  <rect x="107" y="352" width="233" height="6" fill="#39414A"/>
  <rect x="87" y="352" width="20" height="6" fill="#39414A" opacity="0.45"/>
  <rect x="340" y="352" width="20" height="6" fill="#39414A" opacity="0.45"/>
  <line x1="60" y1="360" x2="420" y2="360" stroke="#0B1F3A" stroke-width="5"/>
  <text x="240" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">detector (film or digital panel)</text>
  <path d="M 340 348 L 340 342 L 360 342 L 360 348" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <text x="352" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">Ug</text>

  <text x="240" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#D14343">Ug = F · d / D</text>
  <text x="240" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">smaller F · shorter d · longer D → sharper edge</text>

  <!-- divider -->
  <line x1="448" y1="58" x2="448" y2="420" stroke="#0B1F3A" stroke-width="1" opacity="0.15"/>

  <!-- right panel: two setups compared -->
  <text x="624" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Why edges blur — two setups</text>

  <rect x="536" y="84" width="8" height="7" fill="#D14343"/>
  <rect x="505" y="170" width="70" height="24" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="498" y1="206" x2="582" y2="206" stroke="#0B1F3A" stroke-width="4"/>
  <text x="540" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">small F · long D · film tight</text>

  <rect x="660" y="84" width="60" height="7" fill="#D14343"/>
  <rect x="655" y="128" width="70" height="24" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="648" y1="206" x2="732" y2="206" stroke="#0B1F3A" stroke-width="4"/>
  <text x="690" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">large F · short D · big gap d</text>

  <text x="624" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">edge trace recorded on the image:</text>
  <polyline points="505,310 538,310 542,282 575,282" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="540" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">crisp edge</text>
  <polyline points="655,310 668,310 712,282 725,282" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="690" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">blurred edge</text>

  <text x="624" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">gamma capsules are millimeters wide and cannot be focused —</text>
  <text x="624" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">standoff distance is their only sharpness lever</text>
</svg>
