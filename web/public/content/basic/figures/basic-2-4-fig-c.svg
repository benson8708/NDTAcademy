<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Thickness Gauging: Lift-Off and Far-Surface Reach</text>

  <line x1="400" y1="52" x2="400" y2="428" stroke="#E3EEFF" stroke-width="2"/>

  <!-- LEFT PANEL: nonconductive coating -->
  <text x="205" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Nonconductive coating: calibrated lift-off</text>

  <!-- mini calibration curve -->
  <rect x="60" y="80" width="290" height="110" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="88" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">meter response</text>
  <path d="M75,102 C140,150 220,168 335,176" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <circle cx="110" cy="128" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="190" cy="160" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="290" cy="173" r="5" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1"/>
  <text x="205" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">coating thickness (mils)</text>
  <text x="205" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">standardized on foils of known thickness (ASTM E376)</text>

  <!-- probe -->
  <rect x="165" y="222" width="70" height="56" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="180" y="258" width="16" height="20" fill="#1E66F5"/>
  <rect x="204" y="258" width="16" height="20" fill="#1E66F5"/>
  <text x="248" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">probe</text>

  <!-- coating layer -->
  <rect x="60" y="278" width="290" height="26" fill="#F4F8FF" stroke="#5B8DEF" stroke-width="1.5"/>
  <text x="290" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">paint / anodize</text>

  <!-- metal base -->
  <rect x="60" y="304" width="290" height="78" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>
  <text x="110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">aluminum base</text>

  <!-- eddy currents in metal only -->
  <ellipse cx="200" cy="313" rx="42" ry="6" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <ellipse cx="200" cy="315" rx="27" ry="4" fill="none" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="276" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E66F5">eddy currents</text>

  <!-- lift-off double arrow -->
  <line x1="48" y1="278" x2="48" y2="304" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="43,280 48,272 53,280" fill="#0B1F3A"/>
  <polygon points="43,302 48,310 53,302" fill="#0B1F3A"/>

  <text x="205" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">the coating spaces the coil off the metal —</text>
  <text x="205" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">that lift-off is the measurement</text>

  <!-- RIGHT PANEL: remaining wall -->
  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Remaining wall: currents must reach the far surface</text>

  <text x="432" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">choose the test frequency so the effective</text>
  <text x="432" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">depth (about 3δ) spans the full wall —</text>
  <text x="432" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">remaining thickness then sets the signal</text>

  <!-- probe -->
  <rect x="545" y="160" width="70" height="56" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="560" y="196" width="16" height="20" fill="#1E66F5"/>
  <rect x="584" y="196" width="16" height="20" fill="#1E66F5"/>
  <text x="628" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">probe (low f)</text>

  <!-- plate wall -->
  <rect x="440" y="216" width="310" height="96" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="2"/>

  <!-- skin-depth dashed lines -->
  <line x1="450" y1="243" x2="512" y2="243" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="456" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">1δ</text>
  <line x1="450" y1="270" x2="512" y2="270" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="456" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">2δ</text>
  <line x1="450" y1="299" x2="512" y2="299" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="456" y="294" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">3δ</text>

  <!-- far-side corrosion scallops -->
  <path d="M520,312 Q535,286 550,312 Q565,282 580,312 Q595,278 610,312 Q625,284 640,312 Q655,288 670,312 Q685,292 700,312 L520,312 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="610" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">hidden corrosion thinning the far surface</text>

  <text x="600" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">standardize on thickness steps of the same alloy;</text>
  <text x="600" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">lower frequency means deeper reach</text>
</svg>
