<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Visual Indication to Disposition</text>

  <!-- Box 1: Indication -->
  <rect x="24" y="95" width="150" height="110" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="24" y="95" width="150" height="32" rx="8" fill="#0A2342"/>
  <text x="99" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">INDICATION</text>
  <text x="99" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Seen and</text>
  <text x="99" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">confirmed during</text>
  <text x="99" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">the examination</text>

  <line x1="174" y1="150" x2="192" y2="150" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="192,142 208,150 192,158" fill="#1B82E8"/>

  <!-- Box 2: Interpret -->
  <rect x="208" y="95" width="160" height="110" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="208" y="95" width="160" height="32" rx="8" fill="#1B82E8"/>
  <text x="288" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">INTERPRET</text>
  <text x="288" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Classify it:</text>
  <text x="288" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">false, nonrelevant,</text>
  <text x="288" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">or relevant</text>

  <line x1="368" y1="150" x2="386" y2="150" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="386,142 402,150 386,158" fill="#1B82E8"/>
  <text x="385" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1B82E8">relevant</text>

  <!-- Box 3: Evaluate -->
  <rect x="402" y="95" width="170" height="110" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="402" y="95" width="170" height="32" rx="8" fill="#0A2342"/>
  <text x="487" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">EVALUATE</text>
  <text x="487" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Compare with the</text>
  <text x="487" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">written acceptance</text>
  <text x="487" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">criteria</text>

  <!-- Arrows to outcomes -->
  <line x1="572" y1="119" x2="592" y2="119" stroke="#1E9E6A" stroke-width="4"/>
  <polygon points="592,111 608,119 592,127" fill="#1E9E6A"/>
  <line x1="572" y1="181" x2="592" y2="181" stroke="#C0392B" stroke-width="4"/>
  <polygon points="592,173 608,181 592,189" fill="#C0392B"/>

  <!-- Accept box -->
  <rect x="614" y="92" width="162" height="55" rx="8" fill="#E9F7F0" stroke="#1E9E6A" stroke-width="3"/>
  <text x="695" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">ACCEPT</text>
  <text x="695" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">within limits — record</text>

  <!-- Reject box -->
  <rect x="614" y="153" width="162" height="55" rx="8" fill="#FDECEA" stroke="#C0392B" stroke-width="3"/>
  <text x="695" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#C0392B">REJECT = DEFECT</text>
  <text x="695" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">exceeds limits</text>

  <!-- Repair loop -->
  <line x1="695" y1="208" x2="695" y2="230" stroke="#C0392B" stroke-width="3"/>
  <polygon points="687,230 695,246 703,230" fill="#C0392B"/>
  <rect x="614" y="246" width="162" height="86" rx="8" fill="#FDECEA" stroke="#C0392B" stroke-width="2"/>
  <text x="695" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Repair or rework,</text>
  <text x="695" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">then re-examine to</text>
  <text x="695" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">the same criteria</text>

  <!-- If not relevant box -->
  <rect x="24" y="246" width="280" height="130" rx="8" fill="#F5F8FC" stroke="#0A2342" stroke-width="2"/>
  <text x="164" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">If not relevant</text>
  <text x="164" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">False — lighting artifact, residue,</text>
  <text x="164" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">reflection: fix the condition, look again</text>
  <text x="164" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Nonrelevant — geometry or design:</text>
  <text x="164" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">record the basis (drawing, process)</text>
  <line x1="288" y1="246" x2="288" y2="228" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="280,228 288,212 296,228" fill="#0A2342"/>

  <!-- Criteria sources box -->
  <rect x="328" y="246" width="262" height="130" rx="8" fill="#FFF7EC" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="459" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Where the criteria live</text>
  <text x="459" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">AWS D1.1 weld tables · ASME Section V</text>
  <text x="459" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">Art. 9 + referencing code · API 510/570/653</text>
  <text x="459" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">MSS SP-55 / ASTM A802 castings</text>
  <text x="459" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342">OEM SRM + approved data · drawing / PO</text>
  <line x1="487" y1="246" x2="487" y2="228" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="479,228 487,212 495,228" fill="#F2A33C"/>

  <!-- Emphasis bar -->
  <rect x="24" y="394" width="752" height="44" rx="8" fill="#F2A33C"/>
  <text x="400" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Criteria are quoted from the governing document — never invented at the part.</text>
</svg>
