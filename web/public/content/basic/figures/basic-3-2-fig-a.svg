<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Mass Spectrometer Leak Detector — Tuned to Helium (Mass 4)</text>

  <!-- test port and inlet manifold -->
  <rect x="55" y="58" width="70" height="28" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="135" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">test port</text>
  <text x="135" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">gas from test object</text>
  <line x1="90" y1="86" x2="90" y2="255" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="80,138 100,138 90,150" fill="#0B1F3A"/>
  <polygon points="80,162 100,162 90,150" fill="#0B1F3A"/>
  <text x="72" y="155" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">inlet valve</text>
  <line x1="90" y1="205" x2="195" y2="205" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="25" y="255" width="130" height="38" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="90" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">calibrated standard</text>
  <text x="90" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">leak (sensitivity check)</text>

  <!-- spectrometer tube -->
  <rect x="170" y="100" width="375" height="230" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="357" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">spectrometer tube</text>

  <!-- ion source -->
  <rect x="195" y="180" width="70" height="80" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M205,205 L215,225 L225,205 L235,225 L245,205" fill="none" stroke="#D14343" stroke-width="2"/>
  <text x="230" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">ion source</text>
  <text x="230" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">hot filament</text>

  <!-- beam into magnet -->
  <line x1="265" y1="220" x2="300" y2="220" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="298,214 298,226 309,220" fill="#1E66F5"/>

  <!-- magnetic field region -->
  <rect x="305" y="130" width="175" height="180" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="340" cy="150" r="7" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="335" y1="145" x2="345" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="345" y1="145" x2="335" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="392" cy="150" r="7" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="387" y1="145" x2="397" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="397" y1="145" x2="387" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <circle cx="444" cy="150" r="7" fill="none" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="439" y1="145" x2="449" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="449" y1="145" x2="439" y2="155" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="392" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">magnetic field B (into page)</text>

  <!-- ion trajectories -->
  <path d="M305,220 Q335,248 345,302" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="352" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">m/z 2 — over-deflected</text>
  <path d="M305,220 Q400,222 491,240" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="468" y="222" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">m/z 28 — under-deflected</text>
  <path d="M305,220 Q400,238 490,266 L536,272" fill="none" stroke="#D14343" stroke-width="3"/>
  <polygon points="533,266 533,278 543,272" fill="#D14343"/>
  <text x="398" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">helium ions, m/z 4</text>

  <!-- resolving slit -->
  <rect x="495" y="130" width="8" height="126" fill="#0B1F3A"/>
  <rect x="495" y="286" width="8" height="44" fill="#0B1F3A"/>
  <text x="499" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">resolving slit</text>

  <!-- collector -->
  <path d="M540,252 L515,252 L515,292 L540,292" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="527" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">collector</text>

  <!-- electrometer amplifier and readout -->
  <line x1="540" y1="272" x2="572" y2="272" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="572" y="242" width="130" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="637" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">electrometer</text>
  <text x="637" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">amplifier</text>
  <line x1="637" y1="242" x2="637" y2="200" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="572" y="105" width="130" height="95" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M592,180 A45,45 0 0 1 682,180" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="637" y1="180" x2="668" y2="142" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="637" cy="180" r="4" fill="#0B1F3A"/>
  <text x="637" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">leak-rate readout</text>
  <text x="637" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">1×10⁻⁹ std cm³/s</text>

  <!-- vacuum pumps -->
  <line x1="360" y1="330" x2="360" y2="355" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="280" y="355" width="160" height="40" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="360" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">high-vacuum pump</text>
  <text x="360" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">turbo or diffusion</text>
  <line x1="440" y1="375" x2="468" y2="375" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="468" y="355" width="120" height="40" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="528" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B1F3A">backing pump</text>
  <text x="608" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">tube held near 10⁻⁵ Torr</text>

  <!-- takeaway -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Only ions with helium's mass-to-charge ratio thread the slit — the detector answers to helium alone.</text>
</svg>
