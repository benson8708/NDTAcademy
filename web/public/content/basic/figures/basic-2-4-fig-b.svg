<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Conductivity Sorting: Typical %IACS Bands, Airframe Aluminum</text>

  <text x="720" y="62" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">annealed pure copper = 100 %IACS (off scale)</text>

  <!-- vertical gridlines at 0..60 by 10 -->
  <line x1="80" y1="76" x2="80" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="187" y1="76" x2="187" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="293" y1="76" x2="293" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="400" y1="76" x2="400" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="507" y1="76" x2="507" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="613" y1="76" x2="613" y2="368" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="720" y1="76" x2="720" y2="368" stroke="#EDF4FF" stroke-width="1"/>

  <!-- overlap highlight between 2024-T3 and 7075-T6 (30.5 to 33 %IACS) -->
  <rect x="405" y="86" width="27" height="96" fill="#0B1F3A" fill-opacity="0.08" stroke="#0B1F3A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- bands -->
  <rect x="379" y="92" width="53" height="34" rx="6" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="369" y="114" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2024-T3</text>
  <text x="405" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">28-33</text>

  <rect x="405" y="142" width="59" height="34" rx="6" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="395" y="164" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">7075-T6</text>
  <text x="434" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">31-36</text>

  <rect x="485" y="192" width="54" height="34" rx="6" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="475" y="214" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">7075-T73</text>
  <text x="512" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">38-43</text>

  <rect x="517" y="242" width="64" height="34" rx="6" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="507" y="264" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">6061-T6</text>
  <text x="549" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">41-47</text>

  <rect x="571" y="292" width="53" height="34" rx="6" fill="#1E66F5" fill-opacity="0.18" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="561" y="314" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2024-O</text>
  <text x="597" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">46-51</text>

  <!-- overlap annotation -->
  <text x="95" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">bands overlap:</text>
  <text x="95" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">a reading alone cannot</text>
  <text x="95" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">name alloy and temper</text>
  <line x1="262" y1="143" x2="398" y2="132" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="396,126 408,131 397,139" fill="#0B1F3A"/>

  <!-- direction arrows -->
  <text x="320" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">solution treatment lowers conductivity</text>
  <line x1="392" y1="352" x2="256" y2="352" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="258,346 246,352 258,358" fill="#1E66F5"/>

  <text x="568" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">aging, annealing, heat damage raise it</text>
  <line x1="488" y1="352" x2="640" y2="352" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="638,346 650,352 638,358" fill="#1E66F5"/>

  <!-- axis -->
  <line x1="80" y1="368" x2="720" y2="368" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="80" y1="368" x2="80" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="187" y1="368" x2="187" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="293" y1="368" x2="293" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="400" y1="368" x2="400" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="507" y1="368" x2="507" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="613" y1="368" x2="613" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="720" y1="368" x2="720" y2="376" stroke="#0B1F3A" stroke-width="2"/>
  <text x="80" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">0</text>
  <text x="187" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">10</text>
  <text x="293" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">20</text>
  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">30</text>
  <text x="507" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">40</text>
  <text x="613" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">50</text>
  <text x="720" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">60</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">electrical conductivity (%IACS) — typical published ranges</text>
</svg>
