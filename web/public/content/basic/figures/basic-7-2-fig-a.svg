<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Weld VT: Three Stages, Three Checklists</text>

  <!-- ================= PANEL 1: BEFORE ================= -->
  <rect x="25" y="55" width="235" height="350" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="25" y="55" width="235" height="26" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="142" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">BEFORE — fit-up</text>

  <!-- beveled plates -->
  <polygon points="40,200 120,200 134,236 134,240 40,240" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="245,200 165,200 148,236 148,240 245,240" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- groove angle arc -->
  <path d="M 128 214 Q 142 224 157 214" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <line x1="142" y1="222" x2="142" y2="178" stroke="#1E66F5" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="142" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">groove angle</text>

  <!-- root opening dimension -->
  <line x1="134" y1="240" x2="134" y2="256" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="148" y1="240" x2="148" y2="256" stroke="#0B1F3A" stroke-width="1"/>
  <line x1="134" y1="252" x2="148" y2="252" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="134,252 139,249 139,255" fill="#0B1F3A"/>
  <polygon points="148,252 143,249 143,255" fill="#0B1F3A"/>
  <text x="141" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">root opening</text>

  <!-- checklist -->
  <text x="42" y="306" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- root opening, root face, bevel angle</text>
  <text x="42" y="326" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- alignment (hi-lo) across the joint</text>
  <text x="42" y="346" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- bare, clean, dry bevel faces</text>
  <text x="42" y="366" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- base metal and consumable condition</text>

  <!-- ================= PANEL 2: DURING ================= -->
  <rect x="283" y="55" width="235" height="350" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="283" y="55" width="235" height="26" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">DURING — pass by pass</text>

  <!-- beveled plates -->
  <polygon points="298,200 378,200 392,236 392,240 298,240" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="503,200 423,200 406,236 406,240 503,240" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- root pass and fill pass -->
  <ellipse cx="399" cy="233" rx="11" ry="7" fill="#1B82E8" stroke="#0B1F3A" stroke-width="1.5"/>
  <ellipse cx="399" cy="219" rx="17" ry="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- labels with leaders -->
  <line x1="399" y1="241" x2="399" y2="258" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="399" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">root pass contour checked</text>
  <line x1="416" y1="216" x2="452" y2="186" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="400" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">slag off before the next pass</text>

  <!-- checklist -->
  <text x="300" y="306" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- root pass profile and fusion at the toes</text>
  <text x="300" y="326" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- interpass cleaning between passes</text>
  <text x="300" y="346" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- distortion and joint movement watched</text>
  <text x="300" y="366" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- conformance to the welding procedure</text>

  <!-- ================= PANEL 3: AFTER ================= -->
  <rect x="540" y="55" width="235" height="350" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="540" y="55" width="235" height="26" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="657" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">AFTER — gauge the bead</text>

  <!-- joined plates -->
  <rect x="555" y="200" width="77" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="683" y="200" width="77" height="40" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="632,200 683,200 676,240 639,240" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M 632 200 Q 657 182 683 200 Z" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 639 240 Q 657 249 676 240 Z" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- undercut notch at left toe -->
  <path d="M 624 200 a 5 4 0 0 0 10 0" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <line x1="629" y1="206" x2="606" y2="252" stroke="#D14343" stroke-width="1.5"/>
  <text x="603" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D14343">undercut at the toe</text>

  <!-- spatter -->
  <circle cx="600" cy="193" r="2.5" fill="#5A6B7E"/>
  <circle cx="610" cy="189" r="2" fill="#5A6B7E"/>
  <circle cx="708" cy="192" r="2.5" fill="#5A6B7E"/>
  <text x="722" y="186" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">spatter</text>

  <!-- reinforcement height -->
  <line x1="657" y1="187" x2="657" y2="160" stroke="#1E66F5" stroke-width="1.5"/>
  <polygon points="657,187 654,180 660,180" fill="#1E66F5"/>
  <text x="657" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">reinforcement height</text>

  <!-- checklist -->
  <text x="557" y="306" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- size and profile with weld gauges</text>
  <text x="557" y="326" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- undercut, overlap, underfill</text>
  <text x="557" y="346" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- surface porosity, cracks, arc strikes</text>
  <text x="557" y="366" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">- dimensions against the drawing</text>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-style="italic" fill="#5A6B7E">The cheapest weld defect is the one rejected at fit-up — staged VT exists to find it there.</text>
</svg>
