<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Certification Lifecycle (Employer-Based Model)</text>

  <!-- main timeline -->
  <line x1="45" y1="170" x2="745" y2="170" stroke="#0A2342" stroke-width="4"/>
  <polygon points="745,162 763,170 745,178" fill="#0A2342"/>

  <!-- node 1: Qualify -->
  <circle cx="90" cy="170" r="11" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="90" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">QUALIFY</text>
  <text x="90" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">education,</text>
  <text x="90" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">training,</text>
  <text x="90" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">experience</text>

  <!-- node 2: Examine -->
  <circle cx="240" cy="170" r="11" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="240" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">EXAMINE</text>
  <text x="240" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">general, specific,</text>
  <text x="240" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">practical + vision</text>

  <!-- node 3: Certify -->
  <circle cx="400" cy="170" r="11" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">CERTIFY</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">employer signs;</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">records complete</text>

  <!-- node 4: Maintain -->
  <circle cx="555" cy="170" r="11" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="555" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">MAINTAIN</text>
  <text x="555" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">annual near vision +</text>
  <text x="555" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">performance evaluation</text>

  <!-- node 5: Recertify -->
  <circle cx="705" cy="170" r="11" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="705" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">RECERTIFY</text>
  <text x="705" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">commonly 3 yr I/II,</text>
  <text x="705" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">5 yr Level III</text>

  <!-- interrupted service box -->
  <rect x="55" y="288" width="320" height="118" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <rect x="55" y="288" width="320" height="36" rx="8" fill="#F2A33C"/>
  <text x="215" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">INTERRUPTED SERVICE</text>
  <text x="70" y="348" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Method not exercised beyond the</text>
  <text x="70" y="368" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">written-practice limit (commonly ~12 mo)</text>
  <text x="70" y="392" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Cure: reexamine before independent work</text>
  <line x1="380" y1="290" x2="545" y2="188" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="536,186 553,183 543,198" fill="#F2A33C"/>

  <!-- termination / reinstatement box -->
  <rect x="425" y="288" width="345" height="118" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <rect x="425" y="288" width="345" height="36" rx="8" fill="#D14343"/>
  <text x="597" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">TERMINATION &amp; REINSTATEMENT</text>
  <text x="440" y="348" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Certification ends with employment.</text>
  <text x="440" y="370" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Rehired within window (commonly 6 mo)</text>
  <text x="440" y="392" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">+ records on file = reinstate, no reexam</text>
</svg>
