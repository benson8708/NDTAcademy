<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Evacuated or Pressurized: Where the Tracer Goes</text>

  <!-- dividers -->
  <line x1="270" y1="50" x2="270" y2="430" stroke="#DCE6F2" stroke-width="2"/>
  <line x1="530" y1="50" x2="530" y2="430" stroke="#DCE6F2" stroke-width="2"/>

  <!-- Panel A: tracer probe -->
  <text x="140" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Tracer probe — locate</text>
  <text x="140" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">object evacuated · flow is outside-in</text>
  <circle cx="52" cy="106" r="11" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="52" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1E66F5">He</text>
  <line x1="62" y1="110" x2="106" y2="122" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="112" y1="124" x2="124" y2="146" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="118,144 128,140 126,152" fill="#1E66F5"/>
  <rect x="60" y="132" width="140" height="100" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="130" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">vacuum</text>
  <text x="130" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">P inside &lt; P outside</text>
  <line x1="130" y1="232" x2="130" y2="268" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="70" y="268" width="120" height="44" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="130" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">MSLD</text>
  <text x="130" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">on the pumping line</text>
  <text x="140" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">spray top-down — helium rises</text>
  <text x="140" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">short bursts · wait one τ = V/S</text>
  <text x="140" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">locates to ~10⁻⁷–10⁻⁸ std cm³/s</text>

  <!-- Panel B: hood -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Hood — total leakage</text>
  <text x="400" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">evacuated object inside a helium envelope</text>
  <rect x="310" y="104" width="180" height="142" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="400" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">helium-filled hood</text>
  <rect x="345" y="138" width="110" height="76" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">vacuum</text>
  <line x1="328" y1="176" x2="342" y2="176" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="340,171 340,181 350,176" fill="#1E66F5"/>
  <line x1="472" y1="176" x2="458" y2="176" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="460,171 460,181 450,176" fill="#1E66F5"/>
  <line x1="400" y1="246" x2="400" y2="280" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="340" y="280" width="120" height="44" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">MSLD</text>
  <text x="400" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">total inward leakage</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">every leak in the boundary counts at once</text>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">most sensitive: 10⁻⁹–10⁻¹¹ std cm³/s</text>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">mirror image: inside-out test for sealed parts</text>

  <!-- Panel C: detector probe -->
  <text x="660" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Detector probe — locate</text>
  <text x="660" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">object pressurized · flow is inside-out</text>
  <rect x="580" y="124" width="140" height="100" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="650" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">helium tracer mix</text>
  <text x="650" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">P inside &gt; P outside</text>
  <line x1="655" y1="120" x2="655" y2="100" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="650,102 660,102 655,92" fill="#1E66F5"/>
  <circle cx="662" cy="88" r="5" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <line x1="667" y1="86" x2="724" y2="72" stroke="#0B1F3A" stroke-width="3"/>
  <text x="700" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">sniffer probe</text>
  <text x="660" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">background: air already holds ≈5 ppm helium</text>
  <text x="660" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">scan speed and standoff set what you catch</text>
  <text x="660" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">locates to ~10⁻⁶–10⁻⁷ std cm³/s</text>
  <text x="660" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">accumulation variant: enclose the part,</text>
  <text x="660" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">wait, measure tracer build-up — a simple total</text>
  <text x="660" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">ambient-fluid cousins: pressure decay,</text>
  <text x="660" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">hydrostatic, bubble solution</text>
</svg>
