<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">The Neutron Imaging Chain</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">collimator geometry sets sharpness; conversion screens make the image recordable</text>

  <!-- geometry band -->
  <rect x="30" y="100" width="80" height="70" rx="4" fill="#0B1F3A"/>
  <text x="70" y="130" text-anchor="middle" font-size="12.5" fill="#FFFFFF">reactor /</text>
  <text x="70" y="146" text-anchor="middle" font-size="12.5" fill="#FFFFFF">moderator</text>

  <!-- inlet aperture plate -->
  <rect x="122" y="95" width="8" height="32" fill="#0B1F3A"/>
  <rect x="122" y="143" width="8" height="32" fill="#0B1F3A"/>
  <line x1="116" y1="127" x2="116" y2="143" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="112,130 120,130 116,123" fill="#1E66F5"/>
  <polygon points="112,140 120,140 116,147" fill="#1E66F5"/>
  <text x="104" y="139" text-anchor="end" font-size="13" font-weight="bold" fill="#1E66F5">D</text>

  <!-- diverging beam edges -->
  <line x1="130" y1="127" x2="700" y2="85" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7,4"/>
  <line x1="130" y1="143" x2="700" y2="185" stroke="#1E66F5" stroke-width="2" stroke-dasharray="7,4"/>
  <line x1="130" y1="135" x2="585" y2="135" stroke="#9BC4FF" stroke-width="2"/>
  <polygon points="585,130 585,140 595,135" fill="#9BC4FF"/>

  <!-- object -->
  <rect x="600" y="100" width="40" height="70" rx="3" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="620" y="91" text-anchor="middle" font-size="12.5" fill="#0B1F3A">object</text>

  <!-- image plane -->
  <line x1="700" y1="75" x2="700" y2="195" stroke="#0B1F3A" stroke-width="5"/>
  <text x="712" y="112" font-size="12.5" fill="#0B1F3A">image plane</text>
  <text x="712" y="128" font-size="12.5" fill="#0B1F3A">(detector)</text>

  <!-- t dimension -->
  <line x1="643" y1="178" x2="697" y2="178" stroke="#1E66F5" stroke-width="1.5"/>
  <polygon points="643,174 643,182 637,178" fill="#1E66F5"/>
  <polygon points="697,174 697,182 703,178" fill="#1E66F5"/>
  <text x="670" y="170" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1E66F5">t</text>

  <!-- L dimension -->
  <line x1="130" y1="205" x2="700" y2="205" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="130" y1="198" x2="130" y2="212" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="700" y1="198" x2="700" y2="212" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="415" y="221" text-anchor="middle" font-size="12.5" fill="#0B1F3A">L &#8212; inlet aperture to image plane</text>

  <text x="400" y="241" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0B1F3A">Ug &#8776; t &#247; (L/D) &#8212; raise L/D for sharpness, keep the part against the detector</text>
  <text x="400" y="258" text-anchor="middle" font-size="12.5" fill="#1E66F5">but flux falls roughly with (L/D)&#178;: the sharper geometry is paid for in exposure time</text>

  <!-- panel: direct technique -->
  <rect x="40" y="270" width="345" height="168" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="212" y="293" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0B1F3A">Direct technique</text>
  <line x1="60" y1="330" x2="135" y2="330" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="135,325 135,335 145,330" fill="#1E66F5"/>
  <text x="62" y="320" font-size="11.5" fill="#1E66F5">neutrons</text>
  <rect x="152" y="305" width="38" height="50" rx="3" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="171" y="368" text-anchor="middle" font-size="11.5" fill="#0B1F3A">object</text>
  <rect x="216" y="300" width="9" height="60" fill="#1E66F5"/>
  <rect x="229" y="300" width="6" height="60" fill="#0B1F3A"/>
  <text x="252" y="312" font-size="11.5" fill="#1E66F5">film</text>
  <text x="252" y="327" font-size="11.5" fill="#0B1F3A">Gd screen</text>
  <text x="252" y="343" font-size="11" fill="#0B1F3A">(capture &#8594; electrons</text>
  <text x="252" y="357" font-size="11" fill="#0B1F3A">expose the film)</text>
  <text x="212" y="392" text-anchor="middle" font-size="11.5" fill="#0B1F3A">film and screen sit in the beam &#8212; best resolution</text>
  <text x="212" y="408" text-anchor="middle" font-size="11.5" fill="#0B1F3A">object must not be radioactive</text>
  <text x="212" y="424" text-anchor="middle" font-size="11.5" fill="#1E66F5">beam gamma contamination can fog the film</text>

  <!-- panel: transfer technique -->
  <rect x="415" y="270" width="345" height="168" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="587" y="293" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0B1F3A">Transfer (indirect) technique</text>
  <line x1="432" y1="330" x2="492" y2="330" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="492,325 492,335 502,330" fill="#1E66F5"/>
  <rect x="508" y="305" width="38" height="50" rx="3" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="527" y="368" text-anchor="middle" font-size="11.5" fill="#0B1F3A">object</text>
  <rect x="566" y="300" width="7" height="60" fill="#0B1F3A"/>
  <text x="570" y="290" text-anchor="middle" font-size="11" fill="#0B1F3A">foil only</text>
  <line x1="592" y1="330" x2="640" y2="330" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="640,326 640,334 648,330" fill="#0B1F3A"/>
  <text x="618" y="320" text-anchor="middle" font-size="10.5" fill="#0B1F3A">darkroom</text>
  <rect x="660" y="300" width="7" height="60" fill="#0B1F3A"/>
  <rect x="671" y="300" width="9" height="60" fill="#1E66F5"/>
  <text x="700" y="318" font-size="11" fill="#0B1F3A">decaying foil</text>
  <text x="700" y="332" font-size="11" fill="#1E66F5">exposes film</text>
  <text x="700" y="346" font-size="11" fill="#1E66F5">off-line</text>
  <text x="587" y="392" text-anchor="middle" font-size="11.5" fill="#0B1F3A">Dy-165 (2.35 h) or In-116m (54 min) activated in the beam</text>
  <text x="587" y="408" text-anchor="middle" font-size="11.5" fill="#0B1F3A">film never sees beam or object &#8212; immune to gamma</text>
  <text x="587" y="424" text-anchor="middle" font-size="11.5" fill="#1E66F5">the choice for radioactive test objects</text>
</svg>
