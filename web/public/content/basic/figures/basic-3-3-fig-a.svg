<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Capillary Action: In, Held, and Blotted Back Out</text>

  <!-- Panel 1: Wetting -->
  <rect x="24" y="56" width="240" height="30" rx="6" fill="#0B1F3A"/>
  <text x="144" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1 &#183; WETTING</text>

  <rect x="40" y="206" width="208" height="6" fill="#0B1F3A"/>
  <path d="M 58 206 Q 100 176 142 206 Z" fill="#D14343" opacity="0.85"/>
  <line x1="58" y1="206" x2="92" y2="190" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="78" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">&#952; near 0&#176;</text>
  <circle cx="206" cy="189" r="17" fill="#9BC4FF" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="206" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E66F5">&#952; &#62; 90&#176;</text>
  <text x="100" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">wets, spreads, creeps in</text>
  <text x="100" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">a penetrant</text>
  <text x="206" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">beads up</text>
  <text x="206" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">no use</text>

  <rect x="36" y="272" width="216" height="68" rx="6" fill="#EFF5FF" stroke="#9BC4FF" stroke-width="1.5"/>
  <text x="144" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Pull &#8733; surface tension &#215; cos &#952;</text>
  <text x="144" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">&#247; width of the opening</text>
  <text x="144" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#D14343">Tighter crack &#8594; harder pull</text>

  <!-- Panel 2: Entry -->
  <rect x="280" y="56" width="240" height="30" rx="6" fill="#0B1F3A"/>
  <text x="400" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2 &#183; ENTRY BY CAPILLARITY</text>

  <text x="400" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#1E66F5">capillary pull</text>
  <line x1="400" y1="130" x2="400" y2="150" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="394,148 406,148 400,160" fill="#1E66F5"/>
  <rect x="300" y="158" width="200" height="12" fill="#D14343" opacity="0.85"/>
  <rect x="300" y="170" width="200" height="130" fill="#DCE4F0" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="394,170 406,170 401,264 399,264" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1"/>
  <polygon points="395.5,171 404.5,171 400.8,238 399.2,238" fill="#D14343"/>
  <text x="316" y="152" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343" font-weight="bold">penetrant film</text>
  <text x="400" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">The film floods the surface; the opening</text>
  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">drinks it in &#8212; any orientation, no gravity needed</text>

  <!-- Panel 3: Bleed-out -->
  <rect x="536" y="56" width="240" height="30" rx="6" fill="#0B1F3A"/>
  <text x="656" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3 &#183; BLEED-OUT INTO DEVELOPER</text>

  <rect x="556" y="150" width="200" height="20" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="1.5"/>
  <circle cx="572" cy="160" r="1.5" fill="#9BC4FF"/>
  <circle cx="592" cy="156" r="1.5" fill="#9BC4FF"/>
  <circle cx="612" cy="163" r="1.5" fill="#9BC4FF"/>
  <circle cx="700" cy="157" r="1.5" fill="#9BC4FF"/>
  <circle cx="722" cy="162" r="1.5" fill="#9BC4FF"/>
  <circle cx="742" cy="156" r="1.5" fill="#9BC4FF"/>
  <ellipse cx="656" cy="160" rx="48" ry="11" fill="#D14343" opacity="0.25"/>
  <ellipse cx="656" cy="160" rx="32" ry="8" fill="#D14343" opacity="0.85"/>
  <rect x="556" y="170" width="200" height="130" fill="#DCE4F0" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="650,170 662,170 657,264 655,264" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1"/>
  <polygon points="651.5,178 660.5,178 656.8,258 655.2,258" fill="#D14343"/>
  <line x1="688" y1="192" x2="688" y2="166" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="682,168 694,168 688,156" fill="#1E66F5"/>
  <text x="726" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1E66F5">reverse</text>
  <text x="726" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1E66F5">capillarity</text>
  <text x="586" y="142" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343" font-weight="bold">indication</text>
  <text x="656" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">The developer blots the entrapment back out &#8212;</text>
  <text x="656" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">the indication is far wider than the flaw</text>

  <!-- Bottom note bar -->
  <rect x="24" y="396" width="752" height="44" rx="8" fill="#0B1F3A"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Clean and open to the surface &#8212; or there is no test.</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">Capillarity pulls penetrant in, holds it through removal, and the developer pulls it back out.</text>
</svg>
