<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Weld Joint Zones: Base Metal, HAZ, Fusion Zone</text>

  <!-- base metal plates -->
  <polygon points="70,190 340,190 392,300 70,300" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="730,190 460,190 408,300 730,300" fill="#E9F0FB" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- HAZ bands -->
  <polygon points="312,190 340,190 392,300 366,300" fill="#B7D3FA" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="460,190 488,190 434,300 408,300" fill="#B7D3FA" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- weld metal: V fill, cap, root bead -->
  <polygon points="340,190 460,190 408,300 392,300" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M328,190 Q400,148 472,190 Z" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M386,300 Q400,314 414,300 Z" fill="#6E9BF0" stroke="#0B1F3A" stroke-width="2"/>

  <!-- fusion lines (melted / unmelted boundary) -->
  <line x1="340" y1="190" x2="392" y2="300" stroke="#D14343" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="190" x2="408" y2="300" stroke="#D14343" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- underbead crack in left HAZ -->
  <polyline points="368,266 373,273 367,281 372,289" fill="none" stroke="#D14343" stroke-width="2.5"/>

  <!-- weld metal label -->
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">WELD METAL (FUSION ZONE)</text>
  <text x="400" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">melted and resolidified — cast, columnar grains</text>
  <line x1="400" y1="104" x2="400" y2="162" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="395,160 405,160 400,170" fill="#0B1F3A"/>

  <!-- weld toe marker -->
  <circle cx="472" cy="190" r="6" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="477" y1="184" x2="568" y2="126" stroke="#D14343" stroke-width="1.5"/>
  <text x="574" y="122" text-anchor="start" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">weld toe — toe-crack site</text>

  <!-- fusion line label -->
  <text x="218" y="132" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">fusion line (weld interface)</text>
  <text x="218" y="149" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">lack of fusion lives here</text>
  <line x1="224" y1="138" x2="356" y2="226" stroke="#D14343" stroke-width="1.5"/>

  <!-- HAZ label -->
  <text x="60" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">HEAT-AFFECTED ZONE (HAZ)</text>
  <text x="60" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">never molten — microstructure altered:</text>
  <text x="60" y="381" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">hardening, hydrogen (underbead) cracks</text>
  <line x1="372" y1="278" x2="248" y2="338" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- base metal label -->
  <text x="620" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">BASE METAL</text>
  <text x="620" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">unaffected by the thermal cycle</text>
  <line x1="620" y1="304" x2="620" y2="332" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- HAZ width pointers -->
  <text x="490" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">HAZ band</text>
  <line x1="487" y1="218" x2="470" y2="212" stroke="#1E66F5" stroke-width="1.5"/>

  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Every fusion weld is four materials in one — inspection must cover the weld metal AND the HAZ beside it.</text>
</svg>
