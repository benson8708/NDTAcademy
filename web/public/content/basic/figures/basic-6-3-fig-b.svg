<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">The IR Equipment Spectrum: Contact to Thermal Imaging</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">point → line → full field — from a melting crayon to tens of thousands of temperatures per frame</text>

  <!-- Box 1: contact indicators -->
  <rect x="36" y="78" width="136" height="196" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="104" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Contact indicators</text>
  <rect x="96" y="122" width="16" height="40" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="96,162 112,162 104,176" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
  <path d="M80,190 q6,-9 12,0 q6,9 12,0 q6,-9 12,0 q6,9 12,0" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="104" y="216" text-anchor="middle" font-size="11" fill="#0B1F3A">crayons, paints, labels</text>
  <text x="104" y="234" text-anchor="middle" font-size="11" fill="#0B1F3A">liquid crystal sheets</text>
  <text x="104" y="252" text-anchor="middle" font-size="11" fill="#0B1F3A">melt / color at rated T</text>

  <!-- Box 2: contact sensors -->
  <rect x="184" y="78" width="136" height="196" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="252" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Contact sensors</text>
  <line x1="216" y1="138" x2="250" y2="150" stroke="#0B1F3A" stroke-width="2.2"/>
  <line x1="216" y1="162" x2="250" y2="150" stroke="#1E66F5" stroke-width="2.2"/>
  <circle cx="253" cy="150" r="5" fill="#F2A33C" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="276" y="146" text-anchor="start" font-size="10.5" fill="#0B1F3A">EMF</text>
  <path d="M214,190 l8,-9 l9,18 l9,-18 l9,18 l9,-18 l9,18 l8,-9" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <text x="252" y="216" text-anchor="middle" font-size="11" fill="#0B1F3A">thermocouple: Seebeck</text>
  <text x="252" y="234" text-anchor="middle" font-size="11" fill="#0B1F3A">RTD, thermistor</text>
  <text x="252" y="252" text-anchor="middle" font-size="11" fill="#0B1F3A">heat flux gauge (W/m²)</text>

  <!-- Box 3: spot pyrometer -->
  <rect x="332" y="78" width="136" height="196" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Spot pyrometer</text>
  <rect x="352" y="134" width="30" height="22" rx="3" fill="#0B1F3A"/>
  <polygon points="382,145 438,127 438,163" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <ellipse cx="438" cy="145" rx="8" ry="18" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="400" y="184" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1E66F5">D:S</text>
  <text x="400" y="216" text-anchor="middle" font-size="11" fill="#0B1F3A">single-band radiance</text>
  <text x="400" y="234" text-anchor="middle" font-size="11" fill="#0B1F3A">noncontact point read</text>
  <text x="400" y="252" text-anchor="middle" font-size="11" fill="#0B1F3A">set ε first</text>

  <!-- Box 4: line scanner -->
  <rect x="480" y="78" width="136" height="196" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="548" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Line scanner</text>
  <rect x="528" y="116" width="40" height="20" rx="3" fill="#0B1F3A"/>
  <polygon points="548,146 556,154 548,162 540,154" fill="#1E66F5"/>
  <line x1="548" y1="158" x2="516" y2="196" stroke="#F2A33C" stroke-width="1.8"/>
  <line x1="548" y1="158" x2="536" y2="198" stroke="#F2A33C" stroke-width="1.8"/>
  <line x1="548" y1="158" x2="560" y2="198" stroke="#F2A33C" stroke-width="1.8"/>
  <line x1="548" y1="158" x2="580" y2="196" stroke="#F2A33C" stroke-width="1.8"/>
  <rect x="506" y="198" width="84" height="12" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="594" y1="204" x2="606" y2="204" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="606,200 613,204 606,208" fill="#0B1F3A"/>
  <text x="548" y="226" text-anchor="middle" font-size="11" fill="#0B1F3A">mirror sweeps a line</text>
  <text x="548" y="244" text-anchor="middle" font-size="11" fill="#0B1F3A">motion adds 2nd axis</text>
  <text x="548" y="262" text-anchor="middle" font-size="11" fill="#0B1F3A">webs, strip, kilns</text>

  <!-- Box 5: thermal imager -->
  <rect x="628" y="78" width="136" height="196" rx="8" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="696" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Thermal imager</text>
  <rect x="652" y="118" width="52" height="34" rx="4" fill="#0B1F3A"/>
  <circle cx="706" cy="135" r="9" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="660" y="166" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="673" y="166" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="686" y="166" width="11" height="11" fill="#F2A33C" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="699" y="166" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="660" y="179" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="673" y="179" width="11" height="11" fill="#F2A33C" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="686" y="179" width="11" height="11" fill="#F2A33C" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="699" y="179" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="660" y="192" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="673" y="192" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="686" y="192" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <rect x="699" y="192" width="11" height="11" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <text x="696" y="226" text-anchor="middle" font-size="11" fill="#0B1F3A">microbolometer (LWIR)</text>
  <text x="696" y="244" text-anchor="middle" font-size="11" fill="#0B1F3A">or cooled InSb (MWIR)</text>
  <text x="696" y="262" text-anchor="middle" font-size="11" fill="#0B1F3A">full thermogram</text>

  <!-- progression arrow -->
  <line x1="60" y1="306" x2="724" y2="306" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="724,300 740,306 724,312" fill="#0B1F3A"/>
  <text x="60" y="296" text-anchor="start" font-size="12.5" font-weight="bold" fill="#0B1F3A">contact · single point</text>
  <text x="724" y="296" text-anchor="end" font-size="12.5" font-weight="bold" fill="#0B1F3A">noncontact · full field</text>
  <text x="400" y="330" text-anchor="middle" font-size="12" fill="#1E66F5">every step right buys coverage, speed, and data per measurement</text>

  <!-- takeaway bar -->
  <rect x="90" y="392" width="620" height="48" rx="8" fill="#0B1F3A"/>
  <text x="400" y="412" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Match the tool to the question: a crayon answers one threshold, a pyrometer one</text>
  <text x="400" y="431" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">point, a scanner one line on moving product — an FPA imager maps the whole surface.</text>
</svg>
