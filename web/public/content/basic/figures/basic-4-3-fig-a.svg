<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">MFL Sensor Response Over a Wall-Loss Defect</text>

  <!-- alignment guide through defect center -->
  <line x1="400" y1="48" x2="400" y2="222" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="3,4"/>

  <!-- axial component trace -->
  <line x1="120" y1="100" x2="680" y2="100" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="112" y="104" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">0</text>
  <path d="M120,100 H338 C360,100 372,58 400,58 C428,58 440,100 462,100 H680" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <text x="676" y="88" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E66F5">axial Bt — peak over defect</text>

  <!-- radial component trace -->
  <line x1="120" y1="168" x2="680" y2="168" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="112" y="172" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">0</text>
  <path d="M120,168 H328 C348,168 352,130 369,130 C386,130 392,168 400,168 C408,168 414,206 431,206 C448,206 452,168 472,168 H680" fill="none" stroke="#D14343" stroke-width="3"/>
  <circle cx="400" cy="168" r="4.5" fill="#D14343"/>
  <text x="676" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D14343">radial Bn — bipolar, zero at center</text>

  <!-- sensor and scan direction -->
  <rect x="378" y="226" width="44" height="16" rx="2" fill="#0A2342"/>
  <text x="430" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">sensor (Hall or coil)</text>
  <line x1="432" y1="240" x2="486" y2="240" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="486,235 498,240 486,245" fill="#0B1F3A"/>
  <text x="504" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">scan</text>

  <!-- pit label -->
  <line x1="366" y1="254" x2="300" y2="224" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="294" y="220" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">corrosion pit (wall loss)</text>

  <!-- plate -->
  <rect x="120" y="258" width="560" height="72" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="145" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">S</text>
  <text x="655" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">N</text>
  <path d="M368,258 C378,258 382,288 400,288 C418,288 422,258 432,258 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- flux lines inside the wall, crowding under the pit -->
  <path d="M168,272 H346 C366,272 370,298 400,298 C430,298 434,272 454,272 H632" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M168,306 H352 C370,306 374,313 400,313 C426,313 430,306 448,306 H632" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M168,322 H632" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="295,267 308,272 295,277" fill="#1E66F5"/>
  <polygon points="585,267 598,272 585,277" fill="#1E66F5"/>
  <polygon points="295,301 308,306 295,311" fill="#1E66F5"/>
  <polygon points="585,301 598,306 585,311" fill="#1E66F5"/>
  <polygon points="295,317 308,322 295,327" fill="#1E66F5"/>
  <polygon points="585,317 598,322 585,327" fill="#1E66F5"/>

  <!-- leakage field breaking out above the pit, reaching the sensor -->
  <path d="M384,256 Q400,224 416,256" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <path d="M374,257 Q400,204 426,257" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>

  <text x="400" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">steel plate or pipe wall — magnetized near saturation, flux S to N</text>

  <!-- takeaway bar -->
  <rect x="90" y="392" width="620" height="48" rx="8" fill="#0B1F3A"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Deeper metal loss leaks more flux — the axial peak and the radial</text>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">zero-crossing line up over the defect center at the dashed line.</text>
</svg>
