<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Four Ways to Find a Leak</text>

  <!-- dividers -->
  <line x1="400" y1="44" x2="400" y2="440" stroke="#DCE6F2" stroke-width="2"/>
  <line x1="14" y1="242" x2="786" y2="242" stroke="#DCE6F2" stroke-width="2"/>

  <!-- Q1: bubble -->
  <text x="200" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">1 · Bubble testing</text>
  <rect x="60" y="100" width="200" height="105" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="100" y="148" width="84" height="46" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="142" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">pressurized</text>
  <circle cx="188" cy="140" r="3" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="194" cy="128" r="4" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <circle cx="201" cy="114" r="5" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <line x1="206" y1="110" x2="262" y2="92" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="266" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">bubble stream</text>
  <text x="266" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">marks the leak</text>
  <text x="160" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">immersion bath (or solution film on joints)</text>
  <text x="200" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">film 10⁻³–10⁻⁴ · immersion to 10⁻⁵ std cm³/s</text>

  <!-- Q2: pressure change -->
  <text x="600" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">2 · Pressure change</text>
  <line x1="470" y1="88" x2="470" y2="200" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="470" y1="200" x2="706" y2="200" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="704,194 704,206 718,200" fill="#0B1F3A"/>
  <text x="722" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">time</text>
  <text x="470" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">P (absolute)</text>
  <path d="M470,102 C540,114 620,134 700,158" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <line x1="470" y1="102" x2="700" y2="102" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="106" x2="700" y2="154" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="694,108 706,108 700,98" fill="#0B1F3A"/>
  <polygon points="694,150 706,150 700,160" fill="#0B1F3A"/>
  <text x="688" y="134" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">ΔP</text>
  <text x="600" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">totals every leak in the boundary at once · locates none</text>
  <text x="600" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">correct for temperature: ~3 °C ≈ 1% of absolute P</text>

  <!-- Q3: halogen -->
  <text x="200" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">3 · Halogen detector probe</text>
  <rect x="45" y="306" width="155" height="40" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="115" y="298" width="8" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="129" y="298" width="8" height="56" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="126" y1="294" x2="126" y2="278" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="121,280 131,280 126,270" fill="#1E66F5"/>
  <circle cx="142" cy="287" r="4" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <line x1="146" y1="285" x2="232" y2="272" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="232" y="256" width="124" height="44" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="294" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">heated-anode</text>
  <text x="294" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">diode detector</text>
  <text x="122" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">R-134a / SF₆ tracer inside, above atmospheric</text>
  <text x="200" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">positive-ion emission jumps when halogen arrives</text>
  <text x="200" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">locates joints at ~10⁻⁵–10⁻⁶ std cm³/s</text>

  <!-- Q4: helium mass spectrometer -->
  <text x="600" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">4 · Mass spectrometer (helium)</text>
  <circle cx="448" cy="288" r="12" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="448" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E66F5">He</text>
  <line x1="458" y1="295" x2="482" y2="310" stroke="#1E66F5" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="478,312 486,304 490,316" fill="#1E66F5"/>
  <rect x="470" y="306" width="120" height="78" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="530" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">part under test</text>
  <text x="530" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">(evacuated)</text>
  <line x1="590" y1="345" x2="636" y2="345" stroke="#0B1F3A" stroke-width="3"/>
  <rect x="636" y="316" width="140" height="58" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <text x="706" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">MSLD</text>
  <text x="706" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">tuned to mass 4</text>
  <text x="600" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">helium: inert, fast, only ≈5 ppm of air</text>
  <text x="600" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">total-leakage modes reach 10⁻⁹–10⁻¹¹ std cm³/s</text>
</svg>
