<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Barlow, Arial, sans-serif">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0B1F3A">OPTICAL FLAT FRINGE PATTERNS AND THE AIR WEDGE</text>

  <!-- LEFT: air wedge side view -->
  <g>
    <rect x="28" y="62" width="350" height="230" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="203" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">SIDE VIEW — THE AIR WEDGE</text>

    <!-- monochromatic source rays -->
    <text x="96" y="112" font-size="10" fill="#5b6b7c">MONOCHROMATIC LIGHT (HELIUM, λ = 23.2 µin)</text>
    <line x1="120" y1="120" x2="150" y2="170" stroke="#e0a000" stroke-width="1.6" marker-end="url(#arrB)"/>
    <line x1="180" y1="120" x2="210" y2="170" stroke="#e0a000" stroke-width="1.6" marker-end="url(#arrB)"/>
    <line x1="240" y1="120" x2="270" y2="170" stroke="#e0a000" stroke-width="1.6" marker-end="url(#arrB)"/>

    <!-- optical flat (tilted slightly) -->
    <polygon points="60,176 348,168 348,196 60,204" fill="#bcd6f5" opacity="0.7" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="204" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#0B1F3A">OPTICAL FLAT</text>

    <!-- air wedge gap -->
    <polygon points="60,204 348,196 348,212 60,212" fill="#fff3cc" stroke="none"/>
    <text x="320" y="226" text-anchor="end" font-size="10" fill="#a07400">AIR WEDGE (exaggerated)</text>

    <!-- workpiece -->
    <rect x="60" y="212" width="288" height="30" fill="#90a4b8"/>
    <text x="204" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">WORK SURFACE</text>

    <!-- fringe marks where gap = multiples of half wave -->
    <circle cx="118" cy="208" r="3" fill="#0B1F3A"/>
    <circle cx="196" cy="206" r="3" fill="#0B1F3A"/>
    <circle cx="274" cy="204" r="3" fill="#0B1F3A"/>
    <text x="203" y="262" text-anchor="middle" font-size="11" fill="#0B1F3A">A dark fringe appears wherever the air gap grows by λ/2</text>
    <text x="203" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#1E66F5">1 fringe = λ/2 ≈ 11.6 µin (0.29 µm) of height change</text>
  </g>

  <!-- RIGHT: top-view fringe patterns -->
  <g>
    <rect x="402" y="62" width="374" height="230" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="589" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">WHAT THE FRINGES SAY</text>

    <!-- pattern 1: straight, even -->
    <g>
      <rect x="420" y="100" width="100" height="130" rx="6" fill="#ffffff" stroke="#0B1F3A" stroke-width="1.5"/>
      <line x1="430" y1="118" x2="510" y2="118" stroke="#0B1F3A" stroke-width="3"/>
      <line x1="430" y1="140" x2="510" y2="140" stroke="#0B1F3A" stroke-width="3"/>
      <line x1="430" y1="162" x2="510" y2="162" stroke="#0B1F3A" stroke-width="3"/>
      <line x1="430" y1="184" x2="510" y2="184" stroke="#0B1F3A" stroke-width="3"/>
      <line x1="430" y1="206" x2="510" y2="206" stroke="#0B1F3A" stroke-width="3"/>
      <text x="470" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#1a8a3c">FLAT</text>
      <text x="470" y="264" text-anchor="middle" font-size="9.5" fill="#0B1F3A">straight, parallel, evenly spaced</text>
    </g>

    <!-- pattern 2: curved -->
    <g>
      <rect x="538" y="100" width="100" height="130" rx="6" fill="#ffffff" stroke="#0B1F3A" stroke-width="1.5"/>
      <path d="M548 122 q40 -14 80 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <path d="M548 146 q40 -14 80 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <path d="M548 170 q40 -14 80 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <path d="M548 194 q40 -14 80 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <path d="M548 218 q40 -14 80 0" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <text x="588" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#d28a00">CURVED SURFACE</text>
      <text x="588" y="264" text-anchor="middle" font-size="9.5" fill="#0B1F3A">bow = curvature along the fringe</text>
    </g>

    <!-- pattern 3: circular -->
    <g>
      <rect x="656" y="100" width="100" height="130" rx="6" fill="#ffffff" stroke="#0B1F3A" stroke-width="1.5"/>
      <circle cx="706" cy="165" r="12" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <circle cx="706" cy="165" r="26" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <circle cx="706" cy="165" r="40" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <circle cx="706" cy="165" r="54" fill="none" stroke="#0B1F3A" stroke-width="3"/>
      <text x="706" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#d23b3b">DOME / HOLLOW</text>
      <text x="706" y="264" text-anchor="middle" font-size="9.5" fill="#0B1F3A">bullseye = high or low spot</text>
    </g>
  </g>

  <!-- bottom band -->
  <rect x="28" y="312" width="748" height="98" rx="8" fill="#eef4fc" stroke="#1E66F5" stroke-width="1"/>
  <text x="48" y="340" font-size="13" font-weight="700" fill="#0B1F3A">READING THE COUNT</text>
  <text x="48" y="364" font-size="12" fill="#0B1F3A">Count the fringes crossing the surface and multiply by half the wavelength: five fringes under helium light means the</text>
  <text x="48" y="384" font-size="12" fill="#0B1F3A">surface departs from flat by about 5 × 11.6 = 58 µin. More fringes per inch = steeper wedge; perfect flatness shows almost no fringes.</text>

  <defs>
    <marker id="arrB" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 z" fill="#e0a000"/>
    </marker>
  </defs>
</svg>
