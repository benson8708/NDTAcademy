<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Single-V Butt Weld — Double-Loaded Film on the Illuminator</text>

  <!-- film -->
  <rect x="50" y="60" width="700" height="330" rx="8" fill="#353D45" stroke="#0B1F3A" stroke-width="3"/>
  <!-- weld image: reinforcement prints lighter than the plate -->
  <rect x="52" y="190" width="696" height="90" fill="#5E6A75"/>
  <path d="M 140 194 Q 132 235 140 276 M 230 194 Q 222 235 230 276 M 320 194 Q 312 235 320 276 M 410 194 Q 402 235 410 276 M 500 194 Q 492 235 500 276 M 590 194 Q 582 235 590 276 M 680 194 Q 672 235 680 276" fill="none" stroke="#DCE3E9" stroke-width="1.5" opacity="0.12"/>

  <!-- hole-type IQI on the plate, source side -->
  <rect x="84" y="120" width="64" height="24" fill="#97A2AC"/>
  <circle cx="98" cy="132" r="2.2" fill="#353D45"/>
  <circle cx="114" cy="132" r="3.2" fill="#353D45"/>
  <circle cx="134" cy="132" r="5" fill="#353D45"/>
  <text x="116" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#DCE3E9">hole-type IQI</text>

  <!-- 1: bright tungsten fleck (region 140,205,70,58) -->
  <circle cx="175" cy="235" r="9" fill="#F4F7F9" opacity="0.3"/>
  <circle cx="175" cy="235" r="5" fill="#F4F7F9"/>
  <circle cx="152" cy="213" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">1</text>

  <!-- 2: straight dark centerline = incomplete penetration (region 288,218,264,46) -->
  <line x1="300" y1="240" x2="540" y2="240" stroke="#14181C" stroke-width="4.5"/>
  <circle cx="300" cy="222" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="300" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">2</text>

  <!-- 3: slag line along the bevel, off center (region 368,184,104,30) -->
  <ellipse cx="408" cy="200" rx="13" ry="4.5" fill="#1A1F24"/>
  <ellipse cx="432" cy="197" rx="9" ry="4" fill="#1A1F24"/>
  <ellipse cx="454" cy="202" rx="11" ry="4" fill="#1A1F24"/>
  <circle cx="380" cy="198" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="380" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">3</text>

  <!-- 4: rounded porosity cluster (region 574,198,100,64) -->
  <circle cx="608" cy="224" r="3.2" fill="#14181C"/>
  <circle cx="620" cy="218" r="2.6" fill="#14181C"/>
  <circle cx="630" cy="228" r="3.8" fill="#14181C"/>
  <circle cx="612" cy="238" r="2.8" fill="#14181C"/>
  <circle cx="626" cy="242" r="3" fill="#14181C"/>
  <circle cx="640" cy="234" r="2.5" fill="#14181C"/>
  <circle cx="600" cy="233" r="2.4" fill="#14181C"/>
  <circle cx="586" cy="210" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="586" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">4</text>

  <!-- 5: light crescent in the parent plate (region 606,298,100,62) -->
  <path d="M 632 340 Q 654 312 682 332" fill="none" stroke="#C2CCD4" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="618" cy="310" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="618" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">5</text>

  <!-- legend -->
  <rect x="90" y="412" width="16" height="16" fill="#14181C" stroke="#0B1F3A" stroke-width="1"/>
  <text x="114" y="425" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">darker = less metal in the beam (void, missing root)</text>
  <rect x="470" y="412" width="16" height="16" fill="#F4F7F9" stroke="#0B1F3A" stroke-width="1"/>
  <text x="494" y="425" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">lighter = extra absorption (thicker or higher-Z)</text>
</svg>
