<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#D14343"/></marker>
    <marker id="arN" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1E66F5"/></marker>
    <marker id="arK" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0B1F3A"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Capturing the Neutron Image: Direct vs. Transfer Exposure</text>

  <!-- LEFT CARD: DIRECT -->
  <rect x="24" y="50" width="370" height="336" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="24" y="50" width="370" height="30" rx="8" fill="#0B1F3A"/>
  <rect x="24" y="66" width="370" height="14" fill="#0B1F3A"/>
  <text x="209" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">DIRECT EXPOSURE</text>

  <text x="86" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D14343">n beam</text>
  <line x1="44" y1="130" x2="112" y2="130" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="44" y1="160" x2="112" y2="160" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="44" y1="190" x2="112" y2="190" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>

  <rect x="128" y="110" width="52" height="110" fill="#D7E3F4" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="154" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">object</text>
  <line x1="186" y1="160" x2="202" y2="160" stroke="#D14343" stroke-width="2" marker-end="url(#arR)"/>

  <rect x="210" y="98" width="126" height="134" fill="none" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="273" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">vacuum cassette</text>
  <rect x="238" y="106" width="18" height="118" fill="#F2F4F8" stroke="#0B1F3A" stroke-width="1"/>
  <rect x="258" y="106" width="10" height="118" fill="#1E66F5"/>
  <line x1="258" y1="140" x2="244" y2="140" stroke="#1E66F5" stroke-width="2" marker-end="url(#arN)"/>
  <line x1="258" y1="175" x2="244" y2="175" stroke="#1E66F5" stroke-width="2" marker-end="url(#arN)"/>
  <text x="300" y="128" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">Gd screen</text>
  <text x="300" y="143" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">(~25 &#181;m)</text>
  <text x="300" y="170" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">film</text>
  <text x="300" y="185" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">(single</text>
  <text x="300" y="199" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">emulsion)</text>

  <text x="209" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Screen and film share the beam: capture in Gd-157</text>
  <text x="209" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">ejects ~70 keV conversion electrons into the emulsion.</text>
  <text x="209" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">Finest resolution &#183; needs a clean, low-gamma beam</text>

  <!-- RIGHT CARD: TRANSFER -->
  <rect x="406" y="50" width="370" height="336" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="406" y="50" width="370" height="30" rx="8" fill="#0B1F3A"/>
  <rect x="406" y="66" width="370" height="14" fill="#0B1F3A"/>
  <text x="591" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">TRANSFER (INDIRECT) EXPOSURE</text>

  <text x="591" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">1 &#8212; Activate the foil in the beam</text>
  <line x1="426" y1="138" x2="480" y2="138" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="426" y1="160" x2="480" y2="160" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>
  <line x1="426" y1="182" x2="480" y2="182" stroke="#D14343" stroke-width="2.5" marker-end="url(#arR)"/>
  <rect x="494" y="122" width="44" height="84" fill="#D7E3F4" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="516" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">object</text>
  <rect x="558" y="118" width="10" height="92" fill="#D14343"/>
  <line x1="572" y1="150" x2="594" y2="150" stroke="#0B1F3A" stroke-width="1"/>
  <text x="599" y="146" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">Dy or In foil</text>
  <text x="599" y="161" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">no film in the beam</text>
  <text x="591" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">Capture builds an activation image: Dy-165 t&#189; = 2.34 h &#183; In-116m t&#189; = 54 min</text>

  <line x1="591" y1="246" x2="591" y2="266" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arK)"/>
  <text x="601" y="260" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">carry to darkroom</text>

  <text x="591" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2 &#8212; Foil decays against film, away from the beam</text>
  <rect x="496" y="298" width="190" height="50" rx="4" fill="#F2F4F8" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="572" y="304" width="10" height="38" fill="#D14343"/>
  <rect x="584" y="304" width="16" height="38" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1"/>
  <text x="540" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">foil &#8594;</text>
  <text x="634" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">&#8592; film</text>
  <text x="591" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">Decay radiation from the foil exposes the film over a few half-lives &#8212;</text>
  <text x="591" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">gamma-blind: the technique for radioactive specimens</text>

  <!-- Bottom note bar -->
  <rect x="24" y="400" width="752" height="42" rx="8" fill="#0B1F3A"/>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">Direct: resolution and speed in a clean beam. Transfer: the foil carries the image out.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">In transfer work the film never sees the beam &#8212; gamma fog from irradiated objects cannot reach it.</text>
</svg>
