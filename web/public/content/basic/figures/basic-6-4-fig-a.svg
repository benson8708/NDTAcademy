<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">IR Applications: The Five Investigation Families</text>

  <!-- ===== Panel 1: exothermic / endothermic ===== -->
  <rect x="35" y="48" width="235" height="187" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="152" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">1 &#183; EXOTHERMIC / ENDOTHERMIC</text>
  <!-- bolted joint with I2R glow -->
  <circle cx="140" cy="104" r="26" fill="#D14343" opacity="0.15"/>
  <circle cx="140" cy="104" r="16" fill="#D14343" opacity="0.35"/>
  <circle cx="140" cy="104" r="9" fill="#D14343" opacity="0.65"/>
  <rect x="58" y="96" width="78" height="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="144" y="96" width="78" height="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="140" cy="104" r="5" fill="#0B1F3A"/>
  <text x="152" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">loose connection &#8212; I&#178;R heat</text>
  <!-- gas leak cooling -->
  <rect x="62" y="158" width="120" height="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="178" cy="156" r="5" fill="#1E66F5" opacity="0.45"/>
  <ellipse cx="188" cy="147" rx="13" ry="8" fill="#1E66F5" opacity="0.3"/>
  <ellipse cx="200" cy="137" rx="9" ry="6" fill="#1E66F5" opacity="0.22"/>
  <text x="152" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">compressed-gas leak &#8212; expansion</text>
  <text x="152" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">cooling prints a cold spot</text>

  <!-- ===== Panel 2: friction ===== -->
  <rect x="283" y="48" width="234" height="187" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">2 &#183; FRICTION</text>
  <circle cx="400" cy="132" r="30" fill="#D14343" opacity="0.15"/>
  <circle cx="400" cy="132" r="19" fill="#D14343" opacity="0.35"/>
  <circle cx="400" cy="132" r="10" fill="#D14343" opacity="0.65"/>
  <line x1="300" y1="132" x2="500" y2="132" stroke="#0B1F3A" stroke-width="5"/>
  <path d="M 318 116 A 18 18 0 1 0 318 148" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="313,111 325,116 315,125" fill="#1E66F5"/>
  <rect x="372" y="112" width="56" height="40" rx="6" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="360" y="152" width="80" height="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">overheated bearing housing</text>
  <text x="400" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A" opacity="0.75">also couplings, belts, brakes, gears</text>

  <!-- ===== Panel 3: fluid flow ===== -->
  <rect x="531" y="48" width="234" height="187" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="648" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">3 &#183; FLUID FLOW</text>
  <circle cx="648" cy="138" r="54" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="626" cy="116" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="648" cy="116" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="670" cy="116" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="626" cy="138" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="648" cy="138" r="7" fill="#1E66F5" fill-opacity="0.6" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="670" cy="138" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="626" cy="160" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="648" cy="160" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <circle cx="670" cy="160" r="7" fill="#D14343" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="1"/>
  <text x="648" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">one plugged tube (cool) among</text>
  <text x="648" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">flowing neighbors (warm)</text>

  <!-- ===== Panel 4: thermal resistance ===== -->
  <rect x="150" y="248" width="235" height="180" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="267" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">4 &#183; THERMAL RESISTANCE</text>
  <rect x="168" y="286" width="44" height="108" fill="#D14343" opacity="0.3"/>
  <rect x="212" y="286" width="58" height="108" fill="#9BC4FF" opacity="0.3" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="212,318 244,334 212,350" fill="#D14343" opacity="0.5"/>
  <rect x="270" y="286" width="10" height="108" fill="#0B1F3A" opacity="0.55"/>
  <circle cx="275" cy="334" r="16" fill="#D14343" opacity="0.35"/>
  <circle cx="275" cy="334" r="9" fill="#D14343" opacity="0.6"/>
  <line x1="176" y1="302" x2="200" y2="302" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="200,298 208,302 200,306" fill="#0B1F3A"/>
  <line x1="176" y1="334" x2="200" y2="334" stroke="#D14343" stroke-width="3"/>
  <polygon points="200,329 210,334 200,339" fill="#D14343"/>
  <line x1="176" y1="366" x2="200" y2="366" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="200,362 208,366 200,370" fill="#0B1F3A"/>
  <line x1="284" y1="334" x2="306" y2="334" stroke="#D14343" stroke-width="3"/>
  <polygon points="306,329 316,334 306,339" fill="#D14343"/>
  <text x="322" y="330" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">hot spot</text>
  <text x="322" y="344" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">on shell</text>
  <text x="190" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0B1F3A">interior</text>
  <text x="241" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0B1F3A">lining</text>
  <text x="275" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0B1F3A">shell</text>
  <text x="267" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">thin lining = low resistance = hot shell spot</text>

  <!-- ===== Panel 5: thermal capacitance ===== -->
  <rect x="415" y="248" width="235" height="180" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="532" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">5 &#183; THERMAL CAPACITANCE</text>
  <rect x="440" y="288" width="114" height="44" fill="#D14343" opacity="0.22"/>
  <rect x="440" y="332" width="114" height="64" fill="#1E66F5" opacity="0.3"/>
  <rect x="438" y="286" width="118" height="112" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="440" y1="332" x2="554" y2="332" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="600" cy="300" r="11" fill="#D14343" opacity="0.6"/>
  <line x1="600" y1="282" x2="600" y2="276" stroke="#D14343" stroke-width="1.8"/>
  <line x1="600" y1="318" x2="600" y2="324" stroke="#D14343" stroke-width="1.8"/>
  <line x1="582" y1="300" x2="576" y2="300" stroke="#D14343" stroke-width="1.8"/>
  <line x1="618" y1="300" x2="624" y2="300" stroke="#D14343" stroke-width="1.8"/>
  <line x1="554" y1="332" x2="576" y2="346" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="580" y="350" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">level</text>
  <text x="580" y="363" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">line</text>
  <text x="532" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">during a transient the vapor space</text>
  <text x="532" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">leads and the liquid lags</text>
</svg>
