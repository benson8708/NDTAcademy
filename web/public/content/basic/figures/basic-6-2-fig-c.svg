<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Read the A-Scan: Locate the Reflector</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">Straight beam on a 2.00 in. steel plate · sweep calibrated 0–2.50 in. of steel</text>

  <!-- screen frame -->
  <rect x="58" y="78" width="545" height="300" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- vertical grid: 0.50 in per division (104 px) -->
  <line x1="70" y1="88" x2="70" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="174" y1="88" x2="174" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="278" y1="88" x2="278" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="382" y1="88" x2="382" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="486" y1="88" x2="486" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="590" y1="88" x2="590" y2="368" stroke="#D7E0F0" stroke-width="1"/>
  <!-- horizontal grid: 25% FSH steps -->
  <line x1="70" y1="110" x2="590" y2="110" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="70" y1="172" x2="590" y2="172" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="70" y1="235" x2="590" y2="235" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="70" y1="297" x2="590" y2="297" stroke="#D7E0F0" stroke-width="1"/>
  <!-- baseline -->
  <line x1="70" y1="360" x2="590" y2="360" stroke="#0B1F3A" stroke-width="2"/>

  <!-- A: initial pulse -->
  <polyline points="70,360 74,118 78,300 80,130 83,360" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- B: grass -->
  <polyline points="118,360 126,345 134,354 142,341 150,353 158,339 166,354 174,344 182,356 190,346 198,357 206,348 214,360" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <!-- C: echo at 1.40 in (x = 70 + 1.40*208 = 361) -->
  <polyline points="352,360 361,192 370,360" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <!-- D: echo at 2.00 in (x = 486) -->
  <polyline points="478,360 486,242 494,360" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <!-- reference: BW height on adjacent sound metal -->
  <line x1="468" y1="196" x2="506" y2="196" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="487" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E66F5">height on sound metal</text>

  <!-- letter markers -->
  <circle cx="98" cy="150" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="98" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A</text>
  <line x1="92" y1="158" x2="84" y2="170" stroke="#0B1F3A" stroke-width="1.2"/>
  <circle cx="168" cy="310" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="168" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B</text>
  <line x1="168" y1="321" x2="168" y2="336" stroke="#0B1F3A" stroke-width="1.2"/>
  <circle cx="390" cy="178" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="390" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C</text>
  <line x1="382" y1="184" x2="366" y2="196" stroke="#0B1F3A" stroke-width="1.2"/>
  <circle cx="515" cy="222" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="515" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">D</text>
  <line x1="507" y1="228" x2="492" y2="244" stroke="#0B1F3A" stroke-width="1.2"/>

  <!-- x tick labels (inside frame) -->
  <text x="74" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">0</text>
  <text x="174" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">0.50</text>
  <text x="278" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">1.00</text>
  <text x="382" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">1.50</text>
  <text x="486" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">2.00</text>
  <text x="586" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A">2.50</text>
  <text x="46" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0B1F3A" transform="rotate(-90 46 230)">% FSH</text>

  <!-- part sketch -->
  <line x1="700" y1="92" x2="700" y2="108" stroke="#0B1F3A" stroke-width="3.5"/>
  <rect x="672" y="108" width="56" height="26" rx="4" fill="#0B1F3A"/>
  <rect x="640" y="134" width="120" height="208" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="770" y1="134" x2="770" y2="342" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="766,140 774,140 770,134" fill="#0B1F3A"/>
  <polygon points="766,336 774,336 770,342" fill="#0B1F3A"/>
  <text x="784" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A" transform="rotate(-90 784 238)">2.00 in.</text>
  <text x="700" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">one reflector somewhere</text>
  <text x="700" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">in this plate</text>

  <!-- legend -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">A spike at zero · B grass past the pulse · C echo at 1.40 in. · D echo at 2.00 in.</text>

  <!-- takeaway -->
  <rect x="120" y="412" width="560" height="30" rx="8" fill="#0B1F3A"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="bold" fill="#FFFFFF">The plate thickness is the key — it identifies three of these four signals.</text>
</svg>
