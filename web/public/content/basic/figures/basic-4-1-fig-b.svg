<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Circular vs. Longitudinal Magnetization</text>

  <!-- ============ PANEL 1: CIRCULAR (head shot) ============ -->
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">1 — CIRCULAR (head shot)</text>

  <!-- contact pads -->
  <rect x="150" y="90" width="36" height="96" rx="4" fill="#0B1F3A"/>
  <rect x="614" y="90" width="36" height="96" rx="4" fill="#0B1F3A"/>
  <!-- part -->
  <rect x="186" y="98" width="428" height="80" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- transverse crack (missed) drawn first so rings overlay -->
  <polyline points="560,104 556,116 563,128 557,140 562,152 557,164 561,172" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <!-- current arrow through the part -->
  <line x1="210" y1="138" x2="556" y2="138" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="556,131 572,138 556,145" fill="#0B1F3A"/>
  <text x="243" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">current I</text>

  <!-- circular flux rings -->
  <ellipse cx="290" cy="138" rx="13" ry="52" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="284,84 296,86 287,94" fill="#1E66F5"/>
  <ellipse cx="490" cy="138" rx="13" ry="52" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="484,84 496,86 487,94" fill="#1E66F5"/>
  <text x="290" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">flux circles the part</text>

  <!-- axial crack (found) on top surface -->
  <polyline points="370,106 378,102 386,108 394,103 402,107 410,102 418,107 426,103 434,106" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="376" cy="92" r="2.5" fill="#0B1F3A"/>
  <circle cx="384" cy="89" r="2.5" fill="#0B1F3A"/>
  <circle cx="392" cy="93" r="2.5" fill="#0B1F3A"/>
  <circle cx="400" cy="88" r="2.5" fill="#0B1F3A"/>
  <circle cx="408" cy="92" r="2.5" fill="#0B1F3A"/>
  <circle cx="416" cy="89" r="2.5" fill="#0B1F3A"/>
  <circle cx="424" cy="93" r="2.5" fill="#0B1F3A"/>
  <text x="402" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">indication — axial flaw</text>
  <text x="560" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">missed (transverse)</text>

  <text x="400" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Current along the axis → flux around the circumference → finds AXIAL flaws</text>

  <line x1="60" y1="248" x2="740" y2="248" stroke="#9BC4FF" stroke-width="2"/>

  <!-- ============ PANEL 2: LONGITUDINAL (coil shot) ============ -->
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E66F5">2 — LONGITUDINAL (coil shot)</text>

  <!-- part -->
  <rect x="200" y="312" width="400" height="76" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- axial crack (missed) drawn before coil turns -->
  <polyline points="260,332 270,328 280,334 290,329 300,333 310,329 320,333 330,330" fill="none" stroke="#FFFFFF" stroke-width="3"/>

  <!-- coil turns over the part -->
  <rect x="233" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <rect x="293" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <rect x="353" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <rect x="413" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <rect x="473" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <rect x="533" y="292" width="14" height="116" rx="7" fill="#1E66F5"/>
  <text x="240" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">coil current</text>

  <!-- longitudinal flux arrows inside the part (in gaps between turns) -->
  <line x1="254" y1="352" x2="282" y2="352" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="282,346 294,352 282,358" fill="#0B1F3A"/>
  <line x1="374" y1="352" x2="402" y2="352" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="402,346 414,352 402,358" fill="#0B1F3A"/>
  <line x1="494" y1="352" x2="522" y2="352" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="522,346 534,352 522,358" fill="#0B1F3A"/>
  <text x="612" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">flux along the axis</text>

  <!-- transverse crack (found) -->
  <polyline points="570,316 566,328 572,340 566,352 571,364 567,376 570,384" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="578" cy="320" r="2.5" fill="#0B1F3A"/>
  <circle cx="561" cy="330" r="2.5" fill="#0B1F3A"/>
  <circle cx="579" cy="342" r="2.5" fill="#0B1F3A"/>
  <circle cx="560" cy="352" r="2.5" fill="#0B1F3A"/>
  <circle cx="578" cy="366" r="2.5" fill="#0B1F3A"/>
  <circle cx="561" cy="374" r="2.5" fill="#0B1F3A"/>
  <text x="592" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">indication — transverse flaw</text>
  <text x="277" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">missed (axial)</text>

  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Current around the part (coil) → flux along the axis → finds TRANSVERSE flaws</text>
  <text x="400" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">Flux must cross the flaw — full coverage takes both shots, 90° apart.</text>
</svg>
