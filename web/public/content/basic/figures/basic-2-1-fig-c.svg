<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0B1F3A">Locating an AE Source on a Pressure Vessel</text>
  <text x="400" y="57" text-anchor="middle" font-size="15" fill="#1E66F5">the nearest sensor hears the burst first &#8212; arrival-time differences (&#916;T) triangulate the source</text>

  <defs>
    <clipPath id="shellClip"><rect x="150" y="150" width="470" height="170" rx="85"/></clipPath>
  </defs>

  <!-- pressurization pump -->
  <rect x="30" y="208" width="86" height="54" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="73" y="230" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">PUMP</text>
  <text x="73" y="248" text-anchor="middle" font-size="14" fill="#1E66F5">ramp + holds</text>
  <line x1="116" y1="235" x2="150" y2="235" stroke="#0B1F3A" stroke-width="4"/>
  <text x="30" y="282" font-size="14" fill="#0B1F3A">controlled pressurization</text>

  <!-- vessel shell -->
  <rect x="150" y="150" width="470" height="170" rx="85" fill="#9BC4FF" fill-opacity="0.35" stroke="#0B1F3A" stroke-width="3"/>

  <!-- saddles -->
  <rect x="230" y="320" width="64" height="44" fill="#0B1F3A"/>
  <rect x="470" y="320" width="64" height="44" fill="#0B1F3A"/>

  <!-- wavefronts from the source (clipped to shell) -->
  <g clip-path="url(#shellClip)">
    <circle cx="560" cy="268" r="24" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
    <circle cx="560" cy="268" r="46" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
    <circle cx="560" cy="268" r="68" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- wave rays to the sensors -->
  <line x1="560" y1="268" x2="535" y2="152" stroke="#1E66F5" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="528,160 541,157 534,146" fill="#1E66F5"/>
  <line x1="560" y1="268" x2="401" y2="152" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="7,5" opacity="0.75"/>
  <line x1="560" y1="268" x2="211" y2="152" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="7,5" opacity="0.55"/>

  <!-- crack + source -->
  <polyline points="547,316 555,296 549,284 560,268" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <line x1="560" y1="256" x2="560" y2="280" stroke="#1E66F5" stroke-width="2"/>
  <line x1="548" y1="268" x2="572" y2="268" stroke="#1E66F5" stroke-width="2"/>
  <line x1="551" y1="259" x2="569" y2="277" stroke="#1E66F5" stroke-width="2"/>
  <line x1="569" y1="259" x2="551" y2="277" stroke="#1E66F5" stroke-width="2"/>
  <line x1="566" y1="300" x2="630" y2="340" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="634" y="346" font-size="15" font-weight="bold" fill="#0B1F3A">active flaw</text>

  <!-- sensors on the shell -->
  <rect x="196" y="128" width="30" height="22" rx="3" fill="#0B1F3A"/>
  <text x="205" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">S1</text>
  <circle cx="240" cy="139" r="12" fill="#1E66F5"/>
  <text x="240" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>

  <rect x="386" y="128" width="30" height="22" rx="3" fill="#0B1F3A"/>
  <text x="395" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">S3</text>
  <circle cx="430" cy="139" r="12" fill="#1E66F5"/>
  <text x="430" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>

  <rect x="520" y="128" width="30" height="22" rx="3" fill="#0B1F3A"/>
  <text x="529" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">S2</text>
  <circle cx="564" cy="139" r="12" fill="#1E66F5"/>
  <text x="564" y="144" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">1</text>

  <text x="320" y="388" text-anchor="middle" font-size="14" fill="#1E66F5">badges show order of arrival: 1 = first hit</text>

  <!-- cables to preamps -->
  <line x1="224" y1="128" x2="224" y2="92" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="414" y1="128" x2="414" y2="92" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="544" y1="128" x2="544" y2="92" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="224" y1="92" x2="648" y2="92" stroke="#0B1F3A" stroke-width="2"/>

  <!-- preamps -->
  <rect x="648" y="70" width="124" height="56" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="710" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">PREAMPS</text>
  <text x="710" y="112" text-anchor="middle" font-size="14" fill="#1E66F5">one per channel</text>
  <line x1="746" y1="126" x2="746" y2="400" stroke="#0B1F3A" stroke-width="2"/>

  <!-- AE system -->
  <rect x="430" y="400" width="340" height="72" rx="6" fill="#0B1F3A"/>
  <text x="600" y="426" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">MULTICHANNEL AE SYSTEM</text>
  <text x="600" y="448" text-anchor="middle" font-size="14" fill="#9BC4FF">time-stamps every hit &#8212; &#916;T between sensors</text>
  <text x="600" y="466" text-anchor="middle" font-size="14" fill="#9BC4FF">locates the source on the shell</text>

  <!-- pressure-hold note -->
  <text x="36" y="402" font-size="15" font-weight="bold" fill="#0B1F3A">pressure holds:</text>
  <text x="36" y="422" font-size="14" fill="#0B1F3A">a sound structure falls silent</text>
  <text x="36" y="440" font-size="14" fill="#0B1F3A">under constant load &#8212; continuing</text>
  <text x="36" y="458" font-size="14" fill="#0B1F3A">emission marks a growing flaw</text>

  <text x="400" y="494" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">one fixed array, whole-vessel coverage &#8212; AE locates the source; another method sizes it</text>
</svg>
