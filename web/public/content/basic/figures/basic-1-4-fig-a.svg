<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Eligibility Pathways to the Level III Examinations</text>

  <!-- Lane 1 -->
  <rect x="36" y="84" width="300" height="74" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="186" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Four-year engineering or</text>
  <text x="186" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">science degree (accredited)</text>
  <line x1="338" y1="121" x2="368" y2="121" stroke="#0A2342" stroke-width="3"/>
  <polygon points="364,113 380,121 364,129" fill="#0A2342"/>
  <rect x="384" y="84" width="176" height="74" rx="8" fill="#F2A33C"/>
  <text x="472" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">+ 1 year</text>
  <text x="472" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">NDT experience</text>

  <!-- Lane 2 -->
  <rect x="36" y="188" width="300" height="74" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="186" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Two years engineering or science</text>
  <text x="186" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">study (college or technical school)</text>
  <line x1="338" y1="225" x2="368" y2="225" stroke="#0A2342" stroke-width="3"/>
  <polygon points="364,217 380,225 364,233" fill="#0A2342"/>
  <rect x="384" y="188" width="176" height="74" rx="8" fill="#F2A33C"/>
  <text x="472" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">+ 2 years</text>
  <text x="472" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">NDT experience</text>

  <!-- Lane 3 -->
  <rect x="36" y="292" width="300" height="74" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="186" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">High-school graduate</text>
  <text x="186" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">or equivalent</text>
  <line x1="338" y1="329" x2="368" y2="329" stroke="#0A2342" stroke-width="3"/>
  <polygon points="364,321 380,329 364,337" fill="#0A2342"/>
  <rect x="384" y="292" width="176" height="74" rx="8" fill="#F2A33C"/>
  <text x="472" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A2342">+ 4 years</text>
  <text x="472" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">NDT experience</text>

  <!-- converging arrows -->
  <line x1="562" y1="121" x2="612" y2="200" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="600,198 618,210 612,190" fill="#1B82E8"/>
  <line x1="562" y1="225" x2="610" y2="225" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="606,217 622,225 606,233" fill="#1B82E8"/>
  <line x1="562" y1="329" x2="612" y2="252" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="612,262 618,242 600,254" fill="#1B82E8"/>

  <!-- eligible box -->
  <rect x="624" y="166" width="150" height="120" rx="8" fill="#1E9E6A"/>
  <text x="699" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">ELIGIBLE</text>
  <text x="699" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">for the Basic +</text>
  <text x="699" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Method exams</text>

  <!-- bottom note -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">More formal technical education, less required experience — never zero.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">Experience must be comparable to Level II work in the method, documented and verifiable.</text>
</svg>
