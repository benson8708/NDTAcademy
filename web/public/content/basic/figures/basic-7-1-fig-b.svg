<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Selecting the Visual Technique</text>

  <!-- decision box -->
  <rect x="210" y="46" width="380" height="62" rx="10" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="400" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">Can the eye reach within 24 in. (600 mm)</text>
  <text x="400" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#0B1F3A">of the surface, at an angle &#8805; 30&#176;?</text>

  <!-- YES branch -->
  <line x1="290" y1="108" x2="216" y2="148" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="212,150 224,148 219,139" fill="#0B1F3A"/>
  <text x="234" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">YES</text>

  <!-- NO branch -->
  <line x1="510" y1="108" x2="584" y2="148" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="588,150 576,148 581,139" fill="#0B1F3A"/>
  <text x="566" y="124" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E66F5">NO</text>

  <!-- DIRECT VT -->
  <rect x="56" y="152" width="312" height="124" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="212" y="178" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E66F5">DIRECT VT</text>
  <text x="212" y="202" text-anchor="middle" font-size="13.5" fill="#0B1F3A">Unbroken optical path from surface to eye</text>
  <text x="212" y="222" text-anchor="middle" font-size="13.5" fill="#0B1F3A">Aids: mirrors bend the path,</text>
  <text x="212" y="240" text-anchor="middle" font-size="13.5" fill="#0B1F3A">magnifiers (1.5&#8211;10&#215;) enlarge it</text>
  <text x="212" y="262" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0B1F3A">Verify &#8805; 100 fc (1076 lx) at the surface</text>

  <!-- REMOTE VT -->
  <rect x="432" y="152" width="312" height="124" rx="8" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="588" y="178" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E66F5">REMOTE VT</text>
  <text x="588" y="202" text-anchor="middle" font-size="13.5" fill="#0B1F3A">Instrument replaces the eye: borescope,</text>
  <text x="588" y="220" text-anchor="middle" font-size="13.5" fill="#0B1F3A">fiberscope, videoscope, camera, crawler</text>
  <text x="588" y="244" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0B1F3A">Resolution at least equivalent to direct &#8212;</text>
  <text x="588" y="262" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#0B1F3A">demonstrated, not assumed</text>

  <!-- translucent branch -->
  <line x1="212" y1="276" x2="212" y2="314" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="212,320 206,308 218,308" fill="#0B1F3A"/>
  <text x="222" y="302" font-size="13" font-style="italic" fill="#0B1F3A">translucent laminate?</text>
  <rect x="56" y="320" width="312" height="74" rx="8" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="212" y="344" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E66F5">TRANSLUCENT VT</text>
  <text x="212" y="364" text-anchor="middle" font-size="13" fill="#0B1F3A">Directional illuminator diffuses light evenly through</text>
  <text x="212" y="381" text-anchor="middle" font-size="13" fill="#0B1F3A">the thickness &#8212; a supplement to direct VT</text>

  <!-- selection drivers -->
  <text x="588" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Selection drivers</text>
  <text x="588" y="342" text-anchor="middle" font-size="13" fill="#0B1F3A">access &#183; location of interest &#183; required sensitivity</text>
  <text x="588" y="360" text-anchor="middle" font-size="13" fill="#0B1F3A">achievable lighting &#183; personnel safety &#183; documentation</text>
  <text x="588" y="380" text-anchor="middle" font-size="13" font-style="italic" fill="#1E66F5">in engine work, the manual usually decides for you</text>

  <!-- bottom -->
  <text x="400" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Every branch: written procedure, vision-current examiner, verified lighting, governing acceptance criteria</text>
</svg>
