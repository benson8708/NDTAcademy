<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Hermetic Seal Testing: Bomb — Fine Leak — Gross Leak</text>

  <line x1="275" y1="60" x2="275" y2="350" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6,5"/>
  <line x1="545" y1="60" x2="545" y2="350" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- Panel 1: helium bombing -->
  <text x="150" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">1 · Helium bombing</text>
  <rect x="50" y="82" width="200" height="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="70" cy="90" r="3" fill="#0B1F3A"/>
  <circle cx="110" cy="90" r="3" fill="#0B1F3A"/>
  <circle cx="150" cy="90" r="3" fill="#0B1F3A"/>
  <circle cx="190" cy="90" r="3" fill="#0B1F3A"/>
  <circle cx="230" cy="90" r="3" fill="#0B1F3A"/>
  <rect x="55" y="98" width="190" height="202" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="80" cy="130" r="3.5" fill="#D14343"/>
  <circle cx="120" cy="115" r="3.5" fill="#D14343"/>
  <circle cx="170" cy="125" r="3.5" fill="#D14343"/>
  <circle cx="215" cy="140" r="3.5" fill="#D14343"/>
  <circle cx="95" cy="180" r="3.5" fill="#D14343"/>
  <circle cx="140" cy="160" r="3.5" fill="#D14343"/>
  <circle cx="210" cy="190" r="3.5" fill="#D14343"/>
  <circle cx="75" cy="235" r="3.5" fill="#D14343"/>
  <circle cx="225" cy="240" r="3.5" fill="#D14343"/>
  <rect x="115" y="210" width="70" height="50" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="150" y1="175" x2="150" y2="203" stroke="#D14343" stroke-width="2"/>
  <polygon points="144,201 156,201 150,211" fill="#D14343"/>
  <text x="150" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">sealed package</text>
  <text x="150" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">helium at several atmospheres, 2 h or more —</text>
  <text x="150" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">tracer forced in through any leak path</text>

  <!-- Panel 2: fine leak -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">2 · Fine-leak test</text>
  <rect x="300" y="90" width="140" height="210" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="370" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">vacuum chamber</text>
  <rect x="335" y="200" width="70" height="50" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="370" y1="196" x2="370" y2="160" stroke="#D14343" stroke-width="2"/>
  <polygon points="364,162 376,162 370,150" fill="#D14343"/>
  <circle cx="355" cy="178" r="3" fill="#D14343"/>
  <circle cx="385" cy="155" r="3" fill="#D14343"/>
  <circle cx="370" cy="132" r="3" fill="#D14343"/>
  <line x1="440" y1="160" x2="455" y2="160" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="447" cy="160" r="3" fill="#D14343"/>
  <rect x="455" y="125" width="65" height="70" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="487" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">MSLD</text>
  <text x="487" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#5A6B7E">reads He</text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">escaping helium measured against the</text>
  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">acceptance limit (atm·cm³/s)</text>

  <!-- Panel 3: gross leak -->
  <text x="655" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">3 · Gross-leak test</text>
  <rect x="572" y="140" width="171" height="148" fill="#E8F1FB" stroke="#9BC4FF" stroke-width="1"/>
  <path d="M570,100 L570,290 L745,290 L745,100" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="572" y1="140" x2="743" y2="140" stroke="#1E66F5" stroke-width="2"/>
  <rect x="625" y="240" width="65" height="40" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="660" cy="225" r="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="668" cy="206" r="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="655" cy="186" r="5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="666" cy="162" r="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="690" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">bubble</text>
  <text x="690" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">stream</text>
  <text x="655" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">pressure-soaked in fluorocarbon, then immersed</text>
  <text x="655" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">at ~125 °C — bubbles mark a gross leaker</text>

  <!-- takeaway -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">A gross leaker fills and empties in minutes — its helium is gone before the fine-leak test. Run both.</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">MIL-STD-883, Test Method 1014 (Seal)</text>
</svg>
