<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Flux Leakage at a Discontinuity</text>

  <!-- magnetized bar -->
  <rect x="100" y="210" width="600" height="120" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>
  <text x="130" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">S</text>
  <text x="670" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">N</text>

  <!-- surface crack: V-notch open to top surface -->
  <polygon points="390,210 400,252 410,210" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="384" y="231" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">n</text>
  <text x="416" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">s</text>

  <!-- subsurface void -->
  <ellipse cx="560" cy="252" rx="20" ry="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- internal flux lines (S to N inside the bar) -->
  <path d="M115,240 H355 C370,240 376,262 400,262 C424,262 430,240 445,240 H520 C535,240 540,229 560,229 C580,229 585,240 600,240 H685" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M115,270 H525 C540,270 544,278 560,278 C576,278 580,270 595,270 H685" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <path d="M115,300 H685" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <!-- direction arrowheads -->
  <polygon points="295,235 308,240 295,245" fill="#1E66F5"/>
  <polygon points="625,235 638,240 625,245" fill="#1E66F5"/>
  <polygon points="295,265 308,270 295,275" fill="#1E66F5"/>
  <polygon points="625,265 638,270 625,275" fill="#1E66F5"/>
  <polygon points="295,295 308,300 295,305" fill="#1E66F5"/>
  <polygon points="625,295 638,300 625,305" fill="#1E66F5"/>

  <!-- leakage field above the surface crack -->
  <path d="M384,208 Q400,168 416,208" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <path d="M377,209 Q400,148 423,209" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- dense particle mound over the crack -->
  <circle cx="388" cy="200" r="3" fill="#0B1F3A"/>
  <circle cx="396" cy="196" r="3" fill="#0B1F3A"/>
  <circle cx="404" cy="199" r="3" fill="#0B1F3A"/>
  <circle cx="412" cy="201" r="3" fill="#0B1F3A"/>
  <circle cx="392" cy="189" r="3" fill="#0B1F3A"/>
  <circle cx="400" cy="185" r="3" fill="#0B1F3A"/>
  <circle cx="408" cy="190" r="3" fill="#0B1F3A"/>
  <circle cx="386" cy="206" r="3" fill="#0B1F3A"/>
  <circle cx="414" cy="206" r="3" fill="#0B1F3A"/>
  <circle cx="400" cy="177" r="3" fill="#0B1F3A"/>
  <circle cx="395" cy="205" r="3" fill="#0B1F3A"/>
  <circle cx="405" cy="204" r="3" fill="#0B1F3A"/>

  <!-- weak leakage above the subsurface void -->
  <path d="M540,209 Q560,186 580,209" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5,4"/>
  <circle cx="552" cy="202" r="2.5" fill="#0B1F3A"/>
  <circle cx="560" cy="198" r="2.5" fill="#0B1F3A"/>
  <circle cx="568" cy="203" r="2.5" fill="#0B1F3A"/>
  <circle cx="556" cy="206" r="2.5" fill="#0B1F3A"/>
  <circle cx="564" cy="206" r="2.5" fill="#0B1F3A"/>

  <!-- annotations -->
  <text x="330" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">dense, sharp buildup = surface crack</text>
  <line x1="360" y1="136" x2="392" y2="170" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="620" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">weak, fuzzy buildup = subsurface flaw</text>
  <line x1="608" y1="148" x2="572" y2="190" stroke="#0B1F3A" stroke-width="1.5"/>

  <line x1="400" y1="258" x2="400" y2="344" stroke="#0B1F3A" stroke-width="1.2" stroke-dasharray="2,3"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface crack</text>
  <line x1="560" y1="265" x2="560" y2="344" stroke="#0B1F3A" stroke-width="1.2" stroke-dasharray="2,3"/>
  <text x="560" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">subsurface void</text>
  <text x="220" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">flux travels S → N inside the bar</text>

  <!-- takeaway bar -->
  <rect x="90" y="420" width="620" height="56" rx="8" fill="#0B1F3A"/>
  <text x="400" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Flux leaks where a flaw crosses it at or near the surface —</text>
  <text x="400" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">particles collect at the leak and outline the flaw.</text>
</svg>
