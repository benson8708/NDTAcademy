<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">MT Equipment: Three Ways to Put Flux in the Part</text>

  <!-- ================= Panel 1: YOKE ================= -->
  <rect x="18" y="58" width="243" height="382" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="18" y="58" width="243" height="34" rx="8" fill="#0B1F3A"/>
  <text x="139" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">YOKE — portable</text>

  <!-- yoke body -->
  <rect x="122" y="112" width="36" height="22" fill="#0B1F3A"/>
  <rect x="66" y="132" width="148" height="32" fill="#0B1F3A"/>
  <line x1="86" y1="138" x2="86" y2="158" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="98" y1="138" x2="98" y2="158" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="110" y1="138" x2="110" y2="158" stroke="#FFFFFF" stroke-width="2"/>
  <rect x="66" y="164" width="32" height="116" fill="#0B1F3A"/>
  <rect x="182" y="164" width="32" height="116" fill="#0B1F3A"/>
  <text x="82" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">N</text>
  <text x="198" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">S</text>

  <!-- part -->
  <rect x="40" y="280" width="200" height="42" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- field lines pole to pole through the part -->
  <path d="M 86 288 Q 140 318 194 288" stroke="#1E66F5" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
  <path d="M 86 300 Q 140 334 194 300" stroke="#1E66F5" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
  <polygon points="188,282 200,288 188,294" fill="#1E66F5"/>

  <!-- crack across the field with particle buildup -->
  <path d="M 134 280 L 140 268 L 146 280" stroke="#0B1F3A" stroke-width="3" fill="none"/>
  <circle cx="128" cy="276" r="2.5" fill="#0B1F3A"/>
  <circle cx="135" cy="264" r="2.5" fill="#0B1F3A"/>
  <circle cx="146" cy="263" r="2.5" fill="#0B1F3A"/>
  <circle cx="152" cy="275" r="2.5" fill="#0B1F3A"/>
  <circle cx="140" cy="258" r="2.5" fill="#0B1F3A"/>

  <text x="139" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Field runs pole to pole and</text>
  <text x="139" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">finds cracks lying across it</text>
  <rect x="36" y="380" width="208" height="48" rx="6" fill="#9BC4FF"/>
  <text x="140" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Lift check: AC ≥ 10 lb</text>
  <text x="140" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">DC or magnet ≥ 40 lb</text>

  <!-- ================= Panel 2: PRODS ================= -->
  <rect x="278" y="58" width="243" height="382" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="278" y="58" width="243" height="34" rx="8" fill="#0B1F3A"/>
  <text x="399" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">PRODS — portable</text>

  <!-- part -->
  <rect x="300" y="280" width="200" height="42" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>

  <!-- prods -->
  <rect x="338" y="176" width="28" height="20" fill="#0B1F3A"/>
  <line x1="352" y1="196" x2="368" y2="280" stroke="#0B1F3A" stroke-width="9"/>
  <rect x="434" y="176" width="28" height="20" fill="#0B1F3A"/>
  <line x1="448" y1="196" x2="432" y2="280" stroke="#0B1F3A" stroke-width="9"/>

  <!-- current path and circular field inside the part -->
  <ellipse cx="400" cy="300" rx="54" ry="18" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <ellipse cx="400" cy="300" rx="34" ry="10" fill="none" stroke="#1E66F5" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="374" y1="300" x2="420" y2="300" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="420,294 432,300 420,306" fill="#1E66F5"/>
  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">I</text>

  <!-- crack parallel to current line with particles -->
  <polyline points="384,272 392,268 400,272 408,268 416,272" stroke="#0B1F3A" stroke-width="3" fill="none"/>
  <circle cx="388" cy="262" r="2.5" fill="#0B1F3A"/>
  <circle cx="398" cy="259" r="2.5" fill="#0B1F3A"/>
  <circle cx="410" cy="261" r="2.5" fill="#0B1F3A"/>
  <circle cx="404" cy="266" r="2.5" fill="#0B1F3A"/>

  <text x="399" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Circular field wraps the current;</text>
  <text x="399" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">finds cracks parallel to the prod line</text>
  <rect x="296" y="388" width="208" height="44" rx="6" fill="#9BC4FF"/>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">90–125 A per inch of spacing</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Arc-strike risk at contact points</text>

  <!-- ================= Panel 3: WET BENCH ================= -->
  <rect x="538" y="58" width="243" height="382" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="538" y="58" width="243" height="34" rx="8" fill="#0B1F3A"/>
  <text x="659" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">WET BENCH — stationary</text>

  <!-- labels above drawing -->
  <text x="596" y="216" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">bath</text>
  <text x="577" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">headshot</text>
  <text x="660" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">coil</text>

  <!-- bath nozzle and droplets -->
  <rect x="606" y="206" width="16" height="10" fill="#1E66F5"/>
  <circle cx="614" cy="226" r="2.5" fill="#1E66F5"/>
  <circle cx="610" cy="240" r="2.5" fill="#1E66F5"/>
  <circle cx="616" cy="254" r="2.5" fill="#1E66F5"/>
  <circle cx="611" cy="266" r="2.5" fill="#1E66F5"/>

  <!-- bench, heads, part, coil -->
  <rect x="560" y="240" width="34" height="90" fill="#0B1F3A"/>
  <rect x="726" y="240" width="34" height="90" fill="#0B1F3A"/>
  <rect x="594" y="272" width="132" height="26" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="640" y="252" width="40" height="66" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <line x1="650" y1="252" x2="650" y2="318" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="660" y1="252" x2="660" y2="318" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="670" y1="252" x2="670" y2="318" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- current arrows through the part -->
  <line x1="600" y1="285" x2="628" y2="285" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="628,280 638,285 628,290" fill="#1E66F5"/>
  <line x1="688" y1="285" x2="710" y2="285" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="710,280 720,285 710,290" fill="#1E66F5"/>

  <!-- bench base -->
  <rect x="556" y="330" width="208" height="26" fill="#0B1F3A"/>
  <rect x="566" y="356" width="18" height="22" fill="#0B1F3A"/>
  <rect x="736" y="356" width="18" height="22" fill="#0B1F3A"/>

  <rect x="556" y="384" width="208" height="48" rx="6" fill="#9BC4FF"/>
  <text x="660" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Headshot = circular field</text>
  <text x="660" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Coil = longitudinal field</text>

  <!-- bottom emphasis bar -->
  <rect x="18" y="452" width="763" height="36" rx="8" fill="#0B1F3A"/>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Cracks only show when they cross the field — magnetize in two directions, roughly 90° apart</text>
</svg>
