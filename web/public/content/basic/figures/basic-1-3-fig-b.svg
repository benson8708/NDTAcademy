<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Certification States Under the Standard</text>

  <!-- VALID box -->
  <rect x="50" y="180" width="180" height="92" rx="8" fill="#1E9E6A"/>
  <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">VALID</text>
  <text x="140" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">all conditions current</text>

  <!-- EXPIRED -->
  <rect x="490" y="62" width="280" height="86" rx="8" fill="#5A6B7E"/>
  <text x="630" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">EXPIRED</text>
  <text x="630" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">certification interval ran out</text>

  <!-- SUSPENDED -->
  <rect x="490" y="180" width="280" height="100" rx="8" fill="#F2A33C"/>
  <text x="630" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#0A2342">SUSPENDED</text>
  <text x="630" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">condition lapsed: vision overdue,</text>
  <text x="630" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">unsatisfactory evaluation</text>

  <!-- REVOKED -->
  <rect x="490" y="312" width="280" height="92" rx="8" fill="#D14343"/>
  <text x="630" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#FFFFFF">REVOKED</text>
  <text x="630" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">for cause: falsification, ethics</text>

  <!-- forward arrows -->
  <line x1="230" y1="196" x2="478" y2="100" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="470,94 488,96 476,110" fill="#E8F1FB"/>
  <text x="318" y="120" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">interval runs out</text>

  <line x1="230" y1="218" x2="478" y2="218" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="470,210 486,218 470,226" fill="#E8F1FB"/>
  <text x="300" y="208" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">condition lapses</text>

  <line x1="230" y1="256" x2="478" y2="346" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="468,350 488,350 474,334" fill="#E8F1FB"/>
  <text x="318" y="322" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">cause found</text>

  <!-- return (cure) arrows, dashed green -->
  <line x1="490" y1="135" x2="245" y2="190" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="254,182 236,192 252,200" fill="#1E9E6A"/>
  <text x="296" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">recertify (5-yr model)</text>

  <line x1="490" y1="246" x2="245" y2="246" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="253,238 237,246 253,254" fill="#1E9E6A"/>
  <text x="292" y="268" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">correct the cause</text>

  <line x1="490" y1="382" x2="245" y2="282" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="256,276 236,278 250,292" fill="#1E9E6A"/>
  <text x="282" y="368" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">requalify as an initial candidate</text>

  <!-- bottom note -->
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#D9E0E8">Different states have different cures: name the state before you prescribe the fix.</text>
</svg>
