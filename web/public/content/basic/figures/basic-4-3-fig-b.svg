<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">MFL Sensors: Hall Element vs. Induction Coil</text>
  <line x1="400" y1="52" x2="400" y2="372" stroke="#D9E0E8" stroke-width="2"/>

  <!-- LEFT: Hall element -->
  <text x="220" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Hall element — reads flux density B</text>

  <rect x="130" y="108" width="180" height="92" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="220" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#1E66F5">leakage flux B into the page</text>

  <circle cx="160" cy="152" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="155.5" y1="147.5" x2="164.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="164.5" y1="147.5" x2="155.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <circle cx="220" cy="152" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="215.5" y1="147.5" x2="224.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="224.5" y1="147.5" x2="215.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <circle cx="280" cy="152" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="275.5" y1="147.5" x2="284.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="284.5" y1="147.5" x2="275.5" y2="156.5" stroke="#1E66F5" stroke-width="1.6"/>
  <circle cx="160" cy="180" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="155.5" y1="175.5" x2="164.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="164.5" y1="175.5" x2="155.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>
  <circle cx="220" cy="180" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="215.5" y1="175.5" x2="224.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="224.5" y1="175.5" x2="215.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>
  <circle cx="280" cy="180" r="7" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="275.5" y1="175.5" x2="284.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>
  <line x1="284.5" y1="175.5" x2="275.5" y2="184.5" stroke="#1E66F5" stroke-width="1.6"/>

  <!-- control current in / out -->
  <line x1="68" y1="168" x2="118" y2="168" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="118,163 130,168 118,173" fill="#F2A33C"/>
  <text x="88" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">I</text>
  <line x1="310" y1="168" x2="352" y2="168" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="352,163 364,168 352,173" fill="#F2A33C"/>
  <text x="338" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">I</text>

  <!-- Hall voltage terminals -->
  <line x1="220" y1="108" x2="220" y2="90" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="220" cy="88" r="2.5" fill="#0B1F3A"/>
  <text x="230" y="96" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">+</text>
  <line x1="220" y1="200" x2="220" y2="218" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="220" cy="220" r="2.5" fill="#0B1F3A"/>
  <text x="230" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">−</text>
  <text x="220" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Hall voltage across the chip ∝ B</text>

  <text x="70" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Output proportional to B — absolute reading</text>
  <text x="70" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Works at any speed, even stationary</text>
  <text x="70" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Tiny chips pack into dense arrays</text>
  <text x="70" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Needs excitation current and electronics</text>

  <!-- RIGHT: induction coil -->
  <text x="580" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Induction coil — reads rate of change</text>
  <text x="580" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">e = −N · dΦ/dt</text>

  <ellipse cx="552" cy="152" rx="9" ry="20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="568" cy="152" rx="9" ry="20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="584" cy="152" rx="9" ry="20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="600" cy="152" rx="9" ry="20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="616" cy="152" rx="9" ry="20" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="543" y1="152" x2="505" y2="152" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="503" cy="152" r="2.5" fill="#0B1F3A"/>
  <line x1="625" y1="152" x2="663" y2="152" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="665" cy="152" r="2.5" fill="#0B1F3A"/>

  <!-- scan motion -->
  <line x1="610" y1="190" x2="668" y2="190" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="668,185 680,190 668,195" fill="#0B1F3A"/>
  <text x="640" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">scan v</text>

  <!-- mini plate with pit and leakage -->
  <rect x="460" y="218" width="240" height="42" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M562,218 C570,218 572,236 580,236 C588,236 590,218 598,218 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.8"/>
  <path d="M570,216 Q580,196 590,216" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="4,3"/>
  <path d="M563,217 Q580,184 597,217" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="4,3"/>
  <path d="M470,242 H548 C558,242 560,250 580,250 C600,250 602,242 612,242 H690" fill="none" stroke="#1E66F5" stroke-width="2"/>

  <text x="430" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Output e = −N · dΦ/dt (Faraday's law)</text>
  <text x="430" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Needs motion — amplitude rides on speed</text>
  <text x="430" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Passive, rugged, inexpensive</text>
  <text x="430" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">• Differential pairs flag abrupt changes</text>

  <!-- takeaway bar -->
  <rect x="90" y="392" width="620" height="48" rx="8" fill="#0B1F3A"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">A Hall element measures the field itself; a coil measures its rate of</text>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">change — hold liftoff and speed constant, or signals drift.</text>
</svg>
