<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Shot Peening: A Compressive Blanket Where Fatigue Cracks Start</text>

  <!-- Panel 1 header -->
  <rect x="24" y="56" width="360" height="30" rx="6" fill="#0B1F3A"/>
  <text x="204" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">1 &#183; WHAT THE SHOT DOES</text>

  <!-- Nozzle and shot stream -->
  <polygon points="174,100 234,100 222,130 186,130" fill="#0B1F3A"/>
  <text x="258" y="112" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">nozzle: cast shot, cut wire,</text>
  <text x="258" y="127" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">or glass/ceramic bead</text>
  <circle cx="184" cy="152" r="5" fill="#0B1F3A"/>
  <circle cx="206" cy="166" r="5" fill="#0B1F3A"/>
  <circle cx="226" cy="148" r="5" fill="#0B1F3A"/>
  <circle cx="166" cy="178" r="5" fill="#0B1F3A"/>
  <circle cx="244" cy="176" r="5" fill="#0B1F3A"/>
  <line x1="184" y1="160" x2="172" y2="196" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="167,192 177,196 171,202" fill="#1E66F5"/>
  <line x1="206" y1="174" x2="204" y2="200" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="199,196 209,197 204,206" fill="#1E66F5"/>
  <line x1="226" y1="156" x2="236" y2="198" stroke="#1E66F5" stroke-width="2"/>
  <polygon points="231,194 241,193 238,203" fill="#1E66F5"/>

  <!-- Part cross-section with dimpled surface -->
  <rect x="44" y="212" width="320" height="118" fill="#DCE4F0" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 44 212 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0 q 10 9 20 0" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="44" y="216" width="320" height="32" fill="#9BC4FF" opacity="0.6"/>
  <text x="204" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">residual COMPRESSION &#8212; layer 0.005&#8211;0.030 in. deep</text>
  <rect x="44" y="248" width="320" height="82" fill="#D14343" opacity="0.06"/>
  <text x="204" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343">mild balancing tension deeper in the section</text>

  <text x="204" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Each impact yields a thin skin; the elastic core</text>
  <text x="204" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">squeezes it back into permanent compression.</text>

  <!-- Panel 2 header -->
  <rect x="416" y="56" width="360" height="30" rx="6" fill="#0B1F3A"/>
  <text x="596" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2 &#183; RESIDUAL STRESS vs DEPTH</text>

  <!-- Graph axes: stress horizontal, depth downward -->
  <line x1="456" y1="130" x2="756" y2="130" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="606" y1="130" x2="606" y2="340" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="600,336 612,336 606,348" fill="#0B1F3A"/>
  <text x="520" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#1E66F5">&#8592; compression</text>
  <text x="692" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#D14343">tension &#8594;</text>
  <text x="606" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">0</text>
  <text x="448" y="124" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0B1F3A">surface</text>
  <text x="624" y="356" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">depth</text>

  <!-- Shaded compression zone -->
  <path d="M 606 130 L 486 130 C 462 150, 462 175, 478 195 C 500 225, 560 235, 606 240 Z" fill="#9BC4FF" opacity="0.35"/>

  <!-- Stress curve -->
  <path d="M 486 130 C 462 150, 462 175, 478 195 C 500 225, 560 235, 606 240 C 650 246, 660 270, 648 295 C 640 312, 622 325, 612 338" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <line x1="500" y1="178" x2="478" y2="172" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="506" y="182" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">peak compression just</text>
  <text x="506" y="197" font-family="Arial, sans-serif" font-size="11.5" font-weight="bold" fill="#0B1F3A">below the surface &#8212;</text>
  <text x="506" y="212" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">fatigue cracks cannot open</text>
  <text x="506" y="227" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">in a compressed layer</text>

  <text x="668" y="288" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343">mild balancing</text>
  <text x="668" y="303" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343">tension</text>

  <!-- Bottom note bar -->
  <rect x="24" y="396" width="752" height="44" rx="8" fill="#0B1F3A"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Intensity by Almen strip arc height, coverage verified &#8212; per SAE AMS 2430.</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9BC4FF">Peen before plating high-strength steel; penetrant-inspect before peening &#8212; dimpling closes flaw openings.</text>
</svg>
