<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Practice Thermogram: Pump-Room Survey (schematic)</text>

  <!-- scene frame, cool ambient wash -->
  <rect x="40" y="42" width="720" height="372" rx="10" fill="#9BC4FF" fill-opacity="0.12" stroke="#0B1F3A" stroke-width="2"/>

  <!-- ===== feeder panel with three phase lugs (region 1: 146,94,68,66) ===== -->
  <rect x="70" y="70" width="230" height="170" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="110" y="78" width="10" height="34" fill="#0B1F3A" opacity="0.5"/>
  <rect x="175" y="78" width="10" height="34" fill="#0B1F3A" opacity="0.5"/>
  <rect x="240" y="78" width="10" height="34" fill="#0B1F3A" opacity="0.5"/>
  <circle cx="180" cy="125" r="34" fill="#D14343" opacity="0.12"/>
  <circle cx="180" cy="125" r="24" fill="#D14343" opacity="0.25"/>
  <circle cx="180" cy="125" r="14" fill="#D14343" opacity="0.45"/>
  <rect x="103" y="112" width="24" height="26" fill="#D14343" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="1.8"/>
  <rect x="168" y="112" width="24" height="26" fill="#D14343" fill-opacity="0.85" stroke="#0B1F3A" stroke-width="1.8"/>
  <rect x="233" y="112" width="24" height="26" fill="#D14343" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="1.8"/>
  <text x="115" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">A</text>
  <text x="180" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">B</text>
  <text x="245" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">C</text>
  <circle cx="142" cy="92" r="13" fill="#0B1F3A"/>
  <text x="142" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="185" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">feeder panel &#8212; equal load on all three phases</text>

  <!-- ===== polished door with lamp reflection (region 2: 340,104,66,84) ===== -->
  <rect x="315" y="70" width="115" height="170" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="325" y1="90" x2="360" y2="125" stroke="#9BC4FF" stroke-width="3" opacity="0.5"/>
  <line x1="335" y1="150" x2="375" y2="190" stroke="#9BC4FF" stroke-width="3" opacity="0.5"/>
  <line x1="395" y1="95" x2="420" y2="120" stroke="#9BC4FF" stroke-width="2" opacity="0.4"/>
  <ellipse cx="372" cy="145" rx="26" ry="36" fill="#D14343" fill-opacity="0.45"/>
  <ellipse cx="372" cy="145" rx="14" ry="20" fill="#D14343" fill-opacity="0.65"/>
  <circle cx="330" cy="92" r="13" fill="#0B1F3A"/>
  <text x="330" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="372" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">polished door</text>
  <!-- inspection lamp + sight line -->
  <circle cx="470" cy="96" r="11" fill="#D14343" fill-opacity="0.75" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="470" y1="108" x2="470" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="460" y1="128" x2="480" y2="128" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="458" y1="103" x2="396" y2="132" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7"/>
  <text x="470" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">inspection lamp</text>

  <!-- ===== window, sun, and solar patch (region 5: 545,174,150,62) ===== -->
  <rect x="600" y="62" width="120" height="78" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="660" y1="62" x2="660" y2="140" stroke="#0B1F3A" stroke-width="1.2" opacity="0.6"/>
  <line x1="600" y1="101" x2="720" y2="101" stroke="#0B1F3A" stroke-width="1.2" opacity="0.6"/>
  <circle cx="688" cy="84" r="12" fill="#D14343" fill-opacity="0.65"/>
  <line x1="688" y1="68" x2="688" y2="62" stroke="#D14343" stroke-width="1.8"/>
  <line x1="672" y1="84" x2="666" y2="84" stroke="#D14343" stroke-width="1.8"/>
  <line x1="704" y1="84" x2="710" y2="84" stroke="#D14343" stroke-width="1.8"/>
  <line x1="677" y1="73" x2="672" y2="68" stroke="#D14343" stroke-width="1.8"/>
  <line x1="699" y1="95" x2="704" y2="100" stroke="#D14343" stroke-width="1.8"/>
  <text x="630" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">window</text>
  <polygon points="560,176 700,176 678,232 542,232" fill="#D14343" fill-opacity="0.2"/>
  <circle cx="532" cy="164" r="13" fill="#0B1F3A"/>
  <text x="532" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="620" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">sunlit wall</text>

  <!-- ===== motor-pump skid (regions 3: 92,302,138,88 and 4: 430,288,210,28) ===== -->
  <line x1="60" y1="392" x2="740" y2="392" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="90" y="302" width="140" height="88" rx="8" fill="#D14343" fill-opacity="0.2" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="112" y1="310" x2="112" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="310" x2="132" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <line x1="152" y1="310" x2="152" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <line x1="172" y1="310" x2="172" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <line x1="192" y1="310" x2="192" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <line x1="212" y1="310" x2="212" y2="382" stroke="#0B1F3A" stroke-width="1" opacity="0.4"/>
  <circle cx="104" cy="287" r="13" fill="#0B1F3A"/>
  <text x="104" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="160" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">motor</text>
  <line x1="230" y1="346" x2="258" y2="346" stroke="#0B1F3A" stroke-width="4"/>
  <rect x="258" y="334" width="22" height="24" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="1.8"/>
  <line x1="280" y1="346" x2="296" y2="346" stroke="#0B1F3A" stroke-width="4"/>
  <circle cx="336" cy="350" r="40" fill="#9BC4FF" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="336" cy="350" r="12" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="336" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">pump</text>
  <!-- warm discharge line -->
  <rect x="328" y="292" width="16" height="20" fill="#D14343" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="344" y="292" width="372" height="18" fill="#D14343" fill-opacity="0.3" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="600" y1="301" x2="640" y2="301" stroke="#0B1F3A" stroke-width="2" opacity="0.7"/>
  <polygon points="640,295 656,301 640,307" fill="#0B1F3A" opacity="0.7"/>
  <circle cx="420" cy="272" r="13" fill="#0B1F3A"/>
  <text x="420" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="560" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">discharge line &#8212; warm process fluid</text>

  <!-- legend -->
  <rect x="120" y="424" width="16" height="12" fill="#D14343" fill-opacity="0.5"/>
  <text x="144" y="434" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">warmer apparent temperature</text>
  <rect x="360" y="424" width="16" height="12" fill="#9BC4FF" fill-opacity="0.5"/>
  <text x="384" y="434" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">cooler</text>
  <text x="520" y="434" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A" opacity="0.7">schematic rendering of a thermogram</text>
</svg>
