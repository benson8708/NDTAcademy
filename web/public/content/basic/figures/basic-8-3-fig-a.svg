<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">The Probability of Detection Curve</text>

  <!-- horizontal gridlines: 100%, 90%, 50% -->
  <line x1="90" y1="70" x2="750" y2="70" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
  <line x1="90" y1="102" x2="750" y2="102" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
  <line x1="90" y1="230" x2="750" y2="230" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>

  <!-- confidence band between the mean curve and the 95% lower bound -->
  <path d="M 100 387 C 220 383 275 332 340 230 C 402 133 438 110 480 102 C 545 90 645 80 745 78 L 745 84 C 690 87 628 92 570 102 C 512 122 478 170 405 252 C 322 344 252 386 112 389 Z" fill="#9BC4FF" opacity="0.3"/>

  <!-- vertical guides down to the size axis -->
  <line x1="340" y1="230" x2="340" y2="390" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>
  <line x1="480" y1="102" x2="480" y2="390" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>
  <line x1="570" y1="102" x2="570" y2="390" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55"/>

  <!-- mean POD estimate -->
  <path d="M 100 387 C 220 383 275 332 340 230 C 402 133 438 110 480 102 C 545 90 645 80 745 78" fill="none" stroke="#1E66F5" stroke-width="3.5"/>
  <!-- 95% lower confidence bound -->
  <path d="M 112 389 C 252 386 322 344 405 252 C 478 170 512 122 570 102 C 628 92 690 87 745 84" fill="none" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7 5"/>

  <!-- marked sizes -->
  <circle cx="340" cy="230" r="6" fill="#1E66F5"/>
  <circle cx="480" cy="102" r="6" fill="#1E66F5"/>
  <circle cx="570" cy="102" r="6" fill="#0B1F3A"/>

  <!-- axes -->
  <line x1="90" y1="58" x2="90" y2="390" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="90" y1="390" x2="755" y2="390" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="82" y="75" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">100%</text>
  <text x="82" y="107" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">90%</text>
  <text x="82" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">50%</text>
  <text x="82" y="394" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">0%</text>
  <text x="340" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">a<tspan font-size="11" dy="3">50</tspan></text>
  <text x="480" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E66F5">a<tspan font-size="11" dy="3">90</tspan></text>
  <text x="574" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">a<tspan font-size="11" dy="3">90/95</tspan></text>
  <text x="420" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">flaw size a</text>
  <text transform="rotate(-90 36 224)" x="36" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">probability of detection</text>

  <!-- legend -->
  <line x1="118" y1="136" x2="166" y2="136" stroke="#1E66F5" stroke-width="3.5"/>
  <text x="174" y="140" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">mean POD estimate</text>
  <line x1="118" y1="159" x2="166" y2="159" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="174" y="163" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">95% lower confidence bound</text>

  <!-- annotations -->
  <text x="628" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">never reaches 100%</text>
  <line x1="628" y1="57" x2="648" y2="72" stroke="#D14343" stroke-width="1.5"/>
  <text x="112" y="330" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">small flaws are still caught</text>
  <text x="112" y="346" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">occasionally — never exactly zero</text>
</svg>
