<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Wave Travel Modes: Particle Motion vs. Propagation</text>

  <!-- left panel: longitudinal -->
  <text x="215" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#0B1F3A">Longitudinal (compression)</text>
  <rect x="50" y="80" width="330" height="64" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M62,86V138M66,86V138M70,86V138M74,86V138M78,86V138M146,86V138M150,86V138M154,86V138M158,86V138M162,86V138M230,86V138M234,86V138M238,86V138M242,86V138M246,86V138M314,86V138M318,86V138M322,86V138M326,86V138M330,86V138" stroke="#1E66F5" stroke-width="2" fill="none"/>
  <path d="M92,86V138M104,86V138M116,86V138M128,86V138M176,86V138M188,86V138M200,86V138M212,86V138M260,86V138M272,86V138M284,86V138M296,86V138M344,86V138M356,86V138M368,86V138" stroke="#9BC4FF" stroke-width="2" fill="none"/>
  <line x1="60" y1="164" x2="336" y2="164" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="336,159 350,164 336,169" fill="#0B1F3A"/>
  <text x="200" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">propagation</text>
  <line x1="183" y1="202" x2="247" y2="202" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="183,202 195,197 195,207" fill="#0B1F3A"/>
  <polygon points="247,202 235,197 235,207" fill="#0B1F3A"/>
  <text x="215" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">particle motion: parallel to travel</text>
  <text x="215" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">travels in solids, liquids, and gases</text>
  <text x="215" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">steel ≈ 5,920 m/s · water ≈ 1,480 m/s</text>

  <!-- right panel: shear -->
  <text x="585" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" font-weight="bold" fill="#0B1F3A">Shear (transverse)</text>
  <rect x="420" y="80" width="330" height="64" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M430,112 C454,84 478,84 502,112 C526,140 550,140 574,112 C598,84 622,84 646,112 C670,140 694,140 718,112" stroke="#1E66F5" stroke-width="2.5" fill="none"/>
  <line x1="502" y1="92" x2="502" y2="132" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="502,86 497,96 507,96" fill="#0B1F3A"/>
  <polygon points="502,138 497,128 507,128" fill="#0B1F3A"/>
  <line x1="430" y1="164" x2="700" y2="164" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="700,159 714,164 700,169" fill="#0B1F3A"/>
  <text x="585" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">propagation</text>
  <text x="585" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">particle motion: perpendicular to travel</text>
  <text x="585" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6B7E">solids only — liquids and gases cannot carry shear</text>
  <text x="585" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">steel ≈ 3,240 m/s — about half the longitudinal speed</text>

  <!-- bottom strip: Rayleigh -->
  <text x="60" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Rayleigh (surface) wave — ≈ 0.92 × shear velocity</text>
  <rect x="50" y="318" width="470" height="60" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M50,318 Q79,304 108,318 T166,318 T224,318 T282,318 T340,318 T398,318 T456,318 T514,318 L520,318" stroke="#1E66F5" stroke-width="2.5" fill="none"/>
  <ellipse cx="108" cy="330" rx="8" ry="12" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <ellipse cx="224" cy="330" rx="8" ry="12" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <ellipse cx="340" cy="330" rx="8" ry="12" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <ellipse cx="456" cy="330" rx="8" ry="12" fill="none" stroke="#0B1F3A" stroke-width="1.8"/>
  <line x1="56" y1="352" x2="514" y2="352" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="285" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">motion fades out below about one wavelength deep</text>
  <text x="540" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">follows gentle contours; reflects at</text>
  <text x="540" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">sharp corners and surface cracks —</text>
  <text x="540" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">a crack answers like a wall</text>
  <text x="540" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">a fingertip or couplant drop ahead of the</text>
  <text x="540" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">wave damps it — a quick confirmation trick</text>

  <!-- takeaway -->
  <rect x="110" y="406" width="580" height="34" rx="8" fill="#0B1F3A"/>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">Slower mode → shorter wavelength → smaller reflectors found.</text>
</svg>
