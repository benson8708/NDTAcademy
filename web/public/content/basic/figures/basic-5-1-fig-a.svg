<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">How a Radiograph Forms</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">differential attenuation: thickness and density in the path become image density</text>

  <!-- X-ray tube (left) -->
  <rect x="34" y="74" width="170" height="58" rx="8" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="56,103 64,93 72,113 80,93 88,113 96,103" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <line x1="100" y1="103" x2="146" y2="103" stroke="#1E66F5" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="146,99 146,107 154,103" fill="#1E66F5"/>
  <line x1="152" y1="84" x2="180" y2="120" stroke="#0B1F3A" stroke-width="5"/>
  <text x="119" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">X-ray tube</text>
  <text x="119" y="167" text-anchor="middle" font-size="12.5" fill="#1E66F5">power off = radiation off</text>

  <!-- gamma exposure device (right) -->
  <rect x="596" y="74" width="170" height="58" rx="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="646" y="84" width="70" height="38" rx="14" fill="#9BC4FF" fill-opacity="0.45"/>
  <circle cx="681" cy="103" r="9" fill="#1E66F5"/>
  <text x="681" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">gamma exposure device</text>
  <text x="681" y="167" text-anchor="middle" font-size="12.5" fill="#1E66F5">always emitting &#8212; shielded, never off</text>

  <!-- either source feeds the beam -->
  <line x1="204" y1="103" x2="386" y2="97" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="596" y1="103" x2="414" y2="97" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="400" cy="96" r="5" fill="#0B1F3A"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">source</text>

  <!-- diverging beam -->
  <polygon points="400,100 262,232 538,232" fill="#9BC4FF" fill-opacity="0.25"/>
  <line x1="400" y1="100" x2="262" y2="232" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="400" y1="100" x2="538" y2="232" stroke="#1E66F5" stroke-width="1.5"/>

  <!-- test part with thick step and gas void -->
  <rect x="262" y="232" width="276" height="44" fill="#9BC4FF" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="262" y="214" width="80" height="18" fill="#9BC4FF" fill-opacity="0.55" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="252" y="226" text-anchor="end" font-size="13" fill="#0B1F3A">thicker step</text>
  <ellipse cx="468" cy="254" rx="20" ry="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="487" y1="248" x2="556" y2="220" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="560" y="216" font-size="13" fill="#1E66F5">gas void &#8212; less metal in the path</text>

  <!-- transmitted intensity arrows -->
  <line x1="302" y1="282" x2="302" y2="300" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="298,300 306,300 302,310 " fill="#0B1F3A"/>
  <line x1="400" y1="282" x2="400" y2="306" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="395,306 405,306 400,317" fill="#0B1F3A"/>
  <line x1="468" y1="282" x2="468" y2="312" stroke="#1E66F5" stroke-width="4"/>
  <polygon points="462,312 474,312 468,324" fill="#1E66F5"/>
  <text x="302" y="334" text-anchor="middle" font-size="12" fill="#0B1F3A">least</text>
  <text x="400" y="334" text-anchor="middle" font-size="12" fill="#0B1F3A">some</text>
  <text x="468" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E66F5">most</text>
  <text x="585" y="296" font-size="13" font-style="italic" fill="#0B1F3A">transmitted intensity</text>
  <text x="585" y="312" font-size="13" font-style="italic" fill="#0B1F3A">varies with the path</text>

  <!-- detector -->
  <rect x="242" y="344" width="316" height="12" fill="#0B1F3A"/>
  <text x="232" y="354" text-anchor="end" font-size="13" font-weight="bold" fill="#0B1F3A">detector</text>
  <text x="232" y="369" text-anchor="end" font-size="12" fill="#1E66F5">film &#183; CR plate &#183; DDA</text>

  <!-- resulting image strip -->
  <rect x="262" y="372" width="80" height="24" fill="#DCE9FF"/>
  <rect x="342" y="372" width="106" height="24" fill="#6FA3F7"/>
  <rect x="448" y="372" width="40" height="24" fill="#0B1F3A"/>
  <rect x="488" y="372" width="50" height="24" fill="#6FA3F7"/>
  <rect x="262" y="372" width="276" height="24" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="585" y="389" font-size="13" fill="#0B1F3A">the radiograph</text>
  <text x="300" y="414" text-anchor="middle" font-size="12" fill="#0B1F3A">lighter &#8212; thicker metal</text>
  <text x="478" y="414" text-anchor="middle" font-size="12" font-weight="bold" fill="#0B1F3A">dark spot = void</text>
  <text x="400" y="440" text-anchor="middle" font-size="13" font-style="italic" fill="#1E66F5">a two-dimensional shadow of everything between source and detector</text>
</svg>
