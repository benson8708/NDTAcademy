<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Reading the Fracture Face</text>

  <!-- panel titles -->
  <text x="150" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">FATIGUE</text>
  <text x="150" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">progressive — detectable in principle</text>
  <text x="405" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">BRITTLE</text>
  <text x="405" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">single event, no deformation</text>
  <text x="655" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">DUCTILE OVERLOAD</text>
  <text x="655" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E">single event, gross deformation</text>

  <!-- panel 1: fatigue fracture face (bolt cross-section) -->
  <circle cx="150" cy="215" r="95" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <path d="M55,210 Q150,290 245,210 A95,95 0 1 1 55,210 Z" fill="#9BC4FF" stroke="none"/>
  <path d="M117,126 Q150,160 183,126" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <path d="M102,133 Q150,186 198,133" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <path d="M77,154 Q150,224 223,154" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <path d="M64,175 Q150,258 236,175" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <path d="M55,210 Q150,290 245,210" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <line x1="138" y1="128" x2="132" y2="142" stroke="#D14343" stroke-width="1.6"/>
  <line x1="150" y1="124" x2="150" y2="141" stroke="#D14343" stroke-width="1.6"/>
  <line x1="162" y1="128" x2="168" y2="142" stroke="#D14343" stroke-width="1.6"/>
  <circle cx="150" cy="120" r="5" fill="#D14343"/>
  <line x1="157" y1="116" x2="206" y2="99" stroke="#D14343" stroke-width="1.2"/>
  <text x="210" y="96" font-family="Arial, sans-serif" font-size="11" fill="#D14343">origin</text>
  <text x="150" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">final fast fracture</text>
  <text x="150" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">beach marks fan out from the origin;</text>
  <text x="150" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">ratchet marks = multiple start sites</text>

  <!-- panel 2: brittle fracture face with chevrons -->
  <text x="405" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D14343">chevrons point back to the origin</text>
  <line x1="470" y1="132" x2="342" y2="132" stroke="#D14343" stroke-width="1.8"/>
  <polygon points="342,127 330,132 342,137" fill="#D14343"/>
  <rect x="300" y="150" width="210" height="110" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>
  <polygon points="300,197 312,205 300,213" fill="#D14343"/>
  <path d="M352,162 L332,205 L352,248" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M384,162 L364,205 L384,248" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M416,162 L396,205 L416,248" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M448,162 L428,205 L448,248" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M480,162 L460,205 L480,248" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="306" y1="215" x2="315" y2="268" stroke="#D14343" stroke-width="1.2"/>
  <text x="302" y="281" font-family="Arial, sans-serif" font-size="11" fill="#D14343">origin: arc-strike notch at edge</text>
  <text x="405" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">flat, bright, granular face;</text>
  <text x="405" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">no necking, no deformation</text>

  <!-- panel 3: ductile cup-and-cone -->
  <path d="M625,118 L685,118 L685,178 C685,194 678,198 672,206 L655,224 L638,206 C632,198 625,194 625,178 Z" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M625,332 L685,332 L685,268 L672,250 Q655,276 638,250 L625,268 Z" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="606" y1="176" x2="629" y2="193" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="604" y="173" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">necking</text>
  <line x1="704" y1="194" x2="675" y2="204" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="752" y="190" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">45° shear lip</text>
  <line x1="603" y1="229" x2="645" y2="222" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="600" y="232" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">cone</text>
  <line x1="716" y1="259" x2="678" y2="257" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="720" y="263" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">cup</text>
  <text x="655" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">necking, dull fibrous face,</text>
  <text x="655" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">cup-and-cone with 45° shear lips</text>

  <!-- takeaway bar -->
  <rect x="90" y="392" width="620" height="48" rx="8" fill="#0B1F3A"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Beach marks fan from a fatigue origin. Chevrons point back to a</text>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">brittle origin. Necking and dimples mean one-event ductile overload.</text>
</svg>
