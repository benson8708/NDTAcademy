<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0B1F3A">Eddy Current Generation and the Skin Effect</text>

  <!-- oscillator -->
  <circle cx="90" cy="120" r="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <path d="M78,120 q6,-11 12,0 q6,11 12,0" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <text x="90" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">oscillator</text>
  <line x1="108" y1="112" x2="185" y2="96" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="108" y1="128" x2="185" y2="150" stroke="#0B1F3A" stroke-width="2"/>

  <!-- probe coil: stacked turns -->
  <ellipse cx="225" cy="96" rx="40" ry="9" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="225" cy="110" rx="40" ry="9" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="225" cy="124" rx="40" ry="9" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="225" cy="138" rx="40" ry="9" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="225" cy="152" rx="40" ry="9" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <text x="278" y="88" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">probe coil</text>

  <!-- primary field arcs -->
  <path d="M193,165 C150,205 150,235 196,256" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="5,4"/>
  <path d="M257,165 C300,205 300,235 254,256" fill="none" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="5,4"/>
  <text x="312" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">primary field</text>

  <!-- secondary (opposing) field arrows -->
  <line x1="160" y1="252" x2="160" y2="202" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="154,204 166,204 160,192" fill="#0B1F3A"/>
  <line x1="290" y1="252" x2="290" y2="202" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5,4"/>
  <polygon points="284,204 296,204 290,192" fill="#0B1F3A"/>
  <text x="148" y="186" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">opposing field</text>

  <!-- conductive part -->
  <rect x="55" y="258" width="370" height="120" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="240" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">conductive test part</text>

  <!-- eddy current loops -->
  <ellipse cx="225" cy="272" rx="26" ry="6" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <ellipse cx="225" cy="272" rx="46" ry="10" fill="none" stroke="#1E66F5" stroke-width="2"/>
  <ellipse cx="225" cy="272" rx="66" ry="14" fill="none" stroke="#1E66F5" stroke-width="1.6"/>
  <polygon points="289,264 299,272 287,278" fill="#1E66F5"/>
  <line x1="282" y1="280" x2="314" y2="298" stroke="#5A6B7E" stroke-width="1.2"/>
  <text x="318" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">eddy currents</text>
  <text x="318" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">loops parallel to surface</text>

  <!-- bottom takeaway (left) -->
  <text x="240" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Disturb the loops — crack, thinning, conductivity shift —</text>
  <text x="240" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">and the coil's impedance changes. That is the signal.</text>

  <!-- right panel: skin effect graph -->
  <text x="635" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B1F3A">Skin effect: current density vs depth</text>
  <line x1="500" y1="120" x2="500" y2="410" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="494,408 506,408 500,422" fill="#0B1F3A"/>
  <text x="500" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">depth</text>
  <line x1="500" y1="120" x2="770" y2="120" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="768,114 768,126 782,120" fill="#0B1F3A"/>
  <text x="766" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">current density</text>
  <text x="744" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">100% at surface</text>

  <!-- decay curve -->
  <path d="M750,120 C690,152 628,180 592,213 C560,243 545,274 534,306 C525,338 518,368 512,399" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <!-- 1-delta marker -->
  <line x1="500" y1="213" x2="592" y2="213" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="592" cy="213" r="4.5" fill="#0B1F3A"/>
  <text x="492" y="218" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">1δ</text>
  <text x="604" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">37% (1/e)</text>

  <!-- 3-delta marker -->
  <line x1="500" y1="399" x2="560" y2="399" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="512" cy="399" r="4.5" fill="#0B1F3A"/>
  <text x="492" y="404" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">3δ</text>
  <text x="568" y="395" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">≈5% — practical limit</text>

  <!-- formula notes -->
  <text x="640" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">δ = 1 / √(π f μ σ)</text>
  <text x="640" y="479" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">raise f, σ, or μ → δ shrinks</text>
</svg>
