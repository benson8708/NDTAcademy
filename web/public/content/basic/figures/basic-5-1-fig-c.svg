<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Time, Distance, Shielding &#8212; and the Inverse Square Law</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">ALARA in practice: three levers, one law</text>

  <!-- source -->
  <circle cx="80" cy="240" r="9" fill="#1E66F5"/>
  <line x1="80" y1="222" x2="80" y2="208" stroke="#1E66F5" stroke-width="2"/>
  <line x1="80" y1="258" x2="80" y2="272" stroke="#1E66F5" stroke-width="2"/>
  <line x1="62" y1="240" x2="48" y2="240" stroke="#1E66F5" stroke-width="2"/>
  <line x1="93" y1="227" x2="103" y2="217" stroke="#1E66F5" stroke-width="2"/>
  <line x1="93" y1="253" x2="103" y2="263" stroke="#1E66F5" stroke-width="2"/>
  <line x1="67" y1="227" x2="57" y2="217" stroke="#1E66F5" stroke-width="2"/>
  <line x1="67" y1="253" x2="57" y2="263" stroke="#1E66F5" stroke-width="2"/>
  <text x="80" y="296" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">source</text>

  <!-- diverging rays -->
  <line x1="89" y1="236" x2="540" y2="160" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="89" y1="240" x2="540" y2="240" stroke="#9BC4FF" stroke-width="1.5"/>
  <line x1="89" y1="244" x2="540" y2="320" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- distance markers: 1 m, 2 m, 4 m -->
  <line x1="195" y1="130" x2="195" y2="338" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="310" y1="130" x2="310" y2="338" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="540" y1="130" x2="540" y2="338" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="195" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">1 m</text>
  <text x="310" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">2 m</text>
  <text x="540" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B1F3A">4 m</text>

  <!-- dose-rate readouts -->
  <rect x="152" y="352" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="195" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">80 mR/h</text>
  <rect x="267" y="352" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="310" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">20 mR/h</text>
  <rect x="497" y="352" width="86" height="26" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="540" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">5 mR/h</text>

  <text x="310" y="410" text-anchor="middle" font-size="14" fill="#0B1F3A">I&#8321;d&#8321;&#178; = I&#8322;d&#8322;&#178;</text>
  <text x="310" y="430" text-anchor="middle" font-size="13" font-style="italic" fill="#1E66F5">double the distance &#8212; one quarter the dose rate</text>

  <!-- divider -->
  <line x1="600" y1="100" x2="600" y2="400" stroke="#9BC4FF" stroke-width="1.5"/>

  <!-- TIME -->
  <circle cx="640" cy="150" r="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="640" y1="150" x2="640" y2="137" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="640" y1="150" x2="650" y2="156" stroke="#0B1F3A" stroke-width="2"/>
  <text x="672" y="143" font-size="13.5" font-weight="bold" fill="#0B1F3A">TIME</text>
  <text x="672" y="160" font-size="12" fill="#1E66F5">halve the minutes,</text>
  <text x="672" y="175" font-size="12" fill="#1E66F5">halve the dose</text>

  <!-- DISTANCE -->
  <line x1="624" y1="250" x2="658" y2="250" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="624,244 624,256 612,250" fill="#0B1F3A"/>
  <polygon points="658,244 658,256 670,250" fill="#0B1F3A"/>
  <text x="678" y="243" font-size="13.5" font-weight="bold" fill="#0B1F3A">DISTANCE</text>
  <text x="678" y="260" font-size="12" fill="#1E66F5">inverse square &#8212;</text>
  <text x="678" y="275" font-size="12" fill="#1E66F5">steps beat lead</text>

  <!-- SHIELDING -->
  <rect x="622" y="330" width="10" height="42" fill="#9BC4FF" fill-opacity="0.6" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="635" y="330" width="10" height="42" fill="#9BC4FF" fill-opacity="0.6" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="648" y="330" width="10" height="42" fill="#9BC4FF" fill-opacity="0.6" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="672" y="343" font-size="13.5" font-weight="bold" fill="#0B1F3A">SHIELDING</text>
  <text x="672" y="360" font-size="12" fill="#1E66F5">each half-value layer</text>
  <text x="672" y="375" font-size="12" fill="#1E66F5">cuts the field in half</text>
</svg>
