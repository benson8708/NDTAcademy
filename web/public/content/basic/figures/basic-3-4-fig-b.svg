<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">Signature PT Applications by Product Form</text>

  <!-- Q1: Castings -->
  <rect x="24" y="56" width="368" height="206" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">CASTINGS</text>
  <text x="40" y="101" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Al, Mg, bronze — often PT's job alone</text>
  <path d="M 70 130 L 250 130 L 250 170 L 330 170 L 330 240 L 70 240 Z" fill="#9BC4FF" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="290" cy="205" r="26" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- cold shut -->
  <path d="M 100 152 Q 140 140 180 152" fill="none" stroke="#D14343" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="144" x2="116" y2="120" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="112" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">cold shut</text>
  <!-- hot tear at the inside fillet -->
  <polyline points="250,172 258,182 252,192 262,200 256,210" fill="none" stroke="#D14343" stroke-width="3" stroke-linejoin="round"/>
  <line x1="258" y1="182" x2="286" y2="150" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="290" y="146" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">hot tear at fillet</text>
  <!-- microshrinkage on boss -->
  <circle cx="282" cy="199" r="2.5" fill="#D14343"/>
  <circle cx="292" cy="194" r="2" fill="#D14343"/>
  <circle cx="299" cy="203" r="2.5" fill="#D14343"/>
  <circle cx="285" cy="210" r="2" fill="#D14343"/>
  <circle cx="295" cy="213" r="2.5" fill="#D14343"/>
  <text x="290" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">microshrinkage</text>

  <!-- Q2: Welds -->
  <rect x="408" y="56" width="368" height="206" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="424" y="82" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">WELDS</text>
  <text x="424" y="101" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">PT where MT can't: SS, Al, Ni, Ti</text>
  <rect x="440" y="120" width="320" height="130" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="450" y="168" width="300" height="36" rx="18" fill="#9BC4FF" fill-opacity="0.5" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 480 172 Q 474 186 480 200 M 520 172 Q 514 186 520 200 M 560 172 Q 554 186 560 200 M 600 172 Q 594 186 600 200 M 640 172 Q 634 186 640 200 M 680 172 Q 674 186 680 200" fill="none" stroke="#0B1F3A" stroke-width="1.5" opacity="0.4"/>
  <!-- crater crack star at weld stop -->
  <line x1="722" y1="178" x2="736" y2="194" stroke="#D14343" stroke-width="2.5"/>
  <line x1="736" y1="178" x2="722" y2="194" stroke="#D14343" stroke-width="2.5"/>
  <line x1="729" y1="174" x2="729" y2="198" stroke="#D14343" stroke-width="2.5"/>
  <line x1="729" y1="194" x2="722" y2="228" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="718" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">crater crack</text>
  <!-- toe crack -->
  <polyline points="540,208 554,214 568,206 582,214 596,207" fill="none" stroke="#D14343" stroke-width="3" stroke-linejoin="round"/>
  <line x1="568" y1="212" x2="556" y2="232" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="548" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">toe crack</text>
  <!-- surface porosity -->
  <circle cx="500" cy="186" r="4" fill="#D14343"/>
  <circle cx="514" cy="180" r="3" fill="#D14343"/>
  <line x1="507" y1="180" x2="492" y2="146" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="490" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">surface porosity</text>

  <!-- Q3: Wrought bar -->
  <rect x="24" y="276" width="368" height="206" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="40" y="302" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">WROUGHT BAR &amp; FORGINGS</text>
  <text x="40" y="321" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Seams and laps follow the grain</text>
  <rect x="60" y="352" width="296" height="58" rx="22" fill="#9BC4FF" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- seam: straight broken line parallel to axis -->
  <line x1="92" y1="372" x2="330" y2="372" stroke="#D14343" stroke-width="3" stroke-dasharray="20 10" stroke-linecap="round"/>
  <text x="208" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">seam — straight, broken line</text>
  <line x1="208" y1="344" x2="208" y2="368" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- lap: short shallow-angle faint line -->
  <line x1="120" y1="398" x2="158" y2="392" stroke="#D14343" stroke-width="2.5" opacity="0.7"/>
  <line x1="139" y1="396" x2="120" y2="424" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="114" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">lap (faint)</text>
  <!-- rolling direction arrow -->
  <line x1="200" y1="442" x2="320" y2="442" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="320,436 334,442 320,448" fill="#1E66F5"/>
  <text x="266" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">rolling direction</text>

  <!-- Q4: Machined / heat treated -->
  <rect x="408" y="276" width="368" height="206" rx="8" fill="#FFFFFF" stroke="#9BC4FF" stroke-width="2"/>
  <text x="424" y="302" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1F3A">MACHINED &amp; HEAT-TREATED</text>
  <text x="424" y="321" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">Etch first if machining smeared metal</text>
  <circle cx="590" cy="390" r="58" fill="#9BC4FF" fill-opacity="0.25" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="575" y="330" width="30" height="20" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <!-- grinding crack network -->
  <line x1="548" y1="376" x2="562" y2="392" stroke="#D14343" stroke-width="2"/>
  <line x1="560" y1="374" x2="548" y2="390" stroke="#D14343" stroke-width="2"/>
  <line x1="556" y1="392" x2="570" y2="406" stroke="#D14343" stroke-width="2"/>
  <line x1="568" y1="390" x2="556" y2="404" stroke="#D14343" stroke-width="2"/>
  <line x1="544" y1="396" x2="552" y2="410" stroke="#D14343" stroke-width="2"/>
  <line x1="552" y1="412" x2="544" y2="398" stroke="#D14343" stroke-width="2"/>
  <line x1="552" y1="404" x2="510" y2="442" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="498" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">grinding-crack network</text>
  <!-- quench crack from keyway corner -->
  <polyline points="605,350 616,362 610,374 622,386 618,398" fill="none" stroke="#D14343" stroke-width="3" stroke-linejoin="round"/>
  <line x1="616" y1="362" x2="666" y2="344" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="670" y="348" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">quench crack</text>
  <text x="670" y="366" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">from keyway</text>
</svg>
