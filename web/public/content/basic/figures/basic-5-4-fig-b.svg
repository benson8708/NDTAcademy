<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#0B1F3A">Reading the Film: Light/Dark Logic</text>
  <text x="400" y="52" text-anchor="middle" font-size="14" fill="#1E66F5">direct-exposure film &#8212; hydrogen prints light, metal prints dark</text>

  <!-- panel 1: explosive gap -->
  <rect x="24" y="70" width="240" height="285" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="144" y="94" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0B1F3A">Gap in the explosive train</text>
  <text x="144" y="110" text-anchor="middle" font-size="11.5" fill="#1E66F5">metal-cased CAD / detonator</text>
  <rect x="64" y="128" width="160" height="48" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="72" y="136" width="144" height="32" fill="#9BC4FF"/>
  <rect x="124" y="136" width="18" height="32" fill="#FFFFFF"/>
  <line x1="133" y1="136" x2="133" y2="120" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="137" y="124" font-size="10.5" fill="#1E66F5">gap</text>
  <text x="144" y="192" text-anchor="middle" font-size="11" fill="#0B1F3A">steel case &#183; explosive column</text>
  <rect x="54" y="205" width="180" height="74" fill="#2B2B2B"/>
  <rect x="72" y="217" width="144" height="50" fill="#E8E8E8"/>
  <rect x="124" y="217" width="18" height="50" fill="#2B2B2B"/>
  <text x="144" y="298" text-anchor="middle" font-size="11.5" fill="#0B1F3A">explosive prints light;</text>
  <text x="144" y="314" text-anchor="middle" font-size="11.5" fill="#0B1F3A">the gap prints dark</text>
  <text x="144" y="336" text-anchor="middle" font-size="11" fill="#1E66F5">case barely registers &#8212; a window</text>

  <!-- panel 2: missing O-ring -->
  <rect x="280" y="70" width="240" height="285" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="400" y="94" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0B1F3A">Missing O-ring</text>
  <text x="400" y="110" text-anchor="middle" font-size="11.5" fill="#1E66F5">assembled valve, two seal grooves</text>
  <rect x="320" y="128" width="160" height="48" rx="4" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="356" cy="152" r="11" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="433" y="141" width="22" height="22" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="356" y="192" text-anchor="middle" font-size="11" fill="#0B1F3A">seated</text>
  <text x="444" y="192" text-anchor="middle" font-size="11" fill="#1E66F5">empty groove</text>
  <rect x="310" y="205" width="180" height="74" fill="#2B2B2B"/>
  <rect x="345" y="217" width="14" height="50" fill="#E8E8E8"/>
  <text x="400" y="298" text-anchor="middle" font-size="11.5" fill="#0B1F3A">present seal: light band &#8212;</text>
  <text x="400" y="314" text-anchor="middle" font-size="11.5" fill="#0B1F3A">missing seal: expected band absent</text>
  <text x="400" y="336" text-anchor="middle" font-size="11" fill="#1E66F5">interpret against the assembly drawing</text>

  <!-- panel 3: hidden corrosion -->
  <rect x="536" y="70" width="240" height="285" rx="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="656" y="94" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0B1F3A">Hidden corrosion</text>
  <text x="656" y="110" text-anchor="middle" font-size="11.5" fill="#1E66F5">aluminum lap joint, skin intact</text>
  <rect x="572" y="136" width="150" height="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="592" y="150" width="150" height="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <ellipse cx="656" cy="150" rx="28" ry="6" fill="#9BC4FF"/>
  <line x1="656" y1="144" x2="656" y2="126" stroke="#1E66F5" stroke-width="1.5"/>
  <text x="660" y="130" font-size="10.5" fill="#1E66F5">hydrated product</text>
  <text x="656" y="192" text-anchor="middle" font-size="11" fill="#0B1F3A">faying surfaces &#183; bound water</text>
  <rect x="566" y="205" width="180" height="74" fill="#555555"/>
  <ellipse cx="656" cy="242" rx="32" ry="19" fill="#E8E8E8"/>
  <text x="656" y="298" text-anchor="middle" font-size="11.5" fill="#0B1F3A">an unexpected light patch &#8212;</text>
  <text x="656" y="314" text-anchor="middle" font-size="11.5" fill="#0B1F3A">hydrogen where none belongs</text>
  <text x="656" y="336" text-anchor="middle" font-size="11" fill="#1E66F5">found before measurable metal loss</text>

  <!-- rule band -->
  <rect x="24" y="372" width="752" height="58" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="2"/>
  <text x="400" y="396" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B1F3A">Hydrogen prints light. Voids in hydrogenous material print dark.</text>
  <text x="400" y="416" text-anchor="middle" font-size="12.5" fill="#1E66F5">aluminum, steel &#8212; even lead &#8212; are near-transparent windows; confirm the display convention before interpreting</text>
</svg>
