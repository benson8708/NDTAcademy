<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Practice Panel: Visible Red Dye over White Developer</text>

  <!-- housing plate (developed, white background) -->
  <rect x="60" y="80" width="680" height="360" rx="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="3"/>

  <!-- weld bead across the upper area -->
  <rect x="100" y="110" width="600" height="40" rx="18" fill="#9BC4FF" fill-opacity="0.45" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M 150 114 Q 144 130 150 146 M 210 114 Q 204 130 210 146 M 270 114 Q 264 130 270 146 M 330 114 Q 324 130 330 146 M 390 114 Q 384 130 390 146 M 450 114 Q 444 130 450 146 M 510 114 Q 504 130 510 146 M 570 114 Q 564 130 570 146 M 630 114 Q 624 130 630 146" fill="none" stroke="#0B1F3A" stroke-width="1.5" opacity="0.35"/>
  <text x="104" y="102" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">weld bead</text>

  <!-- 1: jagged crack along lower weld toe (region 400,135,180,70) -->
  <polyline points="420,165 436,173 450,162 466,174 482,164 498,175 514,165 530,174 546,166 560,172" fill="none" stroke="#D14343" stroke-width="3.5" stroke-linejoin="round"/>
  <circle cx="406" cy="190" r="13" fill="#0B1F3A"/>
  <text x="406" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>

  <!-- 2: lint fiber curl (region 625,170,110,80) -->
  <path d="M 648 228 C 660 196 686 198 690 214 C 694 230 670 238 666 222" fill="none" stroke="#D14343" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="640" cy="190" r="13" fill="#0B1F3A"/>
  <text x="640" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>

  <!-- 3: blotchy wash-residue patch (region 110,245,140,115) -->
  <ellipse cx="180" cy="302" rx="54" ry="36" fill="#D14343" opacity="0.28"/>
  <ellipse cx="158" cy="318" rx="26" ry="16" fill="#D14343" opacity="0.32"/>
  <ellipse cx="206" cy="288" rx="22" ry="13" fill="#D14343" opacity="0.34"/>
  <circle cx="124" cy="262" r="13" fill="#0B1F3A"/>
  <text x="124" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>

  <!-- 4: press-fit bushing with interface ring (region 305,265,130,130) -->
  <circle cx="370" cy="330" r="54" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="370" cy="330" r="30" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <circle cx="370" cy="330" r="48" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="370" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">press-fit bushing (per drawing)</text>
  <circle cx="318" cy="280" r="13" fill="#0B1F3A"/>
  <text x="318" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>

  <!-- 5: pinpoint cluster on cast boss (region 525,255,150,150) -->
  <circle cx="600" cy="330" r="62" fill="#9BC4FF" fill-opacity="0.18" stroke="#0B1F3A" stroke-width="2.5"/>
  <circle cx="584" cy="316" r="3" fill="#D14343"/>
  <circle cx="598" cy="308" r="2.5" fill="#D14343"/>
  <circle cx="612" cy="318" r="3.5" fill="#D14343"/>
  <circle cx="626" cy="312" r="2.5" fill="#D14343"/>
  <circle cx="578" cy="332" r="2.5" fill="#D14343"/>
  <circle cx="592" cy="338" r="3" fill="#D14343"/>
  <circle cx="606" cy="332" r="2.5" fill="#D14343"/>
  <circle cx="620" cy="340" r="3" fill="#D14343"/>
  <circle cx="632" cy="330" r="2.5" fill="#D14343"/>
  <circle cx="586" cy="350" r="2.5" fill="#D14343"/>
  <circle cx="602" cy="354" r="3" fill="#D14343"/>
  <circle cx="618" cy="352" r="2.5" fill="#D14343"/>
  <text x="600" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">cast boss</text>
  <circle cx="538" cy="270" r="13" fill="#0B1F3A"/>
  <text x="538" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>

  <!-- legend -->
  <line x1="80" y1="470" x2="112" y2="470" stroke="#D14343" stroke-width="3.5"/>
  <text x="122" y="475" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">visible red-dye indication</text>
  <rect x="430" y="462" width="16" height="16" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="456" y="475" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">white developer background</text>
</svg>
