<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Anatomy of an A-Scan: Pulse-Echo, Straight Beam</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Horizontal axis: sound-path distance (time). Vertical axis: echo amplitude.</text>

  <!-- cable and transducer -->
  <line x1="135" y1="68" x2="135" y2="86" stroke="#0B1F3A" stroke-width="4"/>
  <rect x="103" y="86" width="64" height="28" rx="4" fill="#0B1F3A"/>

  <!-- plate cross-section (1.00 in = 240 px) -->
  <rect x="63" y="114" width="144" height="240" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- beam (dashed) -->
  <line x1="117" y1="114" x2="117" y2="346" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <line x1="153" y1="114" x2="153" y2="346" stroke="#1E66F5" stroke-width="2" stroke-dasharray="6,5"/>
  <polygon points="128,336 142,336 135,350" fill="#1E66F5"/>

  <!-- inclusion at 0.60 in -->
  <ellipse cx="135" cy="258" rx="15" ry="6" fill="#FFFFFF" stroke="#D7263D" stroke-width="2.5"/>

  <!-- depth ticks -->
  <line x1="207" y1="114" x2="214" y2="114" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="219" y="119" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">0</text>
  <line x1="207" y1="258" x2="214" y2="258" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="219" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#D7263D">0.60 in.</text>
  <line x1="207" y1="354" x2="214" y2="354" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="219" y="359" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">1.00 in.</text>
  <text x="135" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">steel plate, inclusion at 0.60 in.</text>

  <!-- screen frame -->
  <rect x="300" y="92" width="445" height="270" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- vertical grid: 0 to 1.25 in, 0.25 in per division (85 px) -->
  <line x1="310" y1="100" x2="310" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="395" y1="100" x2="395" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="480" y1="100" x2="480" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="565" y1="100" x2="565" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="650" y1="100" x2="650" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="735" y1="100" x2="735" y2="352" stroke="#D7E0F0" stroke-width="1"/>
  <!-- horizontal grid: 25% FSH steps -->
  <line x1="310" y1="110" x2="735" y2="110" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="310" y1="169" x2="735" y2="169" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="310" y1="228" x2="735" y2="228" stroke="#D7E0F0" stroke-width="1"/>
  <line x1="310" y1="286" x2="735" y2="286" stroke="#D7E0F0" stroke-width="1"/>
  <!-- baseline -->
  <line x1="310" y1="345" x2="735" y2="345" stroke="#0B1F3A" stroke-width="2"/>

  <!-- initial pulse -->
  <polyline points="310,345 313,118 316,300 318,135 321,345" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- flaw echo at 0.60 in (x = 310 + 0.60*340 = 514) -->
  <polyline points="506,345 514,196 522,345" fill="none" stroke="#D7263D" stroke-width="3"/>
  <!-- back-wall echo at 1.00 in (x = 650) -->
  <polyline points="643,345 650,158 657,345" fill="none" stroke="#0B1F3A" stroke-width="3"/>

  <!-- labels -->
  <text x="348" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">initial pulse</text>
  <line x1="345" y1="132" x2="324" y2="140" stroke="#0B1F3A" stroke-width="1.2"/>
  <text x="514" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D7263D">flaw echo — 0.60 in.</text>
  <text x="650" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">back wall — 1.00 in.</text>

  <!-- axis labels -->
  <text x="310" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">0</text>
  <text x="480" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">0.50</text>
  <text x="650" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">1.00</text>
  <text x="735" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">1.25</text>
  <text x="522" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">sound path in steel (in.)</text>
  <text x="288" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A" transform="rotate(-90 288 228)">% full screen height</text>

  <!-- takeaway -->
  <rect x="120" y="408" width="560" height="36" rx="8" fill="#0B1F3A"/>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">Position on the sweep reads depth. Height reads size only against a reference.</text>
</svg>
