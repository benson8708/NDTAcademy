<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0B1F3A">Angle Beam in a Single-V Weld: Which Reflector Answers?</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">60° shear wave, first leg toward the far fusion face — echoes return only when geometry cooperates.</text>

  <!-- plate -->
  <rect x="55" y="190" width="690" height="130" fill="#E8F1FB" stroke="#0B1F3A" stroke-width="2.5"/>

  <!-- weld: cap, V, root bead -->
  <path d="M215,190 Q300,170 385,190 Z" fill="#D6E6FA" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="225,190 375,190 300,320" fill="#D6E6FA" stroke="#0B1F3A" stroke-width="2"/>
  <path d="M288,320 Q300,332 312,320 Z" fill="#D6E6FA" stroke="#0B1F3A" stroke-width="2"/>

  <!-- A: lack of sidewall fusion on far (left) bevel -->
  <line x1="268" y1="265" x2="291" y2="305" stroke="#0B1F3A" stroke-width="5"/>
  <circle cx="242" cy="262" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="242" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A</text>
  <line x1="252" y1="266" x2="266" y2="272" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- B: porosity cluster -->
  <circle cx="310" cy="218" r="3.5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="323" cy="226" r="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="333" cy="214" r="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="315" cy="235" r="2.5" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="329" cy="238" r="3" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <circle cx="348" cy="210" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="348" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B</text>

  <!-- C: lamination parallel to surface -->
  <ellipse cx="560" cy="257" rx="78" ry="6" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="468" cy="243" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="468" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C</text>
  <line x1="477" y1="249" x2="494" y2="254" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- D: smooth back wall stretch -->
  <rect x="480" y="304" width="145" height="28" rx="6" fill="none" stroke="#0B1F3A" stroke-width="1.8" stroke-dasharray="3,4"/>
  <circle cx="552" cy="318" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="552" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">D</text>

  <!-- probe: wedge + element -->
  <polygon points="404,190 496,190 496,146 436,146" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="444" y="124" width="44" height="22" fill="#0B1F3A"/>
  <text x="512" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">60° shear-wave probe</text>
  <line x1="508" y1="144" x2="498" y2="156" stroke="#5A6B7E" stroke-width="1.2"/>
  <circle cx="444" cy="190" r="2.5" fill="#0B1F3A"/>

  <!-- beam: first leg, exit point to LOF, perpendicular strike -->
  <line x1="444" y1="190" x2="281" y2="284" stroke="#1E66F5" stroke-width="3"/>
  <polygon points="281,284 290.6,272.7 295.6,281.3" fill="#1E66F5"/>
  <polyline points="284.5,292.8 292.3,288.3 287.8,280.5" stroke="#5A6B7E" stroke-width="1.5" fill="none"/>

  <!-- echo retraces path -->
  <line x1="296" y1="272" x2="372" y2="228" stroke="#1E66F5" stroke-width="1.8" stroke-dasharray="5,4"/>
  <polygon points="372,228 362.9,238.4 358.4,230.6" fill="#1E66F5"/>
  <text x="385" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#5A6B7E">echo retraces the path</text>

  <!-- angle annotation -->
  <line x1="444" y1="190" x2="444" y2="250" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M444,238 A48,48 0 0 1 402,214" stroke="#5A6B7E" stroke-width="1.5" fill="none"/>
  <text x="407" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B1F3A">60°</text>

  <!-- legend -->
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">A lack of sidewall fusion (far bevel) · B porosity · C lamination · D smooth back wall</text>

  <!-- takeaway -->
  <rect x="110" y="410" width="580" height="34" rx="8" fill="#0B1F3A"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">A planar reflector answers loudest when the beam strikes it square-on.</text>
</svg>
