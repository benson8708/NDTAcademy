<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Barlow, Arial, sans-serif">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0B1F3A">COMPOSITE LAYUP AND CURE — WHAT EACH STEP CAN LEAVE BEHIND</text>

  <!-- Stage 1: LAYUP -->
  <g>
    <rect x="28" y="62" width="170" height="200" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="113" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">1 · PLY LAYUP</text>
    <!-- tool -->
    <rect x="48" y="200" width="130" height="14" fill="#90a4b8"/>
    <text x="113" y="228" text-anchor="middle" font-size="10" fill="#5b6b7c">TOOL / MOLD</text>
    <!-- plies with orientations -->
    <rect x="52" y="184" width="122" height="12" fill="#1E66F5" opacity="0.25"/>
    <rect x="56" y="170" width="114" height="12" fill="#1E66F5" opacity="0.45"/>
    <rect x="60" y="156" width="106" height="12" fill="#1E66F5" opacity="0.65"/>
    <rect x="64" y="142" width="98" height="12" fill="#1E66F5" opacity="0.85"/>
    <text x="113" y="133" text-anchor="middle" font-size="10" fill="#0B1F3A">PLIES 0° / +45° / −45° / 90°</text>
    <!-- FOD -->
    <circle cx="120" cy="176" r="4" fill="#d23b3b"/>
    <line x1="120" y1="176" x2="158" y2="118" stroke="#d23b3b" stroke-width="1"/>
    <text x="118" y="112" font-size="10" font-weight="700" fill="#d23b3b">FOD between plies</text>
    <text x="113" y="250" text-anchor="middle" font-size="10" fill="#d23b3b">Risks: FOD · wrong orientation</text>
  </g>
  <path d="M202 162 h22" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrA)"/>

  <!-- Stage 2: BAGGING -->
  <g>
    <rect x="228" y="62" width="170" height="200" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="313" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">2 · VACUUM BAG</text>
    <rect x="248" y="200" width="130" height="14" fill="#90a4b8"/>
    <rect x="256" y="172" width="114" height="28" fill="#1E66F5" opacity="0.5"/>
    <!-- bag film over part -->
    <path d="M244 204 q10 -52 69 -52 q59 0 69 52" fill="none" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="313" y="142" text-anchor="middle" font-size="10" fill="#0B1F3A">BAG + BREATHER, VACUUM DRAWN</text>
    <!-- bridging callout -->
    <path d="M250 196 q4 -16 16 -22" fill="none" stroke="#d23b3b" stroke-width="2"/>
    <text x="313" y="250" text-anchor="middle" font-size="10" fill="#d23b3b">Risks: bag bridging · leaks · wrinkles</text>
  </g>
  <path d="M402 162 h22" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrA)"/>

  <!-- Stage 3: AUTOCLAVE -->
  <g>
    <rect x="428" y="62" width="170" height="200" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="513" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">3 · AUTOCLAVE CURE</text>
    <!-- autoclave vessel -->
    <rect x="450" y="108" width="126" height="84" rx="38" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
    <rect x="486" y="158" width="54" height="12" fill="#1E66F5" opacity="0.6"/>
    <rect x="480" y="170" width="66" height="8" fill="#90a4b8"/>
    <text x="513" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#0B1F3A">HEAT + PRESSURE</text>
    <text x="513" y="143" text-anchor="middle" font-size="10" fill="#5b6b7c">ramp · hold · cool per spec</text>
    <text x="513" y="212" text-anchor="middle" font-size="10" fill="#0B1F3A">Cure cycle is recorded evidence</text>
    <text x="513" y="250" text-anchor="middle" font-size="10" fill="#d23b3b">Risks: porosity · under-cure · exotherm</text>
  </g>
  <path d="M602 162 h22" stroke="#0B1F3A" stroke-width="2" marker-end="url(#arrA)"/>

  <!-- Stage 4: CURED PART -->
  <g>
    <rect x="628" y="62" width="148" height="200" rx="8" fill="#f4f8fd" stroke="#1E66F5" stroke-width="1.5"/>
    <text x="702" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#1E66F5">4 · CURED PART</text>
    <!-- laminate cross-section with hidden flaws -->
    <rect x="644" y="140" width="116" height="44" fill="#1E66F5" opacity="0.55"/>
    <line x1="644" y1="151" x2="760" y2="151" stroke="#ffffff" stroke-width="1"/>
    <line x1="644" y1="162" x2="760" y2="162" stroke="#ffffff" stroke-width="1"/>
    <line x1="644" y1="173" x2="760" y2="173" stroke="#ffffff" stroke-width="1"/>
    <!-- delamination -->
    <path d="M664 162 q14 -5 30 0" fill="none" stroke="#d23b3b" stroke-width="2.5"/>
    <!-- porosity -->
    <circle cx="726" cy="170" r="2.4" fill="#d23b3b"/><circle cx="736" cy="166" r="2" fill="#d23b3b"/><circle cx="731" cy="176" r="1.8" fill="#d23b3b"/>
    <text x="702" y="206" text-anchor="middle" font-size="10" fill="#d23b3b">Delamination · porosity hide inside</text>
    <text x="702" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#0B1F3A">→ UT / tap test / radiography</text>
  </g>

  <!-- bottom band: takeaway -->
  <rect x="28" y="290" width="748" height="120" rx="8" fill="#eef4fc" stroke="#1E66F5" stroke-width="1"/>
  <text x="48" y="320" font-size="13" font-weight="700" fill="#0B1F3A">WHY NDT CARES</text>
  <text x="48" y="344" font-size="12" fill="#0B1F3A">Every process step has a signature flaw: FOD and misoriented plies enter at layup, wrinkles and bridging at bagging,</text>
  <text x="48" y="364" font-size="12" fill="#0B1F3A">porosity and under-cure in the autoclave. The cured laminate hides them between plies, where only volumetric or</text>
  <text x="48" y="384" font-size="12" fill="#0B1F3A">bond-sensitive methods (ultrasonics, radiography, tap testing) can find them — visual inspection sees only the surface.</text>

  <defs>
    <marker id="arrA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#0B1F3A"/>
    </marker>
  </defs>
</svg>
