<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Mass Attenuation by Element: Thermal Neutrons vs. X-rays</text>

  <!-- axes -->
  <line x1="80" y1="60" x2="80" y2="345" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="80" y1="345" x2="750" y2="345" stroke="#0B1F3A" stroke-width="2"/>
  <text x="34" y="205" transform="rotate(-90 34 205)" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">Mass attenuation, &#956;/&#961; (log scale)</text>
  <text x="415" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">Atomic number Z</text>

  <!-- Z ticks -->
  <line x1="160" y1="345" x2="160" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="160" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">10</text>
  <line x1="230" y1="345" x2="230" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="230" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">20</text>
  <line x1="300" y1="345" x2="300" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="300" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">30</text>
  <line x1="370" y1="345" x2="370" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="370" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">40</text>
  <line x1="440" y1="345" x2="440" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="440" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">50</text>
  <line x1="510" y1="345" x2="510" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="510" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">60</text>
  <line x1="580" y1="345" x2="580" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="580" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">70</text>
  <line x1="650" y1="345" x2="650" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="650" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">80</text>
  <line x1="720" y1="345" x2="720" y2="351" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="720" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">90</text>

  <!-- X-ray smooth curve -->
  <path d="M 97 290 C 200 272, 350 248, 426 234 C 500 222, 600 204, 734 185" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <!-- Neutron irregular series -->
  <polyline points="97,159 111,179 125,123 132,270 181,322 272,283 426,156 538,82 664,326 671,331" fill="none" stroke="#D14343" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <circle cx="97" cy="159" r="5" fill="#D14343"/>
  <circle cx="111" cy="179" r="5" fill="#D14343"/>
  <circle cx="125" cy="123" r="5" fill="#D14343"/>
  <circle cx="132" cy="270" r="5" fill="#D14343"/>
  <circle cx="181" cy="322" r="5" fill="#D14343"/>
  <circle cx="272" cy="283" r="5" fill="#D14343"/>
  <circle cx="426" cy="156" r="5" fill="#D14343"/>
  <circle cx="538" cy="82" r="5" fill="#D14343"/>
  <circle cx="664" cy="326" r="5" fill="#D14343"/>
  <circle cx="671" cy="331" r="5" fill="#D14343"/>

  <!-- element labels -->
  <text x="86" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">H</text>
  <text x="104" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Li</text>
  <text x="125" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">B</text>
  <text x="145" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">C</text>
  <text x="181" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Al</text>
  <text x="272" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Fe</text>
  <text x="426" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Cd</text>
  <text x="528" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Gd</text>
  <text x="668" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D14343">Pb &#183; Bi</text>

  <!-- annotation -->
  <text x="290" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">Strong neutron attenuators (H, Li, B, Cd, Gd) image brightly in NR</text>

  <!-- legend -->
  <rect x="575" y="62" width="172" height="54" rx="6" fill="#FFFFFF" stroke="#1E66F5" stroke-width="1.5"/>
  <line x1="585" y1="78" x2="615" y2="78" stroke="#1E66F5" stroke-width="3"/>
  <text x="621" y="82" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">X-rays (125 kV)</text>
  <circle cx="600" cy="100" r="4.5" fill="#D14343"/>
  <line x1="585" y1="100" x2="615" y2="100" stroke="#D14343" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="621" y="104" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Thermal neutrons</text>

  <!-- Bottom note bar -->
  <rect x="24" y="396" width="752" height="46" rx="8" fill="#0B1F3A"/>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#FFFFFF">X-rays read the electron cloud &#8212; attenuation climbs smoothly with atomic number.</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9BC4FF">Neutrons read the nucleus: H, Li, B, Cd, Gd stop them; Pb and Bi barely slow them. Contrast inverts.</text>
</svg>
