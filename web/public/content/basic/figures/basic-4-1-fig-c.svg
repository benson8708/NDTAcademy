<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Head Shot on a Shaft: Which Discontinuity Shows?</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">Current runs end-to-end; circular flux wraps the circumference.</text>

  <!-- cables -->
  <line x1="30" y1="270" x2="70" y2="270" stroke="#0B1F3A" stroke-width="6"/>
  <line x1="730" y1="270" x2="770" y2="270" stroke="#0B1F3A" stroke-width="6"/>

  <!-- contact heads -->
  <rect x="70" y="210" width="70" height="120" rx="6" fill="#0B1F3A"/>
  <rect x="660" y="210" width="70" height="120" rx="6" fill="#0B1F3A"/>

  <!-- shaft -->
  <rect x="140" y="220" width="520" height="100" fill="#9BC4FF" stroke="#0B1F3A" stroke-width="3"/>

  <!-- current arrow along the axis -->
  <line x1="165" y1="270" x2="606" y2="270" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="606,263 622,270 606,277" fill="#0B1F3A"/>
  <text x="150" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">current I</text>
  <line x1="152" y1="360" x2="206" y2="360" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="206,355 218,360 206,365" fill="#0B1F3A"/>

  <!-- circular flux rings -->
  <ellipse cx="185" cy="270" rx="15" ry="62" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="178,206 191,208 181,217" fill="#1E66F5"/>
  <ellipse cx="635" cy="270" rx="15" ry="62" fill="none" stroke="#1E66F5" stroke-width="2.5"/>
  <polygon points="628,206 641,208 631,217" fill="#1E66F5"/>
  <text x="185" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E66F5">circular flux</text>

  <!-- A: axial seam along the top surface (target) -->
  <polyline points="330,226 342,222 354,228 366,223 378,227 390,222 402,227 414,223 426,227 438,222 450,227 462,224 470,226" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="398" cy="202" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="398" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">A</text>
  <line x1="398" y1="213" x2="398" y2="221" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- B: transverse crack across the shaft -->
  <polyline points="558,224 554,236 560,248 554,260 559,272 554,284 560,296 555,308 558,316" fill="none" stroke="#0B1F3A" stroke-width="3"/>
  <circle cx="584" cy="246" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="584" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">B</text>

  <!-- C: mid-wall inclusion (deep) -->
  <ellipse cx="252" cy="288" rx="24" ry="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="222" cy="268" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="222" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">C</text>

  <!-- D: sound surface -->
  <rect x="375" y="288" width="88" height="30" rx="6" fill="none" stroke="#0B1F3A" stroke-width="1.8" stroke-dasharray="3,4"/>
  <circle cx="419" cy="303" r="11" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="419" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">D</text>

  <!-- legend -->
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0B1F3A">A axial seam · B transverse crack · C mid-wall inclusion (deep) · D sound surface</text>

  <!-- takeaway -->
  <rect x="120" y="436" width="560" height="44" rx="8" fill="#0B1F3A"/>
  <text x="400" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Leakage needs a flaw that crosses the flux at or near the surface.</text>
</svg>
