<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Leak Testing Sensitivity Ladder</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">typical minimum detectable leak rate, std cm³/s</text>

  <!-- decade gridlines -->
  <line x1="230" y1="72" x2="230" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>
  <line x1="336" y1="72" x2="336" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>
  <line x1="442" y1="72" x2="442" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>
  <line x1="548" y1="72" x2="548" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>
  <line x1="654" y1="72" x2="654" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>
  <line x1="760" y1="72" x2="760" y2="348" stroke="#DCE6F2" stroke-width="1.5"/>

  <!-- bars: blue = locates, navy = totals -->
  <text x="222" y="99" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Pressure change (decay / rise)</text>
  <rect x="230" y="86" width="159" height="18" fill="#0B1F3A"/>
  <text x="222" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Bubble — solution film</text>
  <rect x="336" y="122" width="53" height="18" fill="#1E66F5"/>
  <text x="222" y="171" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Bubble — immersion</text>
  <rect x="389" y="158" width="53" height="18" fill="#1E66F5"/>
  <text x="222" y="207" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Halogen sniffer (heated anode)</text>
  <rect x="442" y="194" width="53" height="18" fill="#1E66F5"/>
  <text x="222" y="243" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Helium detector probe</text>
  <rect x="495" y="230" width="53" height="18" fill="#1E66F5"/>
  <text x="222" y="279" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Helium tracer probe</text>
  <rect x="548" y="266" width="53" height="18" fill="#1E66F5"/>
  <text x="222" y="315" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">Helium hood / inside-out</text>
  <rect x="654" y="302" width="106" height="18" fill="#0B1F3A"/>

  <!-- bar annotations -->
  <text x="395" y="99" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">volume- and time-limited</text>
  <text x="554" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">background-limited (5 ppm He)</text>
  <text x="646" y="315" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5A6B7E">most sensitive</text>

  <!-- axis -->
  <line x1="230" y1="348" x2="770" y2="348" stroke="#0B1F3A" stroke-width="2"/>
  <polygon points="768,342 768,354 782,348" fill="#0B1F3A"/>
  <line x1="230" y1="342" x2="230" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="336" y1="342" x2="336" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="442" y1="342" x2="442" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="548" y1="342" x2="548" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="654" y1="342" x2="654" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="760" y1="342" x2="760" y2="354" stroke="#0B1F3A" stroke-width="2"/>
  <text x="230" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻¹</text>
  <text x="336" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻³</text>
  <text x="442" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻⁵</text>
  <text x="548" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻⁷</text>
  <text x="654" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻⁹</text>
  <text x="760" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0B1F3A">10⁻¹¹</text>

  <!-- direction note -->
  <text x="495" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B1F3A">tighter specification → more sensitive technique</text>
  <line x1="640" y1="396" x2="700" y2="396" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="698,390 698,402 712,396" fill="#5A6B7E"/>

  <!-- legend -->
  <rect x="230" y="422" width="14" height="14" fill="#1E66F5"/>
  <text x="252" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">locates individual leaks</text>
  <rect x="430" y="422" width="14" height="14" fill="#0B1F3A"/>
  <text x="452" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">totals the whole boundary</text>
</svg>
