<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0B1F3A">Casting Process Comparison</text>

  <!-- column separators -->
  <line x1="272" y1="48" x2="272" y2="436" stroke="#D9E2EC" stroke-width="2"/>
  <line x1="528" y1="48" x2="528" y2="436" stroke="#D9E2EC" stroke-width="2"/>

  <!-- column headers -->
  <text x="146" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Green sand</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Metal molds (permanent / die)</text>
  <text x="664" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Investment (lost wax)</text>

  <!-- COLUMN 1: green sand flask -->
  <rect x="46" y="86" width="200" height="130" fill="#F4E3C1" stroke="#0B1F3A" stroke-width="2.5"/>
  <line x1="46" y1="151" x2="246" y2="151" stroke="#0B1F3A" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="54" y="102" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">cope</text>
  <text x="54" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">drag</text>
  <!-- pour cup, sprue, gate -->
  <polygon points="80,74 106,74 99,88 87,88" fill="#D9E2EC" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="89" y="88" width="8" height="70" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="97" y="150" width="14" height="10" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <!-- cavity -->
  <ellipse cx="156" cy="166" rx="46" ry="26" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="156" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">cavity</text>
  <!-- riser -->
  <rect x="206" y="106" width="14" height="50" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="232" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">riser</text>
  <text x="80" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">sprue</text>
  <!-- sand texture dots -->
  <circle cx="64" cy="120" r="1.6" fill="#C9A86A"/>
  <circle cx="150" cy="104" r="1.6" fill="#C9A86A"/>
  <circle cx="196" cy="132" r="1.6" fill="#C9A86A"/>
  <circle cx="70" cy="186" r="1.6" fill="#C9A86A"/>
  <circle cx="130" cy="202" r="1.6" fill="#C9A86A"/>
  <circle cx="216" cy="196" r="1.6" fill="#C9A86A"/>
  <text x="146" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#475569">expendable mold, broken at shakeout</text>

  <!-- COLUMN 2: die casting -->
  <rect x="306" y="86" width="90" height="130" fill="#D9E2EC" stroke="#0B1F3A" stroke-width="2.5"/>
  <rect x="400" y="86" width="90" height="130" fill="#D9E2EC" stroke="#0B1F3A" stroke-width="2.5"/>
  <!-- shot channel and plunger -->
  <rect x="284" y="142" width="86" height="14" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="284" y="138" width="14" height="22" fill="#94A3B8" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="304,144 318,149 304,154" fill="#1E66F5"/>
  <!-- cavity straddling the parting face -->
  <ellipse cx="398" cy="150" rx="24" ry="36" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <text x="398" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">cavity</text>
  <text x="448" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">steel die</text>
  <text x="400" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#475569">reusable water-cooled dies; pressure fill</text>

  <!-- COLUMN 3: investment -->
  <!-- wax tree -->
  <line x1="578" y1="88" x2="578" y2="200" stroke="#B08968" stroke-width="7"/>
  <line x1="578" y1="104" x2="602" y2="98" stroke="#B08968" stroke-width="4"/>
  <line x1="578" y1="142" x2="602" y2="136" stroke="#B08968" stroke-width="4"/>
  <line x1="578" y1="180" x2="602" y2="174" stroke="#B08968" stroke-width="4"/>
  <polygon points="602,90 632,84 638,104 608,110" fill="#E7C8A0" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="602,128 632,122 638,142 608,148" fill="#E7C8A0" stroke="#0B1F3A" stroke-width="1.5"/>
  <polygon points="602,166 632,160 638,180 608,186" fill="#E7C8A0" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="596" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">wax tree</text>
  <!-- ceramic shell cross-section -->
  <ellipse cx="716" cy="146" rx="42" ry="56" fill="#C9A86A" stroke="#0B1F3A" stroke-width="1.5"/>
  <ellipse cx="716" cy="146" rx="28" ry="42" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <rect x="708" y="118" width="16" height="56" fill="none" stroke="#1E66F5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="716" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">ceramic shell + core</text>
  <text x="664" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#475569">dip, stucco, dewax, fire, pour hot</text>

  <!-- COLUMN 1 bullets -->
  <text x="36" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Moist clay-bonded sand mold,</text>
  <text x="36" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   one pour per mold</text>
  <text x="36" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Any alloy, any size; low cost</text>
  <text x="36" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Roughest finish; slow cooling,</text>
  <text x="36" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   coarse grain</text>
  <text x="36" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">• Watch: steam-driven gas, sand</text>
  <text x="36" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">   inclusions, shrink, shift</text>

  <!-- COLUMN 2 bullets -->
  <text x="292" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Reusable metal molds = chills:</text>
  <text x="292" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   finer grain, better properties</text>
  <text x="292" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Permanent mold: gravity; Al, Mg</text>
  <text x="292" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Die: pressure; Zn, Al, Mg;</text>
  <text x="292" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   thin walls, high volume</text>
  <text x="292" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">• Watch: trapped gas porosity —</text>
  <text x="292" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">   no welding or solution treat</text>

  <!-- COLUMN 3 bullets -->
  <text x="548" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Wax pattern in ceramic shell,</text>
  <text x="548" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   both expendable</text>
  <text x="548" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Any alloy incl. superalloys;</text>
  <text x="548" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">   near-net blades and vanes</text>
  <text x="548" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" fill="#0B1F3A">• Best finish; cored passages</text>
  <text x="548" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">• Watch: shrink, ceramic</text>
  <text x="548" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#0B1F3A">   inclusions, core shift</text>
</svg>
