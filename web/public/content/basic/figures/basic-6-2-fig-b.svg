<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Echo Signatures: Four Screens, Four Stories</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#0B1F3A">Straight beam on plate of thickness T, except panel 4. IP = initial pulse, BW = back wall.</text>

  <!-- Panel 1: sound plate -->
  <rect x="15" y="66" width="375" height="165" rx="6" fill="#F8FAFE" stroke="#9FB4D8" stroke-width="1.5"/>
  <text x="202" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">1 · Sound plate</text>
  <line x1="33" y1="201" x2="372" y2="201" stroke="#0B1F3A" stroke-width="1.8"/>
  <polyline points="35,201 38,104 41,201" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="141,201 145,116 149,201" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="251,201 255,151 259,201" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="361,201 365,174 369,201" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="145" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">BW1 (T)</text>
  <text x="255" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">BW2</text>
  <text x="365" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">BW3</text>
  <text x="202" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Evenly spaced multiples at T, 2T, 3T — smooth decay.</text>

  <!-- Panel 2: mid-wall lamination -->
  <rect x="410" y="66" width="375" height="165" rx="6" fill="#F8FAFE" stroke="#9FB4D8" stroke-width="1.5"/>
  <text x="597" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">2 · Mid-wall lamination</text>
  <line x1="428" y1="201" x2="767" y2="201" stroke="#0B1F3A" stroke-width="1.8"/>
  <polyline points="430,201 433,104 436,201" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="481,201 485,114 489,201" fill="none" stroke="#D7263D" stroke-width="2.5"/>
  <polyline points="536,201 540,146 544,201" fill="none" stroke="#D7263D" stroke-width="2.5"/>
  <polyline points="591,201 595,167 599,201" fill="none" stroke="#D7263D" stroke-width="2.5"/>
  <polyline points="646,201 650,181 654,201" fill="none" stroke="#D7263D" stroke-width="2.5"/>
  <polyline points="701,201 705,190 709,201" fill="none" stroke="#D7263D" stroke-width="2.5"/>
  <text x="485" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D7263D">T/2</text>
  <text x="540" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D7263D">2(T/2)</text>
  <text x="597" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Echo at half thickness with its own multiples; true BW gone.</text>

  <!-- Panel 3: porosity -->
  <rect x="15" y="248" width="375" height="165" rx="6" fill="#F8FAFE" stroke="#9FB4D8" stroke-width="1.5"/>
  <text x="202" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">3 · Porosity</text>
  <line x1="33" y1="383" x2="372" y2="383" stroke="#0B1F3A" stroke-width="1.8"/>
  <polyline points="35,383 38,286 41,383" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="60,383 66,362 72,376 78,355 84,372 90,350 96,370 102,357 108,375 114,352 120,371 126,360 132,377 138,366 144,383" fill="none" stroke="#D7263D" stroke-width="2"/>
  <polyline points="147,383 151,328 155,383" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <polyline points="257,383 261,361 265,383" fill="none" stroke="#0B1F3A" stroke-width="2.5"/>
  <text x="100" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D7263D">grassy cluster</text>
  <text x="151" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#0B1F3A">BW1 reduced</text>
  <text x="202" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Many small shifting peaks; back wall knocked down by scatter.</text>

  <!-- Panel 4: planar flaw, angle beam -->
  <rect x="410" y="248" width="375" height="165" rx="6" fill="#F8FAFE" stroke="#9FB4D8" stroke-width="1.5"/>
  <text x="597" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14.5" font-weight="bold" fill="#0B1F3A">4 · Planar flaw — angle beam</text>
  <line x1="428" y1="383" x2="767" y2="383" stroke="#0B1F3A" stroke-width="1.8"/>
  <polyline points="430,383 433,286 436,383" fill="none" stroke="#0B1F3A" stroke-width="2"/>
  <polyline points="594,383 599,290 604,383" fill="none" stroke="#D7263D" stroke-width="3"/>
  <text x="599" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" fill="#D7263D">sharp, single wall</text>
  <text x="597" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">Loud when struck square, quiet off-angle — and no BW reference.</text>

  <!-- takeaway -->
  <rect x="130" y="423" width="540" height="24" rx="6" fill="#0B1F3A"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Read the pattern and the back-wall behavior, not just the tallest peak.</text>
</svg>
