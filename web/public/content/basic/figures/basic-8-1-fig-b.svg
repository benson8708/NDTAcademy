<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Physical Properties Shortlist the NDT Methods</text>

  <!-- row 1: density -> RT -->
  <rect x="30" y="62" width="330" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="195" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">DENSITY ρ (with atomic number)</text>
  <text x="195" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Al 2.70 · steel 7.85 · tungsten 19.3 g/cm³</text>
  <text x="195" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">sets how much radiation is absorbed</text>
  <line x1="362" y1="98" x2="458" y2="98" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="456,90 472,98 456,106" fill="#F2A33C"/>
  <rect x="474" y="62" width="296" height="72" rx="8" fill="#1B82E8"/>
  <text x="622" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RT — RADIOGRAPHY</text>
  <text x="622" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">dense and thick absorb the beam;</text>
  <text x="622" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">pores print dark, tungsten prints light</text>

  <!-- row 2: conductivity -> ET -->
  <rect x="30" y="150" width="330" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="195" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ELECTRICAL CONDUCTIVITY (%IACS)</text>
  <text x="195" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Cu 100 · pure Al ≈ 61 · 7075-T6 ≈ 32 · Ti ≈ 1</text>
  <text x="195" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">shifts with alloy and temper</text>
  <line x1="362" y1="186" x2="458" y2="186" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="456,178 472,186 456,194" fill="#F2A33C"/>
  <rect x="474" y="150" width="296" height="72" rx="8" fill="#1B82E8"/>
  <text x="622" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">ET — EDDY CURRENT</text>
  <text x="622" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">needs a conductor; reads conductivity</text>
  <text x="622" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">for alloy sorting and temper checks</text>

  <!-- row 3: permeability -> MT -->
  <rect x="30" y="238" width="330" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="195" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">MAGNETIC PERMEABILITY µ</text>
  <text x="195" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">ferromagnetic: Fe, Ni, Co and their alloys</text>
  <text x="195" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">nonmagnetic metals: relative µ ≈ 1</text>
  <line x1="362" y1="274" x2="458" y2="274" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="456,266 472,274 456,282" fill="#F2A33C"/>
  <rect x="474" y="238" width="296" height="72" rx="8" fill="#1B82E8"/>
  <text x="622" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">MT — MAGNETIC PARTICLE</text>
  <text x="622" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">ferromagnetic parts only —</text>
  <text x="622" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">flux must concentrate to leak at a crack</text>

  <!-- row 4: elastic moduli + density -> UT -->
  <rect x="30" y="326" width="330" height="72" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
  <text x="195" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ELASTIC MODULI + DENSITY</text>
  <text x="195" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">set velocity — steel ≈ 5,900 m/s longitudinal</text>
  <text x="195" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">and acoustic impedance Z = ρV</text>
  <line x1="362" y1="362" x2="458" y2="362" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="456,354 472,362 456,370" fill="#F2A33C"/>
  <rect x="474" y="326" width="296" height="72" rx="8" fill="#1B82E8"/>
  <text x="622" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">UT — ULTRASONICS</text>
  <text x="622" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">velocity reads the elastic state;</text>
  <text x="622" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E8F1FB">impedance steps reflect the beam</text>

  <!-- takeaway -->
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Method selection begins in the material datasheet, not the equipment locker.</text>
</svg>
