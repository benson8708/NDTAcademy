<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0B1F3A">Reading Flaw Signals: Differential Bobbin and Phase-Depth</text>

  <!-- LEFT PANEL: bobbin coil in tube -->
  <text x="200" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Differential bobbin coil in a tube</text>

  <!-- tube walls -->
  <rect x="45" y="76" width="320" height="16" fill="#DCE9FB" stroke="#0B1F3A" stroke-width="1.5"/>
  <rect x="45" y="162" width="320" height="16" fill="#DCE9FB" stroke="#0B1F3A" stroke-width="1.5"/>

  <!-- OD pit cut into top wall from outside -->
  <path d="M278,77 Q290,93 302,77 Z" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="1.5"/>
  <line x1="290" y1="88" x2="318" y2="108" stroke="#0B1F3A" stroke-width="1"/>
  <text x="322" y="113" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">OD pit</text>

  <!-- probe shaft and body -->
  <line x1="45" y1="127" x2="118" y2="127" stroke="#0B1F3A" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="118" y="100" width="86" height="54" rx="6" fill="#EAF2FF" stroke="#1E66F5" stroke-width="2"/>
  <rect x="130" y="100" width="18" height="54" fill="#1E66F5"/>
  <rect x="174" y="100" width="18" height="54" fill="#1E66F5"/>

  <!-- travel arrow -->
  <line x1="214" y1="127" x2="252" y2="127" stroke="#0B1F3A" stroke-width="2.5"/>
  <polygon points="252,121 264,127 252,133" fill="#0B1F3A"/>
  <text x="236" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">travel</text>

  <text x="200" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">two opposed coils — each crosses the pit in turn</text>

  <!-- impedance-plane box with figure-eight -->
  <rect x="58" y="212" width="300" height="196" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="183" y1="333" x2="330" y2="333" stroke="#9BC4FF" stroke-width="1.5" stroke-dasharray="6,5"/>
  <path d="M183,333 C213,285 246,266 256,288 C263,304 226,320 183,333 C140,346 103,364 110,386 C117,406 153,381 183,333" fill="none" stroke="#1E66F5" stroke-width="3"/>
  <circle cx="183" cy="333" r="5" fill="#0B1F3A"/>
  <path d="M243,333 A60,60 0 0 0 234,302" fill="none" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="252" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">phase angle</text>
  <text x="124" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E66F5">figure-eight</text>
  <text x="208" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">one lobe per coil — the flaw sets the phase angle</text>

  <!-- RIGHT PANEL: phase-depth calibration -->
  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B1F3A">Phase-depth calibration (nonferromagnetic tube)</text>

  <rect x="450" y="80" width="300" height="290" fill="#FFFFFF" stroke="#0B1F3A" stroke-width="2"/>
  <line x1="450" y1="294" x2="750" y2="294" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="450" y1="233" x2="750" y2="233" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="450" y1="172" x2="750" y2="172" stroke="#EDF4FF" stroke-width="1"/>
  <line x1="450" y1="111" x2="750" y2="111" stroke="#EDF4FF" stroke-width="1"/>
  <text x="446" y="298" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">25</text>
  <text x="446" y="237" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">50</text>
  <text x="446" y="176" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">75</text>
  <text x="446" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#0B1F3A">100</text>
  <text x="425" y="225" transform="rotate(-90 425 225)" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">through-wall depth (%)</text>
  <text x="600" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0B1F3A">flaw-signal phase angle</text>

  <path d="M465,352 C540,344 615,300 672,232 C702,196 722,150 733,114" fill="none" stroke="#1E66F5" stroke-width="3"/>

  <circle cx="540" cy="342" r="6" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="556" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">20% notch</text>
  <circle cx="660" cy="247" r="6" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="676" y="251" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">60% notch</text>
  <circle cx="731" cy="119" r="6" fill="#1E66F5" stroke="#0B1F3A" stroke-width="1.5"/>
  <text x="723" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">100% through hole</text>

  <text x="464" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">built from EDM notches and drilled</text>
  <text x="464" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">holes in the reference tube;</text>
  <text x="464" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">ID- and OD-origin signals fall</text>
  <text x="464" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#0B1F3A">in separate phase ranges</text>
</svg>
