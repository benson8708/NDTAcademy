<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Examinations to a Living Certificate</text>

  <!-- Basic exam box -->
  <rect x="36" y="86" width="240" height="116" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="156" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">BASIC EXAMINATION</text>
  <text x="156" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">programs, materials,</text>
  <text x="156" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">survey of methods</text>
  <text x="156" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">taken once</text>

  <!-- Method exam box -->
  <rect x="36" y="248" width="240" height="116" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="156" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">METHOD EXAMINATION</text>
  <text x="156" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">one method at</text>
  <text x="156" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Level III depth</text>
  <text x="156" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">one per endorsement</text>

  <!-- arrows into certificate -->
  <line x1="278" y1="144" x2="328" y2="200" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="318,200 336,210 330,190" fill="#1B82E8"/>
  <line x1="278" y1="306" x2="328" y2="252" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="330,262 336,242 318,250" fill="#1B82E8"/>

  <!-- certificate box -->
  <rect x="340" y="160" width="240" height="130" rx="8" fill="#1E9E6A"/>
  <text x="460" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">ASNT NDT LEVEL III</text>
  <text x="460" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">CERTIFICATE</text>
  <text x="460" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">method endorsements</text>
  <text x="460" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">valid five years</text>

  <!-- arrow to recert -->
  <line x1="582" y1="208" x2="624" y2="208" stroke="#1B82E8" stroke-width="3.5"/>
  <polygon points="620,200 636,208 620,216" fill="#1B82E8"/>

  <!-- recert box -->
  <rect x="640" y="160" width="130" height="130" rx="8" fill="#F2A33C"/>
  <text x="705" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">RECERTIFY</text>
  <text x="705" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">at 5 years:</text>
  <text x="705" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">re-exam or</text>
  <text x="705" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">professional</text>
  <text x="705" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">credits</text>

  <!-- renewal loop arrow back to certificate -->
  <path d="M 705 292 Q 705 350 580 350 Q 470 350 463 296" fill="none" stroke="#1E9E6A" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="455,304 462,286 471,303" fill="#1E9E6A"/>
  <text x="585" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">renews the certificate</text>

  <!-- bottom note -->
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">Portable evidence of qualification — the employer's own certification still assigns authority on the job.</text>
</svg>
