<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">CP-189: Qualification Levels and Defined Roles</text>

  <!-- center ladder -->
  <rect x="300" y="350" width="200" height="62" rx="6" fill="#5A6B7E"/>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">TRAINEE</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">supervised, not certified</text>

  <line x1="400" y1="348" x2="400" y2="336" stroke="#0A2342" stroke-width="3"/>
  <polygon points="392,338 400,324 408,338" fill="#0A2342"/>

  <rect x="300" y="262" width="200" height="62" rx="6" fill="#1B82E8"/>
  <text x="400" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">LEVEL I</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">performs per instructions</text>

  <line x1="400" y1="260" x2="400" y2="248" stroke="#0A2342" stroke-width="3"/>
  <polygon points="392,250 400,236 408,250" fill="#0A2342"/>

  <rect x="300" y="174" width="200" height="62" rx="6" fill="#1B82E8"/>
  <text x="400" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">LEVEL II</text>
  <text x="400" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">interprets and evaluates</text>

  <line x1="400" y1="172" x2="400" y2="160" stroke="#0A2342" stroke-width="3"/>
  <polygon points="392,162 400,148 408,162" fill="#0A2342"/>

  <rect x="300" y="86" width="200" height="62" rx="6" fill="#F2A33C"/>
  <text x="400" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">LEVEL III</text>
  <text x="400" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">runs the technical program</text>

  <!-- ASNT prerequisite box (left) -->
  <rect x="30" y="80" width="230" height="130" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="3"/>
  <text x="145" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">ASNT NDT LEVEL III</text>
  <text x="145" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">CERTIFICATE</text>
  <text x="145" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">required examination</text>
  <text x="145" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">basis, plus employer</text>
  <text x="145" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">specific examination</text>
  <line x1="262" y1="120" x2="294" y2="118" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="290,110 306,117 292,126" fill="#F2A33C"/>

  <!-- NDT Instructor box (right) -->
  <rect x="545" y="80" width="225" height="130" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="657" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">NDT INSTRUCTOR</text>
  <text x="657" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">formally defined,</text>
  <text x="657" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">qualified, designated</text>
  <text x="657" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">delivers documented</text>
  <text x="657" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">training to the outline</text>
  <line x1="600" y1="212" x2="510" y2="280" stroke="#5A6B7E" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="520,282 502,286 512,270" fill="#5A6B7E"/>
  <text x="610" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">trains all levels</text>

  <!-- bottom note -->
  <text x="145" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">No central certificate,</text>
  <text x="145" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">no employer Level III</text>
  <text x="145" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">under the standard</text>
  <text x="400" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">The employer certifies at every level; the standard sets non-reducible minimums.</text>
</svg>
