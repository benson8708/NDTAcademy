<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Vision Acuity Charts</text>

  <!-- NEAR card -->
  <rect x="60" y="70" width="320" height="300" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="60" y="70" width="320" height="34" rx="8" fill="#0A2342"/>
  <text x="220" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">NEAR ACUITY (Jaeger)</text>

  <text x="92" y="146" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">J6</text>
  <text x="230" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#0A2342" letter-spacing="4">E F P</text>

  <text x="92" y="192" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">J4</text>
  <text x="230" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#0A2342" letter-spacing="3">T O Z D</text>

  <rect x="70" y="216" width="300" height="30" fill="#E8F1FB"/>
  <text x="92" y="237" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">J2</text>
  <text x="232" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342" letter-spacing="2">L P E D F C</text>

  <text x="92" y="276" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">J1</text>
  <text x="232" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0A2342" letter-spacing="1">P E C F D Z O</text>

  <text x="220" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">read at ~12 in (300 mm)</text>
  <text x="220" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">J-2 = typical VT minimum</text>

  <!-- DISTANCE card -->
  <rect x="420" y="70" width="320" height="300" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="420" y="70" width="320" height="34" rx="8" fill="#0A2342"/>
  <text x="580" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">DISTANCE ACUITY (Snellen)</text>

  <text x="575" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#0A2342">E</text>
  <text x="712" y="150" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">20/200</text>

  <text x="575" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#0A2342" letter-spacing="4">F P</text>
  <text x="712" y="192" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">20/70</text>

  <text x="575" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#0A2342" letter-spacing="3">T O Z</text>
  <text x="712" y="230" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">20/40</text>

  <rect x="430" y="248" width="300" height="28" fill="#E8F1FB"/>
  <text x="575" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342" letter-spacing="2">L P E D</text>
  <text x="712" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B82E8">20/20</text>

  <text x="575" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0A2342" letter-spacing="1">P E C F D</text>
  <text x="712" y="296" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">20/15</text>

  <text x="580" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">read at 20 ft (6 m)</text>
  <text x="580" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">20/20 &#8776; resolving ~1 arc-minute</text>

  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Near acuity is the primary VT requirement; the 20/20 notation is shown for reference.</text>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Letters shown are illustrative, not an actual test chart.</text>
</svg>
