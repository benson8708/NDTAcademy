<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Where Discontinuities Originate</text>

  <!-- Stage 1: Solidification -->
  <rect x="14" y="64" width="184" height="256" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M14 72 q0 -8 8 -8 h168 q8 0 8 8 v40 h-184 Z" fill="#0A2342"/>
  <text x="22" y="84" font-size="16" font-weight="bold" fill="#FFFFFF">1 · SOLIDIFICATION</text>
  <text x="22" y="104" font-size="16" fill="#D9E0E8">ingot / casting</text>
  <text x="26" y="134" font-size="16" fill="#0A2342">Gas porosity</text>
  <text x="26" y="158" font-size="16" fill="#0A2342">Inclusions</text>
  <text x="26" y="182" font-size="16" fill="#0A2342">Shrinkage</text>
  <text x="26" y="206" font-size="16" fill="#0A2342">Cold shuts</text>
  <text x="26" y="230" font-size="16" fill="#0A2342">Segregation</text>
  <rect x="31" y="276" width="150" height="28" rx="14" fill="#1B82E8"/>
  <text x="106" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">INHERENT</text>

  <path d="M200 184 L208 192 L200 200 Z" fill="#5A6B7E"/>

  <!-- Stage 2: Primary processing -->
  <rect x="210" y="64" width="184" height="256" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M210 72 q0 -8 8 -8 h168 q8 0 8 8 v40 h-184 Z" fill="#0A2342"/>
  <text x="218" y="84" font-size="16" font-weight="bold" fill="#FFFFFF">2 · PRIMARY WORK</text>
  <text x="218" y="104" font-size="16" fill="#D9E0E8">rolling / forging</text>
  <text x="222" y="134" font-size="16" fill="#0A2342">Laps</text>
  <text x="222" y="158" font-size="16" fill="#0A2342">Bursts</text>
  <text x="222" y="182" font-size="16" font-style="italic" fill="#5A6B7E">ingot flaws stretch to:</text>
  <text x="222" y="206" font-size="16" fill="#1B82E8">laminations, seams,</text>
  <text x="222" y="230" font-size="16" fill="#1B82E8">stringers (inherent)</text>
  <rect x="227" y="276" width="150" height="28" rx="14" fill="#F2A33C"/>
  <text x="302" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">PROCESSING</text>

  <path d="M396 184 L404 192 L396 200 Z" fill="#5A6B7E"/>

  <!-- Stage 3: Welding and secondary -->
  <rect x="406" y="64" width="184" height="256" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M406 72 q0 -8 8 -8 h168 q8 0 8 8 v40 h-184 Z" fill="#0A2342"/>
  <text x="414" y="84" font-size="16" font-weight="bold" fill="#FFFFFF">3 · WELD / FINISH</text>
  <text x="414" y="104" font-size="16" fill="#D9E0E8">weld · grind · treat</text>
  <text x="418" y="134" font-size="16" fill="#0A2342">Undercut, overlap</text>
  <text x="418" y="158" font-size="16" fill="#0A2342">Weld cracks</text>
  <text x="418" y="182" font-size="16" fill="#0A2342">Surface porosity</text>
  <text x="418" y="206" font-size="16" fill="#0A2342">Grinding cracks</text>
  <text x="418" y="230" font-size="16" fill="#0A2342">Quench cracks</text>
  <rect x="423" y="276" width="150" height="28" rx="14" fill="#F2A33C"/>
  <text x="498" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">PROCESSING</text>

  <path d="M592 184 L600 192 L592 200 Z" fill="#5A6B7E"/>

  <!-- Stage 4: Service -->
  <rect x="602" y="64" width="184" height="256" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M602 72 q0 -8 8 -8 h168 q8 0 8 8 v40 h-184 Z" fill="#0A2342"/>
  <text x="610" y="84" font-size="16" font-weight="bold" fill="#FFFFFF">4 · SERVICE</text>
  <text x="610" y="104" font-size="16" fill="#D9E0E8">loads · environment</text>
  <text x="614" y="134" font-size="16" fill="#0A2342">Fatigue cracks</text>
  <text x="614" y="158" font-size="16" fill="#0A2342">Corrosion, pitting</text>
  <text x="614" y="182" font-size="16" fill="#0A2342">Erosion, cavitation</text>
  <text x="614" y="206" font-size="16" fill="#0A2342">Wear, fretting</text>
  <text x="614" y="230" font-size="16" fill="#0A2342">Mechanical damage</text>
  <rect x="619" y="276" width="150" height="28" rx="14" fill="#D14343"/>
  <text x="694" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">SERVICE-INDUCED</text>

  <!-- Timeline -->
  <text x="400" y="340" text-anchor="middle" font-size="16" font-weight="bold" fill="#5A6B7E">MATERIAL LIFE</text>
  <rect x="14" y="346" width="744" height="6" fill="#D9E0E8"/>
  <path d="M758 335 L786 349 L758 363 Z" fill="#D9E0E8"/>

  <text x="400" y="390" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">Earlier flaws ride along unseen — rolling stretches them, machining exposes them,</text>
  <text x="400" y="414" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">and service grows them. Ask the part's history before you inspect.</text>
</svg>
