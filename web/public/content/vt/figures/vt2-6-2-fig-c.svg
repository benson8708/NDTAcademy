<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="4" y="4" width="792" height="442" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="34" font-size="23" font-weight="bold" fill="#0A2342" text-anchor="middle">Coating System Cross-Section: What VT Verifies</text>

    <!-- layers -->
    <rect x="70" y="200" width="660" height="34" fill="#F2A33C" stroke="#5A6B7E" stroke-width="0.75"/>
    <rect x="70" y="234" width="660" height="30" fill="#1B82E8" stroke="#5A6B7E" stroke-width="0.75"/>
    <rect x="70" y="264" width="660" height="30" fill="#1E9E6A" stroke="#5A6B7E" stroke-width="0.75"/>
    <rect x="70" y="294" width="660" height="96" fill="#5A6B7E"/>
    <!-- blast profile (anchor pattern) at primer/steel interface -->
    <path d="M70 296 l16 -8 l16 10 l16 -9 l16 9 l16 -10 l16 9 l16 -8 l16 9 l16 -10 l16 10 l16 -9 l16 8 l16 -9 l16 10 l16 -10 l16 9 l16 -8 l16 8 l16 -9 l16 10 l16 -10 l16 9 l16 -9 l16 9 l16 -9 l16 9 l16 -8 l16 8 l16 -9 l16 9 l16 -9 l16 9 l16 -9 l16 9 l16 -9 l16 9 l16 -9 l16 9 l16 -8 l16 6" fill="none" stroke="#0A2342" stroke-width="2"/>

    <!-- layer labels -->
    <text x="84" y="223" font-size="16" font-weight="bold" fill="#0A2342">Topcoat ~50 µm</text>
    <text x="84" y="255" font-size="16" font-weight="bold" fill="#E8F1FB">Intermediate coat</text>
    <text x="84" y="286" font-size="16" font-weight="bold" fill="#E8F1FB">Primer (zinc-rich) ~75 µm</text>
    <text x="84" y="345" font-size="16" fill="#E8F1FB">Steel substrate — blast profile (anchor pattern) gives adhesion</text>

    <!-- defect: holiday -->
    <rect x="192" y="200" width="16" height="94" fill="#FFFFFF" stroke="#D14343" stroke-width="1.5"/>
    <text x="110" y="120" font-size="16" fill="#D14343" font-weight="bold">Holiday — bare to substrate</text>
    <line x1="190" y1="128" x2="200" y2="196" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- defect: blister -->
    <path d="M350 200 Q380 166 410 200 Z" fill="#F2A33C" stroke="#5A6B7E" stroke-width="1"/>
    <path d="M358 200 Q380 178 402 200 Z" fill="#FFFFFF"/>
    <circle cx="372" cy="197" r="3" fill="#D14343"/>
    <circle cx="382" cy="193" r="3" fill="#D14343"/>
    <circle cx="392" cy="197" r="3" fill="#D14343"/>
    <text x="330" y="90" font-size="16" fill="#D14343" font-weight="bold">Blister — check for corrosion beneath</text>
    <line x1="382" y1="98" x2="380" y2="166" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- defect: run / sag -->
    <path d="M500 200 Q520 178 540 200 Z" fill="#F2A33C" stroke="#5A6B7E" stroke-width="1"/>
    <text x="495" y="150" font-size="16" fill="#D14343" font-weight="bold">Run / sag</text>
    <line x1="522" y1="156" x2="521" y2="180" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- defect: pinhole -->
    <rect x="637" y="200" width="5" height="34" fill="#FFFFFF" stroke="#D14343" stroke-width="1"/>
    <text x="600" y="120" font-size="16" fill="#D14343" font-weight="bold">Pinhole — topcoat only</text>
    <line x1="648" y1="128" x2="640" y2="196" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="400" y="428" font-size="16" fill="#5A6B7E" text-anchor="middle">Inspect surface prep, each coat, and the final film — verify thickness with a DFT gauge.</text>
  </g>
</svg>
