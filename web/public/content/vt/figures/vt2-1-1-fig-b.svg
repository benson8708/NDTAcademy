<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Visual Testing Through the Product Lifecycle</text>

  <!-- Phase bands -->
  <rect x="58" y="150" width="352" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="426" y="150" width="316" height="150" rx="10" fill="#FBE7CC" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="234" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">DURING MANUFACTURE</text>
  <text x="584" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C77A1E">IN SERVICE</text>
  <text x="234" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">defects cheapest to catch in-process</text>
  <text x="584" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">damage develops with time and use</text>

  <!-- Timeline -->
  <line x1="70" y1="250" x2="726" y2="250" stroke="#0A2342" stroke-width="3"/>
  <polygon points="726,250 712,243 712,257" fill="#0A2342"/>

  <!-- Manufacture checkpoints -->
  <circle cx="120" cy="250" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="200" cy="250" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="290" cy="250" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="375" cy="250" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="120" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Base</text>
  <text x="120" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">material</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Fit-up</text>
  <text x="290" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">In-process</text>
  <text x="290" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">weld</text>
  <text x="375" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Final exam</text>

  <!-- In-service markers -->
  <circle cx="470" cy="250" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="558" cy="250" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="646" cy="250" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="712" cy="250" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="470" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Baseline</text>
  <text x="558" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Routine</text>
  <text x="558" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">round</text>
  <text x="646" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">Turn-</text>
  <text x="646" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">around</text>
  <text x="712" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">FFS /</text>
  <text x="712" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">repair</text>

  <!-- Recurring loop over in-service band -->
  <path d="M 470 222 C 520 200, 660 200, 700 222" fill="none" stroke="#C77A1E" stroke-width="2"/>
  <polygon points="700,222 688,214 696,228" fill="#C77A1E"/>
  <text x="585" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#C77A1E">recurring</text>

  <!-- Cost gradient note -->
  <text x="234" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Cost to fix a defect rises &#8594;</text>

  <!-- Oversight legend -->
  <rect x="60" y="372" width="18" height="18" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>
  <text x="86" y="387" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Internal QC</text>
  <rect x="230" y="372" width="18" height="18" fill="#1B82E8" stroke="#0A2342" stroke-width="1.5"/>
  <text x="256" y="387" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Customer QC</text>
  <rect x="430" y="372" width="18" height="18" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="456" y="387" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">Authority QC</text>
  <text x="60" y="418" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">Any of the three oversight layers may examine the part at either phase, each to its own acceptance criteria.</text>
</svg>
