<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of a Complete VT Report</text>

  <!-- Report page -->
  <rect x="250" y="60" width="330" height="372" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>

  <!-- Header band: traceability -->
  <rect x="250" y="60" width="330" height="52" fill="#0A2342"/>
  <text x="265" y="82" font-size="16" fill="#FFFFFF">VT REPORT - Part S-204 - WO 5512</text>
  <text x="265" y="102" font-size="16" fill="#FFFFFF">Procedure VT-7 Rev C - 09 Jun 2026</text>

  <!-- Technique block -->
  <rect x="250" y="116" width="330" height="72" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="265" y="137" font-size="16" font-weight="bold" fill="#0A2342">TECHNIQUE</text>
  <text x="265" y="158" font-size="16" fill="#0A2342">Direct VT - LED - 1,080 lux at surface</text>
  <text x="265" y="178" font-size="16" fill="#0A2342">Meter SN 4412 - cal due Sep 2026</text>

  <!-- Data block -->
  <rect x="250" y="192" width="330" height="96" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="265" y="213" font-size="16" font-weight="bold" fill="#0A2342">DATA - INDICATION LOG</text>
  <text x="265" y="236" font-size="16" fill="#0A2342">VT-07 - weld toe - 6 mm -</text>
  <text x="505" y="236" font-size="16" font-weight="bold" fill="#D14343">REJECT</text>
  <text x="265" y="258" font-size="16" fill="#0A2342">VT-08 - 110 mm from B - 1 mm -</text>
  <text x="505" y="258" font-size="16" font-weight="bold" fill="#1E9E6A">accept</text>
  <text x="265" y="280" font-size="16" font-style="italic" fill="#5A6B7E">each line cites its criteria clause</text>

  <!-- Image block -->
  <rect x="250" y="292" width="330" height="84" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="265" y="312" font-size="16" font-weight="bold" fill="#0A2342">IMAGES</text>
  <!-- sketch thumbnail -->
  <rect x="265" y="320" width="110" height="48" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M275,354 L355,340" stroke="#5A6B7E" stroke-width="2" fill="none"/>
  <circle cx="320" cy="346" r="3" fill="#D14343"/>
  <text x="278" y="336" font-size="16" fill="#0A2342">VT-07</text>
  <!-- photo thumbnail with scale bar -->
  <rect x="395" y="320" width="110" height="48" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="402" y="326" width="40" height="6" fill="#0A2342"/>
  <line x1="412" y1="326" x2="412" y2="332" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="422" y1="326" x2="422" y2="332" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="432" y1="326" x2="432" y2="332" stroke="#FFFFFF" stroke-width="1.5"/>
  <polyline points="400,364 425,346 440,356 455,343 502,364" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <!-- Signature band -->
  <rect x="250" y="380" width="330" height="52" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="265" y="401" font-size="16" fill="#0A2342">Examiner: A. Reyes - VT Level II</text>
  <text x="265" y="421" font-size="16" fill="#0A2342">Signed + dated - Reviewer: QA</text>

  <!-- Left callouts -->
  <text x="235" y="88" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">Traceability header</text>
  <line x1="240" y1="84" x2="250" y2="84" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="235" y="148" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">How you looked</text>
  <line x1="240" y1="144" x2="250" y2="144" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="235" y="238" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">What you found</text>
  <line x1="240" y1="234" x2="250" y2="234" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="235" y="332" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">The proof</text>
  <line x1="240" y1="328" x2="250" y2="328" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="235" y="404" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">Sign-off closes</text>
  <text x="235" y="424" text-anchor="end" font-size="17" font-weight="bold" fill="#0A2342">the record</text>
  <line x1="240" y1="400" x2="250" y2="400" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- Right callouts -->
  <text x="595" y="152" font-size="16" fill="#0A2342">Measured values,</text>
  <text x="595" y="172" font-size="16" fill="#0A2342">not checkmarks</text>
  <line x1="592" y1="148" x2="580" y2="148" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="595" y="240" font-size="16" fill="#0A2342">Every indication gets an</text>
  <text x="595" y="260" font-size="16" fill="#0A2342">ID and a disposition</text>
  <line x1="592" y1="236" x2="580" y2="236" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="595" y="332" font-size="16" fill="#0A2342">Scale + ID on</text>
  <text x="595" y="352" font-size="16" fill="#0A2342">every photo</text>
  <line x1="592" y1="328" x2="580" y2="328" stroke="#5A6B7E" stroke-width="1.5"/>
</svg>
