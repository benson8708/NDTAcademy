<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">The Document Stack: Law to Work Instruction</text>

  <!-- flow-down arrow -->
  <line x1="72" y1="64" x2="72" y2="400" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="64,400 80,400 72,416" fill="#5A6B7E"/>
  <text x="46" y="240" transform="rotate(-90 46 240)" text-anchor="middle" font-size="16" font-weight="bold" fill="#5A6B7E">REQUIREMENTS FLOW DOWN</text>

  <!-- box 1: law -->
  <rect x="110" y="60" width="400" height="52" rx="6" fill="#0A2342"/>
  <text x="310" y="81" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">1 · LAW / REGULATION</text>
  <text x="310" y="102" text-anchor="middle" font-size="16" fill="#E8F1FB">Jurisdiction adopts ASME BPVC · EU: PED</text>

  <!-- box 2: code -->
  <rect x="110" y="121" width="400" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">2 · CODE</text>
  <text x="310" y="163" text-anchor="middle" font-size="16" fill="#0A2342">ASME Section I, VIII · B31.1 / B31.3</text>

  <!-- box 3: standard -->
  <rect x="110" y="182" width="400" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="203" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">3 · STANDARD</text>
  <text x="310" y="224" text-anchor="middle" font-size="16" fill="#0A2342">AWS D1.1 · EN ISO 17637 · ISO 5817</text>

  <!-- box 4: specification -->
  <rect x="110" y="243" width="400" height="52" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="310" y="264" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">4 · SPECIFICATION</text>
  <text x="310" y="285" text-anchor="middle" font-size="16" fill="#0A2342">Contract / PO: names code, edition, extras</text>

  <!-- box 5: employer procedure -->
  <rect x="110" y="304" width="400" height="52" rx="6" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="310" y="325" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">5 · EMPLOYER VT PROCEDURE</text>
  <text x="310" y="346" text-anchor="middle" font-size="16" fill="#0A2342">The controlled document you work to</text>

  <!-- box 6: work instruction -->
  <rect x="110" y="365" width="400" height="52" rx="6" fill="#D9E0E8"/>
  <text x="310" y="386" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">6 · TRAVELER / WORK INSTRUCTION</text>
  <text x="310" y="407" text-anchor="middle" font-size="16" fill="#0A2342">Job-specific details and hold points</text>

  <!-- engineering bracket (boxes 1-3) -->
  <path d="M524,60 h12 v174 h-12" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="548" y="98" font-size="18" font-weight="bold" fill="#F2A33C">ENGINEERING TASK</text>
  <text x="548" y="126" font-size="16" fill="#0A2342">Selects VT as the method</text>
  <text x="548" y="150" font-size="16" fill="#0A2342">Sets acceptance criteria</text>
  <text x="548" y="174" font-size="16" fill="#0A2342">Dispositions rejects</text>

  <!-- spec note -->
  <text x="548" y="264" font-size="16" font-style="italic" fill="#5A6B7E">The contract decides which</text>
  <text x="548" y="285" font-size="16" font-style="italic" fill="#5A6B7E">code and edition govern</text>

  <!-- technician bracket (boxes 5-6) -->
  <path d="M524,304 h12 v113 h-12" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="548" y="336" font-size="18" font-weight="bold" fill="#1B82E8">TECHNICIAN TASK</text>
  <text x="548" y="364" font-size="16" fill="#0A2342">Performs the examination</text>
  <text x="548" y="388" font-size="16" fill="#0A2342">Evaluates against criteria</text>
  <text x="548" y="412" font-size="16" fill="#0A2342">Records and reports</text>
</svg>
