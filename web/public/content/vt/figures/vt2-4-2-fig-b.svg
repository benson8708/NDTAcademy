<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Corrosion and Wear: Six Morphologies</text>

  <defs>
    <marker id="arrAmberW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F2A33C"/>
    </marker>
  </defs>

  <!-- P1 UNIFORM -->
  <text x="28" y="78" font-size="18" font-weight="bold" fill="#0A2342">UNIFORM</text>
  <line x1="40" y1="108" x2="240" y2="108" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="46" y="101" font-size="16" fill="#5A6B7E">original surface</text>
  <path d="M40,128 Q60,122 80,128 Q100,134 120,127 Q140,121 160,128 Q180,134 200,126 Q220,120 240,127 L240,180 L40,180 Z"
        fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="28" y="212" font-size="16" fill="#0A2342">Even thinning, looks harmless;</text>
  <text x="28" y="232" font-size="16" fill="#0A2342">judge by thickness measurement.</text>

  <!-- P2 PITTING -->
  <text x="288" y="78" font-size="18" font-weight="bold" fill="#0A2342">PITTING</text>
  <rect x="300" y="124" width="200" height="56" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="346" y1="125" x2="346" y2="136" stroke="#D14343" stroke-width="2"/>
  <line x1="354" y1="125" x2="354" y2="136" stroke="#D14343" stroke-width="2"/>
  <circle cx="350" cy="146" r="9" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <line x1="426" y1="125" x2="426" y2="138" stroke="#D14343" stroke-width="2"/>
  <line x1="434" y1="125" x2="434" y2="138" stroke="#D14343" stroke-width="2"/>
  <circle cx="430" cy="150" r="10" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="288" y="212" font-size="16" fill="#0A2342">Small mouth, deep cavity -</text>
  <text x="288" y="232" font-size="16" fill="#0A2342">measure with a pit gauge.</text>

  <!-- P3 CREVICE -->
  <text x="548" y="78" font-size="18" font-weight="bold" fill="#0A2342">CREVICE</text>
  <rect x="560" y="128" width="150" height="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="610" y="150" width="160" height="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <polyline points="614,147 624,144 634,148 644,143 654,148 664,144 674,148 684,143 694,147 704,144"
            fill="none" stroke="#D14343" stroke-width="2"/>
  <text x="548" y="212" font-size="16" fill="#0A2342">Attack where oxygen starves:</text>
  <text x="548" y="232" font-size="16" fill="#0A2342">gaskets, lap joints, deposits.</text>

  <!-- P4 SCC -->
  <text x="28" y="272" font-size="18" font-weight="bold" fill="#0A2342">SCC (STRESS-CORROSION)</text>
  <rect x="40" y="305" width="200" height="72" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M140,305 L134,326 L142,342 L136,358 L130,374" fill="none" stroke="#D14343" stroke-width="2"/>
  <path d="M134,326 L122,338 L114,350" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <path d="M142,342 L154,354 L150,368" fill="none" stroke="#D14343" stroke-width="1.8"/>
  <path d="M122,338 L112,342" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <text x="28" y="408" font-size="16" fill="#0A2342">Fine branched cracks: material +</text>
  <text x="28" y="428" font-size="16" fill="#0A2342">tensile stress + environment.</text>

  <!-- P5 EROSION -->
  <text x="288" y="272" font-size="18" font-weight="bold" fill="#0A2342">EROSION</text>
  <path d="M320,388 L320,330 Q320,300 350,300 L420,300 L420,330 L365,330 Q350,330 350,345 L350,388 Z"
        fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M321,330 Q322,303 348,302" fill="none" stroke="#D14343" stroke-width="4"/>
  <line x1="335" y1="382" x2="335" y2="352" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#arrAmberW)"/>
  <line x1="378" y1="315" x2="412" y2="315" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#arrAmberW)"/>
  <text x="440" y="320" font-size="16" fill="#5A6B7E">outer radius</text>
  <text x="440" y="340" font-size="16" fill="#5A6B7E">thins first</text>
  <text x="288" y="408" font-size="16" fill="#0A2342">Smooth, scalloped loss where</text>
  <text x="288" y="428" font-size="16" fill="#0A2342">flow turns or speeds up.</text>

  <!-- P6 CAVITATION -->
  <text x="548" y="272" font-size="18" font-weight="bold" fill="#0A2342">CAVITATION</text>
  <rect x="560" y="303" width="180" height="68" rx="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <g fill="#D14343" fill-opacity="0.85">
    <circle cx="606" cy="324" r="3"/>
    <circle cx="618" cy="334" r="2.5"/>
    <circle cx="630" cy="322" r="3.5"/>
    <circle cx="642" cy="336" r="2.5"/>
    <circle cx="652" cy="324" r="3"/>
    <circle cx="664" cy="334" r="3.5"/>
    <circle cx="676" cy="323" r="2.5"/>
    <circle cx="612" cy="350" r="3"/>
    <circle cx="626" cy="346" r="2.5"/>
    <circle cx="640" cy="354" r="3"/>
    <circle cx="656" cy="348" r="2.5"/>
    <circle cx="670" cy="352" r="3"/>
  </g>
  <circle cx="688" cy="340" r="4" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <circle cx="598" cy="338" r="4" fill="none" stroke="#D14343" stroke-width="1.5"/>
  <text x="548" y="408" font-size="16" fill="#0A2342">Spongy clustered pits from</text>
  <text x="548" y="428" font-size="16" fill="#0A2342">collapsing vapor bubbles.</text>
</svg>
