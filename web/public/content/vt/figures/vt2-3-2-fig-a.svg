<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Rigid Borescope Lens Train</text>

  <!-- eye at left -->
  <path d="M 22 170 Q 45 152 68 170 Q 45 188 22 170 Z" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="45" cy="170" r="6" fill="#0A2342"/>
  <text x="45" y="210" text-anchor="middle" font-size="16" fill="#5A6B7E">eye</text>

  <!-- eyepiece housing -->
  <rect x="78" y="128" width="46" height="84" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 108 140 C 120 152 120 188 108 200 C 96 188 96 152 108 140 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- tube body -->
  <line x1="124" y1="142" x2="700" y2="142" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="124" y1="198" x2="700" y2="198" stroke="#0A2342" stroke-width="2.5"/>

  <!-- illumination fiber sheath (dashed amber lines just inside walls) -->
  <line x1="130" y1="148" x2="694" y2="148" stroke="#F2A33C" stroke-width="3" stroke-dasharray="9 6"/>
  <line x1="130" y1="192" x2="694" y2="192" stroke="#F2A33C" stroke-width="3" stroke-dasharray="9 6"/>
  <text x="412" y="128" text-anchor="middle" font-size="16" fill="#F2A33C">illumination fiber sheath around the optics</text>

  <!-- field lenses at image planes -->
  <path d="M 200 152 C 209 160 209 180 200 188 C 191 180 191 160 200 152 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 390 152 C 399 160 399 180 390 188 C 381 180 381 160 390 152 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 580 152 C 589 160 589 180 580 188 C 571 180 571 160 580 152 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- relay pairs -->
  <path d="M 270 154 C 278 162 278 178 270 186 C 262 178 262 162 270 154 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 310 154 C 318 162 318 178 310 186 C 302 178 302 162 310 154 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 460 154 C 468 162 468 178 460 186 C 452 178 452 162 460 154 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 500 154 C 508 162 508 178 500 186 C 492 178 492 162 500 154 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- objective at distal end -->
  <path d="M 688 150 C 697 158 697 182 688 190 C 679 182 679 158 688 150 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- crossing marginal rays -->
  <polyline points="735,152 688,170 580,188 500,160 460,180 390,152 310,180 270,160 200,188 108,158 45,170" fill="none" stroke="#1B82E8" stroke-width="1.8"/>
  <polyline points="735,188 688,170 580,152 500,180 460,160 390,188 310,160 270,180 200,152 108,182 45,170" fill="none" stroke="#1B82E8" stroke-width="1.8"/>

  <!-- target object -->
  <rect x="730" y="150" width="12" height="40" fill="#1E9E6A"/>
  <text x="736" y="216" text-anchor="middle" font-size="16" fill="#1E9E6A">target</text>

  <!-- labels with leaders -->
  <line x1="688" y1="148" x2="688" y2="92" stroke="#5A6B7E" stroke-width="1"/>
  <text x="688" y="82" text-anchor="middle" font-size="16" fill="#0A2342">objective lens</text>
  <line x1="480" y1="152" x2="480" y2="92" stroke="#5A6B7E" stroke-width="1"/>
  <text x="480" y="82" text-anchor="middle" font-size="16" fill="#0A2342">relay pair</text>
  <line x1="290" y1="152" x2="290" y2="92" stroke="#5A6B7E" stroke-width="1"/>
  <text x="290" y="82" text-anchor="middle" font-size="16" fill="#0A2342">relay pair</text>
  <text x="101" y="116" text-anchor="middle" font-size="16" fill="#0A2342">eyepiece</text>

  <line x1="390" y1="198" x2="390" y2="228" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="200" y1="198" x2="240" y2="228" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="580" y1="198" x2="540" y2="228" stroke="#5A6B7E" stroke-width="1"/>
  <text x="390" y="246" text-anchor="middle" font-size="16" fill="#0A2342">field lenses at intermediate image planes</text>

  <!-- comparison strip -->
  <text x="400" y="292" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">Relay designs compared</text>

  <!-- conventional -->
  <rect x="90" y="316" width="280" height="44" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 130 320 C 136 330 136 346 130 356 C 124 346 124 330 130 320 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 175 320 C 181 330 181 346 175 356 C 169 346 169 330 175 320 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 285 320 C 291 330 291 346 285 356 C 279 346 279 330 285 320 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 330 320 C 336 330 336 346 330 356 C 324 346 324 330 330 320 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="228" y="344" text-anchor="middle" font-size="16" fill="#5A6B7E">mostly air</text>
  <text x="230" y="388" text-anchor="middle" font-size="16" fill="#0A2342">conventional: thin lenses, long air gaps</text>
  <text x="230" y="410" text-anchor="middle" font-size="16" fill="#D14343">dimmer image</text>

  <!-- Hopkins rod lens -->
  <rect x="430" y="316" width="280" height="44" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 444 322 L 540 322 C 548 330 548 346 540 354 L 444 354 C 436 346 436 330 444 322 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 562 322 L 658 322 C 666 330 666 346 658 354 L 562 354 C 554 346 554 330 562 322 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="570" y="388" text-anchor="middle" font-size="16" fill="#0A2342">Hopkins: glass rods, thin air gaps</text>
  <text x="570" y="410" text-anchor="middle" font-size="16" fill="#1E9E6A">several times more light, sharper image</text>
</svg>
