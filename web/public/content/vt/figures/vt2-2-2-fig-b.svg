<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ma3" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#F2A33C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Reflected Glare: the Mirror Angle — and the Fix</text>
  <line x1="400" y1="56" x2="400" y2="410" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- LEFT: glare -->
  <text x="210" y="74" text-anchor="middle" font-size="20" font-weight="bold" fill="#D14343">GLARE</text>
  <line x1="60" y1="330" x2="360" y2="330" stroke="#D9E0E8" stroke-width="5"/>
  <text x="210" y="356" text-anchor="middle" font-size="16" fill="#5A6B7E">polished surface</text>
  <line x1="210" y1="330" x2="210" y2="150" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="210" y="140" text-anchor="middle" font-size="16" fill="#5A6B7E">normal</text>

  <rect x="68" y="172" width="24" height="14" fill="#5A6B7E"/>
  <circle cx="98" cy="184" r="10" fill="#F2A33C"/>
  <text x="86" y="160" text-anchor="middle" font-size="16" fill="#F2A33C">lamp</text>
  <line x1="104" y1="192" x2="206" y2="326" stroke="#F2A33C" stroke-width="3" marker-end="url(#ma3)"/>
  <line x1="214" y1="326" x2="318" y2="194" stroke="#F2A33C" stroke-width="3" marker-end="url(#ma3)"/>

  <path d="M210,294 A36,36 0 0 0 187,302" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <path d="M210,294 A36,36 0 0 1 233,302" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="190" y="284" text-anchor="middle" font-size="16" fill="#E8F1FB">θ</text>
  <text x="231" y="284" text-anchor="middle" font-size="16" fill="#E8F1FB">θ</text>

  <ellipse cx="332" cy="182" rx="22" ry="12" fill="#FFFFFF" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="326" cy="182" r="5" fill="#0A2342"/>
  <line x1="332" y1="160" x2="332" y2="146" stroke="#D14343" stroke-width="2.5"/>
  <line x1="352" y1="166" x2="362" y2="156" stroke="#D14343" stroke-width="2.5"/>
  <line x1="312" y1="166" x2="302" y2="156" stroke="#D14343" stroke-width="2.5"/>
  <text x="306" y="128" text-anchor="middle" font-size="16" fill="#D14343">veiling glare in the eye</text>

  <text x="210" y="384" text-anchor="middle" font-size="16" fill="#E8F1FB">angle in = angle out</text>
  <text x="210" y="406" text-anchor="middle" font-size="16" fill="#D14343">eye sits at the mirror angle → hot spot</text>

  <!-- RIGHT: fixed -->
  <text x="590" y="74" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E9E6A">FIXED</text>
  <line x1="440" y1="330" x2="740" y2="330" stroke="#D9E0E8" stroke-width="5"/>
  <path d="M594,330 l6,-8 l6,8" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="600" y="356" text-anchor="middle" font-size="16" fill="#D14343">indication</text>

  <rect x="442" y="108" width="24" height="14" fill="#5A6B7E"/>
  <circle cx="472" cy="120" r="10" fill="#F2A33C"/>
  <text x="462" y="96" text-anchor="middle" font-size="16" fill="#F2A33C">lamp moved</text>
  <line x1="478" y1="130" x2="518" y2="326" stroke="#F2A33C" stroke-width="3" marker-end="url(#ma3)"/>
  <line x1="522" y1="326" x2="562" y2="134" stroke="#F2A33C" stroke-width="3" marker-end="url(#ma3)"/>
  <text x="648" y="116" text-anchor="middle" font-size="16" fill="#E8F1FB">specular bounce leaves the scene</text>

  <ellipse cx="700" cy="210" rx="22" ry="12" fill="#FFFFFF" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="694" cy="212" r="5" fill="#0A2342"/>
  <line x1="682" y1="220" x2="606" y2="324" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="666" y="248" text-anchor="middle" font-size="16" fill="#1E9E6A">eye OFF the mirror angle</text>

  <text x="590" y="396" text-anchor="middle" font-size="16" fill="#E8F1FB">sees diffuse light + the indication — no hot spot</text>

  <text x="400" y="436" text-anchor="middle" font-size="16" fill="#FFFFFF">Move the lamp or your head — never fight a specular hot spot with more wattage.</text>
</svg>
