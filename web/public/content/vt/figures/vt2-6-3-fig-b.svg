<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="34" font-size="23" font-weight="bold" fill="#0A2342" text-anchor="middle">Length, Width, Depth: Pin the Numbers Down</text>

    <!-- Panel 1: LENGTH -->
    <rect x="25" y="60" width="235" height="340" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
    <text x="45" y="90" font-size="18" font-weight="bold" fill="#0A2342">LENGTH</text>
    <rect x="45" y="110" width="195" height="180" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M75 150 Q110 170 140 200 Q160 220 200 235" fill="none" stroke="#D14343" stroke-width="2.5"/>
    <line x1="75" y1="150" x2="58" y2="310" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="200" y1="235" x2="226" y2="310" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3"/>
    <rect x="45" y="310" width="195" height="26" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
    <line x1="52" y1="310" x2="52" y2="322" stroke="#0A2342" stroke-width="1.5"/>
    <line x1="65" y1="310" x2="65" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="78" y1="310" x2="78" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="91" y1="310" x2="91" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="104" y1="310" x2="104" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="117" y1="310" x2="117" y2="322" stroke="#0A2342" stroke-width="1.5"/>
    <line x1="130" y1="310" x2="130" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="143" y1="310" x2="143" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="156" y1="310" x2="156" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="169" y1="310" x2="169" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="182" y1="310" x2="182" y2="322" stroke="#0A2342" stroke-width="1.5"/>
    <line x1="195" y1="310" x2="195" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="208" y1="310" x2="208" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="221" y1="310" x2="221" y2="318" stroke="#0A2342" stroke-width="1"/>
    <line x1="234" y1="310" x2="234" y2="318" stroke="#0A2342" stroke-width="1"/>
    <text x="52" y="333" font-size="16" fill="#0A2342" text-anchor="middle">0</text>
    <text x="117" y="333" font-size="16" fill="#0A2342" text-anchor="middle">10</text>
    <text x="182" y="333" font-size="16" fill="#0A2342" text-anchor="middle">20</text>
    <text x="45" y="364" font-size="18" font-weight="bold" fill="#D14343">L = 18 mm</text>
    <text x="45" y="386" font-size="16" fill="#5A6B7E">measured along the path</text>

    <!-- Panel 2: WIDTH -->
    <rect x="275" y="60" width="250" height="340" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
    <text x="295" y="90" font-size="18" font-weight="bold" fill="#0A2342">WIDTH</text>
    <circle cx="400" cy="210" r="92" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
    <line x1="466" y1="276" x2="498" y2="318" stroke="#0A2342" stroke-width="8"/>
    <line x1="322" y1="210" x2="478" y2="210" stroke="#5A6B7E" stroke-width="1.5"/>
    <line x1="330" y1="204" x2="330" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="344" y1="206" x2="344" y2="214" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="358" y1="204" x2="358" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="372" y1="206" x2="372" y2="214" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="386" y1="204" x2="386" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="400" y1="206" x2="400" y2="214" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="414" y1="204" x2="414" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="428" y1="206" x2="428" y2="214" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="442" y1="204" x2="442" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="456" y1="206" x2="456" y2="214" stroke="#5A6B7E" stroke-width="1"/>
    <line x1="470" y1="204" x2="470" y2="216" stroke="#5A6B7E" stroke-width="1"/>
    <path d="M398 140 Q396 200 400 278" fill="none" stroke="#D14343" stroke-width="5"/>
    <text x="400" y="330" font-size="16" fill="#5A6B7E" text-anchor="middle">0.1 mm divisions</text>
    <text x="400" y="362" font-size="18" font-weight="bold" fill="#D14343" text-anchor="middle">W = 0.4 mm</text>
    <text x="400" y="384" font-size="16" fill="#5A6B7E" text-anchor="middle">measuring magnifier reticle</text>

    <!-- Panel 3: DEPTH -->
    <rect x="540" y="60" width="235" height="340" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
    <text x="560" y="90" font-size="18" font-weight="bold" fill="#0A2342">DEPTH</text>
    <rect x="560" y="250" width="195" height="90" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M645 250 L658 290 L671 250 Z" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
    <circle cx="658" cy="180" r="30" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
    <line x1="658" y1="180" x2="674" y2="162" stroke="#D14343" stroke-width="2"/>
    <circle cx="658" cy="180" r="3" fill="#0A2342"/>
    <rect x="654" y="210" width="8" height="28" fill="#0A2342"/>
    <rect x="585" y="238" width="145" height="10" fill="#0A2342"/>
    <line x1="658" y1="248" x2="658" y2="288" stroke="#D14343" stroke-width="2.5"/>
    <text x="658" y="372" font-size="18" font-weight="bold" fill="#D14343" text-anchor="middle">D = 0.8 mm</text>
    <text x="658" y="392" font-size="16" fill="#5A6B7E" text-anchor="middle">gauge bridges the surface</text>

    <text x="400" y="430" font-size="16" fill="#5A6B7E" text-anchor="middle">Field check: depth ≈ shadow length × tan(light angle)</text>
  </g>
</svg>
