<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Direct vs. Indirect (Remote) Visual Testing</text>

  <!-- divider -->
  <line x1="400" y1="64" x2="400" y2="430" stroke="#5A6B7E" stroke-width="2"/>

  <!-- ===== LEFT: DIRECT ===== -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#1E9E6A">Direct</text>

  <!-- surface and weld -->
  <rect x="110" y="332" width="250" height="20" fill="#5A6B7E"/>
  <polygon points="233,332 245,316 257,332" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <text x="160" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">surface + weld</text>

  <!-- eye -->
  <ellipse cx="200" cy="152" rx="26" ry="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="200" cy="152" r="7" fill="#0A2342"/>
  <text x="200" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Eye</text>

  <!-- sight line -->
  <line x1="208" y1="163" x2="245" y2="330" stroke="#1B82E8" stroke-width="2"/>

  <!-- distance label -->
  <text x="116" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">≤ 24 in</text>
  <text x="116" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(600 mm)</text>

  <!-- angle arc -->
  <path d="M 211 330 A 34 34 0 0 1 235 298" fill="none" stroke="#D14343" stroke-width="2"/>
  <text x="150" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">≥ 30°</text>

  <!-- mirror aid -->
  <line x1="312" y1="296" x2="332" y2="316" stroke="#1B82E8" stroke-width="5"/>
  <text x="322" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">mirror aid</text>

  <!-- caption -->
  <text x="200" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Uninterrupted path to the eye</text>
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">mirror and magnifier are direct aids</text>

  <!-- ===== RIGHT: INDIRECT ===== -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#F2A33C">Indirect (remote)</text>

  <!-- component with bore -->
  <rect x="440" y="296" width="130" height="66" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="440" y="318" width="78" height="22" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="505" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">component (bore)</text>

  <!-- borescope probe + tip -->
  <rect x="410" y="322" width="20" height="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="430" y1="329" x2="512" y2="329" stroke="#0A2342" stroke-width="5"/>
  <circle cx="512" cy="329" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="512" y1="322" x2="540" y2="288" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="544" y="286" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">image sensor tip</text>

  <!-- cable to monitor -->
  <polyline points="420,322 415,210 575,150" fill="none" stroke="#5A6B7E" stroke-width="2"/>

  <!-- monitor -->
  <rect x="575" y="110" width="112" height="80" rx="4" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <rect x="583" y="118" width="96" height="64" fill="#14365B"/>
  <polyline points="612,134 627,150 617,160 637,174" fill="none" stroke="#D14343" stroke-width="2"/>
  <text x="631" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Monitor (relayed image)</text>

  <!-- caption -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Image relayed by a device:</text>
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">borescope, fiberscope, video, crawler</text>
</svg>
