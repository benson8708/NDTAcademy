<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Surface Weld Discontinuities</text>

  <!-- ===== PLAN VIEW ===== -->
  <text x="24" y="58" font-size="16" font-weight="bold" fill="#5A6B7E">PLAN VIEW — CAP SIDE</text>
  <rect x="24" y="66" width="752" height="142" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="24" y="110" width="752" height="54" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="30" y="143" font-size="16" font-style="italic" fill="#5A6B7E">weld bead</text>
  <!-- bead ripples -->
  <path d="M120 112 q12 26 0 50 M156 112 q12 26 0 50 M192 112 q12 26 0 50 M228 112 q12 26 0 50 M264 112 q12 26 0 50 M300 112 q12 26 0 50 M336 112 q12 26 0 50 M372 112 q12 26 0 50 M408 112 q12 26 0 50 M444 112 q12 26 0 50 M480 112 q12 26 0 50 M516 112 q12 26 0 50 M552 112 q12 26 0 50 M588 112 q12 26 0 50 M624 112 q12 26 0 50 M660 112 q12 26 0 50 M696 112 q12 26 0 50 M732 112 q12 26 0 50" stroke="#5A6B7E" stroke-width="1.2" opacity="0.5" fill="none"/>

  <!-- longitudinal crack -->
  <path d="M150 137 l14 -4 l15 5 l14 -4 l15 5 l14 -3 l15 4 l14 -3" stroke="#D14343" stroke-width="2.5" fill="none"/>
  <text x="120" y="88" font-size="16" font-weight="bold" fill="#D14343">Longitudinal crack</text>
  <path d="M200 94 L200 130" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- transverse crack -->
  <path d="M330 114 l-4 11 l5 12 l-4 12 l4 11" stroke="#D14343" stroke-width="2.5" fill="none"/>
  <text x="258" y="198" font-size="16" font-weight="bold" fill="#D14343">Transverse crack</text>
  <path d="M330 166 L330 184" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- crater crack -->
  <circle cx="450" cy="137" r="11" fill="none" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="3 3"/>
  <path d="M450 137 l-10 -7 M450 137 l11 -5 M450 137 l-3 11 M450 137 l8 9" stroke="#D14343" stroke-width="2.2" fill="none"/>
  <text x="402" y="88" font-size="16" font-weight="bold" fill="#D14343">Crater crack</text>
  <path d="M450 94 L450 124" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- surface porosity -->
  <circle cx="560" cy="132" r="3" fill="#0A2342"/>
  <circle cx="572" cy="140" r="2.5" fill="#0A2342"/>
  <circle cx="552" cy="144" r="2.5" fill="#0A2342"/>
  <circle cx="566" cy="150" r="2" fill="#0A2342"/>
  <circle cx="557" cy="126" r="2" fill="#0A2342"/>
  <text x="505" y="198" font-size="16" fill="#0A2342">Surface porosity</text>
  <path d="M560 154 L560 184" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- spatter -->
  <circle cx="640" cy="84" r="2.5" fill="#5A6B7E"/>
  <circle cx="656" cy="94" r="2.5" fill="#5A6B7E"/>
  <circle cx="672" cy="82" r="2.5" fill="#5A6B7E"/>
  <circle cx="686" cy="98" r="2.5" fill="#5A6B7E"/>
  <circle cx="700" cy="88" r="2.5" fill="#5A6B7E"/>
  <text x="712" y="92" font-size="16" fill="#0A2342">Spatter</text>

  <!-- arc strike -->
  <ellipse cx="690" cy="184" rx="11" ry="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="560" y="200" font-size="16" fill="#0A2342">Arc strike</text>
  <path d="M642 196 L676 186" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <!-- ===== CROSS-SECTION ===== -->
  <text x="24" y="242" font-size="16" font-weight="bold" fill="#5A6B7E">CROSS-SECTION — GROOVE WELD</text>

  <!-- plates -->
  <path d="M60 310 L330 310 L390 374 L60 374 Z" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M470 310 L740 310 L740 374 L410 374 Z" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- weld metal with cap and root -->
  <path d="M322 310 Q400 278 478 310 L410 374 Q400 386 390 374 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M322 310 L478 310" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="5 4" fill="none"/>

  <!-- undercut at left toe (amber profile fault) -->
  <path d="M310 310 L322 310 L316 321 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1"/>
  <!-- overlap at right toe -->
  <path d="M478 310 Q496 300 510 310 Q496 317 478 310 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1.2"/>

  <text x="400" y="262" text-anchor="middle" font-size="16" fill="#0A2342">Excess reinforcement — height is measured</text>
  <path d="M400 268 L400 290" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <text x="298" y="292" text-anchor="end" font-size="16" fill="#0A2342">Undercut</text>
  <path d="M302 296 L314 307" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <text x="522" y="292" font-size="16" fill="#0A2342">Overlap</text>
  <path d="M518 296 L500 307" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <text x="130" y="348" font-size="16" fill="#5A6B7E">Base metal</text>
  <text x="600" y="348" font-size="16" fill="#5A6B7E">Base metal</text>

  <text x="400" y="412" text-anchor="middle" font-size="16" fill="#0A2342">Root side — incomplete penetration hides here when you cannot see it</text>
  <path d="M400 388 L400 398" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="4 3" fill="none"/>

  <text x="400" y="440" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">Red = cracks, no tolerance · Amber = profile faults, measure against the limit</text>
</svg>
