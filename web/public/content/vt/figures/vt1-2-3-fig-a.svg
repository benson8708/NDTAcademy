<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="dimArr" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#0A2342"/>
    </marker>
    <marker id="ldrArr" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5A6B7E"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="6" y="6" width="788" height="438" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="36" font-size="24" font-weight="bold" fill="#0A2342" text-anchor="middle">Weld Measurement Gauges in Use</text>

  <!-- LEFT: butt weld with bridge cam gauge -->
  <text x="231" y="150" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Bridge cam (Cambridge) gauge</text>

  <!-- plates -->
  <rect x="50" y="300" width="160" height="36" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="250" y="300" width="160" height="36" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- weld -->
  <path d="M 210 336 L 210 300 Q 214 284 230 284 Q 246 284 250 300 L 250 336 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <line x1="210" y1="300" x2="218" y2="336" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="250" y1="300" x2="242" y2="336" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- undercut notch -->
  <path d="M 202 300 Q 206 310 210 300 Z" fill="#D14343"/>

  <!-- gauge: cam wheel, legs, sliding foot -->
  <line x1="231" y1="214" x2="180" y2="296" stroke="#1B82E8" stroke-width="6" stroke-linecap="round"/>
  <line x1="231" y1="214" x2="282" y2="296" stroke="#1B82E8" stroke-width="6" stroke-linecap="round"/>
  <rect x="172" y="294" width="16" height="8" fill="#1B82E8"/>
  <rect x="274" y="294" width="16" height="8" fill="#1B82E8"/>
  <circle cx="231" cy="206" r="44" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <line x1="231" y1="162" x2="231" y2="172" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="209" y1="168" x2="214" y2="177" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="253" y1="168" x2="248" y2="177" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="192" y1="184" x2="201" y2="189" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="270" y1="184" x2="261" y2="189" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="231" y1="206" x2="200" y2="176" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="231" cy="206" r="4" fill="#0A2342"/>
  <rect x="227" y="206" width="8" height="76" fill="#0A2342"/>
  <path d="M 227 282 L 235 282 L 231 292 Z" fill="#0A2342"/>

  <!-- reinforcement dimension -->
  <line x1="234" y1="285" x2="296" y2="285" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="256" y1="300" x2="296" y2="300" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="290" y1="287" x2="290" y2="298" stroke="#0A2342" stroke-width="1.6" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="302" y="298" font-size="16" fill="#0A2342">Reinforcement height</text>

  <!-- undercut label -->
  <text x="100" y="262" font-size="16" fill="#D14343" text-anchor="middle">Undercut at toe</text>
  <line x1="138" y1="268" x2="200" y2="296" stroke="#5A6B7E" stroke-width="1.5" marker-end="url(#ldrArr)"/>

  <text x="230" y="364" font-size="16" fill="#5A6B7E" text-anchor="middle">Butt weld</text>

  <!-- RIGHT: tee joint with fillet gauge -->
  <text x="502" y="166" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Fillet weld gauge blade</text>
  <path d="M 460 180 L 545 180 L 545 252 L 510 252 Q 460 252 460 200 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="502" y="222" font-size="16" fill="#0A2342" text-anchor="middle">5/16</text>
  <line x1="512" y1="258" x2="566" y2="272" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ldrArr)"/>

  <rect x="600" y="170" width="36" height="130" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="500" y="300" width="250" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 600 252 L 600 300 L 552 300 Q 580 272 600 252 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- vertical leg dimension -->
  <line x1="604" y1="252" x2="662" y2="252" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="640" y1="300" x2="662" y2="300" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="656" y1="258" x2="656" y2="294" stroke="#0A2342" stroke-width="1.6" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="666" y="282" font-size="16" fill="#0A2342">Leg</text>

  <!-- horizontal leg dimension -->
  <line x1="556" y1="312" x2="596" y2="312" stroke="#0A2342" stroke-width="1.6" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="576" y="330" font-size="16" fill="#0A2342" text-anchor="middle">Leg</text>

  <!-- throat -->
  <line x1="600" y1="300" x2="574" y2="276" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="560" y="258" font-size="16" fill="#1E9E6A" text-anchor="end">Throat</text>

  <text x="625" y="362" font-size="16" fill="#5A6B7E" text-anchor="middle">Tee joint fillet weld</text>

  <text x="400" y="430" font-size="16" fill="#5A6B7E" text-anchor="middle">Hold the gauge square to the joint and read at the worst location, not the prettiest</text>
</svg>
