<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">From Indication to Disposition</text>

  <!-- Indication -->
  <rect x="240" y="50" width="320" height="48" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="70" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">INDICATION</text>
  <text x="400" y="90" text-anchor="middle" font-size="16" fill="#0A2342">something catches your attention</text>

  <path d="M400 98 L400 114" stroke="#5A6B7E" stroke-width="2.5"/>
  <path d="M393 112 L407 112 L400 122 Z" fill="#5A6B7E"/>

  <!-- Interpret -->
  <rect x="240" y="122" width="320" height="48" rx="8" fill="#0A2342"/>
  <text x="400" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">INTERPRET</text>
  <text x="400" y="162" text-anchor="middle" font-size="16" fill="#D9E0E8">what caused it?</text>

  <!-- branch connectors -->
  <path d="M400 170 L400 184 L140 184 L140 194" stroke="#5A6B7E" stroke-width="2.5" fill="none"/>
  <path d="M133 192 L147 192 L140 202 Z" fill="#5A6B7E"/>
  <path d="M400 170 L400 194" stroke="#5A6B7E" stroke-width="2.5" fill="none"/>
  <path d="M393 192 L407 192 L400 202 Z" fill="#5A6B7E"/>
  <path d="M400 170 L400 184 L660 184 L660 194" stroke="#5A6B7E" stroke-width="2.5" fill="none"/>
  <path d="M653 192 L667 192 L660 202 Z" fill="#5A6B7E"/>

  <!-- False -->
  <rect x="24" y="202" width="232" height="64" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="140" y="224" text-anchor="middle" font-size="17" font-weight="bold" fill="#5A6B7E">FALSE</text>
  <text x="140" y="244" text-anchor="middle" font-size="16" fill="#0A2342">caused by surface or setup,</text>
  <text x="140" y="262" text-anchor="middle" font-size="16" fill="#0A2342">not the part</text>

  <!-- Nonrelevant -->
  <rect x="284" y="202" width="232" height="64" rx="8" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="400" y="224" text-anchor="middle" font-size="17" font-weight="bold" fill="#1B82E8">NONRELEVANT</text>
  <text x="400" y="244" text-anchor="middle" font-size="16" fill="#0A2342">a real feature, allowed</text>
  <text x="400" y="262" text-anchor="middle" font-size="16" fill="#0A2342">by design</text>

  <!-- Relevant -->
  <rect x="544" y="202" width="232" height="64" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="660" y="224" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">RELEVANT</text>
  <text x="660" y="244" text-anchor="middle" font-size="16" fill="#0A2342">caused by an actual</text>
  <text x="660" y="262" text-anchor="middle" font-size="16" fill="#0A2342">discontinuity</text>

  <!-- arrows down -->
  <path d="M140 266 L140 284" stroke="#5A6B7E" stroke-width="2.5"/>
  <path d="M133 282 L147 282 L140 292 Z" fill="#5A6B7E"/>
  <path d="M400 266 L400 284" stroke="#5A6B7E" stroke-width="2.5"/>
  <path d="M393 282 L407 282 L400 292 Z" fill="#5A6B7E"/>
  <path d="M660 266 L660 284" stroke="#5A6B7E" stroke-width="2.5"/>
  <path d="M653 282 L667 282 L660 292 Z" fill="#5A6B7E"/>

  <!-- actions -->
  <rect x="24" y="292" width="232" height="54" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="140" y="314" text-anchor="middle" font-size="16" fill="#0A2342">correct the cause, clean,</text>
  <text x="140" y="334" text-anchor="middle" font-size="16" fill="#0A2342">and re-examine</text>

  <rect x="284" y="292" width="232" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="400" y="314" text-anchor="middle" font-size="16" fill="#0A2342">record it if the procedure</text>
  <text x="400" y="334" text-anchor="middle" font-size="16" fill="#0A2342">requires, then move on</text>

  <rect x="544" y="292" width="232" height="54" rx="8" fill="#0A2342" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="660" y="313" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">EVALUATE</text>
  <text x="660" y="333" text-anchor="middle" font-size="16" fill="#D9E0E8">vs the acceptance criteria</text>

  <!-- to accept / reject -->
  <path d="M600 346 L600 362 L504 362 L504 370" stroke="#5A6B7E" stroke-width="2.5" fill="none"/>
  <path d="M497 368 L511 368 L504 378 Z" fill="#5A6B7E"/>
  <path d="M740 346 L740 362 L696 362 L696 370" stroke="#5A6B7E" stroke-width="2.5" fill="none"/>
  <path d="M689 368 L703 368 L696 378 Z" fill="#5A6B7E"/>

  <rect x="414" y="378" width="180" height="60" rx="8" fill="#1E9E6A"/>
  <text x="504" y="402" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">MEETS the limits</text>
  <text x="504" y="424" text-anchor="middle" font-size="16" fill="#FFFFFF">accept and record</text>

  <rect x="606" y="378" width="180" height="60" rx="8" fill="#D14343"/>
  <text x="696" y="402" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">EXCEEDS — DEFECT</text>
  <text x="696" y="424" text-anchor="middle" font-size="16" fill="#FFFFFF">reject, mark, report</text>

  <text x="24" y="402" font-size="16" font-style="italic" fill="#5A6B7E">Every defect is a discontinuity —</text>
  <text x="24" y="426" font-size="16" font-style="italic" fill="#5A6B7E">very few discontinuities are defects.</text>
</svg>
