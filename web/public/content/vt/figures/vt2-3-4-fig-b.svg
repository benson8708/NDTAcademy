<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#E8F1FB">Specialized Camera Carriers</text>

  <!-- BAND 1: push-tube camera -->
  <text x="40" y="70" font-size="17" font-weight="bold" fill="#F2A33C">Push-tube camera — 50–150 mm lines · distance counter · sonde</text>
  <circle cx="90" cy="125" r="32" fill="none" stroke="#D9E0E8" stroke-width="4"/>
  <circle cx="90" cy="125" r="10" fill="#5A6B7E"/>
  <text x="90" y="178" text-anchor="middle" font-size="16" fill="#D9E0E8">reel + counter</text>
  <!-- pipe -->
  <line x1="280" y1="100" x2="770" y2="100" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="280" y1="152" x2="770" y2="152" stroke="#5A6B7E" stroke-width="3"/>
  <!-- rod into pipe -->
  <path d="M 120 125 C 200 120 230 126 290 126 L 600 126" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <!-- camera head -->
  <rect x="600" y="116" width="34" height="20" rx="5" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2"/>
  <circle cx="630" cy="126" r="4" fill="#1B82E8"/>
  <!-- sonde -->
  <rect x="566" y="119" width="26" height="14" rx="4" fill="#1E9E6A"/>
  <text x="560" y="176" text-anchor="middle" font-size="16" fill="#1E9E6A">sonde (locator beacon)</text>
  <path d="M 580 112 Q 575 92 588 78 M 580 112 Q 590 90 604 84" fill="none" stroke="#1E9E6A" stroke-width="1.6"/>
  <text x="700" y="90" font-size="16" fill="#D9E0E8">camera head</text>

  <!-- BAND 2: pipe crawler -->
  <text x="40" y="216" font-size="17" font-weight="bold" fill="#F2A33C">Pipe crawler — 150 mm+ lines · PTZ camera · tether + encoder</text>
  <line x1="150" y1="238" x2="770" y2="238" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="150" y1="316" x2="770" y2="316" stroke="#5A6B7E" stroke-width="3"/>
  <!-- control unit -->
  <rect x="40" y="248" width="78" height="56" rx="6" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="79" y="328" text-anchor="middle" font-size="16" fill="#D9E0E8">control unit</text>
  <!-- tether -->
  <path d="M 118 276 C 180 276 220 296 300 296 L 388 296" fill="none" stroke="#D9E0E8" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="240" y="288" font-size="16" fill="#D9E0E8">tether: power · video</text>
  <!-- crawler body -->
  <rect x="388" y="276" width="96" height="28" rx="6" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="404" cy="310" r="11" fill="#5A6B7E"/>
  <circle cx="436" cy="310" r="11" fill="#5A6B7E"/>
  <circle cx="468" cy="310" r="11" fill="#5A6B7E"/>
  <!-- PTZ camera mast -->
  <rect x="420" y="252" width="30" height="24" rx="4" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="452" cy="264" r="6" fill="#1B82E8"/>
  <!-- light beams -->
  <polygon points="458,258 560,242 560,286" fill="#F2A33C" fill-opacity="0.25" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="590" y="270" font-size="16" fill="#E8F1FB">PTZ camera + lights</text>
  <text x="590" y="292" font-size="16" fill="#D9E0E8">encoder logs distance</text>

  <!-- BAND 3: subsea -->
  <text x="40" y="368" font-size="17" font-weight="bold" fill="#F2A33C">Subsea ROV camera — pressure housing · lights · parallel scaling lasers</text>
  <rect x="20" y="380" width="760" height="60" fill="#1B82E8" fill-opacity="0.15"/>
  <!-- ROV -->
  <rect x="120" y="392" width="92" height="38" rx="9" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="138" cy="411" r="9" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="206" cy="404" r="8" fill="#1B82E8"/>
  <!-- light cone -->
  <polygon points="214,404 320,388 320,426" fill="#E8F1FB" fill-opacity="0.22"/>
  <!-- parallel lasers -->
  <line x1="214" y1="398" x2="560" y2="398" stroke="#D14343" stroke-width="2.5"/>
  <line x1="214" y1="420" x2="560" y2="420" stroke="#D14343" stroke-width="2.5"/>
  <!-- target plate -->
  <rect x="560" y="384" width="18" height="52" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="566" cy="398" r="4" fill="#D14343"/>
  <circle cx="566" cy="420" r="4" fill="#D14343"/>
  <text x="640" y="402" font-size="16" fill="#D14343">dots a known distance apart</text>
  <text x="640" y="424" font-size="16" fill="#E8F1FB">= scale in every frame</text>
  <text x="320" y="394" font-size="16" fill="#E8F1FB">water absorbs red first → scenes go blue-green</text>
</svg>
