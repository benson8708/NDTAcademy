<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#E8F1FB">Fatigue Fracture Face - Failed Pump Shaft</text>

  <defs>
    <clipPath id="faceClip">
      <circle cx="300" cy="255" r="142"/>
    </clipPath>
  </defs>

  <!-- Fracture face (shaft cross-section) -->
  <circle cx="300" cy="255" r="145" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>

  <!-- Beach marks: crack-arrest arcs centered on the origin -->
  <g clip-path="url(#faceClip)" fill="none" stroke="#5A6B7E" stroke-width="2" opacity="0.85">
    <circle cx="328" cy="148" r="55"/>
    <circle cx="328" cy="148" r="95"/>
    <circle cx="328" cy="148" r="135"/>
    <circle cx="328" cy="148" r="175"/>
    <circle cx="328" cy="148" r="215"/>
  </g>

  <!-- Final fast-fracture zone (rough, crystalline) -->
  <g clip-path="url(#faceClip)">
    <polygon points="185,318 240,308 278,332 268,372 218,388 182,358" fill="#D14343" fill-opacity="0.25" stroke="#D14343" stroke-width="2"/>
    <line x1="198" y1="322" x2="214" y2="378" stroke="#D14343" stroke-width="1.5"/>
    <line x1="222" y1="314" x2="238" y2="376" stroke="#D14343" stroke-width="1.5"/>
    <line x1="248" y1="318" x2="258" y2="368" stroke="#D14343" stroke-width="1.5"/>
  </g>

  <!-- Keyway cut into the shaft -->
  <rect x="272" y="98" width="56" height="50" fill="#0A2342" stroke="#1B82E8" stroke-width="3"/>

  <!-- Ratchet marks near the origin -->
  <g stroke="#F2A33C" stroke-width="2.5">
    <line x1="290" y1="148" x2="286" y2="168"/>
    <line x1="305" y1="148" x2="303" y2="170"/>
    <line x1="318" y1="148" x2="318" y2="172"/>
    <line x1="328" y1="152" x2="334" y2="174"/>
  </g>

  <!-- Origin at the keyway corner -->
  <circle cx="330" cy="150" r="5" fill="#F2A33C"/>
  <circle cx="330" cy="150" r="11" fill="none" stroke="#F2A33C" stroke-width="2"/>

  <!-- Labels -->
  <text x="505" y="135" font-size="17" fill="#E8F1FB">Origin - keyway corner</text>
  <line x1="500" y1="130" x2="344" y2="150" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="505" y="182" font-size="17" fill="#E8F1FB">Ratchet marks - multiple starts</text>
  <line x1="500" y1="177" x2="324" y2="170" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="505" y="255" font-size="17" fill="#E8F1FB">Beach marks - crack-arrest</text>
  <text x="505" y="275" font-size="17" fill="#E8F1FB">lines curving around the origin</text>
  <line x1="500" y1="258" x2="396" y2="265" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="505" y="332" font-size="17" fill="#E8F1FB">Final fast-fracture zone -</text>
  <text x="505" y="352" font-size="17" fill="#E8F1FB">rough, last to fail</text>
  <line x1="500" y1="335" x2="272" y2="345" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="505" y="402" font-size="17" fill="#E8F1FB">Machined OD surface</text>
  <line x1="500" y1="396" x2="441" y2="292" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="400" y="440" text-anchor="middle" font-size="16" fill="#D9E0E8">Follow the beach marks backward - they point home to the origin.</text>
</svg>
