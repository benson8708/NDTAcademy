<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" font-size="24" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Rigid Borescope: Construction and Directions of View</text>

  <!-- scope body -->
  <rect x="56" y="116" width="24" height="48" rx="5" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="80" y="122" width="22" height="36" rx="3" fill="#1B82E8"/>
  <rect x="102" y="126" width="44" height="28" rx="3" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1"/>
  <rect x="152" y="98" width="14" height="34" rx="3" fill="#F2A33C"/>
  <rect x="146" y="132" width="556" height="16" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <ellipse cx="200" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="270" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="340" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="410" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="480" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="550" cy="140" rx="4" ry="7" fill="#1B82E8"/>
  <ellipse cx="688" cy="140" rx="4" ry="7" fill="#F2A33C"/>
  <rect x="700" y="130" width="8" height="20" rx="2" fill="#D9E0E8"/>
  <line x1="170" y1="135.5" x2="696" y2="135.5" stroke="#F2A33C" stroke-width="1.4" stroke-dasharray="3 4"/>
  <line x1="170" y1="144.5" x2="696" y2="144.5" stroke="#F2A33C" stroke-width="1.4" stroke-dasharray="3 4"/>

  <!-- scope labels -->
  <text x="68" y="198" font-size="16" fill="#E8F1FB" text-anchor="middle">Eyepiece</text>
  <line x1="68" y1="184" x2="68" y2="168" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="159" y="80" font-size="16" fill="#E8F1FB" text-anchor="middle">Light guide connector</text>
  <line x1="159" y1="86" x2="159" y2="96" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="360" y="190" font-size="17" fill="#E8F1FB" text-anchor="middle">Relay (rod) lens train carries the image</text>
  <line x1="360" y1="176" x2="360" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="650" y="106" font-size="16" fill="#E8F1FB" text-anchor="middle">Objective lens</text>
  <line x1="668" y1="112" x2="686" y2="132" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="582" y="216" font-size="16" fill="#F2A33C" text-anchor="middle">Illumination fibers (light only)</text>
  <line x1="582" y1="202" x2="582" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- DOV section -->
  <text x="400" y="262" font-size="18" font-weight="bold" fill="#1B82E8" text-anchor="middle">Direction of view (DOV) at the tip</text>

  <!-- forward -->
  <rect x="56" y="302" width="64" height="16" rx="3" fill="#D9E0E8"/>
  <circle cx="130" cy="310" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 130 310 L 212 282 L 212 338 Z" fill="#F2A33C" fill-opacity="0.3" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="130" y="368" font-size="17" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Forward 0&#176;</text>
  <text x="130" y="392" font-size="16" fill="#D9E0E8" text-anchor="middle">advance down a bore</text>

  <!-- forward-oblique -->
  <rect x="236" y="302" width="64" height="16" rx="3" fill="#D9E0E8"/>
  <circle cx="310" cy="310" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 310 310 L 387 274 L 346 233 Z" fill="#F2A33C" fill-opacity="0.3" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="310" y="368" font-size="17" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Forward-oblique 45&#176;</text>
  <text x="310" y="392" font-size="16" fill="#D9E0E8" text-anchor="middle">corners and threads</text>

  <!-- side -->
  <rect x="416" y="302" width="64" height="16" rx="3" fill="#D9E0E8"/>
  <circle cx="490" cy="310" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 490 304 L 468 224 L 512 224 Z" fill="#F2A33C" fill-opacity="0.3" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="490" y="368" font-size="17" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Side 90&#176;</text>
  <text x="490" y="392" font-size="16" fill="#D9E0E8" text-anchor="middle">bore and cylinder walls</text>

  <!-- retro -->
  <rect x="596" y="302" width="64" height="16" rx="3" fill="#D9E0E8"/>
  <circle cx="670" cy="310" r="10" fill="#1B82E8" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 670 306 L 655 224 L 605 252 Z" fill="#F2A33C" fill-opacity="0.3" stroke="#F2A33C" stroke-width="1.5"/>
  <text x="670" y="368" font-size="17" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Retro ~120&#176;</text>
  <text x="670" y="392" font-size="16" fill="#D9E0E8" text-anchor="middle">look back at the near side</text>

  <text x="400" y="430" font-size="16" fill="#F2A33C" text-anchor="middle">Magnification changes with tip-to-target distance: no built-in scale</text>
</svg>
