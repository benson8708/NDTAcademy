<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrAmber" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F2A33C"/>
    </marker>
    <marker id="arrNavy" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0A2342"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="6" y="6" width="788" height="438" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="38" font-size="24" font-weight="bold" fill="#0A2342" text-anchor="middle">Inspection Mirror: Seeing Around an Obstruction</text>

  <!-- eye -->
  <path d="M 308 185 Q 335 166 362 185 Q 335 204 308 185 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="335" cy="185" r="8" fill="#0A2342"/>
  <circle cx="332" cy="182" r="2.5" fill="#FFFFFF"/>
  <text x="335" y="158" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Eye</text>

  <!-- blocked direct view -->
  <line x1="366" y1="194" x2="556" y2="272" stroke="#D14343" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="560" y1="266" x2="576" y2="284" stroke="#D14343" stroke-width="3"/>
  <line x1="576" y1="266" x2="560" y2="284" stroke="#D14343" stroke-width="3"/>
  <text x="455" y="312" font-size="16" fill="#D14343" text-anchor="middle">Direct view blocked</text>

  <!-- obstruction wall -->
  <rect x="560" y="240" width="44" height="160" fill="#5A6B7E"/>
  <text x="582" y="422" font-size="16" fill="#5A6B7E" text-anchor="middle">Obstruction</text>

  <!-- plate and hidden weld -->
  <rect x="620" y="330" width="150" height="20" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 676 330 Q 682 316 688 330 Q 694 316 700 330 Q 706 316 712 330 Q 718 316 724 330 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="700" y="372" font-size="16" fill="#0A2342" text-anchor="middle">Hidden weld</text>

  <!-- mirror with handle -->
  <line x1="640" y1="90" x2="676" y2="161" stroke="#5A6B7E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="676" cy="161" r="5" fill="#5A6B7E"/>
  <line x1="676" y1="161" x2="724" y2="209" stroke="#1B82E8" stroke-width="7" stroke-linecap="round"/>
  <text x="628" y="78" font-size="16" fill="#0A2342" text-anchor="end">Swivel head on a</text>
  <text x="628" y="97" font-size="16" fill="#0A2342" text-anchor="end">telescoping handle</text>

  <!-- rays -->
  <line x1="368" y1="185" x2="688" y2="185" stroke="#F2A33C" stroke-width="3" marker-end="url(#arrAmber)"/>
  <line x1="700" y1="196" x2="700" y2="318" stroke="#F2A33C" stroke-width="3" marker-end="url(#arrAmber)"/>

  <!-- normal and angles -->
  <line x1="700" y1="185" x2="652" y2="233" stroke="#5A6B7E" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="648" y="252" font-size="16" fill="#5A6B7E" text-anchor="middle">Normal</text>
  <path d="M 668 185 A 32 32 0 0 0 700 217" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <text x="648" y="200" font-size="16" font-weight="bold" fill="#0A2342" text-anchor="end">45&#176;</text>
  <text x="694" y="240" font-size="16" font-weight="bold" fill="#0A2342" text-anchor="start">45&#176;</text>

  <!-- construction inset -->
  <rect x="30" y="252" width="270" height="170" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="165" y="276" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Mirror construction</text>

  <rect x="233" y="288" width="16" height="44" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="233" y1="288" x2="233" y2="332" stroke="#F2A33C" stroke-width="4"/>
  <line x1="178" y1="296" x2="231" y2="308" stroke="#0A2342" stroke-width="1.8" marker-end="url(#arrNavy)"/>
  <line x1="233" y1="308" x2="180" y2="322" stroke="#0A2342" stroke-width="1.8" marker-end="url(#arrNavy)"/>
  <text x="42" y="302" font-size="16" font-weight="bold" fill="#0A2342">First-surface:</text>
  <text x="42" y="321" font-size="16" fill="#0A2342">one crisp image</text>

  <rect x="233" y="352" width="16" height="44" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="249" y1="352" x2="249" y2="396" stroke="#F2A33C" stroke-width="4"/>
  <line x1="178" y1="360" x2="231" y2="372" stroke="#0A2342" stroke-width="1.8"/>
  <line x1="233" y1="372" x2="247" y2="377" stroke="#0A2342" stroke-width="1.2"/>
  <line x1="247" y1="377" x2="233" y2="382" stroke="#0A2342" stroke-width="1.2"/>
  <line x1="233" y1="382" x2="180" y2="396" stroke="#0A2342" stroke-width="1.8" marker-end="url(#arrNavy)"/>
  <line x1="233" y1="372" x2="196" y2="381" stroke="#5A6B7E" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="190" y="378" font-size="16" fill="#5A6B7E" text-anchor="end">ghost</text>
  <text x="42" y="366" font-size="16" font-weight="bold" fill="#0A2342">Second-surface:</text>
  <text x="42" y="385" font-size="16" fill="#0A2342">faint ghost image</text>

  <text x="400" y="438" font-size="16" fill="#5A6B7E" text-anchor="middle">Angle of incidence = angle of reflection, so a 45&#176; mirror turns the view 90&#176;</text>
</svg>
