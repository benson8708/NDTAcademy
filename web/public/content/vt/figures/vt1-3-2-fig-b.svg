<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Inspection Patterns and the Viewing Envelope</text>

  <!-- ===== PLATE: RASTER + GRID ===== -->
  <text x="24" y="66" font-size="16" font-weight="bold" fill="#5A6B7E">PLATE — RASTER PASSES + GRID</text>
  <rect x="24" y="76" width="380" height="240" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M151 76 L151 316 M278 76 L278 316" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="6 5"/>
  <path d="M24 196 L404 196" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="34" y="96" font-size="16" fill="#5A6B7E">1</text>
  <text x="161" y="96" font-size="16" fill="#5A6B7E">2</text>
  <text x="288" y="96" font-size="16" fill="#5A6B7E">3</text>
  <text x="34" y="216" font-size="16" fill="#5A6B7E">4</text>
  <text x="161" y="216" font-size="16" fill="#5A6B7E">5</text>
  <text x="288" y="216" font-size="16" fill="#5A6B7E">6</text>

  <!-- completed checkmarks in blocks 1 and 2 -->
  <path d="M112 92 l8 9 l14 -18" stroke="#1E9E6A" stroke-width="4" fill="none"/>
  <path d="M239 92 l8 9 l14 -18" stroke="#1E9E6A" stroke-width="4" fill="none"/>

  <!-- raster pattern in block 3, with overlapping field-of-view bands -->
  <rect x="282" y="88" width="118" height="26" fill="#1B82E8" opacity="0.10"/>
  <rect x="282" y="108" width="118" height="26" fill="#1B82E8" opacity="0.10"/>
  <path d="M290 100 L394 100 L394 126 L290 126 L290 152 L394 152 L394 178 L290 178" stroke="#1B82E8" stroke-width="3" fill="none"/>
  <path d="M298 171 L284 178 L298 185 Z" fill="#1B82E8"/>

  <text x="24" y="342" font-size="16" fill="#0A2342">Overlap every pass — no strip</text>
  <text x="24" y="364" font-size="16" fill="#0A2342">escapes between fields of view.</text>
  <text x="24" y="392" font-size="16" fill="#0A2342">Grid: finish a block, check it off.</text>

  <!-- ===== PIPE: CIRCUMFERENTIAL ===== -->
  <text x="450" y="66" font-size="16" font-weight="bold" fill="#5A6B7E">PIPE — CIRCUMFERENTIAL BANDS</text>
  <rect x="470" y="88" width="240" height="80" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <ellipse cx="710" cy="128" rx="18" ry="40" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <ellipse cx="470" cy="128" rx="18" ry="40" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <ellipse cx="530" cy="128" rx="12" ry="40" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <ellipse cx="590" cy="128" rx="12" ry="40" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <ellipse cx="650" cy="128" rx="12" ry="40" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <path d="M520 196 L654 196" stroke="#5A6B7E" stroke-width="2.5"/>
  <path d="M654 189 L668 196 L654 203 Z" fill="#5A6B7E"/>
  <text x="452" y="224" font-size="16" fill="#0A2342">advance band by band, or run a spiral</text>

  <!-- ===== DIRECT-VIEWING ENVELOPE ===== -->
  <text x="450" y="264" font-size="16" font-weight="bold" fill="#5A6B7E">DIRECT-VIEWING ENVELOPE</text>
  <path d="M444 408 L788 408" stroke="#0A2342" stroke-width="3"/>
  <path d="M460 408 l-10 12 M500 408 l-10 12 M540 408 l-10 12 M580 408 l-10 12 M620 408 l-10 12 M660 408 l-10 12 M700 408 l-10 12 M740 408 l-10 12 M780 408 l-10 12" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- eye -->
  <path d="M680 300 Q700 284 720 300 Q700 316 680 300 Z" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="700" cy="300" r="5" fill="#0A2342"/>
  <!-- line of sight -->
  <path d="M688 308 L524 404" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="548" y="338" font-size="16" font-weight="bold" fill="#0A2342">eye ≤ 24 in. (600 mm)</text>
  <!-- angle arc -->
  <path d="M574 408 Q577 391 567 379" stroke="#0A2342" stroke-width="2" fill="none"/>
  <text x="586" y="388" font-size="16" font-weight="bold" fill="#0A2342">≥ 30°</text>
  <text x="450" y="438" font-size="16" font-style="italic" fill="#5A6B7E">Verify procedure lux at this surface.</text>
</svg>
