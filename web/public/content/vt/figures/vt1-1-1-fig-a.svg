<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Evolution of Visual Testing</text>

  <!-- timeline axis -->
  <line x1="60" y1="235" x2="730" y2="235" stroke="#0A2342" stroke-width="4"/>
  <polygon points="730,224 760,235 730,246" fill="#0A2342"/>

  <!-- Node 1 (above) -->
  <line x1="100" y1="235" x2="100" y2="200" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="100" cy="235" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="28" y="106" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Antiquity</text>
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Judge by eye,</text>
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sound, and</text>
  <text x="100" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">feel</text>

  <!-- Node 2 (below) -->
  <line x1="224" y1="235" x2="224" y2="272" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="224" cy="235" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="152" y="272" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="224" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Industrial age</text>
  <text x="224" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Boilers and rail</text>
  <text x="224" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">drive inspection</text>
  <text x="224" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">codes</text>

  <!-- Node 3 (above) -->
  <line x1="348" y1="235" x2="348" y2="200" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="348" cy="235" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="276" y="106" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="348" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1960s</text>
  <text x="348" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Formal NDT</text>
  <text x="348" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">personnel quals;</text>
  <text x="348" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">VT recognized</text>

  <!-- Node 4 (below) -->
  <line x1="472" y1="235" x2="472" y2="272" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="472" cy="235" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="400" y="272" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="472" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Optical aids</text>
  <text x="472" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Mirrors,</text>
  <text x="472" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">magnifiers,</text>
  <text x="472" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">rigid borescopes</text>

  <!-- Node 5 (above) -->
  <line x1="596" y1="235" x2="596" y2="200" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="596" cy="235" r="9" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="524" y="106" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="596" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Fiber and video</text>
  <text x="596" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fiberscopes and</text>
  <text x="596" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">CCD/CMOS</text>
  <text x="596" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">video probes</text>

  <!-- Node 6 (below) -->
  <line x1="720" y1="235" x2="720" y2="272" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="720" cy="235" r="9" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="648" y="272" width="144" height="94" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="720" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Today</text>
  <text x="720" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crawlers, drones,</text>
  <text x="720" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and digital</text>
  <text x="720" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">records</text>

  <!-- time caption -->
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Time: earlier (left) to more recent (right)</text>
</svg>
