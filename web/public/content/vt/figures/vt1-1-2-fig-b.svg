<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Verifying Light at the Examination Surface</text>

  <!-- divider between the two ideas -->
  <line x1="540" y1="72" x2="540" y2="430" stroke="#5A6B7E" stroke-width="2"/>

  <!-- ===== LEFT: measure at the surface ===== -->
  <!-- examination surface -->
  <rect x="110" y="340" width="410" height="20" fill="#5A6B7E"/>

  <!-- overhead lamp -->
  <polygon points="180,80 245,80 262,112 163,112" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="212" cy="118" r="6" fill="#F2A33C"/>
  <text x="212" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Lamp</text>

  <!-- light rays to surface -->
  <line x1="212" y1="122" x2="172" y2="340" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="212" y1="122" x2="252" y2="340" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="212" y1="122" x2="332" y2="340" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="212" y1="122" x2="412" y2="340" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- distance marker -->
  <line x1="140" y1="114" x2="140" y2="340" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="116" y="236" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">distance d</text>

  <!-- inverse-square note -->
  <text x="116" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">2x distance =</text>
  <text x="116" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">1/4 the light</text>
  <text x="116" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#9FB3C8">(inverse square)</text>

  <!-- light meter on the surface -->
  <rect x="296" y="300" width="74" height="40" rx="4" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 321 300 A 12 12 0 0 1 345 300 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="333" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1000 lux</text>
  <text x="333" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">≈ 100 fc</text>
  <text x="378" y="296" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Calibrated meter</text>

  <!-- surface labels / lesson point -->
  <text x="300" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Examination surface</text>
  <text x="300" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Measure at the surface, not at the lamp</text>

  <!-- ===== RIGHT: raking light reveals relief ===== -->
  <rect x="556" y="340" width="140" height="20" fill="#5A6B7E"/>
  <text x="630" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Raking light</text>

  <!-- low-angle lamp -->
  <polygon points="672,138 712,138 720,160 664,160" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- low-angle ray skimming the surface -->
  <line x1="702" y1="288" x2="592" y2="338" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="600,330 590,340 604,341" fill="#F2A33C"/>

  <!-- surface relief (bump) and its shadow -->
  <polygon points="582,340 590,320 598,340" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>
  <polygon points="560,342 582,342 582,352 560,352" fill="#06182E"/>

  <text x="630" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">shadow reveals</text>
  <text x="630" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">surface relief</text>
</svg>
