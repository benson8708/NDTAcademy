<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B82E8"/>
    </marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F2A33C"/>
    </marker>
    <marker id="arrGrey" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7E"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Refraction at an Air–Glass Boundary</text>

  <!-- LEFT: refraction -->
  <rect x="50" y="260" width="360" height="150" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="50" y1="260" x2="410" y2="260" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="230" y1="100" x2="230" y2="412" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="238" y="112" font-size="16" fill="#5A6B7E">normal</text>

  <!-- incident ray 45 deg -->
  <line x1="110" y1="140" x2="226" y2="256" stroke="#1B82E8" stroke-width="3" marker-end="url(#arrBlue)"/>
  <text x="58" y="130" font-size="16" font-weight="bold" fill="#1B82E8">incident ray 45°</text>

  <!-- partial reflection -->
  <line x1="230" y1="260" x2="336" y2="154" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrGrey)"/>
  <text x="316" y="142" font-size="16" fill="#5A6B7E">~4% reflected</text>
  <text x="316" y="162" font-size="16" fill="#5A6B7E">(uncoated surface)</text>

  <!-- refracted ray 27.7 deg -->
  <line x1="230" y1="260" x2="302" y2="398" stroke="#1B82E8" stroke-width="3" marker-end="url(#arrBlue)"/>
  <text x="306" y="382" font-size="16" font-weight="bold" fill="#1B82E8">refracted 27.7°</text>

  <!-- angle arcs -->
  <path d="M 230 215 A 45 45 0 0 0 198 228" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="196" y="206" font-size="17" font-weight="bold" fill="#F2A33C">θ1</text>
  <path d="M 230 305 A 45 45 0 0 0 251 300" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="246" y="330" font-size="17" font-weight="bold" fill="#F2A33C">θ2</text>

  <text x="60" y="248" font-size="16" font-weight="bold" fill="#0A2342">AIR  n = 1.00</text>
  <text x="60" y="288" font-size="16" font-weight="bold" fill="#0A2342">GLASS  n = 1.52</text>
  <text x="60" y="440" font-size="17" font-weight="bold" fill="#0A2342">Snell's law:  n1 × sin θ1 = n2 × sin θ2</text>
  <text x="245" y="385" font-size="16" fill="#5A6B7E">bends toward the normal</text>

  <!-- RIGHT: total internal reflection -->
  <text x="610" y="118" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">Total internal reflection</text>
  <rect x="450" y="260" width="320" height="150" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="450" y1="260" x2="770" y2="260" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="610" y1="160" x2="610" y2="412" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>

  <text x="460" y="248" font-size="16" font-weight="bold" fill="#0A2342">AIR</text>
  <text x="460" y="288" font-size="16" font-weight="bold" fill="#0A2342">GLASS</text>

  <!-- ray inside glass at 45 deg, reflecting -->
  <line x1="470" y1="400" x2="606" y2="264" stroke="#F2A33C" stroke-width="3" marker-end="url(#arrAmber)"/>
  <line x1="610" y1="260" x2="746" y2="396" stroke="#F2A33C" stroke-width="3" marker-end="url(#arrAmber)"/>

  <!-- blocked escape ray -->
  <line x1="610" y1="260" x2="664" y2="186" stroke="#D14343" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="654" y1="180" x2="674" y2="200" stroke="#D14343" stroke-width="3"/>
  <line x1="674" y1="180" x2="654" y2="200" stroke="#D14343" stroke-width="3"/>
  <text x="684" y="196" font-size="16" fill="#D14343">no exit</text>

  <text x="610" y="434" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">45° &gt; critical angle ≈ 41° → boundary becomes a mirror</text>
  <text x="610" y="142" text-anchor="middle" font-size="16" fill="#5A6B7E">the principle behind fibers and prisms</text>
</svg>
