<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Cross-Section of the Human Eye</text>

  <!-- Eyeball -->
  <circle cx="430" cy="240" r="145" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>

  <!-- Optical axis -->
  <line x1="280" y1="240" x2="576" y2="240" stroke="#5A6B7E" stroke-width="1.2" stroke-dasharray="6 5"/>

  <!-- Cornea -->
  <path d="M 305 168 Q 276 240 305 312" fill="#1B82E8" fill-opacity="0.18" stroke="#1B82E8" stroke-width="3"/>

  <!-- Iris (two arcs) leaving pupil gap -->
  <line x1="322" y1="196" x2="322" y2="222" stroke="#0A2342" stroke-width="6"/>
  <line x1="322" y1="258" x2="322" y2="284" stroke="#0A2342" stroke-width="6"/>

  <!-- Lens (biconvex) -->
  <path d="M 348 204 Q 366 240 348 276 Q 330 240 348 204 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- Retina (back inner band) -->
  <path d="M 558 158 Q 592 240 558 322" fill="none" stroke="#D14343" stroke-width="6"/>

  <!-- Fovea -->
  <circle cx="573" cy="240" r="7" fill="#1E9E6A" stroke="#0A2342" stroke-width="1.5"/>

  <!-- Optic nerve + blind spot -->
  <path d="M 556 300 Q 610 314 668 322" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <path d="M 552 318 Q 606 332 666 340" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <circle cx="556" cy="308" r="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5"/>

  <!-- Object arrow (left) -->
  <line x1="170" y1="240" x2="170" y2="186" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="170,182 164,196 176,196" fill="#0A2342"/>
  <text x="170" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">object</text>

  <!-- Light rays through lens, inverting -->
  <polyline points="170,186 348,216 572,262" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <polyline points="170,186 348,264 572,262" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <line x1="170" y1="240" x2="572" y2="240" stroke="#F2A33C" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- Inverted image arrow on retina -->
  <line x1="573" y1="240" x2="573" y2="262" stroke="#D14343" stroke-width="2.5"/>
  <polygon points="573,266 567,252 579,252" fill="#D14343"/>
  <text x="586" y="284" font-family="Arial, sans-serif" font-size="14" fill="#D14343">inverted image</text>

  <!-- Labels with leaders -->
  <line x1="120" y1="126" x2="288" y2="208" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="60" y="122" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Cornea</text>

  <line x1="118" y1="356" x2="322" y2="270" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="70" y="360" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Iris</text>

  <line x1="300" y1="410" x2="322" y2="244" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="252" y="426" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Pupil</text>

  <line x1="392" y1="410" x2="352" y2="272" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="372" y="426" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Lens</text>

  <line x1="612" y1="408" x2="612" y2="330" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="506" y="424" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Optic nerve / blind spot</text>

  <line x1="650" y1="156" x2="572" y2="206" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="655" y="150" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Retina</text>

  <line x1="636" y1="238" x2="580" y2="240" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="642" y="234" font-family="Arial, sans-serif" font-size="17" fill="#1E9E6A">Fovea (cones)</text>
  <text x="642" y="252" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">sharp detail, color</text>

  <line x1="636" y1="300" x2="556" y2="296" stroke="#5A6B7E" stroke-width="1.3"/>
  <text x="642" y="304" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Rods</text>
  <text x="642" y="322" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">dim light, motion</text>
</svg>
