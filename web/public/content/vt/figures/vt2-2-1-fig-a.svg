<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">The Visible Spectrum and the Eye's Response</text>

  <!-- y axis label -->
  <text transform="rotate(-90 52 195)" x="52" y="195" text-anchor="middle" font-size="16" fill="#D9E0E8">eye sensitivity (photopic)</text>

  <!-- baseline for curve -->
  <line x1="100" y1="262" x2="700" y2="262" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- photopic sensitivity curve -->
  <path d="M 100 259 C 170 257 230 249 280 223 C 320 202 350 113 392 113 C 434 113 464 202 504 227 C 548 251 610 257 700 259"
        fill="none" stroke="#E8F1FB" stroke-width="3"/>

  <!-- peak marker at 555 nm -->
  <line x1="392" y1="113" x2="392" y2="348" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="392" cy="113" r="5" fill="#F2A33C"/>
  <text x="392" y="92" text-anchor="middle" font-size="17" font-weight="bold" fill="#F2A33C">peak response: 555 nm (green)</text>

  <!-- spectrum bar -->
  <rect x="100" y="300" width="183" height="48" fill="#1B82E8"/>
  <rect x="283" y="300" width="117" height="48" fill="#1E9E6A"/>
  <rect x="400" y="300" width="100" height="48" fill="#F2A33C"/>
  <rect x="500" y="300" width="200" height="48" fill="#D14343"/>
  <rect x="100" y="300" width="600" height="48" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>

  <!-- band labels -->
  <text x="190" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">violet–blue</text>
  <text x="341" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">green</text>
  <text x="450" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">yellow</text>
  <text x="600" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">orange–red</text>

  <!-- UV / IR neighbours -->
  <rect x="34" y="300" width="66" height="48" fill="none" stroke="#E8F1FB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="67" y="330" text-anchor="middle" font-size="16" fill="#E8F1FB">UV</text>
  <rect x="700" y="300" width="66" height="48" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="733" y="330" text-anchor="middle" font-size="16" fill="#D9E0E8">IR</text>

  <!-- wavelength ticks -->
  <line x1="100" y1="348" x2="100" y2="357" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="217" y1="348" x2="217" y2="357" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="392" y1="348" x2="392" y2="357" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="500" y1="348" x2="500" y2="357" stroke="#D9E0E8" stroke-width="1.5"/>
  <line x1="700" y1="348" x2="700" y2="357" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="100" y="376" text-anchor="middle" font-size="16" fill="#D9E0E8">380</text>
  <text x="217" y="376" text-anchor="middle" font-size="16" fill="#D9E0E8">450</text>
  <text x="392" y="376" text-anchor="middle" font-size="16" fill="#F2A33C">555</text>
  <text x="500" y="376" text-anchor="middle" font-size="16" fill="#D9E0E8">620</text>
  <text x="700" y="376" text-anchor="middle" font-size="16" fill="#D9E0E8">740</text>
  <text x="400" y="404" text-anchor="middle" font-size="17" fill="#D9E0E8">wavelength (nanometers)</text>

  <text x="400" y="434" text-anchor="middle" font-size="16" fill="#E8F1FB">UV and IR border the visible band — present on the job, invisible to the eye.</text>
</svg>
