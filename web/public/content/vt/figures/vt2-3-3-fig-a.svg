<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrB3" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B82E8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0A2342">Magnifier Power vs Field — Mirror Viewing Geometry</text>

  <!-- LEFT: magnifier trade-off -->
  <text x="225" y="78" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">Magnifier: power vs field of view</text>

  <!-- 5x view -->
  <circle cx="135" cy="200" r="72" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 80 220 Q 135 196 190 220" fill="none" stroke="#5A6B7E" stroke-width="5"/>
  <path d="M 80 232 Q 135 208 190 232" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <path d="M 84 208 Q 135 186 186 208" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <polyline points="118,176 130,186 126,192 138,200" fill="none" stroke="#D14343" stroke-width="1.6"/>
  <text x="135" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">5× — sees ~40 mm</text>
  <text x="135" y="316" text-anchor="middle" font-size="16" fill="#5A6B7E">crack barely visible</text>

  <!-- 10x view -->
  <circle cx="320" cy="200" r="72" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 250 250 Q 320 196 390 250" fill="none" stroke="#5A6B7E" stroke-width="9"/>
  <polyline points="276,160 300,180 292,194 318,212 310,222 336,240" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="320" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">10× — sees ~18 mm</text>
  <text x="320" y="316" text-anchor="middle" font-size="16" fill="#D14343">crack resolved</text>

  <text x="225" y="356" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E9E6A">power ≈ 250 mm ÷ focal length</text>
  <text x="225" y="380" text-anchor="middle" font-size="16" fill="#5A6B7E">more power → smaller field,</text>
  <text x="225" y="400" text-anchor="middle" font-size="16" fill="#5A6B7E">shorter working distance</text>

  <!-- divider -->
  <line x1="438" y1="60" x2="438" y2="430" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- RIGHT: mirror geometry -->
  <text x="620" y="78" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">Mirror: folding the sight line</text>

  <!-- test surface -->
  <line x1="460" y1="385" x2="780" y2="385" stroke="#0A2342" stroke-width="3"/>
  <path d="M 660 385 Q 675 368 690 385" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <text x="676" y="411" text-anchor="middle" font-size="16" fill="#0A2342">weld</text>

  <!-- obstruction -->
  <rect x="560" y="180" width="36" height="205" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="578" y="168" text-anchor="middle" font-size="16" fill="#5A6B7E">obstruction</text>

  <!-- eye -->
  <path d="M 462 148 Q 484 132 506 148 Q 484 164 462 148 Z" fill="none" stroke="#0A2342" stroke-width="2"/>
  <circle cx="484" cy="148" r="5" fill="#0A2342"/>
  <text x="484" y="126" text-anchor="middle" font-size="16" fill="#0A2342">eye</text>

  <!-- mirror -->
  <line x1="648" y1="135" x2="700" y2="100" stroke="#0A2342" stroke-width="5"/>
  <line x1="700" y1="100" x2="740" y2="86" stroke="#5A6B7E" stroke-width="2.5"/>
  <text x="700" y="72" text-anchor="middle" font-size="16" fill="#5A6B7E">mirror on stem</text>

  <!-- folded sight line -->
  <line x1="506" y1="148" x2="672" y2="119" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <line x1="672" y1="119" x2="676" y2="380" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrB3)"/>

  <!-- viewing angle arc at surface -->
  <path d="M 640 385 A 36 36 0 0 1 674 349" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="612" y="352" font-size="17" font-weight="bold" fill="#F2A33C">≥ 30°</text>

  <text x="620" y="434" text-anchor="middle" font-size="16" fill="#5A6B7E">eye-to-surface ≤ 600 mm along the folded path</text>
  <text x="510" y="265" font-size="16" fill="#1B82E8">sight line</text>
  <text x="510" y="287" font-size="16" fill="#5A6B7E">image is reversed</text>
</svg>
