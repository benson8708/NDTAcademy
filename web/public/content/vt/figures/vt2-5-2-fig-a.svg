<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of an Employer VT Procedure</text>

  <!-- procedure page -->
  <rect x="40" y="56" width="380" height="380" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="42" y="58" width="376" height="36" fill="#0A2342"/>
  <text x="230" y="82" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">VT-PROC-012 · Rev C</text>

  <!-- numbered sections -->
  <circle cx="68" cy="115" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="121" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <text x="90" y="121" font-size="16" fill="#0A2342">Scope and applicability</text>

  <circle cx="68" cy="150" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="156" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <text x="90" y="156" font-size="16" fill="#0A2342">References: governing code + edition</text>

  <circle cx="68" cy="185" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="191" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <text x="90" y="191" font-size="16" fill="#0A2342">Personnel qualification</text>

  <circle cx="68" cy="220" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="226" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <text x="90" y="226" font-size="16" fill="#0A2342">Equipment: calibrated light meter</text>

  <circle cx="68" cy="255" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="261" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">5</text>
  <text x="90" y="261" font-size="16" fill="#0A2342">Lighting: 1000 lux (100 fc) at surface</text>

  <circle cx="68" cy="290" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">6</text>
  <text x="90" y="296" font-size="16" fill="#0A2342">Surface preparation</text>

  <circle cx="68" cy="325" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="331" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">7</text>
  <text x="90" y="331" font-size="16" fill="#0A2342">Technique: direct, 600 mm / 30° min</text>

  <circle cx="68" cy="360" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="366" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">8</text>
  <text x="90" y="366" font-size="16" fill="#0A2342">Acceptance criteria (code / customer)</text>

  <circle cx="68" cy="395" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="401" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">9</text>
  <text x="90" y="401" font-size="16" fill="#0A2342">Records and reporting</text>

  <!-- verify markers on items 2, 4, 5, 8 -->
  <circle cx="404" cy="150" r="6" fill="#F2A33C"/>
  <circle cx="404" cy="220" r="6" fill="#F2A33C"/>
  <circle cx="404" cy="255" r="6" fill="#F2A33C"/>
  <circle cx="404" cy="360" r="6" fill="#F2A33C"/>
  <line x1="410" y1="150" x2="448" y2="150" stroke="#F2A33C" stroke-width="2"/>
  <line x1="410" y1="220" x2="448" y2="190" stroke="#F2A33C" stroke-width="2"/>
  <line x1="410" y1="255" x2="448" y2="225" stroke="#F2A33C" stroke-width="2"/>
  <line x1="410" y1="360" x2="448" y2="360" stroke="#F2A33C" stroke-width="2"/>

  <!-- right block 1 -->
  <text x="460" y="120" font-size="18" font-weight="bold" fill="#F2A33C">VERIFY BEFORE YOU START</text>
  <text x="460" y="155" font-size="16" fill="#0A2342">Revision matches the job traveler</text>
  <text x="460" y="195" font-size="16" fill="#0A2342">Code edition matches the contract</text>
  <text x="460" y="230" font-size="16" fill="#0A2342">Meter and gauges in calibration</text>
  <text x="460" y="265" font-size="16" fill="#0A2342">Read the acceptance table first</text>

  <!-- right block 2 -->
  <text x="460" y="318" font-size="18" font-weight="bold" fill="#1B82E8">EMPLOYER EXTRAS LIVE HERE</text>
  <text x="460" y="346" font-size="16" fill="#0A2342">Customer hold and witness points</text>
  <text x="460" y="370" font-size="16" fill="#0A2342">Photo and marking requirements</text>
  <text x="460" y="394" font-size="16" fill="#0A2342">Special (tighter) evaluation criteria</text>
  <text x="460" y="418" font-size="16" fill="#0A2342">Order of precedence: contract decides</text>
</svg>
