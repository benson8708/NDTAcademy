<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#0A2342">Direct-VT-Only Certification: What Stays, What May Drop</text>

  <!-- core panel -->
  <rect x="40" y="64" width="340" height="300" rx="8" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="3"/>
  <text x="210" y="94" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E9E6A">ALWAYS TRAINED</text>
  <text x="210" y="118" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">the direct-VT core</text>
  <text x="64" y="150" font-size="16" fill="#0A2342">• Vision and lighting fundamentals</text>
  <text x="64" y="180" font-size="16" fill="#0A2342">• Viewing geometry: 600 mm / 30°</text>
  <text x="64" y="210" font-size="16" fill="#0A2342">• Mirrors and magnifiers as aids</text>
  <text x="64" y="240" font-size="16" fill="#0A2342">• Discontinuities by product form</text>
  <text x="64" y="270" font-size="16" fill="#0A2342">• Codes and acceptance criteria</text>
  <text x="64" y="300" font-size="16" fill="#0A2342">• Evaluation, records, reports</text>
  <line x1="64" y1="322" x2="356" y2="322" stroke="#1E9E6A" stroke-width="1.5"/>
  <text x="210" y="348" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">Eye within 600 mm, at 30° or better</text>

  <!-- deletable column -->
  <text x="600" y="94" text-anchor="middle" font-size="18" font-weight="bold" fill="#5A6B7E">MAY BE DELETED</text>
  <text x="600" y="118" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">per the employer's written practice</text>

  <rect x="440" y="130" width="320" height="52" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="600" y="162" text-anchor="middle" font-size="17" font-weight="bold" fill="#5A6B7E">Borescopes and fiberscopes</text>

  <rect x="440" y="192" width="320" height="52" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="600" y="224" text-anchor="middle" font-size="17" font-weight="bold" fill="#5A6B7E">Video probes: CCD / CMOS systems</text>

  <rect x="440" y="254" width="320" height="52" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="600" y="286" text-anchor="middle" font-size="17" font-weight="bold" fill="#5A6B7E">Automated and machine vision</text>

  <rect x="440" y="316" width="320" height="52" rx="8" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="600" y="348" text-anchor="middle" font-size="17" font-weight="bold" fill="#5A6B7E">Translucent VT techniques</text>

  <!-- bottom rule -->
  <rect x="40" y="386" width="720" height="52" rx="6" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="400" y="408" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">The written practice documents the deletion —</text>
  <text x="400" y="430" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">and the certification scope is limited to direct VT only</text>
</svg>
