<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="6" y="6" width="788" height="438" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="38" font-size="24" font-weight="bold" fill="#0A2342" text-anchor="middle">Magnification Trades Field of View and Working Distance</text>

  <!-- 2x lens view -->
  <circle cx="160" cy="205" r="80" fill="#E8F1FB" stroke="#1B82E8" stroke-width="4"/>
  <line x1="95" y1="218" x2="225" y2="218" stroke="#0A2342" stroke-width="2"/>
  <path d="M 108 218 Q 116 206 124 218 Q 132 206 140 218 Q 148 206 156 218 Q 164 206 172 218 Q 180 206 188 218 Q 196 206 204 218" fill="none" stroke="#0A2342" stroke-width="2"/>
  <line x1="185" y1="212" x2="189" y2="206" stroke="#D14343" stroke-width="1.5"/>
  <text x="160" y="172" font-size="16" fill="#5A6B7E" text-anchor="middle">whole weld visible</text>

  <!-- 5x lens view -->
  <circle cx="400" cy="205" r="80" fill="#E8F1FB" stroke="#1B82E8" stroke-width="4"/>
  <path d="M 332 175 Q 370 162 468 178" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 328 232 Q 380 220 470 238" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 392 182 L 398 196 L 390 210 L 398 224" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="400" y="166" font-size="16" fill="#5A6B7E" text-anchor="middle">crack now visible</text>

  <!-- 10x lens view -->
  <circle cx="640" cy="205" r="80" fill="#E8F1FB" stroke="#1B82E8" stroke-width="4"/>
  <path d="M 572 168 Q 610 152 706 172" fill="none" stroke="#0A2342" stroke-width="3"/>
  <path d="M 616 150 L 630 176 L 619 200 L 636 226 L 626 250" fill="none" stroke="#D14343" stroke-width="4"/>
  <path d="M 630 176 L 648 190" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <path d="M 636 226 L 654 234" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="668" y="262" font-size="16" fill="#5A6B7E" text-anchor="middle">detail fills view</text>

  <!-- zoom arrows -->
  <path d="M 252 195 L 288 205 L 252 215 Z" fill="#F2A33C"/>
  <path d="M 492 195 L 528 205 L 492 215 Z" fill="#F2A33C"/>

  <!-- labels: 2x -->
  <text x="160" y="312" font-size="20" font-weight="bold" fill="#0A2342" text-anchor="middle">2x</text>
  <text x="160" y="334" font-size="16" fill="#0A2342" text-anchor="middle">Field of view &#8776; 75 mm</text>
  <line x1="110" y1="352" x2="210" y2="352" stroke="#1B82E8" stroke-width="3"/>
  <line x1="110" y1="346" x2="110" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <line x1="210" y1="346" x2="210" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <text x="160" y="376" font-size="16" fill="#0A2342" text-anchor="middle">Working distance &#8776; 125 mm</text>

  <!-- labels: 5x -->
  <text x="400" y="312" font-size="20" font-weight="bold" fill="#0A2342" text-anchor="middle">5x</text>
  <text x="400" y="334" font-size="16" fill="#0A2342" text-anchor="middle">Field of view &#8776; 40 mm</text>
  <line x1="380" y1="352" x2="420" y2="352" stroke="#1B82E8" stroke-width="3"/>
  <line x1="380" y1="346" x2="380" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <line x1="420" y1="346" x2="420" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <text x="400" y="376" font-size="16" fill="#0A2342" text-anchor="middle">Working distance &#8776; 50 mm</text>

  <!-- labels: 10x -->
  <text x="640" y="312" font-size="20" font-weight="bold" fill="#0A2342" text-anchor="middle">10x</text>
  <text x="640" y="334" font-size="16" fill="#0A2342" text-anchor="middle">Field of view &#8776; 20 mm</text>
  <line x1="630" y1="352" x2="650" y2="352" stroke="#1B82E8" stroke-width="3"/>
  <line x1="630" y1="346" x2="630" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <line x1="650" y1="346" x2="650" y2="358" stroke="#1B82E8" stroke-width="3"/>
  <text x="640" y="376" font-size="16" fill="#0A2342" text-anchor="middle">Working distance &#8776; 25 mm</text>

  <!-- formula band -->
  <rect x="140" y="394" width="520" height="42" rx="6" fill="#0A2342"/>
  <text x="400" y="421" font-size="18" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Power &#8776; 250 mm &#247; focal length&#160;&#160;&#160;&#9656;&#160;&#160;&#160;f = 25 mm gives 10x</text>
</svg>
