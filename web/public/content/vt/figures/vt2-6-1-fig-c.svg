<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="4" y="4" width="792" height="442" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="34" font-size="23" font-weight="bold" fill="#0A2342" text-anchor="middle">Five Basic Weld Joints and Groove Preparations</text>

    <text x="30" y="72" font-size="18" font-weight="bold" fill="#1B82E8">Joint configurations</text>

    <!-- Butt -->
    <rect x="55" y="125" width="48" height="16" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="111" y="125" width="48" height="16" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="107" y="205" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Butt</text>

    <!-- Tee -->
    <rect x="210" y="150" width="90" height="16" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="247" y="98" width="16" height="52" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="255" y="205" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Tee</text>

    <!-- Corner -->
    <rect x="372" y="100" width="16" height="52" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="388" y="136" width="70" height="16" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="412" y="205" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Corner</text>

    <!-- Lap -->
    <rect x="495" y="128" width="80" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="520" y="142" width="80" height="14" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="547" y="205" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Lap</text>

    <!-- Edge -->
    <rect x="650" y="126" width="80" height="12" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="650" y="140" width="80" height="12" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M730 124 Q742 139 730 154 Z" fill="#F2A33C" stroke="#5A6B7E" stroke-width="1"/>
    <text x="690" y="205" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Edge</text>

    <text x="30" y="242" font-size="18" font-weight="bold" fill="#1B82E8">Groove preparations (butt joints shown)</text>

    <!-- Square -->
    <rect x="60" y="262" width="42" height="56" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="112" y="262" width="42" height="56" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="107" y="362" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Square</text>

    <!-- Single-V -->
    <path d="M205 262 L242 262 L252 310 L252 318 L205 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M305 262 L268 262 L258 310 L258 318 L305 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="255" y="362" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Single-V</text>

    <!-- Bevel -->
    <rect x="352" y="262" width="44" height="56" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M404 318 L404 310 L414 262 L448 262 L448 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="400" y="362" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Bevel</text>

    <!-- U-groove -->
    <path d="M495 262 L524 262 Q538 266 540 295 L540 318 L495 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M595 262 L566 262 Q552 266 550 295 L550 318 L595 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="545" y="362" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">U-groove</text>

    <!-- J-groove -->
    <rect x="640" y="262" width="44" height="56" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M740 262 L706 262 Q694 268 694 295 L694 318 L740 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <text x="690" y="362" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">J-groove</text>

    <text x="400" y="420" font-size="16" fill="#5A6B7E" text-anchor="middle">Fillet welds join tee, lap, and corner configurations without groove preparation.</text>
  </g>
</svg>
