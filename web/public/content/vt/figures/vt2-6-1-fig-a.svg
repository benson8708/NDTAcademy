<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0A2342"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="4" y="4" width="792" height="442" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="36" font-size="24" font-weight="bold" fill="#0A2342" text-anchor="middle">Anatomy of a Weld Symbol</text>

    <!-- reference line -->
    <line x1="170" y1="210" x2="520" y2="210" stroke="#0A2342" stroke-width="3"/>
    <!-- arrow line to the joint -->
    <line x1="520" y1="210" x2="648" y2="316" stroke="#0A2342" stroke-width="3" marker-end="url(#arrNavy)"/>
    <!-- tail -->
    <line x1="170" y1="210" x2="142" y2="192" stroke="#0A2342" stroke-width="2.5"/>
    <line x1="170" y1="210" x2="142" y2="228" stroke="#0A2342" stroke-width="2.5"/>
    <text x="136" y="216" font-size="16" fill="#0A2342" text-anchor="end" font-weight="bold">GTAW</text>

    <!-- arrow-side fillet symbol (below line) with size and length-pitch -->
    <path d="M300 210 L300 246 L336 210 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
    <text x="290" y="240" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="end">6</text>
    <text x="344" y="240" font-size="17" fill="#0A2342" text-anchor="start">50–150</text>
    <text x="290" y="266" font-size="16" fill="#5A6B7E" text-anchor="end">size (mm)</text>
    <text x="344" y="266" font-size="16" fill="#5A6B7E" text-anchor="start">length–pitch (mm)</text>

    <!-- other-side fillet symbol (above line) -->
    <path d="M388 210 L388 174 L424 210 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

    <!-- weld-all-around circle and field weld flag -->
    <circle cx="520" cy="210" r="11" fill="#FFFFFF" stroke="#0A2342" stroke-width="3"/>
    <line x1="520" y1="199" x2="520" y2="160" stroke="#0A2342" stroke-width="2.5"/>
    <path d="M520 160 L520 182 L496 171 Z" fill="#D14343"/>

    <!-- tee joint sketch -->
    <rect x="575" y="336" width="190" height="26" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <rect x="655" y="246" width="26" height="90" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M655 336 L655 312 L631 336 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
    <path d="M681 336 L681 312 L705 336 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
    <text x="670" y="392" font-size="16" fill="#5A6B7E" text-anchor="middle">Fillet weld, arrow side of the joint</text>

    <!-- callout labels -->
    <text x="60" y="120" font-size="17" fill="#0A2342">Other side: symbol above the line</text>
    <line x1="330" y1="126" x2="400" y2="178" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="60" y="312" font-size="17" fill="#0A2342">Arrow side: symbol below the line</text>
    <line x1="230" y1="302" x2="305" y2="244" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="370" y="90" font-size="17" fill="#0A2342" text-anchor="end">Field weld</text>
    <line x1="378" y1="95" x2="506" y2="164" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="575" y="120" font-size="17" fill="#0A2342">Weld all around</text>
    <line x1="600" y1="128" x2="528" y2="200" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="40" y="275" font-size="17" fill="#0A2342">Tail: process or spec reference</text>
    <line x1="120" y1="266" x2="148" y2="226" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="330" y="345" font-size="17" fill="#0A2342">Arrow points to the joint</text>
    <line x1="545" y1="340" x2="600" y2="290" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 3"/>

    <text x="400" y="430" font-size="16" fill="#5A6B7E" text-anchor="middle">Anatomy only — element positions are what matter; real symbols combine as the drawing requires.</text>
  </g>
</svg>
