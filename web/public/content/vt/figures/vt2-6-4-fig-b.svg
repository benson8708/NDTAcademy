<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrBlue4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1B82E8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="36" font-size="24" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Electronic VT Records: Capture to Retention</text>

    <!-- box 1: capture -->
    <rect x="40" y="80" width="215" height="110" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="147" y="108" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">1 · CAPTURE</text>
    <text x="147" y="134" font-size="16" fill="#0A2342" text-anchor="middle">camera / borescope</text>
    <text x="147" y="156" font-size="16" fill="#0A2342" text-anchor="middle">resolution proven on</text>
    <text x="147" y="176" font-size="16" fill="#0A2342" text-anchor="middle">a test target</text>

    <!-- box 2: verify -->
    <rect x="293" y="80" width="215" height="110" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="400" y="108" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">2 · VERIFY</text>
    <text x="400" y="134" font-size="16" fill="#0A2342" text-anchor="middle">review on site —</text>
    <text x="400" y="156" font-size="16" fill="#0A2342" text-anchor="middle">re-shoot while access</text>
    <text x="400" y="176" font-size="16" fill="#0A2342" text-anchor="middle">is still open</text>

    <!-- box 3: identify -->
    <rect x="546" y="80" width="215" height="110" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="653" y="108" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">3 · IDENTIFY</text>
    <text x="653" y="134" font-size="16" fill="#0A2342" text-anchor="middle">filename = report +</text>
    <text x="653" y="156" font-size="16" fill="#0A2342" text-anchor="middle">weld ID; date and</text>
    <text x="653" y="176" font-size="16" fill="#0A2342" text-anchor="middle">metadata correct</text>

    <line x1="255" y1="135" x2="291" y2="135" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue4)"/>
    <line x1="508" y1="135" x2="544" y2="135" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue4)"/>

    <!-- elbow connector to row 2 -->
    <path d="M653 192 L653 222 L307 222 L307 241" fill="none" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue4)"/>

    <!-- box 4: store -->
    <rect x="180" y="245" width="255" height="110" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="307" y="273" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">4 · STORE</text>
    <text x="307" y="299" font-size="16" fill="#0A2342" text-anchor="middle">controlled server + backup</text>
    <text x="307" y="321" font-size="16" fill="#0A2342" text-anchor="middle">original unedited,</text>
    <text x="307" y="341" font-size="16" fill="#0A2342" text-anchor="middle">checksum integrity</text>

    <!-- box 5: retain -->
    <rect x="480" y="245" width="280" height="110" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="620" y="273" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">5 · RETAIN &amp; MIGRATE</text>
    <text x="620" y="299" font-size="16" fill="#0A2342" text-anchor="middle">retention per code or contract</text>
    <text x="620" y="321" font-size="16" fill="#0A2342" text-anchor="middle">migrate aging media —</text>
    <text x="620" y="341" font-size="16" fill="#0A2342" text-anchor="middle">drives and tape degrade</text>

    <line x1="435" y1="300" x2="478" y2="300" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue4)"/>

    <text x="400" y="425" font-size="16" fill="#F2A33C" text-anchor="middle">The unedited original is the record — enhance only copies, and document it.</text>
  </g>
</svg>
