<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#E8F1FB">Lighting Technique: Direction Finds What Brightness Misses</text>

  <line x1="400" y1="58" x2="400" y2="385" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- LEFT SCENE: raking light -->
  <text x="200" y="72" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">RAKING (OBLIQUE) LIGHT</text>

  <!-- surface with bump and dent -->
  <line x1="40" y1="300" x2="370" y2="300" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="200,300 215,289 230,300" fill="#E8F1FB"/>
  <path d="M280,300 q11,9 22,0" fill="none" stroke="#E8F1FB" stroke-width="3"/>

  <!-- lamp and grazing rays -->
  <circle cx="62" cy="238" r="11" fill="#F2A33C"/>
  <line x1="74" y1="244" x2="192" y2="294" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="186,288 196,296 184,298" fill="#F2A33C"/>
  <line x1="72" y1="250" x2="156" y2="297" stroke="#F2A33C" stroke-width="2"/>
  <text x="108" y="282" font-size="16" fill="#F2A33C">5–30°</text>

  <!-- shadow cast behind bump -->
  <rect x="231" y="296" width="58" height="7" fill="#5A6B7E"/>
  <text x="260" y="325" text-anchor="middle" font-size="16" fill="#E8F1FB">shadow</text>

  <!-- eye -->
  <ellipse cx="300" cy="205" rx="20" ry="11" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="300" cy="205" r="5" fill="#E8F1FB"/>
  <text x="300" y="186" text-anchor="middle" font-size="16" fill="#E8F1FB">eye</text>
  <line x1="293" y1="216" x2="222" y2="292" stroke="#E8F1FB" stroke-width="1.5" stroke-dasharray="4 4"/>

  <text x="200" y="352" text-anchor="middle" font-size="16" fill="#E8F1FB">Low-angle light rakes the surface —</text>
  <text x="200" y="374" text-anchor="middle" font-size="16" fill="#E8F1FB">dents, weld toes, tight cracks cast shadows</text>

  <!-- RIGHT SCENE: glare control -->
  <text x="600" y="72" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">GLARE CONTROL</text>

  <line x1="430" y1="300" x2="760" y2="300" stroke="#E8F1FB" stroke-width="3"/>

  <!-- normal -->
  <line x1="595" y1="300" x2="595" y2="170" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="595" y="160" text-anchor="middle" font-size="16" fill="#5A6B7E">normal</text>

  <!-- lamp, diffuser, incident ray -->
  <circle cx="480" cy="152" r="11" fill="#F2A33C"/>
  <line x1="489" y1="161" x2="589" y2="293" stroke="#F2A33C" stroke-width="2"/>
  <polygon points="582,288 592,296 584,298" fill="#F2A33C"/>
  <rect x="505" y="196" width="56" height="10" fill="#E8F1FB" transform="rotate(35 533 201)"/>
  <text x="478" y="222" font-size="16" fill="#E8F1FB">diffuser</text>

  <!-- specular glare ray -->
  <line x1="595" y1="300" x2="706" y2="158" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="700,156 710,152 706,166" fill="#D14343"/>
  <text x="712" y="142" text-anchor="middle" font-size="16" fill="#D14343">glare path</text>

  <text x="556" y="276" font-size="16" fill="#E8F1FB">45°</text>
  <text x="615" y="276" font-size="16" fill="#E8F1FB">45°</text>

  <!-- eye placed off the specular angle -->
  <ellipse cx="715" cy="240" rx="20" ry="11" fill="none" stroke="#1E9E6A" stroke-width="2"/>
  <circle cx="715" cy="240" r="5" fill="#1E9E6A"/>
  <line x1="700" y1="248" x2="604" y2="296" stroke="#1E9E6A" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="715" y="222" text-anchor="middle" font-size="16" fill="#1E9E6A">eye off-angle</text>

  <text x="600" y="352" text-anchor="middle" font-size="16" fill="#E8F1FB">Diffuse the source — and keep your eye</text>
  <text x="600" y="374" text-anchor="middle" font-size="16" fill="#E8F1FB">off the specular (mirror) angle</text>

  <!-- bottom band: meter rule -->
  <rect x="40" y="395" width="720" height="42" rx="6" fill="#E8F1FB"/>
  <text x="400" y="422" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">Meter at the surface: 500 lux (50 fc) general · 1000 lux (100 fc) critical</text>
</svg>
