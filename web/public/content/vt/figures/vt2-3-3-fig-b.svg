<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#E8F1FB">Borescope Directions of View (DOV)</text>

  <!-- scope axis (extended) -->
  <line x1="80" y1="235" x2="760" y2="235" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="744" y="258" text-anchor="middle" font-size="16" fill="#5A6B7E">axis</text>

  <!-- insertion tube -->
  <rect x="100" y="215" width="400" height="40" rx="6" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="500" y="212" width="60" height="46" rx="6" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="280" y="242" text-anchor="middle" font-size="16" fill="#0A2342">insertion tube</text>
  <text x="530" y="282" text-anchor="middle" font-size="16" fill="#E8F1FB">tip</text>

  <!-- forward cone 0 deg -->
  <polygon points="560,235 720,168 720,302" fill="#1B82E8" fill-opacity="0.30" stroke="#1B82E8" stroke-width="2"/>
  <text x="668" y="318" font-size="17" font-weight="bold" fill="#1B82E8">forward 0°</text>
  <text x="640" y="240" font-size="16" fill="#E8F1FB">FOV 40–60°</text>

  <!-- side cone 90 deg -->
  <polygon points="470,212 420,92 520,92" fill="#1E9E6A" fill-opacity="0.30" stroke="#1E9E6A" stroke-width="2"/>
  <text x="470" y="76" text-anchor="middle" font-size="17" font-weight="bold" fill="#1E9E6A">side 90°</text>

  <!-- forward-oblique 45 deg -->
  <polygon points="545,215 625,95 700,140" fill="#F2A33C" fill-opacity="0.30" stroke="#F2A33C" stroke-width="2"/>
  <text x="648" y="84" text-anchor="middle" font-size="17" font-weight="bold" fill="#F2A33C">forward-oblique 45°</text>

  <!-- retro cone ~120 deg -->
  <polygon points="510,258 380,352 450,392" fill="#D14343" fill-opacity="0.30" stroke="#D14343" stroke-width="2"/>
  <text x="392" y="416" text-anchor="middle" font-size="17" font-weight="bold" fill="#D14343">retro ~120°</text>
  <text x="540" y="345" font-size="16" fill="#E8F1FB">looks back toward the entry —</text>
  <text x="540" y="365" font-size="16" fill="#E8F1FB">valve seats, back of openings</text>

  <!-- usage notes -->
  <text x="120" y="120" font-size="16" fill="#E8F1FB">side view scans bore walls;</text>
  <text x="120" y="140" font-size="16" fill="#E8F1FB">forward looks down the bore;</text>
  <text x="120" y="160" font-size="16" fill="#E8F1FB">oblique reads corners + chamfers</text>

  <text x="400" y="440" text-anchor="middle" font-size="16" font-weight="bold" fill="#F2A33C">magnification grows as the tip closes in — sizing needs a reference or measuring tip</text>
</svg>
