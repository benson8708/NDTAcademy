<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#F2A33C"/>
    </marker>
    <marker id="mb" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1B82E8"/>
    </marker>
    <marker id="mr" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#D14343"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">How Light Sources Make Light</text>

  <!-- Panel 1: incandescent -->
  <rect x="36" y="50" width="356" height="158" rx="10" fill="#E8F1FB" fill-opacity="0.45" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="214" y="74" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">INCANDESCENT — heat</text>
  <circle cx="110" cy="140" r="34" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <path d="M92,148 L101,130 L110,148 L119,130 L128,148" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <rect x="96" y="172" width="28" height="14" fill="#5A6B7E"/>
  <line x1="138" y1="118" x2="166" y2="98" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <line x1="146" y1="134" x2="180" y2="128" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <path d="M138,166 q8,7 16,0 q8,-7 16,0" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="186" y="172" font-size="16" fill="#D14343">IR heat</text>
  <text x="200" y="104" font-size="16" fill="#0A2342">tungsten filament,</text>
  <text x="200" y="126" font-size="16" fill="#0A2342">~2700–3300 K</text>
  <text x="200" y="148" font-size="16" fill="#0A2342">continuous spectrum,</text>
  <text x="200" y="170" font-size="16" fill="#0A2342">CRI ≈ 100</text>
  <text x="200" y="192" font-size="16" fill="#0A2342">low efficacy — mostly heat</text>

  <!-- Panel 2: fluorescent -->
  <rect x="408" y="50" width="356" height="158" rx="10" fill="#E8F1FB" fill-opacity="0.45" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="586" y="74" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">FLUORESCENT — arc + phosphor</text>
  <rect x="438" y="96" width="240" height="34" rx="17" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="444" y="102" width="228" height="22" rx="11" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="442" y="106" width="8" height="14" fill="#5A6B7E"/>
  <rect x="666" y="106" width="8" height="14" fill="#5A6B7E"/>
  <text x="558" y="119" text-anchor="middle" font-size="16" fill="#0A2342">Hg arc (UV)</text>
  <line x1="480" y1="134" x2="480" y2="158" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#mb)"/>
  <line x1="558" y1="134" x2="558" y2="158" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#mb)"/>
  <line x1="636" y1="134" x2="636" y2="158" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#mb)"/>
  <text x="558" y="178" text-anchor="middle" font-size="16" fill="#1B82E8">visible light out of the phosphor</text>
  <text x="586" y="198" text-anchor="middle" font-size="16" fill="#0A2342">arc makes UV — phosphor coat re-emits it</text>

  <!-- Panel 3: HID -->
  <rect x="36" y="220" width="356" height="140" rx="10" fill="#E8F1FB" fill-opacity="0.45" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="214" y="244" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">HIGH-INTENSITY DISCHARGE</text>
  <ellipse cx="110" cy="308" rx="44" ry="34" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <rect x="88" y="298" width="44" height="20" rx="8" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="94" y1="308" x2="126" y2="308" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="150" y1="290" x2="184" y2="272" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <line x1="156" y1="308" x2="192" y2="308" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <line x1="150" y1="326" x2="184" y2="344" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <text x="214" y="282" font-size="16" fill="#0A2342">high-pressure arc tube:</text>
  <text x="214" y="304" font-size="16" fill="#0A2342">Hg, metal halide, sodium</text>
  <text x="214" y="326" font-size="16" fill="#0A2342">huge output for yards;</text>
  <text x="214" y="348" font-size="16" fill="#0A2342">minutes to warm / restrike</text>

  <!-- Panel 4: LED -->
  <rect x="408" y="220" width="356" height="140" rx="10" fill="#E8F1FB" fill-opacity="0.45" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="586" y="244" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">LED — solid-state</text>
  <rect x="450" y="330" width="96" height="10" fill="#5A6B7E"/>
  <rect x="458" y="340" width="10" height="6" fill="#5A6B7E"/>
  <rect x="480" y="340" width="10" height="6" fill="#5A6B7E"/>
  <rect x="502" y="340" width="10" height="6" fill="#5A6B7E"/>
  <rect x="524" y="340" width="10" height="6" fill="#5A6B7E"/>
  <rect x="486" y="318" width="24" height="12" fill="#1B82E8" stroke="#0A2342" stroke-width="1"/>
  <path d="M478,318 a20,20 0 0 1 40,0 Z" fill="#F2A33C" fill-opacity="0.85" stroke="#0A2342" stroke-width="1"/>
  <line x1="498" y1="292" x2="498" y2="266" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <line x1="478" y1="296" x2="458" y2="274" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <line x1="518" y1="296" x2="538" y2="274" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma)"/>
  <text x="498" y="358" text-anchor="middle" font-size="16" fill="#0A2342">blue chip under phosphor dome</text>
  <text x="652" y="288" text-anchor="middle" font-size="16" fill="#0A2342">junction emits light;</text>
  <text x="652" y="310" text-anchor="middle" font-size="16" fill="#0A2342">instant, cool, rugged</text>
  <text x="652" y="332" text-anchor="middle" font-size="16" fill="#0A2342">CRI ≥ 80 (90+ color)</text>

  <!-- Laser strip -->
  <rect x="36" y="372" width="728" height="68" rx="10" fill="#0A2342"/>
  <text x="52" y="398" font-size="18" font-weight="bold" fill="#FFFFFF">LASER — stimulated emission</text>
  <rect x="52" y="410" width="70" height="16" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1"/>
  <line x1="122" y1="418" x2="450" y2="418" stroke="#D14343" stroke-width="4" marker-end="url(#mr)"/>
  <text x="470" y="404" font-size="16" fill="#FFFFFF">single wavelength, collimated —</text>
  <text x="470" y="426" font-size="16" fill="#FFFFFF">lines + measurement, not area lighting</text>
</svg>
