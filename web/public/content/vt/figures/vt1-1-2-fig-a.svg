<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Cross-Section of the Human Eye</text>

  <!-- eyeball globe -->
  <ellipse cx="430" cy="250" rx="180" ry="150" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- retina band along the back (right) -->
  <path d="M 430 103 A 178 148 0 0 1 430 397" fill="none" stroke="#1B82E8" stroke-width="12"/>

  <!-- optic nerve leaving the back -->
  <line x1="606" y1="300" x2="690" y2="342" stroke="#5A6B7E" stroke-width="14"/>

  <!-- light in arrow -->
  <line x1="118" y1="250" x2="230" y2="250" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="230,242 248,250 230,258" fill="#F2A33C"/>
  <text x="118" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Light in</text>

  <!-- converging light rays to the fovea -->
  <polyline points="150,222 300,232 600,250" fill="none" stroke="#1B82E8" stroke-width="1.5"/>
  <polyline points="150,278 300,268 600,250" fill="none" stroke="#1B82E8" stroke-width="1.5"/>

  <!-- cornea (front window) -->
  <path d="M 282 206 Q 260 250 282 294" fill="none" stroke="#F2A33C" stroke-width="5"/>

  <!-- iris (two segments) with pupil gap between -->
  <line x1="300" y1="208" x2="300" y2="238" stroke="#0A2342" stroke-width="7"/>
  <line x1="300" y1="262" x2="300" y2="292" stroke="#0A2342" stroke-width="7"/>

  <!-- lens (biconvex) -->
  <path d="M 326 214 Q 348 250 326 286 Q 304 250 326 214 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>

  <!-- fovea -->
  <circle cx="606" cy="250" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- leader lines -->
  <line x1="276" y1="280" x2="258" y2="322" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="300" y1="220" x2="224" y2="142" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="300" y1="250" x2="300" y2="130" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="327" y1="232" x2="362" y2="138" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="600" y1="185" x2="652" y2="156" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="613" y1="250" x2="652" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="630" y1="316" x2="652" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="548" y1="150" x2="505" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- labels -->
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Cornea</text>
  <text x="210" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Iris</text>
  <text x="300" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pupil</text>
  <text x="368" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lens</text>
  <text x="690" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Retina</text>
  <text x="658" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Fovea (cones)</text>
  <text x="658" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Optic nerve</text>
  <text x="658" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(blind spot)</text>
  <text x="470" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Rods (periphery)</text>
</svg>
