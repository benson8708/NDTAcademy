<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Direct VT Geometry: Angle and Distance</text>

  <!-- Examination surface -->
  <rect x="110" y="332" width="600" height="26" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 118 358 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14 m 18 -14 l 10 14" stroke="#5A6B7E" stroke-width="1.2" fill="none"/>
  <text x="600" y="392" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Examination surface</text>

  <!-- Indication at point P -->
  <polyline points="424,332 432,326 428,338 438,331 433,342" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="446" y="328" font-family="Arial, sans-serif" font-size="15" fill="#D14343">indication</text>

  <!-- Inspector eye (good position) -->
  <ellipse cx="210" cy="150" rx="28" ry="15" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="210" cy="150" r="7" fill="#0A2342"/>
  <path d="M 184 132 Q 210 122 236 132" fill="none" stroke="#0A2342" stroke-width="2"/>
  <text x="150" y="118" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inspector's eye</text>

  <!-- Acceptable line of sight to P -->
  <line x1="232" y1="162" x2="430" y2="332" stroke="#1E9E6A" stroke-width="3"/>

  <!-- 30 degree minimum reference -->
  <line x1="430" y1="332" x2="257" y2="232" stroke="#5A6B7E" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="196" y="226" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">30&#176; minimum</text>

  <!-- Angle arc at P -->
  <path d="M 375 332 A 55 55 0 0 1 389 296" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="300" y="312" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">&#952; &#8805; 30&#176; OK</text>

  <!-- Distance dimension -->
  <line x1="150" y1="280" x2="333" y2="246" stroke="#1B82E8" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="92" y="276" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">distance</text>
  <text x="60" y="296" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">&#8804; 24 in (600 mm)</text>

  <!-- Grazing eye (rejected) -->
  <ellipse cx="660" cy="300" rx="24" ry="13" fill="#FBE7CC" stroke="#5A6B7E" stroke-width="1.8"/>
  <circle cx="660" cy="300" r="6" fill="#5A6B7E"/>
  <line x1="636" y1="306" x2="430" y2="334" stroke="#D14343" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="372" y="424" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Grazing &lt; 30&#176;: shape and depth distorted &#8212; use a mirror or remote aid</text>
</svg>
