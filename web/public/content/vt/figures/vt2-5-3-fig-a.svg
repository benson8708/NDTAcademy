<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">From Indication to Defect: The Vocabulary Chain</text>

  <!-- A: indication -->
  <rect x="36" y="66" width="160" height="64" rx="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="3"/>
  <text x="116" y="93" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">INDICATION</text>
  <text x="116" y="115" text-anchor="middle" font-size="16" fill="#5A6B7E">you notice something</text>
  <line x1="196" y1="98" x2="204" y2="98" stroke="#0A2342" stroke-width="2"/>

  <!-- B: real condition? -->
  <polygon points="300,58 390,98 300,138 210,98" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="300" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">Real part</text>
  <text x="300" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">condition?</text>

  <line x1="390" y1="98" x2="430" y2="98" stroke="#0A2342" stroke-width="2"/>
  <polygon points="430,92 440,98 430,104" fill="#0A2342"/>
  <text x="412" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E9E6A">yes</text>

  <!-- C: caused by discontinuity? -->
  <polygon points="530,58 620,98 530,138 440,98" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="530" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">Caused by a</text>
  <text x="530" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">discontinuity?</text>

  <line x1="620" y1="98" x2="650" y2="98" stroke="#0A2342" stroke-width="2"/>
  <polygon points="650,92 660,98 650,104" fill="#0A2342"/>
  <text x="636" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E9E6A">yes</text>

  <!-- D: relevant indication -->
  <rect x="660" y="66" width="120" height="64" rx="6" fill="#1B82E8"/>
  <text x="720" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">RELEVANT</text>
  <text x="720" y="114" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">INDICATION</text>

  <!-- no branch from B -->
  <line x1="300" y1="138" x2="300" y2="170" stroke="#0A2342" stroke-width="2"/>
  <polygon points="294,170 306,170 300,180 " fill="#0A2342"/>
  <text x="314" y="162" font-size="16" font-weight="bold" fill="#D14343">no</text>
  <rect x="200" y="180" width="200" height="84" rx="6" fill="#D9E0E8"/>
  <text x="300" y="206" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">FALSE INDICATION</text>
  <text x="300" y="230" text-anchor="middle" font-size="16" fill="#0A2342">glare, smudge, stain —</text>
  <text x="300" y="254" text-anchor="middle" font-size="16" fill="#0A2342">correct and re-examine</text>

  <!-- no branch from C -->
  <line x1="530" y1="138" x2="530" y2="170" stroke="#0A2342" stroke-width="2"/>
  <polygon points="524,170 536,170 530,180" fill="#0A2342"/>
  <text x="544" y="162" font-size="16" font-weight="bold" fill="#D14343">no</text>
  <rect x="435" y="180" width="200" height="84" rx="6" fill="#D9E0E8"/>
  <text x="535" y="206" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">NONRELEVANT</text>
  <text x="535" y="230" text-anchor="middle" font-size="16" fill="#0A2342">design / process feature</text>
  <text x="535" y="254" text-anchor="middle" font-size="16" fill="#0A2342">record if required</text>

  <!-- evaluation -->
  <line x1="720" y1="130" x2="720" y2="152" stroke="#0A2342" stroke-width="2"/>
  <polygon points="714,152 726,152 720,162" fill="#0A2342"/>
  <rect x="640" y="162" width="150" height="58" rx="6" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="715" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">EVALUATION</text>
  <text x="715" y="208" text-anchor="middle" font-size="16" fill="#5A6B7E">against the criteria</text>

  <!-- outcome branches -->
  <line x1="715" y1="220" x2="715" y2="322" stroke="#0A2342" stroke-width="2"/>
  <polygon points="709,322 721,322 715,330" fill="#0A2342"/>
  <line x1="715" y1="290" x2="507" y2="290" stroke="#0A2342" stroke-width="2"/>
  <line x1="507" y1="290" x2="507" y2="322" stroke="#0A2342" stroke-width="2"/>
  <polygon points="501,322 513,322 507,330" fill="#0A2342"/>
  <text x="560" y="282" font-size="16" font-weight="bold" fill="#1E9E6A">pass</text>
  <text x="728" y="312" font-size="16" font-weight="bold" fill="#D14343">fail</text>

  <rect x="420" y="330" width="175" height="84" rx="6" fill="#1E9E6A"/>
  <text x="507" y="360" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">ACCEPTABLE</text>
  <text x="507" y="384" text-anchor="middle" font-size="16" fill="#FFFFFF">still a discontinuity</text>
  <text x="507" y="406" text-anchor="middle" font-size="16" fill="#FFFFFF">part accepted</text>

  <rect x="615" y="330" width="175" height="84" rx="6" fill="#D14343"/>
  <text x="702" y="360" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">REJECTABLE</text>
  <text x="702" y="388" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">now it is a DEFECT</text>

  <!-- note panel -->
  <rect x="36" y="300" width="350" height="114" rx="6" fill="#E8F1FB"/>
  <text x="56" y="328" font-size="17" font-weight="bold" fill="#0A2342">Words commit you:</text>
  <text x="56" y="354" font-size="16" fill="#0A2342">INDICATION — noticed, unexplained</text>
  <text x="56" y="378" font-size="16" fill="#0A2342">DISCONTINUITY — real, still neutral</text>
  <text x="56" y="402" font-size="16" fill="#0A2342">DEFECT — rejectable, and only then</text>
</svg>
