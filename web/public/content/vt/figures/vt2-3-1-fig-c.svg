<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B82E8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Lenses: Focusing and Diverging</text>

  <!-- TOP: converging lens -->
  <text x="70" y="72" font-size="17" font-weight="bold" fill="#0A2342">Converging (positive) lens — thicker at center</text>
  <line x1="60" y1="165" x2="740" y2="165" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- lens shape -->
  <path d="M 380 95 C 406 120 406 210 380 235 C 354 210 354 120 380 95 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- incoming parallel rays -->
  <line x1="90" y1="115" x2="372" y2="115" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="140" x2="376" y2="140" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="165" x2="377" y2="165" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="190" x2="376" y2="190" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="215" x2="372" y2="215" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- refracted rays through focal point, continuing past it -->
  <line x1="386" y1="115" x2="700" y2="204" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="388" y1="140" x2="700" y2="185" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="389" y1="165" x2="700" y2="165" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="388" y1="190" x2="700" y2="145" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="386" y1="215" x2="700" y2="126" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>

  <circle cx="560" cy="165" r="5" fill="#F2A33C"/>
  <text x="560" y="196" text-anchor="middle" font-size="16" font-weight="bold" fill="#F2A33C">focal point F</text>

  <!-- focal length bracket -->
  <line x1="380" y1="248" x2="560" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="380" y1="242" x2="380" y2="254" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="560" y1="242" x2="560" y2="254" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="470" y="268" text-anchor="middle" font-size="16" fill="#5A6B7E">focal length f</text>

  <text x="555" y="72" font-size="16" font-weight="bold" fill="#1E9E6A">magnifier power ≈ 250 ÷ f (mm)</text>
  <text x="555" y="92" font-size="16" fill="#1E9E6A">f = 50 mm → 5×;  f = 25 mm → 10×</text>

  <line x1="60" y1="282" x2="740" y2="282" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- BOTTOM: diverging lens -->
  <text x="70" y="306" font-size="17" font-weight="bold" fill="#0A2342">Diverging (negative) lens — thinner at center, spreads light</text>
  <line x1="60" y1="375" x2="740" y2="375" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- biconcave lens shape -->
  <path d="M 362 318 L 398 318 C 384 338 384 412 398 432 L 362 432 C 376 412 376 338 362 318 Z" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- incoming parallel rays -->
  <line x1="90" y1="340" x2="370" y2="340" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="358" x2="373" y2="358" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="392" x2="373" y2="392" stroke="#1B82E8" stroke-width="2.5"/>
  <line x1="90" y1="410" x2="370" y2="410" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- diverging rays as if from virtual focus at (200,375) -->
  <line x1="394" y1="340" x2="700" y2="285" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="396" y1="358" x2="700" y2="332" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="396" y1="392" x2="700" y2="418" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>
  <line x1="394" y1="410" x2="660" y2="442" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrB)"/>

  <!-- dashed back-projections to virtual focus -->
  <line x1="394" y1="340" x2="200" y2="375" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="396" y1="358" x2="200" y2="375" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="396" y1="392" x2="200" y2="375" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="394" y1="410" x2="200" y2="375" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 5"/>
  <circle cx="200" cy="375" r="5" fill="#F2A33C"/>
  <text x="200" y="402" text-anchor="middle" font-size="16" font-weight="bold" fill="#F2A33C">virtual focus F′</text>

  <text x="560" y="448" font-size="16" fill="#5A6B7E">widens fields of view</text>
</svg>
