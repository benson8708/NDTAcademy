<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Surface Condition Changes Detectability</text>

  <!-- LEFT: clean matte surface -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">CLEAN, MATTE SURFACE</text>
  <rect x="60" y="90" width="280" height="240" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- subtle matte texture -->
  <g stroke="#C2CBD6" stroke-width="1" opacity="0.7">
    <line x1="75" y1="110" x2="325" y2="110"/><line x1="75" y1="140" x2="325" y2="140"/>
    <line x1="75" y1="170" x2="325" y2="170"/><line x1="75" y1="200" x2="325" y2="200"/>
    <line x1="75" y1="230" x2="325" y2="230"/><line x1="75" y1="260" x2="325" y2="260"/>
    <line x1="75" y1="290" x2="325" y2="290"/><line x1="75" y1="315" x2="325" y2="315"/>
  </g>
  <!-- clearly visible crack -->
  <path d="M120 160 L150 175 L172 168 L205 195 L228 188 L262 215 L285 210"
        fill="none" stroke="#D14343" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M205 195 L210 212 M262 215 L264 230" stroke="#D14343" stroke-width="2"/>
  <circle cx="202" cy="192" r="34" fill="none" stroke="#1E9E6A" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="200" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Crack contrast is high — easy call</text>

  <!-- RIGHT: glossy, contaminated surface -->
  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">GLOSSY, CONTAMINATED SURFACE</text>
  <rect x="460" y="90" width="280" height="240" fill="#B9C4D1" stroke="#5A6B7E" stroke-width="2"/>
  <!-- glare starburst -->
  <g opacity="0.9">
    <circle cx="585" cy="165" r="46" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="585" cy="165" r="70" fill="#FFFFFF" opacity="0.45"/>
    <line x1="585" y1="75" x2="585" y2="255" stroke="#FFFFFF" stroke-width="7" opacity="0.7"/>
    <line x1="495" y1="165" x2="675" y2="165" stroke="#FFFFFF" stroke-width="7" opacity="0.7"/>
  </g>
  <!-- grime / oil patches -->
  <ellipse cx="665" cy="250" rx="58" ry="30" fill="#7A6A52" opacity="0.55"/>
  <ellipse cx="520" cy="280" rx="44" ry="24" fill="#6B5B45" opacity="0.5"/>
  <ellipse cx="700" cy="130" rx="30" ry="18" fill="#8A795F" opacity="0.45"/>
  <!-- the SAME crack, mostly hidden -->
  <path d="M520 160 L550 175 L572 168 L605 195 L628 188 L662 215 L685 210"
        fill="none" stroke="#D14343" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>
  <text x="600" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Same crack — lost in glare and grime</text>

  <!-- bottom takeaway -->
  <rect x="60" y="385" width="680" height="46" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Clean the surface and control reflections BEFORE judging it — preparation is part of the test</text>
</svg>
