<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrFlow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B82E8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Video Borescope Imaging Chain</text>
  <text x="400" y="64" text-anchor="middle" font-size="17" font-style="italic" fill="#5A6B7E">photons → electrons → numbers → pixels</text>

  <!-- target -->
  <rect x="30" y="120" width="70" height="80" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <polyline points="42,140 58,162 50,176 70,188" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="65" y="222" text-anchor="middle" font-size="16" fill="#0A2342">target</text>

  <!-- light rays into optics -->
  <line x1="100" y1="140" x2="140" y2="150" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="140" y2="160" stroke="#F2A33C" stroke-width="1.5"/>
  <line x1="100" y1="180" x2="140" y2="170" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- box 1: tip optics -->
  <rect x="140" y="120" width="130" height="80" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="205" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">tip optics</text>
  <text x="205" y="172" text-anchor="middle" font-size="16" fill="#0A2342">lens + IR-cut</text>
  <text x="205" y="190" text-anchor="middle" font-size="16" fill="#0A2342">filter</text>

  <line x1="270" y1="160" x2="298" y2="160" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrFlow)"/>

  <!-- box 2: sensor -->
  <rect x="302" y="120" width="130" height="80" rx="8" fill="#FDF1DE" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="367" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">CCD / CMOS</text>
  <text x="367" y="172" text-anchor="middle" font-size="16" fill="#0A2342">sensor at the</text>
  <text x="367" y="190" text-anchor="middle" font-size="16" fill="#0A2342">probe tip</text>

  <line x1="432" y1="160" x2="460" y2="160" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrFlow)"/>

  <!-- box 3: ADC -->
  <rect x="464" y="120" width="130" height="80" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="529" y="150" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">A/D converter</text>
  <text x="529" y="172" text-anchor="middle" font-size="16" fill="#0A2342">8 bits = 256</text>
  <text x="529" y="190" text-anchor="middle" font-size="16" fill="#0A2342">levels/channel</text>

  <line x1="594" y1="160" x2="622" y2="160" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrFlow)"/>

  <!-- box 4: DSP -->
  <rect x="626" y="120" width="150" height="80" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="701" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">signal processor</text>
  <text x="701" y="168" text-anchor="middle" font-size="16" fill="#0A2342">white balance · gain</text>
  <text x="701" y="188" text-anchor="middle" font-size="16" fill="#0A2342">edge enh. · noise red.</text>

  <!-- Bayer mosaic inset under sensor -->
  <text x="367" y="248" text-anchor="middle" font-size="16" font-weight="bold" fill="#0A2342">Bayer color mosaic on the pixels</text>
  <g stroke="#FFFFFF" stroke-width="1">
    <rect x="327" y="260" width="20" height="20" fill="#1E9E6A"/><rect x="347" y="260" width="20" height="20" fill="#D14343"/><rect x="367" y="260" width="20" height="20" fill="#1E9E6A"/><rect x="387" y="260" width="20" height="20" fill="#D14343"/>
    <rect x="327" y="280" width="20" height="20" fill="#1B82E8"/><rect x="347" y="280" width="20" height="20" fill="#1E9E6A"/><rect x="367" y="280" width="20" height="20" fill="#1B82E8"/><rect x="387" y="280" width="20" height="20" fill="#1E9E6A"/>
    <rect x="327" y="300" width="20" height="20" fill="#1E9E6A"/><rect x="347" y="300" width="20" height="20" fill="#D14343"/><rect x="367" y="300" width="20" height="20" fill="#1E9E6A"/><rect x="387" y="300" width="20" height="20" fill="#D14343"/>
    <rect x="327" y="320" width="20" height="20" fill="#1B82E8"/><rect x="347" y="320" width="20" height="20" fill="#1E9E6A"/><rect x="367" y="320" width="20" height="20" fill="#1B82E8"/><rect x="387" y="320" width="20" height="20" fill="#1E9E6A"/>
  </g>
  <text x="367" y="364" text-anchor="middle" font-size="16" fill="#5A6B7E">one chip → full color by interpolation</text>
  <line x1="367" y1="200" x2="367" y2="256" stroke="#5A6B7E" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- display/record -->
  <line x1="701" y1="200" x2="701" y2="266" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrFlow)"/>
  <rect x="586" y="270" width="190" height="120" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <rect x="600" y="284" width="162" height="74" fill="#1B82E8" fill-opacity="0.35" stroke="#E8F1FB" stroke-width="1.5"/>
  <polyline points="616,300 648,330 636,340 668,348" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <text x="681" y="380" text-anchor="middle" font-size="16" fill="#E8F1FB">display · freeze · record</text>
  <text x="681" y="414" text-anchor="middle" font-size="16" fill="#0A2342">file storage copies without loss</text>

  <text x="160" y="380" font-size="16" fill="#5A6B7E">digital zoom only crops and interpolates —</text>
  <text x="160" y="402" font-size="16" fill="#5A6B7E">it adds no new detail; optical resolution is</text>
  <text x="160" y="424" font-size="16" fill="#5A6B7E">set ahead of the sensor</text>
</svg>
