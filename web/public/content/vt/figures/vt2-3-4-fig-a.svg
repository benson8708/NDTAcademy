<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Four Remote Measurement Techniques</text>

  <!-- PANEL 1: comparison -->
  <rect x="18" y="48" width="374" height="192" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="30" y="74" font-size="17" font-weight="bold" fill="#0A2342">1 · Comparison</text>
  <circle cx="110" cy="158" r="66" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="78,134 100,152 92,164 116,182" fill="none" stroke="#D14343" stroke-width="3"/>
  <rect x="118" y="124" width="52" height="8" fill="#F2A33C"/>
  <text x="148" y="116" font-size="16" fill="#F2A33C">reference wire</text>
  <text x="92" y="202" font-size="16" fill="#D14343">crack</text>
  <text x="216" y="146" font-size="16" fill="#0A2342">known-size reference placed</text>
  <text x="216" y="168" font-size="16" fill="#0A2342">in the same plane + distance</text>
  <text x="216" y="190" font-size="16" fill="#5A6B7E">least accurate — screening</text>

  <!-- PANEL 2: shadow -->
  <rect x="408" y="48" width="374" height="192" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="420" y="74" font-size="17" font-weight="bold" fill="#0A2342">2 · Shadow</text>
  <rect x="424" y="106" width="58" height="34" rx="5" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="453" y="98" text-anchor="middle" font-size="16" fill="#5A6B7E">tip</text>
  <line x1="424" y1="186" x2="760" y2="186" stroke="#0A2342" stroke-width="2.5"/>
  <polyline points="640,186 652,178 664,186" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <line x1="482" y1="136" x2="668" y2="184" stroke="#F2A33C" stroke-width="2.5"/>
  <rect x="660" y="182" width="22" height="8" fill="#0A2342"/>
  <text x="700" y="176" font-size="16" fill="#0A2342">shadow</text>
  <text x="424" y="214" font-size="16" fill="#0A2342">shadow position in the view encodes distance;</text>
  <text x="424" y="232" font-size="16" fill="#5A6B7E">it kinks at steps — lay it across the indication</text>

  <!-- PANEL 3: stereo -->
  <rect x="18" y="252" width="374" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="30" y="278" font-size="17" font-weight="bold" fill="#0A2342">3 · Stereo</text>
  <circle cx="92" cy="304" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="148" cy="304" r="12" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="92" y1="286" x2="148" y2="286" stroke="#1E9E6A" stroke-width="2"/>
  <text x="158" y="288" font-size="16" fill="#1E9E6A">known spacing</text>
  <polyline points="40,400 110,400 130,418 150,400 230,400" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="92" y1="316" x2="130" y2="416" stroke="#1B82E8" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="148" y1="316" x2="130" y2="416" stroke="#1B82E8" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="130" cy="417" r="4" fill="#D14343"/>
  <rect x="252" y="296" width="56" height="42" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="320" y="296" width="56" height="42" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="272" cy="318" r="4" fill="#D14343"/>
  <circle cx="356" cy="318" r="4" fill="#D14343"/>
  <text x="314" y="290" text-anchor="middle" font-size="16" fill="#5A6B7E">L / R views shift</text>
  <text x="252" y="362" font-size="16" fill="#0A2342">parallax → triangulated 3-D point:</text>
  <text x="252" y="382" font-size="16" fill="#0A2342">length, depth, area</text>
  <text x="40" y="438" font-size="16" fill="#5A6B7E">best within ~5–25 mm standoff</text>

  <!-- PANEL 4: laser / structured light -->
  <rect x="408" y="252" width="374" height="186" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="420" y="278" font-size="17" font-weight="bold" fill="#0A2342">4 · Laser / structured light</text>
  <rect x="424" y="296" width="50" height="30" rx="5" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="474" y1="304" x2="560" y2="394" stroke="#1B82E8" stroke-width="1.6"/>
  <line x1="474" y1="308" x2="588" y2="396" stroke="#1B82E8" stroke-width="1.6"/>
  <line x1="474" y1="312" x2="616" y2="398" stroke="#1B82E8" stroke-width="1.6"/>
  <line x1="474" y1="316" x2="644" y2="398" stroke="#1B82E8" stroke-width="1.6"/>
  <polyline points="500,396 560,396 584,420 612,420 632,398 700,398" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <text x="610" y="438" text-anchor="middle" font-size="16" fill="#5A6B7E">stripes deform over the pit</text>
  <!-- profile inset -->
  <rect x="676" y="290" width="92" height="74" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <polyline points="684,310 706,310 718,348 730,348 740,312 760,312" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="722" y="382" text-anchor="middle" font-size="16" fill="#D14343">depth profile</text>
  <text x="424" y="354" font-size="16" fill="#0A2342">dense point cloud →</text>
  <text x="424" y="374" font-size="16" fill="#0A2342">profile, area, volume</text>
</svg>
