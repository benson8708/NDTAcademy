<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ma6" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#F2A33C"/>
    </marker>
    <marker id="mp6" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E8F1FB"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Dark-Field Lighting and Shadow Relief</text>

  <!-- Band 1: dark field -->
  <text x="60" y="68" font-size="18" font-weight="bold" fill="#E8F1FB">1 — DARK FIELD: grazing light</text>

  <polygon points="126,180 700,200 700,210 126,194" fill="#F2A33C" fill-opacity="0.25"/>
  <rect x="60" y="210" width="680" height="14" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="1"/>

  <rect x="60" y="176" width="54" height="20" rx="6" fill="#0A2342" stroke="#E8F1FB" stroke-width="1.5"/>
  <circle cx="118" cy="186" r="8" fill="#F2A33C"/>
  <text x="64" y="166" font-size="16" fill="#F2A33C">grazing angle ~5–15°</text>

  <line x1="126" y1="188" x2="540" y2="202" stroke="#F2A33C" stroke-width="2" marker-end="url(#ma6)"/>
  <line x1="700" y1="205" x2="752" y2="190" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma6)"/>

  <path d="M350,210 L362,192 L374,210 Z" fill="#D14343" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="362" y1="192" x2="412" y2="106" stroke="#E8F1FB" stroke-width="2" marker-end="url(#mp6)"/>
  <line x1="364" y1="194" x2="430" y2="118" stroke="#E8F1FB" stroke-width="2" marker-end="url(#mp6)"/>
  <ellipse cx="438" cy="96" rx="24" ry="13" fill="#FFFFFF" stroke="#E8F1FB" stroke-width="2"/>
  <circle cx="432" cy="98" r="5" fill="#0A2342"/>
  <text x="474" y="116" font-size="16" fill="#1E9E6A">scatter to the eye — indication BRIGHT</text>
  <text x="362" y="244" text-anchor="middle" font-size="16" fill="#D9E0E8">surface-breaking defect</text>
  <text x="600" y="246" text-anchor="middle" font-size="16" fill="#D9E0E8">smooth field bounces the beam away — DARK</text>

  <line x1="40" y1="262" x2="760" y2="262" stroke="#5A6B7E" stroke-width="1"/>

  <!-- Band 2: shadows -->
  <text x="60" y="290" font-size="18" font-weight="bold" fill="#E8F1FB">2 — SHADOWS: relief becomes visible</text>

  <rect x="80" y="380" width="620" height="18" fill="#D9E0E8"/>
  <path d="M300,380 Q360,332 420,380 Z" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="360" y="344" text-anchor="middle" font-size="16" fill="#FFFFFF">weld bead</text>
  <path d="M420,380 L434,380 L427,390 Z" fill="#0A2342" stroke="#D14343" stroke-width="1.5"/>
  <path d="M160,380 Q185,394 210,380 Z" fill="#0A2342"/>

  <line x1="110" y1="316" x2="170" y2="346" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma6)"/>
  <line x1="140" y1="306" x2="200" y2="336" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma6)"/>
  <line x1="170" y1="296" x2="230" y2="326" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma6)"/>
  <text x="84" y="300" font-size="16" fill="#F2A33C">low directional light</text>

  <rect x="420" y="374" width="120" height="6" fill="#0A2342" fill-opacity="0.9"/>
  <line x1="520" y1="356" x2="490" y2="374" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="560" y="350" text-anchor="middle" font-size="16" fill="#F2A33C">shadow length hints at depth</text>
  <line x1="428" y1="408" x2="427" y2="390" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="430" y="424" text-anchor="middle" font-size="16" fill="#D14343">undercut: hard shadow at the toe</text>
  <line x1="180" y1="408" x2="185" y2="390" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="170" y="424" text-anchor="middle" font-size="16" fill="#D9E0E8">dent: shadow on the far rim</text>

  <text x="400" y="444" text-anchor="middle" font-size="16" fill="#E8F1FB">sweep the light — each direction reveals different relief</text>
</svg>
