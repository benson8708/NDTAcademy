<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" font-size="24" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Fiberscope vs Video Borescope: How the Image Travels</text>

  <!-- FIBERSCOPE band -->
  <text x="40" y="72" font-size="18" font-weight="bold" fill="#1B82E8">FIBERSCOPE</text>
  <text x="324" y="96" font-size="16" fill="#E8F1FB" text-anchor="middle">Coherent image bundle: fibers keep position at both ends</text>

  <!-- tip -->
  <rect x="56" y="116" width="36" height="38" rx="4" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <ellipse cx="62" cy="135" rx="3.5" ry="10" fill="#F2A33C"/>
  <text x="74" y="178" font-size="16" fill="#D9E0E8" text-anchor="middle">Tip</text>

  <!-- coherent bundle -->
  <path d="M 92 118 C 220 102, 330 146, 556 112" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 92 124 C 220 108, 330 152, 556 118" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 92 130 C 220 114, 330 158, 556 124" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 92 136 C 220 120, 330 164, 556 130" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 92 142 C 220 126, 330 170, 556 136" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>
  <path d="M 92 148 C 220 132, 330 176, 556 142" fill="none" stroke="#E8F1FB" stroke-width="1.5"/>

  <!-- eyepiece -->
  <rect x="556" y="102" width="26" height="56" rx="4" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <rect x="582" y="110" width="14" height="40" rx="4" fill="#1B82E8"/>
  <text x="584" y="184" font-size="16" fill="#D9E0E8" text-anchor="middle">Eyepiece</text>

  <!-- incoherent bundle to light source -->
  <path d="M 92 150 C 150 170, 190 190, 248 196" fill="none" stroke="#F2A33C" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M 92 154 C 150 176, 190 196, 248 202" fill="none" stroke="#F2A33C" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M 92 158 C 150 182, 190 202, 248 208" fill="none" stroke="#F2A33C" stroke-width="1.6" stroke-dasharray="5 4"/>
  <rect x="250" y="182" width="120" height="34" rx="5" fill="#F2A33C"/>
  <text x="310" y="204" font-size="16" font-weight="bold" fill="#0A2342" text-anchor="middle">Light source</text>
  <text x="240" y="236" font-size="16" fill="#F2A33C" text-anchor="middle">Incoherent bundle: light only</text>

  <!-- honeycomb inset -->
  <circle cx="700" cy="140" r="54" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <g fill="#1B82E8" fill-opacity="0.6">
    <circle cx="688" cy="104" r="3"/><circle cx="700" cy="104" r="3"/><circle cx="712" cy="104" r="3"/>
    <circle cx="670" cy="116" r="3"/><circle cx="694" cy="116" r="3"/><circle cx="706" cy="116" r="3"/><circle cx="718" cy="116" r="3"/><circle cx="730" cy="116" r="3"/>
    <circle cx="664" cy="128" r="3"/><circle cx="676" cy="128" r="3"/><circle cx="688" cy="128" r="3"/><circle cx="700" cy="128" r="3"/><circle cx="712" cy="128" r="3"/><circle cx="724" cy="128" r="3"/><circle cx="736" cy="128" r="3"/>
    <circle cx="658" cy="140" r="3"/><circle cx="670" cy="140" r="3"/><circle cx="682" cy="140" r="3"/><circle cx="694" cy="140" r="3"/><circle cx="706" cy="140" r="3"/><circle cx="718" cy="140" r="3"/><circle cx="730" cy="140" r="3"/><circle cx="742" cy="140" r="3"/>
    <circle cx="664" cy="152" r="3"/><circle cx="676" cy="152" r="3"/><circle cx="688" cy="152" r="3"/><circle cx="700" cy="152" r="3"/><circle cx="724" cy="152" r="3"/><circle cx="736" cy="152" r="3"/>
    <circle cx="670" cy="164" r="3"/><circle cx="682" cy="164" r="3"/><circle cx="706" cy="164" r="3"/><circle cx="718" cy="164" r="3"/><circle cx="730" cy="164" r="3"/>
    <circle cx="688" cy="176" r="3"/><circle cx="700" cy="176" r="3"/><circle cx="712" cy="176" r="3"/>
  </g>
  <circle cx="682" cy="116" r="4" fill="#0A2342"/>
  <circle cx="712" cy="152" r="4" fill="#0A2342"/>
  <circle cx="694" cy="164" r="4" fill="#0A2342"/>
  <text x="700" y="216" font-size="16" fill="#E8F1FB" text-anchor="middle">Broken fibers show as</text>
  <text x="700" y="236" font-size="16" fill="#E8F1FB" text-anchor="middle">fixed black dots</text>

  <line x1="40" y1="250" x2="760" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- VIDEO BORESCOPE band -->
  <text x="40" y="278" font-size="18" font-weight="bold" fill="#1B82E8">VIDEO BORESCOPE</text>

  <!-- tip with sensor -->
  <rect x="56" y="300" width="52" height="40" rx="4" fill="none" stroke="#E8F1FB" stroke-width="2"/>
  <ellipse cx="58" cy="320" rx="3.5" ry="10" fill="#F2A33C"/>
  <circle cx="58" cy="305" r="4" fill="#F2A33C"/>
  <circle cx="58" cy="335" r="4" fill="#F2A33C"/>
  <rect x="66" y="308" width="26" height="24" fill="#1E9E6A" stroke="#E8F1FB" stroke-width="1"/>

  <!-- signal cable -->
  <path d="M 108 320 C 220 308, 330 334, 478 320" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <text x="290" y="360" font-size="16" fill="#E8F1FB" text-anchor="middle">Electrical signal: length not limited by optics</text>

  <!-- monitor -->
  <rect x="480" y="270" width="260" height="130" rx="8" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <rect x="494" y="282" width="180" height="104" fill="#E8F1FB"/>
  <line x1="510" y1="352" x2="658" y2="352" stroke="#0A2342" stroke-width="2"/>
  <path d="M 540 352 Q 548 338 556 352 Q 564 338 572 352 Q 580 338 588 352 Q 596 338 604 352" fill="none" stroke="#0A2342" stroke-width="2"/>
  <path d="M 566 304 L 574 318 L 564 332 L 572 344" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <circle cx="702" cy="300" r="6" fill="#1B82E8"/>
  <circle cx="702" cy="322" r="6" fill="#1B82E8"/>
  <rect x="690" y="340" width="24" height="10" rx="2" fill="#5A6B7E"/>
  <text x="610" y="422" font-size="16" fill="#D9E0E8" text-anchor="middle">Display: freeze, record, measure</text>

  <!-- sensor labels -->
  <text x="170" y="394" font-size="16" fill="#E8F1FB" text-anchor="middle">CCD/CMOS sensor at the tip,</text>
  <text x="170" y="414" font-size="16" fill="#E8F1FB" text-anchor="middle">LED illumination beside it</text>
  <line x1="150" y1="382" x2="84" y2="336" stroke="#5A6B7E" stroke-width="1.5"/>
</svg>
