<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ma5" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#F2A33C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">The Law of Illumination</text>

  <!-- inverse square: source and diverging rays -->
  <circle cx="90" cy="180" r="10" fill="#F2A33C"/>
  <line x1="90" y1="160" x2="90" y2="148" stroke="#F2A33C" stroke-width="2"/>
  <line x1="74" y1="166" x2="66" y2="158" stroke="#F2A33C" stroke-width="2"/>
  <line x1="74" y1="194" x2="66" y2="202" stroke="#F2A33C" stroke-width="2"/>
  <text x="90" y="134" text-anchor="middle" font-size="16" fill="#F2A33C">small source</text>
  <line x1="90" y1="180" x2="684" y2="82" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="90" y1="180" x2="684" y2="278" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- screen at d -->
  <rect x="232" y="152" width="56" height="56" fill="#E8F1FB" fill-opacity="0.95" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- screen at 2d -->
  <rect x="374" y="124" width="112" height="112" fill="#E8F1FB" fill-opacity="0.55" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="430" y1="124" x2="430" y2="236" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="374" y1="180" x2="486" y2="180" stroke="#5A6B7E" stroke-width="1"/>
  <!-- screen at 3d -->
  <rect x="516" y="96" width="168" height="168" fill="#E8F1FB" fill-opacity="0.3" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="572" y1="96" x2="572" y2="264" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="628" y1="96" x2="628" y2="264" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="516" y1="152" x2="684" y2="152" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="516" y1="208" x2="684" y2="208" stroke="#5A6B7E" stroke-width="1"/>

  <text x="260" y="294" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">d</text>
  <text x="430" y="294" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">2d</text>
  <text x="600" y="294" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">3d</text>
  <text x="260" y="320" text-anchor="middle" font-size="17" fill="#FFFFFF">1000 lx</text>
  <text x="430" y="320" text-anchor="middle" font-size="17" fill="#FFFFFF">250 lx</text>
  <text x="600" y="320" text-anchor="middle" font-size="17" fill="#FFFFFF">111 lx</text>
  <text x="724" y="186" text-anchor="middle" font-size="20" font-weight="bold" fill="#E8F1FB">E = I / d²</text>

  <line x1="40" y1="338" x2="760" y2="338" stroke="#5A6B7E" stroke-width="1"/>

  <!-- cosine law strip -->
  <text x="400" y="364" text-anchor="middle" font-size="18" font-weight="bold" fill="#F2A33C">E = (I / d²) · cos θ</text>

  <line x1="130" y1="378" x2="130" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <line x1="160" y1="378" x2="160" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <line x1="190" y1="378" x2="190" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <line x1="100" y1="412" x2="220" y2="412" stroke="#D9E0E8" stroke-width="4"/>
  <text x="160" y="436" text-anchor="middle" font-size="16" fill="#FFFFFF">0° — full lux</text>

  <line x1="516" y1="412" x2="516" y2="362" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="420" y1="374" x2="484" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <line x1="450" y1="374" x2="514" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <line x1="480" y1="374" x2="544" y2="406" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#ma5)"/>
  <rect x="486" y="408" width="110" height="8" fill="#F2A33C" fill-opacity="0.5"/>
  <line x1="440" y1="412" x2="640" y2="412" stroke="#D9E0E8" stroke-width="4"/>
  <text x="592" y="384" font-size="16" fill="#E8F1FB">θ = 60°</text>
  <text x="560" y="436" text-anchor="middle" font-size="16" fill="#FFFFFF">60° from normal — half the lux</text>
</svg>
