<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrAmber2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F2A33C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <rect x="4" y="4" width="792" height="442" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="34" font-size="23" font-weight="bold" fill="#0A2342" text-anchor="middle">Photographing a Weld: A Setup That Stands Up</text>

    <!-- plate and weld bead -->
    <rect x="110" y="330" width="580" height="42" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M350 330 Q400 294 450 330 Z" fill="#F2A33C" stroke="#5A6B7E" stroke-width="1"/>
    <path d="M365 325 Q400 310 435 325" fill="none" stroke="#5A6B7E" stroke-width="1"/>
    <path d="M372 318 Q400 306 428 318" fill="none" stroke="#5A6B7E" stroke-width="1"/>

    <!-- camera -->
    <rect x="366" y="82" width="28" height="8" fill="#0A2342"/>
    <rect x="358" y="90" width="84" height="48" rx="6" fill="#0A2342"/>
    <rect x="384" y="138" width="32" height="26" fill="#0A2342"/>
    <line x1="400" y1="164" x2="400" y2="300" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <path d="M392 330 L392 322 L400 322" fill="none" stroke="#0A2342" stroke-width="1.5"/>
    <text x="455" y="112" font-size="16" fill="#0A2342">Camera square to the surface — no parallax</text>

    <!-- field of view -->
    <line x1="384" y1="164" x2="210" y2="330" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="416" y1="164" x2="640" y2="330" stroke="#D9E0E8" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- raking lamp -->
    <path d="M120 240 L168 252 L168 276 L120 288 Z" fill="#0A2342"/>
    <line x1="172" y1="256" x2="342" y2="318" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber2)"/>
    <line x1="172" y1="266" x2="348" y2="324" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber2)"/>
    <line x1="172" y1="276" x2="338" y2="329" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber2)"/>
    <path d="M314 330 A36 36 0 0 1 318 316" fill="none" stroke="#0A2342" stroke-width="1.5"/>
    <text x="262" y="312" font-size="16" font-weight="bold" fill="#0A2342">15–30°</text>
    <text x="60" y="218" font-size="16" fill="#0A2342">Raking light across the toe</text>

    <!-- scale -->
    <rect x="470" y="306" width="170" height="18" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
    <line x1="480" y1="306" x2="480" y2="316" stroke="#0A2342" stroke-width="1"/>
    <line x1="495" y1="306" x2="495" y2="312" stroke="#0A2342" stroke-width="1"/>
    <line x1="510" y1="306" x2="510" y2="316" stroke="#0A2342" stroke-width="1"/>
    <line x1="525" y1="306" x2="525" y2="312" stroke="#0A2342" stroke-width="1"/>
    <line x1="540" y1="306" x2="540" y2="316" stroke="#0A2342" stroke-width="1"/>
    <line x1="555" y1="306" x2="555" y2="312" stroke="#0A2342" stroke-width="1"/>
    <line x1="570" y1="306" x2="570" y2="316" stroke="#0A2342" stroke-width="1"/>
    <line x1="585" y1="306" x2="585" y2="312" stroke="#0A2342" stroke-width="1"/>
    <line x1="600" y1="306" x2="600" y2="316" stroke="#0A2342" stroke-width="1"/>
    <line x1="615" y1="306" x2="615" y2="312" stroke="#0A2342" stroke-width="1"/>
    <line x1="630" y1="306" x2="630" y2="316" stroke="#0A2342" stroke-width="1"/>
    <text x="470" y="295" font-size="16" fill="#0A2342">Scale in frame</text>

    <!-- weld ID tag -->
    <rect x="200" y="296" width="92" height="26" rx="4" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
    <text x="246" y="314" font-size="16" font-weight="bold" fill="#0A2342" text-anchor="middle">W-104 R2</text>
    <text x="160" y="285" font-size="16" fill="#0A2342">Weld ID visible</text>

    <text x="400" y="420" font-size="16" fill="#5A6B7E" text-anchor="middle">Shoot the sequence: overall → locator → close-up, logged on the weld map.</text>
  </g>
</svg>
