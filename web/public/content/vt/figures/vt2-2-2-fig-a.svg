<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="mb2" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1B82E8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Verifying Illuminance at the Examination Surface</text>

  <!-- light cone -->
  <polygon points="196,102 284,316 376,316 200,118" fill="#F2A33C" fill-opacity="0.22"/>

  <!-- plate and weld -->
  <rect x="70" y="330" width="660" height="26" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M290,330 Q330,298 370,330 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="330" y="372" text-anchor="middle" font-size="16" fill="#5A6B7E">weld under examination</text>

  <!-- lamp -->
  <rect x="120" y="96" width="64" height="28" rx="8" fill="#0A2342"/>
  <circle cx="190" cy="110" r="12" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="86" y="84" font-size="17" font-weight="bold" fill="#0A2342">working lamp</text>

  <!-- working distance -->
  <line x1="205" y1="130" x2="320" y2="298" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 5" marker-start="url(#mb2)" marker-end="url(#mb2)"/>
  <text x="52" y="206" font-size="16" fill="#1B82E8">verify with THIS lamp</text>
  <text x="52" y="228" font-size="16" fill="#1B82E8">at THIS working distance</text>

  <!-- light meter -->
  <path d="M412,330 a18,12 0 0 1 36,0 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M448,324 C470,302 480,292 492,280" fill="none" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="470" y="222" width="140" height="56" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="540" y="248" text-anchor="middle" font-size="22" font-weight="bold" fill="#0A2342">1080 lx</text>
  <text x="540" y="270" text-anchor="middle" font-size="16" fill="#5A6B7E">calibrated meter</text>
  <line x1="430" y1="370" x2="431" y2="342" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="446" y="388" text-anchor="middle" font-size="16" fill="#0A2342">sensor lies in the plane of the surface</text>

  <!-- eye and viewing geometry -->
  <ellipse cx="640" cy="110" rx="26" ry="14" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <circle cx="634" cy="110" r="6" fill="#0A2342"/>
  <text x="640" y="80" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">eye ≤ 600 mm (24 in.)</text>
  <line x1="622" y1="120" x2="362" y2="316" stroke="#1B82E8" stroke-width="2" stroke-dasharray="5 4"/>
  <path d="M408,316 A46,46 0 0 0 399,288" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="464" y="296" font-size="17" font-weight="bold" fill="#1E9E6A">viewing angle ≥ 30°</text>

  <!-- code minimums banner -->
  <rect x="70" y="406" width="660" height="34" rx="8" fill="#0A2342"/>
  <text x="400" y="428" text-anchor="middle" font-size="16" fill="#FFFFFF">general ≥ 500 lx (50 fc)  |  critical / direct ≥ 1000 lx (100 fc)  |  record reading + meter ID</text>
</svg>
