<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Forging and Rolling Discontinuities: Four Signatures</text>

  <defs>
    <marker id="arrAmberC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F2A33C"/>
    </marker>
  </defs>

  <!-- quadrant dividers -->
  <line x1="400" y1="52" x2="400" y2="440" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="20" y1="248" x2="780" y2="248" stroke="#D9E0E8" stroke-width="2"/>

  <!-- Q1: LAP -->
  <text x="40" y="80" font-size="18" font-weight="bold" fill="#0A2342">LAP - folded, not fused</text>
  <rect x="40" y="120" width="300" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M100,120 Q150,136 200,141 Q250,146 300,151" fill="none" stroke="#D14343" stroke-width="3"/>
  <path d="M150,98 Q125,100 108,116" fill="none" stroke="#F2A33C" stroke-width="2.5" marker-end="url(#arrAmberC)"/>
  <text x="160" y="102" font-size="16" fill="#F2A33C">fold direction</text>
  <text x="40" y="216" font-size="16" fill="#0A2342">Smooth, curving line at a shallow angle.</text>
  <text x="40" y="238" font-size="16" fill="#0A2342">Look near flash lines and corners.</text>

  <!-- Q2: BURST -->
  <text x="430" y="80" font-size="18" font-weight="bold" fill="#0A2342">BURST - internal tear</text>
  <rect x="430" y="115" width="320" height="75" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="560,150 575,140 585,148 595,134 602,150 618,144 610,156 622,164 600,162 592,172 582,158 566,162"
           fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="430" y="216" font-size="16" fill="#0A2342">Forged too cold or reduced too fast.</text>
  <text x="430" y="238" font-size="16" fill="#0A2342">VT sees it only where machining exposes it.</text>

  <!-- Q3: SEAM -->
  <text x="40" y="284" font-size="18" font-weight="bold" fill="#0A2342">SEAM - rolled-in surface line</text>
  <rect x="40" y="312" width="300" height="55" rx="27" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="62" y1="340" x2="318" y2="340" stroke="#D14343" stroke-width="2"/>
  <text x="40" y="402" font-size="16" fill="#0A2342">Tight, straight, can run the full length.</text>
  <text x="40" y="424" font-size="16" fill="#0A2342">Use grazing light and a 10x magnifier.</text>

  <!-- Q4: LAMINATION -->
  <text x="430" y="284" font-size="18" font-weight="bold" fill="#0A2342">LAMINATION - parallel to surface</text>
  <polygon points="430,330 680,330 740,303 490,303" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="430" y="330" width="250" height="45" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="435" y1="352" x2="675" y2="352" stroke="#D14343" stroke-width="3"/>
  <text x="600" y="322" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">face shows nothing</text>
  <text x="430" y="402" font-size="16" fill="#0A2342">Shows only on cut edges and drilled holes</text>
  <text x="430" y="424" font-size="16" fill="#0A2342">as a thin, dark mid-thickness line.</text>
</svg>
