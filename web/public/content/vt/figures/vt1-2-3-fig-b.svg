  <rect x="722" y="338" width="54" height="54" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="738" y="412" font-size="16" fill="#0A2342" text-anchor="middle">Magnetic base</text>

  <text x="640" y="438" font-size="16" fill="#5A6B7E" text-anchor="middle">Keep the plunger square: tilt reads short</text>
