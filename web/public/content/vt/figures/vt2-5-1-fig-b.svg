<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Two Frameworks, One Job: US vs. EU / ISO</text>

  <line x1="400" y1="50" x2="400" y2="440" stroke="#D9E0E8" stroke-width="2" stroke-dasharray="6 6"/>

  <text x="205" y="68" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B82E8">UNITED STATES</text>
  <text x="595" y="68" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B82E8">EUROPEAN UNION / ISO</text>

  <!-- US column -->
  <rect x="45" y="80" width="320" height="64" rx="6" fill="#0A2342"/>
  <text x="205" y="106" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">LAW</text>
  <text x="205" y="130" text-anchor="middle" font-size="16" fill="#E8F1FB">Jurisdiction adopts ASME BPVC</text>

  <line x1="205" y1="146" x2="205" y2="162" stroke="#5A6B7E" stroke-width="2"/>
