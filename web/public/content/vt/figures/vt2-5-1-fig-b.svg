  <rect x="435" y="80" width="320" height="64" rx="6" fill="#0A2342"/>
  <text x="595" y="106" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">LAW</text>
  <text x="595" y="130" text-anchor="middle" font-size="16" fill="#E8F1FB">PED 2014/68/EU · ESRs · CE marking</text>

  <line x1="595" y1="146" x2="595" y2="162" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="589,162 601,162 595,172" fill="#5A6B7E"/>

  <rect x="435" y="168" width="320" height="64" rx="6" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="3"/>
