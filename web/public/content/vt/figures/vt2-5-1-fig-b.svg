  <text x="205" y="394" text-anchor="middle" font-size="16" fill="#0A2342">SNT-TC-1A employer written practice</text>

  <text x="205" y="432" text-anchor="middle" font-size="16" font-style="italic" fill="#5A6B7E">AWS D1.1: method + acceptance in one book</text>

