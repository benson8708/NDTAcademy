  <text x="595" y="218" text-anchor="middle" font-size="16" fill="#0A2342">EN 13445 / 13480 → ISO 5817 B, C, D</text>

  <line x1="595" y1="234" x2="595" y2="250" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="589,250 601,250 595,260" fill="#5A6B7E"/>

  <rect x="435" y="256" width="320" height="64" rx="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="3"/>
  <text x="595" y="282" text-anchor="middle" font-size="17" font-weight="bold" fill="#1B82E8">METHOD</text>
  <text x="595" y="306" text-anchor="middle" font-size="16" fill="#0A2342">EN ISO 17637 weld visual testing</text>

