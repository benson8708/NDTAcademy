<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#F2A33C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="34" font-size="24" font-weight="bold" fill="#0A2342" text-anchor="middle">Light Angle Changes What You See</text>

    <!-- Panel 1: flood light -->
    <rect x="30" y="60" width="355" height="300" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
    <text x="50" y="90" font-size="18" font-weight="bold" fill="#0A2342">FLOOD LIGHT FROM ABOVE</text>
    <rect x="55" y="270" width="305" height="60" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M201 270 L205 292 L209 270 Z" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
    <rect x="175" y="115" width="60" height="22" rx="4" fill="#F2A33C"/>
    <line x1="190" y1="140" x2="190" y2="262" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber)"/>
    <line x1="205" y1="140" x2="205" y2="260" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber)"/>
    <line x1="220" y1="140" x2="220" y2="262" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber)"/>
    <ellipse cx="95" cy="130" rx="18" ry="10" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
    <circle cx="95" cy="130" r="4" fill="#0A2342"/>
    <line x1="100" y1="140" x2="196" y2="264" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="50" y="343" font-size="16" fill="#5A6B7E">Shallow relief casts almost no</text>
    <text x="50" y="356" font-size="16" fill="#5A6B7E">shadow — low contrast</text>

    <!-- Panel 2: raking light -->
    <rect x="415" y="60" width="355" height="300" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="1.5"/>
    <text x="435" y="90" font-size="18" font-weight="bold" fill="#0A2342">RAKING LIGHT AT 10–30°</text>
    <rect x="440" y="270" width="305" height="60" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <path d="M586 270 L590 292 L594 270 Z" fill="#0A2342" stroke="#5A6B7E" stroke-width="1"/>
    <rect x="438" y="228" width="55" height="20" rx="4" fill="#F2A33C"/>
    <line x1="495" y1="232" x2="578" y2="262" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber)"/>
    <line x1="495" y1="242" x2="584" y2="268" stroke="#F2A33C" stroke-width="2" marker-end="url(#arrAmber)"/>
    <rect x="594" y="266" width="70" height="5" fill="#0A2342"/>
    <path d="M562 270 A26 26 0 0 0 537 263" fill="none" stroke="#0A2342" stroke-width="1.5"/>
    <text x="528" y="256" font-size="16" font-weight="bold" fill="#0A2342">≈15°</text>
    <text x="435" y="348" font-size="16" fill="#5A6B7E">Long shadow reveals the same crack</text>

    <!-- bottom: light meter -->
    <rect x="250" y="380" width="120" height="48" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="1.5"/>
    <text x="310" y="410" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">1000 lux</text>
    <line x1="370" y1="404" x2="382" y2="404" stroke="#0A2342" stroke-width="1.5"/>
    <rect x="382" y="398" width="18" height="12" fill="#0A2342"/>
    <text x="412" y="410" font-size="16" fill="#5A6B7E">Verify with a calibrated meter at the surface</text>
  </g>
</svg>
