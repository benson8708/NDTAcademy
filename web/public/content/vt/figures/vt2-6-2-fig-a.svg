<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="36" font-size="24" font-weight="bold" fill="#E8F1FB" text-anchor="middle">Pressure Vessel: Priority VT Zones</text>

    <!-- vessel shell and heads -->
    <ellipse cx="185" cy="235" rx="42" ry="55" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <ellipse cx="615" cy="235" rx="42" ry="55" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <rect x="185" y="180" width="430" height="110" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

    <!-- circumferential seams -->
    <line x1="330" y1="181" x2="330" y2="289" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="470" y1="181" x2="470" y2="289" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>

    <!-- staggered longitudinal seams -->
    <line x1="192" y1="205" x2="328" y2="205" stroke="#D14343" stroke-width="2.5" stroke-dasharray="8 5"/>
    <line x1="332" y1="262" x2="468" y2="262" stroke="#D14343" stroke-width="2.5" stroke-dasharray="8 5"/>
    <line x1="472" y1="205" x2="608" y2="205" stroke="#D14343" stroke-width="2.5" stroke-dasharray="8 5"/>

    <!-- nozzle with flange and reinforcing pad -->
    <rect x="385" y="118" width="36" height="62" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <rect x="375" y="106" width="56" height="14" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <rect x="357" y="168" width="92" height="12" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
    <circle cx="441" cy="174" r="4" fill="#D14343"/>

    <!-- manway -->
    <circle cx="540" cy="235" r="27" fill="#D9E0E8" stroke="#1B82E8" stroke-width="2.5"/>
    <circle cx="540" cy="214" r="2.5" fill="#0A2342"/>
    <circle cx="558" cy="224" r="2.5" fill="#0A2342"/>
    <circle cx="558" cy="246" r="2.5" fill="#0A2342"/>
    <circle cx="540" cy="256" r="2.5" fill="#0A2342"/>
    <circle cx="522" cy="246" r="2.5" fill="#0A2342"/>
    <circle cx="522" cy="224" r="2.5" fill="#0A2342"/>

    <!-- saddle supports -->
    <path d="M225 290 L305 290 L317 365 L213 365 Z" fill="#5A6B7E"/>
    <path d="M495 290 L575 290 L587 365 L483 365 Z" fill="#5A6B7E"/>
    <line x1="160" y1="366" x2="680" y2="366" stroke="#5A6B7E" stroke-width="2"/>

    <!-- callouts -->
    <text x="30" y="135" font-size="16" fill="#E8F1FB">Long seams — staggered between courses</text>
    <line x1="240" y1="142" x2="255" y2="200" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="24" y="166" font-size="16" fill="#E8F1FB">Shell: bulges, dents, CUI</text>
    <line x1="200" y1="172" x2="232" y2="224" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="455" y="130" font-size="16" fill="#E8F1FB">Nozzle and repad welds — weep hole OPEN</text>
    <line x1="452" y1="136" x2="444" y2="168" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="255" y="100" font-size="16" fill="#E8F1FB" text-anchor="middle">Circ seams</text>
    <line x1="290" y1="108" x2="330" y2="178" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="770" y="398" font-size="16" fill="#E8F1FB" text-anchor="end">Manway — gasket face and bolting</text>
    <line x1="640" y1="390" x2="552" y2="260" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="30" y="403" font-size="16" fill="#E8F1FB">Attachment welds at saddles and lugs</text>
    <line x1="210" y1="395" x2="242" y2="340" stroke="#F2A33C" stroke-width="1.8" stroke-dasharray="5 4"/>

    <text x="400" y="436" font-size="16" fill="#F2A33C" text-anchor="middle">Locate every seam from the drawing before you climb.</text>
  </g>
</svg>
