  <circle cx="256" cy="218" r="10" fill="#1E9E6A"/>
  <circle cx="280" cy="218" r="10" fill="#3CB985"/>

  <circle cx="124" cy="242" r="10" fill="#1E9E6A"/>
  <circle cx="148" cy="242" r="10" fill="#3CB985"/>
  <circle cx="172" cy="242" r="10" fill="#1E9E6A"/>
