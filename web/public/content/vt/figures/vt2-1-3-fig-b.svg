  <circle cx="244" cy="242" r="10" fill="#3CB985"/>
  <circle cx="268" cy="242" r="10" fill="#1E9E6A"/>
  <circle cx="292" cy="242" r="10" fill="#2E8B7A"/>

  <circle cx="136" cy="266" r="10" fill="#3CB985"/>
