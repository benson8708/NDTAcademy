  <text x="205" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">Digit reads to normal color vision; confused if color-deficient</text>

  <!-- Gray-shade wedge -->
  <text x="585" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Gray-shade (contrast) wedge</text>
  <rect x="430" y="110" width="40" height="70" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="470" y="110" width="40" height="70" fill="#E0E0E0" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="510" y="110" width="40" height="70" fill="#C2C2C2" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="550" y="110" width="40" height="70" fill="#A4A4A4" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="590" y="110" width="40" height="70" fill="#868686" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="630" y="110" width="40" height="70" fill="#686868" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="670" y="110" width="40" height="70" fill="#4A4A4A" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="710" y="110" width="40" height="70" fill="#202020" stroke="#0A2342" stroke-width="1.5"/>
  <text x="430" y="202" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">white</text>
  <text x="750" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">black</text>
  <text x="585" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">subtle steps must be distinguishable</text>

  <!-- Low-contrast indication demo -->
  <rect x="470" y="252" width="230" height="86" fill="#8C8C8C" stroke="#0A2342" stroke-width="2"/>
  <rect x="560" y="276" width="56" height="40" fill="#9E9E9E"/>
  <line x1="616" y1="296" x2="700" y2="296" stroke="#D14343" stroke-width="1.6"/>
  <text x="540" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">faint low-contrast indication</text>
