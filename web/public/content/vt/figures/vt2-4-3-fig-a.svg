<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#E8F1FB">From Indication to Disposition</text>

  <defs>
    <marker id="arrPale" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D9E0E8"/>
    </marker>
  </defs>

  <!-- Indication -->
  <rect x="270" y="54" width="260" height="48" rx="8" fill="#1B82E8"/>
  <text x="400" y="74" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">INDICATION</text>
  <text x="400" y="94" text-anchor="middle" font-size="16" fill="#E8F1FB">observed - needs interpreting</text>

  <line x1="400" y1="102" x2="400" y2="124" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>

  <!-- Interpretation -->
  <rect x="290" y="128" width="220" height="44" rx="8" fill="#F2A33C"/>
  <text x="400" y="156" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">INTERPRETATION</text>

  <line x1="385" y1="174" x2="152" y2="204" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>
  <line x1="400" y1="174" x2="400" y2="204" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>
  <line x1="415" y1="174" x2="648" y2="204" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>

  <!-- False -->
  <rect x="40" y="208" width="210" height="78" rx="8" fill="#5A6B7E"/>
  <text x="145" y="232" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">FALSE</text>
  <text x="145" y="254" text-anchor="middle" font-size="16" fill="#E8F1FB">glare, smear, sheen -</text>
  <text x="145" y="274" text-anchor="middle" font-size="16" fill="#E8F1FB">fix and re-examine</text>

  <!-- Nonrelevant -->
  <rect x="295" y="208" width="210" height="78" rx="8" fill="#5A6B7E"/>
  <text x="400" y="232" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">NONRELEVANT</text>
  <text x="400" y="254" text-anchor="middle" font-size="16" fill="#E8F1FB">geometry or condition</text>
  <text x="400" y="274" text-anchor="middle" font-size="16" fill="#E8F1FB">criteria do not address</text>

  <!-- Relevant -->
  <rect x="550" y="208" width="210" height="78" rx="8" fill="#1B82E8"/>
  <text x="655" y="232" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">RELEVANT</text>
  <text x="655" y="254" text-anchor="middle" font-size="16" fill="#E8F1FB">caused by an actual</text>
  <text x="655" y="274" text-anchor="middle" font-size="16" fill="#E8F1FB">discontinuity</text>

  <line x1="655" y1="286" x2="622" y2="304" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>

  <!-- Evaluation -->
  <rect x="470" y="308" width="280" height="48" rx="8" fill="#F2A33C"/>
  <text x="610" y="328" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">EVALUATION</text>
  <text x="610" y="348" text-anchor="middle" font-size="16" fill="#0A2342">against the acceptance criteria</text>

  <line x1="545" y1="356" x2="510" y2="378" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>
  <line x1="675" y1="356" x2="698" y2="378" stroke="#D9E0E8" stroke-width="2" marker-end="url(#arrPale)"/>

  <!-- Accept -->
  <rect x="420" y="382" width="170" height="52" rx="8" fill="#1E9E6A"/>
  <text x="505" y="403" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">ACCEPT</text>
  <text x="505" y="423" text-anchor="middle" font-size="16" fill="#E8F1FB">record and close</text>

  <!-- Reject -->
  <rect x="615" y="382" width="170" height="52" rx="8" fill="#D14343"/>
  <text x="700" y="403" text-anchor="middle" font-size="17" font-weight="bold" fill="#FFFFFF">REJECT = DEFECT</text>
  <text x="700" y="423" text-anchor="middle" font-size="16" fill="#E8F1FB">report, disposition</text>

  <!-- Side note -->
  <text x="40" y="330" font-size="16" font-style="italic" fill="#D9E0E8">A discontinuity earns the word</text>
  <text x="40" y="352" font-size="16" font-style="italic" fill="#D9E0E8">defect only when it is rejectable</text>
  <text x="40" y="374" font-size="16" font-style="italic" fill="#D9E0E8">against the invoked criteria.</text>
</svg>
