<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Three Scope Families — Three Image Paths</text>

  <!-- STRIP 1: RIGID -->
  <text x="60" y="76" font-size="17" font-weight="bold" fill="#0A2342">Rigid borescope — image carried by a glass lens train</text>
  <rect x="100" y="100" width="500" height="36" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <path d="M 150 104 C 157 111 157 125 150 132 C 143 125 143 111 150 104 Z" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 250 104 C 257 111 257 125 250 132 C 243 125 243 111 250 104 Z" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 350 104 C 357 111 357 125 350 132 C 343 125 343 111 350 104 Z" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 450 104 C 457 111 457 125 450 132 C 443 125 443 111 450 104 Z" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 585 104 C 592 111 592 125 585 132 C 578 125 578 111 585 104 Z" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <rect x="62" y="92" width="38" height="52" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="81" y="162" text-anchor="middle" font-size="16" fill="#5A6B7E">eyepiece</text>
  <text x="585" y="162" text-anchor="middle" font-size="16" fill="#5A6B7E">objective</text>
  <text x="650" y="124" font-size="16" fill="#D14343">straight only</text>

  <!-- STRIP 2: FIBERSCOPE -->
  <text x="60" y="204" font-size="17" font-weight="bold" fill="#0A2342">Fiberscope — image carried by aligned glass fibers, articulating tip</text>
  <path d="M 120 252 C 240 210 330 296 450 252 C 520 228 560 240 596 240" fill="none" stroke="#D9E0E8" stroke-width="24"/>
  <path d="M 120 252 C 240 210 330 296 450 252 C 520 228 560 240 596 240" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="8 6"/>
  <rect x="60" y="226" width="56" height="50" rx="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <text x="88" y="296" text-anchor="middle" font-size="16" fill="#5A6B7E">eyepiece +</text>
  <text x="88" y="314" text-anchor="middle" font-size="16" fill="#5A6B7E">articulation</text>
  <path d="M 596 240 q 26 -4 36 -24" fill="none" stroke="#5A6B7E" stroke-width="10" stroke-linecap="round"/>
  <text x="668" y="216" font-size="16" fill="#1E9E6A">tip steers 2- or 4-way</text>
  <text x="330" y="296" text-anchor="middle" font-size="16" fill="#F2A33C">coherent image bundle inside</text>

  <!-- STRIP 3: VIDEO -->
  <text x="60" y="350" font-size="17" font-weight="bold" fill="#0A2342">Video borescope — tip sensor sends an electronic signal up the tube</text>
  <path d="M 130 400 C 250 360 330 436 450 396 C 520 374 560 388 600 388" fill="none" stroke="#D9E0E8" stroke-width="24"/>
  <path d="M 130 400 C 250 360 330 436 450 396 C 520 374 560 388 600 388" fill="none" stroke="#5A6B7E" stroke-width="2.5" stroke-dasharray="3 5"/>
  <rect x="600" y="378" width="30" height="20" rx="3" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="640" cy="383" r="4" fill="#1B82E8"/>
  <circle cx="640" cy="394" r="4" fill="#1B82E8"/>
  <text x="660" y="376" font-size="16" fill="#0A2342">CMOS chip + LEDs</text>
  <text x="660" y="396" font-size="16" fill="#1E9E6A">10–30 m runs</text>
  <rect x="58" y="368" width="72" height="60" rx="6" fill="#0A2342"/>
  <rect x="66" y="376" width="56" height="34" fill="#1B82E8" fill-opacity="0.45"/>
  <text x="94" y="446" text-anchor="middle" font-size="16" fill="#5A6B7E">display / recorder</text>
  <text x="340" y="364" text-anchor="middle" font-size="16" fill="#5A6B7E">wiring, not optics — length costs nothing</text>
</svg>
