<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#FFFFFF">Anatomy of a Written VT Procedure</text>

  <!-- document page -->
  <rect x="36" y="58" width="296" height="372" rx="8" fill="#FFFFFF"/>
  <text x="52" y="86" font-size="17" font-weight="bold" fill="#0A2342">VT-PROC-014 · Rev C</text>
  <path d="M52 96 L316 96" stroke="#D9E0E8" stroke-width="2"/>

  <text x="56" y="126" font-size="16" fill="#0A2342">1.0&#160;&#160;Scope</text>
  <text x="56" y="159" font-size="16" fill="#0A2342">2.0&#160;&#160;References</text>
  <text x="56" y="192" font-size="16" fill="#0A2342">3.0&#160;&#160;Personnel</text>
  <text x="56" y="225" font-size="16" fill="#0A2342">4.0&#160;&#160;Equipment</text>
  <text x="56" y="258" font-size="16" fill="#0A2342">5.0&#160;&#160;Lighting</text>
  <text x="56" y="291" font-size="16" fill="#0A2342">6.0&#160;&#160;Surface preparation</text>
  <text x="56" y="324" font-size="16" fill="#0A2342">7.0&#160;&#160;Technique</text>
  <text x="56" y="357" font-size="16" fill="#0A2342">8.0&#160;&#160;Acceptance criteria</text>
  <text x="56" y="390" font-size="16" fill="#0A2342">9.0&#160;&#160;Reporting</text>

  <!-- amber markers on highlighted rows -->
  <circle cx="46" cy="187" r="4" fill="#F2A33C"/>
  <circle cx="46" cy="253" r="4" fill="#F2A33C"/>
  <circle cx="46" cy="319" r="4" fill="#F2A33C"/>
  <circle cx="46" cy="352" r="4" fill="#F2A33C"/>
  <circle cx="46" cy="385" r="4" fill="#F2A33C"/>

  <!-- leader lines -->
  <circle cx="334" cy="187" r="3" fill="#F2A33C"/>
  <path d="M334 187 L368 83" stroke="#F2A33C" stroke-width="2" fill="none"/>
  <circle cx="334" cy="253" r="3" fill="#F2A33C"/>
  <path d="M334 253 L368 161" stroke="#F2A33C" stroke-width="2" fill="none"/>
  <circle cx="334" cy="319" r="3" fill="#F2A33C"/>
  <path d="M334 319 L368 239" stroke="#F2A33C" stroke-width="2" fill="none"/>
  <circle cx="334" cy="352" r="3" fill="#F2A33C"/>
  <path d="M334 352 L368 317" stroke="#F2A33C" stroke-width="2" fill="none"/>
  <circle cx="334" cy="385" r="3" fill="#F2A33C"/>
  <path d="M334 385 L368 393" stroke="#F2A33C" stroke-width="2" fill="none"/>

  <!-- callouts -->
  <text x="372" y="88" font-size="17" font-weight="bold" fill="#F2A33C">PERSONNEL</text>
  <text x="372" y="110" font-size="16" fill="#E8F1FB">Who may examine: required certification</text>
  <text x="372" y="130" font-size="16" fill="#E8F1FB">level and a current vision exam</text>

  <text x="372" y="166" font-size="17" font-weight="bold" fill="#F2A33C">LIGHTING</text>
  <text x="372" y="188" font-size="16" fill="#E8F1FB">Minimum lux at the surface, verified</text>
  <text x="372" y="208" font-size="16" fill="#E8F1FB">with a calibrated light meter</text>

  <text x="372" y="244" font-size="17" font-weight="bold" fill="#F2A33C">TECHNIQUE</text>
  <text x="372" y="266" font-size="16" fill="#E8F1FB">Direct or remote · eye within 24 in.</text>
  <text x="372" y="286" font-size="16" fill="#E8F1FB">(600 mm) · angle not less than 30°</text>

  <text x="372" y="322" font-size="17" font-weight="bold" fill="#F2A33C">ACCEPTANCE CRITERIA</text>
  <text x="372" y="344" font-size="16" fill="#E8F1FB">The ruler for evaluation — never</text>
  <text x="372" y="364" font-size="16" fill="#E8F1FB">examine without knowing the limits</text>

  <text x="372" y="398" font-size="17" font-weight="bold" fill="#F2A33C">REPORTING</text>
  <text x="372" y="420" font-size="16" fill="#E8F1FB">The form, the required fields, who</text>
  <text x="372" y="440" font-size="16" fill="#E8F1FB">signs, and where records are kept</text>
</svg>
