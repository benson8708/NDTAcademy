<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1B82E8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <g font-family="Arial, sans-serif">
    <text x="400" y="36" font-size="24" font-weight="bold" fill="#E8F1FB" text-anchor="middle">From Ingot to Product Form</text>

    <!-- molten steel -->
    <rect x="30" y="95" width="130" height="52" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="95" y="117" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">MOLTEN</text>
    <text x="95" y="137" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">STEEL</text>

    <!-- ingot / strand -->
    <line x1="160" y1="121" x2="192" y2="121" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <rect x="195" y="90" width="160" height="62" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="275" y="115" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">INGOT or</text>
    <text x="275" y="137" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">CAST STRAND</text>
    <text x="275" y="174" font-size="16" fill="#F2A33C" text-anchor="middle">pipe • segregation • inclusions</text>

    <!-- arrows to intermediate forms -->
    <line x1="355" y1="115" x2="391" y2="99" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <line x1="355" y1="130" x2="391" y2="209" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <line x1="350" y1="150" x2="391" y2="317" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>

    <!-- slab -->
    <rect x="395" y="72" width="115" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="452" y="95" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">SLAB</text>
    <text x="452" y="116" font-size="16" fill="#0A2342" text-anchor="middle">wide, flat</text>
    <!-- bloom -->
    <rect x="395" y="182" width="115" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="452" y="205" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">BLOOM</text>
    <text x="452" y="226" font-size="16" fill="#0A2342" text-anchor="middle">large square</text>
    <!-- billet -->
    <rect x="395" y="292" width="115" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="452" y="315" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">BILLET</text>
    <text x="452" y="336" font-size="16" fill="#0A2342" text-anchor="middle">smaller section</text>

    <!-- arrows to products -->
    <line x1="510" y1="99" x2="552" y2="99" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <line x1="510" y1="209" x2="552" y2="209" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <line x1="510" y1="319" x2="552" y2="319" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>

    <!-- products -->
    <rect x="555" y="72" width="215" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="662" y="104" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Plate • Sheet • Strip</text>
    <text x="662" y="148" font-size="16" fill="#F2A33C" text-anchor="middle">laminations • seams • scabs</text>

    <rect x="555" y="182" width="215" height="54" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="662" y="214" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Structural shapes • Rails</text>

    <rect x="555" y="292" width="215" height="66" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="662" y="318" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Bars • Wire • Seamless tube</text>
    <text x="662" y="340" font-size="17" font-weight="bold" fill="#0A2342" text-anchor="middle">Extrusions • Forgings</text>
    <text x="662" y="382" font-size="16" fill="#F2A33C" text-anchor="middle">seams • laps • bursts • die lines</text>

    <!-- castings branch -->
    <line x1="95" y1="147" x2="95" y2="298" stroke="#1B82E8" stroke-width="2.5" marker-end="url(#arrBlue)"/>
    <rect x="40" y="302" width="190" height="64" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
    <text x="135" y="328" font-size="18" font-weight="bold" fill="#0A2342" text-anchor="middle">CASTINGS</text>
    <text x="135" y="350" font-size="16" fill="#0A2342" text-anchor="middle">cast directly to shape</text>
    <text x="135" y="390" font-size="16" fill="#F2A33C" text-anchor="middle">porosity • shrinkage • cold shuts</text>
    <text x="135" y="411" font-size="16" fill="#F2A33C" text-anchor="middle">hot tears • sand inclusions</text>

    <text x="400" y="440" font-size="16" fill="#F2A33C" text-anchor="middle">Working reshapes ingot discontinuities — it does not erase them.</text>
  </g>
</svg>
