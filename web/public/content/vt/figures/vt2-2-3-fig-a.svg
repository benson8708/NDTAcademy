<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="mb4" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1B82E8"/>
    </marker>
    <marker id="mg4" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A6B7E"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#0A2342">Reflection: Specular, Diffuse, Mixed</text>

  <!-- Panel 1: specular -->
  <rect x="36" y="56" width="240" height="334" rx="10" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="156" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">SPECULAR — smooth</text>
  <line x1="56" y1="300" x2="256" y2="300" stroke="#0A2342" stroke-width="5"/>
  <line x1="156" y1="300" x2="156" y2="140" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="156" y="130" text-anchor="middle" font-size="16" fill="#5A6B7E">normal</text>
  <line x1="76" y1="160" x2="154" y2="297" stroke="#1B82E8" stroke-width="3" marker-end="url(#mb4)"/>
  <line x1="158" y1="297" x2="236" y2="160" stroke="#1B82E8" stroke-width="3" marker-end="url(#mb4)"/>
  <path d="M156,260 A40,40 0 0 0 136,265" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M156,260 A40,40 0 0 1 176,265" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="128" y="250" text-anchor="middle" font-size="16" fill="#0A2342">θi</text>
  <text x="184" y="250" text-anchor="middle" font-size="16" fill="#0A2342">θr</text>
  <text x="156" y="338" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">θi = θr</text>
  <text x="156" y="364" text-anchor="middle" font-size="16" fill="#5A6B7E">mirror-like: one direction</text>

  <!-- Panel 2: diffuse -->
  <rect x="280" y="56" width="240" height="334" rx="10" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">DIFFUSE — rough</text>
  <polyline points="300,300 315,290 330,303 345,292 360,302 375,291 390,303 405,292 420,302 435,291 450,303 465,292 480,302 500,300" fill="none" stroke="#0A2342" stroke-width="3"/>
  <line x1="330" y1="160" x2="398" y2="290" stroke="#1B82E8" stroke-width="3" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="332" y2="202" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="357" y2="177" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="400" y2="160" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="443" y2="177" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="468" y2="202" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <line x1="400" y1="288" x2="478" y2="247" stroke="#1B82E8" stroke-width="2" marker-end="url(#mb4)"/>
  <text x="400" y="338" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">scatters everywhere</text>
  <text x="400" y="364" text-anchor="middle" font-size="16" fill="#5A6B7E">looks alike from any angle</text>

  <!-- Panel 3: mixed -->
  <rect x="524" y="56" width="240" height="334" rx="10" fill="none" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="644" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#0A2342">MIXED — real surfaces</text>
  <path d="M544,300 q20,-8 40,0 t40,0 t40,0 t40,0 t40,0" fill="none" stroke="#0A2342" stroke-width="4"/>
  <line x1="564" y1="160" x2="642" y2="295" stroke="#1B82E8" stroke-width="3" marker-end="url(#mb4)"/>
  <line x1="646" y1="293" x2="724" y2="166" stroke="#1B82E8" stroke-width="5" marker-end="url(#mb4)"/>
  <line x1="646" y1="293" x2="600" y2="225" stroke="#5A6B7E" stroke-width="2" marker-end="url(#mg4)"/>
  <line x1="646" y1="293" x2="632" y2="205" stroke="#5A6B7E" stroke-width="2" marker-end="url(#mg4)"/>
  <line x1="646" y1="293" x2="692" y2="212" stroke="#5A6B7E" stroke-width="2" marker-end="url(#mg4)"/>
  <text x="644" y="338" text-anchor="middle" font-size="17" font-weight="bold" fill="#0A2342">specular lobe + diffuse</text>
  <text x="644" y="364" text-anchor="middle" font-size="16" fill="#5A6B7E">weld caps flash, then go flat</text>

  <text x="400" y="428" text-anchor="middle" font-size="16" fill="#0A2342">Surface roughness decides the mix — move the light and the look changes.</text>
</svg>
