<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">From Discontinuity to Defect</text>

  <!-- Box 1: Discontinuity -->
  <rect x="40" y="150" width="120" height="60" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="100" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Discontinuity</text>
  <text x="100" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Interruption in</text>
  <text x="100" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">the structure</text>

  <!-- Arrow 1-2 -->
  <line x1="160" y1="180" x2="190" y2="180" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="190,173 206,180 190,187" fill="#E8F1FB"/>

  <!-- Box 2: Indication -->
  <rect x="206" y="150" width="120" height="60" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="266" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Indication</text>
  <text x="266" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Visible evidence</text>
  <text x="266" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">you observe</text>

  <!-- Arrow 2-3 -->
  <line x1="326" y1="180" x2="356" y2="180" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="356,173 372,180 356,187" fill="#E8F1FB"/>

  <!-- Box 3: Interpretation -->
  <rect x="372" y="150" width="120" height="60" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="432" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Interpretation</text>
  <text x="432" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">what is it?</text>
  <text x="432" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">relevant,</text>
  <text x="432" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">nonrelevant, false</text>

  <!-- Arrow 3-4 -->
  <line x1="492" y1="180" x2="522" y2="180" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="522,173 538,180 522,187" fill="#E8F1FB"/>

  <!-- Box 4: Evaluation -->
  <rect x="538" y="150" width="120" height="60" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="598" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Evaluation</text>
  <text x="598" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">vs criteria</text>

  <!-- Arrow 4-5 (fails -> Defect) -->
  <line x1="658" y1="180" x2="688" y2="180" stroke="#D14343" stroke-width="3"/>
  <polygon points="688,173 704,180 688,187" fill="#D14343"/>
  <text x="664" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D14343">fails</text>

  <!-- Box 5: Defect -->
  <rect x="704" y="150" width="92" height="60" rx="8" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <text x="750" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Defect</text>
  <text x="750" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">rejectable</text>

  <!-- Evaluation branch down to Accept -->
  <line x1="598" y1="210" x2="598" y2="300" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="591,300 598,316 605,300" fill="#1E9E6A"/>
  <text x="612" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">meets criteria</text>
  <rect x="538" y="316" width="120" height="46" rx="8" fill="#1E9E6A" stroke="#0A2342" stroke-width="2"/>
  <text x="598" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Accept</text>

  <!-- key takeaway -->
  <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">A discontinuity becomes a defect only when evaluated as rejectable</text>
</svg>
