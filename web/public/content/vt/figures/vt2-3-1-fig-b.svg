<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrWhite" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFFFFF"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D14343"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1E9E6A"/>
    </marker>
    <marker id="arrBlue2" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1B82E8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#E8F1FB">How Prisms Change the Direction of Light</text>

  <!-- LEFT: refracting prism -->
  <text x="210" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#E8F1FB">Refracting prism: deviation + dispersion</text>
  <polygon points="130,340 290,340 210,170" fill="#E8F1FB" fill-opacity="0.16" stroke="#E8F1FB" stroke-width="2"/>
  <text x="210" y="332" text-anchor="middle" font-size="16" fill="#E8F1FB">base</text>

  <!-- incident white ray -->
  <line x1="45" y1="245" x2="170" y2="255" stroke="#FFFFFF" stroke-width="3"/>
  <text x="44" y="228" font-size="16" fill="#FFFFFF">white light</text>

  <!-- ray inside prism -->
  <line x1="170" y1="255" x2="248" y2="262" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- original path, undeviated (dashed) -->
  <line x1="248" y1="262" x2="388" y2="273" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="320" y="258" font-size="16" fill="#5A6B7E">original path</text>

  <!-- dispersed exit fan -->
  <line x1="248" y1="262" x2="384" y2="298" stroke="#D14343" stroke-width="3" marker-end="url(#arrRed)"/>
  <line x1="248" y1="262" x2="384" y2="318" stroke="#1E9E6A" stroke-width="3" marker-end="url(#arrGreen)"/>
  <line x1="248" y1="262" x2="384" y2="338" stroke="#1B82E8" stroke-width="3" marker-end="url(#arrBlue2)"/>
  <text x="394" y="302" font-size="16" fill="#D14343">red</text>
  <text x="394" y="322" font-size="16" fill="#1E9E6A">green</text>
  <text x="394" y="343" font-size="16" fill="#1B82E8">blue — bends most</text>

  <text x="210" y="382" text-anchor="middle" font-size="16" font-weight="bold" fill="#F2A33C">ray deviates toward the base</text>
  <text x="210" y="406" text-anchor="middle" font-size="16" fill="#E8F1FB">index varies with wavelength → spectrum</text>

  <!-- RIGHT: right-angle reflecting prism -->
  <text x="600" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#E8F1FB">Reflecting prism: 90° turn by TIR</text>
  <polygon points="520,170 520,330 680,330" fill="#E8F1FB" fill-opacity="0.16" stroke="#E8F1FB" stroke-width="2"/>
  <text x="640" y="248" font-size="16" fill="#E8F1FB" transform="rotate(45 640 248)">hypotenuse</text>

  <!-- entering ray -->
  <line x1="430" y1="240" x2="520" y2="240" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="520" y1="240" x2="590" y2="240" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="428" y="222" font-size="16" fill="#FFFFFF">light in</text>

  <!-- reflected down and out -->
  <line x1="590" y1="240" x2="590" y2="330" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="590" y1="330" x2="590" y2="408" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrWhite)"/>
  <text x="604" y="402" font-size="16" fill="#FFFFFF">turned 90°</text>

  <!-- 45 deg marker at hypotenuse -->
  <line x1="590" y1="240" x2="628" y2="202" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M 568 240 A 22 22 0 0 1 590 218" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <text x="552" y="212" font-size="17" font-weight="bold" fill="#F2A33C">45°</text>

  <text x="600" y="372" text-anchor="middle" font-size="16" font-weight="bold" fill="#F2A33C">45° &gt; θc ≈ 41° — total internal reflection</text>
  <text x="600" y="396" text-anchor="middle" font-size="16" fill="#E8F1FB">no mirror coating, almost no loss —</text>
  <text x="600" y="416" text-anchor="middle" font-size="16" fill="#E8F1FB">used in side-view borescope tips</text>
</svg>
