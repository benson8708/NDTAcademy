<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">What Visual Testing Evaluates</text>

  <!-- Base plate (butt weld cross-section) -->
  <rect x="120" y="250" width="560" height="55" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="400" y1="250" x2="400" y2="305" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Weld crown / reinforcement -->
  <path d="M 330 250 Q 400 212 470 250 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 338 246 Q 400 224 462 246" fill="none" stroke="#5A6B7E" stroke-width="1.2"/>

  <!-- Crack at weld toe (discontinuity) -->
  <polyline points="468,250 480,243 474,258 489,252 482,266" fill="none" stroke="#D14343" stroke-width="3"/>

  <!-- Spatter / rough finish region -->
  <circle cx="525" cy="244" r="4" fill="#F2A33C"/>
  <circle cx="548" cy="248" r="3" fill="#F2A33C"/>
  <circle cx="572" cy="243" r="5" fill="#F2A33C"/>
  <circle cx="598" cy="247" r="3" fill="#F2A33C"/>
  <circle cx="620" cy="245" r="4" fill="#F2A33C"/>
  <path d="M 510 250 l 8 -6 m 10 6 l 8 -6 m 10 6 l 8 -6 m 10 6 l 8 -6 m 10 6 l 8 -6 m 10 6 l 8 -6" stroke="#F2A33C" stroke-width="1.6" fill="none"/>

  <!-- Reinforcement height dimension -->
  <line x1="300" y1="212" x2="300" y2="250" stroke="#1B82E8" stroke-width="1.8"/>
  <line x1="295" y1="212" x2="305" y2="212" stroke="#1B82E8" stroke-width="1.8"/>
  <line x1="295" y1="250" x2="305" y2="250" stroke="#1B82E8" stroke-width="1.8"/>
  <text x="288" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#1B82E8">reinf.</text>

  <text x="150" y="330" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Base metal</text>
  <text x="372" y="330" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Weld</text>

  <!-- Callout box A: geometry (blue) -->
  <rect x="48" y="66" width="246" height="66" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="60" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Shape &amp; geometry</text>
  <text x="60" y="114" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">size, profile, reinforcement, mismatch</text>
  <line x1="171" y1="132" x2="300" y2="214" stroke="#1B82E8" stroke-width="2"/>

  <!-- Callout box B: discontinuities (red) -->
  <rect x="506" y="66" width="252" height="66" rx="8" fill="#E8F1FB" stroke="#D14343" stroke-width="2.5"/>
  <text x="518" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Discontinuities</text>
  <text x="518" y="114" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">cracks, porosity, undercut, pitting</text>
  <line x1="560" y1="132" x2="482" y2="250" stroke="#D14343" stroke-width="2"/>

  <!-- Callout box C: surface finish (amber) -->
  <rect x="276" y="372" width="318" height="62" rx="8" fill="#E8F1FB" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="290" y="398" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Surface finish</text>
  <text x="290" y="420" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">roughness, spatter, arc strikes, cleanliness</text>
  <line x1="470" y1="372" x2="572" y2="252" stroke="#F2A33C" stroke-width="2"/>
</svg>
