<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Leakage Field Through a Nonmagnetic Coating</text>

  <text x="210" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Thin, tight coating</text>
  <text x="590" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Thick coating</text>

  <!-- ================= LEFT PANEL: thin coating ================= -->
  <rect x="40" y="300" width="340" height="110" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="52" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel part</text>

  <!-- thin coating layer -->
  <rect x="40" y="288" width="340" height="12" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="110" y1="290" x2="95" y2="268" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="48" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Thin coating</text>

  <!-- crack -->
  <path d="M210,300 L206,322 L213,338 L209,356" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="213" y1="340" x2="292" y2="372" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="297" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crack</text>

  <!-- leakage arcs rising well above the thin coating -->
  <path d="M198,298 Q210,270 222,298" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M192,298 Q210,256 228,298" fill="none" stroke="#F2A33C" stroke-width="2" opacity="0.7"/>
  <path d="M186,298 Q210,242 234,298" fill="none" stroke="#F2A33C" stroke-width="1.5" opacity="0.45"/>
  <line x1="194" y1="252" x2="166" y2="228" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="160" y="222" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Leakage field</text>

  <!-- particles gathering on top of the thin coating -->
  <circle cx="204" cy="284" r="3.2" fill="#1E9E6A"/>
  <circle cx="210" cy="282" r="3.2" fill="#1E9E6A"/>
  <circle cx="216" cy="284" r="3.2" fill="#1E9E6A"/>
  <circle cx="207" cy="277" r="3.2" fill="#1E9E6A"/>
  <circle cx="213" cy="277" r="3.2" fill="#1E9E6A"/>
  <circle cx="210" cy="271" r="3.2" fill="#1E9E6A"/>

  <text x="210" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Field above the coating is still strong:</text>
  <text x="210" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">an indication forms</text>

  <!-- ================= RIGHT PANEL: thick coating ================= -->
  <rect x="420" y="300" width="340" height="110" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- thick coating layer -->
  <rect x="420" y="240" width="340" height="60" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1"/>
  <text x="434" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Nonmagnetic coating (thick)</text>

  <!-- crack -->
  <path d="M590,300 L586,322 L593,338 L589,356" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="593" y1="340" x2="672" y2="372" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="677" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crack</text>

  <!-- same leakage arcs, now buried inside the coating -->
  <path d="M578,298 Q590,270 602,298" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M572,298 Q590,256 608,298" fill="none" stroke="#F2A33C" stroke-width="2" opacity="0.7"/>
  <path d="M566,298 Q590,242 614,298" fill="none" stroke="#F2A33C" stroke-width="1.5" opacity="0.45"/>

  <!-- sparse particles drifting on top, unheld -->
  <circle cx="480" cy="232" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="530" cy="234" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="575" cy="232" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="612" cy="234" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="660" cy="232" r="3" fill="#1E9E6A" opacity="0.8"/>
  <circle cx="706" cy="234" r="3" fill="#1E9E6A" opacity="0.8"/>

  <line x1="614" y1="246" x2="700" y2="210" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="704" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Field fades</text>
  <text x="704" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">inside coating</text>

  <text x="590" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">At the coating surface the field has faded:</text>
  <text x="590" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">particles are not held</text>
</svg>
