<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Weld Discontinuities in Cross-Section</text>

  <!-- base plates -->
  <polygon points="60,210 330,210 360,330 60,330" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <polygon points="740,210 470,210 440,330 740,330" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>

  <!-- HAZ bands along bevels -->
  <polygon points="330,210 360,330 400,330 370,210" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="470,210 440,330 400,330 430,210" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- weld bead (V-groove, crown on top) -->
  <path d="M 370 210 L 430 210 L 405 330 L 395 330 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 362 210 Q 400 178 438 210 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>

  <!-- undercut notch at left toe -->
  <path d="M 356 210 Q 364 220 372 211" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>

  <!-- toe crack at right toe -->
  <polyline points="437,209 444,222 440,234 449,247" fill="none" stroke="#D14343" stroke-width="3"/>

  <!-- underbead cracks in left HAZ -->
  <polyline points="352,246 360,254 355,263" fill="none" stroke="#D14343" stroke-width="3"/>
  <polyline points="362,282 370,290 365,299" fill="none" stroke="#D14343" stroke-width="3"/>

  <!-- lack of sidewall fusion (right bevel line) -->
  <line x1="427" y1="222" x2="412" y2="290" stroke="#D14343" stroke-width="4" stroke-dasharray="12 5"/>

  <!-- slag inclusion -->
  <ellipse cx="392" cy="262" rx="9" ry="5" fill="#5A6B7E"/>

  <!-- porosity cluster -->
  <circle cx="398" cy="228" r="4" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="408" cy="238" r="3.5" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="390" cy="240" r="3" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>

  <!-- incomplete penetration at root -->
  <line x1="395" y1="330" x2="405" y2="330" stroke="#D14343" stroke-width="6"/>

  <!-- labels, left side -->
  <line x1="364" y1="215" x2="240" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="236" y="114" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Undercut (toe groove)</text>

  <line x1="357" y1="254" x2="240" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="232" y="196" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Underbead cracks (HAZ,</text>
  <text x="232" y="216" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">delayed — subsurface)</text>

  <line x1="392" y1="262" x2="270" y2="276" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="264" y="280" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Slag inclusion</text>

  <line x1="398" y1="330" x2="300" y2="386" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="296" y="392" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Incomplete penetration (root)</text>

  <!-- labels, right side -->
  <line x1="400" y1="186" x2="540" y2="110" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="546" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Weld bead (crown)</text>

  <line x1="406" y1="234" x2="552" y2="166" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="558" y="162" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Porosity (rounded, scattered)</text>

  <line x1="446" y1="230" x2="568" y2="218" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="574" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Toe crack (sharp, dense line)</text>

  <line x1="418" y1="268" x2="560" y2="278" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Lack of sidewall fusion</text>
  <text x="566" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">(subsurface — broad, fuzzy)</text>

  <line x1="455" y1="250" x2="560" y2="340" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="566" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Heat-affected zone (HAZ)</text>

  <!-- bottom note -->
  <rect x="60" y="408" width="680" height="34" rx="6" fill="#0A2342"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Surface cracks: sharp, dense, tightly held — subsurface flaws: broad, fuzzy, weakly held</text>
</svg>
