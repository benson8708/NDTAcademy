<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">From Ingot to Wrought: How Discontinuities Travel</text>

  <!-- ===== INGOT (left) ===== -->
  <polygon points="90,100 230,100 215,330 105,330" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- pipe cavity at top center -->
  <path d="M 150 100 L 160 175 L 170 100 Z" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <!-- blowholes near surface -->
  <circle cx="115" cy="160" r="7" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="207" cy="190" r="6" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>
  <circle cx="120" cy="240" r="6" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="2"/>
  <!-- inclusions -->
  <ellipse cx="160" cy="235" rx="9" ry="4" fill="#5A6B7E"/>
  <ellipse cx="185" cy="280" rx="8" ry="4" fill="#5A6B7E"/>
  <ellipse cx="140" cy="300" rx="8" ry="4" fill="#5A6B7E"/>
  <text x="160" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">INGOT</text>
  <!-- ingot labels -->
  <line x1="160" y1="140" x2="265" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="270" y="88" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pipe (top-center shrinkage)</text>
  <line x1="207" y1="190" x2="262" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="266" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Blowholes / porosity</text>
  <line x1="185" y1="280" x2="258" y2="268" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="262" y="264" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Nonmetallic inclusions</text>
  <text x="160" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">+ segregation in last metal to freeze</text>

  <!-- ===== ARROW ===== -->
  <line x1="300" y1="215" x2="420" y2="215" stroke="#1B82E8" stroke-width="6"/>
  <polygon points="420,203 446,215 420,227" fill="#1B82E8"/>
  <text x="372" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Hot rolling /</text>
  <text x="372" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">forging</text>

  <!-- ===== ROLLED BAR (right top) ===== -->
  <rect x="470" y="120" width="300" height="60" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- seam on top surface -->
  <line x1="500" y1="120" x2="700" y2="120" stroke="#D14343" stroke-width="4"/>
  <!-- stringers inside -->
  <line x1="505" y1="152" x2="585" y2="152" stroke="#5A6B7E" stroke-width="4" stroke-dasharray="14 7"/>
  <line x1="620" y1="163" x2="720" y2="163" stroke="#5A6B7E" stroke-width="4" stroke-dasharray="14 7"/>
  <text x="475" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">ROLLED BAR</text>
  <line x1="600" y1="120" x2="620" y2="95" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="624" y="91" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Seam — tight, straight, longitudinal</text>
  <line x1="585" y1="152" x2="565" y2="207" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="572" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Stringers (elongated inclusions)</text>

  <!-- ===== ROLLED PLATE (right bottom) ===== -->
  <rect x="470" y="270" width="300" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- laminations parallel to surface -->
  <line x1="500" y1="295" x2="640" y2="295" stroke="#D14343" stroke-width="4" stroke-dasharray="20 8"/>
  <line x1="560" y1="315" x2="730" y2="315" stroke="#D14343" stroke-width="4" stroke-dasharray="20 8"/>
  <text x="475" y="365" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">ROLLED PLATE</text>
  <line x1="640" y1="295" x2="660" y2="252" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="585" y="246" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Laminations — parallel to surface</text>
  <text x="620" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">show only at cut edges and bores</text>

  <!-- bottom note -->
  <rect x="90" y="408" width="620" height="34" rx="6" fill="#0A2342"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Working elongates surviving ingot flaws in the rolling direction — expect longitudinal targets</text>
</svg>
