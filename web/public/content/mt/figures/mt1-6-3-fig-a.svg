<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Fluorescent Viewing Station — The Numbers</text>

  <!-- booth curtain -->
  <rect x="22" y="64" width="24" height="350" fill="#5A6B7E" opacity="0.6"/>
  <rect x="754" y="64" width="24" height="350" fill="#5A6B7E" opacity="0.6"/>

  <!-- UV lamp -->
  <rect x="350" y="78" width="100" height="36" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="450" y1="96" x2="500" y2="84" stroke="#5A6B7E" stroke-width="6"/>
  <text x="512" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">UV-A lamp (filtered)</text>

  <!-- beam -->
  <polygon points="360,114 440,114 525,296 275,296" fill="#1B82E8" opacity="0.18"/>
  <polygon points="380,114 420,114 470,296 330,296" fill="#1B82E8" opacity="0.15"/>

  <!-- bench -->
  <rect x="120" y="330" width="560" height="16" fill="#5A6B7E"/>
  <rect x="160" y="346" width="14" height="60" fill="#5A6B7E"/>
  <rect x="626" y="346" width="14" height="60" fill="#5A6B7E"/>

  <!-- part -->
  <rect x="260" y="296" width="280" height="34" rx="16" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- fluorescent indication -->
  <line x1="400" y1="298" x2="400" y2="328" stroke="#1E9E6A" stroke-width="9" opacity="0.35"/>
  <line x1="400" y1="298" x2="400" y2="328" stroke="#1E9E6A" stroke-width="3.5"/>
  <line x1="400" y1="334" x2="400" y2="362" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Green-yellow indication at a crack</text>

  <!-- UV meter -->
  <rect x="160" y="284" width="74" height="44" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="197" cy="306" r="12" fill="none" stroke="#0A2342" stroke-width="2"/>
  <line x1="197" y1="306" x2="205" y2="298" stroke="#D14343" stroke-width="2"/>
  <line x1="234" y1="312" x2="260" y2="312" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="196" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">UV-A at the surface</text>
  <text x="196" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">≥ 1,000 µW/cm²</text>

  <!-- ambient meter -->
  <rect x="576" y="284" width="74" height="44" rx="5" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="613" cy="306" r="12" fill="none" stroke="#0A2342" stroke-width="2"/>
  <line x1="613" y1="306" x2="606" y2="297" stroke="#D14343" stroke-width="2"/>
  <line x1="576" y1="312" x2="544" y2="312" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="616" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Ambient white light</text>
  <text x="616" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">≤ 2 fc (≈ 20 lux)</text>

  <!-- eye / adaptation -->
  <path d="M 90,140 Q 125,114 160,140 Q 125,166 90,140 Z" fill="none" stroke="#E8F1FB" stroke-width="2.5"/>
  <circle cx="125" cy="140" r="9" fill="#E8F1FB"/>
  <text x="125" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Dark adaptation</text>
  <text x="125" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">≥ 1 min (often 5)</text>

  <!-- meter discipline -->
  <rect x="600" y="118" width="10" height="10" fill="#F2A33C"/>
  <text x="620" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Meters calibrated</text>
  <rect x="600" y="146" width="10" height="10" fill="#F2A33C"/>
  <text x="620" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Re-check each shift,</text>
  <text x="620" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">after bulb / filter change</text>

  <!-- bottom note -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Mercury lamps: warm up before reading · LED UV-A sources qualified per the governing practice</text>
</svg>
