<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Lighting Requirements: Visible vs Fluorescent</text>

  <!-- ===== left: visible inspection ===== -->
  <rect x="30" y="58" width="360" height="300" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="210" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Visible particles</text>

  <!-- white-light lamp and rays -->
  <path d="M 70 104 L 120 104 L 112 134 L 78 134 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <line x1="84" y1="140" x2="110" y2="246" stroke="#F2A33C" stroke-width="2"/>
  <line x1="95" y1="140" x2="150" y2="246" stroke="#F2A33C" stroke-width="2"/>
  <line x1="106" y1="140" x2="190" y2="246" stroke="#F2A33C" stroke-width="2"/>

  <text x="290" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">white light</text>
  <text x="290" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">&#8805; 100 fc (&#8776; 1,000 lux)</text>
  <text x="290" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">at the examination surface</text>

  <!-- part with weld cap -->
  <rect x="60" y="250" width="300" height="36" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 170 250 Q 210 232 250 250" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <!-- photometer on the surface -->
  <rect x="280" y="222" width="52" height="28" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="306" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">fc</text>
  <line x1="300" y1="252" x2="265" y2="312" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">photometer at the surface</text>

  <!-- ===== right: fluorescent inspection ===== -->
  <rect x="410" y="58" width="360" height="300" rx="6" fill="#0A2342"/>
  <text x="590" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Fluorescent particles</text>

  <!-- UV lamp and beam -->
  <path d="M 450 104 L 500 104 L 492 134 L 458 134 Z" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2"/>
  <polygon points="458,138 492,138 600,246 475,246" fill="#1B82E8" opacity="0.22"/>

  <text x="645" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">UV-A &#8805; 1,000 &#181;W/cm&#178;</text>
  <text x="645" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">ambient white &#8804; 2 fc (&#8776; 20 lux)</text>
  <text x="645" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">dark adaptation &#8805; 1 min</text>

  <!-- part with glowing indication -->
  <rect x="440" y="250" width="300" height="36" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <polyline points="520,262 540,270 560,264 580,272 600,266" fill="none" stroke="#1E9E6A" stroke-width="10" opacity="0.3"/>
  <polyline points="520,262 540,270 560,264 580,272 600,266" fill="none" stroke="#1E9E6A" stroke-width="4"/>
  <!-- radiometer on the surface -->
  <rect x="655" y="222" width="70" height="28" rx="4" fill="#0A2342" stroke="#E8F1FB" stroke-width="2"/>
  <text x="690" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">&#181;W/cm&#178;</text>
  <line x1="672" y1="252" x2="640" y2="314" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="590" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">radiometer at the surface</text>

  <!-- ===== bottom rule ===== -->
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Both readings are taken AT the examination surface with calibrated meters &#8212;</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">not at the lamp, and not somewhere in the booth.</text>
</svg>
