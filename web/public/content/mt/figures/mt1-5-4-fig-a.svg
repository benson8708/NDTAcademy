<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Fluorescent Booth: Light Limits at the Surface</text>

  <!-- booth curtain frame -->
  <path d="M 70 70 L 70 420 M 730 70 L 730 420 M 70 70 L 730 70" fill="none" stroke="#5A6B7E" stroke-width="6"/>
  <path d="M 90 70 Q 96 240 90 414 M 116 70 Q 110 240 116 414 M 710 70 Q 704 240 710 414 M 684 70 Q 690 240 684 414" fill="none" stroke="#5A6B7E" stroke-width="2"/>
  <text x="148" y="100" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Darkened booth / hood</text>

  <!-- UV lamp -->
  <rect x="340" y="92" width="140" height="38" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2.5"/>
  <rect x="362" y="130" width="96" height="10" fill="#1B82E8"/>
  <text x="410" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">UV-A lamp (365 nm), filter intact</text>

  <!-- UV beam -->
  <path d="M 366 142 L 300 300 L 520 300 L 454 142 Z" fill="#1B82E8" opacity="0.25"/>
  <line x1="366" y1="142" x2="300" y2="300" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="454" y1="142" x2="520" y2="300" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- working distance dimension -->
  <line x1="552" y1="142" x2="552" y2="300" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="544" y1="142" x2="560" y2="142" stroke="#E8F1FB" stroke-width="1.5"/>
  <line x1="544" y1="300" x2="560" y2="300" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="566" y="226" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Check at 15 in. or</text>
  <text x="566" y="246" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">working distance</text>

  <!-- part surface -->
  <rect x="220" y="300" width="380" height="40" rx="6" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <line x1="395" y1="304" x2="402" y2="336" stroke="#D14343" stroke-width="3"/>
  <circle cx="396" cy="310" r="3" fill="#1E9E6A"/>
  <circle cx="398" cy="318" r="3" fill="#1E9E6A"/>
  <circle cx="400" cy="326" r="3" fill="#1E9E6A"/>
  <text x="412" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Green-yellow indication</text>

  <!-- radiometer on surface -->
  <rect x="240" y="266" width="84" height="34" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="282" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1250</text>
  <text x="282" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Radiometer at surface:</text>
  <text x="282" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">UV-A ≥ 1,000 µW/cm²</text>

  <!-- ambient meter -->
  <rect x="618" y="330" width="84" height="34" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="660" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1.5 fc</text>
  <text x="648" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Ambient white ≤ 2 fc</text>
  <text x="648" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">(≈ 20 lux), meter-verified</text>

  <!-- visible method note -->
  <rect x="96" y="382" width="360" height="50" rx="8" fill="#E8F1FB"/>
  <text x="276" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Visible-particle method instead?</text>
  <text x="276" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">White light ≥ 100 fc (≈ 1,000 lux) at the surface</text>

  <!-- dark adapt note -->
  <text x="180" y="150" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Let eyes dark-adapt</text>
  <text x="180" y="170" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">before reading parts</text>
</svg>
