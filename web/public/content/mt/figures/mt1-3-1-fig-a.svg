<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Surface Condition and the Indication</text>

  <!-- panel subtitles -->
  <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">Clean, dry surface</text>
  <text x="590" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">Oil film / soil on surface</text>

  <!-- ================= LEFT PANEL: clean ================= -->
  <rect x="40" y="280" width="340" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="52" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel part</text>

  <!-- flux lines bending around the crack -->
  <path d="M55,310 C130,310 165,310 180,322 C195,342 225,342 240,322 C255,310 290,310 362,310" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M55,345 C150,345 180,345 195,355 C205,362 215,362 225,355 C240,345 280,345 362,345" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M55,375 L362,375" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="360,305 372,310 360,315" fill="#1B82E8"/>
  <polygon points="360,340 372,345 360,350" fill="#1B82E8"/>
  <polygon points="360,370 372,375 360,380" fill="#1B82E8"/>
  <text x="58" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Flux lines</text>

  <!-- crack -->
  <path d="M210,280 L206,302 L213,318 L209,338" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="213" y1="320" x2="298" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="303" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Crack</text>

  <!-- leakage field arcs above the crack -->
  <path d="M196,278 Q210,250 224,278" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M190,278 Q210,236 230,278" fill="none" stroke="#F2A33C" stroke-width="2" opacity="0.75"/>
  <path d="M184,278 Q210,222 236,278" fill="none" stroke="#F2A33C" stroke-width="1.5" opacity="0.5"/>
  <line x1="192" y1="240" x2="122" y2="206" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="202" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Leakage field</text>

  <!-- particles bridging the crack -->
  <circle cx="204" cy="272" r="3.2" fill="#1E9E6A"/>
  <circle cx="210" cy="270" r="3.2" fill="#1E9E6A"/>
  <circle cx="216" cy="272" r="3.2" fill="#1E9E6A"/>
  <circle cx="207" cy="265" r="3.2" fill="#1E9E6A"/>
  <circle cx="213" cy="265" r="3.2" fill="#1E9E6A"/>
  <circle cx="210" cy="259" r="3.2" fill="#1E9E6A"/>
  <circle cx="199" cy="276" r="3.2" fill="#1E9E6A"/>
  <circle cx="221" cy="276" r="3.2" fill="#1E9E6A"/>

  <text x="210" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Particles migrate to the leakage field:</text>
  <text x="210" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">sharp, tight indication</text>

  <!-- ================= RIGHT PANEL: contaminated ================= -->
  <rect x="420" y="280" width="340" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- contaminant layer -->
  <rect x="420" y="262" width="340" height="18" fill="#F2A33C" opacity="0.8"/>
  <circle cx="455" cy="271" r="2.5" fill="#5A6B7E"/>
  <circle cx="520" cy="268" r="2.5" fill="#5A6B7E"/>
  <circle cx="572" cy="273" r="2.5" fill="#5A6B7E"/>
  <circle cx="640" cy="269" r="2.5" fill="#5A6B7E"/>
  <circle cx="706" cy="272" r="2.5" fill="#5A6B7E"/>
  <line x1="700" y1="268" x2="728" y2="228" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="752" y="222" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Oil / soil layer</text>

  <!-- flux lines bending around the crack -->
  <path d="M435,310 C510,310 545,310 560,322 C575,342 605,342 620,322 C635,310 670,310 742,310" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M435,345 C530,345 560,345 575,355 C585,362 595,362 605,355 C620,345 660,345 742,345" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M435,375 L742,375" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="740,305 752,310 740,315" fill="#1B82E8"/>
  <polygon points="740,340 752,345 740,350" fill="#1B82E8"/>
  <polygon points="740,370 752,375 740,380" fill="#1B82E8"/>

  <!-- crack -->
  <path d="M590,280 L586,302 L593,318 L589,338" fill="none" stroke="#D14343" stroke-width="3"/>

  <!-- weakened leakage arcs trapped under / in the layer -->
  <path d="M578,278 Q590,258 602,278" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M572,278 Q590,248 608,278" fill="none" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- scattered, immobile particles sitting on top of the layer -->
  <circle cx="505" cy="256" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="532" cy="257" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="558" cy="255" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="584" cy="257" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="610" cy="256" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="642" cy="257" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="670" cy="255" r="3" fill="#1E9E6A" opacity="0.85"/>
  <circle cx="475" cy="255" r="3" fill="#1E9E6A" opacity="0.85"/>

  <text x="590" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Particles held off the surface and immobile:</text>
  <text x="590" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">weak or no indication</text>
</svg>
