<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of a Technique Sheet</text>

  <!-- document body -->
  <rect x="60" y="58" width="310" height="360" rx="4" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="60" y="58" width="310" height="36" rx="4" fill="#0A2342"/>
  <text x="215" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">MT TECHNIQUE — PUMP SHAFT</text>

  <!-- field blocks -->
  <rect x="72" y="104" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="127" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">PART / MATERIAL / CONDITION</text>

  <rect x="72" y="148" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">METHOD: WET FLUOR · CONTINUOUS</text>

  <rect x="72" y="192" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">SHOT 1: HEAD · FWDC · 1,800 A</text>

  <rect x="72" y="236" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="259" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">SHOT 2: COIL · 90° TO SHOT 1</text>

  <rect x="72" y="280" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="303" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">BATH: 0.1–0.4 mL / 100 mL</text>

  <rect x="72" y="324" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="347" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">LIGHTING: UV-A + AMBIENT</text>

  <rect x="72" y="368" width="286" height="36" fill="#FFFFFF" stroke="#5A6B7E" stroke-width="1"/>
  <text x="82" y="391" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">VERIFY · ACCEPT REF · DEMAG</text>

  <!-- leader lines -->
  <line x1="358" y1="122" x2="420" y2="122" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="166" x2="420" y2="166" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="210" x2="420" y2="210" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="254" x2="420" y2="254" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="298" x2="420" y2="298" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="342" x2="420" y2="342" stroke="#F2A33C" stroke-width="2"/>
  <line x1="358" y1="386" x2="420" y2="386" stroke="#F2A33C" stroke-width="2"/>

  <!-- annotations -->
  <text x="430" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Identity first: alloy and condition —</text>
  <text x="430" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">change the part, change the sheet</text>

  <text x="430" y="161" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Method fixed by the procedure,</text>
  <text x="430" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">never chosen at the bench</text>

  <text x="430" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Circular field → longitudinal flaws;</text>
  <text x="430" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">amperage proven at qualification</text>

  <text x="430" y="249" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Longitudinal field → transverse flaws;</text>
  <text x="430" y="268" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">two directions = full coverage</text>

  <text x="430" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Concentration by settling test</text>
  <text x="430" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(fluorescent range shown)</text>

  <text x="430" y="337" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">UV-A ≥ 1,000 µW/cm² at surface;</text>
  <text x="430" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ambient white light ≤ 2 fc</text>

  <text x="430" y="381" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Prove the field (QQI / 30–60 G),</text>
  <text x="430" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">cite criteria, close with demag</text>
</svg>
