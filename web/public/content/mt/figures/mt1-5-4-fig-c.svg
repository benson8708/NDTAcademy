<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Settling Test: Reading the Centrifuge Tube</text>

  <!-- tube: pear-shaped centrifuge tube -->
  <path d="M 330 80 L 330 220 Q 330 280 355 330 L 355 392 Q 355 408 370 408 Q 385 408 385 392 L 385 330 Q 410 280 410 220 L 410 80" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <line x1="330" y1="80" x2="410" y2="80" stroke="#0A2342" stroke-width="3"/>

  <!-- bath liquid -->
  <path d="M 334 110 L 334 220 Q 334 278 358 326 L 358 372 L 382 372 L 382 326 Q 406 278 406 220 L 406 110 Z" fill="#1B82E8" opacity="0.25"/>

  <!-- settled particles in stem -->
  <rect x="356" y="372" width="28" height="22" fill="#1E9E6A"/>
  <rect x="356" y="364" width="28" height="8" fill="#5A6B7E"/>

  <!-- graduations on stem -->
  <line x1="385" y1="402" x2="402" y2="402" stroke="#0A2342" stroke-width="2"/>
  <line x1="385" y1="384" x2="398" y2="384" stroke="#0A2342" stroke-width="2"/>
  <line x1="385" y1="366" x2="402" y2="366" stroke="#0A2342" stroke-width="2"/>
  <line x1="385" y1="348" x2="398" y2="348" stroke="#0A2342" stroke-width="2"/>
  <text x="410" y="407" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.0 mL</text>
  <text x="410" y="371" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.4 mL</text>
  <text x="410" y="353" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.6 mL</text>

  <!-- labels: settled layer -->
  <line x1="356" y1="382" x2="250" y2="382" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="244" y="378" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Settled particles —</text>
  <text x="244" y="398" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">read volume here</text>

  <line x1="356" y1="366" x2="250" y2="330" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="244" y="322" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Dirt / lint layer on top =</text>
  <text x="244" y="342" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">contamination — replace bath</text>

  <line x1="370" y1="180" x2="280" y2="150" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="274" y="132" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">100 mL bath sample from</text>
  <text x="274" y="152" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">the running, agitated system</text>

  <!-- procedure boxes right -->
  <rect x="470" y="90" width="290" height="120" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="615" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Typical concentration limits</text>
  <text x="615" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Visible: 1.2 – 2.4 mL / 100 mL</text>
  <text x="615" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fluorescent: 0.1 – 0.4 mL / 100 mL</text>
  <text x="615" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">(your written procedure governs)</text>

  <rect x="470" y="230" width="290" height="100" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="615" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Settle time</text>
  <text x="615" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Water bath: commonly 30 min</text>
  <text x="615" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Oil bath: longer, per procedure</text>

  <rect x="470" y="350" width="290" height="80" rx="10" fill="#0A2342"/>
  <text x="615" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Lean bath → faint indications</text>
  <text x="615" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Rich bath → background masks flaws</text>
</svg>
