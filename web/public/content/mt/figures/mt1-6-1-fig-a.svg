<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The MT Document Chain</text>

  <!-- Level 1: governing code -->
  <rect x="80" y="60" width="400" height="64" rx="6" fill="#0A2342"/>
  <text x="280" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">GOVERNING CODE / SPECIFICATION</text>
  <text x="280" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">ASME V Art. 7 · AWS D1.1 · API 1104 · E1444</text>

  <line x1="280" y1="124" x2="280" y2="146" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="272,146 280,158 288,146" fill="#5A6B7E"/>

  <!-- Level 2: employer procedure -->
  <rect x="80" y="160" width="400" height="64" rx="6" fill="#1B82E8"/>
  <text x="280" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">EMPLOYER MT PROCEDURE</text>
  <text x="280" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Level III approved · qualified · rev controlled</text>

  <line x1="280" y1="224" x2="280" y2="246" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="272,246 280,258 288,246" fill="#5A6B7E"/>

  <!-- Level 3: technique sheet -->
  <rect x="80" y="260" width="400" height="64" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="280" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">TECHNIQUE SHEET / WRITTEN INSTRUCTION</text>
  <text x="280" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Part-specific: shots, amperage, particles, lights</text>

  <line x1="280" y1="324" x2="280" y2="346" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="272,346 280,358 288,346" fill="#5A6B7E"/>

  <!-- Level 4: inspection record -->
  <rect x="80" y="360" width="400" height="64" rx="6" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="280" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">INSPECTION AND RECORD</text>
  <text x="280" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Level I / II execute exactly · results documented</text>

  <!-- right-side annotations -->
  <line x1="484" y1="92" x2="512" y2="92" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="522" y="88" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Sets WHAT must be achieved</text>
  <text x="522" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">and what is acceptable</text>

  <line x1="484" y1="192" x2="512" y2="192" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="522" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Sets HOW your shop complies</text>
  <text x="522" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">equipment · methods · checks</text>

  <line x1="484" y1="292" x2="512" y2="292" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="522" y="288" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Sets THE NUMBERS for this part</text>
  <text x="522" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">proven with QQI / gaussmeter</text>

  <line x1="484" y1="392" x2="512" y2="392" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="522" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">PROVES it happened</text>
  <text x="522" y="410" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">traceable, repeatable record</text>
</svg>
