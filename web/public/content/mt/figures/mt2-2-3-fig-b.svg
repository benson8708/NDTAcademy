<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Fatigue: Initiation, Growth, Final Fracture</text>

  <!-- LEFT: fracture face -->
  <circle cx="210" cy="250" r="130" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- final fracture zone (bottom chord region) -->
  <path d="M 99 318 A 130 130 0 0 0 321 318 Q 265 268 210 268 Q 155 268 99 318 Z" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="130" y1="345" x2="160" y2="300" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="170" y1="362" x2="200" y2="305" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="215" y1="368" x2="240" y2="305" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="258" y1="358" x2="278" y2="308" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- beach marks radiating from initiation point at top -->
  <path d="M 178 128 A 50 50 0 0 0 244 130" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 152 146 A 85 85 0 0 0 270 149" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 128 170 A 120 120 0 0 0 293 174" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 108 200 A 155 155 0 0 0 313 205" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 96 240 A 185 185 0 0 0 324 245" fill="none" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- initiation point -->
  <circle cx="210" cy="122" r="7" fill="#D14343" stroke="#0A2342" stroke-width="2"/>
  <line x1="210" y1="112" x2="210" y2="84" stroke="#D14343" stroke-width="1.5"/>
  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">initiation at surface stress raiser</text>

  <!-- labels -->
  <line x1="290" y1="180" x2="352" y2="160" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="358" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">beach marks -</text>
  <text x="358" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">slow cyclic growth</text>
  <line x1="265" y1="330" x2="348" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="354" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">final fast fracture</text>
  <text x="210" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">fracture face of a failed shaft</text>

  <!-- RIGHT: crack growth curve -->
  <line x1="500" y1="385" x2="760" y2="385" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="500" y1="385" x2="500" y2="110" stroke="#0A2342" stroke-width="2.5"/>
  <text x="630" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">load cycles</text>
  <text x="494" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">crack size</text>

  <path d="M 500 372 C 580 366 650 352 690 310 C 718 280 730 200 736 130" fill="none" stroke="#D14343" stroke-width="4"/>

  <!-- detectable threshold -->
  <line x1="500" y1="340" x2="745" y2="340" stroke="#1E9E6A" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="508" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">detectable by MT</text>

  <!-- inspection window -->
  <line x1="652" y1="365" x2="722" y2="365" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="660,359 648,365 660,371" fill="#F2A33C"/>
  <polygon points="714,359 726,365 714,371" fill="#F2A33C"/>
  <text x="640" y="365" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">inspection window</text>

  <text x="700" y="165" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D14343">growth accelerates late</text>
</svg>
