<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Field Verification and Residual-Field Devices</text>

  <!-- grid dividers -->
  <line x1="400" y1="56" x2="400" y2="440" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="30" y1="248" x2="770" y2="248" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== Q1: pie gauge ===== -->
  <text x="205" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Pie (octagon) gauge — qualitative</text>
  <!-- handle -->
  <line x1="205" y1="98" x2="205" y2="128" stroke="#5A6B7E" stroke-width="6"/>
  <!-- octagon -->
  <polygon points="205,128 240,143 255,178 240,213 205,228 170,213 155,178 170,143" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <!-- segment lines through center -->
  <line x1="205" y1="128" x2="205" y2="228" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="155" y1="178" x2="255" y2="178" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="170" y1="143" x2="240" y2="213" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="240" y1="143" x2="170" y2="213" stroke="#5A6B7E" stroke-width="2"/>
  <!-- particle build across vertical boundaries (flux horizontal) -->
  <line x1="205" y1="133" x2="205" y2="223" stroke="#1E9E6A" stroke-width="5"/>
  <line x1="175" y1="148" x2="235" y2="208" stroke="#1E9E6A" stroke-width="4"/>
  <line x1="235" y1="148" x2="175" y2="208" stroke="#1E9E6A" stroke-width="4"/>
  <!-- flux arrow -->
  <line x1="80" y1="178" x2="140" y2="178" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="140,171 154,178 140,185" fill="#1B82E8"/>
  <text x="110" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Flux</text>
  <text x="205" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lines across boundaries show field direction</text>

  <!-- ===== Q2: QQI shim ===== -->
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">QQI shim — technique validation</text>
  <rect x="545" y="100" width="110" height="110" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="600" cy="155" r="30" fill="none" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="570" y1="155" x2="630" y2="155" stroke="#5A6B7E" stroke-width="3"/>
  <line x1="600" y1="125" x2="600" y2="185" stroke="#5A6B7E" stroke-width="3"/>
  <rect x="535" y="92" width="34" height="14" rx="3" fill="#F2A33C" transform="rotate(-35 552 99)"/>
  <rect x="631" y="92" width="34" height="14" rx="3" fill="#F2A33C" transform="rotate(35 648 99)"/>
  <text x="600" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Etched notches taped notch-side DOWN</text>
  <text x="690" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">tape on</text>
  <text x="690" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">corners only</text>

  <!-- ===== Q3: Hall-effect gaussmeter ===== -->
  <text x="205" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Hall-effect gaussmeter — quantitative</text>
  <rect x="80" y="296" width="150" height="96" rx="8" fill="#0A2342"/>
  <rect x="94" y="310" width="122" height="42" rx="5" fill="#E8F1FB"/>
  <text x="155" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">38 G</text>
  <text x="155" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#FFFFFF">tangential probe</text>
  <path d="M 230 344 Q 280 350 305 380" fill="none" stroke="#5A6B7E" stroke-width="4"/>
  <rect x="296" y="376" width="44" height="12" rx="4" fill="#0A2342" transform="rotate(24 318 382)"/>
  <line x1="60" y1="404" x2="350" y2="404" stroke="#5A6B7E" stroke-width="3"/>
  <text x="205" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Shot-time surface field: 30–60 G typical</text>

  <!-- ===== Q4: pocket field indicator ===== -->
  <text x="600" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">Field indicator — residual checks</text>
  <circle cx="600" cy="352" r="58" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- scale arc ticks -->
  <line x1="552" y1="328" x2="562" y2="334" stroke="#0A2342" stroke-width="2"/>
  <line x1="576" y1="308" x2="582" y2="318" stroke="#0A2342" stroke-width="2"/>
  <line x1="600" y1="300" x2="600" y2="312" stroke="#0A2342" stroke-width="2"/>
  <line x1="624" y1="308" x2="618" y2="318" stroke="#0A2342" stroke-width="2"/>
  <line x1="648" y1="328" x2="638" y2="334" stroke="#0A2342" stroke-width="2"/>
  <text x="548" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">-10</text>
  <text x="600" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0</text>
  <text x="652" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">+10</text>
  <!-- needle at +2 -->
  <line x1="600" y1="352" x2="612" y2="306" stroke="#D14343" stroke-width="3"/>
  <circle cx="600" cy="352" r="5" fill="#0A2342"/>
  <text x="600" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">After demag: ≤ 3 G typical (earth ≈ 0.5 G)</text>
</svg>
