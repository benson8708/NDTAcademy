<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Flux Density B and Permeability µ = B / H</text>

  <!-- ===== Left: flux density = flux per unit area ===== -->
  <!-- large area, spread flux -->
  <rect x="80" y="95" width="150" height="120" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <g stroke="#1B82E8" stroke-width="2.5">
    <line x1="50" y1="110" x2="260" y2="110"/>
    <line x1="50" y1="130" x2="260" y2="130"/>
    <line x1="50" y1="150" x2="260" y2="150"/>
    <line x1="50" y1="170" x2="260" y2="170"/>
    <line x1="50" y1="190" x2="260" y2="190"/>
    <line x1="50" y1="208" x2="260" y2="208"/>
  </g>
  <polygon points="260,104 274,110 260,116" fill="#1B82E8"/>
  <text x="155" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">6 lines through a large area</text>
  <text x="155" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">low flux density B</text>

  <!-- small area, crowded flux -->
  <rect x="80" y="290" width="150" height="48" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <g stroke="#1B82E8" stroke-width="2.5">
    <line x1="50" y1="296" x2="260" y2="296"/>
    <line x1="50" y1="303" x2="260" y2="303"/>
    <line x1="50" y1="310" x2="260" y2="310"/>
    <line x1="50" y1="317" x2="260" y2="317"/>
    <line x1="50" y1="324" x2="260" y2="324"/>
    <line x1="50" y1="331" x2="260" y2="331"/>
  </g>
  <polygon points="260,290 274,296 260,302" fill="#1B82E8"/>
  <text x="155" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">same 6 lines, smaller area</text>
  <text x="155" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">high flux density B</text>

  <text x="155" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">B = flux per unit area · 10,000 gauss = 1 tesla</text>

  <!-- ===== Right: B-H curves, slope = permeability ===== -->
  <!-- axes -->
  <line x1="430" y1="380" x2="755" y2="380" stroke="#0A2342" stroke-width="3"/>
  <polygon points="755,373 770,380 755,387" fill="#0A2342"/>
  <line x1="430" y1="380" x2="430" y2="95" stroke="#0A2342" stroke-width="3"/>
  <polygon points="423,95 430,80 437,95" fill="#0A2342"/>
  <text x="745" y="408" text-anchor="end" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">magnetizing force H (oersteds)</text>
  <text x="448" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">flux density B (gauss)</text>

  <!-- steel curve: steep then saturating -->
  <path d="M 430 380 C 460 372 480 250 530 175 C 570 120 660 105 740 100" fill="none" stroke="#1E9E6A" stroke-width="4"/>
  <text x="585" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">steel — high µ</text>
  <text x="585" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">(flattens at saturation)</text>

  <!-- air / paramagnetic line: nearly flat -->
  <line x1="430" y1="380" x2="740" y2="352" stroke="#5A6B7E" stroke-width="3.5"/>
  <text x="600" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">air, aluminum — µ ≈ 1</text>

  <!-- slope annotation -->
  <line x1="475" y1="330" x2="538" y2="265" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="552" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">slope = µ = B/H</text>

  <text x="595" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Same applied H — steel carries far more flux</text>
</svg>
