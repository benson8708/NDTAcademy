<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The MT Equipment Lineup</text>

  <!-- ============ Panel 1: wet horizontal bench ============ -->
  <rect x="40" y="225" width="220" height="45" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="52" y="155" width="44" height="70" fill="#0A2342"/>
  <rect x="204" y="155" width="44" height="70" fill="#0A2342"/>
  <!-- part between heads -->
  <rect x="96" y="175" width="108" height="30" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- built-in coil around the part -->
  <ellipse cx="150" cy="190" rx="11" ry="36" fill="none" stroke="#1B82E8" stroke-width="5"/>
  <!-- bath hose and drops -->
  <path d="M 110 130 Q 124 148 122 168" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <circle cx="122" cy="172" r="3" fill="#F2A33C"/>
  <circle cx="128" cy="170" r="2.5" fill="#F2A33C"/>
  <text x="150" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Stationary wet bench</text>
  <text x="150" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">head + coil shots, bath,</text>
  <text x="150" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">selectable AC / HWDC / FWDC</text>

  <!-- ============ Panel 2: portable yoke ============ -->
  <path d="M 332 222 L 332 160 Q 332 118 400 118 Q 468 118 468 160 L 468 222" fill="none" stroke="#5A6B7E" stroke-width="24"/>
  <rect x="318" y="222" width="28" height="22" fill="#0A2342"/>
  <rect x="454" y="222" width="28" height="22" fill="#0A2342"/>
  <!-- test plate -->
  <rect x="300" y="244" width="200" height="26" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- flux between poles through the plate -->
  <path d="M 332 250 Q 400 282 468 250" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="452,254 468,250 456,263" fill="#1B82E8"/>
  <text x="400" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Portable yoke</text>
  <text x="400" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">field between the poles —</text>
  <text x="400" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">lift check 10 lb AC / 40 lb DC</text>

  <!-- ============ Panel 3: prods ============ -->
  <rect x="540" y="244" width="220" height="26" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <!-- weld bead -->
  <rect x="645" y="244" width="10" height="26" fill="#5A6B7E"/>
  <!-- prods -->
  <line x1="585" y1="160" x2="603" y2="242" stroke="#0A2342" stroke-width="8"/>
  <line x1="715" y1="160" x2="697" y2="242" stroke="#0A2342" stroke-width="8"/>
  <circle cx="585" cy="155" r="8" fill="#5A6B7E"/>
  <circle cx="715" cy="155" r="8" fill="#5A6B7E"/>
  <!-- current path between prod tips -->
  <path d="M 603 250 Q 650 266 697 250" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="5 4"/>
  <polygon points="683,253 697,250 687,262" fill="#F2A33C"/>
  <text x="650" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Prods</text>
  <text x="650" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">circular field around current —</text>
  <text x="650" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">≈ 90–125 A per inch of spacing</text>

  <!-- ============ verification + demag strip ============ -->
  <line x1="40" y1="360" x2="760" y2="360" stroke="#D9E0E8" stroke-width="2"/>
  <!-- pie gauge icon -->
  <polygon points="62,384 76,378 90,384 96,398 90,412 76,418 62,412 56,398" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <line x1="62" y1="384" x2="90" y2="412" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="90" y1="384" x2="62" y2="412" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="56" y1="398" x2="96" y2="398" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="76" y1="378" x2="76" y2="418" stroke="#0A2342" stroke-width="1.5"/>
  <text x="112" y="395" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Verification:</text>
  <text x="112" y="416" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">pie gauge · QQI shims · gaussmeter (30–60 G typical) · ring standard</text>

  <text x="478" y="395" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Lighting + demag:</text>
  <text x="478" y="416" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">UV radiometer, white-light meter · AC step-down, verify ≤ 3 G</text>
</svg>
