<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Indication Disposition</text>

  <!-- start -->
  <rect x="320" y="52" width="160" height="38" rx="19" fill="#0A2342"/>
  <text x="400" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Indication appears</text>
  <line x1="400" y1="90" x2="400" y2="112" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="394,112 400,122 406,112" fill="#5A6B7E"/>

  <!-- diamond 1 -->
  <polygon points="400,122 552,162 400,202 248,162" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Repeats after wipe</text>
  <text x="400" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">and re-test?</text>

  <line x1="248" y1="162" x2="206" y2="162" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="206,156 196,162 206,168" fill="#5A6B7E"/>
  <text x="227" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">no</text>

  <!-- false box -->
  <rect x="36" y="126" width="160" height="72" rx="6" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="116" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">FALSE</text>
  <text x="116" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">clean · fix technique</text>
  <text x="116" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">re-examine</text>

  <line x1="400" y1="202" x2="400" y2="222" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="394,222 400,232 406,222" fill="#5A6B7E"/>
  <text x="416" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">yes</text>

  <!-- diamond 2 -->
  <polygon points="400,232 562,272 400,312 238,272" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Explained by geometry</text>
  <text x="400" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">or structure?</text>

  <line x1="562" y1="272" x2="600" y2="272" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="600,266 610,272 600,278" fill="#5A6B7E"/>
  <text x="583" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">yes</text>

  <!-- nonrelevant box -->
  <rect x="610" y="236" width="172" height="72" rx="6" fill="#FFFFFF" stroke="#F2A33C" stroke-width="2.5"/>
  <text x="696" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">NONRELEVANT</text>
  <text x="696" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">confirm the cause</text>
  <text x="696" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">note on the report</text>

  <line x1="400" y1="312" x2="400" y2="330" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="394,330 400,340 406,330" fill="#5A6B7E"/>
  <text x="416" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">no</text>

  <!-- relevant box -->
  <rect x="270" y="340" width="260" height="56" rx="6" fill="#1B82E8"/>
  <text x="400" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">RELEVANT: measure + classify</text>
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">compare to acceptance criteria</text>

  <!-- split arrows -->
  <polyline points="400,396 400,408 205,408 205,416" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="199,416 205,426 211,416" fill="#5A6B7E"/>
  <polyline points="400,408 600,408 600,416" fill="none" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="594,416 600,426 606,416" fill="#5A6B7E"/>
  <text x="288" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">meets criteria</text>
  <text x="512" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">exceeds criteria</text>

  <!-- accept box -->
  <rect x="80" y="424" width="250" height="22" rx="4" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="205" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">ACCEPT — document, release</text>

  <!-- reject box -->
  <rect x="462" y="424" width="276" height="22" rx="4" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">REJECT — mark, repair, re-test</text>
</svg>
