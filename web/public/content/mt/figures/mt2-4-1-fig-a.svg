<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">MT Equipment Classes: Portable, Mobile, Stationary</text>

  <!-- ===== panel frames ===== -->
  <rect x="25" y="58" width="240" height="340" rx="8" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="280" y="58" width="240" height="340" rx="8" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="535" y="58" width="240" height="340" rx="8" fill="none" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== PORTABLE panel ===== -->
  <text x="145" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Portable</text>
  <text x="145" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">carried to the work</text>

  <!-- yoke arch and legs -->
  <path d="M 105 200 Q 145 130 185 200" fill="none" stroke="#0A2342" stroke-width="16"/>
  <rect x="97" y="195" width="16" height="45" fill="#0A2342"/>
  <rect x="177" y="195" width="16" height="45" fill="#0A2342"/>
  <!-- coil winding ticks on the arch -->
  <line x1="128" y1="150" x2="136" y2="168" stroke="#F2A33C" stroke-width="3"/>
  <line x1="141" y1="146" x2="147" y2="165" stroke="#F2A33C" stroke-width="3"/>
  <line x1="154" y1="148" x2="160" y2="167" stroke="#F2A33C" stroke-width="3"/>
  <!-- test plate -->
  <rect x="75" y="240" width="140" height="14" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- flux arcs pole to pole -->
  <path d="M 105 247 Q 145 272 185 247" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 105 252 Q 145 286 185 252" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="145" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">field runs pole-to-pole</text>

  <text x="38" y="312" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">AC/DC + permanent yokes</text>
  <text x="38" y="334" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">prod packs to &#8776; 1,500 A</text>
  <text x="38" y="356" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">lift: 10 lb AC / 40 lb DC</text>
  <text x="38" y="378" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">overlapping local coverage</text>

  <!-- ===== MOBILE panel ===== -->
  <text x="400" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Mobile</text>
  <text x="400" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">wheeled to the work</text>

  <!-- power pack body -->
  <line x1="330" y1="140" x2="306" y2="118" stroke="#0A2342" stroke-width="4"/>
  <rect x="330" y="130" width="130" height="85" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="362" cy="158" r="15" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <line x1="362" y1="158" x2="371" y2="148" stroke="#D14343" stroke-width="2"/>
  <circle cx="420" cy="158" r="11" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <line x1="420" y1="158" x2="420" y2="148" stroke="#0A2342" stroke-width="2"/>
  <line x1="345" y1="190" x2="445" y2="190" stroke="#5A6B7E" stroke-width="2"/>
  <line x1="345" y1="198" x2="445" y2="198" stroke="#5A6B7E" stroke-width="2"/>
  <!-- wheels -->
  <circle cx="352" cy="228" r="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="438" cy="228" r="14" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- cable to clamp on plate -->
  <rect x="395" y="256" width="110" height="12" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <path d="M 460 170 C 510 185 505 232 452 246" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <rect x="440" y="242" width="20" height="16" fill="#0A2342"/>
  <text x="316" y="280" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flexible-cable techniques</text>

  <text x="292" y="312" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2,000&#8211;6,000 A typical</text>
  <text x="292" y="334" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">cables: wraps, clamps,</text>
  <text x="292" y="356" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">central conductors</text>
  <text x="292" y="378" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">AC / HWDC + demag</text>

  <!-- ===== STATIONARY panel ===== -->
  <text x="655" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Stationary</text>
  <text x="655" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">work comes to it</text>

  <!-- UV hood -->
  <path d="M 552 160 Q 657 96 762 160" fill="none" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="657" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">UV hood</text>
  <!-- bath nozzle -->
  <path d="M 600 142 L 618 142 L 612 156 Z" fill="#1E9E6A"/>
  <line x1="608" y1="160" x2="604" y2="172" stroke="#1E9E6A" stroke-width="2"/>
  <line x1="614" y1="160" x2="614" y2="174" stroke="#1E9E6A" stroke-width="2"/>
  <!-- bench -->
  <rect x="560" y="170" width="24" height="65" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="730" y="170" width="24" height="65" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="584" y="188" width="146" height="28" rx="12" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <ellipse cx="640" cy="202" rx="9" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="664" cy="202" rx="9" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="688" cy="202" rx="9" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <rect x="550" y="235" width="215" height="55" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="580" cy="262" r="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="602" cy="262" r="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <text x="547" y="312" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">3,000&#8211;6,000 A typical</text>
  <text x="547" y="334" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">AC / HWDC / FWDC</text>
  <text x="547" y="356" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">head shot + coil + bath</text>
  <text x="547" y="378" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">hood, demag, automation</text>

  <!-- ===== reasons row ===== -->
  <text x="145" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Reason: part can&#8217;t move</text>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Reason: bench power, on site</text>
  <text x="655" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Reason: volume + control</text>
</svg>
