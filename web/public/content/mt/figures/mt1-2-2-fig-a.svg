<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Magnetic Domains: Scrambled vs. Aligned</text>

  <!-- ===== Left panel: unmagnetized ===== -->
  <rect x="60" y="110" width="300" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- 12 domain cells with randomly oriented arrows -->
  <g stroke="#0A2342" stroke-width="3" fill="#0A2342">
    <g transform="translate(110,150) rotate(35)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(210,150) rotate(290)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(310,150) rotate(120)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(110,225) rotate(200)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(210,225) rotate(75)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(310,225) rotate(340)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(110,300) rotate(160)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(210,300) rotate(15)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(310,300) rotate(250)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(160,188) rotate(100)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(260,188) rotate(305)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(160,263) rotate(55)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(260,263) rotate(220)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
  </g>
  <text x="210" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Unmagnetized part</text>
  <text x="210" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">domains point randomly — fields cancel</text>
  <text x="210" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">no external poles</text>

  <!-- ===== Right panel: magnetized ===== -->
  <!-- applied field H arrow above the panel -->
  <line x1="440" y1="88" x2="710" y2="88" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="710,79 732,88 710,97" fill="#F2A33C"/>
  <text x="575" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">applied magnetizing force H</text>

  <rect x="440" y="110" width="300" height="230" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- 12 aligned arrows -->
  <g stroke="#1E9E6A" stroke-width="3" fill="#1E9E6A">
    <g transform="translate(495,150)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(590,150)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(685,150)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(495,225)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(590,225)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(685,225)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(495,300)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(590,300)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(685,300)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(542,188)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(637,188)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(542,263)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
    <g transform="translate(637,263)"><line x1="-16" y1="0" x2="10" y2="0"/><polygon points="10,-6 24,0 10,6" stroke="none"/></g>
  </g>
  <!-- poles that appear on the magnetized part -->
  <text x="425" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#1B82E8">S</text>
  <text x="757" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#D14343">N</text>

  <text x="590" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Magnetized part</text>
  <text x="590" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">domains grow and rotate into line — fields add</text>
  <text x="590" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">poles appear; all aligned = saturation</text>
</svg>
