<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Offset Central Conductor: Coverage on a 12-in-Bore Ring Gear</text>

  <!-- panel divider -->
  <line x1="425" y1="56" x2="425" y2="380" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== LEFT: end view of ring gear on offset bar ===== -->
  <!-- gear teeth -->
  <g fill="#D9E0E8" stroke="#0A2342" stroke-width="1.5">
    <rect x="210" y="80" width="16" height="18" rx="2"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(15 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(30 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(45 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(60 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(75 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(90 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(105 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(120 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(135 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(150 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(165 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(180 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(195 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(210 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(225 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(240 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(255 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(270 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(285 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(300 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(315 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(330 218 235)"/>
    <rect x="210" y="80" width="16" height="18" rx="2" transform="rotate(345 218 235)"/>
  </g>
  <!-- gear body and bore -->
  <circle cx="218" cy="235" r="138" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="218" cy="235" r="88" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>

  <!-- effective coverage band (annular sector at bottom) -->
  <path d="M 282.8 356.8 A 138 138 0 0 1 153.2 356.8 L 176.7 312.7 A 88 88 0 0 0 259.3 312.7 Z" fill="#1B82E8" opacity="0.28"/>
  <line x1="259.3" y1="312.7" x2="288.4" y2="367.4" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="176.7" y1="312.7" x2="147.6" y2="367.4" stroke="#0A2342" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- flux circles around conductor (falling off with distance) -->
  <circle cx="218" cy="308" r="20" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <circle cx="218" cy="308" r="34" fill="none" stroke="#1B82E8" stroke-width="2.5" opacity="0.7"/>
  <circle cx="218" cy="308" r="46" fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.45"/>
  <circle cx="218" cy="308" r="58" fill="none" stroke="#1B82E8" stroke-width="1.8" opacity="0.25"/>
  <polygon points="233,314 238,300 243,314" fill="#1B82E8"/>

  <!-- insulated copper bar (offset, bore resting on it) -->
  <circle cx="218" cy="308" r="15" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="218" cy="308" r="11" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="218" cy="308" r="3" fill="#0A2342"/>

  <!-- QQI shims at band edges -->
  <rect x="171.7" y="307.7" width="10" height="10" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <rect x="254.3" y="307.7" width="10" height="10" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>

  <!-- bore annotations -->
  <text x="218" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">flux falls off</text>
  <text x="218" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B82E8">away from the bar</text>
  <text x="218" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">QQI at each band edge</text>
  <text x="218" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E9E6A">(field weakest &#8212; prove it)</text>
  <line x1="198" y1="238" x2="180" y2="302" stroke="#5A6B7E" stroke-width="1"/>
  <line x1="238" y1="238" x2="256" y2="302" stroke="#5A6B7E" stroke-width="1"/>

  <!-- rotation arrow -->
  <path d="M 314.4 97.4 A 168 168 0 0 1 382.3 200.1" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <polygon points="376,201 388,199 385,212" fill="#1E9E6A"/>
  <text x="290" y="66" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">rotate gear</text>
  <text x="290" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E9E6A">between shots</text>

  <!-- left captions -->
  <text x="218" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">effective band &#8776; 4 &#215; bar &#216; &#8776; 6 in per shot</text>
  <text x="218" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">insulated 1.5-in Cu bar &#183; current out of page &#183; bore rests on bar</text>

  <!-- ===== RIGHT: unrolled bore coverage plan ===== -->
  <text x="610" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Unroll the bore: &#960; &#215; 12 in &#8776; 37.7 in</text>

  <text x="450" y="104" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">0 in</text>
  <text x="770" y="104" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">37.7 in</text>
  <rect x="450" y="110" width="320" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>

  <!-- 7 overlapping shot bands (~10% overlap), band 7 wraps past the seam -->
  <g fill="#1B82E8" fill-opacity="0.3" stroke="#1B82E8" stroke-width="1.5">
    <rect x="450.0" y="118" width="50.9" height="30" rx="4"/>
    <rect x="495.7" y="150" width="50.9" height="30" rx="4"/>
    <rect x="541.4" y="118" width="50.9" height="30" rx="4"/>
    <rect x="587.1" y="150" width="50.9" height="30" rx="4"/>
    <rect x="632.9" y="118" width="50.9" height="30" rx="4"/>
    <rect x="678.6" y="150" width="50.9" height="30" rx="4"/>
    <rect x="724.3" y="118" width="50.9" height="30" rx="4"/>
  </g>
  <text x="475" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">1</text>
  <text x="521" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">2</text>
  <text x="567" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">3</text>
  <text x="613" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">4</text>
  <text x="658" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">5</text>
  <text x="704" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">6</text>
  <text x="750" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">7</text>

  <text x="610" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">each shot covers &#8776; 6 in of circumference,</text>
  <text x="610" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">advance &#8776; 5.4 in &#8594; &#8776; 10 % overlap</text>

  <!-- coverage math box -->
  <rect x="455" y="252" width="310" height="116" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="610" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Coverage math</text>
  <text x="610" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">band = 4 &#215; bar &#216; = 4 &#215; 1.5 in = 6 in</text>
  <text x="610" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">37.7 in &#247; 6 in &#8776; 6.3 &#8594; at least 7 zones</text>
  <text x="610" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0A2342">with &#8776; 10 % overlap &#8594; plan 7&#8211;8 shots</text>

  <text x="610" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">after each shot: inspect &amp; record,</text>
  <text x="610" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5A6B7E">then rotate the gear to the next band</text>
</svg>
