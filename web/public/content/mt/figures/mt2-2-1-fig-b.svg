<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Coil Shot and the L/D Rule</text>

  <!-- return flux (outside, dashed) -->
  <path d="M 180 245 C 120 110 680 110 620 245" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 6" opacity="0.8"/>
  <path d="M 180 255 C 120 390 680 390 620 255" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 6" opacity="0.8"/>

  <!-- part -->
  <rect x="180" y="215" width="440" height="70" rx="8" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>

  <!-- flux along axis inside part -->
  <line x1="205" y1="250" x2="585" y2="250" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="585,242 603,250 585,258" fill="#1B82E8"/>
  <text x="400" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flux along the axis</text>

  <!-- poles -->
  <text x="163" y="256" text-anchor="end" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F2A33C">S</text>
  <text x="637" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F2A33C">N</text>

  <!-- 5-turn coil -->
  <ellipse cx="240" cy="250" rx="16" ry="68" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <ellipse cx="310" cy="250" rx="16" ry="68" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <ellipse cx="380" cy="250" rx="16" ry="68" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <ellipse cx="450" cy="250" rx="16" ry="68" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <ellipse cx="520" cy="250" rx="16" ry="68" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <text x="380" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">5-turn coil - current circles the part</text>
  <line x1="380" y1="155" x2="380" y2="178" stroke="#F2A33C" stroke-width="1.5"/>

  <!-- transverse flaw detected -->
  <line x1="490" y1="215" x2="490" y2="232" stroke="#D14343" stroke-width="4"/>
  <circle cx="484" cy="212" r="3" fill="#1E9E6A"/>
  <circle cx="496" cy="212" r="3" fill="#1E9E6A"/>
  <circle cx="490" cy="207" r="3" fill="#1E9E6A"/>
  <text x="558" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">transverse flaw - detected</text>
  <line x1="520" y1="196" x2="494" y2="212" stroke="#D14343" stroke-width="1.5"/>

  <!-- L dimension -->
  <line x1="180" y1="330" x2="620" y2="330" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="190,324 178,330 190,336" fill="#D9E0E8"/>
  <polygon points="610,324 622,330 610,336" fill="#D9E0E8"/>
  <text x="400" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D9E0E8">L (part length)</text>

  <!-- D dimension -->
  <line x1="660" y1="215" x2="660" y2="285" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="654,225 660,213 666,225" fill="#D9E0E8"/>
  <polygon points="654,275 660,287 666,275" fill="#D9E0E8"/>
  <text x="676" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D9E0E8">D</text>

  <!-- formula box -->
  <rect x="60" y="378" width="680" height="56" rx="8" fill="#11315A" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#E8F1FB">NI = 45,000 / (L/D)   ampere-turns, low fill factor</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">valid for L/D = 2 to 15 - magnetize long parts in 18 in. sections - procedure governs</text>

  <!-- ammeter -->
  <circle cx="95" cy="120" r="26" fill="#11315A" stroke="#1E9E6A" stroke-width="3"/>
  <text x="95" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E9E6A">A</text>
  <text x="95" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">read the meter</text>
</svg>
