<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Field Verification: Direction and Strength</text>

  <!-- part surface band -->
  <rect x="50" y="270" width="700" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="400" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Part surface during magnetization — flux direction shown by green arrow</text>

  <!-- flux direction arrow across part -->
  <line x1="80" y1="252" x2="700" y2="252" stroke="#1E9E6A" stroke-width="4"/>
  <polygon points="696,244 720,252 696,260" fill="#1E9E6A"/>
  <text x="120" y="238" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Flux direction</text>

  <!-- PIE GAUGE -->
  <g>
    <circle cx="190" cy="150" r="58" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
    <line x1="132" y1="150" x2="248" y2="150" stroke="#0A2342" stroke-width="2"/>
    <line x1="190" y1="92" x2="190" y2="208" stroke="#0A2342" stroke-width="2"/>
    <line x1="149" y1="109" x2="231" y2="191" stroke="#0A2342" stroke-width="2"/>
    <line x1="231" y1="109" x2="149" y2="191" stroke="#0A2342" stroke-width="2"/>
    <!-- particle build on boundaries crossing flux (vertical-ish lines) -->
    <line x1="190" y1="98" x2="190" y2="202" stroke="#D14343" stroke-width="5"/>
    <line x1="154" y1="114" x2="226" y2="186" stroke="#D14343" stroke-width="3.5" opacity="0.7"/>
    <line x1="226" y1="114" x2="154" y2="186" stroke="#D14343" stroke-width="3.5" opacity="0.7"/>
    <text x="190" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Pie (octagon) gauge</text>
    <line x1="190" y1="208" x2="190" y2="268" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="190" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6B7E"> </text>
  </g>
  <text x="190" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Particles build on boundaries crossing</text>
  <text x="190" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the flux → shows direction, qualitative</text>

  <!-- QQI SHIM -->
  <g>
    <rect x="350" y="110" width="120" height="84" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
    <circle cx="410" cy="152" r="26" fill="none" stroke="#D14343" stroke-width="3.5"/>
    <line x1="384" y1="152" x2="436" y2="152" stroke="#D14343" stroke-width="3.5"/>
    <text x="410" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">QQI shim</text>
    <line x1="410" y1="194" x2="410" y2="268" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <!-- tape corners -->
    <rect x="344" y="104" width="26" height="14" fill="#F2A33C" transform="rotate(-35 357 111)"/>
    <rect x="450" y="104" width="26" height="14" fill="#F2A33C" transform="rotate(35 463 111)"/>
  </g>
  <text x="410" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Etched flaw taped FACE DOWN — crisp</text>
  <text x="410" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">indication proves adequacy + orientation</text>

  <!-- HALL PROBE -->
  <g>
    <rect x="580" y="84" width="120" height="70" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
    <text x="640" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">42 G</text>
    <text x="640" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">gaussmeter</text>
    <line x1="640" y1="154" x2="640" y2="248" stroke="#0A2342" stroke-width="6"/>
    <rect x="626" y="248" width="28" height="22" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
    <text x="640" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Hall-effect probe</text>
  </g>
  <text x="640" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reads tangential surface field —</text>
  <text x="640" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">commonly ~30–60 G when measured</text>
</svg>
