<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Field In and Around Current-Carrying Parts</text>

  <!-- LEFT: solid bar cross-section -->
  <circle cx="190" cy="140" r="50" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="190" cy="140" r="64" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="190" cy="140" r="80" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="190" cy="140" r="6" fill="#0A2342"/>
  <text x="190" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Solid bar - head shot</text>
  <text x="293" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flux circles</text>
  <line x1="288" y1="125" x2="262" y2="133" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="86" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">current I</text>
  <line x1="100" y1="98" x2="182" y2="136" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- LEFT: B vs r graph -->
  <line x1="80" y1="400" x2="370" y2="400" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="80" y1="400" x2="80" y2="255" stroke="#0A2342" stroke-width="2.5"/>
  <text x="68" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">B</text>
  <text x="230" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">distance from centerline</text>
  <line x1="190" y1="400" x2="190" y2="262" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="190" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">surface</text>
  <polyline points="80,400 190,275" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <path d="M 190 275 Q 240 360 370 388" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <circle cx="190" cy="275" r="6" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="98" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">zero at center</text>
  <text x="206" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">max at surface</text>

  <!-- RIGHT: hollow part cross-section -->
  <circle cx="590" cy="140" r="50" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <circle cx="590" cy="140" r="26" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <circle cx="590" cy="140" r="64" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="554" cy="115" r="3.5" fill="#0A2342"/>
  <circle cx="626" cy="115" r="3.5" fill="#0A2342"/>
  <circle cx="554" cy="165" r="3.5" fill="#0A2342"/>
  <circle cx="626" cy="165" r="3.5" fill="#0A2342"/>
  <text x="590" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Hollow part - direct shot</text>
  <text x="694" y="104" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">current in wall</text>
  <line x1="690" y1="110" x2="630" y2="118" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="590" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">bore</text>

  <!-- RIGHT: B vs r graph -->
  <line x1="480" y1="400" x2="770" y2="400" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="480" y1="400" x2="480" y2="255" stroke="#0A2342" stroke-width="2.5"/>
  <text x="468" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">B</text>
  <text x="630" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">distance from centerline</text>
  <line x1="540" y1="400" x2="540" y2="290" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="540" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">ID</text>
  <line x1="600" y1="400" x2="600" y2="262" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="600" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">OD</text>
  <polyline points="480,399 540,399" fill="none" stroke="#D14343" stroke-width="4"/>
  <polyline points="540,399 600,275" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <path d="M 600 275 Q 650 360 770 388" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <text x="620" y="383" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">B near zero at ID</text>
  <text x="612" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">max at OD</text>

  <!-- divider -->
  <line x1="412" y1="60" x2="412" y2="430" stroke="#D9E0E8" stroke-width="2"/>
</svg>
