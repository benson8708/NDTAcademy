<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Residual Fields: Longitudinal vs Circular</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="400" stroke="#D9E0E8" stroke-width="2"/>

  <!-- LEFT: longitudinal -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Longitudinal residual field</text>

  <rect x="100" y="180" width="200" height="56" rx="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="120" y="215" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">S</text>
  <text x="272" y="215" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">N</text>

  <!-- external flux loops pole to pole -->
  <path d="M 300 195 C 380 120 120 120 100 195" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <path d="M 300 222 C 420 90 -20 90 100 222" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="196,138 210,132 204,146" fill="#1E9E6A"/>
  <text x="200" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">External leakage flux</text>

  <!-- field indicator deflecting -->
  <circle cx="330" cy="300" r="34" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="330" y1="300" x2="352" y2="276" stroke="#D14343" stroke-width="3"/>
  <line x1="330" y1="334" x2="330" y2="310" stroke="#0A2342" stroke-width="2"/>
  <text x="330" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Indicator deflects</text>
  <line x1="312" y1="270" x2="296" y2="240" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Poles at the ends — easy to detect,</text>
  <text x="200" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">easy for a demag coil to remove</text>

  <!-- RIGHT: circular -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Circular residual field</text>

  <rect x="500" y="180" width="200" height="56" rx="6" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <!-- contained flux rings -->
  <ellipse cx="540" cy="208" rx="10" ry="22" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <ellipse cx="580" cy="208" rx="10" ry="22" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <ellipse cx="620" cy="208" rx="10" ry="22" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <ellipse cx="660" cy="208" rx="10" ry="22" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Flux in closed rings inside the part —</text>
  <text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">no external poles, almost no leakage</text>

  <!-- field indicator near zero -->
  <circle cx="730" cy="300" r="34" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="730" y1="300" x2="730" y2="268" stroke="#D14343" stroke-width="3"/>
  <line x1="730" y1="334" x2="730" y2="310" stroke="#0A2342" stroke-width="2"/>
  <text x="712" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reads near zero</text>

  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Trap: part can still be strongly magnetized inside.</text>
  <text x="600" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fix: magnetize longitudinally first, then demag and verify</text>
</svg>
