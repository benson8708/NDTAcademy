<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">A Short History of Magnetic Particle Testing</text>

  <!-- timeline axis -->
  <line x1="60" y1="250" x2="738" y2="250" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="738,242 756,250 738,258" fill="#5A6B7E"/>

  <!-- milestone dots -->
  <circle cx="110" cy="250" r="10" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="255" cy="250" r="10" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="400" cy="250" r="10" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="545" cy="250" r="10" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <circle cx="690" cy="250" r="10" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>

  <!-- leaders -->
  <line x1="110" y1="238" x2="110" y2="166" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="255" y1="262" x2="255" y2="300" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="400" y1="238" x2="400" y2="166" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="545" y1="262" x2="545" y2="300" stroke="#D9E0E8" stroke-width="2"/>
  <line x1="690" y1="238" x2="690" y2="166" stroke="#D9E0E8" stroke-width="2"/>

  <!-- 1868 (above) -->
  <text x="110" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">1868</text>
  <text x="110" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Saxby: compass needle</text>
  <text x="110" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">deflects over flaws in</text>
  <text x="110" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">magnetized gun barrels</text>

  <!-- c.1918 (below) -->
  <text x="255" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">c. 1918</text>
  <text x="255" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Hoke: grindings collect</text>
  <text x="255" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">at cracks on parts held</text>
  <text x="255" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">on a magnetic chuck</text>

  <!-- 1930s (above) -->
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">1930s</text>
  <text x="400" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">de Forest &amp; Doane build</text>
  <text x="400" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">the controlled method;</text>
  <text x="400" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">company founded 1934</text>

  <!-- early 1940s (below) -->
  <text x="545" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Early 1940s</text>
  <text x="545" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fluorescent particles</text>
  <text x="545" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">glow under UV light —</text>
  <text x="545" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">big sensitivity gain</text>

  <!-- today (above) -->
  <text x="690" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Today</text>
  <text x="690" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Written standards:</text>
  <text x="690" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ASTM E709 / E1444,</text>
  <text x="690" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ASME V, Article 7</text>

  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">World War II production made MT standard practice across heavy industry</text>
</svg>
