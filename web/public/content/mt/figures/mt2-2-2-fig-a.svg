<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Flux Action at the Discontinuity</text>

  <!-- part body -->
  <rect x="70" y="190" width="660" height="170" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="700" y="345" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel part (side view)</text>

  <!-- flux direction arrow -->
  <line x1="90" y1="165" x2="180" y2="165" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="180,158 196,165 180,172" fill="#1B82E8"/>
  <text x="90" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">flux direction</text>

  <!-- surface crack -->
  <polygon points="262,190 278,190 270,248" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>

  <!-- flux lines: upper lines deflect out of surface at crack -->
  <path d="M 90 215 L 240 215 Q 252 215 256 205 Q 270 172 284 205 Q 288 215 300 215 L 730 215" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 90 240 L 238 240 Q 252 240 258 226 Q 270 200 282 226 Q 288 240 302 240 L 730 240" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <!-- leakage loops above the surface -->
  <path d="M 250 190 Q 270 152 290 190" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 240 190 Q 270 134 300 190" fill="none" stroke="#F2A33C" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- poles at crack faces -->
  <text x="252" y="183" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">N</text>
  <text x="289" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">S</text>

  <!-- particles over crack -->
  <circle cx="262" cy="178" r="3.5" fill="#1E9E6A"/>
  <circle cx="270" cy="172" r="3.5" fill="#1E9E6A"/>
  <circle cx="278" cy="178" r="3.5" fill="#1E9E6A"/>
  <circle cx="270" cy="182" r="3.5" fill="#1E9E6A"/>
  <line x1="270" y1="120" x2="270" y2="100" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="270" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">surface crack: strong leakage,</text>
  <text x="270" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">sharp tight indication</text>

  <!-- subsurface flaw -->
  <ellipse cx="555" cy="282" rx="34" ry="14" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <text x="555" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">subsurface flaw</text>

  <!-- flux lines bending around subsurface flaw -->
  <path d="M 90 268 L 495 268 Q 520 268 530 260 Q 555 246 580 260 Q 590 268 615 268 L 730 268" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 90 298 L 495 298 Q 520 298 530 306 Q 555 318 580 306 Q 590 298 615 298 L 730 298" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <!-- weak broad leakage above -->
  <path d="M 495 190 Q 555 168 615 190" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="4 5"/>
  <line x1="555" y1="160" x2="555" y2="138" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="555" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">weak, broad leakage:</text>
  <text x="555" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">fuzzy indication</text>

  <!-- legend -->
  <line x1="90" y1="408" x2="130" y2="408" stroke="#1B82E8" stroke-width="3"/>
  <text x="138" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flux in steel</text>
  <line x1="270" y1="408" x2="310" y2="408" stroke="#F2A33C" stroke-width="3"/>
  <text x="318" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">leakage field</text>
  <circle cx="470" cy="408" r="4" fill="#1E9E6A"/>
  <text x="482" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">particles held at poles</text>
</svg>
