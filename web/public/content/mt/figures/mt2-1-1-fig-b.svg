<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Two Shots, Full Coverage: Circular vs Longitudinal</text>

  <line x1="400" y1="60" x2="400" y2="380" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ================= LEFT: head shot, circular field ================= -->
  <text x="200" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">CIRCULAR — current through the part</text>

  <!-- contact heads -->
  <rect x="38" y="185" width="26" height="100" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="336" y="185" width="26" height="100" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="51" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">head</text>
  <text x="349" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">head</text>

  <!-- bar -->
  <rect x="64" y="200" width="272" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- current arrow through the bar -->
  <line x1="80" y1="235" x2="300" y2="235" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="300,228 320,235 300,242" fill="#F2A33C"/>
  <text x="160" y="258" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">current I</text>

  <!-- circular flux rings around the bar -->
  <ellipse cx="120" cy="235" rx="16" ry="56" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <ellipse cx="200" cy="235" rx="16" ry="56" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <ellipse cx="280" cy="235" rx="16" ry="56" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="200" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux wraps around the bar</text>

  <!-- longitudinal flaw (detected) -->
  <line x1="140" y1="206" x2="240" y2="206" stroke="#D14343" stroke-width="4"/>
  <line x1="190" y1="206" x2="148" y2="345" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="140" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">longitudinal flaw — FOUND</text>

  <!-- transverse flaw (missed) -->
  <line x1="305" y1="204" x2="305" y2="240" stroke="#5A6B7E" stroke-width="4"/>
  <line x1="305" y1="240" x2="318" y2="345" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="305" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">transverse — missed</text>

  <!-- ================= RIGHT: coil shot, longitudinal field ================= -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">LONGITUDINAL — flux along the part</text>

  <!-- bar -->
  <rect x="455" y="200" width="290" height="70" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- coil turns -->
  <ellipse cx="490" cy="235" rx="13" ry="62" fill="none" stroke="#5A6B7E" stroke-width="6"/>
  <ellipse cx="530" cy="235" rx="13" ry="62" fill="none" stroke="#5A6B7E" stroke-width="6"/>
  <ellipse cx="570" cy="235" rx="13" ry="62" fill="none" stroke="#5A6B7E" stroke-width="6"/>
  <text x="530" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">coil — NI ≈ 45,000 / (L/D)</text>

  <!-- flux along the bar -->
  <line x1="600" y1="222" x2="715" y2="222" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="715,216 731,222 715,228" fill="#1B82E8"/>
  <line x1="600" y1="250" x2="715" y2="250" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="715,244 731,250 715,256" fill="#1B82E8"/>
  <text x="660" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux runs along the axis</text>

  <!-- transverse flaw (detected) -->
  <line x1="640" y1="202" x2="640" y2="238" stroke="#D14343" stroke-width="4"/>
  <line x1="640" y1="202" x2="640" y2="186" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="650" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">transverse flaw — FOUND</text>

  <!-- longitudinal flaw (missed) -->
  <line x1="660" y1="264" x2="730" y2="264" stroke="#5A6B7E" stroke-width="4"/>
  <line x1="695" y1="264" x2="680" y2="345" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="660" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">longitudinal — missed</text>

  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">The field must cross the flaw at 45–90°.</text>
  <text x="400" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Each direction finds what the other misses — full coverage takes two roughly perpendicular magnetizations.</text>
</svg>
