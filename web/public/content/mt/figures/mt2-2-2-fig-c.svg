<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Field Depth by Current Type (bar cross sections)</text>

  <!-- waveforms -->
  <path d="M 90 105 Q 105 75 120 105 Q 135 135 150 105 Q 165 75 180 105 Q 195 135 210 105" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <text x="150" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">AC</text>

  <path d="M 330 120 Q 345 78 360 120 L 375 120 Q 390 78 405 120 L 420 120 Q 435 78 450 120" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <text x="390" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">HWDC</text>

  <path d="M 570 100 L 588 96 L 606 100 L 624 96 L 642 100 L 660 96 L 678 100 L 690 98" fill="none" stroke="#E8F1FB" stroke-width="3"/>
  <text x="630" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">FWDC</text>

  <!-- AC cross section: thin surface ring -->
  <circle cx="150" cy="250" r="85" fill="#11315A" stroke="#D9E0E8" stroke-width="2.5"/>
  <circle cx="150" cy="250" r="79" fill="none" stroke="#F2A33C" stroke-width="9"/>
  <text x="150" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">surface skin only</text>
  <text x="150" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">about 1 mm at 60 Hz</text>

  <!-- HWDC cross section: thick band -->
  <circle cx="390" cy="250" r="85" fill="#11315A" stroke="#D9E0E8" stroke-width="2.5"/>
  <circle cx="390" cy="250" r="72" fill="none" stroke="#1B82E8" stroke-width="28"/>
  <circle cx="390" cy="250" r="44" fill="none" stroke="#1B82E8" stroke-width="8" stroke-dasharray="6 6" opacity="0.6"/>
  <text x="390" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">surface + near subsurface</text>
  <text x="390" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">pulses aid dry powder</text>

  <!-- FWDC cross section: full fill -->
  <circle cx="630" cy="250" r="85" fill="#1B82E8" stroke="#D9E0E8" stroke-width="2.5"/>
  <circle cx="630" cy="250" r="58" fill="#4DA3F2"/>
  <circle cx="630" cy="250" r="30" fill="#7FBDF7"/>
  <text x="630" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7FBDF7">deepest, most uniform</text>
  <text x="630" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">bench-unit choice</text>

  <!-- footer note -->
  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">No current type makes MT volumetric - practical sensitivity fades within a few millimeters of the surface</text>
</svg>
