<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#FFFFFF">Hazard Map of the Wet Horizontal MT Station</text>

  <!-- high-current cable from headstock -->
  <path d="M 190 262 C 150 320 110 360 78 416" fill="none" stroke="#5A6B7E" stroke-width="10"/>

  <!-- bench base -->
  <rect x="140" y="260" width="470" height="70" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <!-- bath tank -->
  <rect x="250" y="330" width="250" height="48" fill="none" stroke="#D9E0E8" stroke-width="2"/>
  <path d="M 258 348 Q 285 338 315 348 Q 345 358 375 348 Q 405 338 435 348 Q 465 358 492 348" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <!-- headstock and tailstock -->
  <rect x="160" y="190" width="60" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="530" y="190" width="60" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <!-- part clamped between heads -->
  <rect x="220" y="212" width="310" height="30" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>

  <!-- bath nozzle and mist above the part -->
  <path d="M 250 178 Q 258 192 256 206" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <circle cx="268" cy="186" r="4" fill="#D9E0E8" opacity="0.8"/>
  <circle cx="280" cy="178" r="5" fill="#D9E0E8" opacity="0.6"/>
  <circle cx="293" cy="186" r="4" fill="#D9E0E8" opacity="0.8"/>

  <!-- UV lamp and beam -->
  <ellipse cx="650" cy="138" rx="28" ry="15" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="630,148 668,148 460,228" fill="#F2A33C" opacity="0.22"/>

  <!-- arc-flash marker at headstock contact -->
  <circle cx="222" cy="227" r="9" fill="#D14343"/>
  <path d="M 222 210 L 216 222 L 224 222 L 218 234" fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- flame icon at bath -->
  <path d="M 470 366 Q 462 352 472 340 Q 472 350 480 352 Q 478 342 486 334 Q 486 350 492 356 Q 496 364 488 372 Q 478 378 470 366 Z" fill="#D14343"/>

  <!-- ===== labels ===== -->
  <!-- arc flash -->
  <text x="30" y="86" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">ARC FLASH at contact heads</text>
  <text x="30" y="107" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">current OFF before breaking contact</text>
  <line x1="150" y1="115" x2="218" y2="218" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- UV lamp -->
  <text x="775" y="74" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">UV-A LAMP</text>
  <text x="775" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">never stare into it — cracked filter = stop</text>
  <line x1="700" y1="102" x2="662" y2="126" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- mechanical -->
  <text x="775" y="196" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">PINCH POINTS</text>
  <text x="775" y="217" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">pneumatic tailstock, hoisted parts</text>
  <line x1="640" y1="222" x2="592" y2="225" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- dust and mist -->
  <text x="30" y="160" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">DUST + BATH MIST</text>
  <text x="30" y="181" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">ventilation, gloves, read the SDS</text>
  <line x1="148" y1="170" x2="262" y2="182" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- oil bath flammability -->
  <text x="775" y="356" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">OIL BATH — COMBUSTIBLE</text>
  <text x="775" y="377" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">flash point per spec (≈ 200 °F);</text>
  <text x="775" y="397" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">no flames, sparks, or hot parts</text>
  <line x1="588" y1="368" x2="498" y2="358" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- cables -->
  <text x="30" y="428" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">HIGH-CURRENT CABLES</text>
  <text x="262" y="428" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">inspect insulation and lugs each shift</text>
</svg>
