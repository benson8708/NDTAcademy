<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The MT Document Hierarchy</text>

  <!-- tier 1 -->
  <rect x="220" y="64" width="360" height="62" rx="8" fill="#0A2342"/>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">DESIGN CODE / CONTRACT</text>
  <text x="400" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">when to test · coverage · acceptance criteria</text>

  <!-- connector -->
  <line x1="400" y1="126" x2="400" y2="148" stroke="#5A6B7E" stroke-width="3"/>

  <!-- tier 2 -->
  <rect x="180" y="148" width="440" height="62" rx="8" fill="#1B82E8"/>
  <text x="400" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">INDUSTRY STANDARD PRACTICES</text>
  <text x="400" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">e.g., ASTM E1444 / E709, ASME Sec. V Art. 7 — how a valid test runs</text>

  <line x1="400" y1="210" x2="400" y2="232" stroke="#5A6B7E" stroke-width="3"/>

  <!-- tier 3 -->
  <rect x="140" y="232" width="520" height="62" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">COMPANY WRITTEN PROCEDURE</text>
  <text x="400" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">your equipment, parts, forms — developed and approved by Level III</text>

  <line x1="400" y1="294" x2="400" y2="316" stroke="#5A6B7E" stroke-width="3"/>

  <!-- tier 4 -->
  <rect x="100" y="316" width="600" height="62" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="400" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">PART TECHNIQUE CARD</text>
  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">validated settings for one part: shots, amperages ± tolerance, zones</text>

  <!-- left arrow: requirements flow down -->
  <line x1="60" y1="90" x2="60" y2="330" stroke="#F2A33C" stroke-width="6"/>
  <polygon points="48,330 60,354 72,330" fill="#F2A33C"/>
  <text x="40" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C" transform="rotate(-90 40 200)">Requirements flow down</text>

  <!-- right arrow: feedback flows up -->
  <line x1="740" y1="354" x2="740" y2="114" stroke="#1E9E6A" stroke-width="6"/>
  <polygon points="728,114 740,90 752,114" fill="#1E9E6A"/>
  <text x="766" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A" transform="rotate(90 766 232)">Results + feedback flow up</text>

  <!-- bottom note -->
  <rect x="100" y="402" width="600" height="36" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="2"/>
  <text x="400" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Level II executes the procedure and card — and reports what the bench teaches back</text>
</svg>
