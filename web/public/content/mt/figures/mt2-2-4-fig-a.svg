<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Head Shot and Central Conductor</text>

  <!-- TOP: head shot -->
  <rect x="170" y="92" width="56" height="96" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="574" y="92" width="56" height="96" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="222" y="100" width="10" height="80" fill="#F2A33C"/>
  <rect x="568" y="100" width="10" height="80" fill="#F2A33C"/>
  <rect x="232" y="110" width="336" height="60" rx="6" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>

  <!-- current arrow through bar -->
  <line x1="262" y1="140" x2="520" y2="140" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="520,132 538,140 520,148" fill="#F2A33C"/>
  <text x="390" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">current I</text>

  <!-- circular flux around bar -->
  <ellipse cx="310" cy="140" rx="13" ry="44" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="400" cy="140" rx="13" ry="44" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="490" cy="140" rx="13" ry="44" fill="none" stroke="#1B82E8" stroke-width="3"/>

  <!-- longitudinal flaw -->
  <line x1="330" y1="113" x2="430" y2="113" stroke="#D14343" stroke-width="4"/>
  <line x1="447" y1="100" x2="478" y2="83" stroke="#D14343" stroke-width="1.5"/>
  <text x="484" y="80" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">longitudinal flaw - detected</text>

  <text x="120" y="86" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Head shot: current through the part</text>
  <text x="116" y="146" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">contact</text>
  <text x="116" y="166" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">plate</text>
  <line x1="122" y1="152" x2="170" y2="140" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="652" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux circles</text>
  <text x="652" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">the current</text>
  <line x1="648" y1="128" x2="503" y2="118" stroke="#1B82E8" stroke-width="1.5"/>

  <!-- divider -->
  <line x1="60" y1="218" x2="740" y2="218" stroke="#11315A" stroke-width="3"/>

  <!-- BOTTOM: central conductor -->
  <text x="120" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Central conductor: strongest field at the bore</text>

  <!-- tube walls -->
  <rect x="240" y="272" width="320" height="34" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="240" y="366" width="320" height="34" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="2"/>
  <text x="600" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">tube wall</text>
  <line x1="596" y1="286" x2="562" y2="286" stroke="#D9E0E8" stroke-width="1.5"/>

  <!-- central conductor bar -->
  <rect x="180" y="324" width="440" height="24" rx="6" fill="#F2A33C"/>
  <line x1="210" y1="336" x2="430" y2="336" stroke="#0A2342" stroke-width="3"/>
  <polygon points="430,329 446,336 430,343" fill="#0A2342"/>
  <text x="690" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">conductor</text>

  <!-- flux circles around conductor passing through walls -->
  <ellipse cx="320" cy="336" rx="16" ry="52" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="400" cy="336" rx="16" ry="52" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <ellipse cx="480" cy="336" rx="16" ry="52" fill="none" stroke="#1B82E8" stroke-width="3"/>

  <!-- ID flaw detected -->
  <line x1="350" y1="306" x2="442" y2="306" stroke="#D14343" stroke-width="4"/>
  <line x1="455" y1="312" x2="500" y2="318" stroke="#D14343" stroke-width="1.5"/>
  <text x="506" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">ID flaw - detected</text>

  <!-- offset note -->
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">offset conductor: coverage = 4 x conductor diameter per shot - rotate part, overlap shots 10%</text>
</svg>
