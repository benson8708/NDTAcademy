<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Wet-Bath Settling Test (100 mL Sample)</text>

  <!-- ===== pear-shaped centrifuge tube ===== -->
  <line x1="112" y1="80" x2="228" y2="80" stroke="#0A2342" stroke-width="2"/>
  <!-- liquid -->
  <path d="M 123 96 L 123 180 Q 123 233 161 260 L 161 339 L 179 339 L 179 260 Q 217 233 217 180 L 217 96 Z" fill="#E8F1FB"/>
  <!-- tube walls -->
  <path d="M 120 80 L 120 180 Q 120 235 158 262 L 158 388 L 182 388 L 182 262 Q 220 235 220 180 L 220 80" fill="none" stroke="#0A2342" stroke-width="3"/>
  <!-- contamination band and particles in stem -->
  <rect x="161" y="339" width="18" height="9" fill="#5A6B7E"/>
  <rect x="161" y="348" width="18" height="39" fill="#1E9E6A"/>

  <!-- 100 mL line -->
  <line x1="108" y1="96" x2="232" y2="96" stroke="#1B82E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="240" y="101" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">100 mL sample</text>

  <!-- stem graduations -->
  <line x1="182" y1="388" x2="190" y2="388" stroke="#0A2342" stroke-width="1.5"/>
  <text x="194" y="393" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.0</text>
  <line x1="182" y1="368" x2="190" y2="368" stroke="#0A2342" stroke-width="1.5"/>
  <text x="194" y="373" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.2</text>
  <line x1="182" y1="348" x2="190" y2="348" stroke="#0A2342" stroke-width="1.5"/>
  <text x="194" y="353" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.4</text>
  <line x1="182" y1="328" x2="190" y2="328" stroke="#0A2342" stroke-width="1.5"/>
  <text x="194" y="333" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.6</text>
  <line x1="182" y1="308" x2="190" y2="308" stroke="#0A2342" stroke-width="1.5"/>
  <text x="194" y="313" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.8</text>
  <text x="194" y="288" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">mL</text>

  <!-- leaders -->
  <line x1="161" y1="343" x2="100" y2="316" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="96" y="300" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">contamination</text>
  <text x="96" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">layer &#8212; judge</text>
  <text x="96" y="340" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">separately</text>
  <line x1="161" y1="370" x2="120" y2="412" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="126" y="430" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">settled particles &#8212; read here</text>

  <!-- ===== right: procedure ===== -->
  <text x="470" y="92" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Procedure</text>
  <text x="470" y="122" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">1. Agitate / recirculate &#8805; 30 min</text>
  <text x="470" y="150" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">2. Draw 100 mL from delivery hose</text>
  <text x="470" y="178" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">3. Settle 30 min, vibration-free</text>
  <text x="470" y="206" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">4. Read particle volume in stem</text>

  <!-- acceptance box -->
  <rect x="470" y="235" width="300" height="112" rx="6" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="486" y="262" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Typical ranges (per 100 mL)</text>
  <rect x="486" y="276" width="14" height="14" fill="#1E9E6A"/>
  <text x="508" y="288" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fluorescent: 0.1&#8211;0.4 mL</text>
  <rect x="486" y="302" width="14" height="14" fill="#0A2342"/>
  <text x="508" y="314" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">visible: 1.2&#8211;2.4 mL</text>
  <text x="486" y="338" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">low &#8594; concentrate &#183; high &#8594; vehicle</text>

  <text x="470" y="382" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">Stratified layers or a carrier that glows</text>
  <text x="470" y="404" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">under UV-A = contaminated bath &#8212;</text>
  <text x="470" y="426" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">replace it.</text>
</svg>
