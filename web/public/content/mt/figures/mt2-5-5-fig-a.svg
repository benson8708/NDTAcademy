<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Anatomy of an MT Procedure</text>

  <!-- document page -->
  <rect x="120" y="56" width="430" height="380" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- section 1 -->
  <rect x="140" y="72" width="390" height="52" rx="6" fill="#0A2342"/>
  <text x="158" y="94" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">1 · FOREWORD</text>
  <text x="158" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">scope · referenced documents + precedence · approvals</text>

  <!-- section 2 -->
  <rect x="140" y="132" width="390" height="52" rx="6" fill="#1B82E8"/>
  <text x="158" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">2 · APPARATUS + SETTINGS</text>
  <text x="158" y="175" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">equipment · particles · amperage ± tolerance · shot time</text>

  <!-- section 3 -->
  <rect x="140" y="192" width="390" height="52" rx="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <text x="158" y="214" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3 · PRODUCT</text>
  <text x="158" y="235" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">description / drawing · material + condition · test area</text>

  <!-- section 4 -->
  <rect x="140" y="252" width="390" height="52" rx="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <text x="158" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4 · TEST CONDITIONS</text>
  <text x="158" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">surface prep · masking · pre-demag · verified lighting</text>

  <!-- section 5 -->
  <rect x="140" y="312" width="390" height="52" rx="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <text x="158" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5 · DETAILED APPLICATION INSTRUCTIONS</text>
  <text x="158" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">numbered steps · two directions · bath timing · demag</text>

  <!-- section 6 -->
  <rect x="140" y="372" width="390" height="52" rx="6" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="158" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">6 · RECORDING + CLASSIFYING RESULTS</text>
  <text x="158" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">linear vs rounded · locations · report fields · retention</text>

  <!-- right margin notes -->
  <line x1="530" y1="98" x2="600" y2="98" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="606" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Level III develops</text>
  <text x="606" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and approves</text>

  <line x1="530" y1="225" x2="600" y2="225" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="606" y="219" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Coverage claimed =</text>
  <text x="606" y="239" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coverage defined</text>

  <line x1="530" y1="338" x2="600" y2="338" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="606" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">One action per step,</text>
  <text x="606" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">verifiable values</text>

  <line x1="530" y1="398" x2="600" y2="398" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="606" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Not recorded =</text>
  <text x="606" y="412" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">not done</text>

  <!-- left note -->
  <text x="60" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8" transform="rotate(-90 60 200)">The stranger test: anyone qualified can run it</text>
</svg>
