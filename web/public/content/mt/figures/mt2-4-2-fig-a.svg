<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Multidirectional Magnetization: Two Circuits Alternating</text>

  <!-- ===== left: bench assembly ===== -->
  <!-- circuit 1 feed arrow -->
  <line x1="16" y1="200" x2="40" y2="200" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="40,194 50,200 40,206" fill="#F2A33C"/>
  <text x="16" y="174" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">circuit 1</text>

  <!-- headstock / tailstock -->
  <rect x="50" y="140" width="24" height="120" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="352" y="140" width="24" height="120" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <!-- part -->
  <rect x="74" y="172" width="278" height="56" rx="16" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- coil turns (circuit 2) -->
  <ellipse cx="150" cy="200" rx="11" ry="48" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <ellipse cx="185" cy="200" rx="11" ry="48" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <ellipse cx="220" cy="200" rx="11" ry="48" fill="none" stroke="#1E9E6A" stroke-width="3"/>
  <ellipse cx="255" cy="200" rx="11" ry="48" fill="none" stroke="#1E9E6A" stroke-width="3"/>

  <!-- circular field loop around the part (from circuit 1) -->
  <ellipse cx="315" cy="200" rx="12" ry="42" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <polygon points="309,162 321,156 317,168" fill="#1B82E8"/>
  <text x="315" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">circular field &#8212; circuit 1</text>
  <line x1="315" y1="120" x2="315" y2="152" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- longitudinal field arrow (from circuit 2 coil) -->
  <line x1="92" y1="200" x2="128" y2="200" stroke="#1E9E6A" stroke-width="3.5"/>
  <polygon points="128,194 140,200 128,206" fill="#1E9E6A"/>
  <text x="213" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">longitudinal field &#8212; circuit 2 (coil)</text>
  <line x1="220" y1="252" x2="216" y2="278" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- QQI shim -->
  <rect x="92" y="178" width="18" height="18" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="96" y1="187" x2="106" y2="187" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="101" y1="182" x2="101" y2="192" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="101" y1="178" x2="84" y2="126" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="80" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">QQI shim</text>

  <text x="213" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">two circuits share one part</text>

  <!-- ===== right: timing panel ===== -->
  <rect x="420" y="70" width="355" height="262" rx="6" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <text x="438" y="96" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Alternating shots</text>

  <text x="438" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">circuit 1 &#8212; circular</text>
  <rect x="450" y="132" width="16" height="38" fill="#1B82E8"/>
  <rect x="514" y="132" width="16" height="38" fill="#1B82E8"/>
  <rect x="578" y="132" width="16" height="38" fill="#1B82E8"/>
  <rect x="642" y="132" width="16" height="38" fill="#1B82E8"/>
  <rect x="706" y="132" width="16" height="38" fill="#1B82E8"/>
  <line x1="438" y1="170" x2="755" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="438" y="202" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">circuit 2 &#8212; longitudinal</text>
  <rect x="482" y="212" width="16" height="38" fill="#1E9E6A"/>
  <rect x="546" y="212" width="16" height="38" fill="#1E9E6A"/>
  <rect x="610" y="212" width="16" height="38" fill="#1E9E6A"/>
  <rect x="674" y="212" width="16" height="38" fill="#1E9E6A"/>
  <rect x="738" y="212" width="16" height="38" fill="#1E9E6A"/>
  <line x1="438" y1="250" x2="755" y2="250" stroke="#5A6B7E" stroke-width="1.5"/>

  <line x1="438" y1="290" x2="748" y2="290" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="748,286 756,290 748,294" fill="#5A6B7E"/>
  <text x="438" y="314" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">time &#8212; many alternations per second</text>

  <!-- ===== bottom rule bar ===== -->
  <rect x="30" y="355" width="740" height="72" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Continuous method only &#8212; bath must be draining while the fields alternate.</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Prove balance with QQI shims in two orientations at several locations.</text>
</svg>
