<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Indication Triage: False, Nonrelevant, or Relevant?</text>

  <!-- start box -->
  <rect x="80" y="62" width="300" height="46" rx="8" fill="#0A2342"/>
  <text x="230" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Particles accumulate = INDICATION</text>

  <!-- arrow down to diamond 1 -->
  <line x1="230" y1="108" x2="230" y2="136" stroke="#0A2342" stroke-width="3"/>
  <polygon points="222,136 230,150 238,136" fill="#0A2342"/>

  <!-- diamond 1 -->
  <polygon points="230,150 380,200 230,250 80,200" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <text x="230" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Repeats in place after</text>
  <text x="230" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">re-clean and retest?</text>

  <!-- NO arrow right to FALSE box -->
  <line x1="380" y1="200" x2="468" y2="200" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="468,192 482,200 468,208" fill="#5A6B7E"/>
  <text x="424" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">NO</text>
  <rect x="484" y="168" width="276" height="64" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="3"/>
  <text x="622" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">FALSE indication</text>
  <text x="622" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">drainage, roughness, lint, furring</text>

  <!-- YES arrow down to diamond 2 -->
  <line x1="230" y1="250" x2="230" y2="278" stroke="#0A2342" stroke-width="3"/>
  <polygon points="222,278 230,292 238,278" fill="#0A2342"/>
  <text x="252" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">YES</text>

  <!-- diamond 2 -->
  <polygon points="230,292 380,342 230,392 80,342" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <text x="230" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Explained by geometry or</text>
  <text x="230" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">magnetic writing?</text>

  <!-- YES arrow right to NONRELEVANT box -->
  <line x1="380" y1="342" x2="468" y2="342" stroke="#5A6B7E" stroke-width="3"/>
  <polygon points="468,334 482,342 468,350" fill="#5A6B7E"/>
  <text x="424" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">YES</text>
  <rect x="484" y="306" width="276" height="72" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="622" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">NONRELEVANT</text>
  <text x="622" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">keyways, fits, weld boundary —</text>
  <text x="622" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">verify vs drawing, note in record</text>

  <!-- NO arrow down to RELEVANT box -->
  <line x1="230" y1="392" x2="230" y2="412" stroke="#0A2342" stroke-width="3"/>
  <polygon points="222,412 230,424 238,412" fill="#0A2342"/>
  <text x="252" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">NO</text>
  <rect x="60" y="424" width="340" height="22" rx="6" fill="#1E9E6A"/>
  <text x="230" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">RELEVANT — a discontinuity is leaking flux</text>

  <!-- evaluate box bottom right -->
  <line x1="400" y1="435" x2="448" y2="435" stroke="#0A2342" stroke-width="3"/>
  <polygon points="448,427 462,435 448,443" fill="#0A2342"/>
  <rect x="464" y="402" width="296" height="44" rx="8" fill="#0A2342"/>
  <text x="612" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Characterize surface / subsurface, then</text>
  <text x="612" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">EVALUATE against acceptance criteria</text>

  <!-- fix-and-retest note under FALSE -->
  <text x="622" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Correct the surface or technique,</text>
  <text x="622" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">then retest the area</text>
</svg>
