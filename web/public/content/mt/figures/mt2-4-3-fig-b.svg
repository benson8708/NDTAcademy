<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">The UV-A Band and the Radiometer Check</text>

  <!-- ===== spectrum bar ===== -->
  <polygon points="354,72 366,72 360,80" fill="#0A2342"/>
  <text x="360" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">365 nm peak</text>

  <rect x="60" y="80" width="204" height="40" fill="#D14343"/>
  <rect x="264" y="80" width="40" height="40" fill="#F2A33C"/>
  <rect x="304" y="80" width="96" height="40" fill="#1B82E8"/>
  <rect x="400" y="80" width="340" height="40" fill="#D9E0E8"/>
  <text x="162" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">UV-C</text>
  <text x="284" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">UV-B</text>
  <text x="352" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">UV-A</text>
  <text x="570" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">visible light</text>

  <line x1="264" y1="120" x2="264" y2="130" stroke="#0A2342" stroke-width="1.5"/>
  <text x="264" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">280</text>
  <line x1="309" y1="120" x2="309" y2="130" stroke="#0A2342" stroke-width="1.5"/>
  <text x="311" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">320</text>
  <line x1="400" y1="120" x2="400" y2="130" stroke="#0A2342" stroke-width="1.5"/>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">400</text>
  <line x1="740" y1="120" x2="740" y2="130" stroke="#0A2342" stroke-width="1.5"/>
  <text x="730" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">700 nm</text>

  <text x="160" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">filtered out &#8212; eye/skin hazard</text>
  <text x="352" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">examination band</text>

  <!-- ===== radiometer check scene ===== -->
  <text x="305" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">UV-A lamp</text>
  <path d="M 270 212 L 340 212 L 332 250 L 278 250 Z" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <line x1="278" y1="250" x2="332" y2="250" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="278,254 332,254 326,320 284,320" fill="#1B82E8" opacity="0.2"/>

  <!-- working distance dimension -->
  <line x1="350" y1="254" x2="350" y2="343" stroke="#5A6B7E" stroke-width="1.5"/>
  <polygon points="346,262 350,254 354,262" fill="#5A6B7E"/>
  <polygon points="346,335 350,343 354,335" fill="#5A6B7E"/>
  <text x="362" y="302" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">15 in. typical check</text>

  <!-- sensor and surface -->
  <text x="272" y="312" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">sensor</text>
  <line x1="275" y1="314" x2="290" y2="322" stroke="#5A6B7E" stroke-width="1.5"/>
  <rect x="285" y="320" width="36" height="25" fill="#0A2342"/>
  <rect x="50" y="345" width="460" height="18" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- cable to readout -->
  <path d="M 321 330 C 420 330 480 295 556 285" fill="none" stroke="#0A2342" stroke-width="2"/>

  <!-- radiometer readout -->
  <rect x="560" y="230" width="170" height="80" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="572" y="242" width="146" height="32" fill="#E8F1FB"/>
  <text x="645" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">1,450 &#181;W/cm&#178;</text>
  <text x="645" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">PASS &#8212; min 1,000</text>

  <!-- re-verify checklist -->
  <text x="540" y="345" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Re-verify: shift start / 8 h,</text>
  <text x="540" y="367" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">bulb change, power interruption</text>
  <text x="540" y="389" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">meters calibrated (&#8776; 6 mo)</text>

  <!-- lamp notes -->
  <text x="230" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">mercury lamps: 5&#8211;10 min warm-up</text>
  <text x="230" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">LED: instant on &#8212; check beam uniformity</text>
</svg>
