<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Anatomy of a Magnetic Particle Indication</text>

  <!-- part cross-section -->
  <rect x="60" y="240" width="680" height="150" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="620" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Ferromagnetic part (steel)</text>

  <!-- surface crack -->
  <polygon points="292,240 300,302 308,240" fill="#0A2342" stroke="#D14343" stroke-width="2"/>

  <!-- subsurface flaw -->
  <ellipse cx="560" cy="300" rx="26" ry="10" fill="#0A2342" stroke="#D14343" stroke-width="2"/>

  <!-- internal flux lines -->
  <path d="M 70 280 L 252 280 Q 276 280 284 296 Q 300 324 316 296 Q 324 280 348 280 L 516 280 Q 560 270 604 280 L 730 280" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 70 312 L 250 312 Q 300 330 350 312 L 512 312 Q 560 336 608 312 L 730 312" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 70 344 L 730 344" fill="none" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- flux direction arrow -->
  <line x1="90" y1="364" x2="160" y2="364" stroke="#E8F1FB" stroke-width="3"/>
  <polygon points="160,357 174,364 160,371" fill="#E8F1FB"/>
  <text x="184" y="370" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Magnetic flux (B)</text>

  <!-- leakage field over crack -->
  <path d="M 268 240 Q 300 178 332 240" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 277 240 Q 300 196 323 240" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M 285 240 Q 300 212 315 240" fill="none" stroke="#F2A33C" stroke-width="2.5"/>

  <!-- local poles -->
  <text x="276" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">N</text>
  <text x="324" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">S</text>

  <!-- particles at crack -->
  <circle cx="291" cy="231" r="4" fill="#1E9E6A"/>
  <circle cx="297" cy="228" r="4" fill="#1E9E6A"/>
  <circle cx="303" cy="228" r="4" fill="#1E9E6A"/>
  <circle cx="309" cy="231" r="4" fill="#1E9E6A"/>
  <circle cx="294" cy="236" r="4" fill="#1E9E6A"/>
  <circle cx="300" cy="233" r="4" fill="#1E9E6A"/>
  <circle cx="306" cy="236" r="4" fill="#1E9E6A"/>

  <!-- weak leakage over subsurface flaw -->
  <path d="M 520 240 Q 560 216 600 240" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="544" cy="234" r="3.5" fill="#1E9E6A"/>
  <circle cx="553" cy="231" r="3.5" fill="#1E9E6A"/>
  <circle cx="563" cy="231" r="3.5" fill="#1E9E6A"/>
  <circle cx="572" cy="234" r="3.5" fill="#1E9E6A"/>

  <!-- labels and leaders -->
  <text x="90" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Particle indication (visible)</text>
  <line x1="200" y1="98" x2="296" y2="222" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="380" y="140" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Leakage field — local N and S poles</text>
  <line x1="375" y1="146" x2="322" y2="186" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="40" y="190" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Surface crack</text>
  <text x="40" y="210" font-family="Arial, sans-serif" font-size="16" fill="#D14343">(discontinuity)</text>
  <line x1="152" y1="200" x2="288" y2="258" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="470" y="92" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Near-surface discontinuity:</text>
  <text x="470" y="114" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">broader, fainter indication</text>
  <line x1="560" y1="122" x2="560" y2="212" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="400" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Flux forced out at the discontinuity holds particles — that pattern is the indication.</text>
</svg>
