<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The B–H Hysteresis Loop</text>

  <!-- axes -->
  <line x1="130" y1="240" x2="680" y2="240" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="680,233 695,240 680,247" fill="#5A6B7E"/>
  <polygon points="130,233 115,240 130,247" fill="#5A6B7E"/>
  <line x1="400" y1="420" x2="400" y2="78" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="393,78 400,63 407,78" fill="#5A6B7E"/>
  <polygon points="393,420 400,435 407,420" fill="#5A6B7E"/>
  <text x="688" y="262" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">+H (oersteds)</text>
  <text x="118" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#5A6B7E">−H</text>
  <text x="412" y="76" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">+B (gauss)</text>
  <text x="412" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#5A6B7E">−B</text>

  <!-- virgin curve (dashed green) from origin to saturation a -->
  <path d="M 400 240 C 450 236 490 200 530 165 C 565 137 595 125 620 120" fill="none" stroke="#1E9E6A" stroke-width="3.5" stroke-dasharray="8 6"/>

  <!-- hysteresis loop (blue): upper branch a->b->c->d, lower branch d->e->f->a -->
  <path d="M 620 120 C 560 118 470 140 400 170 C 330 200 285 218 255 240 C 230 257 195 320 180 360" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <path d="M 180 360 C 240 362 330 340 400 310 C 470 280 515 262 545 240 C 570 223 605 160 620 120" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <!-- traversal direction arrowheads (counterclockwise) -->
  <polygon points="476,148 458,160 478,164" fill="#1B82E8"/>
  <polygon points="322,332 342,320 324,316" fill="#1B82E8"/>

  <!-- landmark points -->
  <circle cx="620" cy="120" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="400" cy="170" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="255" cy="240" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="180" cy="360" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="400" cy="310" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <circle cx="545" cy="240" r="7" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>

  <!-- labels with leaders -->
  <text x="636" y="106" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">saturation (+)</text>

  <line x1="408" y1="164" x2="470" y2="120" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="476" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">retentivity</text>
  <text x="476" y="131" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">residual B at H = 0</text>

  <line x1="250" y1="232" x2="216" y2="178" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="212" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">coercive force</text>
  <text x="212" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">reversed H that zeroes B</text>

  <text x="166" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">saturation (−)</text>

  <line x1="408" y1="316" x2="448" y2="352" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="454" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">retentivity (−)</text>

  <line x1="551" y1="247" x2="586" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="592" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">coercive force (+)</text>

  <!-- virgin curve label -->
  <line x1="505" y1="185" x2="530" y2="212" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="536" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">virgin curve</text>

  <!-- loop-shape note -->
  <text x="116" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">fat loop = hard steel</text>
  <text x="116" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">high retentivity,</text>
  <text x="116" y="131" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">hard to demag</text>
</svg>
