<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The MT Process, Start to Finish</text>

  <!-- row 1 -->
  <rect x="15" y="80" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="33" cy="98" r="13" fill="#F2A33C"/>
  <text x="33" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1</text>
  <text x="105" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Know the job</text>
  <text x="105" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">procedure, part,</text>
  <text x="105" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">acceptance criteria</text>

  <rect x="212" y="80" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="230" cy="98" r="13" fill="#F2A33C"/>
  <text x="230" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2</text>
  <text x="302" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Prepare surface</text>
  <text x="302" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">clean grease, scale,</text>
  <text x="302" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">loose coatings</text>

  <rect x="409" y="80" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="427" cy="98" r="13" fill="#F2A33C"/>
  <text x="427" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3</text>
  <text x="499" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Verify system</text>
  <text x="499" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">equipment, particles,</text>
  <text x="499" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">lighting (white / UV)</text>

  <rect x="606" y="80" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="624" cy="98" r="13" fill="#F2A33C"/>
  <text x="624" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">4</text>
  <text x="696" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Magnetize — dir. 1</text>
  <text x="696" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">known strength</text>
  <text x="696" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">and direction</text>

  <!-- row 1 arrows -->
  <polygon points="197,118 209,125 197,132" fill="#1B82E8"/>
  <polygon points="394,118 406,125 394,132" fill="#1B82E8"/>
  <polygon points="591,118 603,125 591,132" fill="#1B82E8"/>

  <!-- down arrow -->
  <line x1="696" y1="172" x2="696" y2="232" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="688,228 696,240 704,228" fill="#1B82E8"/>

  <!-- row 2 (flows right to left) -->
  <rect x="606" y="240" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="624" cy="258" r="13" fill="#F2A33C"/>
  <text x="624" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">5</text>
  <text x="696" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Apply particles</text>
  <text x="696" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">while current is ON</text>
  <text x="696" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(continuous method)</text>

  <rect x="409" y="240" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="427" cy="258" r="13" fill="#F2A33C"/>
  <text x="427" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">6</text>
  <text x="499" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Interpret, evaluate</text>
  <text x="499" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">relevant? acceptable</text>
  <text x="499" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">per criteria?</text>

  <rect x="212" y="240" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="230" cy="258" r="13" fill="#F2A33C"/>
  <text x="230" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">7</text>
  <text x="302" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Magnetize — dir. 2</text>
  <text x="302" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">perpendicular to 1;</text>
  <text x="302" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">repeat 5 and 6</text>

  <rect x="15" y="240" width="180" height="90" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <circle cx="33" cy="258" r="13" fill="#F2A33C"/>
  <text x="33" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">8</text>
  <text x="105" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Close out</text>
  <text x="105" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">record, demagnetize</text>
  <text x="105" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">as required, clean</text>

  <!-- row 2 arrows (pointing left) -->
  <polygon points="604,278 592,285 604,292" fill="#1B82E8"/>
  <polygon points="407,278 395,285 407,292" fill="#1B82E8"/>
  <polygon points="210,278 198,285 210,292" fill="#1B82E8"/>

  <!-- coverage note -->
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Two roughly perpendicular magnetizations = complete coverage</text>
  <text x="400" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">A discontinuity lying parallel to the flux may produce no indication at all —</text>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">direction 2 catches what direction 1 cannot.</text>
</svg>
