<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Test Factors: What Decides Whether You See the Crack</text>

  <!-- center: the outcome -->
  <rect x="310" y="190" width="180" height="70" rx="10" fill="#0A2342"/>
  <text x="400" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">READABLE</text>
  <text x="400" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">INDICATION</text>

  <!-- top-left: the part -->
  <rect x="30" y="72" width="250" height="96" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="155" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">THE PART</text>
  <text x="155" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">alloy, heat treat (µ, retentivity)</text>
  <text x="155" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">geometry, section changes</text>
  <text x="155" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">surface: scale, paint, plating</text>

  <!-- top-right: the field -->
  <rect x="520" y="72" width="250" height="96" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="645" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">THE FIELD</text>
  <text x="645" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">direction 45–90° to the flaw</text>
  <text x="645" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">strength ≈ 30–60 G tangential</text>
  <text x="645" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">current type: AC / HWDC / FWDC</text>

  <!-- bottom-left: particles and method -->
  <rect x="30" y="282" width="250" height="96" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="155" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">PARTICLES + METHOD</text>
  <text x="155" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">dry/wet · visible/fluorescent</text>
  <text x="155" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">concentration: settling test</text>
  <text x="155" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">continuous vs residual</text>

  <!-- bottom-right: lighting -->
  <rect x="520" y="282" width="250" height="96" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="645" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">LIGHTING</text>
  <text x="645" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">UV-A ≥ 1,000 µW/cm² at surface</text>
  <text x="645" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">ambient ≤ 2 fc for fluorescent</text>
  <text x="645" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">white ≥ 100 fc for visible</text>

  <!-- bottom-center: the procedure -->
  <rect x="305" y="390" width="190" height="50" rx="8" fill="#FFFFFF" stroke="#F2A33C" stroke-width="3"/>
  <text x="400" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">WRITTEN PROCEDURE</text>
  <text x="400" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">freezes every factor</text>

  <!-- arrows into the center -->
  <line x1="222" y1="168" x2="320" y2="200" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="306,191 324,201 310,206" fill="#5A6B7E"/>
  <line x1="578" y1="168" x2="480" y2="200" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="490,206 476,201 494,191" fill="#5A6B7E"/>
  <line x1="222" y1="282" x2="320" y2="250" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="310,244 324,249 306,259" fill="#5A6B7E"/>
  <line x1="578" y1="282" x2="480" y2="250" stroke="#5A6B7E" stroke-width="2.5"/>
  <polygon points="494,259 476,249 490,244" fill="#5A6B7E"/>
  <line x1="400" y1="390" x2="400" y2="274" stroke="#F2A33C" stroke-width="2.5"/>
  <polygon points="393,278 400,262 407,278" fill="#F2A33C"/>

  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">governs</text>
</svg>
