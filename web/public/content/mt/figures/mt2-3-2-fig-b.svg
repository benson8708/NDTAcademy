<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Demagnetization: Reverse and Diminish</text>

  <!-- ===== Left: shrinking hysteresis loops ===== -->
  <!-- axes -->
  <line x1="60" y1="240" x2="360" y2="240" stroke="#0A2342" stroke-width="3"/>
  <polygon points="360,233 374,240 360,247" fill="#0A2342"/>
  <line x1="210" y1="395" x2="210" y2="85" stroke="#0A2342" stroke-width="3"/>
  <polygon points="203,85 210,71 217,85" fill="#0A2342"/>
  <text x="368" y="262" text-anchor="end" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">H</text>
  <text x="222" y="84" text-anchor="start" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">B</text>

  <!-- nested shrinking loops -->
  <path d="M 330 130 C 290 165 260 200 90 350 C 130 315 160 280 330 130 Z" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 296 162 C 266 188 246 212 124 318 C 154 292 174 268 296 162 Z" fill="none" stroke="#1B82E8" stroke-width="2.5" opacity="0.75"/>
  <path d="M 262 194 C 242 212 230 224 158 286 C 178 268 190 256 262 194 Z" fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.55"/>
  <path d="M 234 219 C 224 228 220 232 186 261 C 196 252 200 248 234 219 Z" fill="none" stroke="#1B82E8" stroke-width="1.8" opacity="0.4"/>

  <!-- spiral-in arrow to origin -->
  <circle cx="210" cy="240" r="6" fill="#1E9E6A"/>
  <line x1="258" y1="198" x2="222" y2="230" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="226,222 214,237 234,232" fill="#1E9E6A"/>
  <text x="304" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">loops collapse to zero</text>
  <line x1="280" y1="318" x2="222" y2="248" stroke="#5A6B7E" stroke-width="1.5"/>

  <text x="332" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">start ≥ original field</text>
  <text x="120" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">each reversal must</text>
  <text x="120" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">exceed coercive force</text>

  <text x="210" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Shrinking hysteresis loops spiral into the origin</text>

  <!-- ===== Right: decaying waveform + coil withdrawal ===== -->
  <!-- coil and part -->
  <ellipse cx="500" cy="120" rx="14" ry="46" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="524" cy="120" rx="14" ry="46" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="548" cy="120" rx="14" ry="46" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <text x="524" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">AC coil</text>
  <rect x="556" y="104" width="130" height="32" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="694" y1="120" x2="744" y2="120" stroke="#1E9E6A" stroke-width="3.5"/>
  <polygon points="744,113 758,120 744,127" fill="#1E9E6A"/>
  <text x="660" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A" font-weight="bold">withdraw slowly 3–4 ft</text>
  <text x="660" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">before power off · travel E–W</text>

  <!-- decaying waveform -->
  <line x1="430" y1="320" x2="770" y2="320" stroke="#0A2342" stroke-width="2.5"/>
  <path d="M 432 320 Q 448 220 464 320 Q 480 412 496 320 Q 511 240 526 320 Q 541 394 556 320 Q 570 256 584 320 Q 598 378 612 320 Q 625 272 638 320 Q 651 364 664 320 Q 676 288 688 320 Q 700 350 712 320 Q 723 302 734 320 Q 745 336 756 320" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 432 226 C 540 252 670 304 768 318" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 432 414 C 540 388 670 336 768 322" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343" font-weight="bold">amplitude tapers to zero</text>
  <text x="600" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">field reverses while diminishing — distance or steps provide the taper</text>
</svg>
