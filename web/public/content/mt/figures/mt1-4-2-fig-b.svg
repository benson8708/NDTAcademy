<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Low Fill-Factor Coil: Position, L/D, and Sections</text>

  <!-- LEFT: coil cross-section with part against inside wall -->
  <circle cx="170" cy="200" r="105" fill="none" stroke="#F2A33C" stroke-width="10"/>
  <circle cx="170" cy="278" r="24" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="170" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">D</text>
  <line x1="240" y1="330" x2="196" y2="292" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="170" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Part rests against coil</text>
  <text x="170" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">inside wall — NOT centered</text>
  <text x="170" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Coil opening (cross-section)</text>

  <!-- crossed-out centered position -->
  <circle cx="170" cy="185" r="24" fill="none" stroke="#D14343" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="152" y1="167" x2="188" y2="203" stroke="#D14343" stroke-width="3"/>
  <text x="232" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">centered = weak field</text>

  <!-- RIGHT TOP: L and D on a part -->
  <rect x="420" y="95" width="300" height="44" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <line x1="420" y1="70" x2="720" y2="70" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="428,64 414,70 428,76" fill="#5A6B7E"/>
  <polygon points="712,64 726,70 712,76" fill="#5A6B7E"/>
  <text x="570" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">L (length)</text>
  <line x1="745" y1="95" x2="745" y2="139" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="739,103 745,89 751,103" fill="#5A6B7E"/>
  <polygon points="739,131 745,145 751,131" fill="#5A6B7E"/>
  <text x="762" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5A6B7E">D</text>

  <!-- formula box -->
  <rect x="420" y="160" width="340" height="80" rx="8" fill="#0A2342"/>
  <text x="590" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F2A33C">NI ≈ 45,000 ÷ (L/D)</text>
  <text x="590" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">valid for L/D ≈ 2 to 15 · typical values — procedure governs</text>

  <!-- example line -->
  <text x="590" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Example: 16 in. × 2 in. → L/D = 8 → ≈ 5,600 At → ≈ 1,100 A in 5 turns</text>

  <!-- BOTTOM: long part in 18-in sections -->
  <rect x="420" y="310" width="340" height="36" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <ellipse cx="490" cy="328" rx="10" ry="44" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <ellipse cx="640" cy="328" rx="10" ry="44" fill="none" stroke="#F2A33C" stroke-width="5" stroke-dasharray="7 5"/>
  <line x1="424" y1="372" x2="556" y2="372" stroke="#1B82E8" stroke-width="4"/>
  <line x1="524" y1="382" x2="700" y2="382" stroke="#1E9E6A" stroke-width="4"/>
  <text x="490" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Shot 1 (~18 in.)</text>
  <text x="660" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Shot 2 — overlap</text>
  <text x="590" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Long parts: reposition the coil in overlapping ~18-inch sections</text>
</svg>
