<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">MT Inspection Record — Minimum Contents</text>

  <!-- document -->
  <rect x="60" y="56" width="330" height="360" rx="4" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="60" y="56" width="330" height="34" rx="4" fill="#0A2342"/>
  <text x="225" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">MAGNETIC PARTICLE REPORT</text>

  <rect x="72" y="100" width="306" height="28" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="119" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Part · Job · PO · Date · Code</text>

  <rect x="72" y="134" width="306" height="28" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Procedure No. + Revision</text>

  <rect x="72" y="168" width="306" height="32" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="189" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Equipment · serials · cal status</text>

  <rect x="72" y="206" width="306" height="32" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="227" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Technique: current · amps · shots</text>

  <rect x="72" y="244" width="306" height="32" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Materials: batch · bath · lights</text>

  <rect x="72" y="282" width="306" height="58" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <rect x="84" y="292" width="120" height="38" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="144" y1="296" x2="144" y2="326" stroke="#D14343" stroke-width="3"/>
  <text x="220" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Results map</text>

  <rect x="72" y="346" width="306" height="28" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="365" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Disposition:</text>
  <rect x="196" y="351" width="15" height="15" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2"/>
  <text x="218" y="365" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">ACC</text>
  <rect x="270" y="351" width="15" height="15" fill="#FFFFFF" stroke="#D14343" stroke-width="2"/>
  <text x="292" y="365" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">REJ</text>

  <rect x="72" y="380" width="306" height="28" fill="#E8F1FB" stroke="#5A6B7E" stroke-width="1"/>
  <text x="80" y="399" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inspector · Level · Signature · Date</text>

  <!-- leaders -->
  <line x1="378" y1="128" x2="430" y2="128" stroke="#F2A33C" stroke-width="2"/>
  <line x1="378" y1="222" x2="430" y2="222" stroke="#F2A33C" stroke-width="2"/>
  <line x1="378" y1="311" x2="430" y2="311" stroke="#F2A33C" stroke-width="2"/>
  <line x1="378" y1="394" x2="430" y2="394" stroke="#F2A33C" stroke-width="2"/>

  <!-- annotations -->
  <text x="440" y="112" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Traceability</text>
  <text x="440" y="133" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">a stranger can repeat this exact</text>
  <text x="440" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">test and reach the same verdict</text>

  <text x="440" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Numbers, not adjectives</text>
  <text x="440" y="227" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">amps per shot, µW/cm², fc,</text>
  <text x="440" y="247" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">mL per 100 mL — actual readings</text>

  <text x="440" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Map every relevant indication</text>
  <text x="440" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">location, length, orientation —</text>
  <text x="440" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">nonrelevant noted with cause</text>

  <text x="440" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Credentials close the record</text>
  <text x="440" y="399" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">name, level, signature, date —</text>
  <text x="440" y="419" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">retained per contract / practice</text>
</svg>
