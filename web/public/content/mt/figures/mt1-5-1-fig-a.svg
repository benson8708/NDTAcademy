<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Dry-Powder Application — Continuous Method</text>

  <!-- test plate -->
  <rect x="90" y="300" width="620" height="70" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <text x="120" y="392" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel plate (current ON during application)</text>

  <!-- yoke -->
  <path d="M 200 300 L 200 210 Q 200 150 280 150 L 440 150 Q 520 150 520 210 L 520 300 L 470 300 L 470 220 Q 470 200 440 200 L 280 200 Q 250 200 250 220 L 250 300 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="3"/>
  <text x="360" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">AC/DC yoke</text>
  <text x="225" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">N</text>
  <text x="495" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">S</text>

  <!-- flux lines between poles through plate -->
  <path d="M 225 305 Q 360 345 495 305" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <path d="M 225 312 Q 360 365 495 312" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="356,346 372,341 360,353" fill="#1E9E6A"/>
  <text x="360" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Flux between poles — crack across flux is detectable</text>

  <!-- crack with leakage field and particle indication -->
  <path d="M 355 300 L 360 322 L 365 300" fill="none" stroke="#D14343" stroke-width="3"/>
  <path d="M 348 298 Q 360 282 372 298" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <path d="M 342 298 Q 360 272 378 298" fill="none" stroke="#F2A33C" stroke-width="2"/>
  <circle cx="352" cy="295" r="3.5" fill="#0A2342"/>
  <circle cx="360" cy="293" r="3.5" fill="#0A2342"/>
  <circle cx="368" cy="295" r="3.5" fill="#0A2342"/>
  <line x1="360" y1="268" x2="360" y2="240" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="360" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Leakage field holds particles</text>

  <!-- powder bulb and cloud -->
  <ellipse cx="640" cy="120" rx="38" ry="26" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="595" y="112" width="22" height="16" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <text x="700" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Squeeze bulb:</text>
  <text x="700" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">light cloud,</text>
  <text x="700" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">never a pile</text>
  <circle cx="585" cy="150" r="3" fill="#5A6B7E"/>
  <circle cx="568" cy="170" r="3" fill="#5A6B7E"/>
  <circle cx="552" cy="192" r="3" fill="#5A6B7E"/>
  <circle cx="572" cy="205" r="3" fill="#5A6B7E"/>
  <circle cx="540" cy="218" r="3" fill="#5A6B7E"/>
  <circle cx="558" cy="235" r="3" fill="#5A6B7E"/>
  <circle cx="532" cy="248" r="3" fill="#5A6B7E"/>
  <circle cx="548" cy="265" r="3" fill="#5A6B7E"/>
  <circle cx="524" cy="278" r="3" fill="#5A6B7E"/>
  <path d="M 600 135 Q 560 200 528 290" fill="none" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="640" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Particles drift</text>
  <text x="640" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">and settle</text>

  <!-- gentle air arrow -->
  <line x1="95" y1="245" x2="175" y2="280" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="172,270 190,287 168,284" fill="#1B82E8"/>
  <text x="115" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Gentle air</text>
  <text x="120" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">lifts excess only</text>

  <!-- step strip -->
  <text x="90" y="74" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">1. Energize</text>
  <text x="220" y="74" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">2. Dust light cloud</text>
  <text x="420" y="74" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">3. Blow off excess — current still ON</text>
</svg>
