<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Field Direction vs. Flaw Orientation</text>

  <!-- ===== Left: circular field ===== -->
  <text x="210" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">CIRCULAR field — current through part</text>

  <!-- current arrow in -->
  <line x1="36" y1="185" x2="66" y2="185" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="66,178 80,185 66,192" fill="#F2A33C"/>
  <text x="50" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">I</text>

  <!-- bar -->
  <rect x="80" y="150" width="240" height="70" rx="10" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>

  <!-- circular flux rings around bar -->
  <ellipse cx="130" cy="185" rx="13" ry="46" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <ellipse cx="185" cy="185" rx="13" ry="46" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <ellipse cx="240" cy="185" rx="13" ry="46" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="185" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux wraps around the bar</text>

  <!-- longitudinal seam: found -->
  <line x1="105" y1="160" x2="265" y2="160" stroke="#D14343" stroke-width="4"/>
  <line x1="160" y1="158" x2="140" y2="116" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="138" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">seam along axis — FOUND</text>

  <!-- transverse crack: missed -->
  <line x1="295" y1="158" x2="295" y2="212" stroke="#D14343" stroke-width="4"/>
  <line x1="297" y1="212" x2="320" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="210" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">transverse crack — missed</text>
  <text x="210" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">(flux runs parallel to it)</text>

  <!-- ===== Right: longitudinal field ===== -->
  <text x="595" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">LONGITUDINAL field — coil around part</text>

  <!-- bar -->
  <rect x="470" y="150" width="250" height="70" rx="10" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>

  <!-- coil turns -->
  <ellipse cx="500" cy="185" rx="11" ry="58" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <ellipse cx="535" cy="185" rx="11" ry="58" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <ellipse cx="570" cy="185" rx="11" ry="58" fill="none" stroke="#F2A33C" stroke-width="3.5"/>
  <text x="535" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">coil</text>

  <!-- flux arrows along axis -->
  <line x1="480" y1="185" x2="640" y2="185" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="640,178 654,185 640,192" fill="#1B82E8"/>
  <line x1="480" y1="205" x2="620" y2="205" stroke="#1B82E8" stroke-width="2"/>
  <polygon points="620,200 632,205 620,210" fill="#1B82E8"/>
  <text x="660" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux runs along the bar</text>

  <!-- transverse crack: found -->
  <line x1="672" y1="158" x2="672" y2="212" stroke="#D14343" stroke-width="4"/>
  <line x1="674" y1="156" x2="700" y2="112" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="650" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">transverse crack — FOUND</text>

  <!-- longitudinal seam: missed -->
  <line x1="600" y1="160" x2="700" y2="160" stroke="#D14343" stroke-width="4"/>
  <line x1="640" y1="162" x2="600" y2="290" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="595" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">seam along axis — missed</text>
  <text x="595" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">(flux runs parallel to it)</text>

  <!-- divider -->
  <line x1="400" y1="64" x2="400" y2="350" stroke="#5A6B7E" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- bottom rule -->
  <rect x="60" y="376" width="680" height="50" rx="8" fill="#E8F1FB"/>
  <text x="400" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Flux must CROSS the flaw — detection is best at 45–90°.</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Unknown orientation → two magnetizations roughly 90° apart, inspected separately.</text>
</svg>
