<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="bold" fill="#0A2342">Automated Stationary Unit: Sequence, Monitoring, Rejection</text>

  <!-- ===== station blocks ===== -->
  <rect x="30" y="62" width="110" height="60" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="85" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Load &amp;</text>
  <text x="85" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">clamp</text>

  <rect x="156" y="62" width="110" height="60" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="211" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Apply</text>
  <text x="211" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">bath</text>

  <rect x="282" y="62" width="110" height="60" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="337" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Fire</text>
  <text x="337" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">shots</text>

  <rect x="408" y="62" width="110" height="60" rx="6" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <text x="463" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">View</text>
  <text x="463" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">under UV</text>

  <rect x="534" y="62" width="110" height="60" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="589" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Demag</text>

  <rect x="660" y="62" width="110" height="60" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="715" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Unload</text>

  <!-- flow arrows -->
  <line x1="141" y1="92" x2="150" y2="92" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="150,87 156,92 150,97" fill="#0A2342"/>
  <line x1="267" y1="92" x2="276" y2="92" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="276,87 282,92 276,97" fill="#0A2342"/>
  <line x1="393" y1="92" x2="402" y2="92" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="402,87 408,92 402,97" fill="#0A2342"/>
  <line x1="519" y1="92" x2="528" y2="92" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="528,87 534,92 528,97" fill="#0A2342"/>
  <line x1="645" y1="92" x2="654" y2="92" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="654,87 660,92 654,97" fill="#0A2342"/>

  <!-- ===== timing panel ===== -->
  <rect x="30" y="152" width="360" height="150" rx="6" fill="#FFFFFF" stroke="#D9E0E8" stroke-width="2"/>
  <text x="50" y="178" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Continuous-method timing</text>
  <text x="60" y="222" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C" font-weight="bold">bath flowing</text>
  <rect x="60" y="232" width="130" height="22" fill="#F2A33C"/>
  <text x="203" y="204" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8" font-weight="bold">two &#8776; 0.5 s shots</text>
  <rect x="205" y="210" width="16" height="52" fill="#1B82E8"/>
  <rect x="232" y="210" width="16" height="52" fill="#1B82E8"/>
  <line x1="50" y1="262" x2="368" y2="262" stroke="#5A6B7E" stroke-width="2"/>
  <polygon points="368,258 376,262 368,266" fill="#5A6B7E"/>
  <text x="366" y="282" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">time</text>
  <text x="50" y="296" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">shots fire as the bath drains, particles mobile</text>

  <!-- ===== monitor panel ===== -->
  <rect x="420" y="152" width="350" height="150" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="440" y="178" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Process monitor</text>
  <text x="440" y="202" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; shot current within limits</text>
  <text x="440" y="224" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; bath flow / agitation</text>
  <text x="440" y="246" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; UV-A intensity, lamp on</text>
  <text x="440" y="268" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; contact / clamp interlocks</text>
  <text x="440" y="292" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">out of limits &#8594; ALARM</text>

  <!-- monitor taps to stations -->
  <line x1="211" y1="124" x2="430" y2="152" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="337" y1="124" x2="470" y2="152" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="463" y1="124" x2="463" y2="152" stroke="#D14343" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ===== alarm response strip ===== -->
  <rect x="30" y="330" width="740" height="88" rx="6" fill="#FFFFFF" stroke="#D14343" stroke-width="2.5"/>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">ALARM RESPONSE</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">stop the line &#183; divert and mark the part &#183; correct the fault</text>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">then re-test every part run since the last good verification</text>
</svg>
