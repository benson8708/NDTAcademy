<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Direct vs. Indirect Circular Magnetization</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="420" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT: head shot -->
  <text x="200" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">HEAD SHOT (direct)</text>

  <!-- contact heads -->
  <rect x="40" y="170" width="44" height="120" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <rect x="316" y="170" width="44" height="120" rx="6" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="62" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Head</text>
  <text x="338" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Head</text>

  <!-- part between heads -->
  <rect x="84" y="200" width="232" height="60" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>

  <!-- current through part -->
  <line x1="100" y1="230" x2="290" y2="230" stroke="#D14343" stroke-width="4"/>
  <polygon points="290,222 308,230 290,238" fill="#D14343"/>
  <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Current through part</text>

  <!-- circular flux around part -->
  <ellipse cx="145" cy="230" rx="16" ry="50" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <ellipse cx="255" cy="230" rx="16" ry="50" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Flux circles the part</text>

  <!-- longitudinal flaw with particles -->
  <line x1="160" y1="252" x2="245" y2="252" stroke="#D14343" stroke-width="3"/>
  <circle cx="180" cy="252" r="4" fill="#1E9E6A"/>
  <circle cx="200" cy="252" r="4" fill="#1E9E6A"/>
  <circle cx="222" cy="252" r="4" fill="#1E9E6A"/>
  <line x1="202" y1="256" x2="202" y2="375" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Longitudinal flaw indicated</text>
  <text x="200" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">(flux crosses it at 90°)</text>

  <!-- RIGHT: central conductor (cross-section) -->
  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">CENTRAL CONDUCTOR (indirect)</text>

  <!-- part cross-section: annulus -->
  <circle cx="600" cy="230" r="115" fill="#E8F1FB" stroke="#1B82E8" stroke-width="3"/>
  <circle cx="600" cy="230" r="68" fill="#0A2342" stroke="#1B82E8" stroke-width="3"/>

  <!-- conductor in bore, current out of page -->
  <circle cx="600" cy="230" r="24" fill="#F2A33C" stroke="#D9E0E8" stroke-width="2"/>
  <circle cx="600" cy="230" r="5" fill="#0A2342"/>
  <text x="600" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Conductor — current out of page</text>

  <!-- flux circles in part wall -->
  <circle cx="600" cy="230" r="90" fill="none" stroke="#F2A33C" stroke-width="3" stroke-dasharray="14 8"/>
  <polygon points="688,222 692,238 676,234" fill="#F2A33C"/>

  <!-- ID crack with particles -->
  <line x1="552" y1="183" x2="540" y2="170" stroke="#D14343" stroke-width="4"/>
  <circle cx="548" cy="178" r="4" fill="#1E9E6A"/>
  <circle cx="542" cy="172" r="4" fill="#1E9E6A"/>
  <line x1="540" y1="170" x2="492" y2="128" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="488" y="118" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">ID flaw found</text>

  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">No contact — no arc risk. Field strongest at the bore.</text>
  <text x="600" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Offset conductor: ~4 × conductor dia. of ID per shot, rotate + overlap</text>
</svg>
