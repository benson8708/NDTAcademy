<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Demagnetization: Reversing, Diminishing Hysteresis Loops</text>

  <!-- axes -->
  <line x1="280" y1="240" x2="640" y2="240" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="460" y1="70" x2="460" y2="410" stroke="#0A2342" stroke-width="2.5"/>
  <polygon points="640,240 624,233 624,247" fill="#0A2342"/>
  <polygon points="460,70 453,86 467,86" fill="#0A2342"/>
  <text x="652" y="245" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">+H</text>
  <text x="248" y="245" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">−H</text>
  <text x="474" y="80" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">+B</text>
  <text x="474" y="405" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">−B</text>
  <text x="640" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Magnetizing force</text>
  <text x="560" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Flux density</text>

  <!-- collapsing loops: outer -->
  <path d="M 600 130 C 540 150 480 200 350 330 C 390 320 430 300 460 280 C 470 273 530 230 600 130 Z" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- loop 2 -->
  <path d="M 360 330 C 410 305 480 265 560 165 C 510 185 440 235 380 305 C 374 312 366 322 360 330 Z" fill="none" stroke="#1B82E8" stroke-width="2.5" opacity="0.85"/>
  <!-- loop 3 -->
  <path d="M 540 180 C 495 205 440 245 400 290 C 445 265 500 225 540 180 Z" fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.7"/>
  <!-- loop 4 -->
  <path d="M 430 265 C 450 252 472 238 500 215 C 478 230 452 248 430 265 Z" fill="none" stroke="#1B82E8" stroke-width="2" opacity="0.55"/>
  <!-- spiral converging to origin -->
  <circle cx="460" cy="240" r="6" fill="#1E9E6A"/>
  <text x="478" y="258" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Ends near zero residual</text>

  <!-- start point -->
  <circle cx="600" cy="130" r="6" fill="#D14343"/>
  <text x="616" y="126" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Start: field at or above</text>
  <text x="616" y="146" font-family="Arial, sans-serif" font-size="16" fill="#D14343">original magnetizing force</text>

  <!-- left annotation: shrinking amplitude waveform -->
  <text x="140" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Applied field vs time</text>
  <line x1="40" y1="170" x2="240" y2="170" stroke="#5A6B7E" stroke-width="1.5"/>
  <path d="M 40 170 Q 52 110 64 170 Q 76 226 88 170 Q 99 122 110 170 Q 121 214 132 170 Q 142 134 152 170 Q 162 202 172 170 Q 181 146 190 170 Q 199 190 208 170 Q 216 158 224 170 Q 231 179 238 170" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <text x="140" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Reverses while shrinking to zero</text>

  <!-- rules box -->
  <rect x="40" y="270" width="200" height="130" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="140" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Two conditions</text>
  <text x="56" y="326" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1. Start above the part's</text>
  <text x="72" y="346" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coercive force</text>
  <text x="56" y="372" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">2. Decrease amplitude</text>
  <text x="72" y="392" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">in small steps</text>
</svg>
