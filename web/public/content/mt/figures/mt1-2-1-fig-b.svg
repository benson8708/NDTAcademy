<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Electric Current Always Creates a Magnetic Field</text>

  <!-- ===== Left: straight conductor with circular field ===== -->
  <!-- flux circles (drawn as perspective ellipses), back halves first -->
  <ellipse cx="172" cy="160" rx="48" ry="16" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="172" cy="220" rx="78" ry="26" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="172" cy="285" rx="108" ry="36" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <!-- direction arrowheads on the front arcs (current up: field counterclockwise from above = leftward in front) -->
  <polygon points="186,177 162,176 184,167" fill="#1B82E8"/>
  <polygon points="186,247 162,246 184,237" fill="#1B82E8"/>
  <polygon points="186,322 162,321 184,312" fill="#1B82E8"/>

  <!-- conductor -->
  <rect x="158" y="95" width="28" height="265" fill="#F2A33C" stroke="#E8F1FB" stroke-width="2"/>
  <!-- current arrow -->
  <line x1="172" y1="120" x2="172" y2="80" stroke="#D14343" stroke-width="5"/>
  <polygon points="162,84 172,62 182,84" fill="#D14343"/>
  <text x="196" y="74" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#D14343">current I</text>

  <text x="300" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">
    <tspan x="296" y="195">flux circles the</tspan>
    <tspan x="296" y="215">conductor at 90°</tspan>
    <tspan x="296" y="235">to the current</tspan>
  </text>
  <line x1="290" y1="210" x2="262" y2="218" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="172" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Straight conductor: circular field</text>
  <text x="172" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">right hand: thumb = current, fingers = flux</text>

  <!-- ===== Right: coil producing a longitudinal field ===== -->
  <!-- part inside the coil -->
  <rect x="468" y="190" width="262" height="64" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <text x="600" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">part inside coil</text>

  <!-- longitudinal flux through the part -->
  <line x1="438" y1="222" x2="752" y2="222" stroke="#1E9E6A" stroke-width="4" stroke-dasharray="12 7"/>
  <polygon points="752,213 772,222 752,231" fill="#1E9E6A"/>

  <!-- coil turns (copper) over the part -->
  <ellipse cx="490" cy="222" rx="16" ry="62" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="545" cy="222" rx="16" ry="62" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="600" cy="222" rx="16" ry="62" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="655" cy="222" rx="16" ry="62" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="710" cy="222" rx="16" ry="62" fill="none" stroke="#F2A33C" stroke-width="6"/>

  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">longitudinal field along the coil axis</text>
  <line x1="600" y1="300" x2="620" y2="240" stroke="#D9E0E8" stroke-width="1.5"/>

  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Coil: the turns' circular fields add up</text>
  <text x="600" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">flux runs along the part — finds transverse flaws</text>
</svg>
