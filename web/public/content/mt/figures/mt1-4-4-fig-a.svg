<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Flaw Orientation Decides Field Direction</text>

  <!-- column headers -->
  <text x="200" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">EXPECTED FLAW</text>
  <text x="600" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#5A6B7E">FIELD THAT FINDS IT</text>

  <!-- ROW 1: transverse flaw -> longitudinal field -->
  <rect x="60" y="95" width="280" height="120" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="95" y="135" width="210" height="36" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="200" y1="135" x2="200" y2="171" stroke="#D14343" stroke-width="4"/>
  <text x="200" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Transverse / circumferential crack</text>
  <text x="200" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(shaft fillet, thread root)</text>

  <polygon points="360,145 420,145 420,133 450,155 420,177 420,165 360,165" fill="#F2A33C"/>

  <rect x="460" y="95" width="280" height="120" rx="10" fill="#0A2342"/>
  <text x="600" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">LONGITUDINAL field</text>
  <rect x="495" y="140" width="210" height="32" rx="8" fill="#E8F1FB"/>
  <line x1="510" y1="156" x2="680" y2="156" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="676,148 694,156 676,164" fill="#1B82E8"/>
  <ellipse cx="560" cy="156" rx="7" ry="26" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="585" cy="156" rx="7" ry="26" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Coil, cable wrap, or yoke along part</text>

  <!-- ROW 2: longitudinal flaw -> circular field -->
  <rect x="60" y="240" width="280" height="120" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="95" y="280" width="210" height="36" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="120" y1="298" x2="280" y2="298" stroke="#D14343" stroke-width="4"/>
  <text x="200" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Longitudinal seam / lap / axial crack</text>
  <text x="200" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">(bar stock, bore ID)</text>

  <polygon points="360,290 420,290 420,278 450,300 420,322 420,310 360,310" fill="#F2A33C"/>

  <rect x="460" y="240" width="280" height="120" rx="10" fill="#0A2342"/>
  <text x="600" y="269" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">CIRCULAR field</text>
  <rect x="495" y="285" width="210" height="32" rx="8" fill="#E8F1FB"/>
  <line x1="515" y1="301" x2="675" y2="301" stroke="#D14343" stroke-width="3.5"/>
  <polygon points="671,294 687,301 671,308" fill="#D14343"/>
  <ellipse cx="560" cy="301" rx="9" ry="24" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <ellipse cx="640" cy="301" rx="9" ry="24" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <text x="600" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Head shot, central conductor, prods</text>

  <!-- bottom rule -->
  <rect x="110" y="385" width="580" height="50" rx="10" fill="#1E9E6A"/>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Flux must cross the flaw at 45–90°.</text>
  <text x="400" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Orientation unknown? Two roughly perpendicular shots — always verified.</text>
</svg>
