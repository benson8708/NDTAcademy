<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Two-Direction Bench Plan: 4140 Pump Shaft, 16 in &#215; 2 in &#216;</text>

  <!-- panel divider -->
  <line x1="400" y1="56" x2="400" y2="324" stroke="#D9E0E8" stroke-width="2"/>

  <!-- ===== LEFT: head shot (circular field) ===== -->
  <text x="220" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Shot 1 &#8212; Head Shot (circular field)</text>
  <text x="220" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">current through the part</text>

  <!-- headstocks -->
  <rect x="48" y="140" width="40" height="100" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="352" y="140" width="40" height="100" rx="4" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <text x="68" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">head</text>
  <text x="372" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">head</text>
  <!-- copper braid pads -->
  <rect x="88" y="168" width="12" height="44" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <rect x="340" y="168" width="12" height="44" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>

  <!-- shaft body and journals -->
  <rect x="100" y="172" width="240" height="36" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="128" y="166" width="44" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="268" y="166" width="44" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- current arrow through shaft -->
  <line x1="112" y1="190" x2="322" y2="190" stroke="#D14343" stroke-width="4"/>
  <polygon points="322,183 336,190 322,197" fill="#D14343"/>

  <!-- circular flux rings around shaft -->
  <ellipse cx="150" cy="190" rx="11" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="210" cy="190" rx="11" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="290" cy="190" rx="11" ry="38" fill="none" stroke="#1B82E8" stroke-width="2.5"/>

  <!-- axial seam on top edge -->
  <polyline points="185,176 197,171 209,177 221,172 233,177 245,172 258,176" fill="none" stroke="#D14343" stroke-width="3"/>
  <text x="232" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">axial seam / forging lap</text>
  <line x1="232" y1="118" x2="232" y2="168" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- left labels -->
  <text x="220" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">circular flux wraps the shaft</text>
  <text x="220" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">FWDC &#8776; 1,000 A (300&#8211;800 A/in &#215; 2 in)</text>
  <text x="220" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">finds axial seams &amp; forging laps</text>
  <text x="220" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">braid pads &#183; clamp before current &#183; no live break</text>

  <!-- ===== RIGHT: coil shot (longitudinal field) ===== -->
  <text x="590" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Shot 2 &#8212; Coil Shot (longitudinal field)</text>
  <text x="590" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">current around the part</text>

  <!-- shaft -->
  <rect x="440" y="196" width="280" height="30" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="470" y="192" width="40" height="38" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>
  <rect x="650" y="192" width="40" height="38" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- QQI shim -->
  <rect x="444" y="189" width="14" height="7" fill="#FFFFFF" stroke="#1E9E6A" stroke-width="2"/>
  <text x="451" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E9E6A">QQI shim</text>

  <!-- 5-turn coil -->
  <ellipse cx="505" cy="168" rx="13" ry="62" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="535" cy="168" rx="13" ry="62" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="565" cy="168" rx="13" ry="62" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="595" cy="168" rx="13" ry="62" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="625" cy="168" rx="13" ry="62" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <text x="565" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#F2A33C">5-turn coil</text>

  <!-- longitudinal flux arrow -->
  <line x1="455" y1="211" x2="695" y2="211" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="695,204 711,211 695,218" fill="#1B82E8"/>

  <!-- transverse crack at journal -->
  <polyline points="666,194 669,202 665,209 669,216 666,226" fill="none" stroke="#D14343" stroke-width="2.5"/>
  <text x="695" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#D14343">transverse crack</text>
  <text x="695" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#D14343">(journal / fillet)</text>
  <line x1="688" y1="148" x2="668" y2="190" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- right labels -->
  <text x="590" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">longitudinal flux along the axis</text>
  <text x="590" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">NI &#8776; 45,000 &#247; 8 &#8776; 5,600 At &#8594; &#8776; 1,100 A &#215; 5 turns</text>
  <text x="590" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">finds transverse cracks at journals &amp; fillets</text>
  <text x="590" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">part against inside coil wall &#183; L/D = 16 &#247; 2 = 8</text>

  <!-- ===== sequence bar ===== -->
  <line x1="40" y1="330" x2="760" y2="330" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="40" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0A2342">Sequence &#8212; every direction is its own cycle:</text>

  <rect x="40" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="95" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Bathe</text>

  <polygon points="153,367 162,374 153,381" fill="#5A6B7E"/>
  <rect x="162" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="217" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Shoot</text>
  <text x="217" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">(continuous)</text>

  <polygon points="275,367 284,374 275,381" fill="#5A6B7E"/>
  <rect x="284" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="339" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Inspect</text>
  <text x="339" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">under UV-A</text>

  <polygon points="397,367 406,374 397,381" fill="#5A6B7E"/>
  <rect x="406" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="461" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Record</text>

  <polygon points="519,367 528,374 519,381" fill="#5A6B7E"/>
  <rect x="528" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="583" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Repeat for</text>
  <text x="583" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">direction 2</text>

  <polygon points="641,367 650,374 641,381" fill="#5A6B7E"/>
  <rect x="650" y="352" width="110" height="44" rx="8" fill="#E8F1FB" stroke="#1E9E6A" stroke-width="2"/>
  <text x="705" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0A2342">Demag &#183; verify</text>
  <text x="705" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0A2342">&#8804; 3 G</text>

  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5A6B7E">wet fluorescent &#183; UV-A &#8805; 1,000 &#181;W/cm&#178; &#183; ambient &#8804; 2 fc &#183; demag: reversing step-down DC, verify &#8804; 3 G at ends</text>
</svg>
