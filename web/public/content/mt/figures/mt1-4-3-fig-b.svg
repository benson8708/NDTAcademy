<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Magnetizing Current Waveforms and Field Depth</text>

  <!-- COLUMN 1: AC -->
  <text x="155" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">AC</text>
  <line x1="55" y1="170" x2="255" y2="170" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 55 170 Q 80 100 105 170 Q 130 240 155 170 Q 180 100 205 170 Q 230 240 255 170" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <text x="155" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Reverses 60×/second</text>
  <!-- depth bar -->
  <rect x="80" y="285" width="150" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="80" y="285" width="150" height="14" fill="#1B82E8"/>
  <text x="155" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Surface only (skin effect)</text>
  <text x="155" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Best particle mobility</text>

  <!-- COLUMN 2: HWDC -->
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">HALF-WAVE DC</text>
  <line x1="300" y1="170" x2="500" y2="170" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 300 170 Q 325 100 350 170" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <line x1="350" y1="170" x2="400" y2="170" stroke="#F2A33C" stroke-width="4"/>
  <path d="M 400 170 Q 425 100 450 170" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <line x1="450" y1="170" x2="500" y2="170" stroke="#F2A33C" stroke-width="4"/>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">One-way pulses, gaps between</text>
  <rect x="325" y="285" width="150" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="325" y="285" width="150" height="42" fill="#F2A33C"/>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">Depth + mobility</text>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Dry-powder favorite</text>

  <!-- COLUMN 3: FWDC -->
  <text x="645" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">FULL-WAVE DC</text>
  <line x1="545" y1="170" x2="745" y2="170" stroke="#5A6B7E" stroke-width="2"/>
  <path d="M 545 170 Q 570 100 595 170 Q 620 100 645 170 Q 670 100 695 170 Q 720 100 745 170" fill="none" stroke="#1E9E6A" stroke-width="4"/>
  <text x="645" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Rectified — steady one-way flow</text>
  <rect x="570" y="285" width="150" height="80" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <rect x="570" y="285" width="150" height="74" fill="#1E9E6A"/>
  <text x="645" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Deepest penetration</text>
  <text x="645" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Bench units, wet bath</text>

  <!-- shared axis labels -->
  <text x="62" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">+I</text>
  <text x="62" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">−I</text>
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Shaded band = portion of part cross-section carrying useful field (relative)</text>
</svg>
