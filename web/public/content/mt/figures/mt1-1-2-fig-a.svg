<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The MT Qualification Ladder</text>

  <!-- what stacks at each step -->
  <text x="40" y="92" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Each step up stacks:</text>
  <text x="40" y="116" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">- formal training hours</text>
  <text x="40" y="138" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">- supervised experience (OJT)</text>
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">- general + specific + practical exams</text>
  <text x="40" y="182" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">- vision: near acuity (~annual), color check</text>

  <!-- Trainee -->
  <rect x="40" y="330" width="150" height="80" rx="8" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="115" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Trainee</text>
  <text x="115" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">works under direct</text>
  <text x="115" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">supervision only</text>

  <!-- Level I -->
  <rect x="230" y="270" width="150" height="140" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="305" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0A2342">Level I</text>
  <text x="305" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">performs tests per</text>
  <text x="305" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">written instructions,</text>
  <text x="305" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">records results —</text>
  <text x="305" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">no evaluation</text>

  <!-- Level II -->
  <rect x="420" y="210" width="150" height="200" rx="8" fill="#1B82E8" stroke="#0A2342" stroke-width="2"/>
  <text x="495" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Level II</text>
  <text x="495" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">sets up equipment,</text>
  <text x="495" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">performs tests,</text>
  <text x="495" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">interprets and</text>
  <text x="495" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">evaluates to codes,</text>
  <text x="495" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">signs the report</text>

  <!-- Level III -->
  <rect x="610" y="150" width="150" height="260" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2"/>
  <text x="685" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">Level III</text>
  <text x="685" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">establishes</text>
  <text x="685" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">techniques and</text>
  <text x="685" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">procedures,</text>
  <text x="685" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">interprets codes,</text>
  <text x="685" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">designates methods,</text>
  <text x="685" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">trains and examines</text>
  <text x="685" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">personnel</text>

  <!-- step arrows -->
  <line x1="196" y1="352" x2="222" y2="330" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="216,322 230,324 222,336" fill="#F2A33C"/>
  <line x1="386" y1="292" x2="412" y2="270" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="406,262 420,264 412,276" fill="#F2A33C"/>
  <line x1="576" y1="232" x2="602" y2="210" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="596,202 610,204 602,216" fill="#F2A33C"/>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Binding numbers: the employer's written practice (SNT-TC-1A) or the invoked standard — CP-189, NAS 410, ISO 9712</text>
</svg>
