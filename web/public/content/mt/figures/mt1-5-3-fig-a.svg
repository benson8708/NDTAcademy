<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Wet Horizontal Bench Unit</text>

  <!-- bench body -->
  <rect x="70" y="300" width="660" height="90" rx="6" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <rect x="70" y="300" width="660" height="14" fill="#1B82E8"/>
  <text x="400" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Bath tank and recirculating pump below the work area</text>

  <!-- headstock -->
  <rect x="90" y="160" width="110" height="140" rx="6" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="145" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Headstock</text>
  <rect x="200" y="218" width="26" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- tailstock -->
  <rect x="600" y="160" width="110" height="140" rx="6" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="655" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">Tailstock (movable)</text>
  <rect x="574" y="218" width="26" height="34" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- part -->
  <rect x="226" y="222" width="348" height="26" rx="10" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2"/>
  <text x="318" y="212" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Part clamped for head shot</text>

  <!-- current arrows through part (circular field) -->
  <line x1="240" y1="262" x2="380" y2="262" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="378,255 394,262 378,269" fill="#F2A33C"/>
  <text x="312" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Current through part → circular field</text>

  <!-- coil on rails -->
  <g>
    <ellipse cx="470" cy="235" rx="26" ry="58" fill="none" stroke="#1E9E6A" stroke-width="6"/>
    <text x="470" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1E9E6A">Coil (slides on rails)</text>
    <line x1="470" y1="128" x2="470" y2="170" stroke="#1E9E6A" stroke-width="1.5"/>
    <text x="470" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Coil shot → longitudinal field</text>
  </g>

  <!-- bath nozzle -->
  <path d="M 268 120 Q 286 140 292 168" fill="none" stroke="#E8F1FB" stroke-width="7"/>
  <path d="M 293 172 Q 298 196 300 218" fill="none" stroke="#1B82E8" stroke-width="4" stroke-dasharray="6 4"/>
  <text x="240" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Bath hose</text>

  <!-- UV lamp -->
  <rect x="60" y="70" width="120" height="30" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="120" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A lamp</text>
  <line x1="100" y1="100" x2="240" y2="220" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="140" y1="100" x2="300" y2="222" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- control panel -->
  <rect x="600" y="60" width="140" height="78" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="634" cy="92" r="18" fill="none" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="634" y1="92" x2="646" y2="80" stroke="#D14343" stroke-width="2.5"/>
  <text x="688" y="88" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Ammeter</text>
  <text x="688" y="108" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">+ shot timer</text>
  <text x="670" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">FWDC / AC, demag</text>

  <!-- central conductor note -->
  <rect x="90" y="406" width="620" height="34" rx="8" fill="#E8F1FB"/>
  <text x="400" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Central conductor option: bar through hollow parts gives a circular field on the ID surface</text>
</svg>
