<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Technique Card: Two-Direction Coverage of a Stepped Shaft</text>

  <!-- ===== SHOT 1: head shot (top left) ===== -->
  <text x="250" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">SHOT 1 — Head shot (circular field)</text>

  <!-- contact plates -->
  <rect x="60" y="92" width="18" height="96" fill="#5A6B7E"/>
  <rect x="422" y="92" width="18" height="96" fill="#5A6B7E"/>
  <!-- shaft: stepped -->
  <rect x="78" y="116" width="120" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="198" y="104" width="40" height="72" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="238" y="116" width="184" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- current arrows into ends -->
  <line x1="20" y1="140" x2="52" y2="140" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="52,132 66,140 52,148" fill="#F2A33C"/>
  <text x="36" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">I</text>
  <line x1="448" y1="140" x2="480 " y2="140" stroke="#F2A33C" stroke-width="5"/>
  <polygon points="480,132 494,140 480,148" fill="#F2A33C"/>
  <!-- circular flux ellipses around shaft -->
  <ellipse cx="140" cy="140" rx="10" ry="30" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="330" cy="140" rx="10" ry="30" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="140" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">circular flux</text>
  <!-- longitudinal seam found -->
  <line x1="250" y1="116" x2="400" y2="116" stroke="#D14343" stroke-width="3.5"/>
  <line x1="350" y1="116" x2="382" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="388" y="88" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">finds longitudinal flaws</text>

  <!-- ===== SHOT 2: coil (bottom left) ===== -->
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1B82E8">SHOT 2 — Coil (longitudinal field)</text>

  <!-- shaft -->
  <rect x="78" y="288" width="120" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="198" y="276" width="40" height="72" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <rect x="238" y="288" width="184" height="48" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- coil turns -->
  <ellipse cx="280" cy="312" rx="12" ry="52" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="304" cy="312" rx="12" ry="52" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="328" cy="312" rx="12" ry="52" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="352" cy="312" rx="12" ry="52" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <ellipse cx="376" cy="312" rx="12" ry="52" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <text x="328" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">5-turn coil</text>
  <!-- flux along axis -->
  <line x1="92" y1="312" x2="160" y2="312" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="160,305 174,312 160,319" fill="#1B82E8"/>
  <text x="126" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux along axis</text>
  <!-- transverse crack found -->
  <line x1="150" y1="288" x2="150" y2="336" stroke="#D14343" stroke-width="3.5"/>
  <line x1="150" y1="336" x2="120" y2="376" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="118" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">finds transverse flaws</text>

  <!-- ===== parameter card (right) ===== -->
  <rect x="516" y="92" width="254" height="318" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <rect x="516" y="92" width="254" height="40" rx="10" fill="#0A2342"/>
  <text x="643" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">CARD: shaft 12 in. × 2 in. dia</text>

  <text x="532" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Shot 1 · head shot, HWDC</text>
  <text x="532" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">≈ 500 A/in. × 2 in. dia =</text>
  <text x="532" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">1,000 A ± 10%</text>

  <text x="532" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Shot 2 · coil, 5 turns</text>
  <text x="532" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">NI ≈ 45,000 ÷ (L/D = 6)</text>
  <text x="532" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">= 7,500 At → </text>
  <text x="640" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">1,500 A ± 10%</text>

  <text x="532" y="316" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Bath: fluorescent, 0.1–0.4 mL/100 mL</text>
  <text x="532" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">UV ≥ 1,000 µW/cm² · ambient ≤ 2 fc</text>
  <text x="532" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Two shots ≥ 0.5 s, bath ON during</text>
  <text x="532" y="382" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">current · demag + verify ≤ 3 G</text>

  <text x="643" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#5A6B7E">typical values — written procedure governs</text>

  <!-- bottom note -->
  <rect x="60" y="418" width="710" height="26" rx="6" fill="#0A2342"/>
  <text x="415" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">Two roughly perpendicular magnetizations = full coverage of unknown flaw orientations</text>
</svg>
