<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">How Melt Flaws Become Product Flaws</text>

  <!-- ingot -->
  <polygon points="90,120 210,120 190,330 110,330" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- pipe cavity -->
  <polygon points="138,122 162,122 153,215 147,215" fill="#D14343"/>
  <!-- inclusions -->
  <ellipse cx="132" cy="185" rx="7" ry="4" fill="#5A6B7E"/>
  <ellipse cx="172" cy="205" rx="6" ry="4" fill="#5A6B7E"/>
  <ellipse cx="152" cy="240" rx="7" ry="4" fill="#5A6B7E"/>
  <!-- blowholes -->
  <circle cx="128" cy="275" r="6" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="168" cy="288" r="5" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="146" cy="308" r="4" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2"/>

  <!-- ingot labels -->
  <line x1="160" y1="150" x2="226" y2="138" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="232" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pipe (shrinkage)</text>
  <line x1="178" y1="205" x2="226" y2="196" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="232" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inclusions</text>
  <line x1="172" y1="288" x2="226" y2="276" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="232" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Blowholes / porosity</text>

  <!-- flow arrow ingot to rolls -->
  <line x1="222" y1="318" x2="262" y2="318" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="262,310 278,318 262,326" fill="#F2A33C"/>

  <!-- rolling stand -->
  <circle cx="330" cy="195" r="30" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <circle cx="330" cy="285" r="30" fill="#5A6B7E" stroke="#0A2342" stroke-width="2"/>
  <rect x="285" y="226" width="120" height="28" fill="#D9E0E8" stroke="#0A2342" stroke-width="2"/>

  <!-- flow arrow rolls to bar -->
  <line x1="408" y1="240" x2="438" y2="240" stroke="#F2A33C" stroke-width="4"/>
  <polygon points="438,232 454,240 438,248" fill="#F2A33C"/>

  <!-- rolled product -->
  <rect x="460" y="195" width="300" height="90" fill="#D9E0E8" stroke="#0A2342" stroke-width="2.5"/>
  <!-- centerline lamination -->
  <line x1="478" y1="240" x2="742" y2="240" stroke="#D14343" stroke-width="3" stroke-dasharray="12 7"/>
  <!-- stringers -->
  <line x1="495" y1="217" x2="528" y2="217" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="540" y1="217" x2="566" y2="217" stroke="#5A6B7E" stroke-width="2.5"/>
  <line x1="578" y1="217" x2="600" y2="217" stroke="#5A6B7E" stroke-width="2.5"/>
  <!-- seam on top surface -->
  <line x1="560" y1="196" x2="700" y2="196" stroke="#D14343" stroke-width="3"/>

  <!-- product labels -->
  <line x1="600" y1="240" x2="620" y2="130" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="620" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Pipe → centerline lamination</text>
  <line x1="510" y1="214" x2="482" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="462" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Inclusions → stringers</text>
  <line x1="688" y1="194" x2="722" y2="166" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="755" y="158" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Surface defect → seam</text>

  <!-- lap inset -->
  <circle cx="660" cy="350" r="48" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <line x1="618" y1="368" x2="702" y2="368" stroke="#0A2342" stroke-width="3"/>
  <path d="M 694,368 C 672,348 644,350 628,362" fill="none" stroke="#D14343" stroke-width="3"/>
  <line x1="560" y1="286" x2="622" y2="324" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="660" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lap — shallow-angle fold</text>

  <!-- stage captions -->
  <text x="150" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">INGOT (inherent)</text>
  <text x="330" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">HOT WORKING</text>
  <text x="500" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">ROLLED PRODUCT</text>

  <!-- bottom note -->
  <text x="280" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-style="italic" fill="#5A6B7E">Melt flaws are stretched, flattened, and re-oriented along the working direction</text>
</svg>
