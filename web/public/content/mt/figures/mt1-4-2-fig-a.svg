<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Coil Shot: Longitudinal Field in the Part</text>

  <!-- part: long shaft -->
  <rect x="110" y="208" width="580" height="54" rx="10" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>

  <!-- coil turns around the part (5 turns) -->
  <ellipse cx="330" cy="235" rx="14" ry="72" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="362" cy="235" rx="14" ry="72" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="394" cy="235" rx="14" ry="72" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="426" cy="235" rx="14" ry="72" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <ellipse cx="458" cy="235" rx="14" ry="72" fill="none" stroke="#F2A33C" stroke-width="6"/>
  <text x="394" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">Coil — current I around turns (N turns)</text>
  <line x1="394" y1="133" x2="394" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- flux along part axis -->
  <line x1="140" y1="235" x2="300" y2="235" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="296,227 314,235 296,243" fill="#1B82E8"/>
  <line x1="480" y1="235" x2="640" y2="235" stroke="#1B82E8" stroke-width="4"/>
  <polygon points="636,227 654,235 636,243" fill="#1B82E8"/>
  <text x="212" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Flux along the axis</text>

  <!-- external return flux (dashed arcs) -->
  <path d="M 680 215 Q 400 60 120 215" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="8 6"/>
  <path d="M 680 256 Q 400 410 120 256" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="675" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Flux returns through air</text>
  <line x1="640" y1="100" x2="540" y2="118" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- poles -->
  <text x="700" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#D14343">N</text>
  <text x="100" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E9E6A">S</text>
  <text x="700" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Pole — flux exits</text>
  <text x="100" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Pole — flux enters</text>

  <!-- transverse crack with leakage and particles -->
  <line x1="565" y1="208" x2="565" y2="240" stroke="#D14343" stroke-width="4"/>
  <path d="M 553 208 Q 565 188 577 208" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <circle cx="558" cy="203" r="4" fill="#1E9E6A"/>
  <circle cx="565" cy="198" r="4" fill="#1E9E6A"/>
  <circle cx="572" cy="203" r="4" fill="#1E9E6A"/>
  <line x1="565" y1="192" x2="565" y2="158" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="565" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Transverse crack — leakage holds particles</text>

  <!-- bottom note -->
  <rect x="150" y="360" width="500" height="58" rx="8" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Longitudinal flux finds flaws lying ACROSS the part (45–90° to flux).</text>
  <text x="400" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Poles at the ends attract nonrelevant particle buildup — expect it.</text>
</svg>
