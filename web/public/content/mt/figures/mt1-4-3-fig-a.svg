<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">MT Field Sources</text>

  <!-- dividers -->
  <line x1="270" y1="60" x2="270" y2="400" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="535" y1="60" x2="535" y2="400" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- PANEL 1: permanent magnet -->
  <text x="138" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">PERMANENT MAGNET</text>
  <!-- horseshoe: two legs + bridge -->
  <rect x="78" y="120" width="34" height="120" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="164" y="120" width="34" height="120" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="78" y="92" width="120" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <text x="95" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D14343">N</text>
  <text x="181" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E9E6A">S</text>
  <!-- part plate -->
  <rect x="48" y="276" width="180" height="26" rx="4" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <!-- flux pole to pole through plate -->
  <path d="M 95 274 Q 138 308 181 274" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="173,272 185,272 177,282" fill="#F2A33C"/>
  <text x="138" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Flux pole to pole</text>
  <text x="138" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">No power, no spark.</text>
  <text x="138" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">No adjustment. Lift-test it.</text>

  <!-- PANEL 2: electromagnetic yoke -->
  <text x="402" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">ELECTROMAGNETIC YOKE</text>
  <rect x="342" y="120" width="34" height="120" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="428" y="120" width="34" height="120" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="342" y="92" width="120" height="34" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- coil winding on bridge -->
  <line x1="356" y1="88" x2="356" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <line x1="372" y1="88" x2="372" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <line x1="388" y1="88" x2="388" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <line x1="404" y1="88" x2="404" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <line x1="420" y1="88" x2="420" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <line x1="436" y1="88" x2="436" y2="130" stroke="#F2A33C" stroke-width="4"/>
  <text x="402" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">energizing coil</text>
  <!-- part plate + weld bead -->
  <rect x="312" y="276" width="180" height="26" rx="4" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <ellipse cx="402" cy="276" rx="22" ry="8" fill="#5A6B7E"/>
  <path d="M 359 274 Q 402 308 445 274" fill="none" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="437,272 449,272 441,282" fill="#F2A33C"/>
  <text x="402" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Field between the legs</text>
  <text x="402" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">Lift check: AC ≥ 10 lb</text>
  <text x="402" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">DC / permanent ≥ 40 lb</text>

  <!-- PANEL 3: bench unit -->
  <text x="667" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F2A33C">BENCH UNIT</text>
  <!-- bed -->
  <rect x="565" y="250" width="205" height="20" rx="4" fill="#5A6B7E"/>
  <!-- headstocks -->
  <rect x="572" y="170" width="36" height="80" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <rect x="726" y="170" width="36" height="80" rx="4" fill="#D9E0E8" stroke="#5A6B7E" stroke-width="2"/>
  <!-- part -->
  <rect x="608" y="196" width="118" height="30" rx="6" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <!-- coil ring around part -->
  <ellipse cx="688" cy="211" rx="9" ry="38" fill="none" stroke="#F2A33C" stroke-width="5"/>
  <text x="612" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">heads</text>
  <line x1="608" y1="166" x2="592" y2="174" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="700" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">coil</text>
  <line x1="697" y1="150" x2="690" y2="172" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="667" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Heads = circular shot</text>
  <text x="667" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Coil = longitudinal shot</text>
  <text x="667" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Adjustable current + bath</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Electromagnets add control: switch on, adjust amperage, switch off, demagnetize.</text>
</svg>
