<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Prod Technique on a Weldment</text>

  <!-- plate -->
  <rect x="70" y="120" width="660" height="240" rx="6" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <text x="712" y="350" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">steel plate (top view)</text>

  <!-- field loops around current path -->
  <ellipse cx="400" cy="240" rx="150" ry="34" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <ellipse cx="400" cy="240" rx="185" ry="62" fill="none" stroke="#1B82E8" stroke-width="2.5" stroke-dasharray="8 6"/>
  <line x1="585" y1="170" x2="620" y2="152" stroke="#1B82E8" stroke-width="1.5"/>
  <text x="626" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">flux circles the</text>
  <text x="626" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">current path</text>

  <!-- current path between prods -->
  <line x1="250" y1="240" x2="540" y2="240" stroke="#F2A33C" stroke-width="4" stroke-dasharray="12 7"/>
  <polygon points="540,232 558,240 540,248" fill="#F2A33C"/>
  <text x="400" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">current I between tips</text>

  <!-- prods -->
  <circle cx="250" cy="240" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="250" y1="227" x2="196" y2="96" stroke="#5A6B7E" stroke-width="9"/>
  <rect x="172" y="62" width="48" height="40" rx="8" fill="#0A2342"/>
  <circle cx="550" cy="240" r="13" fill="#F2A33C" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="550" y1="227" x2="604" y2="96" stroke="#5A6B7E" stroke-width="9"/>
  <rect x="580" y="62" width="48" height="40" rx="8" fill="#0A2342"/>
  <text x="142" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">insulated handle,</text>
  <text x="142" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">remote switch</text>

  <!-- detected flaw: parallel to prod line -->
  <line x1="340" y1="208" x2="460" y2="208" stroke="#D14343" stroke-width="4"/>
  <circle cx="370" cy="203" r="3" fill="#1E9E6A"/>
  <circle cx="400" cy="201" r="3" fill="#1E9E6A"/>
  <circle cx="430" cy="203" r="3" fill="#1E9E6A"/>
  <line x1="402" y1="196" x2="402" y2="170" stroke="#D14343" stroke-width="1.5"/>
  <text x="402" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">flaw parallel to prod line - detected</text>

  <!-- missed flaw: perpendicular -->
  <line x1="330" y1="285" x2="330" y2="335" stroke="#5A6B7E" stroke-width="4" stroke-dasharray="6 4"/>
  <line x1="338" y1="312" x2="380" y2="322" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="386" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">perpendicular flaw - missed; rotate prod line 90°</text>

  <!-- spacing dimension -->
  <line x1="250" y1="385" x2="550" y2="385" stroke="#0A2342" stroke-width="2"/>
  <polygon points="260,379 248,385 260,391" fill="#0A2342"/>
  <polygon points="540,379 552,385 540,391" fill="#0A2342"/>
  <line x1="250" y1="362" x2="250" y2="392" stroke="#0A2342" stroke-width="1.5"/>
  <line x1="550" y1="362" x2="550" y2="392" stroke="#0A2342" stroke-width="1.5"/>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">spacing 6-8 in. typical</text>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">typical procedure values: 90-125 A per inch of spacing - firm contact before current, break only after</text>
</svg>
