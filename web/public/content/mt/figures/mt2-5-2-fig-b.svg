<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Surface vs Subsurface: Leakage Shapes the Indication</text>

  <!-- ===== LEFT PANEL: surface crack ===== -->
  <text x="210" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Surface-breaking crack</text>

  <!-- metal block -->
  <rect x="50" y="190" width="320" height="170" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <!-- crack: narrow V at surface -->
  <polygon points="206,190 214,190 210,260" fill="#0A2342" stroke="#D14343" stroke-width="2"/>

  <!-- flux lines inside, bunching under crack -->
  <path d="M 60 250 L 185 250 Q 210 290 235 250 L 360 250" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 60 285 L 360 285" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 60 320 L 360 320" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- leakage arcs above surface -->
  <path d="M 178 190 Q 210 138 242 190" fill="none" stroke="#1B82E8" stroke-width="3" stroke-dasharray="8 5"/>
  <path d="M 190 190 Q 210 158 230 190" fill="none" stroke="#1B82E8" stroke-width="3" stroke-dasharray="8 5"/>

  <!-- particle pile: sharp dense mound -->
  <ellipse cx="210" cy="184" rx="26" ry="12" fill="#1E9E6A"/>
  <ellipse cx="210" cy="176" rx="14" ry="9" fill="#1E9E6A"/>

  <line x1="232" y1="172" x2="304" y2="128" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="308" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Sharp, dense,</text>
  <text x="308" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">tightly held</text>

  <line x1="210" y1="245" x2="120" y2="226" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="116" y="222" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Strong leakage</text>

  <text x="210" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Flux breaks the surface at the crack —</text>
  <text x="210" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">leakage is concentrated and intense</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="430" stroke="#5A6B7E" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- ===== RIGHT PANEL: subsurface void ===== -->
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E8F1FB">Subsurface discontinuity</text>

  <!-- metal block -->
  <rect x="430" y="190" width="320" height="170" fill="#5A6B7E" stroke="#D9E0E8" stroke-width="2"/>
  <!-- subsurface void -->
  <ellipse cx="590" cy="280" rx="26" ry="18" fill="#0A2342" stroke="#D14343" stroke-width="2"/>

  <!-- flux lines bending around void -->
  <path d="M 440 250 L 540 250 Q 590 232 640 250 L 740 250" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 440 285 L 545 285 Q 590 318 635 285 L 740 285" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 440 330 L 740 330" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <!-- weak broad leakage above surface -->
  <path d="M 510 190 Q 590 150 670 190" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="4 7"/>

  <!-- particle mound: low, wide, fuzzy (dotted) -->
  <ellipse cx="590" cy="185" rx="62" ry="8" fill="#1E9E6A" opacity="0.55"/>
  <circle cx="545" cy="180" r="3" fill="#1E9E6A"/>
  <circle cx="565" cy="176" r="3" fill="#1E9E6A"/>
  <circle cx="592" cy="174" r="3" fill="#1E9E6A"/>
  <circle cx="618" cy="177" r="3" fill="#1E9E6A"/>
  <circle cx="636" cy="181" r="3" fill="#1E9E6A"/>

  <line x1="650" y1="172" x2="690" y2="130" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="694" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Broad,</text>
  <text x="694" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">fuzzy,</text>
  <text x="694" y="156" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">weak</text>

  <line x1="590" y1="262" x2="500" y2="232" stroke="#D9E0E8" stroke-width="1.5"/>
  <text x="496" y="228" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Flux mostly</text>
  <text x="496" y="248" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">bends around</text>

  <text x="600" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">Leakage spreads and weakens before it</text>
  <text x="600" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">reaches the surface — particles held loosely</text>
</svg>
