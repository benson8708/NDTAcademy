<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Heat and Hardness Effects on Magnetism</text>

  <!-- LEFT: Curie point graph -->
  <line x1="80" y1="380" x2="385" y2="380" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="80" y1="380" x2="80" y2="120" stroke="#0A2342" stroke-width="2.5"/>
  <text x="232" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">temperature</text>
  <text x="72" y="110" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">ability to magnetize</text>
  <path d="M 80 165 C 170 170 240 185 290 230 C 312 252 322 300 330 378" fill="none" stroke="#1B82E8" stroke-width="4"/>
  <line x1="330" y1="380" x2="330" y2="140" stroke="#D14343" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="330" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Curie point</text>
  <text x="296" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">770 °C (iron)</text>
  <text x="358" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E" transform="rotate(-90 358 300)">no MT above Curie</text>
  <text x="150" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">ferromagnetic</text>

  <!-- RIGHT: hysteresis loops -->
  <line x1="430" y1="250" x2="760" y2="250" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="595" y1="395" x2="595" y2="105" stroke="#0A2342" stroke-width="2.5"/>
  <text x="755" y="272" text-anchor="end" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">H</text>
  <text x="608" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">B</text>

  <!-- wide loop (hard steel) -->
  <path d="M 475 345 C 535 342 570 336 595 330 C 630 322 647 290 660 250 C 673 210 690 175 715 155 C 655 158 625 164 595 170 C 560 178 543 210 530 250 C 517 290 500 325 475 345 Z" fill="none" stroke="#F2A33C" stroke-width="4"/>
  <!-- narrow loop (soft steel) -->
  <path d="M 515 330 C 555 318 577 302 595 290 C 605 277 607 263 610 250 C 625 222 650 195 675 170 C 635 182 613 198 595 210 C 585 223 583 237 580 250 C 565 278 540 305 515 330 Z" fill="none" stroke="#1E9E6A" stroke-width="3.5"/>

  <!-- Br and Hc markers for wide loop -->
  <circle cx="595" cy="170" r="5" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="582" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Br - retentivity</text>
  <circle cx="530" cy="250" r="5" fill="#F2A33C" stroke="#0A2342" stroke-width="1.5"/>
  <text x="524" y="238" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Hc - coercive force</text>

  <!-- legend -->
  <line x1="455" y1="392" x2="492" y2="392" stroke="#F2A33C" stroke-width="4"/>
  <text x="500" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">hard steel: wide loop, residual OK</text>
  <line x1="455" y1="420" x2="492" y2="420" stroke="#1E9E6A" stroke-width="4"/>
  <text x="500" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">soft steel: narrow loop, continuous only</text>

  <!-- divider -->
  <line x1="408" y1="60" x2="408" y2="430" stroke="#D9E0E8" stroke-width="2"/>
</svg>
