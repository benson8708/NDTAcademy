<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Choosing a Precleaning Method</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Match the method to the contaminant, then leave the surface clean, dry, and undamaged</text>

  <!-- ============ CARD 1: SOLVENT ============ -->
  <rect x="50" y="92" width="225" height="36" fill="#0A2342"/>
  <text x="162" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">SOLVENT</text>
  <rect x="50" y="128" width="225" height="284" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="62" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Typical processes</text>
  <text x="62" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Solvent wipe or soak</text>
  <text x="62" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Vapor degreasing</text>
  <text x="62" y="228" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Removes</text>
  <text x="62" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Oil, grease, cutting</text>
  <text x="74" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">fluids</text>
  <text x="62" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Will not remove</text>
  <text x="62" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Rust, scale, paint</text>
  <text x="62" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Caution</text>
  <text x="62" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">&#8226; Dry completely</text>
  <text x="62" y="396" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">&#8226; Flammable vapors</text>

  <!-- ============ CARD 2: CHEMICAL ============ -->
  <rect x="288" y="92" width="225" height="36" fill="#0A2342"/>
  <text x="400" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">CHEMICAL</text>
  <rect x="288" y="128" width="225" height="284" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="300" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Typical processes</text>
  <text x="300" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Hot alkaline soak</text>
  <text x="300" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Acid pickling</text>
  <text x="300" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Paint strippers</text>
  <text x="300" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Removes</text>
  <text x="300" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Heavy grease, carbon</text>
  <text x="300" y="294" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Rust, scale, paint</text>
  <text x="300" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Caution</text>
  <text x="300" y="346" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">&#8226; Acid can charge steel</text>
  <text x="312" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">with hydrogen: bake out</text>
  <text x="312" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">high-strength parts</text>
  <text x="300" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">&#8226; Rinse and dry fully</text>

  <!-- ============ CARD 3: MECHANICAL ============ -->
  <rect x="526" y="92" width="225" height="36" fill="#0A2342"/>
  <text x="638" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">MECHANICAL</text>
  <rect x="526" y="128" width="225" height="284" fill="#E8F1FB" stroke="#0A2342" stroke-width="2"/>
  <text x="538" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Typical processes</text>
  <text x="538" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Wire brush, grinding</text>
  <text x="538" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Abrasive blast, tumble</text>
  <text x="538" y="228" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Removes</text>
  <text x="538" y="250" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Loose scale, spatter</text>
  <text x="538" y="272" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">&#8226; Sand, old coatings</text>
  <text x="538" y="302" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D14343">Caution</text>
  <text x="538" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">&#8226; Can smear metal over</text>
  <text x="550" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">fine cracks: use the</text>
  <text x="550" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">gentlest method; etch</text>
  <text x="550" y="384" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#D14343">if smearing suspected</text>

  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Electrical contact areas for head shots and prods must always end up bare, clean metal</text>
</svg>
