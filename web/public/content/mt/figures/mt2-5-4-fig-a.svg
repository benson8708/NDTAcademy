<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">The Wet-Bath Settling Test</text>

  <!-- stand -->
  <line x1="120" y1="420" x2="320" y2="420" stroke="#5A6B7E" stroke-width="6"/>
  <line x1="160" y1="420" x2="160" y2="90" stroke="#5A6B7E" stroke-width="6"/>
  <line x1="160" y1="120" x2="225" y2="120" stroke="#5A6B7E" stroke-width="5"/>
  <line x1="160" y1="300" x2="225" y2="300" stroke="#5A6B7E" stroke-width="5"/>

  <!-- pear-shaped centrifuge tube -->
  <path d="M 240 90 L 280 90 L 277 170 Q 296 215 283 280 L 268 360 L 252 360 L 237 280 Q 224 215 243 170 Z" fill="#E8F1FB" stroke="#0A2342" stroke-width="3"/>
  <!-- liquid fill -->
  <path d="M 244 110 L 276 110 L 274 170 Q 292 215 280 278 L 266 350 L 254 350 L 240 278 Q 228 215 246 170 Z" fill="#1B82E8" opacity="0.30"/>
  <!-- 100 mL line -->
  <line x1="236" y1="110" x2="284" y2="110" stroke="#1B82E8" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="292" y="116" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">100 mL fill line</text>

  <!-- contamination band -->
  <polygon points="247,312 273,312 269,330 251,330" fill="#F2A33C"/>
  <!-- settled particles in stem tip -->
  <polygon points="251,330 269,330 266,360 254,360" fill="#0A2342"/>

  <line x1="270" y1="318" x2="350" y2="296" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="356" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Contamination band (dirt, lint, oil)</text>
  <text x="356" y="312" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">replace bath if it nears 30% of</text>
  <text x="356" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">particle volume — or carrier glows</text>

  <line x1="266" y1="348" x2="350" y2="368" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="356" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Settled magnetic particles — read here</text>

  <!-- zoom inset: graduated stem -->
  <circle cx="615" cy="180" r="105" fill="#FFFFFF" stroke="#1B82E8" stroke-width="3"/>
  <line x1="283" y1="300" x2="540" y2="230" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- stem magnified -->
  <polygon points="595,95 635,95 625,265 605,265" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <!-- graduations -->
  <line x1="595" y1="125" x2="612" y2="125" stroke="#0A2342" stroke-width="2"/>
  <text x="588" y="131" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">1.0</text>
  <line x1="597" y1="160" x2="613" y2="160" stroke="#0A2342" stroke-width="2"/>
  <text x="590" y="166" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.6</text>
  <line x1="600" y1="195" x2="614" y2="195" stroke="#0A2342" stroke-width="2"/>
  <text x="593" y="201" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.4</text>
  <line x1="602" y1="230" x2="616" y2="230" stroke="#0A2342" stroke-width="2"/>
  <text x="595" y="236" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">0.2</text>
  <!-- particle column at 0.3 -->
  <polygon points="601,212 619,212 615,265 605,265" fill="#0A2342"/>
  <line x1="619" y1="212" x2="680" y2="200" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="660" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">0.3 mL —</text>
  <text x="660" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E9E6A">in range</text>

  <!-- procedure window box -->
  <rect x="470" y="330" width="290" height="74" rx="8" fill="#FFFFFF" stroke="#1B82E8" stroke-width="2.5"/>
  <text x="615" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1B82E8">Typical concentration windows</text>
  <text x="615" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Fluorescent: 0.1–0.4 mL / 100 mL</text>
  <text x="615" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Visible: 1.2–2.4 mL / 100 mL</text>

  <!-- steps note -->
  <text x="60" y="72" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Sample from the delivery hose</text>
  <text x="60" y="92" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">after full agitation</text>

  <text x="270" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Settle undisturbed ≈ 30 min (water) / ≈ 60 min (oil)</text>
</svg>
