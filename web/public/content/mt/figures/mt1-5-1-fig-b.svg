<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">Wet Method on a Bench Unit: Flood — Divert — Shoot</text>

  <!-- bench rails -->
  <rect x="60" y="330" width="680" height="16" fill="#5A6B7E"/>
  <rect x="60" y="356" width="680" height="10" fill="#5A6B7E"/>

  <!-- headstock -->
  <rect x="80" y="200" width="100" height="130" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="130" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Headstock</text>
  <!-- tailstock -->
  <rect x="620" y="200" width="100" height="130" fill="#1B82E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="670" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Tailstock</text>

  <!-- part clamped between contact pads -->
  <rect x="180" y="245" width="440" height="44" rx="8" fill="#D9E0E8" stroke="#E8F1FB" stroke-width="2.5"/>
  <text x="270" y="274" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Part — head shot (circular field)</text>

  <!-- crack indication -->
  <line x1="510" y1="249" x2="510" y2="285" stroke="#D14343" stroke-width="3"/>
  <circle cx="510" cy="255" r="3" fill="#1E9E6A"/>
  <circle cx="510" cy="263" r="3" fill="#1E9E6A"/>
  <circle cx="510" cy="271" r="3" fill="#1E9E6A"/>
  <circle cx="510" cy="279" r="3" fill="#1E9E6A"/>
  <line x1="510" y1="245" x2="540" y2="215" stroke="#E8F1FB" stroke-width="1.5"/>
  <text x="545" y="210" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Fluorescent indication on</text>
  <text x="545" y="230" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">longitudinal crack</text>

  <!-- bath hose and stream -->
  <path d="M 300 90 Q 330 100 340 130" fill="none" stroke="#5A6B7E" stroke-width="10"/>
  <text x="250" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">Bath hose</text>
  <path d="M 342 134 Q 352 190 360 243" fill="none" stroke="#1B82E8" stroke-width="6" stroke-dasharray="8 5"/>
  <text x="430" y="150 " text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">1. Flood until wetted</text>
  <text x="430" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">2. Divert flow away</text>
  <text x="430" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">3. Shoot while bath drains</text>

  <!-- drain arrows off part -->
  <path d="M 230 292 Q 226 308 220 322" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 400 292 Q 396 308 390 322" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <path d="M 580 292 Q 576 308 570 322" fill="none" stroke="#1B82E8" stroke-width="3"/>
  <text x="400" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Suspension drains</text>

  <!-- UV lamp -->
  <rect x="540" y="80" width="120" height="34" rx="8" fill="#5A6B7E" stroke="#E8F1FB" stroke-width="2"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8F1FB">UV-A lamp</text>
  <line x1="570" y1="114" x2="540" y2="240" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="630" y1="114" x2="660" y2="240" stroke="#F2A33C" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- ammeter / shot note -->
  <rect x="80" y="382" width="640" height="48" rx="8" fill="#E8F1FB"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0A2342">Shot fired only after flow is diverted — typically two or more ~0.5 s pulses as the bath drains</text>

  <!-- circular field symbol around part -->
  <ellipse cx="250" cy="267" rx="14" ry="30" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="250" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Flux rings</text>
</svg>
