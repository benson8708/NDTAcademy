<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Indication Strength vs. Discontinuity Depth</text>

  <!-- part cross-section -->
  <rect x="50" y="270" width="700" height="150" fill="#E8F1FB" stroke="#D9E0E8" stroke-width="2"/>
  <text x="738" y="410" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Steel part</text>

  <!-- flux lines with local disturbances -->
  <path d="M60,282 L156,282 Q166,282 170,273 Q180,244 190,273 Q194,282 204,282 L408,282 Q418,282 424,279 Q430,276 436,279 Q442,282 452,282 L740,282" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M60,312 L148,312 Q162,312 168,322 Q180,340 192,322 Q198,312 208,312 L410,312 Q420,312 426,315 Q430,318 434,315 Q440,312 448,312 L740,312" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M60,350 L598,350 Q614,350 622,346 Q638,341 654,346 Q662,350 678,350 L740,350" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M60,385 L600,385 Q616,385 624,389 Q638,393 652,389 Q666,385 682,385 L740,385" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <polygon points="738,277 748,282 738,287" fill="#1B82E8"/>
  <polygon points="738,307 748,312 738,317" fill="#1B82E8"/>
  <polygon points="738,345 748,350 738,355" fill="#1B82E8"/>
  <polygon points="738,380 748,385 738,390" fill="#1B82E8"/>
  <text x="64" y="338" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#1B82E8">Magnetic flux</text>

  <!-- 1) surface crack -->
  <path d="M180,270 L176,292 L183,308 L179,326" fill="none" stroke="#D14343" stroke-width="3"/>
  <path d="M168,268 Q180,240 192,268" fill="none" stroke="#F2A33C" stroke-width="2.5"/>
  <path d="M161,268 Q180,226 199,268" fill="none" stroke="#F2A33C" stroke-width="2" opacity="0.7"/>
  <path d="M154,268 Q180,212 206,268" fill="none" stroke="#F2A33C" stroke-width="1.5" opacity="0.45"/>
  <circle cx="174" cy="262" r="3.2" fill="#1E9E6A"/>
  <circle cx="180" cy="259" r="3.2" fill="#1E9E6A"/>
  <circle cx="186" cy="262" r="3.2" fill="#1E9E6A"/>
  <circle cx="177" cy="253" r="3.2" fill="#1E9E6A"/>
  <circle cx="183" cy="253" r="3.2" fill="#1E9E6A"/>
  <circle cx="180" cy="247" r="3.2" fill="#1E9E6A"/>
  <circle cx="171" cy="265" r="3.2" fill="#1E9E6A"/>
  <circle cx="189" cy="265" r="3.2" fill="#1E9E6A"/>
  <text x="180" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Surface crack</text>
  <text x="180" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">sharp, dense, tightly held</text>
  <line x1="180" y1="144" x2="180" y2="205" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- 2) near-surface inclusion -->
  <ellipse cx="430" cy="300" rx="24" ry="11" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <path d="M398,268 Q430,244 462,268" fill="none" stroke="#F2A33C" stroke-width="2" stroke-dasharray="5 4" opacity="0.8"/>
  <path d="M386,268 Q430,230 474,268" fill="none" stroke="#F2A33C" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>
  <circle cx="404" cy="261" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="417" cy="258" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="429" cy="260" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="441" cy="257" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="453" cy="261" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="433" cy="252" r="3" fill="#1E9E6A" opacity="0.75"/>
  <circle cx="410" cy="253" r="3" fill="#1E9E6A" opacity="0.75"/>
  <text x="430" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Near-surface inclusion</text>
  <text x="430" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">broad, fuzzy, weak</text>
  <line x1="430" y1="144" x2="430" y2="220" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- 3) deep inclusion -->
  <ellipse cx="650" cy="372" rx="24" ry="11" fill="#5A6B7E" stroke="#0A2342" stroke-width="1.5"/>
  <text x="650" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Deep inclusion</text>
  <text x="650" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">little or no indication</text>
  <line x1="650" y1="144" x2="650" y2="258" stroke="#5A6B7E" stroke-width="1.5"/>

  <!-- depth arrow -->
  <line x1="772" y1="270" x2="772" y2="423" stroke="#D9E0E8" stroke-width="2"/>
  <polygon points="767,421 772,436 777,421" fill="#D9E0E8"/>
  <text x="772" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Depth</text>

  <text x="400" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D9E0E8">Surface leakage, and the indication it can hold, fades rapidly with depth</text>
</svg>
