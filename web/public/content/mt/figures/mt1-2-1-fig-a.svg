<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Field Patterns Around Magnetized Materials</text>

  <!-- ===== Left: bar magnet ===== -->
  <!-- external flux loops (N at right, S at left): flow right-to-left over top and bottom -->
  <ellipse cx="195" cy="245" rx="140" ry="60" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 5"/>
  <ellipse cx="195" cy="245" rx="180" ry="100" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 5"/>
  <ellipse cx="195" cy="245" rx="218" ry="140" fill="none" stroke="#1B82E8" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- direction arrowheads: flux N to S outside (leftward at top and bottom) -->
  <polygon points="207,139 185,145 207,151" fill="#1B82E8"/>
  <polygon points="207,339 185,345 207,351" fill="#1B82E8"/>
  <polygon points="207,99 185,105 207,111" fill="#1B82E8"/>

  <!-- bar magnet body -->
  <rect x="85" y="220" width="110" height="50" fill="#1B82E8" stroke="#0A2342" stroke-width="3"/>
  <rect x="195" y="220" width="110" height="50" fill="#D14343" stroke="#0A2342" stroke-width="3"/>
  <text x="140" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">S</text>
  <text x="250" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">N</text>

  <!-- flux exit / entry arrows at the poles -->
  <line x1="307" y1="245" x2="337" y2="245" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="337,239 352,245 337,251" fill="#F2A33C"/>
  <line x1="50" y1="245" x2="80" y2="245" stroke="#F2A33C" stroke-width="3"/>
  <polygon points="80,239 95,245 80,251" fill="#F2A33C"/>
  <text x="195" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flux returns S to N inside the bar</text>

  <text x="195" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Bar magnet</text>
  <text x="195" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">flux exits N, loops to S, never crosses</text>

  <!-- ===== Right: horseshoe magnet ===== -->
  <path d="M 545 165 L 545 290 Q 545 358 605 358 Q 665 358 665 290 L 665 165" fill="none" stroke="#5A6B7E" stroke-width="42"/>
  <!-- pole tips -->
  <rect x="524" y="130" width="42" height="38" fill="#D14343" stroke="#0A2342" stroke-width="3"/>
  <rect x="644" y="130" width="42" height="38" fill="#1B82E8" stroke="#0A2342" stroke-width="3"/>
  <text x="545" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">N</text>
  <text x="665" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">S</text>

  <!-- concentrated field lines across the gap -->
  <path d="M 570 140 Q 605 118 640 140" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 570 122 Q 605 96 640 122" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <path d="M 570 104 Q 605 74 640 104" fill="none" stroke="#1B82E8" stroke-width="2.5"/>
  <polygon points="634,134 648,143 632,146" fill="#1B82E8"/>
  <polygon points="634,116 648,125 632,128" fill="#1B82E8"/>
  <polygon points="634,98 648,107 632,110" fill="#1B82E8"/>

  <line x1="566" y1="106" x2="520" y2="92" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="512" y="78" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">
    <tspan x="512" y="78">concentrated field</tspan>
    <tspan x="512" y="97">in the gap</tspan>
  </text>

  <text x="605" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Horseshoe magnet</text>
  <text x="605" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">poles face each other — the geometry of a yoke</text>
</svg>
