<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Portable Magnetization: Yoke vs Prods</text>

  <line x1="400" y1="60" x2="400" y2="400" stroke="#D9E0E8" stroke-width="2"/>

  <!-- LEFT: yoke -->
  <text x="200" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Yoke — longitudinal field between poles</text>

  <!-- plate -->
  <rect x="60" y="280" width="280" height="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>
  <!-- yoke body -->
  <path d="M 130 280 L 130 200 Q 130 150 200 150 Q 270 150 270 200 L 270 280 L 234 280 L 234 212 Q 234 186 200 186 Q 166 186 166 212 L 166 280 Z" fill="#1B82E8" stroke="#0A2342" stroke-width="3"/>
  <text x="200" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">AC/DC yoke</text>
  <text x="148" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">N</text>
  <text x="252" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">S</text>

  <!-- flux between poles -->
  <path d="M 148 284 Q 200 318 252 284" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <path d="M 148 292 Q 200 334 252 292" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <polygon points="196,318 212,313 200,325" fill="#1E9E6A"/>

  <!-- detectable crack orientation -->
  <line x1="196" y1="288" x2="204" y2="312" stroke="#D14343" stroke-width="3"/>
  <line x1="200" y1="312" x2="160" y2="356" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="150" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Finds flaws ACROSS</text>
  <text x="150" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">the pole-to-pole line</text>

  <text x="200" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Lift check: ≈10 lb AC / ≈40 lb DC at spacing used</text>

  <!-- RIGHT: prods -->
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B82E8">Prods — circular field around current path</text>

  <!-- plate -->
  <rect x="460" y="280" width="280" height="50" fill="#D9E0E8" stroke="#0A2342" stroke-width="3"/>

  <!-- prods -->
  <line x1="510" y1="160" x2="510" y2="280" stroke="#5A6B7E" stroke-width="10"/>
  <line x1="690" y1="160" x2="690" y2="280" stroke="#5A6B7E" stroke-width="10"/>
  <rect x="498" y="130" width="24" height="34" rx="6" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <rect x="678" y="130" width="24" height="34" rx="6" fill="#F2A33C" stroke="#0A2342" stroke-width="2"/>
  <text x="510" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Prod</text>
  <text x="690" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">Prod</text>

  <!-- current path arrow in plate -->
  <line x1="514" y1="305" x2="676" y2="305" stroke="#F2A33C" stroke-width="3.5"/>
  <polygon points="672,298 688,305 672,312" fill="#F2A33C"/>
  <text x="600" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">Current between tips</text>

  <!-- circular field rings around current path -->
  <ellipse cx="560" cy="305" rx="12" ry="26" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <ellipse cx="600" cy="305" rx="12" ry="26" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <ellipse cx="640" cy="305" rx="12" ry="26" fill="none" stroke="#1E9E6A" stroke-width="2.5"/>
  <text x="600" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">Circular flux around the path —</text>
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1E9E6A">finds flaws PARALLEL to current</text>

  <!-- spacing dimension -->
  <line x1="510" y1="208" x2="690" y2="208" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="510" y1="200" x2="510" y2="216" stroke="#5A6B7E" stroke-width="1.5"/>
  <line x1="690" y1="200" x2="690" y2="216" stroke="#5A6B7E" stroke-width="1.5"/>
  <text x="600" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Spacing typ. 6–8 in.</text>

  <text x="600" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Typ. 90–125 A per inch of spacing — procedure governs</text>
  <text x="600" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">Arc-strike risk: seat tips before energizing</text>
</svg>
