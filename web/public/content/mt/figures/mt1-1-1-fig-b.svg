<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#0A2342"/>
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E8F1FB">The Major NDT Methods at a Glance</text>

  <!-- row 1 -->
  <rect x="40" y="70" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="155" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">VT</text>
  <text x="155" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Visual Testing</text>
  <text x="155" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Surface condition, weld</text>
  <text x="155" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">profile, corrosion —</text>
  <text x="155" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">first method on every job</text>

  <rect x="285" y="70" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">PT</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Liquid Penetrant</text>
  <text x="400" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Surface-breaking flaws</text>
  <text x="400" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">in nearly any</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">nonporous material</text>

  <rect x="530" y="70" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#F2A33C" stroke-width="5"/>
  <text x="645" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">MT</text>
  <text x="645" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Magnetic Particle</text>
  <text x="645" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Surface and near-surface</text>
  <text x="645" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">flaws in steels</text>
  <text x="645" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F2A33C">this course</text>

  <!-- row 2 -->
  <rect x="40" y="250" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="155" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">UT</text>
  <text x="155" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Ultrasonic Testing</text>
  <text x="155" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Internal flaws and</text>
  <text x="155" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">thickness, found with</text>
  <text x="155" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">high-frequency sound</text>

  <rect x="285" y="250" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="400" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">RT</text>
  <text x="400" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Radiographic Testing</text>
  <text x="400" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Internal volumetric flaws</text>
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">imaged by X-rays</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">or gamma rays</text>

  <rect x="530" y="250" width="230" height="150" rx="10" fill="#E8F1FB" stroke="#1B82E8" stroke-width="2"/>
  <text x="645" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0A2342">ET</text>
  <text x="645" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">Eddy Current Testing</text>
  <text x="645" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">Surface flaws, sorting,</text>
  <text x="645" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coatings — any</text>
  <text x="645" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">conductive material</text>

  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">MT's lane: surface and slightly subsurface discontinuities in ferromagnetic materials</text>
</svg>
