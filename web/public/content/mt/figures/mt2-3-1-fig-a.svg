<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0A2342">Choosing the Magnetization Method</text>

  <!-- Box 1: know the part -->
  <rect x="42" y="58" width="300" height="92" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="192" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">1 · KNOW THE PART</text>
  <text x="192" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">alloy → continuous or residual</text>
  <text x="192" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">shape → coil, heads, conductor</text>
  <text x="192" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">condition → particles, contact</text>

  <!-- arrow 1 -> 2 -->
  <line x1="342" y1="104" x2="390" y2="104" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="390,97 404,104 390,111" fill="#1B82E8"/>

  <!-- Box 2: flaw direction -->
  <rect x="408" y="58" width="350" height="92" rx="8" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <text x="583" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">2 · WHERE DO FLAWS LIE?</text>
  <text x="583" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">orientation unknown →</text>
  <text x="583" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">plan BOTH directions, ≈ 90° apart</text>

  <!-- branch arrows from box 2 -->
  <line x1="500" y1="150" x2="290" y2="180" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="292,173 276,182 296,187" fill="#1B82E8"/>
  <line x1="600" y1="150" x2="600" y2="178" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="593,178 600,192 607,178" fill="#1B82E8"/>

  <!-- Branch: circular -->
  <rect x="42" y="186" width="346" height="86" rx="8" fill="#FFFFFF" stroke="#1B82E8" stroke-width="3"/>
  <text x="215" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Flaws ALONG the part</text>
  <text x="215" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">→ CIRCULAR field</text>
  <text x="215" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">head shot · central conductor · prods</text>

  <!-- Branch: longitudinal -->
  <rect x="412" y="186" width="346" height="86" rx="8" fill="#FFFFFF" stroke="#1B82E8" stroke-width="3"/>
  <text x="585" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0A2342">Flaws ACROSS the part</text>
  <text x="585" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#F2A33C">→ LONGITUDINAL field</text>
  <text x="585" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A2342">coil · cable wrap · yoke</text>

  <!-- arrows down to bottom row -->
  <line x1="215" y1="272" x2="215" y2="298" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="208,298 215,312 222,298" fill="#1B82E8"/>
  <line x1="585" y1="272" x2="585" y2="298" stroke="#1B82E8" stroke-width="3"/>
  <polygon points="578,298 585,312 592,298" fill="#1B82E8"/>

  <!-- Box 3: current type -->
  <rect x="42" y="316" width="346" height="116" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2.5"/>
  <text x="215" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">3 · CURRENT TYPE</text>
  <text x="215" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">AC — surface only, best mobility</text>
  <text x="215" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">HWDC — subsurface + dry powder</text>
  <text x="215" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">FWDC — deepest (bench, wet)</text>

  <!-- Box 4: sequence + flux -->
  <rect x="412" y="316" width="346" height="116" rx="8" fill="#0A2342" stroke="#0A2342" stroke-width="2.5"/>
  <text x="585" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8F1FB">4 · SEQUENCE   5 · FLUX DENSITY</text>
  <text x="585" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">continuous unless residual permitted</text>
  <text x="585" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#E8F1FB">inspect one direction, then the next</text>
  <text x="585" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#F2A33C">prove it: QQI shim · 30–60 G tangential</text>
</svg>
