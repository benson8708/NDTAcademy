  <path d="M 625 105 L 625 180 C 625 210 606 226 604 235 C 606 244 625 260 625 290 L 625 365" fill="none" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 655 105 L 655 180 C 655 210 674 226 676 235 C 674 244 655 260 655 290 L 655 365" fill="none" stroke="#1B82E8" stroke-width="2"/>
