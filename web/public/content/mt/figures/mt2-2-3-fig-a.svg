  <text x="160" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A2342">sound section</text>
  <text x="160" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5A6B7E">uniform stress</text>

  <!-- PANEL 2: round hole -->
  <rect x="325" y="100" width="150" height="270" fill="#E8F1FB" stroke="#0A2342" stroke-width="2.5"/>
  <line x1="345" y1="105" x2="345" y2="365" stroke="#1B82E8" stroke-width="2"/>
  <path d="M 372 105 L 372 180 C 372 215 362 220 360 235 C 362 250 372 255 372 290 L 372 365" fill="none" stroke="#1B82E8" stroke-width="2"/>
