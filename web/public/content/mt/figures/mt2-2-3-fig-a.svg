  <text x="640" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D14343">far higher - crowds at tips</text>

  <!-- bottom reaction arrows -->
  <line x1="160" y1="370" x2="160" y2="378" stroke="#FFFFFF" stroke-width="0"/>
