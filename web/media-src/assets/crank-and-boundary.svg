<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="crbglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crbglowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="crbsteelG" x1="0" y1="242" x2="0" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30608f"/><stop offset=".4" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="crbpipeG" x1="0" y1="155" x2="0" y2="197" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f4a78"/><stop offset=".28" stop-color="#3a6da0"/><stop offset=".62" stop-color="#173a5f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="crbweldG" x1="0" y1="153" x2="0" y2="199" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f9bff"/><stop offset=".5" stop-color="#2b86ff"/><stop offset="1" stop-color="#1E66F5"/>
    </linearGradient>
    <linearGradient id="crbbeamG" x1="530" y1="152" x2="535" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffc24b" stop-opacity=".38"/>
      <stop offset=".55" stop-color="#ff9b4b" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ff9b4b" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="crbwallG" x1="0" y1="196" x2="0" y2="272" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24507f"/><stop offset=".5" stop-color="#14304f"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <filter id="crbsoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <mask id="crbpulseM" maskUnits="userSpaceOnUse" x="0" y="0" width="600" height="340">
      <rect x="-20" y="172" width="660" height="190" fill="#fff" filter="url(#crbsoft)"/>
    </mask>
    <!-- radiation trefoil (local origin at symbol center) -->
    <g id="crbtref">
      <circle r="1.3"/>
      <path d="M-2.6,-4.5 A5.2,5.2 0 0 1 2.6,-4.5 L1,-1.73 A2,2 0 0 0 -1,-1.73 Z"/>
      <path d="M5.2,0 A5.2,5.2 0 0 1 2.6,4.5 L1,1.73 A2,2 0 0 0 2,0 Z"/>
      <path d="M-2.6,4.5 A5.2,5.2 0 0 1 -5.2,0 L-2,0 A2,2 0 0 0 -1,1.73 Z"/>
    </g>
  </defs>

  <!-- ===== BASE (default visible): fab-yard backdrop, ground, block wall ===== -->
  <g stroke="#2a527f" fill="none" opacity=".4">
    <path d="M52 272 V224 M108 272 V224 M44 224 H116 M84 224 V236 M81 236 H87" stroke-width="2"/>
    <path d="M40 244 H64 M96 252 H112" stroke-width="1"/>
  </g>
  <g opacity=".32">
    <path d="M212 272 V242 Q231 232 250 242 V272 Z" fill="#0e2848" stroke="#2a527f" stroke-width="1.5"/>
    <path d="M212 250 H250" stroke="#2a527f" stroke-width="1" fill="none"/>
  </g>
  <line x1="8" y1="272" x2="592" y2="272" stroke="#8fb6e0" stroke-width="1" opacity=".22"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".1">
    <path d="M60 284 H120 M210 290 H264 M420 286 H488 M520 296 H560 M120 304 H170"/>
  </g>

  <!-- ===== crbScene: projector + guide tube + collimator head + pipe girth weld + ground line ===== -->
  <g id="crbScene" opacity="0">
    <line x1="8" y1="272" x2="592" y2="272" stroke="#8fb6e0" stroke-width="1.5" opacity=".55"/>
    <!-- pipe stands -->
    <g stroke="#14304f" stroke-width="4" fill="none">
      <path d="M488 198 L478 272 M488 198 L498 272 M576 198 L566 272 M576 198 L586 272"/>
    </g>
    <g stroke="#8fb6e0" stroke-width="1" fill="none" opacity=".55">
      <path d="M488 198 L478 272 M488 198 L498 272 M576 198 L566 272 M576 198 L586 272"/>
      <path d="M481 250 H495 M569 250 H583" stroke-width="1.5"/>
    </g>
    <!-- pipe -->
    <rect x="464" y="155" width="134" height="42" fill="url(#crbpipeG)"/>
    <ellipse cx="464" cy="176" rx="6" ry="21" fill="#102a47" stroke="#8fb6e0" stroke-width="1.2" opacity=".85"/>
    <line x1="464" y1="155" x2="598" y2="155" stroke="#8fb6e0" stroke-width="2"/>
    <line x1="464" y1="197" x2="598" y2="197" stroke="#8fb6e0" stroke-width="2"/>
    <line x1="470" y1="162" x2="598" y2="162" stroke="#9fd0ff" stroke-width="1" opacity=".3"/>
    <!-- girth weld band + caps -->
    <rect x="525" y="155" width="10" height="42" fill="url(#crbweldG)"/>
    <path d="M523 155 Q530 150.5 537 155" fill="#3f9bff" stroke="#7fd8ff" stroke-width="1.5"/>
    <path d="M523 197 Q530 201.5 537 197" fill="#1E66F5" stroke="#7fd8ff" stroke-width="1.2"/>
    <line x1="525" y1="155" x2="525" y2="197" stroke="#7fd8ff" stroke-width="1" opacity=".7"/>
    <line x1="535" y1="155" x2="535" y2="197" stroke="#7fd8ff" stroke-width="1" opacity=".7"/>
    <!-- film cassette wrapped under the weld -->
    <path d="M510 198 Q530 207 550 198 L550 203 Q530 212 510 203 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
    <!-- collimator / exposure head on the weld -->
    <path d="M524 148 L536 148 L533 155 L527 155 Z" fill="#0c2340" stroke="#8fb6e0" stroke-width="1.2"/>
    <rect x="518" y="126" width="24" height="22" rx="3" fill="url(#crbsteelG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="522.5" cy="131" r="1" fill="#8fb6e0"/><circle cx="537.5" cy="131" r="1" fill="#8fb6e0"/>
    <!-- guide tube: projector front to head -->
    <path d="M448 252 C474 246 462 212 478 186 C490 166 502 148 517 137" fill="none" stroke="#8fb6e0" stroke-width="9" opacity=".5"/>
    <path d="M448 252 C474 246 462 212 478 186 C490 166 502 148 517 137" fill="none" stroke="#1b3e66" stroke-width="6.5"/>
    <path d="M448 252 C474 246 462 212 478 186 C490 166 502 148 517 137" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".25"/>
    <!-- exposure device (gamma projector) on the ground -->
    <ellipse cx="424" cy="272" rx="32" ry="3" fill="#04101f" opacity=".55"/>
    <rect x="398" y="244" width="50" height="26" rx="4" fill="url(#crbsteelG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M410 244 C414 234 434 234 438 244" fill="none" stroke="#8fb6e0" stroke-width="2"/>
    <rect x="401" y="270" width="9" height="2.5" fill="#0c2340" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="436" y="270" width="9" height="2.5" fill="#0c2340" stroke="#8fb6e0" stroke-width="1"/>
    <circle cx="398" cy="257" r="3.5" fill="#0c2340" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="448" cy="252" r="3.5" fill="#0c2340" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="414" y="249" width="18" height="14" rx="1.5" fill="#0e2848" stroke="#ffc24b" stroke-width="1"/>
    <use href="#crbtref" transform="translate(423,256) scale(.62)" fill="#ffc24b"/>
  </g>

  <!-- ===== crbBeam: collimated fan to the weld + ground, central ray, source glow ===== -->
  <g id="crbBeam" opacity="0">
    <path d="M526 155 L534 155 L564 272 L506 272 Z" fill="url(#crbbeamG)"/>
    <path d="M526 155 L506 272 M534 155 L564 272" stroke="#ffc24b" stroke-width="1" opacity=".4" fill="none"/>
    <path d="M530 156 L535 272" stroke="#ffc24b" stroke-width="1.2" stroke-dasharray="5 4" opacity=".6" fill="none"/>
    <ellipse cx="535" cy="272" rx="29" ry="3.5" fill="#ff9b4b" opacity=".18"/>
    <circle cx="530" cy="143" r="2.8" fill="#ffc24b" filter="url(#crbglowR)" opacity=".95"/>
  </g>

  <!-- ===== crbCable: full drive-cable run, projector -> crank (draw) ===== -->
  <path id="crbCable" d="M398 258 C382 263 368 266 352 265 C336 264 330 259 316 260 C302 261 292 266 278 266 C264 266 256 256 244 254 C232 252 230 267 218 268 C208 269 199 261 195 252" fill="none" stroke="#9fd0ff" stroke-width="2.5" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== crbPulse: ambient dose ripples dying at the rope + cable shimmer (loop) ===== -->
  <g id="crbPulse" opacity="0">
    <g mask="url(#crbpulseM)">
      <circle cx="530" cy="143" r="20" fill="none" stroke="#ffc24b" stroke-width="1.4" opacity=".5">
        <animate attributeName="r" values="14;150" dur="3.3s" begin="-0.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".55;0" dur="3.3s" begin="-0.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="530" cy="143" r="64" fill="none" stroke="#ffc24b" stroke-width="1.4" opacity=".35">
        <animate attributeName="r" values="14;150" dur="3.3s" begin="-1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".55;0" dur="3.3s" begin="-1.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="530" cy="143" r="112" fill="none" stroke="#ffc24b" stroke-width="1.4" opacity=".18">
        <animate attributeName="r" values="14;150" dur="3.3s" begin="-2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".55;0" dur="3.3s" begin="-2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle cx="530" cy="143" r="3.4" fill="#ffc24b" filter="url(#crbglowR)" opacity=".9">
      <animate attributeName="opacity" values=".95;.5;.95" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M398 258 C382 263 368 266 352 265 C336 264 330 259 316 260 C302 261 292 266 278 266 C264 266 256 256 244 254 C232 252 230 267 218 268 C208 269 199 261 195 252" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linecap="round" opacity=".75" pathLength="200" stroke-dasharray="16 184">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="5s" begin="-1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== masonry wall (default visible; occludes cable mid-run) ===== -->
  <g>
    <rect x="270" y="198" width="52" height="74" fill="url(#crbwallG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="266" y="192" width="60" height="7" rx="1.5" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.5"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".4" fill="none">
      <path d="M270 216.5 H322 M270 235 H322 M270 253.5 H322"/>
      <path d="M296 198 V216.5 M283 216.5 V235 M309 216.5 V235 M296 235 V253.5 M283 253.5 V272 M309 253.5 V272"/>
    </g>
  </g>

  <!-- ===== crbFigure: radiographer crouched at the crank, behind the wall ===== -->
  <g id="crbFigure" opacity="0">
    <ellipse cx="160" cy="272" rx="38" ry="3" fill="#04101f" opacity=".5"/>
    <!-- crank stand + reel -->
    <path d="M191 272 V248 M183 272 L191 254" stroke="#1b3e66" stroke-width="4" fill="none"/>
    <path d="M191 272 V248 M183 272 L191 254" stroke="#8fb6e0" stroke-width="1" fill="none" opacity=".5"/>
    <line x1="180" y1="272" x2="202" y2="272" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="191" cy="247" r="8" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="191" cy="247" r="4.5" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5" stroke-dasharray="2.5 2"/>
    <circle cx="191" cy="247" r="1.8" fill="#8fb6e0"/>
    <path d="M191 247 L200 239" stroke="#8fb6e0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="200" cy="238.5" r="2.2" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.2"/>
    <!-- kneeling figure -->
    <path d="M137 256 L126.5 264 L128.5 270.5" fill="none" stroke="#142f50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M137 256 L126.5 264 L128.5 270.5" fill="none" stroke="#8fb6e0" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity=".3"/>
    <path d="M138.5 257 L151 267.5 L133.5 269.5" fill="none" stroke="#1b3e66" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M138.5 257 L151 267.5 L133.5 269.5" fill="none" stroke="#8fb6e0" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
    <path d="M144.5 236.5 L153 240 L145 262 L134.5 257 Z" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M148 242 L141 256 M151 245 L144 259" stroke="#ffc24b" stroke-width="1.4" opacity=".8"/>
    <path d="M150 243.5 L168 251 L190 248.5" fill="none" stroke="#142f50" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M151 241 L170 247.5 L197 240" fill="none" stroke="#1b3e66" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M151 241 L170 247.5 L197 240" fill="none" stroke="#8fb6e0" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity=".4"/>
    <circle cx="148" cy="231" r="5.8" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M140.5 229.5 A 8 8 0 0 1 155.5 229.5 L 157 231.5 L 139 231.5 Z" fill="#ffc24b" stroke="#b97f1f" stroke-width="1"/>
  </g>

  <!-- ===== crbCableLbl ===== -->
  <g id="crbCableLbl" font-size="12" opacity="0">
    <text x="233" y="228" text-anchor="middle" fill="#9fe6ff" opacity=".9">FULL CABLE</text>
    <path d="M233 232 L240 251" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
  </g>

  <!-- ===== crbRope: boundary rope across the foreground (draw) ===== -->
  <path id="crbRope" d="M34 275 Q101 290 168 287 Q235 299 302 293 Q369 299 436 287 Q502 290 568 275" fill="none" stroke="#ffc24b" stroke-width="2" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== crbRopeKit: stanchions, barrier stripes, trefoil placards, survey meter ===== -->
  <g id="crbRopeKit" opacity="0">
    <path d="M34 275 Q101 290 168 287 Q235 299 302 293 Q369 299 436 287 Q502 290 568 275" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="butt" stroke-dasharray="9 9" opacity=".85"/>
    <g stroke="#2a5a8c" stroke-width="3">
      <path d="M34 300 V275 M168 312 V287 M302 318 V293 M436 312 V287 M568 300 V275"/>
    </g>
    <g fill="#8fb6e0">
      <circle cx="34" cy="274" r="2"/><circle cx="168" cy="286" r="2"/><circle cx="302" cy="292" r="2"/><circle cx="436" cy="286" r="2"/><circle cx="568" cy="274" r="2"/>
    </g>
    <g fill="#0c2340" opacity=".9">
      <ellipse cx="34" cy="300" rx="8" ry="2.2"/><ellipse cx="168" cy="312" rx="8" ry="2.2"/><ellipse cx="302" cy="318" rx="8" ry="2.2"/><ellipse cx="436" cy="312" rx="8" ry="2.2"/><ellipse cx="568" cy="300" rx="8" ry="2.2"/>
    </g>
    <!-- trefoil placards hung on the rope -->
    <g>
      <rect x="92.5" y="285" width="17" height="15" rx="1.5" fill="#0e2848" stroke="#ffc24b" stroke-width="1.5"/>
      <use href="#crbtref" transform="translate(101,292.8)" fill="#ffc24b"/>
      <rect x="360.5" y="295" width="17" height="15" rx="1.5" fill="#0e2848" stroke="#ffc24b" stroke-width="1.5"/>
      <use href="#crbtref" transform="translate(369,302.8)" fill="#ffc24b"/>
      <rect x="493.5" y="285" width="17" height="15" rx="1.5" fill="#0e2848" stroke="#ffc24b" stroke-width="1.5"/>
      <use href="#crbtref" transform="translate(502,292.8)" fill="#ffc24b"/>
    </g>
    <!-- survey meter on the ground just inside the rope -->
    <g>
      <rect x="320" y="296" width="22" height="11" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
      <rect x="328" y="292.5" width="6" height="3.5" rx="1" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1"/>
      <path d="M325 304 A 6 6 0 0 1 337 304" fill="none" stroke="#5fe0ff" stroke-width="1"/>
      <path d="M331 304.5 L335 299.5" stroke="#ffc24b" stroke-width="1.2"/>
    </g>
  </g>

  <!-- ===== crbRopeLbl ===== -->
  <g id="crbRopeLbl" font-size="12" opacity="0">
    <text x="22" y="260" fill="#9fe6ff" opacity=".9">BOUNDARY</text>
    <path d="M40 264 L36 273" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
  </g>
</svg>
