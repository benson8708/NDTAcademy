<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="bglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bglowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bsteel" x1="0" y1="150" x2="0" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30608f"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="bhazL" gradientUnits="userSpaceOnUse" x1="289" y1="197" x2="263" y2="210">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#2b86ff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#2b86ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bhazR" gradientUnits="userSpaceOnUse" x1="351" y1="197" x2="377" y2="210">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#2b86ff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#2b86ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===== STEEL PLATES (cross-section) ===== -->
  <path d="M40 150 L265 150 L313 245 L40 245 Z" fill="url(#bsteel)"/>
  <path d="M375 150 L560 150 L560 245 L327 245 Z" fill="url(#bsteel)"/>
  <!-- rolling texture -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".22">
    <line x1="44" y1="154" x2="253" y2="154" opacity=".9"/>
    <line x1="387" y1="154" x2="556" y2="154" opacity=".9"/>
    <line x1="46" y1="166" x2="266" y2="166"/>
    <line x1="46" y1="188" x2="277" y2="188"/>
    <line x1="46" y1="210" x2="288" y2="210"/>
    <line x1="46" y1="231" x2="299" y2="231"/>
    <line x1="373" y1="166" x2="554" y2="166"/>
    <line x1="362" y1="188" x2="554" y2="188"/>
    <line x1="351" y1="210" x2="554" y2="210"/>
    <line x1="340" y1="231" x2="554" y2="231"/>
  </g>

  <!-- ===== HAZ bands flanking fusion lines (inner bright + outer faint + etch boundary) ===== -->
  <path d="M265 150 L313 245 L305 245 L253 150 Z" fill="#2b86ff" opacity=".42"/>
  <path d="M253 150 L305 245 L297 245 L240 150 Z" fill="#2b86ff" opacity=".17"/>
  <path d="M240 150 L297 245" fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".3" stroke-dasharray="4 4"/>
  <path d="M375 150 L327 245 L335 245 L387 150 Z" fill="#2b86ff" opacity=".42"/>
  <path d="M387 150 L335 245 L343 245 L400 150 Z" fill="#2b86ff" opacity=".17"/>
  <path d="M400 150 L343 245" fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".3" stroke-dasharray="4 4"/>

  <!-- ===== WELD METAL: root, 2 fill passes, cap ===== -->
  <path d="M301.4 222 L313 245 Q320 253.5 327 245 L338.6 222 Q320 232 301.4 222 Z" fill="#1E66F5"/>
  <path d="M288.2 196 L301.4 222 Q320 232 338.6 222 L351.8 196 Q320 207 288.2 196 Z" fill="#2b86ff"/>
  <path d="M275.1 170 L288.2 196 Q320 207 351.8 196 L364.9 170 Q320 182 275.1 170 Z" fill="#3f9bff"/>
  <path d="M255 150 C285 132 355 132 385 150 L375 150 L364.9 170 Q320 182 275.1 170 L265 150 Z" fill="#2f7ef2"/>

  <!-- pass boundaries (concave-up): dark etch seam + bright line -->
  <g fill="none" stroke="#0e2848" stroke-width="2.6" opacity=".55">
    <path d="M301.4 222 Q320 232 338.6 222"/>
    <path d="M288.2 196 Q320 207 351.8 196"/>
    <path d="M275.1 170 Q320 182 364.9 170"/>
  </g>
  <g fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".85">
    <path d="M301.4 222 Q320 232 338.6 222"/>
    <path d="M288.2 196 Q320 207 351.8 196"/>
    <path d="M275.1 170 Q320 182 364.9 170"/>
  </g>
  <!-- fusion lines (bevel walls): dark etch + bright line -->
  <g fill="none" stroke="#0e2848" stroke-width="2.6" opacity=".5">
    <path d="M265 150 L313 245"/>
    <path d="M375 150 L327 245"/>
  </g>
  <g fill="none" stroke="#7fd8ff" stroke-width="1.2" opacity=".75">
    <path d="M265 150 L313 245"/>
    <path d="M375 150 L327 245"/>
  </g>
  <!-- cap ripples -->
  <g fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".5">
    <path d="M268 148 Q320 126 372 148"/>
    <path d="M283 147 Q320 132 357 147"/>
    <path d="M298 146.5 Q320 138 342 146.5"/>
  </g>
  <!-- cap + root bead glow outlines -->
  <path d="M255 150 C285 132 355 132 385 150" fill="none" stroke="#5fe0ff" stroke-width="2" filter="url(#bglowC)" opacity=".9"/>
  <path d="M313 245 Q320 253.5 327 245" fill="none" stroke="#5fe0ff" stroke-width="1.5" opacity=".7"/>

  <!-- plate edges -->
  <g stroke="#8fb6e0" stroke-width="2" fill="none">
    <path d="M40 150 H255"/><path d="M385 150 H560"/>
    <path d="M40 245 H313"/><path d="M327 245 H560"/>
  </g>
  <g stroke="#8fb6e0" stroke-width="1.5" opacity=".5" fill="none">
    <path d="M40 150 V245"/><path d="M560 150 V245"/>
  </g>

  <!-- ===== SUBSURFACE POROSITY ===== -->
  <g id="bpore" opacity="0">
    <circle cx="309" cy="188" r="4" fill="#ffc24b"/><circle cx="309" cy="188" r="2.6" fill="none" stroke="#b97f1f" stroke-width="1.4"/>
    <circle cx="320" cy="193" r="5.5" fill="#ffc24b"/><circle cx="320" cy="193" r="3.8" fill="none" stroke="#b97f1f" stroke-width="1.6"/>
    <circle cx="328" cy="200" r="3" fill="#ffc24b"/><circle cx="328" cy="200" r="1.8" fill="none" stroke="#b97f1f" stroke-width="1.2"/>
    <circle cx="308" cy="201" r="2.5" fill="#ffc24b"/><circle cx="308" cy="201" r="1.4" fill="none" stroke="#b97f1f" stroke-width="1"/>
    <circle cx="316" cy="181" r="3.2" fill="#ffc24b"/><circle cx="316" cy="181" r="2" fill="none" stroke="#b97f1f" stroke-width="1.2"/>
    <circle cx="316" cy="193" r="17" fill="none" stroke="#ffc24b" stroke-width="1" stroke-dasharray="4 3" opacity=".55"/>
  </g>

  <!-- ===== UNDERCUT at right cap toe (surface notch) ===== -->
  <g id="bunder" opacity="0">
    <path d="M386 148.8 L404 148.8 L404 150.4 Q400 155.4 395 155.8 Q390.6 156.1 386 150.4 Z" fill="#08152b"/>
    <path d="M386 150 Q390.6 155.3 395 155 Q400 154.6 404 150 Z" fill="#ff9b4b" opacity=".14"/>
    <path d="M386 150 Q390.6 155.3 395 155 Q400 154.6 404 150" fill="none" stroke="#ff9b4b" stroke-width="1.5" stroke-linecap="round" filter="url(#bglowR)" opacity=".95"/>
  </g>

  <!-- ===== SURFACE-BREAKING POROSITY on cap face (craters) ===== -->
  <g id="bsurfpore" opacity="0">
    <circle cx="304" cy="138.4" r="3.2" fill="#ffc24b"/><circle cx="304" cy="138.4" r="1.9" fill="none" stroke="#b97f1f" stroke-width="1.3"/><circle cx="304" cy="138.4" r=".8" fill="#7a4d10"/>
    <circle cx="320.5" cy="137.4" r="2.4" fill="#ffc24b"/><circle cx="320.5" cy="137.4" r="1.4" fill="none" stroke="#b97f1f" stroke-width="1.1"/><circle cx="320.5" cy="137.4" r=".6" fill="#7a4d10"/>
    <circle cx="335" cy="138.3" r="3" fill="#ffc24b"/><circle cx="335" cy="138.3" r="1.8" fill="none" stroke="#b97f1f" stroke-width="1.2"/><circle cx="335" cy="138.3" r=".7" fill="#7a4d10"/>
  </g>

  <!-- ===== CORROSION PITTING on left plate top surface ===== -->
  <g id="bpits" opacity="0">
    <g fill="#08152b">
      <path d="M91 148.8 L97 148.8 L97 150.1 Q94 154.1 91 150.1 Z"/>
      <path d="M109 148.8 L114 148.8 L114 150.1 Q111.5 153.1 109 150.1 Z"/>
      <path d="M124 148.8 L132 148.8 L132 150.1 Q130.5 153.1 128 153.9 Q126 154.5 124 150.1 Z"/>
      <path d="M141 148.8 L146 148.8 L146 150.1 Q143.5 153.5 141 150.1 Z"/>
      <path d="M154 148.8 L160 148.8 L160 150.1 Q159.5 152.3 158 153.3 Q156 154.2 154 150.1 Z"/>
    </g>
    <ellipse cx="127.5" cy="157.5" rx="4.2" ry="2.4" fill="#ff8585" opacity=".15"/>
    <ellipse cx="93.5" cy="156" rx="3" ry="1.8" fill="#ff8585" opacity=".13"/>
    <path d="M157 154 q1 4.5 .2 8" stroke="#ff8585" stroke-width="2" opacity=".12" fill="none"/>
    <path d="M91 150 Q94 153.8 97 150 M109 150 Q111.5 152.8 114 150 M124 150 Q126 154.2 128 153.6 Q130.5 152.8 132 150 M141 150 Q143.5 153.2 146 150 M154 150 Q156 153.9 158 153 Q159.5 152 160 150" fill="none" stroke="#ff8585" stroke-width="1.5" stroke-linecap="round" opacity=".8" filter="url(#bglowR)"/>
  </g>

  <!-- ===== TOE CRACK at left cap toe ===== -->
  <path id="bcrack" d="M255 150 L249 158 L252 163 L243 171 L246 176 L235 183 L230 191 M243 171 L236 168 L231 172" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#bglowR)"/>
  <circle id="bping" cx="255" cy="150" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#bglowR)"/>

  <!-- ===== DIMENSION: cap width ===== -->
  <g id="bdim" stroke="#5fe0ff" fill="none">
    <path d="M255 138 V108" opacity=".55" stroke-width="1"/>
    <path d="M385 138 V108" opacity=".55" stroke-width="1"/>
    <path d="M255 114 H385" stroke-width="1.2"/>
    <path d="M255 114 L264 110.8 L264 117.2 Z" fill="#5fe0ff" stroke="none"/>
    <path d="M385 114 L376 110.8 L376 117.2 Z" fill="#5fe0ff" stroke="none"/>
    <text x="320" y="105" text-anchor="middle" font-size="12" fill="#9fe6ff" stroke="none">14.2 mm</text>
  </g>

  <!-- ===== labels ===== -->
  <text x="204" y="207" text-anchor="end" font-size="12" fill="#9fe6ff" opacity=".85">HAZ</text>
  <path d="M209 203 L271 198" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
  <g id="bporeLbl" font-size="12" opacity="0">
    <path d="M333 201 L368 280" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
    <text x="350" y="294" fill="#9fe6ff" opacity=".85">SUBSURFACE POROSITY → UT / RT</text>
  </g>
  <g id="bcrackLbl" font-size="12" opacity="0">
    <path d="M228 193 L182 276" stroke="#ff6b6b" stroke-width="1" opacity=".45" fill="none"/>
    <text x="182" y="292" text-anchor="middle" fill="#ff6b6b" opacity=".9">TOE CRACK</text>
  </g>
  <g id="bunderLbl" font-size="12" opacity="0">
    <path d="M399 156 L460 180" stroke="#ff9b4b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="464" y="184" fill="#ff9b4b" opacity=".9">UNDERCUT</text>
  </g>
  <g id="bsurfporeLbl" font-size="12" opacity="0">
    <path d="M338 141 L446 144" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="450" y="147" fill="#ffc24b" opacity=".9">POROSITY</text>
  </g>
  <g id="bpitsLbl" font-size="12" opacity="0">
    <path d="M108 127 L126 146" stroke="#ff8585" stroke-width="1" opacity=".5" fill="none"/>
    <text x="72" y="124" fill="#ff8585" opacity=".9">CORROSION</text>
  </g>
  <text x="40" y="326" font-size="12" fill="#9fe6ff" opacity=".7">MACRO SECTION — V-GROOVE BUTT WELD</text>
  <g stroke="#9fe6ff" opacity=".75" fill="none">
    <path d="M460 318 H551.5" stroke-width="1.5"/>
    <path d="M460 313 V323" stroke-width="1.5"/>
    <path d="M551.5 313 V323" stroke-width="1.5"/>
    <text x="505" y="308" text-anchor="middle" font-size="12" fill="#9fe6ff" stroke="none">10 mm</text>
  </g>

  <!-- ===== scan group ===== -->
  <g id="bscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#bscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#bglowC)" opacity=".9"/>
  </g>
</svg>
