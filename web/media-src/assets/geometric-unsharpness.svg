<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="guGlow" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="guHatchP" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="#5fe0ff" opacity="0.08"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#5fe0ff" stroke-width="1.4" opacity="0.8"/>
    </pattern>
    <linearGradient id="guPartGrad" gradientUnits="userSpaceOnUse" x1="0" y1="120" x2="0" y2="268">
      <stop offset="0" stop-color="#2c5a88"/><stop offset="0.35" stop-color="#16365c"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="guFilmGrad" gradientUnits="userSpaceOnUse" x1="0" y1="64" x2="0" y2="286">
      <stop offset="0" stop-color="#9fe6ff" stop-opacity="0.30"/><stop offset="1" stop-color="#9fe6ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="guUmbraGrad" gradientUnits="userSpaceOnUse" x1="0" y1="117" x2="0" y2="285">
      <stop offset="0" stop-color="#02060e" stop-opacity="0.96"/>
      <stop offset="0.72" stop-color="#02060e" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#02060e" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="guPelletGrad" gradientUnits="userSpaceOnUse" x1="0" y1="125" x2="0" y2="175">
      <stop offset="0" stop-color="#9fe6ff"/><stop offset="1" stop-color="#2f86c8"/>
    </linearGradient>
  </defs>

  <!-- static caption -->
  <g>
    <text x="24" y="32" font-size="11" letter-spacing="2.5" fill="#9fe6ff" opacity="0.85">GEOMETRIC UNSHARPNESS</text>
    <rect x="24" y="38" width="34" height="2" fill="#5fe0ff" opacity="0.6"/>
  </g>

  <!-- ===== finite-width source: pellet stack + F bracket ===== -->
  <g id="guSource" opacity="0">
    <text x="75" y="108" font-size="10" letter-spacing="1.5" fill="#9fe6ff" opacity="0.9" text-anchor="middle">SOURCE</text>
    <rect x="64" y="119" width="22" height="62" rx="10" fill="rgba(10,30,60,0.55)" stroke="#9fe6ff" stroke-opacity="0.55" stroke-width="1.5"/>
    <g stroke="#5fe0ff" stroke-opacity="0.9" stroke-width="1" fill="url(#guPelletGrad)">
      <rect x="68.5" y="125" width="13" height="11" rx="2.5"/>
      <rect x="68.5" y="138" width="13" height="11" rx="2.5"/>
      <rect x="68.5" y="151" width="13" height="11" rx="2.5"/>
      <rect x="68.5" y="164" width="13" height="11" rx="2.5"/>
    </g>
    <path d="M61 125 H55 V175 H61" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="40" y="154.5" font-size="14" font-style="italic" fill="#eaf6ff" text-anchor="middle">F</text>
  </g>

  <!-- ===== part block (object plane) + film plane ===== -->
  <g id="guPart" opacity="0">
    <rect x="335" y="120" width="80" height="148" fill="url(#guPartGrad)" stroke="#9fe6ff" stroke-opacity="0.85" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="336.5" y1="122" x2="413.5" y2="122" stroke="#9fe6ff" opacity="0.25" stroke-width="1"/>
    <text x="375" y="202" font-size="11" letter-spacing="2" fill="#9fe6ff" opacity="0.9" text-anchor="middle">PART</text>
    <circle cx="335" cy="120" r="6" fill="none" stroke="#5fe0ff" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="335" cy="120" r="2.6" fill="#eaf6ff" filter="url(#guGlow)"/>
    <rect x="470" y="64" width="10" height="222" rx="3" fill="url(#guFilmGrad)" stroke="#9fe6ff" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="475" y="58" font-size="10" letter-spacing="1.5" fill="#9fe6ff" opacity="0.9" text-anchor="middle">FILM</text>
  </g>

  <!-- ===== t dimension: object plane (source side) to film ===== -->
  <g id="guT" opacity="0">
    <g stroke="#9fe6ff" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3 3">
      <line x1="335" y1="272" x2="335" y2="306"/>
      <line x1="475" y1="290" x2="475" y2="306"/>
    </g>
    <line x1="335" y1="300" x2="475" y2="300" stroke="#9fe6ff" stroke-width="1.5" stroke-opacity="0.9"/>
    <path d="M336 300 L345 296.6 L345 303.4 Z" fill="#9fe6ff"/>
    <path d="M474 300 L465 296.6 L465 303.4 Z" fill="#9fe6ff"/>
    <text x="405" y="293" font-size="14" font-style="italic" fill="#eaf6ff" text-anchor="middle">t</text>
  </g>

  <!-- ===== d dimension: source to object plane (source side) ===== -->
  <g id="guD" opacity="0">
    <line x1="75" y1="186" x2="75" y2="306" stroke="#9fe6ff" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3 3"/>
    <line x1="75" y1="300" x2="335" y2="300" stroke="#9fe6ff" stroke-width="1.5" stroke-opacity="0.9"/>
    <path d="M76 300 L85 296.6 L85 303.4 Z" fill="#9fe6ff"/>
    <path d="M334 300 L325 296.6 L325 303.4 Z" fill="#9fe6ff"/>
    <text x="205" y="293" font-size="14" font-style="italic" fill="#eaf6ff" text-anchor="middle">d</text>
  </g>

  <!-- ===== extreme rays: source top + bottom graze the same edge ===== -->
  <path id="guRays" d="M75 125 L474 117.3 M75 175 L474 90.4" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" filter="url(#guGlow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== shadow band on film: umbra + hatched penumbra Ug ===== -->
  <g id="guPenumbra" opacity="0">
    <path d="M335 120 L474 90.4 L474 117.3 Z" fill="#5fe0ff" opacity="0.1"/>
    <rect x="471" y="117.3" width="8" height="167.7" fill="url(#guUmbraGrad)"/>
    <rect x="471" y="90.4" width="8" height="26.9" fill="url(#guHatchP)" stroke="#5fe0ff" stroke-opacity="0.5" stroke-width="0.75"/>
    <line x1="467" y1="90.4" x2="483" y2="90.4" stroke="#5fe0ff" stroke-width="1" stroke-opacity="0.8"/>
    <line x1="467" y1="117.3" x2="483" y2="117.3" stroke="#5fe0ff" stroke-width="1" stroke-opacity="0.8"/>
    <circle cx="474" cy="90.4" r="2.2" fill="#5fe0ff" filter="url(#guGlow)"/>
    <circle cx="474" cy="117.3" r="2.2" fill="#5fe0ff" filter="url(#guGlow)"/>
    <path d="M484.5 90.4 H489.5 V117.3 H484.5" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="494" y="85" font-size="9.5" letter-spacing="1.2" fill="#9fe6ff">PENUMBRA</text>
    <text x="494" y="108.5" font-size="13.5" font-style="italic" fill="#eaf6ff">U<tspan dy="3.5" font-size="10">g</tspan></text>
    <text transform="rotate(-90 491 195)" x="491" y="195" font-size="9.5" letter-spacing="1.2" fill="#9fe6ff" opacity="0.85" text-anchor="middle">UMBRA</text>
  </g>

  <!-- ===== formula chip ===== -->
  <g id="guFormula" opacity="0">
    <rect x="437" y="14" width="141" height="32" rx="8" fill="rgba(10,30,60,0.6)" stroke="#5fe0ff" stroke-opacity="0.65" stroke-width="1"/>
    <text x="507.5" y="35" font-size="13" font-style="italic" fill="#eaf6ff" text-anchor="middle">U<tspan dy="3" font-size="9.5">g</tspan><tspan dy="-3"> = F·t/d</tspan></text>
  </g>
</svg>
