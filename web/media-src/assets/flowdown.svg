<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fdglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fdglowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fdcardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b4068"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
  </defs>

  <!-- ===== always-visible scaffold: ghost chain + bench ===== -->
  <text x="118" y="11" font-size="10" fill="#9fe6ff" opacity=".5">CUSTOMER</text>
  <text x="146" y="89" font-size="10" fill="#9fe6ff" opacity=".5">EMPLOYER</text>

  <g fill="none" stroke="#8fb6e0" stroke-width="1.2" stroke-dasharray="5 5" opacity=".26">
    <rect x="118" y="16" width="250" height="56" rx="6"/>
    <rect x="146" y="94" width="250" height="56" rx="6"/>
    <rect x="174" y="172" width="250" height="56" rx="6"/>
    <path d="M216 248 L462 248 L450 304 L204 304 Z"/>
    <g stroke-dasharray="3 5" opacity=".8">
      <line x1="152" y1="44" x2="300" y2="44"/>
      <line x1="180" y1="122" x2="328" y2="122"/>
      <line x1="208" y1="200" x2="356" y2="200"/>
      <line x1="250" y1="278" x2="382" y2="278"/>
    </g>
  </g>
  <g font-size="11" fill="#9fe6ff" opacity=".3">
    <text x="132" y="48">01</text>
    <text x="160" y="126">02</text>
    <text x="188" y="204">03</text>
    <text x="230" y="282">04</text>
  </g>
  <g stroke="#5fe0ff" stroke-width="1.5" stroke-dasharray="2 5" opacity=".3" fill="none">
    <line x1="257" y1="76" x2="257" y2="90"/>
    <line x1="285" y1="154" x2="285" y2="168"/>
    <line x1="313" y1="232" x2="313" y2="246"/>
  </g>

  <!-- bench edge -->
  <g stroke="#8fb6e0" fill="none">
    <line x1="150" y1="304" x2="566" y2="304" stroke-width="1.5" opacity=".55"/>
    <line x1="150" y1="304" x2="150" y2="312" stroke-width="1.2" opacity=".3"/>
    <line x1="566" y1="304" x2="566" y2="312" stroke-width="1.2" opacity=".3"/>
    <line x1="150" y1="312" x2="566" y2="312" stroke-width="1" opacity=".18"/>
  </g>
  <text x="566" y="298" text-anchor="end" font-size="10" fill="#9fe6ff" opacity=".5">BENCH</text>

  <!-- caption -->
  <text x="40" y="330" font-size="12" fill="#9fe6ff" opacity=".7">PO → QUALITY MANUAL → VT PROCEDURE → TRAVELER</text>

  <!-- ===== TIER 1: PURCHASE ORDER / SPEC ===== -->
  <g id="fdPO" opacity="0">
    <path d="M124 16 H354 L368 30 V66 Q368 72 362 72 H124 Q118 72 118 66 V22 Q118 16 124 16 Z" fill="url(#fdcardG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M354 16 L368 30 H354 Z" fill="#2a527e" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="134" y="38" font-size="11" fill="#9fe6ff" opacity=".95">PURCHASE ORDER / SPEC</text>
    <rect x="300" y="25" width="46" height="16" rx="3" fill="#0e2848" stroke="#5fe0ff" stroke-width="1" opacity=".9"/>
    <text x="323" y="37" text-anchor="middle" font-size="10" fill="#9fe6ff">REV C</text>
    <line x1="134" y1="50" x2="302" y2="50" stroke="#5fe0ff" stroke-width="2" opacity=".45"/>
    <line x1="134" y1="60" x2="340" y2="60" stroke="#8fb6e0" stroke-width="1.5" opacity=".25"/>
  </g>

  <!-- arrow A -->
  <g id="fdArrowA" opacity="0" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#fdglowS)">
    <line x1="257" y1="75.5" x2="257" y2="84"/>
    <path d="M251 82.5 L257 90 L263 82.5"/>
  </g>

  <!-- ===== TIER 2: QUALITY MANUAL ===== -->
  <g id="fdManual" opacity="0">
    <path d="M396 106 H492 Q500 106 500 113 V117 Q500 124 492 124 H396 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2" opacity=".9"/>
    <text x="447" y="119" text-anchor="middle" font-size="9.5" fill="#9fe6ff" opacity=".85">WRITTEN PRACTICE</text>
    <path d="M152 94 H382 L396 108 V144 Q396 150 390 150 H152 Q146 150 146 144 V100 Q146 94 152 94 Z" fill="url(#fdcardG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M382 94 L396 108 H382 Z" fill="#2a527e" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="162" y="116" font-size="11" fill="#9fe6ff" opacity=".95">QUALITY MANUAL</text>
    <line x1="162" y1="128" x2="330" y2="128" stroke="#5fe0ff" stroke-width="2" opacity=".45"/>
    <line x1="162" y1="138" x2="376" y2="138" stroke="#8fb6e0" stroke-width="1.5" opacity=".25"/>
  </g>

  <!-- arrow B -->
  <g id="fdArrowB" opacity="0" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#fdglowS)">
    <line x1="285" y1="153.5" x2="285" y2="162"/>
    <path d="M279 160.5 L285 168 L291 160.5"/>
  </g>

  <!-- ===== TIER 3: VT PROCEDURE ===== -->
  <g id="fdProcedure" opacity="0">
    <path d="M180 172 H410 L424 186 V222 Q424 228 418 228 H180 Q174 228 174 222 V178 Q174 172 180 172 Z" fill="url(#fdcardG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M410 172 L424 186 H410 Z" fill="#2a527e" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="190" y="194" font-size="11" fill="#9fe6ff" opacity=".95">VT PROCEDURE</text>
    <rect x="356" y="181" width="46" height="16" rx="3" fill="#0e2848" stroke="#5fe0ff" stroke-width="1" opacity=".9"/>
    <text x="379" y="193" text-anchor="middle" font-size="10" fill="#9fe6ff">REV 4</text>
    <line x1="190" y1="206" x2="342" y2="206" stroke="#5fe0ff" stroke-width="2" opacity=".45"/>
    <line x1="190" y1="216" x2="404" y2="216" stroke="#8fb6e0" stroke-width="1.5" opacity=".25"/>
  </g>

  <!-- arrow C -->
  <g id="fdArrowC" opacity="0" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#fdglowS)">
    <line x1="313" y1="231.5" x2="313" y2="240"/>
    <path d="M307 238.5 L313 246 L319 238.5"/>
  </g>

  <!-- ===== TIER 4: JOB TRAVELER on bench ===== -->
  <g id="fdTraveler" opacity="0">
    <path d="M216 248 L462 248 L450 304 L204 304 Z" fill="url(#fdcardG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="204" y1="304" x2="450" y2="304" stroke="#5fe0ff" stroke-width="1" opacity=".25"/>
    <text x="228" y="264" font-size="11" fill="#9fe6ff" opacity=".95">JOB TRAVELER</text>
    <rect x="228" y="272" width="7" height="7" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".8"/>
    <path d="M229.5 275.5 l2 2.5 l3 -4" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".7"/>
    <line x1="244" y1="276" x2="334" y2="276" stroke="#8fb6e0" stroke-width="1.5" opacity=".3"/>
    <rect x="226" y="288.5" width="7" height="7" fill="none" stroke="#5fe0ff" stroke-width="1.3"/>
    <path d="M227.5 292 l2 2.5 l3 -4" fill="none" stroke="#5fe0ff" stroke-width="1.5"/>
    <line x1="242" y1="292" x2="360" y2="292" stroke="#5fe0ff" stroke-width="2" opacity=".45"/>
    <line x1="240" y1="300" x2="310" y2="300" stroke="#8fb6e0" stroke-width="1.2" opacity=".2"/>
  </g>

  <!-- ===== requirement trace: one clause carried down the whole chain ===== -->
  <path id="fdTrace" d="M138 50 H302 V128 H182 V206 H342 V292 H235" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#fdglowS)"/>
</svg>
