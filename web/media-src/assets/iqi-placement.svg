<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="iqppGlow" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iqppBlurF" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4"/>
    </filter>
    <linearGradient id="iqppSteelG" gradientUnits="userSpaceOnUse" x1="0" y1="142" x2="0" y2="212">
      <stop offset="0" stop-color="#2c5a88"/><stop offset="0.35" stop-color="#16365c"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="iqppWeldG" gradientUnits="userSpaceOnUse" x1="0" y1="132" x2="0" y2="220">
      <stop offset="0" stop-color="#3f76a8"/><stop offset="1" stop-color="#1b4068"/>
    </linearGradient>
    <linearGradient id="iqppFilmG" gradientUnits="userSpaceOnUse" x1="0" y1="240" x2="0" y2="256">
      <stop offset="0" stop-color="#9fe6ff" stop-opacity="0.30"/><stop offset="1" stop-color="#9fe6ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="iqppConeG" gradientUnits="userSpaceOnUse" x1="0" y1="31" x2="0" y2="240">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0.26"/><stop offset="1" stop-color="#5fe0ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="iqppPlaqueG" gradientUnits="userSpaceOnUse" x1="0" y1="131" x2="0" y2="139">
      <stop offset="0" stop-color="#9fe6ff"/><stop offset="1" stop-color="#2f86c8"/>
    </linearGradient>
  </defs>

  <!-- ===== STATIC BASE ===== -->
  <!-- collimated beam cone -->
  <g>
    <path d="M300 31 L105 240 L495 240 Z" fill="url(#iqppConeG)"/>
    <line x1="300" y1="31" x2="105" y2="240" stroke="#5fe0ff" stroke-width="1" opacity="0.3"/>
    <line x1="300" y1="31" x2="495" y2="240" stroke="#5fe0ff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- film cassette band -->
  <g>
    <rect x="95" y="240" width="410" height="16" rx="3" fill="url(#iqppFilmG)" stroke="#9fe6ff" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="88" y="252.5" font-size="11" letter-spacing="2" fill="#9fe6ff" opacity="0.9" text-anchor="end">FILM</text>
  </g>

  <!-- steel wall section + single-V groove weld -->
  <g>
    <rect x="80" y="142" width="440" height="70" fill="url(#iqppSteelG)" stroke="#9fe6ff" stroke-opacity="0.85" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- weld metal in the V + cap + root bead -->
    <path d="M272 142 L296 212 L304 212 L328 142 Z" fill="url(#iqppWeldG)"/>
    <path d="M266 142 Q300 130 334 142 Z" fill="url(#iqppWeldG)" stroke="#9fe6ff" stroke-opacity="0.7" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M292 212 Q300 220 308 212 Z" fill="url(#iqppWeldG)" stroke="#9fe6ff" stroke-opacity="0.7" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- fusion lines -->
    <path d="M272 142 L296 212 M328 142 L304 212" fill="none" stroke="#9fe6ff" stroke-opacity="0.7" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- weld pass arcs -->
    <path d="M281.6 170 Q300 164 318.4 170 M288.5 190 Q300 185 311.5 190" fill="none" stroke="#9fe6ff" stroke-opacity="0.25" stroke-width="1"/>
  </g>

  <!-- radiation source: housing + focal point + emanation ticks -->
  <g>
    <rect x="287" y="12" width="26" height="16" rx="3" fill="rgba(10,30,60,0.55)" stroke="#9fe6ff" stroke-opacity="0.7" stroke-width="1.5"/>
    <rect x="295" y="24" width="10" height="4" fill="#06182e"/>
    <circle cx="300" cy="29" r="2.8" fill="#eaf6ff" filter="url(#iqppGlow)"/>
    <g stroke="#9fe6ff" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
      <line x1="292" y1="36" x2="287" y2="43"/>
      <line x1="300" y1="38" x2="300" y2="46"/>
      <line x1="308" y1="36" x2="313" y2="43"/>
    </g>
  </g>

  <!-- ===== REVEAL 1: source-side IQI on unlabeled shim ===== -->
  <g id="iqppSourceIqi" opacity="0">
    <!-- thin shim (NO label) -->
    <rect x="203" y="138.5" width="56" height="3.5" fill="#7fb4d8" opacity="0.55"/>
    <!-- hole-type plaque: 1T / 2T / 4T through-holes -->
    <rect x="210" y="131.5" width="42" height="7" rx="1" fill="url(#iqppPlaqueG)" stroke="#5fe0ff" stroke-opacity="0.9" stroke-width="1"/>
    <rect x="217" y="131.5" width="2.6" height="7" fill="#06182e"/>
    <rect x="227" y="131.5" width="4.6" height="7" fill="#06182e"/>
    <rect x="238.5" y="131.5" width="7.5" height="7" fill="#06182e"/>
    <line x1="231" y1="121" x2="231" y2="128" stroke="#9fe6ff" stroke-width="1" opacity="0.6"/>
    <text x="231" y="117" font-size="11" letter-spacing="1.8" fill="#9fe6ff" text-anchor="middle">SOURCE SIDE</text>
  </g>

  <!-- ===== REVEAL 2: projection rays past plaque edges to film ===== -->
  <path id="iqppRays" d="M300 26 L117.4 240 M300 26 L202.6 240" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" filter="url(#iqppGlow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL 3: penumbra blur band on the film, FULL Ug ===== -->
  <g id="iqppUgBand" opacity="0">
    <rect x="112" y="242" width="96" height="12" fill="#02060e" opacity="0.85" filter="url(#iqppBlurF)"/>
    <rect x="112" y="242" width="96" height="12" fill="#5fe0ff" opacity="0.10" filter="url(#iqppBlurF)"/>
    <path d="M117.4 261 V265 H202.6 V261" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/>
    <text x="160" y="278" font-size="11" letter-spacing="1.5" fill="#9fe6ff" text-anchor="middle">FULL U<tspan dy="3" font-size="8.5">g</tspan></text>
  </g>

  <!-- ===== REVEAL 4: ghosted film-side IQI + lock + crisp footprint ===== -->
  <g id="iqppFilmIqi" opacity="0">
    <!-- ghosted plaque on the bottom (film-side) surface -->
    <g opacity="0.75">
      <rect x="348" y="212.5" width="42" height="7" rx="1" fill="url(#iqppPlaqueG)" fill-opacity="0.45" stroke="#9fe6ff" stroke-opacity="0.85" stroke-width="1" stroke-dasharray="3 2"/>
      <rect x="355" y="212.5" width="2.6" height="7" fill="#06182e" opacity="0.6"/>
      <rect x="365" y="212.5" width="4.6" height="7" fill="#06182e" opacity="0.6"/>
      <rect x="376.5" y="212.5" width="7.5" height="7" fill="#06182e" opacity="0.6"/>
    </g>
    <!-- lock glyph: source-side access blocked above this spot -->
    <g>
      <path d="M365 132 v-3.2 a4 4 0 0 1 8 0 V132" fill="none" stroke="#9fe6ff" stroke-width="1.5"/>
      <rect x="362" y="132" width="14" height="10" rx="2" fill="rgba(10,30,60,0.7)" stroke="#9fe6ff" stroke-width="1.5"/>
      <circle cx="369" cy="137" r="1.4" fill="#9fe6ff"/>
      <line x1="352" y1="141" x2="386" y2="141" stroke="#9fe6ff" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>
    </g>
    <!-- crisp image footprint on the film (short projection) -->
    <rect x="353.1" y="241.5" width="46.4" height="13" fill="#02060e" opacity="0.92"/>
    <line x1="353.1" y1="241.5" x2="353.1" y2="254.5" stroke="#5fe0ff" stroke-width="1" opacity="0.9"/>
    <line x1="399.5" y1="241.5" x2="399.5" y2="254.5" stroke="#5fe0ff" stroke-width="1" opacity="0.9"/>
    <text x="424" y="224" font-size="11" letter-spacing="1.8" fill="#9fe6ff">FILM SIDE</text>
  </g>

  <!-- ===== REVEAL 5: lead-character F chip ===== -->
  <g id="iqppLeadF" opacity="0">
    <rect x="398" y="212.5" width="15" height="15" rx="2.5" fill="rgba(159,230,255,0.92)" stroke="#5fe0ff" stroke-width="1.5"/>
    <text x="405.5" y="224" font-size="11" font-weight="700" fill="#08233f" text-anchor="middle">F</text>
  </g>
  <circle id="iqppLeadPing" cx="405.5" cy="220" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0"/>
</svg>
