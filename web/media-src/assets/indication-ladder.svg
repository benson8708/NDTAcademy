<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="ilGlowC" filterUnits="userSpaceOnUse" x="138" y="78" width="488" height="220">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ilGlowR" filterUnits="userSpaceOnUse" x="55" y="2" width="564" height="281">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ilSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#30608f"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="ilPlat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#245179"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>

    <!-- shared lit layer for rung 2 (DISCONTINUITY) — used by both ilDisc and ilDiscontinuity -->
    <g id="ilR2lit">
      <path d="M232 196 H374" stroke="#5fe0ff" stroke-width="2" opacity=".85" filter="url(#ilGlowC)" fill="none"/>
      <path d="M283 138 L288 154 L291 150 L295 157 L300 138" fill="none" stroke="#7fd8ff" stroke-width="1.5" filter="url(#ilGlowR)"/>
      <rect x="246" y="212" width="114" height="26" rx="6" fill="#0e2848" fill-opacity=".55" stroke="#5fe0ff" stroke-width="1.2" stroke-opacity=".8"/>
      <text x="303" y="229.5" text-anchor="middle" font-size="12" fill="#9fe6ff">DISCONTINUITY</text>
      <text x="303" y="250" text-anchor="middle" font-size="8.5" fill="#8fb6e0" opacity=".85">interruption in normal structure</text>
    </g>
    <!-- shared lit arch for gate 2 — used by ilCriteria and ilEvaluation -->
    <g id="ilG2hot">
      <path d="M388 204 V150 Q388 136 402 136 Q416 136 416 150 V204" fill="none" stroke="#5fe0ff" stroke-width="2" opacity=".95" filter="url(#ilGlowC)"/>
      <path d="M416 204 L424 212" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    </g>
  </defs>

  <!-- ===== base route (dim, drawn behind blocks) ===== -->
  <path d="M170 224 L238 190 H368 L438 141" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-dasharray="5 5" opacity=".28"/>
  <polygon points="435,136.9 443,141 435,145.1" fill="#5fe0ff" opacity=".3"/>

  <!-- ===== platforms ===== -->
  <g stroke="#8fb6e0" stroke-width="1.5" stroke-opacity=".75">
    <rect x="38"  y="246" width="142" height="12" rx="3" fill="url(#ilPlat)"/>
    <rect x="232" y="196" width="142" height="12" rx="3" fill="url(#ilPlat)"/>
    <rect x="426" y="146" width="142" height="12" rx="3" fill="url(#ilPlat)"/>
  </g>

  <!-- ===== rung 1: weld-toe close-up with noticed mark ===== -->
  <rect x="54" y="216" width="112" height="30" fill="url(#ilSteel)" stroke="#8fb6e0" stroke-width="1.2" stroke-opacity=".6"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
    <line x1="58" y1="227" x2="162" y2="227"/>
    <line x1="58" y1="237" x2="162" y2="237"/>
  </g>
  <path d="M60 216 C74 205.5 110 205.5 124 216 Z" fill="#2966cf" stroke="#7fd8ff" stroke-width="1" stroke-opacity=".8"/>
  <path d="M60 216 Q57 214.8 54.5 215.6 M124 216 Q127 214.8 130 215.6" fill="none" stroke="#7fd8ff" stroke-width=".9" opacity=".5"/>
  <g fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".7">
    <path d="M66 214.6 Q92 206 118 214.6"/>
    <path d="M73 212.6 Q92 207 111 212.6"/>
    <path d="M81 210.8 Q92 208 103 210.8"/>
  </g>
  <path d="M122 217.5 L131 219 L140 220.8" fill="none" stroke="#08152b" stroke-width="3" stroke-linecap="round"/>
  <path d="M122 217.5 L131 219 L140 220.8" fill="none" stroke="#ffc24b" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>
  <!-- dim eye -->
  <g opacity=".4" fill="none" stroke="#5fe0ff" stroke-width="1.2">
    <path d="M112 191 Q128 179 144 191 Q128 203 112 191 Z"/>
    <circle cx="128" cy="191" r="4.5"/>
    <path d="M124 200 L129 215 M134 199 L136 215" stroke-dasharray="2 3" stroke-width="1"/>
  </g>

  <!-- ===== gate 1 (dim) ===== -->
  <path d="M196 240 V186 Q196 172 211 172 Q226 172 226 186 V240" fill="none" stroke="#8fb6e0" stroke-width="1.8" opacity=".45"/>
  <text x="205" y="162" text-anchor="middle" font-size="10.5" fill="#9fe6ff" opacity=".3">INTERPRETATION</text>

  <!-- ===== rung 2: cross-section with surface interruption ===== -->
  <rect x="252" y="138" width="108" height="58" fill="url(#ilSteel)" stroke="#8fb6e0" stroke-width="1.2" stroke-opacity=".6"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
    <line x1="256" y1="152" x2="356" y2="152"/>
    <line x1="256" y1="166" x2="356" y2="166"/>
    <line x1="256" y1="181" x2="356" y2="181"/>
  </g>
  <path d="M252 138 H360" stroke="#8fb6e0" stroke-width="1.8" opacity=".7" fill="none"/>
  <path d="M283 138 L288 154 L291 150 L295 157 L300 138 Z" fill="#08152b" stroke="#7fd8ff" stroke-width=".8" stroke-opacity=".3"/>
  <!-- dim plaque 2 -->
  <g opacity=".32">
    <rect x="246" y="212" width="114" height="26" rx="6" fill="#0e2848" fill-opacity=".9" stroke="#8fb6e0" stroke-opacity=".8"/>
    <text x="303" y="229.5" text-anchor="middle" font-size="12" fill="#9fe6ff">DISCONTINUITY</text>
    <text x="303" y="250" text-anchor="middle" font-size="8.5" fill="#9fe6ff" opacity=".8">interruption in normal structure</text>
  </g>

  <!-- ===== gate 2 (dim) + criteria doc chip (dim) ===== -->
  <path d="M388 204 V150 Q388 136 402 136 Q416 136 416 150 V204" fill="none" stroke="#8fb6e0" stroke-width="1.8" opacity=".45"/>
  <text x="402" y="124" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".3">EVALUATION</text>
  <g opacity=".4" stroke="#8fb6e0" stroke-width="1" fill="none">
    <rect x="366" y="151" width="16" height="20" rx="2" fill="#0e2848"/>
    <path d="M369.5 151 V171"/>
    <path d="M373 157 H379 M373 162 H379"/>
  </g>

  <!-- ===== criteria panel (dim) ===== -->
  <g opacity=".38">
    <rect x="392" y="212" width="150" height="78" rx="8" fill="#0e2848" fill-opacity=".5" stroke="#8fb6e0"/>
    <text x="467" y="228" text-anchor="middle" font-size="11" fill="#9fe6ff">ACCEPTANCE CRITERIA</text>
    <path d="M404 236 H530" stroke="#8fb6e0" stroke-width="1" opacity=".5" fill="none"/>
    <rect x="402" y="244" width="18" height="28" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M406 244 V272 M410 251 H416 M410 257 H416 M410 263 H416" stroke="#8fb6e0" stroke-width="1" opacity=".7" fill="none"/>
    <text x="430" y="256" font-size="10" fill="#9fe6ff">MEAS</text>
    <text x="462" y="256" font-size="10.5" fill="#9fe6ff">3.4 mm</text>
    <text x="430" y="274" font-size="10" fill="#9fe6ff">MAX</text>
    <text x="462" y="274" font-size="10.5" fill="#9fe6ff">3.0 mm</text>
    <rect x="504" y="244" width="34" height="32" rx="4" fill="none" stroke="#8fb6e0" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== rung 3: same section, awaiting verdict ===== -->
  <rect x="446" y="92" width="108" height="54" fill="url(#ilSteel)" stroke="#8fb6e0" stroke-width="1.2" stroke-opacity=".6"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
    <line x1="450" y1="106" x2="550" y2="106"/>
    <line x1="450" y1="120" x2="550" y2="120"/>
    <line x1="450" y1="134" x2="550" y2="134"/>
  </g>
  <path d="M446 92 H554" stroke="#8fb6e0" stroke-width="1.8" opacity=".7" fill="none"/>
  <path d="M487 92 L492 108 L495 104 L499 110 L504 92 Z" fill="#08152b" stroke="#7fd8ff" stroke-width=".8" stroke-opacity=".3"/>
  <!-- dim plaque 3 (neutral; no verdict styling until reveal) -->
  <g opacity=".32">
    <rect x="462" y="164" width="70" height="26" rx="6" fill="#0e2848" fill-opacity=".9" stroke="#8fb6e0" stroke-opacity=".8"/>
    <text x="497" y="182" text-anchor="middle" font-size="13" fill="#9fe6ff">DEFECT</text>
    <text x="497" y="200" text-anchor="middle" font-size="9" fill="#9fe6ff" opacity=".8">found rejectable</text>
  </g>

  <!-- ===== dim plaque 1 ===== -->
  <g opacity=".32">
    <rect x="44" y="262" width="130" height="26" rx="6" fill="#0e2848" fill-opacity=".9" stroke="#8fb6e0" stroke-opacity=".8"/>
    <text x="51" y="280" font-size="9" fill="#9fe6ff">RELEVANT</text>
    <text x="100" y="280.5" font-size="12" fill="#9fe6ff">INDICATION</text>
  </g>

  <!-- ===================== REVEALS ===================== -->

  <!-- rung 1 lights -->
  <g id="ilIndication" opacity="0">
    <rect x="44" y="262" width="130" height="26" rx="6" fill="#0e2848" fill-opacity=".55" stroke="#5fe0ff" stroke-width="1.2" stroke-opacity=".8"/>
    <text x="51" y="280" font-size="9" fill="#5fe0ff">RELEVANT</text>
    <text x="100" y="280.5" font-size="12" fill="#9fe6ff">INDICATION</text>
    <g fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#ilGlowR)">
      <path d="M112 191 Q128 179 144 191 Q128 203 112 191 Z"/>
      <circle cx="128" cy="191" r="4.5"/>
    </g>
    <circle cx="128" cy="191" r="1.8" fill="#5fe0ff"/>
    <path d="M124 200 L129 215 M134 199 L136 215" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 3" opacity=".55" fill="none"/>
    <path d="M122 217.5 L131 219 L140 220.8" fill="none" stroke="#ffc24b" stroke-width="1.6" stroke-linecap="round" filter="url(#ilGlowR)" opacity=".95"/>
  </g>
  <circle id="ilPing" cx="138" cy="220" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#ilGlowR)"/>

  <!-- gauge measures the indication on the section -->
  <g id="ilGauge" opacity="0">
    <rect x="263" y="98" width="56" height="18" rx="4" fill="#08152b" stroke="#5fe0ff" stroke-width="1" stroke-opacity=".8"/>
    <text x="291" y="111" text-anchor="middle" font-size="11" fill="#5fe0ff">3.4 mm</text>
    <g stroke="#5fe0ff" fill="none">
      <path d="M291 116 V122" stroke-width="1" opacity=".6"/>
      <path d="M283 124 H300" stroke-width="1.2"/>
      <path d="M283 124 V131 M300 124 V131" stroke-width="1"/>
    </g>
    <path d="M283 138 l-3.5 -7 h7 Z" fill="#5fe0ff"/>
    <path d="M300 138 l-3.5 -7 h7 Z" fill="#5fe0ff"/>
  </g>

  <!-- gate 1 lights -->
  <g id="ilInterpretation" opacity="0">
    <path d="M196 240 V186 Q196 172 211 172 Q226 172 226 186 V240" fill="none" stroke="#5fe0ff" stroke-width="2" opacity=".95" filter="url(#ilGlowC)"/>
    <text x="205" y="162" text-anchor="middle" font-size="10.5" fill="#9fe6ff">INTERPRETATION</text>
  </g>

  <!-- rung 2 lights (two ids, two lesson vocabularies, one geometry) -->
  <use id="ilDisc" href="#ilR2lit" opacity="0"/>
  <use id="ilDiscontinuity" href="#ilR2lit" opacity="0"/>

  <!-- connector arrows (vt2-1-1) -->
  <path id="ilArrow1" d="M362 190 L396 168 M387.1 169.2 L396 168 L391.2 175.6" fill="none" stroke="#5fe0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#ilGlowR)"/>
  <path id="ilArrow2" d="M408 160 L430 145 L442 142 M433.2 140.3 L442 142 L435 147.7" fill="none" stroke="#5fe0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#ilGlowR)"/>

  <!-- gate 2 + criteria panel light -->
  <g id="ilCriteria" opacity="0">
    <use href="#ilG2hot"/>
    <rect x="392" y="212" width="150" height="78" rx="8" fill="#0e2848" fill-opacity=".6" stroke="#5fe0ff" stroke-width="1.5" stroke-opacity=".85"/>
    <text x="467" y="228" text-anchor="middle" font-size="11" fill="#9fe6ff">ACCEPTANCE CRITERIA</text>
    <path d="M404 236 H530" stroke="#5fe0ff" stroke-width="1" opacity=".3" fill="none"/>
    <rect x="402" y="244" width="18" height="28" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M406 244 V272 M410 251 H416 M410 257 H416 M410 263 H416" stroke="#8fb6e0" stroke-width="1" opacity=".7" fill="none"/>
    <text x="430" y="256" font-size="10" fill="#9fe6ff" opacity=".75">MEAS</text>
    <text x="462" y="256" font-size="10.5" fill="#5fe0ff">3.4 mm</text>
    <text x="430" y="274" font-size="10" fill="#9fe6ff" opacity=".75">MAX</text>
    <text x="462" y="274" font-size="10.5" fill="#9fe6ff">3.0 mm</text>
    <rect x="504" y="244" width="34" height="32" rx="4" fill="none" stroke="#8fb6e0" stroke-dasharray="3 3" opacity=".6"/>
  </g>

  <!-- gate 2 lights with EVALUATION label + doc chip (vt2-5-3) -->
  <g id="ilEvaluation" opacity="0">
    <use href="#ilG2hot"/>
    <text x="402" y="124" text-anchor="middle" font-size="11" fill="#9fe6ff">EVALUATION</text>
    <g stroke="#5fe0ff" stroke-width="1" fill="none">
      <rect x="366" y="151" width="16" height="20" rx="2" fill="#0e2848" fill-opacity=".5"/>
      <path d="M369.5 151 V171"/>
      <path d="M373 157 H379 M373 162 H379"/>
    </g>
  </g>

  <!-- accept branch (vt1-3-3 only; hidden everywhere else by design) -->
  <g id="ilAccept" opacity="0">
    <path d="M386 150 C352 118 336 96 332 78" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-dasharray="5 4" opacity=".55"/>
    <polygon points="327,82 332,69 338,80" fill="#5fe0ff" opacity=".55"/>
    <rect x="222" y="38" width="174" height="28" rx="14" fill="#0e2848" fill-opacity=".5" stroke="#5fe0ff" stroke-width="1.2" stroke-opacity=".5"/>
    <circle cx="240" cy="52" r="8" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-opacity=".75"/>
    <path d="M236 52 L239 55.5 L245 48" fill="none" stroke="#5fe0ff" stroke-width="1.6" opacity=".8"/>
    <text x="256" y="56" font-size="9" fill="#9fe6ff" opacity=".7">MEETS</text>
    <text x="288" y="56.5" font-size="11" fill="#9fe6ff" opacity=".85">ACCEPT &amp; RECORD</text>
  </g>

  <!-- defect rung lights: the climax -->
  <g id="ilDefect" opacity="0">
    <path d="M426 146 H568" stroke="#ff6b6b" stroke-width="2" opacity=".8" filter="url(#ilGlowC)" fill="none"/>
    <path d="M487 92 L492 108 L495 104 L499 110 L504 92" fill="none" stroke="#ff6b6b" stroke-width="1.6" filter="url(#ilGlowR)"/>
    <rect x="462" y="164" width="70" height="26" rx="6" fill="#2a0d14" fill-opacity=".65" stroke="#ff6b6b" stroke-width="1.4" stroke-opacity=".9"/>
    <text x="497" y="182" text-anchor="middle" font-size="13" fill="#ff6b6b" letter-spacing="1">DEFECT</text>
    <text x="497" y="200" text-anchor="middle" font-size="9" fill="#ff9b9b" opacity=".85">found rejectable</text>
    <g transform="rotate(-8 518 72)">
      <rect x="474" y="59" width="88" height="26" rx="4" fill="#ff6b6b" fill-opacity=".08" stroke="#ff6b6b" stroke-width="2" filter="url(#ilGlowR)"/>
      <text x="518" y="76.5" text-anchor="middle" font-size="11" fill="#ff6b6b" letter-spacing="1">REJECTABLE</text>
    </g>
    <path d="M458 260 H502" stroke="#ff6b6b" stroke-width="1" opacity=".6" fill="none"/>
    <rect x="504" y="244" width="34" height="32" rx="4" fill="#ff6b6b" fill-opacity=".12" stroke="#ff6b6b" stroke-width="1.4"/>
    <text x="521" y="264" text-anchor="middle" font-size="9" fill="#ff6b6b">FAILS</text>
  </g>
  <circle id="ilPingD" cx="495" cy="92" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#ilGlowR)"/>
</svg>
