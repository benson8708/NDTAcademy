<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="hvlGlow" filterUnits="userSpaceOnUse" x="60" y="150" width="524" height="56">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hvlGlowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hvlBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="hvlCapG" x1="0" y1="167" x2="0" y2="189" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e5c8d"/><stop offset=".45" stop-color="#1a3d63"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="hvlPlateG" x1="0" y1="118" x2="0" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e5c8d"/><stop offset=".18" stop-color="#16345a"/><stop offset=".82" stop-color="#0e2848"/><stop offset="1" stop-color="#142f52"/>
    </linearGradient>
    <linearGradient id="hvlBandV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".04"/>
      <stop offset=".5" stop-color="#5fe0ff" stop-opacity=".7"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".04"/>
    </linearGradient>
    <!-- one absorber plate: identical layer = 1 HVL -->
    <g id="hvlPlateDef">
      <rect x="149" y="118" width="22" height="120" rx="3" fill="url(#hvlPlateG)" stroke="#8fb6e0" stroke-width="1.6" stroke-linejoin="round"/>
      <line x1="153.5" y1="123" x2="153.5" y2="233" stroke="#9fe6ff" stroke-width="1" opacity=".22"/>
      <line x1="166.5" y1="123" x2="166.5" y2="233" stroke="#06101f" stroke-width="1" opacity=".5"/>
      <text x="160" y="257" text-anchor="middle" font-size="11" letter-spacing="1" fill="#9fe6ff" opacity=".85">1 HVL</text>
    </g>
  </defs>

  <!-- ===== static skeleton ===== -->
  <text x="576" y="30" text-anchor="end" font-size="10.5" letter-spacing="1.5" fill="#9fe6ff" opacity=".6">TRANSMITTED FRACTION</text>
  <line x1="88" y1="96" x2="548" y2="96" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 5" opacity=".3"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".45">
    <line x1="110" y1="96" x2="110" y2="101"/><line x1="205" y1="96" x2="205" y2="101"/>
    <line x1="305" y1="96" x2="305" y2="101"/><line x1="405" y1="96" x2="405" y2="101"/>
    <line x1="513" y1="96" x2="513" y2="101"/>
  </g>
  <line x1="84" y1="178" x2="566" y2="178" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 6" opacity=".16"/>
  <g fill="none" stroke="#8fb6e0" stroke-width="1.2" stroke-dasharray="4 5" opacity=".16">
    <rect x="149" y="118" width="22" height="120" rx="3"/>
    <rect x="249" y="118" width="22" height="120" rx="3"/>
    <rect x="349" y="118" width="22" height="120" rx="3"/>
    <rect x="449" y="118" width="22" height="120" rx="3"/>
  </g>

  <!-- ===== hvlBeam: Ir-192 capsule + incident beam + full-strength readout ===== -->
  <g id="hvlBeam" opacity="0">
    <line x1="6" y1="178" x2="22" y2="178" stroke="#8fb6e0" stroke-width="2.2" opacity=".7"/>
    <rect x="22" y="172" width="7" height="12" rx="1.5" fill="#14304f" stroke="#8fb6e0" stroke-width="1.1"/>
    <rect x="29" y="167" width="49" height="22" rx="10" fill="url(#hvlCapG)" stroke="#9fe6ff" stroke-width="1.6"/>
    <circle cx="44" cy="178" r="3.2" fill="#5fe0ff" filter="url(#hvlGlowS)"/>
    <circle cx="55" cy="178" r="3.2" fill="#5fe0ff" filter="url(#hvlGlowS)"/>
    <circle cx="66" cy="178" r="3.2" fill="#5fe0ff" filter="url(#hvlGlowS)"/>
    <text x="53" y="213" text-anchor="middle" font-size="11" letter-spacing="1" fill="#9fe6ff" opacity=".85">IR-192 SOURCE</text>
    <rect x="80" y="169" width="59" height="18" fill="url(#hvlBandV)"/>
    <line x1="80" y1="178" x2="136" y2="178" stroke="#5fe0ff" stroke-width="2.6" opacity=".95" filter="url(#hvlGlow)"/>
    <path d="M139 168.5 L149 178 L139 187.5 Z" fill="#5fe0ff" opacity=".9"/>
    <rect x="102" y="40" width="16" height="56" fill="#5fe0ff" opacity=".85"/>
    <text x="110" y="31" text-anchor="middle" font-size="12" fill="#9fe6ff">1</text>
  </g>

  <!-- ===== hvlLayer1: plate 1 -> 1/2 ===== -->
  <g id="hvlLayer1" opacity="0">
    <use xlink:href="#hvlPlateDef"/>
    <ellipse cx="160" cy="178" rx="6.5" ry="14" fill="#5fe0ff" opacity=".32" filter="url(#hvlBlur)"/>
    <rect x="171" y="173" width="68" height="10" fill="url(#hvlBandV)"/>
    <line x1="171" y1="178" x2="236" y2="178" stroke="#5fe0ff" stroke-width="1.9" opacity=".68" filter="url(#hvlGlow)"/>
    <path d="M239 172.5 L249 178 L239 183.5 Z" fill="#5fe0ff" opacity=".65"/>
    <rect x="197" y="68" width="16" height="28" fill="#5fe0ff" opacity=".8"/>
    <text x="205" y="59" text-anchor="middle" font-size="12" fill="#9fe6ff">1/2</text>
  </g>

  <!-- ===== hvlLayer2: plate 2 -> 1/4 ===== -->
  <g id="hvlLayer2" opacity="0">
    <use xlink:href="#hvlPlateDef" transform="translate(100,0)"/>
    <ellipse cx="260" cy="178" rx="6.5" ry="12" fill="#5fe0ff" opacity=".18" filter="url(#hvlBlur)"/>
    <rect x="271" y="175" width="68" height="6" fill="url(#hvlBandV)"/>
    <line x1="271" y1="178" x2="336" y2="178" stroke="#5fe0ff" stroke-width="1.6" opacity=".5" filter="url(#hvlGlow)"/>
    <path d="M339 174 L349 178 L339 182 Z" fill="#5fe0ff" opacity=".5"/>
    <rect x="297" y="82" width="16" height="14" fill="#5fe0ff" opacity=".75"/>
    <text x="305" y="73" text-anchor="middle" font-size="12" fill="#9fe6ff">1/4</text>
  </g>

  <!-- ===== hvlLayer3: plate 3 -> 1/8 ===== -->
  <g id="hvlLayer3" opacity="0">
    <use xlink:href="#hvlPlateDef" transform="translate(200,0)"/>
    <ellipse cx="360" cy="178" rx="6" ry="10" fill="#5fe0ff" opacity=".11" filter="url(#hvlBlur)"/>
    <rect x="371" y="176.2" width="68" height="3.6" fill="url(#hvlBandV)"/>
    <line x1="371" y1="178" x2="436" y2="178" stroke="#5fe0ff" stroke-width="1.3" opacity=".4" filter="url(#hvlGlow)"/>
    <path d="M439 174.5 L449 178 L439 181.5 Z" fill="#5fe0ff" opacity=".42"/>
    <rect x="397" y="89" width="16" height="7" fill="#5fe0ff" opacity=".7"/>
    <text x="405" y="80" text-anchor="middle" font-size="12" fill="#9fe6ff">1/8</text>
  </g>

  <!-- ===== hvlLayer4: plate 4 -> 1/16 ===== -->
  <g id="hvlLayer4" opacity="0">
    <use xlink:href="#hvlPlateDef" transform="translate(300,0)"/>
    <ellipse cx="460" cy="178" rx="6" ry="9" fill="#5fe0ff" opacity=".07" filter="url(#hvlBlur)"/>
    <rect x="471" y="176.8" width="85" height="2.4" fill="url(#hvlBandV)"/>
    <line x1="471" y1="178" x2="553" y2="178" stroke="#5fe0ff" stroke-width="1.1" opacity=".32" filter="url(#hvlGlow)"/>
    <path d="M556 174.5 L568 178 L556 181.5 Z" fill="#5fe0ff" opacity=".38"/>
    <rect x="505" y="92.5" width="16" height="3.5" fill="#5fe0ff" opacity=".7"/>
    <text x="513" y="83.5" text-anchor="middle" font-size="13" fill="#eaf6ff" filter="url(#hvlGlowS)">1/16</text>
  </g>

  <!-- ===== hvlChip: HVL thickness fact (serves steel + lead narrations) ===== -->
  <g id="hvlChip" opacity="0">
    <rect x="135" y="294" width="330" height="28" rx="8" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="1.2" stroke-opacity=".55"/>
    <text x="300" y="312" text-anchor="middle" font-size="11" letter-spacing=".4" fill="#eaf6ff">1 HVL (IR-192) ≈ 0.5 IN STEEL ≈ 4.8 MM LEAD</text>
  </g>
</svg>
