<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cscGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cscGlowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cscSteel" gradientUnits="userSpaceOnUse" x1="0" y1="42" x2="0" y2="260">
      <stop offset="0" stop-color="#2c5b8b"/><stop offset=".4" stop-color="#1a3e66"/><stop offset="1" stop-color="#0d2342"/>
    </linearGradient>
    <radialGradient id="cscPoolG" cx=".5" cy=".45" r=".65">
      <stop offset="0" stop-color="#e8fcff"/><stop offset=".5" stop-color="#7fe6ff"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".55"/>
    </radialGradient>
    <linearGradient id="cscChanG" gradientUnits="userSpaceOnUse" x1="0" y1="78" x2="0" y2="220">
      <stop offset="0" stop-color="#aef2ff"/><stop offset="1" stop-color="#5fe0ff"/>
    </linearGradient>
    <radialGradient id="cscBulbG" cx=".5" cy=".45" r=".65">
      <stop offset="0" stop-color="#effdff"/><stop offset=".55" stop-color="#7fe6ff"/><stop offset="1" stop-color="#46c8f2"/>
    </radialGradient>
  </defs>

  <!-- ===== SAND MOLD HINT (dashed cavity outline + stipple) ===== -->
  <path d="M184 62 Q184 35 230 35 Q276 35 276 62 L276 95 L262 109 L262 207 L395 207 L395 267 L49 267 L49 207 L198 207 L198 109 L184 95 Z"
        fill="none" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="4 4" opacity=".28"/>
  <g fill="#8fb6e0" opacity=".16">
    <circle cx="172" cy="44" r="1"/><circle cx="290" cy="46" r="1"/><circle cx="178" cy="104" r="1"/>
    <circle cx="282" cy="104" r="1"/><circle cx="190" cy="170" r="1"/><circle cx="270" cy="170" r="1"/>
    <circle cx="44" cy="222" r="1"/><circle cx="402" cy="222" r="1"/><circle cx="66" cy="277" r="1"/><circle cx="360" cy="277" r="1"/>
  </g>

  <!-- ===== CASTING BODY: riser + vertical wall + horizontal rib (T junction, filleted) ===== -->
  <path d="M191 64 Q191 42 230 42 Q269 42 269 64 L269 98 L255 112 L255 204 Q255 214 265 214 L388 214 L388 260 L56 260 L56 214 L195 214 Q205 214 205 204 L205 112 L191 98 Z"
        fill="url(#cscSteel)" stroke="#8fb6e0" stroke-width="1.8"/>
  <!-- solidified skin growing inward: isotherm contours -->
  <path d="M199 64 Q199 50 230 50 Q261 50 261 64 L261 91 L247 105 L247 198 Q247 222 271 222 L380 222 L380 252 L64 252 L64 222 L189 222 Q213 222 213 198 L213 105 L199 91 Z"
        fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".26"/>
  <path d="M207 66 Q207 58 230 58 Q253 58 253 66 L253 84 L239 98 L239 190 Q239 230 279 230 L372 230 L372 244 L72 244 L72 230 L181 230 Q221 230 221 190 L221 98 L207 84 Z"
        fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".14"/>
  <!-- skin growth arrows: thin rib freezes first, fronts meet at centerline -->
  <g stroke="#8fb6e0" stroke-width="1.2" fill="none" opacity=".5">
    <path d="M120 258 V248 M116.5 252 L120 247 L123.5 252"/>
    <path d="M120 216 V226 M116.5 222 L120 227 L123.5 222"/>
    <path d="M330 258 V248 M326.5 252 L330 247 L333.5 252"/>
    <path d="M330 216 V226 M326.5 222 L330 227 L333.5 222"/>
  </g>

  <!-- ===== LIQUID CORE: riser pool -> feed channel -> junction hot spot ===== -->
  <g id="cscBase" opacity="0">
    <g filter="url(#cscGlow)">
      <ellipse cx="230" cy="236" rx="62" ry="6.5" fill="#5fe0ff" opacity=".3"/>
      <ellipse cx="230" cy="74" rx="27" ry="20" fill="url(#cscPoolG)"/>
      <rect x="222" y="78" width="16" height="140" rx="7" fill="url(#cscChanG)"/>
      <ellipse cx="230" cy="233" rx="22" ry="17" fill="url(#cscBulbG)"/>
    </g>
    <g font-size="11">
      <path d="M152 121 L220 139" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
      <text x="118" y="118" text-anchor="middle" fill="#9fe6ff" opacity=".85">LIQUID FEED</text>
    </g>
  </g>

  <!-- ===== PINCH: mid-wall fronts meet, feed path freezes shut ===== -->
  <g id="cscPinch" opacity="0">
    <ellipse cx="230" cy="74" rx="28" ry="21" fill="#0e2848" opacity=".4"/>
    <rect x="220" y="100" width="20" height="114" rx="5" fill="#1b4068" opacity=".97"/>
    <line x1="230" y1="106" x2="230" y2="210" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>
    <g fill="none" stroke="#ffc24b" stroke-width="2" filter="url(#cscGlowS)" opacity=".95">
      <path d="M215 133 Q237 152 215 171"/>
      <path d="M245 133 Q223 152 245 171"/>
    </g>
  </g>
  <g id="cscPinchLbl" font-size="12" opacity="0">
    <path d="M247 152 L300 132" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="304" y="136" fill="#ffc24b" opacity=".9">FEED CUT</text>
  </g>

  <!-- feed arrow (annotation layer, drawn over freeze plug) -->
  <path id="cscFeedArrow" d="M230 86 V194 M221 184 L230 195 L239 184" fill="none" stroke="#bff4ff"
        stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#cscGlowS)"
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== SHRINK VOID at the thermal center ===== -->
  <g id="cscVoid" opacity="0">
    <ellipse cx="230" cy="233" rx="23" ry="18" fill="#14304f" opacity=".97"/>
    <circle cx="230" cy="233" r="26" fill="none" stroke="#ffc24b" stroke-width="1" stroke-dasharray="4 3" opacity=".3"/>
    <path d="M204 235 L212 230 L211 221 L219 228 L226 217 L231 226 L239 222 L245 226 L256 230 L247 235 L251 243 L241 240 L235 249 L229 242 L219 244 L213 248 L215 239 L206 240 Z"
          fill="#060f1f" stroke="#ff6b6b" stroke-width="1.4" stroke-linejoin="round" filter="url(#cscGlowS)"/>
    <g stroke="#ff6b6b" stroke-width="1" opacity=".6" fill="none">
      <path d="M254 239 L261 241"/><path d="M212 240 L204 246"/><path d="M241 245 L245 252"/>
      <path d="M222 231 L230 235 L238 232" opacity=".5"/>
    </g>
  </g>
  <circle id="cscPing" cx="230" cy="233" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#cscGlowS)"/>
  <g id="cscVoidLbl" opacity="0">
    <path d="M236 250 L272 284" stroke="#ff6b6b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="276" y="288" font-size="12" fill="#ff6b6b" opacity=".95">SHRINK</text>
    <text x="276" y="303" font-size="11" fill="#9fe6ff" opacity=".85">THERMAL CENTER</text>
  </g>

  <!-- ===== L / T / V / X junction glyph row (freeze-last hot spots) ===== -->
  <g id="cscLetters" opacity="0">
    <text x="492" y="262" text-anchor="middle" font-size="11" fill="#ffc24b" opacity=".8">JUNCTION HOT SPOTS</text>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#8fb6e0" stroke-width="9" opacity=".95">
        <path d="M409 276 V298 H427"/>
        <path d="M447 277 H473 M460 277 V301"/>
        <path d="M499 276 L512 299 L525 276"/>
        <path d="M552 278 L576 300 M576 278 L552 300"/>
      </g>
      <g stroke="#16365c" stroke-width="5.5">
        <path d="M409 276 V298 H427"/>
        <path d="M447 277 H473 M460 277 V301"/>
        <path d="M499 276 L512 299 L525 276"/>
        <path d="M552 278 L576 300 M576 278 L552 300"/>
      </g>
    </g>
    <g filter="url(#cscGlowS)">
      <circle cx="409" cy="296" r="3.2" fill="#ff9b4b"/>
      <circle cx="460" cy="278" r="3.2" fill="#ff9b4b"/>
      <circle cx="512" cy="295" r="3.2" fill="#ff9b4b"/>
      <circle cx="564" cy="289" r="3.2" fill="#ff9b4b"/>
    </g>
    <g fill="none" stroke="#ff9b4b" stroke-width="1" opacity=".45">
      <circle cx="409" cy="296" r="6.5"/><circle cx="460" cy="278" r="6.5"/>
      <circle cx="512" cy="295" r="6.5"/><circle cx="564" cy="289" r="6.5"/>
    </g>
  </g>

  <!-- ===== static labels ===== -->
  <text x="28" y="28" font-size="12" fill="#9fe6ff" opacity=".7">CASTING SECTION — T JUNCTION</text>
  <g font-size="12">
    <path d="M291 56 L271 60" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <text x="296" y="60" fill="#9fe6ff" opacity=".85">RISER</text>
  </g>
  <g font-size="11" fill="#9fe6ff" opacity=".85">
    <rect x="436" y="26" width="20" height="10" rx="2" fill="#5fe0ff" opacity=".9"/>
    <text x="462" y="35">LIQUID CORE</text>
    <rect x="436" y="46" width="20" height="10" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1"/>
    <text x="462" y="55">SOLID SKIN</text>
  </g>
</svg>
