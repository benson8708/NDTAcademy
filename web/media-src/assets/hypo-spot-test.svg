<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="hstGlow" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hstFilmG" x1="0" y1="30" x2="0" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13294a"/><stop offset=".5" stop-color="#0d2240"/><stop offset="1" stop-color="#112a4c"/>
    </linearGradient>
    <linearGradient id="hstWeldG" x1="0" y1="96" x2="0" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a7cb4"/><stop offset=".5" stop-color="#3a68a0"/><stop offset="1" stop-color="#4a7cb4"/>
    </linearGradient>
    <linearGradient id="hstStainG" x1="18" y1="0" x2="348" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d29a48" stop-opacity=".08"/>
      <stop offset=".55" stop-color="#cd8f3c" stop-opacity=".26"/>
      <stop offset="1" stop-color="#b06f24" stop-opacity=".42"/>
    </linearGradient>
    <linearGradient id="hstBaseG" x1="0" y1="272" x2="0" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".8"/><stop offset="1" stop-color="#1751c4" stop-opacity=".85"/>
    </linearGradient>
    <linearGradient id="hstClearG" x1="0" y1="120" x2="0" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dcefff" stop-opacity=".32"/><stop offset="1" stop-color="#9cc4e8" stop-opacity=".16"/>
    </linearGradient>
    <clipPath id="hstFilmClip"><rect x="18" y="30" width="330" height="168" rx="4"/></clipPath>
  </defs>

  <!-- ===== static zone labels + divider ===== -->
  <text x="18" y="20" font-size="11" fill="#9fe6ff" letter-spacing="1.5" opacity=".75">PROCESSED RADIOGRAPH</text>
  <text x="586" y="20" text-anchor="end" font-size="11" fill="#9fe6ff" letter-spacing="1.5" opacity=".75">SPOT-TEST STATION</text>
  <path d="M362 30 V310" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 5" opacity=".18" fill="none"/>

  <!-- ===== static right scaffold: clear film corner + ghost reference strip ===== -->
  <polygon points="418,120 522,120 522,182 444,182 418,156" fill="url(#hstClearG)" stroke="#bfe2ff" stroke-width="1.3" stroke-linejoin="round"/>
  <text x="470" y="198" text-anchor="middle" font-size="10.5" fill="#9fe6ff" letter-spacing="1" opacity=".65">CLEAR FILM CORNER</text>
  <g opacity=".32">
    <text x="376" y="230" font-size="11" fill="#9fe6ff" letter-spacing="1">REFERENCE STAINS</text>
    <rect x="376" y="240" width="38" height="38" rx="3" fill="#f3e7cd" stroke="#9fc6ec" stroke-width=".8"/>
    <rect x="418" y="240" width="38" height="38" rx="3" fill="#e2bf8b" stroke="#9fc6ec" stroke-width=".8"/>
    <rect x="460" y="240" width="38" height="38" rx="3" fill="#c89a55" stroke="#9fc6ec" stroke-width=".8"/>
    <rect x="502" y="240" width="38" height="38" rx="3" fill="#a06a2c" stroke="#9fc6ec" stroke-width=".8"/>
    <rect x="544" y="240" width="38" height="38" rx="3" fill="#6f4416" stroke="#9fc6ec" stroke-width=".8"/>
  </g>

  <!-- ===== hstFilm: radiograph + magnified emulsion inset (fade @0.5) ===== -->
  <g id="hstFilm" opacity="0">
    <!-- film sheet -->
    <rect x="18" y="30" width="330" height="168" rx="4" fill="url(#hstFilmG)" stroke="#5b8cc0" stroke-width="1.5"/>
    <g clip-path="url(#hstFilmClip)">
      <!-- weld image band with wavy toes -->
      <path d="M18 96 Q43 92.5 68 96 T118 96 T168 96 T218 96 T268 96 T318 96 T368 96 L368 132 Q343 135.5 318 132 T268 132 T218 132 T168 132 T118 132 T68 132 T18 132 Z" fill="url(#hstWeldG)" opacity=".92"/>
      <g fill="none" stroke="#7fb6e6" stroke-width="1" opacity=".5">
        <path d="M18 96 Q43 92.5 68 96 T118 96 T168 96 T218 96 T268 96 T318 96 T368 96"/>
        <path d="M18 132 Q43 135.5 68 132 T118 132 T168 132 T218 132 T268 132 T318 132 T368 132"/>
      </g>
      <!-- cap ripples (kept clear of the thin-wire zone) -->
      <g fill="none" stroke="#8fc0e8" stroke-width="1" opacity=".22">
        <path d="M34 99 q-7 16.5 0 33"/><path d="M58 99 q-7 16.5 0 33"/><path d="M82 99 q-7 16.5 0 33"/>
        <path d="M106 99 q-7 16.5 0 33"/><path d="M130 99 q-7 16.5 0 33"/><path d="M154 99 q-7 16.5 0 33"/>
        <path d="M178 99 q-7 16.5 0 33"/><path d="M202 99 q-7 16.5 0 33"/><path d="M226 99 q-7 16.5 0 33"/>
        <path d="M318 99 q-7 16.5 0 33"/><path d="M340 99 q-7 16.5 0 33"/>
      </g>
      <!-- wire IQI: holder + three wires, thick to thin -->
      <rect x="236" y="84" width="66" height="62" fill="#cfe4f7" fill-opacity=".06" stroke="#9fc6ec" stroke-width=".8" stroke-dasharray="3 3" opacity=".55"/>
      <line x1="248" y1="90" x2="248" y2="140" stroke="#dff1ff" stroke-width="2.6" opacity=".95" stroke-linecap="round"/>
      <line x1="268" y1="90" x2="268" y2="140" stroke="#dff1ff" stroke-width="1.6" opacity=".85" stroke-linecap="round"/>
      <line x1="288" y1="90" x2="288" y2="140" stroke="#dff1ff" stroke-width="0.9" opacity=".78" stroke-linecap="round"/>
    </g>
    <text x="344" y="76" text-anchor="end" font-size="11" fill="#9fe6ff" letter-spacing="1" opacity=".85">WIRE IQI</text>
    <path d="M318 79 L303 86" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <text x="26" y="152" font-size="11" fill="#9fe6ff" opacity=".6" letter-spacing="1">WELD IMAGE</text>
    <path d="M64 142 L80 134" stroke="#5fe0ff" stroke-width="1" opacity=".4" fill="none"/>
    <text x="338" y="190" text-anchor="end" font-size="11" fill="#d7ecff" opacity=".6">B-7</text>

    <!-- zoom source + projection lines to inset -->
    <circle cx="90" cy="172" r="11" fill="none" stroke="#5fe0ff" stroke-width="1.2" stroke-dasharray="3 3" opacity=".6"/>
    <path d="M81 179.5 L22 224 M99 179.5 L344 224" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 4" opacity=".32" fill="none"/>

    <!-- magnified emulsion cross-section inset -->
    <rect x="18" y="224" width="330" height="78" rx="6" fill="rgba(10,30,60,.55)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="26" y="232" width="314" height="38" fill="#9fe6ff" fill-opacity=".1"/>
    <text x="32" y="243" font-size="11" fill="#9fe6ff" letter-spacing="1" opacity=".8">GELATIN (EMULSION)</text>
    <!-- developed silver grains -->
    <g fill="#04101f" opacity=".9">
      <circle cx="38" cy="258" r="1.7"/><circle cx="55" cy="252" r="1.3"/><circle cx="74" cy="261" r="1.8"/>
      <circle cx="92" cy="251" r="1.2"/><circle cx="118" cy="259" r="1.7"/><circle cx="136" cy="252" r="1.3"/>
      <circle cx="158" cy="262" r="1.6"/><circle cx="184" cy="240" r="1.3"/><circle cx="208" cy="260" r="1.8"/>
      <circle cx="222" cy="238" r="1.4"/><circle cx="236" cy="252" r="1.2"/><circle cx="258" cy="262" r="1.7"/>
      <circle cx="270" cy="240" r="1.3"/><circle cx="296" cy="258" r="1.7"/><circle cx="312" cy="238" r="1.4"/>
      <circle cx="330" cy="252" r="1.5"/>
    </g>
    <g fill="none" stroke="#7fb6e6" stroke-width=".5" opacity=".5">
      <circle cx="38" cy="258" r="2.4"/><circle cx="74" cy="261" r="2.5"/><circle cx="118" cy="259" r="2.4"/>
      <circle cx="158" cy="262" r="2.3"/><circle cx="208" cy="260" r="2.5"/><circle cx="258" cy="262" r="2.4"/>
      <circle cx="296" cy="258" r="2.4"/>
    </g>
    <!-- trapped thiosulfate residue dots (colorless residue = pale cyan) -->
    <g>
      <circle cx="62" cy="248" r="2.2" fill="#eaf6ff"/><circle cx="108" cy="254" r="2.2" fill="#eaf6ff"/>
      <circle cx="152" cy="248" r="2.2" fill="#eaf6ff"/><circle cx="198" cy="250" r="2.2" fill="#eaf6ff"/>
      <circle cx="244" cy="256" r="2.2" fill="#eaf6ff"/><circle cx="290" cy="247" r="2.2" fill="#eaf6ff"/>
      <circle cx="324" cy="260" r="2.2" fill="#eaf6ff"/>
    </g>
    <g fill="none" stroke="#5fe0ff" stroke-width=".9" stroke-dasharray="2.5 2.5">
      <circle cx="198" cy="250" r="5.5" opacity=".7">
        <animate attributeName="opacity" values=".45;.9;.45" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="290" cy="247" r="5.5" opacity=".7">
        <animate attributeName="opacity" values=".9;.45;.9" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- film base layer -->
    <rect x="26" y="272" width="314" height="20" fill="url(#hstBaseG)"/>
    <text x="32" y="286" font-size="11" fill="#dcecff" letter-spacing="1" opacity=".85">FILM BASE</text>
    <!-- caption -->
    <path d="M78 314.5 H88 M278 314.5 H288" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <text x="183" y="319" text-anchor="middle" font-size="12" fill="#9fe6ff" letter-spacing="1.5">RESIDUAL THIOSULFATE (HYPO)</text>
  </g>

  <!-- ===== hstStain: sulfide tint sweep + thinnest wire lost + Ag->Ag2S tag (fade @2.3) ===== -->
  <g id="hstStain" opacity="0">
    <g clip-path="url(#hstFilmClip)">
      <!-- cover that fades out the thinnest IQI wire -->
      <rect x="285.4" y="88" width="5.2" height="8" fill="url(#hstFilmG)"/>
      <rect x="285.4" y="96" width="5.2" height="36" fill="url(#hstWeldG)"/>
      <rect x="285.4" y="132" width="5.2" height="10" fill="url(#hstFilmG)"/>
      <!-- sepia blotches + amber tint sweep, heaviest at right -->
      <ellipse cx="120" cy="70" rx="26" ry="10" fill="#c98a3a" opacity=".12" transform="rotate(-12 120 70)"/>
      <ellipse cx="252" cy="162" rx="30" ry="12" fill="#c98a3a" opacity=".12" transform="rotate(8 252 162)"/>
      <ellipse cx="318" cy="88" rx="24" ry="15" fill="#c98a3a" opacity=".16" transform="rotate(-10 318 88)"/>
      <rect x="18" y="30" width="330" height="168" fill="url(#hstStainG)"/>
    </g>
    <!-- reaction tag -->
    <rect x="26" y="40" width="106" height="22" rx="5" fill="rgba(10,30,60,.7)" stroke="#d3a45e" stroke-width="1"/>
    <text x="38" y="55" font-size="12" fill="#eaf6ff">Ag</text>
    <path d="M60 51 H76 M71 47 L76 51 L71 55" stroke="#5fe0ff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="55" font-size="12" fill="#d3a45e" filter="url(#hstGlow)">Ag<tspan font-size="8.5" dy="2.5">2</tspan><tspan font-size="12" dy="-2.5">S</tspan></text>
  </g>

  <!-- ===== hstDrop: dropper + test drop + dwell-timer ring (fade @5.0) ===== -->
  <g id="hstDrop" opacity="0">
    <!-- rubber bulb -->
    <ellipse cx="470" cy="42" rx="12" ry="10" fill="#1E66F5" fill-opacity=".35" stroke="#9fe6ff" stroke-width="1.5"/>
    <rect x="462" y="50" width="16" height="6" rx="2" fill="#14304f" stroke="#9fe6ff" stroke-width="1"/>
    <!-- glass barrel + solution column + taper -->
    <rect x="465.5" y="56" width="9" height="28" fill="#cfe4f7" fill-opacity=".14" stroke="#9fe6ff" stroke-width="1.3"/>
    <rect x="467.5" y="64" width="5" height="18" fill="#5fe0ff" opacity=".4"/>
    <polygon points="465.5,84 474.5,84 471.6,98 468.4,98" fill="#cfe4f7" fill-opacity=".14" stroke="#9fe6ff" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- released drop -->
    <path d="M470 104 C467 108.6 465.4 111.2 465.4 113.6 a4.6 4.6 0 1 0 9.2 0 C474.6 111.2 473 108.6 470 104 Z" fill="#9fe6ff" opacity=".95" filter="url(#hstGlow)"/>
    <circle cx="468.2" cy="112.6" r="1.1" fill="#ffffff" opacity=".8"/>
    <text x="442" y="111" text-anchor="end" font-size="10.5" fill="#9fe6ff" letter-spacing="1" opacity=".85">TEST DROP</text>
    <path d="M446 107 L461 107" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <!-- dwell-timer ring on the film corner -->
    <circle cx="470" cy="146" r="16" fill="none" stroke="#5fe0ff" stroke-width="1.2" stroke-dasharray="2.5 4.5" opacity=".75"/>
    <circle cx="470" cy="146" r="12" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-dasharray="56.5 18.9" stroke-linecap="round" opacity=".9">
      <animateTransform attributeName="transform" type="rotate" values="0 470 146;360 470 146" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <text x="528" y="150" font-size="11" fill="#9fe6ff" letter-spacing="1" opacity=".85">DWELL</text>
    <path d="M488 146 L524 146" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 3" opacity=".5" fill="none"/>
  </g>

  <!-- ===== hstBlot: blotter + sulfide stain left on the corner (fade @5.9) ===== -->
  <g id="hstBlot" opacity="0">
    <g transform="rotate(14 504 130)">
      <rect x="491" y="117" width="26" height="26" rx="2" fill="#eaf6ff" fill-opacity=".8" stroke="#bfe2ff" stroke-width="1"/>
      <path d="M491 124 L517 124" stroke="#9cc4e8" stroke-width=".8" opacity=".7"/>
    </g>
    <path d="M492 140 q-6 5 -10 3 M496 148 q-7 3 -12 0" stroke="#9fe6ff" stroke-width="1.1" stroke-dasharray="2 3" fill="none" opacity=".7" stroke-linecap="round"/>
    <text x="524" y="116" font-size="10.5" fill="#9fe6ff" letter-spacing="1" opacity=".85">BLOT</text>
    <!-- the stain: only sulfide carries amber -->
    <ellipse cx="470" cy="146" rx="7.5" ry="4.8" fill="#b27a36" stroke="#8a5520" stroke-width="1" opacity=".95"/>
    <ellipse cx="470" cy="146" rx="3.4" ry="2.1" fill="#8a5520" opacity=".9"/>
  </g>

  <!-- ===== hstPatches: strip illuminates + matched test stain + chevron (fade @6.4) ===== -->
  <g id="hstPatches" opacity="0">
    <rect x="370" y="234" width="218" height="50" rx="6" fill="#5fe0ff" fill-opacity=".06" stroke="#5fe0ff" stroke-width="1.2" opacity=".9"/>
    <text x="376" y="230" font-size="11" fill="#9fe6ff" letter-spacing="1">REFERENCE STAINS</text>
    <rect x="376" y="240" width="38" height="38" rx="3" fill="#f3e7cd" stroke="#eaf6ff" stroke-width="1"/>
    <rect x="418" y="240" width="38" height="38" rx="3" fill="#e2bf8b" stroke="#eaf6ff" stroke-width="1"/>
    <rect x="460" y="240" width="38" height="38" rx="3" fill="#c89a55" stroke="#eaf6ff" stroke-width="1"/>
    <rect x="502" y="240" width="38" height="38" rx="3" fill="#a06a2c" stroke="#eaf6ff" stroke-width="1"/>
    <rect x="544" y="240" width="38" height="38" rx="3" fill="#6f4416" stroke="#eaf6ff" stroke-width="1"/>
    <text x="395" y="296" text-anchor="middle" font-size="10" fill="#9fe6ff" letter-spacing="1" opacity=".8">FAINT</text>
    <text x="563" y="296" text-anchor="middle" font-size="10" fill="#9fe6ff" letter-spacing="1" opacity=".8">DARK</text>
    <!-- matched test stain chip under the darker patch -->
    <path d="M514 290 L521 283 L528 290" stroke="#5fe0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#hstGlow)"/>
    <rect x="506" y="294" width="30" height="30" rx="4" fill="#a06a2c" stroke="#eaf6ff" stroke-width="1"/>
    <ellipse cx="521" cy="309" rx="9" ry="6.5" fill="#8a5520" opacity=".75"/>
    <text x="494" y="313" text-anchor="end" font-size="10.5" fill="#9fe6ff" letter-spacing="1" opacity=".85">TEST SPOT</text>
    <path d="M498 309 L504 309" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
  </g>

  <!-- ===== hstPing: match confirmation (ping @6.7) ===== -->
  <circle id="hstPing" cx="521" cy="294" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#hstGlow)"/>
</svg>
