<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fpgglow" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fpgblur" filterUnits="userSpaceOnUse" x="140" y="130" width="320" height="190">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>
    <radialGradient id="fpghot" gradientUnits="userSpaceOnUse" cx="300" cy="224" r="118">
      <stop offset="0" stop-color="#ffedb3"/>
      <stop offset=".38" stop-color="#ffc26e"/>
      <stop offset=".62" stop-color="#ff9440"/>
      <stop offset=".85" stop-color="#d9682a"/>
      <stop offset="1" stop-color="#a8491c"/>
    </radialGradient>
    <linearGradient id="fpgdie" x1="0" y1="124" x2="0" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a3a63"/><stop offset="1" stop-color="#0d2440"/>
    </linearGradient>
    <linearGradient id="fpgdieLo" x1="0" y1="252" x2="0" y2="284" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16345a"/><stop offset="1" stop-color="#0b2038"/>
    </linearGradient>
    <linearGradient id="fpgcol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#142e52"/><stop offset=".5" stop-color="#0e2342"/><stop offset="1" stop-color="#0a1d38"/>
    </linearGradient>
    <linearGradient id="fpgram" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10294b"/><stop offset=".5" stop-color="#1d3f6b"/><stop offset="1" stop-color="#10294b"/>
    </linearGradient>
    <clipPath id="fpgdieClip"><rect x="190" y="124" width="220" height="64" rx="3"/></clipPath>
    <clipPath id="fpgdieLoClip"><rect x="190" y="252" width="220" height="32" rx="3"/></clipPath>
  </defs>

  <!-- ===== PRESS FRAME (suggested at edges) ===== -->
  <!-- columns -->
  <rect x="54" y="30" width="44" height="270" fill="url(#fpgcol)" stroke="#8fb6e0" stroke-width="1.5" rx="3"/>
  <rect x="502" y="30" width="44" height="270" fill="url(#fpgcol)" stroke="#8fb6e0" stroke-width="1.5" rx="3"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
    <line x1="66" y1="36" x2="66" y2="296"/><line x1="86" y1="36" x2="86" y2="296"/>
    <line x1="514" y1="36" x2="514" y2="296"/><line x1="534" y1="36" x2="534" y2="296"/>
  </g>
  <!-- bed + bolster -->
  <rect x="46" y="298" width="508" height="30" rx="6" fill="rgba(10,30,60,.55)" stroke="#8fb6e0" stroke-width="1.5"/>
  <rect x="150" y="284" width="300" height="14" fill="url(#fpgcol)" stroke="#8fb6e0" stroke-width="1.5"/>
  <text x="300" y="318" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".5" letter-spacing="2">OPEN-DIE PRESS · HOT WORK ~1200 °C</text>

  <!-- ===== LOWER DIE (flat, on bolster) ===== -->
  <rect x="190" y="252" width="220" height="32" rx="3" fill="url(#fpgdieLo)" stroke="#8fb6e0" stroke-width="1.8"/>
  <g clip-path="url(#fpgdieLoClip)" stroke="#8fb6e0" stroke-width="1" opacity=".12">
    <line x1="180" y1="294" x2="230" y2="244"/><line x1="220" y1="294" x2="270" y2="244"/>
    <line x1="260" y1="294" x2="310" y2="244"/><line x1="300" y1="294" x2="350" y2="244"/>
    <line x1="340" y1="294" x2="390" y2="244"/><line x1="380" y1="294" x2="430" y2="244"/>
  </g>
  <text x="300" y="273" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".75" letter-spacing="1">LOWER DIE</text>
  <!-- heat cast onto lower die face -->
  <line x1="214" y1="253" x2="386" y2="253" stroke="#ff9440" stroke-width="2" opacity=".4"/>

  <!-- ===== HOT BILLET (squishes laterally as die strokes) ===== -->
  <g transform="translate(300,252)">
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1 1;1.06 .93;1.06 .93;1 1;1 1" keyTimes="0;.1;.32;.52;1"
        calcMode="spline" keySplines=".5 0 .7 1;0 0 1 1;.3 0 .4 1;0 0 1 1"
        dur="7s" repeatCount="indefinite"/>
      <g transform="translate(-300,-252)">
        <!-- soft radiant halo -->
        <path d="M232 196 H368 C377 196 382.5 200 385 208 C387.8 217 389 221.5 389 224 C389 226.5 387.8 231 385 240 C382.5 248 377 252 368 252 H232 C223 252 217.5 248 215 240 C212.2 231 211 226.5 211 224 C211 221.5 212.2 217 215 208 C217.5 200 223 196 232 196 Z"
          fill="#ff8f3f" opacity=".45" filter="url(#fpgblur)">
          <animate attributeName="opacity" values=".35;.55;.35" dur="3.4s" repeatCount="indefinite"/>
        </path>
        <!-- billet body, barrelled sides -->
        <path d="M232 196 H368 C377 196 382.5 200 385 208 C387.8 217 389 221.5 389 224 C389 226.5 387.8 231 385 240 C382.5 248 377 252 368 252 H232 C223 252 217.5 248 215 240 C212.2 231 211 226.5 211 224 C211 221.5 212.2 217 215 208 C217.5 200 223 196 232 196 Z"
          fill="url(#fpghot)" stroke="#ffb066" stroke-width="1.6"/>
        <!-- chilled die-contact bands -->
        <path d="M236 198.6 H364" fill="none" stroke="#b8541f" stroke-width="3" opacity=".35" stroke-linecap="round"/>
        <path d="M236 249.4 H364" fill="none" stroke="#b8541f" stroke-width="3" opacity=".35" stroke-linecap="round"/>

        <!-- fpgFlowLines: fibrous grain flow, draws on (~4.8s) -->
        <path id="fpgFlowLines" fill="none" stroke="#7fd8ff" stroke-width="1.7" stroke-linecap="round" opacity=".9"
          pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#fpgglow)"
          d="M227 206 C258 204.4 282 207.2 300 207.2 C318 207.2 342 204.4 373 206
             M220 217 C254 214.8 280 218 300 218 C320 218 346 214.8 380 217
             M220 231 C254 233.2 280 230 300 230 C320 230 346 233.2 380 231
             M227 242 C258 243.6 282 240.8 300 240.8 C318 240.8 342 243.6 373 242"/>

        <!-- fpgStringer: inclusion blob elongating into a stringer (~5.6s) -->
        <circle cx="283" cy="224" r="4.3" fill="#3d1006" stroke="#ffc24b" stroke-width=".9" opacity=".95"/>
        <path id="fpgStringer" fill="none" stroke="#511608" stroke-width="2.6" stroke-linecap="round"
          pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"
          d="M283 224 L256 224.8 M283 224 C300 223.2 322 224.6 344 223.8"/>
      </g>
    </g>
  </g>

  <!-- ===== RAM + UPPER DIE (strokes down 14px, SMIL loop) ===== -->
  <g id="fpgRamG">
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 14;0 14;0 0;0 0" keyTimes="0;.1;.32;.52;1"
      calcMode="spline" keySplines=".5 0 .7 1;0 0 1 1;.3 0 .4 1;0 0 1 1"
      dur="7s" repeatCount="indefinite"/>
    <rect x="274" y="16" width="52" height="100" fill="url(#fpgram)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="262" y="114" width="76" height="12" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="190" y="124" width="220" height="64" rx="3" fill="url(#fpgdie)" stroke="#8fb6e0" stroke-width="1.8"/>
    <g clip-path="url(#fpgdieClip)" stroke="#8fb6e0" stroke-width="1" opacity=".12">
      <line x1="180" y1="198" x2="254" y2="124"/><line x1="220" y1="198" x2="294" y2="124"/>
      <line x1="260" y1="198" x2="334" y2="124"/><line x1="300" y1="198" x2="374" y2="124"/>
      <line x1="340" y1="198" x2="414" y2="124"/><line x1="380" y1="198" x2="454" y2="124"/>
    </g>
    <line x1="192" y1="142" x2="408" y2="142" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
    <text x="300" y="166" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".75" letter-spacing="1">UPPER DIE</text>
    <!-- billet heat reflected on the die face -->
    <line x1="214" y1="186.6" x2="386" y2="186.6" stroke="#ff9440" stroke-width="2" opacity=".35"/>
  </g>

  <!-- crown (painted over the ram so the ram slides through it) -->
  <rect x="46" y="12" width="508" height="34" rx="6" fill="#0d2342" stroke="#8fb6e0" stroke-width="1.5"/>
  <circle cx="76" cy="29" r="6" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".45"/>
  <circle cx="524" cy="29" r="6" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".45"/>
  <line x1="282" y1="44.6" x2="318" y2="44.6" stroke="#9fe6ff" stroke-width="1.4" opacity=".4"/>

  <!-- press force arrow -->
  <g stroke="#5fe0ff" fill="none" filter="url(#fpgglow)" opacity=".9">
    <path d="M246 60 V96" stroke-width="2"/>
    <path d="M238 94 L246 106 L254 94 Z" fill="#5fe0ff" stroke="none"/>
  </g>

  <!-- heat shimmer rising past the die sides -->
  <g fill="none" stroke="#ffe2b8" stroke-width="1.3" stroke-linecap="round">
    <g opacity="0">
      <path d="M168 252 q5 -12 0 -24 q-5 -12 0 -24 q5 -12 0 -24"/>
      <animate attributeName="opacity" values="0;.45;0" dur="3.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -16" dur="3.2s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <path d="M433 252 q-5 -12 0 -24 q5 -12 0 -24 q-5 -12 0 -24"/>
      <animate attributeName="opacity" values="0;.45;0" dur="3.8s" begin="1.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -16" dur="3.8s" begin="1.1s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <path d="M152 252 q4 -10 0 -20 q-4 -10 0 -20 q4 -10 0 -20" stroke-width="1.1"/>
      <animate attributeName="opacity" values="0;.3;0" dur="4.4s" begin=".6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -13" dur="4.4s" begin=".6s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <path d="M449 252 q-4 -10 0 -20 q4 -10 0 -20 q-4 -10 0 -20" stroke-width="1.1"/>
      <animate attributeName="opacity" values="0;.3;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -13" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- fpgStroke: ping at die/billet contact on the press stroke (~0.8s) -->
  <circle id="fpgStroke" cx="300" cy="194" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#fpgglow)"/>

  <!-- fpgMapTag: GRAIN FLOW micro-label (~7.2s) -->
  <g id="fpgMapTag" opacity="0">
    <path d="M384 218 L412 211" stroke="#9fe6ff" stroke-width="1" opacity=".55" fill="none"/>
    <text x="416" y="214" font-size="11" fill="#9fe6ff" opacity=".9" letter-spacing="1.5">GRAIN FLOW</text>
  </g>
</svg>
