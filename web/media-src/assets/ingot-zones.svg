      <path d="M290.1 209.6L285.8 217.2L280.4 218.4L276.3 209.1L280.8 203L285.4 202.6Z"/>
      <path d="M320.3 210.8L313.9 222.7L305.1 219.1L299 214.1L305.4 203.5L316.2 204Z"/>
