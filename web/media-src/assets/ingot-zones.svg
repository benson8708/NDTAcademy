    <path d="M219.1 92L249.4 88.1M380.9 92L344.7 87.3M220.7 105L253.1 100.8M379.3 105L337.7 99.7M222.4 118L258.7 113.3M377.6 118L343.1 113.6M224.1 131L270.3 125.1M375.9 131L339.8 126.4M225.7 144L258.1 139.8M374.3 144L333 138.7M227.4 157L263 152.4M372.6 157L327.3 151.2M229.1 170L268.1 165M370.9 170L343.1 166.4M230.8 183L272 177.7M369.2 183L331.2 178.1M232.4 196L260.4 192.4M367.6 196L330.8 191.3M234.1 209L270.3 204.4M365.9 209L319.6 203.1M235.8 222L276.1 216.8M364.2 222L335.3 218.3M237.4 235L282.2 229.2M362.6 235L327.2 230.5M239.1 248L269.8 244.1M360.9 248L324.9 243.4M240.8 261L278.7 256.1M359.2 261L316.7 255.5M242.4 274L281.3 269M357.6 274L323.8 269.7M252 283L252 259.5M264 283L264 258.2M276 283L276 250.5M288 283L288 260.6M300 283L300 254.6M312 283L312 252.6M324 283L324 260.3M336 283L336 255.1M348 283L348 250.8" stroke="#9fe6ff" stroke-width="1.2" opacity=".8" fill="none"/>
