      <circle cx="381" cy="95.2" r=".8"/>
      <circle cx="219.5" cy="113.8" r=".8"/>
      <circle cx="381.4" cy="119.8" r=".8"/>
      <circle cx="221.6" cy="138.4" r=".8"/>
      <circle cx="376.5" cy="144.4" r=".8"/>
      <circle cx="227.4" cy="163" r=".8"/>
      <circle cx="374.5" cy="169" r=".8"/>
      <circle cx="228.4" cy="187.6" r=".8"/>
      <circle cx="370.2" cy="193.6" r=".8"/>
      <circle cx="232.2" cy="212.2" r=".8"/>
      <circle cx="366.4" cy="218.2" r=".8"/>
      <circle cx="236.3" cy="236.8" r=".8"/>
      <circle cx="363.4" cy="242.8" r=".8"/>
      <circle cx="240.1" cy="261.4" r=".8"/>
      <circle cx="362.1" cy="267.4" r=".8"/>
      <circle cx="250" cy="283.7" r=".8"/>
      <circle cx="275.2" cy="284" r=".8"/>
      <circle cx="300.4" cy="284.5" r=".8"/>
      <circle cx="325.6" cy="284.5" r=".8"/>
      <circle cx="350.8" cy="284.5" r=".8"/>
    </g>
    <g font-size="12" letter-spacing="1.2">
      <path d="M156 228 L233 228" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
      <text x="152" y="232" text-anchor="end" fill="#9fe6ff">CHILL ZONE</text>
    </g>
  </g>

