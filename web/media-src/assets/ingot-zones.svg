      <polygon points="323.8,190.4 331.2,187.9 330.3,194.6"/>
      <polygon points="283,215.9 276.5,220.2 275.6,213.5"/>
      <polygon points="318,242.5 325.4,240 324.5,246.8"/>
      <polygon points="288.3,268.1 281.8,272.4 280.9,265.6"/>
      <polygon points="276,243.5 279.4,250.5 272.6,250.5"/>
      <polygon points="324,253.3 327.4,260.3 320.6,260.3"/>
    </g>
    <g font-size="12" letter-spacing="1.2">
      <path d="M442 196 L362 196" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
      <text x="446" y="200" fill="#9fe6ff">COLUMNAR</text>
    </g>
  </g>

  <!-- ============ REVEAL 3: equiaxed core ============ -->
