  <!-- ============ REVEAL 4: last to freeze (top center) ============ -->
  <g id="izTrouble" opacity="0">
    <path d="M300 44 V296" stroke="#5fe0ff" stroke-width="1.4" stroke-dasharray="10 4 3 4" opacity=".75" fill="none"/>
    <ellipse cx="300" cy="94" rx="46" ry="42" fill="url(#izHotG)">
      <animate attributeName="opacity" values=".55;1;.55" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="88" rx="22" ry="19" fill="url(#izHotG)">
      <animate attributeName="opacity" values=".4;.95;.4" dur="2.2s" begin=".35s" repeatCount="indefinite"/>
    </ellipse>
    <g font-size="12" letter-spacing="1.2">
      <path d="M156 96 L256 92" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
      <text x="152" y="100" text-anchor="end" fill="#eaf6ff" font-weight="700">LAST TO FREEZE</text>
    </g>
  </g>

  <!-- base labels -->
  <g font-size="12" letter-spacing="1.2" fill="#9fe6ff">
    <path d="M442 46 L420 50" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <text x="446" y="50" opacity=".85">HOT TOP</text>
    <path d="M156 150 L195 150" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <text x="152" y="154" text-anchor="end" opacity=".85">MOLD WALL</text>
  </g>
</svg>
