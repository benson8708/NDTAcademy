<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="izGlow" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="izSteel" x1="0" y1="72" x2="0" y2="308" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c5784"/><stop offset=".45" stop-color="#1a3c63"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="izMetal" x1="0" y1="52" x2="0" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E66F5" stop-opacity=".20"/>
      <stop offset=".45" stop-color="#102c52" stop-opacity=".62"/>
      <stop offset="1" stop-color="#0a1e3c" stop-opacity=".72"/>
    </linearGradient>
    <radialGradient id="izHotG" cx="300" cy="94" r="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaf6ff" stop-opacity=".85"/>
      <stop offset=".4" stop-color="#5fe0ff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="izInsul" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0H9" stroke="#8fb6e0" stroke-width=".9" opacity=".4"/>
    </pattern>
  </defs>

  <!-- ============ BASE: cast-iron mold + stool + faint hot top + dim ingot ============ -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <!-- stool (bottom plate) -->
    <rect x="150" y="290" width="300" height="18" rx="2.5" fill="url(#izSteel)" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- mold walls (tapered, big end up) -->
    <path d="M172 72 H210 L238 290 H200 Z" fill="url(#izSteel)" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M390 72 H428 L400 290 H362 Z" fill="url(#izSteel)" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- lifting lugs -->
    <path d="M175 90 H162 Q158 90 158 94 V110 Q158 114 162 114 H178" fill="url(#izSteel)" stroke="#8fb6e0" stroke-width="1.3"/>
    <path d="M425 90 H438 Q442 90 442 94 V110 Q442 114 438 114 H422" fill="url(#izSteel)" stroke="#8fb6e0" stroke-width="1.3"/>
    <!-- faint insulated hot-top cap -->
    <g opacity=".6">
      <rect x="172" y="36" width="72" height="36" rx="2" fill="rgba(10,30,60,.55)" stroke="#8fb6e0" stroke-width="1.4"/>
      <rect x="172" y="36" width="72" height="36" fill="url(#izInsul)"/>
      <rect x="356" y="36" width="72" height="36" rx="2" fill="rgba(10,30,60,.55)" stroke="#8fb6e0" stroke-width="1.4"/>
      <rect x="356" y="36" width="72" height="36" fill="url(#izInsul)"/>
    </g>
    <!-- ingot metal (dim) -->
    <path d="M244 56 V72 H210 L238 285 Q239 290 245 290 H355 Q361 290 362 285 L390 72 H356 V56 Q300 64 244 56 Z" fill="url(#izMetal)"/>
    <!-- dim ingot outline + sunken meniscus -->
    <path d="M244 56 V72 H210 L238 285 Q239 290 245 290 H355 Q361 290 362 285 L390 72 H356 V56" fill="none" stroke="#8fb6e0" stroke-width="1.8" opacity=".8"/>
    <path d="M244 56 Q300 64 356 56" fill="none" stroke="#8fb6e0" stroke-width="1.4" opacity=".7"/>
  </g>

