<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="icGlow" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="icGlowS" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="icBlur4" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <linearGradient id="icSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ea3d6"/><stop offset=".45" stop-color="#35648f"/><stop offset="1" stop-color="#1b3f66"/>
    </linearGradient>
    <linearGradient id="icSteelD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d6ea3"/><stop offset=".5" stop-color="#234a77"/><stop offset="1" stop-color="#142f54"/>
    </linearGradient>
    <linearGradient id="icPlateG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fc4e8"/><stop offset=".5" stop-color="#3d6ea3"/><stop offset="1" stop-color="#27507e"/>
    </linearGradient>
    <radialGradient id="icPortGlow">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".55"/><stop offset=".6" stop-color="#5fe0ff" stop-opacity=".2"/><stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="icGlassSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf6ff" stop-opacity=".12"/><stop offset=".35" stop-color="#eaf6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ================= SOURCE (static) ================= -->
  <g id="icSource">
    <rect x="28" y="140" width="74" height="60" rx="9" fill="url(#icSteel)" stroke="#9fe6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="33" y="145" width="64" height="50" rx="6" fill="none" stroke="#9fe6ff" stroke-width=".8" opacity=".35"/>
    <!-- vents -->
    <g stroke="#9fe6ff" stroke-width="1.2" opacity=".4" stroke-linecap="round">
      <path d="M38 152 H56 M38 158 H56 M38 164 H56"/>
    </g>
    <!-- trefoil -->
    <g transform="translate(64,172)" fill="#9fe6ff" opacity=".6">
      <circle r="2.4"/>
      <path d="M0 0 L4.4 -7.6 A8.8 8.8 0 0 0 -4.4 -7.6 Z" transform="rotate(0)"/>
      <path d="M0 0 L4.4 -7.6 A8.8 8.8 0 0 0 -4.4 -7.6 Z" transform="rotate(120)"/>
      <path d="M0 0 L4.4 -7.6 A8.8 8.8 0 0 0 -4.4 -7.6 Z" transform="rotate(240)"/>
    </g>
    <!-- ON lamp (dim socket) -->
    <circle cx="91" cy="150" r="3" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".45"/>
    <!-- collimator snout + port slot -->
    <path d="M102 158 L120 150 L120 190 L102 182 Z" fill="url(#icSteelD)" stroke="#9fe6ff" stroke-width="1.2" stroke-linejoin="round"/>
    <rect x="119" y="149" width="4" height="42" rx="1.5" fill="#5fe0ff" opacity=".25"/>
    <text x="75" y="220" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="#9fe6ff">X / &#947; SOURCE</text>
  </g>

  <!-- ===== icSrcGlow: source powers on (fade 0.5) ===== -->
  <g id="icSrcGlow" opacity="0">
    <circle cx="124" cy="170" r="22" fill="url(#icPortGlow)"/>
    <rect x="119" y="149" width="4" height="42" rx="1.5" fill="#5fe0ff" opacity=".9" filter="url(#icGlowS)"/>
    <circle cx="91" cy="150" r="3" fill="#ffc24b" filter="url(#icGlowS)"/>
  </g>

  <!-- ================= GLASS AIR CELL (static) ================= -->
  <g id="icCell">
    <rect x="150" y="96" width="240" height="148" rx="10" fill="rgba(95,224,255,.05)" stroke="#9fe6ff" stroke-width="2" stroke-linejoin="round"/>
    <rect x="154.5" y="100.5" width="231" height="139" rx="7" fill="none" stroke="#9fe6ff" stroke-width=".8" opacity=".35"/>
    <rect x="152" y="98" width="236" height="40" rx="9" fill="url(#icGlassSheen)"/>
    <text x="150" y="86" font-size="10" letter-spacing="1.2" fill="#8fb6e0" opacity=".85">GLASS WALL</text>
    <path d="M196 89 L207 97" stroke="#8fb6e0" stroke-width=".9" opacity=".5"/>
    <!-- faint field lines between plates -->
    <g stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 5" opacity=".1">
      <path d="M185 128 V212 M225 128 V212 M265 128 V212 M305 128 V212 M345 128 V212"/>
    </g>
    <!-- faint air molecules -->
    <g fill="#9fe6ff" opacity=".2">
      <circle cx="172" cy="134" r="1.3"/><circle cx="208" cy="138" r="1.3"/><circle cx="248" cy="132" r="1.3"/>
      <circle cx="312" cy="136" r="1.3"/><circle cx="352" cy="134" r="1.3"/><circle cx="178" cy="206" r="1.3"/>
      <circle cx="222" cy="210" r="1.3"/><circle cx="268" cy="204" r="1.3"/><circle cx="330" cy="208" r="1.3"/>
      <circle cx="362" cy="202" r="1.3"/>
    </g>
    <!-- electrodes -->
    <rect x="162" y="116" width="212" height="9" rx="2" fill="url(#icPlateG)" stroke="#9fe6ff" stroke-width="1.2"/>
    <rect x="162" y="215" width="212" height="9" rx="2" fill="url(#icPlateG)" stroke="#9fe6ff" stroke-width="1.2"/>
    <g fill="#eaf6ff" font-size="9" text-anchor="middle" opacity=".85">
      <text x="174" y="123.6">+</text><text x="202" y="123.6">+</text><text x="230" y="123.6">+</text><text x="258" y="123.6">+</text>
      <text x="286" y="123.6">+</text><text x="314" y="123.6">+</text><text x="342" y="123.6">+</text><text x="366" y="123.6">+</text>
      <text x="174" y="222.6">&#8722;</text><text x="202" y="222.6">&#8722;</text><text x="230" y="222.6">&#8722;</text><text x="258" y="222.6">&#8722;</text>
      <text x="286" y="222.6">&#8722;</text><text x="314" y="222.6">&#8722;</text><text x="342" y="222.6">&#8722;</text><text x="366" y="222.6">&#8722;</text>
    </g>
    <text x="372" y="110" text-anchor="end" font-size="10" letter-spacing="1.2" fill="#9fe6ff">+ PLATE</text>
    <text x="372" y="237" text-anchor="end" font-size="10" letter-spacing="1.2" fill="#9fe6ff">&#8722; PLATE</text>
    <!-- feedthrough insulators -->
    <rect x="376" y="114.5" width="20" height="12" rx="3" fill="url(#icSteelD)" stroke="#9fe6ff" stroke-width="1" opacity=".9"/>
    <rect x="376" y="213.5" width="20" height="12" rx="3" fill="url(#icSteelD)" stroke="#9fe6ff" stroke-width="1" opacity=".9"/>
    <!-- 1 kg dry air bracket -->
    <path d="M150 252 V260 H390 V252" fill="none" stroke="#9fe6ff" stroke-width="1.5" opacity=".8"/>
    <path d="M270 260 V266" stroke="#9fe6ff" stroke-width="1.5" opacity=".8"/>
    <text x="270" y="281" text-anchor="middle" font-size="12" letter-spacing="2" fill="#9fe6ff">1 KG DRY AIR</text>
  </g>

  <!-- ================= WIRES + METER (static) ================= -->
  <g id="icCircuitDim">
    <path d="M396 120.5 H436 M396 219.5 H436" stroke="#5fe0ff" stroke-width="1.5" opacity=".35" fill="none"/>
    <circle cx="436" cy="120.5" r="3" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".5"/>
    <circle cx="436" cy="219.5" r="3" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".5"/>
  </g>
  <g id="icMeter">
    <rect x="436" y="100" width="150" height="156" rx="12" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="1.5"/>
    <rect x="440.5" y="104.5" width="141" height="147" rx="9" fill="none" stroke="#5fe0ff" stroke-width=".7" opacity=".3"/>
    <text x="511" y="118" text-anchor="middle" font-size="10" letter-spacing="1" fill="#8fb6e0">INTEGRATING METER</text>
    <text x="445" y="116.5" font-size="9" fill="#9fe6ff" opacity=".7">+</text>
    <text x="445" y="231.5" font-size="9" fill="#9fe6ff" opacity=".7">&#8722;</text>
    <!-- C/KG chip (dim ghost until icCharge) -->
    <rect x="458" y="130" width="106" height="34" rx="8" fill="none" stroke="#5fe0ff" stroke-width="1.4" opacity=".35"/>
    <text x="511" y="153.5" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="2" fill="#9fe6ff" opacity=".3">C/KG</text>
    <!-- dial -->
    <rect x="452" y="172" width="118" height="76" rx="8" fill="rgba(8,22,44,.6)" stroke="#5fe0ff" stroke-width="1" opacity=".9"/>
    <path d="M470.4 218 A40 40 0 0 1 539.6 218" fill="none" stroke="#9fe6ff" stroke-width="1.6"/>
    <g stroke="#9fe6ff" stroke-width="1.2" opacity=".8">
      <path d="M470.36 218 L465.2 215"/>
      <path d="M485 203.36 L482 198.2"/>
      <path d="M505 198 L505 192"/>
      <path d="M525 203.36 L528 198.2"/>
      <path d="M539.64 218 L544.8 215"/>
    </g>
    <text x="486" y="234" text-anchor="middle" font-size="10" letter-spacing="1" fill="#9fe6ff">mR/h</text>
    <path d="M505 238 L521.9 206.2" stroke="#ffc24b" stroke-width="2" stroke-linecap="round" filter="url(#icGlowS)"/>
    <circle cx="505" cy="238" r="2.8" fill="#eaf6ff"/>
  </g>

  <!-- ===== icBeam: photon rays cross the cell (draw 0.5) ===== -->
  <path id="icBeam" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".95" filter="url(#icGlowS)"
        d="M122 170 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0
           M122 153 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0
           M122 187 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0 q10.5 -6.5 21 0 q10.5 6.5 21 0
           M366 146.5 L375 153 L366 159.5 M366 163.5 L375 170 L366 176.5 M366 180.5 L375 187 L366 193.5"
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== icIons: ion pairs form and drift (fade 1.8) ===== -->
  <g id="icIons" opacity="0">
    <!-- ionization sparkles -->
    <g stroke="#eaf6ff" stroke-width="1.2" stroke-linecap="round" opacity=".85">
      <path d="M201.5 166.5 L208.5 173.5 M201.5 173.5 L208.5 166.5"/>
      <path d="M246.5 149.5 L253.5 156.5 M246.5 156.5 L253.5 149.5"/>
      <path d="M228.5 183.5 L235.5 190.5 M228.5 190.5 L235.5 183.5"/>
      <path d="M296.5 166.5 L303.5 173.5 M296.5 173.5 L303.5 166.5"/>
      <path d="M331.5 149.5 L338.5 156.5 M331.5 156.5 L338.5 149.5"/>
      <path d="M314.5 183.5 L321.5 190.5 M314.5 190.5 L321.5 183.5"/>
    </g>
    <!-- electrons (drift UP to + plate) -->
    <g>
      <g fill="#5fe0ff" filter="url(#icGlowS)">
        <circle cx="197" cy="154" r="3"/><circle cx="243" cy="141" r="3"/><circle cx="225" cy="174" r="3"/>
        <circle cx="293" cy="155" r="3"/><circle cx="328" cy="140" r="3"/><circle cx="311" cy="174" r="3"/>
      </g>
      <g stroke="#06233f" stroke-width="1.2" stroke-linecap="round">
        <path d="M195.4 154 H198.6 M241.4 141 H244.6 M223.4 174 H226.6 M291.4 155 H294.6 M326.4 140 H329.6 M309.4 174 H312.6"/>
      </g>
      <g stroke="#5fe0ff" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".8">
        <path d="M197 147 V136 M194 139 L197 135 L200 139"/>
        <path d="M243 135 V128.5 M240 132 L243 128 L246 132"/>
        <path d="M225 167 V156 M222 159 L225 155 L228 159"/>
        <path d="M293 148 V137 M290 140 L293 136 L296 140"/>
        <path d="M328 134 V128 M325 131.5 L328 127.5 L331 131.5"/>
        <path d="M311 167 V156 M308 159 L311 155 L314 159"/>
      </g>
    </g>
    <!-- positive ions (drift DOWN to - plate) -->
    <g>
      <g fill="rgba(255,194,75,.18)" stroke="#ffc24b" stroke-width="1.4">
        <circle cx="213" cy="184" r="4.5"/><circle cx="258" cy="167" r="4.5"/><circle cx="240" cy="201" r="4.5"/>
        <circle cx="308" cy="185" r="4.5"/><circle cx="343" cy="166" r="4.5"/><circle cx="326" cy="201" r="4.5"/>
      </g>
      <g stroke="#ffc24b" stroke-width="1.2" stroke-linecap="round">
        <path d="M210.8 184 H215.2 M213 181.8 V186.2"/>
        <path d="M255.8 167 H260.2 M258 164.8 V169.2"/>
        <path d="M237.8 201 H242.2 M240 198.8 V203.2"/>
        <path d="M305.8 185 H310.2 M308 182.8 V187.2"/>
        <path d="M340.8 166 H345.2 M343 163.8 V168.2"/>
        <path d="M323.8 201 H328.2 M326 198.8 V203.2"/>
      </g>
      <g stroke="#ffc24b" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".8">
        <path d="M213 191 V202 M210 199 L213 203 L216 199"/>
        <path d="M258 174 V185 M255 182 L258 186 L261 182"/>
        <path d="M240 208 V212.5 M237 209.5 L240 213.5 L243 209.5"/>
        <path d="M308 192 V203 M305 200 L308 204 L311 200"/>
        <path d="M343 173 V184 M340 181 L343 185 L346 181"/>
        <path d="M326 208 V212.5 M323 209.5 L326 213.5 L329 209.5"/>
      </g>
    </g>
    <!-- tiny species labels -->
    <text x="189" y="150" text-anchor="end" font-size="9" fill="#5fe0ff">e&#8315;</text>
    <text x="221" y="188" font-size="9" fill="#ffc24b">ION+</text>
  </g>

  <!-- ===== icCharge: collected charge lights the circuit (fade 4.0) ===== -->
  <g id="icCharge" opacity="0">
    <rect x="162" y="113" width="212" height="15" rx="3" fill="#5fe0ff" opacity=".3" filter="url(#icBlur4)"/>
    <rect x="162" y="212" width="212" height="15" rx="3" fill="#5fe0ff" opacity=".3" filter="url(#icBlur4)"/>
    <rect x="162" y="116" width="212" height="9" rx="2" fill="none" stroke="#eaf6ff" stroke-width="1.4" opacity=".9"/>
    <rect x="162" y="215" width="212" height="9" rx="2" fill="none" stroke="#eaf6ff" stroke-width="1.4" opacity=".9"/>
    <path d="M396 120.5 H436 M396 219.5 H436" stroke="#5fe0ff" stroke-width="2.2" fill="none" filter="url(#icGlowS)"/>
    <g fill="#eaf6ff" filter="url(#icGlowS)">
      <circle cx="406" cy="120.5" r="2"/><circle cx="424" cy="120.5" r="2"/>
      <circle cx="406" cy="219.5" r="2"/><circle cx="424" cy="219.5" r="2"/>
    </g>
    <circle cx="436" cy="120.5" r="3" fill="#5fe0ff" filter="url(#icGlowS)"/>
    <circle cx="436" cy="219.5" r="3" fill="#5fe0ff" filter="url(#icGlowS)"/>
    <!-- C/KG chip lit -->
    <rect x="458" y="130" width="106" height="34" rx="8" fill="rgba(95,224,255,.12)" stroke="#5fe0ff" stroke-width="1.6" filter="url(#icGlowS)"/>
    <text x="511" y="153.5" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="2" fill="#eaf6ff" filter="url(#icGlowS)">C/KG</text>
    <!-- 1 kg bracket emphasis -->
    <path d="M150 252 V260 H390 V252 M270 260 V266" fill="none" stroke="#eaf6ff" stroke-width="1.8" filter="url(#icGlowS)"/>
    <text x="270" y="281" text-anchor="middle" font-size="12" letter-spacing="2" fill="#eaf6ff" filter="url(#icGlowS)">1 KG DRY AIR</text>
  </g>

  <!-- ===== icRoentgen: R badge by the dial (fade 6.8) ===== -->
  <g id="icRoentgen" opacity="0">
    <circle cx="552" cy="188" r="12" fill="rgba(255,194,75,.15)" stroke="#ffc24b" stroke-width="1.6" filter="url(#icGlowS)"/>
    <text x="552" y="192.5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffc24b">R</text>
    <text x="486" y="234" text-anchor="middle" font-size="10" letter-spacing="1" fill="#ffc24b" filter="url(#icGlowS)">mR/h</text>
  </g>
  <circle id="icRoentgenPing" cx="552" cy="188" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#icGlowS)"/>
</svg>
