<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="blsGlowR" filterUnits="userSpaceOnUse" x="106" y="67" width="456" height="131">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blsGlowL" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blsSkinG" x1="0" y1="103" x2="0" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a7fb0"/><stop offset="1" stop-color="#27517e"/>
    </linearGradient>
    <linearGradient id="blsSteelG" x1="0" y1="146" x2="0" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#244e7c"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="blsProbeG" x1="0" y1="70" x2="0" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5180"/><stop offset="1" stop-color="#122c4e"/>
    </linearGradient>
    <linearGradient id="blsBeamG" x1="0" y1="110" x2="0" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".32"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="blsWallFade" x1="0" y1="137" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fb6e0" stop-opacity=".6"/><stop offset=".72" stop-color="#8fb6e0" stop-opacity=".34"/><stop offset="1" stop-color="#8fb6e0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== DOUBLER (thick lower sheet, metal-to-metal zone) ===== -->
  <rect x="88" y="146" width="268" height="90" fill="url(#blsSteelG)"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".14">
    <line x1="92" y1="168" x2="352" y2="168"/>
    <line x1="92" y1="190" x2="352" y2="190"/>
    <line x1="92" y1="212" x2="352" y2="212"/>
  </g>
  <line x1="88" y1="236" x2="356" y2="236" stroke="#8fb6e0" stroke-width="1.5"/>

  <!-- ===== ADHESIVE BONDLINE (left zone, dark warm layer) ===== -->
  <rect x="88" y="130" width="268" height="16" fill="#2a170a"/>
  <rect x="88" y="130" width="268" height="16" fill="#ff9b4b" opacity=".18"/>
  <line x1="88" y1="130" x2="356" y2="130" stroke="#ff9b4b" stroke-width="1" opacity=".6"/>
  <line x1="88" y1="146" x2="356" y2="146" stroke="#ff9b4b" stroke-width="1" opacity=".6"/>

  <!-- ===== ADHESIVE FILM over core (right zone) ===== -->
  <rect x="356" y="130" width="196" height="7" fill="#2a170a"/>
  <rect x="356" y="130" width="196" height="7" fill="#ff9b4b" opacity=".18"/>
  <line x1="356" y1="130" x2="552" y2="130" stroke="#ff9b4b" stroke-width="1" opacity=".6"/>
  <line x1="356" y1="137" x2="552" y2="137" stroke="#ff9b4b" stroke-width="1" opacity=".6"/>

  <!-- ===== HONEYCOMB CORE: cell walls + adhesive fillets ===== -->
  <g stroke="url(#blsWallFade)" stroke-width="1.6" fill="none">
    <line x1="364" y1="137" x2="364" y2="300"/>
    <line x1="400" y1="137" x2="400" y2="300"/>
    <line x1="436" y1="137" x2="436" y2="300"/>
    <line x1="472" y1="137" x2="472" y2="300"/>
    <line x1="508" y1="137" x2="508" y2="300"/>
    <line x1="544" y1="137" x2="544" y2="300"/>
  </g>
  <!-- intact fillets (meniscus each side of wall) -->
  <g fill="#ff9b4b" opacity=".5">
    <path d="M356 137 Q361.8 137.8 361.8 145 L366.2 145 Q366.2 137.8 372 137 Z"/>
    <path d="M392 137 Q397.8 137.8 397.8 145 L402.2 145 Q402.2 137.8 408 137 Z"/>
    <path d="M500 137 Q505.8 137.8 505.8 145 L510.2 145 Q510.2 137.8 516 137 Z"/>
    <path d="M536 137 Q541.8 137.8 541.8 145 L546.2 145 Q546.2 137.8 552 137 Z"/>
  </g>
  <!-- torn fillet remnants under the separation -->
  <g fill="#ff9b4b" opacity=".32">
    <path d="M430 137 Q433.9 137.5 433.9 142 L438.1 142 Q438.1 137.5 442 137 Z"/>
    <path d="M466 137 Q469.9 137.5 469.9 142 L474.1 142 Q474.1 137.5 478 137 Z"/>
  </g>
  <!-- hex cell watermark -->
  <g stroke="#5fe0ff" stroke-width="1" opacity=".16" fill="none">
    <path d="M418 226 L427.5 231.5 L427.5 242.5 L418 248 L408.5 242.5 L408.5 231.5 Z"/>
    <path d="M454 240 L463.5 245.5 L463.5 256.5 L454 262 L444.5 256.5 L444.5 245.5 Z"/>
    <path d="M490 226 L499.5 231.5 L499.5 242.5 L490 248 L480.5 242.5 L480.5 231.5 Z"/>
  </g>

  <!-- ===== CORE SEP gap (skin lifted off fillet line) — dim by default ===== -->
  <path d="M414 130 C430 130 440 123.5 460 123.5 C480 123.5 490 130 506 130 Z" fill="#08152b"/>
  <path d="M414 130 C430 130 440 123.5 460 123.5 C480 123.5 490 130 506 130" fill="none" stroke="#ff6b6b" stroke-width="1.1" opacity=".4"/>

  <!-- ===== FACE SKIN (continuous, bows up over the separation) ===== -->
  <path d="M88 110 H414 C430 110 440 103.5 460 103.5 C480 103.5 490 110 506 110 H552 V130 H506 C490 130 480 123.5 460 123.5 C440 123.5 430 130 414 130 H88 Z" fill="url(#blsSkinG)"/>
  <line x1="94" y1="119.5" x2="350" y2="119.5" stroke="#8fb6e0" stroke-width="1" opacity=".15"/>
  <path d="M88 110 H414 C430 110 440 103.5 460 103.5 C480 103.5 490 110 506 110 H552" fill="none" stroke="#8fb6e0" stroke-width="2"/>

  <!-- section end edges -->
  <line x1="88" y1="110" x2="88" y2="236" stroke="#8fb6e0" stroke-width="1.2" opacity=".5"/>
  <line x1="356" y1="130" x2="356" y2="236" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
  <line x1="552" y1="110" x2="552" y2="137" stroke="#8fb6e0" stroke-width="1.2" opacity=".5"/>

  <!-- ===== DIM DEFECTS (left zone) ===== -->
  <!-- disbond: hairline gap at skin-adhesive interface -->
  <rect x="120" y="128.6" width="88" height="2.8" rx="1.4" fill="#08152b"/>
  <line x1="120" y1="130" x2="208" y2="130" stroke="#ff6b6b" stroke-width="1.1" opacity=".4"/>
  <!-- void: lens pocket inside adhesive -->
  <path d="M250 138 Q280 130.8 310 138 Q280 145.2 250 138 Z" fill="#08152b"/>
  <path d="M250 138 Q280 130.8 310 138 Q280 145.2 250 138 Z" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".36"/>

  <!-- ===== DEPTH GUIDES: flat, parallel, known depth ===== -->
  <g id="blsDepthTicks" opacity="0">
    <g stroke="#5fe0ff" stroke-width="1" opacity=".5" stroke-dasharray="5 5" fill="none">
      <path d="M96 130 H116"/><path d="M212 130 H348"/>
      <path d="M96 138 H246"/><path d="M314 138 H348"/>
      <path d="M364 130 H410"/><path d="M510 130 H544"/>
    </g>
    <g stroke="#9fe6ff" stroke-width="1.2" fill="none" opacity=".9">
      <path d="M214.5 111 H221.5 M218 111 V128 M218 129 l-3 -5 M218 129 l3 -5"/>
      <path d="M316.5 111 H323.5 M320 111 V136 M320 137 l-3 -5 M320 137 l3 -5"/>
      <path d="M524.5 111 H531.5 M528 111 V128 M528 129 l-3 -5 M528 129 l3 -5"/>
    </g>
    <g font-size="11" fill="#9fe6ff" opacity=".85">
      <text x="224" y="123">1.0</text>
      <text x="326" y="130">1.2</text>
      <text x="534" y="123">1.0</text>
    </g>
  </g>

  <!-- ===== DEFECTS BRIGHTEN, LEFT TO RIGHT ===== -->
  <g id="blsFlaws" opacity="0">
    <g id="blsFlawDisbond" opacity="0">
      <line x1="120" y1="130" x2="208" y2="130" stroke="#ff6b6b" stroke-width="2.4" filter="url(#blsGlowL)" opacity=".95"/>
      <path d="M126 133 L118 258" stroke="#ff6b6b" stroke-width="1" opacity=".5" fill="none"/>
      <text x="118" y="272" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity=".92">DISBOND</text>
    </g>
    <g id="blsFlawVoid" opacity="0">
      <path d="M250 138 Q280 130.8 310 138 Q280 145.2 250 138 Z" fill="#ffc24b" opacity=".15"/>
      <path d="M250 138 Q280 130.8 310 138 Q280 145.2 250 138 Z" fill="none" stroke="#ffc24b" stroke-width="1.7" filter="url(#blsGlowR)" opacity=".95"/>
      <path d="M288 144 L299 258" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
      <text x="300" y="272" text-anchor="middle" font-size="12" fill="#ffc24b" opacity=".92">VOID</text>
    </g>
    <g id="blsFlawCore" opacity="0">
      <path d="M414 130 C430 130 440 123.5 460 123.5 C480 123.5 490 130 506 130" fill="none" stroke="#ff6b6b" stroke-width="2" filter="url(#blsGlowR)" opacity=".95"/>
      <path d="M432 131.5 l3 4.5 l3 -4.5 M468 131.5 l3 4.5 l3 -4.5" stroke="#ff6b6b" stroke-width="1.3" fill="none" opacity=".8"/>
      <path d="M492 126 L504 94" stroke="#ff6b6b" stroke-width="1" opacity=".5" fill="none"/>
      <text x="506" y="88" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity=".92">CORE SEP</text>
    </g>
  </g>

  <!-- ===== LAYER LABELS ===== -->
  <g id="blsStack" opacity="0">
    <g font-size="12" fill="#9fe6ff" text-anchor="end">
      <text x="79" y="124">SKIN ≈1mm</text>
      <text x="79" y="142">ADHESIVE</text>
      <text x="79" y="195">DOUBLER</text>
    </g>
    <text x="556" y="214" font-size="12" fill="#9fe6ff">CORE</text>
    <g stroke="#5fe0ff" stroke-width="1" opacity=".5">
      <line x1="82" y1="120" x2="92" y2="120"/>
      <line x1="82" y1="138" x2="92" y2="138"/>
      <line x1="82" y1="191" x2="92" y2="191"/>
      <line x1="553" y1="210" x2="545" y2="210"/>
    </g>
  </g>

  <!-- ===== 0° STRAIGHT-BEAM PROBE + BEAM ===== -->
  <g id="blsProbe" opacity="0">
    <g id="blsBeamEnv" opacity="0">
      <rect x="154" y="110" width="28" height="122" fill="url(#blsBeamG)"/>
      <line x1="154" y1="110" x2="154" y2="232" stroke="#5fe0ff" stroke-width="1" opacity=".3"/>
      <line x1="182" y1="110" x2="182" y2="232" stroke="#5fe0ff" stroke-width="1" opacity=".3"/>
    </g>
    <path id="blsBeamLine" d="M168 111 V229" fill="none" stroke="#5fe0ff" stroke-width="2.4" filter="url(#blsGlowL)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <g id="blsHit" opacity="0">
      <line x1="153" y1="128.2" x2="183" y2="128.2" stroke="#5fe0ff" stroke-width="3" filter="url(#blsGlowL)" opacity=".95"/>
      <path d="M161 128.2 V121.2 H168" fill="none" stroke="#9fe6ff" stroke-width="1.2" opacity=".9"/>
      <path d="M178 126.5 V116.5 M178 116.5 l-3.2 5.4 M178 116.5 l3.2 5.4" stroke="#9fe6ff" stroke-width="1.4" fill="none" opacity=".9"/>
      <path d="M168 229 l-4.5 -7.5 M168 229 l4.5 -7.5" stroke="#5fe0ff" stroke-width="2" fill="none" opacity=".9"/>
    </g>
    <rect x="146" y="70" width="44" height="40" rx="4" fill="url(#blsProbeG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="161" y="57" width="14" height="14" rx="2" fill="#122c4e" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M168 57 C168 44 182 39 196 35" stroke="#8fb6e0" stroke-width="1.5" fill="none" opacity=".8"/>
    <line x1="147" y1="108.5" x2="189" y2="108.5" stroke="#5fe0ff" stroke-width="2" opacity=".85" filter="url(#blsGlowL)"/>
    <text x="168" y="95" text-anchor="middle" font-size="12" fill="#9fe6ff">0°</text>
  </g>
  <circle id="blsPing" cx="168" cy="130" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#blsGlowR)"/>
</svg>
