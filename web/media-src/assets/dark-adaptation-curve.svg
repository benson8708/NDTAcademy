<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="dacglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dacglowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dacsclera" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#1b3e66"/>
      <stop offset="1" stop-color="#0e2848"/>
    </radialGradient>
    <radialGradient id="daciris" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#3f9bff"/>
      <stop offset=".55" stop-color="#1E66F5"/>
      <stop offset="1" stop-color="#0e2848"/>
    </radialGradient>
    <linearGradient id="daccurveStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7fd8ff"/>
      <stop offset="1" stop-color="#5fe0ff"/>
    </linearGradient>
    <linearGradient id="dacfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===================== LEFT: EYE + MECHANISM CALLOUTS ===================== -->
  <g id="dacEye" opacity="0">
    <!-- eye almond -->
    <path d="M30 96 Q78 64 126 96 Q78 128 30 96 Z" fill="url(#dacsclera)" stroke="#8fb6e0" stroke-width="1.8"/>
    <!-- iris + pupil -->
    <circle cx="78" cy="96" r="22" fill="url(#daciris)" stroke="#7fd8ff" stroke-width="1.2"/>
    <circle cx="78" cy="96" r="10.5" fill="#061427"/>
    <circle cx="72.5" cy="90.5" r="3" fill="#9fe6ff" opacity=".85"/>
    <!-- iris striations -->
    <g stroke="#7fd8ff" stroke-width=".8" opacity=".4">
      <line x1="78" y1="78" x2="78" y2="85.5"/>
      <line x1="96" y1="96" x2="88.5" y2="96"/>
      <line x1="78" y1="114" x2="78" y2="106.5"/>
      <line x1="60" y1="96" x2="67.5" y2="96"/>
      <line x1="90" y1="84" x2="85" y2="89"/>
      <line x1="66" y1="84" x2="71" y2="89"/>
      <line x1="90" y1="108" x2="85" y2="103"/>
      <line x1="66" y1="108" x2="71" y2="103"/>
    </g>
    <text x="78" y="142" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".85">HUMAN EYE</text>

    <!-- ACCOMMODATION stub (lens reshaping / near-far focus) -->
    <g>
      <path d="M118 84 L150 60" stroke="#7fd8ff" stroke-width="1" opacity=".5" fill="none"/>
      <!-- biconvex lens icon -->
      <path d="M150 50 Q160 60 150 70 Q140 60 150 50 Z" fill="#1E66F5" stroke="#7fd8ff" stroke-width="1.2"/>
      <!-- near/far focus rays converging -->
      <g stroke="#5fe0ff" stroke-width="1" opacity=".7">
        <line x1="138" y1="54" x2="150" y2="58"/>
        <line x1="138" y1="66" x2="150" y2="62"/>
        <line x1="150" y1="58" x2="166" y2="60"/>
        <line x1="150" y1="62" x2="166" y2="60"/>
      </g>
      <text x="168" y="56" font-size="10.5" fill="#9fe6ff" opacity=".9">ACCOMMODATION</text>
      <text x="168" y="68" font-size="9.5" fill="#7fd8ff" opacity=".6">lens · near/far</text>
    </g>

    <!-- ADAPTATION stub (retinal sensitivity to brightness) -->
    <g>
      <path d="M118 110 L150 134" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
      <!-- brightness/sensitivity icon: sun-to-dim transition -->
      <circle cx="152" cy="134" r="6.5" fill="none" stroke="#ffc24b" stroke-width="1.4"/>
      <circle cx="152" cy="134" r="2.6" fill="#ffc24b"/>
      <g stroke="#ffc24b" stroke-width="1.2" opacity=".8">
        <line x1="152" y1="123" x2="152" y2="126.5"/>
        <line x1="163" y1="134" x2="159.5" y2="134"/>
        <line x1="152" y1="145" x2="152" y2="141.5"/>
        <line x1="160" y1="126" x2="157.5" y2="128.5"/>
      </g>
      <text x="168" y="130" font-size="10.5" fill="#5fe0ff" opacity=".95">ADAPTATION</text>
      <text x="168" y="142" font-size="9.5" fill="#7fd8ff" opacity=".6">retina · brightness</text>
    </g>
  </g>

  <!-- ===================== RIGHT: DARK-ADAPTATION GRAPH ===================== -->
  <!-- Graph plot frame: x 250..560, y 60(top/high)..280(bottom/low) -->

  <!-- ===== ALWAYS-ON STAGE: faint plot-frame ghost (grounds the empty default) ===== -->
  <g stroke="#8fb6e0" stroke-width="1.5" fill="none" opacity=".12">
    <path d="M280 60 V280 H575"/>
  </g>

  <!-- ===== AXES + GRID + TICK LABELS ===== -->
  <g id="dacAxes" opacity="0">
    <!-- faint grid -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".14">
      <line x1="280" y1="100" x2="575" y2="100"/>
      <line x1="280" y1="140" x2="575" y2="140"/>
      <line x1="280" y1="180" x2="575" y2="180"/>
      <line x1="280" y1="220" x2="575" y2="220"/>
      <line x1="328" y1="60" x2="328" y2="280"/>
      <line x1="425" y1="60" x2="425" y2="280"/>
    </g>
    <!-- axis lines -->
    <g stroke="#8fb6e0" stroke-width="2" fill="none">
      <path d="M280 60 V280"/>
      <path d="M280 280 H575"/>
    </g>
    <!-- y-axis arrow (sensitivity increases up) -->
    <path d="M280 60 L276 70 L284 70 Z" fill="#8fb6e0"/>
    <!-- x ticks at 0,5,15,30 -->
    <g stroke="#8fb6e0" stroke-width="1.5">
      <line x1="280" y1="280" x2="280" y2="285"/>
      <line x1="328" y1="280" x2="328" y2="285"/>
      <line x1="425" y1="280" x2="425" y2="285"/>
      <line x1="570" y1="280" x2="570" y2="285"/>
    </g>
    <g font-size="11" fill="#9fe6ff" text-anchor="middle" opacity=".9">
      <text x="280" y="298">0</text>
      <text x="328" y="298">5</text>
      <text x="425" y="298">15</text>
      <text x="570" y="298">30</text>
    </g>
    <!-- x-axis title -->
    <text x="427" y="316" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".8">TIME IN DARK (MINUTES)</text>
    <!-- y-axis title (rotated) -->
    <text x="0" y="0" transform="translate(266,206) rotate(-90)" text-anchor="middle" font-size="10.5" fill="#9fe6ff" opacity=".8">VISUAL SENSITIVITY</text>
  </g>

  <!-- ===== CURVE FILL (area under) — fades with the curve ===== -->
  <path id="dacCurveFill" opacity="0" fill="url(#dacfill)" stroke="none"
        d="M280 268 C298 196 316 150 352 124 C392 96 476 86 570 84 L570 280 L280 280 Z"/>

  <!-- ===== DARK-ADAPTATION CURVE (draw-on, steep early then flatten) ===== -->
  <path id="dacCurve" d="M280 268 C298 196 316 150 352 124 C392 96 476 86 570 84"
        fill="none" stroke="url(#daccurveStroke)" stroke-width="3" stroke-linecap="round"
        filter="url(#dacglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== ASYMPTOTE + 30-MIN GUIDE (revealed last) ===== -->
  <g id="dacAsymptote" opacity="0">
    <!-- horizontal full-sensitivity dashed line at curve plateau (y=84) -->
    <line x1="280" y1="84" x2="570" y2="84" stroke="#5fe0ff" stroke-width="1.4" stroke-dasharray="6 5" opacity=".85"/>
    <text x="286" y="78" font-size="11" fill="#9fe6ff" opacity=".95">FULL SENSITIVITY</text>
    <!-- vertical 30-min guide -->
    <line x1="570" y1="84" x2="570" y2="280" stroke="#7fd8ff" stroke-width="1.2" stroke-dasharray="5 4" opacity=".7"/>
    <!-- intersection marker -->
    <circle cx="570" cy="84" r="4.5" fill="none" stroke="#5fe0ff" stroke-width="1.6" filter="url(#dacglowR)"/>
    <circle cx="570" cy="84" r="1.8" fill="#5fe0ff"/>
    <text x="564" y="270" text-anchor="end" font-size="11" fill="#7fd8ff" opacity=".85">~30 MIN</text>
  </g>

  <!-- ===== TITLE STRIP ===== -->
  <text x="30" y="30" font-size="13" fill="#9fe6ff" opacity=".85">DARK ADAPTATION — RETINAL SENSITIVITY vs. TIME</text>
</svg>
