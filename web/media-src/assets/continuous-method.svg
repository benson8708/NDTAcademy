<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cmglowC" filterUnits="userSpaceOnUse" x="-60" y="-60" width="616" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cmglowR" filterUnits="userSpaceOnUse" x="211" y="-21" width="352" height="382">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cmsteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#30608f"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="cmscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===== STATIC: caption + time axis + CURRENT ON window frame ===== -->
  <text x="36" y="24" font-size="11" fill="#9fe6ff" opacity=".65">CONTINUOUS METHOD // TIMING</text>
  <line x1="90" y1="56" x2="552" y2="56" stroke="#8fb6e0" stroke-width="1.5" opacity=".5"/>
  <path d="M552 50 L566 56 L552 62 Z" fill="#8fb6e0" opacity=".5"/>
  <text x="193" y="48" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".4">OFF</text>
  <text x="532" y="48" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".4">OFF</text>
  <!-- window band (faint static; brightens on reveal) -->
  <rect x="298" y="36" width="208" height="268" fill="#5fe0ff" opacity=".05"/>
  <line x1="298" y1="36" x2="298" y2="304" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 5" opacity=".3"/>
  <line x1="506" y1="36" x2="506" y2="304" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 5" opacity=".3"/>
  <line x1="298" y1="48" x2="298" y2="64" stroke="#5fe0ff" stroke-width="1.5" opacity=".6"/>
  <line x1="506" y1="48" x2="506" y2="64" stroke="#5fe0ff" stroke-width="1.5" opacity=".6"/>
  <text x="402" y="30" text-anchor="middle" font-size="12" letter-spacing="2" fill="#9fe6ff" opacity=".9">CURRENT ON</text>

  <!-- lane separator + labels -->
  <line x1="36" y1="192" x2="566" y2="192" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="2 6" opacity=".15"/>
  <text x="36" y="116" font-size="13" fill="#9fe6ff">DRY</text>
  <text x="36" y="131" font-size="11" fill="#9fe6ff" opacity=".55">POWDER</text>
  <text x="36" y="236" font-size="13" fill="#9fe6ff">WET</text>
  <text x="36" y="251" font-size="11" fill="#9fe6ff" opacity=".55">BATH</text>

  <!-- DRY pre-window rule: power first -->
  <text x="118" y="128" font-size="11" fill="#9fe6ff" opacity=".45">POWER ON FIRST</text>
  <line x1="118" y1="138" x2="280" y2="138" stroke="#8fb6e0" stroke-width="1.2" stroke-dasharray="4 6" opacity=".3"/>
  <path d="M280 133 L292 138 L280 143 Z" fill="#8fb6e0" opacity=".35"/>

  <!-- ===== DRY LANE: part bar + crack + AC yoke + duster bulb (all inside window) ===== -->
  <rect x="332" y="148" width="136" height="26" rx="2" fill="url(#cmsteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="338" y1="156" x2="462" y2="156" stroke="#8fb6e0" stroke-width="1" opacity=".18"/>
  <line x1="338" y1="166" x2="462" y2="166" stroke="#8fb6e0" stroke-width="1" opacity=".12"/>
  <path d="M396 148 l-2.5 6 l4 4.5 l-3.5 6 l1.5 4.5" fill="none" stroke="#08152b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- yoke -->
  <path d="M344 148 V110 Q344 86 368 86 H432 Q456 86 456 110 V148 H434 V116 Q434 108 426 108 H374 Q366 108 366 116 V148 Z" fill="url(#cmsteel)" stroke="#8fb6e0" stroke-width="1.5" stroke-linejoin="round"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".35">
    <line x1="382" y1="87" x2="382" y2="108"/><line x1="388" y1="86" x2="388" y2="108"/>
    <line x1="394" y1="86" x2="394" y2="108"/><line x1="400" y1="86" x2="400" y2="108"/>
    <line x1="406" y1="86" x2="406" y2="108"/><line x1="412" y1="86" x2="412" y2="108"/>
    <line x1="418" y1="87" x2="418" y2="108"/>
  </g>
  <path d="M400 86 V80" stroke="#8fb6e0" stroke-width="2" opacity=".6"/>
  <rect x="386" y="66" width="28" height="14" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
  <!-- yoke pole feet on part -->
  <rect x="345" y="143.5" width="20" height="5" rx="1" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
  <rect x="435" y="143.5" width="20" height="5" rx="1" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
  <!-- duster bulb (pear squeeze bulb + tapered nozzle) -->
  <ellipse cx="301" cy="91" rx="10.5" ry="8" transform="rotate(-35 301 91)" fill="url(#cmsteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <path d="M295 84 q5 -2 8 1" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".5"/>
  <path d="M307 98 L324 108 L320 114 L304 104 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M309 101.5 L319 107.5" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>

  <!-- ===== WET LANE: bench part between contact pads + flood hose ===== -->
  <path d="M96 221 C 148 209 202 213 244 223" fill="none" stroke="#8fb6e0" stroke-width="9" stroke-linecap="round" opacity=".85"/>
  <path d="M96 221 C 148 209 202 213 244 223" fill="none" stroke="#14304f" stroke-width="6" stroke-linecap="round"/>
  <path d="M120 211 v9 M150 208.5 v9 M180 208.5 v9 M210 211.5 v9" stroke="#8fb6e0" stroke-width="1" opacity=".35" fill="none"/>
  <path d="M244 218 L270 226 L267 236 L242 228 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2" stroke-linejoin="round"/>
  <rect x="320" y="240" width="12" height="38" rx="2" fill="#0e2848" stroke="#ff9b4b" stroke-width="1.5"/>
  <rect x="468" y="240" width="12" height="38" rx="2" fill="#0e2848" stroke="#ff9b4b" stroke-width="1.5"/>
  <path d="M326 278 v12 M474 278 v12" stroke="#ff9b4b" stroke-width="1.5" opacity=".35" fill="none"/>
  <rect x="332" y="246" width="136" height="26" rx="2" fill="url(#cmsteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="338" y1="254" x2="462" y2="254" stroke="#8fb6e0" stroke-width="1" opacity=".18"/>
  <line x1="338" y1="264" x2="462" y2="264" stroke="#8fb6e0" stroke-width="1" opacity=".12"/>
  <path d="M396 246 l-2.5 6 l4 4.5 l-3.5 6 l1.5 4.5" fill="none" stroke="#08152b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="310" y1="292" x2="498" y2="292" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="2 4" opacity=".18"/>

  <!-- ===== REVEAL: window glow (band brightens, yoke energized) ===== -->
  <g id="cmBandGlow" opacity="0">
    <rect x="298" y="36" width="208" height="268" fill="#5fe0ff" opacity=".07"/>
    <line x1="298" y1="36" x2="298" y2="304" stroke="#5fe0ff" stroke-width="1.2" opacity=".5" filter="url(#cmglowR)"/>
    <line x1="506" y1="36" x2="506" y2="304" stroke="#5fe0ff" stroke-width="1.2" opacity=".5" filter="url(#cmglowR)"/>
    <path d="M404 90 l-7 10 h6 l-5 9" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linejoin="round" filter="url(#cmglowR)"/>
  </g>

  <!-- ===== REVEAL: half-wave pulse train draws across the ON window ===== -->
  <path id="cmWindow" d="M300 56 q8 -18 16 0 h10 q8 -18 16 0 h10 q8 -18 16 0 h10 q8 -18 16 0 h10 q8 -18 16 0 h10 q8 -18 16 0 h10 q8 -18 16 0 h22" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" filter="url(#cmglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL: dry powder cloud ===== -->
  <g id="cmDryCloud" opacity="0">
    <text x="312" y="78" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">DUST</text>
    <ellipse cx="358" cy="128" rx="42" ry="16" fill="#ffc24b" opacity=".08"/>
    <g fill="#ffd27f">
      <circle cx="327" cy="110" r="1.2" opacity=".95"/><circle cx="330" cy="114" r="1.5" opacity=".9"/>
      <circle cx="326" cy="113" r="1.6" opacity=".9"/><circle cx="333" cy="118" r="2" opacity=".75"/>
      <circle cx="341" cy="124" r="1.7" opacity=".85"/><circle cx="349" cy="121" r="1.3" opacity=".6"/>
      <circle cx="352" cy="130" r="2.1" opacity=".8"/><circle cx="361" cy="136" r="1.6" opacity=".7"/>
      <circle cx="369" cy="131" r="1.2" opacity=".55"/><circle cx="372" cy="140" r="1.9" opacity=".8"/>
      <circle cx="382" cy="144" r="1.5" opacity=".7"/><circle cx="388" cy="138" r="1.2" opacity=".5"/>
    </g>
    <g fill="#ffc24b">
      <circle cx="372" cy="146" r="1.4" opacity=".9"/><circle cx="381" cy="145.5" r="1.2" opacity=".8"/>
      <circle cx="389" cy="146" r="1.3" opacity=".85"/><circle cx="406" cy="146" r="1.4" opacity=".9"/>
      <circle cx="414" cy="145.5" r="1.2" opacity=".75"/><circle cx="423" cy="146" r="1.3" opacity=".85"/>
      <circle cx="430" cy="146.5" r="1.1" opacity=".7"/>
    </g>
  </g>

  <!-- ===== REVEAL: dry indication holds at crack ===== -->
  <g id="cmDryInd" opacity="0">
    <path d="M396 147.5 l-2.5 6 l4 4.5 l-3.5 6" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cmglowR)"/>
    <g fill="#ff8585">
      <circle cx="393.5" cy="152" r="1.3"/><circle cx="398" cy="157" r="1.2"/>
      <circle cx="395" cy="162" r="1.1"/><circle cx="398.5" cy="150" r="1"/>
    </g>
    <text x="396" y="186" text-anchor="middle" font-size="11" fill="#ff6b6b" opacity=".9">INDICATION HOLDS</text>
  </g>
  <circle id="cmIndication" cx="396" cy="150" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#cmglowR)"/>

  <!-- ===== REVEAL: gentle air sweep (draws over yoke, lifts excess) ===== -->
  <path id="cmAirSweep" d="M316 132 C 344 122 366 138 396 132 C 426 126 446 136 460 130 l-9 -2 m9 2 l-8 6" fill="none" stroke="#7fd8ff" stroke-width="2" stroke-linecap="round" filter="url(#cmglowR)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <g id="cmAirLbl" opacity="0">
    <text x="312" y="128" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".85">AIR</text>
  </g>
  <g id="cmSweepDust" opacity="0">
    <g fill="#ffc24b">
      <circle cx="468" cy="124" r="1.4" opacity=".7"/><circle cx="476" cy="118" r="1.2" opacity=".55"/>
      <circle cx="484" cy="126" r="1.5" opacity=".6"/><circle cx="492" cy="120" r="1" opacity=".45"/>
    </g>
    <path d="M468 130 l7 -3 M478 126 l7 -3" stroke="#ffc24b" stroke-width="1" opacity=".4" fill="none"/>
  </g>

  <!-- ===== REVEAL: wet flood (before the window) ===== -->
  <g id="cmFlood" opacity="0">
    <text x="118" y="206" font-size="11" fill="#9fe6ff" opacity=".85">FLOOD</text>
    <path d="M268 230 C 296 233 322 238 346 247" fill="none" stroke="#3f9bff" stroke-width="6" stroke-linecap="round" opacity=".7"/>
    <path d="M268 230 C 296 233 322 238 346 247" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" opacity=".85" filter="url(#cmglowR)"/>
    <rect x="333" y="242.5" width="134" height="6" rx="3" fill="#3f9bff" opacity=".5"/>
    <line x1="338" y1="245" x2="460" y2="245" stroke="#7fd8ff" stroke-width="1" opacity=".6"/>
    <path d="M332 248 q-3 6 -2 10 M468 248 q3 6 2 10" stroke="#3f9bff" stroke-width="2" opacity=".5" fill="none"/>
  </g>

  <!-- ===== REVEAL: hose diverts at window edge ===== -->
  <g id="cmDivert" opacity="0">
    <path d="M246 224 C 256 244 250 264 234 278" fill="none" stroke="#8fb6e0" stroke-width="6" stroke-linecap="round" opacity=".22"/>
    <path d="M246 224 C 256 244 250 264 234 278" fill="none" stroke="#8fb6e0" stroke-width="1.2" stroke-dasharray="5 4" opacity=".6"/>
    <path d="M236 274 L222 288 L228 293 L240 281 Z" fill="none" stroke="#8fb6e0" stroke-width="1.2" stroke-dasharray="4 3" opacity=".7" stroke-linejoin="round"/>
    <path d="M272 236 A 34 34 0 0 1 254 266" fill="none" stroke="#ffc24b" stroke-width="1.6"/>
    <path d="M254 266 L263 262 L259 272 Z" fill="#ffc24b"/>
    <text x="214" y="264" text-anchor="end" font-size="11" fill="#ffc24b" opacity=".9">DIVERT</text>
  </g>

  <!-- ===== REVEAL: two shot pulses inside the window ===== -->
  <g id="cmShotBars" opacity="0">
    <rect x="316" y="238" width="166" height="38" rx="4" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".3"/>
    <line x1="318" y1="292" x2="342" y2="292" stroke="#5fe0ff" stroke-width="5" stroke-linecap="round" filter="url(#cmglowC)"/>
    <line x1="356" y1="292" x2="380" y2="292" stroke="#5fe0ff" stroke-width="5" stroke-linecap="round" filter="url(#cmglowC)"/>
    <text x="392" y="296" font-size="11" fill="#9fe6ff" opacity=".85">2 SHOTS ~0.5s</text>
  </g>
  <circle id="cmShot" cx="330" cy="292" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#cmglowR)"/>
  <circle id="cmShot2" cx="368" cy="292" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#cmglowR)"/>

  <!-- ===== REVEAL: wet indication forms as bath drains ===== -->
  <g id="cmWetInd" opacity="0">
    <path d="M396 245.5 l-2.5 6 l4 4.5 l-3.5 6" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cmglowR)"/>
    <g fill="#ff8585">
      <circle cx="393.5" cy="250" r="1.3"/><circle cx="398" cy="255" r="1.2"/><circle cx="395" cy="260" r="1.1"/>
    </g>
    <path d="M340 274 q-1 6 -3 9 M462 274 q2 6 4 9" stroke="#3f9bff" stroke-width="1.5" opacity=".7" fill="none"/>
    <ellipse cx="336" cy="288" rx="1.8" ry="2.4" fill="#3f9bff" opacity=".8"/>
    <ellipse cx="467" cy="288" rx="1.8" ry="2.4" fill="#3f9bff" opacity=".8"/>
    <ellipse cx="420" cy="280" rx="1.5" ry="2" fill="#3f9bff" opacity=".6"/>
  </g>

  <!-- ===== scan group (time cursor) ===== -->
  <g id="cmscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#cmscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#cmglowC)" opacity=".9"/>
  </g>
</svg>
