<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="dfcGlowC" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dfcGlowR" filterUnits="userSpaceOnUse" x="-40" y="-40" width="360" height="220">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dfcSteel" gradientUnits="userSpaceOnUse" x1="0" y1="168" x2="0" y2="300">
      <stop offset="0" stop-color="#39709f"/><stop offset=".38" stop-color="#1d4570"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="dfcVinyl" gradientUnits="userSpaceOnUse" x1="0" y1="118" x2="0" y2="252">
      <stop offset="0" stop-color="#2e5d88"/><stop offset=".5" stop-color="#16355a"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="dfcLead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2eefb"/><stop offset="1" stop-color="#8fb6e0"/>
    </linearGradient>
    <linearGradient id="dfcFilmF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4da4ff"/><stop offset="1" stop-color="#1E66F5"/>
    </linearGradient>
    <linearGradient id="dfcFilmS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b86ff"/><stop offset="1" stop-color="#123a78"/>
    </linearGradient>
    <radialGradient id="dfcHalo" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ff6b6b" stop-opacity=".62"/>
      <stop offset=".55" stop-color="#ff6b6b" stop-opacity=".26"/>
      <stop offset="1" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== SAFELIGHT, upper-left corner (only non-cyan accent, ambient pulse) ===== -->
  <g id="dfcGlow">
    <ellipse cx="74" cy="40" rx="100" ry="66" fill="url(#dfcHalo)" opacity=".7">
      <animate attributeName="opacity" values=".5;.85;.5" dur="3.6s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <line x1="74" y1="8" x2="74" y2="16" stroke="#8fb6e0" stroke-width="2.5"/>
  <rect x="44" y="16" width="60" height="22" rx="5" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
  <rect x="50" y="31" width="48" height="6" rx="2" fill="#ff6b6b" opacity=".85" filter="url(#dfcGlowR)"/>
  <text x="112" y="30" font-size="11" fill="#ff6b6b" opacity=".6" letter-spacing="1">SAFELIGHT</text>

  <!-- ===== BENCH ===== -->
  <rect x="24" y="300" width="552" height="8" fill="#0e2848" opacity=".55"/>
  <line x1="24" y1="300" x2="576" y2="300" stroke="#8fb6e0" stroke-width="1.8" opacity=".5"/>
  <ellipse cx="126" cy="301" rx="90" ry="4" fill="#04101f" opacity=".6"/>
  <ellipse cx="382" cy="301" rx="168" ry="4" fill="#04101f" opacity=".38"/>

  <!-- ===== STEPPED CASTING on bench (heavy boss -> thin web) ===== -->
  <path d="M46 300 L46 174 Q46 168 52 168 L112 168 Q118 168 118 174 L118 222 Q118 228 124 228 L148 228 Q154 228 154 234 L154 266 Q154 272 160 272 L200 272 Q206 272 206 278 L206 300 Z"
        fill="url(#dfcSteel)" stroke="#8fb6e0" stroke-width="1.8" stroke-linejoin="round"/>
  <g stroke="#bcd6f2" stroke-width="1.2" opacity=".4" fill="none">
    <path d="M52 170.8 H112"/>
    <path d="M124 228.8 H148"/>
    <path d="M160 272.8 H200"/>
  </g>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".15">
    <line x1="52" y1="202" x2="113" y2="202"/>
    <line x1="52" y1="252" x2="113" y2="252"/>
    <line x1="160" y1="288" x2="202" y2="288"/>
  </g>

  <!-- casting THICK / THIN highlights (reveal ~1.5s) -->
  <g id="dfcCasting" opacity="0">
    <rect x="48" y="170" width="68" height="128" rx="3" fill="#5fe0ff" opacity=".14"/>
    <rect x="156" y="274" width="48" height="24" rx="3" fill="#5fe0ff" opacity=".26"/>
    <g stroke="#5fe0ff" stroke-width="1.2" opacity=".85" fill="none">
      <path d="M50 158 H114 M50 154 V162 M114 154 V162"/>
      <path d="M158 262 H202 M158 258 V266 M202 258 V266"/>
    </g>
    <text x="82" y="149" text-anchor="middle" font-size="12" fill="#9fe6ff">THICK</text>
    <text x="180" y="253" text-anchor="middle" font-size="12" fill="#9fe6ff">THIN</text>
  </g>
  <circle id="dfcPingThick" cx="82" cy="234" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#dfcGlowC)"/>
  <circle id="dfcPingThin" cx="180" cy="286" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#dfcGlowC)"/>

  <!-- ===== FLEXIBLE CASSETTE, side cutaway (fold left, mouth open right, lip curled up) ===== -->
  <!-- film slot void -->
  <rect x="246" y="182" width="302" height="46" fill="#081830"/>
  <!-- one-piece vinyl envelope: top cover + curled lip, left fold, bottom cover -->
  <path d="M540 118 Q524 148 488 158 L252 158 Q206 158 206 205 Q206 252 252 252 L548 252 L552 248 L552 240 L548 236 L252 236 Q224 236 224 205 Q224 174 252 174 L488 174 Q528 166 551 126 Z"
        fill="url(#dfcVinyl)" stroke="#8fb6e0" stroke-width="1.8" stroke-linejoin="round"/>
  <text x="260" y="170" font-size="11" fill="#9fe6ff" opacity=".6" letter-spacing="1">FLEXIBLE CASSETTE</text>

  <!-- lead screens pressed against cover inner faces -->
  <rect x="250" y="174" width="286" height="8" fill="url(#dfcLead)" opacity=".92" stroke="#cfe4ff" stroke-width=".8"/>
  <rect x="250" y="228" width="286" height="8" fill="url(#dfcLead)" opacity=".92" stroke="#cfe4ff" stroke-width=".8"/>

  <!-- screen labels -->
  <text x="266" y="124" font-size="12" fill="#9fe6ff" opacity=".9">LEAD SCREEN .005 IN</text>
  <path d="M378 129 L390 172" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
  <circle cx="390" cy="175" r="1.8" fill="#5fe0ff" opacity=".85"/>
  <text x="266" y="290" font-size="12" fill="#9fe6ff" opacity=".9">LEAD SCREEN .010 IN</text>
  <path d="M378 281 L390 238" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
  <circle cx="390" cy="235" r="1.8" fill="#5fe0ff" opacity=".85"/>

  <!-- ===== FAST film sliding in (front, reveal ~5.9s) ===== -->
  <g id="dfcFast" opacity="0">
    <path d="M330 186 L510 186 Q533 186 548 175 L575 153 L584 164 L557 186 Q538 201 512 201 L330 201 Q322 193.5 330 186 Z"
          fill="url(#dfcFilmF)" stroke="#7fd8ff" stroke-width="1.5" stroke-linejoin="round"/>
    <g fill="#cfeaff" opacity=".6">
      <circle cx="536" cy="184" r="1.5"/><circle cx="551" cy="172" r="1.5"/><circle cx="564" cy="163" r="1.5"/>
      <circle cx="496" cy="190" r="1.5"/><circle cx="468" cy="194" r="1.5"/>
    </g>
    <text x="420" y="198" font-size="13" font-weight="700" fill="#f2faff" letter-spacing="1.5">FAST</text>
    <g stroke="#5fe0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#dfcGlowC)" opacity=".9">
      <path d="M316 187 L307 193.5 L316 200"/>
      <path d="M302 187 L293 193.5 L302 200"/>
    </g>
  </g>

  <!-- ===== SLOW film sliding in behind it (back, reveal ~7.0s) ===== -->
  <g id="dfcSlow" opacity="0">
    <path d="M392 207 L520 207 Q540 207 552 199 L578 181 L585 192 L559 209 Q545 222 522 222 L392 222 Q384 214.5 392 207 Z"
          fill="url(#dfcFilmS)" stroke="#7fd8ff" stroke-width="1.5" stroke-linejoin="round"/>
    <g fill="#cfeaff" opacity=".5">
      <circle cx="540" cy="203" r=".7"/><circle cx="548" cy="199" r=".7"/><circle cx="557" cy="194" r=".7"/>
      <circle cx="566" cy="188" r=".7"/><circle cx="572" cy="185" r=".7"/><circle cx="532" cy="206" r=".7"/>
      <circle cx="512" cy="210" r=".7"/><circle cx="498" cy="212" r=".7"/><circle cx="484" cy="210" r=".7"/>
    </g>
    <text x="474" y="218" font-size="13" font-weight="700" fill="#f2faff" letter-spacing="1.5">SLOW</text>
    <g stroke="#5fe0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#dfcGlowC)" opacity=".9">
      <path d="M378 208 L369 214.5 L378 221"/>
      <path d="M364 208 L355 214.5 L364 221"/>
    </g>
  </g>
</svg>
