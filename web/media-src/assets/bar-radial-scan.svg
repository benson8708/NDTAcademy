<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="brsglow" filterUnits="userSpaceOnUse" x="107" y="22" width="116" height="306">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="brsglowS" filterUnits="userSpaceOnUse" x="87" y="21" width="450" height="273">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="brssteel" cx="0.38" cy="0.3" r="1.05">
      <stop offset="0" stop-color="#2c5a8a"/>
      <stop offset="0.45" stop-color="#14304f"/>
      <stop offset="1" stop-color="#0a1d36"/>
    </radialGradient>
    <linearGradient id="brsbeamGrad" x1="0" y1="78" x2="0" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#5fe0ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- caption -->
  <text x="14" y="330" font-size="11" fill="#9fe6ff" opacity="0.7" letter-spacing="1">100 MM BAR — END VIEW</text>

  <!-- ===== BAR CROSS-SECTION (end-on), center (165,176) r=98 ===== -->
  <circle cx="165" cy="176" r="98" fill="url(#brssteel)" stroke="#8fb6e0" stroke-width="1.8"/>
  <!-- machining rings on the cut face -->
  <g fill="none" stroke="#8fb6e0">
    <circle cx="165" cy="176" r="82" stroke-width="1" opacity="0.10"/>
    <circle cx="165" cy="176" r="58" stroke-width="1" opacity="0.09"/>
    <circle cx="165" cy="176" r="32" stroke-width="1" opacity="0.08"/>
  </g>
  <!-- faint vertical diameter axis (beam path) -->
  <line x1="165" y1="80" x2="165" y2="272" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="5 6" opacity="0.3"/>

  <!-- ===== BEAM (reveal): wedge from probe face through center to far wall ===== -->
  <g id="brsBeam" opacity="0">
    <path d="M149 77.5 L181 77.5 L189 271 A98 98 0 0 1 141 271 Z" fill="url(#brsbeamGrad)"/>
    <path d="M149 77.5 L141 271" fill="none" stroke="#5fe0ff" stroke-width="1" opacity="0.35"/>
    <path d="M181 77.5 L189 271" fill="none" stroke="#5fe0ff" stroke-width="1" opacity="0.35"/>
    <path d="M141 271 A98 98 0 0 0 189 271" fill="none" stroke="#5fe0ff" stroke-width="1.6" opacity="0.5"/>
  </g>
  <path id="brsBeamLine" d="M165 80 V270" fill="none" stroke="#5fe0ff" stroke-width="2.2" filter="url(#brsglow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== COUPLANT film between shoe and curved surface ===== -->
  <path d="M143 77.2 L187 77.2 L187 80.5 A98 98 0 0 0 143 80.5 Z" fill="#ff9b4b" opacity="0.45"/>
  <path d="M187 80.5 A98 98 0 0 0 143 80.5" fill="none" stroke="#ff9b4b" stroke-width="1.2" opacity="0.9" filter="url(#brsglowS)"/>

  <!-- ===== STRAIGHT-BEAM CONTACT PROBE at top dead center ===== -->
  <g>
    <rect x="141" y="42" width="48" height="30" rx="4" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="147" y="47" width="36" height="11" fill="#0e2848"/>
    <rect x="145" y="63" width="40" height="5" fill="#2b86ff" opacity="0.85" stroke="#7fd8ff" stroke-width="0.8"/>
    <rect x="143" y="72" width="44" height="5.2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="158" y="30" width="14" height="12" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M165 30 C165 17 192 13 218 13" fill="none" stroke="#8fb6e0" stroke-width="1.8" opacity="0.75"/>
  </g>
  <text x="132" y="58" text-anchor="end" font-size="11" fill="#9fe6ff" opacity="0.8">0° PROBE</text>

  <!-- ===== rotation arrow on the rim (bar rotates under probe) ===== -->
  <g stroke="#9fe6ff" fill="none" opacity="0.85">
    <path d="M224.3 81 A112 112 0 0 1 266 128" stroke-width="2"/>
  </g>
  <path d="M271.5 140.5 L270.1 128.4 L259.7 132.9 Z" fill="#9fe6ff" opacity="0.85"/>

  <!-- ===== CENTERLINE REFLECTOR (stringer / pipe thread, end-on) ===== -->
  <circle cx="165" cy="176" r="3.4" fill="#ffc24b" filter="url(#brsglowS)"/>
  <circle cx="165" cy="176" r="1.3" fill="#ffeec2"/>

  <!-- reveal: glow ring + BROADSIDE tag -->
  <g id="brsFlaw" opacity="0">
    <circle cx="165" cy="176" r="10" fill="none" stroke="#ffc24b" stroke-width="1.6" filter="url(#brsglowS)"/>
    <circle cx="165" cy="176" r="16" fill="none" stroke="#ffc24b" stroke-width="1" opacity="0.35"/>
    <path d="M153 164 L143 154" stroke="#ffc24b" stroke-width="1" opacity="0.6" fill="none"/>
    <text x="139" y="150" text-anchor="end" font-size="11.5" fill="#ffc24b">BROADSIDE</text>
  </g>
  <circle id="brsFlawPing" cx="165" cy="176" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#brsglowS)"/>

  <!-- ===== DIAMETER DIMENSION Ø 100 mm ===== -->
  <g>
    <path d="M67 184 V296" stroke="#8fb6e0" stroke-width="1" opacity="0.4" fill="none"/>
    <path d="M263 184 V296" stroke="#8fb6e0" stroke-width="1" opacity="0.4" fill="none"/>
    <path d="M67 290 H128" stroke="#5fe0ff" stroke-width="1.2" fill="none"/>
    <path d="M202 290 H263" stroke="#5fe0ff" stroke-width="1.2" fill="none"/>
    <path d="M67 290 L76 286.8 L76 293.2 Z" fill="#5fe0ff"/>
    <path d="M263 290 L254 286.8 L254 293.2 Z" fill="#5fe0ff"/>
    <text x="165" y="294" text-anchor="middle" font-size="12" fill="#9fe6ff">Ø 100 MM</text>
  </g>

  <!-- ===== MINI A-SCAN STRIP ===== -->
  <rect x="348" y="86" width="236" height="186" rx="10" fill="#0e2848" opacity="0.55"/>
  <rect x="348" y="86" width="236" height="186" rx="10" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity="0.85"/>
  <text x="364" y="108" font-size="11.5" fill="#9fe6ff" opacity="0.85" letter-spacing="1">A-SCAN</text>

  <!-- grid -->
  <g stroke="#8fb6e0" fill="none">
    <path d="M380 122 V238" stroke-width="1" stroke-dasharray="3 4" opacity="0.14"/>
    <path d="M470 122 V238" stroke-width="1" stroke-dasharray="3 4" opacity="0.14"/>
    <path d="M560 122 V238" stroke-width="1" stroke-dasharray="3 4" opacity="0.14"/>
    <path d="M368 162 H572" stroke-width="1" opacity="0.08"/>
    <path d="M368 200 H572" stroke-width="1" opacity="0.08"/>
  </g>

  <!-- baseline + ticks + labels -->
  <line x1="368" y1="238" x2="572" y2="238" stroke="#7fd8ff" stroke-width="1.5" opacity="0.85"/>
  <g stroke="#9fe6ff" stroke-width="1.2" opacity="0.8">
    <line x1="380" y1="238" x2="380" y2="245"/>
    <line x1="470" y1="238" x2="470" y2="245"/>
    <line x1="560" y1="238" x2="560" y2="245"/>
  </g>
  <g font-size="11" fill="#9fe6ff" text-anchor="middle" opacity="0.85">
    <text x="380" y="259">0</text>
    <text x="470" y="259">50</text>
    <text x="560" y="259">100 MM</text>
  </g>

  <!-- baseline grass -->
  <path d="M390 238 q5 -2.5 10 0 q5 2 10 0 q6 -2 12 0 q6 1.5 12 0 q7 -2.5 14 0 q8 2 16 0 q7 -2 14 0 q8 1.5 16 0 q7 -2.5 14 0 q8 2 16 0 q7 -2 14 0 q6 1.5 12 0" fill="none" stroke="#7fd8ff" stroke-width="1" opacity="0.3"/>

  <!-- initial pulse at 0 (static) -->
  <path d="M374 238 L377 168 L379.5 150 L382 186 L384.5 212 L387 238" fill="none" stroke="#7fd8ff" stroke-width="2" filter="url(#brsglowS)"/>
  <text x="380" y="140" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity="0.7">IP</text>

  <!-- reveal: tall centerline echo at 50 mm -->
  <g id="brsEcho" opacity="0">
    <path d="M459 238 L465 232 L468.8 140 L472 212 L476 232 L481 238" fill="none" stroke="#ffc24b" stroke-width="2.4" filter="url(#brsglowS)"/>
    <circle cx="470" cy="238" r="2" fill="#ffc24b"/>
  </g>
  <g id="brsEchoLbl" opacity="0">
    <text x="470" y="114" text-anchor="middle" font-size="10" fill="#ffc24b" opacity="0.9">CENTERLINE</text>
    <text x="470" y="128" text-anchor="middle" font-size="11.5" fill="#9fe6ff">50 MM · ~17 µs</text>
  </g>

  <!-- reveal: shorter, dimmed far-wall echo at 100 mm -->
  <g id="brsBackwall" opacity="0">
    <path d="M551 238 L555.5 233 L559 196 L562.5 224 L566.5 234 L570 238" fill="none" stroke="#5fe0ff" stroke-width="2.2" opacity="0.7"/>
  </g>
  <g id="brsBackwallLbl" opacity="0">
    <text x="576" y="170" text-anchor="end" font-size="10.5" fill="#ff9b4b" opacity="0.95">BACK WALL DROPS</text>
    <text x="576" y="184" text-anchor="end" font-size="11.5" fill="#9fe6ff">~34 µs</text>
  </g>
</svg>
