<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cfglowC" filterUnits="userSpaceOnUse" x="95" y="23" width="447" height="285">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cfglowW" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cfsteelG" x1="0" y1="146" x2="0" y2="258" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c5c8c"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="cffilmG" x1="0" y1="146" x2="0" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4f4ff" stop-opacity=".95"/>
      <stop offset=".45" stop-color="#5fe0ff" stop-opacity=".82"/>
      <stop offset="1" stop-color="#2b86ff" stop-opacity=".68"/>
    </linearGradient>
    <linearGradient id="cfcrysG" x1="0" y1="128" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#aef0ff"/><stop offset="1" stop-color="#3f9bff"/>
    </linearGradient>
    <pattern id="cfhatch" width="4.5" height="4.5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4.5" stroke="#ff9b4b" stroke-width="1.3" opacity=".85"/>
    </pattern>
    <clipPath id="cfinsClip"><rect x="36" y="68" width="72" height="56" rx="6"/></clipPath>
  </defs>

  <!-- ===== center divider ===== -->
  <line x1="295" y1="22" x2="295" y2="258" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 6" opacity=".16"/>

  <!-- ===== STEEL BLOCKS (rough irregular top surface) ===== -->
  <path d="M46 146 L55 160 L64 146 L73 166 L82 146 L90 158 L99 146 L107 164 L116 146 L123 161 L130 146 L140 170 L152 146 L162 174 L173 146 L183 168 L194 146 L204 172 L214 146 L222 163 L230 146 L238 168 L247 146 L254 160 L262 146 L270 166 L277 156 L277 258 L46 258 Z" fill="url(#cfsteelG)"/>
  <path d="M312 146 L321 160 L330 146 L339 166 L348 146 L356 158 L365 146 L373 164 L382 146 L389 161 L396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 L488 163 L496 146 L504 168 L513 146 L520 160 L528 146 L536 166 L543 156 L543 258 L312 258 Z" fill="url(#cfsteelG)"/>
  <!-- rolling texture -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".14">
    <line x1="52" y1="190" x2="271" y2="190"/><line x1="52" y1="212" x2="271" y2="212"/>
    <line x1="52" y1="232" x2="271" y2="232"/><line x1="52" y1="250" x2="271" y2="250"/>
    <line x1="318" y1="190" x2="537" y2="190"/><line x1="318" y1="212" x2="537" y2="212"/>
    <line x1="318" y1="232" x2="537" y2="232"/><line x1="318" y1="250" x2="537" y2="250"/>
  </g>

  <!-- ===== TRAPPED AIR pockets (hatched, static both sides; film displaces right) ===== -->
  <path d="M130 146 L140 170 L152 146 L162 174 L173 146 L183 168 L194 146 L204 172 L214 146 Z" fill="#060d1c"/>
  <path d="M130 146 L140 170 L152 146 L162 174 L173 146 L183 168 L194 146 L204 172 L214 146 Z" fill="url(#cfhatch)"/>
  <path d="M396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 Z" fill="#060d1c"/>
  <path d="M396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 Z" fill="url(#cfhatch)"/>

  <!-- block edges -->
  <path d="M46 146 L55 160 L64 146 L73 166 L82 146 L90 158 L99 146 L107 164 L116 146 L123 161 L130 146 L140 170 L152 146 L162 174 L173 146 L183 168 L194 146 L204 172 L214 146 L222 163 L230 146 L238 168 L247 146 L254 160 L262 146 L270 166 L277 156" fill="none" stroke="#8fb6e0" stroke-width="1.6"/>
  <path d="M312 146 L321 160 L330 146 L339 166 L348 146 L356 158 L365 146 L373 164 L382 146 L389 161 L396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 L488 163 L496 146 L504 168 L513 146 L520 160 L528 146 L536 166 L543 156" fill="none" stroke="#8fb6e0" stroke-width="1.6"/>
  <g stroke="#8fb6e0" stroke-width="1.6" fill="none">
    <path d="M46 146 V258 H277 V156"/>
    <path d="M312 146 V258 H543 V156"/>
  </g>
  <line x1="46" y1="258" x2="277" y2="258" stroke="#8fb6e0" stroke-width="2.2" opacity=".9"/>
  <line x1="312" y1="258" x2="543" y2="258" stroke="#8fb6e0" stroke-width="2.2" opacity=".9"/>

  <!-- ===== CONTACT PROBES (housing + knurl + backing + crystal + wear plate) ===== -->
  <g>
    <path d="M130 146 L130 76 Q130 60 146 60 L198 60 Q214 60 214 76 L214 146 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.8"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".35"><line x1="133" y1="68" x2="211" y2="68"/><line x1="131" y1="73" x2="213" y2="73"/><line x1="130" y1="78" x2="214" y2="78"/></g>
    <rect x="137" y="84" width="70" height="40" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".55"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".16"><line x1="140" y1="92" x2="204" y2="92"/><line x1="140" y1="100" x2="204" y2="100"/><line x1="140" y1="108" x2="204" y2="108"/><line x1="140" y1="116" x2="204" y2="116"/></g>
    <rect x="134" y="128" width="76" height="12" fill="url(#cfcrysG)" stroke="#c9f6ff" stroke-width=".8"/>
    <rect x="130" y="140" width="84" height="6" fill="#0b1f3a" stroke="#8fb6e0" stroke-width="1"/>
    <line x1="130" y1="146" x2="214" y2="146" stroke="#8fb6e0" stroke-width="1.8"/>
  </g>
  <g>
    <path d="M396 146 L396 76 Q396 60 412 60 L464 60 Q480 60 480 76 L480 146 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.8"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".35"><line x1="399" y1="68" x2="477" y2="68"/><line x1="397" y1="73" x2="479" y2="73"/><line x1="396" y1="78" x2="480" y2="78"/></g>
    <rect x="403" y="84" width="70" height="40" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".55"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".16"><line x1="406" y1="92" x2="470" y2="92"/><line x1="406" y1="100" x2="470" y2="100"/><line x1="406" y1="108" x2="470" y2="108"/><line x1="406" y1="116" x2="470" y2="116"/></g>
    <rect x="400" y="128" width="76" height="12" fill="url(#cfcrysG)" stroke="#c9f6ff" stroke-width=".8"/>
    <rect x="396" y="140" width="84" height="6" fill="#0b1f3a" stroke="#8fb6e0" stroke-width="1"/>
    <line x1="396" y1="146" x2="480" y2="146" stroke="#8fb6e0" stroke-width="1.8"/>
  </g>

  <!-- ===== captions ===== -->
  <g font-size="12" letter-spacing="3">
    <rect x="142" y="14" width="46" height="21" rx="10.5" fill="#ff9b4b" fill-opacity=".08" stroke="#ff9b4b" stroke-width="1" opacity=".9"/>
    <text x="167" y="29" text-anchor="middle" fill="#ffc9a0">DRY</text>
    <rect x="397" y="14" width="84" height="21" rx="10.5" fill="#5fe0ff" fill-opacity=".08" stroke="#5fe0ff" stroke-width="1" opacity=".9"/>
    <text x="440" y="29" text-anchor="middle" fill="#9fefff">COUPLED</text>
  </g>

  <!-- ===== static TRAPPED AIR label (left) ===== -->
  <text x="34" y="140" font-size="11" fill="#ff9b4b" opacity=".92">TRAPPED AIR</text>
  <path d="M110 141 L137 163" stroke="#ff9b4b" stroke-width="1" opacity=".55" fill="none"/>

  <!-- ===== REVEAL: couplant film floods right gap ===== -->
  <g id="cfFilm" opacity="0">
    <path d="M396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 Z" fill="#11375f"/>
    <path d="M396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146 Z" fill="url(#cffilmG)"/>
    <path d="M396 146 L406 170 L418 146 L428 174 L439 146 L449 168 L460 146 L470 172 L480 146" fill="none" stroke="#8fb6e0" stroke-width="1.4" opacity=".8"/>
    <line x1="393" y1="147.6" x2="483" y2="147.6" stroke="#c2f4ff" stroke-width="1.8" opacity=".95" filter="url(#cfglowC)"/>
    <path d="M396 146 q-8 1 -10 8 q7 3 10 -2 Z" fill="#5fe0ff" opacity=".55"/>
    <path d="M480 146 q8 1 10 8 q-7 3 -10 -2 Z" fill="#5fe0ff" opacity=".55"/>
    <text x="486" y="118" font-size="11" fill="#5fe0ff" opacity=".9">COUPLANT</text>
    <text x="486" y="132" font-size="11" fill="#9fefff">THIN WATER FILM</text>
    <path d="M490 135 L479 149" stroke="#5fe0ff" stroke-width="1" opacity=".6" fill="none"/>
  </g>

  <!-- ===== REVEAL: dry pulse (left incident beam) ===== -->
  <path id="cfDryPulse" d="M160 82 V152 M160 155 l-6 -10 M160 155 l6 -10" fill="none" stroke="#5fe0ff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#cfglowC)"/>

  <!-- ===== REVEAL: total reflection at the air gap + faint ghost stub ===== -->
  <g id="cfReflect" stroke-dasharray="100" stroke-dashoffset="100" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M162 160 L194 134 L194 102 M194 102 l-5.5 9.5 M194 102 l5.5 9.5" stroke="#ff6b6b" stroke-width="4" pathLength="100" filter="url(#cfglowW)"/>
    <path d="M160 178 V192 M160 192 l-4 -7 M160 192 l4 -7" stroke="#7fd8ff" stroke-width="1.5" opacity=".35" pathLength="100"/>
  </g>
  <g id="cfReflectTag" opacity="0">
    <text x="167" y="50" text-anchor="middle" font-size="11" fill="#ff6b6b">&gt;99.9% REFLECTED — NO TEST</text>
  </g>

  <!-- ===== REVEAL: magnified air-layer inset (left) ===== -->
  <g id="cfAirGap" opacity="0">
    <path d="M108 76 L136 148" stroke="#5fe0ff" stroke-width="1" opacity=".45" fill="none"/>
    <path d="M108 120 L134 160" stroke="#5fe0ff" stroke-width="1" opacity=".45" fill="none"/>
    <g clip-path="url(#cfinsClip)">
      <rect x="36" y="68" width="72" height="56" fill="#0a1a30"/>
      <rect x="36" y="68" width="72" height="24" fill="#14304f"/>
      <line x1="36" y1="92" x2="108" y2="92" stroke="#8fb6e0" stroke-width="1.2"/>
      <rect x="36" y="92" width="72" height="7" fill="#05070e"/>
      <rect x="36" y="92" width="72" height="7" fill="url(#cfhatch)"/>
      <path d="M36 99 H108" stroke="#8fb6e0" stroke-width="1.2"/>
      <rect x="36" y="99" width="72" height="25" fill="#1b3e66"/>
      <line x1="42" y1="111" x2="102" y2="111" stroke="#8fb6e0" stroke-width="1" opacity=".2"/>
    </g>
    <rect x="36" y="68" width="72" height="56" rx="6" fill="none" stroke="#8fb6e0" stroke-width="1.5"/>
    <text x="72" y="118" text-anchor="middle" font-size="11" fill="#ff9b4b">AIR</text>
    <path d="M72 108 V100" stroke="#ff9b4b" stroke-width="1" opacity=".7" fill="none"/>
  </g>

  <!-- ===== REVEAL: energy split with couplant (right) ===== -->
  <g id="cfEnergy" stroke-dasharray="100" stroke-dashoffset="100" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M408 82 V150 M408 153 l-6 -10 M408 153 l6 -10" stroke="#5fe0ff" stroke-width="4.5" pathLength="100" filter="url(#cfglowC)"/>
    <path d="M408 160 V186 M408 189 l-6 -10 M408 189 l6 -10" stroke="#7fd8ff" stroke-width="3.2" pathLength="100" filter="url(#cfglowC)"/>
    <path d="M410 158 L442 132 L442 102 M442 102 l-5 9 M442 102 l5 9" stroke="#ff9b4b" stroke-width="2" pathLength="100" filter="url(#cfglowW)"/>
  </g>
  <g id="cfEnergyTag" opacity="0">
    <text x="398" y="198" text-anchor="end" font-size="11" fill="#9fefff">≈12% IN</text>
    <text x="442" y="50" text-anchor="middle" font-size="11" fill="#ff9b4b">≈88% BACK</text>
  </g>

  <!-- ===== REVEAL: beam travels to the backwall ===== -->
  <path id="cfTransmit" d="M408 196 V246 M408 249 l-6 -10 M408 249 l6 -10" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#cfglowC)" opacity=".95"/>

  <!-- ===== REVEAL: backwall echo returns + signal blip ===== -->
  <g id="cfEcho" opacity="0">
    <path d="M466 254 V148 M466 148 l-4.5 8 M466 148 l4.5 8" fill="none" stroke="#9fefff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <circle cx="466" cy="134" r="4" fill="#5fe0ff" filter="url(#cfglowC)"/>
    <circle cx="466" cy="134" r="8" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
  </g>

  <!-- ===== REVEAL: ping at the crossing interface ===== -->
  <circle id="cfCrossPing" cx="408" cy="157" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#cfglowC)"/>
</svg>
