<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fcsGlow" filterUnits="userSpaceOnUse" x="-30" y="-30" width="660" height="400">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fcsGlowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fcsBaseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".85"/>
      <stop offset=".5" stop-color="#1E66F5" stop-opacity=".75"/>
      <stop offset="1" stop-color="#1751c4" stop-opacity=".85"/>
    </linearGradient>
    <linearGradient id="fcsBaseEndG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c5cc0" stop-opacity=".85"/>
      <stop offset="1" stop-color="#123c8a" stop-opacity=".85"/>
    </linearGradient>
    <linearGradient id="fcsTopG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fe6ff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#9fe6ff" stop-opacity=".07"/>
    </linearGradient>
    <linearGradient id="fcsSheenG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf6ff" stop-opacity="0"/>
      <stop offset=".5" stop-color="#eaf6ff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#eaf6ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="fcsBaseClip"><rect x="124" y="155" width="300" height="44"/></clipPath>
    <clipPath id="fcsMagClip"><circle cx="516" cy="96" r="44"/></clipPath>
  </defs>

  <!-- ===== resting ghost: faint slab silhouette so panel never reads empty ===== -->
  <g fill="none" stroke="#8fb6e0" stroke-opacity=".28" stroke-width="1" stroke-linejoin="round">
    <path d="M124 142 L150 128 L450 128 L450 198 L424 212 L124 212 Z"/>
    <line x1="124" y1="155" x2="424" y2="155" stroke-opacity=".14"/>
    <line x1="124" y1="199" x2="424" y2="199" stroke-opacity=".14"/>
  </g>

  <!-- ===== fcsLayers: slab body + layer labels (fade @0.3) ===== -->
  <g id="fcsLayers" opacity="0" stroke-linejoin="round" stroke-linecap="round">
    <!-- top surface (emulsion outer face, receding) -->
    <polygon points="124,142 424,142 450,128 150,128" fill="url(#fcsTopG)" stroke="#9fe6ff" stroke-opacity=".5" stroke-width="1"/>
    <line x1="150" y1="128" x2="450" y2="128" stroke="#cfe6ff" stroke-width="1" opacity=".55">
      <animate attributeName="opacity" values=".55;.85;.55" dur="4.2s" repeatCount="indefinite"/>
    </line>

    <!-- end face (cut layers receding) -->
    <polygon points="424,142 450,128 450,141 424,155" fill="#9fe6ff" fill-opacity=".1" stroke="#9fe6ff" stroke-opacity=".4" stroke-width=".8"/>
    <polygon points="424,155 450,141 450,185 424,199" fill="url(#fcsBaseEndG)" stroke="#9fe6ff" stroke-opacity=".4" stroke-width=".8"/>
    <polygon points="424,199 450,185 450,198 424,212" fill="#9fe6ff" fill-opacity=".1" stroke="#9fe6ff" stroke-opacity=".4" stroke-width=".8"/>

    <!-- front cross-section: emulsion / base / emulsion -->
    <rect x="124" y="142" width="300" height="13" fill="#9fe6ff" fill-opacity=".14"/>
    <rect x="124" y="155" width="300" height="44" fill="url(#fcsBaseG)"/>
    <rect x="124" y="199" width="300" height="13" fill="#9fe6ff" fill-opacity=".14"/>
    <!-- clear-polyester gloss: static streaks + slow ambient sheen sweep -->
    <g clip-path="url(#fcsBaseClip)">
      <path d="M180 199 L210 155 M196 199 L226 155" stroke="#eaf6ff" stroke-width="2" opacity=".08" fill="none"/>
      <rect x="-70" y="155" width="60" height="44" fill="url(#fcsSheenG)">
        <animate attributeName="x" values="-70;540" dur="7s" repeatCount="indefinite"/>
      </rect>
    </g>
    <line x1="124" y1="155" x2="424" y2="155" stroke="#eaf6ff" stroke-width=".8" opacity=".4"/>
    <line x1="124" y1="199" x2="424" y2="199" stroke="#eaf6ff" stroke-width=".8" opacity=".4"/>
    <rect x="124" y="142" width="300" height="70" fill="none" stroke="#cfe6ff" stroke-width="1.5"/>

    <!-- left layer labels -->
    <g font-size="11" fill="#9fe6ff" letter-spacing="1">
      <line x1="113" y1="148.5" x2="122" y2="148.5" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
      <text x="110" y="152" text-anchor="end">EMULSION</text>
      <line x1="113" y1="177" x2="122" y2="177" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
      <text x="110" y="174" text-anchor="end">POLYESTER BASE</text>
      <text x="110" y="187" text-anchor="end" opacity=".6">0.007 IN</text>
      <line x1="113" y1="205.5" x2="122" y2="205.5" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
      <text x="110" y="209" text-anchor="end">EMULSION</text>
    </g>
  </g>

  <!-- ===== fcsGrains: AgBr grain field + magnifier inset (fade @2.3) ===== -->
  <g id="fcsGrains" opacity="0">
    <!-- top emulsion grains -->
    <g fill="#9fe6ff" opacity=".85">
      <circle cx="127.0" cy="144.6" r="1.0"/>
      <circle cx="137.6" cy="147.1" r="1.4"/>
      <circle cx="148.2" cy="149.6" r="1.3"/>
      <circle cx="158.8" cy="152.1" r="1.2"/>
      <circle cx="162.4" cy="146.6" r="1.1"/>
      <circle cx="173.0" cy="149.1" r="1.0"/>
      <circle cx="183.6" cy="151.6" r="1.4"/>
      <circle cx="187.2" cy="146.1" r="1.3"/>
      <circle cx="197.8" cy="148.6" r="1.2"/>
      <circle cx="208.4" cy="151.1" r="1.1"/>
      <circle cx="219.0" cy="145.6" r="1.0"/>
      <circle cx="222.6" cy="148.1" r="1.4"/>
      <circle cx="233.2" cy="150.6" r="1.3"/>
      <circle cx="243.8" cy="145.1" r="1.2"/>
      <circle cx="247.4" cy="147.6" r="1.1"/>
      <circle cx="258.0" cy="150.1" r="1.0"/>
      <circle cx="268.6" cy="144.6" r="1.4"/>
      <circle cx="279.2" cy="147.1" r="1.3"/>
      <circle cx="282.8" cy="149.6" r="1.2"/>
      <circle cx="293.4" cy="152.1" r="1.1"/>
      <circle cx="304.0" cy="146.6" r="1.0"/>
      <circle cx="307.6" cy="149.1" r="1.4"/>
      <circle cx="318.2" cy="151.6" r="1.3"/>
      <circle cx="328.8" cy="146.1" r="1.2"/>
      <circle cx="353.6" cy="145.6" r="1.4"/>
      <circle cx="364.2" cy="148.1" r="1.3"/>
      <circle cx="367.8" cy="150.6" r="1.2"/>
      <circle cx="378.4" cy="145.1" r="1.1"/>
      <circle cx="389.0" cy="147.6" r="1.0"/>
      <circle cx="399.6" cy="150.1" r="1.4"/>
      <circle cx="403.2" cy="144.6" r="1.3"/>
      <circle cx="413.8" cy="147.1" r="1.2"/>
    </g>
    <!-- bottom emulsion grains -->
    <g fill="#9fe6ff" opacity=".85">
      <circle cx="131.0" cy="200.8" r="1.0"/>
      <circle cx="145.6" cy="206.3" r="1.1"/>
      <circle cx="153.2" cy="203.8" r="1.2"/>
      <circle cx="160.8" cy="201.3" r="1.3"/>
      <circle cx="168.4" cy="206.8" r="1.4"/>
      <circle cx="176.0" cy="204.3" r="1.0"/>
      <circle cx="183.6" cy="201.8" r="1.1"/>
      <circle cx="191.2" cy="207.3" r="1.2"/>
      <circle cx="205.8" cy="204.8" r="1.3"/>
      <circle cx="213.4" cy="202.3" r="1.4"/>
      <circle cx="221.0" cy="207.8" r="1.0"/>
      <circle cx="228.6" cy="205.3" r="1.1"/>
      <circle cx="236.2" cy="202.8" r="1.2"/>
      <circle cx="243.8" cy="208.3" r="1.3"/>
      <circle cx="251.4" cy="205.8" r="1.4"/>
      <circle cx="266.0" cy="203.3" r="1.0"/>
      <circle cx="273.6" cy="200.8" r="1.1"/>
      <circle cx="281.2" cy="206.3" r="1.2"/>
      <circle cx="288.8" cy="203.8" r="1.3"/>
      <circle cx="296.4" cy="201.3" r="1.4"/>
      <circle cx="304.0" cy="206.8" r="1.0"/>
      <circle cx="311.6" cy="204.3" r="1.1"/>
      <circle cx="326.2" cy="201.8" r="1.2"/>
      <circle cx="333.8" cy="207.3" r="1.3"/>
      <circle cx="341.4" cy="204.8" r="1.4"/>
      <circle cx="349.0" cy="202.3" r="1.0"/>
      <circle cx="356.6" cy="207.8" r="1.1"/>
      <circle cx="364.2" cy="205.3" r="1.2"/>
      <circle cx="371.8" cy="202.8" r="1.3"/>
      <circle cx="386.4" cy="208.3" r="1.4"/>
      <circle cx="394.0" cy="205.8" r="1.0"/>
      <circle cx="401.6" cy="203.3" r="1.1"/>
      <circle cx="409.2" cy="200.8" r="1.2"/>
    </g>
    <!-- glinting grains (ambient shimmer) -->
    <g fill="#eaf6ff">
      <circle cx="152.6" cy="146.0" r="1.2"><animate attributeName="opacity" values=".3;1;.3" dur="2.6s" begin="-0.4s" repeatCount="indefinite"/></circle>
      <circle cx="214.0" cy="147.0" r="1.1"><animate attributeName="opacity" values=".3;1;.3" dur="3.1s" begin="-1.2s" repeatCount="indefinite"/></circle>
      <circle cx="263.4" cy="146.8" r="1.3"><animate attributeName="opacity" values=".3;1;.3" dur="2.3s" begin="-1.8s" repeatCount="indefinite"/></circle>
      <circle cx="288.0" cy="145.2" r="1.1"><animate attributeName="opacity" values=".3;1;.3" dur="2.9s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle cx="393.8" cy="151.2" r="1.2"><animate attributeName="opacity" values=".3;1;.3" dur="3.4s" begin="-2.2s" repeatCount="indefinite"/></circle>
      <circle cx="139.2" cy="203.6" r="1.2"><animate attributeName="opacity" values=".3;1;.3" dur="2.7s" begin="-1.5s" repeatCount="indefinite"/></circle>
      <circle cx="198.6" cy="202.0" r="1.1"><animate attributeName="opacity" values=".3;1;.3" dur="3.2s" begin="-0.2s" repeatCount="indefinite"/></circle>
      <circle cx="259.0" cy="207.6" r="1.3"><animate attributeName="opacity" values=".3;1;.3" dur="2.4s" begin="-2.0s" repeatCount="indefinite"/></circle>
      <circle cx="319.0" cy="208.0" r="1.1"><animate attributeName="opacity" values=".3;1;.3" dur="3.0s" begin="-1.0s" repeatCount="indefinite"/></circle>
      <circle cx="379.4" cy="206.6" r="1.2"><animate attributeName="opacity" values=".3;1;.3" dur="2.8s" begin="-2.6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- magnifier inset: one grain zoomed, sensitivity speck on its surface -->
    <circle cx="339.4" cy="148.6" r="6.5" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".85"/>
    <circle cx="339.4" cy="148.6" r="1.4" fill="#9fe6ff"/>
    <line x1="343.5" y1="143.5" x2="484" y2="69" stroke="#5fe0ff" stroke-width="1" opacity=".4"/>
    <line x1="344.5" y1="152.5" x2="487" y2="127" stroke="#5fe0ff" stroke-width="1" opacity=".4"/>
    <g clip-path="url(#fcsMagClip)">
      <circle cx="516" cy="96" r="44" fill="rgba(10,30,60,.55)"/>
      <!-- gelatin matrix hint -->
      <circle cx="492" cy="69" r="5" fill="none" stroke="#9fe6ff" stroke-width=".8" opacity=".12"/>
      <circle cx="543" cy="71" r="6" fill="none" stroke="#9fe6ff" stroke-width=".8" opacity=".12"/>
      <!-- tabular AgBr crystal: flat hexagonal plate, face-on -->
      <g>
        <path d="M494 78 L528 68 L549 90 L541 117 L505 126 L485 100 Z" fill="#9fe6ff" fill-opacity=".3" stroke="#9fe6ff" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M547 92 L539.5 115 L506.5 123" fill="none" stroke="#eaf6ff" stroke-width=".9" opacity=".5"/>
        <path d="M499 84 L530 75 M495 92 L540 79" fill="none" stroke="#eaf6ff" stroke-width=".7" opacity=".3"/>
        <animate attributeName="opacity" values=".85;1;.85" dur="3.6s" repeatCount="indefinite"/>
      </g>
      <!-- sensitivity speck: darker fleck on the crystal surface -->
      <circle cx="522" cy="121.5" r="3.4" fill="#0a1f33" stroke="#5fe0ff" stroke-width="1.2">
        <animate attributeName="stroke-opacity" values=".55;1;.55" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle cx="516" cy="96" r="44" fill="none" stroke="#5fe0ff" stroke-width="2"/>
    <line x1="547.5" y1="127.5" x2="563" y2="143" stroke="#8fb6e0" stroke-width="5" stroke-linecap="round"/>
    <line x1="522" y1="126" x2="517" y2="150" stroke="#5fe0ff" stroke-width="1" opacity=".55"/>
    <text x="516" y="162" text-anchor="middle" font-size="11" fill="#9fe6ff" letter-spacing="1">SENSITIVITY SPECK</text>
    <text x="516" y="44" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity=".55" letter-spacing="1">AGBR GRAIN</text>
  </g>

  <!-- ===== fcsRay: faint radiation streak through the slab (draw @4.3) ===== -->
  <path id="fcsRay" d="M170 18 L251.6 300" fill="none" stroke="#ffc24b" stroke-width="1.8" stroke-linecap="butt" opacity=".55" filter="url(#fcsGlow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== fcsSeeds: latent-image seeds pulse cyan + ray dressing (fade @4.85) ===== -->
  <g id="fcsSeeds" opacity="0">
    <text x="186" y="30" font-size="10" fill="#ffc24b" opacity=".85" letter-spacing="1">INCIDENT RADIATION</text>
    <path d="M254.1 308.6 L256.4 298.6 L246.8 301.4 Z" fill="#ffc24b" opacity=".6"/>
    <g fill="#5fe0ff" filter="url(#fcsGlowS)">
      <circle cx="207.5" cy="148" r="1.8"><animate attributeName="opacity" values=".6;1;.6" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="222.6" cy="148.1" r="1.8"><animate attributeName="opacity" values=".6;1;.6" dur="1.6s" begin="-0.5s" repeatCount="indefinite"/></circle>
      <circle cx="224.3" cy="205.5" r="1.8"><animate attributeName="opacity" values=".6;1;.6" dur="1.6s" begin="-1.0s" repeatCount="indefinite"/></circle>
    </g>
    <g fill="none" stroke="#5fe0ff" stroke-width="1">
      <circle cx="207.5" cy="148" r="4.5">
        <animate attributeName="r" values="3.5;7;3.5" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".8;.15;.8" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="222.6" cy="148.1" r="4.5">
        <animate attributeName="r" values="3.5;7;3.5" dur="2.4s" begin="-0.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".8;.15;.8" dur="2.4s" begin="-0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="224.3" cy="205.5" r="4.5">
        <animate attributeName="r" values="3.5;7;3.5" dur="2.4s" begin="-1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".8;.15;.8" dur="2.4s" begin="-1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- footer caption -->
  <text x="124" y="331" font-size="12" fill="#9fe6ff" opacity=".65" letter-spacing="1">INDUSTRIAL X-RAY FILM — EDGE-ON SECTION</text>
</svg>
