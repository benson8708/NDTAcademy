<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="asdglowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="622" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="asdglowW" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="asdsteel" x1="0" y1="10" x2="0" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".38" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <radialGradient id="asdscr" cx=".5" cy=".42" r=".9">
      <stop offset="0" stop-color="#0c2747"/><stop offset=".75" stop-color="#071528"/><stop offset="1" stop-color="#050f1f"/>
    </radialGradient>
    <radialGradient id="asdknob" cx=".38" cy=".32" r="1">
      <stop offset="0" stop-color="#3a6a9c"/><stop offset=".7" stop-color="#16334f"/><stop offset="1" stop-color="#0c2340"/>
    </radialGradient>
    <linearGradient id="asdscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===== INSTRUMENT BEZEL ===== -->
  <rect x="10" y="10" width="580" height="320" rx="16" fill="url(#asdsteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <rect x="14" y="14" width="572" height="312" rx="12" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".18"/>

  <!-- readout chips -->
  <g font-size="11">
    <rect x="44" y="14" width="94" height="20" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="91" y="28" text-anchor="middle" fill="#9fe6ff" opacity=".85">RANGE 100 MM</text>
    <rect x="235" y="14" width="94" height="20" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="282" y="28" text-anchor="middle" fill="#9fe6ff" opacity=".85">VEL 5920 M/S</text>
    <rect x="426" y="14" width="94" height="20" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
    <text x="473" y="28" text-anchor="middle" fill="#9fe6ff" opacity=".85">GAIN 42.0 dB</text>
  </g>
  <circle cx="553" cy="24" r="3" fill="#5fe0ff" filter="url(#asdglowW)" opacity=".9"/>

  <!-- knobs, right column -->
  <g stroke="#8fb6e0">
    <circle cx="555" cy="120" r="13" fill="url(#asdknob)" stroke-width="1.5"/>
    <line x1="555" y1="120" x2="563.5" y2="110.5" stroke="#9fe6ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="555" cy="190" r="13" fill="url(#asdknob)" stroke-width="1.5"/>
    <line x1="555" y1="190" x2="546" y2="180" stroke="#9fe6ff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g fill="#8fb6e0" opacity=".5">
    <circle cx="538" cy="106" r="1.2"/><circle cx="544" cy="98" r="1.2"/><circle cx="555" cy="95" r="1.2"/><circle cx="566" cy="98" r="1.2"/><circle cx="572" cy="106" r="1.2"/>
    <circle cx="538" cy="176" r="1.2"/><circle cx="544" cy="168" r="1.2"/><circle cx="555" cy="165" r="1.2"/><circle cx="566" cy="168" r="1.2"/><circle cx="572" cy="176" r="1.2"/>
  </g>

  <!-- bottom strip hardware (center kept clear for note chip) -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".35">
    <line x1="48" y1="296" x2="48" y2="312"/><line x1="56" y1="296" x2="56" y2="312"/><line x1="64" y1="296" x2="64" y2="312"/>
    <line x1="72" y1="296" x2="72" y2="312"/><line x1="80" y1="296" x2="80" y2="312"/><line x1="88" y1="296" x2="88" y2="312"/>
  </g>
  <g fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".55">
    <rect x="466" y="296" width="14" height="10" rx="2"/>
    <rect x="486" y="296" width="14" height="10" rx="2"/>
    <rect x="506" y="296" width="14" height="10" rx="2"/>
  </g>

  <!-- ===== CRT SCREEN ===== -->
  <rect x="44" y="40" width="476" height="222" rx="8" fill="url(#asdscr)" stroke="#8fb6e0" stroke-width="1.2" opacity=".95"/>
  <rect x="44" y="40" width="476" height="222" rx="8" fill="none" stroke="#020912" stroke-width="3" opacity=".5"/>
  <path d="M58 46 L250 46 L150 132 L58 168 Z" fill="#9fd0ff" opacity=".045"/>

  <!-- dim graticule 10x5 + baseline comb + ruler numbers (always on: static panel must read) -->
  <path d="M66.0 56.0 V226.0 M110.0 56.0 V226.0 M154.0 56.0 V226.0 M198.0 56.0 V226.0 M242.0 56.0 V226.0 M286.0 56.0 V226.0 M330.0 56.0 V226.0 M374.0 56.0 V226.0 M418.0 56.0 V226.0 M462.0 56.0 V226.0 M506.0 56.0 V226.0 M66.0 56.0 H506.0 M66.0 90.0 H506.0 M66.0 124.0 H506.0 M66.0 158.0 H506.0 M66.0 192.0 H506.0" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".16"/>
  <path d="M286.0 56.0 V226.0" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".2"/>
  <path d="M66.0 226.0 V232.0 M110.0 226.0 V232.0 M154.0 226.0 V232.0 M198.0 226.0 V232.0 M242.0 226.0 V232.0 M286.0 226.0 V232.0 M330.0 226.0 V232.0 M374.0 226.0 V232.0 M418.0 226.0 V232.0 M462.0 226.0 V232.0 M506.0 226.0 V232.0 M88.0 226.0 V229.5 M132.0 226.0 V229.5 M176.0 226.0 V229.5 M220.0 226.0 V229.5 M264.0 226.0 V229.5 M308.0 226.0 V229.5 M352.0 226.0 V229.5 M396.0 226.0 V229.5 M440.0 226.0 V229.5 M484.0 226.0 V229.5" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".4"/>
  <text x="66.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">0</text><text x="154.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">20</text><text x="242.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">40</text><text x="330.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">60</text><text x="418.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">80</text><text x="506.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">100</text>

  <!-- amplitude (volts) axis hint -->
  <g opacity=".5">
    <line x1="54" y1="196" x2="54" y2="86" stroke="#5fe0ff" stroke-width="1"/>
    <path d="M54 78 L50.6 87 L57.4 87 Z" fill="#5fe0ff"/>
    <text x="54" y="70" text-anchor="middle" font-size="11" fill="#9fe6ff">V</text>
  </g>

