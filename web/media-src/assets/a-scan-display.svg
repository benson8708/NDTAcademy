  <path d="M66 224 L67.5 72 L69 64.5 L70.5 112 L72 206 L74 120 L76 212 L78.5 164 L81 219 L84 200 L86.5 222.5 L89 214 L92 223.5 L98.5 225.1 L104.2 224.4 L109.9 222.3 L115.6 225.2 L123.6 225.2 L130.9 223.7 L137.6 221.6 L144.0 222.5 L151.9 225.1 L159.4 224.7 L165.0 225.3 L172.6 224.6 L179.8 224.6 L187.7 224.1 L195.0 224.5 L202.6 224.9 L208.5 224.6 L214.5 221.9 L222.2 224.4 L228.7 224.1 L235.9 224.6 L244.3 224.5 L249.9 224.1 L258.4 223.9 L265.1 222.3 L271.1 221.8 L277.0 225.0 L279 223.5 L283 154 L286 138 L288.5 172 L290.5 198 L292.5 182 L295 222.5 L303.1 225.3 L310.3 223.8 L318.4 224.9 L324.9 223.8 L330.9 225.1 L337.1 224.5 L343.4 225.4 L347 223.5 L350 196 L352 182 L354 202 L356.5 222.5 L363.1 224.4 L370.7 224.5 L378.2 225.3 L386.0 223.8 L392.7 222.0 L398.4 225.3 L404.4 223.0 L410.4 225.2 L415.9 223.8 L421.9 224.9 L428.5 225.2 L436.9 224.6 L442.7 225.2 L449.0 223.9 L454.6 223.7 L454 223.5 L458 128 L461.5 94 L464.5 148 L467.5 206 L470.5 168 L473.5 216 L477 223 L482.9 222.2 L491.4 223.8 L497.7 224.7 L505.5 224.4 L506 224.5" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-linejoin="round" opacity=".36"/>

  <!-- ===== REVEAL: bright graticule power-up (draw) ===== -->
  <path id="asdGrid" d="M66.0 56.0 V226.0 M110.0 56.0 V226.0 M154.0 56.0 V226.0 M198.0 56.0 V226.0 M242.0 56.0 V226.0 M286.0 56.0 V226.0 M330.0 56.0 V226.0 M374.0 56.0 V226.0 M418.0 56.0 V226.0 M462.0 56.0 V226.0 M506.0 56.0 V226.0 M66.0 56.0 H506.0 M66.0 90.0 H506.0 M66.0 124.0 H506.0 M66.0 158.0 H506.0 M66.0 192.0 H506.0" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".35"
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL: CRT sweep redraws the full trace (draw) ===== -->
  <path id="asdTrace" d="M66 224 L67.5 72 L69 64.5 L70.5 112 L72 206 L74 120 L76 212 L78.5 164 L81 219 L84 200 L86.5 222.5 L89 214 L92 223.5 L98.5 225.1 L104.2 224.4 L109.9 222.3 L115.6 225.2 L123.6 225.2 L130.9 223.7 L137.6 221.6 L144.0 222.5 L151.9 225.1 L159.4 224.7 L165.0 225.3 L172.6 224.6 L179.8 224.6 L187.7 224.1 L195.0 224.5 L202.6 224.9 L208.5 224.6 L214.5 221.9 L222.2 224.4 L228.7 224.1 L235.9 224.6 L244.3 224.5 L249.9 224.1 L258.4 223.9 L265.1 222.3 L271.1 221.8 L277.0 225.0 L279 223.5 L283 154 L286 138 L288.5 172 L290.5 198 L292.5 182 L295 222.5 L303.1 225.3 L310.3 223.8 L318.4 224.9 L324.9 223.8 L330.9 225.1 L337.1 224.5 L343.4 225.4 L347 223.5 L350 196 L352 182 L354 202 L356.5 222.5 L363.1 224.4 L370.7 224.5 L378.2 225.3 L386.0 223.8 L392.7 222.0 L398.4 225.3 L404.4 223.0 L410.4 225.2 L415.9 223.8 L421.9 224.9 L428.5 225.2 L436.9 224.6 L442.7 225.2 L449.0 223.9 L454.6 223.7 L454 223.5 L458 128 L461.5 94 L464.5 148 L467.5 206 L470.5 168 L473.5 216 L477 223 L482.9 222.2 L491.4 223.8 L497.7 224.7 L505.5 224.4 L506 224.5" fill="none" stroke="#7fd8ff" stroke-width="1.8" stroke-linejoin="round" opacity=".95"
        filter="url(#asdglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL: initial pulse ===== -->
  <g id="asdPulse" opacity="0">
    <path d="M66 224 L67.5 72 L69 64.5 L70.5 112 L72 206 L74 120 L76 212 L78.5 164 L81 219 L84 200 L86.5 222.5 L89 214 L92 223.5" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" filter="url(#asdglowC)"/>
    <text x="86" y="66" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".9">IP</text>
  </g>

  <!-- ===== REVEAL: flaw echo at 50 mm ===== -->
  <g id="asdEcho" opacity="0">
    <path d="M279 223.5 L283 154 L286 138 L288.5 172 L290.5 198 L292.5 182 L295 222.5" fill="none" stroke="#ffc24b" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" filter="url(#asdglowW)"/>
    <text x="286" y="126" text-anchor="middle" font-size="12" fill="#ffc24b" opacity=".95">FLAW ECHO</text>
  </g>
  <circle id="asdPing" cx="286" cy="138" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#asdglowW)"/>

  <!-- ===== REVEAL: back-wall echo at 90 mm ===== -->
  <g id="asdBackwall" opacity="0">
    <path d="M454 223.5 L458 128 L461.5 94 L464.5 148 L467.5 206 L470.5 168 L473.5 216 L477 223" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" filter="url(#asdglowC)"/>
    <text x="462" y="82" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".95">BW</text>
  </g>

  <!-- ===== REVEAL: ruler lights up — time IS distance ===== -->
  <g id="asdRuler" opacity="0">
    <path d="M66.0 226.0 V232.0 M110.0 226.0 V232.0 M154.0 226.0 V232.0 M198.0 226.0 V232.0 M242.0 226.0 V232.0 M286.0 226.0 V232.0 M330.0 226.0 V232.0 M374.0 226.0 V232.0 M418.0 226.0 V232.0 M462.0 226.0 V232.0 M506.0 226.0 V232.0 M88.0 226.0 V229.5 M132.0 226.0 V229.5 M176.0 226.0 V229.5 M220.0 226.0 V229.5 M264.0 226.0 V229.5 M308.0 226.0 V229.5 M352.0 226.0 V229.5 M396.0 226.0 V229.5 M440.0 226.0 V229.5 M484.0 226.0 V229.5" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".85"/>
    <text x="66.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">0</text><text x="154.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">20</text><text x="242.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">40</text><text x="330.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">60</text><text x="418.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">80</text><text x="506.0" y="246" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".95">100</text>
    <line x1="66" y1="253" x2="496" y2="253" stroke="#5fe0ff" stroke-width="1.2" opacity=".7"/>
    <path d="M506 253 L496 249.6 L496 256.4 Z" fill="#5fe0ff" opacity=".8"/>
    <line x1="286" y1="147" x2="286" y2="222" stroke="#ffc24b" stroke-width="1.2" stroke-dasharray="3 3" opacity=".65"/>
    <path d="M286 227.5 L282 234 L290 234 Z" fill="#ffc24b" opacity=".9"/>
    <text x="286" y="246" text-anchor="middle" font-size="11" fill="#ffc24b">50</text>
  </g>

  <!-- ===== scan group ===== -->
  <g id="asdscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#asdscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#asdglowC)" opacity=".9"/>
  </g>
</svg>
