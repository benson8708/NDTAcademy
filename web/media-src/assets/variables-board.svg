<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="vbGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vbGlowSoft" filterUnits="userSpaceOnUse" x="198" y="1" width="325" height="330">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vbBoardGrad" gradientUnits="userSpaceOnUse" x1="0" y1="46" x2="0" y2="298">
      <stop offset="0" stop-color="#17385e"/><stop offset=".4" stop-color="#102c4e"/><stop offset="1" stop-color="#0c2138"/>
    </linearGradient>
    <linearGradient id="vbKnobGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#356694"/><stop offset=".45" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="vbFillGrad" gradientUnits="userSpaceOnUse" x1="255" y1="0" x2="462" y2="0">
      <stop offset="0" stop-color="#2b86ff"/><stop offset="1" stop-color="#5fe0ff"/>
    </linearGradient>
  </defs>

  <!-- ===== PROCEDURE SHEET (clipboard) behind board ===== -->
  <g id="vbSheet" transform="rotate(4 460 165)">
    <rect x="395" y="38" width="150" height="254" rx="6" fill="#0e2848" opacity=".6"/>
    <rect x="395" y="38" width="150" height="254" rx="6" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".55"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".3">
      <line x1="406" y1="70" x2="534" y2="70"/>
      <line x1="406" y1="92" x2="534" y2="92"/>
      <line x1="406" y1="114" x2="534" y2="114"/>
      <line x1="406" y1="136" x2="534" y2="136"/>
      <line x1="406" y1="158" x2="534" y2="158"/>
      <line x1="406" y1="180" x2="534" y2="180"/>
      <line x1="406" y1="202" x2="534" y2="202"/>
      <line x1="406" y1="224" x2="534" y2="224"/>
      <line x1="406" y1="246" x2="534" y2="246"/>
      <line x1="406" y1="268" x2="534" y2="268"/>
    </g>
    <!-- clipboard clip -->
    <circle cx="460" cy="37" r="4" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".7"/>
    <rect x="442" y="30" width="36" height="13" rx="4" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5" opacity=".85"/>
  </g>

  <!-- ===== CONTROL BOARD (always visible) ===== -->
  <g id="vbBoardG">
    <rect x="110" y="46" width="390" height="252" rx="14" fill="url(#vbBoardGrad)"/>
    <rect x="110" y="46" width="390" height="252" rx="14" fill="none" stroke="#8fb6e0" stroke-width="2"/>
    <rect x="113.5" y="49.5" width="383" height="245" rx="11" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".16"/>
    <!-- header strip -->
    <line x1="124" y1="78" x2="486" y2="78" stroke="#8fb6e0" stroke-width="1" opacity=".3"/>
    <path d="M130 57 l5 5 -5 5 M139 57 l5 5 -5 5 M148 57 l5 5 -5 5" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".35"/>
    <!-- status lamps: amber = variable not pinned -->
    <g>
      <circle cx="408" cy="62" r="4" fill="#ffc24b" opacity=".3"/><circle cx="408" cy="62" r="4" fill="none" stroke="#b97f1f" stroke-width="1.2" opacity=".8"/>
      <circle cx="426" cy="62" r="4" fill="#ffc24b" opacity=".3"/><circle cx="426" cy="62" r="4" fill="none" stroke="#b97f1f" stroke-width="1.2" opacity=".8"/>
      <circle cx="444" cy="62" r="4" fill="#ffc24b" opacity=".3"/><circle cx="444" cy="62" r="4" fill="none" stroke="#b97f1f" stroke-width="1.2" opacity=".8"/>
      <circle cx="462" cy="62" r="4" fill="#ffc24b" opacity=".3"/><circle cx="462" cy="62" r="4" fill="none" stroke="#b97f1f" stroke-width="1.2" opacity=".8"/>
    </g>
    <!-- corner screws -->
    <g fill="#0c2340" stroke="#8fb6e0" stroke-width="1">
      <circle cx="124" cy="62" r="3.2"/><circle cx="486" cy="62" r="3.2"/>
      <circle cx="124" cy="288" r="3.2"/><circle cx="486" cy="288" r="3.2"/>
    </g>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".7">
      <line x1="121.9" y1="59.9" x2="126.1" y2="64.1"/>
      <line x1="483.9" y1="59.9" x2="488.1" y2="64.1"/>
      <line x1="483.9" y1="285.9" x2="488.1" y2="290.1"/>
      <line x1="121.9" y1="290.1" x2="126.1" y2="285.9"/>
    </g>
    <!-- row separators -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".1">
      <line x1="124" y1="130" x2="486" y2="130"/>
      <line x1="124" y1="182" x2="486" y2="182"/>
      <line x1="124" y1="234" x2="486" y2="234"/>
    </g>
    <!-- empty slider tracks + ticks (board reads complete before rows light up) -->
    <g stroke="#1E66F5" stroke-width="2" opacity=".4" stroke-linecap="round">
      <line x1="255" y1="104" x2="462" y2="104"/>
      <line x1="255" y1="156" x2="462" y2="156"/>
      <line x1="255" y1="208" x2="462" y2="208"/>
      <line x1="255" y1="260" x2="462" y2="260"/>
    </g>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".3">
      <line x1="255" y1="100.5" x2="255" y2="107.5"/><line x1="296.4" y1="100.5" x2="296.4" y2="107.5"/><line x1="337.8" y1="100.5" x2="337.8" y2="107.5"/><line x1="379.2" y1="100.5" x2="379.2" y2="107.5"/><line x1="420.6" y1="100.5" x2="420.6" y2="107.5"/><line x1="462" y1="100.5" x2="462" y2="107.5"/>
      <line x1="255" y1="152.5" x2="255" y2="159.5"/><line x1="296.4" y1="152.5" x2="296.4" y2="159.5"/><line x1="337.8" y1="152.5" x2="337.8" y2="159.5"/><line x1="379.2" y1="152.5" x2="379.2" y2="159.5"/><line x1="420.6" y1="152.5" x2="420.6" y2="159.5"/><line x1="462" y1="152.5" x2="462" y2="159.5"/>
      <line x1="255" y1="204.5" x2="255" y2="211.5"/><line x1="296.4" y1="204.5" x2="296.4" y2="211.5"/><line x1="337.8" y1="204.5" x2="337.8" y2="211.5"/><line x1="379.2" y1="204.5" x2="379.2" y2="211.5"/><line x1="420.6" y1="204.5" x2="420.6" y2="211.5"/><line x1="462" y1="204.5" x2="462" y2="211.5"/>
      <line x1="255" y1="256.5" x2="255" y2="263.5"/><line x1="296.4" y1="256.5" x2="296.4" y2="263.5"/><line x1="337.8" y1="256.5" x2="337.8" y2="263.5"/><line x1="379.2" y1="256.5" x2="379.2" y2="263.5"/><line x1="420.6" y1="256.5" x2="420.6" y2="263.5"/><line x1="462" y1="256.5" x2="462" y2="263.5"/>
    </g>
    <!-- row icons + labels (engraved on the board from the start) -->
    <g fill="none" stroke="#7fd8ff" stroke-width="1.2" opacity=".85">
      <circle cx="152" cy="104" r="3"/>
      <path d="M152 97 V99.4 M152 108.6 V111 M145 104 H147.4 M156.6 104 H159 M147.1 99.1 l1.7 1.7 M155.2 107.2 l1.7 1.7 M156.9 99.1 l-1.7 1.7 M148.8 107.2 l-1.7 1.7"/>
      <rect x="146.5" y="150.5" width="11" height="11"/>
      <path d="M146.5 154.5 l4 -4 M146.5 159.5 l9 -9 M150.5 161.5 l7 -7 M155.5 161.5 l2 -2"/>
      <path d="M146.5 203 H157.5 V208 H146.5 V213 H154.5"/>
      <path d="M152 210.8 l2.5 2.2 -2.5 2.2"/>
      <circle cx="152" cy="255.5" r="2.8"/>
      <path d="M146 266 Q146.5 260.3 152 260.3 Q157.5 260.3 158 266"/>
    </g>
    <g font-size="13" letter-spacing="1" fill="#9fe6ff">
      <text x="166" y="108.5">LIGHT</text>
      <text x="166" y="160.5">SURFACE</text>
      <text x="166" y="212.5">SCAN</text>
      <text x="166" y="264.5">HUMAN</text>
    </g>
  </g>

  <!-- ===== ROW 1: LIGHT ===== -->
  <g id="vbRowLight" opacity="0">
    <line x1="255" y1="104" x2="404" y2="104" stroke="url(#vbFillGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#vbGlowSoft)"/>
    <rect x="397.5" y="93" width="13" height="22" rx="3" fill="url(#vbKnobGrad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="400" y1="104" x2="408" y2="104" stroke="#5fe0ff" stroke-width="1.5"/>
  </g>

  <!-- ===== ROW 2: SURFACE ===== -->
  <g id="vbRowSurface" opacity="0">
    <line x1="255" y1="156" x2="342" y2="156" stroke="url(#vbFillGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#vbGlowSoft)"/>
    <rect x="335.5" y="145" width="13" height="22" rx="3" fill="url(#vbKnobGrad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="338" y1="156" x2="346" y2="156" stroke="#5fe0ff" stroke-width="1.5"/>
  </g>

  <!-- ===== ROW 3: SCAN ===== -->
  <g id="vbRowScan" opacity="0">
    <line x1="255" y1="208" x2="379" y2="208" stroke="url(#vbFillGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#vbGlowSoft)"/>
    <rect x="372.5" y="197" width="13" height="22" rx="3" fill="url(#vbKnobGrad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="375" y1="208" x2="383" y2="208" stroke="#5fe0ff" stroke-width="1.5"/>
  </g>

  <!-- ===== ROW 4: HUMAN ===== -->
  <g id="vbRowHuman" opacity="0">
    <line x1="255" y1="260" x2="317" y2="260" stroke="url(#vbFillGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#vbGlowSoft)"/>
    <rect x="310.5" y="249" width="13" height="22" rx="3" fill="url(#vbKnobGrad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="313" y1="260" x2="321" y2="260" stroke="#5fe0ff" stroke-width="1.5"/>
  </g>

  <!-- ===== GHOST KNOBS: the second inspector's drifted settings ===== -->
  <g id="vbGhosts" opacity="0">
    <g fill="none" stroke="#8fb6e0" stroke-width="1.3" stroke-dasharray="3 3" opacity=".7">
      <rect x="320.5" y="93" width="13" height="22" rx="3"/>
      <rect x="407.5" y="145" width="13" height="22" rx="3"/>
      <rect x="300.5" y="197" width="13" height="22" rx="3"/>
      <rect x="426.5" y="249" width="13" height="22" rx="3"/>
    </g>
  </g>

  <!-- ===== LOCK-PINS clamping each knob + lamp flips cyan ===== -->
  <g id="vbPinLight" opacity="0">
    <rect x="395" y="90" width="18" height="28" rx="5" fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vbGlowSoft)" opacity=".9"/>
    <path d="M399.5 99 v-4.5 a4.5 4.5 0 0 1 9 0 V99" fill="none" stroke="#5fe0ff" stroke-width="1.8" filter="url(#vbGlowSoft)"/>
    <rect x="396" y="99" width="16" height="13" rx="2.5" fill="#14304f" stroke="#5fe0ff" stroke-width="1.5"/>
    <circle cx="404" cy="104" r="1.6" fill="#5fe0ff"/><line x1="404" y1="105" x2="404" y2="108.5" stroke="#5fe0ff" stroke-width="1.4"/>
    <circle cx="408" cy="62" r="4" fill="#5fe0ff" filter="url(#vbGlowSoft)"/>
  </g>
  <g id="vbPinSurface" opacity="0">
    <rect x="333" y="142" width="18" height="28" rx="5" fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vbGlowSoft)" opacity=".9"/>
    <path d="M337.5 151 v-4.5 a4.5 4.5 0 0 1 9 0 V151" fill="none" stroke="#5fe0ff" stroke-width="1.8" filter="url(#vbGlowSoft)"/>
    <rect x="334" y="151" width="16" height="13" rx="2.5" fill="#14304f" stroke="#5fe0ff" stroke-width="1.5"/>
    <circle cx="342" cy="156" r="1.6" fill="#5fe0ff"/><line x1="342" y1="157" x2="342" y2="160.5" stroke="#5fe0ff" stroke-width="1.4"/>
    <circle cx="426" cy="62" r="4" fill="#5fe0ff" filter="url(#vbGlowSoft)"/>
  </g>
  <g id="vbPinScan" opacity="0">
    <rect x="370" y="194" width="18" height="28" rx="5" fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vbGlowSoft)" opacity=".9"/>
    <path d="M374.5 203 v-4.5 a4.5 4.5 0 0 1 9 0 V203" fill="none" stroke="#5fe0ff" stroke-width="1.8" filter="url(#vbGlowSoft)"/>
    <rect x="371" y="203" width="16" height="13" rx="2.5" fill="#14304f" stroke="#5fe0ff" stroke-width="1.5"/>
    <circle cx="379" cy="208" r="1.6" fill="#5fe0ff"/><line x1="379" y1="209" x2="379" y2="212.5" stroke="#5fe0ff" stroke-width="1.4"/>
    <circle cx="444" cy="62" r="4" fill="#5fe0ff" filter="url(#vbGlowSoft)"/>
  </g>
  <g id="vbPinHuman" opacity="0">
    <rect x="308" y="246" width="18" height="28" rx="5" fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vbGlowSoft)" opacity=".9"/>
    <path d="M312.5 255 v-4.5 a4.5 4.5 0 0 1 9 0 V255" fill="none" stroke="#5fe0ff" stroke-width="1.8" filter="url(#vbGlowSoft)"/>
    <rect x="309" y="255" width="16" height="13" rx="2.5" fill="#14304f" stroke="#5fe0ff" stroke-width="1.5"/>
    <circle cx="317" cy="260" r="1.6" fill="#5fe0ff"/><line x1="317" y1="261" x2="317" y2="264.5" stroke="#5fe0ff" stroke-width="1.4"/>
    <circle cx="462" cy="62" r="4" fill="#5fe0ff" filter="url(#vbGlowSoft)"/>
  </g>
</svg>
