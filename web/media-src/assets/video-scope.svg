<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="vsglowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="593" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vsglowR" filterUnits="userSpaceOnUse" x="0" y="-43" width="557" height="376">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vssteel" x1="0" y1="86" x2="0" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c5a88"/><stop offset=".3" stop-color="#16365c"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="vsbodyGrad" x1="40" y1="84" x2="172" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4570"/><stop offset=".55" stop-color="#14304f"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="vsscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
    <radialGradient id="vsliveBg" cx=".45" cy=".45" r=".75">
      <stop offset="0" stop-color="#15497c"/><stop offset=".7" stop-color="#0b2a4d"/><stop offset="1" stop-color="#051528"/>
    </radialGradient>
    <clipPath id="vsclipBody"><rect x="320" y="86" width="252" height="210" rx="10"/></clipPath>
    <clipPath id="vsclipScreen"><rect x="57" y="101" width="98" height="68" rx="3"/></clipPath>
  </defs>

  <!-- ===================== COMPONENT CUTAWAY (right) ===================== -->
  <rect x="320" y="86" width="252" height="210" rx="10" fill="url(#vssteel)" stroke="#8fb6e0" stroke-width="2"/>
  <!-- section hatching = cut face -->
  <g clip-path="url(#vsclipBody)" stroke="#8fb6e0" stroke-width="1" opacity=".14">
    <path d="M300 110 L340 70 M300 138 L368 70 M300 166 L396 70 M300 194 L424 70 M300 222 L452 70 M300 250 L480 70 M300 278 L508 70 M300 306 L536 70 M328 306 L564 70 M356 306 L592 70 M384 306 L620 70 M412 306 L648 70 M440 306 L676 70 M468 306 L704 70 M496 306 L732 70 M524 306 L760 70 M552 306 L788 70"/>
  </g>
  <!-- internal cavity: curved channel a rigid scope could not follow -->
  <g clip-path="url(#vsclipBody)">
    <path d="M306 154 C 366 122, 420 128, 450 162 C 468 182, 474 212, 470 238" fill="none" stroke="#8fb6e0" stroke-width="55" stroke-linecap="round" opacity=".6"/>
    <path d="M306 154 C 366 122, 420 128, 450 162 C 468 182, 474 212, 470 238" fill="none" stroke="#08152b" stroke-width="50" stroke-linecap="round"/>
  </g>
  <!-- port rim ticks -->
  <g stroke="#7fd8ff" stroke-width="1.5" opacity=".7">
    <path d="M320 126 h7"/><path d="M320 178 h7"/>
  </g>
  <!-- machined details: bolt holes on the cut face -->
  <g fill="#08152b" stroke="#8fb6e0" stroke-width="1.5" opacity=".85">
    <circle cx="546" cy="112" r="7"/>
    <circle cx="546" cy="270" r="7"/>
    <circle cx="352" cy="270" r="7"/>
  </g>
  <!-- flaw on the chamber end wall (target of the inspection) -->
  <path d="M484 250 l9 7 l-3 6 l10 6 l-2 7" fill="none" stroke="#ff6b6b" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#vsglowR)"/>

  <!-- ===================== HANDSET (left) ===================== -->
  <g>
    <rect x="40" y="84" width="132" height="156" rx="14" fill="url(#vsbodyGrad)" stroke="#8fb6e0" stroke-width="2"/>
    <!-- screen bezel + dark screen -->
    <rect x="52" y="96" width="108" height="78" rx="6" fill="#0a1c33" stroke="#8fb6e0" stroke-width="1.2"/>
    <rect x="57" y="101" width="98" height="68" rx="3" fill="#061224"/>
    <g clip-path="url(#vsclipScreen)" stroke="#0d2138" stroke-width="1" opacity=".7">
      <path d="M57 110 h98 M57 122 h98 M57 134 h98 M57 146 h98 M57 158 h98"/>
    </g>
    <!-- controls: joystick + keys -->
    <circle cx="106" cy="206" r="14" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="106" cy="206" r="6.5" fill="#1E66F5" stroke="#7fd8ff" stroke-width="1"/>
    <rect x="58" y="192" width="22" height="10" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="58" y="210" width="22" height="10" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="132" y="192" width="22" height="10" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="132" y="210" width="22" height="10" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <circle cx="64" cy="182" r="2" fill="#5fe0ff" filter="url(#vsglowR)"/>
    <!-- strain-relief boot where tube exits -->
    <path d="M170 198 L192 201 L192 211 L170 214 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
  </g>

  <!-- ===================== FLEXIBLE INSERTION TUBE (draw-on) ===================== -->
  <path id="vsTubeEdge" d="M190 206 C 222 234, 258 234, 284 210 C 302 193, 298 164, 322 148 C 366 124, 420 130, 450 162 C 466 179, 472 210, 477 236" fill="none" stroke="#8fb6e0" stroke-width="13" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <path id="vsTube" d="M190 206 C 222 234, 258 234, 284 210 C 302 193, 298 164, 322 148 C 366 124, 420 130, 450 162 C 466 179, 472 210, 477 236" fill="none" stroke="#14304f" stroke-width="10" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <path id="vsTubeCore" d="M190 206 C 222 234, 258 234, 284 210 C 302 193, 298 164, 322 148 C 366 124, 420 130, 450 162 C 466 179, 472 210, 477 236" fill="none" stroke="#3f9bff" stroke-width="2" stroke-linecap="round" opacity=".55" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <g id="vsTubeLbl" opacity="0" font-size="12">
    <path d="M242 254 L252 232" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <text x="244" y="268" text-anchor="middle" fill="#9fe6ff" opacity=".88">FLEXIBLE INSERTION TUBE</text>
  </g>

  <!-- ===================== DISPLAY LIGHTS UP (fade) ===================== -->
  <g id="vsDisplay" opacity="0">
    <rect x="57" y="101" width="98" height="68" rx="3" fill="url(#vsliveBg)"/>
    <g clip-path="url(#vsclipScreen)">
      <!-- live view: curved cavity wall + the same flaw -->
      <path d="M60 168 C 80 150, 84 122, 70 104" fill="none" stroke="#8fb6e0" stroke-width="1.4" opacity=".5"/>
      <path d="M70 170 C 92 152, 96 120, 80 102" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".3"/>
      <ellipse cx="108" cy="138" rx="40" ry="26" fill="#7fd8ff" opacity=".08"/>
      <path d="M96 130 l6 5 l-2 5 l7 4" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- cursor-to-cursor measurement overlay -->
      <g stroke="#5fe0ff" stroke-width="1.3">
        <path d="M91 125 v8 M87 129 h8"/>
        <path d="M109 147 v8 M105 151 h8"/>
        <path d="M93 131 L107 149" stroke-dasharray="3 2" opacity=".85"/>
      </g>
      <text x="61" y="164" font-size="11" fill="#9fe6ff">4.6 mm</text>
      <!-- REC indicator -->
      <circle cx="123" cy="111" r="3.2" fill="#ff6b6b" filter="url(#vsglowR)"/>
      <text x="130" y="115" font-size="11" fill="#ff6b6b">REC</text>
    </g>
    <rect x="57" y="101" width="98" height="68" rx="3" fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".8" filter="url(#vsglowR)"/>
  </g>
  <circle id="vsPing" cx="492" cy="262" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#vsglowR)"/>

  <!-- ===================== TIP DETAIL CALLOUT (fade) ===================== -->
  <g id="vsTipSensor" opacity="0">
    <!-- the physical tip: ferrule + LED illumination cone toward flaw -->
    <path d="M477 238 L494 254 L484 264 Z" fill="#ffc24b" opacity=".16"/>
    <circle cx="477" cy="236" r="7" fill="#14304f" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vsglowR)"/>
    <circle cx="479" cy="238" r="2" fill="#5fe0ff"/>
    <circle cx="477" cy="236" r="12" fill="none" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 3" opacity=".7"/>
    <!-- leader to magnified view -->
    <path d="M468 227 L317 90" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="4 4" opacity=".5" fill="none"/>
    <!-- magnifier circle -->
    <circle cx="272" cy="62" r="48" fill="#0a1c33" fill-opacity=".93" stroke="#5fe0ff" stroke-width="1.5" filter="url(#vsglowR)"/>
    <!-- enlarged tip, side view: flex tube stub, housing, CMOS chip, lens stack, LEDs -->
    <rect x="230" y="54" width="14" height="18" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="244" y="48" width="50" height="30" rx="4" fill="#14304f" stroke="#8fb6e0" stroke-width="1.4"/>
    <!-- signal wires from chip back down the tube -->
    <path d="M258 60 h-26 M258 66 h-26" stroke="#3f9bff" stroke-width="1" opacity=".7"/>
    <!-- CMOS sensor chip -->
    <rect x="258" y="52" width="16" height="22" fill="#0e2848" stroke="#7fd8ff" stroke-width="1.2"/>
    <rect x="261" y="56" width="10" height="14" fill="#1E66F5"/>
    <!-- objective lens stack -->
    <ellipse cx="282" cy="63" rx="2.6" ry="9" fill="#5fe0ff" opacity=".9"/>
    <ellipse cx="288" cy="63" rx="2.4" ry="7" fill="#5fe0ff" opacity=".55"/>
    <!-- LED illuminators on the face -->
    <circle cx="293" cy="51" r="3" fill="#ffc24b" filter="url(#vsglowR)"/>
    <circle cx="293" cy="75" r="3" fill="#ffc24b" filter="url(#vsglowR)"/>
    <!-- field of view -->
    <path d="M291 60 L312 48 M291 66 L312 78" stroke="#7fd8ff" stroke-width="1" stroke-dasharray="3 2" opacity=".55"/>
    <!-- labels -->
    <path d="M266 76 L266 88" stroke="#7fd8ff" stroke-width="1" opacity=".6"/>
    <text x="266" y="100" text-anchor="middle" font-size="11" fill="#9fe6ff">CMOS</text>
    <path d="M295 48 L301 38" stroke="#ffc24b" stroke-width="1" opacity=".6"/>
    <text x="304" y="34" font-size="11" fill="#ffc24b">LED</text>
    <text x="272" y="24" text-anchor="middle" font-size="11" fill="#9fe6ff">SENSOR AT TIP</text>
  </g>

  <!-- ===================== SIGNAL PULSE tip -> handset (draw-on) ===================== -->
  <path id="vsSignal" d="M477 236 C 472 210, 466 179, 450 162 C 420 130, 366 124, 322 148 C 298 164, 302 193, 284 210 C 258 234, 222 234, 190 206 C 168 188, 130 182, 110 172" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linecap="round" filter="url(#vsglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===================== scan group ===================== -->
  <g id="vsscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#vsscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#vsglowC)" opacity=".9"/>
  </g>
</svg>
