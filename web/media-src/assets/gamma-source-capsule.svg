<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="gscGlow" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gscGlowS" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gscSteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ea3d6"/><stop offset=".45" stop-color="#35648f"/><stop offset="1" stop-color="#1b3f66"/>
    </linearGradient>
    <linearGradient id="gscSteelIn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccbe8"/><stop offset=".5" stop-color="#4a7bab"/><stop offset="1" stop-color="#27507e"/>
    </linearGradient>
    <linearGradient id="gscSteelD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d6ea3"/><stop offset=".5" stop-color="#234a77"/><stop offset="1" stop-color="#142f54"/>
    </linearGradient>
    <radialGradient id="gscPelletG" cx=".5" cy=".35" r=".9">
      <stop offset="0" stop-color="#eaf6ff"/><stop offset=".45" stop-color="#9feaff"/><stop offset="1" stop-color="#2f9fd8"/>
    </radialGradient>
    <radialGradient id="gscCoreGlow">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".5"/><stop offset=".6" stop-color="#5fe0ff" stop-opacity=".18"/><stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gscHatch" patternUnits="userSpaceOnUse" width="7" height="7">
      <path d="M0 7 L7 0" stroke="#9fe6ff" stroke-width=".8" stroke-opacity=".3" fill="none"/>
    </pattern>
  </defs>

  <!-- ===== static: section centerline (dash-dot) ===== -->
  <path d="M36 170 H582" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="11 4 2 4" opacity=".26" fill="none"/>

  <!-- ===== static ghost silhouette so the panel is never empty ===== -->
  <g id="gscShell" fill="none" stroke="#8fb6e0" stroke-linejoin="round">
    <path d="M98 132 H272 A38 38 0 0 1 310 170 A38 38 0 0 1 272 208 H98 A38 38 0 0 1 60 170 A38 38 0 0 1 98 132 Z" fill="rgba(95,224,255,.04)" opacity=".25" stroke-width="1.5"/>
    <rect x="306" y="156" width="28" height="28" rx="5" opacity=".22" stroke-width="1.5"/>
    <path d="M334 170 C366 170 380 186 410 186 C444 186 454 156 484 156 C498 156 506 162 510 170" stroke-width="15" opacity=".1"/>
    <path d="M334 170 C366 170 380 186 410 186 C444 186 454 156 484 156 C498 156 506 162 510 170" stroke-width="1" stroke-dasharray="3 5" opacity=".25"/>
    <g opacity=".22" stroke-width="1.5">
      <rect x="508" y="162" width="16" height="16" rx="2"/>
      <rect x="524" y="160" width="18" height="20" rx="3"/>
      <rect x="542" y="165" width="10" height="10"/>
      <rect x="552" y="157" width="24" height="26" rx="9"/>
    </g>
  </g>

  <!-- ===== OUTER CAPSULE (fade 4.0) ===== -->
  <g id="gscOuterWall" opacity="0">
    <!-- evacuated gap between the two capsules -->
    <path fill-rule="evenodd" fill="rgba(8,20,40,.45)" d="M98 141 H272 A29 29 0 0 1 301 170 A29 29 0 0 1 272 199 H98 A29 29 0 0 1 69 170 A29 29 0 0 1 98 141 Z
             M100 146 H262 A24 24 0 0 1 286 170 A24 24 0 0 1 262 194 H100 A24 24 0 0 1 76 170 A24 24 0 0 1 100 146 Z"/>
    <!-- outer wall band: section fill + hatch -->
    <path id="gscOuterBand" fill-rule="evenodd" fill="url(#gscSteel)" d="M98 132 H272 A38 38 0 0 1 310 170 A38 38 0 0 1 272 208 H98 A38 38 0 0 1 60 170 A38 38 0 0 1 98 132 Z
             M98 141 H272 A29 29 0 0 1 301 170 A29 29 0 0 1 272 199 H98 A29 29 0 0 1 69 170 A29 29 0 0 1 98 141 Z"/>
    <path fill-rule="evenodd" fill="url(#gscHatch)" d="M98 132 H272 A38 38 0 0 1 310 170 A38 38 0 0 1 272 208 H98 A38 38 0 0 1 60 170 A38 38 0 0 1 98 132 Z
             M98 141 H272 A29 29 0 0 1 301 170 A29 29 0 0 1 272 199 H98 A29 29 0 0 1 69 170 A29 29 0 0 1 98 141 Z"/>
    <path d="M98 132 H272 A38 38 0 0 1 310 170 A38 38 0 0 1 272 208 H98 A38 38 0 0 1 60 170 A38 38 0 0 1 98 132 Z" fill="none" stroke="#9fe6ff" stroke-width="2" stroke-linejoin="round"/>
    <path d="M98 141 H272 A29 29 0 0 1 301 170 A29 29 0 0 1 272 199 H98 A29 29 0 0 1 69 170 A29 29 0 0 1 98 141 Z" fill="none" stroke="#9fe6ff" stroke-width="1.1" opacity=".75"/>
    <!-- outer closure weld: only the slivers not hidden by the inner capsule -->
    <g stroke="#eaf6ff" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#gscGlowS)" opacity=".95">
      <path d="M98 131 q7 3.8 0 7.6 q-7 3.8 0 7.6"/>
      <path d="M98 193.5 q7 3.8 0 7.6 q-7 3.8 0 7.6"/>
    </g>
    <!-- shell etch -->
    <rect x="156" y="198.5" width="108" height="9.5" rx="2" fill="#0A1E3C" opacity=".85"/>
    <text x="210" y="206.4" text-anchor="middle" font-size="8" letter-spacing="2" fill="#eaf6ff" opacity=".8">SEALED SOURCE</text>
    <!-- dimension -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".6" fill="none">
      <path d="M60 218 V232 M310 218 V232"/>
      <path d="M60 226 H310"/>
      <path d="M60 226 l9 -3.2 M60 226 l9 3.2 M310 226 l-9 -3.2 M310 226 l-9 3.2"/>
    </g>
    <text x="320" y="229.5" font-size="9" letter-spacing="1" fill="#8fb6e0" opacity=".75">&#8776; 20 MM</text>
    <!-- label -->
    <text x="30" y="284" font-size="12" letter-spacing="1" fill="#9fe6ff">OUTER CAPSULE &#8212; WELDED</text>
    <g stroke="#9fe6ff" stroke-width=".9" opacity=".55" fill="none">
      <path d="M118 272 L99 210"/>
    </g>
    <circle cx="98" cy="206" r="2" fill="#9fe6ff" opacity=".9"/>
  </g>

  <!-- ===== INNER CAPSULE (fade 2.1) ===== -->
  <g id="gscInnerWall" opacity="0">
    <!-- cavity -->
    <path fill="rgba(10,30,60,.55)" d="M100 153 H262 A17 17 0 0 1 279 170 A17 17 0 0 1 262 187 H100 A17 17 0 0 1 83 170 A17 17 0 0 1 100 153 Z"/>
    <!-- inner wall band -->
    <path fill-rule="evenodd" fill="url(#gscSteelIn)" d="M100 146 H262 A24 24 0 0 1 286 170 A24 24 0 0 1 262 194 H100 A24 24 0 0 1 76 170 A24 24 0 0 1 100 146 Z
             M100 153 H262 A17 17 0 0 1 279 170 A17 17 0 0 1 262 187 H100 A17 17 0 0 1 83 170 A17 17 0 0 1 100 153 Z"/>
    <path fill-rule="evenodd" fill="url(#gscHatch)" d="M100 146 H262 A24 24 0 0 1 286 170 A24 24 0 0 1 262 194 H100 A24 24 0 0 1 76 170 A24 24 0 0 1 100 146 Z
             M100 153 H262 A17 17 0 0 1 279 170 A17 17 0 0 1 262 187 H100 A17 17 0 0 1 83 170 A17 17 0 0 1 100 153 Z"/>
    <path d="M100 146 H262 A24 24 0 0 1 286 170 A24 24 0 0 1 262 194 H100 A24 24 0 0 1 76 170 A24 24 0 0 1 100 146 Z" fill="none" stroke="#9fe6ff" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M100 153 H262 A17 17 0 0 1 279 170 A17 17 0 0 1 262 187 H100 A17 17 0 0 1 83 170 A17 17 0 0 1 100 153 Z" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".7"/>
    <!-- inner closure weld bead (rear surface seen through cutaway) -->
    <path d="M262 146 q7 6 0 12 q-7 6 0 12 q7 6 0 12 q-7 6 0 12" stroke="#eaf6ff" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#gscGlowS)" opacity=".9"/>
    <!-- label -->
    <text x="582" y="26" text-anchor="end" font-size="12" letter-spacing="1" fill="#9fe6ff">INNER CAPSULE &#8212; WELDED 316 SS</text>
    <path d="M475 32 L263 140" stroke="#9fe6ff" stroke-width=".9" opacity=".55" fill="none"/>
    <circle cx="262" cy="142" r="2" fill="#9fe6ff" opacity=".9"/>
  </g>

  <!-- ===== PELLET STACK (fade 0.6) ===== -->
  <g id="gscPellet" opacity="0">
    <ellipse cx="164" cy="170" rx="62" ry="24" fill="url(#gscCoreGlow)"/>
    <g id="gscPellets" filter="url(#gscGlow)">
      <g fill="url(#gscPelletG)" stroke="#9fe6ff" stroke-width=".9">
        <rect x="116" y="155" width="9" height="30" rx="1.5"/>
        <rect x="127" y="155" width="9" height="30" rx="1.5"/>
        <rect x="138" y="155" width="9" height="30" rx="1.5"/>
        <rect x="149" y="155" width="9" height="30" rx="1.5"/>
        <rect x="160" y="155" width="9" height="30" rx="1.5"/>
        <rect x="171" y="155" width="9" height="30" rx="1.5"/>
        <rect x="182" y="155" width="9" height="30" rx="1.5"/>
        <rect x="193" y="155" width="9" height="30" rx="1.5"/>
        <rect x="204" y="155" width="9" height="30" rx="1.5"/>
      </g>
    </g>
    <text x="30" y="26" font-size="12" letter-spacing="1" fill="#9fe6ff">IR-192 PELLET STACK</text>
    <text x="30" y="40" font-size="9" letter-spacing=".8" fill="#9fe6ff" opacity=".6">&#216;2.7 &#215; 0.5 MM FOIL DISCS</text>
    <path d="M50 48 L130 149" stroke="#9fe6ff" stroke-width=".9" opacity=".55" fill="none"/>
    <circle cx="130" cy="152" r="2" fill="#9fe6ff" opacity=".9"/>
  </g>

  <!-- ===== DECAY SPARKS + GAMMA TRACES (draw 1.3) ===== -->
  <g id="gscDecay" stroke="#5fe0ff" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".85"
     filter="url(#gscGlowS)" stroke-dasharray="100" stroke-dashoffset="100">
    <circle cx="132" cy="163" r="2.6" pathLength="100"/>
    <path d="M132 163 L78 108" pathLength="100"/>
    <path d="M132 163 L48 157" pathLength="100"/>
    <circle cx="166" cy="174" r="2.6" pathLength="100"/>
    <path d="M166 174 L176 92" pathLength="100"/>
    <path d="M166 174 L326 200" pathLength="100"/>
    <circle cx="196" cy="161" r="2.6" pathLength="100"/>
    <path d="M196 161 L250 106" pathLength="100"/>
    <path d="M196 161 L288 92" pathLength="100"/>
  </g>

  <!-- ===== PIGTAIL: termination, flex cable, end connector (fade 5.5) ===== -->
  <g id="gscPigtail" opacity="0">
    <!-- flexible cable -->
    <path d="M334 170 C366 170 380 186 410 186 C444 186 454 156 484 156 C498 156 506 162 510 170" fill="none" stroke="#9fe6ff" stroke-width="15" opacity=".5"/>
    <path d="M334 170 C366 170 380 186 410 186 C444 186 454 156 484 156 C498 156 506 162 510 170" fill="none" stroke="url(#gscSteelD)" stroke-width="12"/>
    <path d="M334 170 C366 170 380 186 410 186 C444 186 454 156 484 156 C498 156 506 162 510 170" fill="none" stroke="#5fe0ff" stroke-width="9" opacity=".3" stroke-dasharray="3 4.6"/>
    <!-- swaged termination collar on the capsule -->
    <rect x="306" y="156" width="28" height="28" rx="5" fill="url(#gscSteelD)" stroke="#9fe6ff" stroke-width="1.5"/>
    <path d="M315 158 V182 M323 158 V182" stroke="#0A1E3C" stroke-width="1.2" opacity=".8" fill="none"/>
    <!-- end connector (male, locks into drive cable) -->
    <g stroke="#9fe6ff" stroke-width="1.5">
      <rect x="508" y="162" width="16" height="16" rx="2" fill="url(#gscSteelD)"/>
      <rect x="524" y="160" width="18" height="20" rx="3" fill="url(#gscSteel)"/>
      <rect x="542" y="165" width="10" height="10" fill="url(#gscSteelD)"/>
      <rect x="552" y="157" width="24" height="26" rx="9" fill="url(#gscSteel)"/>
    </g>
    <path d="M558 160 V180 M564 159 V181" stroke="#0A1E3C" stroke-width="1" opacity=".5" fill="none"/>
    <!-- labels -->
    <text x="430" y="124" text-anchor="middle" font-size="12" letter-spacing="2" fill="#9fe6ff">PIGTAIL</text>
    <text x="430" y="138" text-anchor="middle" font-size="9" letter-spacing=".8" fill="#9fe6ff" opacity=".6">FLEXIBLE CABLE</text>
    <path d="M430 144 L421 174" stroke="#9fe6ff" stroke-width=".9" opacity=".55" fill="none"/>
    <circle cx="420" cy="176" r="2" fill="#9fe6ff" opacity=".9"/>
    <text x="548" y="134" text-anchor="middle" font-size="10" letter-spacing="1" fill="#9fe6ff" opacity=".85">CONNECTOR</text>
    <path d="M548 138 L548 154" stroke="#9fe6ff" stroke-width=".9" opacity=".55" fill="none"/>
    <circle cx="548" cy="156" r="2" fill="#9fe6ff" opacity=".9"/>
  </g>

  <!-- ===== GRAB POINT + NO-TOUCH CUE (fade 6.9) ===== -->
  <g id="gscGrabPoint" opacity="0">
    <g fill="none" stroke="#5fe0ff" filter="url(#gscGlow)">
      <rect x="500" y="148" width="84" height="44" rx="16" stroke-width="1.5" stroke-dasharray="5 4"/>
      <rect x="494" y="142" width="96" height="56" rx="20" stroke-width="1" opacity=".35"/>
    </g>
    <text x="542" y="214" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#5fe0ff" filter="url(#gscGlowS)">HANDLE HERE</text>
    <!-- never-touch cue on the capsule -->
    <circle cx="118" cy="210" r="11" fill="rgba(10,30,60,.85)" stroke="#5fe0ff" stroke-width="1.5" filter="url(#gscGlowS)"/>
    <path d="M112.5 204.5 L123.5 215.5 M123.5 204.5 L112.5 215.5" stroke="#eaf6ff" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <text x="118" y="246" text-anchor="middle" font-size="10" letter-spacing="1" fill="#9fe6ff" opacity=".85">NEVER HANDLE</text>
  </g>

  <!-- ===== static corner captions ===== -->
  <text x="16" y="330" font-size="11" letter-spacing="1" fill="#9fe6ff" opacity=".65">IR-192 SOURCE ASSEMBLY &#183; ENLARGED</text>
  <text x="584" y="330" text-anchor="end" font-size="11" letter-spacing="1" fill="#9fe6ff" opacity=".55">DOUBLE ENCAPSULATION &#183; SPECIAL FORM</text>
</svg>
