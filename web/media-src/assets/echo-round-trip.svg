<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="ertGlowC" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ertGlowT" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ertSteel" x1="0" y1="92" x2="0" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".38" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="ertProbeG" x1="0" y1="52" x2="0" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".5" stop-color="#16334f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="ertBezelG" x1="0" y1="62" x2="0" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30608f"/><stop offset=".55" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="ertCardG" x1="0" y1="214" x2="0" y2="294" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a3a5f"/><stop offset=".4" stop-color="#122c4b"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
  </defs>

  <!-- ===================== LEFT: STEEL WALL CROSS-SECTION ===================== -->
  <!-- slab -->
  <rect x="104" y="92" width="136" height="186" fill="url(#ertSteel)"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".15">
    <line x1="108" y1="110" x2="236" y2="110"/><line x1="108" y1="128" x2="236" y2="128"/>
    <line x1="108" y1="146" x2="236" y2="146"/><line x1="108" y1="164" x2="236" y2="164"/>
    <line x1="108" y1="182" x2="236" y2="182"/><line x1="108" y1="200" x2="236" y2="200"/>
    <line x1="108" y1="218" x2="236" y2="218"/><line x1="108" y1="236" x2="236" y2="236"/>
    <line x1="108" y1="254" x2="236" y2="254"/>
  </g>

  <!-- round-trip pulse path (draw-on) -->
  <path id="ertDown" d="M160 96 V270" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" filter="url(#ertGlowT)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <path id="ertBack" d="M160 270 Q172 277.5 184 270 V96" fill="none" stroke="#7fd8ff" stroke-width="2" stroke-linecap="round" filter="url(#ertGlowT)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- slab outline -->
  <line x1="104" y1="92" x2="240" y2="92" stroke="#8fb6e0" stroke-width="2"/>
  <line x1="104" y1="278" x2="240" y2="278" stroke="#8fb6e0" stroke-width="2"/>
  <g stroke="#8fb6e0" stroke-width="1.5" opacity=".5">
    <line x1="104" y1="92" x2="104" y2="278"/><line x1="240" y1="92" x2="240" y2="278"/>
  </g>
  <text x="112" y="265" font-size="11" fill="#9fe6ff" opacity=".75">BACK WALL</text>

  <!-- probe coupled on top face -->
  <path d="M172 44 C172 30 150 24 116 12" fill="none" stroke="#0e2848" stroke-width="3.5" opacity=".9"/>
  <path d="M172 44 C172 30 150 24 116 12" fill="none" stroke="#8fb6e0" stroke-width="1.6" opacity=".75"/>
  <rect x="166" y="44" width="12" height="9" rx="2" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
  <rect x="148" y="52" width="48" height="34" rx="4" fill="url(#ertProbeG)" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="154" y1="62" x2="190" y2="62" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
  <rect x="150" y="86" width="44" height="5" fill="#0e2848"/>
  <line x1="172" y1="86" x2="172" y2="91" stroke="#08152b" stroke-width="1.4"/>
  <line x1="146" y1="91.4" x2="198" y2="91.4" stroke="#5fe0ff" stroke-width="1.6" opacity=".5"/>
  <text x="202" y="62" font-size="11" fill="#9fe6ff" opacity=".8">PROBE</text>

  <!-- depth bracket: T = ? -->
  <g stroke="#5fe0ff" fill="none" opacity=".8">
    <line x1="104" y1="92" x2="62" y2="92" stroke-width="1" opacity=".45"/>
    <line x1="104" y1="278" x2="62" y2="278" stroke-width="1" opacity=".45"/>
    <line x1="70" y1="100" x2="70" y2="270" stroke-width="1.2"/>
  </g>
  <path d="M70 92.5 L66.8 101 L73.2 101 Z" fill="#5fe0ff" opacity=".8"/>
  <path d="M70 277.5 L66.8 269 L73.2 269 Z" fill="#5fe0ff" opacity=".8"/>
  <rect x="38" y="176" width="64" height="20" rx="4" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" stroke-opacity=".5"/>
  <text x="70" y="190" text-anchor="middle" font-size="12" fill="#9fe6ff">T = ?</text>

  <!-- material tag beside slab -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".35">
    <line x1="246" y1="138" x2="246" y2="168"/>
    <line x1="240" y1="138" x2="246" y2="138"/><line x1="240" y1="168" x2="246" y2="168"/>
  </g>
  <text x="252" y="148" font-size="11" fill="#9fe6ff" opacity=".85">STEEL</text>
  <text x="252" y="164" font-size="11" fill="#5fe0ff" opacity=".9">5.92 mm/µs</text>

  <!-- DOWN / BACK leg labels -->
  <g id="ertDownLbl" opacity="0">
    <text x="118" y="176" font-size="11" fill="#9fe6ff">DOWN</text>
    <g fill="none" stroke="#5fe0ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".85">
      <path d="M153 140 L160 147 L167 140"/>
      <path d="M153 215 L160 222 L167 215"/>
    </g>
  </g>
  <g id="ertBackLbl" opacity="0">
    <text x="196" y="176" font-size="11" fill="#9fe6ff">BACK</text>
    <g fill="none" stroke="#7fd8ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".85">
      <path d="M177 152 L184 145 L191 152"/>
      <path d="M177 227 L184 220 L191 227"/>
    </g>
    <path d="M184 94 L179.5 103 L188.5 103 Z" fill="#7fd8ff" opacity=".9"/>
  </g>
  <circle id="ertPingBW" cx="172" cy="276" r="6" fill="none" stroke="#7fd8ff" stroke-width="2" opacity="0" filter="url(#ertGlowT)"/>
  <circle id="ertPingRx" cx="184" cy="94" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#ertGlowT)"/>

  <!-- ===================== RIGHT: STOPWATCH ===================== -->
  <!-- crown + pusher -->
  <rect x="426" y="54" width="8" height="9" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
  <rect x="421" y="44" width="18" height="10" rx="3" fill="url(#ertProbeG)" stroke="#8fb6e0" stroke-width="1.2"/>
  <g transform="rotate(36 430 116)">
    <rect x="425.5" y="50" width="9" height="12" rx="2" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
  </g>
  <!-- body + face -->
  <circle cx="430" cy="116" r="54" fill="url(#ertBezelG)" stroke="#8fb6e0" stroke-width="1.5"/>
  <circle cx="430" cy="116" r="47" fill="#050f1f" stroke="#8fb6e0" stroke-width="1" opacity=".95"/>
  <!-- major ticks (1 µs each, 10 µs full scale) -->
  <g stroke="#8fb6e0" stroke-width="1.5" opacity=".7">
    <line x1="430" y1="76" x2="430" y2="70"/>
    <line x1="453.5" y1="83.6" x2="457.0" y2="78.8"/>
    <line x1="468.0" y1="103.6" x2="473.7" y2="101.8"/>
    <line x1="468.0" y1="128.4" x2="473.7" y2="130.2"/>
    <line x1="453.5" y1="148.4" x2="457.0" y2="153.2"/>
    <line x1="430" y1="156" x2="430" y2="162"/>
    <line x1="406.5" y1="148.4" x2="403.0" y2="153.2"/>
    <line x1="392.0" y1="128.4" x2="386.3" y2="130.2"/>
    <line x1="392.0" y1="103.6" x2="386.3" y2="101.8"/>
    <line x1="406.5" y1="83.6" x2="403.0" y2="78.8"/>
  </g>
  <!-- minor ticks -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".3">
    <line x1="443.3" y1="75.1" x2="444.2" y2="72.3"/>
    <line x1="464.8" y1="90.7" x2="467.2" y2="89.0"/>
    <line x1="473" y1="116" x2="476" y2="116"/>
    <line x1="464.8" y1="141.3" x2="467.2" y2="143.0"/>
    <line x1="443.3" y1="156.9" x2="444.2" y2="159.7"/>
    <line x1="416.7" y1="156.9" x2="415.8" y2="159.7"/>
    <line x1="395.2" y1="141.3" x2="392.8" y2="143.0"/>
    <line x1="387" y1="116" x2="384" y2="116"/>
    <line x1="395.2" y1="90.7" x2="392.8" y2="89.0"/>
    <line x1="416.7" y1="75.1" x2="415.8" y2="72.3"/>
  </g>
  <!-- dial numerals (µs) -->
  <g font-size="11" fill="#9fe6ff" opacity=".75" text-anchor="middle">
    <text x="430" y="88">0</text>
    <text x="460.4" y="110">2</text>
    <text x="448.8" y="146">4</text>
    <text x="411.2" y="146">6</text>
    <text x="399.6" y="110">8</text>
  </g>
  <text x="430" y="140" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".6">µs</text>
  <!-- zero hand -->
  <line x1="430" y1="116" x2="430" y2="96" stroke="#8fb6e0" stroke-width="2" opacity=".5"/>
  <circle cx="430" cy="116" r="4.5" fill="#16334f" stroke="#8fb6e0" stroke-width="1.2"/>
  <!-- sweep arc (draws while pulse travels) -->
  <path id="ertSweep" d="M430 91 A25 25 0 1 1 409.3 102.0" fill="none" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" filter="url(#ertGlowT)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- digital readout -->
  <rect x="392" y="178" width="76" height="26" rx="4" fill="#050f1f" stroke="#8fb6e0" stroke-width="1.2"/>
  <text x="430" y="196" text-anchor="middle" font-size="13" fill="#9fe6ff" opacity=".3">0.00 µs</text>
  <text x="384" y="195" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".6">ROUND-TRIP t</text>

  <!-- echo arrives: clock freezes -->
  <g id="ertFreeze" opacity="0">
    <line x1="430" y1="95" x2="430" y2="112.5" stroke="#050f1f" stroke-width="4.5"/>
    <line x1="435.8" y1="119.9" x2="406.0" y2="99.7" stroke="#5fe0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#ertGlowT)"/>
    <circle cx="430" cy="116" r="3" fill="#5fe0ff"/>
    <rect x="393.5" y="179.5" width="73" height="23" rx="3" fill="#050f1f"/>
    <text x="430" y="196" text-anchor="middle" font-size="14" fill="#5fe0ff" filter="url(#ertGlowT)">8.45 µs</text>
  </g>

  <!-- ===================== FORMULA CARD ===================== -->
  <rect x="300" y="214" width="260" height="80" rx="10" fill="url(#ertCardG)" stroke="#8fb6e0" stroke-width="1.5"/>
  <rect x="304" y="218" width="252" height="72" rx="7" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".18"/>
  <text x="312" y="230" font-size="10" fill="#9fe6ff" opacity=".55">GAUGE MATH</text>
  <line x1="316" y1="262" x2="544" y2="262" stroke="#8fb6e0" stroke-width="1" opacity=".2"/>

  <g id="ertFormula" opacity="0">
    <text x="352" y="251" font-size="19" textLength="110" lengthAdjust="spacingAndGlyphs"><tspan fill="#5fe0ff">T</tspan><tspan fill="#9fe6ff"> = v × t</tspan></text>
    <text x="470" y="251" font-size="19" fill="#9fe6ff" fill-opacity=".32" textLength="38" lengthAdjust="spacingAndGlyphs">÷ 2</text>
  </g>
  <g id="ertDiv2" opacity="0">
    <text x="470" y="251" font-size="19" fill="#ffc24b" filter="url(#ertGlowT)" textLength="38" lengthAdjust="spacingAndGlyphs">÷ 2</text>
  </g>
  <circle id="ertPingDiv2" cx="489" cy="244" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#ertGlowT)"/>

  <g id="ertSolve" opacity="0">
    <text x="430" y="281" text-anchor="middle" font-size="13" textLength="200" lengthAdjust="spacingAndGlyphs"><tspan fill="#9fe6ff">5.92 × 8.45 ÷ 2 = </tspan><tspan fill="#5fe0ff">25.0 mm</tspan></text>
  </g>

  <!-- answer: bracket label flips -->
  <g id="ertAnswer" opacity="0">
    <rect x="38" y="176" width="64" height="20" rx="4" fill="#0e2848" stroke="#5fe0ff" stroke-width="1.2" filter="url(#ertGlowT)"/>
    <text x="70" y="190" text-anchor="middle" font-size="12" fill="#5fe0ff">25.0 mm</text>
  </g>
</svg>
