<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="curglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="curglowW" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="curHotF" gradientUnits="userSpaceOnUse" x1="0" y1="74" x2="0" y2="110">
      <stop offset="0" stop-color="#ffc97e"/><stop offset=".45" stop-color="#ff8f3f"/><stop offset="1" stop-color="#d9531c"/>
    </linearGradient>
    <linearGradient id="cursteelV" gradientUnits="userSpaceOnUse" x1="0" y1="206" x2="0" y2="242">
      <stop offset="0" stop-color="#30608f"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <pattern id="curHatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#ff6b6b" stroke-width="1.4" opacity=".3"/>
    </pattern>
  </defs>

  <!-- ===== STATIC BASE: caption, plot frame + grid, chip panels ===== -->
  <text x="60" y="27" font-size="11" fill="#9fe6ff" opacity=".6">STEEL // PERMEABILITY vs TEMPERATURE</text>
  <rect x="60" y="40" width="325" height="240" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".15"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".12" fill="none">
    <line x1="60" y1="100" x2="385" y2="100"/>
    <line x1="60" y1="160" x2="385" y2="160"/>
    <line x1="60" y1="220" x2="385" y2="220"/>
    <line x1="163.3" y1="40" x2="163.3" y2="280"/>
    <line x1="266.7" y1="40" x2="266.7" y2="280"/>
  </g>
  <rect x="398" y="46" width="180" height="114" rx="12" fill="#0e2848" opacity=".5" stroke="#8fb6e0" stroke-opacity=".25"/>
  <rect x="398" y="174" width="180" height="114" rx="12" fill="#0e2848" opacity=".5" stroke="#8fb6e0" stroke-opacity=".25"/>
  <!-- static faint axes skeleton (curAxes overlays at full strength) -->
  <g stroke="#8fb6e0" stroke-width="1.4" fill="none" opacity=".25">
    <line x1="60" y1="280" x2="60" y2="44"/>
    <line x1="60" y1="280" x2="379" y2="280"/>
  </g>
  <path d="M60 36 L56.4 45 L63.6 45 Z" fill="#8fb6e0" opacity=".25"/>
  <path d="M387 280 L378 276.4 L378 283.6 Z" fill="#8fb6e0" opacity=".25"/>
  <!-- static ghost part silhouettes inside chips -->
  <g fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".18">
    <rect x="430" y="76" width="22" height="32" rx="4"/>
    <rect x="452" y="81" width="88" height="22" rx="3"/>
    <rect x="540" y="84" width="6" height="16" rx="2"/>
    <rect x="430" y="208" width="22" height="32" rx="4"/>
    <rect x="452" y="213" width="88" height="22" rx="3"/>
    <rect x="540" y="216" width="6" height="16" rx="2"/>
  </g>

  <!-- ===== AXES (fade @0.8) ===== -->
  <g id="curAxes" opacity="0">
    <g stroke="#8fb6e0" stroke-width="1.6" fill="none">
      <line x1="60" y1="280" x2="60" y2="44"/>
      <line x1="60" y1="280" x2="379" y2="280"/>
    </g>
    <path d="M60 36 L56.4 45 L63.6 45 Z" fill="#8fb6e0"/>
    <path d="M387 280 L378 276.4 L378 283.6 Z" fill="#8fb6e0"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".6">
      <line x1="163.3" y1="280" x2="163.3" y2="286"/>
      <line x1="266.7" y1="280" x2="266.7" y2="286"/>
      <line x1="370" y1="280" x2="370" y2="286"/>
    </g>
    <g font-size="11" fill="#9fe6ff" opacity=".8" text-anchor="middle">
      <text x="60" y="296">0</text>
      <text x="163.3" y="296">300</text>
      <text x="266.7" y="296">600</text>
      <text x="370" y="296">900</text>
    </g>
    <text x="200" y="268" font-size="11" fill="#9fe6ff" opacity=".7" text-anchor="middle">TEMPERATURE °C</text>
    <text transform="rotate(-90 30 160)" x="30" y="160" font-size="11" fill="#9fe6ff" opacity=".8" text-anchor="middle">ABILITY TO MAGNETIZE (μ)</text>
  </g>

  <!-- ===== CURVE: gentle decline (draw @1.9) then collapse (draw @3.9) ===== -->
  <path id="curCurve" d="M62 68 C145 70 205 80 254 100 C278 110 295 124 306 141" fill="none" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" filter="url(#curglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <path id="curDrop" d="M306 141 C312 151 319 190 323 250 C324.4 268 324.8 274 326 276.5 L368 276.5" fill="none" stroke="#5fe0ff" stroke-width="3" stroke-linecap="round" filter="url(#curglowC)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== CURIE MARKER (fade @4.7 + ping) ===== -->
  <g id="curMark" opacity="0">
    <line x1="325.2" y1="45" x2="325.2" y2="280" stroke="#ffc24b" stroke-width="1.5" stroke-dasharray="5 4" opacity=".9"/>
    <line x1="325.2" y1="280" x2="325.2" y2="286" stroke="#ffc24b" stroke-width="1.5"/>
    <text x="318" y="56" font-size="12" fill="#ffc24b" text-anchor="end">CURIE POINT</text>
    <text x="318" y="70" font-size="11" fill="#ffc24b" text-anchor="end" opacity=".85">770 °C · IRON</text>
    <text x="325.2" y="296" font-size="11" fill="#ffc24b" text-anchor="middle">770</text>
  </g>
  <circle id="curPing" cx="325.2" cy="276.5" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#curglowW)"/>

  <!-- ===== HOT: hatch zone + hot forging chip (fade @6.2) ===== -->
  <g id="curHot" opacity="0">
    <rect x="326" y="45" width="58" height="235" fill="#ff6b6b" opacity=".05"/>
    <rect x="326" y="45" width="58" height="235" fill="url(#curHatch)"/>
    <text transform="rotate(-90 357 162)" x="357" y="162" font-size="11" fill="#ff8585" opacity=".85" text-anchor="middle">NOT FERROMAGNETIC</text>

    <!-- hot forging: heat shimmer, fizzling flux, particles falling -->
    <g stroke="#ff9b4b" stroke-width="1.5" fill="none" opacity=".45">
      <path d="M460 72 q4 -5 0 -11 q-4 -6 0 -11"/>
      <path d="M488 74 q4 -5 0 -11 q-4 -6 0 -11"/>
      <path d="M516 72 q4 -5 0 -11 q-4 -6 0 -11"/>
    </g>
    <g fill="none" stroke="#9fe6ff">
      <ellipse cx="487" cy="92" rx="64" ry="26" stroke-width="1.6" stroke-dasharray="9 13" opacity=".65"/>
      <ellipse cx="487" cy="92" rx="76" ry="35" stroke-width="1.4" stroke-dasharray="5 17" opacity=".42"/>
      <path d="M551 64 q9 -6 17 -3" stroke-width="1.4" opacity=".55"/>
      <path d="M420 118 q-8 5 -9 12" stroke-width="1.4" opacity=".5"/>
    </g>
    <line x1="424" y1="92" x2="552" y2="92" stroke="#9fe6ff" stroke-width="1" stroke-dasharray="6 4" opacity=".25"/>
    <g filter="url(#curglowW)">
      <rect x="430" y="76" width="22" height="32" rx="4" fill="url(#curHotF)" stroke="#ffb36b" stroke-width="1.3"/>
      <rect x="452" y="81" width="88" height="22" rx="3" fill="url(#curHotF)" stroke="#ffb36b" stroke-width="1.3"/>
      <rect x="540" y="84" width="6" height="16" rx="2" fill="url(#curHotF)" stroke="#ffb36b" stroke-width="1.1"/>
    </g>
    <g fill="#9fe6ff">
      <circle cx="444" cy="124" r="1.8" opacity=".85"/>
      <circle cx="462" cy="132" r="1.5" opacity=".7"/>
      <circle cx="481" cy="126" r="2" opacity=".85"/>
      <circle cx="500" cy="134" r="1.6" opacity=".7"/>
      <circle cx="518" cy="124" r="1.8" opacity=".85"/>
      <circle cx="531" cy="133" r="1.4" opacity=".6"/>
    </g>
    <g stroke="#9fe6ff" stroke-width="1" opacity=".35">
      <line x1="444" y1="114" x2="444" y2="119"/>
      <line x1="462" y1="122" x2="462" y2="127"/>
      <line x1="481" y1="116" x2="481" y2="121"/>
      <line x1="500" y1="124" x2="500" y2="129"/>
      <line x1="518" y1="114" x2="518" y2="119"/>
    </g>
    <text x="488" y="151" font-size="11" fill="#ff9b4b" text-anchor="middle">ABOVE — NO GRIP</text>
  </g>

  <!-- ===== COOLED: navy part w/ intact flux loops (fade @7.2) ===== -->
  <g id="curCool" opacity="0">
    <g fill="none" stroke="#5fe0ff">
      <ellipse cx="487" cy="224" rx="64" ry="26" stroke-width="1.6" opacity=".8" filter="url(#curglowC)"/>
      <ellipse cx="487" cy="224" rx="76" ry="35" stroke-width="1.3" opacity=".45"/>
    </g>
    <path d="M492 195.2 L499 198 L492 200.8 Z" fill="#5fe0ff"/>
    <path d="M484 252.8 L477 250 L484 247.2 Z" fill="#5fe0ff"/>
    <line x1="424" y1="224" x2="552" y2="224" stroke="#9fe6ff" stroke-width="1" stroke-dasharray="6 4" opacity=".25"/>
    <rect x="430" y="208" width="22" height="32" rx="4" fill="url(#cursteelV)" stroke="#8fb6e0" stroke-width="1.3"/>
    <rect x="452" y="213" width="88" height="22" rx="3" fill="url(#cursteelV)" stroke="#8fb6e0" stroke-width="1.3"/>
    <rect x="540" y="216" width="6" height="16" rx="2" fill="url(#cursteelV)" stroke="#8fb6e0" stroke-width="1.1"/>
    <text x="488" y="279" font-size="11" fill="#9fe6ff" text-anchor="middle">COOLED — TESTABLE</text>
  </g>
</svg>
