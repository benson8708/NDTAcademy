<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="amfGlow" filterUnits="userSpaceOnUse" x="30" y="-10" width="586" height="334">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amfGlowY" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amfGlowO" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="amfSteel" x1="0" y1="74" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3e66"/><stop offset=".28" stop-color="#3a6d9e"/>
      <stop offset=".6" stop-color="#16365c"/><stop offset="1" stop-color="#0a1f3a"/>
    </linearGradient>
    <linearGradient id="amfShaftG" x1="0" y1="214" x2="0" y2="266" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3e66"/><stop offset=".28" stop-color="#35658f"/>
      <stop offset=".6" stop-color="#14304f"/><stop offset="1" stop-color="#0a1f3a"/>
    </linearGradient>
  </defs>

  <!-- ================= STATIC: zone label + setup centerline ================= -->
  <text x="20" y="32" font-size="11" fill="#9fe6ff" opacity=".8">COIL SHOT · LOW FILL FACTOR</text>
  <path d="M36 90 H300" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="9 4 2 4" opacity=".25" fill="none"/>

  <!-- ================= REVEAL 1: part + coil + dims ================= -->
  <g id="amfCoilPart" opacity="0">
    <!-- back halves of the 5 turns -->
    <g fill="none" stroke="#ff9b4b" stroke-width="2.4" opacity=".38">
      <path d="M100 52 A9 38 0 0 1 100 128"/>
      <path d="M130 52 A9 38 0 0 1 130 128"/>
      <path d="M160 52 A9 38 0 0 1 160 128"/>
      <path d="M190 52 A9 38 0 0 1 190 128"/>
      <path d="M220 52 A9 38 0 0 1 220 128"/>
    </g>
    <!-- part: solid bar, side view -->
    <rect x="60" y="74" width="192" height="32" fill="url(#amfSteel)"/>
    <line x1="60" y1="74" x2="252" y2="74" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="60" y1="106" x2="252" y2="106" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="60" y1="74" x2="60" y2="106" stroke="#8fb6e0" stroke-width="1.5" opacity=".7"/>
    <ellipse cx="252" cy="90" rx="6" ry="16" fill="#2b5a8c" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- pole hints -->
    <ellipse cx="64" cy="90" rx="7" ry="15" fill="#5fe0ff" opacity=".12"/>
    <ellipse cx="252" cy="90" rx="6" ry="15" fill="#5fe0ff" opacity=".18"/>
    <text x="68" y="95" font-size="13" font-weight="700" fill="#dff2ff" opacity=".95">S</text>
    <text x="232" y="95" font-size="13" font-weight="700" fill="#dff2ff" opacity=".95">N</text>
    <!-- longitudinal flux arrows inside the part -->
    <g stroke="#5fe0ff" stroke-width="2" fill="#5fe0ff" filter="url(#amfGlow)" opacity=".95">
      <line x1="88" y1="90" x2="220" y2="90"/><path d="M220 86.4 L229 90 L220 93.6 Z" stroke="none"/>
      <line x1="100" y1="81" x2="204" y2="81" opacity=".6"/><path d="M204 78 L211 81 L204 84 Z" stroke="none" opacity=".6"/>
      <line x1="100" y1="99" x2="204" y2="99" opacity=".6"/><path d="M204 96 L211 99 L204 102 Z" stroke="none" opacity=".6"/>
    </g>
    <!-- flux exits N end / enters S end -->
    <g stroke="#5fe0ff" stroke-width="1.6" fill="#5fe0ff" opacity=".6">
      <line x1="260" y1="84" x2="270" y2="84"/><path d="M270 81.4 L275 84 L270 86.6 Z" stroke="none"/>
      <line x1="260" y1="96" x2="270" y2="96"/><path d="M270 93.4 L275 96 L270 98.6 Z" stroke="none"/>
      <line x1="40" y1="84" x2="50" y2="84"/><path d="M50 81.4 L55 84 L50 86.6 Z" stroke="none"/>
      <line x1="40" y1="96" x2="50" y2="96"/><path d="M50 93.4 L55 96 L50 98.6 Z" stroke="none"/>
    </g>
    <!-- front halves of the 5 turns (copper, energized) -->
    <g fill="none" stroke="#ff9b4b" stroke-width="3" stroke-linecap="round" filter="url(#amfGlowO)" opacity=".95">
      <path d="M100 52 A9 38 0 0 0 100 128"/>
      <path d="M130 52 A9 38 0 0 0 130 128"/>
      <path d="M160 52 A9 38 0 0 0 160 128"/>
      <path d="M190 52 A9 38 0 0 0 190 128"/>
      <path d="M220 52 A9 38 0 0 0 220 128"/>
    </g>
    <!-- 5 TURNS bracket -->
    <g stroke="#ff9b4b" stroke-width="1.2" fill="none" opacity=".85">
      <path d="M100 45 H220"/><path d="M100 45 V49"/><path d="M220 45 V49"/>
    </g>
    <text x="230" y="49" font-size="11" fill="#ff9b4b" opacity=".9">5 TURNS</text>
    <!-- dimension L -->
    <g stroke="#5fe0ff" fill="none">
      <path d="M60 110 V142" stroke-width="1" opacity=".55"/>
      <path d="M252 110 V142" stroke-width="1" opacity=".55"/>
      <path d="M60 136 H252" stroke-width="1.2"/>
      <path d="M60 136 L69 132.8 69 139.2 Z" fill="#5fe0ff" stroke="none"/>
      <path d="M252 136 L243 132.8 243 139.2 Z" fill="#5fe0ff" stroke="none"/>
    </g>
    <text x="156" y="152" text-anchor="middle" font-size="12" fill="#9fe6ff">L = 16 IN</text>
    <!-- dimension D -->
    <g stroke="#5fe0ff" fill="none">
      <path d="M259 74 H286" stroke-width="1" opacity=".55"/>
      <path d="M259 106 H286" stroke-width="1" opacity=".55"/>
      <path d="M280 74 V106" stroke-width="1.2"/>
      <path d="M280 74 L276.8 83 283.2 83 Z" fill="#5fe0ff" stroke="none"/>
      <path d="M280 106 L276.8 97 283.2 97 Z" fill="#5fe0ff" stroke="none"/>
    </g>
    <text x="280" y="124" text-anchor="middle" font-size="12" fill="#9fe6ff">D = 2 IN</text>
  </g>

  <!-- ================= STATIC: formula card frame ================= -->
  <rect x="338" y="24" width="250" height="214" rx="10" fill="#0e2848" opacity=".5"/>
  <rect x="338" y="24" width="250" height="214" rx="10" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".85"/>
  <!-- ghost ledger slots (filled by reveals) -->
  <g fill="none" stroke="#2b86ff" stroke-width="1" stroke-dasharray="4 4" opacity=".3">
    <rect x="350" y="86" width="226" height="24" rx="5"/>
    <rect x="350" y="118" width="226" height="24" rx="5"/>
    <rect x="350" y="150" width="226" height="52" rx="5"/>
  </g>
  <line x1="350" y1="209" x2="576" y2="209" stroke="#2b86ff" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
  <text x="352" y="221" font-size="10.5" fill="#9fe6ff" opacity=".7">HEAD SHOT · 300–800 A PER IN DIA</text>
  <text x="352" y="233" font-size="10.5" fill="#9fe6ff" opacity=".7">PRODS · 90–125 A PER IN SPACING</text>

  <!-- REVEAL 3: anchor formula + STARTING POINT tag -->
  <g id="amfFormula" opacity="0">
    <rect x="350" y="16.5" width="104" height="15" rx="4" fill="#14304f" stroke="#5fe0ff" stroke-width="1" opacity=".95"/>
    <text x="402" y="28" text-anchor="middle" font-size="11" fill="#9fe6ff">STARTING POINT</text>
    <text x="463" y="64" text-anchor="middle" font-size="16.5" font-weight="700" fill="#eaffff" filter="url(#amfGlow)">NI = 45,000 ÷ (L/D)</text>
    <line x1="380" y1="73" x2="546" y2="73" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
  </g>

  <!-- REVEAL 2: ratio chip -->
  <g id="amfRatio" opacity="0">
    <path d="M300 90 H330" stroke="#5fe0ff" stroke-width="1.2" stroke-dasharray="4 3" fill="none" opacity=".55"/>
    <path d="M330 86.8 L337 90 L330 93.2 Z" fill="#5fe0ff" opacity=".7"/>
    <rect x="350" y="86" width="226" height="24" rx="5" fill="#14304f" opacity=".8"/>
    <rect x="350" y="86" width="226" height="24" rx="5" fill="none" stroke="#2b86ff" stroke-width="1" opacity=".6"/>
    <text x="362" y="102.5" font-size="13" fill="#9fe6ff">L/D = 16 ÷ 2 = <tspan fill="#ffc24b" font-weight="700">8</tspan></text>
  </g>

  <!-- REVEAL 4: worked result -->
  <g id="amfResult" opacity="0">
    <rect x="350" y="118" width="226" height="24" rx="5" fill="#14304f" opacity=".8"/>
    <rect x="350" y="118" width="226" height="24" rx="5" fill="none" stroke="#2b86ff" stroke-width="1" opacity=".6"/>
    <text x="362" y="134.5" font-size="11" fill="#9fe6ff">45,000 ÷ 8 ≈ <tspan fill="#eaffff" font-weight="700">5,625</tspan> AMPERE-TURNS</text>
  </g>

  <!-- REVEAL 7: ammeter row -->
  <g id="amfMeter" opacity="0">
    <rect x="350" y="150" width="226" height="52" rx="5" fill="#14304f" opacity=".8"/>
    <rect x="350" y="150" width="226" height="52" rx="5" fill="none" stroke="#2b86ff" stroke-width="1" opacity=".6"/>
    <text x="362" y="170" font-size="12" fill="#9fe6ff">÷ 5 TURNS</text>
    <text x="362" y="194" font-size="18" font-weight="700" fill="#ffc24b" filter="url(#amfGlowY)">≈ 1,125 A</text>
    <!-- mini ammeter dial, 0–2000 A -->
    <path d="M489 196 A26 26 0 0 1 541 196" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".7"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".6">
      <line x1="494" y1="196" x2="488" y2="196"/>
      <line x1="500.15" y1="181.15" x2="495.91" y2="176.91"/>
      <line x1="515" y1="175" x2="515" y2="169"/>
      <line x1="529.85" y1="181.15" x2="534.09" y2="176.91"/>
      <line x1="536" y1="196" x2="542" y2="196"/>
    </g>
    <line x1="515" y1="196" x2="519.1" y2="175.4" stroke="#ff6b6b" stroke-width="2" filter="url(#amfGlow)"/>
    <circle cx="515" cy="196" r="3" fill="#ff6b6b"/>
  </g>

  <!-- ================= STATIC: verification strip ================= -->
  <rect x="15" y="172" width="315" height="120" rx="10" fill="#0e2848" opacity=".3"/>
  <rect x="15" y="172" width="315" height="120" rx="10" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".5"/>
  <text x="322" y="186" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".7">VERIFY ON THE PART</text>
  <text x="22" y="190" font-size="11" fill="#9fe6ff" opacity=".85">QQI SHIM</text>
  <text x="22" y="202" font-size="10" fill="#9fe6ff" opacity=".6">FLAW SIDE DOWN</text>
  <path d="M62 205 L72 221" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>

  <!-- shaft segment -->
  <rect x="22" y="214" width="128" height="52" fill="url(#amfShaftG)"/>
  <line x1="22" y1="214" x2="150" y2="214" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="22" y1="266" x2="150" y2="266" stroke="#8fb6e0" stroke-width="1.5"/>
  <ellipse cx="150" cy="240" rx="7" ry="26" fill="#2b5a8c" stroke="#8fb6e0" stroke-width="1.5"/>
  <!-- QQI shim square, taped top + bottom -->
  <rect x="60" y="223" width="34" height="34" rx="2" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.2"/>
  <rect x="54" y="219" width="46" height="9" fill="#cfe8ff" opacity=".14"/>
  <rect x="54" y="252" width="46" height="9" fill="#cfe8ff" opacity=".14"/>
  <!-- Hall probe wand + cable to gaussmeter -->
  <g transform="rotate(24 118 248)">
    <rect x="114" y="232" width="8" height="30" rx="3" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.3"/>
    <line x1="114.5" y1="240" x2="121.5" y2="240" stroke="#8fb6e0" stroke-width="1" opacity=".55"/>
    <circle cx="118" cy="233" r="2.2" fill="#5fe0ff" filter="url(#amfGlow)"/>
  </g>
  <path d="M124 264 C 138 276, 152 268, 168 252" fill="none" stroke="#3f9bff" stroke-width="2" opacity=".8"/>

  <!-- gaussmeter -->
  <rect x="168" y="192" width="154" height="94" rx="8" fill="#14304f" opacity=".88"/>
  <rect x="168" y="192" width="154" height="94" rx="8" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".9"/>
  <text x="176" y="205" font-size="11" fill="#9fe6ff" opacity=".85">GAUSSMETER</text>
  <rect x="176" y="211" width="10" height="6" fill="#5fe0ff" opacity=".5"/>
  <text x="191" y="218" font-size="10" fill="#9fe6ff" opacity=".8">30–60 G COMMON TARGET</text>
  <path d="M201 266 A44 44 0 0 1 289 266" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".75"/>
  <path d="M219.14 230.4 A44 44 0 0 1 258.6 224.15" fill="none" stroke="#5fe0ff" stroke-width="8" opacity=".45"/>
  <g stroke="#8fb6e0" stroke-width="1.2" opacity=".7">
    <line x1="206" y1="266" x2="200" y2="266"/>
    <line x1="213.45" y1="243.08" x2="208.59" y2="239.55"/>
    <line x1="232.95" y1="228.91" x2="231.09" y2="223.2"/>
    <line x1="257.05" y1="228.91" x2="258.91" y2="223.2"/>
    <line x1="276.55" y1="243.08" x2="281.41" y2="239.55"/>
    <line x1="284" y1="266" x2="290" y2="266"/>
  </g>
  <text x="203" y="259" font-size="10" fill="#9fe6ff" opacity=".65">0</text>
  <text x="287" y="259" text-anchor="end" font-size="10" fill="#9fe6ff" opacity=".65">100</text>

  <!-- REVEAL 5: QQI indication blooms -->
  <g id="amfShim" opacity="0">
    <circle cx="77" cy="240" r="15" fill="#ffc24b" opacity=".22"/>
    <g fill="none" stroke="#ffc24b" stroke-width="2.5" stroke-linecap="round" filter="url(#amfGlowY)">
      <circle cx="77" cy="240" r="9.5"/>
      <line x1="63" y1="240" x2="91" y2="240"/>
      <line x1="77" y1="226" x2="77" y2="254"/>
    </g>
  </g>
  <circle id="amfShimPing" cx="77" cy="240" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#amfGlowY)"/>

  <!-- REVEAL 6: needle + readout + PROOF tag -->
  <g id="amfGauss" opacity="0">
    <line x1="245" y1="266" x2="239.21" y2="229.46" stroke="#ff6b6b" stroke-width="2.5" filter="url(#amfGlow)"/>
    <circle cx="245" cy="266" r="3.5" fill="#ff6b6b"/>
    <text x="245" y="281" text-anchor="middle" font-size="11" fill="#eaffff">≈ 45 G TANGENTIAL</text>
    <rect x="24" y="164.5" width="56" height="15" rx="4" fill="#14304f" stroke="#5fe0ff" stroke-width="1" opacity=".95"/>
    <text x="52" y="176" text-anchor="middle" font-size="11" fill="#9fe6ff">PROOF</text>
  </g>
</svg>
