<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="clglowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="656" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="clglowR" filterUnits="userSpaceOnUse" x="227" y="47" width="314" height="246">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="clsteel" x1="0" y1="206" x2="0" y2="304" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30608f"/><stop offset=".35" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="clprimerG" x1="0" y1="182" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b6fe8"/><stop offset="1" stop-color="#16459f"/>
    </linearGradient>
    <linearGradient id="cltopG" x1="0" y1="160" x2="0" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fa9ff"/><stop offset="1" stop-color="#2f7ef2"/>
    </linearGradient>
    <linearGradient id="clrustG" x1="0" y1="200" x2="0" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d97a35"/><stop offset="1" stop-color="#8a4218"/>
    </linearGradient>
    <linearGradient id="clbleedG" x1="0" y1="216" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b4b" stop-opacity=".38"/>
      <stop offset="1" stop-color="#ff9b4b" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="cldomeG" x1="0" y1="160" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b65622" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ff9b4b" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="clscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===== BARE SUBSTRATE: steel flange edge w/ blast (anchor) profile — visible at 0s ===== -->
  <g id="clBare">
    <path d="M60 216 L65 206 L70 216 L75 206 L80 216 L85 206 L90 216 L95 206 L100 216 L105 206 L110 216 L115 206 L120 216 L125 206 L130 216 L135 206 L140 216 L145 206 L150 216 L155 206 L160 216 L165 206 L170 216 L175 206 L180 216 L185 206 L190 216 L195 206 L200 216 L205 206 L210 216 L215 206 L220 216 L225 206 L230 216 L235 206 L240 216 L245 206 L250 216 L255 206 L260 216 L265 206 L270 216 L275 206 L280 216 L285 206 L290 216 L295 206 L300 216 L305 206 L310 216 L315 206 L320 216 L325 206 L330 216 L335 206 L340 216 L345 206 L350 216 L355 206 L360 216 L365 206 L370 216 L375 206 L380 216 L385 206 L390 216 L395 206 L400 216 L405 206 L410 216 L415 206 L420 216 L425 206 L430 216 L435 206 L440 216 L445 206 L450 216 L455 206 L460 216 L465 206 L470 216 L475 206 L480 216 L485 206 L490 216 L495 206 L500 216 L505 206 L510 216 L515 206 L520 216 L525 206 L530 216 L535 206 L540 216 L540 304 L60 304 Z" fill="url(#clsteel)"/>
    <!-- rolled-plate texture -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
      <line x1="66" y1="240" x2="534" y2="240"/>
      <line x1="66" y1="256" x2="534" y2="256"/>
      <line x1="66" y1="272" x2="534" y2="272"/>
      <line x1="66" y1="288" x2="534" y2="288"/>
    </g>
    <!-- serrated profile edge (bright) -->
    <path d="M60 216 L65 206 L70 216 L75 206 L80 216 L85 206 L90 216 L95 206 L100 216 L105 206 L110 216 L115 206 L120 216 L125 206 L130 216 L135 206 L140 216 L145 206 L150 216 L155 206 L160 216 L165 206 L170 216 L175 206 L180 216 L185 206 L190 216 L195 206 L200 216 L205 206 L210 216 L215 206 L220 216 L225 206 L230 216 L235 206 L240 216 L245 206 L250 216 L255 206 L260 216 L265 206 L270 216 L275 206 L280 216 L285 206 L290 216 L295 206 L300 216 L305 206 L310 216 L315 206 L320 216 L325 206 L330 216 L335 206 L340 216 L345 206 L350 216 L355 206 L360 216 L365 206 L370 216 L375 206 L380 216 L385 206 L390 216 L395 206 L400 216 L405 206 L410 216 L415 206 L420 216 L425 206 L430 216 L435 206 L440 216 L445 206 L450 216 L455 206 L460 216 L465 206 L470 216 L475 206 L480 216 L485 206 L490 216 L495 206 L500 216 L505 206 L510 216 L515 206 L520 216 L525 206 L530 216 L535 206 L540 216" fill="none" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- plate edges -->
    <g stroke="#8fb6e0" fill="none">
      <path d="M60 304 H540" stroke-width="2"/>
      <path d="M60 216 V304" stroke-width="1.5" opacity=".5"/>
      <path d="M540 216 V304" stroke-width="1.5" opacity=".5"/>
    </g>
    <!-- static labels: substrate + anchor profile -->
    <text x="300" y="284" text-anchor="middle" font-size="12" fill="#9fe6ff" opacity=".65">STEEL SUBSTRATE</text>
    <text x="78" y="254" font-size="11" fill="#9fe6ff" opacity=".75">BLAST PROFILE</text>
    <path d="M112 244 L102 220" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    <!-- ghost spec lines: where the two-coat system will be applied -->
    <g stroke="#5fe0ff" stroke-width="1" stroke-dasharray="5 6" opacity=".22" fill="none">
      <path d="M60 160 H540"/>
      <path d="M60 182 H540"/>
      <path d="M60 160 V206 M540 160 V206"/>
    </g>
  </g>

  <!-- ===== PRIMER COAT (fade @ ~2.3s) — fills the anchor-pattern valleys ===== -->
  <g id="clPrimer" opacity="0">
    <path d="M60 182 L540 182 L540 216 L535 206 L530 216 L525 206 L520 216 L515 206 L510 216 L505 206 L500 216 L495 206 L490 216 L485 206 L480 216 L475 206 L470 216 L465 206 L460 216 L455 206 L450 216 L445 206 L440 216 L435 206 L430 216 L425 206 L420 216 L415 206 L410 216 L405 206 L400 216 L395 206 L390 216 L385 206 L380 216 L375 206 L370 216 L365 206 L360 216 L355 206 L350 216 L345 206 L340 216 L335 206 L330 216 L325 206 L320 216 L315 206 L310 216 L305 206 L300 216 L295 206 L290 216 L285 206 L280 216 L275 206 L270 216 L265 206 L260 216 L255 206 L250 216 L245 206 L240 216 L235 206 L230 216 L225 206 L220 216 L215 206 L210 216 L205 206 L200 216 L195 206 L190 216 L185 206 L180 216 L175 206 L170 216 L165 206 L160 216 L155 206 L150 216 L145 206 L140 216 L135 206 L130 216 L125 206 L120 216 L115 206 L110 216 L105 206 L100 216 L95 206 L90 216 L85 206 L80 216 L75 206 L70 216 L65 206 L60 216 Z" fill="url(#clprimerG)"/>
    <path d="M60 182 V216 M540 182 V216" stroke="#8fb6e0" stroke-width="1.5" opacity=".5" fill="none"/>
    <text x="52" y="203" text-anchor="end" font-size="11" fill="#9fe6ff">PRIMER</text>
    <path d="M54 199 L60 199" stroke="#5fe0ff" stroke-width="1" opacity=".6" fill="none"/>
  </g>
  <path id="clPrimerEdge" d="M60 182 H540" fill="none" stroke="#7fd8ff" stroke-width="1.6" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== TOPCOAT (fade @ ~3.5s) ===== -->
  <g id="clTopcoat" opacity="0">
    <rect x="60" y="160" width="480" height="22" fill="url(#cltopG)"/>
    <path d="M60 160 V182 M540 160 V182" stroke="#8fb6e0" stroke-width="1.5" opacity=".5" fill="none"/>
    <text x="52" y="175" text-anchor="end" font-size="11" fill="#9fe6ff">TOPCOAT</text>
    <path d="M54 171 L60 171" stroke="#5fe0ff" stroke-width="1" opacity=".6" fill="none"/>
    <!-- DFT (dry film thickness) bracket on right -->
    <g stroke="#5fe0ff" fill="none" opacity=".8">
      <path d="M548 160 H556" stroke-width="1"/>
      <path d="M548 206 H556" stroke-width="1"/>
      <path d="M552 160 V206" stroke-width="1.2"/>
    </g>
    <text x="560" y="186" font-size="11" fill="#9fe6ff" opacity=".85">DFT</text>
  </g>
  <path id="clTopcoatEdge" d="M60 160 H540" fill="none" stroke="#5fe0ff" stroke-width="2" filter="url(#clglowC)" opacity=".9" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== RUST PATCH + UNFIXED PIT at the interface (fade @ ~0.9s; drawn above coats so the buried seam stays visible) ===== -->
  <g id="clRustPatch" opacity="0">
    <path d="M336 212 Q343 201 356 204 Q366 198 379 203 Q391 199 400 206 Q404 209 404 213 L402 218 Q393 222 382 219 Q371 223 358 220 Q346 223 339 218 Q336 215 336 212 Z" fill="url(#clrustG)"/>
    <g fill="#7a3d12">
      <circle cx="350" cy="208" r="1.7"/><circle cx="366" cy="205" r="2"/><circle cx="382" cy="208" r="1.6"/><circle cx="394" cy="210" r="1.4"/><circle cx="358" cy="214" r="1.3"/><circle cx="375" cy="215" r="1.5"/>
    </g>
    <path d="M336 212 Q343 201 356 204 Q366 198 379 203 Q391 199 400 206 Q404 209 404 213" fill="none" stroke="#ff9b4b" stroke-width="1.5" stroke-linecap="round" filter="url(#clglowR)" opacity=".9"/>
    <!-- small surface pit left unfixed -->
    <path d="M284 212 Q291 232 297 236 Q303 232 310 212 Q297 218 284 212 Z" fill="#08152b"/>
    <path d="M284 212 Q291 232 297 236 Q303 232 310 212" fill="none" stroke="#ff9b4b" stroke-width="1.4" stroke-linecap="round" filter="url(#clglowR)" opacity=".85"/>
  </g>
  <g id="clLabelRust" opacity="0" font-size="11">
    <text x="84" y="100" fill="#ff9b4b">RUST LEFT UNDER COAT</text>
    <path d="M152 106 L336 204" stroke="#ff9b4b" stroke-width="1" opacity=".55" fill="none"/>
    <text x="297" y="262" text-anchor="middle" fill="#ff9b4b" opacity=".85">PIT</text>
    <path d="M297 252 L297 239" stroke="#ff9b4b" stroke-width="1" opacity=".5" fill="none"/>
  </g>

  <!-- ===== BLISTER over buried rust: bleed-through tint + dome (fade @ ~5.6s) ===== -->
  <g id="clBlister" opacity="0">
    <!-- rust bleed rising through primer + topcoat film -->
    <path d="M336 216 L404 216 L400 160 L340 160 Z" fill="url(#clbleedG)"/>
    <path d="M352 214 q2 -22 -1 -46 M370 215 q-1 -24 1 -50 M388 214 q2 -21 -1 -46" fill="none" stroke="#ff9b4b" stroke-width="1.2" opacity=".35"/>
    <!-- blister dome: lifted film over corrosion product -->
    <path d="M330 160 C342 126 398 126 410 160 Z" fill="url(#cldomeG)"/>
    <ellipse cx="370" cy="157" rx="18" ry="5" fill="#8a4218" opacity=".9"/>
    <path d="M330 160 C342 126 398 126 410 160" fill="none" stroke="#ff9b4b" stroke-width="1.8" stroke-linecap="round" filter="url(#clglowR)" opacity=".95"/>
    <text x="318" y="118" text-anchor="end" font-size="11" fill="#ff9b4b" opacity=".9">BLISTER</text>
    <path d="M322 121 L351 138" stroke="#ff9b4b" stroke-width="1" opacity=".5" fill="none"/>
  </g>
  <path id="clBlisterCrack" d="M352 142 L360 138.5 L366 141 L373 137.5 L380 140 L386 137" fill="none" stroke="#ff6b6b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#clglowR)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <circle id="clPing" cx="369" cy="138" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#clglowR)"/>

  <!-- ===== DELAY TIMER glyph (fade @ ~6.9s) ===== -->
  <g id="clTimer" opacity="0">
    <path d="M414 150 L453 127" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
    <circle cx="470" cy="118" r="14" fill="#0e2848" stroke="#ffc24b" stroke-width="2" filter="url(#clglowR)"/>
    <path d="M470 104 V100 M465.5 100 H474.5" stroke="#ffc24b" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <g stroke="#ffc24b" stroke-width="1" opacity=".7">
      <path d="M470 107 V110"/><path d="M470 126 V129"/><path d="M459 118 H462"/><path d="M478 118 H481"/>
    </g>
    <path d="M470 118 V109 M470 118 L477 123" stroke="#ffc24b" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="490" y="114" font-size="11" fill="#ffc24b" opacity=".9">FAILURE ON A</text>
    <text x="490" y="128" font-size="11" fill="#ffc24b" opacity=".9">DELAY TIMER</text>
  </g>

  <!-- ===== caption ===== -->
  <text x="40" y="326" font-size="12" fill="#9fe6ff" opacity=".7">FLANGE EDGE — TWO-COAT SYSTEM SECTION</text>

  <!-- ===== scan group ===== -->
  <g id="clscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#clscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#clglowC)" opacity=".9"/>
  </g>
</svg>
