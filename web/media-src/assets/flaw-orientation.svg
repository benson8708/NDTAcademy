<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="foGlow" filterUnits="userSpaceOnUse" x="-40" y="-40" width="680" height="420">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="foPlateG" x1="0" y1="146" x2="0" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a3c66"/><stop offset="1" stop-color="#102a4c"/>
    </linearGradient>
    <linearGradient id="foScanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
    <pattern id="foHatchP" width="9" height="9" patternUnits="userSpaceOnUse">
      <line x1="0" y1="9" x2="9" y2="0" stroke="#9fe6ff" stroke-width="1" opacity=".14"/>
    </pattern>
    <marker id="foArrow" viewBox="0 0 8 8" markerWidth="5.5" markerHeight="5.5" refX="5" refY="4" orient="auto">
      <path d="M0 1 L6 4 L0 7 Z" fill="#5fe0ff" fill-opacity=".75"/>
    </marker>
  </defs>

  <!-- ===== half panels + divider ===== -->
  <rect x="22" y="34" width="236" height="270" rx="12" fill="rgba(10,30,60,.55)" stroke="rgba(150,200,255,.2)" stroke-width="1"/>
  <rect x="342" y="34" width="236" height="270" rx="12" fill="rgba(10,30,60,.55)" stroke="rgba(150,200,255,.2)" stroke-width="1"/>
  <line x1="300" y1="44" x2="300" y2="296" stroke="#2b4a7d" stroke-width="1" stroke-dasharray="2 6" opacity=".6"/>

  <!-- ===== headers ===== -->
  <text x="140" y="56" text-anchor="middle" font-size="12" fill="#9fe6ff" letter-spacing="1.5">FLAT TO BEAM</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#9fe6ff" letter-spacing="1.5">ALIGNED WITH BEAM</text>

  <!-- ===== sources ===== -->
  <circle cx="140" cy="74" r="8" fill="#5fe0ff" opacity=".16"/>
  <circle cx="140" cy="74" r="3.5" fill="#eaf6ff" filter="url(#foGlow)"/>
  <circle cx="460" cy="74" r="8" fill="#5fe0ff" opacity=".16"/>
  <circle cx="460" cy="74" r="3.5" fill="#eaf6ff" filter="url(#foGlow)"/>
  <text x="124" y="78" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".6" letter-spacing="1">SOURCE</text>

  <!-- ===== film strips (under the beams) ===== -->
  <rect x="56" y="246" width="168" height="14" rx="3" fill="#8fb6e0" fill-opacity=".38" stroke="#cfe9ff" stroke-opacity=".5" stroke-width="1"/>
  <rect x="376" y="246" width="168" height="14" rx="3" fill="#8fb6e0" fill-opacity=".38" stroke="#cfe9ff" stroke-opacity=".5" stroke-width="1"/>
  <text x="48" y="257" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".6" letter-spacing="1">FILM</text>

  <!-- ===== REVEAL: beam rays (fade 0.6) ===== -->
  <g id="foBeams" opacity="0" stroke="#5fe0ff" fill="none" stroke-linecap="round">
    <line x1="140" y1="80" x2="76"  y2="239" stroke-width="1.2" opacity=".4"  marker-end="url(#foArrow)"/>
    <line x1="140" y1="80" x2="108" y2="240" stroke-width="1.2" opacity=".5"  marker-end="url(#foArrow)"/>
    <line x1="140" y1="80" x2="140" y2="240" stroke-width="1.6" opacity=".75" marker-end="url(#foArrow)"/>
    <line x1="140" y1="80" x2="172" y2="240" stroke-width="1.2" opacity=".5"  marker-end="url(#foArrow)"/>
    <line x1="140" y1="80" x2="204" y2="239" stroke-width="1.2" opacity=".4"  marker-end="url(#foArrow)"/>
    <line x1="460" y1="80" x2="396" y2="239" stroke-width="1.2" opacity=".4"  marker-end="url(#foArrow)"/>
    <line x1="460" y1="80" x2="428" y2="240" stroke-width="1.2" opacity=".5"  marker-end="url(#foArrow)"/>
    <line x1="460" y1="80" x2="460" y2="240" stroke-width="1.6" opacity=".75" marker-end="url(#foArrow)"/>
    <line x1="460" y1="80" x2="492" y2="240" stroke-width="1.2" opacity=".5"  marker-end="url(#foArrow)"/>
    <line x1="460" y1="80" x2="524" y2="239" stroke-width="1.2" opacity=".4"  marker-end="url(#foArrow)"/>
  </g>

  <!-- ===== steel plates (over rays: transmitted dim) ===== -->
  <g stroke="#9fe6ff" stroke-width="1.5" stroke-linejoin="round">
    <rect x="52" y="146" width="176" height="56" rx="3" fill="url(#foPlateG)" fill-opacity=".85" stroke-opacity=".8"/>
    <rect x="52" y="146" width="176" height="56" rx="3" fill="url(#foHatchP)" stroke="none"/>
    <rect x="372" y="146" width="176" height="56" rx="3" fill="url(#foPlateG)" fill-opacity=".85" stroke-opacity=".8"/>
    <rect x="372" y="146" width="176" height="56" rx="3" fill="url(#foHatchP)" stroke="none"/>
  </g>
  <g id="foPlateTag">
    <rect x="54" y="182" width="84" height="16" rx="3" fill="#0e2848" opacity=".92"/>
    <rect x="54" y="182" width="84" height="16" rx="3" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".4"/>
    <text x="96" y="194" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">STEEL PLATE</text>
  </g>

  <!-- ===== REVEAL: caption between halves (fade 2.0) ===== -->
  <g id="foPathLbl" opacity="0">
    <rect x="259" y="150" width="82" height="56" rx="6" fill="#0e2848" opacity=".92"/>
    <rect x="259" y="150" width="82" height="56" rx="6" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <text x="300" y="167" text-anchor="middle" font-size="11" fill="#9fe6ff">IMAGE =</text>
    <text x="300" y="181" text-anchor="middle" font-size="11" fill="#9fe6ff">CHANGE IN</text>
    <text x="300" y="195" text-anchor="middle" font-size="11" fill="#9fe6ff">METAL PATH</text>
  </g>

  <!-- ===== REVEAL: flat lamination, mid-thickness (draw 3.8) ===== -->
  <path id="foLam" d="M95 174 Q140 171.4 185 174 Q140 176.6 95 174 Z" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#foGlow)"/>
  <circle id="foLamPing" cx="140" cy="174" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#foGlow)"/>

  <!-- ===== REVEAL: clean film tag, left (fade 5.2) ===== -->
  <g id="foFilmClean" opacity="0">
    <rect x="58" y="248" width="164" height="10" rx="2" fill="#cfe9ff" opacity=".07"/>
    <line x1="140" y1="260" x2="140" y2="268" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <rect x="97" y="268" width="86" height="18" rx="4" fill="#0e2848" opacity=".9"/>
    <rect x="97" y="268" width="86" height="18" rx="4" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".8"/>
    <text x="140" y="281" text-anchor="middle" font-size="11" fill="#9fe6ff">CLEAN FILM</text>
  </g>

  <!-- ===== REVEAL: same flaw edge-on, beam-parallel (draw 6.6) ===== -->
  <path id="foAligned" d="M460 152 Q462.8 174 460 196 Q457.2 174 460 152 Z" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#foGlow)"/>

  <!-- ===== REVEAL: dark line on right film (draw + fade 7.6) ===== -->
  <g id="foDarkLine" opacity="0" stroke-dashoffset="100">
    <path d="M460 203 L460 244" fill="none" stroke="#9fe6ff" stroke-width="2.2" opacity=".85" pathLength="100" stroke-dasharray="100" filter="url(#foGlow)"/>
    <path d="M460 246.5 L460 259.5" fill="none" stroke="#5fe0ff" stroke-width="8" opacity=".22" pathLength="100" stroke-dasharray="100"/>
    <path d="M460 246.5 L460 259.5" fill="none" stroke="#04101f" stroke-width="5.5" pathLength="100" stroke-dasharray="100"/>
    <line x1="460" y1="260" x2="460" y2="268" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <rect x="421" y="268" width="78" height="18" rx="4" fill="#0e2848" opacity=".9"/>
    <rect x="421" y="268" width="78" height="18" rx="4" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".8"/>
    <text x="460" y="281" text-anchor="middle" font-size="11" fill="#9fe6ff">DARK LINE</text>
  </g>
  <circle id="foLinePing" cx="460" cy="253" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#foGlow)"/>

  <!-- ===== caption ===== -->
  <text x="300" y="330" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55" letter-spacing="1">SECTION VIEW — SAME TIGHT PLANAR FLAW, TWO ORIENTATIONS</text>

  <!-- ===== scan group ===== -->
  <g id="foscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#foScanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#foGlow)" opacity=".9"/>
  </g>
</svg>
