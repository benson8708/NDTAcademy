<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cvwGc" filterUnits="userSpaceOnUse" x="12" y="198" width="576" height="116">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cvwGs" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cvwLampG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dff6ff" stop-opacity=".30"/>
      <stop offset=".45" stop-color="#7fd8ff" stop-opacity=".13"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cvwSheetG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfeeff" stop-opacity=".20"/>
      <stop offset=".5" stop-color="#9fd4ff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#cfeeff" stop-opacity=".17"/>
    </linearGradient>
    <linearGradient id="cvwDeckG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#25517f"/>
      <stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="cvwBandG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf8ff" stop-opacity="0"/>
      <stop offset=".28" stop-color="#eaf8ff" stop-opacity=".20"/>
      <stop offset=".72" stop-color="#eaf8ff" stop-opacity=".20"/>
      <stop offset="1" stop-color="#eaf8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cvwBandDG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf8ff" stop-opacity="0"/>
      <stop offset=".28" stop-color="#eaf8ff" stop-opacity=".08"/>
      <stop offset=".72" stop-color="#eaf8ff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#eaf8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== ILLUMINATOR: soft glow + lamp deck ===== -->
  <ellipse cx="300" cy="168" rx="286" ry="132" fill="url(#cvwLampG)"/>
  <rect x="64" y="256" width="472" height="16" rx="5" fill="url(#cvwDeckG)" stroke="#8fb6e0" stroke-width="1.5"/>
  <path d="M70 256.5 H530" stroke="#d9f4ff" stroke-width="2" fill="none" filter="url(#cvwGc)" opacity=".85"/>
  <path d="M84 261 V267 M102 261 V267 M120 261 V267 M138 261 V267 M156 261 V267 M174 261 V267 M192 261 V267 M210 261 V267 M228 261 V267 M246 261 V267 M264 261 V267 M282 261 V267 M300 261 V267 M318 261 V267 M336 261 V267 M354 261 V267 M372 261 V267 M390 261 V267 M408 261 V267 M426 261 V267 M444 261 V267 M462 261 V267 M480 261 V267 M498 261 V267 M516 261 V267" stroke="#8fb6e0" stroke-width="1" opacity=".15" fill="none"/>
  <text x="300" y="290" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".6">ILLUMINATOR</text>

  <!-- ===== registration tick frames (film seats) ===== -->
  <g stroke="#5fe0ff" stroke-width="1.2" opacity=".32" fill="none">
    <path d="M84 75 V66 H93 M187 66 H196 V75 M84 200 V209 H93 M187 209 H196 V200"/>
    <path d="M208 75 V66 H217 M311 66 H320 V75 M208 200 V209 H217 M311 209 H320 V200"/>
    <path d="M392 65 V56 H401 M509 56 H518 V65 M392 204 V213 H401 M509 213 H518 V204"/>
  </g>

  <!-- ===== incident light from the lamp (under film seats A + B) ===== -->
  <g stroke="#7fd8ff" stroke-width="2.2" opacity=".8" filter="url(#cvwGs)">
    <path d="M118 248 V216"/><path d="M162 248 V216"/>
    <path d="M242 248 V216"/><path d="M286 248 V216"/>
  </g>
  <g fill="#7fd8ff" opacity=".85">
    <polygon points="114,219 122,219 118,210"/>
    <polygon points="158,219 166,219 162,210"/>
    <polygon points="238,219 246,219 242,210"/>
    <polygon points="282,219 290,219 286,210"/>
  </g>

  <!-- ===== FILM A : density 1.4 ===== -->
  <g id="cvwFilmA" opacity="0">
    <g transform="rotate(-2 140 137.5)">
      <rect x="88" y="70" width="104" height="135" rx="5" fill="url(#cvwSheetG)" stroke="#8fb6e0" stroke-width="1.5"/>
      <rect x="126" y="70" width="28" height="135" fill="url(#cvwBandG)"/>
      <path d="M129 70 C127.5 96 130.5 122 128.5 146 C127.5 168 130 188 128.8 205" stroke="#eaf8ff" stroke-width="1" opacity=".28" fill="none"/>
      <path d="M151.5 70 C153 96 150.2 122 152 146 C153 168 150.8 188 151.8 205" stroke="#eaf8ff" stroke-width="1" opacity=".28" fill="none"/>
      <g stroke="#eaf8ff" stroke-width="4" opacity=".07" fill="none">
        <path d="M127 92 Q140 86 153 92"/><path d="M127 114 Q140 108 153 114"/>
        <path d="M127 136 Q140 130 153 136"/><path d="M127 158 Q140 152 153 158"/>
        <path d="M127 180 Q140 174 153 180"/>
      </g>
      <g fill="#081427" opacity=".9">
        <circle cx="140" cy="108" r="2.2"/><circle cx="143" cy="120" r="1.1"/>
        <circle cx="135" cy="134" r="1.5"/><circle cx="146" cy="158" r="1.8"/>
      </g>
      <text x="184" y="198" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".75">A</text>
      <rect x="93" y="61" width="48" height="18" rx="4" fill="#0e2848" opacity=".95" stroke="#8fb6e0" stroke-width="1.2"/>
      <text x="117" y="74" text-anchor="middle" font-size="12" fill="#9fe6ff">D 1.4</text>
    </g>
    <g stroke="#7fd8ff" stroke-width="1.6" opacity=".6" fill="none">
      <path d="M156 64 V48"/><path d="M180 64 V48"/>
    </g>
    <g fill="#7fd8ff" opacity=".65">
      <polygon points="152.8,49 159.2,49 156,42.5"/>
      <polygon points="176.8,49 183.2,49 180,42.5"/>
    </g>
  </g>

  <!-- ===== FILM B : density 1.5 (identical image, in register) ===== -->
  <g id="cvwFilmB" opacity="0">
    <g transform="rotate(1.8 264 137.5)">
      <rect x="212" y="70" width="104" height="135" rx="5" fill="url(#cvwSheetG)" stroke="#8fb6e0" stroke-width="1.5"/>
      <rect x="250" y="70" width="28" height="135" fill="url(#cvwBandG)"/>
      <path d="M253 70 C251.5 96 254.5 122 252.5 146 C251.5 168 254 188 252.8 205" stroke="#eaf8ff" stroke-width="1" opacity=".28" fill="none"/>
      <path d="M275.5 70 C277 96 274.2 122 276 146 C277 168 274.8 188 275.8 205" stroke="#eaf8ff" stroke-width="1" opacity=".28" fill="none"/>
      <g stroke="#eaf8ff" stroke-width="4" opacity=".07" fill="none">
        <path d="M251 92 Q264 86 277 92"/><path d="M251 114 Q264 108 277 114"/>
        <path d="M251 136 Q264 130 277 136"/><path d="M251 158 Q264 152 277 158"/>
        <path d="M251 180 Q264 174 277 180"/>
      </g>
      <g fill="#081427" opacity=".9">
        <circle cx="264" cy="108" r="2.2"/><circle cx="267" cy="120" r="1.1"/>
        <circle cx="259" cy="134" r="1.5"/><circle cx="270" cy="158" r="1.8"/>
      </g>
      <text x="308" y="198" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".75">B</text>
      <rect x="217" y="61" width="48" height="18" rx="4" fill="#0e2848" opacity=".95" stroke="#8fb6e0" stroke-width="1.2"/>
      <text x="241" y="74" text-anchor="middle" font-size="12" fill="#9fe6ff">D 1.5</text>
    </g>
    <g stroke="#7fd8ff" stroke-width="1.6" opacity=".6" fill="none">
      <path d="M280 64 V48"/><path d="M304 64 V48"/>
    </g>
    <g fill="#7fd8ff" opacity=".65">
      <polygon points="276.8,49 283.2,49 280,42.5"/>
      <polygon points="300.8,49 307.2,49 304,42.5"/>
    </g>
  </g>

  <!-- ===== MERGE: films glide together + superimposed stack ===== -->
  <g id="cvwMerge" opacity="0">
    <g stroke="#5fe0ff" stroke-width="2" stroke-dasharray="7 5" opacity=".85" fill="none" filter="url(#cvwGs)">
      <path d="M326 116 H384"/><path d="M326 160 H384"/>
    </g>
    <g fill="#5fe0ff" opacity=".9">
      <polygon points="384,111.5 384,120.5 393,116"/>
      <polygon points="384,155.5 384,164.5 393,160"/>
    </g>
    <text x="357" y="187" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".7">SUPERIMPOSE</text>
    <!-- bottom sheet (film B), corners peeking -->
    <rect x="408" y="72" width="104" height="135" rx="5" fill="url(#cvwSheetG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- top sheet (film A) -->
    <rect x="398" y="62" width="104" height="135" rx="5" fill="url(#cvwSheetG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- where both films overlap, density adds: darker -->
    <rect x="408" y="72" width="94" height="125" rx="2" fill="#081427" opacity=".8"/>
    <!-- registered weld image (single, coincident) -->
    <rect x="436" y="72" width="28" height="125" fill="url(#cvwBandDG)"/>
    <path d="M439 72 C437.5 98 440.5 124 438.5 148 C437.5 170 440 190 438.8 197" stroke="#eaf8ff" stroke-width="1" opacity=".16" fill="none"/>
    <path d="M461.5 72 C463 98 460.2 124 462 148 C463 170 460.8 190 461.8 197" stroke="#eaf8ff" stroke-width="1" opacity=".16" fill="none"/>
    <g stroke="#eaf8ff" stroke-width="4" opacity=".04" fill="none">
      <path d="M437 84 Q450 78 463 84"/><path d="M437 106 Q450 100 463 106"/>
      <path d="M437 128 Q450 122 463 128"/><path d="M437 150 Q450 144 463 150"/>
      <path d="M437 172 Q450 166 463 172"/>
    </g>
    <g fill="#02070f" opacity=".98">
      <circle cx="450" cy="100" r="2.2"/><circle cx="453" cy="112" r="1.1"/>
      <circle cx="445" cy="126" r="1.5"/><circle cx="456" cy="150" r="1.8"/>
    </g>
    <!-- transmitted light through the stack: thinned to a sliver -->
    <path d="M488 58 V46" stroke="#7fd8ff" stroke-width="1" opacity=".42" fill="none"/>
    <polygon points="485.5,47 490.5,47 488,41.5" fill="#7fd8ff" opacity=".45"/>
  </g>
  <circle id="cvwPing" cx="455" cy="134" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#cvwGs)"/>

  <!-- ===== SUM: density tag + equation row ===== -->
  <g id="cvwSum" opacity="0">
    <rect x="402" y="53" width="70" height="18" rx="4" fill="#0e2848" opacity=".95" stroke="#5fe0ff" stroke-width="1.3" filter="url(#cvwGs)"/>
    <text x="437" y="66" text-anchor="middle" font-size="12" fill="#9fe6ff">D ≈ 2.9</text>
    <text x="455" y="236" text-anchor="middle" font-size="13" fill="#9fe6ff"><tspan>1.4</tspan><tspan fill="#6f9fc8"> + </tspan><tspan>1.5</tspan><tspan fill="#6f9fc8"> ≈ </tspan><tspan fill="#5fe0ff" font-weight="700">2.9</tspan></text>
  </g>
  <path id="cvwSumLine" d="M402 246 H508" stroke="#5fe0ff" stroke-width="1.5" fill="none" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity=".8"/>
</svg>
