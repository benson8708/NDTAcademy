    <line x1="52" y1="188" x2="52" y2="226" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>
    <line x1="61" y1="188" x2="61" y2="226" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>
