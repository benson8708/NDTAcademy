  <!-- depth direction -->
  <text x="130" y="101" font-size="11" fill="#9fe6ff" opacity=".7">DEPTH</text>
  <line x1="178" y1="97.5" x2="268" y2="97.5" stroke="#5fe0ff" stroke-width="1.2" opacity=".55" marker-end="url(#agarrC)"/>
  <text x="24" y="34" font-size="12" fill="#9fe6ff" opacity=".75">COARSE-GRAINED STEEL</text>

  <!-- ===== agBeam: contact probe + fading sound beam ===== -->
