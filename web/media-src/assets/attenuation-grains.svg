    <!-- cable + strain relief -->
    <path d="M24 207 C 12 207 8 194 6 166" fill="none" stroke="#8fb6e0" stroke-width="2.4" opacity=".75"/>
    <path d="M24 199 L38 196 L38 218 L24 215 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
