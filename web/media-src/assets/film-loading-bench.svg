<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="flbGlow" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flbGlowA" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="flbBenchG" x1="0" y1="192" x2="0" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3e66" stop-opacity=".85"/><stop offset="1" stop-color="#0c2340" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="flbFoilG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4dcf2"/><stop offset=".45" stop-color="#85add4"/><stop offset="1" stop-color="#44719f"/>
    </linearGradient>
    <linearGradient id="flbFilmG" x1="238" y1="96" x2="330" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16395f"/><stop offset=".55" stop-color="#1f4e80"/><stop offset="1" stop-color="#142f52"/>
    </linearGradient>
    <linearGradient id="flbConeG" x1="0" y1="46" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a7a" stop-opacity=".22"/>
      <stop offset=".65" stop-color="#ff7a6b" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ff6a5b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="flbHaloG">
      <stop offset="0" stop-color="#ffb09b" stop-opacity=".7"/>
      <stop offset="1" stop-color="#ff8a7a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flbWeldG" x1="462" y1="0" x2="564" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08152b" stop-opacity="0"/>
      <stop offset=".5" stop-color="#2b86ff" stop-opacity=".65"/>
      <stop offset="1" stop-color="#08152b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===================== flbScene: bench + cassette + bin (visible at 0 s) ===================== -->
  <g id="flbScene">
    <!-- film bin, light-tight, closed — standing behind the bench -->
    <g>
      <path d="M408 98 L398 80 L398 192 L408 192 Z" fill="#0c2340" stroke="#8fb6e0" stroke-width="1.2" stroke-linejoin="round" opacity=".85"/>
      <path d="M408 98 L398 80 L486 80 L496 98 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5" stroke-linejoin="round"/>
      <rect x="408" y="98" width="88" height="94" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
      <line x1="408" y1="114" x2="496" y2="114" stroke="#8fb6e0" stroke-width="1" opacity=".6"/>
      <rect x="446" y="108" width="12" height="12" rx="2" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.2"/>
      <line x1="452" y1="111" x2="452" y2="117" stroke="#9fe6ff" stroke-width="1.2" opacity=".8"/>
      <rect x="416" y="126" width="72" height="42" fill="none" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 4" opacity=".25"/>
      <text x="452" y="146" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".8" letter-spacing=".5">FILM BIN</text>
      <text x="452" y="159" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity=".5" letter-spacing=".5">LIGHT-TIGHT</text>
    </g>

    <!-- bench top (slight 3/4) -->
    <path d="M96 192 L508 192 L548 248 L64 248 Z" fill="url(#flbBenchG)" stroke="#8fb6e0" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="96" y1="192" x2="508" y2="192" stroke="#5fe0ff" stroke-width="1" opacity=".4"/>
    <line x1="140" y1="212" x2="426" y2="212" stroke="#9fe6ff" stroke-width="1" opacity=".1"/>
    <line x1="108" y1="232" x2="492" y2="232" stroke="#9fe6ff" stroke-width="1" opacity=".08"/>
    <!-- front apron -->
    <path d="M64 248 L548 248 L548 278 L64 278 Z" fill="#0c2340" stroke="#8fb6e0" stroke-width="1" stroke-linejoin="round" opacity=".8"/>
    <line x1="72" y1="256" x2="540" y2="256" stroke="#8fb6e0" stroke-width="1" opacity=".25"/>

    <!-- open cassette: lid standing open behind the hinge -->
    <!-- lid outer -->
    <path d="M196 208 L214 146 L386 146 L368 208 Z" fill="#16365c" stroke="#8fb6e0" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- lid inner face -->
    <path d="M206 202 L221 153 L376 153 L361 202 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".8"/>
    <!-- FRONT lead screen: thin bright plate inside the lid -->
    <path d="M212 197 L225 158 L371 158 L358 197 Z" fill="url(#flbFoilG)" stroke="#cfe6ff" stroke-width=".9"/>
    <line x1="227" y1="161" x2="368" y2="161" stroke="#eaf6ff" stroke-width=".8" opacity=".85"/>

    <!-- hinge knuckles -->
    <g fill="#1b3e66" stroke="#8fb6e0" stroke-width="1">
      <rect x="232" y="205" width="16" height="6" rx="2"/>
      <rect x="322" y="205" width="16" height="6" rx="2"/>
    </g>
    <line x1="196" y1="208" x2="368" y2="208" stroke="#5fe0ff" stroke-width="1.2" opacity=".5"/>

    <!-- cassette base (well) -->
    <path d="M180 238 L196 208 L368 208 L352 238 Z" fill="#16365c" stroke="#8fb6e0" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M190 233 L204 212 L357 212 L343 233 Z" fill="#0e2848" stroke="#8fb6e0" stroke-width="1" opacity=".8"/>
    <!-- BACK lead screen: thin bright plate in the well -->
    <path d="M196 230 L209 215 L351 215 L338 230 Z" fill="url(#flbFoilG)" stroke="#cfe6ff" stroke-width=".9"/>
    <line x1="210" y1="217.5" x2="349" y2="217.5" stroke="#eaf6ff" stroke-width=".8" opacity=".85"/>

    <!-- screen labels, left rail -->
    <g font-size="11" fill="#9fe6ff" text-anchor="end" letter-spacing=".5">
      <text x="166" y="152" opacity=".9">FRONT SCREEN</text>
      <text x="166" y="164" font-size="10" opacity=".55">Pb 0.005 IN</text>
      <path d="M170 156 L224 170" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
      <text x="166" y="196" opacity=".9">BACK SCREEN</text>
      <text x="166" y="208" font-size="10" opacity=".55">Pb 0.010 IN</text>
      <path d="M170 200 L228 222" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
    </g>
    <text x="266" y="266" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".75" letter-spacing=".5">OPEN CASSETTE</text>

    <!-- safelight housing (static; lamp lights up with flbSafelight) -->
    <line x1="87" y1="6" x2="87" y2="18" stroke="#8fb6e0" stroke-width="2.5"/>
    <rect x="54" y="18" width="66" height="24" rx="4" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="60" y="34" width="54" height="8" rx="2" fill="#3a1b2c" stroke="#8fb6e0" stroke-width="1" opacity=".9"/>
  </g>

  <!-- ===================== flbSafelight: warm-red cone from upper left (fade ~1 s, 3 s pulse) ===================== -->
  <g id="flbSafelight" opacity="0">
    <!-- pool of light on the bench -->
    <ellipse cx="214" cy="216" rx="110" ry="12" fill="#ff8a7a" opacity=".08">
      <animate attributeName="opacity" values=".08;.13;.08" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- cone -->
    <path d="M62 46 L116 46 L348 212 L96 212 Z" fill="url(#flbConeG)">
      <animate attributeName="opacity" values=".8;1;.8" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M62 46 L96 212 M116 46 L348 212" stroke="#ff8a7a" stroke-width="1" opacity=".18" fill="none"/>
    <!-- lit filter window -->
    <rect x="60" y="34" width="54" height="8" rx="2" fill="#c2473c" stroke="#ff8a7a" stroke-width="1" filter="url(#flbGlowA)">
      <animate attributeName="opacity" values=".85;1;.85" dur="3s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="87" cy="44" rx="34" ry="12" fill="url(#flbHaloG)" opacity=".5">
      <animate attributeName="opacity" values=".5;.7;.5" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <text x="128" y="31" font-size="11" fill="#ff9b8b" opacity=".85" letter-spacing=".5">SAFELIGHT</text>
  </g>

  <!-- ===================== flbHands: bare hands lifting one sheet by its top corners (fade ~0.5 s, lift loop) ===================== -->
  <g id="flbHands" opacity="0">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2.6; 0 0" keyTimes="0;0.5;1" dur="4.4s" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1" repeatCount="indefinite"/>
    <!-- left hand: short wrist + hand mass, knuckles dipping behind the sheet edge -->
    <path d="M221 55.5 Q224 49 231 48.5 L243 66.5 C252 68 258 74 260 82 C260 87 259 91 257 94 Q254 102 249 98 Q244 104 239 98 Q234 102 230 95 C227 90 227 84 229 78 C230 74 231 73 233 73.5 Z" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- right hand -->
    <path d="M339 49.5 Q336 43 329 42.5 L317 60.5 C308 62 302 68 300 76 C300 81 301 85 303 88 Q306 96 311 92 Q316 98 321 92 Q326 96 330 89 C333 84 333 78 331 72 C330 68 329 67 327 67.5 Z" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- film sheet, bowing very slightly -->
    <path d="M244 100 Q280 104 316 94 C320 118 321 144 318 168 Q281 178 242 172 C239 148 240 122 244 100 Z" fill="url(#flbFilmG)" stroke="#5fe0ff" stroke-width="1.4" opacity=".97"/>
    <path d="M244 100 Q280 104 316 94 C320 118 321 144 318 168 Q281 178 242 172 C239 148 240 122 244 100 Z" fill="none" stroke="#5fe0ff" stroke-width="1" filter="url(#flbGlow)" opacity=".3"/>
    <path d="M278 102 C275 126 275 150 279 172" stroke="#9fe6ff" stroke-width="1" opacity=".22" fill="none"/>
    <path d="M298 99 C296 122 296 146 299 170" stroke="#9fe6ff" stroke-width="1" opacity=".12" fill="none"/>
    <!-- thumbs in front of the sheet corners -->
    <g fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.4" stroke-linejoin="round">
      <rect x="234.75" y="90" width="9.5" height="25" rx="4.75" transform="rotate(-42 239.5 102.5)"/>
      <rect x="315.75" y="84" width="9.5" height="25" rx="4.75" transform="rotate(42 320.5 96.5)"/>
    </g>
    <text x="280" y="24" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85" letter-spacing=".5">UNPROCESSED FILM</text>
  </g>

  <!-- ===================== flbGhostLink: leader from sheet to the ghost inset (draw ~5.8 s) ===================== -->
  <path id="flbGhostLink" d="M324 172 Q396 214 448 250" fill="none" stroke="#ffc24b" stroke-width="1.2" opacity=".4" stroke-linecap="butt" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===================== flbGhostMark: radiograph inset, crescent + fingerprint ghosts (fade ~6.2 s) ===================== -->
  <g id="flbGhostMark" opacity="0">
    <rect x="452" y="242" width="122" height="86" rx="6" fill="#06101f" opacity=".95" stroke="#5fe0ff" stroke-width="1.2"/>
    <text x="513" y="256" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity=".6" letter-spacing=".5">AFTER PROCESSING</text>
    <rect x="462" y="262" width="102" height="42" fill="#0a1f3a" stroke="#2b4a7d" stroke-width="1"/>
    <rect x="462" y="276" width="102" height="14" fill="url(#flbWeldG)"/>
    <line x1="462" y1="276" x2="564" y2="276" stroke="#3f9bff" stroke-width="1" opacity=".45"/>
    <line x1="462" y1="290" x2="564" y2="290" stroke="#3f9bff" stroke-width="1" opacity=".45"/>
    <!-- crescent (crimp) ghost -->
    <path d="M476 297 A 12 12 0 0 1 494 287" fill="none" stroke="#ffc24b" stroke-width="2.6" stroke-linecap="round" filter="url(#flbGlowA)" opacity=".55">
      <animate attributeName="opacity" values=".4;.8;.5;.75;.4" dur="3.4s" repeatCount="indefinite"/>
    </path>
    <!-- fingerprint ghost: nested whorl ridges -->
    <g fill="none" stroke="#ffc24b" stroke-width="1" opacity=".5" transform="rotate(18 537 286)">
      <animate attributeName="opacity" values=".3;.6;.38;.55;.3" dur="3.4s" begin="-1.4s" repeatCount="indefinite"/>
      <ellipse cx="537" cy="286" rx="3.6" ry="4.6" stroke-dasharray="9 3"/>
      <ellipse cx="537" cy="286" rx="7" ry="8.6" stroke-dasharray="13 4"/>
      <ellipse cx="537" cy="286" rx="10.4" ry="12.4" stroke-dasharray="17 5"/>
    </g>
    <text x="513" y="320" text-anchor="middle" font-size="11" fill="#ffc24b" opacity=".9" letter-spacing=".5">GHOST MARKS</text>
  </g>
</svg>
