<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cfgGlowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cfgGlowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cfgBlurS" filterUnits="userSpaceOnUse" x="170" y="95" width="250" height="70">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <linearGradient id="cfgBody" x1="0" y1="108" x2="0" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a4068"/>
      <stop offset=".16" stop-color="#3a6ea0"/>
      <stop offset=".42" stop-color="#1b3e66"/>
      <stop offset=".78" stop-color="#10294a"/>
      <stop offset="1" stop-color="#091c33"/>
    </linearGradient>
    <linearGradient id="cfgFace" x1="124" y1="160" x2="156" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/>
      <stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="cfgPad" x1="0" y1="94" x2="0" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14304f"/>
      <stop offset=".5" stop-color="#0e2848"/>
      <stop offset="1" stop-color="#0a1f3a"/>
    </linearGradient>
  </defs>

  <!-- ===== BASE: head-shot bench pads + solid shaft ===== -->
  <g id="cfgShaft">
    <!-- bus cables to the heads -->
    <g stroke="#8fb6e0" stroke-width="2" opacity=".4" fill="none">
      <path d="M66 160 H86"/>
      <path d="M514 160 H534"/>
    </g>
    <!-- contact heads (clamp pads) -->
    <rect x="86" y="94" width="34" height="132" rx="3" fill="url(#cfgPad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="480" y="94" width="34" height="132" rx="3" fill="url(#cfgPad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <!-- copper contact braid strips facing the part -->
    <rect x="115" y="98" width="4" height="124" fill="#ff9b4b" opacity=".3"/>
    <rect x="481" y="98" width="4" height="124" fill="#ff9b4b" opacity=".3"/>
    <!-- shaft body (side / three-quarter view) -->
    <path d="M140 108 H460 A16 52 0 0 1 460 212 H140 Z" fill="url(#cfgBody)"/>
    <!-- machining texture along the length -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".14" fill="none">
      <path d="M158 122 H462"/>
      <path d="M158 146 H468"/>
      <path d="M158 178 H468"/>
      <path d="M158 198 H460"/>
    </g>
    <!-- soft specular highlight -->
    <path d="M160 121 H452" stroke="#cfe6ff" stroke-width="5" opacity=".12" fill="none"/>
    <!-- silhouette edges -->
    <g stroke="#8fb6e0" stroke-width="2" fill="none">
      <path d="M140 108 H460"/>
      <path d="M140 212 H460"/>
      <path d="M460 108 A16 52 0 0 1 460 212" stroke-width="1.8"/>
    </g>
    <!-- machined end face (lathe rings + center drill) -->
    <ellipse cx="140" cy="160" rx="16" ry="52" fill="url(#cfgFace)" stroke="#8fb6e0" stroke-width="1.8"/>
    <ellipse cx="140" cy="160" rx="9.5" ry="31" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
    <ellipse cx="140" cy="160" rx="2.6" ry="8.5" fill="#0a1f3a" stroke="#8fb6e0" stroke-width="1" opacity=".55"/>
  </g>

  <!-- ===== CURRENT: axial arrow, head to head through the part ===== -->
  <g id="cfgCurrent" stroke="#ff9b4b" fill="none" stroke-linejoin="round">
    <path d="M46 160 H554" stroke-width="6" opacity=".22" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <path d="M46 160 H554" stroke-width="2.5" opacity=".95" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <path d="M70 152.5 L79 160 L70 167.5" stroke-width="2.5" filter="url(#cfgGlowR)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <path d="M210 153 L219 160 L210 167" stroke-width="2.2" opacity=".8" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <path d="M543 152.5 L552 160 L543 167.5" stroke-width="2.5" filter="url(#cfgGlowR)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  </g>

  <!-- ===== CRACK: ONE tight longitudinal seam / quench crack, PARALLEL to axis ===== -->
  <g id="cfgCrack" fill="none" stroke-linejoin="round">
    <path d="M200 128 L226 126 L252 129 L280 125 L308 128 L336 125 L362 128 L396 125 M252 129 L260 134 L272 136 M336 125 L328 119" stroke="#081528" stroke-width="5.2" opacity=".6" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    <path d="M200 128 L226 126 L252 129 L280 125 L308 128 L336 125 L362 128 L396 125 M252 129 L260 134 L272 136 M336 125 L328 119" stroke="#ff6b6b" stroke-width="2.6" filter="url(#cfgGlowR)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  </g>

  <!-- ===== FLUX: circumferential hoops, perpendicular to current ===== -->
  <g id="cfgFlux" fill="none" stroke="#5fe0ff" stroke-linejoin="round">
    <!-- far half of each hoop (bulges toward the visible end face), seen faintly through the part -->
    <g stroke-width="1.5" opacity=".26">
      <path d="M180 104 A17 56 0 0 0 180 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M240 104 A17 56 0 0 0 240 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M300 104 A17 56 0 0 0 300 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M360 104 A17 56 0 0 0 360 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M420 104 A17 56 0 0 0 420 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    </g>
    <!-- near half of each hoop (bulges away from the visible end face) -->
    <g stroke-width="2" opacity=".95" filter="url(#cfgGlowR)">
      <path d="M180 104 A17 56 0 0 1 180 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M240 104 A17 56 0 0 1 240 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M300 104 A17 56 0 0 1 300 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M360 104 A17 56 0 0 1 360 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M420 104 A17 56 0 0 1 420 216" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    </g>
    <!-- direction chevrons on the near arcs (B points down on the viewer side) -->
    <g stroke-width="2" filter="url(#cfgGlowR)">
      <path d="M192 152 L197 163 L202 152" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M252 152 L257 163 L262 152" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M312 152 L317 163 L322 152" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M372 152 L377 163 L382 152" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M432 152 L437 163 L442 152" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    </g>
  </g>

  <!-- ===== LEAKAGE + PARTICLE INDICATION ===== -->
  <g id="cfgLeak" opacity="0">
    <!-- amber indication glow building along the crack -->
    <path d="M200 128 L226 126 L252 129 L280 125 L308 128 L336 125 L362 128 L396 125" fill="none" stroke="#ffc24b" stroke-width="6" opacity=".5" filter="url(#cfgBlurS)"/>
    <path d="M200 128 L226 126 L252 129 L280 125 L308 128 L336 125 L362 128 L396 125" fill="none" stroke="#ffc24b" stroke-width="2.4" opacity=".9"/>
    <!-- leakage-flux bristles where the near hoop arcs cross the crack -->
    <g stroke="#ffc24b" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".9">
      <path d="M253.5 126.5 l-5 -8 M253.5 126.5 l0 -10 M253.5 126.5 l5 -8"/>
      <path d="M313.5 125 l-5 -8 M313.5 125 l0 -10 M313.5 125 l5 -8"/>
      <path d="M373.5 124.5 l-5 -8 M373.5 124.5 l0 -10 M373.5 124.5 l5 -8"/>
    </g>
    <!-- magnetic particles clustering on the leakage field -->
    <g fill="#ffc24b">
      <circle cx="215" cy="127.6" r="1.4"/>
      <circle cx="238" cy="126.4" r="1.3"/>
      <circle cx="265" cy="128.6" r="1.5"/>
      <circle cx="296" cy="126.4" r="1.3"/>
      <circle cx="322" cy="126.2" r="1.4"/>
      <circle cx="352" cy="127" r="1.3"/>
      <circle cx="380" cy="126.2" r="1.4"/>
    </g>
  </g>

  <!-- ===== LABELS ===== -->
  <g id="cfgCurrentLbl" opacity="0">
    <path d="M74 238 L74 172" stroke="#ff9b4b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="40" y="252" font-size="12" fill="#ff9b4b">CURRENT (I)</text>
  </g>
  <g id="cfgFluxLbl" opacity="0">
    <path d="M180 100 L162 80" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
    <text x="158" y="76" text-anchor="end" font-size="12" fill="#9fe6ff">FLUX (B)</text>
  </g>
  <g id="cfgCrackLbl" opacity="0">
    <path d="M398 122 L440 94" stroke="#ff6b6b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="444" y="90" font-size="12" fill="#ff6b6b">SEAM / QUENCH CRACK</text>
  </g>
  <g id="cfgLeakLbl" opacity="0">
    <path d="M318 119 L336 82" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="340" y="78" font-size="11" fill="#ffc24b">INDICATION</text>
  </g>

  <!-- ===== ping at crack initiation ===== -->
  <circle id="cfgPing" cx="200" cy="128" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#cfgGlowR)"/>
</svg>
