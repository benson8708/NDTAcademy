<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="iusGlow" filterUnits="userSpaceOnUse" x="-30" y="-30" width="660" height="400">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iusGlowS" filterUnits="userSpaceOnUse" x="-30" y="-30" width="660" height="400">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="iusSteelG" gradientUnits="userSpaceOnUse" x1="0" y1="88" x2="0" y2="130">
      <stop offset="0" stop-color="#2c5a88"/><stop offset="0.4" stop-color="#16365c"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="iusBaseG" gradientUnits="userSpaceOnUse" x1="0" y1="184" x2="0" y2="200">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".5"/><stop offset="1" stop-color="#1751c4" stop-opacity=".5"/>
    </linearGradient>
    <linearGradient id="iusWedgeG" gradientUnits="userSpaceOnUse" x1="348" y1="0" x2="544" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".05"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".2"/>
    </linearGradient>
  </defs>

  <!-- static caption -->
  <g>
    <text x="24" y="30" font-size="11" letter-spacing="2.5" fill="#9fe6ff" opacity="0.85">INHERENT UNSHARPNESS</text>
    <rect x="24" y="36" width="34" height="2" fill="#5fe0ff" opacity="0.6"/>
  </g>

  <!-- ===== LEFT: parallel beam, absorber edge, emulsion cross-section ===== -->
  <g>
    <text x="197" y="50" font-size="9.5" letter-spacing="1.2" fill="#ffc24b" opacity=".75" text-anchor="middle">PARALLEL RADIATION</text>
    <!-- blocked rays -->
    <g stroke="#ffc24b" stroke-width="1.6" stroke-opacity=".55" stroke-linecap="round">
      <line x1="104" y1="58" x2="104" y2="80"/>
      <line x1="134" y1="58" x2="134" y2="80"/>
      <line x1="164" y1="58" x2="164" y2="80"/>
    </g>
    <g fill="#ffc24b" opacity=".55">
      <path d="M100.5 80 L107.5 80 L104 87 Z"/>
      <path d="M130.5 80 L137.5 80 L134 87 Z"/>
      <path d="M160.5 80 L167.5 80 L164 87 Z"/>
    </g>
    <!-- passing rays reach the film -->
    <g stroke="#ffc24b" stroke-width="1.6" stroke-opacity=".55" stroke-linecap="round">
      <line x1="240" y1="58" x2="240" y2="140"/>
      <line x1="266" y1="58" x2="266" y2="140"/>
      <line x1="290" y1="58" x2="290" y2="140"/>
    </g>
    <g fill="#ffc24b" opacity=".55">
      <path d="M236.5 140 L243.5 140 L240 147 Z"/>
      <path d="M262.5 140 L269.5 140 L266 147 Z"/>
      <path d="M286.5 140 L293.5 140 L290 147 Z"/>
    </g>

    <!-- absorber slab with sharp right edge -->
    <rect x="88" y="88" width="108" height="42" fill="url(#iusSteelG)" stroke="#9fe6ff" stroke-opacity=".85" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="142" y="113" font-size="10" letter-spacing="1.5" fill="#9fe6ff" opacity=".9" text-anchor="middle">ABSORBER</text>
    <line x1="196" y1="88" x2="196" y2="130" stroke="#eaf6ff" stroke-width="2" stroke-opacity=".9"/>
    <circle cx="196" cy="130" r="2.4" fill="#eaf6ff" filter="url(#iusGlowS)"/>

    <!-- film: emulsion + base -->
    <rect x="88" y="152" width="212" height="32" fill="#9fe6ff" fill-opacity=".12"/>
    <rect x="88" y="184" width="212" height="16" fill="url(#iusBaseG)"/>
    <line x1="88" y1="184" x2="300" y2="184" stroke="#eaf6ff" stroke-width=".8" opacity=".4"/>
    <rect x="88" y="152" width="212" height="48" fill="none" stroke="#cfe6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <g font-size="9.5" fill="#9fe6ff" letter-spacing="1" text-anchor="end">
      <line x1="82" y1="168" x2="86" y2="168" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
      <text x="79" y="171">EMULSION</text>
      <line x1="82" y1="192" x2="86" y2="192" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
      <text x="79" y="195">BASE</text>
    </g>

    <!-- static grain field in emulsion -->
    <g fill="#9fe6ff" opacity=".3">
      <circle cx="94" cy="159" r="1.2"/><circle cx="108" cy="160" r="1.1"/><circle cx="122" cy="158" r="1.2"/><circle cx="136" cy="160" r="1.0"/><circle cx="150" cy="158" r="1.2"/><circle cx="164" cy="160" r="1.1"/><circle cx="178" cy="158" r="1.2"/><circle cx="192" cy="160" r="1.0"/><circle cx="206" cy="158" r="1.2"/><circle cx="220" cy="160" r="1.1"/><circle cx="234" cy="158" r="1.2"/><circle cx="248" cy="160" r="1.0"/><circle cx="262" cy="158" r="1.2"/><circle cx="276" cy="160" r="1.1"/><circle cx="290" cy="158" r="1.2"/>
      <circle cx="101" cy="174" r="1.1"/><circle cx="115" cy="176" r="1.2"/><circle cx="129" cy="174" r="1.0"/><circle cx="143" cy="176" r="1.2"/><circle cx="157" cy="174" r="1.1"/><circle cx="171" cy="176" r="1.2"/><circle cx="185" cy="174" r="1.0"/><circle cx="199" cy="176" r="1.2"/><circle cx="213" cy="174" r="1.1"/><circle cx="227" cy="176" r="1.2"/><circle cx="241" cy="174" r="1.0"/><circle cx="255" cy="176" r="1.2"/><circle cx="269" cy="174" r="1.1"/><circle cx="283" cy="176" r="1.2"/><circle cx="296" cy="174" r="1.0"/>
    </g>

    <!-- shadow tint under absorber + exposed glow on open side -->
    <rect x="88" y="130" width="108" height="54" fill="#02060e" opacity=".38"/>
    <rect x="196" y="152" width="104" height="32" fill="#5fe0ff" opacity=".08"/>
    <text x="142" y="145" font-size="9" letter-spacing="1.2" fill="#9fe6ff" opacity=".55" text-anchor="middle">SHADOW</text>

    <!-- true geometric edge -->
    <line x1="196" y1="130" x2="196" y2="212" stroke="#5fe0ff" stroke-width="1.5" stroke-opacity=".8" stroke-dasharray="4 3"/>
    <text x="196" y="224" font-size="9.5" letter-spacing="1.2" fill="#5fe0ff" opacity=".85" text-anchor="middle">TRUE EDGE</text>
    <text x="88" y="244" font-size="8.5" letter-spacing="1" fill="#9fe6ff" opacity=".5">PARALLEL BEAM — GEOMETRIC Ug = 0</text>
  </g>

  <!-- ===== iusPhoton: photon absorbed in emulsion (fade @0.8) ===== -->
  <g id="iusPhoton" opacity="0">
    <text x="206" y="70" font-size="9" letter-spacing="1.2" fill="#ffc24b" opacity=".95" text-anchor="end">PHOTON</text>
    <line x1="214" y1="58" x2="214" y2="156" stroke="#ffc24b" stroke-width="2" stroke-linecap="round" opacity=".9" filter="url(#iusGlow)"/>
    <g stroke="#ffc24b" stroke-width="1.5" stroke-linecap="round" opacity=".95">
      <line x1="218.3" y1="159.5" x2="222.7" y2="157"/>
      <line x1="218.3" y1="164.5" x2="222.7" y2="167"/>
      <line x1="209.7" y1="159.5" x2="205.3" y2="157"/>
      <line x1="209.7" y1="164.5" x2="205.3" y2="167"/>
      <line x1="214" y1="167" x2="214" y2="172"/>
    </g>
    <circle cx="214" cy="162" r="2.2" fill="#ffc24b" filter="url(#iusGlowS)"/>
  </g>

  <!-- ===== iusTrack: fast-electron track wiggles past the edge (draw @2.5) ===== -->
  <path id="iusTrack" d="M214 162 L205 155 L199 171 L190 163 L181 174 L170 165 L161 173 L152 168" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#iusGlow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== iusGrains: grains light up beyond the true edge (fade @3.2) ===== -->
  <g id="iusGrains" opacity="0">
    <text x="226" y="166" font-size="9" letter-spacing="1.2" fill="#5fe0ff" opacity=".95">FAST</text>
    <text x="226" y="177" font-size="9" letter-spacing="1.2" fill="#5fe0ff" opacity=".95">ELECTRON</text>
    <g fill="#5fe0ff" filter="url(#iusGlowS)">
      <circle cx="205" cy="155" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="199" cy="171" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" begin="-0.3s" repeatCount="indefinite"/></circle>
      <circle cx="190" cy="163" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" begin="-0.6s" repeatCount="indefinite"/></circle>
      <circle cx="181" cy="174" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle cx="170" cy="165" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" begin="-1.2s" repeatCount="indefinite"/></circle>
      <circle cx="152" cy="168" r="1.9"><animate attributeName="opacity" values=".6;1;.6" dur="1.8s" begin="-1.5s" repeatCount="indefinite"/></circle>
    </g>
    <g fill="none" stroke="#5fe0ff" stroke-width="1">
      <circle cx="181" cy="174" r="4.5">
        <animate attributeName="r" values="3.5;7;3.5" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".8;.15;.8" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="152" cy="168" r="4.5">
        <animate attributeName="r" values="3.5;7;3.5" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".8;.15;.8" dur="2.4s" begin="-1.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ===== RIGHT: density profile across the edge ===== -->
  <g>
    <rect x="332" y="52" width="246" height="168" rx="10" fill="rgba(10,30,60,0.55)" stroke="#5fe0ff" stroke-opacity=".4" stroke-width="1"/>
    <text x="455" y="70" font-size="9.5" letter-spacing="1.2" fill="#9fe6ff" opacity=".8" text-anchor="middle">DENSITY PROFILE ACROSS EDGE</text>
    <!-- axes -->
    <g stroke="#9fe6ff" stroke-width="1.5" stroke-opacity=".75" stroke-linecap="round">
      <line x1="362" y1="200" x2="362" y2="88"/>
      <line x1="362" y1="200" x2="560" y2="200"/>
    </g>
    <path d="M358.6 90 L365.4 90 L362 83 Z" fill="#9fe6ff" opacity=".75"/>
    <path d="M558 196.6 L558 203.4 L565 200 Z" fill="#9fe6ff" opacity=".75"/>
    <text transform="rotate(-90 350 144)" x="350" y="144" font-size="9" letter-spacing="1.2" fill="#9fe6ff" opacity=".75" text-anchor="middle">FILM DENSITY</text>
    <text x="461" y="214" font-size="9" letter-spacing="1.2" fill="#9fe6ff" opacity=".75" text-anchor="middle">POSITION ON FILM</text>
    <!-- edge position + ideal step -->
    <line x1="460" y1="92" x2="460" y2="200" stroke="#9fe6ff" stroke-width="1" stroke-opacity=".4" stroke-dasharray="3 3"/>
    <text x="460" y="88" font-size="9" letter-spacing="1.2" fill="#9fe6ff" opacity=".6" text-anchor="middle">EDGE</text>
    <path d="M370 184 H460 V112 H556" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-opacity=".8" stroke-dasharray="4 3" stroke-linejoin="round"/>
    <text x="468" y="104" font-size="9" letter-spacing="1" fill="#9fe6ff" opacity=".7">IDEAL STEP</text>
  </g>

  <!-- ===== iusRamp: real edge = sloped ramp of width Ui (fade @4.2) ===== -->
  <g id="iusRamp" opacity="0">
    <rect x="428" y="112" width="64" height="72" fill="#5fe0ff" opacity=".07"/>
    <line x1="428" y1="112" x2="428" y2="184" stroke="#5fe0ff" stroke-width="1" stroke-opacity=".35" stroke-dasharray="2 3"/>
    <line x1="492" y1="112" x2="492" y2="184" stroke="#5fe0ff" stroke-width="1" stroke-opacity=".35" stroke-dasharray="2 3"/>
    <path d="M370 184 H428 C452 184 468 112 492 112 H556" fill="none" stroke="#5fe0ff" stroke-width="2.25" stroke-linecap="round" filter="url(#iusGlow)"/>
    <text x="424" y="172" font-size="9" letter-spacing="1" fill="#5fe0ff" opacity=".9" text-anchor="end">ACTUAL</text>
    <line x1="430" y1="148" x2="490" y2="148" stroke="#eaf6ff" stroke-width="1.5"/>
    <path d="M429 148 L436 144.8 L436 151.2 Z" fill="#eaf6ff"/>
    <path d="M491 148 L484 144.8 L484 151.2 Z" fill="#eaf6ff"/>
    <text x="460" y="140" font-size="13" font-style="italic" fill="#eaf6ff" text-anchor="middle">U<tspan dy="3.5" font-size="9.5">i</tspan></text>
  </g>

  <!-- ===== iusEnergy: smear width grows with energy (fade @5.8) ===== -->
  <g id="iusEnergy" opacity="0">
    <text x="446" y="252" font-size="9" letter-spacing="1.2" fill="#9fe6ff" opacity=".7" text-anchor="middle">SMEAR WIDTH GROWS</text>
    <path d="M348 284 L544 262 L544 306 Z" fill="url(#iusWedgeG)"/>
    <path d="M348 284 L544 262 M348 284 L544 306" fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-opacity=".6" stroke-linecap="round"/>
    <line x1="348" y1="284" x2="544" y2="284" stroke="#9fe6ff" stroke-width="1" stroke-opacity=".25" stroke-dasharray="3 3"/>
    <circle cx="348" cy="284" r="2" fill="#5fe0ff" filter="url(#iusGlowS)"/>
    <line x1="554" y1="264" x2="554" y2="304" stroke="#eaf6ff" stroke-width="1.5"/>
    <path d="M554 263 L550.8 270 L557.2 270 Z" fill="#eaf6ff"/>
    <path d="M554 305 L550.8 298 L557.2 298 Z" fill="#eaf6ff"/>
    <text x="562" y="288" font-size="12" font-style="italic" fill="#eaf6ff">U<tspan dy="3" font-size="9">i</tspan></text>
    <g font-size="9" letter-spacing="1" fill="#9fe6ff">
      <text x="348" y="324">LOW ENERGY</text>
      <text x="544" y="324" text-anchor="end">HIGH ENERGY</text>
    </g>
    <line x1="424" y1="320.5" x2="462" y2="320.5" stroke="#9fe6ff" stroke-width="1.5" stroke-opacity=".8"/>
    <path d="M462 317.1 L462 323.9 L469 320.5 Z" fill="#9fe6ff" opacity=".8"/>
  </g>
</svg>
