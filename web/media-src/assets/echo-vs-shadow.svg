<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="evGlowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="716" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="evGlowW" filterUnits="userSpaceOnUse" x="-13" y="56" width="644" height="289">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="evSteel" x1="0" y1="112" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".38" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="evProbeG" x1="0" y1="70" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".5" stop-color="#16334f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="evProbeGR" x1="0" y1="258" x2="0" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".5" stop-color="#16334f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="evScrG" x1="0" y1="240" x2="0" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d2746"/><stop offset="1" stop-color="#050f1f"/>
    </linearGradient>
    <linearGradient id="evBeamG" x1="0" y1="112" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".06"/>
    </linearGradient>
    <pattern id="evHatchR" width="7" height="7" patternUnits="userSpaceOnUse">
      <path d="M-1 8 L8 -1" stroke="#ff6b6b" stroke-width="1" fill="none"/>
    </pattern>
    <linearGradient id="evScanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===================== SPLIT: divider + left title ===================== -->
  <g id="evSplit" opacity="0">
    <line x1="300" y1="42" x2="300" y2="298" stroke="#8fb6e0" stroke-width="1.5" stroke-dasharray="5 5" opacity=".32"/>
    <text x="150" y="30" text-anchor="middle" font-size="13" fill="#9fe6ff" opacity=".95">PULSE ECHO</text>
  </g>

  <!-- ===================== LEFT: PULSE ECHO ===================== -->
  <!-- steel block cross-section -->
  <rect x="36" y="112" width="228" height="104" fill="url(#evSteel)"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".2">
    <line x1="40" y1="128" x2="260" y2="128"/>
    <line x1="40" y1="152" x2="260" y2="152"/>
    <line x1="40" y1="178" x2="260" y2="178"/>
    <line x1="40" y1="200" x2="260" y2="200"/>
  </g>
  <rect x="36" y="112" width="228" height="104" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".4"/>
  <line x1="36" y1="112" x2="264" y2="112" stroke="#8fb6e0" stroke-width="2"/>
  <line x1="36" y1="216" x2="264" y2="216" stroke="#8fb6e0" stroke-width="2"/>
  <!-- healthy back-wall contact under the beam path -->
  <line x1="134" y1="214.4" x2="166" y2="214.4" stroke="#5fe0ff" stroke-width="2" opacity=".5"/>

  <!-- mid-depth flaw (always present in the scene) -->
  <path d="M136 164 Q150 157.6 164 164 Q150 170.4 136 164 Z" fill="#060e1c" stroke="#ff6b6b" stroke-width="1.5" filter="url(#evGlowW)" opacity=".95"/>

  <!-- single T/R probe on top face -->
  <g id="evProbe" opacity="0">
    <path d="M150 62 C150 42 122 38 94 26" fill="none" stroke="#0e2848" stroke-width="3.5" opacity=".9"/>
    <path d="M150 62 C150 42 122 38 94 26" fill="none" stroke="#8fb6e0" stroke-width="1.6" opacity=".75"/>
    <rect x="145" y="62" width="10" height="9" rx="2" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="126" y="70" width="48" height="36" rx="4" fill="url(#evProbeG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="132" y1="80" x2="168" y2="80" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
    <rect x="128" y="100" width="44" height="6" fill="#0e2848"/>
    <line x1="122" y1="110" x2="178" y2="110" stroke="#5fe0ff" stroke-width="1.6" opacity=".55"/>
  </g>

  <!-- pulse down to the flaw (draw-on) -->
  <path id="evPulse" d="M142 114 V152 M136.5 144.5 L142 152.5 L147.5 144.5" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#evGlowW)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <circle id="evPingL" cx="150" cy="164" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#evGlowW)"/>
  <!-- echo back to the SAME probe (draw-on) -->
  <path id="evEcho" d="M158 156 V114 M152.5 122 L158 113.5 L163.5 122" fill="none" stroke="#ff6b6b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#evGlowW)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- mini A-scan strip below the block -->
  <g id="evScan" opacity="0">
    <path d="M150 172 L141 238" stroke="#ff6b6b" stroke-width="1.2" stroke-dasharray="3 3" opacity=".45" fill="none"/>
    <path d="M36 232 H144" stroke="#5fe0ff" stroke-width="1.2" opacity=".7" fill="none"/>
    <path d="M152 232 L144 228.8 V235.2 Z" fill="#5fe0ff" opacity=".75"/>
    <text x="160" y="236" font-size="11" fill="#9fe6ff" opacity=".9">TIME → DEPTH</text>
    <rect x="36" y="240" width="228" height="56" rx="4" fill="url(#evScrG)" stroke="#8fb6e0" stroke-width="1.2" opacity=".95"/>
    <path d="M50 246 V292 M86 246 V292 M122 246 V292 M158 246 V292 M194 246 V292 M230 246 V292" stroke="#5fe0ff" stroke-width="1" opacity=".12" fill="none"/>
    <!-- trace: IP -->
    <path d="M44 288 L46 288 L48 284 L50 250 L52 282 L54 270 L56 286 L60 288.5 L70 287.6 L82 288.4 L94 287.5 L106 288.3 L118 287.7 L126 288.2 L130 288" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linejoin="round" opacity=".92" filter="url(#evGlowW)"/>
    <!-- trace: flaw echo at mid time base -->
    <path d="M130 288 L134 287 L137 268 L140 261 L143 276 L145 284 L148 288" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linejoin="round" opacity=".95" filter="url(#evGlowW)"/>
    <!-- trace: back wall -->
    <path d="M148 288 L156 287.6 L168 288.4 L180 287.6 L192 288.3 L204 287.6 L216 288.2 L222 287.4 L226 280 L230 254 L233 277 L236 270 L238 285 L241 288.3 L248 287.8 L256 288" fill="none" stroke="#5fe0ff" stroke-width="1.6" stroke-linejoin="round" opacity=".92" filter="url(#evGlowW)"/>
    <text x="62" y="256" font-size="11" fill="#9fe6ff" opacity=".85">IP</text>
    <text x="140" y="256" text-anchor="middle" font-size="11" fill="#ff6b6b" opacity=".95">F</text>
    <text x="231" y="250" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">BW</text>
  </g>

  <!-- ===================== RIGHT: THROUGH TRANSMISSION ===================== -->
  <!-- steel block cross-section -->
  <rect x="336" y="112" width="198" height="104" fill="url(#evSteel)"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".2">
    <line x1="340" y1="128" x2="530" y2="128"/>
    <line x1="340" y1="152" x2="530" y2="152"/>
    <line x1="340" y1="178" x2="530" y2="178"/>
    <line x1="340" y1="200" x2="530" y2="200"/>
  </g>
  <rect x="336" y="112" width="198" height="104" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".4"/>
  <line x1="336" y1="112" x2="534" y2="112" stroke="#8fb6e0" stroke-width="2"/>
  <line x1="336" y1="216" x2="534" y2="216" stroke="#8fb6e0" stroke-width="2"/>

  <!-- aligned transmitter / receiver pair + beam + level bar frame -->
  <g id="evPair" opacity="0">
    <text x="450" y="30" text-anchor="middle" font-size="13" fill="#9fe6ff" opacity=".95">THROUGH TRANSMISSION</text>
    <line x1="430" y1="58" x2="430" y2="270" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 4" opacity=".25"/>
    <!-- beam column through the thickness -->
    <path d="M417 112 H443 V216 H417 Z" fill="url(#evBeamG)"/>
    <line x1="417" y1="112" x2="417" y2="216" stroke="#5fe0ff" stroke-width="1" opacity=".3"/>
    <line x1="443" y1="112" x2="443" y2="216" stroke="#5fe0ff" stroke-width="1" opacity=".3"/>
    <!-- TX probe (top) -->
    <path d="M430 62 C430 42 496 44 556 34" fill="none" stroke="#0e2848" stroke-width="3.5" opacity=".9"/>
    <path d="M430 62 C430 42 496 44 556 34" fill="none" stroke="#8fb6e0" stroke-width="1.6" opacity=".75"/>
    <rect x="425" y="62" width="10" height="9" rx="2" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="406" y="70" width="48" height="36" rx="4" fill="url(#evProbeG)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="412" y1="80" x2="448" y2="80" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
    <rect x="408" y="100" width="44" height="6" fill="#0e2848"/>
    <line x1="402" y1="110" x2="458" y2="110" stroke="#5fe0ff" stroke-width="1.6" opacity=".55"/>
    <text x="462" y="88" font-size="11" fill="#9fe6ff" opacity=".9">TX</text>
    <!-- RX probe (bottom, aligned) -->
    <path d="M430 266 C430 284 468 290 504 296" fill="none" stroke="#0e2848" stroke-width="3.5" opacity=".9"/>
    <path d="M430 266 C430 284 468 290 504 296" fill="none" stroke="#8fb6e0" stroke-width="1.6" opacity=".75"/>
    <rect x="425" y="257" width="10" height="9" rx="2" fill="#16334f" stroke="#8fb6e0" stroke-width="1"/>
    <rect x="406" y="222" width="48" height="36" rx="4" fill="url(#evProbeGR)" stroke="#8fb6e0" stroke-width="1.5"/>
    <line x1="412" y1="248" x2="448" y2="248" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
    <rect x="408" y="222" width="44" height="6" fill="#0e2848"/>
    <line x1="402" y1="218" x2="458" y2="218" stroke="#5fe0ff" stroke-width="1.6" opacity=".55"/>
    <text x="462" y="246" font-size="11" fill="#9fe6ff" opacity=".9">RX</text>
    <!-- received-signal level bar: healthy = filled to REF -->
    <rect x="552" y="118" width="24" height="98" fill="#07142a" opacity=".85" stroke="#8fb6e0" stroke-width="1.2"/>
    <rect x="554" y="127" width="20" height="87" fill="#5fe0ff" opacity=".4"/>
    <line x1="554" y1="128" x2="574" y2="128" stroke="#5fe0ff" stroke-width="2" opacity=".9" filter="url(#evGlowW)"/>
    <line x1="546" y1="126" x2="582" y2="126" stroke="#5fe0ff" stroke-width="1.5" stroke-dasharray="4 3" opacity=".85"/>
    <text x="564" y="112" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">REF</text>
  </g>

  <!-- beam centerline arrow TX -> RX (draw-on) -->
  <path id="evBeam" d="M430 116 V202 M424 194 L430 202.5 L436 194" fill="none" stroke="#5fe0ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#evGlowW)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- flaw + shadow cone + signal drop -->
  <g id="evDrop" opacity="0">
    <path d="M415 163 L445 163 L454 216 L406 216 Z" fill="#04101e" opacity=".8"/>
    <path d="M415 163 L445 163 L454 216 L406 216 Z" fill="url(#evHatchR)" opacity=".3"/>
    <path d="M415 163 L406 216 M445 163 L454 216" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 3" opacity=".5" fill="none"/>
    <rect x="406" y="216" width="48" height="14" fill="#04101e" opacity=".55"/>
    <path d="M415 162 Q430 155.8 445 162 Q430 168.2 415 162 Z" fill="#060e1c" stroke="#ff6b6b" stroke-width="1.5" filter="url(#evGlowW)" opacity=".95"/>
    <!-- bar: cover healthy fill, show fallen level -->
    <rect x="553.2" y="119" width="21.6" height="77" fill="#0a1a31"/>
    <line x1="546" y1="126" x2="582" y2="126" stroke="#5fe0ff" stroke-width="1.5" stroke-dasharray="4 3" opacity=".85"/>
    <rect x="554" y="196" width="20" height="18" fill="#ff6b6b" opacity=".8"/>
    <line x1="554" y1="196" x2="574" y2="196" stroke="#ff6b6b" stroke-width="2" opacity=".95" filter="url(#evGlowW)"/>
    <path d="M564 134 V176" stroke="#ff6b6b" stroke-width="3.2" stroke-linecap="round" fill="none" filter="url(#evGlowW)"/>
    <path d="M564 190 L556.5 176 L571.5 176 Z" fill="#ff6b6b" filter="url(#evGlowW)"/>
    <text x="564" y="236" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity=".95">SIGNAL</text>
    <text x="564" y="250" text-anchor="middle" font-size="12" fill="#ff6b6b" opacity=".95">DROPS</text>
  </g>
  <circle id="evPingR" cx="430" cy="162" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#evGlowW)"/>

  <!-- ===================== scan sweep ===================== -->
  <g id="evscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#evScanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#evGlowC)" opacity=".9"/>
  </g>
</svg>
