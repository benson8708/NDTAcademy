<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="hcsGlow" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hcsGlowS" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hcsSkinTopG" x1="300" y1="110" x2="300" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3d72a6"/><stop offset="1" stop-color="#2a5680"/>
    </linearGradient>
    <linearGradient id="hcsSkinFrontG" x1="300" y1="152" x2="300" y2="163" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a7fb0"/><stop offset="1" stop-color="#27517e"/>
    </linearGradient>
    <linearGradient id="hcsFlapG" x1="412" y1="130" x2="266" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86b5dd"/><stop offset="1" stop-color="#4c7da8"/>
    </linearGradient>
    <linearGradient id="hcsDoubG" x1="150" y1="142" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5e93c2"/><stop offset="1" stop-color="#33608c"/>
    </linearGradient>
    <linearGradient id="hcsDoubTopG" x1="190" y1="100" x2="190" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#558cbc"/><stop offset="1" stop-color="#3a6794"/>
    </linearGradient>
    <linearGradient id="hcsSideG" x1="474" y1="200" x2="558" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11294e"/><stop offset="1" stop-color="#0a1c38"/>
    </linearGradient>
    <linearGradient id="hcsWallG" x1="300" y1="167" x2="300" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fb6e0" stop-opacity=".6"/>
      <stop offset=".5" stop-color="#8fb6e0" stop-opacity=".28"/>
      <stop offset="1" stop-color="#8fb6e0" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="hcsHoleG" x1="412" y1="130" x2="558" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02060d"/><stop offset="1" stop-color="#0a1a33"/>
    </linearGradient>
    <linearGradient id="hcsScanFade" x1="-30" y1="0" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".28"/>
    </linearGradient>
    <pattern id="hcsHexP" patternUnits="userSpaceOnUse" width="30" height="12">
      <path d="M0 6 L5 0 L15 0 L20 6 L15 12 L5 12 Z M15 0 L20 -6 L30 -6 L35 0 L30 6 L20 6 Z M15 12 L20 6 L30 6 L35 12 L30 18 L20 18 Z M-15 0 L-10 -6 L0 -6 L5 0 L0 6 L-10 6 Z M-15 12 L-10 6 L0 6 L5 12 L0 18 L-10 18 Z"
        fill="rgba(95,224,255,.035)" stroke="#ffb066" stroke-width="1.1" stroke-opacity=".55"/>
    </pattern>
    <path id="hcsFilT" d="M-6 167 Q-1.6 167.8 -1.6 174 L1.6 174 Q1.6 167.8 6 167 Z"/>
    <path id="hcsFilB" d="M-6 256 Q-1.6 255.2 -1.6 249 L1.6 249 Q1.6 255.2 6 256 Z"/>
  </defs>

  <!-- ===== RIGHT END FACE (always-visible parts) ===== -->
  <polygon points="474,163 558,121 558,230 474,272" fill="url(#hcsSideG)"/>
  <g stroke="#5fa0d0" stroke-width="1.2" opacity=".15">
    <line x1="496" y1="156" x2="496" y2="249"/>
    <line x1="518" y1="145" x2="518" y2="238"/>
    <line x1="540" y1="134" x2="540" y2="227"/>
  </g>
  <polygon points="474,163 558,121 558,125 474,167" fill="#2a170a"/>
  <polygon points="474,163 558,121 558,125 474,167" fill="#ff9b4b" opacity=".25"/>
  <polygon points="474,256 558,214 558,218 474,260" fill="#2a170a"/>
  <polygon points="474,256 558,214 558,218 474,260" fill="#ff9b4b" opacity=".22"/>
  <polygon points="474,260 558,218 558,230 474,272" fill="#1d4066"/>
  <line x1="474" y1="272" x2="558" y2="230" stroke="#8fb6e0" stroke-width="1.4" opacity=".55"/>
  <line x1="558" y1="121" x2="558" y2="230" stroke="#8fb6e0" stroke-width="1.2" opacity=".4"/>
  <line x1="474" y1="163" x2="474" y2="272" stroke="#8fb6e0" stroke-width="1.2" opacity=".45"/>

  <!-- ===== FRONT CROSS-SECTION: bottom skin / bondline / core / bondline ===== -->
  <rect x="100" y="260" width="374" height="12" fill="url(#hcsSkinFrontG)"/>
  <line x1="100" y1="272" x2="474" y2="272" stroke="#8fb6e0" stroke-width="1.8"/>
  <rect x="100" y="256" width="374" height="4" fill="#2a170a"/>
  <rect x="100" y="256" width="374" height="4" fill="#ff9b4b" opacity=".18"/>
  <line x1="100" y1="256" x2="474" y2="256" stroke="#ff9b4b" stroke-width="1" opacity=".55"/>
  <line x1="100" y1="260" x2="474" y2="260" stroke="#ff9b4b" stroke-width="1" opacity=".55"/>

  <rect x="100" y="167" width="374" height="89" fill="rgba(10,30,60,.55)"/>
  <g stroke="url(#hcsWallG)" stroke-width="1.5" fill="none" opacity=".9">
    <path d="M126 167V256 M178 167V256 M230 167V256 M282 167V256 M334 167V256 M386 167V256 M438 167V256"/>
  </g>
  <g stroke="url(#hcsWallG)" stroke-width="1.5" fill="none" opacity=".55">
    <path d="M152 167V256 M204 167V256 M256 167V256 M308 167V256 M360 167V256 M412 167V256 M464 167V256"/>
  </g>
  <!-- hex watermark inside core section -->
  <g stroke="#5fe0ff" stroke-width="1" opacity=".14" fill="none">
    <path d="M210 200 L219.5 205.5 L219.5 216.5 L210 222 L200.5 216.5 L200.5 205.5 Z"/>
    <path d="M280 216 L289.5 221.5 L289.5 232.5 L280 238 L270.5 232.5 L270.5 221.5 Z"/>
    <path d="M350 200 L359.5 205.5 L359.5 216.5 L350 222 L340.5 216.5 L340.5 205.5 Z"/>
  </g>
  <!-- adhesive fillets climbing each cell wall, both junctions -->
  <g fill="#ff9b4b" opacity=".5">
    <use href="#hcsFilT" x="126"/><use href="#hcsFilT" x="152"/><use href="#hcsFilT" x="178"/><use href="#hcsFilT" x="204"/>
    <use href="#hcsFilT" x="230"/><use href="#hcsFilT" x="256"/><use href="#hcsFilT" x="282"/><use href="#hcsFilT" x="308"/>
    <use href="#hcsFilT" x="334"/><use href="#hcsFilT" x="360"/><use href="#hcsFilT" x="386"/><use href="#hcsFilT" x="412"/>
    <use href="#hcsFilT" x="438"/><use href="#hcsFilT" x="464"/>
    <use href="#hcsFilB" x="126"/><use href="#hcsFilB" x="152"/><use href="#hcsFilB" x="178"/><use href="#hcsFilB" x="204"/>
    <use href="#hcsFilB" x="230"/><use href="#hcsFilB" x="256"/><use href="#hcsFilB" x="282"/><use href="#hcsFilB" x="308"/>
    <use href="#hcsFilB" x="334"/><use href="#hcsFilB" x="360"/><use href="#hcsFilB" x="386"/><use href="#hcsFilB" x="412"/>
    <use href="#hcsFilB" x="438"/><use href="#hcsFilB" x="464"/>
  </g>
  <!-- top adhesive bondline -->
  <rect x="100" y="163" width="374" height="4" fill="#2a170a"/>
  <rect x="100" y="163" width="374" height="4" fill="#ff9b4b" opacity=".18"/>
  <line x1="100" y1="163" x2="474" y2="163" stroke="#ff9b4b" stroke-width="1" opacity=".55"/>
  <line x1="100" y1="167" x2="474" y2="167" stroke="#ff9b4b" stroke-width="1" opacity=".55"/>
  <line x1="100" y1="152" x2="100" y2="272" stroke="#8fb6e0" stroke-width="1.2" opacity=".45"/>

  <!-- ===== OPENING: peeled corner exposing hex core in plan ===== -->
  <polygon points="412,152 474,152 558,110 412,110" fill="url(#hcsHoleG)"/>
  <polygon points="412,152 474,152 558,110 412,110" fill="url(#hcsHexP)"/>
  <line x1="412" y1="152" x2="474" y2="152" stroke="#5fe0ff" stroke-width="1" opacity=".3" stroke-dasharray="3 3"/>
  <line x1="474" y1="152" x2="558" y2="110" stroke="#5fe0ff" stroke-width="1" opacity=".3"/>
  <line x1="412" y1="110" x2="558" y2="110" stroke="#8fb6e0" stroke-width="1" opacity=".3"/>

  <!-- ===== TOP FACE SHEET (intact portion left of the fold) ===== -->
  <polygon points="100,152 412,152 412,110 184,110" fill="url(#hcsSkinTopG)"/>
  <line x1="184" y1="110" x2="412" y2="110" stroke="#8fb6e0" stroke-width="1.1" opacity=".45"/>
  <line x1="100" y1="152" x2="184" y2="110" stroke="#8fb6e0" stroke-width="1.1" opacity=".45"/>
  <rect x="100" y="152" width="312" height="11" fill="url(#hcsSkinFrontG)"/>
  <line x1="100" y1="152" x2="412" y2="152" stroke="#8fb6e0" stroke-width="2"/>
  <line x1="104" y1="157.5" x2="408" y2="157.5" stroke="#8fb6e0" stroke-width="1" opacity=".12"/>

  <!-- ===== BONDED DOUBLER STRIP (left, on outer skin) ===== -->
  <polygon points="108,142 192,100 280,100 196,142" fill="url(#hcsDoubTopG)"/>
  <line x1="192" y1="100" x2="280" y2="100" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>
  <line x1="108" y1="142" x2="192" y2="100" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>
  <polygon points="196,142 280,100 280,108 196,150" fill="#28527e"/>
  <polygon points="196,150 280,108 280,110 196,152" fill="#ff9b4b" opacity=".3"/>
  <rect x="108" y="142" width="88" height="8" fill="url(#hcsDoubG)"/>
  <line x1="108" y1="142" x2="196" y2="142" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="108" y1="142" x2="108" y2="152" stroke="#8fb6e0" stroke-width="1" opacity=".6"/>
  <rect x="108" y="150" width="88" height="2" fill="#2a170a"/>
  <line x1="108" y1="150" x2="196" y2="150" stroke="#ff9b4b" stroke-width="1" opacity=".65"/>
  <line x1="108" y1="152" x2="196" y2="152" stroke="#ff9b4b" stroke-width="1" opacity=".65"/>

  <!-- ===== PEELED FLAP folded back over the sheet ===== -->
  <polygon points="350,152 266,110 261,110 345,152" fill="#02060d" opacity=".3"/>
  <polygon points="412,152 350,152 266,110 412,110" fill="url(#hcsFlapG)"/>
  <polygon points="412,152 350,152 266,110 412,110" fill="url(#hcsHexP)" opacity=".13"/>
  <polyline points="412,110 266,110 350,152 412,152" fill="none" stroke="#9fe6ff" stroke-width="1.4" opacity=".8"/>
  <line x1="412" y1="110" x2="412" y2="152" stroke="#9fe6ff" stroke-width="1.8" opacity=".95" filter="url(#hcsGlowS)"/>

  <!-- ===== LAYER LABELS (static) ===== -->
  <g font-size="11" fill="#9fe6ff" text-anchor="end" letter-spacing="1">
    <text x="92" y="146">DOUBLER</text>
    <text x="92" y="160">FACE SHEET</text>
    <text x="92" y="180">ADHESIVE</text>
    <text x="92" y="216">CORE</text>
    <text x="92" y="254">ADHESIVE</text>
    <text x="92" y="270">FACE SHEET</text>
  </g>
  <g stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none">
    <line x1="95" y1="142.5" x2="106" y2="145"/>
    <line x1="94" y1="157" x2="98" y2="157"/>
    <path d="M95 176 L98 166.5"/>
    <line x1="94" y1="212" x2="98" y2="212"/>
    <path d="M95 250.5 L98 257.5"/>
    <line x1="94" y1="266.5" x2="98" y2="266.5"/>
  </g>
  <text x="100" y="326" font-size="11" fill="#9fe6ff" opacity=".6" letter-spacing="1.5">ADHESIVE-BONDED HONEYCOMB SANDWICH — CUTAWAY</text>

  <!-- ===== REVEAL 1: ghosted rivet row, struck through ===== -->
  <g id="hcsRivets" opacity="0">
    <g stroke="#8fb6e0" stroke-width="1" fill="rgba(143,182,224,.14)" opacity=".8">
      <path d="M121 142 L131 142 L127.8 147 L124.2 147 Z M124.2 147 L127.8 147 L127.8 165 L124.2 165 Z"/>
      <ellipse cx="126" cy="166.5" rx="3.6" ry="2.2"/>
      <path d="M147 142 L157 142 L153.8 147 L150.2 147 Z M150.2 147 L153.8 147 L153.8 165 L150.2 165 Z"/>
      <ellipse cx="152" cy="166.5" rx="3.6" ry="2.2"/>
      <path d="M173 142 L183 142 L179.8 147 L176.2 147 Z M176.2 147 L179.8 147 L179.8 165 L176.2 165 Z"/>
      <ellipse cx="178" cy="166.5" rx="3.6" ry="2.2"/>
    </g>
    <g stroke="#8fb6e0" stroke-width="1" fill="rgba(143,182,224,.14)" opacity=".7">
      <ellipse cx="181.4" cy="127.3" rx="4.6" ry="2.6"/>
      <ellipse cx="202.4" cy="116.8" rx="4.6" ry="2.6"/>
      <ellipse cx="223.4" cy="106.3" rx="4.6" ry="2.6"/>
    </g>
    <g fill="#8fb6e0" opacity=".55">
      <circle cx="181.4" cy="127.3" r=".9"/><circle cx="202.4" cy="116.8" r=".9"/><circle cx="223.4" cy="106.3" r=".9"/>
    </g>
    <!-- stress-riser marks at the holes -->
    <g stroke="#ff6b6b" stroke-width="1" fill="none" opacity=".65">
      <path d="M121 143 l-3.2 2.4 M131 143 l3.2 2.4 M122.4 165.5 l-2.8 2 M129.6 165.5 l2.8 2"/>
      <path d="M147 143 l-3.2 2.4 M157 143 l3.2 2.4 M148.4 165.5 l-2.8 2 M155.6 165.5 l2.8 2"/>
      <path d="M173 143 l-3.2 2.4 M183 143 l3.2 2.4 M174.4 165.5 l-2.8 2 M181.6 165.5 l2.8 2"/>
    </g>
    <line x1="112" y1="147" x2="196" y2="141" stroke="#ff6b6b" stroke-width="1.7" opacity=".85"/>
    <text x="92" y="113" font-size="11" fill="#8fb6e0" text-anchor="end" letter-spacing="1" opacity=".85">RIVETS</text>
    <line x1="50" y1="109.5" x2="94" y2="109.5" stroke="#ff6b6b" stroke-width="1.4" opacity=".85"/>
    <line x1="94" y1="116" x2="121" y2="139" stroke="#8fb6e0" stroke-width="1" opacity=".45" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== REVEAL 2: bond glow sweeping both faying surfaces ===== -->
  <path id="hcsBond" d="M100 165 H474 M100 258 H474" fill="none" stroke="#5fe0ff" stroke-width="2.6" filter="url(#hcsGlow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL 3: flap settles closed, core dims ===== -->
  <g id="hcsClose" opacity="0">
    <rect x="100" y="167" width="374" height="89" fill="#030a18" opacity=".5"/>
    <polygon points="474,167 558,125 558,214 474,256" fill="#030a18" opacity=".4"/>
    <polygon points="342,152 474,152 558,110 256,110" fill="url(#hcsSkinTopG)"/>
    <polygon points="412,152 474,152 558,110 412,110" fill="url(#hcsHexP)" opacity=".08"/>
    <line x1="256" y1="110" x2="558" y2="110" stroke="#8fb6e0" stroke-width="1.1" opacity=".45"/>
    <rect x="412" y="152" width="62" height="11" fill="url(#hcsSkinFrontG)"/>
    <line x1="342" y1="152" x2="474" y2="152" stroke="#8fb6e0" stroke-width="2"/>
    <polygon points="474,152 558,110 558,121 474,163" fill="#2f5c88"/>
    <line x1="474" y1="152" x2="558" y2="110" stroke="#8fb6e0" stroke-width="1.6" opacity=".85"/>
    <line x1="558" y1="110" x2="558" y2="121" stroke="#8fb6e0" stroke-width="1.2" opacity=".4"/>
    <line x1="474" y1="152" x2="474" y2="163" stroke="#8fb6e0" stroke-width="1.2" opacity=".45"/>
  </g>

  <!-- ===== REVEAL 4: NO DIRECT MEASURE OF STRENGTH tag ===== -->
  <g id="hcsTag" opacity="0">
    <line x1="522" y1="94" x2="534" y2="124" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
    <circle cx="534" cy="126" r="1.6" fill="#5fe0ff" opacity=".8"/>
    <rect x="330" y="72" width="232" height="20" rx="4" fill="rgba(8,20,38,.78)" stroke="#5fe0ff" stroke-opacity=".4"/>
    <text x="549" y="86" font-size="11" fill="#9fe6ff" text-anchor="end" letter-spacing=".5">NO DIRECT MEASURE OF STRENGTH</text>
  </g>

  <!-- ===== scan sweep ===== -->
  <g id="hcsscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#hcsScanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#hcsGlow)" opacity=".9"/>
  </g>
</svg>
