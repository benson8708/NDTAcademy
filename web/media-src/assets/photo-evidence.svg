<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="peGlowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="672" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="peGlowR" filterUnits="userSpaceOnUse" x="112" y="-2" width="341" height="228">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pePlate" x1="0" y1="32" x2="0" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#133054"/><stop offset=".55" stop-color="#0e2848"/><stop offset="1" stop-color="#0a1c36"/>
    </linearGradient>
    <linearGradient id="peBead" x1="0" y1="128" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b86ff"/><stop offset=".4" stop-color="#3f9bff"/><stop offset="1" stop-color="#1E66F5"/>
    </linearGradient>
    <linearGradient id="peScanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="peTintTop" x1="0" y1="120" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b4b" stop-opacity="0"/>
      <stop offset="1" stop-color="#ff9b4b" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="peTintBot" x1="0" y1="160" x2="0" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9b4b" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ff9b4b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== EVIDENCE PHOTO CARD (static base) ===== -->
  <g id="peFrame">
    <rect x="150" y="24" width="414" height="274" rx="12" fill="#0c2240" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="158" y="32" width="398" height="258" rx="6" fill="url(#pePlate)" stroke="#8fb6e0" stroke-width="1" opacity=".95"/>
    <!-- viewfinder corner brackets -->
    <g fill="none" stroke="#5fe0ff" stroke-width="2.5" opacity=".9" filter="url(#peGlowC)">
      <path d="M158 54 V32 H180"/>
      <path d="M534 32 H556 V54"/>
      <path d="M158 268 V290 H180"/>
      <path d="M534 290 H556 V268"/>
    </g>
    <!-- reticle mid-edge ticks -->
    <g stroke="#5fe0ff" stroke-width="1.5" opacity=".55" fill="none">
      <path d="M357 32 V40"/><path d="M357 290 V282"/>
      <path d="M158 161 H166"/><path d="M556 161 H548"/>
    </g>
  </g>

  <!-- ===== WELD SURFACE (static base) ===== -->
  <g id="peWeld">
    <!-- brushed plate texture -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".09">
      <line x1="164" y1="48" x2="550" y2="48"/>
      <line x1="170" y1="66" x2="540" y2="66"/>
      <line x1="164" y1="86" x2="552" y2="86"/>
      <line x1="172" y1="104" x2="544" y2="104"/>
      <line x1="164" y1="176" x2="550" y2="176"/>
      <line x1="170" y1="232" x2="546" y2="232"/>
      <line x1="164" y1="252" x2="552" y2="252"/>
      <line x1="170" y1="272" x2="540" y2="272"/>
    </g>
    <!-- grinding marks + surface stains -->
    <g fill="none" stroke="#8fb6e0" opacity=".12">
      <path d="M196 222 q34 -10 66 0" stroke-width="1"/>
      <path d="M204 230 q30 -8 56 0" stroke-width="1"/>
      <path d="M448 66 q30 10 58 2" stroke-width="1"/>
      <path d="M456 76 q26 8 48 2" stroke-width="1"/>
    </g>
    <ellipse cx="492" cy="222" rx="34" ry="10" fill="#1E66F5" opacity=".08"/>
    <ellipse cx="246" cy="96" rx="30" ry="9" fill="#1E66F5" opacity=".07"/>
    <!-- heat tint bands flanking the toes -->
    <rect x="162" y="120" width="390" height="8" fill="url(#peTintTop)"/>
    <rect x="162" y="160" width="390" height="8" fill="url(#peTintBot)"/>
    <!-- bead body -->
    <path d="M162 130 C220 124 290 133 357 128 C420 124 480 133 552 128 L552 158 C480 156 420 164 357 159 C290 155 230 164 162 160 Z" fill="url(#peBead)"/>
    <!-- ripple crescents (stacked dimes) -->
    <g fill="none" stroke="#7fd8ff" stroke-width="1.2" opacity=".58">
      <path d="M184 131.5 Q172 144 184 156.5"/>
      <path d="M202 131 Q191 144 202 157"/>
      <path d="M220 131.5 Q208 144 220 156.5"/>
      <path d="M238 131 Q227 144 238 157"/>
      <path d="M256 131.5 Q244 144 256 156.5"/>
      <path d="M274 131 Q263 144 274 157"/>
      <path d="M292 131.5 Q280 144 292 156.5"/>
      <path d="M310 131 Q299 144 310 157"/>
      <path d="M328 131.5 Q316 144 328 156.5"/>
      <path d="M346 131 Q335 144 346 157"/>
      <path d="M364 131.5 Q352 144 364 156.5"/>
      <path d="M382 131 Q371 144 382 157"/>
      <path d="M400 131.5 Q388 144 400 156.5"/>
      <path d="M418 131 Q407 144 418 157"/>
      <path d="M436 131.5 Q424 144 436 156.5"/>
      <path d="M454 131 Q443 144 454 157"/>
      <path d="M472 131.5 Q460 144 472 156.5"/>
      <path d="M490 131 Q479 144 490 157"/>
      <path d="M508 131.5 Q496 144 508 156.5"/>
      <path d="M526 131 Q515 144 526 157"/>
    </g>
    <!-- toe lines -->
    <g fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".8">
      <path d="M162 130 C220 124 290 133 357 128 C420 124 480 133 552 128"/>
      <path d="M162 160 C230 164 290 155 357 159 C420 164 480 156 552 158"/>
    </g>
    <!-- cap shine -->
    <path d="M170 137 C240 133 300 140 360 137 C430 134 490 140 548 137" fill="none" stroke="#9fe6ff" stroke-width="3" opacity=".18"/>
    <!-- spatter -->
    <g fill="#8fb6e0" opacity=".35">
      <circle cx="212" cy="108" r="1.2"/><circle cx="278" cy="184" r="1"/>
      <circle cx="452" cy="104" r="1.4"/><circle cx="505" cy="182" r="1.1"/>
    </g>
  </g>

  <!-- ===== LINEAR INDICATION at lower weld toe (static base) ===== -->
  <path id="peIndication" d="M332 161 L341 163.4 L349 161.6 L358 164.2 L367 162.4 L376 165 L385 163 L396 164.6" fill="none" stroke="#ff6b6b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#peGlowR)"/>
  <circle id="pePing" cx="364" cy="163" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#peGlowR)"/>

  <!-- ===== peCamera: camera squared to the photo plane + raking light ===== -->
  <g id="peCamera" opacity="0">
    <!-- camera body, side profile, lens aimed at the photo plane -->
    <rect x="24" y="132" width="72" height="46" rx="6" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="40" y="122" width="26" height="12" rx="3" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="74" y="125" width="11" height="6" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <line x1="30" y1="142" x2="58" y2="142" stroke="#8fb6e0" stroke-width="1" opacity=".5"/>
    <line x1="30" y1="168" x2="90" y2="168" stroke="#8fb6e0" stroke-width="1" opacity=".5"/>
    <rect x="96" y="143" width="18" height="24" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="114" y="147" width="6" height="16" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <ellipse cx="121" cy="155" rx="2.2" ry="7" fill="#5fe0ff" opacity=".55"/>
    <!-- optical axis + 90-degree square cue at the plane -->
    <line x1="124" y1="155" x2="150" y2="155" stroke="#5fe0ff" stroke-width="1.4" stroke-dasharray="4 3"/>
    <path d="M140 155 V145 H150" fill="none" stroke="#5fe0ff" stroke-width="1.4"/>
    <text x="131" y="139" text-anchor="middle" font-size="10" fill="#9fe6ff">90&#176;</text>
    <!-- raking light skimming the weld -->
    <circle cx="172" cy="58" r="3" fill="#ff9b4b" filter="url(#peGlowR)"/>
    <g stroke="#ff9b4b" stroke-width="1" opacity=".7">
      <line x1="166" y1="52" x2="162" y2="48"/><line x1="172" y1="50" x2="172" y2="44"/><line x1="178" y1="52" x2="182" y2="48"/>
    </g>
    <line x1="176" y1="62" x2="299" y2="123" stroke="#ff9b4b" stroke-width="1.6" filter="url(#peGlowR)"/>
    <path d="M306 126 L295.3 125.2 L298.8 118 Z" fill="#ff9b4b"/>
    <!-- ripple shadows cast by the raking light -->
    <g fill="#07101f" opacity=".65">
      <path d="M330 134 Q322 144 330 154 Q326 144 330 134 Z"/>
      <path d="M348 134 Q340 144 348 154 Q344 144 348 134 Z"/>
      <path d="M366 134 Q358 144 366 154 Q362 144 366 134 Z"/>
    </g>
  </g>

  <!-- ===== peScale: calibrated mm scale beside the indication ===== -->
  <g id="peScale" opacity="0">
    <rect x="296" y="196" width="160" height="26" rx="3" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
    <!-- 1 mm graduation comb -->
    <line x1="304" y1="201" x2="444" y2="201" stroke="#9fe6ff" stroke-width="6" stroke-dasharray="1 1.8" opacity=".8"/>
    <!-- 10 mm major ticks -->
    <g stroke="#9fe6ff" stroke-width="1.4">
      <line x1="304" y1="198" x2="304" y2="208"/>
      <line x1="332" y1="198" x2="332" y2="208"/>
      <line x1="360" y1="198" x2="360" y2="208"/>
      <line x1="388" y1="198" x2="388" y2="208"/>
      <line x1="416" y1="198" x2="416" y2="208"/>
      <line x1="444" y1="198" x2="444" y2="208"/>
    </g>
    <g font-size="8" fill="#9fe6ff" text-anchor="middle">
      <text x="304" y="218">mm</text>
      <text x="332" y="218">10</text>
      <text x="360" y="218">20</text>
      <text x="388" y="218">30</text>
      <text x="416" y="218">40</text>
      <text x="444" y="218">50</text>
    </g>
  </g>

  <!-- ===== peDatum: datum + distance + orientation reference ===== -->
  <g id="peDatum" opacity="0">
    <line x1="196" y1="112" x2="196" y2="248" stroke="#5fe0ff" stroke-width="1.2" stroke-dasharray="5 4" opacity=".75"/>
    <path d="M190 258 L202 258 L196 248 Z" fill="#5fe0ff"/>
    <line x1="196" y1="258" x2="196" y2="262" stroke="#5fe0ff" stroke-width="1.2"/>
    <rect x="184" y="262" width="24" height="18" fill="none" stroke="#5fe0ff" stroke-width="1.3"/>
    <text x="196" y="275.5" text-anchor="middle" font-size="12" fill="#9fe6ff">B</text>
    <text x="214" y="275" font-size="10" fill="#9fe6ff">DATUM B</text>
    <!-- distance callout: datum to indication -->
    <line x1="364" y1="168" x2="364" y2="182" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 3" opacity=".7"/>
    <line x1="196" y1="178" x2="364" y2="178" stroke="#5fe0ff" stroke-width="1.2"/>
    <path d="M196 178 L205 174.8 L205 181.2 Z" fill="#5fe0ff"/>
    <path d="M364 178 L355 174.8 L355 181.2 Z" fill="#5fe0ff"/>
    <text x="272" y="173" text-anchor="middle" font-size="11" fill="#9fe6ff">240 mm</text>
    <!-- orientation arrow -->
    <line x1="528" y1="88" x2="528" y2="58" stroke="#5fe0ff" stroke-width="1.4"/>
    <path d="M528 50 L523.5 60 L532.5 60 Z" fill="#5fe0ff"/>
    <text x="528" y="102" text-anchor="middle" font-size="11" fill="#9fe6ff">UP</text>
  </g>

  <!-- ===== peTag: physical weld ID tag in shot ===== -->
  <g id="peTag" opacity="0">
    <path d="M410.8 60.5 Q400 52 396 44" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".7"/>
    <rect x="404" y="50" width="86" height="24" rx="4" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
    <circle cx="414" cy="62" r="3.5" fill="#0a1c36" stroke="#8fb6e0" stroke-width="1.2"/>
    <text x="454" y="66" text-anchor="middle" font-size="11" fill="#9fe6ff">WELD 12A</text>
  </g>

  <!-- ===== peIdTag: indication ID slate linked to the log ===== -->
  <g id="peIdTag" opacity="0">
    <text x="394" y="247" font-size="9" fill="#9fe6ff" opacity=".75">LOG</text>
    <g>
      <rect x="394" y="252" width="56" height="7" rx="1.5" fill="#14304f" stroke="#8fb6e0" stroke-width=".75" opacity=".55"/>
      <rect x="394" y="262" width="56" height="7" rx="1.5" fill="#1E66F5" opacity=".55" stroke="#5fe0ff" stroke-width=".75"/>
      <rect x="394" y="272" width="56" height="7" rx="1.5" fill="#14304f" stroke="#8fb6e0" stroke-width=".75" opacity=".55"/>
      <g stroke="#9fe6ff" stroke-width="1" opacity=".5">
        <line x1="398" y1="255.5" x2="430" y2="255.5"/>
        <line x1="398" y1="265.5" x2="438" y2="265.5"/>
        <line x1="398" y1="275.5" x2="424" y2="275.5"/>
      </g>
    </g>
    <line x1="450" y1="265.5" x2="462" y2="265.5" stroke="#5fe0ff" stroke-width="1.4"/>
    <rect x="462" y="242" width="88" height="42" rx="5" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="462" y="242" width="88" height="13" rx="5" fill="#1E66F5" opacity=".5"/>
    <text x="470" y="251.5" font-size="8" fill="#9fe6ff">IND ID</text>
    <text x="506" y="274" text-anchor="middle" font-size="13" fill="#9fe6ff" filter="url(#peGlowC)">VT-07</text>
  </g>

  <!-- ===== caption ===== -->
  <text x="150" y="324" font-size="11" fill="#9fe6ff" opacity=".6">EVIDENCE PHOTO // CLOSE-UP</text>

  <!-- ===== scan group ===== -->
  <g id="pescanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#peScanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#peGlowC)" opacity=".9"/>
  </g>
</svg>
