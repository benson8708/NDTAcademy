<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="atmGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="atmGlowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="atmPg" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#9fdcff"/><stop offset="0.55" stop-color="#3f9bff"/><stop offset="1" stop-color="#1E66F5"/>
    </radialGradient>
    <radialGradient id="atmNg" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#527aa6"/><stop offset="0.55" stop-color="#2a4d77"/><stop offset="1" stop-color="#14304f"/>
    </radialGradient>
    <radialGradient id="atmEg" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#d6faff"/><stop offset="0.5" stop-color="#7fe6ff"/><stop offset="1" stop-color="#2b9fdf"/>
    </radialGradient>
    <radialGradient id="atmNucHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2b86ff" stop-opacity="0.38"/><stop offset="0.65" stop-color="#2b86ff" stop-opacity="0.14"/><stop offset="1" stop-color="#2b86ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== BASE (always visible): ghost shell guides + shell letters + nuclide notation ===== -->
  <g fill="none" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="2 6" opacity="0.3">
    <circle cx="225" cy="172" r="56"/>
    <circle cx="225" cy="172" r="102"/>
  </g>
  <path d="M220 172 H230 M225 167 V177" stroke="#8fb6e0" stroke-width="1" opacity="0.35" fill="none"/>
  <text x="263" y="116" font-size="11" fill="#9fe6ff" opacity="0.65">K</text>
  <text x="287" y="80" font-size="11" fill="#9fe6ff" opacity="0.65">L</text>

  <!-- nuclide notation 12/6 C -->
  <text x="52" y="40" text-anchor="end" font-size="13" fill="#9fe6ff" opacity="0.85">12</text>
  <text x="52" y="62" text-anchor="end" font-size="13" fill="#9fe6ff" opacity="0.85">6</text>
  <text x="57" y="56" font-size="27" fill="#d6ecff" filter="url(#atmGlowS)">C</text>
  <text x="16" y="326" font-size="12" fill="#9fe6ff" opacity="0.7">CARBON-12 ATOM</text>
  <text x="584" y="326" text-anchor="end" font-size="11" fill="#9fe6ff" opacity="0.65">Z=6 · N=6 · A=12</text>

  <!-- ===== NUCLEUS: 6 protons (+) bright, 6 neutrons dim, packed cluster ===== -->
  <g id="atmNucleus" opacity="0">
    <circle cx="225" cy="172" r="40" fill="url(#atmNucHalo)"/>
    <!-- outer ring of 9 nucleons -->
    <g stroke-width="1">
      <circle cx="225"   cy="150.5" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <circle cx="211.2" cy="155.5" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
      <circle cx="203.8" cy="168.3" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <circle cx="206.4" cy="182.8" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
      <circle cx="217.7" cy="192.2" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <circle cx="232.4" cy="192.2" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
      <circle cx="243.6" cy="182.8" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <circle cx="246.2" cy="168.3" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
      <circle cx="238.8" cy="155.5" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <!-- inner 3 on top -->
      <circle cx="225"   cy="161.5" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
      <circle cx="215.9" cy="177.3" r="9" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.5"/>
      <circle cx="234.1" cy="177.3" r="9" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9"/>
    </g>
    <!-- '+' glyphs on the 6 protons -->
    <g stroke="#f2faff" stroke-width="1.7" stroke-linecap="round" fill="none">
      <path d="M207.8 155.5 H214.6 M211.2 152.1 V158.9"/>
      <path d="M203 182.8 H209.8 M206.4 179.4 V186.2"/>
      <path d="M229 192.2 H235.8 M232.4 188.8 V195.6"/>
      <path d="M242.8 168.3 H249.6 M246.2 164.9 V171.7"/>
      <path d="M221.6 161.5 H228.4 M225 158.1 V164.9"/>
      <path d="M230.7 177.3 H237.5 M234.1 173.9 V180.7"/>
    </g>
  </g>

  <!-- ===== pings ===== -->
  <circle id="atmProtonPing" cx="246.2" cy="168.3" r="6" fill="none" stroke="#7fd8ff" stroke-width="2" opacity="0" filter="url(#atmGlowS)"/>
  <circle id="atmNeutronPing" cx="243.6" cy="182.8" r="6" fill="none" stroke="#8fb6e0" stroke-width="2" opacity="0" filter="url(#atmGlowS)"/>

  <!-- ===== K + L shells (draw-on, K first then L) ===== -->
  <path id="atmShells" d="M281 172 a56 56 0 1 1 -112 0 a56 56 0 1 1 112 0 M327 172 a102 102 0 1 1 -204 0 a102 102 0 1 1 204 0"
        fill="none" stroke="#5fe0ff" stroke-width="1.6" opacity="0.95" filter="url(#atmGlow)"
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== electrons: 2 on K, 4 on L + orbit-direction chevrons ===== -->
  <g id="atmElectrons" opacity="0">
    <g filter="url(#atmGlowS)">
      <circle cx="225"   cy="116"   r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
      <circle cx="225"   cy="228"   r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
      <circle cx="297.1" cy="99.9"  r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
      <circle cx="152.9" cy="99.9"  r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
      <circle cx="152.9" cy="244.1" r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
      <circle cx="297.1" cy="244.1" r="4.5" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
    </g>
    <!-- '−' glyphs -->
    <g stroke="#04263d" stroke-width="1.5" stroke-linecap="round" fill="none">
      <path d="M222.6 116 H227.4"/>
      <path d="M222.6 228 H227.4"/>
      <path d="M294.7 99.9 H299.5"/>
      <path d="M150.5 99.9 H155.3"/>
      <path d="M150.5 244.1 H155.3"/>
      <path d="M294.7 244.1 H299.5"/>
    </g>
    <!-- orbit direction chevrons (CCW): K left edge pointing down, L top pointing left -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
      <path d="M165 166 L169 174 L173 166"/>
      <path d="M231 66 L223 70 L231 74"/>
    </g>
  </g>

  <!-- ===== callout column (right) ===== -->
  <g id="atmProtonLbl" opacity="0">
    <circle cx="254.7" cy="164" r="1.8" fill="#7fd8ff"/>
    <path d="M254.7 164 L380 101" stroke="#7fd8ff" stroke-width="1" opacity="0.55" fill="none"/>
    <circle cx="390" cy="97" r="5.5" fill="url(#atmPg)" stroke="#9fe0ff" stroke-opacity="0.9" stroke-width="1"/>
    <path d="M387.6 97 H392.4 M390 94.6 V99.4" stroke="#f2faff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <text x="402" y="101" font-size="12" fill="#9fe6ff">PROTON · +1 · ≈1 u</text>
  </g>
  <g id="atmNeutronLbl" opacity="0">
    <circle cx="252.9" cy="181.1" r="1.8" fill="#8fb6e0"/>
    <path d="M252.9 181.1 L380 159" stroke="#8fb6e0" stroke-width="1" opacity="0.55" fill="none"/>
    <circle cx="390" cy="157" r="5.5" fill="url(#atmNg)" stroke="#8fb6e0" stroke-opacity="0.7" stroke-width="1"/>
    <text x="402" y="161" font-size="12" fill="#9fe6ff">NEUTRON · 0 · ≈1 u</text>
  </g>
  <g id="atmElectronLbl" opacity="0">
    <circle cx="229.5" cy="227.7" r="1.8" fill="#5fe0ff"/>
    <path d="M229.5 227.7 L380 219" stroke="#5fe0ff" stroke-width="1" opacity="0.55" fill="none"/>
    <circle cx="390" cy="217" r="4" fill="url(#atmEg)" stroke="#bff2ff" stroke-opacity="0.9" stroke-width="0.8"/>
    <path d="M387.9 217 H392.1" stroke="#04263d" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    <text x="402" y="221" font-size="12" fill="#9fe6ff">ELECTRON · −1 · ≈1/1836 u</text>
  </g>
</svg>
