  <!-- machined outer rim (chamfer ring) -->
  <circle cx="300" cy="160" r="121.5" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".32" clip-path="url(#fcClipFace)"/>
  <circle cx="300" cy="160" r="124.8" fill="none" stroke="#0a1f3a" stroke-width="3.4" opacity=".5" clip-path="url(#fcClipFace)"/>
  <!-- specular highlight along upper-left inner rim -->
  <path d="M204.6 240 A124.5 124.5 0 0 1 267.8 39.7" fill="none" stroke="#bfe2ff" stroke-width="2.4" opacity=".22" clip-path="url(#fcClipFace)"/>
  <!-- face outline + keyway walls -->
  <path d="M283 33.1 L283 56 L317 56 L317 33.1 A128 128 0 1 1 283 33.1 Z" fill="none" stroke="#8fb6e0" stroke-width="2"/>
  <!-- keyway inner shading so the notch reads as a machined slot -->
  <path d="M283 33.1 L283 56 L317 56 L317 33.1" fill="none" stroke="#0a1f3a" stroke-width="4" opacity=".55" transform="translate(1.6,-1.6)"/>
  <text x="20" y="26" font-size="12" fill="#9fe6ff" opacity=".65">FRACTURE FACE — KEYED SHAFT</text>

  <!-- ===== REVEAL 1: crack origin at keyway inside corner ===== -->
  <g id="fcOrigin" opacity="0">
    <circle cx="284" cy="57" r="3.2" fill="#ff6b6b" filter="url(#fcGlowS)"/>
    <circle cx="284" cy="57" r="7.5" fill="none" stroke="#ff6b6b" stroke-width="1.2" opacity=".75"/>
    <path d="M218 48 L276 54.5" stroke="#ff6b6b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="214" y="51" text-anchor="end" font-size="12" fill="#ff6b6b">ORIGIN</text>
  </g>
  <circle id="fcOriginPing" cx="284" cy="57" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#fcGlowS)"/>

  <!-- ===== REVEAL 2: beach marks (draw-on, inner to outer) ===== -->
  <path id="fcBeachMarks" d="M305.8 54.4 A22 22 0 1 1 262.1 55.4 M323.6 51.3 A40 40 0 1 1 244 55 M345.6 49.6 A62 62 0 0 1 222.9 67.4 M370 55.2 A86 86 0 0 1 202.7 84.9 M394.7 73.9 A112 112 0 0 1 188.3 115.2 M413.8 103.9 A138 138 0 0 1 183.1 151.2 M423.4 139.5 A162 162 0 0 1 176.4 178.1" fill="none" stroke="#7fd8ff" stroke-width="1.4" stroke-opacity=".9" stroke-linecap="round" clip-path="url(#fcClipFace)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
  <g id="fcBmLbl" opacity="0">
    <path d="M438 79 L394 92" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
    <text x="442" y="83" font-size="12" fill="#9fe6ff">BEACH MARKS</text>
  </g>

  <!-- ===== REVEAL 3: final fracture zone (rough, crystalline) ===== -->
  <g id="fcFinalZone" opacity="0">
    <g clip-path="url(#fcClipFace)">
      <path d="M431.2 132 L422.8 149.9 L416.3 170.4 L405.9 189.5 L385.4 197.6 L366.5 205.8 L352.2 224.2 L327.5 215 L310.7 233.4 L289.3 225.1 L269.6 222 L250.2 218.6 L230.2 216.7 L207.8 217.5 L195.4 197.7 L174.8 191.8 L98.7 242.3 L203 306.2 L325 315.8 L438 269 L517.4 175.9 Z" fill="#ff9b4b" opacity=".12"/>
