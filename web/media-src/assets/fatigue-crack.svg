      <path d="M278.5 256.2 L270.6 259.1 L273.7 250.9 Z M331.2 248.6 L337.6 242.2 L338.7 250.4 Z M394.4 231.6 L392.4 238.7 L386.7 231.9 Z M245.2 243.7 L237.2 244.8 L239.8 237.7 Z M251 263.2 L258.2 258.7 L259.3 266.2 Z M265.7 237.8 L272.5 243.1 L266 247.7 Z M349.1 257.9 L352.1 253.2 L354.8 258.1 Z M234.5 242.2 L236.4 237 L241.7 241.8 Z M305.2 271 L304.2 280.7 L296.7 275 Z M404.7 209.3 L400.9 203.7 L407 202.7 Z M353.4 245.4 L361.2 252.2 L351.4 255 Z M230.1 251.3 L223.5 251 L226.3 244.1 Z M394.8 214.9 L388.2 218.2 L388.9 211.1 Z M344.5 227.4 L354.5 227.4 L348.9 235.7 Z" fill="#ffb27b" opacity=".3"/>
      <path d="M431.2 132 L422.8 149.9 L416.3 170.4 L405.9 189.5 L385.4 197.6 L366.5 205.8 L352.2 224.2 L327.5 215 L310.7 233.4 L289.3 225.1 L269.6 222 L250.2 218.6 L230.2 216.7 L207.8 217.5 L195.4 197.7 L174.8 191.8" fill="none" stroke="#ff9b4b" stroke-width="1.6" stroke-linejoin="round" opacity=".9" filter="url(#fcGlowS)"/>
    </g>
    <path d="M442 268 L392 243" stroke="#ff9b4b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="446" y="272" font-size="12" fill="#ff9b4b">FINAL FRACTURE</text>
  </g>

  <!-- ===== scan group ===== -->
  <g id="fcscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#fcscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#fcGlow)" opacity=".9"/>
  </g>
</svg>
