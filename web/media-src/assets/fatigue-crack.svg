<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fcGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fcGlowS" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="fcFaceGrad" gradientUnits="userSpaceOnUse" cx="284" cy="57" r="245">
      <stop offset="0" stop-color="#356394"/>
      <stop offset=".22" stop-color="#22497a"/>
      <stop offset=".55" stop-color="#163457"/>
      <stop offset="1" stop-color="#0c2440"/>
    </radialGradient>
    <linearGradient id="fcSheen" gradientUnits="userSpaceOnUse" x1="220" y1="60" x2="360" y2="280">
      <stop offset="0" stop-color="#9fd2ff" stop-opacity=".14"/>
      <stop offset=".45" stop-color="#9fd2ff" stop-opacity=".03"/>
      <stop offset="1" stop-color="#9fd2ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fcHatch" patternUnits="userSpaceOnUse" width="9" height="9">
      <path d="M0 9 L9 0" stroke="#ff9b4b" stroke-width="1" opacity=".3" fill="none"/>
      <path d="M0 0 L9 9" stroke="#ff9b4b" stroke-width="1" opacity=".14" fill="none"/>
    </pattern>
    <clipPath id="fcClipFace"><path d="M283 33.1 L283 56 L317 56 L317 33.1 A128 128 0 1 1 283 33.1 Z"/></clipPath>
    <linearGradient id="fcscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

