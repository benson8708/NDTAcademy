<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="axrG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="axrGs" filterUnits="userSpaceOnUse" x="0" y="22" width="600" height="318">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="axrSteel" x1="0" y1="78" x2="0" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c5a8a"/><stop offset=".3" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
  </defs>

  <!-- ===== HEADERS ===== -->
  <text x="150" y="25" text-anchor="middle" font-size="12" letter-spacing="1.5" fill="#9fe6ff">SHORT PULSE</text>
  <line x1="106" y1="31.5" x2="194" y2="31.5" stroke="#5fe0ff" stroke-width="2" opacity=".75"/>
  <text x="450" y="25" text-anchor="middle" font-size="12" letter-spacing="1.5" fill="#9fe6ff">LONG PULSE</text>
  <line x1="409" y1="31.5" x2="491" y2="31.5" stroke="#ffc24b" stroke-width="2" opacity=".7"/>

  <!-- ===== CENTER DIVIDER (broken around axis annotation) ===== -->
  <line x1="300" y1="16" x2="300" y2="80" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 5" opacity=".18"/>
  <line x1="300" y1="206" x2="300" y2="296" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 5" opacity=".18"/>

  <!-- ===== AXIAL / DEPTH AXIS (reveal) ===== -->
  <g id="axrAxis" opacity="0">
    <line x1="300" y1="96" x2="300" y2="126" stroke="#5fe0ff" stroke-width="1.5" opacity=".8"/>
    <line x1="300" y1="158" x2="300" y2="188" stroke="#5fe0ff" stroke-width="1.5" opacity=".8"/>
    <path d="M300 88 L296 96 L304 96 Z" fill="#5fe0ff" opacity=".9"/>
    <path d="M300 196 L296 188 L304 188 Z" fill="#5fe0ff" opacity=".9"/>
    <text x="300" y="140" text-anchor="middle" font-size="11" fill="#9fe6ff">AXIAL</text>
    <text x="300" y="153" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".8">DEPTH</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEFT HALF — SHORT PULSE                                       -->
  <!-- ============================================================ -->
  <!-- block cross-section -->
  <rect x="48" y="78" width="204" height="124" fill="url(#axrSteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".13">
    <line x1="54" y1="98" x2="246" y2="98"/>
    <line x1="54" y1="122" x2="246" y2="122"/>
    <line x1="54" y1="146" x2="246" y2="146"/>
    <line x1="54" y1="170" x2="246" y2="170"/>
  </g>
  <line x1="49" y1="200.5" x2="251" y2="200.5" stroke="#8fb6e0" stroke-width="2.5" opacity=".5"/>

  <!-- beam line -->
  <path d="M142 79 L158 79 L162 201 L138 201 Z" fill="#5fe0ff" opacity=".06"/>
  <line x1="150" y1="79" x2="150" y2="201" stroke="#5fe0ff" stroke-width="1.4" opacity=".4"/>

  <!-- contact probe -->
  <rect x="130" y="46" width="40" height="27" rx="3" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="132" y1="57" x2="168" y2="57" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
  <rect x="121" y="52" width="9" height="9" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
  <path d="M121 56.5 C110 56.5 104 62 102 72" fill="none" stroke="#8fb6e0" stroke-width="1.8" stroke-linecap="round" opacity=".75"/>
  <rect x="130" y="73" width="40" height="5" fill="#5fe0ff" opacity=".3"/>
  <line x1="128" y1="78.5" x2="172" y2="78.5" stroke="#5fe0ff" stroke-width="2" opacity=".75" filter="url(#axrGs)"/>

  <!-- stacked reflectors A + B on the beam line -->
  <circle cx="150" cy="156" r="7" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".25"/>
  <circle cx="150" cy="156" r="4.5" fill="#08152b" stroke="#ffc24b" stroke-width="1.6" filter="url(#axrGs)"/>
  <circle cx="150" cy="182" r="7" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".25"/>
  <circle cx="150" cy="182" r="4.5" fill="#08152b" stroke="#ffc24b" stroke-width="1.6" filter="url(#axrGs)"/>
  <text x="138" y="159.5" text-anchor="end" font-size="10" fill="#ffc24b" opacity=".85">A</text>
  <text x="138" y="185.5" text-anchor="end" font-size="10" fill="#ffc24b" opacity=".85">B</text>

  <!-- reflector pings -->
  <circle id="axrPingA" cx="150" cy="156" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#axrGs)"/>
  <circle id="axrPingB" cx="150" cy="182" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#axrGs)"/>

  <!-- short 2-cycle wave packet (draw) -->
  <path id="axrShortWave" d="M150.0,92.0 L152.1,92.4 L154.2,92.8 L156.1,93.2 L157.8,93.6 L159.1,94.0 L160.2,94.4 L160.8,94.8 L161.0,95.2 L160.8,95.7 L160.2,96.1 L159.1,96.5 L157.8,96.9 L156.1,97.3 L154.2,97.7 L152.1,98.1 L150.0,98.5 L147.9,98.9 L145.8,99.3 L143.9,99.7 L142.2,100.1 L140.9,100.5 L139.8,100.9 L139.2,101.3 L139.0,101.8 L139.2,102.2 L139.8,102.6 L140.9,103.0 L142.2,103.4 L143.9,103.8 L145.8,104.2 L147.9,104.6 L150.0,105.0 L152.1,105.4 L154.2,105.8 L156.1,106.2 L157.8,106.6 L159.1,107.0 L160.2,107.4 L160.8,107.8 L161.0,108.2 L160.8,108.7 L160.2,109.1 L159.1,109.5 L157.8,109.9 L156.1,110.3 L154.2,110.7 L152.1,111.1 L150.0,111.5 L147.9,111.9 L145.8,112.3 L143.9,112.7 L142.2,113.1 L140.9,113.5 L139.8,113.9 L139.2,114.3 L139.0,114.8 L139.2,115.2 L139.8,115.6 L140.9,116.0 L142.2,116.4 L143.9,116.8 L145.8,117.2 L147.9,117.6 L150.0,118.0" fill="none" stroke="#5fe0ff" stroke-width="2.2" stroke-linejoin="round" filter="url(#axrG)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- A-scan strip -->
  <rect x="48" y="214" width="204" height="84" rx="4" fill="#0a1c33" opacity=".92" stroke="#8fb6e0" stroke-width="1.5" stroke-opacity=".85"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".1">
    <line x1="99" y1="220" x2="99" y2="292"/>
    <line x1="150" y1="220" x2="150" y2="292"/>
    <line x1="201" y1="220" x2="201" y2="292"/>
    <line x1="54" y1="256" x2="246" y2="256"/>
  </g>
  <line x1="54" y1="284" x2="246" y2="284" stroke="#8fb6e0" stroke-width="1" opacity=".3"/>
  <text x="56" y="228" font-size="10" fill="#9fe6ff" opacity=".5">A-SCAN</text>

  <!-- twin-peak trace (draw) -->
  <path id="axrShortScan" d="M56,284 L60,284 L63,248 L65,278 L68,268 L71,284 L126,284 L131,274 L137,235 Q140,229 143,235 L149,274 L153,281 L156,282 L159,274 L163,241 Q166,235 169,241 L175,277 L179,284 L244,284" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#axrGs)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- TWO PEAKS tag + peak letters -->
  <g id="axrShortTag" opacity="0">
    <text x="140" y="221" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity=".9">A</text>
    <text x="166" y="227" text-anchor="middle" font-size="10" fill="#9fe6ff" opacity=".9">B</text>
    <rect x="174" y="219" width="72" height="18" rx="4" fill="#5fe0ff" fill-opacity=".13" stroke="#5fe0ff" stroke-opacity=".7"/>
    <text x="210" y="232" text-anchor="middle" font-size="11" fill="#9fe6ff">TWO PEAKS</text>
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT HALF — LONG PULSE                                       -->
  <!-- ============================================================ -->
  <!-- block cross-section -->
  <rect x="348" y="78" width="204" height="124" fill="url(#axrSteel)" stroke="#8fb6e0" stroke-width="1.5"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".13">
    <line x1="354" y1="98" x2="546" y2="98"/>
    <line x1="354" y1="122" x2="546" y2="122"/>
    <line x1="354" y1="146" x2="546" y2="146"/>
    <line x1="354" y1="170" x2="546" y2="170"/>
  </g>
  <line x1="349" y1="200.5" x2="551" y2="200.5" stroke="#8fb6e0" stroke-width="2.5" opacity=".5"/>

  <!-- beam line -->
  <path d="M442 79 L458 79 L462 201 L438 201 Z" fill="#5fe0ff" opacity=".06"/>
  <line x1="450" y1="79" x2="450" y2="201" stroke="#5fe0ff" stroke-width="1.4" opacity=".4"/>

  <!-- contact probe (mirrored) -->
  <rect x="430" y="46" width="40" height="27" rx="3" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
  <line x1="432" y1="57" x2="468" y2="57" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
  <rect x="470" y="52" width="9" height="9" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
  <path d="M479 56.5 C490 56.5 496 62 498 72" fill="none" stroke="#8fb6e0" stroke-width="1.8" stroke-linecap="round" opacity=".75"/>
  <rect x="430" y="73" width="40" height="5" fill="#5fe0ff" opacity=".3"/>
  <line x1="428" y1="78.5" x2="472" y2="78.5" stroke="#5fe0ff" stroke-width="2" opacity=".75" filter="url(#axrGs)"/>

  <!-- identical stacked reflectors A + B -->
  <circle cx="450" cy="156" r="7" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".25"/>
  <circle cx="450" cy="156" r="4.5" fill="#08152b" stroke="#ffc24b" stroke-width="1.6" filter="url(#axrGs)"/>
  <circle cx="450" cy="182" r="7" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".25"/>
  <circle cx="450" cy="182" r="4.5" fill="#08152b" stroke="#ffc24b" stroke-width="1.6" filter="url(#axrGs)"/>
  <text x="438" y="159.5" text-anchor="end" font-size="10" fill="#ffc24b" opacity=".85">A</text>
  <text x="438" y="185.5" text-anchor="end" font-size="10" fill="#ffc24b" opacity=".85">B</text>

  <!-- long ringing 7-cycle packet (draw) -->
  <path id="axrLongWave" d="M450.0,84.0 L453.3,84.4 L456.2,84.9 L458.5,85.3 L460.0,85.7 L460.7,86.1 L460.4,86.6 L459.2,87.0 L457.4,87.4 L454.9,87.8 L452.1,88.3 L449.2,88.7 L446.4,89.1 L444.0,89.5 L442.2,90.0 L441.1,90.4 L440.8,90.8 L441.2,91.3 L442.4,91.7 L444.2,92.1 L446.4,92.5 L448.9,93.0 L451.4,93.4 L453.8,93.8 L455.7,94.2 L457.1,94.7 L457.9,95.1 L458.0,95.5 L457.4,95.9 L456.2,96.4 L454.5,96.8 L452.5,97.2 L450.3,97.7 L448.1,98.1 L446.2,98.5 L444.6,98.9 L443.5,99.4 L443.0,99.8 L443.1,100.2 L443.7,100.6 L444.9,101.1 L446.5,101.5 L448.3,101.9 L450.3,102.3 L452.2,102.8 L453.8,103.2 L455.1,103.6 L455.9,104.1 L456.2,104.5 L456.0,104.9 L455.3,105.3 L454.1,105.8 L452.7,106.2 L451.0,106.6 L449.3,107.0 L447.6,107.5 L446.3,107.9 L445.2,108.3 L444.6,108.7 L444.5,109.2 L444.8,109.6 L445.5,110.0 L446.7,110.5 L448.0,110.9 L449.6,111.3 L451.1,111.7 L452.5,112.2 L453.7,112.6 L454.5,113.0 L454.9,113.4 L454.9,113.9 L454.5,114.3 L453.8,114.7 L452.7,115.1 L451.4,115.6 L450.0,116.0 L448.6,116.4 L447.4,116.9 L446.5,117.3 L445.8,117.7 L445.5,118.1 L445.6,118.6 L446.1,119.0 L446.9,119.4 L447.9,119.8 L449.1,120.3 L450.4,120.7 L451.6,121.1 L452.6,121.5 L453.4,122.0 L454.0,122.4 L454.1,122.8 L453.9,123.3 L453.4,123.7 L452.6,124.1 L451.6,124.5 L450.5,125.0 L449.3,125.4 L448.3,125.8 L447.3,126.2 L446.7,126.7 L446.3,127.1 L446.2,127.5 L446.5,127.9 L447.0,128.4 L447.8,128.8 L448.8,129.2 L449.8,129.7 L450.9,130.1 L451.9,130.5 L452.7,130.9 L453.2,131.4 L453.5,131.8 L453.5,132.2 L453.2,132.6 L452.6,133.1 L451.8,133.5 L450.9,133.9 L449.9,134.3 L448.9,134.8 L448.0,135.2 L447.3,135.6 L446.9,136.1 L446.7,136.5 L446.8,136.9 L447.2,137.3 L447.8,137.8 L448.6,138.2 L449.5,138.6 L450.4,139.0 L451.3,139.5 L452.1,139.9 L452.7,140.3 L453.0,140.7 L453.1,141.2 L452.9,141.6 L452.5,142.0 L451.9,142.5 L451.1,142.9 L450.3,143.3 L449.4,143.7 L448.6,144.2 L447.9,144.6 L447.4,145.0 L447.1,145.4 L447.1,145.9 L447.3,146.3 L447.7,146.7 L448.4,147.1 L449.2,147.6 L450.0,148.0" fill="none" stroke="#7fd8ff" stroke-width="2" stroke-linejoin="round" filter="url(#axrG)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- A-scan strip -->
  <rect x="348" y="214" width="204" height="84" rx="4" fill="#0a1c33" opacity=".92" stroke="#8fb6e0" stroke-width="1.5" stroke-opacity=".85"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".1">
    <line x1="399" y1="220" x2="399" y2="292"/>
    <line x1="450" y1="220" x2="450" y2="292"/>
    <line x1="501" y1="220" x2="501" y2="292"/>
    <line x1="354" y1="256" x2="546" y2="256"/>
  </g>
  <line x1="354" y1="284" x2="546" y2="284" stroke="#8fb6e0" stroke-width="1" opacity=".3"/>
  <text x="356" y="228" font-size="10" fill="#9fe6ff" opacity=".5">A-SCAN</text>

  <!-- merged-hump trace (draw) -->
  <path id="axrLongScan" d="M356,284 L360,284 L363,248 L365,278 L368,268 L371,284 L424,284 C431,277 437,254 443,242 Q452,231 460,236 C468,241 474,260 480,274 L484,281 L486,283 Q490,264 494,283 Q498,270 502,283 Q506,276 510,283 L514,284 L544,284" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#axrGs)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ONE HUMP tag + merged label -->
  <g id="axrLongTag" opacity="0">
    <text x="452" y="223" text-anchor="middle" font-size="10" fill="#ffc24b" opacity=".9">A+B?</text>
    <rect x="478" y="219" width="66" height="18" rx="4" fill="#ffc24b" fill-opacity=".13" stroke="#ffc24b" stroke-opacity=".7"/>
    <text x="511" y="232" text-anchor="middle" font-size="11" fill="#ffc24b">ONE HUMP</text>
  </g>
</svg>
