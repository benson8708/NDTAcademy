<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fpGlow" filterUnits="userSpaceOnUse" x="-30" y="-30" width="660" height="400">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fpGlowS" filterUnits="userSpaceOnUse" x="-30" y="-30" width="660" height="400">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fpLiqG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".04"/>
    </linearGradient>
    <linearGradient id="fpDevG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".26"/>
      <stop offset="1" stop-color="#1E66F5" stop-opacity=".10"/>
    </linearGradient>
  </defs>

  <!-- ===== static ghosts (so resting frame isn't empty) ===== -->
  <g fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".12">
    <rect x="296" y="118" width="284" height="146" rx="10"/>
    <path d="M18 156 V248 Q18 252 22 252 H68 Q72 252 72 248 V156"/>
    <path d="M80 156 V248 Q80 252 84 252 H130 Q134 252 134 248 V156"/>
    <path d="M142 156 V248 Q142 252 146 252 H192 Q196 252 196 248 V156"/>
    <path d="M204 156 V248 Q204 252 208 252 H254 Q258 252 258 248 V156"/>
  </g>
  <line x1="267" y1="42" x2="267" y2="282" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 6" opacity=".22"/>

  <!-- ===================== MANUAL TANK LINE ===================== -->
  <g id="fpTanks" opacity="0">
    <!-- four open-top insulated tanks: outer wall U + inner wall hint + liquid -->
    <g fill="none" stroke="#8fb6e0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
      <path d="M18 156 V248 Q18 252 22 252 H68 Q72 252 72 248 V156"/>
      <path d="M80 156 V248 Q80 252 84 252 H130 Q134 252 134 248 V156"/>
      <path d="M142 156 V248 Q142 252 146 252 H192 Q196 252 196 248 V156"/>
      <path d="M204 156 V248 Q204 252 208 252 H254 Q258 252 258 248 V156"/>
    </g>
    <!-- rim lips -->
    <g stroke="#9fe6ff" stroke-width="1.5" stroke-linecap="round" opacity=".8">
      <path d="M14 156 H22 M68 156 H76"/>
      <path d="M76 156 H84 M130 156 H138"/>
      <path d="M138 156 H146 M192 156 H200"/>
      <path d="M200 156 H208 M254 156 H262"/>
    </g>
    <!-- inner insulation wall hint -->
    <g fill="none" stroke="#8fb6e0" stroke-width=".75" opacity=".35">
      <path d="M22 160 V247 M68 160 V247"/>
      <path d="M84 160 V247 M130 160 V247"/>
      <path d="M146 160 V247 M192 160 V247"/>
      <path d="M208 160 V247 M254 160 V247"/>
    </g>

    <!-- film hanger over DEV (bar on rims, stem, channel frame, film sheet) -->
    <g stroke="#cfe6ff" fill="none" stroke-width="2" stroke-linecap="round">
      <path d="M12 148 H78 M12 148 v6 M78 148 v6"/>
      <path d="M45 148 V160"/>
      <rect x="30" y="160" width="30" height="76" rx="2" stroke-width="1.5"/>
    </g>
    <rect x="34" y="164" width="22" height="68" fill="#0e2848" stroke="#5fe0ff" stroke-width=".8" opacity=".9"/>
    <g stroke="#9fe6ff" stroke-width="1.2" opacity=".8">
      <path d="M34 168 h4 M52 168 h4 M34 228 h4 M52 228 h4"/>
    </g>
    <!-- clip-on thermometer in DEV (left of the hanger frame) -->
    <g stroke="#9fe6ff" fill="none" stroke-width="1.5" stroke-linecap="round">
      <path d="M26 152 V194"/>
      <circle cx="26" cy="197.5" r="2.5" fill="#5fe0ff" stroke="none" opacity=".9"/>
    </g>

    <!-- liquid (drawn over hanger so the dipped film reads submerged) -->
    <rect x="21" y="172" width="48" height="77" fill="url(#fpDevG)"/>
    <rect x="83" y="172" width="48" height="77" fill="url(#fpLiqG)"/>
    <rect x="145" y="172" width="48" height="77" fill="url(#fpLiqG)"/>
    <rect x="207" y="172" width="48" height="77" fill="url(#fpLiqG)"/>
    <g stroke="#5fe0ff" stroke-width="1.5" stroke-linecap="round" opacity=".6">
      <path d="M21 172 H69"/><path d="M83 172 H131"/><path d="M145 172 H193"/><path d="M207 172 H255"/>
    </g>
    <!-- WASH running water: ripples + bubbles -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1.2" opacity=".55">
      <path d="M212 178 q5 -4 10 0 q5 4 10 0 q5 -4 10 0 q5 4 10 0"/>
      <path d="M216 185 q5 -3 10 0 q5 3 10 0 q5 -3 10 0"/>
    </g>
    <g fill="#5fe0ff" opacity=".4">
      <circle cx="218" cy="220" r="1.2"/><circle cx="236" cy="206" r="1"/><circle cx="246" cy="232" r="1.2"/><circle cx="228" cy="240" r="1"/>
    </g>

    <!-- fixed-order step chevrons between tanks -->
    <g fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".85">
      <path d="M73 198 l6 6 l-6 6"/>
      <path d="M135 198 l6 6 l-6 6"/>
      <path d="M197 198 l6 6 l-6 6"/>
    </g>

    <!-- station labels + caption -->
    <g font-size="11" fill="#9fe6ff" text-anchor="middle" letter-spacing="1.5">
      <text x="45" y="269">DEV</text>
      <text x="107" y="269">STOP</text>
      <text x="169" y="269">FIX</text>
      <text x="231" y="269">WASH</text>
    </g>
    <text x="138" y="296" font-size="12" fill="#9fe6ff" text-anchor="middle" letter-spacing="3" opacity=".92">MANUAL</text>
  </g>

  <!-- ===== operator-variable glyphs hover over the manual line ===== -->
  <g id="fpVariables" opacity="0">
    <text x="138" y="70" font-size="9" fill="#9fe6ff" text-anchor="middle" letter-spacing="2" opacity=".8">OPERATOR VARIABLES</text>
    <!-- stopwatch = TIME -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1.8" stroke-linecap="round">
      <circle cx="68" cy="105" r="11"/>
      <path d="M68 94 V88 M64 88 H72"/>
      <path d="M68 105 L74 99"/>
      <path d="M68 105 V100" stroke-width="1.2" opacity=".6"/>
    </g>
    <!-- thermometer = TEMP -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1.8" stroke-linecap="round">
      <path d="M138 89 V107" stroke="#8fb6e0"/>
      <rect x="134.5" y="86" width="7" height="22" rx="3.5"/>
      <circle cx="138" cy="112" r="5"/>
      <path d="M138 99 V110" stroke-width="2.5"/>
      <path d="M144 92 h4 M144 98 h4 M144 104 h4" stroke-width="1" opacity=".7"/>
    </g>
    <!-- agitation = lift / drop arrows -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M202 92 V116 M198 96 l4 -4 l4 4 M198 112 l4 4 l4 -4"/>
      <path d="M212 99 q4 -3 8 0 q4 3 8 0 M212 109 q4 -3 8 0 q4 3 8 0" stroke-width="1.4" opacity=".75"/>
    </g>
    <g font-size="9" fill="#9fe6ff" text-anchor="middle" letter-spacing="1.5">
      <text x="68" y="133">TIME</text>
      <text x="138" y="133">TEMP</text>
      <text x="208" y="133">AGITATION</text>
    </g>
    <g stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 4" opacity=".4">
      <path d="M68 137 V147 M138 137 V147 M208 137 V147"/>
    </g>
  </g>

  <!-- ===================== AUTOMATIC PROCESSOR ===================== -->
  <g id="fpProcessor" opacity="0">
    <!-- housing body -->
    <rect x="296" y="118" width="284" height="146" rx="10" fill="rgba(10,30,60,.55)"/>
    <!-- dryer warm tint -->
    <rect x="498" y="122" width="80" height="140" fill="rgba(255,194,75,.05)"/>
    <!-- housing outline with entrance + exit slots -->
    <path d="M296 146 V254 Q296 264 306 264 H570 Q580 264 580 254 V158 M580 142 V128 Q580 118 570 118 H306 Q296 118 296 128"
          fill="none" stroke="#8fb6e0" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#9fe6ff" stroke-width="1.5" stroke-linecap="round" opacity=".8">
      <path d="M292 146 h8 M292 128 h8 M576 142 h8 M576 158 h8"/>
    </g>

    <!-- feed tray + film sheet waiting -->
    <g stroke="#cfe6ff" stroke-width="1.8" fill="none" stroke-linecap="round">
      <path d="M271 122 L296 132"/>
      <path d="M271 129 L296 139"/>
      <path d="M271 122 V129"/>
    </g>
    <g transform="rotate(22 282 119)">
      <rect x="272" y="115" width="20" height="7" rx="1" fill="#0e2848" stroke="#5fe0ff" stroke-width=".8" opacity=".95"/>
    </g>
    <text x="276" y="106" font-size="8" fill="#9fe6ff" text-anchor="middle" letter-spacing="1" opacity=".75">FEED</text>

    <!-- liquids -->
    <rect x="298" y="172" width="72" height="90" fill="url(#fpDevG)"/>
    <rect x="374" y="172" width="64" height="90" fill="url(#fpLiqG)"/>
    <rect x="442" y="172" width="52" height="90" fill="url(#fpLiqG)"/>
    <g stroke="#5fe0ff" stroke-width="1.2" stroke-linecap="round" opacity=".5">
      <path d="M298 172 H370 M374 172 H438 M442 172 H494"/>
    </g>
    <!-- wash ripples -->
    <path d="M446 178 q5 -3 10 0 q5 3 10 0 q5 -3 10 0 q5 3 10 0" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>

    <!-- tank partitions -->
    <g stroke="#8fb6e0" stroke-width="1.5" stroke-linecap="round">
      <path d="M372 150 V262 M440 150 V262"/>
      <path d="M496 122 V158 M496 176 V262"/>
    </g>

    <!-- roller racks: side plates, center rollers, turnarounds, crossovers -->
    <g fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".35">
      <path d="M324 158 V252 M352 158 V252"/>
      <path d="M392 158 V252 M420 158 V252"/>
      <path d="M454 158 V252 M482 158 V252"/>
    </g>
    <g fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5">
      <circle cx="338" cy="184" r="4"/><circle cx="338" cy="208" r="4"/><circle cx="338" cy="232" r="4"/>
      <circle cx="406" cy="184" r="4"/><circle cx="406" cy="208" r="4"/><circle cx="406" cy="232" r="4"/>
      <circle cx="468" cy="184" r="4"/><circle cx="468" cy="208" r="4"/><circle cx="468" cy="232" r="4"/>
      <circle cx="338" cy="245" r="6.5"/><circle cx="406" cy="245" r="6.5"/><circle cx="468" cy="245" r="6.5"/>
      <circle cx="372" cy="145" r="4.5"/><circle cx="440" cy="145" r="4.5"/>
      <circle cx="305" cy="132" r="3.5"/><circle cx="305" cy="141" r="3.5"/>
      <circle cx="516" cy="158.5" r="3.5"/><circle cx="516" cy="172" r="3.5"/>
      <circle cx="542" cy="158" r="3.5"/><circle cx="542" cy="171.5" r="3.5"/>
    </g>

    <!-- dryer: heater element + rising warm air -->
    <path d="M504 254 l7 -6 l7 6 l7 -6 l7 6 l7 -6 l7 6 l7 -6 l7 6" fill="none" stroke="#ffc24b" stroke-width="1.5" stroke-linejoin="round" opacity=".85"/>
    <g fill="none" stroke="#ffc24b" stroke-width="1.4" stroke-linecap="round" opacity=".4">
      <path d="M514 244 q-5 -11 0 -22 q5 -11 0 -22"/>
      <path d="M537 246 q-5 -11 0 -22 q5 -11 0 -22"/>
      <path d="M560 244 q-5 -11 0 -22 q5 -11 0 -22"/>
    </g>

    <!-- serpentine film path (draw reveal) -->
    <path id="fpPath" d="M272 119 L294 133 Q312 142 332 158 L332 236 Q332 249 338 249 Q344 249 344 236 L344 158 Q350 137 372 139 Q394 137 400 158 L400 236 Q400 249 406 249 Q412 249 412 236 L412 158 Q418 137 440 139 Q462 137 462 158 L462 236 Q462 249 468 249 Q474 249 474 236 L474 176 Q476 163 490 164 L528 166 Q552 164 564 157 Q578 150 590 142"
          fill="none" stroke="#eaf6ff" stroke-width="1.8" stroke-linecap="round" filter="url(#fpGlowS)" opacity=".95"
          pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

    <!-- TIME + TEMP locked chip + thermostat -->
    <g>
      <rect x="302" y="92" width="96" height="22" rx="11" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="1.5"/>
      <path d="M315 99 v-3.5 a4 4 0 0 1 8 0 V99" fill="none" stroke="#9fe6ff" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="312.5" y="99" width="13" height="9.5" rx="1.8" fill="#0e2848" stroke="#9fe6ff" stroke-width="1.4"/>
      <circle cx="319" cy="103" r="1.4" fill="#5fe0ff"/>
      <text x="362" y="106.5" font-size="9.5" fill="#9fe6ff" text-anchor="middle" letter-spacing=".5">TIME + TEMP</text>
      <path d="M398 103 H405" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 3" opacity=".6"/>
    </g>
    <g fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linecap="round">
      <circle cx="416" cy="103" r="9" fill="rgba(10,30,60,.55)"/>
      <path d="M416 112 V118"/>
      <path d="M416 103 L421 97" stroke="#5fe0ff" stroke-width="1.8"/>
      <path d="M409.5 99 l-1.5 -1 M416 96 v-2 M422.5 99 l1.5 -1" stroke-width="1" opacity=".7"/>
    </g>

    <!-- section labels + caption -->
    <g font-size="11" fill="#9fe6ff" text-anchor="middle" letter-spacing="1.5">
      <text x="338" y="279">DEV</text>
      <text x="406" y="279">FIX</text>
      <text x="468" y="279">WASH</text>
      <text x="537" y="279">DRYER</text>
    </g>
    <text x="438" y="296" font-size="12" fill="#9fe6ff" text-anchor="middle" letter-spacing="3" opacity=".92">AUTOMATIC</text>
  </g>

  <!-- ===== dry-to-dry badge + finished radiograph at exit ===== -->
  <g id="fpBadge" opacity="0">
    <rect x="442" y="78" width="138" height="22" rx="11" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="1.5" filter="url(#fpGlow)"/>
    <text x="511" y="93" font-size="9.5" fill="#eaf6ff" text-anchor="middle" letter-spacing=".5">8-12 MIN DRY-TO-DRY</text>
    <path d="M568 100 Q580 116 584 134" fill="none" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="2 4" opacity=".6"/>
    <g transform="rotate(-10 590 150)">
      <rect x="583" y="134" width="13" height="30" rx="1.5" fill="#10294a" stroke="#9fe6ff" stroke-width="1.2"/>
      <path d="M589.5 138 V160" stroke="#5fe0ff" stroke-width="1.2" opacity=".75"/>
      <circle cx="589.5" cy="146" r="1" fill="#0a1f3a" stroke="#5fe0ff" stroke-width=".5"/>
      <circle cx="589.5" cy="153" r=".8" fill="#0a1f3a" stroke="#5fe0ff" stroke-width=".5"/>
    </g>
  </g>
  <circle id="fpPing" cx="578" cy="148" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0"/>
</svg>
