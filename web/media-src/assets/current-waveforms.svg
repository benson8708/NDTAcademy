<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="cwglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cwglowS" filterUnits="userSpaceOnUse" x="295" y="-16" width="292" height="124">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cwsteel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4368"/><stop offset=".35" stop-color="#122f51"/><stop offset="1" stop-color="#0b2140"/>
    </linearGradient>
    <linearGradient id="cwskinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#5fe0ff" stop-opacity=".4"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cwfieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".72"/>
      <stop offset=".7" stop-color="#5fe0ff" stop-opacity=".3"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== column headers ===== -->
  <text x="204" y="25" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".62" letter-spacing="1">MAGNETIZING CURRENT</text>
  <text x="441" y="25" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".62" letter-spacing="1">FIELD DEPTH IN PART</text>

  <!-- ===== row labels ===== -->
  <text x="76" y="76" text-anchor="end" font-size="13" fill="#9fe6ff">AC</text>
  <text x="76" y="172" text-anchor="end" font-size="13" fill="#9fe6ff">HWDC</text>
  <text x="76" y="268" text-anchor="end" font-size="13" fill="#9fe6ff">FWDC</text>

  <!-- ===== zero axes (scope baselines) ===== -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".35" stroke-dasharray="3 4">
    <line x1="84" y1="72" x2="324" y2="72"/>
    <line x1="84" y1="192" x2="324" y2="192"/>
    <line x1="84" y1="288" x2="324" y2="288"/>
  </g>

  <!-- ===== steel depth panels (cross-sections) ===== -->
  <g>
    <rect x="350" y="40" width="182" height="64" fill="url(#cwsteel)"/>
    <rect x="350" y="136" width="182" height="64" fill="url(#cwsteel)"/>
    <rect x="350" y="232" width="182" height="64" fill="url(#cwsteel)"/>
  </g>
  <!-- rolling texture -->
  <g stroke="#8fb6e0" stroke-width="1" opacity=".14">
    <line x1="354" y1="64" x2="528" y2="64"/><line x1="354" y1="94" x2="528" y2="94"/>
    <line x1="354" y1="158" x2="528" y2="158"/><line x1="354" y1="180" x2="528" y2="180"/>
    <line x1="354" y1="254" x2="528" y2="254"/><line x1="354" y1="276" x2="528" y2="276"/>
  </g>
  <!-- side + bottom edges -->
  <g fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".4">
    <path d="M350 40 V104 H532 V40"/>
    <path d="M350 136 V200 H532 V136"/>
    <path d="M350 232 V296 H532 V232"/>
  </g>
  <!-- top surfaces (where the field enters) -->
  <g stroke="#8fb6e0" stroke-width="2" opacity=".9">
    <line x1="350" y1="40" x2="532" y2="40"/>
    <line x1="350" y1="136" x2="532" y2="136"/>
    <line x1="350" y1="232" x2="532" y2="232"/>
  </g>

  <!-- ===== ROW 1 — AC : skin band + tag (fade) ===== -->
  <g id="cwAc" opacity="0">
    <rect x="351" y="41" width="180" height="9" fill="url(#cwskinGrad)"/>
    <line x1="351" y1="41.8" x2="531" y2="41.8" stroke="#5fe0ff" stroke-width="1.6" opacity=".9" filter="url(#cwglowS)"/>
    <path d="M441 53 V74" stroke="#5fe0ff" stroke-width="1" opacity=".55" fill="none"/>
    <text x="441" y="87" text-anchor="middle" font-size="11" fill="#9fe6ff">SKIN EFFECT</text>
    <text x="331" y="58" font-size="12" fill="#9fe6ff" opacity=".7">+</text>
    <text x="331" y="97" font-size="12" fill="#9fe6ff" opacity=".7">&#8722;</text>
  </g>
  <circle id="cwSkinPing" cx="441" cy="46" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#cwglowS)"/>

  <!-- ===== ROW 2 — HWDC : moderate field depth (fade) ===== -->
  <g id="cwHw" opacity="0">
    <rect x="351" y="137" width="180" height="30" fill="url(#cwfieldGrad)"/>
    <line x1="351" y1="167" x2="531" y2="167" stroke="#5fe0ff" stroke-width="1" opacity=".65" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== ROW 3 — FWDC : deepest field + DC average level (fade) ===== -->
  <g id="cwFw" opacity="0">
    <rect x="351" y="233" width="180" height="55" fill="url(#cwfieldGrad)"/>
    <line x1="351" y1="288" x2="531" y2="288" stroke="#5fe0ff" stroke-width="1" opacity=".65" stroke-dasharray="3 3"/>
    <path d="M92 260 H316" stroke="#7fd8ff" stroke-width="1.2" stroke-dasharray="5 4" opacity=".55" fill="none"/>
    <text x="320" y="256" font-size="11" fill="#9fe6ff" opacity=".75">AVG</text>
  </g>

