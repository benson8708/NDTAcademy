<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="bpglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bpglowS" filterUnits="userSpaceOnUse" x="10" y="23" width="624" height="333">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bpglowN" filterUnits="userSpaceOnUse" x="284" y="40" width="32" height="290">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bpsteel" gradientUnits="userSpaceOnUse" x1="0" y1="64" x2="0" y2="216">
      <stop offset="0" stop-color="#2c5a88"/><stop offset=".3" stop-color="#193e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="bpsteelP" gradientUnits="userSpaceOnUse" x1="0" y1="102" x2="0" y2="178">
      <stop offset="0" stop-color="#35689c"/><stop offset=".4" stop-color="#14304f"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="bpnearFill" gradientUnits="userSpaceOnUse" x1="84" y1="0" x2="300" y2="0">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".27"/><stop offset="1" stop-color="#2b86ff" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="bpfarFill" gradientUnits="userSpaceOnUse" x1="300" y1="0" x2="578" y2="0">
      <stop offset="0" stop-color="#2b86ff" stop-opacity=".22"/><stop offset="1" stop-color="#2b86ff" stop-opacity=".03"/>
    </linearGradient>
    <g id="bpwl" fill="none" stroke="#7fd8ff" stroke-width="1">
      <path d="M86 -8 A8 8 0 0 1 86 8" opacity=".65"/>
      <path d="M86 -15 A15 15 0 0 1 86 15" opacity=".4"/>
      <path d="M86 -22 A22 22 0 0 1 86 22" opacity=".25"/>
    </g>
  </defs>

  <!-- ===== STEEL BLOCK (side cross-section) ===== -->
  <rect x="84" y="64" width="494" height="152" fill="url(#bpsteel)"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".15">
    <line x1="90" y1="78" x2="572" y2="78"/>
    <line x1="90" y1="92" x2="572" y2="92"/>
    <line x1="90" y1="186" x2="572" y2="186"/>
    <line x1="90" y1="200" x2="572" y2="200"/>
  </g>

  <!-- beam axis (static) -->
  <line x1="88" y1="140" x2="570" y2="140" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="6 6" opacity=".35"/>
  <path d="M570 136 L578 140 L570 144 Z" fill="#5fe0ff" opacity=".4"/>

  <!-- ===== NEAR FIELD zone: mottled interference, element-wide to N ===== -->
  <g id="bpNearZone" opacity="0">
    <path d="M84 112 C150 109 250 112 300 116 L300 164 C250 168 150 171 84 168 Z" fill="url(#bpnearFill)"/>
    <path d="M84 112 C150 109 250 112 300 116" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <path d="M84 168 C150 171 250 168 300 164" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <!-- broken wavefront striations -->
    <g fill="none" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="3 6 9 5" opacity=".3">
      <path d="M116.4 114 A40 40 0 0 1 116.4 166"/>
      <path d="M151 114 A70 70 0 0 1 151 166"/>
      <path d="M182.6 114 A100 100 0 0 1 182.6 166"/>
      <path d="M218.5 114 A135 135 0 0 1 218.5 166"/>
      <path d="M254 114 A170 170 0 0 1 254 166"/>
      <path d="M289.4 115 A205 205 0 0 1 289.4 165"/>
    </g>
    <!-- axial maxima (bright) aligned to trace peaks -->
    <g fill="#5fe0ff">
      <ellipse cx="101" cy="140" rx="4" ry="3.2" opacity=".4"/>
      <ellipse cx="120" cy="140" rx="4.5" ry="3.4" opacity=".42"/>
      <ellipse cx="143" cy="140" rx="5" ry="3.6" opacity=".44"/>
      <ellipse cx="172" cy="140" rx="6" ry="4" opacity=".46"/>
      <ellipse cx="208" cy="140" rx="7" ry="4.4" opacity=".5"/>
      <ellipse cx="257" cy="140" rx="8" ry="4.8" opacity=".52"/>
      <ellipse cx="298" cy="140" rx="9" ry="5.5" opacity=".7" filter="url(#bpglowS)"/>
    </g>
    <!-- axial nulls (dark) aligned to trace minima -->
    <g fill="#081830">
      <ellipse cx="110" cy="140" rx="3.5" ry="3" opacity=".55"/>
      <ellipse cx="131" cy="140" rx="4" ry="3.2" opacity=".55"/>
      <ellipse cx="157" cy="140" rx="4.5" ry="3.4" opacity=".55"/>
      <ellipse cx="189" cy="140" rx="5.5" ry="3.8" opacity=".55"/>
      <ellipse cx="231" cy="140" rx="6.5" ry="4.2" opacity=".55"/>
      <ellipse cx="278" cy="140" rx="6" ry="4.4" opacity=".5"/>
    </g>
    <!-- off-axis mottle -->
    <g fill="#5fe0ff">
      <ellipse cx="108" cy="124" rx="4" ry="3" opacity=".22"/>
      <ellipse cx="127" cy="156" rx="5" ry="3" opacity=".2"/>
      <ellipse cx="150" cy="120" rx="5" ry="3" opacity=".22"/>
      <ellipse cx="173" cy="155" rx="6" ry="3.5" opacity=".2"/>
      <ellipse cx="199" cy="122" rx="6" ry="3.5" opacity=".18"/>
      <ellipse cx="231" cy="152" rx="7" ry="4" opacity=".18"/>
      <ellipse cx="262" cy="123" rx="7" ry="4" opacity=".16"/>
      <ellipse cx="283" cy="153" rx="6" ry="3.5" opacity=".18"/>
    </g>
    <g fill="#081830">
      <ellipse cx="136" cy="122" rx="4" ry="2.8" opacity=".4"/>
      <ellipse cx="160" cy="128" rx="4" ry="2.8" opacity=".4"/>
      <ellipse cx="212" cy="157" rx="6" ry="3" opacity=".4"/>
      <ellipse cx="246" cy="121" rx="6" ry="3" opacity=".4"/>
      <ellipse cx="272" cy="159" rx="5" ry="3" opacity=".38"/>
    </g>
    <text x="192" y="52" text-anchor="middle" font-size="12" letter-spacing="2.5" fill="#9fe6ff" opacity=".9">NEAR FIELD</text>
  </g>

  <!-- ===== FAR FIELD: smooth symmetric divergence beyond N ===== -->
  <g id="bpFarField" opacity="0">
    <path d="M300 116 C352 111 440 96 578 79 L578 201 C440 184 352 169 300 164 Z" fill="url(#bpfarFill)"/>
    <path d="M300 116 C352 111 440 96 578 79" fill="none" stroke="#5fe0ff" stroke-width="1.5" opacity=".75" filter="url(#bpglowS)"/>
    <path d="M300 164 C352 169 440 184 578 201" fill="none" stroke="#5fe0ff" stroke-width="1.5" opacity=".75" filter="url(#bpglowS)"/>
    <text x="442" y="52" text-anchor="middle" font-size="12" letter-spacing="2.5" fill="#9fe6ff" opacity=".9">FAR FIELD</text>
  </g>

  <!-- ===== ELEMENT AS POINT SOURCES + interfering wavelets ===== -->
  <g id="bpSources" opacity="0">
    <use href="#bpwl" transform="translate(0,113)"/>
    <use href="#bpwl" transform="translate(0,121)"/>
    <use href="#bpwl" transform="translate(0,128)"/>
    <use href="#bpwl" transform="translate(0,136)"/>
    <use href="#bpwl" transform="translate(0,144)"/>
    <use href="#bpwl" transform="translate(0,152)"/>
    <use href="#bpwl" transform="translate(0,159)"/>
    <use href="#bpwl" transform="translate(0,167)"/>
    <g fill="#5fe0ff" filter="url(#bpglowS)">
      <circle cx="86" cy="113" r="1.7"/><circle cx="86" cy="121" r="1.7"/>
      <circle cx="86" cy="128" r="1.7"/><circle cx="86" cy="136" r="1.7"/>
      <circle cx="86" cy="144" r="1.7"/><circle cx="86" cy="152" r="1.7"/>
      <circle cx="86" cy="159" r="1.7"/><circle cx="86" cy="167" r="1.7"/>
    </g>
  </g>

  <!-- ===== N BOUNDARY ===== -->
  <g id="bpNMark" opacity="0">
    <line x1="300" y1="58" x2="300" y2="312" stroke="#ffc24b" stroke-width="1.8" stroke-dasharray="6 5" opacity=".9" filter="url(#bpglowN)"/>
    <text x="300" y="50" text-anchor="middle" font-size="13" fill="#ffc24b">N</text>
  </g>

  <!-- block outline over beam zones -->
  <rect x="84" y="64" width="494" height="152" fill="none" stroke="#8fb6e0" stroke-width="2"/>

  <!-- ===== STRAIGHT-BEAM CONTACT PROBE (left, coupled) ===== -->
  <path d="M10 140 C2 140 2 126 5 114 C7 104 3 98 6 90" fill="none" stroke="#8fb6e0" stroke-width="2.5" opacity=".8"/>
  <rect x="10" y="132" width="12" height="16" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
  <rect x="22" y="102" width="50" height="76" rx="5" fill="url(#bpsteelP)" stroke="#8fb6e0" stroke-width="1.5"/>
  <g stroke="#8fb6e0" stroke-width="1" opacity=".3">
    <line x1="30" y1="106" x2="30" y2="174"/>
    <line x1="36" y1="106" x2="36" y2="174"/>
    <line x1="42" y1="106" x2="42" y2="174"/>
  </g>
  <rect x="66" y="110" width="6" height="60" fill="#5fe0ff" opacity=".8" filter="url(#bpglowS)"/>
  <rect x="72" y="106" width="10" height="68" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
  <rect x="82" y="108" width="2.5" height="64" fill="#5fe0ff" opacity=".55"/>
  <ellipse cx="83.2" cy="106.5" rx="2.5" ry="1.5" fill="#5fe0ff" opacity=".45"/>
  <ellipse cx="83.2" cy="173.5" rx="2.5" ry="1.5" fill="#5fe0ff" opacity=".45"/>
  <text x="47" y="94" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">0° PROBE</text>

  <!-- ===== captions ===== -->
  <text x="92" y="208" font-size="11" fill="#9fe6ff" opacity=".55">STEEL BLOCK · SIDE VIEW</text>

  <!-- ===== ON-AXIS AMPLITUDE TRACE (bottom strip) ===== -->
  <line x1="84" y1="302" x2="578" y2="302" stroke="#8fb6e0" stroke-width="1" opacity=".35"/>
  <line x1="84" y1="302" x2="84" y2="256" stroke="#8fb6e0" stroke-width="1" opacity=".45"/>
  <path d="M80 257 L84 249 L88 257 Z" fill="#8fb6e0" opacity=".45"/>
  <text x="578" y="236" text-anchor="end" font-size="11" fill="#9fe6ff" opacity=".7">ON-AXIS AMPLITUDE</text>
  <path id="bpTraceNear" d="M84 300 L92 299 L101 259 L110 295 L120 254 L131 297 L143 251 L157 296 L172 255 L189 298 L208 248 L231 296 L257 252 L278 294 L300 244" fill="none" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#bpglowS)"/>
  <path id="bpTraceFar" d="M300 244 C320 259 352 272 396 281 C446 290 514 296 576 299" fill="none" stroke="#5fe0ff" stroke-width="2" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#bpglowS)"/>
</svg>
