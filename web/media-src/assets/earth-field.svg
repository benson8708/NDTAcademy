<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="efGlowC" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="efGlowS" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="efGlobeGrad" gradientUnits="userSpaceOnUse" cx="175" cy="146" r="150">
      <stop offset="0" stop-color="#30608f" stop-opacity=".55"/>
      <stop offset=".45" stop-color="#14304f" stop-opacity=".62"/>
      <stop offset="1" stop-color="#081a33" stop-opacity=".88"/>
    </radialGradient>
    <linearGradient id="efMagS" x1="0" y1="110" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f9bff"/><stop offset="1" stop-color="#1450b8"/>
    </linearGradient>
    <linearGradient id="efMagN" x1="0" y1="180" x2="0" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d94f4f"/><stop offset="1" stop-color="#ff8585"/>
    </linearGradient>
  </defs>

  <!-- ===== static backdrop: star specks + ghost planet rim (default state never empty) ===== -->
  <g fill="#9fe6ff">
    <circle cx="52" cy="64" r="1.2" opacity=".35"/>
    <circle cx="96" cy="40" r="1" opacity=".3"/>
    <circle cx="150" cy="308" r="1.1" opacity=".3"/>
    <circle cx="48" cy="252" r="1.3" opacity=".4"/>
    <circle cx="308" cy="38" r="1" opacity=".3"/>
    <circle cx="388" cy="46" r="1.1" opacity=".32"/>
    <circle cx="540" cy="46" r="1.2" opacity=".35"/>
    <circle cx="572" cy="196" r="1" opacity=".3"/>
    <circle cx="520" cy="242" r="1.3" opacity=".35"/>
    <circle cx="448" cy="302" r="1.1" opacity=".3"/>
    <circle cx="560" cy="288" r="1.4" opacity=".4"/>
    <circle cx="256" cy="318" r="1" opacity=".28"/>
    <circle cx="24" cy="128" r="1" opacity=".3"/>
    <circle cx="330" cy="262" r="1" opacity=".26"/>
  </g>
  <circle cx="205" cy="180" r="100" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".3"/>

  <!-- ===== GLOBE: translucent sphere, latitude wires, dashed spin axis ===== -->
  <g id="efGlobe" opacity="0">
    <circle cx="205" cy="180" r="100" fill="url(#efGlobeGrad)"/>
    <!-- latitude wires (geographic, aligned to spin axis) -->
    <g fill="none" stroke="#8fb6e0" stroke-width="1">
      <ellipse cx="205" cy="180" rx="100" ry="20" opacity=".26"/>
      <ellipse cx="205" cy="116" rx="76.6" ry="15.3" opacity=".2"/>
      <ellipse cx="205" cy="244" rx="76.6" ry="15.3" opacity=".2"/>
      <ellipse cx="205" cy="86" rx="34.2" ry="6.8" opacity=".16"/>
      <ellipse cx="205" cy="274" rx="34.2" ry="6.8" opacity=".16"/>
      <ellipse cx="205" cy="180" rx="38" ry="100" opacity=".13"/>
    </g>
    <!-- rim + faint atmosphere -->
    <circle cx="205" cy="180" r="100" fill="none" stroke="#8fb6e0" stroke-width="2" opacity=".85"/>
    <circle cx="205" cy="180" r="104.5" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".22"/>
    <!-- spin axis (geographic), dashed -->
    <line x1="205" y1="52" x2="205" y2="312" stroke="#9fe6ff" stroke-width="1.2" stroke-dasharray="6 5" opacity=".6"/>
    <text x="205" y="44" text-anchor="middle" font-size="10.5" fill="#9fe6ff" opacity=".8">GEOGRAPHIC N</text>
  </g>

  <!-- ===== FLUX LOOPS (tilted dipole frame): closed, nested, crowding at poles, drawn pole-to-pole ===== -->
  <g transform="rotate(11.5 205 180)" fill="none" stroke="#5fe0ff" stroke-width="1.6" filter="url(#efGlowC)">
    <g id="efLoopsR">
      <path d="M217.2 279.3 C234 305 413 268 413 180 C413 92 234 55 217.2 80.7 C212 90 208 112 208 180 C208 248 212 270 217.2 279.3 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M227.5 277.4 C243 299 373 258 373 180 C373 102 243 61 227.5 82.6 C221 92 212 110 212 180 C212 250 221 268 227.5 277.4 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M239.2 274 C251 291 335 246 335 180 C335 114 251 69 239.2 86 C230 95 216 112 216 180 C216 248 230 265 239.2 274 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    </g>
    <g id="efLoopsL">
      <path d="M192.8 279.3 C176 303 31 264 31 180 C31 96 176 57 192.8 80.7 C198 90 202 112 202 180 C202 248 198 270 192.8 279.3 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M182.5 277.4 C167 297 59 256 59 180 C59 104 167 63 182.5 82.6 C189 92 199 110 199 180 C199 250 189 266 182.5 277.4 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
      <path d="M170.8 274 C159 290 87 244 87 180 C87 116 159 70 170.8 86 C180 95 195 112 195 180 C195 248 180 265 170.8 274 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
    </g>
  </g>

  <!-- ===== BAR MAGNET embedded through core, tilted ~11 deg off spin axis ===== -->
  <g id="efBar" opacity="0">
    <g transform="rotate(11.5 205 180)">
      <!-- magnetic axis, dash-dot -->
      <line x1="205" y1="62" x2="205" y2="298" stroke="#7fd8ff" stroke-width="1.2" stroke-dasharray="10 4 2 4" opacity=".5"/>
      <rect x="190" y="110" width="30" height="70" fill="url(#efMagS)" opacity=".95"/>
      <rect x="190" y="180" width="30" height="70" fill="url(#efMagN)" opacity=".95"/>
      <line x1="190" y1="180" x2="220" y2="180" stroke="#0e2848" stroke-width="1.6"/>
      <rect x="190" y="110" width="30" height="140" rx="4" fill="none" stroke="#8fb6e0" stroke-width="1.5"/>
      <text x="205" y="152" text-anchor="middle" font-size="16" font-weight="bold" fill="#f2f8ff">S</text>
      <text x="205" y="226" text-anchor="middle" font-size="16" font-weight="bold" fill="#f2f8ff">N</text>
    </g>
    <!-- translucent crust wash so the magnet reads as buried in the core -->
    <circle cx="205" cy="180" r="99" fill="#14304f" opacity=".22"/>
    <!-- tilt callout between spin axis and magnetic axis -->
    <path d="M205 64 A116 116 0 0 1 228.1 66.3" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".6"/>
    <text x="245" y="70" font-size="10.5" fill="#9fe6ff" opacity=".75">~11&#176;</text>
  </g>

  <!-- ===== field direction arrowheads (external field runs N -> S, south pole region up to geographic N) ===== -->
  <g id="efArrows" opacity="0">
    <g transform="rotate(11.5 205 180)" fill="#5fe0ff" filter="url(#efGlowS)">
      <path d="M413 172 L409 182 L417 182 Z"/>
      <path d="M373 172 L369 182 L377 182 Z"/>
      <path d="M335 172 L331 182 L339 182 Z"/>
      <path d="M31 172 L27 182 L35 182 Z"/>
      <path d="M59 172 L55 182 L63 182 Z"/>
      <path d="M87 172 L83 182 L91 182 Z"/>
    </g>
  </g>

  <!-- ===== surface tag: ~0.5 GAUSS pinned at ground level ===== -->
  <g id="efGauss" opacity="0">
    <circle cx="293.3" cy="133.1" r="2.8" fill="#9fe6ff"/>
    <circle cx="293.3" cy="133.1" r="6" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".5"/>
    <path d="M293.3 133.1 L312 123 L436 107.5" fill="none" stroke="#5fe0ff" stroke-width="1" opacity=".6"/>
    <rect x="440" y="92" width="118" height="30" rx="7" fill="#0c2546" opacity=".85"/>
    <rect x="440" y="92" width="118" height="30" rx="7" fill="none" stroke="#8fb6e0" stroke-width="1.3"/>
    <text x="499" y="111.5" text-anchor="middle" font-size="13" fill="#9fe6ff">~0.5 GAUSS</text>
  </g>

  <!-- ===== MT comparison chip (brighter, ignites on 'thousands of times stronger') ===== -->
  <g id="efStrong" opacity="0">
    <rect x="354" y="138" width="230" height="34" rx="8" fill="#0a2140" opacity=".92"/>
    <rect x="354" y="138" width="230" height="34" rx="8" fill="#5fe0ff" opacity=".07"/>
    <rect x="354" y="138" width="230" height="34" rx="8" fill="none" stroke="#5fe0ff" stroke-width="1.8" filter="url(#efGlowC)"/>
    <text x="469" y="159.5" text-anchor="middle" font-size="11" fill="#d8f7ff">MT FIELD // THOUSANDS x STRONGER</text>
  </g>
</svg>
