<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="dkGlowC" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dkGlowR" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dkGlowW" filterUnits="userSpaceOnUse" x="-20" y="-20" width="640" height="380">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dkCone1" gradientUnits="userSpaceOnUse" cx="305" cy="58" r="112">
      <stop offset="0" stop-color="#ff5b5b" stop-opacity=".5"/>
      <stop offset=".55" stop-color="#ff5b5b" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ff5b5b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dkCone2" gradientUnits="userSpaceOnUse" cx="530" cy="282" r="112">
      <stop offset="0" stop-color="#ff5b5b" stop-opacity=".5"/>
      <stop offset=".55" stop-color="#ff5b5b" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ff5b5b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dkLeakGrad" gradientUnits="userSpaceOnUse" x1="0" y1="55" x2="0" y2="120">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".85"/>
      <stop offset="1" stop-color="#f5faff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== BASE (visible at default): blueprint grid + survey footprint + caption ===== -->
  <g stroke="#5fe0ff" stroke-width="1" opacity=".11">
    <path d="M216 56 V284 M256 56 V284 M296 56 V284 M336 56 V284 M376 56 V284 M416 56 V284 M456 56 V284 M496 56 V284 M536 56 V284"/>
    <path d="M180 92 H546 M180 132 H546 M180 172 H546 M180 212 H546 M180 252 H546"/>
  </g>
  <rect x="171.5" y="47.5" width="383" height="245" fill="none" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="6 6" opacity=".3"/>
  <text x="40" y="326" font-size="12" fill="#9fe6ff" opacity=".7">FILM DARKROOM — PLAN VIEW</text>

  <!-- ===== ROOM SHELL + MAZE LIGHT TRAP (reveal 1) ===== -->
  <g id="dkRoom" opacity="0">
    <!-- floor -->
    <rect x="175" y="51" width="376" height="238" fill="#0e2848" opacity=".32"/>
    <rect x="67" y="103" width="101" height="134" fill="#0e2848" opacity=".32"/>
    <!-- walls -->
    <g fill="#14304f" stroke="#8fb6e0" stroke-width="1.5">
      <rect x="168" y="44" width="390" height="7"/>
      <rect x="168" y="289" width="390" height="7"/>
      <rect x="551" y="51" width="7" height="99"/>
      <rect x="551" y="196" width="7" height="93"/>
      <rect x="168" y="51" width="7" height="52"/>
      <rect x="168" y="163" width="7" height="126"/>
      <!-- maze corridor -->
      <rect x="60" y="96" width="115" height="7"/>
      <rect x="60" y="237" width="115" height="7"/>
      <rect x="60" y="103" width="7" height="62"/>
      <rect x="60" y="215" width="7" height="22"/>
      <rect x="112" y="103" width="7" height="87"/>
    </g>
    <!-- walking path through light trap -->
    <path d="M40 200 H135 Q143 200 143 192 V141 Q143 133 151 133 H190" fill="none" stroke="#5fe0ff" stroke-width="1.8" stroke-dasharray="5 4" opacity=".85"/>
    <path d="M190 129 L200 133 L190 137 Z" fill="#5fe0ff" opacity=".8"/>
    <text x="61" y="264" font-size="12" fill="#9fe6ff" opacity=".85">LIGHT TRAP</text>
    <!-- light-trapped vent louver, right wall -->
    <rect x="549" y="150" width="11" height="46" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <g stroke="#8fb6e0" stroke-width="1.2" opacity=".9">
      <path d="M550 156 L559 161 M550 164 L559 169 M550 172 L559 177 M550 180 L559 185 M550 188 L559 193"/>
    </g>
    <text x="580" y="176" font-size="11" fill="#9fe6ff" opacity=".85" text-anchor="middle">VENT</text>
    <!-- side labels -->
    <text x="383" y="132" font-size="13" letter-spacing="3" fill="#9fe6ff" opacity=".85" text-anchor="middle">DRY SIDE</text>
    <text x="350" y="227" font-size="13" letter-spacing="3" fill="#9fe6ff" opacity=".85" text-anchor="middle">WET SIDE</text>
  </g>

  <!-- ===== DRY SIDE (reveal 2) ===== -->
  <g id="dkDry" opacity="0">
    <!-- loading bench -->
    <rect x="190" y="58" width="235" height="38" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
      <path d="M195 70 H420 M195 82 H420"/>
    </g>
    <!-- light-tight film bin under bench (dashed = below) -->
    <rect x="205" y="64" width="80" height="26" fill="#0e2848" stroke="#7fd8ff" stroke-width="1.2" stroke-dasharray="4 3" opacity=".9"/>
    <text x="245" y="81" font-size="11" fill="#9fe6ff" text-anchor="middle">FILM BIN</text>
    <!-- cassette stack: top one carries latent image (cyan glow) -->
    <rect x="332" y="60" width="64" height="13" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
    <rect x="339" y="68" width="64" height="13" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
    <rect x="346" y="76" width="64" height="13" rx="2" fill="#5fe0ff" fill-opacity=".15" stroke="#5fe0ff" stroke-width="1.5" filter="url(#dkGlowC)"/>
    <path d="M378 92 V101" stroke="#5fe0ff" stroke-width="1" opacity=".5"/>
    <text x="378" y="112" font-size="11" fill="#9fe6ff" opacity=".85" text-anchor="middle">CASSETTES</text>
    <!-- pass-through hatch in top wall -->
    <rect x="460" y="39" width="56" height="16" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <path d="M488 39 V55" stroke="#8fb6e0" stroke-width="1"/>
    <text x="488" y="33" font-size="11" fill="#9fe6ff" opacity=".85" text-anchor="middle">PASS-THRU</text>
    <!-- safelight 1 over bench -->
    <rect x="294" y="51" width="22" height="7" rx="2" fill="#2b0f16" stroke="#ff8585" stroke-width="1.5"/>
    <path d="M305 58 L266 148 Q305 170 344 148 Z" fill="url(#dkCone1)" opacity=".85"/>
    <path d="M305 170 V158" stroke="#ff8585" stroke-width="1" opacity=".5"/>
    <text x="305" y="182" font-size="11" fill="#ff8585" opacity=".85" text-anchor="middle">SAFELIGHT</text>
  </g>
  <!-- draw-on accent: bench outline traces in with dkDry -->
  <path id="dkDryLine" d="M190 58 H425 V96 H190 Z" fill="none" stroke="#7fd8ff" stroke-width="1.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity=".9"/>

  <!-- ===== WET SIDE (reveal 3) ===== -->
  <g id="dkWet" opacity="0">
    <!-- sink -->
    <rect x="196" y="238" width="46" height="44" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <circle cx="219" cy="244" r="2.5" fill="none" stroke="#8fb6e0" stroke-width="1.2"/>
    <path d="M219 246 V252" stroke="#8fb6e0" stroke-width="1.2"/>
    <text x="219" y="263" font-size="11" fill="#9fe6ff" text-anchor="middle">SINK</text>
    <circle cx="219" cy="272" r="4" fill="none" stroke="#8fb6e0" stroke-width="1.2" opacity=".8"/>
    <!-- tank line -->
    <g fill="#14304f" stroke="#8fb6e0" stroke-width="1.5">
      <rect x="266" y="238" width="56" height="44"/>
      <rect x="330" y="238" width="56" height="44"/>
      <rect x="394" y="238" width="56" height="44"/>
      <rect x="458" y="238" width="56" height="44"/>
    </g>
    <rect x="270" y="248" width="48" height="30" fill="#1E66F5" opacity=".55"/>
    <rect x="334" y="248" width="48" height="30" fill="#2b86ff" opacity=".38"/>
    <rect x="398" y="248" width="48" height="30" fill="#2b86ff" opacity=".5"/>
    <rect x="462" y="248" width="48" height="30" fill="#3f9bff" opacity=".45"/>
    <g fill="none" stroke="#7fd8ff" stroke-width="1" opacity=".5">
      <path d="M468 256 Q474 252 480 256 Q486 260 492 256 Q498 252 504 256"/>
      <path d="M468 266 Q474 262 480 266 Q486 270 492 266 Q498 262 504 266"/>
    </g>
    <text x="305" y="265" font-size="12" fill="#9fe6ff" text-anchor="middle">DEV</text>
    <text x="358" y="265" font-size="12" fill="#9fe6ff" text-anchor="middle">STOP</text>
    <text x="422" y="265" font-size="12" fill="#9fe6ff" text-anchor="middle">FIX</text>
    <text x="486" y="265" font-size="12" fill="#9fe6ff" text-anchor="middle">WASH</text>
    <!-- DEV tank pulse + film hanger dipping in -->
    <rect x="266" y="238" width="56" height="44" fill="none" stroke="#5fe0ff" stroke-width="1.5" filter="url(#dkGlowC)" opacity=".9"/>
    <path d="M260 243 L324 239" stroke="#8fb6e0" stroke-width="2"/>
    <path d="M266 240.6 V246 M318 237.4 V243" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="269" y="246" width="19" height="30" rx="2" fill="#5fe0ff" fill-opacity=".14" stroke="#5fe0ff" stroke-width="1.5" filter="url(#dkGlowC)"/>
    <!-- safelight 2 over tank line -->
    <rect x="519" y="282" width="22" height="7" rx="2" fill="#2b0f16" stroke="#ff8585" stroke-width="1.5"/>
    <path d="M530 282 L491 192 Q530 170 569 192 Z" transform="rotate(-40 530 282)" fill="url(#dkCone2)" opacity=".85"/>
  </g>

  <!-- ===== LIGHT LEAK at pass-thru hatch seam (reveal 4) ===== -->
  <g id="dkLeak" opacity="0">
    <path d="M478 55 H496" stroke="#ffffff" stroke-width="2" filter="url(#dkGlowW)" opacity=".95"/>
    <path d="M478 55 L458 116 L498 108 L494 55 Z" fill="url(#dkLeakGrad)" opacity=".9" filter="url(#dkGlowW)"/>
    <path d="M514 88 L523 104 L505 104 Z" fill="#ff6b6b" fill-opacity=".15" stroke="#ff6b6b" stroke-width="2" stroke-linejoin="round"/>
    <text x="514" y="102" font-size="9" font-weight="bold" fill="#ff6b6b" text-anchor="middle">!</text>
    <text x="514" y="122" font-size="11" fill="#ff6b6b" opacity=".9" text-anchor="middle">LIGHT LEAK</text>
  </g>
  <circle id="dkLeakPing" cx="487" cy="57" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0" filter="url(#dkGlowR)"/>
</svg>
