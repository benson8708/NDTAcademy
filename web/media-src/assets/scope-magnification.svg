      <path d="M70 46 h8 M70 46 v8 M180 46 h-8 M180 46 v8 M70 116 h8 M70 116 v-8 M180 116 h-8 M180 116 v-8"/>
    </g>
    <g fill="none" stroke="#8fb6e0" opacity=".14">
      <path d="M76 100 q22 -7 38 2"/><path d="M138 58 q16 6 32 1"/><path d="M80 62 q12 8 8 18"/>
    </g>
    <path d="M120 78.9 Q121.5 74.7 125.7 75.4 Q130 76.1 129.9 81 Q129.8 86 125 86.3 Q120.5 86 120 81.7 Z" fill="#ffc24b" stroke="#b97f1f" stroke-width=".9" filter="url(#smglowR)"/>
    <circle cx="125" cy="81" r="1.7" fill="#7a4d10"/>
  </g>

