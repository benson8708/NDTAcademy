  <ellipse cx="182" cy="200" rx="3" ry="8" fill="#0c2340" stroke="#8fb6e0" stroke-width="1" opacity=".85"/>
  <text x="14" y="226" font-size="11" fill="#9fe6ff" opacity=".75">INSERTION TUBE</text>

  <!-- optical axis centerline -->
  <path d="M188 200 H492" stroke="#5fe0ff" stroke-width="1" stroke-dasharray="10 4 2 4" opacity=".3" fill="none"/>

