    <path d="M232 200 H382" stroke="#7fd8ff" stroke-width="2" fill="none" filter="url(#smglowR)"/>
    <path d="M393 200 L382 195 V205 Z" fill="#7fd8ff" filter="url(#smglowR)"/>
    <path d="M442 200 L497.2 182.5 M442 200 L497.5 217.5" stroke="#5fe0ff" stroke-width="1.2" opacity=".7" fill="none"/>
    <path d="M442 200 L497.2 182.5 Q496.6 200 497.5 217.5 Z" fill="#5fe0ff" opacity=".16"/>
    <path d="M497.2 182.5 Q496.6 200 497.5 217.5" stroke="#5fe0ff" stroke-width="2.2" opacity=".8" fill="none" filter="url(#smglowR)"/>
    <rect x="407" y="189" width="35" height="22" rx="2.5" fill="url(#smtipGrad)" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="436.5" y="190.5" width="4.5" height="19" fill="#0a1f3a" opacity=".9"/>
    <circle cx="439" cy="200" r="3.2" fill="#061425" stroke="#5fe0ff" stroke-width="1.3" filter="url(#smglowR)"/>
    <circle cx="439" cy="193" r="1.3" fill="#7fd8ff" opacity=".9"/>
    <circle cx="439" cy="207" r="1.3" fill="#7fd8ff" opacity=".9"/>
    <path d="M424 186 L368 129" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 3" opacity=".55" fill="none"/>
    <text x="365" y="30" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".85">NEAR STANDOFF</text>
    <rect x="300" y="36" width="130" height="90" rx="7" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="306" y="42" width="118" height="78" rx="3" fill="url(#smscrGrad)" stroke="#1E66F5" stroke-width="1" opacity=".98"/>
    <g stroke="#5fe0ff" stroke-width="1" opacity=".3" fill="none">
      <path d="M310 46 h8 M310 46 v8 M420 46 h-8 M420 46 v8 M310 116 h8 M310 116 v-8 M420 116 h-8 M420 116 v-8"/>
    </g>
    <path d="M348.5 74 Q353 56.5 366.5 58.5 Q382.5 61 381.5 81 Q380.5 99.5 365 100.5 Q350.5 99.5 348.5 84 Z" fill="#b97f1f" opacity=".85"/>
    <path d="M348.5 74 Q353 56.5 366.5 58.5 Q382.5 61 381.5 81 Q380.5 99.5 365 100.5 Q350.5 99.5 348.5 84 Z" fill="none" stroke="#ffc24b" stroke-width="2" filter="url(#smglowR)"/>
    <path d="M356.5 76 Q359.5 66.5 367 68 Q375.5 69.8 374.7 81 Q373.8 91.8 364.8 92.4 Q357 91.6 356.5 83 Z" fill="#7a4d10"/>
    <g fill="#ffc24b" opacity=".5">
      <circle cx="354" cy="65" r="1.4"/><circle cx="377" cy="93" r="1.5"/><circle cx="372" cy="63.5" r="1.1"/><circle cx="355.5" cy="94" r="1.2"/>
    </g>
    <path d="M365 70 V76 M365 86 V92 M354 81 H360 M370 81 H376" stroke="#5fe0ff" stroke-width="1" opacity=".35" fill="none"/>
  </g>

  <!-- ===== NO-SCALE: ? mm tags + tip-to-target dimension ===== -->
  <g id="smNoScale" opacity="0">
    <g>
      <rect x="120" y="98" width="62" height="19" rx="4" fill="#08152b" opacity=".92" stroke="#ff6b6b" stroke-width="1.2"/>
      <rect x="125" y="103.5" width="15" height="8" rx="1" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".8"/>
      <path d="M129 103.5 v3 M133 103.5 v3 M137 103.5 v3" stroke="#9fe6ff" stroke-width="1" opacity=".8" fill="none"/>
      <path d="M122.5 115.5 L142.5 100.5" stroke="#ff6b6b" stroke-width="1.6" stroke-linecap="round"/>
      <text x="146" y="112.5" font-size="11" fill="#ff6b6b">? mm</text>
    </g>
    <g>
      <rect x="360" y="98" width="62" height="19" rx="4" fill="#08152b" opacity=".92" stroke="#ff6b6b" stroke-width="1.2"/>
      <rect x="365" y="103.5" width="15" height="8" rx="1" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".8"/>
      <path d="M369 103.5 v3 M373 103.5 v3 M377 103.5 v3" stroke="#9fe6ff" stroke-width="1" opacity=".8" fill="none"/>
      <path d="M362.5 115.5 L382.5 100.5" stroke="#ff6b6b" stroke-width="1.6" stroke-linecap="round"/>
      <text x="386" y="112.5" font-size="11" fill="#ff6b6b">? mm</text>
    </g>
    <g stroke="#5fe0ff" fill="none">
      <path d="M218 214 V276 M442 214 V276 M498 232 V276" stroke-width="1" opacity=".55"/>
      <path d="M218 270 H498" stroke-width="1.2"/>
      <path d="M439 274 L445 266" stroke-width="1.5"/>
    </g>
    <path d="M218 270 L227 266.8 L227 273.2 Z" fill="#5fe0ff"/>
    <path d="M498 270 L489 266.8 L489 273.2 Z" fill="#5fe0ff"/>
    <text x="470" y="262" text-anchor="middle" font-size="12" fill="#9fe6ff">d = ?</text>
    <text x="345" y="290" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".8">TIP-TO-TARGET DISTANCE</text>
  </g>

  <!-- detection ping on the pit -->
  <circle id="smping" cx="497" cy="200" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#smglowR)"/>

  <!-- ===== scan group ===== -->
  <g id="smscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#smscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#smglowC)" opacity=".9"/>
  </g>
</svg>
