<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="smglowC" filterUnits="userSpaceOnUse" x="-58" y="-58" width="116" height="456">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="smglowR" filterUnits="userSpaceOnUse" x="63" y="1" width="502" height="274">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="smwallGrad" x1="490" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c5a88"/><stop offset=".4" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="smtubeGrad" x1="0" y1="192" x2="0" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30608f"/><stop offset=".45" stop-color="#1b3e66"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="smtipGrad" x1="0" y1="189" x2="0" y2="211" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a6c9e"/><stop offset=".45" stop-color="#1f4670"/><stop offset="1" stop-color="#0e2848"/>
    </linearGradient>
    <radialGradient id="smscrGrad" cx=".5" cy=".48" r=".75">
      <stop offset="0" stop-color="#0c2547"/><stop offset=".7" stop-color="#081a35"/><stop offset="1" stop-color="#051023"/>
    </radialGradient>
    <linearGradient id="smscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
    <pattern id="smbraid" width="11" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 16 L11 0 M-3 6 L5 -5 M6 21 L14 10" stroke="#8fb6e0" stroke-width="1" opacity=".22" fill="none"/>
      <path d="M0 0 L11 16 M6 -5 L14 6 M-3 10 L5 21" stroke="#8fb6e0" stroke-width="1" opacity=".14" fill="none"/>
    </pattern>
  </defs>

  <!-- ===== PIPE INNER WALL (curved, right side) ===== -->
  <path d="M512 55 Q482 195 512 332 L558 332 Q535 195 558 55 Z" fill="url(#smwallGrad)"/>
  <g fill="none" stroke="#8fb6e0" opacity=".18" stroke-width="1">
    <path d="M524 57 Q497 195 524 330"/>
    <path d="M538 56 Q516 195 538 331"/>
    <path d="M549 56 Q531 195 549 331"/>
  </g>
  <path d="M512 55 Q482 195 512 332" fill="none" stroke="#8fb6e0" stroke-width="2"/>
  <path d="M558 55 Q535 195 558 332" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".5"/>
  <path d="M512 55 H558 M512 332 H558" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".5"/>

  <!-- corrosion pit cut into inner wall surface -->
  <path d="M497 192 Q507.5 193 508 200 Q507.5 207 497.2 208 Q494.6 200.2 497 192 Z" fill="#08152b"/>
  <path d="M497 192 Q507.5 193 508 200 Q507.5 207 497.2 208" fill="none" stroke="#ffc24b" stroke-width="1.6" stroke-linecap="round" filter="url(#smglowR)" opacity=".95"/>
  <path d="M500.5 195.5 Q504.5 196.5 504.6 200 Q504.5 203.6 500.7 204.6" fill="none" stroke="#b97f1f" stroke-width="1.1" opacity=".8"/>
  <g fill="#ff9b4b" opacity=".55">
    <circle cx="496.4" cy="186.5" r="1.1"/><circle cx="497" cy="213.5" r="1.2"/><circle cx="498.6" cy="182" r=".8"/><circle cx="499" cy="218" r=".8"/>
  </g>
  <text x="560" y="34" text-anchor="end" font-size="11" fill="#ffc24b" opacity=".9">CORROSION PIT</text>
  <path d="M517 38 L500.5 188" fill="none" stroke="#ffc24b" stroke-width="1" opacity=".4"/>
  <text transform="rotate(90 528 252)" x="528" y="252" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">PIPE INNER WALL</text>

