    <rect x="60" y="36" width="130" height="90" rx="7" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.5"/>
    <rect x="66" y="42" width="118" height="78" rx="3" fill="url(#smscrGrad)" stroke="#1E66F5" stroke-width="1" opacity=".98"/>
    <g stroke="#5fe0ff" stroke-width="1" opacity=".3" fill="none">
