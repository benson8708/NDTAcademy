    <rect x="211.5" y="190.5" width="4.5" height="19" fill="#0a1f3a" opacity=".9"/>
    <circle cx="214" cy="200" r="3.2" fill="#061425" stroke="#5fe0ff" stroke-width="1.3" filter="url(#smglowR)"/>
    <circle cx="214" cy="193" r="1.3" fill="#7fd8ff" opacity=".9"/>
    <circle cx="214" cy="207" r="1.3" fill="#7fd8ff" opacity=".9"/>
    <path d="M199 186 L125 129" stroke="#8fb6e0" stroke-width="1" stroke-dasharray="3 3" opacity=".55" fill="none"/>
