<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="dvgGlowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dvgGlowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dvgSteel" x1="0" y1="278" x2="0" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5580"/><stop offset=".4" stop-color="#14304f"/><stop offset="1" stop-color="#0a1f38"/>
    </linearGradient>
    <radialGradient id="dvgWedgeGrad" gradientUnits="userSpaceOnUse" cx="440" cy="278" r="250">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity=".2"/>
      <stop offset=".55" stop-color="#5fe0ff" stop-opacity=".09"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".03"/>
    </radialGradient>
    <linearGradient id="dvgScanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <text x="40" y="34" font-size="12" fill="#9fe6ff" opacity=".7">DIRECT VIEWING &#8212; SIDE VIEW</text>

  <!-- ===== ALLOWED VIEWING ZONE WEDGE (reveal last, sits under line work) =====
       Vertex at surface point (440,278). Lower bound = the 30 deg minimum sight line
       (drawn by dvgSight), upper bound = perpendicular, cap = 600 mm radius (250 px). -->
  <g id="dvgWedge" opacity="0">
    <path d="M440 278 L223.5 153 A250 250 0 0 1 440 28 Z" fill="url(#dvgWedgeGrad)"/>
    <path d="M223.5 153 A250 250 0 0 1 440 28" fill="none" stroke="#5fe0ff" stroke-width="1.2" stroke-dasharray="6 5" opacity=".6"/>
    <path d="M440 278 L440 28" fill="none" stroke="#7fd8ff" stroke-width="1.5" stroke-dasharray="5 5" opacity=".75"/>
    <text x="448" y="42" font-size="11" fill="#9fe6ff" opacity=".85">90&#176;</text>
    <text x="309" y="51" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".75" transform="rotate(-30 309 51)">R = 600 mm</text>
    <g text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".92" letter-spacing="0.5">
      <text x="350" y="104">EYE ANYWHERE</text>
      <text x="350" y="119">IN THIS ZONE</text>
    </g>
    <g stroke="#5fe0ff" stroke-width="1.2" opacity=".4" fill="none">
      <path d="M284 135 h8 M288 131 v8"/>
      <path d="M331 68 h8 M335 64 v8"/>
      <path d="M394 150 h8 M398 146 v8"/>
    </g>
  </g>

  <!-- ===== TEST SURFACE (base art) ===== -->
  <g id="dvgSurface">
    <rect x="40" y="278" width="520" height="38" fill="url(#dvgSteel)"/>
    <g stroke="#8fb6e0" stroke-width="1" opacity=".18">
      <line x1="46" y1="290" x2="554" y2="290"/>
      <line x1="46" y1="300" x2="554" y2="300"/>
      <line x1="46" y1="309" x2="554" y2="309"/>
    </g>
    <g stroke="#8fb6e0" fill="none">
      <path d="M40 278 H430" stroke-width="2"/>
      <path d="M450 278 H560" stroke-width="2"/>
      <path d="M40 278 V316 M560 278 V316" stroke-width="1.5" opacity=".5"/>
      <path d="M40 316 H560" stroke-width="1.5" opacity=".6"/>
    </g>
    <text x="505" y="303" text-anchor="middle" font-size="11" fill="#9fe6ff" opacity=".55">TEST SURFACE</text>
  </g>

  <!-- ===== SURFACE PIT (viewed discontinuity, base art) ===== -->
  <g id="dvgPit">
    <path d="M430 278 Q435 287.5 440 288 Q445 287.5 450 278 Z" fill="#08152b"/>
    <path d="M430 278 Q435 287.5 440 288 Q445 287.5 450 278" fill="none" stroke="#ffc24b" stroke-width="1.8" stroke-linecap="round" filter="url(#dvgGlowR)"/>
  </g>

  <!-- ===== DIMENSION: eye to surface point, parallel to sight line (reveal 1) ===== -->
  <g id="dvgDist" opacity="0">
    <g stroke="#5fe0ff" fill="none" stroke-width="1" opacity=".55">
      <path d="M227 146.9 L239.5 125.3"/>
      <path d="M443.5 271.9 L456 250.3"/>
    </g>
    <path d="M236.5 130.5 L453 255.5" stroke="#5fe0ff" stroke-width="1" fill="none" opacity=".85"/>
    <path d="M236.5 130.5 L245.9 132.2 L242.7 137.8 Z" fill="#5fe0ff" opacity=".85"/>
    <path d="M453 255.5 L446.8 248.2 L443.6 253.8 Z" fill="#5fe0ff" opacity=".85"/>
    <text x="351" y="181.5" text-anchor="middle" font-size="12" fill="#9fe6ff" transform="rotate(30 351 181.5)">&#8804; 600 mm (24 in.)</text>
  </g>

  <!-- ===== ANGLE ARC at the surface: sight ray vs surface plane (reveal 3) ===== -->
  <g id="dvgAngle" opacity="0">
    <path d="M394 278 A46 46 0 0 1 400.2 255" fill="none" stroke="#7fd8ff" stroke-width="1.8" filter="url(#dvgGlowR)"/>
    <text x="388" y="266" text-anchor="end" font-size="12" fill="#9fe6ff">&#8805; 30&#176;</text>
  </g>

  <!-- ===== LINE OF SIGHT: eye to pit at exactly 30 deg (draw-on reveal 2) ===== -->
  <path id="dvgSight" d="M227 155 L433.9 274.5" fill="none" stroke="#5fe0ff" stroke-width="2.5" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" filter="url(#dvgGlowC)"/>

  <!-- ===== DETECTION PING on the pit ===== -->
  <circle id="dvgPitPing" cx="440" cy="275" r="6" fill="none" stroke="#ffc24b" stroke-width="2" opacity="0" filter="url(#dvgGlowR)"/>

  <!-- ===== INSPECTOR EYE (base art) - cornea sits exactly on the 600 mm / 30 deg corner ===== -->
  <g id="dvgEye" transform="translate(201 140) rotate(30)">
    <path d="M-26 0 Q0 -22 26 0 Q0 22 -26 0 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.8"/>
    <circle cx="7" cy="0" r="8.5" fill="#1E66F5" stroke="#5fe0ff" stroke-width="1.5" filter="url(#dvgGlowR)"/>
    <circle cx="7" cy="0" r="3.8" fill="#04101f"/>
    <circle cx="4" cy="-3" r="1.3" fill="#9fe6ff"/>
    <path d="M22 -7 Q30.5 0 22 7" fill="none" stroke="#5fe0ff" stroke-width="1.3" opacity=".75"/>
    <path d="M-28 -13 Q0 -28 24 -12" fill="none" stroke="#8fb6e0" stroke-width="1.5" opacity=".5"/>
    <g stroke="#8fb6e0" stroke-width="1.3" stroke-linecap="round" opacity=".7" fill="none">
      <path d="M-12 -10.5 L-15.5 -17"/>
      <path d="M-1 -11.5 L-2.5 -18.5"/>
      <path d="M10 -10 L12.5 -16.5"/>
    </g>
  </g>
  <g font-size="11">
    <text x="158" y="103" text-anchor="end" fill="#9fe6ff" opacity=".85">EYE</text>
    <path d="M162 106 L180 122" stroke="#5fe0ff" stroke-width="1" opacity=".5" fill="none"/>
  </g>

  <!-- ===== scan group ===== -->
  <g id="dvgscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#dvgScanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#dvgGlowC)" opacity=".9"/>
  </g>
</svg>
