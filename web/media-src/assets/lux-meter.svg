<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="lmglowC" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lmglowR" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lmsteelBody" x1="42" y1="128" x2="152" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a527e"/><stop offset=".3" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="lmsteelTop" x1="0" y1="188" x2="0" y2="268" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f4a77"/><stop offset=".5" stop-color="#143a5f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <linearGradient id="lmlcdG" x1="0" y1="144" x2="0" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081a2e"/><stop offset="1" stop-color="#0c2438"/>
    </linearGradient>
    <radialGradient id="lmdomeG" cx=".42" cy=".28" r=".95">
      <stop offset="0" stop-color="#f7fbff"/><stop offset=".55" stop-color="#c5dcf1"/><stop offset="1" stop-color="#8fb0d4"/>
    </radialGradient>
    <radialGradient id="lmboreGr" cx=".5" cy=".45" r=".7">
      <stop offset="0" stop-color="#020a14"/><stop offset=".7" stop-color="#061528"/><stop offset="1" stop-color="#0a2138"/>
    </radialGradient>
    <radialGradient id="lmvignG" cx=".5" cy=".5" r=".55">
      <stop offset="0" stop-color="#020a14" stop-opacity=".75"/><stop offset=".65" stop-color="#030d1a" stop-opacity=".45"/><stop offset="1" stop-color="#030d1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lmbeamG" x1="209" y1="77" x2="300" y2="233" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bfeaff" stop-opacity=".30"/><stop offset=".6" stop-color="#7fd8ff" stop-opacity=".12"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".04"/>
    </linearGradient>
    <radialGradient id="lmfootG" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#dffaff" stop-opacity=".40"/><stop offset=".55" stop-color="#9fe6ff" stop-opacity=".16"/><stop offset="1" stop-color="#9fe6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lmbeadG" x1="0" y1="247" x2="0" y2="259" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b9bd4"/><stop offset=".45" stop-color="#3a74ab"/><stop offset="1" stop-color="#245688"/>
    </linearGradient>
    <linearGradient id="lmbeadFade" x1="396" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1d33" stop-opacity="0"/><stop offset="1" stop-color="#0a1d33" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="lmscanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0ff" stop-opacity="0"/><stop offset="1" stop-color="#5fe0ff" stop-opacity=".3"/>
    </linearGradient>
  </defs>

  <!-- ===== BASE ART: steel plate in shallow perspective ===== -->
  <g id="lmPlate">
    <path d="M170 188 L556 188 L528 268 L120 268 Z" fill="url(#lmsteelTop)"/>
    <path d="M120 268 L528 268 L524 282 L124 282 Z" fill="#081a30"/>
    <!-- rolling texture following perspective -->
    <g stroke="#8fb6e0" stroke-width="1" opacity=".2">
      <line x1="163" y1="200" x2="551" y2="200"/>
      <line x1="153" y1="215" x2="546" y2="215"/>
      <line x1="143" y1="231" x2="541" y2="231"/>
    </g>
    <!-- plate edges -->
    <path d="M170 188 L556 188" stroke="#8fb6e0" stroke-width="1.8" opacity=".75" fill="none"/>
    <path d="M170 188 L120 268 M556 188 L528 268" stroke="#8fb6e0" stroke-width="1.2" opacity=".4" fill="none"/>
    <path d="M120 268 L528 268" stroke="#8fb6e0" stroke-width="2" opacity=".7" fill="none"/>
    <path d="M124 282 L524 282" stroke="#8fb6e0" stroke-width="1" opacity=".25" fill="none"/>
    <!-- shadowed nozzle-bore recess at right edge -->
    <ellipse cx="492" cy="230" rx="72" ry="36" fill="url(#lmvignG)"/>
    <ellipse cx="482" cy="226" rx="36" ry="14" fill="url(#lmboreGr)" stroke="#0a2540" stroke-width="1.5"/>
    <ellipse cx="482" cy="228" rx="26" ry="9" fill="#01060e"/>
    <path d="M450 219 A36 14 0 0 1 506 217" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".4"/>
  </g>

  <!-- ===== lmSurface: weld bead across lower third (beside the sensor) ===== -->
  <g id="lmSurface" opacity="0">
    <!-- heat-tint bands flanking the toes -->
    <rect x="136" y="240" width="300" height="7" fill="#2b86ff" opacity=".14"/>
    <rect x="136" y="259" width="300" height="7" fill="#2b86ff" opacity=".14"/>
    <path d="M136 247 L436 247 L436 259 L136 259 Z" fill="url(#lmbeadG)"/>
    <!-- ripples: nested crescents, stringer-bead style -->
    <g fill="none" stroke="#bfe2ff" stroke-width="1" opacity=".35">
      <path d="M150 248 q9 5 0 10"/><path d="M168 248 q9 5 0 10"/><path d="M186 248 q9 5 0 10"/>
      <path d="M204 248 q9 5 0 10"/><path d="M222 248 q9 5 0 10"/><path d="M240 248 q9 5 0 10"/>
      <path d="M258 248 q9 5 0 10"/><path d="M276 248 q9 5 0 10"/><path d="M294 248 q9 5 0 10"/>
      <path d="M312 248 q9 5 0 10"/><path d="M330 248 q9 5 0 10"/><path d="M348 248 q9 5 0 10"/>
      <path d="M366 248 q9 5 0 10"/><path d="M384 248 q9 5 0 10"/><path d="M402 248 q9 5 0 10"/>
      <path d="M420 248 q9 5 0 10"/>
    </g>
    <!-- toes -->
    <path d="M136 247 q40 -2 80 0 t80 0 t80 0 t60 0" fill="none" stroke="#bfe2ff" stroke-width="1.3" opacity=".85"/>
    <path d="M136 259 q40 2 80 0 t80 0 t80 0 t60 0" fill="none" stroke="#9fc4e8" stroke-width="1.1" opacity=".5"/>
    <path d="M136 250.5 H436" stroke="#7fd8ff" stroke-width="1" opacity=".25" filter="url(#lmglowR)"/>
    <!-- bead fades into the shadowed recess -->
    <rect x="396" y="238" width="44" height="30" fill="url(#lmbeadFade)"/>
  </g>

  <!-- ===== lmBody: handheld lux meter (visible from start, blank LCD) ===== -->
  <g id="lmBody">
    <rect x="42" y="128" width="110" height="168" rx="10" fill="url(#lmsteelBody)" stroke="#8fb6e0" stroke-width="1.8"/>
    <rect x="47" y="133" width="100" height="158" rx="7" fill="none" stroke="#8fb6e0" stroke-width="1" opacity=".22"/>
    <!-- cord socket on right shoulder -->
    <rect x="148" y="142" width="13" height="11" rx="2" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <!-- LCD -->
    <rect x="54" y="144" width="86" height="54" rx="4" fill="url(#lmlcdG)" stroke="#5fe0ff" stroke-width="1" opacity="1"/>
    <text x="93" y="185" text-anchor="middle" font-size="28" font-weight="700" fill="#5fe0ff" opacity=".07">888</text>
    <!-- buttons -->
    <g fill="#0e2848" stroke="#8fb6e0" stroke-width=".9" opacity=".9">
      <rect x="56" y="212" width="24" height="13" rx="3"/>
      <rect x="85" y="212" width="24" height="13" rx="3"/>
      <rect x="114" y="212" width="24" height="13" rx="3"/>
    </g>
    <circle cx="97" cy="252" r="15" fill="#0e2848" stroke="#8fb6e0" stroke-width="1"/>
    <circle cx="97" cy="252" r="5.5" fill="#1E66F5" stroke="#5fe0ff" stroke-width=".8"/>
    <circle cx="63" cy="252" r="5.5" fill="#0e2848" stroke="#8fb6e0" stroke-width=".9"/>
    <circle cx="131" cy="252" r="5.5" fill="#0e2848" stroke="#8fb6e0" stroke-width=".9"/>
    <rect x="70" y="276" width="54" height="6" rx="3" fill="#0e2848" opacity=".8"/>
  </g>

  <!-- ===== lmReadout: LCD digits ===== -->
  <g id="lmReadout" opacity="0">
    <text x="93" y="185" text-anchor="middle" font-size="28" font-weight="700" fill="#aef3ff" filter="url(#lmglowR)">500</text>
    <text x="134" y="193" text-anchor="end" font-size="11" fill="#9fe6ff">lx</text>
  </g>

  <!-- ===== lmCord: coiled cord, meter to sensor (draw-on) ===== -->
  <path id="lmCord" d="M161 147 q8 -1 12 5 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 a8.5 8.5 0 1 1 12 10 q9 5 14 7"
    fill="none" stroke="#8fb6e0" stroke-width="1.8" stroke-linecap="round" opacity=".9"
    pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== lmDome: remote photodetector, lying FLAT on the surface ===== -->
  <g id="lmDome" opacity="0">
    <ellipse cx="302" cy="237" rx="30" ry="8" fill="#03101f" opacity=".55"/>
    <path d="M273 230 L273 236 A27 9 0 0 0 327 236 L327 230" fill="#0e2848" stroke="#8fb6e0" stroke-width="1.2"/>
    <ellipse cx="300" cy="230" rx="27" ry="9" fill="#1b3e66" stroke="#8fb6e0" stroke-width="1.3"/>
    <rect x="265" y="226" width="9" height="7" rx="1.5" fill="#0e2848" stroke="#8fb6e0" stroke-width=".8"/>
    <path d="M280 229 A20 15 0 0 1 320 229 Z" fill="url(#lmdomeG)" stroke="#d8ebfc" stroke-width="1.2"/>
    <ellipse cx="300" cy="229" rx="20" ry="6.5" fill="#eaf4ff" opacity=".22"/>
    <ellipse cx="293" cy="219" rx="6" ry="3.6" fill="#ffffff" opacity=".5" transform="rotate(-18 293 219)"/>
  </g>

  <!-- ===== lmLamp: work lamp + beam cone onto the sensor ===== -->
  <g id="lmLamp" opacity="0">
    <!-- beam -->
    <path d="M198 83 L242 233 A58 16 0 0 0 358 233 L220 70 Z" fill="url(#lmbeamG)"/>
    <ellipse cx="300" cy="233" rx="58" ry="16" fill="url(#lmfootG)"/>
    <ellipse cx="300" cy="233" rx="30" ry="9" fill="#dffaff" opacity=".18"/>
    <!-- flashlight body, aimed at the sensor -->
    <g transform="translate(205 70) rotate(60)">
      <rect x="-52" y="-8.5" width="44" height="17" rx="4" fill="url(#lmsteelBody)" stroke="#8fb6e0" stroke-width="1.5"/>
      <g stroke="#8fb6e0" stroke-width="1" opacity=".4">
        <line x1="-44" y1="-8" x2="-44" y2="8"/><line x1="-37" y1="-8" x2="-37" y2="8"/>
        <line x1="-30" y1="-8" x2="-30" y2="8"/><line x1="-23" y1="-8" x2="-23" y2="8"/>
      </g>
      <rect x="-9" y="-10" width="6" height="20" rx="2" fill="#14304f" stroke="#8fb6e0" stroke-width="1.2"/>
      <path d="M-3 -11 L8 -15 L8 15 L-3 11 Z" fill="#14304f" stroke="#8fb6e0" stroke-width="1.5"/>
      <ellipse cx="8" cy="0" rx="2.4" ry="13" fill="#bfeaff" opacity=".95" filter="url(#lmglowR)"/>
    </g>
  </g>

  <!-- ===== lmDist: WORKING DISTANCE dimension, lamp to surface ===== -->
  <g id="lmDist" opacity="0">
    <path d="M209 77 L234 63 M300 222 L325 210" stroke="#9fe6ff" stroke-width="1" stroke-dasharray="2 3" opacity=".4" fill="none"/>
    <path d="M238 60 L329 212" stroke="#9fe6ff" stroke-width="1.2" stroke-dasharray="5 4" opacity=".85" fill="none"/>
    <path d="M232 64 L244 56 M323 216 L335 208" stroke="#9fe6ff" stroke-width="1.4" opacity=".85" fill="none"/>
    <text x="296" y="136" font-size="11" fill="#9fe6ff">WORKING DISTANCE</text>
  </g>

  <!-- ===== lmDarkSpot: worst-case dark location over the bore recess ===== -->
  <g id="lmDarkSpot" opacity="0">
    <ellipse cx="482" cy="226" rx="40" ry="19" fill="#ffc24b" opacity=".05"/>
    <g stroke="#ffc24b" stroke-width=".9" opacity=".3">
      <line x1="452" y1="236" x2="470" y2="210"/>
      <line x1="468" y1="241" x2="490" y2="209"/>
      <line x1="486" y1="241" x2="506" y2="212"/>
      <line x1="502" y1="237" x2="516" y2="216"/>
    </g>
    <ellipse cx="482" cy="226" rx="40" ry="19" fill="none" stroke="#ffc24b" stroke-width="1.6" stroke-dasharray="6 4" filter="url(#lmglowR)"/>
    <path d="M482 176 L482 203" stroke="#ffc24b" stroke-width="1" opacity=".5" fill="none"/>
    <text x="482" y="170" text-anchor="middle" font-size="11" fill="#ffc24b">DARKEST SPOT</text>
  </g>

  <!-- ===== pings: pulse on sensor + readout ===== -->
  <circle id="lmPing" cx="300" cy="222" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#lmglowR)"/>
  <circle id="lmPingLcd" cx="97" cy="171" r="6" fill="none" stroke="#5fe0ff" stroke-width="2" opacity="0" filter="url(#lmglowR)"/>

  <!-- ===== scan group ===== -->
  <g id="lmscanG" transform="translate(60,0)">
    <rect x="-30" y="0" width="30" height="340" fill="url(#lmscanFade)"/>
    <line x1="0" y1="0" x2="0" y2="340" stroke="#5fe0ff" stroke-width="2" filter="url(#lmglowC)" opacity=".9"/>
  </g>
</svg>
