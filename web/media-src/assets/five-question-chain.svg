<svg viewBox="0 0 600 340" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <defs>
    <filter id="fqglow" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fqglowS" filterUnits="userSpaceOnUse" x="-60" y="-60" width="720" height="460">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fqbezel" x1="0" y1="120" x2="0" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a5584"/><stop offset=".38" stop-color="#14304f"/><stop offset="1" stop-color="#0c2340"/>
    </linearGradient>
    <radialGradient id="fqscr" cx=".5" cy=".42" r=".9">
      <stop offset="0" stop-color="#0c2747"/><stop offset=".75" stop-color="#071528"/><stop offset="1" stop-color="#050f1f"/>
    </radialGradient>
  </defs>

  <!-- ===== corner meta (always on, dim) ===== -->
  <text x="16" y="32" font-size="10" fill="#9fe6ff" letter-spacing="1.5" opacity=".5">UT // ECHO EVALUATION</text>
  <text x="584" y="32" text-anchor="end" font-size="10" fill="#9fe6ff" letter-spacing="1.5" opacity=".5">LEVEL II &#183; WALK THE CHAIN</text>

  <!-- ===== A-SCAN THUMBNAIL (suspect signal) ===== -->
  <text x="78" y="112" text-anchor="middle" font-size="11" fill="#9fe6ff" letter-spacing="1.2" opacity=".9">SUSPECT SIGNAL</text>
  <rect x="16" y="120" width="124" height="96" rx="10" fill="url(#fqbezel)" stroke="#8fb6e0" stroke-width="1.2"/>
  <circle cx="131" cy="124" r="1.5" fill="#5fe0ff" filter="url(#fqglowS)" opacity=".9"/>
  <rect x="24" y="128" width="108" height="72" rx="5" fill="url(#fqscr)" stroke="#8fb6e0" stroke-width=".8" opacity=".95"/>
  <!-- graticule -->
  <path d="M42 128 V200 M60 128 V200 M78 128 V200 M96 128 V200 M114 128 V200 M24 146 H132 M24 164 H132 M24 182 H132" fill="none" stroke="#5fe0ff" stroke-width=".8" opacity=".15"/>
  <!-- trace: IP, ambiguous mid echo, backwall -->
  <path d="M26 192 L28 192 L29 144 L30 138 L31.5 158 L33 186 L34.5 150 L36 188 L38 192 L42 191.4 L47 192.3 L52 191.2 L57 192.4 L62 191.5 L67 192.2 L70 191.2 L73 192 L75.5 168 L78 158 L80.5 174 L83 188 L85 192 L90 191.3 L95 192.2 L100 191.4 L105 192.3 L110 191.2 L114 192 L116.5 150 L119 142 L121.5 168 L124 188 L126 192 L130 192" fill="none" stroke="#5fe0ff" stroke-width="1.3" stroke-linejoin="round" opacity=".9" filter="url(#fqglowS)"/>
  <text x="78" y="211" text-anchor="middle" font-size="7.5" fill="#9fe6ff" letter-spacing="1" opacity=".55">A-SCAN</text>

  <!-- ===== REVEAL: suspect echo ring + query ===== -->
  <g id="fqEcho" opacity="0">
    <ellipse cx="79" cy="175" rx="11.5" ry="19" fill="none" stroke="#5fe0ff" stroke-width="1.6" filter="url(#fqglowS)"/>
    <text x="79" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#5fe0ff" filter="url(#fqglowS)">?</text>
  </g>

  <!-- ===== REVEAL: chain of five gates, dim outline (draw) ===== -->
  <path id="fqGates" d="M140 168 H159 M162.7 173.9 Q159 168 162.7 162.1L173.5 144.9 Q177.2 139 184.2 139L203.8 139 Q210.8 139 214.5 144.9L225.3 162.1 Q229 168 225.3 173.9L214.5 191.1 Q210.8 197 203.8 197L184.2 197 Q177.2 197 173.5 191.1Z M229 168 H251 M254.7 173.9 Q251 168 254.7 162.1L265.5 144.9 Q269.2 139 276.2 139L295.8 139 Q302.8 139 306.5 144.9L317.3 162.1 Q321 168 317.3 173.9L306.5 191.1 Q302.8 197 295.8 197L276.2 197 Q269.2 197 265.5 191.1Z M321 168 H343 M346.7 173.9 Q343 168 346.7 162.1L357.5 144.9 Q361.2 139 368.2 139L387.8 139 Q394.8 139 398.5 144.9L409.3 162.1 Q413 168 409.3 173.9L398.5 191.1 Q394.8 197 387.8 197L368.2 197 Q361.2 197 357.5 191.1Z M413 168 H435 M438.7 173.9 Q435 168 438.7 162.1L449.5 144.9 Q453.2 139 460.2 139L479.8 139 Q486.8 139 490.5 144.9L501.3 162.1 Q505 168 501.3 173.9L490.5 191.1 Q486.8 197 479.8 197L460.2 197 Q453.2 197 449.5 191.1Z M505 168 H527 M530.7 173.9 Q527 168 530.7 162.1L541.5 144.9 Q545.2 139 552.2 139L571.8 139 Q578.8 139 582.5 144.9L593.3 162.1 Q597 168 593.3 173.9L582.5 191.1 Q578.8 197 571.8 197L552.2 197 Q545.2 197 541.5 191.1Z"
        fill="none" stroke="#5fe0ff" stroke-width="1.5" stroke-linejoin="round" opacity=".38"
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>

  <!-- ===== REVEAL: GATE 1 MODE ===== -->
  <g id="fqMode" opacity="0">
    <line x1="140" y1="168" x2="159" y2="168" stroke="#5fe0ff" stroke-width="2.5" filter="url(#fqglow)" opacity=".95"/>
    <path d="M162.7 173.9 Q159 168 162.7 162.1L173.5 144.9 Q177.2 139 184.2 139L203.8 139 Q210.8 139 214.5 144.9L225.3 162.1 Q229 168 225.3 173.9L214.5 191.1 Q210.8 197 203.8 197L184.2 197 Q177.2 197 173.5 191.1Z" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#fqglow)"/>
    <!-- glyph: compression vs transverse squiggles -->
    <text x="175" y="162.5" font-size="7" fill="#9fe6ff" opacity=".85">L</text>
    <path d="M180 159 q3 -7 6 0 t6 0 t6 0 t6 0" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="173" y="181.5" font-size="7" fill="#9fe6ff" opacity=".85">T</text>
    <path d="M179 178 q5 -8 10 0 t10 0 t10 0" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="194" y="130" text-anchor="middle" font-size="10" fill="#5fe0ff" letter-spacing="1" opacity=".85">Q1</text>
    <text x="194" y="219" text-anchor="middle" font-size="11.5" fill="#9fe6ff" letter-spacing="1.5">MODE</text>
  </g>

  <!-- ===== REVEAL: GATE 2 VELOCITY ===== -->
  <g id="fqVelocity" opacity="0">
    <line x1="229" y1="168" x2="251" y2="168" stroke="#5fe0ff" stroke-width="2.5" filter="url(#fqglow)" opacity=".95"/>
    <path d="M254.7 173.9 Q251 168 254.7 162.1L265.5 144.9 Q269.2 139 276.2 139L295.8 139 Q302.8 139 306.5 144.9L317.3 162.1 Q321 168 317.3 173.9L306.5 191.1 Q302.8 197 295.8 197L276.2 197 Q269.2 197 265.5 191.1Z" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#fqglow)"/>
    <!-- glyph: speedometer v = ? -->
    <path d="M272 174 A14 14 0 0 1 300 174" fill="none" stroke="#9fe6ff" stroke-width="1.5"/>
    <path d="M272 174 L275.5 174 M276.1 164.1 L278.6 166.6 M286 160 V163.5 M295.9 164.1 L293.4 166.6 M300 174 L296.5 174" stroke="#9fe6ff" stroke-width="1.2"/>
    <line x1="286" y1="174" x2="291.7" y2="165.8" stroke="#5fe0ff" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="286" cy="174" r="1.8" fill="#5fe0ff"/>
    <text x="286" y="188" text-anchor="middle" font-size="8.5" fill="#9fe6ff">v = ?</text>
    <text x="286" y="130" text-anchor="middle" font-size="10" fill="#5fe0ff" letter-spacing="1" opacity=".85">Q2</text>
    <text x="286" y="219" text-anchor="middle" font-size="11.5" fill="#9fe6ff" letter-spacing="1.5">VELOCITY</text>
  </g>

  <!-- ===== REVEAL: GATE 3 TIME ===== -->
  <g id="fqTime" opacity="0">
    <line x1="321" y1="168" x2="343" y2="168" stroke="#5fe0ff" stroke-width="2.5" filter="url(#fqglow)" opacity=".95"/>
    <path d="M346.7 173.9 Q343 168 346.7 162.1L357.5 144.9 Q361.2 139 368.2 139L387.8 139 Q394.8 139 398.5 144.9L409.3 162.1 Q413 168 409.3 173.9L398.5 191.1 Q394.8 197 387.8 197L368.2 197 Q361.2 197 357.5 191.1Z" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#fqglow)"/>
    <!-- glyph: timebase ruler with echo-position tick -->
    <path d="M358 176 H398" fill="none" stroke="#9fe6ff" stroke-width="1.5"/>
    <path d="M358 176 V170 M363 176 V172 M368 176 V172 M373 176 V172 M378 176 V170 M383 176 V172 M398 176 V170" stroke="#9fe6ff" stroke-width="1.1"/>
    <line x1="390" y1="176" x2="390" y2="162" stroke="#5fe0ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M390 160 L386.8 154 L393.2 154 Z" fill="#5fe0ff"/>
    <text x="358" y="186" text-anchor="middle" font-size="7" fill="#9fe6ff" opacity=".8">0</text>
    <text x="378" y="130" text-anchor="middle" font-size="10" fill="#5fe0ff" letter-spacing="1" opacity=".85">Q3</text>
    <text x="378" y="219" text-anchor="middle" font-size="11.5" fill="#9fe6ff" letter-spacing="1.5">TIME</text>
  </g>

  <!-- ===== REVEAL: GATE 4 AMPLITUDE ===== -->
  <g id="fqAmplitude" opacity="0">
    <line x1="413" y1="168" x2="435" y2="168" stroke="#5fe0ff" stroke-width="2.5" filter="url(#fqglow)" opacity=".95"/>
    <path d="M438.7 173.9 Q435 168 438.7 162.1L449.5 144.9 Q453.2 139 460.2 139L479.8 139 Q486.8 139 490.5 144.9L501.3 162.1 Q505 168 501.3 173.9L490.5 191.1 Q486.8 197 479.8 197L460.2 197 Q453.2 197 449.5 191.1Z" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#fqglow)"/>
    <!-- glyph: echo peak + Z1|Z2 impedance step -->
    <path d="M450 184 H454 L458 162 L460 156 L462.5 172 L465 184 H469" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="472" y="158" width="11" height="24" fill="none" stroke="#9fe6ff" stroke-width="1.1" opacity=".8"/>
    <rect x="483" y="158" width="11" height="24" fill="none" stroke="#9fe6ff" stroke-width="1.1" opacity=".8"/>
    <line x1="483" y1="156" x2="483" y2="184" stroke="#5fe0ff" stroke-width="2"/>
    <text x="477.5" y="173" text-anchor="middle" font-size="7" fill="#9fe6ff">Z1</text>
    <text x="488.5" y="173" text-anchor="middle" font-size="7" fill="#9fe6ff">Z2</text>
    <text x="470" y="130" text-anchor="middle" font-size="10" fill="#5fe0ff" letter-spacing="1" opacity=".85">Q4</text>
    <text x="470" y="219" text-anchor="middle" font-size="11.5" fill="#9fe6ff" letter-spacing="1.5">AMPLITUDE</text>
  </g>

  <!-- ===== REVEAL: GATE 5 MOTION ===== -->
  <g id="fqMotion" opacity="0">
    <line x1="505" y1="168" x2="527" y2="168" stroke="#5fe0ff" stroke-width="2.5" filter="url(#fqglow)" opacity=".95"/>
    <path d="M530.7 173.9 Q527 168 530.7 162.1L541.5 144.9 Q545.2 139 552.2 139L571.8 139 Q578.8 139 582.5 144.9L593.3 162.1 Q597 168 593.3 173.9L582.5 191.1 Q578.8 197 571.8 197L552.2 197 Q545.2 197 541.5 191.1Z" fill="rgba(10,30,60,.55)" stroke="#5fe0ff" stroke-width="2" stroke-linejoin="round" filter="url(#fqglow)"/>
    <!-- glyph: angle-beam probe, scrub arrows, echo shifting in sync -->
    <line x1="542" y1="182" x2="582" y2="182" stroke="#9fe6ff" stroke-width="1.2" opacity=".7"/>
    <path d="M546 182 V170 H554 L559 182 Z" fill="rgba(95,224,255,.18)" stroke="#9fe6ff" stroke-width="1.3" stroke-linejoin="round"/>
    <rect x="547" y="166" width="6" height="4" fill="none" stroke="#9fe6ff" stroke-width="1" opacity=".8"/>
    <path d="M543 160 H559 M543 160 l4 -2.5 M543 160 l4 2.5 M559 160 l-4 -2.5 M559 160 l-4 2.5" fill="none" stroke="#5fe0ff" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M564 182 L567.5 168 L571 182" fill="none" stroke="#9fe6ff" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M572 182 L575.5 170 L579 182" fill="none" stroke="#9fe6ff" stroke-width="1.3" stroke-linejoin="round" stroke-dasharray="2.5 2" opacity=".7"/>
    <path d="M566 163 h9 M575 163 l-3 -2 M575 163 l-3 2" fill="none" stroke="#5fe0ff" stroke-width="1.1" stroke-linecap="round" opacity=".85"/>
    <text x="562" y="130" text-anchor="middle" font-size="10" fill="#5fe0ff" letter-spacing="1" opacity=".85">Q5</text>
    <text x="562" y="219" text-anchor="middle" font-size="11.5" fill="#9fe6ff" letter-spacing="1.5">MOTION</text>
  </g>
</svg>
